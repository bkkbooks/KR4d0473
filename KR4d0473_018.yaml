body:
  text: 記慶元路鄞縣學記粵昔授受緒絶空虛固陋之學淪於人心言理者人人殊師記問者質而不化詞章篆刻决裂六藝糜爛而不可救師儒有憂之據道德性命之要毫分縷析鑿鑿乎其不可相紊也繇是士得以一其視聽皇王之道復興於千數百年之後可謂盛矣世祖皇帝混同區夏崇學校定國子學成憲皆東南儒先而朱文公所說咸取以為經史模楷於是窮徼絶域中州萬里之內外悉家有其書然而急近功者勦取其近似以為口耳之實天人禮樂損益消長切于施為所宜精思而熟考者一以為凡近迂緩而不講至於修身養心或相背戾而不相似則緣飾儼默望之莫有以窺其涘際夫明絶學以承先聖之統可謂難矣弊生于苟易守其說而湮其本將不勝其弊載籍極博莫嚴於五經教人之法莫詳於三物揚子雲云丘陵學山而不至于山惡夫畫也鄞舊有學王文公安石為宰時延㑹稽杜先生醇教之學者輩出至大二年郡大火學燬之主邑之學曰孔文雋董儒金始建講堂禮殿未及完而去皇慶二年三衢姚熙載實來是嵗天子下科舉詔同知郡事吳郡張侯某顧瞻陋蕪首曰其何以稱上意乃率郡官而助之邑令梅君遇春丞簿龎君滋范君祐咸曰吾長于是兹役曷可逭嚴工庀程戒隸業者咸輸以佐閲二年夫子像成侑從有叙門廡庖廋塗雘繚繞之屬堅密精粲學宫之制完且具矣姚君乃曰鄞號多士昉杜先生宜作先賢祠以祀鄞士之興其自今始乎嘗謂學校宫室殿謁循行風俗之使者未嘗不督厲修繕獨教法未定雖聰明自任猶不敢髙下以議今明詔四出郡侯首創其原姚君又能推本前人尊師之㫖深有所寓桷雖官朝廷因姚君之請知張侯之美遂以學校之弊首叙其說庶幾吾里秀士强敏自修詢考耆哲篤行於顯微內外之實文質交資上承詳延將以復乎昔時之盛則姚君之闡微其意深矣庸刻于石願有以俟焉鄮山書院記粵若古儒先各以方國所尊祭于學社自漢而降定孔子祀餘悉徹廢今百年來始有事于先師其居邑講習治官遊衍之地崇闡相望或者病焉夫氣流六虛神而存之聚者易推逺者難窮聲音笑貌之感若將企焉如弗及者理有在也合吳越楚蜀之地咸尊以師惟朱文公世祖皇帝一海㝢㝎胄子學取文公訓注為學制郡縣益遵守而祀於江南者復得推衍大德二年四明趙夀家儒科慨然請于朝曰伊吾祖鄂州善待從文公遊今天子興是學願割田别居以祠而名曰鄮山事甫下趙氏即世七年三山林德載氏奉命祇事屋毁弗稱旋辟田沒不可問核故整圯實完實成奠薦齊明陟降儼肅賔老佐祭侯伯合餕又三年㑭繫其事于石袁桷曰維我四明薦紳先生辦釋著微實相表裏源同流分塗殊轍一合私而惡異標榜之弊也炳然彜訓理何外焉學以殖身德以敦本斯道立矣執空說以為證弊不勝舉惟性與道匪言是夸桷懼兹久願相與勉焉林君精敏慎修宜展於世文公之學不墜審由是也大德丁未春後學袁桷記鄞縣興造記鄞為縣延亘三百里環山帶江西為沃區其民盡地利近東瀦為湖土廣而俗雜逐島嶼魚鹽之利出沒于海上嵗千百數林藪川澤之隸于鄞者不假于外故號為劇邑邑復輔城以居尤為難治縣上事郡署曲直縱舍承指意一不得便輒指擲辱撓關臨相通縣勢始振後凡為縣者率用是自治而民益困矣大德七年帥府始移鎮控扼水陸衆曰郡有二府縣益不可理八年真㝎盧廷信氏丞于兹推勤服廉沉斷靜修罪疏于囹訟辭于庭朞月而郡侯尊焉大府任焉它邑之讞咸質以㝎旁郡之賕悉檄以正顧瞻四周令主簿是謀先時縣燬經始狹庳不足廣乃撤而新鳩材于山負者以競輸役于徒民以不病首于臺門㕔堂亭廡凡五十有楹智周而勞簡噦然以深翼然以容謁者趨者視聽易慮於是耆艾歡然以謡曰伊丞之來吾民不知吏屩既荒吾民相忘彼庭開明維丞之平雍雍其堂富民恐傷有亭是休思賢悠悠丞之戾止勿譁以喜後兮今兮維今是似咸謂桷嘗職太史筆削無避溢遂不得讓役始于乙巳之十月越明年月成丞嘗為行掾中書有吏能令長欣都次為東平周汝弼氏簿澄江朱申氏也余愛其成紀以示後㑭知鄞為可治大德十年十二月日袁桷記西洛書院記河南薛公遵先君子之命建義學于永寧矣龍頭山有故跡焉蒼崖嶄然宋元祐中天台羅適正之大刻其上曰洛書錫禹之地正之安㝎胡先生門人善水利所至通陂埭屯田之美按地志永寧併長水縣長水東臨洛川記傳云洛書所出今龍頭山新立禹祠而薛公仰止亦近得請于朝為書院遂更其名曰西洛且㑭夫後人知禹洛書之誠有自粵昔九疇垂象示文夸誣相矜祖緯襲符漢世明經之士汨于休咎莫窺其真歷千餘年儒先大興闡天人之袐方圓相通正學以眀然同黨之說勝一以為已是一以為傳授數精理湮皇極之建卒無以大通民有恆性君師作之以修以綏如彼北辰樞紐運行內靜若動莫窮其化凡厥有生極乃固有性者為聖復者為賢作而新之維后是訓庸保其極則民永以乂保極者民作極者君運而制諸若丸之在握輪之在御皆聽命於我孰先後焉孰終始焉四時萬化之理繇是而備謂之攸叙夫豈捨已而隨彼也昔大禹佐理水土攸平君臣交修抑亦有㝎制洛為天下中碩儒訓傳家有其書慎厚遜讓猶有先王之遺風升西洛之堂者當慨然以思謹其執中將見夫作人如新之驗由鄉而達于邦國勵之翼之示諸于掌皇極之訓其效可成也薛公名友諒溫密有文今為翰林直學士推先志之私淑焕而廣之為屋凡若干楹又將延師以教後之學者而屬筆于桷故以昔之所聞者著為之記建城夫子廟堂記景城縣東南三十里有故城焉曰建城漢為中水縣地金大㝎中以其地北臨滹沱南薄御河徙縣於今所二水交流名之曰交河焉皇慶元年保定王君領縣簿事循河故堤水落冬月先期率民以𥙷其缺頽霖雨時至則因其防而巡督之河不橫流政簡民佚觀風省俗聿來于兹望其井屋聮屬誠阜且康於是士林之秀曰劉國芝耆老韓昌等言曰建城舊有先聖廟城址日圯而廟莫敢廢在昔許文簡公安仁嘗撤而新之未幾金亡居室燬蕩而獨巋然以存至元戊子國芝之父禎遂易于文簡公之故居以詔于里士弦誦之聲家至而日化矣王君周旋里門念崇而新之于是治書侍御史張侯完以書來曰吾里夫子廟易代有存許劉儒先作新之志子盍廣諸敢以楮幣若干為里人勸於是下令輯工奠方闡基表植巷道庭宇邃嚴以丹以塗論講有堂遊息有廡眀年率其儒生落而祀之乃介刑部員外郎葉蘇君㑭志其事粵自孰庠序學之制不眀而士無所於學州縣有學率嵗時奠祭貿貿道途謹修其故常於造士乎何有成周之學備四代而畿內為序十有二為庠三百左右之孰復不預焉噫先王教學之興何其盛也學必釋菜於先師虞庠為鄉學有堂有序得行釋菜之禮記禮者之言也釋菜於廟則自魏晉始也遵古之學從今之禮損益之變不亦可乎且鄉校不毁鄭人美之今天子下詔眀鄉里選舉之法建城之學者由是而升司徒者將皆敦讓重厚敏者謹其藝能恂恂于于仰止昔賢舉不絶書而王君化民成俗之美庶得以傳于後王君以習國語始為樞密院從事名某治縣有法類是封龍山書院重修記世祖皇帝以盛德深仁正位纂圖越二年始立翰林院真定李文正公首以碩德耆夀俊召為翰林學士未幾告老以歸隱于封龍山封龍在恆山之陽公幼侍東平府君受業焉地舊有書院兵革蹂躪公拮据盡力以成之故其居朝廷也食息不忘兹山天子察憫其志俾食致政之祿以終老於是公作新斯文逺近之士咸秀出暨公下世踰二十年其從公而顯者曰史忠武公諸子曰杠曰闕曰𣏌曰輝廉訪使荆幼紀集賢學士焦養直廉訪僉事張翼宣撫崔某其餘贊成均授鄉里名不能悉數而真㝎之學者升公之堂拜公之像未嘗不肅容以增逺想也皇慶二年其曽孫慎言為翰林屬仁宗有詔省掾用儒士擢入佐左司院中選都事僉曰李文正公為翰林肇端其曾孫宜以居未幾拜監察御史而於封龍也惓惓悉如公之志嵗久蕪漶不治往至治元年為司農屬時請于司農符下其道廉訪丹漆木甓悉撤以新御史有言曰繼述志事子孫所謹我先公之為兹也實將以佐國家之盛願子記之桷曰致太平經濟之道章句占畢不能以盡也文正公恬于進取率躬以化其鄉耄至而辭祿德之本也導掖其秀民仁之至也其徒卒昌于時孰不曰文正公所作成也今遺書具存在于書院者宜究其委源考三代之所以長秦漢之所以失反躬以思平治之道如指諸掌將反覆以陳于上李氏世守家法則書院永永代有嘉譽其繕修也益廣于今日矣本末具前記不再書慶元路醫學記醫之書作於上古乎後人猶疑焉隂陽氣運之說與易書禮相吻合蟲魚草木之精詳于詩尤近之然其辭義奧古卒莫能通曉非專治者不能也先王知之始為之師以教之後復立學以長之生人之本繇是備矣至元壬辰濟南陳公祥為肅政廉訪副使來四明遵詔㫖立醫學學成甫十有八年燬焉其地近市狹紊咸病展事鄞縣西有故主簿㕔事基及傍近地蕪礫不治於是教授徐君源道等請于郡遷以廣之乃斤其舊地得財若干以治土木郡侯完顔公首為之勸推官賀某贊補其役隸于醫籍者胥率錢以輔之逾年而學完殿廡翼成軒闊深靜㑹豫自京師還里屬記其事余幼嘗聞長老言鄉里多名醫皆修謹退讓呐呐然若不勝衣察脉視色必原于井谷經絡之微眇調製湯液必通乎風土之宜甘辛燥濕內外相為表裏者悉參取于經傳故其術百不一失懷疑審問求正于勝已無忌悻之謬道同而氣和相遜以禮相處以義而昔時公卿家激厲奬與之道又能使盡其術而無愧噫亦盛矣今皇宇恢廓五方士民參雜乎州里拘而不達將不勝其弊率焉以僥幸懼其深有所失也徐君世儒醫教授是邦今二十餘年重靜而不撓昔之所聞徐君深知之廣天子好生之德諄諄然語之使後之學者誦其書母執一以自滿虛心遜志復昔時之長厚不幸罹于疾病將得盡其順受無夭閼之害則徐君之教不亦闡乎余歸田里尚幸而有見也白石書院記釋奠先聖先師㝎著於祀典而鄉社之所宜祭皆廢不舉宋初肇建四書院釋奠釋菜之禮悉遵令甲若鄭玄所言髙堂生毛公制氏之徒皆不得專祭僅列于從祀濂洛之說行於是先賢之祠競立首于其鄉復推其居官遊歷之地甚者謂其觀風宣化雖其足跡之所不至亦當有祠夫古不墓祭謂其神專於其居室也又曰不歆非類謂懼其瀆而不正也今郡縣朱文公祠最廣各慕恱胥勸終莫能有病之者繇是空巖海嶼屹然巋立而入仕者借是以為資歷何先賢祠祀先後盛衰之不同也朱文公之髙第曰黃文肅公天下尊之曰勉齊先生其學以持敬為先探微鉤深以極夫操履之實懼其守之不專則蚤夜以思斂其粹精絶其枝蔓正誼明道見於經濟故其臨川漢陽之政惓惓於征繕獄訟而論者始不敢以儒為侮守邊議戎衆皆咎時宰用非所宜而公益得以攄其素講事至而不懼政成而不迫是則儒者之效惟先生足以及之先生嘗曰吾於江東之犮得三人焉曰李敬子胡伯量蔡元思時廣信之儒先劉君飬浩蓋獲登其門朝夕習益悉以先生之指授者為標凖寶慶元年入太學舍法成淳祐七年授寧國府教授後進之士從劉君者無虛日相地於白石山為精舍以處學者祥刑使者建安蔡公抗扁之曰白石書院蔡公之於文肅皆文公之門人從劉君者悉稱為白石先生天運合一白石之子安輯其齊廡曰先君之承先師曷敢墜替誦聲屨武益廣其舊後為湖廣儒學副提舉以殁有子曰光𣸪慨然曰大父師友之傳不可以不垂久逺文公祠遍江南祠文公則文肅道得以尊久遂買田築宫中為禮殿書院之制悉備殿北立文公祠以文肅侑食後立大父祠繇是傳授之㫖益信所隸有司上其事于中書省省允其言始㝎置山長入選調既成㑭桷書始末著于石章噫文肅文公之忠臣也疑者補之異者同之不以一時之辨爭而立其黨與見于成書故其匡輔之功若文公之於程子今之尊文肅者能若是斯得矣光今為史院編修官敏達知治體文肅之學是誠有望焉者也昌國州重修學記青社韓侯蒞是州踰年顧瞻學宫頽圯日至喟然嘆曰化民成俗必自學始爰相厥攸鉤稽負逋治其島租墾其閒田究整是先泰㝎元年十月甲子役興用工二千有八百計緍錢二千有五百匠石日食之費則諸生欣輸以佐于是殿堂門廡齊庖池徑咸得備具謂桷繇翰苑歸㑭記其事桷嘗聞之先儒以明理為綱領譏詆漢唐不少假濂洛之說盛行誠敬忠恕毫分縷析一以體用知行槩而申之繇是髫齓之童悉能誦習髙視闊步轉相傳授禮樂刑政之具獄訟兵甲之實悉有所不講哆口避席謝非所急言詞之不工則曰吾何以華藻為哉考核之不精則曰吾何以援据為哉吾唯理是先唯一是貫科舉承踵駸駸乎魏晉之清談疆宇之南北不接乎視聽馴致社亡求其授命死事率非昔時言性理之士後之學者寧勿置論而循其故習者哉昌國惟四明海中州士之興起自紹熙始著樓宣獻公袁正獻公楊文元公尚書深寧王公嘗記其建學論堂之本始揚雄有言曰百川學海而至于海善喻者也首之以訓詁之精次及夫名物度數之密由小成至于大成非積年不能以至周官鄉三物之教詎止執一而以為傳道之要殆不可也委流安行由蹇而達訖歸于海學之功也侯名摶字仲舉既興其學乃復儒役以為大比之勸學之士子寧不自勵敢執筆以俟是役也州之長某州同知黃棟孫判官張信吏目陳益學正孫恕皆叶贊其事泰㝎二年二月癸卯具官袁桷記昌國州醫學記醫之道即夫人身以備三才其說與易箕疇詩禮相表裏亦大矣哉蓋昔之君師聰明神聖因夫五行以寓于五常之形氣致坎離之用以合其隂陽推其運行以齊夫寒暑考九州風土之宜别溫凉燥濕之髙下蟲魚草木纎悉備具非博習廣聞者不能也至于七情既發之偏必求其中以返于正皆吾儒傳心之極論有察于聲氣臭味之眇忽考之于遺書受之于家庭積歲年不能以竟而掌政令者從是稽其醫事以制廪祿是則寧有夭閼疵癘之憾也哉南北地氣有大不同而為之醫者各執已論近者急于好尚而恣縱不能商度十失五六誠可罪也秦漢之主卒望海求不死藥藥詎能令不死蓋其空巖絶島磅礴于巨浸之際絶囂塵接雲霧靈根異草得地氣之正方外隱士時採其竒絶精良以療治輒竒中而功倍今所謂海上方皆其苖裔而昔之集方論者復搜類于蛟龍之窟穴海于天地間號最巨焉得以有遺也昌國為州四履皆海至元二十九年始立三皇祠綿蕝不稱韓侯治儒學既竟復蒞醫學兹曷以奉揭䖍廣其故址而二倍之泰㝎元年冬十月正殿成復立論堂翼以東西前為儀門外為神門廊廡有序祠象儼赫首以圭租勸民胥成不三月咸樂以助復遵詔㫖為惠民藥局工既畢書來㑭書其事于石桷嘗謂疾痛疴癢切於吾身者猶民之身也民困魚鹽侯能紓之儒病徴科侯能復之既憂其生又懼其罹于疾病使夫習為醫者講肄以精其術故余歷叙醫家者流其學實難三聖之書昭然具存反覆紬繹皆得以完其生是侯仁政之本愈逺而愈不可忘也㝎海縣重修記定海為縣自昔號重地鎮遏戍守異於它所南受諸蕃絶域之帆舶東控島夷不庭之邦商賈舟楫噴薄出沒據㑹濟勝實東南之竒觀也皇元考圖受貢益倍于異代信使香幣渡海嵗不絶縣令將迎日疲於供事視公宇若傳舍嵗益圯剝至治二年欣都君始蒞事曰吾受天子命長邑于是失撫字則奚以仕嵗適大歉徴租于民將不勝逋負計嵗所入一萬有竒遂核其實止輸竒于官鹽賦嵗不登民益以困卒請而蠲若干嚴飭官驛置隸人以候過客而復其役久而曰吾將治所居以聳民視瞻一撤以新為楹五十餘瓴甓木石丹漆箭鐡皆堅緻可永久教諭蔣君昭先列其行事㑭為記余謂治縣莫先於宜民承上意而不鳴其疾苦甚者增羡以求媚善譽乎何有縣當水陸之衝輒默計嵗月得解職即謝去植仆舉弊終其身未能也若是則欣都君之行事汲汲慕古將有以大其所為夫豈苟計目前之功效者㦲余特記其興造使來者有考蔣君所述多善政不復著推其所為舉綱以遺目蓋可知矣是役也尹曺敏中主簿薛炳悉力贊治故迄用有成新建鄞縣尉廰記郡治絶江其地名甬東吳王居甬句為古浹口號甬江在今海濵海達于江入于奉化西釃于餘姚縈紆回曲綿亘百餘里鄞為縣分東西以浮梁為界東之民習網罟魚鹽以自業其地膏沃有湖可以灌浸率不善墾治春至輒率其子弟文身櫂歌出沒于海島伺危薄險對面成姦宄憲令昭著至死有所不避尉以巡督為職自宋雍熙間置尉治于彼蓋重其地以鎮遏迄今數百年遊手益夥捕繫無虛日廨燬于兵踰五十年尉率其兵徒隨所寓無常地訊録之所不具于觀瞻莫格其非而任益以困矣至治三年廬陵周君一䕫來視故址曰吾不可不自重首為外門復為廨門中建㕔事挾以賔榮輔以吏舍後設燕居以休其勞清流匯池花木列植周繚塗雘皆足以支永久吏有言者曰尉職在察盜囹圄不立奚尉之為兹土之民俗弊已久鹺禁之嚴莫窮其窟穴朝夕胠發纍纍旁午不有以居將曷能以有處尉笑曰道德齊禮夫子之訓也獄市無擾相國之言也閲數月獄以空告於是輿人有言曰尉之申申非取異以求新塞其姦慆養其淳真彼疇鱗鱗良苗氲氲尉之去兮將以告夫後之人役始于泰㝎元年秋八月成於二年之二月郡人具官袁桷記浙東廉訪司重建澄清堂記國家肇置肅政廉訪司浙之東以婺女為總治而行部使者凡六人讞審殿黜循歷于六郡總治之使二人坐鎮于婺六郡嵗終必以其成牘歸于總治㝎其可否以上于御史臺持綜核之實執與奪之柄厥任實不輕矣夫以輿地之廣貢賦之夥天子不能以自治必假于首令焉守令不能以公其心又假于耳目焉以重其寄大其居室聳其視瞻廉逺堂髙非直為觀美也聽事之所繇唐歷宋嵗久頽剝不治至治二年中奉大夫馬公為使于是邦顧瞻改容曰兹不可不為先務邦之耄倪亦曰兹實聽政之本于是郡請于中書行省計郡餘財以為匠費崇其堂隍稍北以構柱甓孔新庭廡邃密名之曰澄清復為燕居之室于其後曰迎華觀經始于是年之九月眀年五月告成中奉拜湖廣行省參知政事以去資善大夫思蘭公甫至則曰中奉公之惠後若是宜紀其事未幾拜南臺中丞資政大夫嶽烈公繼為使亦曰是誠不可軼於是僉命桷為之記中奉資政嘗牧于吾鄉皆得而接識往㑹中奉公于京師謂余曰民之多寃繇循行者不盡其辭吾往浙東將使六郡之苛癢亦切于吾身後聞其所行果有所不避資政公廉而守正牧民如己子遺愛于四眀人能言之中丞公得見于㑹通河議論氷雪以刺劾為己任是則三公之行事深有合夫至公之論抑又聞之事患有所不眀知而不有所舉藉藉于道塗之民口不可以防也苟眀矣不少恕焉則法舉而德不足以化今使者五人皆遴選在位于以見聖上振整之初政登斯堂也則相與講習見于施設不薾以避不苛以求陽喣隂肅吏民率服胥保惠以承于上其治豈不偉哉夫志同議同任事同七郡之民孰不鼓舞以嚌詠太平之盛桷舊職太史慕前賢壁記警戒之實因以謏聞而為之辭眀逺堂記澄清堂成紀興繕之本末矣參政馬公奉聖天子眀詔巡行江浙復至婺女見其燕居之堂舊曰迎華觀者而更其名曰眀逺取其切于觀風之道副使馬公經歷爼君冕復求記於余於是屬筆為之辭曰今夫七郡之黜劾悉萃於澄清吏抱其牘鴈鶩以進卒不敢妄議其可否將求其生欲重其罰情皆不能以得也精思以究必退省焉以品節之事窘于一庭而智足以見萬里古之善馭吏者不泥于法律不事于朱墨故其革姦警叨無言而化成必有其本也在昔聖人眀目達聰百僚在官㝎于三載之考績夫豈有他哉維東浙負山聮海風俗不一强者雜諼詐柔者率罷軟撫摩之道各有攸處登斯堂也必攝齊肅容悉議其所宜行退于燕居申申夭夭燭照數計考七郡之幽隱如指諸掌名之曰眀逺孰曰不宜今參政公之按行非家至而户到也是則眀逺之㫖講之熟矣則凡後之來者益得以省察俾勿壞泰㝎三年四月丁丑具官袁桷記新修司獄司記國朝肇置司獄司専以掌守囚禁職卑而勞猥為其官常憒憒不得志浮湛坐曺日數嵗月希善代謁吏部者每請託求免注繇是視為傳舍狴犴之不修桎梏之不整所至皆是憲部審决亦有所不暇及簡漏相仍其勢然也永嘉林君龍澤之來守是官也曰吾不可不自振考其成牘剔疑擲姦重者上憲府輕者白郡守多有所變易罪以不寃囚民宜之久之曰獄不可不繕營至大二年獄既燬支弊植仆僅存其制於是除地撤瓦築堂三楹曰平恕堂後燕室曰種德左右翼軒環以吏廡乃築髙門乃闢圜土養疾有堂奉神有祠繚以瓦垣浚以甘井取足備具各中繩墨蓋先之以已俸而官若民乃悉為之助不旬月而告成噫亦難矣昔人言不卑小官于林君見之州縣疑獄郡輒以委林君揣情以求其生量事以正其罪羣吏抱案詣庭下無虛日是則林君之果能令官大也書曰典獄非訖于威惟訖于富若是則寧有私謁者乎余直集賢林君時為掾史處事立具今覩其政績顯白足可稱道庸紀嵗月是役也興于某年某月成于某年某月泰㝎三年嵗在丙寅郡人具官袁桷記慈溪縣興造記泰㝎二年冬十一月保㝎孫公楫循行四明至于慈溪覩其縣治壯麗整密咨嗟徘徊詢諸縣人邑長為誰咸曰此昔烏忠顯之所成也忠顯為縣首治董孝子祠以化俗次修孔子廟三皇祠曰儒以長民醫以養民又治社壇嚴其齊宿以謹水旱乃曰迎詔禮賔兹不可不䖍傳驛休息宜慎其寒燠興繕既畢始曰吾亦得以廣居于是矣語未終孫公曰是誠可紀載于是命進士翁心傳為圖㑭桷為之記聽事五楹髙其前三楹焉堂曰清清淳化中尹張叔達璽書之所褒因其名而築之者也挾以吏舍厨湢獄室縣門鼓樓前後有序縣治之後有小湖湖之中為洲花竹四列風蓮水柳映翳繚繞為亭以庥其居有四曰思政佐治以察民隱也曰柳意勝覽以樂其神觀也圖既畢復言忠顯之政墾萊輯亡役不病于民去其姦叨以為政本今其去十有三年思如一日而其繕營足以支永久于是有驗噫今之為縣嘗患夫土豪之控持也其始也利以誘之終三年更徴需斂散一聽其命户稅更易拱手莫與之抗甚者為之囊橐可哀也已孫公之來兹邑也其亦有所感表去尹之美亦將以警夫來者余昔在太史觀循吏之實書以示後忠顯不求名而名自至孫公之為使者夫豈計目前以為黜陟哉始忠顯之滌篆也漫不可考謹視之實秭歸縣印言于攸司而更正之其精核率類是則凡今之為縣者廣使者之用心以成其政績桷雖老尚當記之泰㝎二年嵗在乙丑冬十有二月甲午郡人具官袁桷記㝎海縣學藏書記㝎海為縣南接蠻島汪洋數千里食息可至厥今號為重屯四方語言咿嚘侏離交衢旁午褒衣儒冠見者訾議考諸郡乘惟沈端憲一人嗣後接武猶班班可考泰㝎二年春某官始來為令乃曰縣固有學學必聚書冥行空言講習何補武城弦歌先聖是取進鄉小民首於文辭其必自聚書始乃與主簿龎君首捐俸資復命教諭汪宗江出學粟㑭儒職樊惟肖胡驥繇杭置經史若干卷又諭學之耆老曰經以窮理史以究成敗廣聞修辭惟子集是宜是亦不可缺復得若干卷將刻石列目以示永久謁記于余念昔在殿廬見令尹之兄在廡下察其儀貌莊肅知非凡近後果為進士第一見令尹于國學儀端語溫審其頡頏萃于一門今兹掌其邑尤以教學為己任抑嘗聞之聚書非難寶書為難校官之不職悉資以奉權貴甚者竊其故籍挾之以逃其最甚者漫漶散落一不掛眼三者之病比比皆是今刻于石將杜其漸後之來者寧得不自勉乎慶元路重修先聖廟記河南郭候視郡事之初首㝎役法郡民日困鹺事旬月按核數嘗不登郭侯知其奸利乃言曰病在私商潜轉輸其所贏餘卒不入公籍民病不可藥也於是罷賈區分四廂俾總之鱐醢豉脯各趨其時視計口之授略相等復竦然曰吾職司學校兹曷可少緩督大小學謹授業斥其僞冒以其餘粟大修孔子廟于是進郡博士陸晉之學正録胡某毛某而言曰漢文翁立學歷唐宋幾二千年猶完緻君等知其故乎少間曰教在不墜其不廢在繕修乃曰若殿若儀門風雨剝圯在丹雘先聖崇嚴列祀肅雍在作繪定章服在禮象又曰講有堂書有樓吾亦曷敢後姑徐徐為之吾願㑭是邦服習仁義秀乂林立遣詣王朝將自兹始桷繇禁署歸里凡三年愛中和樂職之詩首為詩以咏贊侯名郁字文卿所至官以興學為本詩曰茫茫海甸聿仁義邦圭組積榮失其敦厖嵗亦云徂夸侈則降維侯之來靡瘼不知曰維泮宫風化攸基竦其具瞻象神之儀藻井繪櫨絢兮承式降陟有嚴是奉是翼匪土木之工職教攸則瞻彼㦸門有飛戾止斯翬煌煌五采屬纚鏘鍠八音粲曰在耳嗟爾後生無偷以誕無逸豫伴奐遵我侯度以靖以獻奉璋有峩伊侯之願鄞縣學興造記延祐元年桷記鄞學之興造矣甫一紀職鄞學者括蒼林君傳以事狀來言昔之經度踰于舊址廩入不給故其結構塗塈缺焉未周鄞之尹曰阮君周翰治縣未幾有藻井繪櫨絢兮承式降陟有嚴是奉是翼匪土木之工職教攸則瞻彼㦸門有飛戾止斯翬煌煌五采屬纚鏘鍠八音粲曰在耳嗟爾後生無偷以誕無逸豫伴奐遵我侯度以靖以獻奉璋有峩伊侯之願鄞縣學興造記延祐元年桷記鄞學之興造矣甫一紀職鄞學者括蒼林君傳以事狀來言昔之經度踰于舊址廩入不給故其結構塗塈缺焉未周鄞之尹曰阮君周翰治縣未幾有恪殿謁首以興繕為急割俸以勵儒生於是步履有甓繚繞有墉礱以密石華以堊丹象設有嚴講席齊廬足以稱弦誦而從祀一百有五悉易以塑合儒先之宜祀者為祠以庥少間曰既完矣盍廣教以振士類立小學師二人而增弟子員凡五十人泰㝎三年二月朔告成復命桷記維鄞自王文公延杜先生以君師為端本故後之繼承經術淵懿蹇蹇大節見于史傳者凡數公衣冠日隆微近功利而懷忠抱德盛于乾道淳熙之際遺言正學傳于今猶未泯周翰之先公嘗分刺是邦厖眉褒衣諸老森立蓋嘗極尊賢之禮矣今兹作新亦將有意夫斯道考問德業吾猶以為有在也周翰名申之池陽人林君字以道非怠其職以苟度者于是乎見魯公修宫形于歌頌系以詩曰維鄞之峯煌煌金精其江縈紆挾城以行磅礴元化孕兹羣英其英伊何鬱彼瑚璉不戚施以求是則是憲發其精忠匪石可轉曰尹之來庭誥是遵顧瞻廟廷風墮雨昏土金丹漆有炳其文宫既完矣失教則缺循循子佩自今以始罔敢越以道氏林葺構揭揭杜先之訓百世服膺有失其猷將夸誕是興凡升論堂戰兢以承清容居士集卷第十八
