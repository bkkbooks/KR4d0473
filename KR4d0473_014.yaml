  text: 清容居士集卷第十四
  hash: sha256:bf82c7ddc780e5ca745e594ffa4f81fdc46b47258052b8ab8ba6b2e13df28c7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_014-1a}
body:
  text: 絶句五言六言挽詩雜詩附雙鴈圖秋風限南北何事往來頻並宿寒蕪際應憐自在身六月二十四日夜夢剡源師同游山寺主僧延入丈室出梅花畫卷賦詩旁有胡用章先生坐主僧下時剡源對席僕居其次案上緑竹一枝青翠可愛剡源賦詩桷即援筆一白不受采重玄今罷論窗前有緑竹密雪打黃昏漁樵問答圖翠嶺邀黃鳥蒼波玩白鷗偶因平地坐始識世間愁新安郡嶺南十詠清江釣月神魚竊金液為龍復為光平波無纎雲有餌不肯嘗空谷耕雲斜側龜背戲髙下魚麗圖阿童踵其後黃犢為前驅蒼峯卓筆仰手判虛空昭回爛星斗遂令山下泉復作之玄走碧巘舒屏古藤青步障曲曲靜相宜春晚巖花發生綃印折枝楓林巢鶴絶頂秋聲急盤旋作我家不須金掌露且服赤城霞雪澗浮龜飛湍齧雲根千載見五色中有九九文舉世人不識峻嶺扶車前行已可戒後行復何如懷哉王陽生靜言表其閭圓岡揭斗晞髮步上帝空巖泣山妖歷歷化為石喬松導前杓古寺垂虹飛虹飲長澗垂首不能收僧從背上行水流橋不流雙溪合璧鳴玉抱山根上有金蟾翁指揮鐡如意化為雙白龍子昻蘭竹墨戲玄霜落銀繭飄飄湘江佩服媚疑䙝之碧窗靜相對迸地麟角精摩空鳯毛聳寒泓散晴煤桃李爭色動題龍虎圖玉淵發靈籟摩蕩超九天調鉛靜召之帖首在我前寒松翳幽篁得意當路隅急以真一汞坐令侍瓊琚墨竹四絶謇謇凌雲志霜餘節更存春風宜管領生意屬兒孫右老奮雷初出地承露已凌煙願從朝元駕為旄拂九天右嫩直道犯無隱虛心眀且清側身思逺舉巖壑飬深情右風曉沐換新緑萬采成空塵守黑心不緇同玄道彌真右雨墨蘭蕙四絶金明秋林清月白楚天碧美人眇愁豫服媚永今夕采芝不成仙食薇難療飢結兹以為佩臨風酹湘纍天香落銀楮秋聲入玄筆何如湘夫人促軫鼓靈瑟組綬何承承琲珠復纍纍相視不以色紛披映簾帷題悟律師語卷萬樹叢雲裏千巖急雪時世塵俱不到端坐誦君詩壞衲翻經帙匡牀㸃律科看山無限思一一付吟哦子昂枯木竹石圖亭亭木上坐楚楚湘夫人因依太古石融液無邊春六言厚齊先生以詩借玩辭次韻項子沈冥學古藝藝萬變觀爻閉閣清香宴坐斯人端可神交已悟長年坎離更窮逆數先知𥙷亡已滿三篋問事誰携一瓻題湖曲小景題詩句穆陵御流水無言寂寂落花有意毿毿往事空餘華屋倚闌愁絶江南送鄧師禹歸龍虎山小帽飛花一寸輕舟流水三分落日獨歸洞口隔溪短笛猶聞獐猿圖細草豐茸古洞斜柯厯落寒雲信道乾坤消息端須類聚同群孤雲在水同源一色出山萬緒千條欲趂驂鸞整整更同笙鶴飄飄規矩方圓在手輕清重濁隨形宋子不須苦賦屈生為我揚靈白鴈似憐片影碧潭深映無心獨上紫霄峯半參差吹徹飛吟題陳文翁畫扇淡淡孤花欲笑姢姢雙蝶疑愁無奈寒螀得意竟専落日啼秋題美人圖西施辭家已意存越入宫誰解圖吳故苑秋風麋鹿扁舟夜月江湖昭君鬢影愁添塞雪花枝羞殺宫春誰道佳人傾國解從絶域和親馮妃目送亭亭秋水腰回欵欵春風為問下車搏虎何如御坐當熊班姬望幸眸凝秋水倚愁眉蔟春山已悟篋中紈扇須看鏡裏朱顔洛妃可怪夢中說夢砥須愁裏添愁落日春風王子多情不解綢􅓎緑珠金谷煙迷清曉玉簫春怯餘寒可恨花鈿委地當時莫倚危欄夀陽一片花飛宫裏十分春滿眉端砥用流酥㸃綴更煩圓玉搓團張麗華結綺塵空樓暗景陽春斷鍾遲紅葉無言在手同成井上胭脂次韻潜昭焚香意絶豈能生慧心清定解通神一穗黃雲滿几故將綺語撩人甲煎煙消吐艷鷓斑湯暖凝脂道人機心已盡清坐唯餐兩梨𥿄帳溫雲如醉綺樓春夢成虛知見何須盡絶詩成要是禪餘宫樣昔傳心字羅紋指甲爭工往事桃花流水黃塵蔓草寒風潜昭九日贈龍團次韻月碾舊裁玉胯雲爐溫浴銀芽九日殷勤相贈淡羅猶記金花閲世已成清玩傳觀那識餘甘寶篋政須千襲瓷甌未許同參題伯庸所藏子昻竹石伯夷清宜典禮子路勇誠冠軍日落虎驚沒羽潭幽龍走凌雲胸中丘壑玩世眼底煙雲凛秋岸幘欲澆磊磈解衣深聽颼飀墨竹蘆葉不禁秋色栁枝那解春聲醉閲小窗橫幅風回雨轉雲清子昻墨萱扇為湖南揚晉母作墨蝶巧分叉股玄蟬髙綴冠梁莫厭南州炎溽為添北户清􅋽雪谷曉行圖過翼凄凄巖谷曠懷納納乾坤我欲想思命駕人猶髙卧扃門髙彥敬逺山木石圖為紀夢符學士作身比寒崖枯木心似浮雲太虛落日前峯堪隱丹青渺渺愁豫復成黃髮蒼顔並轡白雲青山比肩誰道風流已矣只今圖畫依然春雲出岫駘蕩巫山態度悠揚洛浦精神春去似歸閨裏月出端疑水濱謝氏梅坡謝家鴈行兄弟一枝偏出南州低昻肯受殘雪瀟灑猶堪盛秋劉生還廣信省親就試萬馬隨雲北上孤鴻趂暑南飛欲踏三山海浪願隨寸草春暉頥齊多言不直杯水異味能生五兵何似深深閉息丹臺出日初清禮闈倡酬乙卯次韻禮部李公二首眀詔傳巖谷携入帝京心同蛛網織意擬鵠巢營選德圭璋器掄材𣏌梓楹龍門能化鯉端不負平生又黼坐思文渙號行鵠𫀆林立萃天亰釣絲已具六鼇手彩筆誰専五鳯名寶鑑懸空深照影神鋒躍冶莫容情百年禮樂重開運此道何須問兩生次韻監試李仲囦御史四首髙墉護修庭列仗嚴棘闈昭代闡文治多士舒且遲謬言職緘縢晝日深下帷昻昻子大夫咫尺瞻天威願罄悃欵忠少奉白玉墀直言諒無隱寧懼菲與萋中朝尊夀俊入徴垂安車念彼巖谷生惠然命來趨鵬飛企天池鳯息思髙梧煌煌六籍㓛不與稊稗俱明皇燭遐邇追琢璠與璵雅詠廣棫朴仁風暢騶虞髙堂集羣英搖佩蒼玉寒朗鑑明月髙雅量滄海寬上承丹扆心舉逸修廢官繻童入關內芝叟辭商顔陋彼馬上翁慷慨空溺冠皎皎鵠𫀆子旅進翔廣庭明時昭曠典如醉眸初醒稽古乃正學敢言效桓榮昌歜詎正味咸池在希聲古云儒匪迂雍容佐文明餘思續皇雅黼黻歌升平次韻郭巖卿清穆黼坐更化絃儒館集議招列仙玉堂射䇿興羣賢鵠𫀆賈勇思登先輪囷奏牘誰三千利若武庫森矛鋋巍如繩直清廟堧常山之蛇首尾連胸臆結約言不愆峩峩相國水鏡懸手捧詔墨金花鮮大為梁柱小杙椽令嚴虎士齊烽煙游絲日靜風翼翾羣曺坐井難觀天大鈞槖籥品物甄代天有命司其權錙銖美醜精評詮方臯相馬遺黃玄嫫母敢作千金妍工輸守度成方圓萬目一口非幸然斟酌損益牛無全慶雲五色罘罳邉彤庭珠貫臚聲聨明堂正席開九筵扶杖觀化嗟華顛煌煌龍榜天門前金吾控騎青絲鞭夾道動色爭駢肩詩書往昔成遺捐聲教丕合今無偏瓦金之注同一埏慎勿逞說窮雕鐫皇元文運齊天年秋闈倡和丁巳次韻席士文御史至道白璧重小言浮雲輕詞場次後先理致貴坦眀捧心匪正色偏師乃竒兵駢駢白袍子昻首爭疾行味道絶嫵媚清心飬和平謇諤御史公懼我遭譏評當道謝駑駘朝陽歌鳳鳴次韻士文感興宣尼倦游躅冥思立天紀洗心悟盈虛應物合參倚羣雄爭霸盟騁意立私史崎嶇東周君削弱絶統體約言正墜典執筆乃託始後王迭雄長正閏亂朱紫說吻江海深短長爭四起大羮實鉶鼎玄冕表朱裏返真非無人末派失玄理金碧騰虛空謂是可不死或言影響㓛駭愕壓餘子齊居玩藝藝作事首存悔洗心探羲爻變動實由已神珠守深淵光怪孰可比矯矯林中鶴潔白不受耻紛紛堂下蟻聚羶亦無幾流光企羲娥慎獨守素履之人金石心年運任坎止中年勇聞道晚嵗復未已驅車望前川操轂敢濡軌八月二十有二日范京尹同㑹秋闈天使傳召命溫問試䇿貢士賜以法酒臣桷等望闕再拜以叙飲謄録官翰林應奉臣翼述其歌詩謹用次韻五雲閶闔祥鸞流紫皇御極圖神洲巍煌亰師首文化計吏四出巖阿求城南儒宫極蕭爽古木落月凝清秋麻衣東西白鵠峙烏帽髙下寒鴉稠朱顔廣顙粲胄子佩服觽礪懸吳鈎兵竒欲奪趙氏璧氣盛直卧元龍樓范侯機深妙彈壓雞翹蚤歲承宸旒傳宣溫訓慎去取瓦釡勿以黃金酬宫壷午傳瑞露重翠質縝栗緘封周微臣望拜感莫語願上史館書徽猷百年墜典起盛世慶雲五色開公侯興文云初道任重滄海浩渺難方舟眉山之蘇詎常士過眼獨賞須梅歐夜闌心掉不得語瑟縮凍吻歌丕休次韻王正臣書史試院書事二首貢士搜天巧經營縹眇間露蟲吟嘖嘖雨葉戰澘澘董賈傳醇正揚劉陋險艱銓衡同水鏡辱贈不知還古殿蒼雲裏踈星出樹間案燈光閃閃簷溜滴澘澘便覺登瀛易誰言與選難白頭心更苦滄海探珠還次韻宋質夫應奉秋闈書事二首廣寒清徹桂花黃影落空庭夜露凉七札巧穿誰矢直六鼇連舉我竿長神清難入華胥國賦古須看古戰場一朵紅雲傳湛露夜深齒頰凝天香草廬星列藉寒莎欲擬隆中事若何倚筆看天塵境絶衮辭翻海怒濤多持衡要使心常赤題榜誰言髮盡皤盛世崇文遍寰宇遺賢寧肯老巖阿次韻席士文御史六首煌煌文運起賔興朴學無知謝未能北斗夜橫東壁正露簷危坐獨凌兢槐木森森雲影開諸生曵履起輕埃眀河可是人間物端用乘槎八月來文鋒鏖戰白差差沉著無聲午漏時掣海碧鯨翻古製翔雲彩鳯吐芳辭倚筆看天思獨難懸庭秦鏡敢藏奸東方射䇿三千牘姑信眀時取士寬多病支離百不堪挑燈眼眩罷清談廣寒果有娑羅樹須踏天梯上蔚藍烏府先生玉雪清論文冲淡去浮輕要令我輩平如砥不使輿言負聖明秋闈倡和丙寅江浙至治三年八月十五日乘馹騎抵榆林于時善之祭酒仲囦學士伯生伯庸二待制同在驛舍觸感增悵今忽同校文于江浙因述舊懷萬馬穿塵入渺茫遺臣一日九回腸碧雲碎碎琉璃影白月離離菡蓞光鴈足無書來海島龍髯有恨達衡湘誰知此日同文館把手無辭醉十觴三十年前與倪仲深泛湖作中秋今幸同與校文中庭月色如晝短句叙舊昔年同泛凌風舸白眼論交屈指難楓葉參差山影矗藕花凌亂水聲乾我方烏帽穿黃霧君正羊裘漱碧瀾歸隱始知人世換無端此地更憑闌中秋柬周儀之推官伯眀都事兄氣與西山爽氣髙酒酣燈冷各稱豪不隨北雪追燕騎徑上南雲踏海鼇桂醑的知侔沆瀣蔗漿端可敵蒲萄衰年投紱慙真隱更為君王選俊髦汪叔濟推官鄭𣸪𥘉判官周本道判官同校文江浙因思歐陽兖公王岐公事政相類不可無一言以成故事短章述懷長冠黑髮鴈行齊讜對彤庭陋木雞直以中聲生玉琯更將五采藉玄圭文章贍核期穿札經術精深鄙印泥我輩直須雙目炯肯令餘子誚昏迷次韻假省掾妙筆翻空歷杳茫更馳紫電騁沙場珠璣已綴三千牘斧藻能成十二章易水臺髙招國俊廣寒路近裛天香相君盛德憐駑劣給燭分茶與激揚再次韻白頭歸隱髮荒荒那識當年古戰場文雉朝陽金吐綬潜虬迸霧火為章才超董賈文如織語壓淵雲墨有香㑹見彤庭冠多士始知我輩陋宣揚挽詩謝尚書學易書臺地書臺榭公治易資州有李鼎祚讀詞林起壯猷家空辭蜀道祿薄度南州為廣東倉曽知封州復愛石雲生坐看書月過樓凄凉甬水曲風竹自蕭颼晚歲㓛名異蒲輪禮數溫嘉謀傳竹帛肥遁寄丘園散號南儒貴賜南儒自號為勑峩冠北客尊冥冥乘鶴去空想典刑存史觀文奕世調元貴東南第一家紫綸傳密札緑髮擁髙牙往事霜前木餘齡霧裏花陽明真洞啓跨鶴整飛霞故國衣冠聚凋零獨此賢勞生樂蟬蛻遺魄寄牛眠丹旐前官貴青箱舊物全哀榮今莫比笳鼓閙晴川李宣慰思衍宏才卓犖聳羣雌悵望心期晚嵗違江海夜長談舌壯關山春斷客魂飛批風給月文空在逐電追雲事竟非神理綿綿那得盡冡頭新柏翠成圍白首㓛名汗漫休一官鎩翮玩清秋終憐薏苡難消瘴肯用蒲萄强博州萬事浮雲今已定百年公論與誰謀羊生未灑西門淚落日寒江水亂流史猷父少小昻昻意長冠脫綺𥜗交游金谷聚談笑玉山扶舊雨三槐宅西風五栁湖空令後生輩彈鋏陋為儒妙語千年簡英姿百世期忍聞淮水絶不見雍門悲往事雲歸壑空言水覆巵相從今已矣寒淚滴氷澌王尚書秋水雙蓮孕英英吐異芬詞章納雲夢禮樂訂河汾丹詔三軍泣清名四海聞西峯傾落日乘鶴叩蒼雲晚嵗艱難意衡門老病身蜀山迷望帝楚澤痛靈均皮辨終辭徴深衣晚任真蓋棺今已定千載有遺民燕說經生濫齊諧學䆒䡖微言空有意獨拍已無聲墨澤雞林貴青氈虎觀榮新銘前進士幽抱付誰眀再世登龍舊淵源許管窺西山遺正緒東澗結冥知腹笥名空在眉梨夀竟違重歌妾薄命寒淚滴塵瓻楊夫人丹桂香殘紫菊蔫轉頭何自失芳年錦裙舊繡空為記玉軫新聲已莫傳散騎文成殘月淚彩鸞書罷白雲仙人間總有相思恨不用松風激澗泉潘少白星曆張平子丹砂葛稚川書田終晚嵗酒國送長年世味雲行水心期月印天諸郎聞競爽蒼碣定重鐫史湖州夫人清白吳興守稜稜老吏師風霜冢上木玉雪閫中儀種德桑千本傳家桂一枝春暉有餘報遺範合蒼碑文集賢家聲垂宇宙更作列仙儒袁粲那無傳嵇康已不孤金雞官驛暝白鷺古洲蕪不盡修文意端從地下圖死者不可作家兒常自嫌奉輿薊門角叱馭越山尖猿落三更淚霜飛六月炎人方愛嵇紹我亦愧陶潜前朝三百載慷慨盡斯人天地有消息江湖多賤貧許人憐老母叱馭作忠臣邂逅成丘首猿啼似有神黃夫人錦堂鶴髮玉稜層猶是承平舊典刑鸞誥日邉傳御札狨鞍花外候仙軿室如明鏡心如水庭有斑衣案有經回首人間真蝶夢澗松搖佩起泠泠悼章斯逺學道求仙二十年飲氷齧雪竟蒼然錦機斷幅朝元賜銀燭殘膏醮斗傳役鬼有靈符絶筆爊金無術鼎飛鉛昨宵同我階前飲今日憐君地下眠烏府先生聲似鍾希年羆夢喜溶溶擬看廣顙傳青簡誰信方瞳學赤松秋月白於銀鑿落夕陽紅似錦芙蓉燕山甬水五千里從此空飛滅去蹤悼張道士海上神山十二鬟思君疑在有無間桃花褪水青春急柳絮團風白日間藝室燈昏螢閃閃藥壇雨冷竹斑斑它生欲了重玄事煩乞神膏駐好顔吳君載金溪人妙年玉雪佩幽蘭麈尾英賢接往還萬里出門車折軸九天無路虎當關青燈黃卷家仍在古木清溪福竟慳賴有韓公三世舊已將椽筆志瑶環夏昭文晚嵗心清眼界平看雲投幘飬修名徒令化鶴悲滄海不見回鸞下玉亰觀物無心玄草滿愛吟有句墨花輕蒼山日落簫聲急似有仙家白鹿迎熊處士三閭千古恨五柳一生賢石護栽花徑泉分種秫田松髙青耿耿竹净緑姢姢欲識凄凉意埋銘手自填危㓛逺道士紅日翳黃埃騎鯨徹九垓詩瓢風歷歷丹鼎雪皚皚紫府調仙掌朱宫育聖胎相期千古意獨立重徘徊劉古昻教授矯矯南鵬翼昻昻野鶴姿剪燈千古事彈鋏半生詩棋罷黃粱熟歌殘玉樹萎溽雲催雨急相送不勝悲成都何德之處士也晚居興元蒲應奉其弟子江漢清秋老岷峨故國身潜川珠玓瓅韞櫝玉孚尹逸興蟬離垢癯容鶴寫神發硎經席正炙轂辨鋒新素業書千簏幽居黍一囷非辭魯生徴自樂管寧淳水近蘋交佩巖低溜墊巾詩清猿母泣詞整燕雛親夢往蕉疑鹿書成筆感麟山觀天外象梅閲靜中春燐黑魂猶慘槐黃事可詢極知情惘惘徒憶走䞭䞭故里傳遺藁空堂象素真故人調鼎鼐弟子演絲綸靖節名堪繼文中躅可循悠然端有意念此竟誰陳吳饒公種德槐三樹傳清桂一枝晚年香欵欵天爵嵗熙熙大賚開茅社殊恩辨土宜執謙容受谷詠道樂沿沂玉帶朝元服朱顔浴日姿菊泉便上夀橘井飬清資引竹藤侵屨看花柳拂巵跨鞍人共仰扶杖客爭疑霜暖柑分釀年豐黍作糜黃封浮瑞露白醉擁晴曦京國輸甘旨鄉閭表羽儀齊年堂上扁通德里間楣謂可疇離祉胡然不憖遺烏傷情有感蟬蛻樂無涯孝飬傾千古褒榮盛一時誰成太史傳㑹俟侍臣碑王秋山翩翩玉雪飬修名絶頂穿松午日青别墅忽回迎客犬空林猶隱讀書螢苔荒琴薦春無迹風攪詩瓢樹有靈萬疊蒼雲埋玉去好將銀管寫沉冥廬陵李主簿應珍青衫黯淡畫圖中鴈塔塵深進士空可恨餘勳收汗馬極知往事費雕蟲暮年榮辱非吾意此道升沉屬至公松竹蕭蕭自今古清秋裁些託冥鴻趙令人與䒩女永陽郡王靈漢雲昏彩鳯沉參差聲絶露沾巾髙堂玉樹竟芳殞寶篋金花空素陳鮫室不知珠滴淚仙壇曽見海揚塵百年精爽真冥㑹一掬清溪是劒津吳夫人民主簿母上饒徐覺玉樹雕殘浩劫還稜稜鶴髮獨清全種桑不作十年計指廩能生萬竈煙白璧飬成玄圃失華堂歌罷板輿懸坡陀積翠松千本凖擬飛雲歸墓田黃如山兵後還家意苦辛白雲零落淚沾巾松花麨蜜厨常净貝葉書經筆有神蝸角可憐蠻氏國鵑聲猶記蜀王身白頭編簡成春夢的的餘勳付後人劉伯宣中丞死三十年延祐丁巳嵗始得諡忠憲朝中各為挽詩烏臺雲黯柏蕭蕭秋雨聲悲廾四橋置獄可能生長倩入門端不祭臯繇墓前飛鳥傳新象身後騎鯨下大招聖代昭眀青史著願將直筆紀姦妖東平假衛率壯嵗投鞭夜渡江前茅親受百城降後車長物唯書篋别墅間情獨酒缸燕憶香銷塵滿榻鶴驚琴冷月當窗傳家舊有籯金諺手種階前璧一雙何德之處士雪色鬚眉兩臉春市中能作笑雲人簮花欲舞烏啼急放鶴初回蝶夢真茶竈煙收門掩晝詩瓢風動筆生塵婷婷小女思翁醉欲剪巾紗淚滿唇宜士夫咸取之家賣烏紗染入得播州宣撫楊資德掌武傳無敵崇儀續上多精忠書竹帛英譽蓋山河絶北驚遼海投南鎮大和􅊞封緺滿篋錫誥錦成窠皎皎眀玕樹亭亭碧玉柯之無文褓認宫羽短𥜗哦魏帝奇何並唐皇悅李過幼成端有種帝鍳的無頗玉帳龍韜祕青箱鳯篆摩教民風偃草撫俗水旋渦斥境嚴銅柱征戎指錟戈雅遊春結佩小隊曉鳴珂士飽歌于蒍軍歡釂叵羅追亡窮古澗濟勝極幽蘿寸地歸王化羣蠻守詔科細氈侔密纊善馬敵名駝客有依劉感人傳嗣産歌氣融汶領雪量納蜀江波葛相㓛猶在韋王事若何雲仍賢莫比君長禮無苛閉户時披褐看山暫脫鞾填詞鶯轉切促軫鴈聲搓芝嶺圖空想桃源境類訛盛年真國器妙質竟山阿世德蟬聮備家聲驥子峩播川彌震耀峴石詎沉磨真㝎史萬户死忽題詩而逝髙陽之徒也至一身蠶作繭兩曜蟻旋磨投筆人境忘長嘯泉下卧月流白羽觴風送朱絲絃欲識無生樂熟睡三千年玉雪陽春五十年詩成書罷珮翩蹮擬將北斗為罌缶不向人間酌酒泉臨江熊君浮湛元不礙清影透溪扉木落行雲泣山空病鶴飛詩書誰素業江海獨天機此意何人㑹哀笳慘暮暉至治丞相挽詩次韻李仲囦學士重玄開葆命上聖席蘿圖盛德函諸夏深仁浹八區降靈申作翰稽古禹陳謨初日行黃道羣星拱紫樞神羊庭辨直貪獸鼎垂模纁帛招賢俊鋼金辟佞諛撫牀論密勿借筋契都俞眀月青銅鑑中秋白玉壷律成懸象魏禮缺𥙷鴻都士進三千牘姦誅十二衢彌縫前後正損益古今殊相業専橋梓英標瑞竹梧癡蟇元有兔猛虎果非貙內坐占華蓋中階仰泰符令嚴顓白帝漏下候黃姑萬騎玄雲蔽羣狐黑夜呼銜枚凶有約解帶僕云痛象燬端因齒龍眠竟失珠聞驚燧人氏事異夏區夫闒㦸交馳驛重弓競接途殺青誰執簡泣血漫成湖史紀羮梟賜經傳齒馬誅隂氛動天地遺痛感樵蘇故壘煙攢棘荒原燐積蕪邦刑窮剿絶陽澤起萎枯趙氏兒猶在山公汝不孤勳名昭令甲精爽與天徒帝所隨升降神山辨有無雜詩破衣僧橦花楮絲枲纂新乃成弊鐡裓及肉身剛柔亦摧毁真空掃真壞大願開大智渴欲飲清泉飢欲思美味隨彼所願心以解嗔惱纍王侯與長者糞土金玉貴何以慰彼思長夀只歡喜夀本同我衣仰箭勢還墜堅忍及精進設衣以自譬懼彼不信我投熖五采異老僧機已寂贊嘆非本意意絶道始彰從此斷三世熾盛光佛偈寶光生虛空旋如火車輪肉眼一見之欣怖難思議謂光由身生我身與汝同口眼鼻舌心光亦何從出無生亦無滅是繇定慧成衆生受五濁七曜日鍳臨四餘在虛空摩蕩不暫停列宿直四方好樂各有職或增彼貪嗔或增彼淫欲居處各侈靡恣飽窮膏脂天神與魔鬼行住隂伺察爰假躔次環俾汝作疾忒佛言彼有罪須當盡懴悔若更攘割之安得名慈悲矧此缺陷世植果㑹有因罪既從是消福亦從是增般若無損益萬念墮積劫還彼清净根衆生永安樂緑隂堂山偈十首奉寄開元斷江長老緑隂堂前碧樹齊千枝萬枝雲萋萋生臺不令鷓鴣舞禪板時許倉庚啼緑隂堂前春笋生大著錦䙀小織成老禪一一㸃頭角要使參天來鳯鳴緑隂堂前𥘉夏􅋽芭蕉為扇椒為漿日汲井華三百斛側聽漁父歌滄浪緑隂堂前古佛身劫火不壞金色新笑殺丹霞斷知見暖得病軀生障塵緑隂堂前萬境空掩息不語超鴻濛有人立雪問大意山神泣走號寒松緑隂堂前自在時不拈公案不題詩僧來住夏與竹杖客去逢春贈柳枝緑隂堂前秋葉雕湖翻白浪魚龍驕我有鐡鉢水一勺彈指送爾歸扶搖緑隂堂前夏木清千紅掃盡雲層層有僧忽問柏樹子斫却柏枝僧始譍緑隂堂前結小參以手直指車司南現前虛空付大𣑽過去㓛德歸瞿曇緑隂堂前合自然不學吟詩不學禪應許清容老居士睡盡髙舂猶愛眠還源菴沃焦山下水歸東端與銀河一㸃通誰信道人能掩息手提渾沌擲虛空清容居士集卷第十四
