body:
  text: 外制翰林學士承旨榮祿大夫知制誥兼修國史遙授平章政事閻復贈光祿大夫大司徒上柱國追封永國公諡文康聲音與政通辭莫先於風雅易簡而理得治實效於乾坤維昔先皇歷選羣彥一道德以垂統嚴誥命以興文奉璋孔峩執簡有度考諸遺老號稱名臣具官某學博而智周材新而意古山立陽休之儀表望重縉紳日光玉潔之詞華才工黼黻進揆臣而堅國是避政柄以守儒榮畫旨尚方密勿深符於上意澄清外服咨諏慎考於民風人物蓍龜典章衡石遽告休而還里終辭徴以養年脫屣如歸逝川滋逺噫德輿制詔早已類於人間居易詩文今果傳於身後載加褒恤式克欽承可妻李氏贈永國夫人魯侯燕喜之歌褒其令美敬仲皇飛之卜後將蕃昌事不偶然理難固必具官某妻某氏韞玉養德佩蘭􅊞芳規矩不出於㕔屏律吕永諧於琴瑟守大家之戒靜慎而禮法自防誦季女之詩恪恭而祭祀有度命之不㳤報也宜豐噫茅土並封亦既慰文儒之願玄堂同穴尚欽承人世之榮可翰林學士承旨榮祿大夫知制誥兼修國史劉賡贈三代曽祖深贈昭文館大學士資德大夫追封邢國公諡康穆加上護軍泰山之雲起膚寸而成雨黃鍾之律纍銖黍以立均德胚胎於前人澤膏沭于後嗣具官某曽祖某持身圭璧䔍學巾箱清白儒科曩共誇於鄉黨丹青帝制今復見於階庭念昔干戈攘擾之艱唯汝詩書種殖之懿既開公社載廣王勳噫天勝人人勝天事果成於昭代子有孫孫有子慶永萃於一門增秩便藩疏恩冥漠可祖肅中書左三部尚書商議中書省事致仕贈推忠贊治㓛臣金紫光祿大夫大司徒追封邢國公諡文獻加贈上柱國乾坤清夷真主升而四海一風雲際㑹英傑出而庶績凝䔍生股肱之臣能總喉舌之職亶惟熙運爰立鴻勳具官某祖某學博而通方才長而守正讀易悟損益之理觀文參忠質之宜中歲投閒卒起裴度于既老平居緩獄審知㝎國之將興廟堂咨國是于蓍龜朝野係民瞻于柱石家聲允似子承曵履之榮書種有傳孫擅掌綸之美用永厥世以等其㓛噫四世三公亦既推赫奕之懿一門萬石尚毋忘孝謹之思可祖母鄭氏贈邢國夫人王臣外勞動資邦媛冢婦中饋訓立閫儀具官某祖母某氏佐餕靖共持家淡素縑緗整比齊襟拱立於北堂錡釡潔蠲斂袵儼趨於南澗子先仕顯孫復文榮噫沃壤再疏足示龍光之赫奕芳猷未逺尚瞻象服之委蛇爰詔後人式共爾位可父慤中奉大夫護軍彭城郡公加榮祿大夫大司徒柱國封邢國公帝堯雍熙擊壤之民鼓腹漢文寬厚扶杖之叟厖眉念纍聖之仁恩俾遺老之夀俊具官某父某脫棄軒冕徜徉里閭誦讀詩書邈矣師承之舊陟降籩豆僾然孺慕之思壯年幹蠱以𥙿如晚節撝謙而泰㝎言追古往耄及意新種樹養生默合三槐之故事巾車訪俗有符五栁之曠懷亨嘉真磻水之師朝著仰商山之皓兒年希有世號少儔噫周公拜前益慎威儀之則韓侯受命毋忘傴僂之恭可母彭城郡太夫人李氏追封邢國夫人貴子而不及親施仁宜厚揚名以之為孝報德是先禮有追崇恩推錫賚具官某母身同隱遁性一柔嘉蘋藻恪共於春秋絲麻力勤於夙夜執喪慟絶竟三日而始蘇佐餕歡違遽中年而長往是生賢嗣爰顯清朝噫翠輅魚軒亦既極小君之寵蜜章鸞誥尚再疏下泉之思可妻冀氏彭城郡夫人追贈邢國夫人月圓而魄虧理或可詰劒成而神化物莫能推念兹偕老之盟言詎意中道而淪世具官某妻秉芳蘭茞佩矩珩璜奉舅姑以無違處娣姒而彌度年之不㳤生也有涯噫鄉國大邦追錫永光於窀穸泉臺佳氣周流宜見於焄蒿可妻廖氏封邢國夫人相夫之道靜㳤是師承祀之儀潔蠲惟謹故貴得以從其爵而教必先修其身具官某妻執禮奉盈守德珮玉事舅嚴雞鳴之問逮下審桃夭之宜噫小君實諸侯之妻惟謙抑可以長保巨鹿乃邢子之國惟儉素足以久安毋替戒詞以底終吉可集賢侍讀學士中奉大夫李倜贈祖父二代祖懋河東宣撫檢察使贈嘉議大夫吏部尚書上輕車都尉追封兾寧郡侯諡文惠乾坤轉旋臣擇君而審事風塵膠轕民徯后以求生匪資談辨之折衝曷得從容而完聚昔有俊士聞于當年具官某祖懋沈鷙决機秋毫析理不背時而棄利魯連感燕將之風能因危以為㓛陳康歸蕭王之智按堵復鄉閭之舊開田廣井邑之繁全逃民山寺之中沒猶有祀憐故帥孤城之守許以自新謂宜膴仕之軒飛乃獨急流而髙避菟裘嘯傲合難兄難弟之歡犢車雍容追某水某丘之勝才不大用德遺後人噫維此兾方存憂深思逺之旨嗟爾孫子䔍尊祖貴始之誠賜履舊邦克昌胤嗣可祖母張氏贈兾寧郡夫人婦人內訓愈久則事莫可稽聖朝鴻恩雖逺而澤益加厚錫類者教民之本顯親者繼志之基具官某祖母張氏語簡以嚴心靜而正斂容似玉家庭服其母儀飣坐如山鄉閭師其懿德益昌爾後克砥于成噫貽厥子孫不負窀穸之願蒸畀祖妣爰疏湯沭之封營魂有知寵光無斁可祖母某氏贈兾寧郡夫人孝治天下教必本于興仁惠及萬方禮莫嚴于尊祖爰念瀛洲之彥庸推下泉之恩具官某祖母某氏韞玉無瑕服蘭有度采藻行潦雍雍承祀之顔殷靁南山黽黽勸夫之義生子允才而不㳤傳孫濟美而始昌噫一門同封聿廣聖朝之澤三晉故壤足為里社之榮垂世彌光終古奚憾可父昱成都路防城軍民總管贈集賢侍講學士追封冀寧郡公古澗長松宜棟梁而弗施於太室韞櫝美玉器瑚璉而莫致於合宫維先朝宣力之臣皆一時成德之彥才不䆒用沒猶可稱具官某父昱沈思而好文敏斷而濟事地生天施知民悅以阜通城髙池深審人和以環守蜀為望郡職號劇曹足食足兵流馬相迎於道上為物為變飛鳧疑度於雲中天不以年子由之貴噫三牲之養榮親弗逮於膝前兩谷之間錫土有光於身後式嚴嘉命爰慰九泉可母仇氏贈兾寧郡夫人曽參風木之悲深嗟于身後孟宗冬筍之養得遂於生前事為至難道無全美具官某母仇氏遵行儉素服習勤勞不見其夫之榮舜華隕露猶幸有子之似蘭茁承春肆衍褒嘉同疏追錫噫金葩錦橐益增玄宅之光丹轂文軒允過板輿之樂清朝展慶故里聚觀可母韓氏贈冀寧郡夫人孟軻五鼎之饋禮非有踰子路三釡之悲情何可既仕獲通貴者常有祿不逮養者何多具官某母韓氏家法儉勤母儀慈惠化治絲枲生兒承膴仕之傳恪共蘋蘩奉祀守吉蠲之度鬛封已拱口澤猶存肆推錫類之仁誕布昭天之渥噫黃河一曲千里兹實故鄉白雲孤飛太行有光前躅蒸嘗不墜褒寵如新可妻許氏封冀寧郡夫人君子偕老之宜國風所詠家人中饋之吉易象攸存作則閫儀來嬪瀛彥具官某妻許氏有諧琴瑟相夫之道無違不出㕔屏教子之心彌切維靜以正既樂且康噫蟋蟀唐都合儉禮而民始化采蘋南澗循法度而祀乃修遵錫舊封祗承景命可集賢大學士榮祿大夫致仕李謙贈光祿大夫柱國追封魯國公諡文正祚衍皇圖上聖聿開其正統教興文治鴻儒允際於清朝四時周而寒暑成八音宣而律吕比道關運數天䔍忠純具官某藻思夙新蜚聲壯著處身閭里蔚然黃流之在中䇿名搢紳燁矣錦衣之尚絅早贊青宫之善迄編金匱之書疏傳十事之簡嚴志遂四休之安佚碑板華夏辭纍貫珠詩篇林泉語深挾纊故老倚之為衡石諸生仰之如蓍龜大帶幅巾儼君實之在洛秀眉明目侔康成之居鄉既得夀以保終宜易名而廣譽土荒東魯爵列上公噫孔門設科先德行而後文學漢廷取士首孝弟而次賢良舉世實難唯卿無愧可妻孫氏追封魯國夫人夷考儒學之彥允資賢㳤之妻從游外方米帛不干其念慮敦叙同姓籩豆式謹其威儀古有其人今見于汝具官某妻某氏溫恭秉度禮制飭躬相敬如賔皓首不墮其繩墨有嚴教子青燈猶課以詩書惟小君之封用加矧大賢之忠宜録爰伸並命以慰九原噫起家而居有之惜未配夫宗之貴告往而知來者庶永為婦德之規於昭營魂裒對天寵可禮部尚書中奉大夫元明善贈二代祖海贈嘉議大夫祕書監太卿上輕車都尉追封清河郡侯諡貞惠青桐孫枝之良雲和所植紫芝靈根之秀商山是宜隱顯之用有時報施之效不忒具官某祖某養真巖壑䇿名里閭試吏緩刑卒應髙門之語抱孫竒骨可勝執硯之悲器卓犖以不羣量汪洋而莫測李翺之傳皇祖文已四馳王通之述府君事關百丗禮嚴教孝爵侈勸忠噫東壁圖書爾尚詔後人之似故鄉湯沭益毋忘昭代之恩可祖母髙氏追封清河郡夫人珠藏九淵神光燭而愈閟蘭生空谷幽香耿而自持通塞維時存殁奚憾具官某祖母髙氏慶源演迤㳤則和平種桑而望繭絲亦云勞止樹桐而中琴瑟夫豈偶然錫類者治世之湛恩尊祖者孝孫之美志噫爵書故里永為枌社之榮稱曰小君益表松阡之觀可父貢奉議大夫驍騎尉大名縣子贈中奉大夫吏部尚書護軍追封清河郡公諡孝靖種德如藝木必閲世而始昌保身若奉盈惟持善者無愧窮達有命幽明不渝具官某父某孝友䔍躬質直守道簞食卒安於簿領籯金始羡於縑緗不假以年益豐其報孝能繼志鬱成南陽之阡文以顯親行擬瀧岡之表肆加錫爵復舉易名噫丹詔疏恩天官實古之冢宰蜜章分土甘陵維爾之舊邦尚其營魂歆此殊命可母弭氏大名縣太君贈清河郡夫人孟軻大儒深藉斷機之訓仲由至孝每懷列鼎之悲審閫範之可遵愍堂封之彌逺具官某母弭氏孝慈有度㳤慎無違禮行於家蘋蘩循沼沚之素教施於子斧藻為朝廷之光已錫鴻恩爰加再命噫九原可作鸞書啓鄉郡之尊八座並榮象服稱小君之號可妻李氏大名縣君封清河郡夫人鵲巢起家之因實原勤儉燕喜受祉之美斯為樂康報之厚者始必勞持之素者終不懈具官某妻李氏習熟女史幽間內儀儼服笄珈執沖謙而彌下恪恭籩豆盡蠲潔以無踰百祿是遒再命而傴噫相其君子益知典禮之寅稱曰夫人毋忘主饋之訓可光祿大夫湖廣等處行中書省左丞相阿力海涯追封太師郡王四懸設樂必假鏞鐘之洪音八柱承天斯合明堂之巨構乾坤啓運川嶽降靈是生非常之偉人以佐統一之真主沒且不朽德猶可稱具官某勇略致身英姿蓋世羊祜平吳之䇿誰復先之楊素渡江而來何其神也據荆州以為之根本搗長沙以披其腹心兵勢建瓴皇威震電先皇帝知人而善任㝎㓛以行封倬彼雲漢之章廷無儔匹享有金石之奏位班侯王兼將相之重權契君臣之嘉㑹令肅風生於細栁政成人指其甘棠念耆㝎爾㓛實有資於贊助而大賚於廟必申錫以褒崇彌深撫髀之思莫遂圖形之想白雲已往青史如新噫齊岱為鍔石城為鋒朕已悉皇王之大武黃河如帶泰山如礪卿允為邦國之元勳詔爾後人無替先德可妻某氏贈國夫人鵲巢起家因以為召南之首殷靁勸義足以成大夫之行矧江漢之舊邦昭柱石之偉績必資內助以佐髙賢具官某妻某氏淡泊無華靜專有守良玉在櫝􅊞中美以善藏幽蘭生林愛國香而自閟禀北庭之渾厚婉南澗之恪共方考禮以報㓛爰推恩而錫類噫西平有子足彰閫範之光魯侯令妻宜受國封之侈是惟崇德尚克歆榮可太尉平章政事某特授太子太傅朝廷大䇿慶莫盛於建儲社稷重臣禮尤嚴於敬故㓛參羽翼政倚股肱具官某秉志精忠宣猷惇實黃閣調元之始允屬謀謨青宫選士之初必先德義惟左右前後之人正斯君臣父子之道彰噫日重輪月重光宜益資於輔導書同文車同軌期咸砥於升平往堅乃心祗若豫訓可遙授平章政事某特封秦國公亶惟龍飛之初考圖數貢爰䔍鷹揚之舊崇德報功出命告廷分封啓宇具官某蚤乘熙運躬受真才絶北威名允著長城之助居中韜略密宣前箸之籌肆豫纂承委以輔弼噫干戈弓矢于以昭武㓛山川土田斯以彰異渥祗服明命益殫嘉猷可中書左丞某封贈三代曽祖某贈資善大夫中書右丞追封髙昌郡公諡康懿粵昔髙昌肇邦藏經史以崇儒師立校官以訓子弟所從來久矣故其聰明才知通於聲音文字之學代不乏人具官某曽祖某誦詩讀書漸仁摩誼得於鄉里之素若雲在淵勃然以升蓄極而通至曽玄而始見疏封舊寓以報流澤之無窮尚其享哉可曽祖母追封髙昌郡夫人諸侯之制立廟以五親服未盡是猶有待於後也今爾曽孫某勤勞王家錫之山川土田而汝與封推其自則由玄孫啓之先王之旨逺矣具宫某曽祖母某蓄德不耀保躬益貞敷佑後人輔弼不懈曽孫之慶至于五丗其昌矣今從夫爵尚承朕恩可祖某贈榮祿大夫平章政事追封齊國公諡莊靖赫赫在上永遵繩武之思子子為孫爰述尊祖之義發揚潜德追錫愍章具官某祖某明珠媚淵良玉韞櫝言寡尤行寡悔祿不願干旋中矩折中規動無踰則養真於攘擾之際味道於冲漠之初本碩枝繁源深流逺噫稽尚父之返葬咸謂分封仰周公之拜前允宜㳤後載嘉正直庸受寵綏可祖母追封齊國夫人蘭長空林羞當户以自獻珠生巨海懼媚川而深藏矧為隱約之時曷表殊絶之行婦德永閟孫賢可推具官某祖母某孝敬行於家門肅雍傳於閭里念昔日艱難之際為善是持至歷年磅礴之多興宗有驗恩分沭邑賚廣脂田噫綺繡冰紈莫慰生前之願文軒象服足為身後之榮可父某贈銀青榮祿大夫大司徒追封齊國公諡恭惠大明麗天羣隂伏于蔀室寸雲出岫甘澍遍于寰區崇德報功之典存繼世象賢之制著惟勳是録于禰有光具官某父某潜珍養名砥節礪行王明受福井泄不食非所憂父教為忠籝金之藏奚足羡事久斯㝎時至乃亨念爾嗣之弘文生聞孫而佐治蟬聨朝著磬折里閭維積善之粹精宜流澤之溥博詢于集議庸爾展恩噫泱泱大風知紹封而益茂謙謙終吉詔承德以靡虧可母追封齊國夫人積行纍功允賴夫人之配承先共祭載歌季女之賢剛柔之道有恆倫紀之位斯㝎具官某母某氏持守貞白衣被潔清子又生孫莫計堆床之笏善必有慶久髙容駟之門議勳以褒藎臣錫命而及賢配亶惟異數足稱營魂噫三服齊官是在昔女工之訓五鼎廟食亦庶幾孝祀之芬旌寵有光歆承無斁可榮祿大夫宣政院使領延慶使某贈推誠佐理功臣太師開府儀同三司上柱國追封齊國公諡文忠式觀景運灼考藎臣際乾坤清夷之時承風雲亨嘉之㑹精忠儼在褒恤庸加具官某慎慤而行方沈潛而量厚踐揚禁近官一品以益謙陟降邃嚴閲五朝而彌著恕能及物廉以律身經文譯潤之功深開宗明義詩書服習之訓久教子象賢維時輔臣佐我初政塤箎雅奏圭璋令儀蓋德厚者世必昌勳著者爵宜峻誕開公府庸正師垣儼精爽以如生合神明而無愧噫保兹青社斯為胙土之崇封以紫泥益見蜜章之重體兹申錫期爾永承可妻封齊國太夫人馭爵疇功録先臣之大節疏恩並命成賢嫓之芳猷往莫追尋生宜悅豫具官某妻某秉心淵靜制行霜嚴悃愊無華佐餕唯精於五飯溫恭有恪執容儼稱於六珈是生絲綸之英復得鹽梅之佐入室每咨於慈訓揚庭爰著其母儀噫誦齊風雞鳴之詩則貞女宜封於東土歌魯侯燕喜之頌則夀母益介於長年裒對殊恩恭承令祉可資德大夫同知宣政院事某贈存誠秉德功臣太傅開府儀同三司上柱國追封齊國公諡忠穆帝室興隆君臣交孚而同德王庭肅穆弟兄相繼以共為眷若昔之揚休越今兹而錫命輿言是採恤典有加具官某植節秋霜持評水鏡侍元戎於漢上屢奏凱功奉大帝於禁中益參聖諦凛有不可犯之色充然無自滿之心阿閣鳳凰虞廷屈軼績既昭於簡冊望宜冠於巖廊噫舉賢上功爾猶存太公之生氣慎終追逺卿勿忘人主之殊恩尚其冥魂享此休寵可妻追封齊國夫人王言惟作命揚于庭者為報功內訓不出門宜其家者為合德有嘉賢嫓宜盡褒封具官某妻某秉德芝蘭奉身玉雪逺行江漢之域勸義不違深居房闥之中服勤無斁考圖㝎地錫命縯綸噫取妻必齊蓋有資於大國從夫之爵今已謂之小君昭于幽扄歆我異渥可監察御史沙某封贈祖父母祖某嘉議大夫行工部事專一修築宫城勾當今贈㓛臣太傅開府儀同三司上柱國追封某國公諡武敏式考皇猷承命以永新邑爰立民極相宅以營成周輪奐彰施髙深鞏固言念梓材之彥興懷棫朴之官具官某祖父某氣一而靜專智圓而肅給順隂陽伐材木構寶殿以如規議逺邇程土㓛儼金城之有截通四方而罔缺傳衆力以聿成典制百工論道時趨于清切辨護少府使民每减其冗煩紫闈深教以手書墨詔屢傳于宸旨亶惟際遇允協隆平覩設施而舊跡愈彰思典刑而老臣彌重誕開公爵復廣社封噫召公之誥簡明命庶丕作蕭相之謀宏逺俾後無加追命煥章營魂昭慰可祖母女教勤閨門夫獲修于六府皇恩洽寰宇死得慰於九原眷惟藎臣成于良媛具官某祖母某韞玉制行範金作程化治絲麻宛惜日稽㓛之效潔清蘋藻儼承先盡職之能用施孝孫亦克王事方褒忠以大賚爰追命以並封噫蜜印昭天益侈桓楹之表脂田廣國式崇柏板之嚴茂對有光靈承無斁可茶迭兒局使沙正議贈父母父某正議大夫遙授工部尚書管領茶迭兒局人匠總管漢宫密勿之邃彌重細旃周廷朝㑹之嚴用資隂羽省方維嵗考古若今具官某父某才敏而通時慮深而應變春秋蹕道環徼廬虎士以無譁風雨屬車望帳殿翠華而有煥掎如鹿角整若魚麗曉籌爭奮以啓行夕頓悉安其成列舊規儼在故老能言爰開大國之封式體先朝之任噫相王入大次禮猶想於肅雍論道惟三公恩豈殊於冥漠詔爾後嗣祗豫至懷可嫡母世官嗣業古罕其人工師致㓛今慎其職具官某母某肅著令德恪嬪大家上承尊章察素絲五紽之儉下訓子婦審狐腋千金之難爰俾象賢式克紹後噫翟茀崇貴已享偕老之時蜜章廣恩足慰厚夜之望子能謙謹汝預寵光可生母佐中饋之職必假婉柔成繼世之賢實資訓飭泉遇蹇而利見水積小而始升具官某生母某勤勞大門光寵盛代象服之貴宗婦攸同鸞誥之榮鄉人所羡爰相胤嗣益慎忠嘉可資德大夫紹慶珍州南平沿邊宣慰使播州安撫使侍衛親軍都指揮使上護軍楊漢英贈推忠效順㓛臣銀青榮祿大夫平章政事柱國封播國公諡忠宣繼世立諸侯審象賢之有託推恩保四海在追逺以彌加有懷藎臣庸厚恤典具官某著德遐域效誠先朝聰敏得於襁抱之初發于天性稚弱置於扈從之側斷自宸衷用能絶黨殊鄰投戈納欵尺天寸地負版奉圖先國後已之慮深尊主庇民之績著闡學效文翁之化好賢師鄭武之風雅量鎮浮方櫜弓而箙矢澄懷味道時緩帶以輕裘出門興折軸之悲行壘應流星之兆何以勸善必也正名循故壤以加勳衍圭田而封土青綬崇副相之貴衮衣嚴辨章之稱噫忠孝傳家于以顯昭事厥辟之實殁存錫命所宜推圖任舊人之終精爽有知欽承無斁可妻田氏遵義郡夫人加播國太夫人婦人中饋歌采蘋則謹其承先大夫逺行誦殷靁則審其勸義禮有準則行無過踰具官某妻田氏嬪髙門之勳庸受外氏之經籍曹大家之女誡奉上克謙魏夫人之仙書教兒能學念王事靡盬之際知女子有行之宜夙夜傳恭寒暑循度噫從夫以貴今已位於小君勉子惟忠益有光於先正茂膺異渥式介長年可開府儀同三司上柱國録軍國重事中書右丞相監修國史拜住贈清忠一德佐運㓛臣太師開府儀同三司追封東平王諡忠獻八柱承天棟橈萌於巨構六飛御日輻說見於中街愍死難以成仁考生榮而錫命具官某鼎彛王社閥閲相門自結主知應雲龍之異遇獨持國是炳蓍蔡之先幾陳於上者不足言見於事者為可則斥聚斂之臣以靖四表誅黷貨之徒以正庶官庫無餘財拔葵之訓靡替門絶私謁懸衡之鍳益公天下望其治平朝廷以之模楷然盡言招過憸謀愈深選賢與能奸黨滋懼變成肘腋禍延股肱川嶽動搖日月昏翳雖元凶正罰足明朕心在一惠易名姑慰卿意分茅故壤增爵維垣噫未眀入朝竟墮之計盛服假寐孰為鉏麑之賢念此䀌傷恩斯優渥可妻某氏封東平王夫人星坼中台輔弼之虧果應舟藏半夜伉儷之情曷勝死者易名生焉從爵具官某妻某氏素系相閥克嬪王門纂組之功弗訓以習祭祀之謹於禮無違偕老之志莫酬並封之恩宜厚爰增湯沭庸演絲綸噫司徒之妻問齊君以豫邑蹶父之子樂韓土以相攸宣飭諸孤以保終譽可太中大夫內史府司馬狄琮贈榮祿大夫中書平章政事柱國追封冀國公諡貞毅山西諸將之英沈雄有自斗南一人之裔正直是傳爰産魁梧之賢以贊藩輔之政具官某少植竒節壯懷孤忠朱邸論思引經說以開導細旃密勿詢治道以彌縫挺然廊廟之姿鬱有江海之量才見于用知無不言邊陲以之敉寧帷幄以之康濟朕纂嗣大歷圖任舊人方審象以博詢慨撫髀而莫覩興宗有似兹為柏臺之羽儀追逺彌加庸進槐階之品秩噫吕望老而賜履實文王之故臣丙吉生而受封乃悼考之遺德事莫能偶恩宜有加可妻張氏贈冀國夫人逺行從政閔勤勞者著壼儀修身踐言循法度者執婦道允矣溫恭之媛疏其赫奕之封具官某妻張氏謙以自持儉而有守酒食是議春秋之祭無違狐狸為裘風雪之需悉備既嘗艱阻莫遂恩榮噫兼謨入臺紹祖之傳彌振僧孺清道思母之念益深尚其營魂承爾嘉命可妻劉氏贈冀國夫人展如邦媛典刑傳於大門咺兮國英謨謀見於藩邸天相其配恩與之俱具官某妻劉氏珩璜母儀纂組女訓如璞藴石審玉人之琢磨若鳩在桑信君子之均一嗣為烏府之模楷母增魚軒之寵榮噫繼世象
