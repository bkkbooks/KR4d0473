front:
  text: 清容居士集卷第五十
  hash: sha256:c8559741b6551f48de22f1fc65d349281117fc45773fea70d1010ba161888981
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_050-1a}
body:
  text: 題跋書正肅公懲忿窒欲題扁忿欲皆發之不中節者桷嘗讀易之咸以無心為感何思何慮是則安有不正者哉漢儒言感物而動失旨多矣先正肅公謂忿近於剛以欲為剛德不足探本澄源有合夫繫辭傳之説故其平居奉身如玉雪危言讜論百壬交避其剛之謂也清齋端居不邇聲色此絶欲之效也居朝不一二年輒以直道去湯文清哭公之詩有曰獨留事業在江東真實録也從子瑛居龍虎居室以四大字昭示户册且築象山之麓為精舍審其傳授保形以靜老氏之説飬厥靈根吾儒之説是則安有忿欲易曰無有師保如臨父母正肅之訓豈虛言哉泰㝎二年上已日族孫具官桷再拜謹書跋正肅公手澤吾宗由宋仁皇時光祿公轂與祥符縣丞同舉開封祥符後居東亰建炎兵變祥符孫太保潔家從青州軍以歸是生太師衛公厚德退讓而光祿公家自朝奉公亦漸替至正獻公入太學師陸文安公登淳熙辛丑第衛公之子越公從正獻遊考兩家南北之分始得合譜訖受學于正獻癸丣歲越公與計偕不赴淳熙丁未登第自是先後為祕書省官為侍從人咸曰叔姪之盛師生之榮於是見之正肅公見越公鄉薦時年始九齡自是敦敘不絶兩家厄於祝融之災舊藏幾盡脫焉以僅存者猶數十紙從姪則瑛自龍虎還里曰蒙齋先生遺愛在江東社而祝之罔敢墜因以手澤二通俾為象山證契曰大資同知桷之曽大父曰思贊府判實則瑛之曽大父噫世運既殊喬木雕落書其本末願刻諸山中以為永久泰㝎二年三月甲寅族孫具官桷拜手謹識題從子瑛城門八詠始余讀陶靖節諸賢詩志意憤悱抑其意而為之言蓋將以從其類也五君八哀杜子美規規然相近羇窮不偶故竊其似而為之者焉龍虎山為道士據會竒怪嶄削率可以見於詠歌者書于志見于碑志跬步不敢以軼而吾從子則瑛作城門八詠以相示首之以仙隱言夫宗師創始之難也曰茅山易髙士靈寶之創首龍虎而終于茅山者也曰天谷慕真隱而不騁于外詠蓬蓽之所居則與天谷並或曰蓬蓽勝之曰玄洲三隱東城慕其孝友而能以肥遁自處者也曰碧玉則曰我越公之德未墜粵昔旌陽公以厚德植樹而奉祀有缺懼不能以承噫今為方外流者絶其本枝而獨吳特進不若是則瑛能亢宗叔老矣不復有望異時見吾中散公朝請公之子孫成立非子也邪跋外髙祖史越王尺牘齋戒之時共惟撫幹國録盛德某伏以即日毒暑在候正君子繁福某歸老山林一念不作殊在躬默有神相台候動止倍介狀可發一笑識者觀之必有公覺強健不足云者蒙示張公行甲符離一掃無孑遺東南膏血論建炎以來錙積寸纍車馬器當時不恤國計以償㓛名之心竭于叛亡目今州郡窮匱皆由之主上實知之不恤後世之無某所不忍為也某此心天實知什物無恙幸置慮他覬韜飬以聞也吾人以謂如何竹洲所寓期待幸甚幸甚五月日太傅保前光大異時橫蜚尉區區之所魏國公史浩箚子寧軍節度使致仕朱文公作張忠獻行狀一出南軒之筆不過題官位姓名而己後考三敗事迹始悔昔年不加審核歸咎南軒然亦無及矣符離之敗陵陽李伯微甫載其事甚詳今不敢為忠㝎辨明直書其所紀曰符離之役軍資器械失亡殆盡張魏公初聞之疑虜人踵至甚懼即軍中解所佩魚遺歸朝官太平州通判劉藴古朝議大夫使虜求和僚吏有止之者乃奏乞致仕又乞朝廷遣使孝宗不從既而虜人不復南魏公乃謀再舉上亦不從及和議將成魏公持之甚確左相湯慶公因白藴古之事由是魏公遂絀李與張俱蜀士史筆不敢有所隱避桷以外諸孫尢宜尊所聞以傳信忠㝎尺牘無一字失實者此豈私喜怒而為言者歟泰㝎二年五月甲子具官袁桷再拜謹記書瓶城齋記後抑嘗觀易而得兊艮焉澤以漸摩言之於家者也澤而不止幾於險矣節者所以懼其過也當位以節節斯通矣艮者總其身而身有止也思不出位艮道之致因地以光而復降焉斯謂之謙謙非忘於事也故鳴謙之象著而用節之斯益困矣凌侯商榷事物默以全其機清介自律人莫有敢犯户册之訓深契易理敢誦所聞而質諸良月既望越袁桷書跋汪龍溪外制草崇觀詞臣以扇對全語為髙獨龍溪先生痛掃時弊盡復元祐之舊方羽書飛馳顛沛道路非如昔人夙搆古語而德音四逹甚於奉天之感泣不幸為秦氏子擯斥逺道而先生迄不得再入矣抑嘗考宋世內外制之作至公而始備故其翦裁也有丁夏之風其典雅也備曽王之體肆而不野麗而不侈則駸駸乎歐蘇矣今觀手藁遂書所聞以寓仰止之意云乙丣七月望日袁桷書書劉貢父舍人種竹倡和詩後元祐元年九月蘇文忠公以中書舍人為翰林學士十一月劉仲馮孔經甫為左右史蘇文㝎曽子開為中書舍人蓋同月除書也劉公由祕書少監入掌詞命蓋與大蘇公相後先孔常甫則猶在著作廷兄弟父子嗚呼盛矣哉鄧右丞熙寧間以九制之譽積十年為承旨自負灝噩詎淺淺耶嘗考元祐初元實維丙寅姤遁之基已萌是歲溫公薨黨論興詩禍作馴致宣政紹興丙寅秦相擅持南北分裂遂㝎至於開禧則罪歸于韓咸淳罔上之罪昭于賈氏不十年而宋亡治少亂多明于天人者未嘗不深知之噫前乎乾德天聖之際又何其盛也今歲距丙寅僅僅十祀文明之運誠在于此仰止先哲感慨係之丙寅人袁桷識時延祐乙丣十有二月庚寅也跋蘇子美帖滄浪翁中年書猶未精詣後沈錮黜落浩然之氣悉心用資以為翰墨祁公號婦翁兖公密友終不能為之道地前代法律之嚴若是書蒲傳正左丞帖左丞蒲公文學政事熙寧元豐之時號為名流後出為亳州未幾以揚易杭皆東南要郡此手帖蓋由亳入覲時所作也蜀由孟氏以來無兵革鬭爭文士迭出至元豐時為翰林學士者十餘人公其一也宋世仁英正史皆公纂修今藏史院可考皇慶癸丑桷得與其裔孫道源同為史屬蒲為西蜀大族三丣之變徙興元者獨能保其宗家譜整備遂以先越公所藏左丞公手澤歸之以永其傳噫綸言汗簡皆家世舊物桷無以進議厥今理學宏闡實始於舂陵周元公元公之道之學實蒲公紀其事立賢無方願於諸孫有以廣之會稽袁桷書跋懷素揮翰帖懷素書多才翁兄弟所書至明昌諸賢尢競習此體余在都下所見凡數十卷皆偽贋可考獨此唯宣和舊物審為非臨摹者跋柳公權書清靜經韓氏閲古堂清靜經乃越石氏家藏舊物石居新昌慶曆時刻此帖後入復古方韓貴盛時遂得此帖悉有紹興圖璽此籖摽光皇手題石氏墨本失之拘紹興本失之瘠韓本失之弱今覩真迹硬黃古紙松煤老色無纎粟繆妄視昔三本真碔砆也龍集戊申至大改元甲子日桷謹審證于後跋顔真卿誥前人多疑祖父誥非其子孫所可書魯公舉進士開元年已長成昔人誥敕必擇能書者填補從唐考之徐季海之於其父嶠之是也從宋考之蔡君謨米芾是也此卷舊入思陵復古殿後入祕書省先越公為祕丞時掌圖籍凡唐相誥皆入録蓋德夀晚歲悉以前賢誥入祕省故也今李紳誥及徐顔諸誥皆舊物審㝎無疑書舊作九華臺賦後潛庵鄭先生兩入翰林纂修凡例多出其手于時桷亦補史屬適相後先未幾除江西儒學使者所居近玉堂矮屋脫粟不堪旅瑣先生清言介行每言數百年承平事不絶口桷不揆參錯承接時則有新安汪尚書孫漢卿為供奉廬山曹端明子愚為編修此數公者皆先世情好而桷以外舅祕閣公敘宗盟於相府事契彌相厚也先生生於淳祐甲辰之重九日先侍郎因之以命名家居築九華臺湥致意焉于時桷實賦之由江西歸里第不數年而捐館其子公許以門㓛入官來亰師攜混元山居題詠手澤一卷而九華臺賦實附于後俯仰疇昔邈不可得而桷不自知止因循翰苑者今十五年矣學不加進而道日益損異日當假道清溪拜先生之墓驗昔時手植之花木因以有推其子孫之興盛願嗣以記之延祐三年三月已已袁桷書書李巽伯小楷夢歸賦有跋趙子固洛陽李巽伯建炎初同朱希真避難南來名望文學與希真相上下而作字體製亦復相似希真書相鶴經朱文公評之矣余嘗聞先生長者言黃長睿崇寧間遊洛陽作九詠楷書深刻故一時洛人皆師慕之希真巽伯又其似之者字學廢已久宣和立書學主上所好乃薛稷禁經所謂字則長而逾制者也則朱李二公寧得為博士耶希真嘗和巽伯詩伊水嵩雲未歸得説平生處淚浪浪蓋與夢歸同意又曰琴書揔驚眼文字更過人巽伯翰墨之妙可知今觀趙子固評書力宗元常而宋朝習鍾書惟黃朱李三人暨薑堯章子固耳余嘗見丙舍帖徐浩模本出尢端明家又見褚河南摹力命表唐本皆纎濃遒潤至比閣絳宣示表如出二手則學鍾書者猶可置論乙酉歲余見今翰林承旨趙公子昂于杭于時愛堯章書譜手之不釋逾三十年趙公小楷妙天下是蓋脫其形似而師其神俊此卷舊藏南康黃可玉可玉嗜古剛潔人也後授其徒董君有能能寶之願質諸承旨公作書評焉俾勿壞延祐五年八月乙丣書題東坡嶺表書歸去來辭贈卓契順道者東坡先生居嶺海惟卓契順巢元修不逺數千里􅉭鞋問訊元修有傳而契順止書歸去來辭與之如有欠恨桷于德常家始獲見真迹落墨淋漓光透楮背見者皆竦然以起敬而元修傳非精熟蘇文者未嘗接識昔人以鼎彝傳逺謂於監觀有補德常宜廣刻使家有其書任恤之道見於盛世矣跋吳丞相繳京湖帥賻陳清敏帖嘉㝎十一年先越公與清敏公同在殿廬實得吳毅甫丞相為第一清敏之薨丞相深德之為作書閫帥于時賈相年未四十方折節慕名丞相書至詎敢靳嗇清敏子孫又安得以不家於喪為辭故事大臣薨有旨州郡治喪葬深恐後人不知以清敏公家為有請故表其本末若是書世綸堂雅集詩卷吾鄉盛時比屋皆故家大官咸淳賈相擅國絶惡四明由是衣冠皆為月集悉不敢議時事卒至國亡無賣降于外者當至元末年諸老先生猶亡恙時則有深寧王先生師表模範世綸雅集猶有洛社耆英之遺意甫三十有四年風塵變更乘虬上征無有一人在者覽先郡公之遺墨不勝悲慕世綸主人於是下世亦二十年矣桷以契家子猶得從封胡羯末之後願相與勉焉以圖無斁題樂生詩卷詩於唐三變焉至宋復三變焉派於江西變之極有不可勝言者矣劉南嶽少年以詩自名晚歲獨尊楊廷秀考於風雅無是體參於唐宋無是體以斷絶直致為工叱咜轉旋駸駸乎江湖之靡者也吾鄊前哲所為詩倣韓而不能博師蘇而不能宏然卒無江西之弊誦建安黃初之作推而至于風雅則亦有徑廷矣㝎海樂君之才以一編介蔣君玉度示余且求敘引噫詩不能以易言也觀其平淡者合自然孤絶者得深悟繪物不鄰于巧琢至境合心會釃然百谷之泉必逹于衆流是亦于詩非積學有源者不能是也余終老林泉異日相尋於寂寞空絶之地相與酬倡又將盡其説焉書孫僉事訓子八字説一貫之旨忠恕而己其語簡而易明大賢之教人曰不妄語聖人之教子則曰立與言二字而己過於文則漫不加省切於近則易以自持孫公濟川之家訓凡八字曰吾將以訓于家吾子之果能為儒也必將由是以得名使不至焉則守斯言也其不為小人之歸也明矣求余言以增警遂書以歸之俾勿墜濟川子名某日不廢學將以儒術起家桷老矣猶將見之書黨承旨篆杏壇二字後翰林承旨黨公篆法妙一時所書杏壇二字刻于曲阜藹然風雩之意千載一日也衍聖大宗南徙三衢設祀有廟傳嫡有緒今郡守趙侯敬之髣其舊址築壇於旁昭揭二字於其上有新豐肖似之意見堯於牆著存不忘之義也若曰思其居處孔氏子孫萬世不怠是則趙侯之用心良厚矣泰㝎三年二月具官袁桷拜手謹記書吳子行篆書隂符經唐世隂符始大行原于李筌成于李靖貞觀皇帝始酷好之命褚河南凡書一百九十本貞觀之意蓋廣用兵之説耳李筌託神姥之言乃曰上有神仙抱一中有富國安民下有強兵戰勝又妄增六注以惑後人然終不可悉解而吳子行復書之何耶唐人作篆惟書千文蓋懼學者之未易察也徐鉉作項王亭賦仿李陽冰裴公德政碣之遺意子行沈困市隱豐碑巨碣不能以自見寫其幽曠託焉以自逃者也余嘗聞善書者大篆不得入小篆隸書最懼入八分使子行在吾願相與評焉題劉明叟詩卷大裘無文良玉不琢質至美而無可楝擇也言為心聲而詩章之衍溢則又若必事于模範論至于理盡所謂模範者特餘事耳黃太史嘗言寧律不諧不使句俗以建安黃初之法較之似若有病然太史所為詩鍛鍊之工過於前人其所謂不諧者蓋其變體耳吉安劉明叟示余詩一編不事雕飾意氣凌厲理勝而語完嶰谷之竹合于自然不假按抑而宫商敷宣各當其職手之不能以釋因以夙昔之所聞者書于後而歸之題閔思齊詩卷唐詩有三變焉至宋則變有不可勝言矣詩以賦比興為主理固未嘗不具今一以理言遺其音節失其體製其得謂之詩與隴西閔思齊示所為詩沖淡流麗亹亹倣唐人風度寄興整雅將駸駸乎陶韋之畦町矣近世言詩莫不以三百篇為主經緯之分茫不知所以由逺自邇漸入魏晉詩寧有不工者乎思齊敏而且勤輟食忘寢和平多而凄怨少氣完體充不以沮折為可撓事物之來處益有暇故其見於心聲者無羇窮不偶之意讀其詩以余言為證斯得之矣書吳明之文編後始余見閩清吳明之于成均神度秀朗遊于公卿將以竒言直氣感動鉤説輒同坐席復與一時之能文詞者聲摩度測守繩合則駸駸乎班馬之軌轍而建安黃初之餘事將力進而不肯止也余既得請歸隱山中江浙挽余以校文會有亡子之戚旬日即出後知明之試進士不中幸不余誚而深病有司之不察也暨來四明將返閩中示其所為詩文若干卷讀之不能置是誠得於逺逰者多矣見聞窘于州閭舂糧之適不足以自廣而冒萬里者多大言以賈禍若明之之遊歷漸摩薰陶悉輯於翰墨藉爾求配于古人誠不為過使果有遭吾見其揚于王庭清逺自儀潤色敷繹詎止于是編之所述哉因書以為異日之俟泰㝎三年十有二月辛未朔見一居士袁桷書題雲岡圗詩卷王侯叔能守會稽將悉意山水以攄其夙慕下車未幾沿省檄治舶事往來市衢意若有不樂值寧侯善繪事命作雲岡圗朝夕觀覽蘧蘧栩栩見似人而喜者也余嘗聞巖居谷隱之士有言夫細旃廣厦未嘗不心掉目駭而久居朝廷者志念専寂凡其可喜可愕之事皆不足以動故其於山林之趣介乎其不拔一使肥遁將終焉以無悔若是則賦此圗者其為招隱乎其為反招隱乎書馬元帥救荒事實後司獄永嘉林君萬里彚次元帥馬公救荒事實一巨編俾有言嗟夫斂散之法不行于今為牧守者亦難矣因時之凶復抑其直是則於商旅奚有望焉董煟輯救荒書至盡至美迄莫能有遵其説而行之者病在於執一虛心以求則今馬公之政其近之矣林君之編曰台民四十九萬有竒其粟率糶者一十四萬七千有竒糾於冨家幾三萬石有竒當是時以一郡之民能動于上聽其出粟至于一十有四萬非身任其責所為文書不大懇切不能至是冨民遭荒抑損以售亦必有道數盈于三萬則其便不便有不得已而然者也視瘠而坐弊仁人之所不忍邀名以幸成夫豈仁人之用心馬公之政集衆思以為其佐林君之為首奉行而不失者皆公所辟佐吏凡五人見於所行事實不復著記禮之言曰三十年之通制國用量入以為出馬公耆德碩望將參預于天朝願以今之所行為權而以經制告于廟堂焉則得矣書孫孝子事實余待罪翰苑見友人張希孟郭幹卿所為孫孝子碑及序引卓卓表著二友非取佞以恱夫人者今歸老田里又見程琚孟夢恂二文士作孝子傳事益詳密文雖不同而紀載各有條理信矣哉事至實者易于言孝非以干名而名隨之是見信於州里有不得掩焉者矣五典之常心之固有聖人設為司徒以職其教唐虞之世見於旌表是則上古猶有失其良心者今觀孝子之行事悉合於五典刻意肥遁乃今起家入御史府䇿名振德政事施設皆其素所蓄藴觀風宣化家至而户喻矧今為澄清使者薄敦懦立反其澆漓惇行孝悌悉以其躬行施于七郡不亦美乎孝子今為浙東肅政僉事名楫字濟川泰㝎二年二月甲辰前史官袁桷書書戒壇儀後余居鄰開元寺其戒壇精嚴肅靜過者莫不悚息間遇度僧必一往閲之見其結跏藉草持怖畏想口誦加護不絶天神炳靈至有登壇仆絶不能終事者由是雖獰夫惡子率罔敢廢懈噫使常持是心安有所謂地獄也耶悟心源律師㝎上壇結夏等儀式願廣施諸方使人人如初受具足戒時清淨法海與大雄氏告衆無異不然酒池肉林罪劫可勝道哉書大般若經關後大雄氏以汪洋廣博之説喻於羣迷萬緒千説故其為書讀之茫然不知畔岸師其説者始作關籥以抽其祕由是旁行側注機要立具夫相從心起食息之際其來無端即其書以求似若未盡捨相以求則所謂一者猶以為形迹也皇祐庚寅有僧省悟以三藏法師大般若經通關重加校㝎至皇元泰㝎甲子實相距二百七十五年時有演忠律師其名亦曰省悟復為聲聞入道行位記三卷輔昔時之未備殆與前哲夙相吻合體一分殊吾儒之説近世釋氏率竊取以為祕探索於毫釐之際殊失其旨矣自博而約吾於是書深有取焉悟師類其書簡密將與後來者共異時執一以持捨一以悟則觀是書者為入道之軌轍明矣書文宗周祕藏圖詩卷宗周法師作祕藏圖深取吾儒一貫之理昔濂溪周先生衍太極圖體一而用異歸其異于同則用猶一也斐然默契不能已于言而法師舂容鏗鏘振孤桐之遺響發天籟之靈窽又率其講下珠聫璧耀將極其深造不出乎祕藏之旨而其融液變化雖億萬猶以為未盡歸一之效于是乎見桷老矣倦遊相望南湖跬步還往之便願自此始題噩上人疊秀軒賦後楚之詞不作久矣朝無咎氏始分其言為二淵乎得其微旨離騷九歌判不相合漢魏而降一而為之縝密者為揚馬反復悲悼漢帝所謂鄰於楚之聲也左太沖融液藻繪能為一繼者不復若是朝氏豈虛語哉吾鄉髙端叔先生作變離騷直與古昔相抗而或者謂羇窮不偶怨悱不得以自振今噩上人作驃騎山賦及疊秀冽清二賦手而讀之誠駸駸乎古作矣渡江以來諸賢蹈襲蘇學以雄快直致為夸詩與文率相成風科舉學盛屈宋不入於口耳積弊幾二百年山林枯稿之士尚何能冀其髣象是則皆吾徒之罪也上人語精意新無模塹之弊言道也師逺遊託興也鄰九辨嗟乎余老矣上人當勉之投間謝事願相與過從將復見於雪竇玉几諸山斯幸矣泰定二年閏月乙亥清容居士書書禪林備用周官擯相行祀升降玉帛之事禮為禮儀為儀何謂禮執以告王者是也儀者陳設綴兆之位一㝎而莫易者也經籍既焚淹中之出不全後人以意損益僅見于朝著若少儀內則弟子職所當行于家庭一切廢棄儒先屢致意焉釋氏之教為三宗見于動作日用不敢一有犯越者為律宗逹磨之學則不然調伏于準繩之外放形骸黜邊幅守禮者莫能與之辨而其從心不踰矩卒有合于自然是則繕性之效略外以理內于斯見之矣淫欲嗔恚皆謂之道大雄氏託言為喻將以語夫上知愚者不察悉得以自恣職教者憂之於是為清規而曲為之防數百年來遵守罔替世愈薄而俗愈侈竒邪曼美充滿區宇澤山咸大師始輯廣其未備詢于耆舊證于編簡作備用十卷以拯其極壞其勤苦之志于是書足以見之余嘗聞咸師縛律以為禪守其師説不肯以從于人清嚴峻整講道不輟頑薄敬避其死也尢竒偉余愍夫吾儒之教淪弊若是使有若斯人者一正之斯得矣序其書所以識吾徒之未能也書噩上人慈照師行述後佛氏之言以理譬廣釋心性其言汪洋浩博譯潤有工拙而體製則一可得而同也宋世諸儒言理者率不以文字為工論考古昔措于五經則或有疑者焉太史公敘事幽顯變化猶龍焉不能以名狀後世宗之編年之法幾絶而今世所為志碣行述悉祖襲莫能有違者夫發揚會稡因其事之實而為之也反復致意傷其不偶而表之也豐㓛巨績被于絃歌鼎彝者則又皆太史之事荒林絶壑曠逹沖淡非有道之士不能為其言也言佛者三宗而習禪學者必以悟入為證將從其言邪則質野不足以傳逺引而刪之又懼不與其道合噩上人示所為慈照師行狀泊兮若玄酒之致其誠韜兮若絅衣之蒙其飾逞竒闡幽大小委折各當其職合儒者之辭以盡緣飾包括纎粟絶其疵俚是其言也傳信永逺為無疑也余嘗聞慈照師剛毅貞固內外有則故所至成立上人文足以發之因書以告其同志㑭入石勿墜泰㝎二年十月丙申清容居士書題轟上人詩卷華嚴極天下之富麗樹下塜間又何其岑寂邪乃知豐儉博約從心以生芥子須彌之喻豈虛語哉觀轟上人西隱亭榭諸詩有遍法界之道將隨境以觀懼其多岐而亡羊也掩關息機真遊于混沌之鄊萬幻俱滅胸中樓閣豈土木丹漆之所能成吾將與上人一叩其户牖焉題雪竇平禪師詩卷大梁張武子來吾鄊始正唐律由是禪林悉守其法雖頌古詠物清切婉潤足以追配牧之商隱怡雲師蓋一時與之從遊近朱近墨豈虛語哉由今而論獨僧詩猶能守格律而吾徒一切直致恬然不事修飾觀此足以泚顙龜石寺號小院然多出名輩怡雲師之漸摩灌溉於是乎見題雪竇潛師語録後用潛師住清涼先郡公將挽主㝎水未幾上雪竇不果幼歲祝髮于觀禪師不久而觀謝世乃痛自卓立遊諸方能采其所長不專於一師而其貫通融會慊然猶以為未足由是瓣香之酬靳未肯出禪林有疑而桷獨能探用潛之意佛之學道非止一悟用潛能深知之今世禪人之病在於望風承嗣以希進用而居顯路者旁收曲誘了不相涉其弊日甚推用潛之用心玩其語言有至死不休之意廣其傳將以愧夫今世之弊庸敘於前足以知余言之非妄也書笑堂偈頌後拈花微笑大雄傳道之旨也不笑不足以為道老子憤世之論也近世禪人掃迹削機謂微笑為疵病卒致漫誕不可救藥影響既絶而道益無所見聞禪師在淳祐間羣公傾下以平實為法門因西律師之請號為笑堂是深得迦葉之要領感而遂通夫豈虛語也哉西律師已下世矣其徒寧上人能寶此卷倘以聲色觀虛空將大笑矣泰㝎三年某月某日清容居士書題俊老語録顯仁藏用非言不足以宣而絺辭繪句悉墮於浮繁唯大雄氏絶其萌芽刋落無文土苴瓦礫不足以喻其拙也由是禪宗沿襲千士一律使人冥行不知其所謂畔岸明極長老以其示世語㑭有敘蓋其不得已于言者歸於大朴而其足以陶冶性情見之於歌詩發之於言辨聲從字順使人得以知其指示非過為椎魯以誑盲聾者余壯歲讀四家語於育王珙禪師曰語有實地有證地若華嚴所演豈空幻哉明極語將大行於世敢敘以證之跋觀禪師石菖蒲賦後廖寺丞賈相之門客于時方歌舞湖山沈酣恣縱不知有泉石清事觀禪師持此以奉鋪敘宏麗末章以主賓輔仁㓛為急用意深矣厥今湖曲凄迷藤蔓一色不知此本流落何所言此可為於邑跋觀禪師摩利支天贊觀禪師此贊為賈相作維釋迦慈悲廣度敕諸天以護衛濁世非黨私滅公徇其所請江上祈和乃拘留信使罔上以為竒㓛使終日𣑽唄香雲滿室神其吐之矣觀師言語不迫隱然恤緯之憂厥後師潰身竄三尺童孺猶指罵不絶桷幼歲親覩其事今老矣尚忍言之書薛嚴二道士雙清編余幼好讀黃庭真誥二書私謂學古調詩當準其音節程度後讀陳子昂李太白諸賢詩飄飄然清逸沖逺纎言腐語刋落俱盡則知二書要其標準矣渡江諸賢明切理性間為禪人偈語謂與風雩川上相表裏詩道浸廢而所謂道家者流方自治其學不復寄適于吟詠之末噫實吾黨有以使之然也臨川道士危㓛逺以雙清詩一編示余考其歲年儒者之言詩者正絶而薛嚴二師方往來龍虎山中搜遐挈緒求遺音于魯壁之既壞宫商相宣更迭振響豈久于其道而能化者與夫學詩而為魏晉有道之語亦少近古其不至成就力不逮焉耳習簡易近體遽謂理趣譬之酒焉因其薄醨而強以三齊玄酒第之不幾于過矣二師詩足以昌其道余獨惓惓焉致意而不置者愧吾徒之學為可愍而不在于今日之弊也薛君志行潔清不自表眩觀妙公嘗尊異之嚴亦簡整自治㓛逺云清容居士集卷第五十
