front:
  text: 清容居士集卷第四十五
  hash: sha256:4bc9ae4862c3e482fcd81ee1eaca647d22e3e03279065cb190d5a452cb528671
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_045-1a}
body:
  text: 題跋皇姑魯國大長公主圖畫奉教題徽宗扇面水殿風髙菡蓞清手題紈扇墨花輕君王猶道宫中熱竟上臨潢五國城定武蘭亭薛郎輕薄盜為鄰蟹爪金鐘眩世人從此子孫千百億錦囊玉軸各稱真牧羊圖髙栁風清曉日蒼牧童隨處候隂凉似嫌挾䇿當年客物我胸中兩未忘吳元瑜四時折枝吳生天機握羣動彩筆隨時作輕重幽如靜士槃澗歌妍若妖娥漢宫寵娟娟交鳴疑欲語宛轉不去情相送宣和殿前花似玉珍禽低昻手堪捧傳言寫生論甲乙御筆親題羣輩竦一朝百幻歸逝水舊苑凄凉麥成壟君不見桑間栗留田間雀難作折枝奉宣索九馬圖九衢塵沸各低頭水暗荒陂得自由矯首天池欲歸去乘風緩從玉皇游江貫道煙雨圖江生泉石本膏肓刻削經營入渺茫老樹雨深龍翼重隔川雲冷縠紋長吟鞍欲度愁溪徑漁艇將歸認石梁擬向此中尋隱計底須紫禁謁虛皇行在所一夕而卒貫道紹興間召至周增水塘秋禽圖蘆葦蕭蕭秋水清拒霜迎日鬪紅英鵁鶄屬玉休驚訝嵗晚江天得共行王振鵬狸奴畫堂緑幕鎮犀懸花影雲隂得散眠自是主家扃鎖密晚風緣木捕新蟬天王供佛圖諸天陳妙供奉佛演大乘佛以施受之佛亦墮因果所施不願報自然福無量布金與獻花輕重同一念若以多寡論冨者日增益天王護虛空如月七寶合正覺無等夷即不入生滅世人重施報萬劫成輪回問佛佛不言彈指即成就徐白秋塘戲魚圖魚背水深一尺溪毛日映千絲似笑釣鼇狂客獨騎瘦馬歸遲惠崇小景惠崇作畫荆國王文公屢褒奬之亰卞作宣和譜堅黜之何耶余嘗評惠崇逺景不踰于吳頭楚尾殆如大年朝陵止見西洛山水然黃太史作詩曰坐我瀟湘洞庭豈其芒鞋踰楚而南胸次浩蕩非少年所作也此卷得之黃太史松風閣詩謂松有風松不知謂風入松風無形聲繇形始成言六書者取焉肇于無名入于有名萬化之始吾未始以妄聽松動風動當於混沌以前得之斯可矣王生鬼戲圖青天白日其呈怪獻醜乃敢是昔人嘗云有錢鬼可使無錢鬼揶揄作斯圖者其無乃逆旅燈下見其情狀抑亦貂裘珠帽視窶人子類以此目之邪出山佛像世尊雪山成道時日食一麻一米其枯槁蓋可見天王八十億衆猶未深伏故其獰雄怪醜溢于面目胡跪合掌當是净瓶不動以後儀相若曰相好端嚴閉目則失相由目成有相俱妄或有問曰丈六金身真妄曷辨答者曰清净妙法身無住亦無去明月印海波白雲倚巖樹折枝錢生調露滴花枝蜂蝶無知鎮日隨記得畫橋流水處雙紅背立隔簾窺隆茂宗羅漢子昻評畫要是具眼隆無住葉石林門僧久居辨山故其作畫極多德夀宫評畫以隆為龍眠嫡嗣今觀此卷信然周昉金星兊景肅萬寶秋水瀉銀潢渺渺帝子降寶冠縠文裳凝睇白玉京晶熒動瑶光手弄鵾雞絃運撥雲飛揚正心秉無回緩節申以商西游升廣寒東廽從扶桑龜臺鈞天奏八景儼髙張出入復安窮隱見定有常閶闔下符貺嗣嵗歌穰穰稽首連蜷靈萬年奉虛皇黃居寶湖石水禽圖峩眉雲疊翠凄迷更著層峯小殿西誰信蜀王辭劒閣鴛鴦飛盡杜鵑啼𣑽隆護法神威音無喜亦無嗔獰目揚眉定有因欲識世間平等觀雲如流水月如輪馬賁秋塘水禽圖古木荒陂淡淡秋禽鳬髙下意夷猶似憐天際南飛鴈年去年來不自由孤鶴圖一庭凉月白萬里海雲清似欲乘天女排空入帝京唐摹鍾繇賀捷表賀捷表唐摹有二本楮河南微瘦而徑峭徐季海差肥而沈著此本蓋自季海來若希白長沙帖所摹則祖河南舊本施武子墓田丙舍石刻與此筆法無異觀此足以知前人鈎榻之工孔世三十八白而長身猶取其類况此實曽玄也與冝重寶之傳古龍贊下土焦聲嗷嘈靈在湫蕩游遨鼓以風挾以濤受帝令行林臯百穀成神㓛韜庶徴叙靈靡勞何尊師醉猫攪甕翻盆勢不禁晚風辭醉首岑岑醒來獨立䦨干畔四壁無聲蟋蟀吟羅漢圖四果圓融得自如天台樓閣總虛無何人繪畫供青眼拍手雲中笑客愚錢舜舉禾鼠七尺長身愧負多清時空食幾囷禾營營蒼鼠饞分寸不奈詩人總譴訶徽宗鸂鶒太液池清皺碧羅兩禽相對蕩春波當年肯憶閻中令䑛筆和鉛恨未磨徽宗桃核圖其廣幾尺三足之烏千嵗芝當年曽作帝王癡黃龍府裏沙溪淺凖擬平分作酒巵蕭照江山圖蕭郎解作湖山圖上皇一見玉色愈明知此景落歌舞别灑妙墨為訏謨長江吐吞恨無極突兀金鼇障西北雞鳴不聞中夜起零落烽臺候朝夕蒙衝揚帆去如仰遙望青徐在吾掌諸公坐談籌畫疏年年送使瓜州上輪囷米舟踰沔水驕將髙眠載吳妓卷蘆吹笛斜陽愁折箠投江等兒戲只今承平五十年蜀荆賈客船相聮箜篌傳歌賽神舞不信人間有今古順宗墨行濃淡娟娟涼月低昻淺淺春雲胸次何須千畝筆端咫尺平分臣然山水空江浩蕩挾秋聲不是匡廬只秣陵老子定回神觀靜笑渠艇子浪千層趙昌折枝瑶池朵朵玉精神滴露研朱竟奪真蛺蝶不知遮繡幕飛來猶認故園春時苖留犢圖伯夷采薇身苦飢人言周土夷受譏鶴翻孤松蟬嘒栁潔腹得免身中肥昔聞汲井嘗投錢清白之子推父縑人生作事在平易鄒子受金非慊然時君作吏心不懈一犢相辭匪竒怪當年孝廉爭入徴壷飱柴車魏王令徽宗瓊蘭殿記足以指顧其髣佛記中云湖湘佳致玉殿遙思湘水逰欲看虞帝九疑秋二君野死難相似宫女當年一樣愁蘇李河梁圖李藻曽作河梁客山廽溪水灣春看人北上秋見鴈南還燕文貴山水雲州雲應縣主簿翰林學士將仕郎守晚色蒼茫外秋聲縹眇間亂溪環水佩千嶂疊雲鬟曉瀑村舂急風林寺鐸間片帆如可託吾欲與君還海潮圖銀潢清淺瑞星輝的的秋光下紫微欲識潮音真實相落迦山畔五銖衣海狗窠石圖靈璧層峯負六鼇藥欄花檻翠周遭如何畫史同羣吠不與君王繪旅􅋙王振鵬錦標圖界畫家以王士元郭忠恕為第一余嘗聞畫史言尺寸層疊皆以凖繩為則殆猶修內司法式分秒不得踰越今聞王君以墨為濃淡髙下是殆以筆為尺也僚丸秋奕未嘗以繩墨論孫吳之論兵亦猶是也然嘗聞鍳古之道必繇其侈靡者言之余于畫斷有取焉龍舟之圖得無近似不然昔之所傳者安得久逺至是耶徽宗梅雀圖金帝母家宋外孫筆畫好樂餘風存披圖勘書儼相似天水别記牙籖分明昌宫中三萬軸盡日雲窗看不足平明鐵騎踰河來玉􅞃金題碎車轂上皇寫生工入神一枝瀟灑江南春天興之初汝南失猶解傳藏記年日元年藏記卷題天興為言當年愛遺墨不如洗手還河北黃宗道播州楊氏女長頭黑髮垂玄雲矯矯馬首雙手分雕弓寶刀左右挾欲領鐡騎趍崑崙前關濤湧如壞墻後寨百溜奔溪篁羣蠻簇唇爭呌囂云是楊家女子㓛最髙旋如長蛇轉空洞快若俊鶻凌風飄還家膏沐帶簮珥父母見之眼垂淚君不聞木蘭女兒著金鎧年少從軍顔不改一朝脫役歸故鄉樂府相傳至今在魯國大長公主圖畫記至治三年三月甲寅魯國大長公主集中書議事執政官翰林集賢成均之在位者悉㑹于南城之天慶寺命祕書監丞李某為之主其王府之寮寀悉以佐執事籩豆靜嘉尊斚潔清酒不强飲簮佩雜錯水陸畢湊各執禮盡歡以承飫賜而莫敢自恣酒闌出圖畫若干卷命隨其所能俾識于後禮成復命能文詞者叙其嵗月以昭示來世竊嘗聞之五經之傳左圖是先女史之訓有取于繪畫將以正其視聽絶其念慮誠不以五采之可接而為之也先王以房中之歌逹於上下而草木蟲魚之纎悉因物以喻意觀文以鑒古審時知變其謹於朝夕者盡矣至於宫室有圖則知夫禮之不可僣溝洫田野則知夫民生之日勞朝覲贊享冕服懸樂詳其儀而慎别之者亦將以寓其警戒之道是則魯國之所以􅊞藏而躬玩之者試有得夫五經之深意夫豈若嗜竒哆聞之士為耳目計哉河水之精上為天漢昭回萬物矞雲興而英露集也吾知縑緗之積寶氣旁逹候占者必於是乎得泰定元年正月具官袁桷記清容居士集卷第四十五
