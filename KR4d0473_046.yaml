body:
  text: 題跋書孝宗賜史忠定王褒賢臣頌後右王褒聖主得賢臣頌乾道八年先忠定王守福唐孝宗皇帝御書遣使繇郡治所賜也始忠定爲直講時嘗沐是賜實署御名且書王字于後是後繳帖以進遂復被是賜焉猗歟盛哉惟聖主之得賢臣唯髙宗傳説事相脗合方王之爲直講訏謨定計盖已見扵三善之陳告監先王之成憲惟孝宗足以承式克欽承旁招俊乂惟忠定足以繼舊學之素夫豈若持守希阿光禹輩然哉故其在相位也知恢復為正論時有未至則寜受衆誚而不避相位三月正色引去未㡬符離潰師張魏公首乞速定和議則昔之未敢出師盖實在是家居十年王之心事露白扵天而昔之言恢復者皆大言取官位一無所成就至是君臣交孚過闕入對寳畫森著實彰厥㫖非偶然也桷之外大父敷文户部為王嫡孫是生㑹稽郡君桷實親出學術荒薄為國朝史官十五年獲纂金宋舊史簡帙繁廣猶未克就五世孫公升王之大宗獲寳是卷他日願上扵太史㑭有考焉延祐七年十月己酉外曽孫具官袁桷拜手頓首謹書書彭忠毅汝方贈官誥後忠毅公實尚書噐資公之親弟以尚書門㓛補太廟齋郎故終身為右選官方臘䧟歙睦杭三州衢介扵中公以孤城分守卒罵賊以死當時贈典亦至厚矣嗚呼豐亨豫大之説行馴致靖康長驅中原皆望風迎降嘗讀兩朝忠義録而悲之則公盖居其首見危致命臣子之當為徹彼桑土不能不憾扵宣政之事使龍圖公正色朝著事寜有是哉書髙安蔡中允誥後嗚呼宋仁宗世康節邵先生以為日之方中至今南北議論無以易何則賢人多而朝廷治故也今觀髙安蔡中允誥身而桷世為史官請得以考焉故事進士第一獨命詞以其相繼者為首次其甲乙若幕職縣佐則緫其詞命以畀之石揚休字昌言眉山人蘇明允先生所敬尊者以髙第為同州推官誥中首稱是也元豐前率沿唐官制舊六曹尚書侍郎緫為階官入政府始得之吏部専職則有三班審官流内銓等官誥中署權判即判流内銓也知制誥舍人職也亦元豐正之翰林學士權判曰郊宋郊也言前已改名非也李淑五為翰林學士景祐間元憲同院淑忌其先登譛之曰姓符國號名應祀天實斯年也始更名焉曰絳陽夏謝希深也謂為韓絳者亦非也是年父億為參知政事無父子同要地之理竊考仁宗更元凡九而史官與歴年圖景祐止四年為寳元今誥曰景祐五年倘不知者寜不置疑焉吾敢為蔡氏子孫言之景祐實有五年六月前猶五年也至秋七月郊上尊號曰寳元皇帝凡十四字遂更寳元焉是則自七月始為寳元紀年者莫知遂悉以實元元年書之先正獻公以秘書監禮部侍郎領史事先越公為秘丞著作郎覩舊史聞扵家庭者若是輔之不鄙謂余世習臺閣故事遂書以歸若夫賛美感慨有諸賢說在不容扵言矣至治元年九月丁丑史官袁桷書題放翁訓子帖放翁先生送其子之官獨書荘子二章以訓或曰五經切近而書荘子何耶余曰自農師右丞師尊臨川臨川宗老荘故其家學世守之此二章足以涉世變清而容物逺禍之基也喜怒哀樂不入扵胷次進徳之本也紹熈黨禍萌蘖故逢迎者廢扵嘉定標榜者錮扵慶元雖善惡岐而當時仕進者寜不自重先生教子之意深矣晚嵗一出終能全身以歸觀此盖可知矣袁桷書題汪龍溪與從子書後汪氏皆祖新安故先生祭其逺祖有曰散處諸邑非雲則仍今玉山番陽宣城新安皆同所自獨新安之宗其别爲三貴賤貧富角立不相通叙世逺源分故若是耶先生居饒之徳興而宣城諸房皆祖之先生嘗謝其宗衮舉刻有曰渡江而上傷不見扵它揚其敦叙同姓無彼我之異中興誥令盖合王蘇之精整明暢文獻益逺桷以荒陋備員詞林踰十年每惕念罔敢替敬觀遺墨因以識景仰之志至治元年十月壬戌四眀後學袁桷書跋朱文公與辛稼軒手書晦庵嘗以卓犖奇才股肱王室期辛公此帖復以克已復禮相勉朋友琢磨之道備矣嘗聞先生盛年以恢復為最急議晚嵗則曰用兵當在數十年後辛公開禧之際亦曰更須二十年閲歴之深老少議論自有不同焉者矣公所居號帶湖一夕而燼時文公猶無恙慶元四年公復殿撰此書盖戊午嵗以後所作至六年則文公夢奠矣今觀此帖益知前賢講道彌老不廢炳燭之㓛良有以也夫跋蔡君謨帖蘇文忠評忠惠行書第一後見莆田所刻亦主此論亰卞師其從兄而名莭虧䘮愧恧多矣爾雅姊妹之子為甥至晉世則謂之郎忠惠日習晉帖語與之俱化矣題曽文昭詩文昭文肅當貧苦時皆舎人撫字迄見有成至扵制誥則殆青過扵藍尚書省記實公所作後評文者謂當為萬世法噐資番陽彭公與公同臺熈豐改更乃若有不同者幸以内相謝事卒為全人後作史者宜深考焉跋曽文肅帖顧子敦為河北轉運時實司馬公作相之時子宣猶在外服建中調停之説既興善惡玉石黨碑既成則子宣亦復同傳後之作史其去取為如何嘗讀丞相日記類其子姪若公衮輩繅飾術不可不慎扵紹興作史見之跋楊補之月賦逃禪老人出處清峭當與魏林同傳思陵愛其所作宫梅将召見之一夕遁去此真方外士昔人言蜀無他楊以九州言揚州或言輕揚或言維揚子雲寂寞賴此能紹宗矣跋米元章帖中年養生惟獨宿第一東坡貶謫有權發遣之語山谷戒行堅嚴有漫種老生涯之詩信知未易脱釋景逺余故人能寳襄陽二帖晚嵗煎熬良不能自存釋氏嘗扵此騐生死關聞之者足以戒矣書東坡寄真隐詩東坡先生作續養生論知及之而未知守者晚嵗慕丹元子真隐翁桷嘗深疑之道以氣為母文以思為宗二者相反聚散有不同耳神行六虚止者合扵自然朝市而能之者無是也故近世方外之説釋性命為二途平叔之學不復傳言語動作一謂之性卒未見有超然者巽堂内翰明至理通玄微異時登紫霄峰願相與竟其説坡僊㳺八極之表必撫掌視吾二人矣跋晉帖晉帖見扵淳化多不成文盖唐文皇去其斷爛以成卷軸今十七帖號可讀餘則不然矣姜堯章作絳帖釋文旁證曲引有㓛於金石缺亦疑之此帖盖唐人榻本欲求文義則㡬臆說矣跋于湖帖于湖先生與王宣子皆紹興進士第一而皆以政事發身二公皆守湖南此帖盖于湖江東宣子尹京時也杼山劉季髙寓金陵于湖守行宫納謁杼山杼山曰守謁當有故于湖曰願求書法杼山野服以肅于湖拜而授之今其書盖與劉無異也文獻彫落因巽堂内翰出其書敢以過庭所聞者告焉書陸子履賀復熈河詩後王樞宻開熈河㓛成而萬骨枯矣至元祐初司馬公堅欲棄横山之地深恐生事之人復啓邉隙故耳維州牛李之事是温公去取之本心後之評史當扵是考焉陸子履歐公之上客作是詩其亦有媚夫上之意厥今皇圖窮吐蕃而西唐宋之耻一洗而盡時則有若緫帥汪公以元戎經略桷舊為史官得鋪揚其偉績今獲觀此卷始知英賢夷考徃事以展拓其素藴盛矣哉跋定武稧帖歐陽公著集古録言定武二民家各有石較其本纎毫不異是則定武有二本從来久矣後宋諸賢謂薛向之子嗣昌私易定武本别刻石以留公庫此論千人一律今以歐公所論則明有二本薛守定武果易以歸則民間猶有一本是公庫本為第三本矣議者又謂嗣昌鑱損湍流帶右天以亂真後入宣和曲水亭余嘗毫髪辨證亦微有不同此卷壓角小印正嗣昌名印而米襄陽親跋尤真舊蔵張參政孝伯家其子寺丞即之以書名一時大變古體遂不能傳印識猶可考也今以余平昔所見本悉䟽于後不損本趙眀誠本前有李龍眠蜀紙畫右軍象後明誠親跋眀誠之妻李易安夫人避難寓吾里之奉化其書畫散落徃徃故家多得之後有紹勲小印盖史中令所用印圖畫者今在燕山張氏家王順伯本第一跋是王黼順伯名厚之號復齋有金石録家蔵石刻鍾鼎篆籀鑑銘泉譜侔内府其家兵後不廢近嵗丁未饑越新昌尤慘遂悉散落始歸于龍翔道士黄石翁黄秘不示人後有順伯為浙西提舉時携入秘省諸賢題名皆有其最著者樓宣獻劉文節今亦歸張氏趙子俊孟籲得扵閩中有樓宣獻跋剪碎作冊葉與前二本無異今歸子昻承㫖家蘇承㫖易簡第一跋後有元豐諸賢同觀于鄞之城南崇法院有舒信道字畫然不著名在内侍譚氏家精神無毫髪恨趙子固本舟過嘉興遇風舟没子固疾呼曰蘭亭在否舟人負以出子固作跋識其事復題八大字曰姓命可輕此寳難得子固死入賈相家賈敗籍于官有官印歸濟南張參政斯立今在集賢大學士李叔固家潘經略畤本題識皆徳鄜手書滿軸余以有米跋本遂贈鄧善之文原鄧借田師孟師孟有借書不還癖因留之余跋乃剪去矣損本龍圖閣學士劉公克荘本細書滿紙後有賈相跋亦滿紙括蒼鄭陶孫為福建儒學副提舉得之為翰林應奉貧質于甆噐劉氏屢入子錢卒以逋重為劉氏所得有叔信父印損本多有叔信父篆印盖宣和曲水亭既成亟以御筆繇亰兆薛嗣昌家宣取留内璫所暮夜以匱金紙翼紙即越蟬疊三紙連印故下本肥中本着中上本微瘦然皆無異此本子昂得扵都城装成冊葉甆噐劉生手之不置以銀壷杯盂易之翰林承旨趙孟頫家本得扵霅溪陳侍郎振孫伯玉號直齋其家蔵書冠東南今盡散落余家亦得其數十種此本亦有叔信甫印翰林侍讀學士張伯淳本有黄豫章跋余每疑鑱損與山谷差有後先然本無異前數本更俟他日以考題薛紹彭帖長安薛道祖與米元章劉巨濟為三友朝夕議論晉唐雜蹟圖畫然其作字則各自成一家紹興中購薛米書最急率以小璽印縫後御府刻米帖十卷而道祖書不得入石客杭見道祖書一巨卷于駙馬都尉楊公家精神峻整遂深疑紹興不入石之故問於子昻子昻曰薛書誠美微有按模脱墼之嫌余不能書而深識其語私嘗謂米襄陽書政如黄太史作詩之變芒角刷掠求扵匵韞川媚則蔑有矣學魯獨居之男子於道祖見之至治二年八月乙亥袁桷記魯公坐位帖坐位帖真蹟在亰兆安氏家嘗刻以傳世吴中復守永興謂安氏石未盡筆法因再模刻此二本余家咸有之安氏子孫分析坐位帖乃剖為二此帖至行香寺僕射指後不復有盖吴安石刻本卓頭髙指後别為一行遂由是平分為兩是安氏兄弟不學之謬東坡見安師文時帖尚全嘗手搨數十本余得坡公搨本於東平王氏無纎毫失真旁用眉陽蘇氏及趙郡蘇軾印記米襄陽少年嘗臨之邵伯温亦云安氏析後不復見全本此卷筆法絶類米老徃見乞米帖墨蹟扵子昻家子昻以重資得之余心有疑而不敢言余得此帖紙色行墨絶相類遂定為米老所臨無疑延祐二年八月丁丑袁桷氏記書梅聖俞詩後都官公與歐陽公繇河南幕府締交最久至嘉祐元年始一薦為直講距都官之死僅五年耳故王荆公挽詩有云貴人憐公青兩眸吹嘘可使髙岑樓坐令隐約不見收空能乞錢助饙餾此盖為歐公發也崑體之變至公而大成變扵江西律吕失而渾厚乖馴致後宋弊有不勝言者敬觀詩帖精思以求益為之懼至治三年嵗次癸亥正月丁未後學袁桷書黄華帖名庭筠米襄陽學段季展得其刷掠奮迅故作大字悉祖之考諸右軍筆陣實未有是體蕭齋丈二盖其鼻祖季展之變繇是始沈傳師實為雲仍米良有所本矣黄華老人百一帖評品悉祖寳章故其大字超軼抗衡桷舊閲金帝實録老人為脩撰時坐擅議朝政受杖噫使在慶暦元祐寜有是耶至治三年二月史官袁桷書書錢王板授某官長洲縣五代擾攘十國各有年號獨武肅不以數十州之地自負﨑嶇航海入貢中土其設心置慮良逺至再傳則亦建立元號良繇更易不常尊重其一方者不得不爾唐末多板授官扵此見之唐有敕授官與此亡異隆殺有等唯錢氏能守之相時以行一門盛事上極宰輔内為都尉與宋同為終始吁盛矣哉吴越皆本武肅而散處淮甸亦其苖裔展觀無斁因為之書書孔子廟堂碑永興公守智永舊法故唐能書人盡變唯永興號為第一以右軍譜系猶在也余嘗見大周本於故家精神遒整其雲仍散落不復可考此當在嫡孫行唐人唯魏華得正傳孔頴逹碑與虞相佀或云孔卒時永興下世已乆書皇甫君碑渤海公以險勁易王體故碑石照耀四裔大小皆合宜右軍世傳皆小楷霜寒帖稍展至筆陣圖則疑非真再傳為千文為廟堂碑確守繩墨稍廣拓非歐不能余嘗評歐書化度第一皇甫碑與温恭公伯仲臨池積年必領其妙余㓜不學書酷喜蔵歴代金石覧此益重自棄之歎題劉共甫與朱文公書劉共甫樞宻世濟忠節而其文詞詔示扵隆興乾道之際四方聳動詎止一經生學士哉樞宻隧碑實文公所撰文公受知樞宻實繇韋齋吏部先友事契此書盖在江東留守時所作扶植故家觧釋僚友非盛徳不至是古道寥落肅觀益増泚顙至治三年十有二月袁桷書跋李公擇尚書帖公擇尚書手蹟惟鳯墅石刻一見之元祐間為正人以黄太史為甥它不足論山房蔵書以待天下士盛徳至矣㢤題子昂書靈寳經承旨公作小楷着紙如飛每謂歐楮而下不足論此經尾題距下世纔兩月痛當作慟書徽宗御書詩道君書此詩當在寳籙宫所製筆法飛動有凌雲步虚之意真元杳冥真元在杳冥詩中有一㸃句之騐扵五國城下殆詩䜟與㤗定元年三月癸夘袁桷書跋李時雍墨蹟思陵翰墨志謂熈豐以後蔡襄李時雍體製方入格律繇是紹興初年二公字畫俱用紹興小璽印縫此卷政初年所收宋世諸賢筆法終不逮唐隴西公書深有懐素氣象觀此足以知其源委徽宗賜温益搨本黄庭温益以王邸舊僚崇寜初即拜中書侍郎其傾邪翕訿見扵陳忠肅公之䟽迫鄒忠公渡海侵侮范忠宣諸賢之貶湖南而崇寜之主愈近而不疑何哉賈生師傅之論得之矣益死未二十年而其子已登次對典大藩又何哉國之亡也宜矣黄庭真蹟在建中靖國刻為秘閣續帖後易為大觀帖余舊得劉無言雙鉤蘭亭今復得此感昔人寵遇之非當因書以為纍臣之痛㤗定二年七月丙寅袁桷記跋米元章書趙崇公墓誌故事宗室墓誌例属翰苑撰述嘗觀歐陽公王華陽李淇水王臨川所撰殆得玉牒之五六而其蕃衍盛大一一皆然今觀崇公墓誌多有可書故鄭太宰所作得盡製作之美噫京城括索盡籍以行獨太祖諸孫號為䟽逺渡江勃興皆得奉朝請人事之不可料襄陽此卷龍跳虎卧不盡賛述太宰此文亦稱合作惜與王将明蔡元長同傳訖蔽其名可為歎息劉貢父與羅正之手帖彭城劉舎人晚入西掖以元祐元年十二月赤城羅公為開封縣令此帖云相望累年不忘瞻渇盖元祐二年書也嘗考二公相知之舊始扵彭城公之守曹曹為盜區彭城公緩刑而盜息赤城公時為濟隂縣其必有禆扵劉公故其以事罷歸即需章留之有曰伏以羅適自臨百里将及二朞奉詔條主扵恪恭聽獄訟號為簡諒有識詠頌咸謂得古人之風愿民服従可以當屬城之冣惜其未盡施設遽爾罷歸輙徇輿情亟陳囊奏朝廷遂允其請後自開封推官為府界提㸃刑獄其制詞曰强力民事知其要務亦公所為也羅公政績湮落少見漫摭其事書于後云書潞公帖潞公兩守永興其一自秦州徙知皇祐之五年也其一自洛入覲到郡不數日即召還為樞宻使治平之二年也此帖謂旦夕赴雍㳺嵩之約竟不如願盖入覲時所作也嘗考潞公之居洛始扵皇祐二年之立廟其三年罷政知許州五年徙秦復知永興未嘗一日歸河南也至嘉祐三年始判河南八年復判河南居洛凡六年方家居無事暢心適意莫過扵窮極山水之樂而嵩山去洛無信宿乃不能一踐此約何哉昔王逸少欲㳺蜀都汶嶺弗果每為終身恨公晚年居洛㡬三十年山水清詠見扵篇什其與逸少之恨異矣潞公學蘇靈芝書余嘗見靈芝易州碑豐峭特甚觀此筆法尤相肖越國袁桷書跋荆公帖吕嘉問以元豐元年自金陵改知潤州二年四月落職罷郡方是時朝廷積息之弊極矣公時家居然猶不悟其非何哉昔山谷老人嘗言荆公不甚知人痛痒余謂此説殊不近理夫人之厚薄皆生扵情之好惡方熈寜間荆公之所惡者多矣至扵晚年而其所好者又皆背叛構祸宜其平昔簡牘漠然若無世俗之情今觀此帖勞問勤懇且憂其乏絶噫以嘉問之姦何得公之深若此余嘗讀荆公與嘉問詩末章云所懐在分襟藉草淚如洗惜不為范蜀公司馬公諸賢發之跋富韓公帖神宗初年鋭志更治虚席以俟冨公之来然當其時言不足以勝辨徳不可以厭智君臣之際難矣此帖謂舁杖自便盖斯時也嘗三復公求退之章未始不扼腕痛憤而或者謂公逆知五行休咎之說而退則過矣跋蔡忠恵帖蔡忠恵書筆圓韻滿盖其楷法精到所至今人作書先事行草是猶未能言而強之以歌也近丗行體多尚嫵媚回視忠恵書凛凛有清介之氣跋王岐公帖前賢作家問語質而情周非如今人從事筆墨長語今觀此帖亦足以少勵薄俗矣趙清獻公帖清獻公祖墓與陶山陸右丞祖墓相邇紹興間陸氏地為攢陵清獻旁近墓地亦皆歸朝廷而不絶其祠祭先朝陵寢遭賊韜之酷痛通于天而趙氏祖墓亦莽為丘墟矣又聞陸氏祖墓復歸王氏今觀此帖慨不自勝陸放翁荅杜賢良求牒試書金華杜氏昆弟文學行義大科異等固其常也然自孝皇設科之初有司輙抑而不取故李文簡公之子賢良猶不免謗議自此其科遂廢今觀此帖有愛莫助之之意則一試牒其肯為杜氏惜昔葉正則序龍川之文曰使同甫不登進士則為狼藉人矣噫科舉之弊果足以困天下之士哉書東坡凉熱偈東坡先生作蔵院記自謂夢中所作文不加㸃至作魚魫冠頌落筆驚坐則所謂夢中語特神其説耳今觀涼熱偈語亦與前二文相佀釋氏之書皆自梁隋諸臣翻譯故語質而文窘至若楞嚴由房融筆授始覺暢朗公文如萬斛泉風至水涌鳯翔祈文與訓誥相表裏則房融文體一規近之如洗金以鹽濯錦以魚不亦易也焦火凝氷廓然于得䘮之域嶺海炎瘴又何足道三挹遺墨清風泠然書鄭資政伯祖中散題名後山水清事非矻矻朱墨吏所可與鄭公邑長扵斯而三㳺鴈山則其清浄之政盖可見矣鴈蕩之名自唐末始著故前賢罕有至者此碑字畫頗有顔魯公東林題名筆意益可為鄭氏家寳跋米元章書諱改曰陶後納唐氏為壻可怪陶寂本唐彦謙後石晉時避帝章書米元歐陽公常曰士大夫不眀氏族與禽獸無異然自晉世渡江譜牒散亡夷虜殽互賜姓别族漫不可考要難以盡責也潞公之先本敬氏易而為文失製字之體今陶氏為婚于唐虧人倫之義盖石郎之害不止割十六郡而已米老本曠逹之士而能書此為戒亦足以知前輩非茍扵一藝者吴傳朋書曽丞相夫人虞美人草詩流血咸陽宫殿三月紅覇業已鴻門玉斗紛如雪十萬降兵夜强必死仁義王英雄本學萬人随煙燼滅隂陵失道非天亡剛旌旗倒玉帳佳人坐中老香魂敵安用慘戚悲紅粧三軍散盡芳心寂寞寄寒枝舊曲聞時似先逐劒花飛新血化為原上草聼楚歌時清魂杳杳令誰主玉歛眉怨悒徘徊愁不語恰如初宫更伴樽前戚姬舞骨他年耻萬土㑹當移植漢王紹興乙夘七月廿八日吴傳右瀛國魏夫人虞美人草歌守約書朋為沈南豐諸曽與王廣陵為文字交吴紫溪實廣陵之外孫扵曽氏有素則此詩為文肅夫人所作無疑噫熈寜之逢迎建中之調停夫人獨無一語諫其夫而且倚聲弄筆尚論漢髙之戚姬何耶前輩嘗言婦人與知文墨非美事殆有深意然曽氏子孫空青艇齋世傳江西之燈閫庭淵懿有自来矣紫溪自謂筆法得栁半葉體不知此語何所自豈與魯公屋漏法相類然不可强解也跋黄太史帖此一帖疑在黔南時所作有云慎言重行盖息影畏禍之餘意釋氏與太史有縁輟錢奉馬其意盖可見跋東坡黄州謝表昌黎公潮州謝表識者謂不免有哀矜悔艾之意坡翁黄州謝表悔而不屈哀而不怨過扵昌黎多矣然余嘗讀嶺海謝表有云人皆相傳其已死臣亦自厭其餘生言至扵此章蔡之罪可勝數㢤書劉元城與李荘簡公書後崇觀間老亰竊威簸權天下善類皆禁錮不用而汪龍溪葉石林陳簡齋號為渡江名賢亦嘗出門下至若元城先生龜山先生荘簡李公進退言議為一代矩範而元城奉祠南亰龜山被召荘簡為尚書郎始余嘗疑之久而後知拯世之道有不得不如是也原老亰當垂耄之年逆知公論之不可揜張觷以一書生微言警悟悔心之萌黨禍漸解向微諸公少貶以自逭則其無所顧藉之意将必置諸死地而後止方了齋之為尊堯也其意盖亦若是至扵羣姦轇轕用權之道迄不可救由是聲罪而正之吁豈了齋之願若是也朋黨之禍盛扵東漢張讓之䘮持正論者一律獨一陳仲弓徃弔後卒頼以解禍乃知志士仁人之用心雖相逺數千百載盖未嘗不相同也此卷皆先生與荘簡公書清名勁節其淵源實自兹始至紹興和議之首荘簡入參大政皆昔時所聞扵諸老救弊之説逺歴瘴霧其大節盖自可見惟元城先生字畫端謹之妙有不待賛述敢因荘簡出處之事推先哲之所未發者而書于後丁酉嵗正月丙寅四明後學袁桷書跋唐鎮遏使侍御史倪亞手帖桷與番陽倪仲寳同為太史属一日出其先鎮遏公墨刻一通以示實象山先生識焉俾桷有述謹按鎮遏使廢置之始繇貞元間悉屬諸刺史而邉扵溪峒連扵蠻徼者則特置城鎮而刺史不與焉廣明以来江淮之地秦畢孫楊迭相雄角而鎮遏之職隷于節度信為犬牙要衝雄石鎮之得名實貞元以前遺令唐制御史别為憲䘖自押衙都虞候至兵馬使凡十有二年而始為監察又積年而遷止扵侍御史其㓛髙而軍倍廼得為中丞焉故當時稱謂咸以中丞為貴今此帖言中丞誠尊稱也仲寳言御史之傳今十六世而丘壠昭穆封植彌謹遺言舊諜日補其未備譬之岷江初若甕口而至于海者其源逺故也念昔吾里衣冠故胄皆為文安公之門人俯仰變更而事有不可言敬觀遺墨實勞我心仲寳尊祖敬賢其深匵蔵之㑭勿壊大徳乙巳四明袁桷書跋李後主詩藁觀故國主詩筆太平興國壬午右散騎常侍徐鉉奉使汝隂泣日西湖北臺記嵗前十二月十六李主辤廟北行時猶倚聲製曲不知降王宅果凄抑也晚嵗幽憤溢于歌詠竟以憂死獨徐鼎臣守遺臣舊禮痛東鄰之煽禍怨歸錢氏而此卷文僖寳之何耶鼎臣題識足厲薄俗方承平時士風藹然故莫有疑迕使以文為害則當如律令矣悲夫重光書世謂撥鐙然不解何語按書記言推拖撚拽乃具秘訣先徳學士為李西臺余嘗見其三體道徳經及風后廟碑審為無疑天駟監太平興國四年置監有左右復各有二故此印云第一也畢少董文簡公裔孫繇東平南遷多蔵圖畫雜蹟後入秘府紹興間人謂之畢谷董李丞相在翰林三十年太平興國八年始入政地如扈李二學士今玉堂集猶存其制誥趙嘗預修實録所謂初本者是也徐公八分世不多見益可貴重時中宜正色深寳勿為豪巧者簸侮是日袁桷重記跋姚子敬所蔵東坡書飛白記東坡先生語慶暦皇祐未嘗不感歎三復此正紹述深意熈寜諸子廼始崇是議元符間何耶舊見蔡君謨飛白廣不盈尺此字當與是記相屬思陵購先朝書入秘府悉去題識今不可復覩而記為子敬所寳誠可感也夫東坡玉堂制草淳化後學士院紙貢從池陽唐五代所用廼矮麻紙熈陵愛李氏澄心遂易此制蘇公此卷正號玉堂底本桷見文潞公吕申公辤免平章批荅有賈相私印疑當時故家剪以修媚與此紙無異今留河東李士弘家袁桷識清容居士集卷苐四十六
