body:
  text: 題跋書孝宗賜史忠定王褒賢臣頌後右王褒聖主得賢臣頌乾道八年先忠定王守福唐孝宗皇帝御書遣使繇郡治所賜也始忠定為直講時嘗沐是賜實署御名且書王字于後是後繳帖以進遂復被是賜焉猗歟盛哉惟聖主之得賢臣唯髙宗傳説事相吻合方王之為直講訏謨定計蓋已見于三善之陳告監先王之成憲惟孝宗足以承式克欽承旁招俊乂惟忠定足以繼舊學之素夫豈若持守希阿光禹輩然哉故其在相位也知恢復為正論時有未至則寧受衆誚而不避相位三月正色引去未幾符離潰師張魏公首乞速定和議則昔之未敢出師蓋實在是家居十年王之心事露白于天而昔之言恢復者皆大言取官位一無所成就至是君臣交孚過闕入對寶畫森著實彰厥旨非偶然也桷之外大父敷文户部為王嫡孫是生會稽郡君桷實親出學術荒薄為國朝史官十五年獲纂金宋舊史簡帙繁廣猶未克就五世孫公升王之大宗獲寶是卷他日願上于太史㑭有考焉延祐七年十月己酉外曽孫具官袁桷拜手頓首謹書書彭忠毅汝方贈官誥後忠毅公實尚書器資公之親弟以尚書門㓛補太廟齋郎故終身為右選官方臘陷歙睦杭三州衢介于中公以孤城分守卒罵賊以死當時贈典亦至厚矣嗚呼豐亨豫大之説行馴致靖康長驅中原皆望風迎降嘗讀兩朝忠義録而悲之則公蓋居其首見危致命臣子之當為徹彼桑土不能不憾于宣政之事使龍圖公正色朝著事寧有是哉書髙安蔡中允誥後嗚呼宋仁宗世康節邵先生以為日之方中至今南北議論無以易何則賢人多而朝廷治故也今觀髙安蔡中允誥身而桷世為史官請得以考焉故事進士第一獨命詞以其相繼者為首次其甲乙若幕職縣佐則總其詞命以畀之石揚休字昌言眉山人蘇明允先生所敬尊者以髙第為同州推官誥中首稱是也元豐前率沿唐官制舊六曹尚書侍郎總為階官入政府始得之吏部専職則有三班審官流內銓等官誥中署權判即判流內銓也知制誥舍人職也亦元豐正之翰林學士權判曰郊宋郊也言前已改名非也李淑五為翰林學士景祐間元憲同院淑忌其先登譛之曰姓符國號名應祀天實斯年也始更名焉曰絳陽夏謝希深也謂為韓絳者亦非也是年父億為參知政事無父子同要地之理竊考仁宗更元凡九而史官與歷年圖景祐止四年為寶元今誥曰景祐五年倘不知者寧不置疑焉吾敢為蔡氏子孫言之景祐實有五年六月前猶五年也至秋七月郊上尊號曰寶元皇帝凡十四字遂更寶元焉是則自七月始為寶元紀年者莫知遂悉以實元元年書之先正獻公以祕書監禮部侍郎領史事先越公為祕丞著作郎覩舊史聞于家庭者若是輔之不鄙謂余世習臺閣故事遂書以歸若夫贊美感慨有諸賢説在不容于言矣至治元年九月丁丑史官袁桷書題放翁訓子帖放翁先生送其子之官獨書莊子二章以訓或曰五經切近而書莊子何耶余曰自農師右丞師尊臨川臨川宗老莊故其家學世守之此二章足以涉世變清而容物逺禍之基也喜怒哀樂不入于胸次進德之本也紹熙黨禍萌蘖故逢迎者廢于嘉定標榜者錮于慶元雖善惡岐而當時仕進者寧不自重先生教子之意深矣晚嵗一出終能全身以歸觀此蓋可知矣袁桷書題汪龍溪與從子書後汪氏皆祖新安故先生祭其逺祖有曰散處諸邑非雲則仍今玉山番陽宣城新安皆同所自獨新安之宗其别為三貴賤貧富角立不相通敘世逺源分故若是耶先生居饒之德興而宣城諸房皆祖之先生嘗謝其宗衮舉刻有曰渡江而上傷不見于它揚其敦敘同姓無彼我之異中興誥令蓋合王蘇之精整明暢文獻益逺桷以荒陋備員詞林踰十年每惕念罔敢替敬觀遺墨因以識景仰之志至治元年十月壬戌四眀後學袁桷書跋朱文公與辛稼軒手書晦庵嘗以卓犖奇才股肱王室期辛公此帖復以克已復禮相勉朋友琢磨之道備矣嘗聞先生盛年以恢復為最急議晚嵗則曰用兵當在數十年後辛公開禧之際亦曰更須二十年閲歷之深老少議論自有不同焉者矣公所居號帶湖一夕而燼時文公猶無恙慶元四年公復殿撰此書蓋戊午嵗以後所作至六年則文公夢奠矣今觀此帖益知前賢講道彌老不廢炳燭之㓛良有以也夫跋蔡君謨帖蘇文忠評忠惠行書第一後見莆田所刻亦主此論亰卞師其從兄而名莭虧喪愧恧多矣爾雅姊妹之子為甥至晉世則謂之郎忠惠日習晉帖語與之俱化矣題曽文昭詩文昭文肅當貧苦時皆舍人撫字迄見有成至于制誥則殆青過于藍尚書省記實公所作後評文者謂當為萬世法器資番陽彭公與公同臺熙豐改更乃若有不同者幸以內相謝事卒為全人後作史者宜深考焉跋曽文肅帖顧子敦為河北轉運時實司馬公作相之時子宣猶在外服建中調停之説既興善惡玉石黨碑既成則子宣亦復同傳後之作史其去取為如何嘗讀丞相日記類其子姪若公衮輩繅飾術不可不慎于紹興作史見之跋楊補之月賦逃禪老人出處清峭當與魏林同傳思陵愛其所作宫梅將召見之一夕遁去此真方外士昔人言蜀無他楊以九州言揚州或言輕揚或言維揚子雲寂寞賴此能紹宗矣跋米元章帖中年養生惟獨宿第一東坡貶謫有權發遣之語山谷戒行堅嚴有漫種老生涯之詩信知未易脫釋景逺余故人能寶襄陽二帖晚嵗煎熬良不能自存釋氏嘗于此驗生死關聞之者足以戒矣書東坡寄真隱詩東坡先生作續養生論知及之而未知守者晚嵗慕丹元子真隱翁桷嘗深疑之道以氣為母文以思為宗二者相反聚散有不同耳神行六虛止者合于自然朝市而能之者無是也故近世方外之説釋性命為二途平叔之學不復傳言語動作一謂之性卒未見有超然者巽堂內翰明至理通玄微異時登紫霄峰願相與竟其説坡仙遊八極之表必撫掌視吾二人矣跋晉帖晉帖見于淳化多不成文蓋唐文皇去其斷爛以成卷軸今十七帖號可讀餘則不然矣薑堯章作絳帖釋文旁證曲引有㓛於金石缺亦疑之此帖蓋唐人榻本欲求文義則幾臆説矣跋于湖帖于湖先生與王宣子皆紹興進士第一而皆以政事發身二公皆守湖南此帖蓋于湖江東宣子尹京時也杼山劉季髙寓金陵于湖守行宫納謁杼山杼山曰守謁當有故于湖曰願求書法杼山野服以肅于湖拜而授之今其書蓋與劉無異也文獻雕落因巽堂內翰出其書敢以過庭所聞者告焉書陸子履賀復熙河詩後王樞密開熙河㓛成而萬骨枯矣至元祐初司馬公堅欲棄橫山之地深恐生事之人復啓邉隙故耳維州牛李之事是溫公去取之本心後之評史當于是考焉陸子履歐公之上客作是詩其亦有媚夫上之意厥今皇圖窮吐蕃而西唐宋之耻一洗而盡時則有若總帥汪公以元戎經略桷舊為史官得鋪揚其偉績今獲觀此卷始知英賢夷考往事以展拓其素藴盛矣哉跋定武稧帖歐陽公著集古録言定武二民家各有石較其本纎毫不異是則定武有二本從來久矣後宋諸賢謂薛向之子嗣昌私易定武本别刻石以留公庫此論千人一律今以歐公所論則明有二本薛守定武果易以歸則民間猶有一本是公庫本為第三本矣議者又謂嗣昌鑱損湍流帶右天以亂真後入宣和曲水亭余嘗毫髮辨證亦微有不同此卷壓角小印正嗣昌名印而米襄陽親跋尤真舊藏張參政孝伯家其子寺丞即之以書名一時大變古體遂不能傳印識猶可考也今以余平昔所見本悉疏于後不損本趙眀誠本前有李龍眠蜀紙畫右軍象後明誠親跋眀誠之妻李易安夫人避難寓吾里之奉化其書畫散落往往故家多得之後有紹勳小印蓋史中令所用印圖畫者今在燕山張氏家王順伯本第一跋是王黼順伯名厚之號復齋有金石録家藏石刻鍾鼎篆籀鑑銘泉譜侔內府其家兵後不廢近嵗丁未飢越新昌尤慘遂悉散落始歸于龍翔道士黃石翁黃祕不示人後有順伯為浙西提舉時携入祕省諸賢題名皆有其最著者樓宣獻劉文節今亦歸張氏趙子俊孟籲得于閩中有樓宣獻跋剪碎作册葉與前二本無異今歸子昻承旨家蘇承旨易簡第一跋後有元豐諸賢同觀于鄞之城南崇法院有舒信道字畫然不著名在內侍談氏家精神無毫髮恨趙子固本舟過嘉興遇風舟沒子固疾呼曰蘭亭在否舟人負以出子固作跋識其事復題八大字曰姓命可輕此寶難得子固死入賈相家賈敗籍于官有官印歸濟南張參政斯立今在集賢大學士李叔固家潘經略畤本題識皆德鄜手書滿軸余以有米跋本遂贈鄧善之文原鄧借田師孟師孟有借書不還癖因留之余跋乃剪去矣損本龍圖閣學士劉公克莊本細書滿紙後有賈相跋亦滿紙括蒼鄭陶孫為福建儒學副提舉得之為翰林應奉貧質于瓷器劉氏屢入子錢卒以逋重為劉氏所得有叔信父印損本多有叔信父篆印蓋宣和曲水亭既成亟以御筆繇亰兆薛嗣昌家宣取留內璫所暮夜以匱金紙翼紙即越蟬疊三紙連印故下本肥中本著中上本微瘦然皆無異此本子昂得于都城裝成册葉瓷器劉生手之不置以銀壷杯盂易之翰林承旨趙孟俯家本得于霅溪陳侍郎振孫伯玉號直齋其家藏書冠東南今盡散落余家亦得其數十種此本亦有叔信甫印翰林侍讀學士張伯淳本有黃豫章跋余每疑鑱損與山谷差有後先然本無異前數本更俟他日以考題薛紹彭帖長安薛道祖與米元章劉巨濟為三友朝夕議論晉唐雜迹圖畫然其作字則各自成一家紹興中購薛米書最急率以小璽印縫後御府刻米帖十卷而道祖書不得入石客杭見道祖書一巨卷于駙馬都尉楊公家精神峻整遂深疑紹興不入石之故問於子昻子昻曰薛書誠美微有按模脫墼之嫌余不能書而深識其語私嘗謂米襄陽書政如黃太史作詩之變芒角刷掠求于櫝韞川媚則蔑有矣學魯獨居之男子於道祖見之至治二年八月乙亥袁桷記魯公坐位帖坐位帖真迹在亰兆安氏家嘗刻以傳世吳中復守永興謂安氏石未盡筆法因再模刻此二本余家咸有之安氏子孫分析坐位帖乃剖為二此帖至行香寺僕射指後不復有蓋吳安石刻本卓頭髙指後别為一行遂由是平分為兩是安氏兄弟不學之謬東坡見安師文時帖尚全嘗手拓數十本余得坡公拓本於東平王氏無纎毫失真旁用眉陽蘇氏及趙郡蘇軾印記米襄陽少年嘗臨之邵伯溫亦云安氏析後不復見全本此卷筆法絶類米老往見乞米帖墨迹于子昻家子昻以重資得之余心有疑而不敢言余得此帖紙色行墨絶相類遂定為米老所臨無疑延祐二年八月丁丑袁桷氏記書梅聖俞詩後都官公與歐陽公繇河南幕府締交最久至嘉祐元年始一薦為直講距都官之死僅五年耳故王荆公挽詩有云貴人憐公青兩眸吹噓可使髙岑樓坐令隱約不見收空能乞錢助饙餾此蓋為歐公發也崑體之變至公而大成變于江西律吕失而渾厚乖馴致後宋弊有不勝言者敬觀詩帖精思以求益為之懼至治三年嵗次癸亥正月丁未後學袁桷書黃華帖名庭筠米襄陽學段季展得其刷掠奮迅故作大字悉祖之考諸右軍筆陳實未有是體蕭齋丈二蓋其鼻祖季展之變繇是始沈傳師實為雲仍米良有所本矣黃華老人百一帖評品悉祖寶章故其大字超軼抗衡桷舊閲金帝實録老人為修撰時坐擅議朝政受杖噫使在慶曆元祐寧有是耶至治三年二月史官袁桷書書錢王板授某官長洲縣五代擾攘十國各有年號獨武肅不以數十州之地自負﨑嶇航海入貢中土其設心置慮良逺至再傳則亦建立元號良繇更易不常尊重其一方者不得不爾唐末多板授官于此見之唐有敕授官與此亡異隆殺有等唯錢氏能守之相時以行一門盛事上極宰輔內為都尉與宋同為終始吁盛矣哉吳越皆本武肅而散處淮甸亦其苖裔展觀無斁因為之書書孔子廟堂碑永興公守智永舊法故唐能書人盡變唯永興號為第一以右軍譜系猶在也余嘗見大周本於故家精神遒整其雲仍散落不復可考此當在嫡孫行唐人唯魏華得正傳孔頴逹碑與虞相似或云孔卒時永興下世已久書皇甫君碑渤海公以險徑易王體故碑石照耀四裔大小皆合宜右軍世傳皆小楷霜寒帖稍展至筆陳圖則疑非真再傳為千文為廟堂碑確守繩墨稍廣拓非歐不能余嘗評歐書化度第一皇甫碑與溫恭公伯仲臨池積年必領其妙余幼不學書酷喜藏歷代金石覽此益重自棄之歎題劉共甫與朱文公書劉共甫樞密世濟忠節而其文詞詔示于隆興乾道之際四方聳動詎止一經生學士哉樞密隧碑實文公所撰文公受知樞密實繇韋齋吏部先友事契此書蓋在江東留守時所作扶植故家解釋僚友非盛德不至是古道寥落肅觀益增泚顙至治三年十有二月袁桷書跋李公擇尚書帖公擇尚書手迹惟鳯墅石刻一見之元祐間為正人以黃太史為甥它不足論山房藏書以待天下士盛德至矣哉題子昂書靈寶經承旨公作小楷著紙如飛每謂歐楮而下不足論此經尾題距下世才兩月痛當作慟書徽宗御書詩道君書此詩當在寶籙宫所製筆法飛動有凌雲步虛之意真元杳冥真元在杳冥詩中有一點句之驗于五國城下殆詩讖與泰定元年三月癸卯袁桷書跋李時雍墨迹思陵翰墨志謂熙豐以後蔡襄李時雍體製方入格律繇是紹興初年二公字畫俱用紹興小璽印縫此卷政初年所收宋世諸賢筆法終不逮唐隴西公書深有懷素氣象觀此足以知其源委徽宗賜溫益拓本黃庭溫益以王邸舊僚崇寧初即拜中書侍郎其傾邪翕訿見于陳忠肅公之疏迫鄒忠公渡海侵侮范忠宣諸賢之貶湖南而崇寧之主愈近而不疑何哉賈生師傅之論得之矣益死未二十年而其子已登次對典大藩又何哉國之亡也宜矣黃庭真迹在建中靖國刻為祕閣續帖後易為大觀帖余舊得劉無言雙鉤蘭亭今復得此感昔人寵遇之非當因書以為纍臣之痛泰定二年七月丙寅袁桷記跋米元章書趙崇公墓志故事宗室墓志例屬翰苑撰述嘗觀歐陽公王華陽李淇水王臨川所撰殆得玉牒之五六而其蕃衍盛大一一皆然今觀崇公墓志多有可書故鄭太宰所作得盡製作之美噫京城括索盡籍以行獨太祖諸孫號為疏逺渡江勃興皆得奉朝請人事之不可料襄陽此卷龍跳虎卧不盡贊述太宰此文亦稱合作惜與王將明蔡元長同傳訖蔽其名可為歎息劉貢父與羅正之手帖彭城劉舍人晚入西掖以元祐元年十二月赤城羅公為開封縣令此帖云相望纍年不忘瞻渴蓋元祐二年書也嘗考二公相知之舊始于彭城公之守曹曹為盜區彭城公緩刑而盜息赤城公時為濟隂縣其必有禆于劉公故其以事罷歸即需章留之有曰伏以羅適自臨百里將及二期奉詔條主于恪恭聽獄訟號為簡諒有識詠頌咸謂得古人之風願民服從可以當屬城之最惜其未盡施設遽爾罷歸輒徇輿情亟陳囊奏朝廷遂允其請後自開封推官為府界提點刑獄其制詞曰強力民事知其要務亦公所為也羅公政績湮落少見漫托其事書于後云書潞公帖潞公兩守永興其一自秦州徙知皇祐之五年也其一自洛入覲到郡不數日即召還為樞密使治平之二年也此帖謂旦夕赴雍遊嵩之約竟不如願蓋入覲時所作也嘗考潞公之居洛始于皇祐二年之立廟其三年罷政知許州五年徙秦復知永興未嘗一日歸河南也至嘉祐三年始判河南八年復判河南居洛凡六年方家居無事暢心適意莫過于窮極山水之樂而嵩山去洛無信宿乃不能一踐此約何哉昔王逸少欲遊蜀都汶嶺弗果每為終身恨公晚年居洛幾三十年山水清詠見于篇什其與逸少之恨異矣潞公學蘇靈芝書余嘗見靈芝易州碑豐峭特甚觀此筆法尤相肖越國袁桷書跋荆公帖吕嘉問以元豐元年自金陵改知潤州二年四月落職罷郡方是時朝廷積息之弊極矣公時家居然猶不悟其非何哉昔山谷老人嘗言荆公不甚知人痛癢余謂此説殊不近理夫人之厚薄皆生于情之好惡方熙寧間荆公之所惡者多矣至于晚年而其所好者又皆背叛構禍宜其平昔簡牘漠然若無世俗之情今觀此帖勞問勤懇且憂其乏絶噫以嘉問之姦何得公之深若此余嘗讀荆公與嘉問詩末章云所懷在分襟藉草淚如洗惜不為范蜀公司馬公諸賢發之跋富韓公帖神宗初年鋭志更治虛席以俟冨公之來然當其時言不足以勝辨德不可以厭智君臣之際難矣此帖謂舁杖自便蓋斯時也嘗三復公求退之章未始不扼腕痛憤而或者謂公逆知五行休咎之説而退則過矣跋蔡忠惠帖蔡忠惠書筆圓韻滿蓋其楷法精到所至今人作書先事行草是猶未能言而強之以歌也近丗行體多尚嫵媚回視忠惠書凛凛有清介之氣跋王岐公帖前賢作家問語質而情周非如今人從事筆墨長語今觀此帖亦足以少勵薄俗矣趙清獻公帖清獻公祖墓與陶山陸右丞祖墓相邇紹興間陸氏地為攢陵清獻旁近墓地亦皆歸朝廷而不絶其祠祭先朝陵寢遭賊韜之酷痛通于天而趙氏祖墓亦莽為丘墟矣又聞陸氏祖墓復歸王氏今觀此帖慨不自勝陸放翁答杜賢良求牒試書金華杜氏昆弟文學行義大科異等固其常也然自孝皇設科之初有司輒抑而不取故李文簡公之子賢良猶不免謗議自此其科遂廢今觀此帖有愛莫助之之意則一試牒其肯為杜氏惜昔葉正則序龍川之文曰使同甫不登進士則為狼藉人矣噫科舉之弊果足以困天下之士哉書東坡涼熱偈東坡先生作藏院記自謂夢中所作文不加點至作魚魫冠頌落筆驚坐則所謂夢中語特神其説耳今觀涼熱偈語亦與前二文相似釋氏之書皆自梁隋諸臣翻譯故語質而文窘至若楞嚴由房融筆授始覺暢朗公文如萬斛泉風至水涌鳯翔祈文與訓誥相表裏則房融文體一規近之如洗金以鹽濯錦以魚不亦易也焦火凝氷廓然于得喪之域嶺海炎瘴又何足道三挹遺墨清風泠然書鄭資政伯祖中散題名後山水清事非矻矻朱墨吏所可與鄭公邑長于斯而三遊鴈山則其清淨之政蓋可見矣鴈蕩之名自唐末始著故前賢罕有至者此碑字畫頗有顔魯公東林題名筆意益可為鄭氏家寶跋米元章書諱改曰陶後納唐氏為壻可怪陶寂本唐彥謙後石晉時避帝章書米元歐陽公常曰士大夫不眀氏族與禽獸無異然自晉世渡江譜牒散亡夷虜殽互賜姓别族漫不可考要難以盡責也潞公之先本敬氏易而為文失製字之體今陶氏為婚于唐虧人倫之義蓋石郎之害不止割十六郡而已米老本曠逹之士而能書此為戒亦足以知前輩非茍于一藝者吳傳朋書曽丞相夫人虞美人草詩流血咸陽宫殿三月紅霸業已鴻門玉斗紛如雪十萬降兵夜強必死仁義王英雄本學萬人隨煙燼滅隂陵失道非天亡剛旌旗倒玉帳佳人坐中老香魂敵安用慘戚悲紅粧三軍散盡芳心寂寞寄寒枝舊曲聞時似先逐劒花飛新血化為原上草聼楚歌時清魂杳杳令誰主玉斂眉怨悒徘徊愁不語恰如初宫更伴樽前戚姬舞骨他年耻萬土會當移植漢王紹興乙卯七月草八日吳傳右瀛國魏夫人虞美人草歌守約書朋為沈南豐諸曽與王廣陵為文字交吳紫溪實廣陵之外孫于曽氏有素則此詩為文肅夫人所作無疑噫熙寧之逢迎建中之調停夫人獨無一語諫其夫而且倚聲弄筆尚論漢髙之戚姬何耶前輩嘗言婦人與知文墨非美事殆有深意然曽氏子孫空青艇齋世傳江西之燈閫庭淵懿有自來矣紫溪自謂筆法得栁半葉體不知此語何所自豈與魯公屋漏法相類然不可強解也跋黃太史帖此一帖疑在黔南時所作有云慎言重行蓋息影畏禍之餘意釋氏與太史有緣輟錢奉馬其意蓋可見跋東坡黃州謝表昌黎公潮州謝表識者謂不免有哀矜悔艾之意坡翁黃州謝表悔而不屈哀而不怨過于昌黎多矣然余嘗讀嶺海謝表有云人皆相傳其已死臣亦自厭其餘生言至于此章蔡之罪可勝數哉書劉元城與李莊簡公書後崇觀間老亰竊威簸權天下善類皆禁錮不用而汪龍溪葉石林陳簡齋號為渡江名賢亦嘗出門下至若元城先生龜山先生莊簡李公進退言議為一代矩範而元城奉祠南亰龜山被召莊簡為尚書郎始余嘗疑之久而後知拯世之道有不得不如是也原老亰當垂耄之年逆知公論之不可掩張觷以一書生微言警悟悔心之萌黨禍漸解向微諸公少貶以自逭則其無所顧藉之意將必置諸死地而後止方了齋之為尊堯也其意蓋亦若是至于羣姦轇轕用權之道迄不可救由是聲罪而正之吁豈了齋之願若是也朋黨之禍盛于東漢張讓之喪持正論者一律獨一陳仲弓往弔後卒賴以解禍乃知志士仁人之用心雖相逺數千百載蓋未嘗不相同也此卷皆先生與莊簡公書清名徑節其淵源實自兹始至紹興和議之首莊簡入參大政皆昔時所聞于諸老救弊之説逺歷瘴霧其大節蓋自可見惟元城先生字畫端謹之妙有不待贊述敢因莊簡出處之事推先哲之所未發者而書于後丁酉嵗正月丙寅四明後學袁桷書跋唐鎮遏使侍御史倪亞手帖桷與番陽倪仲寶同為太史屬一日出其先鎮遏公墨刻一通以示實象山先生識焉俾桷有述謹按鎮遏使廢置之始繇貞元間悉屬諸刺史而邉于溪洞連于蠻徼者則特置城鎮而刺史不與焉廣明以來江淮之地秦畢孫楊迭相雄角而鎮遏之職隸于節度信為犬牙要衝雄石鎮之得名實貞元以前遺令唐制御史别為憲䘖自押衙都虞候至兵馬使凡十有二年而始為監察又積年而遷止于侍御史其㓛髙而軍倍乃得為中丞焉故當時稱謂咸以中丞為貴今此帖言中丞誠尊稱也仲寶言御史之傳今十六世而丘壠昭穆封植彌謹遺言舊諜日補其未備譬之岷江初若甕口而至于海者其源逺故也念昔吾里衣冠故胄皆為文安公之門人俯仰變更而事有不可言敬觀遺墨實勞我心仲寶尊祖敬賢其深櫝藏之㑭勿壞大德乙巳四明袁桷書跋李後主詩藁觀故國主詩筆太平興國壬午右散騎常侍徐鉉奉使汝隂泣日西湖北臺記嵗前十二月十六李主辭廟北行時猶倚聲製曲不知降王宅果凄抑也晚嵗幽憤溢于歌詠竟以憂死獨徐鼎臣守遺臣舊禮痛東鄰之煽禍怨歸錢氏而此卷文僖寶之何耶鼎臣題識足厲薄俗方承平時士風藹然故莫有疑忤使以文為害則當如律令矣悲夫重光書世謂撥鐙然不解何語按書記言推拖撚拽乃具祕訣先德學士為李西臺余嘗見其三體道德經及風后廟碑審為無疑天駟監太平興國四年置監有左右復各有二故此印云第一也畢少董文簡公裔孫繇東平南遷多藏圖畫雜迹後入祕府紹興間人謂之畢谷董李丞相在翰林三十年太平興國八年始入政地如扈李二學士今玉堂集猶存其制誥趙嘗預修實録所謂初本者是也徐公八分世不多見益可貴重時中宜正色深寶勿為豪巧者簸侮是日袁桷重記跋姚子敬所藏東坡書飛白記東坡先生語慶曆皇祐未嘗不感歎三復此正紹述深意熙寧諸子乃始崇是議元符間何耶舊見蔡君謨飛白廣不盈尺此字當與是記相屬思陵購先朝書入祕府悉去題識今不可復覩而記為子敬所寶誠可感也夫東坡玉堂制草淳化後學士院紙貢從池陽唐五代所用乃矮麻紙熙陵愛李氏澄心遂易此制蘇公此卷正號玉堂底本桷見文潞公吕申公辭免平章批答有賈相私印疑當時故家剪以修媚與此紙無異今留河東李士弘家袁桷識清容居士集卷苐四十六
