front:
  text: 清容居士集卷第二十
  hash: sha256:47707958d78321e9afba4024008482cdb39eb18b10e4944adff46947ed3fe1c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_020-1a}
body:
  text: 記邵庵記雍虞伯生界其居之偏為庵廬焉溫凊之隟則怡怡然飽食以歌宴休于中其廬溫密朴質具粹且深中而虛之若璧而環若鑑而明樞圜而扉方闔闢以動止其溫燥也禓以舒其清焉其凄厲也隩以休其和焉左顧右矚神止氣寂晝握其動夜根其靜不丐飾于外據萬物之會將以極其榮觀者焉廬不廣尋丈旁設易圖圖除其卦五十有六瞪而視之首擊而尾應迎而存之風至而水涌審聲遺形益原其情忽然控浮遊以上征則摶制控伏囿于其內而不能以自恣或曰非輕世逺舉者不得以専是伯生曰維昔邵先遭時明康玩芳以嬉不激不隨順其隆汙儒者之準也吾將尊其廬曰邵庵何如桷曰可乎哉言無郵乎夫敦厚而靈明者君之先也峻簡而潔精者君之光也自君之出名日以張莫窮其鄉黽黽然聲音笑貌之學詎昔之志也勉之哉兹廬之制易而不卑簡而不倚其取諸物非鑠我者也由質以成禮無踰矣乃觴以祝之介其休明曰煙煙煴煴維道之門悃悃欵欵維德之本美哉廬乎足以為永居乎袁桷記古劒記吳成季得劒一于故吳之區窮首以度合周尺二十有一寸下縮而圓人盡其握璏倍于臘東西半焉鐔長五寸有竒口懸三空古飾以琫具者金氣消竭玉質湛湛然望其鋒肅而不劌黝乎以溫如鑑之示明揣其章若氷之在防養其寒光泊焉不知所凝日出而觀則陸離以陳為丹為碧起滅于膚理風雨以休之隱隱歷歷欲泄而強抑客曰此何祥也成季曰粵古至人絶世遁逃有不得已則託劒以象五金之精竊隂據陽繇神以成非劒之能也維吾道祖以劒印授受為漢丗遺物傳信可根據劒歸宣和今得于吳吳為故都庸詎知非昔之所寶且夫化而沉于淵物之靈也返之于山物之完也或曰以神不以形又曰以德不以物形與物其果有變乎袁桷記昭真山水記廣信昭真山晉王仙居山祖閩武夷宗為天冠巖翼行數十里左右扈挾悉至觀乃伏北俯貴溪又正北當縣居中匯泉曰寒月泉與藥池丹井通遵井南鱗瓦削列成廡有泉懸溜廡下拾級以升曰金沙益南至于升仙臺臺石天設空眀無依傳言王仙化是又南石室坐可二十席下視屋邑蟻髮旋縷凡登是山者不盡適不返故冠以逍遙焉上巘為靈湫逍遙西多故賢居三山品列徐紹宗隱益下北麓陸文安公書堂奠焉循西有吳緬石潛谷巖小隱巖皆以處士著吳緬石形成五嶽復曰五面迤東為峰二曰老人石人東屈而下得名六學堂以虛名仙足月巖以形名鬼谷以真隱名鬼谷東石壁中穴環好風出湧泉曰風洞輔東益髙有石箕瓢器物成琢潭深不測以磜潭名又東極下水鉤盤巖壁削立旌陽許令刺蛟于是唐名曰馨香觀道士祝丹陽繪圖㑭志且言其山清刻深古多異石名木嵗不識伏日泉品與惠山同自唐李商隱劉大用王荆公毛澤民而下著詠可傳信夫山南為陽主陽賔隂鍾其所極鬱之而不化可慕可愕不一以足然神獨嗇之使沖漠者専其靜居潔潔然好遊之士少紓其耳目而卒不畀何也世言名山多方外居益以昭真為信丙午二月袁桷記東山精舍記自民迫于生而儒日益病清宗華門淪圮乘接􅞔然絶環珮聲東裝韝衣方傴伏却立而甚者貿貿途路間益困苦不復振或以謂升降迭偶之理使然耳噫首是説者其未知所飬與豫客京師豫章周儀之之甥冷有泰復先辱其遊問其年則宜若與昔不相接近而甚頌且文豫始異之儀之曰不然冷為分寧故族官簿相接所居曰東山山橫重屏方列若刻其尊正叔治屋一區負山為居治堂翼然疏沼縈然幽林潔石竒梧秀竹之森爽以繚以屬前拱而導則黃龍幕阜蜿蜒效焉平罪沃畛鱗集備焉朝光夕霏户牖進而几席納也正叔閉門幾三十年服居士衣設丈席講論終日危坐清思無纖芥粳粃時為詩詞凌厲頓伏索索裂金石舉觴雅歌耋稚以敘酬酢揖讓猶昔時衣冠家氣度而卒相邂會恍然知為非人間世也嘗聞正叔舉童子時意功業可拾取今乃摧落刋實益自斂避彬彬文質久而蓋彌章焉夫不急于外者宜有裕于後大江以西士風炳如于是乎則故豫首書其慨然者以厲吾黨知正叔為可徵四明袁桷記采芝亭記太行首于三危伏于河折北而尊為恆山支巒復岡畢赴于燕秩秩然復纚屬以東數十百里入于海上土人以其西來號曰西山或曰駿極于是山急而堅凝地多空寒不可以兆域又曰是為都城之衝自北而南太和薰然捨是奚所適于是工部尚書郝公景文惕然維思實震且陰乃相其大塋先君子之藏祔狹而善崩始遷而謀焉大德甲辰得卜于某山卜者曰是山之形翼容而咮鳴日中而升戴坎以寧以華以承及既葬眀年守冡以芝告公弗信展于墓下登坡而望則敷者荑者燁然于山效獻以萬歸以示其客袁桷噫是果為芝邪今舉世之言瑞者必首于芝芝不常有于世故窮夸闡珍得一二焉輒指以自瑞使誠瑞邪寸畛尺壟其融液變化不若是之固而甚者竭四海之類夫芝者聚焉以觀不亦陋乎夫土和則芝生始公之心懼親之不寧故擇其溫密以永其幽菌蠢而擢靈土之和也盈數為萬非昔之固也不侈以求異德之質也維山之陽彌鞏彌剛子孫之祥也孝感而文著于瑞乎何有梅亭記廣信據江浙閩越之衝萬山交牙四顧羅劒戟其氣蜿蜒磅礴為丹碧玉石長溪貫其中凝膏溢藍愈積愈完山水之秀甲諸郡故其俗多刻厲自奮矜謹節義言文學道德者為儒宗治政事者為吏師建炎初中原縉紳家多居是州其舊聞遺語尊守傳信歷歷可數皆數百年文獻源委非如野人窶子掇拾目近為利祿地方是時人物之勝足以甲山水而浮屠老氏之迹實不與焉弋陽為縣山益深水益清車輪馬足之聲不入于其境寒泉蒼巖百里一色山之陽有陳隱君居焉隱君守儒以自信閉門授書朝夕盥饋合其孫曾嬪婦男女將百人年九十四以終有子曰德父教授帶湖十年法當得致仕官以鄉博士歸于家乃築室旁近之華山為雲居雲居之西為梅亭曰香月于是其子敏學志仲官京師㑭豫記之且言曰自吾大父恂恂之于是居也詩書以持稼穡以時門無忿色而少長以敘吾不知其化之及于里也自吾父觀之今七十餘矣誦聲滿户而樽斚在牖氣完而色康其行舒舒其語徐徐視吾祖之孫曽亦相邇也噫榮何以過是袁桷曰天地之理嗇者豐之始周流于六虗其暗也實明其闢也實闔昔之淡然而無營者德之基也養之于其身而施之于其後充以引之吾知其孝謹于家者日益廣爵祿于朝者日益侈視斯亭之手植豐融婆娑連理而並實隂陽之生物其不出于是明矣詩曰髙山仰止景行行止亦因以勉夫志仲焉西泉記髙君舜臣通敏才智之士也治其齋心之居表其顔曰西泉為豫言曰太行之山合于恆山隱伏聨亘北東以入于海肅慎朝鮮屹然表于其地者皆支絡也泉生于西歸于東隂陽之常性也周人有言曰肅慎燕亳吾北土也昔之疆理吾于是乎考則凡北紀之山水繇西徂東所繇來審矣為我記之舜臣于金為大姓官簿歷歷可紀居京師數世遡其泉源知其晝夜之不止必達于其里禮不忘其本其髙君之謂與豫官京師踰十餘年望所謂西山者蒼拔翠峭實太行之苗裔水流無窮演迤洋溢導之為漕渠止之為陂塘資國用以為民食者泉之利也其次達官貴人因之以丘壟濬其冽清挹其回環蔭藉蕃廡將利其子孫以求全乎兹山之下不知其幾至于淡泊空曠之士則又抉尋幽深渟膏匯甘使夫絶塵稅駕者止焉以嗟啜焉以留無有窮已噫西泉之效誠博矣哉在易之象曰山下出泉蒙其險釋矣謹其所之君子之用也髙君致用以推本厥旨明矣究反復之道益驗于身將見某百折而不撓獨行而不懼非兹泉也與念其祖德繄命名之意與其兄堯臣閉門窮經沉思篤行豫得與之交將並遊夫西山感夫昔之廢興不在于險則泉之東其寧有已邪戅庵記慈溪黃彥實少喜豪士漫遊故都見世所稱知名人率脂韋自保祕惋恨無可與語酒酣氣雄謂海宇方宴安休明宜取天下事置念慮以入計畫否則搜抉險幽浩然為萬里遊遇不遇命也未幾泝采石上漢江西遊荆襄歷觀用武關要荒榛廢壘猶有能言昔時得失益慷慨自振而所見公卿大夫與夫布衣之士則皆與昔交遊者無大異于是治其居曰戅庵以自警求記于豫亟請焉昔之養生者志專而若愚遺世絶俗懼其名之至也介然以逃泊然以遨聖人憂之慮其器之不弘不足以任斯道也然舉世之士樂同而惡異曲者常安直者易危則寧直焉者斯近矣彥實智通于事物行幾于古人視今世之戅者吾能言之草野遊京師決臆裂眥不顧生死詣廟堂求竒中書未出袖而利祿萌于中非戅也鄉里稱任俠大言斷是否隂持短長以利己非戅也佯不潔清詆罵排觸而私有揣摩問之而若朴即之而彌汙若是者又其似而靡者也彥實先大夫文節先生為史館官咸淳上殿論浮屠不宜入禁掖度宗大怒手詔出國門未幾二守桐江與宰相兄子爭事卒易他郡戅無以易此矣古之君子事至而名隨人棄我取自謙之道也聞彥實居山中閉門讀書益不妄交求古聖賢摧折困踣之本彂而不可犯者養之至也豫歸里聆其言斯知之矣延祐五年夏四月越袁桷記桂山堂記江南地宜桂故凡廣居室者必植之以為美觀焉釋木者曰桂白華叢生冬夏常青人取以自近良有以也地記言八公從淮南王後入山為仙作叢桂詞與漢史所記異豫獨愛其簡潔幽古為文章宗師申言攀援非自息于林莾者讀其辭可悲也矣上饒周君居龍虎山因其地之隆植桂于上築堂面之而名曰桂山徵記于豫豫曰今龍虎山為道家統宗金碧晃曜出于縣官搜竒抉幽異夫昔時之荒煙古木􅎮相結而袂相接也周君主畫諾以極其榮觀則今之所命名者若不相似何也然豫嘗聞古之至人其貌恂恂其言諄諄執中以權損益其未備黜紛華以從事于寂寞者非有所激也周君知周于身謙抑自持思夫山林之靜養其沖泊先事以自警古之所謂備豫而能立者近之矣周氏之先得道于希夷陳先生當熙寧時猶亡恙見其曽玄離世樂善樹德之訓有自來矣且夫託物以喻志詩人之心也仰觀于山徐視吾手植者風雨氷雪貫四時而不改擬諸形容得無似之乎異日將遊山中詠八公之辭反招寫心僕援筆未敢以老為辭也張尚書救荒後記儒學提舉天台柯謙自牧為序一通言今工部尚書張公之佐江浙也活飢民禠貪帥為去思帥能歌詩者追美之是可謂無負張公矣往嵗桷以翰苑屬歸里里人言元帥府始治婺女有捴戎官鎮慶元言慶元聨蠻國入海最近稍失控御兵釁不可測乘驛入都白利害時太傳丞相坐省中盛言捴戎非兼元帥不足以重鎮太傅察其言有私便後雖移鎮而卒用常調官如舊制焉大德十一年嵗大飢浙東副帥缺命屬吏疾傳詣行省告變曰慶元接海口僅數十里羣盜據島嶼出沒將入城剽劫願速分行省軍往翦其窟穴緩則不可治行省大驚將如議張公時為郎中丞相謂公曰計安出公以調兵非所預丞相固問則曰果有變帥府當印署白省副帥獨遣非完議也召屬吏問變奚自府有鎮守官今上變為何地屬吏俯首不能對遂移檄問盜今安在帥府得檄大驚咸言無是事繇是卒不發兵而慶元迄無它噫方副帥造謀時當飢侵窮困之急稍加以兵山海逋竄寧能斂手以快鋒鏑一有抗拒誣以叛逆則凡故家大姓蔓延于囹圄之下將不可勝計人能知救荒之為美績而不知吾里之人微張公之言有不待賑恤而皆置于死地矣敢書以補郡乘㑭知夫立帥府本末蓋如是張公名缺字士瞻衛郡人處事明逺知大體若是事寧勿為記其可乎晚香堂記延陵吳成季父奉萬年之祝于崇真大德甲辰二月承詔為祠官于衡山復命歸祠其受道之山曰龍虎龍乕于番為接壤番于成季為鄉井于是其嚴君偕七十矣乃避館屏騶却入里閭舉觴再拜以祝以夀宗黨姻友旁列敘坐勸酬以禮進退維度聚而言曰嘻其盛哉成季曰不然繄昔逺祖挈國以讓晚交兵間既夀且康至于番君墜緒以興維用之嗇報必以厚自吾少時聞為是州一不承意則交喙爭誚而吾父子吟詠占畢呐呐謙讓不能出諸口至論成敗衰盛嘗掩卷三歎以自警厲而今也二老人康強起居佐理內外冠帶童丱咸立左右其逮乎逺祖之意願築堂以奉而名曰晚香其何如衆曰唯唯未幾來京師屢屬豫以記豫以謂大夫士之養莫侈于羊犬豕而世之希年逺引者至以金石草木為可久菊水之夀效極于胡廣昔之議廣猶若糞土則名與年較不相並今成季榮于其身顯于其親惓惓然企本支之盛吾見吳氏子孫孝謹遜于里門秀敏有列于朝而耆耋老人方逰遨嬉戲擊鮮養醲若古之所謂偕老而終隱者其不在兹也傳記言王公大人晚嵗託言神仙多以逺禍成季遊乎方外之畛憂世嫉邪嘗不自置異時承渥流問則司馬子微之對殆猶粳粃而名以晚香者非獨為吳氏美是特有待于成季也四明袁桷記玉冠記大德乙巳嵗二月甲申皇帝受釐于玉德乃命尚服出玉冠以賜玄教真人張公其製為山形空其梁述溫栗精潤隆殺悉等莫有究其攸始袁桷見之曰此紹興宴居所服韜髮冠也舊聞長老言思陵為清暑樓聚金石竒刻飛湍清樾森鬱蕭爽伏日退朝衣白縠羽衣冠小玉冠閲㝎書迹其殆是與維古辨冕雜飾以玉至晉宋間君臣上下崇習玄理清逸修簡始為玉冠今世所傳元帝像及晉賢圗軸與此無毫髮異則紹興所冠猶古帝王遺物按道家書言神君始建飛天玉冠其製與逺遊爵辨微近疑有差等含玄秉陽舒精吐光繄冠維則欽承是天寵進道之篤其不在兹乎夫玉者陽中之隂也首者體形之上神精明之主也陽非隂不能以成合而凝之出入于斯易之門也方今張公以清淨理贊益熙洽縝密而不露孚尹而不泄逺而望之誠理勝矣庸述其始以示于後袁桷謹記孝思亭記三山吳眀之築亭于陽岡大父之墓側名之曰孝思按昔之言禮者則曰魂歸于所居將致其一焉墓有祭有亭為非古矣善乎延陵季子之言曰魂氣無不之也夫専于祠宇不意若是拘也物精神著其氣彂揚者出于丘壟是則必首于墓將奚以疑古之聖人懼其瀆且數也嚴為之防速貧速朽夫豈非夫子之語祭墓為尸是墓有祭矣祭而不屋失祭之禮矣繇宋宰輔侈其墓田不復拘甲令層樓巍閣空青金碧巋然于坡陀之阜過者必式其防遏森翊誠以為千百年無慮也乾坤合運頽垣廢址上牛羊而履荆棘欲求子孫不可得而眀之方慎其繚圍構亭以綏其體魄是則過于盛者必有衰吳君之志追逺以求旨微意深鬱勃之興將自兹始大舜五十而慕昔以為難能也遡而推之探其微旨亦難能也禮抱孫不抱子祔于王父幽明之通瞭然而莫遺明之審之而克行之桷也故國之公孫其思于祖父也罔敢替因繹其旨為之記福源精舍記建炎初秉義李君以勇略捍衛鄉社倜儻急義植德流衍諸孫以詩學接武科目恂恂退讓望知為秉義家子弟衣冠浸微獨溧水府君之子登仕君寄隱㕓市厖眉幅巾治生産益有理年逾七十乃卒豫請告歸里其子印傳以事狀踵門求記其精舍㑭永逺嘉熙間溧水君卒于縣治登仕甫八嵗祖母朱氏奉其喪以歸將葬于上元之祖塋朱母泫然曰孤兒奚依少不利必隳其先祀相于慈溪東嶺楊奧之山卜告以吉結為四塋昭穆以敘而以其殤女祔于旁近登仕長有室曰茹氏朱母即世既葬茹氏曰吾姑以橐中􅋔成是山夫君獲有成立新婦不淑紹先繼志弗展擴則奚以緝前人光亦斥奩資廣山壟建祠屋精舍以奉其舅姑茹氏沒于至元之十九年登仕君沒于至大之四年大德六年印傳與其妻胡氏同入山拜墓顧瞻周回蕪圮日廣胡氏曰再世尊章有成妾獨不能少效萬一聞佛氏有大報恩而用其法名為福源精舍命僧以居遂一以浮屠所需者咸備具復買田若干命僧某首主㑭其弟子相次以繼其所度僧非李氏不得入豫愕而有言曰吾里卿相什百各以功德院為請有以其田園與子孫共分析求利益穹樓矗塔坡阜松柏蔽翳綿數十里時運更易各降在皂隸孤童負囊倀倀不能以入每恨其祖父作是為無益也豫嘗過其祠宇薪草雜糅破爐凝煤而主兹所者僴然有曰彼昔承寵恩故幸若是其子孫何能預至于士夫之家庵廬相接幸其不為有司之所隸羣聚毁撤甚者發其丘壟噫可勝道哉豫謂三孝婦之志人莫能並心純而孝專發于自然非過信以溺于異端思其創始思其悠久是則秉義之澤良未艾也為浮屠者聞豫之説寧不有泚其顙印傳復為穴三一以葬生母張氏其二則夫婦因以預備云治平寺記治平寺主者以建寺本末謁豫為記其狀曰寺在城南門外渡江曰銅湓浦鄉曰鄞塘平疇鬱密松竹環植望之竦然其間者即治平也寺建于後唐清泰僧曰道隆以法華勸民習誦持善果創是地三十畞有竒始居之復得别業為畞六十其初曰東李浦院錢忠懿王俶給符牒㑭永逺又改為保豐院宋英宗更元治平祀眀堂始易今名法智大師以教乘闡東南習學皆其徒故號為天台宗元豐間有性法師講法華别立機要從者雲集而田租漸廣居民染帶下疾師咒水飲之飲者日益衆師咒于池悉愈寺舊有東西池今咒水池猶甘冽可鑑師號山堂卒葬于是寺嘉熙三年寺燬于時上師實主是寺遂新三門法堂廊廡等若干乃謝去淳祐六年堯師始成殿宇居室所宜有者悉備咸淳八年子直良法師至曰吾不可不私淑後學户屨日接簡約暢隱法華之説大備而治平名益著率由是升于南湖者凡數人南湖四明之祖庭也復曰一蓀守是山今十有五年繄前修是承昔之營構皆腐折傾漏不可支今幸完復粗備惟創建昔人缺軼靡有紀碩登其事于石桷以為今之為牧守者茍度嵗月堤防津梁田野之不治尚何能望究其本始為世胄者日墮其先祖父名諱近在數十年問有不能答未有如浮圖氏泝源推根若是之詳者道散于九流百家各自奮植吾儒之教末俗以空言為髙卒不能勝甚者去其舊籍郡縣養士之田皆漫漶不可考如蓀師所為寧不有愧庸因其狀以紀亦以勵吾徒之為師長者云海會庵記出城西門皆良田白水髙下緑樹雞犬相聞蓊然農家善于其業者也豫繇京師回艤舟驛亭望之則朱甍碧瓦傑然為人天居佛之道以枯稿堅忍為能事卉衣糲食樹下塜間不求其豐足故從者樂然如歸二千餘年為之説者以莊嚴為善果愚者益信狂者益怖而梵宫寶剎合郡縣山水之勝悉為所據日增月益有不可勝言者四明海之東絶處為補陀巖大士顯焉鄮之東為育王山釋迦舍利塔焉遵南為嶽林為天台皆遊歷之所而補陀育王自天子至于王公百司乘驛奉香幣不絶于道四方之民終嵗膜拜至于西門始求其渡海之路然而觸風濤煙霧率莫悉處所又舟人伺其危殆時有不利目接其事而來者益不止豈非其教足以傾動而為善者有以復其良心也有僧曰妙夀以其建庵之始末告曰兹庵之創專以奉補陀育王嶽林天台之遊者也初卜地于城西郡民任氏首不過地千步屋三楹有同志僧妙然日習宗尚善勸募傾捨駢集又有僧元安清持以行業振勵信者俱至善士翁父堅翼輔之首建佛宫且割田以濟未幾宣慰楊侯梓益買田以贊相由是拓地為畞十五屋百楹殿堂門廡迎賔習靜各有其地泛海有舟放生有池獨不設方丈懼後人之佚樂以自恣也不請寺額曰海會庵懼其奪攘以為兹所之凌替也其狀若是願請記以求永久豫曰博施濟衆昔之聖人猶以為慊浮屠氏日丐假于外而皆足以慰其志意蓋其説汪洋浩博參之以報應而為惡者懼吾儒之説百姓日用而不知卒之以道政齊刑者不得已之具也逃空虛絶人事釋氏本旨而其生産作業皆取于吾教若今有司興繕則民不勝怨咨海會之成相胥以勸何其易也妙夀深湛善思事為之防曲為之制其惓惓于後者厥慮若是雖欲勿永久其得勿永久乎重建延福院記豫繇集賢還里居有僧永華躡屩重趼踰數千里南康來介天平恩大師求記延福院興造者其狀曰院在南康建昌州西山曰龍城唐馬大師嘗憩寂焉殿有記宋雍熙間廣陵沙門處暹所撰嵗久蕪圮宋末郡始署開陽院僧紹志主之墾殖磨刮集材庀工鍾閣齋室凡僧之所居處者咸屹然以成至大德庚子主兹山三十餘年矣命其徒曰吾宜藏密以興造事付汝等咸頓首曰曷敢不承繼曰繼福乃襲院事首建三門及外門曰繼祖繼夀永翌廣賔至之所視昔居處之宜益廓且完繼祐乃曰吾新殿視瞻廣博謂色身小大擬于形容良非吾道然遍滿充塞當有是事揆諸空幻則俱非實相宜改而正諸遂易舊象得舍利五色于佛胸背間宋咸平僧道志所建或曰是若有吻合然者歟于是梵㖵贊頌而若子若孫皆勇猛赴事謁于事佛之徒增飾金紺象設尊重瓶鉢精潔烜然如人天居復增其田若干紹志終于大德七年夀七十五葬寺東之陽今守其遺言祖子孫相繼如初孫七人曰永岫永岦永岓永華宗松宗槐宗權讀狀畢乃問華曰志師能植立若是宜有本始華拱手曰昔圓悟大師得法弟子曰真牧大師賢賢度其徒幾千人志其派緒也豫嘗聞釋氏服勤壞形實本持攝至于廣居榮觀將以懾伏庸騃除其侈心非專以是為能事生而不居死而不餘故其道益固傳有言曰又何加焉曰教之能仁之教書遍中國為禪學者不立文字而其徒復守師説文字益繁今而曰教之于二者將焉取乎哉他年曳杖遊匡廬西遊龍城問聰明道理其必有以告我則豫之記興建亦得以永久也資教寺修三門記吾里法智大師以至行約言闡揚天台大行于浙東西謂城南延慶為祖庭故四明旁邑近郊雖丈室尋地多博辨秀出之徒過于他郡西山資教其一也西山在郡西四十里周顯德元年號廣德院宋治平改曰資教負山靣湖有菱荷鳬鷗舟楫亭橋之勝凡郡人之遊于湖者必至是寺湖湮為田遊者不復至而寺漸頽圮紹㝎中月公首授徒是山後謝事上竺願復領之世言上竺第一院西山號最卑繇月公再居而寺益重故講説者爭趍之延祐缺年道師逢原以郡選主之其徒亦曰彼學専靜選不可易也豫舟過先墓必望所謂資教者焉空巖傾欹樹木翦落將不堪其居比還里則昔之頽然以興重簷翬飛表表出林杪道師曰吾首新三門餘以次繕治不田以食廢其教將有愧集徒講肄則庶幾希前人光三門紀修願以囑焉考諸禮經制有五門雉門居中故曰三門秦漢損益不遵于周連門為三唯王宫得用官署降殺非雉門之制久矣釋老宫室擬于乘輿雖儀制有令不得禁天台以眀靜為宗弊衣惡食脫氛垢厭榮觀汲汲以土木為急崇信興敬將于是乎取夫像設之教首于西方其能傾動禍福必召募焉以集事師謝不肯寺久廢得人焉以興則吾徒之為校官者竊食自嬉寧得無愧焉吉祥寺重建記主吉祥寺崇柏師以其興造本末為狀一通㑭豫為記其狀曰初寺在翁洲南香柏巖唐有僧慧超相攸築居峻潔厲行居民傾信寺遂以成漠乾祐中賜額曰崇福至宋咸平有真大師善持咒能愈閭巷疾病號真大悲崇奉益廣邑中尉曰丁漸以柏巖峻絶困登陟易于廣平環以九峰繚以清溪審勢辨方各當其職宋治平始賜今額曰吉祥紹興中給事中黃龜年以讜論忤時宰避禍絶人事僑居絶島獨與方外交每至寺中時有宏智覺禪師主天童宣密抉妙師表藂林其大弟子輝主是山傾動島嶼黃公敬之施所藏辟支佛牙為閣以庋而寺益增重遂為海上寺居甲乙人稱之為小天童繇輝師始也皇慶二年火一師始作法堂會遷它所不果終至是柏居之首建大殿三門次以藏室僧堂凡僧居之所宜營繕者畢具泰㝎三年告成俗姓虞氏其父酉發嘗為海運官有兄曰庭桂曰庭芝慨然曰吾不可不相吾弟三世佛像吾與弟共成之今夫浮屠氏宫室率為禍福説以誘民陰奪其財民日以耗有國者憂之若師所成就不丐假于外竭其嬴餘以復舊觀怡愈相資將瘁躬以究築凌隂廣腴田以為後人補緝費志專念逺是果能興其教者也余志釋氏建置每有感于學校若是則又重有所感也師居淨慈嗣法于慧禪師屏外持攝慧之學益有光矣勉之哉妙果寺記廬山東林寺以逺法師為祖庭其教行乎海宇閲年滋多厖幻雜糅壞宫夷址將絶其遺教寺僧普度慨然興復率弟子十人芒屨草服詣京師上書演為萬言又集歷代經社緣起作蓮宗寶鑑十卷仁宗在東宫閲其書盡初帙問曰得無欲布施乎合指謝不敢又問曰得無欲補僧職乎復謝無是想惟蓮教墜絶願殿下振復時武宗皇帝在御近臣以其事奏即以詔旨慰撫如律令至大四年始播告中外而度㑭職其教為優曇主師丹陽人在縣為竹林山妙果寺率徒喻俗將大廣其居以稱聖天子崇重之意豫嘗謂象無形儀域無逺邇逺公之言曰思專想寂三昧之本彼所謂邦國之殊異相好之莊嚴蓋將絶其邪惑一淡泊而無所逢大雄氏設喻警蒙攝持示境境由心發境滅返真清淨安樂包括宇宙是知道者又安有四履之分别哉度師博習教乘示于衆者俯焉以導其師日禪師久居東林後主天童嘗率善士修逺公法來于江西者踵不絶度師興其教是果能有傳也記寺興造托其綱要以明初志云石夫人廟記州東北隅有山昂然以尊秀特瑰異望之若貞女獨立凛乎莫能犯水旱祈祭輒應土人因其形似而名之曰夫人山唐咸通八年主簿李成矩記其廟貞固之封見于祠部嘉㝎十七年加昭德順應咸淳六年加福祐皇元合一郡縣大修祀典兹山必預焉泰㝎三年州判官張思訥承命致祭肅瞻廟庭棟壓瓴圮心駭目瞪折旋冥思喟然有言其何以稱上命遂謀于州尹曰蘇君缺同知焦君鼐州判官塔海復語其僚俎毅許禋割資以佐工役而凡隸于祠下者胥勸相事是嵗廟成乞記于桷原夫宓妃靜波神女行雲此騷人墨客之寄興也二孤望夫至今遊覽者羞言之若夫天姥雲母穹窿磊落淫言鄙語不能以入是則兹山之靈功在水旱餘奚以議傳曰山澤通氣記禮者曰地秉隂竅于山川炳靈赫奕民社是依嵩髙之詩實有考焉遂作迎享送神詞詞曰磅礴兮上征淹兮積兮縞繒樛木矗兮翠旌恍綏顧兮揚靈抱貞固兮合窈冥竒功教兮集鏤塍嶞兮稜稜駿兮蒸蒸帝祀兮永承一其來兮弗趾去兮莫視有穰兮億秭祓不祥兮蕩癘密石兮牲繫俯精思兮帝制百神擁兮森衛苾芬歆兮嵗嵗二其信州自鳴山加封記至元十四年玄教大宗師張留孫扈從世祖皇帝于兩京言信州自鳴山神有靈狀敢詣闕下敕禮官崇顯之是嵗皇帝命侍臣李衆劉子中降香實銀奩旗以金錦顯其神三十一年成宗皇帝有詔遣使致祭嶽瀆在昔登載者如式崇奉大德三年三十八代天師張平錢塘潮言神以雲雨昭著自鳴山事見郡乘宋元符始有廟號繇宣和迄咸淳制書凡十五下乞如今皇帝詔令于是符于州考證無異辭至大三年玄教嗣師崇文弘道真人吳全節乃言曰吾徒食兹山有年矣闔闢摩蕩繄隂陽是資變以行神神繇以興今天子禋奉祠祭吾教益昌自鳴于龍虎封畛相入捨是其何言遂復請于朝得加封為明仁廣孝翊化真君桷待罪翰林十有五年矣嗣師曰龍虎紀述吾不以纍子兹山肹蠁紹定之際先正肅公嘗紀之矣子誠不得辭桷嘗聞之地秉隂山川竅焉通而後能鳴石之徵也聲生于空因山以著昧其初而以為神者其諸異乎石之鳴也風霆流形神始出焉神非妄也兹道之妙老氏深知之矣豫何敢語延祐三年四月會稽袁桷記隱仙記宋開慶初伯父賔州我先考郡公將除大父尚書公喪相與議曰崇親報本唯躬行是先焄蒿悽愴鬱然而莫能見者將導達之則屈伸之義足以考聞諸老氏有黃籙齋善攝度彼果能濟則吾父將超然于物表非崇泥以求福也齋既成以尚書公所遺祠部牒度道士三人王君德華在是選二人皆亡化不復紀獨王君服道士服幾七十年往來袁氏門且五世貴焰侈盛嘗親見之至枯泊頽薾則過門風雨不少阻且曰吾寧負袁門哉其于宜所學者曰章奏符籙雨暘疾疫親究而逺扣方外士來質衣以請百誑不倦以其勤且無悔故有所成就今年八十有八而請者益勤乃語豫曰今卜藏于城西隅名之曰隱仙仙也者返真之義也魂升魄歸死生之大義也而釋仙者謂為不死古果有是若吾徒者寧能企是哉桷今年六十有一矣考其入道先于吾生死者若蜉蝣生者若稊稗推一門之盛衰足以驗一郡之興廢而桷也以譾薄之技獲官清朝今仕焉而止願與王君考遊歷之舊指其歸藏則曰委順觀化寧有怛于心懼後人不能以紹志㑭預書平昔之出處且以勵于後今主焚修于玄妙聰明不衰夀益未艾家世㝎海縣自號曰蓬山志不忘初也泰㝎三年四月甲午見一居士袁桷記通玄觀賈道士記通玄觀道士賈志福年八十三化于其居有徒曰王道深者言曰吾師以不言為宗其學澄寂寡約不為翕翕詭幻楮衣草屩寒暑自得有問其道者不以對機藏籥啓指喻微密若口授而耳屬也始為汝南民弱冠得法于棲雲王真人王曰知者不言子遊四方能果不言以自全乎後遊南陽遇軍帥脅以語不對復辱以箠檟師正色畫地作無語二字軍帥竦愧謝以白金將築室奉之會得間走京兆復遇其師曰汝志已完忍辱易忍寵難其居京師以觀子之有成于是迄歸于京師會有數薦于先朝者復即遁去然居通玄而號清靜散人實洞眀祁公之所強也又曰師少時嘗得竒疾夢一老人授以七桃食之寤而愈其徴家為道士者凡七人有弟曰德常亦守其學今居大名之嶽祠韜靜完潔與吾師無異願有述以廣其道乃為之詞曰繄摩兜鞬厥機孔艱維柱下學知者不言納息于踵養神于淵匪曰不言其道已完道豈文傳文實纍智虗辭借浮一跌千里竊隂據陽詭立名字夸者逐魂固者死技眷此嗒然奧密是造不懈其躬不喪其寶心焉死灰頭若蓬葆藏明委順是曰至道翩翩二難孰去孰存厥徒允從匪私其溫恍焉松聲彼聽莫聞勵爾後人永矢勿諼清容居士集卷第二十
