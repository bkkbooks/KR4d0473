契孫乃九遷舜詎平陽都神京屹金臺五雲玉芙渠始知天經旋積氣為堪輿家鄰天台山云有二子巖巍峩太古石纎修矗雲尖上棲西竺僧雪色垂鬚髯二子與之遊作詩清且嚴乳花散瓷甌瀑布飛銀簾醉醒夢見之謂我何留淹南簷孤生竹歲暮柯葉蒼豈不念道里因之摧雪霜夷齊盧龍居胡為乃名揚入水蛤有文踰淮枳彌芳受性諒匪移臨風酹吾觴弱冠不飲酒篝燈橫玉繩或云酒中趣湛湛浮雲蒸棄書試其言杲若烏輪升天根轉晴雷堅城為之崩妙言粲瓊屑逸興追飛鷹醉鄉儻可居無功乃真朋醉中發莊語爛如錦中花急急抱蘆鴈肅肅投林鴉欲别意深省瞑目不復譁愧彼獨醒人揣摩生咄嗟下馬暮入門雙目含飛沙醉者忽復悟振衣正烏紗江梅生空林嵗晏美無度挈身踰朔易塊獨此室處氊房望朝陽耿耿不得語雕籠粲珍禽悵望秦鄉樹爰居東門止盛饗非素茹臨風嗅其英雅志懷故土嵯峨白雲阡種松在山腰散之不盈掬離離如麥苗迎陽漱靈津參差拂雲霄露重碧天淨玄鶴時來巢俯仰二十年鬢齒日以雕寄聲謝玄鶴相期躡岧嶤劉氏義門藝閣寶書輯靖言繇外孫感彼南山豆凄其北堂萱昂昂夀母懿槐栁植髙門潛夫豈無論莫述寒泉恩時康廣女史願以銀管存述郭楚望步月秋雨琴調二首明月當清空流光滿西墀振衣獨徐行耿耿長相隨我心如明月萬古無成虧偶逐區中名遂為塵所欺抱影長夜吟别鶴同離思行矣歸故山探玄結幽期幽期永勿諼長嘯彈朱絲欹枕絶幽夢臥聽秋雨鳴寒葉不自持摵摵金石聲清商肅萬物此聲何不平寤歎生遐心夙昔羞近名千金隴頭客荏苒朱顔驚此夕秋思深斷續難為情載歌招隱辭臨風寫餘清送吳博文歸天台中年困菽水絶足萬里道舊家天台山清夢嘗草草秋雲起晴姿思逐冥鴻矯三年鄞江上微祿紆素抱緬懷揚雄宅古徑雜幽葆童年手種竹翠羽插雲表還家恍南山訊俗憑舊老清名天所閟投冠詎終保鳴鞭踐修途置用實國寶英才剪春葩醇語酌清醥解榻定有人行矣趨徴召青蘿罥寒猿深啼怨清曉送人之官遼東昂昂泰湖槳直上遼海東層波起清兕出日搖蒼龍中有仙人島卉服雙碧瞳手披古墜簡返真極彌縫季世日以漓神功貫鴻濛維聖居九夷駕言挹淳風衆情習近慕飛塵哆青紅觀瀾悟玄化白雲淡無蹤逺遊豈不樂感悵非終窮得一齊清齊不知嵗尸坐觀藝藝神珠護靈淵歷落光景分先時謹橐籥執機合絪緼淳音出虛牝百靈憺無聞九關肅夜令星斗森玄雲永玩泰始體握之密成文緬言延年士服食為竒勳寶氣倐消蕩纍纍竟丘墳念此意愈冷幽居匪離羣次韻蔣逺靜二首陽靈貫竒璞棄捐荆山傍悲哉三刖翁炎空泣飛霜此寶不復試襲緹乃深藏百神靜護之石老日月荒峩峩五彩雲散為白虹光追琢在所用持以登明堂椅桐生空林繁隂閟道傍永斫雲和器十指凝冰霜玄鶴何方來鎩翮感摧藏合為清商曲行雲渺荒荒素心諒平和鑒彼明月光置彈集吾聽遺音在髙堂次韻鄭景尹二首弱嵗拾琪葉耿耿金石音逺為關河遊衆嗜非所欽曳裾入承明寶䇿紛珉琳秉筆直塗竄嗒然養書林維南有佳樹寸雲出遙岑遲之不肯來辭以道里深跂豫匪朝夕盟言在兹今層臺望秋林華樹在其顛上有青樛枝為我玄鶴延良時豈不感盤雲復回旋瓊英失零露百卉爭忿悁願言保遺直勿使衆蔓纒一歌以慨慷再歌朱絲絃再次韻潛魚護嘉鱗雛鳳含淳音束髮勇聞道執御羣公欽痛哭悼賈生敏給卑陳琳荏苒嵗月遷厠身羣玉林飛塵化玄髮所歷多崟岑精衛有猛志不畏巨海深遺聞理墜簡修名匪垂今古有惜隂子觀日扶桑顛雞鳴起中夜紅光朗流延吾欲挽其馭與天同左旋志士不並世寸心增結悁神澄水鏡淨世閲徽纆纒鄙語雜謬誤奉身直如絃觀圖書次韻景尹少逰竹素圃學道希心傳祖德允遐聞履冰凜求全素衣入京洛飛塵浩難湔車書煥皇度末技期雕鐫稽古在簡要敢侈三萬言煌煌羣玉府遺跡森炳然滄波蓬壺島古石仇池天方諸變毛頴寒暑隨推遷感彼傳玩數寸心獨悲悁凄其衣冠聚拱木思昔賢籝金白雲化青箱游蠹旋寥寥鈞天夢髣像追四懸尤物詎足貴尚德庶永延愛君閟神珠出水復媚淵六籍儼遺訓精思貴誠䖍一撫玄鶴操以賡雲和絃次韻廬山黃伯玉東漢名士十詠食肝不知味詎為口腹人紛綸五經學講道踰八珍古來植名士殺身以成仁念此匕箸微少忍非傷貧髙誼動白日正色凌三軍仲叔固義士井生乃天民漢季日頽靡莾莾蕭艾叢孺子南州彥獨立風雨中兩為故人吊斯道萬物宗湛兮如止水脫焉如捕風儉德良辟難栖栖何為容耕稼詠典籍食志非無功叔度長閭巷奉髙獨先知盛德眇莫名欎為時所師朗陵一邂逅此豈髫齓兒幽篁抱靜節游龍隱深陂至今百世下清風散肝脾仕止適天運不喜亦不違薄遊河南道還家復牛衣力田南山下久卑不學恭每於風雨時執禮夷踞中甑墮乃失聲此意人所同厲行名益彰無懷道之宗郭公果善相千載我欲從伯鸞事沉冥作勞賴仁妻身隱不願文更治山中棲浩歌五噫詠麥秀何凄凄遐征詎遊觀鳳鳥不復來嬴博慕季子居夷法宣尼幼無適俗韻與世非寡諧至今青青冢猶有鳥㗸泥古有逃名士洗耳東海東韜精事肥遁浮雲藐王公被髮或佯狂垢形滅其蹤季世事標榜紛紛競罹凶所以康伯徒邈焉不知終幼安家北海流徙來東冥一帽常掛頭破席屢見經六籍躬探微衆說紛聚螢老非諸侯客肯至三公庭華生竟夭折管子終康寧龎公老江漢性本愛居山採藥山北涯歸鷗送之還青林酒一巵白日茅三間時許眼中士非鵠亦非鸞性不耐束帶矧肯貪王官侣憐牀下子﨑嶇卯金寒靜性閲變化道充身愈安乘風學輕舉寒蘿杳誰攀中郎天外鳳北海人中龍鳳以五采萎龍以有悔終失身匪素志尚言乃真窮舉世習玄默脂韋爭長雄之人佩瓊琚肆言刺羣公落口掇真禍悲來事容容蘇公起深悵蠻江蕩舟中荀陳兩家子龍鼎合雞彛昔嘗窺其圖一一無吝疵空巖古桂樹崔嵬匪今兹想當下車時羣雛古威儀行酒拜滿户入門揖當碑惜哉或與羣巨構頽其基我家司徒公清德炳漢朝盈盈丙丁綬燁燁左右貂謂此非世美脫去孰敢招榮木固同根其末千萬條徑節或峭正孤吟或清寥世逺人事疏耳冷心志消瞻企法天運盛衰感江潮束髮六籍功矢言期久要詩來振遺響縹眇孤鳳簫前修果未沫百世詎云遙觀真文忠公畫像羣賢輔絶學嵯峨武夷峯熒熒方瞳光汲汲汗簡中緬懷文明初蒼珮極匪躬執筆侍玉署妙語工彌縫飛塵變蒼狗潛淵閟游龍空餘經濟心勞徠飢飛鴻濁水投神膠揚清乃竒功喬松不並世寒飇轉秋蓬生世我巳後正緒遺顓蒙惕然拜公像斯道非終窮同官奉常寶慶初同為侍從先生被曽大父樞密越公嘉定辛未與先生併識于後黜先公亦以論邉事去國獲拜遺像隨班著暨端明公嘉熙間以西山先王忠簡公嘉定入朝曽大父越公獲向遊學婺女得拜端明公之次子令生門人揚歷麾節先公則已捐館桷其孫申伯于鄞喬木摧落桷深為此尹道家世遺事纚纚不絶口今復見以自勵亦以勉夫申伯懼瞻仰西山先生遺像因叙事契併陶道士心逺齊少秉丘壑志養真事深寧清晨脫章甫習道誦丹經熒煌金碧居明霞敞殊庭逃形託榮觀漠然守心扃矯首西南雲飛蓋垂流鈴八表散清雨歸林何亭亭緬懷靖節翁舉觴日沈冥之人靜且修竒服飬遐齡長松舊云植秀色日以青素心靡違只矢言寄山靈寄題郭靖州絅齊靈曜動橐籥萬物俱光晶湛然齊居子韜精獨沈冥飛梭織翠霧層冰瑩踈星製為蟬翼衣無華靜儀刑憺兮神君來不笑亦不頩一以却氛垢一以永千齡我欲從之逰車音振泠泠清容居士集卷第四
