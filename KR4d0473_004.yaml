body:
  text: 古詩五言夕佳亭赤雲下平田層巒紫光凝踈鐘息萬籟晴湖淨奩冰倦翮戢已棲遊雲淡相承吹簫者誰子空林起孤燈感彼金谷人怪石樛寒藤壯意耻未沒水涌風憑陵亭亭玉浮圖百幻隨廢興振衣視天末黯淡銀河升朝曛詎異境氣寂念始澄贈養源編修回嚴陵省墓岧岧白雲阡翳翳青松居美䕃同靈根地易世愈疏清秋子胥濤縈紆達桐廬欲濟非無航契濶實跂豫昔聞祖父言結綬來京都束書逺鄉國井邑匪異殊俯仰成雲仍宰木今何如事逺遺諜存審象窺眉鬚寒暑有代謝念昔同一初躬耕樂真隱漫仕修素儒敦叙古所宗和侃寧有渝贈昌上人二首蕭蕭湖上波搖蕩羣峰秋客有萬古意支笻赴龍湫龍湫龎眉叟宴坐足未收飲以一片冰熟視了不酬長松挂枯瓢風靜林颼飀境足念愈忘道充身益優永謝巖下人深省聊自修岧嶤蒼玉軒虛聲振寒林我昔行其庭見影復見心秀嶂出古色浮雲為之隂豈不念世短所樂非所歆潜珍閟幽櫝羣弄誇姝音靖言事當爾江湖眇﨑崟送子歸山阿松風起寒琴宿竹院次珙橫川韻二首修竹手所種參差過屋山微風為之來心境兩相間清泉在澗底白雲在松間鐘聲集趺坐樓深流月殘重遊啓深省解轡思掩關昔遊玉几峰老禪肩如山機深削陳迹天馬初服間念欲從之遊小築茅三間俯仰二十載黃塵鬢毛殘亭亭石塔影哀猿守松關送宋夀卿侍御迎養建康葆真林閭下為善心自娛農圃得休息時讀古人書施食不望報折劵不顧餘時至祿自臻門有駟馬車念昔髫齓子繞床衣青襦束髮事編簡操觚入皇都徑氣摩黃鵠危言伏青蒲龎眉笑有言鄰曲驚且吁維南帝王州問俗宣典謨匪規鼎食榮菽水心晏如種德報已豐願言廣菑畬蘭生在堂下深根佇扶疏廣信陳氏擇勝樓散髮碧潭際讀書叢竹邊怡情學榮觀卜築遵自然雲蘿左右嶂雞犬東西阡羣動各有性孰念靜者憐翳翳昔賢居遺迹故老傳化為神仙宅喬木眯蒼煙松風起萬壑哀湍助鳴絃觀萬詎在逺泯默師韋編潘孟陽上書不報歸里作五詠賈生藴竒略徒步西上書昊天有正命傷哉杞人愚鵬翼垂雲來魂氣與之俱鼂氏竟寂寂主父復何如襄陽孟處士拂衣歸故山放浪巖壑深流詠遺人間舉袖巖花落擊楫江鷗還羊公何墮淚水聲日潺潺梅生一尉卑喋喋正天紀洗心洞玄化削跡棄妻子龍變孰能馴蟬蛻乃真止松回風泠泠水落石齒齒虞卿舌轉丸揣事精微芒事危見交態窮愁名益光黃金散逝水白璧凝飛霜丈夫有定志得失非預防仲連匡世姿揮手却秦軍掩袂停白日登車抗浮雲射書誠草草孤城生死分辭榮敦薄俗矯抗離其羣題盧溝煙雨圖為吳成季作驅馬上河梁圓暈新雨紋矯首層闕巍翔鸞散竒氛猗南雙松樹百里風聲聞束髮入紫京去住心如焚送客釂我觴我釂不得醺願化為黃鶴朝夕隨飛雲上以奉明主中以承嚴君往復三千年竒齡合氤氲結袂安期子啓齒歌瓊文滑州從事持喪三年將終養其母郡表其閭東魯秉周禮化俗何簡偷﨑嶇小滕君冠蓋交道周漢帝仁且明遺令誠咿嚘駟馬不及舌坐貽千古羞濫觴始膚寸奔流淪九州昂昂古先進免胄希前修青松為之枯慈烏為之留念此嵗月短解紱安林丘華楹表槐栁細石寒泉流泯默區中人章甫慙沐猴孟和卿旌表濯纓息機事枕石聽流泉感彼蟻慕人駢首爭遺羶黃雲翳平壟持以防嵗年河流滔天來積浪翻中田招携舊鄰曲寒林起炊煙冥報非我願表宅增惘然紛紛遊俠徒黃金生愛憐原生處蓬户屢空聊自全雲中郝孝子混沌鑿既久重華以孝稱悲哉短喪徒稻錦顔益矜詩禮行中州衆說交沸騰挽十不得一閉閣徒凌兢芒芒古雲中土屋塗層冰下有郝氏阡馴烏為之增大圭出至璞匪以雕繢能寒泉冽古井零露溥蒼藤淳風詎云逺相傳在雲仍送沙君寶宰邑苑印史舊為翰尚印宰百里寒崖水𥻘𥻘野曠牛羊低山深麋鹿馴持觴接耆老種栁迎行人陶然樂清淨絃歌足青春次韻馬伯庸供奉書館書事二首瑶臺麗層雲秋聲起琪樹織翠藻井波凝碧鎖窗霧雍容列仙集晴雪炯振鷺念昔經啓初櫛沐合生聚簡册迄未成春秋奉神御巍巍冠函夏握筆慙繪句玄尊實明水越席敷大路崔蔡心匪迂終焉才名誤其二神京奉載筆需雲歌肆筵匪謂嵗月虛聖代深養賢微踪愧三入取禾踰十千馳神竹素圃鴻藻儼古先羣雄寶書聚彌綸乃成編微言耿玉潔潜光媚春妍往聖去已久八音蕩敷宣元運合豹變髙閎踵蟬聨夷齊乃首傳冥思豈其然送馬伯庸御史奉使河西青瑣倦迂散執轡踰關河黃流何奔傾積石何嵯峨承詔撫疲氓驚烏在林柯沙場有凍骨野畝無遺禾日夕寒雲聚宿燐明巖阿訪俗感素心因之聆詠歌詠歌者誰子被髮號天明婦死不復悲失兒誰與耕承平五十載不識戰與爭殘雪流銀液我淚同其傾古云百二險夸誕生甲兵孰能轉夷途歷劫永清寧清寧闡文運覽彼古帝都秦聲激豪宕洛詠夸敷腴邙山何纍纍下有白玉趺感彼秉筆人百金盡其諛死者已寂歷兹文亦糢糊偉哉龍門生悲憤有遺書遺書紀河源荒忽不可識君行河之西春雪深五尺茫茫賀蘭山抽矢石為鏑坐閲三姓王聖代始斂色沙羊護氈房名駝候土驛觀風慘無儔雲端羡飛翼飛翼西北來遺我書赫蹄中有陳情詞復憐雙雛啼野曠川無梁積荒氣候凄雞鳴葡萄根虎嘯苜蓿畦清霜集素裘斗戴天益低頓轡不得上雪山在其西其西何寥寥云有古先生巖居時一食委形淡無營朝日炫丹碧匪以斤斧成如何驕榮子騰拏列層城驅力超北海逐影徙南溟誰能佐玄化泯默有遺情遺情在相思舉酒不得起永念編簡功篤志刋綺靡傾蓋已云舊知我實知已送君河之湄凍栁光薿薿修途馬飛翻少立盡瞻俟植德綏令名眠食慎道里道里吾何能託身承明廬峩冠養深拙清塵避修途驅馬李陵臺望鄉問長鬚長鬚不能對吾行益次且羡君萬里道晴霞起䄡䄖天山諒非逺椎牛植枌榆月巖峻壁飛鳥絶積鐡成臺隍感彼玉兔精皎皎芙蓉床萬古消晦冥六月生隂涼道人悟空幻趺坐鬚眉蒼觀境不以色湛寂回真光成虧衆妄集嘉名表其常松聲起萬籟朝陽曙扶桑夜集西太一宫分韻得草字晝寂白雲深聨鑣集瀛島南枝當户生積素流羽葆孤鐘息羣動獨鶴候清早石枰松影侵持觴俗塵掃春風散琪樹頃刻光灝灝玄談發嘉奬夙昔恣傾倒偶爾同心期還山寄瑶草史氏報春堂白雲在屋角凱風生樹端下有慈竹叢低昂候平安盈盈玉雪母光若赤瑛盤朝奉鶴禁恩暮承龜臺歡教兒誦經史清言消綺紈築堂深且明朱光映庭蘭寸心諒匪石寵辱非所干世故疾危岌奉盈身愈完願言樹明德朝夕應加餐送于思容助教佐濟南廉司黃鵠不可招越雞乃司晨圓冠璧水遊玉雪映陽春篝燈玩太古垂簾避深塵遙望淮南山下有白頭親平生汗簡意朝昏具芳辛念之不得見顧影非我身檄書臺上來駕輿還海濱晴風破逺浪慈烏飛且巡雲帆蔽吳粟濟用懷經綸為儒究理道六籍彌光新空林閟幽蘭嚴霜養修筠明德在謹勗雍容奉昌辰天師留公返真空洞步虗詞十章以導遊巍魏道祖居層構凌丹臺手持赤龍書八景剛風開感彼下土人積劫何崔嵬傴伏永夀命夸誕魂益哀愀然彌不寧招我雲孫回白鶴俯前導青童戒俱來嵯峨金碧關神魚伏深淵呼吸空洞氣子夜朝諸天頃刻風雨集咫尺星斗懸長嘯千仞溪寥寥生紫煙飛符戒神魚嵗久助汝仙玄圃饒竒觀陽葩霧霏霏玉壺湛清冰瑶琴銷金徽混沌合空洞絶此見象機松風代揮麈縹眇白縠衣興移暘烏逝節弭川虹飛棊局儼未終白日何熹微蓬萊乃故山為我一來歸真風詎永隔神光淡依依昆崘鎮鼇極鬱儀交結璘故歲非我歲寧復論秋春稽首三天師彌綸返真淳精思彼嘉生雲施均萬民至感發自然不著亦不嗔運世有通塞六龍無停輪洞章激微吟長樂自在身蟬蛻乃清淨跡絶虛中塵挹秀㪺醴泉蘭殽鼎初調絳旗開景光下招徹紫霄連蜷靜夷猶感彼父老􅌽司命二十年守素淡不雕蜿蜒澍周原贔屭尸江潮瓊章遏清詠丹輿導逍遙視之不得見白雲在山椒南嶽雲輪囷英英生紫華靈斿淡無蹤來集玉斧家玄螭有遺跡望斗紛騰拏鞭撻隨三光服食制五霞上經永授之火鈴從飛車嶄巖陽平關古松化為人千嵗永不飢食之朝帝真中有一寸玉寒光敵金銀上結三元氣下援七祖神舉世尊禮之靜念通至仁留城平蕪連雲深樹泬寥磅礴經濟心永劫常不雕河車孕長命方瞳生本條瑩如珊瑚枝粲若翡翠翹諸天咸唱恭贊我玉晨朝人間倘再至玄化助神堯仙巖鬱寥寥石倉貯餘糧云有狡獪子用物能陸梁山花聳寶髻雲蘿曳青裳永念斷真妄帝令深且長境化道氣增變滅始真常參差應虛牝羣峰屹相望月落杳然去泉鳴玉琮琤朱棗何纂纂碧桃何團團感賞千古心生世常苦煎玄翁敞珍館金母和紫鉛三咽生羽翰空飛集諸天真氣常流灌眇眇復綿綿桑田海波滿彈指三千年大名劉節婦吟孤鶴不纍巢離鸞不飲溪溪明難為影巢成誰與棲飄飄無根雲流麗如虹霓下有貞松臺白日晝且凄我思徹霄漢冥邈不可梯青青東園栁子規當樹啼來者何用歡去者日以迷擊石端出火搗辛能作韲妾心倘未明請看井中泥育王珙禪師示寂二紀嶼上人回山中因寄塔主石塔纍荒土月落冰稜稜永懷跏趺叟松風吹不譍山房舊淨供素壁一枝藤語寂絶禪觀機深超祖乘擊石迸新火諸天化為燈上有白玉峰丹梯杳難登黃流巨野漲虎嘯懸崖崩斯道倘未泯微言足搜徴胡止水家三衢自言文定裔孫來京師三年念母以歸前述家學二篇以相勉復成一篇以遲其來武夷春秋功憤激渡江主寶書恣殽訛竹簡錯編組素王魯諸臣舊史足徴取是非紀其真曲直粲可覩紛紛燕說徒誣衊增巧妬日月例愈深災異說彌蠱或言九世讎晚嵗進吳楚羣公骨已朽聖筆孰與語坐曹徒深文曲學日旁午苦心抱遺經願言復師古泰元積磅礴日月佐經緯煌煌往聖學鈎考合表裏大道侔玄功不偏亦不陂至靜貫幽顯萬變集蜂蝟漢儒闓其端逐物失聽視旁行分户牖蔓說糅涇渭緬惟五峰翁正色直如矢謝彼憧憧徒感物志愈肆室虛生至和鼎渥實珍味歸求真吾師勗哉蹈前軌神亰欎嵯峨冠佩清且揚祕丘積縑帙瑣窗爛琳琅有客願從遊永言觀國光或云是鈞天九關嚴且防朝望羣馬入往來間成行彩鳳鳴聲悲裂臆思絶吭知子親見之素心益徊徨希名養簡默勿為衆所傷還家拜慈母祝以永夀康春風戒重來歸鴈同翺翔贈餘姚岑易直登第歸里二首束帶登玉署鵠袍立參差筆海春波融沈欎流竒思俳諧詎素願阿世非吾師寥寥天人際載牘陳雍熙嫓青昧正說擬玄騁荒辭鉶鼎有至味酸鹹異其宜有客奉瑚璉願言播聲詩初歌玄鶴舞載歌鳯來儀東浙山水國冠帶連畦畛清門徭役空華屋詩書泯晴江修竹宅燈火敦孝謹下幃論唐虞浮榮陋朝槿擔簦亰國逰射策疾飛隼精思坐待旦古巷絶遊軫蒼松䕃婆娑丹芝凝蠢菌乘時足變化樹立在修敏善之僉事兄南歸述懷百韻並轡承明廬荏苒十七祀陽林集總翠奧室麗文綺寶函龍鳯章玉佩鵷鵠峙泰帝興鴻文奎壁憲天紀楩楠購羣才弓帛徴四起番番古遺直正色論道理深幾虎生風神契魚在水三光密轇轕一札見萬里雍容丹地近經緯審國是霜奩賚黃柑冰盤錫朱李蒲萄與法酒承燕時漱齒俯陳天人際齰舌衆披靡始言官髙卑豫奪慎其軌終言瓊林資海㝢極鞭箠憸情曲如鈎讜論直如矢或以首鼠窺或以妖狐伺奏終慶雲開再拜玉色喜天青回海鴈萬栁色薿薿屬車度居庸整隊行過蟻老臣汝居守清霜慎顒俟秋風龍虎臺帳殿紅旖旎前驅列鵝鸛後御肅犀兕分行獻瓜