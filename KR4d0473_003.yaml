  text: 清容居士集卷第三
  hash: sha256:75e0e2e43f50e9286edd099fa6afca807b117b2de55afa41cf573dcee39c4565
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_003-1a}
body:
  text: 古詩四言再從姪瑛㓜孤學道龍虎山自傷不能鞠携述祖徳以勉之煌煌玄胄家越徙鄞隠道閟躬三世養真是生祥符觀光績文占籍浚儀佐邑孔勤粤有光祿亦奉于越聿魁開封老守于括少保恂恂卑退靜閲太保靈承逃難乗筏大耋韜明閭里胥洽篤生衛公喬柯茂豐敦讓貽則攝獄自公絶蔓秉仁千人著功冥報氤氳維垣錫崇於赫少傳受學族祖世正獻亦師之諱覺有書觧行於習繹典謨正獻同宇正獻首科少傳踵舉傳次舉于鄉衞公夜夢正獻淳熙辛丑登第少黜淳熙丁未中丙科三歳學于正獻公神告曰汝子宜遲上南省甲辰闔郡被復師以研繄我族父昭穆㑹稽非宗疇譜同源迢迢宴堂是叙聨族子講說後諸生少傳挽正獻詩曰宴堂相臣嫉忠同黨同錮太學士罷入偽學少韓侂胄擅權正獻以師旦亦廢傳以論蘇正學勃興象山武夷相繼登朝奉常羽儀維我少傳抱其魁竒曰經武有本日用不疲絶幣罷書感勵孜孜廼登東觀廼佐宰司歲為閹茂正肅冠廷戌正肅嘉㝎甲為秘丞兼樞宻院檢詳越公登第已二十進士苐一正獻秘監兼祭酒當是時越公年八正獻休休少傳繩繩載史纂謨致事以行少傳作程均贏紀經翼翼京邑十載敉寜憬彼介狄迴戈指淮鐵駟豗喧為厲之階公在宥密展誠弼諧悉卒宵征拉其妖霾緫戎輔京秉纛受齊宻院浙西制置使李全叛以同知樞姦沈于淵公歸在里徵彼夀俊縣車告止公皆不至三公年皆近八十矣于時徴公及東陽葛公參政宣三啓公府永楚賜履復荒于齊終越以祀冡子廬陵克謹其承曰惟瑞安儉不近名生我俊兄志學蜚英上試銓曺計偕荐膺余年尚孩企焉戰兢女紀既蒙訖籙更符匪曰愚智阨窮同塗火焚髙閎戚戚告瘏不敏其芸莫植其居泯奄長夜䀌然永徂念子之稚孔薿孔朗不寜以餬俾游泬荒我雖異途與汝同情無為夸淫無溺燕朋壹爾氣神履氷奉盈我宗匪微徳芬匪沬来者之榮逝者之戒沾沾懐新不䆒其敗鍳彼太素曷其有壞述我祖徳送爾言邁匪窮咏歌申以用誡張孝子汴張元綱之父為南陽屯丞母卒焉葬於府之南灘元綱痛不得復于里銜悲茹辛縮板負土崇為堂形尺以二十周廣之度十有二尋屹然而嵬望然而䑓甃以陶甓堅靚慎密構亭于中以庥其神屏傭伇躬畚築謂鞠育之義由己而始盡於是朞年廼成河南田君秀摭事徴實謂桷俾有述詩曰粤若古先巢穴奠居奫奫其仁詵詵其愚返真玄丘精糜魄枯如蛻斯登如鷇斯哺後王後民百幻具師顧瞻本初寜不爾思虆梩蓬顆惕焉表微歲月既遷孰封以機窮慆恣華輟泣而夸力殫扵民禮廢于家千夫丁丁逞巧莫譁風淫雨饕卒為泥沙嗟嗟小子内省是嗣維張孝子無貨財是恃無奔走是㑭宰如嵮如惟手拮据夕號其隂朝升其墟我心匪墜我力匪痡焦肺愒肝翳翳慈顔曰天有命兹土是䖍宛彼飛烏亦集于原隠而卒之有阜孔堅魂庥于所不畏不侮汴水湯湯其流匪沮孤征云邁入此室䖏申以顯之以詔爾永慕徐母表閭大名徐夫人以節名于夫宗晚居錢塘有詔表閭江南於是其子大夫公執憲東浙食豐享榮侈且至矣廣彤管之懿傳青簡之信舂容整嚴執筆林立四明袁桷廣為頌詩以備遒人之採詩曰婦道貴柔厥義彌剛柔以内施剛以外防燁燁秀芝空林自持永辭春榮三秀何虧維魏徐母玉雪其躬端操靜閑凛焉髙風念昔惸惸黄鵠孔悲婉彼孤雛不能奮飛春條其桒秋勤其穡聿懐深憂世徳靡忒漢婺矛牙張芝歛却駙馬黄髪稜稜髙秀里社蜀女周度斷髪表心矢言堅石厲躬鍛金沛有桓女少名其宗援刀割耳之死莫從繄此三粲代表其閭垂𥙿莫聞靖言長吁桓桓大夫退食自公擊鮮具甘是宴是崇勗哉大夫教忠于朝養和服寛慈令孔昭四海晏清士節莫著歸為閫範陰教是助雙闕峩峩天澤所表維夫人節維大夫孝我庸孔勤亦莫我敢效歌此擇辭永言申之過者必容四方其訓之致樂堂為鄱陽周南翁作有嚴周門寢宇孔齊温其碩容西南有閨爰琢甓楹爾養爾承慎而絜清以燠以明維大夫母柔恭俾壽嗟余季来教言孔懋木之彬彬視其同根有渰者雲孰隮而升伯也于房仲氏中唐先子之淑翕焉以灮我堂如跂我懷靡止載車以行不竦不倚周亰斯弁旨甘有衍匪旨甘則怡樂且靡違彼堂在阿樹松峩峩黄髪番番童舞婆娑于以樂康於焉作歌臺氏舞衣堂彼崇者堂白雲中央蒼蒼維松舒泉湯湯有羜孔碩有醪孔芳差池東西率祖以行令徳允修不震不侮孫曰吾祖祖曰吾父服其斑斕式歌且舞飲以大瓢爰撃其缶維咏維猶垂手以招有髧者髦彼雛夭夭永祈黄耇福祿宣昭左右承翼見其二毛􅍏居安矣亦既完矣樂時永清俾廡俾蕃肄其㓜儀雝雝桓桓宜爾雜服終焉考槃古詩五言舟中雜詠十首好花避車塵飛入黄河洗河流政茫茫一去不得底納汙有至道胡為愛清泚念兹物理深玄籥從此唘飛鴈翔南雲避􅈬端有得舊年春風歸雪花大如席隂陽眇難窺造物司其職慎勿事炎涼来徃任行役道逢射生船有鶴馴且臞青絲閉其目病翼寒蕭踈臯禽九天来此豈真吾徒獨憐羽毛佀盤桓為長吁家奴拾枯草走兔来相親生来不識兔却立驚其神行人笑彼拙歸来始嚬呻乃知特幸脫未信吾奴仁白葦生寒沙殘花摇敝帚燕都百萬家借爾作薪槱物微生最下功用廼堪取大勝桃李花矜矜闘妍醜清夜視北斗正色摇我前迺知中州殊譊譊浪談天召公化南國美教来自燕乾坤儻一致地氣何由偏紙鳶帖晴空飛輪走盤線東風恣昂蔵得意随手轉攀雲政相喜墮地忽復怨児童豈知此得失終戀戀惡馬少駕車駑馬多駕船駕船勿戚戚駕車何翩翩渠命有通塞誰能别嗤妍君看鹽車下淚隕如奔泉春菘種北土三年變􅟵菁一為居養移自覺顔無情南山植松苗深根定生苓千年化瑿魄豈比春菘榮鸕鷀漾晴空意態極楚楚翻風蒼雪廻轉日爛銀舞盤旋傲飛鴻清逺敵凡羽須臾下魚陂愧我覺疾去車行二十八韻乗車古云貴此意昔空羡河流露枯沙桑本接晴甸大車蓬蓬前小車轔轔殿髙緣縮先登却立駭所見隆如龜戴殻縛如𧖟裹繭效駕何昂昂帖耳復戀戀髙岡互回伏逺樹時隠見禪趺恣掀簸尸寝作瞑眩初疑肝膽傾漸覺手足顫兩耳傳鳴雷雙眸瞥飛電縈迴蟻旋磨局促蟲負版氣奔驚七還心嘔復三咽地軸從此翻日輪肯同轉軒輷怒交撞戚速急欲戰馬悲望雲嘶牛走見月喘惡箠恣調伏詈語極鄙賤中宵不知勞亭午輒告倦揩摩髀消肉舎弃足成趼薾慙朝飱薄重勝春酲湎土霧散游絲沙塵起飛麪咫尺方欲離頃刻已莫辨素衣緇漸化玄髪白新變人言道途苦我意舟檝便雍容漸追昔麗縟時想緬輭輪貴尊賢下足表置傳曵柴清時羞髙蓋群牧選況兹軌轍同及此寰宇徧詩成記勞勷旅次時慰唁餞王叅議以風帆目力短江空嵗年晚為韻澄觀學求道八景雲青紅上畏羲娥流鞭霆跨追風相知不在貎相見誰為容持此金石心坐閱寒暑中昂昂萬斛舟浩蕩揚雲縿好風助其端瞬息千里颿層波激飛雪正色令愈嚴拗堂覆桮水止足拘庸凡昔年九方臯相馬不以目想其遺玄黄神氣洞馬腹東方有一士被髪羮不肉居然使之来不復困邊幅浮榮一羽䡖至道萬鈞力達人固靈根清靜執寜極凄涼江海念别至勿戚戚空餘好賢心一矢貫千的魯聖勤經綸坐席常不暖事来非其意稅冕或恨晚每懐千嵗憂百嵗常苦短扣牛有真理短褐歌石爛機心起風雨平陸能成江苟非養其恬事至誰能降此心皦明月爽氣通八䆫長空掃林莽寒飇助舂撞鉶羮有至味易牙敢加豐醯鹽强調適衆口終難同澹泊本真性清淳豈纖容一朝饗帝所祥雲藹晴空文章工世姝此道非真詣有如東家施捧心學夭麗公文雲雷尊落筆即千歳棐几生晴漪三沐古錦藉平居挽士意寳鏡懸秋天清影閱今古寒灮萃蚩妍凄涼塵土姿朗鑒勞評銓相親耿無語相期欲忘年雛鳳棲桐枝清音起冲逺英英異群羽秀色日以婉詩書有真託我輩同一莞深根在永閟衝霄未云晚次韻虞伯生夜坐炎晶爍草露木末望西顥靜躁誰為尸翕忽紛寸抱志士法天運炳燭不在老群經固其郛積神以為寳陋彼多言生希名太玄草山林詎心違歳月付幽討擾擾徒為名努力在此道地氣環中州槖籥均宇内中宵炎溽頻露坐猶憒憒逺窮太古雪欲徃終有徕馳神極寥廓我筆不可載栖形竹素園萬化䓁歴塊相期江湖深慎勿寒暑礙秋風起天末紉蘭結幽佩次韻伯生弱冠事墳典里曲譏涼涼螢爝不勝火矧敢扶朝光驅車出門交一粲逢清揚罍尊實玄酒至饗不在觴慎勿飲世人徒令攪空膓紛綸五經學逺祖遺仲翔知賢恨已晚相見復慨慷至道縣日月無言炳陽秋辟世端有方低昂少淹㽞汲古理脩綆寒泉漾清流永懐魯兩生議禮終秉周我言失造次燥吻譚郊丘此悔行已止歸田賦冝休空餘六籍意歳晚期冥搜再次韻伯生兼簡仲章二首重柳積清潤曉日疑蒼􅋽萬化同一氣斯須變朱光夙志尚幽隠清夢時悠揚愧非酒中聖客至同覆觴委心理縑簡念至迴中膓時節忽已迅秋雲鴈南翔相期慎素業載歌慨以慷俗士同酷暑可人似清秋邂逅得二子傾心為渠留相望塵隕霧相親汗交流積雨暗京國苔痕生道周神交徑心醉何必登糟丘著書君已㝎彈冠我當休唯餘舊詩律支頤費雕搜徳生詩律清逺少與之比嗟歎不足復次韻二首皎皎明月裾美製異厖涼薄游起嘉譽妙選歸明光濡毫百王度麗思方抽揚澡身佩璜琚慎徳銘豆觴蕭艾不並䖏三嗅懐剛膓永愧斥鷃姿側身厠鵬翔終然願胥附竭誠以慨慷玄鶴警清露逺思凌髙秋長松有佳蔭嚘然為之留譬彼明月光那能染黄流洋洋日以徃天風廻不周畏此颯爽涼行當返浮丘同憂有竒士詩来賦歸休遺經倘可理墜緒期旁搜鞭馬圖為狄誠父作生駒萬里意所向知無前圉人忌其徳未試先加鞭要令俛首馴使我常相憐伯樂死已乆此道不復傳駕車困泥塗伏櫪老歳年所用非所養誰能别蚩妍畫師逐時好謂爾誠當然披圖重嘆嗟我意何由宣張希孟嘉慶圖年過九十其祖伯祖皆舜泉清且甘歷山秀而朗淳風邈泠泠舊俗遺穰穰怡愉二老歡敦厖百歳長銀光浮勝頬素髪垂過項階庭尊孝謹閭里化㢘讓春風連理枝晴日九節杖犢車共東西漁舫同下上蠶麻課餘閑豚韭随薄養薇山悲首陽菊潭陋胡廣愧彼非禮羅居然嬰世網孫枝孕天葩祖風躡遺響含飴記疇昔興門慰期奬冥鴻天機韜喬松白雲徃𬗟焉清風佳庶作髙山仰游長春宫分韻得萊字珠宫敞殊界積構中天臺神清歷倒景青紅隠蓬萊羣山助其雄衮衮從西来八荒昔禹甸爲此增崔嵬舊邑環蟻垤清泉覆流盃雲低落日淨莾蒼同飛埃緬懐古僊伯采芝雪毰毸長春豈酒國殺氣爲之廻天風起髙寒玉珮聲徘徊空餘水中輪歴錄環春雷之人去已乆松聲有餘哀次韻徐志友雜詠十首五世孫師川樞密喬木空雪霜孤枿存十一遺聞備家乗零落寜有述文勝理固然相道返初質志士心未降黽勉終惜日刻志非不工畏脩廼真怠勞生悟其機靜默希逺害棄觚强浮湛念至時永慨佳人在空谷不復夸絶代嘉賓秩初筵至饗不在酒傷哉囚飲徒醉目恣可不獨弦不成音短袂莫回肘恃此百尺臺誰復憂蟻朽至道存遺音我琴不堪撫愛此素心人更僕請遽數文章有正律短計工百沮寡言徒自髙憂熏汗如雨盈盈道間花秀色爭餘春舉俗競愛之孤芳愧陳人譬彼鏡中月照影終有塵八荒已同雲客行復踆踆玩易悲三陳微服志已迫胡為守其恬正色養神宅廼知無邪詩經緯貫三百載籍天所扶終古脫五厄古来操功時至能安絃近復㒹倒之撃石求飛煙峩冠儼尸坐委虵養脩年癈此汗簡勞謂可一唯傳談經各户牖正道誰當承朝􅌲不知朔夏蟲復疑冰髙堂屹崇構相彼甋與瓴師門有遺訓此語非吾能豫章古詩法萬折江海偉層波激竒觀妙用安可幾妥語非不能萎薾乃氣累東湖有真傳廊廟振朱屣天風眇東南碧雲澹凝戀嗜芰同苦心相得不在見黄塵各道里玉雪起清逺它年有飛鴻為我繋書箭再次韻答仲章仲寳十首東南有竒觀萬户粲如一覽古幽思深擬筆追七述芳澤同聚塵清淨葆昭質所憂不可言凝睇悲落日良苗没深蕪穡人志其怠無端揚飛塵螟􅠀賈深害力耕未逢年歲晚空永慨深悲采芝士却穀全季代春雲倚春山摇蕩如春酒相親在顔色念子心獨不薄飯時充膓短袖不掩肘髙樓政清歌盈盈自芳朽驅車學逺游古劔終夜撫長安𬒮成雲我去何足數相知有竒士不畏道里沮寒風振枯林落葉起清雨西山鬱佳氣萬古留青春夐露巖壑姿􅌽彼車上人之人有行役莫浣車中塵空餘白玉泉随車走踆踆長松養華滋陋彼霜霰迫虬枝結層隂下庇十畆宅擾擾區中人生歲寜滿百慎勿以智夸相逢復相厄新月無㝎姿低昂起初弦南飛有孤鴈驚沙度踈煙一為居養移来往忘歲年感物非不多音書為誰傳束髪交老蒼道大誰能承澄心養真源寒泉護清冰傷哉注巧勞欲作千金瓴豈無須臾好陶人愧非能淵明仕浮湛投劾志始偉愛此松菊佳餘年悵無幾八表雲鶴還不作身後累陶然且就飲軒冕真弊屣我家古城南喬木起清戀空江納雲影清夢時一見相逢故人深各念居止逺他年東南来贈君以竹箭三次韻酬周儀之虞伯生十首英英雲中君含思歌大一迴鸞舞天葩流粲杳莫述報之不成章玉雪耿素質臨風發長謡庸以永今日昔學空巖居之人怒其怠哀猿雜山狖驚嘯欲我害天隠神所蔵别之空悵慨桃源閟深竇亦復知晉代道逢學仙人御氣不飲酒我笑初無言彼已嗔我不哀哉守其愚繋石猶在肘冥化随悲風淪淪骨成朽逺客思故園孤松為誰撫露白天宇清鴻歸暮雲數誓將畢幽討勿為此游沮念子知我深神交泣天雨楚歌惜白日燕歌蕩青春哀樂自逐時流幻區中人我生功名念素領無纎塵飛鳶竟跕跕啄雀徒踆踆羲娥挟雙輈冉冉老見迫丹臺漱靈霞瓊蕊生尺宅控摶無須臾詭幻已千百慎此陰陽機逃虗脫真厄竒樹生南薰清坐彈五弦淳風邈永古白雲赴蒼煙世故日以媮俛仰随歳年折腰倘為酒猶足青簡傳破瓴居井眉勺水不得承寒橰轉餘瀝天風助為冰舊質儼有在誰言真破瓴愧彼埏埴功成壊非汝能龔生夭夭年苦節亦良偉輪囷閱書傳此事寜有幾口腹非過謀形骸迺真累所以商山翁終復著漢屣少年恣青春歡至無復戀一為關河行常恐不得見新鴈雲中来飛飛落南逺歸心耿無寐寒更促浮箭題汴梁推官周子明三獄詩卷三章結漢網清淨歌元元後世益以密姦慆日云繁治法如理絲衆棼政多端一絲不得直萬緒何由完虗心納衆口至理蔵片言永念死者哀更推生者寃汴州古循吏三獄成平反天道詎幽逺于公有髙門題弋陽巖山精舎圖紅塵落青山飛瀑遽洗之孕此巖中居寒膏漾淪漪白雲偉衣冠脩松古鬚眉書聲出虗牝杳杳空中箎桃源有神界天光固幽機一為漁父游妙筆工研窺至今武陵郡山水傳清暉次韻仲章蔡村阻風足弱辤北騎身輕落南航懐别意滉瀁問俗心悠揚豚韭供嵗歉蠶麥扶時康幽事不滿眼薄念時廻膓天風進蕭蕭海日懸凉凉喧豗土囊裂悵羡雲帆翔衆樹失髙下老鶴追微茫而我獨偪仄與子同阻長靜退實守道躁趍迺捐常愛此金石貞詎為道里忙相從果無悔後㑹誰當忘次韻陳畬齋七首䖏看爲韻明月明年何秋月如靜士炳然河漢明白雲護其清迸作飛空瓊此月不受彩却行印中庭白雲忽不見我思徒英英靈魄表空輪随陽産金玦須臾白璧成盈盈懼㒹越隂陽環無端變化終未歇獨恨今時人相忘舊時月人言月有桂天風墮微馨開軒睇扶疎西與銀河傾桂本空中塵那能助虧盈朗鑒自終古匪待今夕明舊年客清秋望月如望年長身兀孤影哀鴻起清圓落葉墮我後北斗戴我前勞生果有役念至心懸懸海觀濯銀雪金精融太和照我身上衣光耀何其多感此萬里意逝將飲亡何亡何豈真樂臨風託長歌暝樹迴朝光驚烏不知處群動俱念安客行有程度熠燿驚宵征熒熒化餘腐豈不畏跋履眠食在謹護殘醒强清坐朔風生樹端客袂何皎皎客扇何團團念此㑹合意永與明月看他年返舊壑願比青松完蔣商卿叙其先人客金陵與先子事契末章復以見属次韻堂堂金陵州草草石臺路羽書急星馳鋒車却金錯飛雲古戍基積雪寒沙歩我舟欲輕行我馬何跼顧乃翁入門初此夕傾蓋故寒暄謝浮語信宿陳薄具兹年心尚孩維時歲云暮艱虞脫九死邂逅欣再遇貞姿固青松雅曲廢朱鷺二老古先民百嵗等童孺微疴隔音容鉅痛割心腑孤根擢遺肄淳鷇悲弱羽緬懐青氈舊力守韋編素伊優笑侏儒呫囁陋章句珥貂匪七葉插架同四庫談空齊諧虗守樸燕說固芳林極薈蔚溟海窮混濩廼知山中雲政異巖下趣心聲要成律易象那可註群賢凛無幾餘子兢自數愛君思如泉愛君美如瓠願為汪汪深勿作翕翕附巨構千礎承珍裘百狐聚混世同餔糟勞生已嘗醋整冠儼初服拂衣謝紛務溝斷寜繪犧户樞詎為螙情深盡傾倒醉劇多謬誤忘機絶矜絜落筆化塵腐水深嘉魚潛雲重樛木怒翩翩林間鶴栖栖井中鮒飄零記疇昔慷慨合和喣辱贈難與酬臨風復成賦集廉園芳菲㢘家園換我塵中春古樹不受采白雲為之賓中列萬寳枝夭娜瑶池神背立飲清露耿耿猩紅新幽蜂集佳吹烱鷺摇精銀層䑓團松盖其下疑有人奕罷忽仙去飛花點枰茵髙藤水蒼佩再摘誰為紉濯纓及吾足照暎須眉真暝色起孤鳥寒光蕩青蘋信美非故居整馬来城闉次韻仲章杜門今日慵出門尸坐觀我生忽有故園思寫之不成聲舎北兩朱櫻翠羽垂流纓舎南青桐樹亭亭如盖傾念此永契濶為爾增拂嬰歸雲跂西山臨風意縱横暮歸馬鳴千栁昏犬吠一星出晴坌暗歸道客子塵滿骨入門視踈燈隠若眼中物展書弗能誦浩氣彌硉兀古来惜隂士志有不黔突愧我非䓁倫顧影竦毛髮寒風肅群動勁氣激清樾飢烏念其安驚噪落林月迺知造化理壤壤殊未歇贈黄教授歸閩中壷山束銀筆秀色倚車蓋其人清且明十室九冠帶林鄭陳方劉祥雲布卿靄緬惟乾淳初朝野實交泰執耳為之盟多士森弁㑹澄懐味蘭芷正色炳蓍蔡彌綸古編簡粲錯列文貝百川已東流末派擁溝澮飛霜隕喬木變脫䓁蟬蛻艱難老文學世徳芬未沬布袍黑嶙峋慘澹萬里外希音繹風雅一鼓瘖萬籟宛彼孤飛鴻鳴聲何噦噦飢来念其安飲啄欣有賴􅋽風振脩衢肅肅返征斾懐賢不成章因之結長嘅送許世茂歸武昌二首大魁先公其祖慶元同朝嘗與岷江下奔流日夜東南趍艱虞六十載蜀客無完居纎脩挂晴練五老為之廬招彼素心人蒼翠垂流珠峨峨銀䑓公懐寳耿未攄青桐擢孫枝下此佳鳳雛絢爛五采翼披霞表亨衢清音冥鴻逺逸興蒼鷹俱食竹戀苦志餐風養真腴誓將八極周覽徳為貞符嵗月諒有盡雲端復躊躇躊躇固吾事荏苒悲征途蒼莾鸚鵡洲日落楓葉赤昂昂處士恨蔓草化為碧之士䡖且儇之人何急窄至今千載下投筆弄鋒鏑銀城太古雪轉首一消釋雍容詩書郎浩氣裂金石裵回登臨意寒波静如席相逢各萬里末契論宿昔咿嚘語未盡征鴈起暝色凄涼衣冠聚山海窮畢弋翳翳桑榆光人物眇可識停驂望前坡去馬記初驛題金華洞圖二首巍巍靈居秀遥岑擁赬霞聞昔受道時三洞為其家金精裂飛魄躡武凌青華遺彼一寸松樛柯養真芽瞬息服光景神丹起槎牙下有千歳脂百靈靜無譁此豈甚祕之服食世所夸真凡路永隔䡖生竟如麻其二五嶽扶神州華能避洚水之患葛稚川地記言金洚水胡為魚兹山鎮無極不竦復不渝静閱浩刧理兩曜跳玄珠矯首二皇君寳冠白雲輿方瞳駐真盼濁垢紛何如霏煙聳空翠滴露凝流蘇神鈞合虗牝松聲自笙竽窈兮忽不見諒此寜非居送張上卿燎黄上塚素質超昆侖瓊胎孕崆峒指木為我母問玄為我翁承暉企春榮百嵗如捕風朝暾何朗耀莫景何葱蘢返真紫虗臺合歡朱陵宫迴鸞從舞鳳景命来圓穹妙感非世窺揚靈憺無蹤湛兮合冥㑹道一為之宗沉沉白雲闕雙鶴鳴青松念此不得見惙焉遲相從壽何平章二首方壷屹祥觀髧彼綠髪仙執簡朝帝居髙演清浄言雲為八表雨水作四瀆泉炳文一以施握之不盈拳頫首陳至詞囊括希其全成虧匪至理願言葆真玄琅琅黄石書功成廼言去豈不思濟時默焉念其素山中赤松柯云是童所樹長養媚以深屈曲美無度神光滿澗谷希夷澹無慮願持一觴言眉夀在謹護次韻雜詩五首有客一馬歸屋角群星明念此惜日苦義輪何西傾粲粲風中花弱豔夸芳榮而我獨枯槁欲學身後名少年觀滄海天濤碧因依下有珊瑚株紅光射雲輝玩之不忍舎歘吸雙龍飛逺為塵中游坐覺顔色違哀哉西山士飢食周原薇昔狂愛竒士接席多大言中道邂逅之捐生誓俱存傾家謝其意酒至絶不論此士今已矣長年常閉門幽居集竒觀積雪明寢扉湛湛新陽舒寒光騁熹微咿嚘南歸鴈長鳴示其機出處諒有素觴来為之揮朝游東門曲壊道荆棘存纍纍者誰冡舉觴酹其魂死無落魄名生有呫喋言所以荷篠翁臨流漱潺湲遺簪隠世徳忍垢躬灌園豈忘䡖肥念苟得誠少㤙采采松上花飢来助吾餐壽程内翰二首蕩蕩長夀居丹梯峻蒼旻中有龜鶴所老仙為之馴維時夏初至園林綠蓁蓁萬神峩冠環參差揚七均行雲鎮清樾靈波激層津振衣游帝青下土何其塵運與千歳期正色光景新無為理清浄世儒汩其真君子法簡易坐致羲黄淳車蓋交道周嘉醑盎在房有客東南来髙歌奉清觴一歌白日還再歌青春揚師曠世固有八音盪翺翔迴鳳下竒雲猗桐非故岡覽之不食實三嗅遺孤芳皎皎金石姿令徳豫且康窮河覩崑山出日賓扶桑介此黄髪期因之結成章别仲章飄飄貢公綦逺乃至關河關河冰為天積雪流銀沙前有林間烏後有馬上笳烏啼思我親笳鳴思我家川流去不息群山赴嵯峨余行已東南朝曛散微霞念兹日不見持觴釂餘嗟别吴養浩十首作盆盎淺為韻以願為江海深勿弧矢懸髙門卓犖四海願登車逶且遲永念道里逺雞鳴當宵行執轡上長坂西北何其髙飛雲列竒觀游神竹素園古聖儼若思至道䔍靜極執簡欲受之上有竒耦文摩盪光離離持以禦魑魅魑魅不敢為維東匯為湖浩溔通三江懷哉紫芝叟月明漱飛淙小言諒以清大言淳且厖去去日未逺奔流鼓㫪撞昔聞方壷居誓欲徃滄海操舟迅前邁雲雨白皚皚層瀾眇空洞肉翅不可待朝陽漱靈霞一食毛髪改古有無媒女閉門泣春深手擲雲錦梭流光耀晴隂千葩翠交結宛轉不可尋浮雲為之佇幽凰為之吟昌歜懐古辛在徳不在物屈曲寒澗底詎以險自屈有客同嗜之至享寜勿勿芳年匪淹留薄采消永欝雲和髙岡桐龍腹裂冰雹攫之淳且深謖謖震寥廓彈者不復語徃者誰可作玄雲浮隂来𨳩户失雙鶴緱山仙人居上有玉女盆觧髪三沐之清冰盪寒紋神膏釋翠縷跪坐晞朝暾蟬蛻有變化蟪蛄安足論客来南榮下欣言酌醍盎觴舉壷已空盤辟復三讓享之不成章何以為客貺客言君當休商聲助予悵草茂木萋萋水勁石翦翦相思關梁深相對顔色淺停雲眇為愁殽蒸可崇饌食之寜永飢臨分復三咽度淮寄養浩竹清寒房靜殘月在西壁悄悄燈景微尸坐棄枕席井華飲蟾蜍玄雲成五色明知非世謀精詣在六籍我行長淮浪凍樹挟春碧夢子白紵寛雙眸烱空激書来婁在手此意何的的數靣不成歡逺别迺復惻歸鴈臨風翔先之寄深臆懐伯生春雨消路塵春風散林纈蕩蕩長安門客子千萬轍城隂有一士淡食羮不啜采彼松上露煮石化晴雪沈冥護真性觴至那復說向来舌本談今作耳根熱維南有樛枝巖溜滋百結在徳良自防居屯詎為折念此長夜深寒光吐殘月酬蕭靜安提舉二首溜泉散餘塵稍稍軒檻清孤凰起天末縹緲參差鳴佳音寂萬籟異采含蜚英衆葉豈不光終然哆春榮翩翩者何雛和之欲成聲廼知雲間意非復區中情有客何方来贈以雙南金維時夏初溽寒光激玄隂至靜閱真賞獨晤諧希音伊江渺風濤伊林復﨑嶔出處各未得冥思結長吟於粲不能報泠泠手中琴題劉充之載月圖磊落太古月摇蕩湘君波寒晶爍膏露倒㬌流銀渦湛湛洲渚浄天風泛飛槎晃蕩神界中四客歗且歌慿虗歷空洞金粟摇靈柯流光閟星斗恠影窺蛟鼉服食詎在酒三咽顔為酡俯仰㑹合初逝者已山阿昂昂菊間叟秉芳獨婆姿微茫信可傳披圖重吟哦壽賈叅議二首粲粲雪中松八表廻鸞翔下有采蓍叟澄觀振髙岡握蓍玩鴻濛竹簡儼在旁湛焉貫纍珠炳變猶龍章笑指青松言貞固以自防絪縕迺玄化清雲表竒光嘉平維吉辰初陽起天心彩鳳龡參差落落空洞音徘徊碧雲宇賓從羅清林神鼎朝已調芳醴時當斟損益在我手唘齒歌瓊吟煌煌秉令徳盼彼西山岑次韻揭教授官閩中欝欝太古樹藂生散珠玗明時炳陽徳寥落歘嵗寒天風西北来凍海飜層瀾芳朽各有性盛衰詎無端貿貿冰上屨黯黯塵中冠宿志不得醻奮飛戢其翰伊南蹇一士羇鴻河之干手持大雅篇八音佐王官墻陰卧朝日薄飯不滿槃邂逅喜我同金石生肺肝出處非故意低徊耿相看閩山渺雲濤東望通三韓居夷聖有在取琴為君彈寄題撫州先天觀浩浩太古石雕鏤矜嵳峩瓊林化飛騫寳構窮鬱羅矯首視三光丹青相盪摩上鄰列僊館西移瑶池柯玉蛟亦受令鞭撻迴盤渦巍巍雙華表飛鳥不敢過玄鶴時一来潛鱗淨無波心跡會虗湛神光隠鳴鼉𬗟彼巢居子凝睇佩女蘿天風入紫亰百靈莫誰何朗言渾沌後龍馬方負河視之杳不見嘉名表山阿冥思有至理熟視時摩挲送牟景陽教授天台峨峨陵陽翁麟筆凝秋霜採芝空巖曲白雲以為粮微言酌太古妙思歌瓊章餘人渉其藩自謂真班揚此道端未泯我心何由降五良秀髙門用處各有在伯如幽蘭深仲若春雲藹叔也端可人芳林起新蕾垂天得扶摇一决度江海相逢慰傾倒胷次澆磊磈天台古儒林秀士英且明君行振遺緒家學揚清聲文詞尚理性此弊無由更衆咻方爾群獨拍何當鳴為問舒與胡寒庭草青青澗也閬風梅功名不願多我輩端可免南州已寥落屈指閱諸彦汰如糠在前得若車度坂愛君不可㽞蓴鱸慰佳願黄塵我何事寒燈起清歎雲隠齋油油山之椒翕忽變平陸下上何其勞一息返神谷凝光養澄觀清潤積新沐知白吾未能寒聲起林木劉朔齋侍郎孫希孟能琴欲訪子昂觀松雪琴以詩寄之雨雪戒脩塗苒苒嵗云暮維舟望鄉國煙樹渺無度永懷松雪翁買田成隠趣齋中六尺琴清徹仙掌露虗聲合空洞天籟生㲈濩勿為離鸞吟眉夀以保魯亡之戚時有悼送胡安常河南省員外郎陽春恵澤廣蝡動回昭蘇皎皎尚書郎佐理勤居諸澄懐罄輸納疾首宣訏謨黄流交道周髣髴桑柘墟驅馬憇枯礫詢彼壟上夫歌䑓久寂歷商聲助清歈昔有屠羊子慷慨成須臾感激車上禮朔風為之吁侠氣散鋒鏑侈習翳榛蕪舉觴酹其蹤興廢今何如三河水門記白粲来東吴願言表里道坐使民驩虞次韻張秋泉墨蘭虗窓秋思集晨興憺無餘墨池漾清泉天葩散紛敷愛此巖中君贈以碧玉腴微雲觧蒼佩縹緲疑空無逺謝丹白昏詎畏霜霰濡守黑志有在談玄道非殊愧彼夷與齊絜腹不受汚湘纍慨永古世人陋其迂臨風嗅餘清是豈真緇徒迺知萬化寂妙巧窺分銖幽蜂綴疎蘂點點游晴虗閉門謹視之黄塵政紛如清容居士集卷第三
