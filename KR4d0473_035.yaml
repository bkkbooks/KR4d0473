body:
  text: 內制昭憲元聖皇后諡册文德合乾元母儀正而宸極立道參泰治王化基而國本寧靖思保佑之功冝慎欽崇之典有嚴祔禮爰重尊名欽惟太皇太后陛下淵靜體仁齊莊秉度憂勤潛邸清謐治朝內教洽乎宫庭懿範著于海宇實生二聖光于前聞用貽沖人纂兹丕緒方將樂怡愈以承至飬率恭儉以挹太和痛鑾輿之莫旋儼珠衣之如在謹遣某官奉玉册玉寶上尊諡曰昭憲元聖皇后伏惟靈承顯册陟配宗祧錫羡家邦永延祚胤英宗皇帝諡册文瑶圖纘緒神已御於鼎湖玉册揚休禮冝升於太室悼降年之不永儼立政以如新爰述徽猷以傳信史欽惟皇帝陛下文明天縱剛健日嚴辨姦邪於嗣位之初彤廷祗畏廣儀注於治朝之際清廟肅雍絶封敕以杜憸人申憲章以勵多士罰兹無赦令必惟行君臨三載而有成知周萬物而莫隱豈運逢艱否大命靡終然號謹追崇尊名是著謹遣某官奉玉册玉寶上尊諡曰睿聖文孝皇帝廟號英宗伏惟炳靈有赫歆格無違祔于新宫以妥以冝皇后册文皇帝若曰在昔正始之道必先內治于以奉承宗祧化成天下朕嗣大歷服祗循憲章冝資配助用彰位號咨爾皇后淑慎柔嘉遵道是行輔佐王邸謙抑自持實生元子國本斯建興龍舊鎮介子紹封粵若臨御之初贊畫計慮厥相維多正位中宫天神協祥今遣某官授爾玉册寶章坤順承天人道攸則表正母儀萬方是觀惟躬儉節用則徽音是嗣惟求賢審官則私謁靡干匡朕德格朕心實為有賴詩書所稱罔専美于前代噫敬厥初終有慶尚其念哉以膺爾景命特命右丞相詔帝王之職在論一相于以表正百司綱領庶績朕纂承丕緒勵精求治然而澤有所未洽政有所未舉豈委任之道有遺缺與今特命中書左丞相拜住為開府儀同三司上柱國録軍國重事中書右丞相監修國史一新機務使邪正異途海宇乂康以復中統至元之治所有便民條畫具列于后云云於戲朝廷既正著端本澄源之功風俗斯醇廣摩義漸仁之化咨爾有衆體豫至懷戒飭曲阜廟學詔郡縣廟學崇奉之制所從來尚矣乃者大臣言曲阜廟學創建聿新將嚴飭以風厲四方朕甚慕之惟夫子之道行于天下崇教立化實始於魯可不知其所自與有司其益加明潔屏遊觀嚴汛掃以稱創立之美敬而勿褻神明之道也茍完以教夫子之訓也其盡心焉毋怠閣皂山萬夀崇真宫加大崇真萬夀宫詔朕慨慕希夷式瞻殊勝蜿蜒磅礴之所兹神必靈虛靜恬惔之徒其用彌廣眷彼仙翁之化境曰惟江右之名區歷年滋多嗣教不墜形而下者謂之地兹實景山神而明之存乎人載加美號承天之大與國無強試進士䇿問月六日進延祐五年三制曰蓋聞昔之聖人垂衣裳以成無為之治稽於書傳任賢設教品節備具諄諄然命之矣是無為者始於有為也事久則弊唐虞之世歷年滋多不聞其有弊也治莫重於定國體尊國勢綱常之分嚴風俗之化一國體定矣善惡之類明賞罰之制冝國勢尊矣廉逺堂髙上下之辨也量才授官莫得踰越國之大柄也若是者其道何以臻此記曰禮樂刑政四達而不悖王道備矣夫禮以防民樂以和志刑以禁暴政以善俗四者何所先也夙夜浚明卿大夫之德也知其邪慝則知所以警之知其困窮則知所以振之為吏習常恬不知省其故何也繼體守文善論治者尤以為難朕承纍聖之丕緒宵旰圖治罔敢暇豫於變時雍若有缺然者子大夫觀乎會通酌古今之冝毋迂言髙論以稱詳延之美朕將有考焉試進士䇿問月六日進泰定元年三制曰朕聞自昔聖王之治天下罔不在初政故舜之嗣位也明目達聰命九官咨十有二牧禮樂刑政之道粲然備具禹成厥功祗承于帝精一執中實聖聖傳心之要湯黜夏命以克綏厥猷為本武王勝殷首訪于箕子天人之際明矣詩之訪落公劉書之無逸立政亦惟成王嗣服之始君臣交修以成繼志述事之業唐虞三代其揆一也維我世祖皇帝聖神啓運時則有同心同德之彥效謀輸忠故能混一區宇治化旁洽朕祗承丕緒永惟帝王事功見於經傳悉遵而行之時有古今制冝損益若稽世祖之宏規逺略垂統萬世夙夜寅畏以圖治安然人才之列於庶位者猶若未及治道之達于庶政者猶若未備子大夫其以前王之坦然明白可行於今者何䇿世祖政典之綱領當今未盡舉行者何事冝悉心以對以輔朕惟新之治先農祝文仲春令月原陸勸耕祗率舊彛以陳明祀惟兹艱食稼政允修相其隂陽迄獲豐廡司嗇祝文春土方興曰耘曰耔聿修耕藉庸薦常事維神功協先農種斂是司除災布祉以成善嵗太嵗祝文年熟於酉曷敢震驚僝功在初率循其舊爰立寢宇匪曰廣居尚訖相成以祈寧謐后土祝文至哉坤元以靜為主匠石踰年寧免震疊寢宇畢治庸復其初敢伸揭虔克相終事五方帝祝文五行之用相須以成維神司之萬物以靈相彼土宇撓神實多引誠致祈勿譴勿訶立皇太子告太廟祝文列聖延洪纂嗣大歷國本聿嚴太后有訓親王大臣僉言允同曰嫡曰長兹惟主器將建册命首告于宗廟西鎮祝文地道靜専載物惟職震竦失恆咎徵莫測側身內修秉德若惕慎其政刑爰别淑慝乃戒輔臣香册昭格籲復故常以砥寧謐司天臺祭告祝文太陽煌煌大明浴光咸池丕冒八表出震見離揆時朱明中街御輪體乾以行庶物駢臻法兹照臨實豫一人爰潔芬祀庸遂民因太嵗嵗行歸終福祿是惇四時秉權百神攸遵禮有報祈德用兆民時將平分雨晹協冝綏此金穰物無癘疵太衝本命卯為春門品物彚滋受命自天集兹蕃禧聿嚴省方髙明謹時大德曰生繄震是出順隂飬陽罔敢暇逸肅迎元本多祜有秩勝光鶉火之宫司南秉陽時維長飬品物用章繄月之恆儷日以光兹實命元受福無疆芳薦式陳莞簟錫祥金星金精呈輝配日後先遇伏斯晦厥用不偏清商助威晱晱導前爰庸預祈以相坤寧吉蠲匪瀆戩榖是膺火星執法麗天俯承太陽曰兹贏縮厥有故常飭德省躬導迎景光陽居大夏翼翼靡違順軌合躔德馨是祈土星昭哉填星德隆倭遲燁燁中黃百榖阜滋斟酌元氣導迎丕基照臨元命肅將以祈嘉薦苾芬留俞靡違氐宿蒼龍首東兹維宿殿界于卯辰靡有忒僣象緯或凌曰有成憲彼不順行曷敢適從虔命宗祝監兹寅恭房宿巡狩事嚴百司靡寧率彼徒御興言宵征天星之精實為準繩凌伏愆常推䇿布程蘭席令芳祗迎展誠心宿布政于宫上稽明堂維兹日永法天以行五緯疾遲渾象森著謂數實然嗣服彌懼祝册致詞式筵菲具尾宿析木天津燕都所次維昔初基相攸塗塈民用不頗益遐以治靈臺考占庸啓震悸善言維從式致芬祀迎神天佑丕基一誠肅將瞻卬昊穹紫微騰光龍虎森衛鸞皇鏗鏘降兹瑶壇八音開張碧雲紓徐肸蠁斯皇送神靈斿歆顧靡亟靡遲敬天之休億載維期三垣潤明五曜逶迤玉斗宣光瑶壇受釐憺兮如存脫兮若遺楠木殿上梁祝文揆時夏季維土居中百堵皆作震疊是恐不日以成帝令攸式棟隆之初以砥元吉崇真萬夀宫設醮齋文序推良月式符坤厚之光誠揭層霄虔致泰元之祝竹宫汛潔蘂笈宣揚伏願神御顧臨靈斿昭格玉衡齊政永綏有道之長寶籙延年誕啓無疆之夀三宫悅豫四海乂安青詞天佑丕基肇啓乾元之始令行吉月於昭坤德之祥寅畏在初籲尊惟重伏願監觀有赫敷錫無疆懷德維寧溥羣生而康乂以慈為寶遂億載之怡愈皇帝本命長春宫祈福齋文獻嵗肇春懋對亨嘉之序祈天永命式臨元本之辰矯首層霄延真殊館伏願祥開泰治道合乾剛綏萬邦而致豐年咸躋仁夀錫五福而建皇極迄砥雍熙青詞陽和肇嵗冝與物以皆春元本建辰敢自天而申命籲尊為大祗翼若初伏願帝鑒不違神功溥運成四時之玉燭允協升平展億載之瑶圖恪依覆燾昊天上帝青詞皇極建中密運生成之造玄穹垂象益嚴寅畏之誠禮謹祈禳功深保佑伏願靈斿下今景緯順躔發政施仁迓丕基之永固側身修行迎嗣嵗之嘉祥崇真萬夀宫設醮齋文嵗慎省方爰恪遵於祖訓秋嚴報禮庸祗奉於玄科演繹瓊章敷陳瑶席伏願靈斿昭假叶氣周流玉燭常調遂家給人足之願黃圖永固致兵寢刑措之風青詞嗣守丕基心靡違於寅畏導迎繁祉嵗恪謹於修崇維德在秋自天申命伏願祥雲開瑞景曜宣光怡愈永康受介福於王母清寧無斁錫皇極於庶民皇太后為皇太子祈福設醮齋文天威不逺好生洽于民心帝訓孔昭受祉施于孫子誠深保佑禮盡禱祈伏願飇馭肅臨雲輿駢集鴻圖鞏謐允諧載物之功燕翼綿弘永保貽謀之吉青詞正位宅中恪守成於祖武承天順則庸徼福以孫謀矯首叢霄傾誠璇極伏願玉衡齊政金篋賜齡重輪重暉誕保無疆之慶有嚴有翼永恢長治之規長春宫散壇青詞祈報聿嚴儼神光之下顧精誠允格荷帝命之密符茀祿攸冝際蟠均慶伏願嵗成玉燭政叶璣衡孔蓋繽紛歸三千之寶所瑶壇馥郁拱百二之皇圖興聖宫上梁文旭日蒼龍聳帝京之積翠層霄彩鳯流阿閣之霏煙巍成少廣之居盛極東朝之禮欽惟殿下道師清淨性合儉慈色石輔天法女媧之妙用瑶池錫宴符王母之長生穆如薰風之自南粲若衆星之拱北陛下孝嚴溫凊敬謹膳羞謂神遊泰初當廣鬱儀之宇而飬以天下益新長樂之宫庶民子來百堵皆作倚空繡柱峩峩太乙之揚旌鬪角雕簷奕奕飛廉之奏舞彩宇周遭於禁雉寶華流曳於驂鸞匠石繕完蓍龜告吉舉修梁於地上川嶽無譁成巨構於域中雲霞得色敢伸善頌庸贊昌辰拋梁東天雞初唱日輪紅漢殿瓊巵稱萬夀堯階寶扇擁重瞳拋梁西三素雲扶鳯輦低閬苑碧桃聞已種廣寒靈藥不須携拋梁南薰風殿閣聳耽耽一色花光濃似酒十分松露滴如藍拋梁北帝子天孫來侍側何須玉檢告升平擬把瑶編增鏤刻拋梁上仙藥輕調承露掌龍圖載見贊無為魚夢維占歌有象拋梁下女史未須夸鄧馬聖德重歌韓愈詩徽音願續周王雅伏願上梁之後坤元光大鼎命延弘雲需湛露之恩德廣陽春之澤松茂柏恱三宫同億載之歡風散雨濡九有順四時之序與天齊夀率土歸仁皇太后寢殿上梁文璇宫擁翠刻姑射之層山柏寢通雲儼廣寒之寶所凝神清淨協德順承皇太后飬備東朝尊臨北極天純佑命握四時而品物亨夕以安身御六氣而隂陽理寶典深調於玉燭珠星連緯於紫躔陛下禮謹家人孝行天下謂榮觀合老氏之要道而廣居乃亞聖之至言令月書春惠風司律瑶池湧地龜吐瑞以成形畫棟騰雲燕銜文而獻秀髣十二樓之縹眇開億萬載之怡愈工師肅給以無譁多士歡呼而稱慶修梁舉地率土皆春敢集歌謡庸伸贊祝拋梁東髣佛神君下夀宫絳闕雲光催曉日翠簾花影揚春風拋梁西靈杵玄霜煉紫泥露下隃知金掌濕參橫坐見玉繩低拋梁南咫尺天居接蔚藍砥用麻姑擘麟脯共看帝子引鸞驂拋梁北色石神功參太極物無疵癘樂豐年道合希夷超至德拋梁上紫微鈎陳肅玄象五兵不試太平年三聖重光天下飬拋梁下內宴傳歡慶朝野逰魚漸識柳邊舟飛鳥時隨花外馬伏願上梁之後乾清坤謐月穆星俞擊壤而歌阜康結繩以復淳厚千萬年永清於四表九五福悉萃于三宫楠木殿上梁文天道不言而庶類亨式嚴居所聖人無為而天下治爰法當陽坐朝知問道之勤側席審思賢之念揆辰考室申令鳩工欽惟陛下守位建中施仁濟衆陋竹宫之侈靡羞桂館之虛無宣室受釐未遑鬼神之問石渠論奏是資經術之明掄楩楠以擬棟梁審律度以合規矩爰居爰處乃寢乃興歌庶民之子來形四方之風動虹梁歡舉龜墨告從敢述輿情庸伸善頌拋梁東一朵紅雲泰嶽峰絳闕翠旌浮曙色玉階星辨整朝容拋梁西王母傳宣曼夀齊漏下銅壷催蜜炬庭傳丹詔擁金泥拋梁南薰風殿閣靜潭潭帝子承顔催鶴駕宗王侍宴擁龍驂拋梁北紫微熒煌儼宸極五兵奏凱一車書萬國來朝合圭璧拋梁上玉燭金穰契玄象陽剛深法泰元尊至孝力窮天下飬拋梁下百榖芃芃滿原野淳風再使比羲黃雅樂重宣繼㲈夏伏願上梁之後乾坤合德日月順行髙拱穆清景化溥霑於八表茂迎穰簡嘉祥均被於三宫率土歸仁與天齊夀普慶寺後殿上梁文積翠凌空儼諸天之層構側金布地成四梵之妙緣惟我皇帝陛下味道圓明宅心清淨深植善本靈山之付囑未忘廣種福田寶所之莊嚴彌奐像設參前而山立威儀殿後以雲趨一一青蓮層層貝葉爰以棲神而凝睇亦云澄觀以集思成祗樹園作平等觀虹梁將舉龍象具瞻拋梁東瞿曇瑞世日輪紅一手指天呈實際九旬談妙演宗風拋梁西雪山深處鵲巢低白足赤髭隨地見紺眉青眼倚巖棲拋梁南要看彌勒與同龕擊竹莫參朝九九拈鎚且問後三三拋梁北大地山河光的的平齊斗柄布王春深拱宵衣開夀域拋梁上堯仁如天髙蕩蕩八風不動太平年四時平分真實相拋梁下川后山君擁風馬赤麟白鴈奏郊丘瑞麥嘉禾遍原野伏願上梁之後後天不老景緯齊光玉檢七十二君同觀三脊金輪萬八千嵗共拂銖衣四海永清三宫均慶天慶寺佛殿上梁文寶構凌空稱華嚴之富貴青蓮湧地成祗樹之神通雪堂老禪心匠虛明性宗真淨住南城數十載名滿江湖祝北闕億萬年日嚴香火雖紺宇禪扃之已敞而璇題祕殿之未雄靈山之法會如新黼扆之綸音已下無踵而至不日以成繡甍結飛霞稱由旬之龍象金波麗鳷鵲儼第一之人天爰舉修梁敢陳口號拋梁東須彌初見日輪紅願上吾皇千萬夀銖衣拂石宴春風拋梁西一朵紅雲映日低不用親遊天笁國只今寶所總菩提拋梁南軒窗面面是瞿曇欲問拈花微笑意雪堂老子睡方酣拋梁北殿角罘罳如翠織鐘魚解作梵王音日把心香祝宸極拋梁上大雄之尊夀無量聖朝方是太平初白馬迎經踵三藏拋梁下禪板蒲團不須假側金布地擬諸天香鉢如雲坐長夏伏願上梁之後乾坤泰治日月恆新豐年調玉燭之和正法拱金湯之固兩宫萬夀四海一家天夀節致語洪範九五福曰夀允屬至人上古八千歲為秋實名治丗仰天門之蔥鬱審雲闕之青圜黃道日明式紀老人之次金莖露肅有開上聖之祥慶浹叢霄歡騰榖旦恭惟皇帝陛下穆清居位剛健體元雷在地中消群隂於既長風行水上示景命於方來辟雍建崇化之規象魏布新民之法以食為本歸漕粟於中都所寶惟賢郤貢琛於絶域方且端冕以聽古樂惡酒而好善言麴蘖相臣簫勺多士瞻鳳皇來儀之瑞歌鳧鷖守成之詩克叶禹謨丕光周道某等伎陳九奏曲合三呼蘭有秀菊有芳願敷宣於律吕月重輪星重曜行登載於歌謡遙望天威敢陳口號羲和御日上蓬瀛盛旦曈曈集夀星冠珮雲排朝帝闕笙鏞春響藹宸庭瑶池已獻蟠桃實玉殿初開五葉蓂要識吾皇清淨理長生瓊液韌修齡清容居士集卷第三十五
