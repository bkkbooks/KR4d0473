body:
  text: 内制昭憲元聖皇后謚冊文徳合乾元母儀正而宸極立道參泰治王化基而國本寧靖思保佑之功冝慎欽崇之典有嚴祔禮爰重尊名欽惟太皇太后陛下淵静體仁齊莊秉度憂勤潜邸清謐治朝内教洽乎宫庭懿範著于海㝢寔生二聖光于前聞用貽冲人纂兹丕緒方將樂怡愉以承至飬率恭儉以挹太和痛鑾輿之莫旋儼珠衣之如在謹遣某官奉玉冊玉寳上尊謚曰昭憲元聖皇后伏惟靈承顯冊陟配宗祧錫羨家邦永延祚胤英宗皇帝謚冊文瑶圖纉緒神已御於鼎湖玉冊揚休禮冝陞於太室悼降年之不永儼立政以如新爰述徽猷以傳信史欽惟皇帝陛下文明天縱剛健日嚴辨奸邪於嗣位之初彤廷祗畏廣儀注於治朝之際清廟肅雝絶封敕以杜憸人申憲章以勵多士罰兹無赦令必惟行君臨三載而有成知周萬物而莫隠豈運逢艱否大命靡終然號謹追崇尊名是著謹遣某官奉玉冊玉寳上尊謚曰睿聖文孝皇帝廟號英宗伏惟炳靈有赫歆格無違祔于新宫以妥以冝皇后冊文皇帝若曰在昔正始之道必先内治于以奉承宗祧化成天下朕嗣大歴服祗循憲章冝資配助用彰位號咨爾皇后淑慎柔嘉遵道是行輔佐王邸謙抑自持寔生元子國本斯䢖興龍舊鎮介子紹封粤若臨御之初賛畫計慮厥相維多正位中宫天神恊祥今遣某官授爾玉冊寳章坤順承天人道攸則表正母儀萬方是觀惟躬儉節用則徽音是嗣惟求賢審官則私謁靡干匡朕徳格朕心實為有頼詩書所稱罔専美于前代噫敬厥初終有慶尚其念㢤以膺爾景命特命右丞相詔帝王之職在論一相于以表正百司綱領庶績朕纂承丕緒勵精求治然而澤有所未洽政有所未舉豈委任之道有遺缺與今特命中書左丞相拜住為開府儀同三司上柱國録軍國重事中書右丞相監脩國史一新機務使邪正異途海㝢乂康以復中統至元之治所有便民條畫具列于后云云於戯朝廷既正著端本澄源之功風俗斯醇廣摩義漸仁之化咨爾有衆體予至懷戒飭曲阜廟學詔郡縣廟學崇奉之制所從來尚矣乃者大臣言曲阜廟學創建聿新將嚴飭以風厲四方朕甚慕之惟夫子之道行于天下崇教立化實始於魯可不知其所自與有司其益加明絜屏遊觀嚴汛掃以稱創立之美敬而勿䙝神明之道也茍完以教夫子之訓也其盡心焉毋怠閤皁山萬夀崇真宫加大崇真萬夀宫詔朕慨慕希夷式瞻殊勝蜿蜒磅礴之所兹神必靈虚静恬惔之徒其用彌廣睠彼僊翁之化境曰惟江右之名區歴年滋多嗣教不墜形而下者謂之地兹實景山神而明之存乎人載加美號承天之大與國無彊試進士䇿問月六日進延祐五年三制曰盖聞昔之聖人垂衣裳以成無為之治稽於書傳任賢設教品節備具諄諄然命之矣是無為者始於有為也事久則弊唐虞之世歴年滋多不聞其有弊也治莫重於定國體尊國勢綱常之分嚴風俗之化一國體定矣善惡之類明賞罰之制冝國勢尊矣㢘逺堂髙上下之辨也量才授官莫得踰越國之大柄也若是者其道何以臻此記曰禮樂刑政四達而不悖王道備矣夫禮以防民樂以和志刑以禁暴政以善俗四者何所先也夙夜浚明卿大夫之徳也知其邪慝則知所以儆之知其困窮則知所以振之為吏習常恬不知省其故何也繼體守文善論治者尤以為難朕承累聖之丕緒宵旰圖治罔敢暇豫於變時雍若有缺然者子大夫觀乎㑹通酌古今之冝毋迂言髙論以稱詳延之美朕将有攷焉試進士䇿問月六日進泰定元年三制曰朕聞自昔聖王之治天下罔不在初政故舜之嗣位也明目達聦命九官咨十有二牧禮樂刑政之道粲然備具禹成厥功祗承于帝精一執中實聖聖傳心之要湯黜夏命以克綏厥猷為本武王勝殷首訪于箕子天人之際明矣詩之訪落公劉書之無逸立政亦惟成王嗣服之始君臣交修以成繼志述事之業唐虞三代其揆一也維我世祖皇帝聖神啓運時則有同心同徳之彦效謀輸忠故能混一區宇治化旁洽朕祗承丕緒永惟帝王事功見於經傳悉遵而行之時有古今制冝損益若稽世祖之宏規逺略垂統萬世夙夜寅畏以圖治安然人才之列於庶位者猶若未及治道之達于庶政者猶若未備子大夫其以前王之坦然明白可行於今者何䇿世祖政典之綱領當今未盡舉行者何事冝悉心以對以輔朕惟新之治先農祝文仲春令月原陸勸耕祗率舊彛以陳明祀惟兹艱食稼政允修相其隂陽迄獲豐廡司嗇祝文春土方興曰耘曰耔聿修耕藉庸薦常事維神功恊先農種斂是司除菑布祉以成善嵗太嵗祝文年熟於酉曷敢震驚僝功在初率循其舊爰立寢宇匪曰廣居尚訖相成以祈寧謐后土祝文至㢤坤元以静為主匠石踰年寧免震疊寢宇畢治庸復其初敢伸揭䖍克相終事五方帝祝文五行之用相須以成維神司之萬物以靈相彼土宇撓神實多引誠致祈勿譴勿訶立皇太子告太廟祝文列聖延洪纂嗣大歷國本聿嚴太后有訓親王大臣僉言允同曰嫡曰長兹惟主器將䢖冊命首告于宗廟西鎮祝文地道静専載物惟職震竦失恒咎徵莫測側身内修秉徳若惕慎其政刑爰别淑慝迺戒輔臣香冊昭格籲復故常以厎寧謐司天臺祭告祝文太陽煌煌大明浴光咸池丕冒八表出震見離揆時朱明中街御輪體乾以行庶物駢臻法兹照臨實予一人爰絜芬祀庸遂民因太嵗嵗行歸終福禄是惇四時秉權百神攸遵禮有報祈徳用兆民時將平分雨晹恊冝綏此金穰物無癘疵太衝本命卯為春門品物彚滋受命自天集兹蕃禧聿嚴省方髙明謹時大徳曰生繄震是出順隂飬陽罔敢暇逸肅迎元本多祜有秩勝光鶉火之宫司南秉陽時維長飬品物用章繄月之恒儷日以光兹實命元受福無疆芳薦式陳莞簟錫祥金星金精呈輝配日後先遇伏斯晦厥用不偏清商助威晱晱導前爰庸預祈以相坤寧吉蠲匪瀆戩榖是膺火星執法麗天俯承太陽曰兹贏縮厥有故常飭徳省躬導迎景光陽居大夏翼翼靡違順軌合躔徳馨是祈土星昭㦲填星徳隆倭遲燁燁中黄百榖阜滋斟酌元氣導迎丕基照臨元命肅將以祈嘉薦苾芬留俞靡違氐宿蒼龍首東兹維宿殿界于夘辰靡有忒僣象緯或凌曰有成憲彼不順行曷敢適從䖍命宗祝監兹寅恭房宿巡狩事嚴百司靡寧率彼徒御興言宵征天星之精實為準繩凌伏愆常推䇿布程蘭席令芳祗迎展誠心宿布政于宫上稽明堂維兹日永法天以行五緯疾遲渾象森著謂數實然嗣服彌懼祝冊致詞式筵菲具尾宿析木天津燕都所次維昔初基相攸塗塈民用不頗益遐以治靈臺考占庸啓震悸善言維從式致芬祀迎神天佑丕基一誠肅將瞻卬昊穹紫微騰光龍虎森衛鸞皇鏗鏘降兹瑶壇八音開張碧雲紓徐肸蠁斯皇送神靈斿歆顧靡亟靡遲敬天之休億載維期三垣潤明五曜逶迤玉斗宣光瑶壇受釐憺兮如存脱兮若遺楠木殿上梁祝文揆時夏季維土居中百堵皆作震疊是恐不日以成帝令攸式棟隆之初以厎元吉崇真萬夀宫設醮齋文序推良月式符坤厚之光誠揭層霄䖍致泰元之祝竹宫汛㓗蘂笈宣揚伏願神御顧臨靈斿昭格玉衡齊政永綏有道之長寳籙延年誕啟無疆之夀三宫悅豫四海乂安青詞天佑丕基肇啟乾元之始令行吉月於昭坤徳之祥寅畏在初籲尊惟重伏願監觀有赫敷錫無疆懐徳維寧溥羣生而康乂以慈為寳遂億載之怡愉皇帝本命長春宫祈福齋文獻嵗肇春懋對亨嘉之序祈天永命式臨元本之辰矯首層霄延真殊館伏願祥開泰治道合乾剛綏萬邦而致豐年咸躋仁夀錫五福而䢖皇極迄厎雍熙青詞陽和肇嵗冝與物以皆春元本䢖辰敢自天而申命籲尊為大祗翼若初伏願帝鑒不違神功溥運成四時之玉燭允恊昇平展億載之瑶圖恪依覆燾昊天上帝青詞皇極䢖中密運生成之造玄穹垂象益嚴寅畏之誠禮謹祈禳功深保佑伏願靈斿下今景緯順躔發政施仁迓丕基之永固側身修行迎嗣嵗之嘉祥崇真萬夀宫設醮齋文嵗慎省方爰恪遵於祖訓秋嚴報禮庸祗奉於玄科演繹瓊章敷陳瑶席伏願靈斿昭假叶氣周流玉燭常調遂家給人足之願黄圖永固致兵寢刑措之風青詞嗣守丕基心靡違於寅畏導迎繁祉嵗恪謹於修崇維徳在秋自天申命伏願祥雲開瑞景曜宣光怡愉永康受介福於王母清寜無斁錫皇極於庶民皇太后為皇太子祈福設醮齋文天威不逺好生洽于民心帝訓孔昭受祉施于孫子誠深保佑禮盡禱祈伏願飇馭肅臨雲輿駢集鴻圖鞏謐允諧載物之功燕翼綿弘永保貽謀之吉青詞正位宅中恪守成於祖武承天順則庸徼福以孫謀矯首叢霄傾誠璇極伏願玉衡齊政金篋賜齡重輪重暉誕保無疆之慶有嚴有翼永恢長治之規長春宫散壇青詞祈報聿嚴儼神光之下顧精誠允格荷帝命之密符茀禄攸冝際蟠均慶伏願嵗成玉燭政叶璣衡孔盖繽紛歸三千之寳所瑶壇馥郁拱百二之皇圖興聖宫上梁文旭日蒼龍聳帝京之積翠層霄彩鳯流阿閣之霏煙巍成少廣之居盛極東朝之禮欽惟殿下道師清浄性合儉慈色石𥙷天法女媧之妙用瑶池錫宴符王母之長生穆如薫風之自南粲若衆星之拱北陛下孝嚴温凊敬謹膳羞謂神遊泰初當廣鬱儀之宇而飬以天下益新長樂之宫庶民子來百堵皆作倚空繡柱峩峩太乙之揚旌闘角雕檐奕奕飛㢘之奏舞彩宇周遭於禁雉寳華流曳於驂鸞匠石繕完蓍龜告吉舉脩梁於地上川嶽無譁成巨構於域中雲霞得色敢伸善頌庸賛昌辰抛梁東天雞初唱日輪紅漢殿瓊巵稱萬夀堯階寳扇擁重瞳抛梁西三素雲扶鳯輦低閬苑碧桃聞已種廣寒靈藥不須携抛梁南薫風殿閣聳眈眈一色花光濃佀酒十分松露滴如藍抛梁北帝子天孫來侍側何須玉檢告昇平擬把瑶編増鏤刻抛梁上僊藥輕調承露掌龍圖載見賛無為魚夢維占歌有象抛梁下女史未須夸鄧馬聖徳重歌韓愈詩徽音願續周王雅伏願上梁之後坤元光大鼎命延弘雲需湛露之恩徳廣陽春之澤松茂柏恱三宫同億載之歡風散雨濡九有順四時之序與天齊夀率土歸仁皇太后寢殿上梁文璇宫擁翠刻姑射之層山柏寢通雲儼廣寒之寳所凝神清浄恊徳順承皇太后飬備東朝尊臨北極天純佑命握四時而品物亨夕以安身御六氣而隂陽理寳典深調於玉燭珠星連緯於紫躔陛下禮謹家人孝行天下謂榮觀合老氏之要道而廣居迺亞聖之至言令月書春恵風司律瑶池湧地龜吐瑞以成形畫棟騰雲燕銜文而獻秀髣十二樓之縹緲開億萬載之怡愉工師肅給以無譁多士驩呼而稱慶脩梁舉地率土皆春敢集歌謡庸伸賛祝抛梁東髣髴神君下夀宫絳闕雲光催曉日翠簾花影颺春風抛梁西靈杵玄霜煉紫泥露下隃知金掌濕參横坐見玉繩低抛梁南咫尺天居接蔚藍厎用麻姑擘麟脯共看帝子引鸞驂抛梁北色石神功參太極物無疵癘樂豐年道合希夷超至徳抛梁上紫微鈎陳肅玄象五兵不試太平年三聖重光天下飬抛梁下内宴傳歡慶朝野逰魚漸識柳邊舟飛鳥時随花外馬伏願上梁之後乾清坤謐月穆星俞撃壤而歌阜康結繩以復淳厚千萬年永清於四表九五福悉萃于三宫楠木殿上梁文天道不言而庶類亨式嚴居所聖人無為而天下治爰法當陽坐朝知問道之勤側席審思賢之念揆辰考室申令鳩工欽惟陛下守位䢖中施仁濟衆陋竹宫之侈靡羞桂館之虚無宣室受釐未遑鬼神之問石渠論奏是資經術之明掄楩楠以擬棟梁審律度以合規矩爰居爰處乃寢乃興歌庶民之子來形四方之風動虹梁歡舉龜墨告從敢述輿情庸伸善頌抛梁東一朶紅雲泰嶽峰絳闕翠旌浮曙色玉階星弁整朝容抛梁西王母傳宣曼夀齊漏下銅壷催蜜炬庭傳丹詔擁金泥抛梁南薰風殿閣静潭潭帝子承顔催鶴駕宗王侍宴擁龍驂抛梁北紫微熒煌儼宸極五兵奏凱一車書萬國來朝合圭璧抛梁上玉燭金穰契玄象陽剛深法泰元尊至孝力窮天下飬抛梁下百榖芃芃滿原野淳風再使比羲黄雅樂重宣繼㲈夏伏願上梁之後乾坤合徳日月順行髙拱穆清景化溥霑於八表茂迎穰簡嘉祥均被於三宫率土歸仁與天齊夀普慶寺後殿上梁文積翠凌空儼諸天之層構側金布地成四梵之妙縁惟我皇帝陛下味道圓明宅心清凈深植善本靈山之付嘱未忘廣種福田寳所之莊嚴彌奐像設參前而山立威儀殿後以雲趨一一青蓮層層貝葉爰以棲神而凝睇亦云澄觀以集思成祗樹園作平等觀虹梁將舉龍象具瞻抛梁東瞿曇瑞世日輪紅一手指天呈實際九旬談妙演宗風抛梁西雪山深䖏鵲巢低白足赤髭随地見紺眉青眼倚巖棲抛梁南要看彌勒與同龕撃竹莫參朝九九拈鎚且問後三三抛梁北大地山河光的的平齊斗柄布王春深拱宵衣開夀域抛梁上堯仁如天髙蕩蕩八風不動太平年四時平分真實相抛梁下川后山君擁風馬赤麟白鴈奏郊丘瑞麥嘉禾徧原野伏願上梁之後後天不老景緯齊光玉檢七十二君同觀三脊金輪萬八千嵗共拂銖衣四海永清三宫均慶天慶寺佛殿上梁文寳構凌空稱華嚴之富貴青蓮湧地成祗樹之神通雪堂老禪心匠虚明性宗真浄住南城數十載名滿江湖祝北闕億萬年日嚴香火雖紺宇禪扃之已敞而璇題秘殿之未雄靈山之法㑹如新黼扆之綸音已下無踵而至不日以成繡甍結飛霞稱由旬之龍象金波麗鳷鵲儼第一之人天爰舉脩梁敢陳口號抛梁東須彌初見日輪紅願上吾皇千萬夀銖衣拂石宴春風抛梁西一朶紅雲映日低不用親遊天笁國只今寳所緫菩提抛梁南軒䆫面面是瞿曇欲問拈花微笑意雪堂老子睡方酣抛梁北殿角罘罳如翠織鐘魚觧作梵王音日把心香祝宸極抛梁上大雄之尊夀無量聖朝方是太平初白馬迎經踵三蔵抛梁下禪板蒲團不須假側金布地擬諸天香鉢如雲坐長夏伏願上梁之後乾坤泰治日月恒新豐年調玉燭之和正法拱金湯之固兩宫萬夀四海一家天夀節致語洪範九五福曰夀允屬至人上古八千歳為秋實名治丗仰天門之葱鬱審雲闕之青圜黄道日明式紀老人之次金莖露肅有開上聖之祥慶浹叢霄歡騰榖旦恭惟皇帝陛下穆清居位剛健體元雷在地中消群隂於既長風行水上示景命於方來辟雍建崇化之規象魏布新民之法以食為本歸漕粟於中都所寳惟賢郤貢琛於絶域方且端冕以聴古樂惡酒而好善言麴蘖相臣簫勺多士瞻鳳皇來儀之瑞歌鳧鷖守成之詩克叶禹謨丕光周道某等伎陳九奏曲合三呼蘭有秀菊有芳願敷宣於律吕月重輪星重曜行登載於歌謡遥望天威敢陳口號羲和御日上蓬瀛盛旦曈曈集夀星冠珮雲排朝帝闕笙鏞春響藹宸庭瑶池已獻蟠桃實玉殿初開五葉蓂要識吾皇清浄理長生瓊液肕脩齡清容居士集卷第三十五
