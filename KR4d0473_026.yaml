body:
  text: 神道碑銘武義將軍梁公神道碑梁公諱禎字用之大名元城人父金吾公千為大名兵馬都總管既卒長子汴􅊞職㑹用兵江南復籍新軍别擇將家子統領中書樞密二府議以汴兼領公􅏌然曰兵事至重寧能使吾兄獨受責邪禎宜行死國效命弗辭也二府壯之攝授以新軍千夫長㑭鎮睢州帥領兵將渡河攻宋宋將夏貴迎挋遂領所部分擊斬首若干級帥上功狀拜為真中統三年李璮叛攝本軍帥出擊功益最璮受擒方璮叛山東時調發旁午璮善戰故將士多失亡璮受誅軍帥俱恨之議悉屠其黨公密白宗王哈必赤曰璮逆黨非土著俱東南狂士宜汰擇以安新土宗王然其言從攻襄樊功益著加授武略將軍至元十一年鎮邳州十三年王師渡江州郡望風下常州獨守世祖皇帝命大帥率堅鋭併圍之州嬰守益固有將築橋登城城弩中將死檄公代將即輦木石齊城雉剗其險塹緣附以登城陷第功授武義將軍佩金符後改鎮嘉興羣盜出沒江湖伺疑釁竊發獨展誠撫綏申令飭罰使不能少越繩墨㑹歲大饑捐己儲粟以食餓者郡益寧靜性沈默善計事天性孝友出於自然始公之考金吾衛上將軍當金亡時傍邑盜起侵掠金吾率衆列柵守鄉土天兵南下越境率父老持牛酒犒師城以降得完宋將彭斌渡河城中大震搜其首亂者誅之辛卯歲郡將蘇椿叛入南大將阿术魯怒將屠城金吾率宗人悉輸金帛詣軍前請命卒獲免公之妣張氏訓整有則金吾以兵亂失元配董氏踰二十年董氏還夫人即歸家政退處裕如也噫觀公卓然成就蓋其家教有自再世樹德傾身出口活人於大難其豐報蓋有以也王父而上兵難事逺不獲考至元三十年年未七十願解兵致其事大德元年正月某日卒于里舍年七十有一其年四月某日葬祔大名府西南白水村之先塋娶張氏大名織染局提舉津之女子紹祖􅊞爵佩金符仍鎮嘉興嚴重逺慮鎮遏邪慝悉不使入境後鎮烏江詢盜踪跡在海浦遣兵擒磔之郡鎮肅然延祐四年年六十終于軍四月某日祔先塋公女二人長適李居忠溫州路照磨次適張鉉濬州判官紹祖娶天水郡侯秦穩女生子女各一人曰成􅊞祖職佩金符娶大名府安撫使宋天祐女女嫁承直郎佩金符頴州萬户府管軍千户劉輿輿之父中順君今為雲南屯田萬户府同知桷與之游最稔善議論嘗言昔時離亂大名城中幾駢首就死獨賴梁金吾得全活空郊敗井隱然鋒鏑遺跡猶在厥今梁公子孫世顯抑為善之報善有傳往史良不誣也輿以事狀來請銘乃不復辭銘曰草昧肇區雨雷風驅崩角喪元孰完厥居嶪嶪單壘斧鋋就屠壯哉金吾請命發途稽顙瀝血氣填以歔春冰朗日稚耄夾扶或偃或興聚其室廬是生武義趾媺以繼粵維叛臣率黨狂猘交兵飛芻靡有寧歲既殱彼魁乃徒斯剃武義曰吁罪有等第宜磔其凶此土何戾再世興仁隂功奫奫如璞斯玉如山斯雲大田多豐曷耔曷耘番番餘齡終樂里枌靖共以儀不瑕以溫金符後先祖曽子孫白水之域松柏茂直為艱斯通爰表初植大名之城大耋日隔永言金吾曷其有極煌煌譜宗接佩踵舄有來墓門肅立以式公德允昭後裔承則資善大夫資國院使贈資政大夫江浙等處行中書省左丞上護軍順義郡公諡貞惠玉吕伯里公神道碑銘并序至元二十九年世祖皇帝詔立肅政廉訪司監治諸郡濟南陳公實治慶元按核官吏大小餘百人故工部尚書資國院使順義郡公時為治中獨受委任條其不便於民者上府力去之㑹大饑乘驛詣行省言慶元瀕海地狹隘歲熟猶仰給他郡非官賑給將移徙不便執政然其言為發粟石四萬後為廉訪副使復治慶元遺愛炳著耄稚一口迄稱叙不置大德中桷備員翰苑屬時公為侍從每得奉議論必歷問衣冠緒族惓惓於舊治彌􅌋公薨將十年其子和上以儒雅善正論擢監察御史桷亦待罪集賢相與言公遺事御史則曰子實知吾先公為詳且神道之碑未樹子宜為銘桷謝不得辭遂次其官閥世譜而為叙曰公系出玉吕伯里氏諱伯行大父阿魯家西北部世安其俗精騎射父忽都勇冠軍伍天兵㝎中原因從征冒陳略地以積功領南宿州軍分鎮鄿縣後家于大名路之清豐縣焉公幼歲失鄿縣母夫人徐氏躬牧蒔紉織以贍稍長命從學里中張蔡公尹大名見而奇之後從丞相阿术公征襄樊南渡江率先登復從丞相阿答海鎮揚州議以州所領四萬户軍移鎮鄂而易鄂兩萬户軍更戍於揚奏已準白於鄂省丞相阿里海牙使者相望訖不肯發軍淮省丞相念非公不能辦即乘驛宣上㫖語竟鄂相色赤反目公前曰丞相何怒受上㫖怒怒且不敬丞相懼答曰吾怒阿答海公復前曰上㫖非淮相所造公怒殆怒上願亟歸相益懼具酒食謝悔乃發軍丞相奇之録其勞以通國語專奏對歲率乘驛六七返世祖見而喜曰是黑髯使臣復來矣至元二十二年授承事郎調金壇縣長省執政官計慮江浙事繁夥非條達敷對莫能稱上意時征日本事不便念所使有詰難必忤㫖遂選公驛奏奏至即罷兵遷承直郎行省理問官省中事急速必命公詣御前皆得允㫖以歸世祖曰伯行昔朕以黑髯使臣目之今察其相貌誠溫暖潔正㑭以重任宜無負相桑哥方柄政寢命不下即再守舊職丞相移省江西征獠冦奏公自輔授奉議大夫行省都鎮撫二十九年授慶元路治中慶元多故宋公相家時翰林學士王公應麟閉門不納客公首尊禮開說㑭學者師事之里胥躪躒士族著片紙叱名立召庭下公責吏數罪㑭書故官吏復聚謀行榷酤法壞富室釀具當益官利三倍公毁其牘不行州民某氏某以事遁江淮間傳王㫖起大家十餘姓徙置淮南傲睨指畫莫敢忤郡二南士也益張大翕霍公察其姦利曰民籍始㝎上計此非淮南分地曷得徙願上省白事􅌰止之承接聲影纍纍蚩氓爭願出其門下㑹僞造印牒事敗大興路獲得其所署僞籍下郡逮捕公時再為理問羣氓造庭叩首伏罪公憫緩其事卒得貰大德元年遷浙東海右道肅政廉訪副使復分治慶元縣有廢湖總戎官久據湮為田將輸官租以絶口公立決以溉民田撫循瘡痍磨刮驕冗皆素所習知而獨於鄉校諄切訓諭謂為宣化所宜急至今蓋有賴焉同分治官􅘆弛日弄事爭上謁出入無禁公手疏力按之太傳丞相答剌罕公審察賢士擢工部侍郎日從丞相騎具言江南弊事數百條丞相首肯之且命治西京賈人積逋巨萬得其實大德八年成宗召對賜侍宴􅊞衣十一年成宗崩丞相受遺鎮遏嚴整獨命公掌諸庫藏鍵鑰唯謹諸王㑹朝頒賚有等自公品節纎粟毋敢譁丞相益器之遂升尚書至大元年今上皇帝時為皇太子以本部官見問今何階官再拜謝不敢遂加正議大夫㑭稱其職值營繕推佛寺恩賞悉謝不受從皇太子如五臺山頓遞如法而不病于民賜白金名馬以寵之太夫人喪朞年乞歸里特賜上尊㑭祭于墓仍疾趣還朝以視事省更尚書授兩浙都轉運使力丏辭再授資善大夫資國院使復辭不允三年奉旨過江南具條所行事宜即得疾卧寓舍四年三月己卯薨年六十有一公􅊭居簡默絶聲色謙抑自閟遇事有發發即不可犯崇善斥惡若飢渴峩冠深衣于于庭廡曲盡恩意所至率招師訓諸子御史之教實有自來晚自號德齊延祐四年特贈資政大夫江浙等處行中書省左丞上護軍順義郡公諡貞惠娶曲律氏嚴整內治一不纍公故所居官益自裕今封順義郡夫人男四長即御史次貌罕真習儒業以門功讓其季曰教化今為武略將軍同知沔陽府事女一適衡山奴江西廉訪司僉事孫男聖童銅臺清涼山孫女二長適太傅鐵哥孫伯顔直省舍人次適駙馬丞相亦都護朵兒赤長子南無釋迦以是年八月甲申葬公魏縣乃為銘銘曰伊涼之西沉鷙悍剛挽强策良樂其騰驤天祚神聖授兵龍荒湊輯部族以先顔行赳赳赴功星流電驅顯允宿州飛矢執殳裹瘡先登擐甲以趨履彼樂土籍魏奠居篤生尚書積學以藴力探其本游於鄉校不忮不忿展武誓身江流渾渾踣襄搗樊舟濟合盾計其功多司譯省中敷奏簡亮走驛歲終黑髯長身儀動帝瞳罷征除徭音詞鴻鐘靡忒其行弗矜以辭彼權抑之訖莫疵之再官洊歲究核謾欺輕疑除蔓納于春熙丞相受命捕獠西江辟公佐戎解甲受降彼强先覆轘于油幢摩之沃之革其愚狂佐政海壖恤䵩廣賑尊而儒先㑭職具訓曰維此土衣冠振振勿為隳辱養真復淳儒彥在堂父老在廡夀母委蛇介彼春醑歲亦有康潔而粳稌去馬騑騑執轡如雨公復有來爭任爭扶悅其條教激頑蘇枯同列冒慝書章劾鋤端揆審官㑭執事樞不譁以嚴不激以正庀工斯程賞至傴命品秩日崇經國陳政膏竭木萎水涸魚病積憂載馳疚關我身計其便宜咋舌莫陳教子惟忠以報國恩不夸其贏淑施後人魏縣之原松柏堅貞錫命孔熺裒對以承倬彼光大維公之成勒銘表阡永垂厥慶資德大夫紹慶珍州南平沿邊宣慰使播州安撫使侍衛親軍都指揮使上護軍追贈推忠效順功臣銀青榮祿大夫平章政事柱國封播國公諡忠宣楊公神道碑銘世祖聖德神功文武皇帝奉辭興師于宋厥相賈某黷愎違信誓郡將悉解體不用命播州安撫使楊惠敏公邦憲􅊞土守邊至是十八世矣誓于衆曰喻合蹙隘荆州惴不保宋主且已降吾州逺王化聞大國有聖人當署欵奉籍㑭若等耆稚完聚果後降汙鋒鏑吾寧忍哉衆稽首一口曰公言是無緩於是瀝誠挈州願上職方氏世祖大悅即璽書慰諭曰宋內附邊臣莫敢後播末奉命宜詔諭汝能承朕意其悉如宋制授官至元二十二年公薨是生公諱漢英字熙載年甫五齡母夫人田氏携朝于上京眉目刻削儀矩習如成人上摩其頂熟視之諭宰臣曰楊氏子孤弱可愍母子逺來宜悉以父爵錫􅊞之賜名賽因不花公之為仕也授金􅍑符龍􅍑衛上將軍紹慶􅎇州南平等處沿邊宣慰使行播州軍民安撫使後加管軍萬户復拜侍衛親軍都指揮使進資德大夫勳上護軍其治邊也改南詔驛道罷順元宣慰使升安撫司為宣撫司分㝎雲地以東隸播以西隸新部減郡縣之冗員者若干屯丁之糧三去其一焉黃平素屬播宣慰使斡羅思誘諸酋長詐以為新闢境獻于朝公發其姦而歸我使耻不勝誣言舊有雄威忠勝軍思播匿不以告當籍之交州公言納土時已隸籍為别户臺審核如公言使益不得志詣樞密府白其事竟遣使者乘急傳將械公丞相與昔審核官言無是事而斡羅思卒以擅掠邊民獄具罷歸部蠻桑柘亂省議用兵公言賊勢方盛宜招諭之兵久無功而卒以公議相繼請降天兵討南詔道由播大發卒輦運以濟軍食隆濟賊日熾合鄂蜀二省重臣統師出征檄公以民兵從甫出師卒與賊遇公力急戰大軍繼之降阿苴拔乍籠賊復合拒迄縛隆濟阿女以歸大德四年南蠻盧奔掠劫大姓依險翳自固黎魯在新部者亦嘯劫蟻聚攻守議未決卒命公撫諭二賊請命遂置戍兵以歸六年詔出師復征蠻命公與田茂忠率二州民兵專討之茂忠以討他冦未至公獨分兵五道以進賊始却部蠻爭合從公度深入絶後應乃全師還次黃平七年茂忠始來議分民兵守險而公以疾薨于師年止四十公之治郡殺妖民王忠以絶芽蘖大修泮宮招蜀之名士教厲以化夷俗至元二十七年詔郡縣上計播鄰壤不奉命公即括户口租稅籍以進上大器之八朝京師弓矢鞍幣之賜不絶以平南功特賜玉帶兩被璽書㑭世守其土預御宴輒與國戚相齒世祖嘗曰此兒聰解殆得天賦仁宗則曰此子貌沉厚類畏吾人復賜譯經佛圖象以寵之二相貞憲王忠獻王尤加器敬性純孝睦宗黨二兄殁道中請于朝而􅊞其爵寬􅌋重然諾嘗約以善馬贈士友友死趣贈之南北冠蓋相依者無虗歲少讀濓洛書為詩文以體要為主所著書有明哲要覽九十卷桃溪內外集六十二卷幼嗜山水九州雄勝悉窮力以逰别自號為中齊子男四嘉貞嘉謨嘉祐嘉禧娶田氏榮祿大夫義敏公謹賢之女喜書史善筆扎封遵義郡夫人公薨之歲秋七月葬于桃溪祖域之東曽祖價宋任閣門宣贊舍人雄威軍都統贈威武寧武忠正軍節度使賜廟忠顯封威靈英烈侯妣田氏封齊安和政安康郡夫人贈永寧郡夫人祖文宗任和州防禦使播州沿邊安撫使國朝贈榮祿大夫同知樞密院事柱國封播國公諡崇德妣田氏封播國夫人諡章靖父即惠敏公宋任左金吾衛上將軍安逺軍承宣使播州沿邊安撫使國朝授龍􅍑衛上將軍侍衛親軍都指揮使紹慶珍州南平沿邊宣慰使播州安撫使纍贈推忠效順功臣銀青榮祿大夫平章政事柱國封播國公妣田氏封播國夫人諡貞順至治二年秋八月嘉貞來朝見天子於大明殿拜跪興即錫名曰延禮卜花禮宴如故事嘉貞昧死言曰先臣殁有年恤典未獲敢以請詔下翰林禮部太常趣議追錫乃贈推忠效順功臣銀青榮祿大夫平章政事柱國封播國公諡忠宣田氏亦封播國太夫人而以忠宣所受官􅊞其子嘉貞為資德大夫紹慶􅎇州南平等處沿邊宣慰使行播州軍民宣撫使播州等處管軍萬户侍衛親軍都指揮使上護軍嘉貞踵門言曰子職在太史植德彰善宜以傳信先公隧碑未立願有述桷謝不得辭而為銘曰播唐內州鮮于唘兵憬彼西夷蹂躪弗庭􅍑欲浟浟谷川震騰乾符鼎移五季嗣興維并楊氏太師肇初往理其疆以黜以鋤相繼象賢執武霆驅奕葉昭宣臣宋奉圖中令之支踵德趾媺再世死忠守節彌勵枕戈復讎斬首以謝燁燁展功贄貢不替宋社踰南間道以前是生忠顯擐甲開先三帥締歡痛不有年立廟錫封歲時牲牷繇太師以降十有四傳崇德效奇拯民脫危貽于後昆惠敏攸祗實天有命我弗敢違委心效誠世祖色怡審彼逆順朕不汝疵恭承赫奕恪事四帝弱齡奏言胸臆默計宵征邁途􅙀敿煆或諭以生或矢以誓堤鄣一方不泯世勳盛德沄沄如山出雲夀嗇爵穹奚憾之云揭碑隧門萬子孫紹聞漳州路同知朝列大夫贈汴梁路同知騎都尉開封郡伯馬公神道碑銘鳳翔府兵馬總判公諱昔里吉思以忠節死難廟食於治所汴為金南遷都作褒忠廟悉合享死事之臣兵馬公預焉兵馬贈恆州刺史鎮國上將軍夫人王氏太尉明德公女方公提孤兵守空壘力抗不敵盡室投巨焰一媪抱嬰兒以逃是為禮部尚書諱月合幼歲悲憤感厲其先居天山因以兵馬官為馬氏植德秉志贖士人之為孥者後皆為達官而子孫更業儒術卒致光顯焉禮部子諱世昌為尚書省左右司郎中傾資粟結雋彥家日困落子孫益用儒自振是生漳州諱潤字仲澤父即以文墨入官初署荆湖道宣慰司令史遷吉州路經歷升兩淮轉運司經歷改太平路當塗縣長官再調常州路武進縣長官進奉訓大夫知灮州改漳州路同知皇慶二年卒于漳州實十一月某日年五十有九其佐荆湖調漕舟討䕫府山壁夾江峻矗樛木葛藟率藏敵者以衝突公上計帥府焚伐蔽翳取木藟結綯索挽舟銜尾以進漕事乃不缺在吉州治豪民絶其柄持郡守以刻急自任公以寬輔之郡事不撓有劫盜獄株連百餘户閲牘讞論止坐十餘人守終不能以奪也為轉運幕商人爭後先歲終鹽直不售公請刻籌第甲乙實巨筒㑭商人自揲以抽鹽卒以辦縣當塗上疏言括馬料民徙户增賦為不便時柄臣桑哥力主議公獨以邑宰能奮言之其治武進如當塗刑其無良者而貸假之觴詠簡適皆相慕以化有拾松薪易酒滓尉以盜論公慰釋之守光州取官粟之羡者廣弟子員以食光久為用武地司馬丞相生于光公歲率諸生以祠民始知為儒以自重㑹有言利者請籍光間田歲可得粟十萬石河南省下其事公執筆不肯署吏固請公曰官可免筆不可署卒不行州無茶租民間採山谷微末以食轉運司掩捕抵法㑹奉使出諸道問疾苦公疏所以轉運生事者各降官三資漳州負海障崖龍巖章浦數反易公命吏宣布上意始受令漸寧謐㑹有言漳州地産水精卒以獻言者代公始罷當塗時居儀真幾十年母夫人張氏語家丗官簿微警之乃復仕所為詩曰樵隱集若干卷觀其命名足以知志意矣韋布踵門降席倒屣傾家治具輟所得俸高下賢否以奉而其教子晷刻不肯置以門功讓其弟禮長子祖常皇慶初桷得交于亰師其為文詞深湛有師法嘗默器而期之科舉行祖常試汴梁南省皆第一于廷對以尊國氏族為第二祖義鄉貢進士祖烈江浙行省宣使祖孝與祖常同登進士第將仕郎陳州判官祖信國子生試中承事郎同知冀寧路保德州事女二長適金雲次適劉某孫男五人武子以公䕃授將仕郎監常州路宜興州稅文子獻子懿子惠子女孫五祖常官翰林應奉時請于朝贈尚書為正議大夫治書侍御史諡忠懿夫人白氏追封梁郡夫人公亦贈朝列大夫同知汴梁路總管府事騎都尉開封郡伯夫人楊氏追封開封郡君於是郎中之夫人張氏年八十有四矣祖常今為翰林待制承直郎兼國史院編修官願以其封婦者回授于張夫人噫盛矣哉某年某月某甲子將葬公于光州西樊原桷辱為文字交知且深乃來請銘銘曰節以起宗儒以紹傳誰其任之宗伯維先再世是承漳州象賢佐政慈寬智名不居養其熙光發于詩書尊聞厲行飭躬日劬載籍之藴心聲為言仰止不愆兹為德源積小以高本本元元雲興崇山百穀頴栗鑒觀厥初豐報匪嗇揭其德華昭銘以述武略將軍裕州知州李公神道碑銘太祖皇帝略㝎函夏以河南北要害為分地徴科供索從守令取具版籍缺落富瘠莫能考至憲宗用兵西南調發煩重推擇宜民人者為尤難時則有若故武略李侯排解勸勵鄉人德之死逾數十年仁聲善政歷歷在口耳在昔考循吏繇身後始㝎今於是見之侯諱英字彥臣滑州白馬縣人弱冠􅊞叔父宥爵以宣武將軍知滑州立條教惇孝讓㑹歲饑賦入莫能輸率其州民見世祖于汴唘曰兵興值饑民即逃亡將使此州為空城敢昧死請世祖動色從其唘中統元年蝗食桑蠶賦病民獨建言約秋熟並取果逋負當以身任後至秋悉如約以入滑隸大名逺三百里糧餉轉挽不便侯請儲本州候逺近朝廷是其請方兵興時鎧甲糧餱率從豪民稱貸子母轉息旬月相倍豪民倚州督取復入見于上言不可陳對感切下其議執政執政咸是之繇是官償其本去其倍息别為內府籍以志本始行田咨詢旌别勒惰如是治滑者三十年至元二年改順德路判官尹清豐南宮兩縣二十一年授武略將軍知裕州二十五年改知房州所至以治滑為準而滑以久任其事益章灼可考不妄嘗言叔父撫我良􅌋今得以宦業自拔即歸其爵兄子儀觀修整酬酌庶務靜要而理得才不盡用多士惜之三十一年十月六日卒年六十有九娶郭氏先一年卒卒時年七十學浮屠法慈儉有度靡密總核允宜其家夫人有助焉是歲合葬于白馬縣大吳村曽祖義祖信父祐二子長元德奉政大夫龍陽州知州次元忠朝列大夫慶元路治中女四適和義郭君寶馮德臨魏仁元德娶張氏子二熹燾燾蚤世女一適郭從道元忠娶孫氏子二熙杰女一適郭守中始元德以給事東宮授贛州判官元忠佐御史府授新淦州同知公及見之戒曰壯歲長民宜清謹自重我昔罹兵艱赤手立職業若等展世勿棄暴則先德永有紹我語弗可忘也今二子所至植立滑州之效於是乎見之桷待罪太史預修纍朝諸名臣列傳是則滑州行事宜有紀謁告歸里元忠以事狀請銘銘曰粵若生民大君長之幅員芒芒牧守是資飢匪設糜疾匪命醫承化觀風察其厄疵展也李侯百罹是逢誅菅援溺不希其功天聽匪高矢言率從不苛以夸不阿以容社有美榆田有嘉穀輿言無浮唯侯斯祝侯云逝矣厥績謖謖種德孔深豐報有僕白馬之原松柏茂鮮詢彼耄倪遺愛是言家教允遵罔有虧愆爰表銘詩孫曽永傳奉政大夫同知東昌路總管府事蔡公神道碑銘延祐年紀丙辰仁宗皇帝推恩羣臣考視品秩榮其祖禰及其曽大父繇是單父蔡侯衍以簽事廉訪贈府君諱良輔汝弼甫奉政大夫同知東昌路總管府事驍騎尉單父縣子妣李氏單父縣君泰㝎元年新天子下詔大賚內外㑭􅈬所居官皆錫命蔡侯時為慶元路總管又贈嘉議大夫路總管上輕車都尉郡侯妣某氏郡夫人桷謁告歸里侯以郡侯事狀來請銘詳厥原自則由侯之祖父總轄府君諱旺始總轄嘗語于單父君曰吾逺祖世居徐州樹善不懈吾祿弗及食汝必有後後果興汝其與榮焉單父亦嘗語于侯曰汝祖訓語猶在耳若兄弟仕進皆祖德唘佑總轄當金南遷時限河南為內界禁不得渡河歲大饑民爭就食河北潜戒舟夜渡所全活不可紀金愈迫河南亦轉徙皆竊據自保郡人丁統領集衆萬人為宋前導總轄往依之署以部伍徐說曰宋師入汴兵弱不可用彼將無固志難與共事統領從其策歸兵為農而宋將卒敗衄以遁所居曹州鄉曰東村有孟氏善居貨自􅌋總轄避難因家焉後與孟相雄長而卒以米帛賙其閭里之貧細歲鬻鹽增滲淤算以售市悉便之至元十九年八月卒年八十有三集其姻黨與素往來者叙遺言端坐以逝夫人孫氏閲十有二日相繼卒治葬東村闊板塋舊所乘馬負衣冠以從至塋悲鳴躑躅即死讀其行事則單父之追命侯兄弟膴仕之效實總轄君啓之單父天性明朗其所待接與其父率相類官雖卑一毫不以病民民益宜之家僮久役服者毁其約㑭自便僮不忍去願服田以終老年八十一得與束帛令以卒卒時在大德十年九月某日夫人李氏權某州之女俱祔于總轄塋所衍以臺察官入仕其行事正不近名去邪黜妖愷悌以宜于民而寬􅌋有度迪祖父遺訓復以燾後興蓋未可測也季曰衡大夫趙州尹女一適汶上李闕孫五沖霄敏學山住某某孫女三適石㝎安石公安孟欽曽孫一奇山桷嘗謂為善無不報根固膏沃彌積以興責成旦暮考其所為不能以逺久宜矣若蔡氏祖父是誠可紀銘曰水蹇於山積流必東磅礴委順不希其逢有截之椿鬱兮輪囷秀儀長身􅊞和服醇匪高其門厥慶日增如茨之茂如木之升父緝子承既夀且康詔爾諸孫以受簡穰􅌋德匪浮是庸紀録表于隧門以闡以續清容居士集卷第二十六
