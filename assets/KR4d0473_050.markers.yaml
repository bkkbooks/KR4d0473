持觴為酹九華公梅隠齋萬蘂疎明鐵石堅肯同餘卉鬭芳妍青雲覆幕氷承柱白玉為堂雪作氊橘叟不知身外事壺公唯識洞中天何人欲問調羮法一榻蒙頭謝醉眠次韻鄭景尹重九四首年年京國度重陽禁路風髙徹骨涼坐覺衣寛藏宿土行疑靴冷怯新霜紫萸曽憶童時佩黄菊須看嵗晚香惆悵東山在何許挑燈無寐坐方牀無復金狨與覆韉屢看秋月缺還圓風塵自覺真衰矣勲業深思盍舍旃烏帽塵荒憐逺客白衣酒熟慰癯仙深慙涉世脂韋久强項何能效董宣還家兩嵗見重陽過雁横空拂曉涼尚憶傾心朝午日欲將勁節拒朝霜禽魚有樂隨天性蜂蝶無知戀晚香從此林間端見一不妨枕易睡匡牀久矣懸車撤坐韉天機渾沌黜方圓披沙經窟知非矣秉燭書床尚勉旃愧我詞華端近俗愛君詩律已通僊門前種菊髙如許亦欲紛披五采宣齋前海棠秋日著數花瓘首賦詩次韻四山紅葉報秋殘駐目家林認未端螢㸃流星驚乍曉鳳銜初日怯輕寒鮮鮮敏手攢新錦烱烱芳心吐故丹西帝已能回藻景為言莫作杏花看金祇當御衆芳殘忽見竒葩表樹端霞臉已􅂸千日醉絳唇自怯五更寒燈籠錦就霞衣帔箭鏃砂成寶鼎丹致此凄清端慰藉停杯擬作百回看次韻吳門聲上人翠樾經院多髙人景徳寺有翠樾方丈碧窗㸃翰五采新天機不受梁燕語逸興直與江鷗親羨君解衣浣流水愧我束帶陪禁宸屈指當今人物論從此有約同垂綸至人天隠樂有餘良玉不願為雕璵昂昂盤石大坐相杳杳歸雁旁行書白蓮解結碧雲座緑蕉不羨青葱裾道人繙經悟空假始信塵世非真如憶雙溪清溪明處水交流萬井鱗鱗冠盖稠盃凝玉光明月入幕遮翠影落花留雲生古洞千山雨風送層樓萬壑秋麗澤祠前最佳絶藕花零亂勝滄洲寄張希孟内翰君方習隠食蒼柏我亦採真歌白蘋千嶂遶樓堪岸幘百泉當戸足垂綸蓴鱸水濶滄洲晚稻蠏田肥澤國春日夕相思看過雁客來無惜寄書頻清容居士集卷十二欽定四庫全書清容居士集卷十三元袁桷撰絶句七言團扇圖玉樹秋殘翠影疎掩門何處望金輿朝陽殿裏渾閒事最恨當年李婕妤擊梧圖萬樹梨園已失春秋聲颯颯起胡塵君王獨立梧桐下不見當年鎖諌人韓幹五王出游圖花蕚樓髙怯翠衾平明聨騎走芳林讓皇可是無忠益一曲涼州恨最深夜讀唐將遺事二首合江雨暗裂珠旗鼙鼓鼕鼕怒促圍不是帝羓車上去元戎那得衮衣歸雉尾雲深漢殿開將軍鐵馬響春雷太平未覩匆匆去空憶君王白玉盃秋山圖簇簇麻姑十二闌倚空摇落總塵寰臥遊京洛誰消得一榻松風響珮環童時侍先人泊京口旅樓一月正對江山樓繁麗特甚江津流民散處不可悉數今皆不復有追憶舊事因成絶句十首碧瓦參差第一樓風旗獵獵喚行舟兵厨有酒真堪飲不學弓刀也白頭紅袖娟娟舞旋齊鑾江一曲唱尤竒西湖院落曽翻得未識君王知不知燈火闌珊月色低少年乗醉馬東西樓頭畫角聲悲壯又聴歌聲促曉雞白葦蕭疎野火焚流民草舍各星分沙田土瘦新耕得寧死江頭不作軍朱門髙插相風旗千里船行總得知稻米流脂江上去健軍何處是男兒日日樓頭􅄸酒錢峩冠太守號籌邉鳴騶傳入丹陽館為是行都過客船淮馬低如果下騮春風小隊打紅毬日斜臺上人争看銀盌分明第一籌明月曽愁多景樓幅巾長袖是清流金焦山勢元相望不揜諸公富貴羞劉改之舊有山掩諸公富貴羞之句硯山園下將軍宅脫却兠鍪强學儒聞説髙堂擁紅粉醉翻筆陣墨糢糊白雲一去愁千疊此地重來百不如空憶當年覓梨棗小樓燈火了殘書先人課子最嚴時在旅樓不廢講誦雪中招虞伯生祝丹陽空林一色十分春羞殺髙眠獨笑人喚取東坊虞博士紅爐同㸃奪胎銀金芽初熟白皚皚袖手爐邉未盡開為請招真老髙士且須騎馬抱琴來梁山濼千頃芙蕖送我船碧香紅影亂娟娟梁山風景能消得不到西湖却十年支家口蕩底天鵝雜㯭聲南鄉今有幾長亭錢湖未盡滄洲興臥看荷花十二汀黄河乗槎使者問河源織女相逢事惘然從此競傳天上去不知滄海幾桑田耿山一簇山腰總賣薪語音猶是舊吳人江湖水濶從今住更肯輕生學買臣古黄河口温温河水佀湯泉送我南歸意萬千入海定從天上去不知重㑹是何年黄樓詩到徐州不用題危濤千尺壓金堤羣峰翠盡蘇仙去萬古黄流日又西伏日度淮伏日隂隂盪棹船詩腸氷雪碧淮鮮黄塵自是人間暑不識薫風在五絃過髙郵一片歸雲一片帆芰荷深處緑蒲灣鵁鶄可是無情思不及沙鷗自在閒甓社湖甓社湖中新水清風牽荇帶引帆行雲妃夜度霓裳冷輕折菱花翫月明聞見飛蝗眼見度淮鄉又聴吳田水渺茫總怨春來雪五尺變風變兩變年荒渡楊子江一舸中冷煙雨飄片帆閃閃浪招招倚闌僧在半空語南去北來今幾潮俞光逺治余别墅口占奉謝種竹澆花俟我還花成雲塢竹成山相逢且説相思恨更説何時得共閒周子敬三年不寄一書口占奉寄伏日松隂酒一壺抱琴身與鶴身癯故人天外慵傳信唯憶楞伽是舊書聞仲正新得掌珠道中奉寄知君已厭添丁事與我同看納甲書别後匡牀清夢少春來又獲掌中珠懐應得茂瘦石支笻偪仄吟吳山雲泠越雲深江湖老盡誰知已獨聴寒泉響玉琴明皇醉歸圖日暮毬場醉欲歸停鞭更進紫霞杯老髯未省霖鈴曲猶願君王欵欵回過故人墓湖曲深深鎖墓田種松成本起蒼煙欲窮精爽周流處雲在青山月在天送昌上人江南山水一枝藤更上雲中}
