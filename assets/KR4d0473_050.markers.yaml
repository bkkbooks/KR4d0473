禾黍黄雲髙幡然土俗變怗首羞雄豪出宰試敏手良庖靡更刀善政舊諜傳據案除民饕村村煙火通長塗罷建櫜雞鳴流水逺雁過平陂翺餘情樂觴詠臨風謝喧囂題文與可風雨墨竹妙筆抉天巧黒雲參差髙偃疑受雨深俊欲凌風翺颯爽隨舒卷清凉散塵囂湛湛不受暑靈籟虛忩號緬懷文湖州玉雪人中豪想此磅礴時葆光解天弢老僧道機熟形影隨目逃持以深贈之生意窮秋毫髙齋夜氣寂定回起層濤答李生裕尚書大同公曽孫英英金華伯皓首人中龍横經古鄞水歌詩儆羣䝉舊為鄉里教授歌風雅以訓諸生正色侍邇英微言動宸聪一疏不合意孤身轉秋鴻俯仰乾坤旋舊聞渺遺蹤坐令詩書宅寒雲翳孤桐維曽秉文度月印五采虹知我夙昔侣贈言啓舂容清朝集文儒直筆書清忠作史聖有訓狐裘靦䝉茸挽士貴無方正色誰為宗虚舟萬斛積遇順凌剛風明時詎淹留勗徳㑹有逢題巨然楓林雅集圖楓林集虚秋灝氣轉寥廓坡危草纖纖水路石鑿鑿四子何方來黄塵滿芒屩據流濯其清班荆坐盤礴山童注新泉支鼎拾薪籜方囊濟勝具一一隨取索想彼笑談時天弢脫塵縛上追巢許髙下陋山王薄凄凉金谷宴腥羶甕鷄樂又疑東山遊粉鈿汙花萼老僧習止觀雅趣隨筆落振衣從之遊素壁儼酬酢避塵軒飄風捲飛蓬咫尺隔煙霧馳車與急騎憧憧走當路各云有所之瞬息不得語山陽荷蓧翁守舍視日暮酌彼澗下泉膏沐美無度寒光映玉頰浩論巖中趣永謝征塗人看雲養真素次韻伯生榆林中秋榆林月中來今月向此出天低鳥翼滅野浄田事畢驛馬西北鳴候吏語喧唧我行起視夜炯若積雪白昂頭望𤣥宫耿耿駐營室坐令八方澄不使萬景没徘徊清影孤躑躅悵後發送鄭景尹還里蟬冕生詩書世胄迺鄙夷沈沈喬木宅風煙暗茅茨此理固莫詰或言有盛衰堂堂魏王勲談笑帝者師風雲締嘉㑹青史傳忠規諸孫静且秀振鷺遊天池鄉社三十年永謝紈綺姿興至來上國窺探抉幽竒聞聞與見見栁下揚鞭辭前聖六籍功尊聞審羣疑江源發甕口濫觴渺無涯願持一寸膠黄流化清漪天風捲秋濤舟楫慎所持時至諒有得衡門詎棲遲李野齋别墅圖别墅依平陂翳翳桑麻隂田翁理農具晴雲起遥岑于時春事初佳樹響鳴禽先生朝出遊呼童佩瑶琴仲也行比肩叔也聲相尋興至或坐石臨流散虚襟有客携酒壺勸我手自斟共言羲皇時古風藹淳深巍巍居仁里盛徳世所欽三鳳在髙岡參飛起清音恂恂化卑讓嵗往猶傳今披圖儼見之慰我夙昔心子昂人馬圖飄騰天山霧盪摩玉京雲耿耿萬里姿矯首空其羣迺翁愛神駿泚筆五采分翁歸侍帝所乗化觀芸芸彼亦與之俱追風超九垠時松雪翁已下世一年題墨蘭圖秉芳空林中介石交不黷飛英散𤣥佩受露以膏沐羣妖春炫晝墨守益慎獨豈不念嵗晏自獻傷我足矯矯金石交挽之不盈掬疏清湛虚心振直耿絜腹昊天有正令俛仰萬物肅臨風獨躊躇白駒儼空谷次韻瑾子過梁山濼三十韻大野豬東原狂瀾陋左里交流千尋峯㑹合百谷水量深恣包藏神静莫比擬碧瀾渺無津緑樹失其涘揚帆鳥東西擊楫鷗没起長橋篙師歌短渡販客止天平雲覆幕灣迴路成砥鷹坊嚴聚屯漁舍映渚沚栁絲翠如織荇帶組交薿出日浮鉦金明霞紆綬紫一歃澆腸迴三頮慰顙泚髙桅列魚貫逺吹笙鳳觜前奔何無休後進復不已遶如林烏旋疾若坂馬駛飄飄愧陳人歴歴見遺趾流移散空洲崛强尋故壘波清鳬聚陣日落魚㑹市土屋危可縁草广突如峙蓮根漲新圩蒲芽護荒坻水花碧團團雲葉白迤迤濬脩出飛泉闡闢搜故址緬思重華帝允屬夏后氏彛倫著箕疇偉功傳遷史目力渺無窮行跡端可紀前村捋柔桑沃壤接良耜餘芳錦堆爛宿麥翠圍侈迺知東魯儒終作中朝士養源滙滉瀁包荒納遐邇驅馳屢經過感歎復慰喜南還幸遂願永雪洗耳恥憶昔三首憶昔白雲阡有松如車輪初日炫五采湛湛珠露勻是時十四五恍不知其因有客笑指之慈䕃在汝身猛志親六籍百川渺無津懷刺慎所從一一先朝臣文昌古遺直談經鬱紛綸授以漆簡書經緯通天人碧波掣鯨魚瑞錦翻麒麟昌歜世所鄙食之迺竒珍厠身金鑾中黽俛二十春懼貽先師羞執筆常逡巡即今已六十誓墓廬松筠厚徳靡有報淚與寒泉淪外家甘盤宅門閎誠煒煌髙懸金碧牓中有衮繡堂珠璣左右侍絲竹儼成行幼不識慈顔到彼心徬徨每嵗兩過之嚴訓具有方膏梁病居養久爾生惰荒七嵗誦詩書十齡學詞章駸尋志學嵗折節師老蒼紀事法班馬㝠心契羲黄謬與時彦交寶書閲琳琅今兹乞南歸往事増慨慷興懷陶與蘇秉筆追耿光凱風有遺思願言繼餘芳寥寥帝王州我翁佐其治有亭名朝陽青溪清且駛旁有籌邉閣羣公集裾翠翹翹萬芰荷雨過争旖旎飛觴羽書來翕霍江上燧峩冠及遊談戎弁生縱恣予時侍其旁側耳聴論議翁言不見取投劾乃謝事坐令百萬家解甲豎降幟徘徊夕陽亭晉宋政相佀重巖圖為劉明叟迺翁作夙昔慕清隠振衣躡層巒飛鳥出天末白雲生樹端稍覺所歴險撫松獨盤桓緬彼巖中人塵世靡有干飢食千嵗芝朱顔炯團團一日不見之披圖儼清歡崩崖罥枯藤迴流起危湍微茫暝色共凌亂生綃寒心期果㝠㑹願言力加餐王叔載以江梅有佳實託根桃李場為韻見貽因次其韻百川既東流震澤成三江學海詎有窮泝源探敦龎緬彼學古人善問如鐘撞簞瓢豈在樂摳衣願為邦六籍㑹有厄禍繇漢晉開支離起田孟誣偽興姚梅綿蕞匪正禮區區存曲臺吟詠既莫分褒貶以為才峨峨神京秀轍跡貫九有奉璋弁如雲執轡沃在手欲窮羲黄心編簡滅科斗研摩詎無念急景謝衰朽風雨􅆾素期山雞鳴喈喈豈不念夙昔愛此日夕佳平明視青天羲輪御中街榮悴㑹有時願言壯其懷髙門深寧翁晚嵗悲絶筆愛彼樸樕才化為楩楠質春花五采妍秋至詎俱實遺文粹東楹賤子願叙述昔聞中書垣上有紫微閣微言續九丘妙義追八索嶔岑大厦傾作記金鑾託深悲在廣招寥寥鈞天樂少小不自持曲學尊蕪繁舉觴一釂之為言護深根先天有至理能使月窟温談笑襲師訓詎知雪齊門斥鷃不能飛欲作搶榆髙何如阿閣鳳守真始風翺志士惜短日碩人養屯膏蕭脂始薦鬯食黍迺雪桃昔年委閭巷初不願禄仕紬書探異門擬作前國史念至事益非委命以修已勿為衆所譏不如道旁李君才如江梅不入桃李場徬徨念先猷貫鵠始挽彊後生捕形影争言早升堂唯餘白髮士耿耿無它腸董生噩上人以叔載韻見貽再次韻闗河一轍跡耿耿明天江五方各異俗中州誠駿龎吾欲上帝閽帝閽不敢撞終然返初服養佚歸海邦逺宦三十年石田今始開觀象慕易京登真想仙梅夙昔希石匠嵗晚成輿臺志念詎不深樸􅈪慙非才弱冠慕静居掩息空萬有老禪深愛之微笑示以手忍欲如忍事吸醯過三斗終然寒松勁不作朝菌朽鞾帽成戚施逆耳風其喈昂然望南山愛彼日夕佳朝來何所見萬馬盈天街所以巢居子終然養澄懷辛勤下帷生涌思不停筆範鑪鎔吉金變化銷其質湛深陋雕蟲多聞覈萍實袖手毋自藏盛世富紀述噩師禪林秀宛在諸天閣當其調護時危石繫朽索作賦極翦裁衆物各有託氲氲荆山玊洋洋咸池樂𤣥圃有琪樹不使枝葉繁譬彼積學人芟蕪養天根嵗暮霜雪至銅柯生晏温一為梁棟材落落懸金門吾師深寧翁屹屹泰華髙佳哢時一遊不使凡羽翺方壺貯神藥變為五色膏服之生羽翰陋彼東方桃稟性非好遊亦不願禄仕感彼獲麟翁歴聘删魯史正緒願有傳固陋敢私已年衰絶聞見謝彼井上李少壯勿自摧振容上詞場鵜膏淬寒鋒談笑摩堅彊藉以雜纎羅貯以白玉堂辱贈莫知報因之結中腸芳思亭大父尚書公治圃南郊有堂亭凡十五方池脩廊屈折便宜雨甚亦無礙遊事逮今荒廢踰四十年故基陳跡不復可考近築一亭雜植花木廣不踰畝髣其萬一名之曰芳思玩其英華將以紬繹志興翰墨有紹是則先公之志作詩示瓘瑾併求親友同賦侃侃尚書公投紱理泉石五堂適寒暑十亭送昕夕瓊英𤣥圃秀美䕃嘉樹碧脩廊不受雨來往隨履舄紅雲漲方塘丹霞耀翠席嘉魚黄金掌瞥見眇莫測辛勤三十年深逝晦朝蹟遺訓示子孫樹藝比其徳浮雲變須臾百幻倐消蝕空餘鄭公莊耕稼給衣食緬彼行樂時衆植各有職以兹一畝園髣像見疇昔幽葩與羣卉生意日不息朝陽潄靈根三咽妙紬繹曠懷事幽賞誓矣躬六籍次韻袁季厚惠苦筍楊梅二首食苦不願餘甘回迺稱美空巖養滋味老叟清晨起斵之玉箸圓拾以付稚子駢頭萃豪門咀吞訝金矢維時朱明中盛徳協清徴翛然在隂翳儼與松柏峙玉液生華池可廢杜康祀含章守元吉黄中本通理絜腹表正性要以除穢滓初如橄欖食不作即且棄世方尚腥羶易牙正専味愧我清齋客足音跫然佀空巖迸瓊珠蕭蕭白雲中恍疑羣仙立欲脫煙霧叢招提者誰主日出撞金鐘笙簧激清濁旌盖摇青紅遂令彼林谷徴索恨靡窮侍臣久歸田不數蔗椀功頃筐逺相致齒頰生冰風昂昂長松盖下有萬馬容同源匪異本斯文永為宗清容居士集卷五欽定四庫全書清容居士集卷六元袁桷撰古詩七言題髙彦敬桑落洲望廬山圖為秋泉作長江亭亭桑落洲一塔獨傲蘋花秋邉聲已逐鼙鼓盡水氣欲挾漁榔浮謫仙騎鯨五栁老真景變滅隨沙鷗空餘秦筝與羌管㫁續不洗琵琶愁玉堂小忩觧蒼佩宴坐得意豪端收空青㸃雲碧痕濕方諸取月寒光流匡廬老人在何許佀覺頷首相遲留佳峯稜稜鐡鈎鎖寸樹㸃㸃銅浮漚要知翰墨灑清氣俗子政爾勞雕鎪秋泉山人息機事青眼不與王公酬髙張素壁凜太古擬跨獨鶴還磯頭人坐江湖在適意底用絶俗埋林丘擬圖覽古重嘆息天際杳靄疑歸舟秋泉徳生仲章梅叔章周儀之皆次余韻題廬山圖再次韻以謝海郡列戍連沙洲榆栁插㦸摇清秋擬從京國洗氛瘴黄塵復作煙花浮西山紫翠不可望但訝積雪如明鷗愛君寒齋之畫幅瀟瀟不寫人間愁胷中丘壑我豈少奈此磊嵬難為收宣城詩法擬二妙炯若玉瓚盛黄流永興天機愛神俊碧眼一顧羣無留千年周子古風月衮衮亦散空中漚乾坤無言混沌鑿頗怪我輩勞鐫搜沉㝠天台老僊伯清坐自與廬山酬天清無人月色古縹緲五老疑駢頭功名營身旋蟻磨芻豢得意崇糟丘何當相從老其下釀酒一醉黄金舟張彦清以復古硯贈友人因賦長句髙皇南遊倦鋒鏑宴坐清都賔出日胷中筆陣掃𤣥雲時與端溪評甲乙平生紫玉無纎塵小忩寄傲茶甌春馬肝生寒出古色鵒眼獻秀憎妖顰烏號已去寧復得繭紙昭陵空悵憶猶餘舊賜落人間漆字糢糊記朱色集賢學士胷次髙愛此静閲濡霜毫迺知貪夫罪懷璧底用長物為神勞清齋持盃好顔色楚人之弓楚人得平生弟兄今始知一笑相看竟何惜蕭齋老人筆如錐松花蕩漾摇輕漪江南採菱曲已逺願寫紫府虚皇詞金華曹道士白雲樓蘇仙念母母苦飢化作白鶴時來飛我聞紫虛亦官府朝夕往返勞天機何如金華有真隠築室空翠摇煙霏松花麨蜜五鼎養丹砂汲井千年肥我生不識萱草歡孤身永日懷春暉白雲在天詎可望遲子嵗晏山中歸賦黄帥平寇還蒼梧之山利如㦸五溪南行水如墨文身鏤面號為人蹙口磨牙時剽賊將軍手提丈二殳匹馬直入深林居摩娑銅柱寫殊績南人自此長為奴㯽榔快嚼端禦瘴薏苡不將真避謗繡袍初賜簇金雕聚米為圖指豪壯萬里功名非偶然輕身許國誰為憐莫嫌儒冠守青簡能淬筆鋒書定逺謝王參議送練春紅二枝玉堂老仙玩幽獨閉戸無人佀初溽倚䦨岸幘領孤芳蓛蓛輕紅冠羣緑化工有意卑凡卉積李崇桃空眩目争先鬬巧等堪憐已向東風盡驅逐此花清妍浄如洗收拾餘春傲榮辱何郎湯餅徒試粧太真温泉空賜浴天然生色鑄真態亭午低頭睡初足誰言花后最竒絶我怪酪奴能汙觸嫣然一笑奉清懽莫把金樽歌别鵠并刀妙翦駢頭來珠露淋漓袖新蹙佀嫌凡子多京塵却恨髙人付流俗㣲風澹蕩新雨生强拭愁容吐殘馥擬將色筆寫清意綺語非工那忍瀆徘徊中庭月過半翠袖姢姢泣寒玉題董簡卿瀟湘圖瀟湘之水太古色煙樹空濛成寸碧奔騰日月轉銀丸噴薄峰巒凝鐡石楚棹相將客獨聞楚歌欵乃人誰識望盡蒼梧不見雲千古靈均空悵憶絡馬圖秋原苜蓿肥雲屯帖帖此馬和且馴屬車效駕豈在力愧汗絶足追奔塵良哀不生造父往公子毫端意悽愴虞淵逐日終飲河出門加鞭奈爾何康樂圖長安韓徳卿夜夢至一宫室扁曰康樂因名其堂以奉其母至人無夢夢乃真瞪目一視空中塵悲懽蟻旋水東注遺珠罔象迷其津持虀噉臼逞詼詭取禾坐極夸榮貴不如長安韓生道上眠念母還家枕中記紫霞之宫那俗書煙霏霧結開雲圖虛靈變化在頃刻齧指疾應維心符城上烏啼畢逋尾倚門獨占乾鵲喜萬里辭親真可憐書來端有平安字贈杜秀才歸省荆南臨江種橘橘易朽滿籯積金金作奴何如遣兒束書帙婀娜初服游鴻都從師之樂端解語暫作庭前綵衣舞㑹待明年春水生雙槳如龍天上去贈拙訥子萬言不啻一杯水刻楮徒費三年功何如宴坐寂真静木末時數南飛鴻長安之衢塵羃羃願言飲垢如飲蜜鸚鵡作賦真有才至今江浪猶銜哀寄南劒李士𢎞使君水雲離離千疊峰海日如鏡行天紅使君新沐坐清樾筆底丘壑生隂風玉蘭之花不受觸日給飛泉三百斛髙舂打衙人不來鶴立蒼苔動新緑送任道士歸武夷武夷之峰髙插旻浴日離海朝為賔石牀芙蓉迸膏露乳竇醽渌凝長春隂崖怪壁鳥跡絶葛藟當户苔鱗鱗神君枯魚古籩豆曽孫毛竹今霜筠千年金骨幻凡目玉匣九鏁光如新想當精思握宇宙魄質已化能成身我聞帝居亦官府風馬泱漭空中輪愛君釣鰲避東海笑踏北雪鬚眉銀寥寥空山太古水清夢入髓時相親誰言五色亂吾目得意忘象那非真歸來𤣥鶴忽不見勸汝速浣征衣塵送郭天錫還京口朔風吹塵著駞裘蓛蓛凝絮𤣥霜浮城南泥深擁車轍矮屋夜臥鄉心稠暮春雪消花始放積栁婀娜沙中洲布衣在手不易舉目數過翼隨雲流人言擔簦古竒遇邂逅一見能封侯紛綸寸舌有榮辱智士縮吻成身謀愛君亭亭日中鵠玉色已變扶桑游紫芝為糧露為醑北適瀚海觀羣漚素書滿嚢不干世磊落胸膽看吳鈎新編翦雲彩鸞舞妙筆入木寒藤抽氣酣登臺望陳迹慷慨直欲微言酬舊家鐡甕古城下舂浪汹湧今悠悠但當清談且飲酒往事寂歴遺磯頭黄鸝空桑子規怨橡實已盡榆根留長河淊天怒蛟走底用華表歸來愁江湖清歡眇去袂風雨疾意催行舟人生㑹合定有樂念此别意空綢繆燕吳閒閒氷雪相看豪門炙熱熱如暑下馬還家汗流雨徒將嚬笑作清涼萬事回頭總塵土那知道人玩丘壑一榻髙寒閒栩栩碧雲散作明忩塵妙墨還為小山霧平生冷語出胷臆頗怪梅花猶媚嫵峥嶸嵗晏凜今夕商𣙜斯文共樽俎要知冰雪本竒絶正色森寒傳太古我聞崑崙有至理隂火玉泉誰解煮㑹須鐡石起風雷手抉𤣥闗破凝沍人間寒暑潮去來物外隂陽月吞吐閉門客散真兩忘竹影離離滿前戸㶟陽張節婦瓶中杏枝著花因賦陶人妙合隂陽機凍壺頃刻回芳菲盈盈緑房綴冰蘂玉蝶婀娜穿帷飛佳人蓬鬢不下堂手繡孤鳳横匡牀寶刀翦繒試春色翠袖慘澹顔無光烏頭可白珠九曲造物深知憐不足故應試此一枝春㸃綴扶疎驚衆目君不聞天上瓢髯龍平陸成波濤又不聞壁間壺兩曜瞬息如跳珠齊諧茫昧不可詰炯目看朱動成碧張氏之壺如截肪真火煉質千年剛枯根借潤表貞志慎勿語怪歸荒唐仲章與余連舟而行仲章指畫皆不在人後夜泊甲馬營余舟適先至仲章有詩因以奉寄我船如縮鼈瘦僕凌兢空挽曳掩篷熟睡初不知晚向沙頭踏新月君船如生駒追風破浪争驩呼青春櫂郎紅蔽膝摇唇蹙口歌吳歈昨宵甲馬營前宿大佀天公憐不足回帆望君君不譍出没髙桅轉河曲人生作計那可既誰能盡已不盡智積薪居上東方愁相位還須跛男子憶昨都門經嵗除風吹乾雪塵糢糊閉門擁被謝不出時人背笑何其疎只今船行一千里萬事乗除總如此愛君玊雪雲中英我歌作勞君且聴蒲城孫世英編修父年九十四號嘉遯翁院長而次各賦詩蒲城之下嘉遯翁銀髮髧耳雙碧瞳少年流離老康樂布領踏醉歌春風春風畏人屢歸去阿翁扶春春始住穿花入市争捧盃採藥還家共攜路諸孫青襦誦魯論寒燈夜授鄰壁聞泥深翻疑犢車險雪釋自訝駝裘温憶昔種松如指長俯仰鐡幹參雲蒼桑田變滅理固有底用化鶴來還鄉只今翁年九十四萬事如雲日嬉戲迴首塵中輕薄兒奔走流年竟何事嶽麓圖積石落落雲中礮冠以蒼松藉瑶草天柱脩纎立晴昊絳霄雲璈誰擊考揚許之君顔色好冰綃為裳車羽葆永愍垢濁増札夭湘波層瀾勢灝溔跳珠浮玉簸洲島一洸氛瘴蘇衆槁爰築廜􅂒俾終老出門倚天心愺恅𤣥穎浮花落縑縞無跡空飛詫神媪肘後藏之五色繅念君别去塵浩浩歸來歸來守其寶送何太虚歸山中飄飄兩屐山中雲青眼不受京塵昏意行扁舟本愛雪獨立五栁猶當門人言江湖在遲暮立談雙璧非謬誤相逢挽君君不迴落日蒼茫蹇驢去同子唯賦水車挈瓶之智誠有餘抱甕之勞亦良苦何人嘗巧抉天機河伯逡巡魚鼈舞昂昂長身臥塍岸捲地翻濤敵驕暑誰云龍骨化梅梁未信魚身作橋柱縈紆香輪過流水突兀雲梯卷清雨横陳歌板促紛綸倒流谷簾聲齟齬東家榼婦顔色惡步步生蓮空媚嫵陽烏流爍汗成漿平陸須臾涌銀乳推移燥濕意本同竊奪隂陽天