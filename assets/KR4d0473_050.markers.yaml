寶䇿紛珉琳秉筆直塗竄嗒然養書林維南有佳樹寸雲出遥岑遲之不肯來辭以道里深跂予匪朝夕盟言在兹今層臺望秋林華樹在其巔上有青樛枝為我𤣥鶴延良時豈不感盤雲復迴旋瓊英失零露百卉争忿悁願言保遺直勿使衆蔓纒一歌以慨慷再歌朱絲絃再次韻潛魚護嘉鱗雛鳳含淳音束髪勇聞道執御羣公欽痛哭悼賈生敏給卑陳琳荏苒嵗月遷側身羣玉林飛塵化𤣥髪所歴多崟岑精衛有猛志不畏鉅海深遺聞理墜簡修名匪垂今古有惜隂子觀日扶桑巔雞鳴起中夜紅光朗流延吾欲挽其馭與天同左旋志士不並世寸心増結悁神澄水鏡浄世閲徽纒纒鄙語雜謬誤奉身直如絃觀圖書次韻景尹少遊竹素圃學道希心傳祖徳永遐聞履冰凜求全素衣入京洛飛塵浩難湔車書煥皇度末技期雕鐫稽古在簡要敢侈三萬言煌煌羣玉府遺跡森炳然滄波蓬壺島古石仇池天方諸變毛穎寒暑隨推遷感彼傳翫數寸心獨悲悁凄其衣冠聚拱木思昔賢籝金白雲化青箱游橐旋寥寥鈞天夢髣像追四懸尤物詎足貴尚徳庶永延愛君閟神珠出水復媚淵六籍儼遺訓精思貴誠䖍一撫𤣥鶴操以賡雲和絃次韻廬山黄伯玉東漢名士十詠食肝不知味詎為口腹人紛綸五經學講道踰八珍古來植名士殺身以成仁念此匕箸微少忍非傷貧髙誼動白日正色凌三軍仲叔固義士井生乃天民漢季日頽靡莽莽蕭艾叢孺子南州彦獨立風雨中兩為故人吊斯道萬物宗湛兮如止水脱焉如捕風儉徳良辟難栖栖何為容耕稼詠典籍食志非無功叔度長閭巷奉髙獨先知盛徳眇莫聞鬱為時所師朗陵一邂逅此豈髫齓兒幽篁抱静節游龍隠深陂至今百世下清風散肝脾仕止適天運不喜亦不違薄遊河南道還家復牛衣力田南山下久卑不學恭每於風雨時執禮夷踞中甑墮乃失聲此意人所同厲行名益彰無懷道之宗郭公果善相千載我欲從伯鸞事沉冥作勞賴仁妻身隠不願文更治山中棲浩歌五噫詠麥秀何凄凄遐征詎遊觀鳳鳥不復來贏博慕季子居夷法宣尼幼無適俗韻與世非寡諧至今青青冢猶有鳥銜泥古有逃名士洗耳東海東韜精事肥遯浮雲藐王公被髪或佯狂垢形滅其蹤季世事標榜紛紛競罹凶所以康伯徒邈焉不知終幼安家北海流徙來東溟一帽常挂頭破席屢見經六籍躬探微衆說紛聚螢老非諸侯客肯至三公庭華生竟夭折管子終康寧龎公老江漢性本愛居山採藥山北涯歸鷗送之還青林酒一巵白日茅三間時許眼中士非鵠亦非鸞性不耐束帶矧肯貪王官侣憐牀下子﨑嶇卯金寒静性閲變化道充身念安乗風學輕舉寒蘿杳誰攀中郎天外鳳北海人中龍鳳以五采萎龍以有悔終失身匪素志尚言乃真窮舉世習𤣥黙脂韋争長雄之人佩瓊琚肆言刺羣公落口掇真禍悲來事容容蘇公起深悵蠻江盪舟中荀陳兩家子龍鼎合雞彛昔嘗窺其圖一一無吝疵空巖古桂樹崔嵬匪今兹想當下車時羣雛古威儀行酒拜滿户入門揖當碑惜哉或與羣巨構頽其基我家司徒公清徳炳漢朝盈盈丙丁綬􅂱􅂱左右貂謂此非世美脫去孰敢招榮木固同根其末千萬條勁節或峭正孤吟或清寥世逺人事疎耳冷心志消瞻企法天運盛衰感江潮束髪六籍功矢言期久要詩來振遺饗縹緲孤鳳簫前修果未沬百世詎云遥觀真文忠公畫像羣賢輔絶學嵯峨武夷峯熒熒方瞳光汲汲汗簡中緬懷文明初蒼珮極匪躬執筆侍玉署妙語工彌縫飛塵變蒼狗潛淵閟游龍空餘經濟心勞徠飢飛鴻濁水投神膠揚清迺竒功喬松不並世寒飇轉秋蓬生世我巳後正緒遺顓蒙惕然拜公像斯道非終窮曽大父樞宻越公嘉定辛未與先生同官奉常寳慶初同為侍從先生被黜先公亦以論邉事去國獲拜遺像併識于後王忠簡公嘉定入朝曽大父越公獲隨班著暨端明公嘉熙間以西山先生門人敭歴麾節先公則已捐館桷向遊學婺女得拜端明公之次子令尹道家世遺事纚纚不絶口今復見其孫申伯于鄞喬木摧落桷深為此懼瞻仰西山先生遺像因叙事契併以自勵亦以勉夫申伯陶道士心逺齋少秉丘壑志養真事深寧清晨脱章甫習道誦丹經熒煌金碧居明霞敞殊庭逃形託榮觀漠然守心扃矯首西南雲飛盖垂流鈴八表散清雨歸林何亭亭緬懷靖節翁舉觴日沉㝠之人静且修竒服養遐齡長松舊云植秀色日以青素心靡違只矢言寄山靈寄題郭静州絅齋靈曜動橐籥萬物俱光晶湛然齋居子韜精獨沈㝠飛梭織翠霧層冰瑩疎星製為蟬翼衣無華静儀刑憺兮神君來不笑亦不頩一以却氛垢一以永千齡我欲從之遊車音振泠泠清容居士集卷四欽定四庫全書清容居士集卷五元袁桷撰古詩五言為贑川連教授賦梅城稜稜太古根縈帶鐡不如飛塵望其藩却走奔無餘中有冰玉人指揮萬瓊琚低昂受其職補理成扶胥天空斗摇寒令嚴察孤虚練袍立清夜鮮明在犀渠積雪誰為驕慷慨紛糢糊隂陽本一氣開門使之俱險絶貴有道面壁非吾徒司農起視旦蝶夢方蘧蘧泊貫州次韻仲章沙塵暗河津遊雲蕩無餘忽忽萬里念眇眇孤鴻俱風水淹行頓異縣非故居雞鳴逐前邁殘星澹遺珠空林野氣肅古樹慘不舒飢禽何其悲驚飛挾鳴雛迺知俛啄意愧我將焉如道逺怯驚隘終憶山中廬誓言息機事解纓慎馳驅初夏鬱新溽永日誰為娛因之寫初志臨風復躊躇次韻吕學正古意二首初筵秩嘉賔容氣清且明至饗不在酒尊罍粲東榮傷哉崇飲徒偏宕四坐驚中有獨醒士靦然愧非輕持觴懼濡口孤吹幽篁鳴永飢詎遺禮俎實期充庭苦心嗜昌陽古簡香莫識之人逺持贈藉以五色石宻節懷黝章寒暑端莫易三咽迴中腸起止良得力舉世希妍英椒蘭政紛職慎勿强嗜之􅆽泉澡其徳次韻元復初春思三首凍樹迴青陽羇禽競新哢喧喧人語浮稍稍春事動澄心絶芳華小睡足幽夢夢覺天宇新朝光集飛棟遊塵逐平臯秀色翳榛莽油雲互東西鬱抑不能雨昭蘇在𤣥功竟夕復延佇何當抉其顛振翮窮委羽逺客芳草思湛湛天外舟坐令親知疎低徊此淹留古樹擢竒石清流滙芳洲素心諒有在胡不為兹遊雨後聞鶯衆卉沐新雨幽光澹餘情岸幘碧忩冷卷簾白雲生起坐調素絃促軫流鶯鳴佀言田家苦招我田中行昨宵隠其雷願言興滿盈送李徳隆經歴其父居澧陽因乞郡江陵以便省養悠悠澧陽川飛鴻去無極白雲眇何方抑鬱萬里色念之不得從肉臂誰為翼翩然領南郡解此終嵗憶楚宫昔壯麗冠珮立瑶席瓊英輯佳思落筆洒金碧凄其千載下正氣堅鐡石想此問俗餘酹酒追寂歴平生功名意甘㫖惕朝夕懷章遂其初居夷亦云適藝蘭襲孤芳種橘企嘉植永言區中塵過隙殊未息節婦吟為蒙氏作幽蘭浄如洗晻靄桑麻墟天低泣清露因依護紛敷春風逺相負迺在萬里餘明月流素光願鑒夫君裾荷戈力行役誓將保無渝難以一日歡永失千載娛蕩蕩明河側雙星隨斗移㑹合靡有覩恍惚生怪竒古意不復識今情益多疑契濶三十春百年以為期白首一邂逅孤芳秉華滋感此初意深臨風託長辭次韻范徳機海鵠篇黄鵠海上來逍遥遊帝所寥寥九萬里五采紛異覩朝霏西山霞暮結平地土喧啾舞晴翠鵠首不復頫孤鳴者何禽振翮亦遐舉憺兮邂逅之落月耿清侣芝糧産層顛蘭珮在逺浦八表同其光欲言淚如雨臨分致黄鵠出處各有許方壺渺麟洲輪囷為君佇送任懷可跕跕水上鳶游游釜中魚鳶飛不得息魚呴何時蘇興言夙行邁晴秋振脩途挈衣海上州出日摇珊瑚采瓊以為糧拾羽以為裾妙言感芳蕤流光曜陽烏盛意勿復沮清氛静無餘維南有英雲矯首出門初團團御飛盖隨君為躊躇勗哉植明徳含章俟昭圖同復初功逺飲仲章家觀芍藥分韻得一字深沈碧雲居錯落紫瓊色芳菲護餘春清和表昭質髙叢吐騂剛新茁角繭栗傾心愛膏露正色浴初日含香紫宸朝奏舞彤庭佾駢頭澹如無背面意愈密杯翻王母下斗碎壯士失霏霏玉生煙漾漾珠吐液絶容第無雙薄醉飲真一嫣然屬幽賞為爾寫清逸洛詠五首示洛人張孟功任大正晴雲起嵩嶽變化如游龍感彼金谷人聚散同飛蓬縈紆古瀍澗百井争汲舂昔有陳思王作賦雕層空相望不得語遺情寄㝠鴻金隄手所植荒淫竟無蹤三川鼐沈淪洛水以土勝如何羣英聚千載兵甲競僊人王子喬吹笙白雲頂下視北邙塚今為狐兔穽㫁碑化灰刼來者日以盛箕山水泠泠側聴發深省森森古名園玩芳納𤣥覽澹然觀物翁欣至情不減看花烏帽落秀色起晴臉一一卿相居舉觴雲氣湛尸坐寒暑遺妙言天地範一去三百年寒松白雲黯昔有好竒士絶頂觀海浪神泣肝膽翻興逸天地放泥金與玉檢縱筆紀其妄兹山久寂寞著屐事幽訪太少何岧嶤兩曜隨下上彩鸞凌風翔疑有帝子降經郛闡微言理窟洞𤣥化汲汲嵩山叟反復窮代謝白璧匪有瑕後賢極譏射麟經書薨卒外臣不以假如何莽大夫簡牘得矜詫往聖既莫從掩袂效喑啞贈汪生投簪事却掃衡門無雜賔衝擔鳥雀噪魁梧見斯人遺我以琲珠神光絢嶙峋風雅久不作雄辭逞齗齗愛君春雲姿回旋轉空輪飛英不受采積潤凝青蘋老我意苦短念此情彌親疇昔侍金鑾挽士志莫申薦禰固百一視君鮮儔倫先聖六籍功願言善彌綸辱贈莫能報清風響蒼筠感興明月不受采澄波偶成文壌壤𤣥黄中至理孰能分南山有琪樹䝉彼山上雲層隂閟朱光積潤養竒芬深林葆真素芳妍澹無聞昨來京國遊緇塵日芸芸永念丘壑趣攬衣意如焚題王眉叟溪月圖水清不受觸月髙不受浴空景兩相忘松風進虛谷之人閲真静引手還在目服之飛上天溪流浄如玉書孝子卷道旁拾枯松汲水作糜粥堂前九十母啜粥端勝肉人言五鼎養形渥迺有辱擊鮮豈無具彼網不敢觸乃翁三尺墳慈烏為之築亭亭忘憂花甘露手可掬花開醉春風百嵗初轉轂之士歡有餘之人何不足夜泊城北有懷孫秦二學士英英二學士黼黻元祐初功名軋姦黨翰墨尊寰區維昔淮南邦風流藹清都至今舊文采老蚌遺神珠百年俎豆廢荒城屹秋蕪黒首總論武舊老時言儒白雲去已久來往今何如蒼蒼灌木隂曽聞駐瓊裾艱難視天運俛首猶唐虞稻米竭秋歛菱芡餘嵗儲白鷗眇天末蘆葦寒蕭疎懷賢願有在佇立情躊躇淮口阻雨二首曉雨壓風力我帆同欵段怗怗篷底眠晝日慘易短獨行既無儔欲去不得返㝠濛水雲重寂歴榆栁㫁淮流既東馳我行安可緩縈迂泝三义始覺人語亂艱難意如斯寒鴉佇江岸小雨不作潮餘情在春樹㝠鴻歸興深振翼美無度凄凉舊如此荏苒已増嫵茫茫昔荆榛桑柘青幾許淮水去不休嵗閱今與古風雲合浩蕩我輩勞步武人言上水地沙流半焦土行役儻自然春雲起飛霔詠史四首青青虞美人欲舞不解前漫漫劉寄奴醫國真茫然風迴下相里寒沙起蒼煙徘徊古彭城亦復多流泉二者骨已朽胡為事春妍人生要垂芳豈託小草傳丈夫與女子籍籍同悲憐寰宇設天險圖書已周知鴻溝定疆理屈意陳卑辭永觀沛公豪豈無懷土思羣雄亦鄉黨輕家迺相隨時來各忍性不復兒女悲它年過沛宫父老垂涕洟井邑圖新豐雞犬猶前時論功食湯沐故里俱無遺成敗論昔人興懷重嗟咨留侯晚辟榖端有避禍意逺招商山翁不復為漢計平生老鋒鏑帷幄乃真智南宫論非諛意冷終有忌雍容視國本孱子匪神器此坐端可惜欲言且深慮代王豈不佳語出禍立至羽翼從汝成矰繳幸我避百年願已足投老空立異不見吹簫民功成終械繫人言漢淮隂晩嵗何卑陬英賢多混跡豈復論恩讐泊舟楚山川緬懷意悠悠責人斯無難此意猶前脩近世輕薄兒流落曽相投飢來或乞食寒至將索裘一朝青雲上泯黙懷深羞髙視絶舊好削跡