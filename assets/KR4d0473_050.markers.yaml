  - {type: variant, offset: 8, length: 0, content: '', WYG: 層昨夜西風傳雁信露華如雪月如氷方袍圓帽眼如鶖問訊紅衣不㸃頭剛道西天同佛住箜篌琴瑟勝南州題葛仙翁移居圖翁媪相攜入翠微轉頭猶有可憐兒丹砂不是神僊藥勾漏歸來鬢已絲黄松瀑索酒殘春聴雨元無著恰佀槽床淺滴聲活水飛花誰駐得願隨小榼夜深傾祝丹陽飲馬圖天馬從來不受塵水清深愛自由身髯奴未識相忘處手控青絲强屈伸舊春花下與東嘉周子敬聨詩有人到中年始憶家之句余坐舟中五}
