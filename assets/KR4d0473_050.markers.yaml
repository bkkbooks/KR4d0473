茭或夸巫言擊長劒或騁梵語鳴銅鐃老彭之孫赤松派尸坐直欲鴻濛包深知天水本一􅉋山澤妙感窮羲爻三𤣥上章給鳳札九淵投簡驚鮫綃大青小青各受令旋轉急注搜巖坳初疑飛繒蔽雲頂恍若銀竹穿林梢鳥衝沈㝠舊栖失虎度泥淖前林咆迺知至道在瓦礫芒刃不缺湏良庖皇皇真宰燭萬類神運溥慱民同胞前驅招摇後𤣥武朱冠鐵騎森旄旓精誠相通顔咫尺聾瞽未識徒譏嘲白頭太史詎妄記願以彩筆窮模描近為盧真人作桐柏山賦以舊賢四詠復令賦詩次韻雙闕髙蹲僊境分深留絶頂獨耕耘雞啼流水村非逺犬吠隔溪人始聞翠􅕃滿林俱上藥黄雲封户總回文層霄笙鶴湏臾見不用談空李少君王子乗鸞八極周參差次徹此淹留緱山未信雙輈逺滄海端如一羽浮碑聳蛟螭擎雨露賦鏗金石閱春秋莫言劉阮歸無跡政與寒巖二子㳺逺瞰神山接海潮羣峯匝匝翠周遭添書舊字開蒼蘚金鼎寒光暎碧桃瀑濺花香疑過雨風回松吹佀驚濤昔年曽說王靈寶冷笑人間有二毛雷起平田過雨腥居民猶説老龍靈泉流洞口凝鍾乳月落松間照茯苓琴罷忽驚人換世丹成深勸客延齡僊翁久作朝元客贏得瑶壇滿鶴翎再次韻門首穹碑字八分寸田尺宅勸鋤耘雲歸右洞疑無著雷過前山佀不聞磨石旋風空世刧梭溪織水起寒紋年年秋月層䑓上髣髴虗無下帝君堂堂王子憫宗周不住緱山此地留玉髓定將金篋貯滄波能使羽觴浮絳桃帶雨飄紅雪翠樹停雲起素秋絶頂銀盤宫闕爛不須更向紫霄㳺夾山松瀑佀秋潮老鶴調雛日一遭欲與雙成同勸酒却嫌方朔强偷桃草沿碧澗千年藥雪釋瓊城百尺濤聞道玉蟾三度到通明金骨舊皮毛玉蟾或云在羅浮未化久食青精厭世腥無心折草緫通靈望雲岸幘招歸鶴滴露濡毫傳負苓峯頂丹成真九轉洞中棊罷已千齡嗟余猶是征塗客四上開平數鴈翎上上人㳺開平回四明圓帽方袍上上京看山碧眼雪分明南來白鴈先秋去我軰無情合有情成君輔廣濟堂車馬填門日不停刀圭上藥已通靈應須重作鐵門限坐見堯民夀百齡内宴二首寶勒猩纓鴈翅屯錫鑾欵欵奏南薰珠冠聳翠千行列雉扇交鸞五采分宫漏觧留黄道日御爐能接紫霄雲漢家天子空英武置酒争功始考文椶殿沈沈曉日清静鞭初徹四無聲桐官玉乳千車送酒正瓊漿萬甕行肯以駞峯專北饌不須瑶柱詫南烹先皇雄畧函諸夏擬勝周家宴鎬京伏日伏曰車中閉炎蒸不自由轉旋疑病酒掀簸似驚舟山色隨眸轉溪聲著耳流艱難吾敢讓猿鶴故山秋龍門君恩八度過龍門眼見蜿蜒守黒雲漠漠沙田荒礫滿空將霖雨一溪分巨靈何日擘雙門千古英雄底死論落日碎金寒澗裏銷磨猶是僕姑痕戯題開平四集開平四集詩百首不是故歌行路難竹簟暑風茅屋下它年擬作畫圖看奉題開平百首詩後王士熈玉海雲生貝闕髙騎鯨人去採芝遨灤江一夕秋風到瑟瑟珊瑚湧翠濤清容居士集卷十六欽定四庫全書清容居士集卷十七元袁桷撰贊劉敏叔畫八君子圖贊五季横漬萬姓阻傷剗舊布新赫日蕩光變通維時君臣爾詳丕顯韓王應運斯翔佐帝立極肇服衆國銷兵弛財邦本茂植獨相十年黎獻安謐弼違雍容不撓厥色百壬肆妖喬嶽漂摇智深如谷終止且消金縢天開軒冕以朝簡在帝心王勲日昭燕尾之眉貫玉之姿炳靈丹青庶或類之右韓王堂堂魏王龍章鳳質天實生之以佐王室射䇿玉墀慶雲耀日中外踐更執徳惟一西陲繹騷將弛卒驕徃綏爾戎薄陳武韜濯以清泉釋其煎熬入秉國釣衆味畢調不懾不渝迄康皇圖取日虞淵登子天衢朝野罔知繄王眀謨危疑之際以身調娱両宫熈熈萬姓于于桓圭赤舄清廟配食於鑠厥勲千古罔極右魏王赫赫潞公不震不動威以服戎寛以濟衆宏淵雅譽磅礴肆著蚤年登庸具正百度貝盗斯興命公於征振旅霆發不日以平國財未殫抗議省兵激懦抑貪朝廷清明以徳報怨以爵為勸强敵効貢却立改觀名倡九牧進善無倦四朝師臣邦家之珍委蛇兩河如松如椿燕頷淳庬鮐背輪囷何以比之永古蔑聞右潞公儒以稽古酌時斯正用非所宜秪益其病在漢懿侯治守清浄惟爾荆公行修於躬耽精古籍慨想遐風懷寳陸沈患莫已逢激而翹之以達天聦髙配五帝羞視七制廷議藉藉㫁以辯毅復古之志與帝俱銳發政累名公是喪朋晚歸鍾陵惘兮慎兢蹇驢空山悟彼愛憎矯矯貞姿涅而不緇吾將疇依為學是師右荆公帝宇永清文治斯舉取青媲白眩巧鬬嫵末派横流獨手莫禦弊極斯反誰受天祜䔍生歐公鴻碩之宗鼓以雷霆驅以雨風如日之明如川之東肇正古始四方攸同奬善矻矻英俊滿席彼有未至憂見於色補衮之功其繩則直以退為完以佚為安髙風邈如審象以觀右歐公任當其誼三褫無畏用不展志好爵斯避允顯温公為世張弛執中秉徳享帝活國熈豐紛紜朝有奸慝歸卧洛師纂緝載籍元祐之初大矢厥謨稂莠既深百糓未敷畀成於天力疾以除佐佑王室公心如日獨樂之園以迂自佚生無榮飬殁有餘泣深衣幅巾天骨嶙峋中有至道不以示人唯誠與敬千載如新右温公岷峨之山扶輿絪緼誕育至英絶類離羣溢為江河乗為風雲髙絶俊頴探􅄨炳文承明邇英紬思運精騁轡以行華夷是驚蹇蹇匪躬上通帝靈才以貶官謗以長名播遷徼荒百虐冦攘繕性養神彌介彌剛盤桓南歸百神從行誰謂巨浸一葦以航瞻彼徳容春陽秋霜烱然方瞳如犢初生霄雲峩峩野服蒼蒼徃代莫從鑒兹耿光右蘇公沄沄修水誕𢎞文明維太史氏頴敏之功由彼岐嶷揚譽上京服襲瑰瑋綜覈文藝剖析幽翳謝鮑前驅屈宋擁篲𤣥言逍遥夙昔超詣正宗江西歛祍嗣裔厠身著庭正氣果毅筆者未成削者已繼秉畀濁流孰怨孰尤不怛其化心君天游精神滿腹瞻望不足烝烝孝友猶在眉目清塵髙風曷其有終右黄太史祝道士龍贊靈砰砰三五一視若存水神立𤣥為光髙原粒天門開靈受秩墨竹贊二首墨以韜智𤣥以御柔渰焉雲興脱兮凛秋寥寥天標下為岧嶤執兹混淪函三爾超乗剛庸升實志勿驚比焉彚亨烝徒繩繩纚者如傴若佩而組墨卿司𤣥謄汝於堵子昂集賢真贊審中聲以比㲈箾之音證墜簡以啓載籍之藴承明三入而不居江海一麾而無愠遺世而深憂盡言而寡尤瓌瑋萬物金石横流敷文太微慶雲瑞芝超然巖壑寄扵筆翰者吾猶以為杜徳機也張廣微金書隂符經贊遐哉古帝握契眇綿沌沌混混超天地先執静御動兹為坤乾虚九藏一書圖弢鈐範圍包絡佐理宻堅氣母受要納息以傳泥金著文其曄𤣥𤣥鋒淬穎脱乗雲大圜雲中龍贊握𤣥機騰八荒憺雲中闇以彰九九合下土光返珠淵終智藏龍贊御乾入坤萬靈嫖姚止水飛立迴旋上朝神后布令藴隆黙逃功成返淵重𤣥以韜又𤣥雲嘘氣為母騰靈湫匿星斗握以機數九九百糓蕃歳大有太上授經圖贊混元希夷空洞眇綿方圓緯經言孰可宣憫彼世醨述𤣥五千紫雲升空重席九筵跪坐受聽萬神參前研幾察微如珠善淵徳為之初道迺自然辛稼軒畫像賛妖雛殂江八方沸騰手提糢糊仗義南興閩越荆湘是鎮是繩智名勇功蔑如浮雲䜛屢尼之耳若不聞聲裂金石湛厥心君運有南北孰言一之時有未完矢詞窒之卒全其歸莫能躓之帶湖維居喬木欎新目光背甲佩兮振振審象式瞻宛其不泯仁廟御書除官贊扵赫仁考御龍中天追琢王度左右惟賢思索俊髦嘉量達權稽古九官匪曰叙遷嚴嚴秩宗維直且清佐理大政宰士是程皇畿膴穰具瞻靡輕率彼緇流出納糾繩八柄馭臣首爵以貴或超或常執管淵思昭哉雲章銖黍奠置勿私以恩不恱其媚番番老臣卒秉國鈞山立陽明如嵗之春帝賔於天執簡涕淪虹光徹楹萬億日新至治丞相真贊以元勲開國之孫佐大明麗天之主肩一徳以正人心集衆思以清庶務玉絜而彌温山立而有度審象以觀斯為太平之宰輔又階符耀騰河嶽炳靈寔生上相秉鈞以成儼兮徳容衮衣葱衡山立其威玉絜其清陟降帝所翼翼是承帝曰相賢佐我治平雲龍從類鼎鉉利貞懋昭顯功象於丹青扵赫寶璽虹光爛明用永厥藏詔爾雲仍英廟御書開經偈贊時為皇太子日升咸池五采耀騰昭徹水源濁垢斯澄維彼寸穎執一貫萬鉅纎受形莫測其變驪珠陸離光被寰海允符龍圖昭示億載自贊㓜承父師之準繩壯緝文獻之淵懿守先天之中為初心䆒三聖之易為一致氣弱而詞愈卑學䟽而用益疑寥寥兩京耳受目接者不能紹傳吁何可言王承㫖畫像贊扵赫乾運天造耆武肇敏王公粲飭皇度越於江濤率圖籍以朝秉直在庭不激不雕矢辤瓊琚風舒霰消益之以甘雨濯其嘉苗佐理毣思敷繹静規民甫息痍勿煩以疵懿徳沄沄如山出雲有聞無聲爰澤後昆珮玉峩冠審象是傳之問之美百世弗諼王叔能真贊心清而行全守廉而益堅不汲汲扵利達專丘壑以自完若是者五采不能以傳至若炯炯方瞳藹然孝悌之實發於睟容人知其為臺閣之秀彦藴經綸而猶未盡其用者也自贊訥文詞而三直承明之廬拙騎射而五游朔漠之域居安以窮犧爻之變比事以糾麟經之釋至扵見㡬歸田服恬淡而守貞白識者謂為知止而獨慊然猶以為有形迹也馬元帥真贊養恬而智無遺息機而事能應贊黄閤弗居其功坐烏臺獨守其正制變扵劇郡若郢人之斤鎮戎扵大藩若秦王之鏡服芝术以養年將見安車造朝守規隨而樂清浄也瑞檜贊老子之道以恬泊真静為根本而其嚴靚清宻非窮極壯偉不足以為榮觀故所至丹艧土木與浮屠氏相埒殊庭廣寛候靈斿扵致祠之際尤加嚴焉四明𤣥妙觀構寶殿倣南城之長春法式具備主者吕法師顧瞻中唐作而曰兹不可不加竦肅手植蒼檜列若幢節厥土墳剛風潤雨濡膏脉日起旁達蓊鬱連累相承泰定三年春正月中澣上聳結為鳳冠觀者林立考諸釋檜者曰乍檜乍栢一枝而能屢變唯檜為然觀是則知釋者之非妄矣或曰厥今聖天子嗣位歴更上元洋洋乎盛徳覆被動植疊瑞重休四方承畏不敢以獻以告而祝釐儲祉道家者流有所不得辭讓迺繪為圖以光天之休為之贊曰繄檜在廷三光炳靈膏涵於膚湛其晶熒化為鳳雛珥冠儀刑乗風鞭雷上於帝青曰有徳者祥兹為利貞爰祝萬夀九垓永寧雷氏龍吟琴贊為閔思齊作四田八日用凝扵神攫之也深養之也淳風生扵木莫窮其聲比物引類錫兹嘉名杳杳變化雲升雨㴻戞如銅盤兹其為作者之助吴閒閒真贊徳不形禮為翼熈熈冲静之神侃侃孝友之色籠古絡今其詞如雲佐理以無為智淵而若存朝承衮龍暮撫松鶴心徹九九坐石盤礴是所謂養其尺宅守𤣥以生白者耶仰山熈禪師真贊蜀僧曇簡以文詞振林下繇是東南學者翕然師之育王觀禪師才辯繼其學弟子熈公復繼之有詩名鳴咸淳間試嘉慶圖詩禁中定為第一余獲見於浄慈植節刻行言語若冰雪欲以蜀學廣其徒後歸隠仰山以逝其嗣隆教師祖瑛以遺象從海上請余贊迺為贊曰心之精神繇言以宣匪事琢雕合扵自然維師集思泉湧雲溢億萬森列􅂧貫以一蜀學日淪志士是惜瞻彼肅容以楷以式南湖入法師真贊目穿書林心超義海體用不違功斯十倍審多岐之亡羊悟忘筌以得魚追琢其詞不浮不蕪外嚴内熈蕭然野鶴之姿斯其成祖庭之羽翼絶塵世之樞機定水源禪師真贊持律以攝心習教以騁辯語黙兩忘微㫖益闡薄飯一盂福不稱其徳至於據席握機颷回電激誠禪林之凖式也雪厓吴法師真贊雪厓吴法師飭身制行道流所尊企弟子吕虚夷請贊長齋以養年持敬以籲天若雞抱鷇如珠守淵望之山林即之珪璋知止葆静合太古之淳厖夫如是逍遥乎白雲之鄉箴存悔箴天君亭亭巖石永貞執樞維機莫我敢膺釣聲割名如蟊如螟微焉髪毛戰兢是承謂善實繇小而過不在大雷以鼓之艮以配之合動而復繇静斯㑹昔顔氏子悔實莫可名筮人司蓍敢告司扃遵誨堂箴肅肅祖父誦戒孔昭亶惟矩衡匪矜匪慆式瞻里門養真簞瓢何榱題岌嶪肆其夸驕金糜玉毁迄用不紹巷有居人燕咡曽髫右觴左饘以逰以遨何白首髙位顧影號咷伊堂既深亦具室奥傴躬徐行慨焉焄蒿户冊崇崇陟降以悚於乎後生勿夢夢是從爰繹具訓敢告嗣宗貞一齋箴昭哉森著鉅纎受形順天之樞執動以承尸居者誰不震不隨謂珠藏扵淵主静是師太虚無體曷思曷為聚為物均散為返真由感以遷若火之燎原在昔夸父逐日走傴鑒觀河圖繇是成數成復捨之厥數愈具庶物澷澷若冰斯泮固而斯應迺事之幹絶仁棄智望道彌渙必寂爾心必完爾神筮人司易敢告靈君誠求堂箴肫肫者仁婉婉者孺彼孺不言容動斯具以食為喜以啼為恕感匪物遷孰司昭先黜思絶為迄全其天揣知者誕矢激滋逺順隂保陽若執玉以祼太素烟煴至静無垠見之猶龍望之如雲猗儒守醫曰曽氏子言邁于京户冊是視銘復菴銘弁陽老人周公謹父卜終老之丘扵先中丞公墓左築室其上揭名曰復庵謂其故人子袁桷曰復反也反諸其本也聖人作易之義深矣余取斯名也厥有㫖昔太公表東諸侯歸𦵏於營丘禮以謂不忘其本余家故齊人雖南徙吴興而其遺禮三世猶守之自余失仕居錢塘非有酣豢之樂而忘其歸不幸而不得歸者勢也今老矣苟終無所歸則扵􅂧之道奚取抑甞推死生晝夜之理其變無窮反身而觀虚一而明者物莫能禦則兹丘之樂殆與造物者去來而莫窮其所止也子為我暢繹而銘之銘曰大明麗天隠扵崑崙晦冥有時以全其根海氣騰溢為雲為澤吐竒滋生復反故壑嗟彼昏氓雎雎凉凉齒髪日化莫知其鄉馳車羊腸倒戈蟻垤少夸老衰運往一跌維子周子心君天游顧瞻松栢肇謀莵裘峯迴泉渟虎伏馬立鬱為斯丘不龜以吉煌煌先徳如珠在淵既揚其輝終閟其妍盤桓斯丘豈不念歸三返晝夜以為徳機伊復之道其微如芒磅礴一氣變化以彰原本稽中是則是象謹獨内觀動静交養他年逍遥駕風御雲匯為江河炳為星辰其來無趾其去孰止為善是嗣貽於孫子君子齋銘大裘無華完玉不琢飾美自將其實愈落善不可為名不可近恕以養仁敬以崇謹謂我獨賢於徳彌損八表同雲一決終僨謂世實賢雎盱孔憐肥遯斯耻却行乃前人我之道弭節兩忘汝不我瑕我不汝望煌煌嘉名揭兹户冊希賢是求探藴觀􅄨盤旋九州俯仰千古發硎淬鋒門轍户屨君子之泰君子之和永言銘之以宴以歌澄心齋銘大梁劉君彦清佐鄞幕清浄畫一希蓋公之道逾月而治愈簡及朞而人莫能議噫使佐天下由是道也果何病今世汨汨然外治者多矣神明粹精交蔽而愈失其於内也盖不暇夫虚明之體絶慮而求者非正或者謂老氏之說近此因屏不復取今劉君以澄心名齋動静交用有合扵聖人之説四明袁桷因銘以廣之存神内觀形不能以久完刻意外治氣由是而彌衰水煩土敝維物之灾人為物靈其道安在内不可穢外不可悖湛然長存扵物何類故操尺寸之智者成㝷丈之失勤錙銖之功者獲倍蓰之益御天地之一氣持隂陽之兩端吾見其清而不介絜而自全也雪房銘錢塘孫道士構雪為房居江南度不能久得北如京師將遂焉久之復越居庸以㳺始固有之迺屬袁桷銘銘曰養絜沮洳其變莫渝納明屋漏其神莫䆒執天之冝允成徳機機可轉不可緩緩則懼懼無以據窮髪之北以儀以則爰謹視之毋怠毋慝崇真觀鐘銘冶吉金構坎離為氣用震以時深則安安迺旋鎮無極億萬年朝陽堂銘焯彼曜雲光融曲阿翼翼𤣥黄粲其鬱華䆒觀厥功構精沈淵若鷇斯伏若珠斯潜内隂以藏外遲以進含施無垠執斗憲運衆瞻嘉明企而則諸言升于岱昏旦允殊丹流金騰下土若昧竦心愓思怠曷可悔嗟哉夸父競不救暍大聖維姬慎兹明發爰興爰處寸測短長少耄勿荒永儀朝陽蔵書室銘六學鴻烈代天昭明精思纂微辭以立誠匪事扵言不文奚宣析理日繁直致衍傳謂黙足以通絶其知聞敬焉孰持誠焉孰存趙郡氏蘇崇其書楹剖抉雲章緯經有程靈根湛虚服習粹精廣以觀萬約以守一迎之莫㝷倚兮不躓仰止元聖學海彌溢極髙明齋銘謂天穹隆環扵九泉謂日陽靈始於虞淵邈焉具瞻荒忽漫漶銖黍立鈞億萬以正行逺陟遐跬步攸定維先聖彛訓大賢是證理一分殊等級辨分不博以求孰為彌綸不約以觀孰歸其根積小斯髙用晦斯明罔有僣差是凖是繩户冊孔昭爰矢厥銘九思堂銘虚中實中圖書之紐實以分殊虚以一受理原扵初思曷為九扵赫𤣥聖分言為中上由體生下應景從維李氏子受訓倥侗户冊孔昭執玉靡墜數窮扵𤣥隂陽以類則皇極之言罔有偏陂淵静齋銘為蒙道士作猗鉤盤審鯢桓蜀叟蒙拱以觀惔無極視晏然黙雷聲守綿綿珠在宫百神環時既至乗風摶清容居士集卷十七欽定四庫全書清容居士集卷十八元袁桷撰記慶元路鄞縣學記粤昔授受緒絶空虚固陋之學淪於人心言理者人人殊師記問者質而不化詞章篆刻决裂六藝糜爛而不可救師儒有憂之據道徳性命之要毫分縷析鑿鑿乎其不可相紊也繇是士得以一其視聴皇王之道復興於千數百年之後可謂盛矣世祖皇帝混同區夏崇學校定國子學成憲皆東南儒先而朱文公所說咸取以為經史模楷於是窮徼絶域中州萬里之内外悉家有其書然而急近功者勦取其近佀以為口耳之實天人禮樂損益消長切扵施為所宜精思而熟攷者一以為凡近迂緩而不講至於修身養心或相背戾而不相佀則緣飾儼黙望之莫有以窺其涘際夫明絶學以承先聖之統可謂難矣弊生於苟易守其說而湮其本將不勝其弊載籍極博莫嚴於五經教人之法莫詳於三物揚子雲云丘陵學山而不至於山惡夫畫也鄞舊有學王文公安石為宰時延㑹稽杜先生醇教之學者輩出至大二年郡大火學燬之主邑之學曰孔文雋董儒金始建講堂禮殿未及完而去皇慶二年三衢姚熈載實來是嵗天子下科舉詔同知郡事吴郡張侯某顧瞻陋蕪首曰其何以稱上意迺率郡官而助之邑令梅君遇春丞簿龎君滋范君祐咸曰吾長扵是兹役曷可逭嚴工庀程戒𨽻業者咸輸以佐閱二年夫子像成侑從有叙門廡庖廋塗雘繚繞之屬堅宻精粲學宫之制完且具矣姚君迺曰鄞號多士昉杜先生宜作先賢祠以祀鄞士之興其自今始乎嘗謂學校宫室殿謁循行風俗之使者未嘗不督厲修繕獨教法未定雖聰明自任猶不敢髙下以議今明詔四出郡侯首創其原姚君又能推本前人尊師之㫖深有所寓桷雖官朝廷因姚君之請知張侯之美遂以學校之弊首叙其說庶㡬吾里秀士强敏自修詢考耆哲篤行於顯微内外之實文質交資上承詳延將以復乎昔時之盛則姚君之闡微其意深矣庸刻於石願有以俟焉鄮山書院記粤若古儒先各以方國所尊祭於學社自漢而降定孔子祀餘悉徹廢今百年來始有事于先師其居邑講習治官㳺衍之地崇闡相望或者病焉夫氣流六虚神而存之聚者易推逺者難窮聲音笑貌之感若將企焉如弗及者理有在也合吴越楚蜀之地咸尊以師惟朱文公世祖皇帝一海㝢定胄子學取文公訓註為學制郡縣益遵守而祀於江南者復得推衍大徳二年四明趙夀家儒科慨然請於朝曰伊吾祖鄂州善待從文公㳺今天子興是學願割田别居以祠而名曰鄮山事甫下趙氏即世七年三山林徳載氏奉命祇事屋毁弗稱旋辟田没不可問覈故整圯實完實成奠薦齋明陟降儼肅賔老佐祭侯伯合餕又三年㑭繫其事於石俾桷曰維我四明薦紳先生辨釋著微實相表裏源同流分塗殊轍一合私而惡異標榜之弊也炳然㝷訓理何外焉學以殖身徳以敦本斯道立矣執空說以為證弊不勝舉惟性與道匪言是夸桷懼兹久願相與勉焉林君精敏慎修宜展於世文公之學不墜審由是也大徳丁未春後學袁桷記鄞縣興造記鄞為縣延亘三百里環山帶江西為沃區其民盡地利近東瀦為湖土廣而俗雜逐島嶼魚鹽之利出沒於海上嵗千百數林藪川澤之隷於鄞者不假於外故號為劇邑邑復輔城以居尤為難治縣上事郡署曲直縱舍承指意一不得便輒指擿辱撓闗臨相通縣勢始振後凡為縣者率用是自治而民益困矣大徳七年師府始移鎮控扼水陸衆曰郡有二府縣益不可理八年真定盧廷信氏丞于兹推勤服廉沈㫁静修罪䟽於囹訟辤於庭朞月而郡侯尊焉大府任焉它邑之讞咸質以定旁郡之賕悉檄以正顧瞻四周令主簿是謀先時縣燬經始陿庳不足廣迺撤而新鳩材于山負者以競輸役於徒民以不病首於臺門㕔堂亭廡凡五十餘楹智周而勞簡噦然以深翼然以容謁者趨者視聴易慮於是耆艾讙然以謡曰伊丞之來吾民不知吏屩既荒吾民相忘彼庭開明維丞之平雍雍其堂富民恐傷有亭是休思賢悠悠丞之戾止勿譁以喜後兮今兮維今是佀咸謂桷嘗職太史筆削無避溢遂不得讓役始扵乙巳之十月越明年成丞嘗為行掾中書有吏能令長忻都次為東平周汝弼氏簿澄江朱申氏也余愛其成紀以示後俾知鄞為可治大徳十年十二月曰袁桷記西洛書院記河南薛公遵先君子之命建義學於永寧矣龍頭山有故跡焉蒼崖嶄然宋元祐中天台羅適正之大刻其上曰洛書錫禹之地正之安定胡先生門人善水利所至通陂埭屯田之美按地志永寧併長水縣長水東臨洛川記傳云洛書所出今龍頭山新立禹祠而薛公仰止亦近得請於朝為書院遂更其名曰西洛且㑭夫後人知禹洛書之誠有自粤昔九疇垂象示文夸誣相矜祖緯襲符漢世明經之士汨扵休咎莫窺其真厯千餘年儒先大興闡天人之袐方圓相通正學以眀然同黨之說勝一以為已是一以為傳授數精理湮皇極之建卒無以大通民有恒性君師作之以修以綏如彼北辰樞紐運行内静若動莫窮其化凡厥有生極迺固有性者為聖復者為賢作而新之維后是訓庸保其極則民永以乂保極者民作極者君運而制諸若兀之在握輪之在御皆聴命於我孰先後焉孰終始焉四時萬化之理繇是而備謂之攸叙夫豈捨已而隨彼也昔大禹佐理水土攸平君臣交修抑亦有定制洛為天下中碩儒訓傳家有其書慎厚遜讓猶有先王之遺風陞西洛之堂者當慨然以思謹其執中將見夫作人如新之驗由鄉而達於邦國勵之翼之示諸於掌皇極之訓其效可成也薛公名友諒温宻有文今為翰林直學士推先志之私淑焕而廣之為屋凡若干楹又將延師以教後之學者而屬筆於桷故以昔之所聞者著為之記建城夫子廟堂記景城縣東南三十里有故城焉曰建城漢為中水縣地金大定中以其地北臨滹沱南薄御河徙縣於今所二水交流名之曰交河焉皇慶元年保定王君領縣簿事循河故堤水落冬月先期率民以補其缺頽霖雨時至則因其防而巡督之河不横流政簡民佚觀風省俗聿來於兹望其井屋聮屬誠阜且康於是士林之秀曰劉國芝耆老韓昌等言曰建城舊有先聖廟城址日圯而廟莫敢廢在昔許文簡公安仁嘗撤而新之未幾金亡居室燬蕩而獨巋然以存至元戊子國芝之父禎遂易扵文簡公之故居以詔於里士絃誦之聲家至而日化矣王君周旋里門念崇而新之於是治書侍御史張侯完以書來曰吾里夫子廟易代有存許劉儒先作新之志子盍廣諸敢以楮幣若干為里人勸於是下令輯工奠方闡基表植巷道庭宇邃嚴以丹以塗論講有堂㳺息有廡明年率其儒生落而祀之迺介刑部員外郎葉蘇君㑭志其事粤自塾庠序學之制不明而士無所於學州縣有學率嵗時奠祭貿貿道途謹修其故常於造士乎何有成周之學備四代而畿内為序十有二為庠三百左右之塾復不預焉噫先正教學之興何其盛也學必釋菜於先師虞庠為鄉學有堂有序得行釋菜之禮記禮者之言也釋菜於廟則自魏晉始也遵古之學從今之禮損益之變不亦可乎且鄉校不毁鄭人美之今天子下詔明鄉里選舉之法建城之學者由是而陞司徒者將皆敦讓重厚敏者謹其藝能恂恂于于仰止昔賢舉不絶書而王君化民成俗之美庶得以傳於後王君以習國語始為樞宻院從事名某治縣有法類是封龍山書院重修記世祖皇帝以盛徳深仁正位纂圖越二年始立翰林院真定李文正公首以碩徳耆夀俊召為翰林學士未幾告老以歸隠於封龍山封龍在恒山之陽公㓜侍東平府君受業焉地舊有書院兵革蹂躪公拮据盡力以成之故其居朝廷也食息不忘兹山天子察憫其志㑭食致政之祿以終老於是公作新斯文逺近之士咸秀出暨公下世踰二十年其從公而顯者曰史忠武公諸子曰杠曰闕曰杞曰煇廉訪使荆㓜紀集賢學士焦養直廉訪僉事張翼宣撫崔某其餘贊成均授鄉里名不能悉數而真定之學者升公之堂拜公之像未嘗不肅容以増逺想也皇慶二年其曽孫慎言為翰林屬仁宗有詔省掾用儒士擢入佐左司院中選都事僉曰李文正公為翰林肇端其曾孫宜以居未㡬拜監察御史而於封龍也惓惓悉如公之志嵗久蕪漶不治徃至治元年為司農屬時請於司農符下其道㢘訪丹漆木甓悉撤以新御史有言曰繼述志事子孫所謹我先公之為兹也實將以佐國家之盛願子記之桷曰致太平經濟之道章句佔畢不能以盡也文正公恬扵進取率躬以化其鄉耄至而辭祿徳之本也導掖其秀民仁之至也其徒卒昌扵時孰不曰文正公所作成也今遺書具存在扵書院者宜究其委源考三代之所以長秦漢之所以失反躬以思平治之道如指諸掌將反覆以陳於上李氏世守家法則書院永永代有嘉譽其繕修也益廣扵今曰矣本末具前記不再書慶元路醫學記醫之書作於上古乎後人猶疑焉隂陽氣運之說與易書禮相脗合蟲魚草木之精詳扵詩尤近之然其辭義奥古卒莫能通曉非專治者不能也先王知之始為之師以教之後復立學以長之生人之本繇是備矣至元壬辰濟南陳公祥為肅政廉訪副使來四明遵詔㫖立醫學學成甫十有八年燬焉其地近市狹紊咸病展事鄞縣西有故主簿㕔事基及傍近地蕪礫不治於是故授徐君源道等請於郡遷以廣之迺斤其舊地得財若干以治土木郡侯完顔公首為之勸推官賀某贊補其役𨽻於醫籍者胥率錢以輔之逾年而學完殿廡翼成軒闊深静㑹予自京師還里屬記其事余㓜嘗聞長老言鄉里多名醫皆修謹退讓呐呐然若不勝衣察脉視色必原扵井谷經絡之微眇調製湯液必通乎風土之宜甘辛燥濕内外相為表裏者悉參取扵經傳故其術百不一失懷疑審問求正扵勝已無忌悻之謬道同而氣和相遜以禮相處以義而昔時公卿家激厲奬與之道又能使盡其術而無愧噫亦盛矣今皇宇恢廓五方士民參雜乎州里拘而不達將不勝其弊率焉以僥倖懼其深有所失也徐君世儒醫教授是邦今二十餘年重静而不撓昔之所聞徐君深知之廣天子好生之徳諄諄然語之使後之學者誦其書母執一以自滿虚心遜志復昔時之長厚不幸罹於疾病將得盡其順受無夭閼之害則徐君之教不亦闡乎余歸田里尚幸而有見也白石書院記釋奠先聖先師定著於祀典而鄉社之所宜祭皆廢不舉宋初肇建四書院釋奠釋菜之禮悉遵令甲若鄭𤣥所言髙堂生毛公制氏之徒皆不得專祭僅列扵從祀濂洛之說行於是先賢之祠競立首扵其鄉復推其居官游歴之地甚者謂其觀風宣化雖其足跡之所不至亦當有祠夫古不墓祭謂其神專於其居室也又曰不歆非類謂懼其瀆而不正也今郡縣朱文公祠㝡廣各慕恱胥勸終莫能有病之者繇是空巖海嶼屹然巋立而入仕者借是以為資歴何先賢祠祀先後盛衰之不同也朱文公之髙弟曰黄文肅公天下尊之曰勉齋先生其學以持敬為先探微鉤深以極夫操履之實懼其守之不專則蚤夜以思歛其粹精絶其枝蔓正誼明道見於經濟故其臨川漢陽之政惓惓於征繕獄訟而論者始不敢以儒為侮守邊議戎衆皆咎時宰用非所宜而公益得以攄其素講事至而不懼政成而不迫是則儒者之效惟先生足以及之先生嘗曰吾於江東之友得三人焉曰李敬子胡伯量蔡元思時廣信之儒先劉君養浩盖獲登其門朝夕習益悉以先生之指授者為標準寳慶元年入太學舍法成淳祐七年授寧國府教授後進之士從劉君者無虚日相地於白石山為精舍以處學者祥刑使者建安蔡公抗扁之曰白石書院蔡公之於文肅皆文公之門人從劉君者悉稱為白石先生天運合一白石之子也嘗安輯其齋廡因曰先君之承先師曷敢墜替誦聲屨武益廣其舊後為湖廣儒學副提舉以殁有子曰光􅂧慨然曰大父師友之傳不可以不垂乆逺文公祠遍江南祠文公則文肅道得以尊久遂買田築宫中為禮殿書院之制悉備殿北立文公祠以文肅侑食後立大父祠繇是傳授之㫖益信所𨽻有司上其事於中書省省允其言始定置山長入選調既成㑭桷書始末著於石章噫文肅文公之忠臣也疑者補之異者同之不以一時之辨争而立其黨與見於成書故其匡輔之功若文公之於程子今之尊文肅者能若是斯得矣光今為史院編修官敏達知治體文肅之學是誠有望焉者也昌國州重修學記青社韓侯莅是州踰年顧瞻學宫頽圯曰至喟然嘆曰化民成俗必自學始爰相厥攸鉤稽負逋治其島租墾其閒田究整是先泰定元年十月甲子役興用工二千有八百計緍錢二千有五百匠石曰食之費則諸生欣輸以佐扵是殿堂門廡齋庖池徑咸得備具謂桷繇翰苑歸㑭記其事桷甞聞之先儒以明理為綱領譏詆漢唐不少假濂洛之說盛行誠敬忠恕毫分縷析一以體用知行槩而申之繇是髫齓之童悉能誦習髙視闊步轉相傳授禮樂刑政之具獄訟兵甲之實悉有所不講哆口避席謝非所急言詞之不工則曰吾何以華藻為哉考覈之不精則曰吾何以援据為哉吾唯理是先唯一是貫科舉承踵駸駸乎魏晉之清談疆宇之南北不接乎視聽馴致社亡求其授命死事率非昔時言性理之士後之學者寧勿置論而循其故習者哉昌國惟四明海中州士之興起自紹熈始著樓宣獻公袁正獻公楊文元公尚書深寧王公嘗記其建學論堂之本始揚雄有言曰百川學海而至於海善喻者也首之以訓詁之精次及夫名物度數之宻由小成至於大成非積年不能以至周官鄉三物之教詎止執一而以為傳道之要殆不可也委流安行由蹇而達訖歸於海學之功也侯名摶字仲舉既興其學迺復儒役以為大比之勸學之士子寧不自勵敢執筆以俟是役也州之長某州同知黄棟孫判官張信吏目陳益學正孫恕皆叶贊其事泰定二年二月癸卯具官袁桷記昌國州醫學記醫之道即夫人身以備三才其說與易箕疇詩禮相表裏亦大矣哉盖昔之君師聰明神聖因夫五行以寓於五常之形氣致坎離之用以合其隂陽推其運行以齊夫寒暑考九州風土之宜别温凉燥濕之髙下蟲魚草木纎悉備具非博習廣聞者不能也至於七情既發之偏必求其中以返於正皆吾儒傳心之極論有察於聲氣臭味之眇忽考之於遺書受之於家庭積歲年不能以竟而掌政令者從是稽其醫事以制廪禄是則寧有夭閼疵癘之憾也哉南北地氣有大不同而為之醫者各執已論近者急於好尚而恣縱不能商度十失五六誠可罪也秦漢之主卒望海求不死藥藥詎能令不死盖其空巖絶島磅礴於巨浸之際絶囂塵接雲霧靈根異草得地氣之正方外隱士時採其竒絶精良以療治輒竒中而功倍今所謂海上方皆其苖裔而昔之集方論者復蒐類於蛟龍之窟穴海於天地間號㝡鉅焉得以有遺也昌國為州四履皆海至元二十九年始立三皇祠綿蕝不稱韓侯治儒學既竟復莅醫學兹曷以奉揭䖍廣其故址而二倍之泰定元年冬十月正殿成復立論堂翼以東西前為儀門外為神門廊廡有序祠象儼赫首以圭租勸民胥成不三月咸樂以助復遵詔㫖為恵民藥局工既畢書來㑭書其事於石桷嘗謂疾痛疴癢切於吾身者猶民之身也民困魚鹽侯能紓之儒病徴科侯能復之既憂其生又懼其罹扵疾病使夫習為醫者講肄以精其術故余歴叙醫家者流其學實難三聖之書昭然具存反覆紬繹皆得以完其生是侯仁政之本愈逺而愈不可忘也定海縣重修記定海為縣自昔號重地鎮遏戍守異於它所南受諸蕃絶域之颿舶東控島夷不庭之邦商賈舟楫噴薄出沒據㑹濟勝實東南之竒觀也皇元考圖受貢益倍於異代信使香幣渡海嵗不絶縣令將迎曰疲於供事視公宇若傳舍嵗益圯剥至治二年忻都君始莅事曰吾受天子命長邑扵是失撫字則奚以仕嵗適大歉徴租扵民將不勝逋負計嵗所入一萬有竒遂覈其實止輸竒於官鹽賦嵗不登民益以困卒請而蠲若干嚴飭官驛置𨽻人以候過客而復其役久而曰吾將治所居以聳民視瞻一撤以新為楹五十餘瓴甓木石丹漆箭鐡皆堅緻可永久教諭蔣君昭先列其行事㑭為記余謂治縣莫先於宜民承上意而不鳴其疾苦甚者増羡以求媚善譽乎何有縣當水陸之衝輒黙計嵗月得觧職即謝去植仆舉弊終其身未能也若是則忻都君之行事汲汲慕古將有以大其所為夫豈苟計目前之功效者㦲余特記其興造使來者有攷蔣君所述多善政不復著推其所為舉綱以遺目盖可知矣是役也尹曹敏中主簿薛炳悉力贊治故迄用有成新建鄞縣尉廰記郡治絶江其地名甬東吴王居甬句為古浹口號甬江在今海濵海達於江入扵奉化西釃於餘姚縈紆回曲綿亘百餘里鄞為縣分東西以浮梁為界東之民習網罟魚鹽以自業其地膏沃有湖可以灌浸率不善墾治春至輒率其子弟文身櫂歌出没扵海島伺危薄險對面成姦宄憲令昭著至死有所不避尉以廵督為職自宋雍熈間置尉治扵彼盖重其地以鎮遏迄今數百年游手益夥捕繫無虚日廨燬於兵踰五十年尉率其兵徒随所寓無常地訊録之所不具扵觀瞻莫格其非而任益以困矣至治三年廬陵周君一䕫來視故址曰吾不可不自重首為外門復為廨門中建㕔事挾以賔榮輔以吏舍後設燕居以休其勞清流匯池花木列植周繚塗雘皆足以支永久吏有言者曰尉職在察盗囹圄不立奚尉之為兹土之民俗弊已久鹺禁之嚴莫窮其窟穴朝夕胠發纍纍旁午不有以居將曷能以有處尉笑曰道徳齊禮夫子之訓也獄市無擾相國之言也閱數月獄以空告於是輿人有言曰尉之申申非取異以求新塞其姦慆養其淳真彼疇鱗鱗良苗氲氲尉之去兮將以告夫後之人役始扵泰定元年秋八月成於二年之二月郡人具官袁桷記浙東廉訪司重建澄清堂記國家肇置肅政廉訪司浙之東以婺女為緫治而行部使者凡六人讞審殿黜循歴於六郡總治之使二人坐鎮於婺六郡嵗終必以其成牘歸子總治定其可否以上於御史臺持綜覈之實執與奪之柄厥任實不輕矣夫以輿地之廣貢賦之夥天子不能以自治必假扵守令焉守令不能以公其心又假扵耳目焉以重其寄大其居室聳其視瞻廉逺堂髙非直為觀美也聴事之所繇唐歴宋嵗久頽剥不治至治二年中奉大夫馬公為使於是邦顧瞻改容曰兹不可不為先務邦之耄倪亦曰兹實聴政之本扵是郡請於中書行省計郡餘財以為匠費崇其堂隍稍北以構柱甓孔新庭廡邃宻名之曰澄清復為燕居之室於其後曰迎華觀經始扵是年之九月明年五月告成中奉拜湖廣行省叅知政事以去資善大夫思蘭公甫至則曰中奉公之恵後若是宜紀其事未幾拜南臺中丞資政大夫岳烈公繼為使亦曰是誠不可軼於是僉命桷為之記中奉資政嘗牧於吾鄉皆得而接識往㑹中奉公於京師謂余曰民之多寃繇循行者不盡其辭吾往浙東將使六郡之疴癢亦切扵吾身後聞其所行果有所不避資政公廉而守正牧民如已子遺愛於四明人能言之中丞公得見於㑹通河議論氷雪以刺劾為已任是則三公之行事深有合夫至公之論抑又聞之事患有所不明知而不有所舉藉藉於道塗之民口不可以防也苟明矣不少恕焉則法舉而徳不足以化今使者五人皆遴選在位於以見聖上振整之初政登斯堂也則相與講習見扵施設不薾以避不苛以求陽喣隂肅吏民率服胥保恵以承於上其治豈不偉哉夫志同議同任事同七郡之民孰不鼓舞以嚌詠太平之盛桷舊職太史慕前賢壁記警戒之實因以謏聞而為之辭明逺堂記澄清堂成紀興繕之本末矣叅政馬公奉聖天子明詔廵行江浙復至婺女見其燕居之堂舊曰迎華觀者而更其名曰明逺取其切於觀風之道副使馬公經歴祖君冕復求記於余於是屬筆為之辭曰今夫七郡之黜劾悉萃於澄清吏抱其牘鴈鶩以進卒不敢妄議其可否將求其生欲重其罰情皆不能以得也精思以究必退省焉以品節之事窘扵一庭而智足以見萬里古之善馭吏者不泥於法律不事扵朱墨故其革姦警饕無言而化成必有其本也在昔聖人明目達聰百僚在官定扵三載之考績夫豈有他哉維東浙負山聮海風俗不一强者雜諼詐柔者率罷軟撫摩之道各有攸處登斯堂也必攝齊肅容悉議其所宜行退於燕居申申夭夭燭照數計考七郡之幽隱如指諸掌名之曰明逺孰曰不宜今叅政公之按行非家至而户到也是則明逺之㫖講之熟矣則凡後之來者益得以省察俾勿壞泰定三年四月丁丑具官袁桷記新修司獄司記國朝肇置司獄司専以掌守囚禁職卑而勞猥為其官常憒憒不得志浮湛坐曹日數嵗月希善代謁吏部者每請託求免注繇是視為傳舍狴犴之不修桎梏之不整所至皆是憲部審决亦有所不暇及簡漏相仍其勢然也永嘉林君龍澤之來守是官也曰吾不可不自振考其成牘剔疑擿姦重者上憲府輕者白郡守多有所變易罪以不寃囚民宜之久之曰獄不可不繕營至大二年獄既燬支敝植仆僅存其制於是除地撤瓦築堂三楹曰平恕堂後燕室曰種徳左右翼軒環以吏廡迺築髙門迺闢圜土養疾有堂奉神有祠繚以瓦垣浚以甘井取足備具各中繩墨盖先之以已俸而官若民迺悉為之助不旬月而告成噫亦難矣昔人言不卑小官扵林君見之州縣疑獄郡輒以委林君揣情以求其生量事以正其罪羣吏抱案詣庭下無虚日是則林君之果能令官大也書曰典獄非訖于威惟訖于富若是則寧有私謁者乎余直集賢林君時為掾史處事立具今覩其政績顯白足可稱道庸紀嵗月是役也興於某年某月成扵某年某月泰定三年嵗在丙寅郡人具官袁桷記慈溪縣興造記泰定二年冬十一月保定孫公楫循行四明至於慈溪覩其縣治壯麗整宻咨嗟徘徊詢諸縣人邑長為誰咸曰此昔烏忠顯之所成也忠顯為縣首治董孝子祠以化俗次修孔子廟三皇祠曰儒以長民醫以養民又治社壇嚴其齋宿以謹水旱迺曰迎詔禮賔兹不可不䖍傳驛休息宜慎其寒燠興繕既畢始曰吾亦得以廣居於是矣語未終孫公曰是誠可紀載扵是命進士翁心傳為圖俾桷為之記聴事五楹髙其前三楹焉堂曰清清淳化中尹張叔達璽書之所褒因其名而築之者也挾以吏舍厨湢獄室縣門鼓樓前後有序縣治之後有小湖湖之中為洲花竹四列風蓮水柳暎翳繚繞為亭以庥其居有四曰思政佐治以察民隱也曰柳意勝覽以樂其神觀也圖既畢復言忠顯之政墾萊輯亡役不病扵民去其姦饕以為政本今其去十有三年思如一日而其繕營足以支永久扵是有驗噫今之為縣嘗患夫土豪之控持也其始也利以誘之終三年更徴需歛散一聴其命户稅更易拱手莫與之抗甚者為之囊槖可哀也已孫公之來兹邑也其亦有所感表去尹之美亦將以警夫來者余昔在太史觀循吏之實書以示後忠顯不求名而名自至孫公之為使者夫豈計目前以為黜陟哉始忠顯之滌篆也漫不可考謹視之實秭歸縣印言扵攸司而更正之其精覈率類是則凡今之為縣者廣使者之用心以成其政績桷雖老尚當記之泰定二年嵗在乙丑冬十有二月甲午郡人具官袁桷記定海縣學藏書記定海為縣南接蠻島汪洋數千里食息可至厥今號為重屯四方語言咿嚘侏離交衢旁午褒衣儒冠見者訾議考諸郡乗惟沈端憲一人嗣後接武猶班班可考泰定二年春某官始來為令迺曰縣固有學學必聚書冥行空言講習何補武城絃歌先聖是取進鄉小民首於文辭其必自聚書始迺與主簿龎君首捐俸資復命教諭汪宗江出學粟㑭儒職樊惟肖胡驥繇杭置經史若干卷又諭學之耆老曰經以窮理史以究成敗廣聞修辭惟子集是宜是亦不可缺復得若干卷將刻石列目以示永久謁記扵余念昔在殿廬見令尹之兄在廡下察其儀貌莊肅知非凡近後果為進士第一見令尹于國學儀端語温審其頡頏萃於一門今兹掌其邑尤以教學為已任抑嘗聞之聚書非難寶書為難校官之不職悉資以奉權貴甚者竊其故籍挾之以逃其㝡甚者漫漶散落一不挂眼三者之病比比皆是今刻於石將杜其漸後之來者寧得不自勉乎慶元路重修先聖廟記河南郭候視郡事之初首定役法郡民日困鹺事旬月按覈數嘗不登郭侯知其奸利迺言曰病在私商潜轉輸其所贏餘卒不入公籍民病不可藥也於是罷賈區分四廂俾總之鱐醢豉脯各趨其時視計口之授畧相等復竦然曰吾職司學校兹曷可少緩督大小學謹授業斥其偽冒以其餘粟大修孔子廟扵是進郡博士陸晉之學正録胡某毛某而言曰漢文翁立學歴唐宋幾二千年猶完緻君等知其故乎少間曰教在不墜其不廢在繕修迺曰若殿若儀門風雨剥圯在丹雘先聖崇嚴列祀肅雝在作繪定章服在禮象又曰講有堂書有樓吾亦曷敢後姑徐徐為之吾願㑭是邦服習仁義秀乂林立遣詣王朝將自兹始桷繇禁署歸里凡三年愛中和樂職之詩首為詩以咏贊侯名郁字文卿所至官以興學為本詩曰茫茫海甸聿仁義邦圭組積榮失其敦厖嵗亦云徂夸侈則降維侯之來靡瘼不知曰維泮宫風化攸基竦其具瞻象神之儀藻井繪櫨絢分承式降陟有嚴是奉是翼匪土木之工職教攸則瞻彼㦸門有飛戾止斯翬煌煌五采屬纚鏘鍠八音粲曰在耳嗟爾後生無媮以誕無逸豫伴奐遵我侯度以靖以獻奉璋有峩伊侯之願鄞縣學興造記延祐元年桷記鄞學之興造矣甫一紀職鄞學者括蒼林君傳以事狀來言昔之經度踰扵舊址廩入不給故其結構塗塈缺焉未周鄞之尹曰阮君周翰治縣未幾有恪殿謁首以興繕為急割俸以勵儒生於是歩履有甓繚繞有墉礱以宻石華以堊丹象設有嚴講席齋廬足以稱絃誦而從祀一百有五悉易以塑合儒先之宜祀者為祠以庥少間曰既完矣盍廣教以振士類立小學師二人而増弟子員凡五十人泰定三年二月朔告成復命桷記維鄞自王文公延杜先生以君師為端本故後之繼承經術淵懿蹇蹇大節見扵史傳者凡數公衣冠日隆微近功利而懐忠抱徳盛扵乾道淳熙之際遺言正學傳扵今猶未泯周翰之先公嘗分刺是邦厖眉褒衣諸老森立盖嘗極尊賢之禮矣今兹作新亦將有意夫斯道考問徳業吾猶以為有在也周翰名申之池陽人林君字以道非怠其職以苟度者扵是乎見魯公修宫形扵歌頌系以詩曰維鄞之峯煌煌金精其江縈紆挾城以行磅礴元化孕兹羣英其英伊何鬰彼瑚璉不戚施以求是則是憲發其精忠匪石可轉曰尹之來庭誥是遵顧瞻廟廷風墮雨昬土金丹漆有炳其文宫既完矣失教則缺循循子佩自今以始罔敢越以道氏林葺搆揭揭杜先之訓百世服膺有失其猷將夸誕是興凡升論堂戰兢以承清容居士集卷十八欽定四庫全書清容居士集卷十九元袁桷撰記馬元帥防倭記自昔待蠻夷之國必傳詔令以諭説之稍失撫馭則狙詐百出甚者嗜錙銖之甘傾接如素所交徃失上國體簸侮訕笑於兹有年矣今天子考獻令於疆域中書省奏曰蠻夷之不庭實守禦長吏餌利忘公弊不可日長維定海實慶元屬縣附海司鎮遏遵考舊蹟兹其為泊艤之所舶有定制輸其物以上于官勿入郡城勿止貿易則得以永逺虚聲生疑駱驛傳騎亡益也是宜選帥臣清白有譽望者制置其事上可其奏泰定二年冬十月倭人以舟至海口於是行省僉曰非馬公孰得當是選公乗驛至縣即宣諭上意始疑駭不肯承命反復申諭訖如教於是整官軍合四部以一號召列邏船以示備禦戢科調減騶從除征商之姦嚴巡警之實慮民之投憲為文以諭收其帆櫓器械而舶法卒不敢移减自便事既畢賈區市虚陳列分錯咿嚘争竒踏歌轉舞川后山君徳色效靈而公之淵思曲畫若防之制水不可得以殫述自始訖終凡一百三十有七日古之禦邊莫踰於諸葛武侯韋臯善繼史有述焉今公創始於前願後之賢帥規隨以成非惟鄉里之奠安則國家懐来將自兹始王㑹之篇桷願有繼焉兩浙轉運鹽使分司記國朝定煑海之賦倍於前代邦用是資其選官委任為不輕兩浙設總司於杭東西屬郡率置分司以董督四明號為東浙繁夥饑饉荐罹逋負益廣急之則疲薾愁嘆䵩色骨立見於耄稚故受其任者為最難桷官翰林時預議中書堂嘗白丞相乞減嵗額丞相頷其議于時大臣咸然其説卒以户部籍不能易是後憂國者迄減其直繼今善謀邦計之士亦將有以待也泰定元年冬分司燬三年張侯伯威莅是邦以官楮若干委于郡郡守郭侯曰兹役不可緩必擇善於營繕者是屬曰阮君申之縣庠之興尹能紹之曰尉周君一夔尉廨乆湮尉能起之兹其以是屬僉謀曰取於山里胥是刪鬻於市大賈以喜將視其材市於民堅完縝密是則不負於郭侯之教矣六月闡工九月告成聴事崇嚴夾舍拱揖門臺有叙百堵具列斧斤鼛鼓不徹于垣周君則曰尉雖不才囹圄之設非我職矧轉運府設是則益以病盍去諸復以楮之餘者歸于司官常患不得其人急奉於公怨讟滋興况復因之以竊其利周君則不然人皆曰作之登登周君是承去其榜笞民完以熈若是則任其職者絶呌囂息追逮其賦寧有不登于天府昔之使者遺愛掲於堅珉矣後之来者登斯堂也藹然仁政將屢書不絶桷老矣尚當見之泰定四年二月庚寅具官袁桷記鄞縣小溪巡檢司記城南門折行四十五里曰小溪鎮宋元豐置焉唐曰光溪鎮以監酒稅煙火得名治平元年罷酒稅以便民獨掌煙火凡言煙火職民訟水火盜賊其地三境交接大江貫其中羣溪畢㑹水清泠如明鏡巖巒擁秀千篙競發碧瓦朱甍翬聳鱗比望之如神仙居宋紹興中北客多樂居之魏文節公結圃墅與客大梁張武子為詩友其它如安儀同孫王尚書相繼卜築而為是鎮者于于養恬承接履舄争鬬絶庭下桷幼嵗舟至溪上猶能記髣髴也皇朝一海寓立巡檢司于是地而舊鎮久廢故家亦湮沒毁散仕者率苟循嵗月處隘踵陋不復以崇嚴為事泰定元年白君察罕不花莅是職與父老言曰司徼之所不在荒寂則在獷惡吾獨愛是溪有先賢之遺俗薪者販者前歌後休絶枹鼓之警罷千棷之邏吾心固勤焉亦是土循謹之素願廣聴事以表兹溪咸曰然於是木踵以至甓效以来三年夏闡工九月告成逺迎龍湫近接虹梁舉觴以落而懐牒巧訟者各屏息以避有合夫道徳齊禮之義迺相與歌曰作之烝烝罔聞其聲養其髙明心清以寧不卑其官惟後来是承吳江重建長橋記震澤東受羣川汪洋巨浸至吳江尤廣衍地為南北衝千帆競發駛風怒濤舂擊噴薄一失便利莫能制唐刺史王仲舒築石堤以順牽挽宋慶厯八年邑宰李問始造長橋繇是各捨舟以途来徃若織水齧木腐嵗一治葺益為民病泰定元年冬州判官張君顯祖始莅事曰兹實首政稽工程財莫知攸出當謀於民民有調役維浮屠善計度長衢廣殿瞬息以具吾語諸其有獲廣濟僧崇敬寔來敬言伐木為梁弗克支逺易以石其迄有濟㕘知政事馬思忽公以督運至吳迺采其議周詢以籌首捐貲以勸敬復曰作事謀始不可不慎有善士姚缺嘉禾人能任大工役必屈以委繪圖相攸經畫畢具咸服姚議於是㕘政諉郡守郭侯鵬翼役未興丞相荅剌罕公朝京師迴道繇吳江郡白橋議丞相曰吾必首倡即捐萬緍而府縣士民相胥以勸平章髙公貫公繇湖廣江西来自江浙力囑張君俾終是工杜侯貞来守是土亦曰張之言然閏正月建橋明年二月橋成長一千三百尺有竒揵以巨石下逹層淵積石既髙環若半月為梁六十有一釃其剽悍廣中三梁為丈三百以通巨舟層欄狻猊危柱贔屭甃以文甓過者如席舊有亭名垂虹周遭嵳峩因名以増榮觀焉是役也敬師鳩徒輸財實三之二贏財十萬復以為寳帶橋助姚摠其綱張君首議出於仁政事有脗合而是州興役見知於丞相誠出大幸厥今運舟相聨驛使旁午咸曰丞相謀國經逺張君美績繇是得書將永逺無極繫之以詩曰茫茫禹甸昔鄰於魚維四載功兹為具區有失其防羣嗸喁喁曰維李侯構兹虹梁經始孔艱任負揚揚嵗老水泐臨履若驚張君莅官飭我初政曰兹橋匪修涉者益病召彼耆老貨布莫競相國之来六轡徐徐詢事審宜以究以圖割其緍錢俾民樂輸橋既成矣虹飛于江千柱承宇羣流迴矼儼兮層城爛其軒忩張君籌思相國成之彼清浄士式克承之千嵗永賴我庸以銘之陸氏捨田記吳越舊俗敬事鬼神後千餘年争崇尚浮屠老子學棟甍徧郡縣宋帝南渡公卿大臣多出兩浙而制令入政府得建宫院崇祖禰驅石輦木空巖閴寂之地髙下晃曜財日益耗而弊莫可救矣故稍自給足者亦承風效施跬步瞬目日不勝其繁吁可禁哉宋社亡故家日降辱過昔所崇建揮手若不相識甚者翦夷其墓田豚蹄之祭不通於焄蒿而卒未有能懲戒夫厲階於初其習聞者不變故雖善説巧譬終莫能以改也夫錫山陸元俊以其母夫人楊氏捨田之狀且告曰陸故吳望族大父凱恬静絶企騖觀老子書若有得所與交多聞人是生先府君愈孝謹自治讀司馬公書不釋手人勸之仕則曰吾承事於家者未至安能弊内以益外哉未幾大父母相繼卒吾府君拮据治窀穸不幸以毁卒又不幸弟鐵孫卒於是吾母曰為物為變魂之屈而不能伸者也氣化則魂升求於家祭記禮者盡之矣求於窈㝠則莫若清浄焉是依汝父若弟其往也無悔而吾惓惓者情有盡而哀終身不可以有盡也今將割田若干歸于城北之洞虚觀以廣其時思吾知守禮者矜其情而曲許之焉事不永久則吾之志墮當求能文詞者為之傳其文傳田不復可易矣田不可易則汝父弟與吾志俱不朽矣其田若是俾余信其言者吾友陽榖李君希哲也希哲於陸母為姻聨善屬文遜於予者求徵以示公也儆其子孫而余前言惓惓復將以儆夫觀中之徒知以輿言為可畏也袁桷記野月觀記養生説有二焉北祖全真其學首以耐勞苦力耕作故凡居處服食非其所自為不敢享蓬垢疏糲絶憂患慕羡人所不堪者能安之調伏攝持將以復其性死生夀夭泊然無繫念駸駸乎竺乾氏之學矣東南師魏伯陽其傳以不死為宗本於黄帝韜精鍊形御六氣以游夫萬物之表其夀命益長者謂之仙而所傳確有􅉽繫先儒深有取焉夫人之所受為命其夭閼戕賊必不能盡其年過於厚者非自裕也盡性知天踐形以全其正斯二者俱得之矣天台多羽人居遺跡勝所相望不絶宋世有大梁趙公宗卿某佐縣黄巖樂而家焉踰二百年子孫益繁衍詩書孝友簪笏不絶於家乗四世孫與慶虚中父遯世樂道從北方之學者而慕之志彊氣堅脅不至席今踰十年矣遂築室委羽山之西北八牖四房兩翼三楹靚深以明于以坐忘不知寒暑之代謝順其天年以入於自然者也而名之曰野月焉月猶身也則而象之者得無佀乎吾按其圖東西仙源南企大有北顧商丘誠仙人棲息之所境清則神湛嘗聞張平叔産是州王子晉居桐栢山二人皆以不死傳信盡性可以至命虚中得至静之説願取平叔書讀之將見王子而肅之矣道無異同不偏於一者則盡善桷也行南歸願踵門請其説尚當賦之至治元年九月四明袁桷記冲庵記御史臺都事開封賈君華甫以冲名其居謂袁桷曰為我敷繹而記之余於易先後天之説精思以求而嘗得其説焉冲漠無迹易之初也二儀定位其氣果有分哉是氣也隂陽得之則為日月星辰為河漢為山嶽凝而瑞於世為甘露為慶雲形而在下四靈連理之應係焉其於人也受中以生則與天地之未判同也曰生矣氣亦果有分哉曰寂然者初之未始離者也感以應不動乎内者也心君清寧行乎六氣而不沴處乎寒暑而無背則中和者内外之樞紐也昔之聖人言夫上者為道下者為器變通事業允屬夫人若是則全其大和以養吾生休休焉復奚遜焉存誠本乾持敬法坤聖人惓惓致辭焉隂陽之用備矣氣生於無形成於有形聚散反復晝夜不置朂哉勉夫將不能以病矣華甫官京師踰二十年踐歴清劇其於事物也充然若迎刃與人交謙以善防臧否之色絶顔面而損益髙下各有攸當是其養之有素外不能動者矣其名曰冲不幾佀夫華甫竦然曰唯遂為之記順堂記大徳八年余與天台陳君剛中為翰林屬剛中素簡曠不耐酬接獨其族子萬里禆益俛仰客至能使盡歡禮洽而氣和真翩翩良子弟也家居于台之三台山之下凡十有一世宋世第科目聲黌序代有其人焉古之言令族必曰荀陳曰王謝非貴華腴也薫徳以為善積小以為髙絶於聲音笑貌篤躬以行者斯近矣萬里三游京師未嘗不與之言齊家修身察其所養益充厚調官以歸謂余曰遴築堂以奉吾母兄弟三人而仲弟居于外今将挽之以歸抑反身而思之我不能和恊以至於是邪則又曰遴其母以妻孥之私若是邪昔之歌常棣之詩情義之曲盡焉者也而夫子蔽之曰順願則順焉其殆庶幾矣桷曰天地以順動不順為逆焉孛于辰為震為孽春秋紀之順天地之經義者孝之本矣陳仲子喻於槁壤世人行事不若仲子則升斯堂油然以興不逺而復何憂焉化由身始盖何病焉為之歌曰彼山㠝岏孰啓源兮世十有一嗣宗蕃兮木之詵詵本可分兮謂本可分兮枝曷以存季也孔艱憂心薫兮伯也鬱陶求于原兮歸来歸来兮我母永歡兮積慶堂記徃嵗朝廷廣錫類之澤於中外繇是執政大臣得追榮其三世今集賢大學士平章大慈公時為翰林承㫖捧制書告于厥曽暨祖考惕然以思曰嗣子守先緒敬篤弗敢替陟降帝廷嘉惠日接靡有間兹惟前人寵綏功我康懿公潛光葆真植徳在拱把至安惠公封樹益䖍美隂磅礴蓄久而未振逮先考文敏公則亦旁達秀發聞譽光灼矣然祿弗稱其報今膺是穹顯居室完好弗先烈是思曷稱永久遂扁其堂曰積慶有取於坤之文言如臨如存知所以近天子之光者實有攸自桷也獲殿次集賢得升公之堂而俾有言焉古之能孝者食息跬步不忘其本而詩人之推原則亦曰孝孫有慶是皆其先祖之徂賚夫源深則流長恃而不浚將壅焉以竭譬之善賈貨殖之積所從来久矣因其饒而日取之用殆有盡今平章公朝夕承顧問委心微言觸類以感悟廣文以通導善經達權以天下休戚為已任所陳於上者外雖不能知覩命名之意若堂焉以構播焉以穫實崇迺先公之徳以垂裕於萬子孫毋怠則凡登斯堂者亦将倣以尊祖河潤九里夫豈徒言乎哉樂全齋記真定李君允希微甫故儒家幼慕冲曠閲其游記曰登恒山聆天雞觀出日焉遵太行上王屋山嵩華少室視昔時好竒之士遺蹟鑱刻悲愉怪愕歴歴在目而徼福頌語何侈愚也南踰江淮地險不足恃矣震澤禹功能知尊之錢塘故王都囂溽靡習未有改遂窺禹穴望蓬萊乆之歴天台赤城知孫興公司馬承禎肥遯益有㫖武夷九曲其仙者誠然與道統之傳有自矣過九江審瀦匯之本匡山之截乎長江者非偶然也衡山為南嶽灊山望祭抑深疑之氣舒而神完則曰吾於鍾山其止乎遂日廣松竹桃杏鼎壺几硯之屬于以娱其客且益以自佚鍾山故衣冠之僑寓也繇晉以南名士居焉今將居是丘以樂之為何如益展其地曰山房堂曰静修齋曰樂全軒曰松風而命其樂全者俾余記余嘗悲好游之士名足以成矣文足以傳矣而不能全其身葢其沉恣豢養恃才以肆危機駭浪蹈之而莫知遇事兀解其悔恨悼惜若無所容其生非若夫子之宋之陳之衛之不遇盖徳以輔名道以喻志捨是則非以自豫也希微生盛明之世居于中州以仕焉若水達于川孰能禦遏今而曰卜居于南土豈託而逃者與余居京師見持政柄者皆善思索位置遇大利害輙執咎不能解而南士以疏逺得免希微之居南夫豈遂其静退與抑亦耳目之所接有感而然與遂為之辭曰顒顒鍾山霸基承兮英光盪摩隱徳貞兮泉纚纚兮玉鈴松摇摇兮翠旌維絜士之定居兮山神憺兮以受令合正命兮萬化成神無方兮養千齡竹鳳石屏記繇開平西南行七百里稍折西北其地有泉如懸簾五色貫射在昔世祖皇帝名之曰三不刺以其國語志之也地曠衍均成沙居民鮮少地所宜惟𤓰悉發南戍卒墾樹之𤓰絶甘美按燉煌多種𤓰沙土疏利根蔓善達分水無沮洳昔常以江漢人廣其田號㑹稽其事政相佀至治元年今天子巡北邊望祭陵寢昭文館學士史公以屬車從旄旂交章鼓柝傳警頓次之暇則訽其遺俗千里一色林光野燒絶不接目睫怪石犬牙層獻迭見遂得一屏若水玉澄澈雲根屹成巖崿雕鏤其上有叢竹森列旁出一木綠葉宻成前隱采鳳迴咮導前以飛五采紛敷不假於琢削而生意屈曲造物有以畀之者因名之曰竹梧来鳯為圖以紀之余嘗聞地之宜於五榖者男女必繁夥充斥盡力以食其土若夫絶漠廣域其寳玉光怪不可名狀而其人類寡鮮得非天地之氣其凝結者為星辰為河嶽其聖其賢者為君師以長牧之至於不能以自見者則萃其精明剛絜之質以伏于荒野一得所遭而其緹襲繅薦又甚於他好豈不幸哉方今天子寳賢飭躬以孚佑于下民兹石之瑞和氣之感與抑亦開太平之應以告成于天與史公徃在至元間從大帝出征嘗得二石中空如塤出虚成奏其一具北斗形余嘗聞史公好養生説玉石吾寳視於内者何如也至治三年三月袁桷記曰生堂記天台道士項君子虛通岐黄書其治病不擇富貧輙肯徒步以往處藥候脉有源委盖所居鄉有老醫能理傷寒受其説傷寒首經絡未有不通是而能為醫者治所居室名之以曰生且求記於余噫今之醫未嘗不以生為心也技薄而學淺貿貿然以游人之門恣意剖决遂使夫人之夀夭不得以盡其正命十盖有五六者焉薄人之危剛燥䟽補重其疾以利厚資則凡所謂生者不存於其心矣天地之於品物寒暑代謝日用而不能以知為之君師以正其綱常為之醫以療其疾病是醫之道其賛化育者厥功茂著仁為人心操存動止於醫殆得其全矣余嘗聞道家者言陶𢎞景増本草飛走蟲魚類例有殺生心此盖誘俗鄙俚之論犧牲養人千萬世不能以易藝不如古人挾一囊以自行巢氏之説畢具於所挾矯誣滋甚矧有若予前所言者其為醫之禍最速矣子虚氣正而色剛立志不苟視財帛如糞土耐習勞苦師全真之説養心若保赤子其未通者必有以日廣活人愈多仰俯不怍斯其為徳也大矣庸俟以紀至治三年九月袁桷記信州貴溪縣楊林橋記貴溪環山為縣大溪貫其中支流為楊林秋夏水至奔潰莫能禦嵗病渉焉當淳熙年有僧允懐任其事懐陸出也象山文安公勉之曰徒杠輿梁觀政之本是則昔時盛平轉輸供調之勞守令有所不暇及矣考於成周除成梁道於先王之財賄不用役民之法其無迺因其隙而用之故不煩於官者良有以也二千年来著律令者長吏率遵守文具飾傳舍除驛道為急使者所弗至不復計省民所必趨而顓受其害於是乎有倡義者焉懼其嗇於財也則復有利益之説焉噫民之所利上所當興顧其力有不能事與勢實有違者夫豈惟今也哉龍虎山為老子祖宫其民食其業以遊於襄陜廣蜀嵗幾萬人而江淮復不與道繇楊林咸惴惴焉求於上則有未及謀於私則曰亦盍思以為永久於是山之道士曰傅某章某首出資以倡之至兹山者董某曰事宜是鄉之耆老某亦曰吾等詎坐視遂伐木聚石聳為飛梁危湍駛流帖俯於履轍之下訖成於至治元年十有一月明年董君襲常来京師命余以記余讀老子之書曰修之鄉徳迺長又曰儉故能廣刻志繕行則其自貶損者夫豈厚生以自養民困於徭役牧之者不能以告于上因令所著而强之將轉散而他往清浄之學不有衛翊其何以為教三君子之志深且逺永詔後之来楊林之橋其何有廢焉小領水亭記薛君𤣥卿自京師歸上清二年矣習静修德日治其文詞刋落雕飾以求進于道暇日游小領領分為兩側足以上過者岌嶪然龍虎山為治所其教行南北故凡驛騎之旁午商賈之輻輳皆本於龍虎而道必繇於小領𤣥卿坐其旁見行者之至是皆假以憇息良憫其勞貴賤固一等也遂築館于領之西曰崇賢作亭于領之東曰振衣命道人日具茗水承接以休其心昔之善喻者曰夸父逐日而不返今世汲汲然道途者皆夸父也故其捫歴河漢而不慴困阨巒瘴而不懼方其去鄉里辭妻子漠然無惘惘之色其羇窮逆旅饘粥藥餌之不給而猶曰我有命焉奚以憂至於久勞而思逸若登兹領然者未嘗不心一而念同當是時使幡然有得吾知其絶跡於是途必矣𤣥卿曰領之東古象山陸文安公講道之地其西為臺山突兀秀峙南為雲林塵湖聖井琵琶諸峯歴歴可數北則潛山之井邑稠宻髙下雞犬桑柘望之如神仙居吾知夫仕焉而已登兹領也必曰吾不復為人間事矣其善蓄而給足者則曰吾行其少息矣王公貴臣捧香而来于山亦知老子不辱莫先于善退徃来鮮少將見夫青牛白鹿之士倚古松而聴流水登斯亭也願為之執鞭以俟焉斯可矣遂掇其語而為之文泰定元年正月壬寅清容居士袁桷記友恭堂記余幼居鄉合郡里巷考門閎之髙者十居其六七焉先公撫余首而言曰自圭組之日盛而兄弟之虧有不可勝言者今可稱道惟史忠獻王與汝曽外祖忠宣公白首若一次則曰余忠恵其季尚書貧無副衣出入互易貴且死也約同葬尚書之子寺丞不替是道以京秩讓其弟所後子二百年来登顯仕無慮數十姓中外宦簿俱徧歴獨號能盡兄弟道為難葢其貴盛之極勢軋於相等稍避嫌以退則若無所容其身以為吾才不能以見用者兄弟使然也不再傳而其祖父之所蓄棟積稛聚各私利其美好黨署賔客强凌很勝嵗時叙昭穆占對簡略觴豆不設强成禮即退言至是良可哀也又曰吾之事賔州分雖嫡長讓其爵於兄子凡世所慕好吾一不以問怡色拱立若幼子弟積誠以感遂悔焉而益以親汝以孤子承吾宗何憂焉若有子孫衆多能率我以行則知吾門殆未父也受其言于今四十年余官集賢日近醫藥命次子瑾来侍久之復還翰林屢謁告以請不得命長子瓘撤舊室之蠧腐搆新堂以俟歸書屢至將以盡侍養之道余曰父子異宫兄弟同處古之制也幸有尚書公之堂在可以逸老則斯堂若兄弟居之誠宜遂名曰友恭實取夫先公之遺訓焉夫為公侯之後得為幸矣恣其私心以泯夫天倫氓𨽻之所不忍因詩書而成衣冠不幸不勝衣冠而卒泯其詩書則昔之髙門今不能一二者其病首在是越公之書在山中而余再世之積實倍焉二子能讀而守之又將見吾諸孫之有成而翁授首之泰定元年月日清容居士記種徳堂記蔡侯茂先以其先郡侯之狀求銘摭其行事古君子也少間謁余為種徳堂記其名實侯崇祖之本意昭掲于户冊者集賢大學士郭公安道所篆而歌詠其事以光顯悉余同院之故人也若是則余何敢辭郡侯之樹徳葢不止於鋕銘之所紀而因事以詠則宜有取於行實昔人有言隂徳猶耳鳴想其平居篤厚廣施於鄉惻然以求其急難御於家也敏其力者貰之不足者周之懼飭躬之未能蚤夜以思則曰所求合乎古未能也蘄正乎有道之士則曰吾所為能盡善邪燭計利害得無慊邪施於族者洽於肌髓與訓於家者蹈履足以日化與朝培而夕修望嵗焉不求報豐養之以年祝之於子期之於孫磅礴浸漬斯其為種徳之本㫖也茂先今為良二千石其季為太守鸞翥鵠峙羽儀清朝盡忠補過以先其祖父吾知其曽雲少者謹于里門長者服于王庭恂恂孝慎日補其未備考其興隆與徳良未艾也書曰率乃祖考之攸行又曰汝克昭乃顯祖願相與勉桷也亦從是得以有益焉泰定元年冬十月甲子四明袁桷記春暉堂記翰林院都事韓君友謙居京師有年矣徃嵗築堂以奉其母夫人未幾下世今復名其堂曰春暉示不忘初也命余記其事焉孟子生於戰國距舜之時幾二千餘嵗矣而其言終身之慕者則必曰惟舜一人焉耳矣昔日之聖人懼其不能皆然也為之令以教之為之表以勸之而作史者復取其卓異者以彰明之教益詳而行益微吁可嘆也矣孝根於心人之所同繇古而論宜不若是薄然而缺焉所從来久立其名者良有以也杯圈手澤存而不察非孝之實吾知夫韓君之升斯堂也鷄鳴則思其進盥之儀饋食以列則思其嗜好之若初將惕然而奉之日入而息陳其枕簟闇乎其有聞也故其居於家也望之而在前思之而若著其處於鄉也身無虧焉言無擇焉鄉之老者曰韓氏之澤有在矣其先人之教未忘也立於班朝無有父母兢兢若臨于其側而人始曰若是者其殆幾於永慕矣吾聞友謙佐治大尹執禮自持不為苛刻矯亢人安其業而化俗敦教饑渇之於飲食義方之訓有自来矣昔孟氏之子於其羇愁困窮之際始矢於言情之感也友謙仕不離鄉遭世隆平卒取其言感之正也桷也官于朝七稔矣升春暉之堂得無愧乎賀蘭堂記靈武李公居錢塘三十年築其第之堂而名曰賀蘭志不忘本也㑹桷自京師還迺命誌之桷嘗紬書于太史按賀蘭山在靈武保静縣西草木青白望之如駁馬然者土音語駁為賀蘭而昔之居是山者復因以為姓在唐天寳時靈武號要衝後卒能以一旅之衆興復舊業至李王有其地天下易代凡九姓獨靈武以十餘州相傳者一百餘年其民沉鷙尚勇土壤沃曠氈酪駝馬給足無凶歉國狹而慮密各以金革相保衛患難垂乏絶不少變精急専一迄能奉其君長葢傳愈久則俗愈定太祖皇帝經略西土為武功首靈夏舊地始臣服委質然猶强節好義䇿殊勲受上賞者史不絶書李公之仕於江南也常兢兢然恵綏不忍侮其鰥寡而其於浙東也事若有素今所領七郡四為其守矣風俗媺惡皆示諸掌而惓惓思於賀蘭者亦將有以振夫萎薾之習使吳越之土如吾賀蘭者斯可矣古者氏族之别必錫于其土雖逺處他邑其不紊殽者因是以有考賀蘭之山承平日滋昔時之草木意其豐茸嘉美當盛于公去鄉里之日而斯堂之封植五采交錯宻然成文者心猶以為賀蘭也食必祭先耕則祭嗇斯湏不敢遺其初種德崇報有開必先以侣以續殆将見之公其以余言為徴也沉香石記唐虞之時曷有玩其耳目哉余讀貢書至青州則有怪石者焉今文登諸島洲往往掇拾珍怪置几席間物易得而可喜則雖聖人是誠有所不廢矣浙東括蒼山松化為石其文理真如松或曰踰千年迺爾人為至靈其化之不可測也為聖焉為神焉受成而不變者木與石至積之嵗月則貫射於日星磅礴於霜露光怪駭愕充然黝然為珀為玉有不可悉名者矣嘉榖為莠穡夫憂之鷹之為鳩橘之為枳其遷之若是則亦美惡在於其中焉京城田舜舉為大醫院屬治其燕居明絜靚幽得一石望之如水沉樛結宛轉巖崿刻削薦以文石過者咸以為海南土産也佀是而非其為怪石也奚以疑故變至於道君子之所勉子盍慎諸樂善堂記雲間繇魏晉以降多文人磅礴秀絜故其言辭幽麗瑰雅喻物形狀無留遁常驚動海宇是其人誠精於言者也或曰其地介海挾江波濤魚龍善噴薄變化人居其中者咸佀之宋世文儒益光顯冠帶相望數十年来習始變舟楫極蠻島竒貨善物徃徃充上國力事生産廣田侈居擬於王侯而仕者亦争願食於其土夫事久則變變則迭為乗除因其見聞上之人寧有不遏其萌芽定其準式者與惟烏溪趙質夫之居於鄉也悃愊以無營恂恂里閭足不踐公府汰其侈華曰安於平素其鄉人之不善者避之嘗曰積豪以希富富不能永也積書以教子吾其盡心焉勸之仕不能動苟利於人者誠求之泉石以為腴徳充以完嗒然忘世其樂道肥遯焉者歟未幾其子庭芝登進士第人始言曰是殆將復其初矣昔故多文物不幸為大家以財雄是其地氣厚積之使然也趙君不屑意焉於是以儒名抑進之則必以文顯文與行相須以成余嘗上庭芝之文於殿廷繇是以求之探源泝流苟不止則其學益粹聲聞之逺無疑矣庭芝詣門曰嚴君以樂善名堂願有記退而詢諸其徃來遂以行事為之記質夫名宗文大父以積善聞于鄉樂善之義祖是亦樂齋記永嘉陳子敬客京師居城南東隅車輪馬蹄之聲奔激若雷雹大雨泥淖入數尺賈區豕圈㕘錯啾唧土俗雜南北不可辨入子敬門槐隂植幢葢寒苔斑菊側布踈密清泉滿洗白雲在户坐者不欲去去者復再至君蒼髯抵掌一榻為席顧余而言曰此亦樂齋也髙王父宣撫公受薦史太師太師若髙外大父舊家遺徳泯然罹變更漆園吏之意為我終始而言之夸者以愧感者以喟不幾於道乎桷幼聞長老言君里宅雄甲勝據重樓疏軒旁薄倒景飛鳥怖而海雲伏也君方少年挾䇿以自劬漠然其中若不能一朝處稍壯入太學喜名而益竒䈴葭芙蕖之蕭爽招提廜㢝之空絶境寂意冷疾筆落紙自得於杳靄千頃之外望者知非綺紈世子弟而視窶人子復不相佀何其盛也今一廢不得復廢復坐刻畫居京師十年無知已力慷慨引助視重垢積戾頑然持牒争洗濯不三宿告去君意氣當復摧抑闒茸而怡然以理勝豈榮觀之㫖託焉以自逃者與屢空晏如榮辱不足以累豆羮見色情􅇶于内也使向時沉溺自恣卒遇不遂意冝朝夕弗給又安得為十年計天乎其成之者至矣噫使果止是耶則亦無以自樂夫强之而不復必巽徳以處太夫人春秋髙不能自明寧勿歸也少貶以求樂於是乎有在陳子勉乎哉慎交而寡言正車于塗其終能有以直矣清容居士集卷十九欽定四庫全書清容居士集卷二十元袁桷撰記邵庵記雍虞伯生界其居之偏為庵廬焉温凊之隟則怡怡然飽食以歌宴休于中其廬温密檏質具粹且深中而虚之若璧而環若鑑而明樞圜而扉方闔闢以動止其温燥也禓以舒其清焉其凄厲也隩以休其和焉左顧右矚神止氣寂晝握其動夜根其静不丐飾于外據萬物之㑹將以極其榮觀者焉廬不廣尋丈旁設易圖圖除其卦五十有六瞪而視之首擊而尾應迎而存之風至而水涌審聲遺形益原其情忽然控浮㳺以上征則摶制控伏囿于其内而不能以自恣或曰非輕世逺舉者不得以専是伯生曰維昔邵先遭時明康玩芳以嬉不激不隨順其隆汙儒者之準也吾將尊其廬曰邵庵何如桷曰可乎哉言無郵乎夫敦厚而靈明者君之先也峻簡而絜精者君之光也自君之出名日以張莫窮其鄉黽黽然聲音笑貌之學詎昔之志也勉之哉兹廬之制易而不卑簡而不倚其取諸物非鑠我者也由質以成禮無踰矣迺觴以祝之介其休明曰烟烟煴煴維道之門悃悃欵欵維徳之本美哉廬乎足以為永居乎袁桷記古劒記吳成季得劒一于故吳之區窮首以度合周尺二十有一寸下縮而圓人盡其握彘倍於臘東西半焉鐔長五寸有竒口懸三空古飾以琫具者金氣消竭玉質湛湛然望其鋒肅而不劌黝乎以温如鑑之示明揣其章若氷之在防養其寒光泊焉不知所凝日出而觀則陸離以陳為丹為碧起滅於膚理風雨以休之隱隱歴歴欲泄而强抑客曰此何祥也成李曰粤古至人絶世遁逃有不得已則託劒以象五金之精竊隂據陽繇神以成非劒之能也維吾道祖以劒印授受為漢世遺物傳信可根據劒歸宣和今得于吳吳為故都庸詎知非昔之所寳且夫化而沉於淵物之靈也返之於山物之完也或曰以神不以形又曰以徳不以物形與物其果有變乎袁桷記昭真山水記廣信昭真山晉王仙居山祖閩武夷宗為天冠巖翼行數十里左右扈挾悉至觀迺伏北俯貴溪又正北當縣居中匯泉曰寒月泉與藥池丹井通遵井南鱗瓦削列成廡有泉懸溜廡下拾級以升曰金沙益南至于昇仙臺臺石天設空明無依傳言王仙化是又南石室坐可二十席下視屋邑蟻髮旋縷凡登是山者不盡適不返故冠以逍遥焉上巘為靈湫逍遥西多故賢居三山品列徐紹宗隱益下北麓陸文安公書堂奠焉循西有吳緬石潛谷巖小隱巖皆以處士著吳緬石形成五嶽復曰五面迤東為峰二曰老人石人東屈而下得名六學堂以虛名仙足月巖以形名鬼谷以真隱名鬼谷東石壁中穴環好風出湧泉曰風洞輔東益髙有石箕瓢器物成琢潭深不測以磜潭名又東極下水鉤盤巖壁削立旌陽許令刺蛟于是唐名曰馨香觀道士祝丹陽繪圖俾志且言其山清刻深古多異石名木嵗不識伏日泉品與惠山同自唐李商隱劉大用王荆公毛澤民而下著詠可傳信夫山南為陽主陽賔隂鍾其所極鬱之而不化可慕可愕不一以足然神獨嗇之使冲漠者専其静居絜絜然好游之士少紓其耳目而卒不畀何也世言名山多方外居益以昭真為信丙午二月袁桷記東山精舍記自民迫於生而儒日益病清宗華門淪圮乗接閴然絶環珮聲東装韝衣方傴伏却立而甚者貿貿途路間益困苦不復振或以謂升降迭運之理使然耳噫首是説者其未知所飬與予客京師豫章周儀之之甥冷有泰後先辱共游問其年則宜若與昔不相接近而甚頌其文子始異之儀之曰不然冷為分寧故族官簿相接所居曰東山山横重屏方列若刻其尊正叔治屋一區負山為居治堂翼然䟽沼縈然幽林絜石竒梧秀竹之森爽以繚以屬前拱而導則黄龍幕阜蜿蜒效焉平臯沃畛鱗集備焉朝光夕霏户牖進而几席納也正叔閉門幾三十年服居士衣設丈席講論終日危坐清思無纖芥糠粃時為詩詞凌厲頓伏索索裂金石舉觴雅歌耋稚以叙酬酢揖讓猶昔時衣冠家氣度而卒相邂㑹恍然知為非人間世也嘗聞正舉童子時意功業可拾取今迺摧落刋實益自斂避彬彬文質久而盖彌章焉夫不急於外者宜有裕於後大江以西士風炳如於是乎則故予首書其慨然者以厲吾黨知正叔為可徵四明袁桷記采芝亭記太行首於三危伏於河折北而尊為恒山支巒複岡畢赴於燕秩秩然復纚屬以東數十百里入於海上土人以其西來號曰西山或曰駿極于是山急而堅凝地多空寒不可以兆域又曰是為都城之衝自北而南太和薫然捨是奚所適於是工部尚書郝公景文惕然維思實震且陰迺相其大塋先君子之藏祔陿而善崩始遷而謀焉大徳甲辰得卜於某山卜者曰是山之形翼容而咮鳴日中而升戴坎以寧以華以承及既塟明年守冡以芝告公弗信展于墓下登坡而望則敷者荑者􅂱然于山效獻以萬歸以示其客袁桷噫是果為芝邪今舉世之言瑞者必首於芝芝不常有於世故窮夸闡珍得一二焉輒指以自瑞使誠瑞邪寸畛尺壟其融液變化不若是之固而甚者竭四海之類夫芝者聚焉以觀不亦陋乎夫土和則芝生始公之心懼親之不寧故擇其温密以永其幽菌蠢而擢靈土之和也盈数為萬非昔之固也不侈以求異徳之質也維山之陽彌鞏彌剛子孫之祥也孝感而文著於瑞乎何有梅亭記廣信據江浙閩越之衝萬山交牙四顧羅劒㦸其氣蜿蜒磅礴為丹碧玉石長溪貫其中凝膏溢藍愈積愈完山水之秀甲諸郡故其俗多刻厲自奮矜謹節義言文學道徳者為儒宗治政事者為吏師建炎初中原縉紳家多居是州其舊聞遺語尊守傳信歴歴可數皆數百年文獻源委非如野人窶子掇拾目近為利禄地方是時人物之勝足以甲山水而浮屠老氏之跡實不與焉弋陽為縣山益深水益清車輪馬足之聲不入于其境寒泉蒼巖百里一色山之陽有陳隱君居焉隱君守儒以自信閉門授書朝夕盥饋合其孫曾嬪婦男女將百人年九十四以終有子曰徳父教授帶湖十年法當得致仕官以鄉博士歸于家迺築室旁近之華山為雲居雲居之西為梅亭曰香月於是其子敏學志仲官京師俾予記之且言曰自吾大父恂恂之於是居也詩書以持稼穡以時門無忿色而少長以叙吾不知其化之及於里也自吾父觀之今七十餘矣誦聲滿户而樽斚在牖氣完而色康其行舒舒其語徐徐視吾祖之孫曽亦相邇也噫榮何以過是袁桷曰天地之理嗇者豐之始周流于六虚其暗也實明其闢也實闔昔之澹然而無營者徳之基也養之于其身而施之于其後充以引之吾知其孝謹於家者日益廣爵祿於朝者日益侈視斯亭之手植豐融婆娑連理而並實隂陽之生物其不出於是明矣詩曰髙山仰止景行行止亦因以勉夫志仲焉西泉記髙君舜臣通敏才智之士也治其齋心之居表其顔曰西泉為予言曰太行之山合于恒山隱伏聨亘北東以入于海肅慎朝鮮屹然表于其地者皆支絡也泉生於西歸於東隂陽之常性也周人有言曰肅慎燕亳吾北土也昔之疆理吾於是乎考則凡北紀之山水繇西徂東所繇來審矣為我記之舜臣於金為大姓官簿歴歴可紀居京師數世遡其泉源知其晝夜之不止必達于其里禮不忘其本其髙君之謂與予官京師踰十餘年望所謂西山者蒼㧞翠峭實大行之苗裔水流無窮演迤洋溢導之為漕渠止之為陂塘資國用以為民食者泉之利也其次達官貴人因之以丘壟濬其冽清挹其回環䕃藉蕃廡將利其子孫以求全乎兹山之下不知其幾至於淡泊空曠之士則又抉尋幽深渟膏匯甘使夫絶塵稅駕者止焉以嗟啜焉以留無有窮已噫西泉之效誠博矣哉在易之象曰山下出泉蒙其險釋矣謹其所之君子之用也髙君致用以推本厥㫖明矣究反復之道益驗於身將見某百折而不撓獨行而不懼非兹泉也與念其祖徳繄命名之意與其兄堯臣閉門窮經沉思篤行予得與之交將並游夫西山感夫昔之廢興不在於險則泉之東其寧有已邪戅庵記慈溪黄彦實少喜豪士澷游故都見世所稱知名人率脂韋自保秘惋恨無可與語酒酣氣雄謂海㝢方宴安休明宜取天下事置念慮以入計畫否則搜抉險幽浩然為萬里游遇不遇命也未幾泝采石上漢江西游荆襄歴觀用武關要荒榛廢壘猶有能言昔時得失益慷慨自振而所見公卿大夫與夫布衣之士則皆與昔交游者無大異於是治其居曰戅庵以自儆求記於予亟請焉昔之養生者志專而若愚遺世絶俗懼其名之至也介然以逃泊然以遨聖人憂之慮其器之不𢎞不足以任斯道也然舉世之士樂同而惡異曲者常安直者易危則寧直焉者斯近矣彦實智通於事物行幾於古人視今世之戅者吾能言之草野游京師决臆裂眥不顧生死詣廟堂求竒中書未出袖而利祿萌於中非戅也鄉里稱任俠大言斷是否隂持短長以利己非戅也佯不絜清詆罵排觸而私有揣摩問之而若樸即之而彌汙若是者又其佀而靡者也彦實先大夫文節先生為史館官咸淳上殿論浮屠不宜入禁掖度宗大怒手詔出國門未幾貳守桐江與宰相兄子争事卒易他郡戅無以易此矣古之君子事至而名隨人棄我取自謙之道也聞彦實居山中閉門讀書益不妄交求古聖賢摧折困踣之本發而不可犯者養之至也予歸里聆其言斯知之矣延祐五年夏四月越袁桷記桂山堂記江南地宜桂故凡廣居室者必植之以為美觀焉釋木者曰桂白華叢生冬夏常青人取以自近良有以也地記言八公從淮南王後入山為仙作叢桂詞與漢史所記異予獨愛其簡絜幽古為文章宗師申言攀援非自息於林莽者讀其辭可悲也矣上饒周君缺居龍虎山因其地之隆植桂于上築堂面之而名曰桂山徵記於予予曰今龍虎山為道家統宗金碧晃曜出于縣官搜竒抉幽異夫昔時之荒煙古木軫相結而袂相接也周君主畫諾以極其榮觀則今之所命名者若不相似何也然予嘗聞之至人其貌恂恂其言諄諄執中以權損益其未備黜紛華以從事于寂寞者非有所激也周君知周於身謙抑自持思夫山林之静養其冲泊先事以自警古之所謂備豫而能立者近之矣周氏之先得道於希夷陳先生當熈寧時猶亡恙見其曽𤣥離世樂善樹徳之訓有自来矣且夫託物以喻志詩人之心也仰觀於山徐視吾手植者風雨氷雪貫四時而不改擬諸形容得無似之乎異日將游山中詠八公之辭反招寫心僕援筆未敢以老為辭也張尚書救荒後記儒學提舉天台柯謙自牧為序一通言今工部尚書張公之佐江浙也活饑民禠貪帥為去思帥能歌詩者追美之是可謂無負張公矣往嵗桷以翰苑屬歸里里人言元帥府始治婺女有摠戎官鎮慶元言慶元聨蠻國入海最近稍失控御兵釁不可測乗驛入都白利害時太傳丞相坐省中盛言摠戎非兼元帥不足以重鎮太傅察其言有私便後雖移鎮而卒用常調官如舊制焉大徳十一年嵗大饑浙東副帥缺命屬吏疾傳詣行省告變曰慶元接海口僅數十里羣盗據島嶼出沒將入城剽刼願速分行省軍往翦其窟穴緩則不可治行省大驚將如議張公時為郎中丞相謂公曰計安出公以調兵非所預丞相固問則曰果有變帥府當印署白省副帥獨遣非完議也召屬吏問變奚自府有鎮守官今上變為何地屬吏頫首不能對遂移檄問盗今安在帥府得檄大驚咸言無是事繇是卒不發兵而慶元迄無它噫方副帥造謀時當饑祲窮困之急稍加以兵山海逋竄寧能歛手以快鋒鏑一有抗拒誣以叛逆則凡故家大姓蔓延於囹圄之下將不可勝計人能知救荒之為美績而不知吾里之人微張公之言有不待賑恤而皆置死地矣敢書以補郡乗俾知夫立帥府本末葢如是張公名缺字士瞻衛郡人處事明逺知大體若是事寧勿為記其可乎晚香堂記延陵吳成季父奉萬年之祝于崇真大徳甲辰二月承詔為祠官于衡山復命歸祠其受道之山曰龍虎龍虎於番為接壤番於成季為鄉井於是其嚴君偕七十矣迺避館屏騶却入里閭舉觴再拜以祝以夀宗黨姻友旁列叙坐勸酬以禮進退維度聚而言曰嘻其盛哉成季曰不然繄昔逺祖挈國以讓晚交兵間既夀且康至于番君墜緒㠯興維用之嗇報必以厚自吾少時聞為是州一不承意則交喙争誚而吾父子吟詠佔畢呐呐謙讓不能出諸口至論成敗衰盛嘗掩卷三歎以自警厲而今也二老人康强起居佐理内外冠帶童丱咸立左右其迨乎逺祖之意願築堂以奉而名曰晚香其何如衆曰唯唯未幾來京師屡屬予以記予以謂大夫士之養莫侈於羊犬豕而世之希年逺引者至以金石草木為可久菊水之夀效極於胡廣昔之議廣猶若糞土則名與年較不相並今成季榮於其身顯於其親惓惓然企本支之盛吾見吳氏子孫孝謹遜于里門秀敏有列于朝而耆耋老人方遊遨嬉戱擊鮮養醲若古之所謂偕老而終隠者其不在兹也傳記言王公大人晚嵗託言神仙多以逺禍成季游乎方外之畛憂世嫉邪嘗不自置異時承渥流問則司馬子微之對殆猶糠粃而名以晚香者非獨為吳氏美是特有待於成季也四明袁桷記玉冠記大徳乙巳嵗二月甲申皇帝受釐于玉徳迺命尚服出玉冠以賜𤣥教真人張公其製為山形空其梁述温栗精潤隆殺悉等莫有究攸始袁桷見之曰此紹興宴居所服韜髪冠也舊聞長老言思陵為清暑樓聚金石竒刻飛湍清樾森鬱蕭爽伏日退朝衣白縠羽衣冠小玉冠閲定書蹟其殆是與維古弁冕雜飾以玉至晉宋間君臣上下崇習𤣥理清逸修簡始為玉冠今世所傳元帝像及晉賢圖軸與此無毫髪異則紹興所冠猶古帝王遺物按道家書言神君始建飛天玉冠其製與逺游爵弁微近疑有差等含𤣥秉陽舒精吐光繄冠維則欽承是天寵進道之篤其不在兹乎夫玉者陽中之隂也首者體形之上神精明之主也陽非隂不能以成合而凝之出入于斯易之門也方今張公以清浄理贊益熈洽縝密而不露孚尹而不泄逺而望之誠理勝矣庸述其始以示于後袁桷謹記孝思亭記三山吳明之築亭於陽岡大父之墓側名之曰孝思按昔之言禮者則曰魂歸于所居將致其一焉墓有祭有亭為非古矣善乎延陵季子之言曰魂氣無不之也夫専于祠宇不意若是拘也物精神著其氣發揚者出于丘壟是則必首於墓將奚以疑古之聖人懼其瀆且數也嚴為之防速貧速朽夫豈非夫子之語祭墓為尸是墓有祭矣祭而不屋失祭之禮矣繇宋宰輔侈其墓田不復拘甲令層樓巍閣空青金碧巋然于坡陁之阜過者必式其防遏森翊誠以為千百年無慮也乾坤合運頽垣廢址上牛羊而履荆棘欲求子孫不可得而明之方慎其繚圍搆亭以綏其體魄是則過於盛者必有衰吳君之志追逺以求㫖微意深鬱勃之興將自兹始大舜五十而慕昔以為難能也遡而推之探其微㫖亦難能也禮抱孫不抱子祔于王父幽明之通瞭然而莫遺明之審之而克行之桷也故國之公孫其思于祖父也罔敢替因繹其㫖為之記福源精舍記建炎初秉義李君以勇略捍衛鄉社倜儻急義植徳流衍諸孫以詩學接武科目恂恂退讓望知為秉義家子弟衣冠浸微獨溧水府君之子登仕君寄隠㕓市龎眉幅巾治生産益有理年逾七十迺卒予請告歸里其子印傳以事狀踵門求記其精舍俾永逺嘉熈間溧水君卒于縣治登仕甫八嵗祖母朱氏奉其䘮以歸將葬于上元之祖塋朱母泫然曰孤兒奚依少不利必隳其先祀相于慈溪東嶺楊奥之山卜告以吉結為四塋昭穆以叙而以其殤女祔于旁近登仕長有室曰茹氏朱母即世既𦵏茹氏曰吾姑以橐中裝成是山夫君獲有成立新婦不淑紹先繼志弗展擴則奚以緝前人光亦斥奩資廣山壟建祠屋精舍以奉其舅姑茹氏沒于至元之十九年登仕君沒于至大之四年大徳六年印傳與其妻胡氏同入山拜墓顧瞻周迥蕪圮日廣胡氏曰再世尊章有成妾獨不能少效萬一聞佛氏有大報恩而用其法名為福源精舍命僧以居遂一以浮屠所需者咸備具復買田若干命僧某首主俾其弟子相次以繼其所度僧非李氏不得入予愕而言曰吾里卿相什百各以功徳院為請有以其田園與子孫共分析求利益穹樓矗塔坡阜松柏蔽翳綿數十里時運更易各降在皂𨽻孤童負囊倀倀不能以入每恨其祖父作是為無益也予嘗過其祠宇薪草雜糅破凝爐煤而主兹所者僴然有曰彼昔承寵恩故幸若是其子孫何能預至于士夫之家庵廬相接幸其不為有司之所𨽻羣聚毁撒甚者發其丘壟噫可勝道哉予謂三孝婦之志人莫能並心純而孝專發於自然非過信以溺于異端思其創始思其悠久是則秉義之澤良未艾也為浮屠者聞予之説寧不有泚其顙印傳復為穴三一以葬生母張氏其二則夫婦因以預備云治平寺記治平寺主者以建寺本末謁予為記其狀曰寺在城南門外渡江曰銅湓浦鄉曰鄞塘平疇鬱密松竹環植望之竦然其間者即治平也寺建於後唐清㤗僧曰道隆以法華勸民習誦持善果剏是地三十畞有竒始居之復得别業為畞六十其初曰東李浦院錢忠懿王俶給符牒俾永逺又改為保豐院宋英宗更元治平祀明堂始易今名法智大師以教乗闡東南習學皆其徒故號為天台宗元豐間有性法師講法華别立機要從者雲集而田租漸廣居民染㿃下疾師咒水飲之飲者日益衆師咒於池悉愈寺舊有東西池今咒水池猶甘冽可鑑師號山堂卒葬於是寺嘉熈三年寺燬于時上師實主是寺遂新三門法堂廊廡等若干迺謝去淳祐六年堯師始成殿宇居室所宜有者悉備咸淳八年子直良法師至曰吾不可不私淑後學户屨日接簡約暢隠法華之説大備而治平名益著率由是陞于南湖者凡數人南湖四明之祖庭也後曰一蓀守是山今十有五年繄前修是承昔之營構皆腐折傾漏不可支今幸完復粗備惟創建昔人􅆙軼靡有紀願登其事于石桷以為今之為牧守者茍度嵗月堤防津梁田野之不治尚何能望究其本始為世胄者日隳其先祖父名諱近在數十年問有不能答未有如浮圖氏泝源推根若是之詳者道散於九流百家各自奮植吾儒之教末俗以空言為髙卒不能勝甚者去其舊籍郡縣養士之田皆漫漶不可考如蓀師所為寧不有愧庸因其狀以紀亦以勵吾徒之為師長者云海㑹庵記出城西門皆良田白水髙下緑樹雞犬相聞蓊然農家善於業者也予繇京師回艤舟驛亭望之則朱甍碧瓦傑然為人天居佛之道以枯槁堅忍為能事卉衣糲食樹下塜間不求其豐足故從者樂然如歸二千餘年為之説者以荘嚴為善果愚者益信狂者益怖而梵宫寳刹合郡縣山水之勝悉為所據日増月益有不可勝言者四明海之東絶處為補陁巖大士顯焉鄮之東為育王山釋迦舍利塔焉遵南為岳林為天台皆游歴之所而補陁育王自天子至於王公百司乗驛奉香幣不絶於道四方之民終嵗膜拜至於西門始求其渡海之路然而觸風濤煙霧率莫悉處所又舟人伺其危殆時有不利目接其事而来者益不止豈非其教足以傾動而為善者有以復其良心也有僧曰妙夀以其建庵之始末告曰兹庵之剏專以奉補陀育王岳林天台之游者也初卜地於城西郡民任氏首不過地千歩屋三楹有同志僧妙然日習宗尚善勸募傾捨駢集又有僧元安清持以行業振勵信者俱至善士翁父堅翼輔之首建佛宫且割田以濟未幾宣慰楊侯梓益買田以贊相由是拓地為畞十五屋百楹殿堂門廡迎賔習静各有其地泛海有舟放生有池獨不設方丈懼後人之佚樂以自恣也不請寺額曰海㑹庵懼其奪攘以為兹所之凌替也其狀若是願請記以求永久予曰博施濟衆昔之聖人猶以為慊浮屠氏日丐假於外而皆足以慰其志意葢其説汪洋浩博㕘之以報應而為惡者懼吾儒之説百姓日用而不知卒之以道政齊刑者不得已之具逃空虚絶人事釋氏本㫖而其生産作業皆取於吾教若今有司興繕則民不勝怨咨海㑹之成相胥以勸何其易也妙夀深湛善思事為之防曲為之制其惓惓于後者厥慮若是雖欲勿永久其得勿永久乎重建延福院記予繇集賢還里居有僧永華躡屩重趼踰數千里南康來介天平恩太師求記延福院興造者其狀曰院在南康建昌州西山曰龍城唐馬大師嘗憩寂焉殿有記宋雍熙間廣陵沙門處暹所撰嵗久蕪圮宋末郡始署開陽院僧紹志主之墾殖磨刮集材庀工鍾閣齋室凡僧之所居處者咸屹然以成至大徳庚子主兹山三十餘年矣命其徒曰吾宜藏密以興造事付汝等咸頓首曰曷敢不承繼曰繼福迺襲院事首建三門及外門曰繼祖繼夀永翌廣賔至之所視昔居處之宜益廓且完繼祐迺曰吾新殿視瞻廣博謂色身小大擬於形容良非吾道然徧滿充塞當有是事揆諸空幻則非實相宜改而正諸遂易舊象得舍利五色於佛胷背間宋咸平僧道志所建或曰是若有脗合然者歟於是梵㖵贊頌而若子若孫皆勇猛赴事謁於事佛之徒増飾金紺象設尊重瓶鉢精絜烜然如人天居復増其田若干紹志終于大徳七年夀七十五𦵏寺東之陽今守其遺言祖子孫相繼如初孫七人曰永岫永岦永岓永華宗松宗槐宗權讀狀畢迺問華曰志師能植立若是宜有本始華拱手曰昔圓悟大師得法弟子曰真牧大師賢賢度其徒幾千人志其派緒也予嘗聞釋氏服勤壊形實本持攝至於廣居榮觀將以慴伏庸騃除其侈心非專以是為能事生而不居死而不餘故其道益固傳有言曰又何加焉曰教之能仁之教書遍中國為禅學者不立文字而其徒復守師説文字益繁今而曰教之於二者將焉取乎哉他年曳杖游匡廬西游龍城問聰明道理其必有以告我則予之記興建亦得以永久也資教寺修三門記吾里法智大師以至行約言闡揚天台大行于浙東西謂城南延慶為祖庭故四明旁邑近郊雖丈室尋地多博辯秀出之徒過於他郡西山資教其一也西山在郡西四十里周顯徳元年號廣徳院宋治平改曰資教負山面湖有菱荷鳬鷗舟楫亭橋之勝凡郡人之游于湖者必至是寺湖湮為田游者不復至而寺漸頽圮紹定中月公首授徒是山後謝事上竺願復領之世言上竺第一院西山號最卑繇月公再居而寺益重故講説者争趍之延祐缺年道師逢原以郡選主之其徒亦曰彼學専静選不可易也予舟過先墓必望所謂資教者焉空巖傾欹樹木翦落將不堪其居比還里則昔之頽然以興重簷翬飛表表出林杪道師曰吾首新三門餘以次繕治不田以食廢其教將有愧集徒講肄則庶幾希前人光三門紀修願以囑焉考諸禮經制有五門雉門居中故曰三門秦漢損益不遵於周連門為三唯王宫得用官署降殺非雉門之制久矣釋老宫室擬於乗輿雖儀制有令不得禁天台以明静為宗弊衣惡食脫氛垢厭榮觀汲汲以土木為急崇信興敬將於是乎取夫像設之教首于西方其能傾動禍福必召募焉以集事師謝不肯寺久廢得人焉以興則吾徒之為校官者竊食自嬉寧得無愧焉吉祥寺重建記主吉祥寺崇柏師以其興造本末為狀一通俾予為記其狀曰初寺在翁洲南香柏巖唐有僧慧超相攸築居峻絜厲行居民傾信寺遂以成漢乾祐中賜額曰崇福至宋咸平有真大師善持咒能愈閭巷疾病號真大悲崇奉益廣邑中尉曰丁漸以柏巖峻絶困登陟易於廣平環以九峰繚以清溪審勢辨方各當其職宋治平始賜今額曰吉祥紹興中給事中黄龜年以讜論忤時宰避禍絶人事僑居絶島獨與方外交每至寺中時有宏智覺禅師主天童宣密抉妙師表藂林其大弟子輝主是山傾動島嶼黄公敬之施所藏辟支佛牙為閣以庋而寺益増重遂為海上寺居甲乙人稱之為小天童繇輝師始也皇慶二年火一師始作法堂㑹遷它所不果終至是柏居之首建大殿三門次以藏室僧堂凡僧居之所宜營繕者畢具奉定三年告成俗姓虞氏其父酉發嘗為海運官有兄曰庭桂曰庭芝慨然曰吾不可不相吾弟三世佛像吾與弟共成之今夫浮屠氏宫室率為禍福説以誘民陰奪其財民日以耗有國者憂之若師所就不丐假於外竭其贏餘以復舊觀怡愉相資將瘁躬以究築凌隂廣腴田以為後人補緝費志專念逺是果能興其教者也余誌釋氏建置每有感於學校若是則又重有所感也師居浄慈嗣法於慧禪師屏外持攝慧之學益有光矣勉之哉妙果寺記廬山東林寺以逺法師為祖庭其教行乎海㝢閲年滋多厖幻雜糅壊宫夷址將絶其遺教寺僧普度慨然興復率弟子十人芒屨草服詣京上書演為萬言又集歴代經社縁起作蓮宗寳鑑十卷仁宗在東宫閲其書盡初帙問曰得無欲布施乎合指謝不敢又問曰得無欲補僧職乎復謝無是想惟蓮教墜絶願殿下振復時武宗皇帝在御近臣以其事奏即以詔㫖慰撫如律令至大十四年始播告中外而度俾職其教為優曇王師丹陽人在縣為竹林山妙果寺率徒喻俗将大廣其居以稱聖天子崇重之意予嘗謂象無形儀域無逺邇逺公之言曰思專想寂三昧之本彼所謂邦國之殊異相好之莊嚴葢将絶其邪惑一淡泊而無所逢大雄氏設喻警蒙攝持示境境由心發境㓕返真清浄安樂包括宇宙是知道者又安有四履之分别哉度師博習教乗示於衆者頫焉以導其師日禪師久居東林後主天童嘗率善士修逺公法来於江西者踵不絶度師興其教是果能有傳也記寺興造摭其綱要以明初志云石夫人廟記州東北隅有山昂然以尊秀特瑰異望之若貞女獨立凛乎莫能犯水旱祈祭輒應土人因其形佀而名之曰夫人山唐咸通八年主簿李成矩記其廟貞固之封見於祠部嘉定十七年加昭徳順應咸淳六年加福祐皇元合一郡縣大修祀典兹山必預焉泰定三年州判官張思訥奉命致祭肅瞻廟庭棟壓瓴圮心駭目瞪折旋㝠思喟然有言其何以稱上命遂謀於州尹曰蘇君缺同知焦君鼐州判官塔海復語其僚俎毅許禋割資以佐工役而凡𨽻於祠下者胥勸相事是嵗廟成乞記於桷原夫宓妃静波神女行雲此騷人墨客之寄興也二孤望夫至今游覽者羞言之若夫天姥雲母穹窿磊落淫言鄙語不能以入是則兹山之靈功在水旱餘奚以議傳曰山澤通氣記禮者曰地秉隂竅于山川炳靈赫奕民社是依崧髙之詩實有考焉遂作迎享送神詞詞曰磅礴兮上征渰兮積兮縞繒樛木矗兮翠旌恍綏顧兮揚靈抱貞固兮合窈㝠竒功教兮集鏤塍嶞兮稜稜駿兮烝烝帝祀兮永承其一來兮弗趾去兮莫視有穰兮億秭祓不祥兮盪癘宻石兮牲繫俛精思兮帝制百神擁兮森衛苾芬歆兮嵗嵗其二信州自鳴山加封記至元十四年𤣥教大宗師張留孫扈從世祖皇帝于兩京言信州自鳴山神有靈狀敢詣闕下敕禮官崇顯之是嵗皇帝命侍臣李衆劉子中降香實銀奩旂以金錦顯其神三十一年成宗皇帝有詔遣使致祭嶽瀆在昔登載者如式崇奉大徳三年三十八代天師張缺平錢塘潮言神以雲雨昭著自鳴山事見郡乗宋元符始有廟號繇宣和迄咸淳制書凡十五下乞如今皇帝詔令於是符于州考證無異辭至大三年𤣥教嗣師崇文𢎞道真人吳全節乃言曰吾徒食兹山有年矣闔闢摩盪繄隂陽是資變以行神神繇以興今天子禋奉祠祭吾教益昌自鳴於龍虎封畛相入捨是其何言遂復請于封為明仁廣孝翊化真君桷待罪翰林十有五年矣嗣師曰龍虎紀述吾不以累子兹山肹蠁紹定之際先正肅公嘗紀之矣子誠不得辭嘗聞之地秉隂山川竅焉通而後能鳴石之徵也聲生於空因山以著昧其初而以為神者其諸異乎石之鳴也風霆流形神始出焉神非妄也兹道之妙老氏深知之矣予何敢語延祐三年四月㑹稽袁桷記隱仙記宋開慶初伯父賔州我先考郡公将除夫大父尚書公喪相與議曰崇親報本唯躬行是先焄蒿悽愴鬱然而莫能見者將導達之則屈伸之義足以考聞諸老氏有黄籙齋善攝度彼果能濟則吾父將超然于物表非崇泥以求福也齋既成以尚書公所遺祠部牒度道士三人王君徳華在是選二人皆亡化不復紀獨王君服道士服幾七十年徃來袁氏門且五世貴燄侈盛嘗親見之至枮泊頽薾則過門風雨不少阻且曰吾寧負袁門哉其於宜所學者曰章奏符籙雨暘疾疫親究而逺扣方外士来質衣以請百誑不倦以其勤且無悔故有所成就今年八十有八而請者益勤迺語予曰今卜藏于城西隅名之曰隠仙仙也者返真之義也魂升魄歸死生之大義也而釋仙者謂為不死古果有是若吾徒者寧能企是哉桷今年六十有一矣考其入道先於吾生死者若蜉蝣生者若稊稗推一門之盛衰足以驗一郡之興廢而桷也以謭薄之技獲官清朝今仕焉而止願與王君考游歴之舊指其歸藏則曰委順觀化寧有怛於心懼後人不能以紹志俾預書平昔之出處且以勵于後今主焚修于𤣥妙聰明不衰夀益未艾家世定海縣自號曰蓬山志不忘初也泰定三年四月甲午見一居士袁桷記通𤣥觀賈道士記通𤣥觀道士賈志福年八十三化于其居有徒曰王道深者言曰吾師以不言為宗其學澄寂寡約不為翕翕詭幻楮衣草履寒暑自得有問其道者不以對機藏蘥啓指喻微密若口授而耳屬也始為汝南民弱冠得法於棲雲王真人王曰知者不言子游四方能果不言以自全乎後游南陽遇軍帥脅以語不對復辱以箠榎師正色畫地作無語二字軍帥竦愧謝以白金將築室奉之㑹得閒走京兆復遇其師曰汝志已完忍辱易忍寵難其居京師以觀子之有成於是迄歸於京師㑹有數薦于先朝者復即遁去然居通𤣥而號清静散人實洞明祁公之所强也又曰師少時嘗得竒疾夢一老人授以七桃食之寤而愈其徴家為道士者凡七人有弟曰徳常亦守其學今居大名之嶽祠韜静完絜與吾師無異願有述以廣其道迺為之詞曰繄摩兠鞬厥機孔艱維柱下學知者不言納息于踵養神于淵匪曰不言其道已完道豈文傳文實累智虗辭借浮一跌千里竊隂據陽詭立名字夸者逐魂固者死技睠此嗒然奥密是造不懈其躬不喪其寳心焉死灰頭若蓬葆藏明委順是曰至道翩翩二難孰去孰存厥徒允從匪私其温恍焉松聲彼聴莫聞勵爾後人永矢勿諼清容居士集卷二十欽定四庫全書清容居士集卷二十一元袁桷撰序易三圖序上饒謝先生遯於建安番昜吳生蟾往受易焉後出其圖曰建安之學為彭翁彭翁之傳為武夷君而莫知所授或曰託以隠祕故謂之武夷君焉復曰吾易神也易何為而神也神者易之始也易不可以强名也不名則亡易願叙其㫖袁桷曰夫亡易者非聖人之本㫖也神以易聖人之易得矣然則曷為神無端而莫可見也惟無端焉故無體焉存而明之而數以生焉數生矣而始有變變立矣而㑹以理理者其一也理不能以盡易因數以立者理也用變以逆者非理也故曰陰陽不測之謂神始晁以道紀傳易統緒截立疆理㑭後無以偽至荆州袁溉道絜始受於薛翁而易復傳袁廼以授永嘉薛季宣士龍始薛授袁時嘗言洛遺學多在蜀漢間故士大夫聞是説者争陰購之後有二張曰行成精象數曰縯通於𤣥㝡後朱文公屬其友蔡季通如荆州復入峽始得其三圖焉或言洛書之傳文公不得而見今蔡氏所傳書訖不著圖蔵其孫抗祕不復出臨卭魏了翁氏嘗疑之欲經緯而卒不可得季通家武夷今彭翁所圖疑出蔡氏惜彭不具本始謝先生名字今不著其終也世能道之易集傳序觀象畫卦庖犧之本㫖也因言意而廣象焉三聖人之本㫖也王弼後出附小象以言理儒先莫能病若繫辭傳説卦等篇弼莫能措辭審是則弼幾一偏矣十翼之作有彖焉有象焉専於理而作彖象傳焉者夫子之志也然則文王周公之彖象其悉皆理與曰非也卦本於象八卦首之定名以為象則井鼎小過是也言意以為象伏羲言而人不能知之文王周公始申言之文王之言見於彖周公之言見於爻是則不俟予言也易有聖人之道四彖象傳果唯言意焉則變占乎何取曰有變焉有占焉伏羲畫不變於九六則變見之占則文王於彖附言之象未始分文王始離之變之疾者莫先於蠱憂世之深也若分象則師晉小畜之類是也爻變於占因筮以見者也其即見者漸小畜訟之類是也彖爻合四者而言之夫子不一言之何與曰傷哉夫子之志也事莫尚乎辭辭非理不能以定人事吉凶繇妄而咎以興先之以變占是易殆卜筮之書矣器繇動成動斯静矣取静觀動將於是乎則斯其為象也大矣夫子於説卦焉始彚之彚以窮其變占則變占者筮之始也故其首章先於蓍二章次於卦先天之説七言之懼溺於占也後天之説一言之人事之本也而終之以象焉維昔康節邵先生作方圓環中圖合於天人皆本説卦充類以至知夫聰明特達之士不在於諄告也若繫辭傳設卦之方窮神之妙其詳於爻者毫釐不能以易積數以成變易以動肇於方寸㪚於六合幽眇廣大取而莫窮應而莫遺因卦以測善筭喻者不能窮也舉世舍是矛盾互持雖百世莫能以觧吾故曰非繫辭傳不能以知易是説也邵子之説非僕之説也桷不佞讀易二十年歲月逾邁所見益懼紇石烈君希元篤志嗜古於易精思以求搜摭疑義私嘗歉然莫能以對卒能先予以成書不鑿以求通不拘以强附㑹其粹精足以垂世故以予昔之所告冠於篇首㑭知夫同焉以異者将以革夫株守偏弊之失則予之所著其果有同乎其無同乎新安程子見四書圖訓序象數可以圖言名意不得以圖言以圖言之其亦有所本乎昔者聖人觀象著圖因圖為書範圍發揮由書而始通則夫圖之秘非書不能以盡是書之明於圖者也後聖繼述遵文演圖器度物象之微剛柔善惡之應若天旋之黙運于樞紐其不可以繪畫得之者猶因名以立義此圖之輔於書而不可廢焉者也二者之用各有先後合而言之者吾不知其説也自正心誠意之説興茫無畔岸朱子憂之遂以其可據依者為之主而體用知行之説實切於學者之功用後百餘年五經廢棄遂復勦取其近似端坐塗飾而根柢源委悉不復攷禮主於敬理主於善一言以蔽講學之法糜爛而不可救矣新安程子見取論孟中庸大學之書切於吾身者析而為圖以輔翼朱子之教抑亦使夫人知為學之序非字義之可盡條分目舉必有能篤行而親識之者斯足以盡夫斯道之要其勤且備可謂能矣昔真文忠公作讀書記仁義性命之説各以類從先正肅公作書止之曰使若書成學者將得以自肆今是書具在視今之言理者與古賢無異論其所學則又甚於朱子之憂矣子見之圖其必有以拯諸輔漢卿先生語孟諸序解經莫嚴於聖賢見於語孟其語簡其㫖明子思之釋經尤得聖人之微㫖今其書具在也自漢傳註之學興蔓辭衍説漫淫乎萬言魏晉一切掃削明理之説歸乎空𤣥二者之弊遂淪於偏滯學者昧昧無所依慿焉踰千有餘載矣至宋㫪陵碩儒開伊洛之緒正説至道粲於簡冊良謂大備後朱文公出懼其剽竊之近似也源同而𣲖别之統宗據要盖將使夫學者不躐等而進若律之有均衡之有權不得以錙銖差也既又懼其疑之未釋復為問答以曲喻之其詳且盡不復可以有加矣書大行於天下而後之師慕者類天台釋氏之教文旁行側注挈綱立目茫乎皓首不足以窺其藩籬卒至於聖人之經㫖莫之有解日從事於口耳孩提之童齊襟拱手相與言道徳性命者皆是也桷㓜承父師獨取黄輔二先生之書而讀之黄公之書嘗輔翼其未備若可疑者則以昔之所聞於先師而申明之至於輔公則直彰其義衍者隠之幽者暢之文理炳著不别為標的以盡夫事師之道微文小義簡焉以釋經為急而其知行體用之説不蘄合而有合矣二公所為是誠有益於後世而今世補文公之遺書夸多務博雜然前陳莫知揀擇余獨病之合黄輔以傳則文公授受之㫖益得以逺輔公書其子季章舊刻於武岡兵禍散軼今其従孫政與其子華亭丞友仁相與謀曰遺書不傳吾輔氏子孫責曷敢緩遂刻先生之書于家塾㑭序其事予獨連言於黄公者将使夫後人知二公為文公親授黄公之澤已斬輔氏為未墜是可哀也已是可嘉也已願勉哉正學之興其必在是也郭好徳論語義序唐儒作五經正義疏必先之以衍義而始明其傳註其先之者何懼汨於經也釋之以義疏焉者有訓詁焉有制度焉至於名物象器疆理飛走潛動之辨不博不足以盡約之以衍義非背於傳經之説也理唯約足以見漢稽古三萬言後世嗤之至朱文公承濂洛之正傳始為語孟精義久之慊然曰宜尊所聞今所傳集註具訓中外下逮荒陬絶島家有而人誦文奥義古至于不揣者斷章譏駮識者哂之京兆郭君好徳秉彛父授徒于其鄉塾懼世之不達於辭者習譏駮之病撮其精微合於簡易将使夫初學者若循塗以進遇險以休使少窒焉必由是而達在易之蹇曰險而能止知矣哉蹇斯通矣抑嘗聞文公之教於家也謂集義之作義理詳而訓詀略别為一書曰訓䝉口義今此書不存東彛是書殆深得文公之意近世東南諸儒旁行側注鄰於釋教之學濫觴而不可禁予得讀是書深有合夫訓蒙之説孔賈遺㫖能以逺紹其不在兹書也歟龔氏四書朱陸㑹同序五經専門之説不一既定於石渠鴻都嗣後學者靡知有異同矣易學以辭象變占為主得失可稽也王輔嗣出一切理喻漢學幾於絶熄宋邵子朱子震始申言之後八百餘年而始興者也春秋家劉歆尊左氏杜預説行公榖廢不講啖趙出聖人之㫖微見劉敞氏葉夢得氏吕大圭氏其最有功者也尊王褒貶則幾於贅是千餘年而始著者也書别於今文古文晉世相傳馴致後宋時則有若吳棫氏趙汝談氏陳振孫氏疑焉有考過千百年而能獨明者也詩本於大小叙諸家詩已廢毛公説獨尊蘇轍氏始刪鄭樵氏悉去之朱子祖之此又幾二千年而置議焉者三禮守鄭𤣥氏正義皆旁正曲附唐趙匡氏始知其非宋諸儒駁鄭幾不能以立甚者疑周官非聖人書卓識獨見雖逾千百世亘萬古而不泯是則寧能以一時定論為是哉曩朱文公承絶學之傳其書叙疑非西京於孝經則刋誤焉詩去其叙易異程氏中庸疑於龜山楊氏程楊朱子本以傳授者也審為門弟子世固未以病文公也陸文安公生同時仕同朝其辨争者朋友麗澤之益朱陸書牘具在不百餘年異黨之説興深文巧闢而為陸學者不勝其謗屹然墨守是猶以丸泥而障流杯水以止燎何益也淳祐中畨昜湯中氏合朱陸之説至其猶子端明文清公漢益闡同之足以補兩家之未備抑又聞之當寳慶紹定間黄公榦在朱子門人不敢以先人所傳為别録黄既死夸多務廣有語録焉有語類焉望塵承風相與刻梓而二家矛盾大行於南北矣廣信龔君霆松始發憤為朱陸㑹同舉要於四書集陸子及其學者所講授㑭來者有攷刪繁薈精余於龔君復有望焉夫事定於千百年則罔有異論故厯舉興廢之説若是噫龔君之書有俟夫後若余言亦殆将得以同傳也至治二年八月辛未袁桷序五經約説序古之學者三十而五經立方其時以力田致養為先本春出于野冬始入邑其勤懇懇然日不能給暇日入學嵗卒不滿十旬焉噫何其敏且成如是之易也盖先王盛時卿遂溝洫之制明冠昏賔蜡之禮具絃歌俎豆鐘皷弓矢之事周旋品節皆身親而入化則所謂通其義者道徳性命之理也簡牘日繁専門經師夸宏務竒漢世儒者白首莫一微言既絶掇拾枝􅕃而媮意惰業率自涯而返良有以也夫子之翼易二戴之傳古禮解經之準的也訓詁别立為小學析文以言字因字以生義究其大較邈不相入然則士何自知經㫖哉唐孔賈氏尊漢儒宗知其忤陋猶旁諱曲覆如臨師保不敢有犯獨啖趙出口指摘無所避至劉原父氏歐陽氏始慷慨直論未幾言經者銖分毫别疆畫同異亦駸駸乎漢儒矣夫一道徳而同風俗作者之事也復古而不至焉者儒者之責也六藝之道莫急於禮樂樂書廢已久而儀禮迄不得立學官遺音舊器莫可尋辨登降進退揖讓之損益臨事取具跂就企及卒泥夫近古吾獨謂學古之士猶足以語夫此也廬陵宋元翁為童子時能明經明經舉廢已久獨元翁興起其事弱冠復約為大義先王墜典炳然其専美矣夫天人之奥昔人之所罕言而昔之耳聞目見接熟素履今皆棄置不講元翁氣清徳茂養泉糞木必以源本約而同之與道俱㑹後之學者将由是則焉敢誦所聞而美之鄧淳翁春秋集傳序因褒貶而傳春秋焉聖人之餘意也悉貶而遺其褒焉非聖人之本㫖也粤自周室既遷史列於諸侯典策之蔵世莫得見而其紀載之法號稱近古故凡是非善惡之實天灾時變之著直書而不隠逮于戰國執簡侍史者猶守而未墜然而攻刧凌據之侈相尋而莫之顧實由夫外史之􅕄不行于邦國其史之存於國者又将日幸淪棄而無所傳證故益得以逞其驕而恣其所行若是者二百餘年矣聖人始出然後因其史之本文而修明之别為之書以信于後善乎孟子之言曰孔子成春秋而亂臣賊子懼若是則春秋其果為褒貶哉三家之傳事與義例轇轕殽紊刻者若法吏博者若辯士上下二千餘載各執所嗜介不相並而玩獵蒐擇髣其音聲益遺其形傳愈䟽而經益湮矣夫因義例以明聖人之意懼義與例不得而盡廣其記聞不燭於理則事益無以自附春秋之道幽而明無傳而著論至於是良有以也自唐以來合三傳者始各以其長自見然而求於外者必謹於内純明粹精非自外至焉者耳先王之典禮舊章具於傳記悉心以推之闇而日彰墜而復完則禮者又春秋之標準也邵武鄧淳翁慨不行於今特立已任纂而為編復因胡氏七家而增廣之余嘗謂審乎人情酌乎事變非春秋其誰凖感而通天下之故則易之用其與是相並始於春秋而終於易者邵子之學也淳翁學首於是必有其本敢因以訂諸王先生困學紀聞序世之為學非止於辭章而已也不明乎理曷能以窮夫道徳性命之藴理至而辭不達兹其為害也大矣是故先儒有憂之且夫子之言有曰興於詩立於禮成於樂其品節備具見於禮之經解夫物不燭不足以盡天下之智物不窮不足以推天下之用考於史冊求其精粗得失之要非卓然有識者不能也若是其殆得之矣在易之居業則曰修辭立誠而畜徳懿徳必在夫聞見之廣旁曲通譬是則經史之外立凡舉例屈指不能以遽盡也揚雄氏作法言其意亦有取夫是後千餘年禮部尚書王先生出知濓洛之學淑于吾徒之功至漙然簡便日趨偷薄固陋瞠目拱手面墻背芒滔滔相承聒不以為恥於是為困學紀聞二十卷具訓以警原其㫖要揚雄氏之志也先生年未五十諸經皆有説晚歲悉焚棄而獨成是書其語淵奥精實非紬繹玩味不能解下世三十年肅政司副使馬速忽公僉事孫公楫濟川分治慶元振起儒學始命入梓桷㳺公門最久官翰苑時欲悉以其所著書進于朝廷因循不果今也二公謂桷知先生事為詳㑭首為序庸書作書之本㫖亦以勵夫後之學者先生諱應麟字伯厚自號深寧居士泰定二年冬十月門人具官袁桷序大易通義序郡侯郭文卿示易通義一帙曰此真定侯先生所述也先生㓜喪明聆羣兒誦書不終日能悉記其所授稍長習詞章自謂不學可造詣既而悔曰吾明於心刋華食實莫首於理理以載道原易以求則為得之於是精意讀易旁通曲㑹参以已說而名之曰通義讀其書浩乎其詳也簡乎其著也因理以測象若遺焉而不敢廢也桷學易盖亦有年矣原夫八卦既列象斯立焉故卦有理者焉有象者焉理有以言為象象有以理為用理與象不得而偏也聖人懼其言之雜也諸卦之彖専言夫理而取身取物悉見於爻辭矣又懼夫設卦之理彖不足以盡也復繫之以上下傳而其象位之明著悉見於説卦至矣盡矣後之儒先言理者過於浮略象廣喻而泥象者微言隻字咸取以為象角立交病三聖之㫖泯然莫知所歸自朱文公發變象之説學者始知所宗君思深而識幽據㑹提要盖將為程子之忠臣倣文公以入夫邵子之室非潛心尊聞者不能也今年逾九十康色未艾先生名克中字正卿郭侯㑭叙其書將入于梓不讓而為之序焉老子講義序昔之善言老子者謂其同者合於易其不同於孔子者皆矯世之弊此論千萬年不能以易也新安程泰之作易老通言余意深得其㫖讀之茫然不能以脗合語簡則理得大羮𤣥酒夫豈㫖于味乎老子之五千言不得已而為言也道為乾坤之體徳為咸恒之用繹其辭㫖觀妙觀徼見天下之賾而疑諸形容者也衆妙之門易之門也功成弗居治蠱之道也使民無知無欲百姓日用而不知也挫銳解紛洗心藏宻之㫖也多言數窮吉人之辭寡也谷神不死生生之謂易也後其身外其身以前氏用之道也水善利萬物坎之行有尚也持盈揣銳君子有終也生而不有為而不恃無思無為也埏埴為器户牖為室十三卦制器之義也有之以為利無之以為用民咸用之謂之神也為腹不為目觀我朶頥之凶也寄於天下託於天下知進退存亡而不失其正者也迎之不見其首随之不見其後神無方而易無體也善為士之章出入以度無有師保如臨父母之謂也觀復復其見天地之心也皆謂我自然不事王侯髙尚其事也若夫十八十九二十章矯世之言也其中有物其中有精坎離之體未濟既濟之用也不自伐故有功謙之義也有不信焉亦矯言也跂者不立鼎折足不勝其任也有物混成易有太極也輕則失臣躁則失君君不宻則失臣臣不宻則失身之義也善人者不善人之師益道也知白守黒窮神知化之義也去甚去奢去泰致恭以存其位者也将軍居左師左次无咎也道之在天下變動不居周流六虚之義也自知者明顔子之不逺復也自勝者强君子之自强不息也終不為大虚以受人也視之不見聴之不聞極深而研幾也不疾而速不行而至也柔弱勝剛强坤至柔而動剛也利器不可以示人君子藏器於身也守萬物将自化神而化之使民宜之也上徳不徳章矯言也謂得一者貞夫一者也萬物生於有有生於無蔡氏曰兩儀之先其易無體兩儀之後其易有體有無之義於斯見之明道進道探賾索隠鈎深致逺之謂也道生一一生二二生三三生萬物石林葉氏曰易之數見於大傳者乾坤之䇿也物亦非萬之所能盡該微見其緒曰引而伸之觸類而長之天下之能事畢矣老氏言數曰道生一一生二二生三三生萬物荘周言數曰一與言為二二與一為三自此以往巧厯不能筭老氏所謂三生萬物者猶易之言當萬物之數而不盡其說也荘周所謂巧厯所不能筭者猶易之言引而伸之觸類而長之而不窮其變也至漢言律厯者於是始於易數之外起黄鐘之一而三積之至於十七萬七千一百四十有竒以為五行之數備已而又為三統之説以五行相錯由三微三著積之始於太極而終於二千三百六十三萬九千四十而復於太極上元以為天下之能事畢無為老子之㫖義與生而不有同㫖既同則無思無為之義同矣知足不辱知止不殆諸卦之上九類之清静為天下正憧憧往來之反説也知足常足繫于苞桑也其出彌逺其知彌少稱名也小取類也大之義也為學日益為道日損兼損益而言也懲忿窒欲損也見善則遷有過則改益也聖人皆孩之退藏於宻吉凶與民同患也善攝生老子之本㫖致一之義近之矣道生徳畜乾坤之用也生而不有變化云為也塞其兊言行君子之樞機也慎言語塞兊之本也閉其門行其庭不見其人之謂也介然有知知微知彰知柔知剛介于石之義也善建者不抜確乎其不可抜也修身至天下中庸之論也精之至和之至男女搆精化生之道也𤣥同不見是而無悶也以竒用兵以此毒天下而民從也禍兮福之所倚碩果不食也福兮禍之所伏鞶帯之三禠也治人事天莫若嗇卑而不可踰貳簋可用享也有國之母可以長久安土敦乎仁愛之道也非其鬼不神睽之羣疑亡也大國取小國小國取大國湯文王是也謙之上六得之矣道者萬物之奥廣大悉備也何棄之有容民畜衆也坐進此道藉用白茅无咎也圖難於其易為大於其細易簡而天下之理得矣為之於未有治之於未亂履霜堅氷也合抱之木生於毫末喻積小以髙大也下二章亦同也民之難治以其智多禁民為非曰義則智去矣江海為百谷王天水違行而由一以生也下者水之道需而蹇蹇則通矣下濟而光明之義得矣曰慈天地之大徳曰生也曰儉損之道也曰不敢為天下先㢲以行權也善為士夫子於益或擊之立心勿恒凶之爻詳言之矣用兵有言仁者無敵也吾言甚易知易知則有親也知不知滕口説也民不畏威不威不懲滅趾滅耳之爻得之矣勇於敢則殺天道虧盈而益謙也民之饑節以制度則不傷財不害民矣人之生章原始反終故知死生之説也天之道其猶張弓日往月來之義也天下柔弱莫過於水坎之内爻堅强者也故險之時用大矣哉受國之垢國君含垢也明夷之義於斯見之常興善人積善之家有餘慶也小國寡民章通其變使民不倦也利而不害乾不言所利保合太和乃利于貞矣為而不争争地争城老子之親見也王侯設險以守其國夫豈有争哉予固嘗以易釋其㫖而未有成也同里吕君與之故儒家閲世益深㳺於方外以其著老子一編見示甚侣夫予之所見其文詳順而實援據以精築室於海島孤絶之地黜聰窒明以養其泰和且又将窮極山川之幽勝以求正於有道誠可謂老而能學者也故輯舊説列于前凡我同志知予之不妄也許可者有在也泰定二年七月清容居士袁桷序髙一清醫書十事序班固氏輯劉氏七略為藝文志其序醫經方藥終以神仙十家殿之尋宗探本厥㫖深秘近世習老氏者則以為薄清浄務名實若班氏去取未足為吾學輕重其不習老氏者因其先後遂以為尊吾聖人莫若班氏縁聲附響深切明著之道二者皆所未喻也醫經方藥具訓于先古其不得已而為之意世莫之曉惟空林隠竇刻意繕性之士必極其本致而後能知之故其察五行乗剋之理七情摩盪之原兢兢惴惴使夫身不至於已病而餘功後效積精以適神者斯近夫神仙之説矣班氏深存其義而隠其説故世之方士皆荒忽詭幻復别為一家以自侈靡而所謂非聖不言者則有戾五福之彛訓仁者静夀之義於道何取焉予嘗謂有經天下之志必有經天下之事胼胝之勞在陳之厄其饑寒困苦雖九死不得以自悔視夫彈冠結綬争奪得喪談性命之空而忘事理之實者則有閒矣故每信而不敢自異居里時獨髙君􅒷一清慕方外學嘗以為醫經為性命之本若冶金鍊石諸秘詭事皆不取殫極年歲悉取上古漢晉諸經方以及唐宋所續出經分緯别定其精良刪其繁雜别為十事謂必由此足以通夫仙道而其意與班氏適相脗合髙氏衣冠為四明望自獻簡公閌掌成均定學制當秦氏廢錮正士即致事以春秋禮學教授郷里内翰公文虎禮部公似孫父子皆以文學致清顯至大宗伯衡孫為端平正士修儀偉貌年八十餘手抄見聞及方技諸書亹亹道舊不輟一清為諸孫得於宗伯為多淵懿之深簡聞小誦非所可擬疑駸駸乎與學仙之道通故今自號為通仙子云然予㓜聞諸老言葛天民曾景建以神仙説㳺公卿清言玉雪苦意氷蘖見者憐而欲成之後卒不就㝡後里人王丹池復以是説㳺亦不就十事之成於吾徒誠有賴未知神仙之本㫖其果能有成也朱文公於老氏嘗曰恐逆天理信而不泥然未始與浮屠者同其議悼日月之如流知𤣥髪之易化髙君其奚以辭因叙而致意焉四明志序成周疆理之制審於王畿首合同姓以夾輔至於四履則必假異姓焉以控遏之先後䟽附曲盡其制何周且詳也四方之志猶懼其不能以悉知也則必以外史掌之沛公入秦而書具在區區刀筆吏獨能収其書據要漢中夫豈偶然也哉世祖皇帝聖徳神武混平寰宇首命秘書監儒臣輯大一統志沉幾逺略與昔聖人意㫖脗合然而郡志缺落其遺䡍未備焉者不復以徹于上馬侯澤潤之固嘗為中祕官知之矣暨守四明廼曰明舊有志今為帥大府浙東七州推明為首阨塞户版物産地利是宜究察以待問清風舊徳與昔之髙閎巨閥屬於宅里者猶可考也謂桷久為史官宜有述桷嘗聞之洙泗遺俗稽之以久逺者道徳之澤也詫錙銖之利以害于吾民昔人之所不道空虚設增農日益困甚者紀其山林屋室之盛奉書詣庭若執符契争莫能已是殆昔之無知者根其禍也管夷吾作書訓子弟良厚而内政以漁鹽為急儒者詬之維明負山横江歲厄於水旱河渠是先牧民之本推其沿革覽其山川知昔時得人之盛宫室户口之無恒釋道遺文之盛衰是皆足以增其永歎焉者矣廼為十二考以志其事遂不敢以荒落而有辭焉馬侯為政愷悌惻隠以宜于民民以不病郡博士吳君某勤恪承令詢索州縣之所宜聞者良備因是得以成書焉李景山鳩巢編後序桷過永嘉張宗魯書塾庋河間李景山氏手校朱子詩傳謹視之旁行側注朱墨定竄精善心慕焉雖未熟詳知其名能詩吾意非近世詩士也近世言詩家頗輩出凌厲極致止於清麗視建安黄初諸子作已憒憒不復省鈎英掇妍刻畫眉目而形幹離脱不可支輔其凡偶拙近者率悻悻直致棄萬物之比興謂道由是顯六義之㫖闕如也是歲冬見于京師始讀其詩於雍虞徳生質而不倨倚而不踰襲衆芳之英融寄于窮厓絶域之地而審其昔日之心滿意肆盖將冲寂寥廓脱然以逃焉者也夫子之言曰詩可以怨然不怨可也怨已則責難於天誠不怨邪幽蘭之辭湘纍之賦得而廢之矣若公之詩非悲其不遇也凛焉以持者正也反而言之斯怨矣又何病焉予嘗從問雲南土風歲弄兵不止計安出公曰理則人擾則獸豈獨雲南哉退已書諸牘復識于序後若徳生所論次者不復著劉内翰文集序至元二十四年間南康劉公為内相宋社未亡桷髫年侍先處州府君于錢塘獲識之議論雄偉誠竒士也後有客自京師來者必詢其詞命制作多戃怳不能道踰十餘年獲入禁林得玉堂制草而讀之編次荒略詞臣之名十不存四五是則劉公之文無因而推考焉者矣至治元年冬十月其嗣判官君某槖其遺文相過焉㑭有叙桷讀之手不以釋夫集腋於裘擣珍於鼎非精别者不能也尊其所聞足以信後諛言美説非後進之所宜為也東平李公謙評公之文曰學問該洽性理精詣承㫖王公搆則曰深妥雄健博碩光明廣平宋公渤亦曰氣盛辭卓温縟宏雅嘉禾張公伯淳則又曰浩蕩横逸是數公者司衡挈繩將㑭夫後之學者翕焉以従其傳信何疑矣夫以理為主文常患於不工雕鏤委心茫然而無以畔岸是則為是者良難矣命焉而得所遭事久則論益定觀其詩文於當世羣賢之言有考焉斯得矣樂侍郎詩集序故吏部侍郎河南尹樂公詩一編其季子克誠以家集㪚䡍守其記憶者得若干篇将刻于梓㑭有叙桷讀而作曰嗚呼㫖哉方南北分裂兩帝所尚唯眉山蘇氏學至理學興而詩始廢大率皆以模冩宛曲為非道夫明於理者猶足以發先王之底藴其不明理則錯冗猥俚散焉不能以成章而諉曰吾唯理是言詩實病焉今夫途歌卷語風見之矣至於二雅公卿大夫之言縝而有度曲而不倨将盡夫萬物之藻麗以極其形容贊美之盛若是者非夸且誣也五經言理莫詳於易其詞深且宻闡幽顯微不敢以直易言之考於經皆然也宋之亡也詩不勝其弊金之亡一時儒先猶秉舊聞於感慨困窮之際不改其度出語若一故中統至元間皆昔時之緒餘一一能有以自見若吏部公則親受承安貞祐之傳故其詩清切俊邁足以振數百年之逺響㑭置諸中州之所編次其何能以辨公諱舉字用之號藏齋與父運副皆金進士家世源委所從來有据傳以永久孰曰不宜曹邦衡教授詩文序大江以南地為荆揚郡不過百十其言語風俗起居飲食之異邈不相近世方理文治而士大夫言詞章髙下復人人殊數十年來文益媮體益弊乗髙駕浮滑稽恣睢恍乎其不可結絜而至於道者不懼則憤遡源而論之葢方承平時師表日增士以其類至尊其所傳過於自守而樂凡近者尤矜矜然祕重不妄與一道徳而同風俗先王之教誠不若是也余嘗㑹文於同志反復力議而卒以自病廬山曹邦衡客京師三年矣閉門絃歌絶造請之跡顧屢察之而卒未之與議将行始示其詩文一編蒐竒粹精炳然而横陳列懸于簴擣珍于鼎聲味相屬而凌厲感悱盖将合律吕之變適酸鹹之宜者也夫不自是其是必有則於古守其私説不能以自廣將固且隘博以求之精以思之日遷而歲異當於是乎益今四海一國士之不可强為者猶跂而及文教之洽由是而一曹君勉乎哉往慎廼塗正轅而行其寧有不至者耶清容居士集卷二十一欽定四庫全書清容居士集卷二十二元袁桷撰序韓泗州老人詩序往八十年金蹙于汴盡汴民咸勝兵抗闘不得息聞其父老泣撫黄稚謂不幸生亂離使言承平時疑卒未見果承平耶余不得見得見也必若等也不十年而金亡乂四十年世祖一轍迹郡縣轉輸屯戍徭徴江以北悉撤省而汴為樂土今三十年矣私恠當時父老言合龜卜特不知得年者幾何人又不知得年而果伕樂者為何如人夫夀與富天不能並畀錙銖之較願與計莫以勝也大徳丙午韓泗州君美書來京師曰余家嚴君偕老于汴俱八十矣桷與泗州交㝡深官於吾鄉㝡久與之言文詞道政事切直近實今守於泗泗與汴水陸道相望甘㫖致問不絶汴總河南十數州得領公府事上汴奉觴跪行盡其私歡二老人方彊明艾和㳺戲閭里登坡陁極榛翳臨車飛礮動在耳眼嘗指而慨已而以喜而泗州又能清謹愷悌祝其神明以養其志慮休休焉不知其将耄古之所謂陶唐氏之民者於韓氏見之矣中都之士咸美而賦四明袁桷為之序張氏宗譜序宗以族言斯古也别以為宗記始也大宗非諸侯之制也居小宗而遺大宗自鄭氏大記之釋失之缺其大宗小宗乎何取然則曷為大宗也大宗之法不施於庶昆弟謂之别者大夫學士悉有宗也天子以國諸侯以封世守其祀莫敢為宗下于庶人而言宗焉遺其大宗不可也大夫士有常宗由大宗而為小宗小宗不可以承祖故分而言之小宗之嫡斯大宗矣此繼别之義也張氏之各得為宗也奈何張譜始於東平東平其大父善也東平之長子禮為豐縣丞豐縣東平之大宗也其季義居於東昌死復𦵏焉有子五人長曰叔温為髙沙屯官東昌之大宗也古者適於他國皆别為宗國一而地異别之義斯近矣張譜䡍於兵逆而數之首豐縣之禰悉張氏子孫更數十百年宗不能易也髙沙之禰居東昌合豐縣為小宗始髙沙為大宗宗各有别尊祖之道斯備矣張姓出于姬至周而氏著祖于韓其得望者十二曰襄陽洛陽河東始興馮翊吳郡平原清河河間中山曰魏曰蜀東平譜祖以上名不得而次合賢與貴侈而書之失近據逺譜其疑矣惟貴與賢不偕同也誠貴矣非賢不能傳使果賢邪雖弗貴焉可也張氏之先墓隤於河族厄于逃今若孫若曾咸曰别為始者猶邇也至東昌而復别何敢忘之太和之季叔恭敬父則曰為譜辨宗百世猶今也且昔之不幸吾猶慊恧焉噫敬父之心思而深肅肅然念其先敏儒以自持其興也於是乎在敬父今為宗正府左右司都事大徳丁未作亭于東昌之墓旁表曰宗會翰林學士廣平程公為之記太子文學魏郡元君復初系之以詩而俾余為譜史官袁桷述廬陵羅氏世譜序黄帝二十五宗距唐堯猶未逺世系昭穆混錯若不可考置而不論者謂其詳不可聞也禮莫詳於周展親别宗强本弱枝之慮品式備具不數百年難生於所親兵車日尋卒之顛覆僨絶何也其所以繼之者非其道也禮生於人情貴貴親親禮之大經繇貴而失親聖如周公猶不能以制宗法之不講所由來舊矣後漢鄭康成謂諸侯之别子為大宗自大夫士而下皆不當有由是常宗之法廢貴為王公其所以承攝者止於五世鄭氏之説誤也譜諜學廢姓氏殽雜獨孔氏子孫更數千百年厯厯可紀而姬氏享國八百餘祀秦漢之際已散䡍僅存後王盛衰抑無以議為矣或者謂孔子垂世立訓貴不以位故其所傳久逺然考諸傳記蠻夷小邦率一姓數十世噫立禮以辨位位尊而益争昔之聖人夫豈不知其有是哉消長之理相尋於無窮其不可詰者數存焉耳矣廬陵羅氏譜繇唐至今為世凡十有五為𣲖凡十有八旁行邪上如指諸掌合職方氏小史之記貴盛累葉者亦莫能並統宗合源一其所尚必有其道参差不齊物之理也先之以孝謹終之以卑讓黜爵貴徳雖百世可推也桷也公侯之子孫因羅氏之譜諜将有感夫昔時之興廢企焉若不及而終之以自勉者亦羅氏譜之微㫖也延祐丙辰八月史官袁桷序臨川危氏族譜序姓氏之學魏晉以下無稽焉歐陽子作宰相世系切切然将私其親然卒數世亡䡍是則凡言譜諜者缺之焉得矣氏族混於周之東遷祖以為氏猶之可也别族改氏因其官簿以相沿襲益繁多矣繇是為賜姓為缺文一氏而兩望同源而别𣲖至於推律觀物慕風嚮化雜然而前陳其避禍者託焉以自逃承宗繼絶漫不可考竄易傳㑹紛然莫能辯者數千百年皆是也宗法之不講所從來久謂百世不遷者徳如后稷也斯可矣后稷而不能則凡為吾徒者得無懼乎孟子有言曰君子之澤五世而斬均小人而言之何邪昔之親盡葢見于孟子然而私淑之道充孟子而能為之者吾於危氏之譜其殆庶幾矣夫逺而不可明者理之常也究其初以合乎貴賤貧富其心博其㫖微将使夫困者通盈者持危氏之盛循環無窮於是乎有考焉是矣維漳州大夫於桷曾大父樞宻越公同淳熙進士同一科同著作同為番陽文敏公之門人其弟南昌君族祖正肅公實銘其墓桷來京師族孫有成嘗曰兩家疇昔若是譜非子叙不可不幸有成卒其弟歸其骨于臨川遂不負其言而序之熊西玉文集序粤昔以經賦科進天下士有司崇尚日異辟雍居俊㳺尤為凖繩音節程度更創迭變雲翕影附各以其伎進拘者輙困躓不得上方是時蜚英溢行為時所推重連百州之地不能以什一數邈音聲之近絶師弟子之敬和筆繕扎傳誦不止其好慕實使之然也當咸淳初江以東言熊公焉余師剡源戴公言為同舍郎時學官始授題熊公據案瞪目鉤深摘微落筆澄澈理融意新蠶則績而珠纚屬也未幾失仕東歸沉𡨕簡編空林窮厓之怨横溢間發而安之有命不憤不悱猶昔日年壮意盛之所作擬諸於徳殆其微與噫陶唐氏之亡厯年滋多精深憂思愈逺愈在極周陵遅諸子相繼有作是則先王之澤不可以一日冺自漢而下殆無以議何則理不勝弊焉故爾夫弊不極不足以自振此强仁者之所宜知嘗聞公閉門盡心索六藝之藴以極逺紹後之學者是宜有考故不知其不能而申其説命序之者實壻張拱辰氏也陳元吉韻海序近世儒先以韻書首於江左其理未竟論者疑焉夫聲與韻文字之自然童歌巷語肇於唐虞旁叶偶傳與君臣賡歌相表裏非若今世拘拘然以清濁為髙下論也小學廢已久言六書皆本於許慎或者謂揚雄太𤣥竒字與許氏不合皆其私臆殊不知屈氏而下若司馬諸賦其不易解辨豈亦其所自製故昌黎韓子謂凡為文冝略識字則世所謂許學者茍趨省易實秦相斯之學也按魏李登始為聲韻増益衍廣實原七均七均之説成於江左江左之文綺而萎其於韻若法律為師條分目析錙銖之不可混也降於隋唐守其説而莫之變能變者宋惟吳棫氏今世所行唐韻博極羣籍之要見於其序而近世附益終莫能已噫學其果有止也邪眉山陳君元吉少以春秋試有司第一南極交廣以㳺夫幽兾之平衍搜竒尊聞包絡攟拾因韻以廣卒為是書名曰韻海班然而居編懸在庭各得其職雖第而輕重之同律吕也屬辭比事春秋之教殆猶其微與昔顔魯公為韻海鏡源集古今韻字凡三百餘卷識者謂其摭華撮要該於理著四庫散落不具而今也卒俟君以成合流納污愈逺愈清至於海者百川之功聚也敢誦所聞而因以序之鄆城馬節婦詩序詩始婦人先王盛時天地萬物之理推變審情者若是矣不幸而大故守中秉徳合於自然憂辱恐懼葢不能以相動也二南之化行於天下未及數百年陵夷變遷首於國君夫人聖人憂之錄於風雅書於春秋後有述作尤惓惓焉以致其意嗟夫乾坤之道相濟以成者也皇元一海宇累下詔郡縣孝子節婦按實旌植是謹鄆城王母其状曰馬氏年少喪夫養姑鞠子纎粟盡恩禮閫户循飭四十年終始不易由是鄉老言于州州上其事禮部繇是得加桓表焉桷待罪太史歲終常㑹以奏書然陳詩以觀史官之職也凡我同志什為詠歌先之以憂勤終之以燕樂足以見夫國家徳化之廣非止為王氏榮也豈不美歟長子質山東宣慰府掾季獻今為翰林院都事云蕭克有字序在昔先民理得於簡易其言動視聴之方不求合於禮而所謂禮者何其日用而不知也唐虞之際黎民時雍至於湯武出而禮益立於是升降揖讓以成其容為之珩璜以節其步武為之弁冕以嚴其首服黼黻有度尊彛有數温柔剛毅寛嚴張弛之教復品節而備具之噫可謂至矣世益衰而法益繁悉刑以防其情民之日不幸者非天之所與殊也俗媮而説龎教不足以勝靡然從上以自治其亦未知其本始焉者也周之衰諸子馳騁激於世者黜仁絶禮以自髙急於近功則皆苛迫峭刻益莫知其所措聖人政刑徳禮之論幾乎其息書曰臣人克有常憲解之者曰憲猶法也奉有其常者也民之初生淵乎其仁詩書禮樂造士之具也不由是而推奉法以為固有夏后氏之世吾誠知其不若是也廬陵蕭御史之子憲其師黄君字曰克有請其説於余詩曰天生蒸民有物有則克有之義備矣假於外以為常将失其所謂由己之道修其由己之道莫若乎禮故余先言其得於天者如是而復以學禮之説告袁氏舊書目序袁氏舊書目者目袁氏舊書之存于今者也始曾大父越公舉進士時貧不能得書書多乎抄强記至用髙祖妣齊國夫人魚魫冠學書後官中都凡二十有五年乃務置書以償宿昔所志其世所未有則從中祕書及故家傳録以歸於是書始備矣于時國家承平四方無兵革之虞多用文儒為牧守公私間暇撃鮮享醴㑹寮屬以校讎刻書為美績至於細民亦皆轉相模鋟以取衣食而閩之建蜀之益其最著者也紹定辛夘公自宥府歸里遂累土為堂貯所得書於東西榮公日處其中客至不復道世事顧嗜陳黄詩擇其適意者手書為編寓物詠歌與道㳺遨休休焉不知其年之将耄如是者七年而薨舊書之傳距于今四世矣桷㓜聞公從學正獻公時有手校九經旁説疑義皆附書左右最為精善欲從諸父一觀而未得又欲合諸父之藏分第為目録亦不果竊嘗謂天下之物聚多者終必散或者早計於未散則庶幾幸有一存之理遂悉藏於山中己丑之灾偕家人渡江以逃袁氏之書一夕而盡昔之預計者乃幸而獲全嗚呼此公之靈有以啓其衷也惟公以勤勞起家其書之傳不幸而不存固當歸之於數其幸而獲存者敢不襲藏心思而躬踐之以求無忘前人之意謹次其本始書以為舊書目序袁氏新書目序余少讀書有五失焉雅觀而無擇濫閲而少思其失也博而寡要攷古人之言行意常退縮不敢望其失也懦而無立纂録史籍之故實一未終而屢更端其失也勞而無成聞人之長唯恐不及将疾趨從之而輙出其後其失也欲速而過髙好學為文未能蓄其本經術隐奥茫乎其無所適從泛然而無所闗决是又失之甚者也夫為學之道用志不能不一用力不能不専農夫莽而廣種不如狹墾之為實也工人泛而雜學不如一藝之為精也往者書未模印時争傳冩授讀較余所藏之書不能十一而士以三年通一經其自得之實皆足以傳世垂後其視余之書多無成者豈古人所謂沃土無善民之説與往年春書燬于火偃仰草茇所失物不復追憶而於書獨不能忘懐已乃思前之五失一旦而悟将從事於内以求自得之實其年夏大人過故都復購遺闕篋載以歸意者斯文之富将過乎昔而余又思旁搜逺録侔夫昔日之藏矣噫年未至於壮其五失可以亟改也而古人之志余亦竊有慕焉用識吾過以為袁氏新書目序首文子方安南行記序始余讀載記帝王疆理不盡於衡山而虞書致日廼南極交州是則要荒不責其貢賦使者雖歲往返亡害也馬伏波議兵法與建武帝合勞民入於潦霧蚺蛇之地其得意自叙反不若賈君房建罷撃議時俗升降略地定功後王所尚者然與唐置安南都䕶府獻令鮮薄同羈縻州開元詔太史測天下晷交州為南履凖事與唐帝類不聞其有僭拒事也萌芽侈心承詔㫖以肆誅索一不得意而曰損國體者是誠盜臣也已世祖文武皇帝神幾洞察不加以兵而安南畏威不敢朝終五世削王爵以奉貢今天子即位頒正朔議遺使於是文君子方拜禮部郎中為使副以行辭命専達儀注品節唯子方是毗入其境不旬日卒致命以還稽諸往使五十年所未有也還都示予行記一編夫誦詩専對夫子之計也予於書獨有取焉宣上意儆有衆誓命焉有考山川導别表土俗以宜于民莫詳於貢書至若贊帝徳以傳示永久是非史官不能子方以論譔奉使事三者将兼而取之誠於詩書殆相表裏矣蠻荒首長俾知夫中國有人焉者其自子方始窮極珍麗媚上以營夫已者子方不知其説也是宜廣梓以告于後之使者云年月日袁桷序白季清母夫人受新封詩序春秋經錫命之制復王以品秩益展其追榮倣古則今至于是大備今皇帝嗣大厯服桷時在翰林得與議典章儀注僉曰勲爵古制以人子所居官褒崇之罔俾専美于前代定其格入奏皇帝曰可輕外重内非廣孝道視所居官咸大賚之詔下皆叩首望闕謝浙東元帥府都事白君湛即以其所宜封者為母盧夫人請于朝得封太原郡太君盧白皆中原望族盧以父詞鳴翰林白氏再世持雄辨清言氷雪繅藉聞者莫不興起若是者尤足以振耀也噫世之崛然因其夫與子蒙爵命者多矣未有若盧白之清望足以厭服于當代恃其世家白君之所不敢朝夕温凊陳白其所行事秉心以公張弛興革孰不曰是真世家彼夸詡者誠不足為兩家重也郡之儒士相率為歌詩以贊俾桷首為序泰定元年冬十有一月前史官袁桷書甬山集序文章與時為髙下誠哉是言也宋祚将亡國學考文其悲哀促急不能以一朝居四方翕然取則凌躐上第至今殘編斷牘讀之令人歎恨不己葢士生斯時能自抜以表見者不一二數有一人焉則又韜匿冲晦與世若不相接始予少時見三江李君在明于史塾其貌癯然其語汨然僅知其為長者也下世十餘年子汲以所為詩文十卷號甬山集相示貫穿籠絡悉本于五經之微㫖而優柔反覆羈而不怨曲而不倨藹然六義之懿宫商相宣各叶其體情至理盡守之以嚴無直致之失世之號能為詩文者率不過是較一時之輩流實居其最惜乎昔時之承接不足以知其萬一也維昔秉義公以盛徳燾裕世科聨踵今五傳矣論其詞章則擬於先世為有光汲能廣而傳之惠於吾鄉俾其子孫得以遵守豈不韙哉泰定二年冬十月袁桷序蓬萊閣詩序㑹稽為禹㑹諸侯之所自嬴政一登而其山川之勝迄兩漢孫吳莫不表章或者謂當是時征伐蠻粤為用武地而士大夫在朝廷簪筆執牘以奉天子之㳺宴顧安得從事於荆榛險絶以暢其耳目哉惟太史遷出於流落不偶以至而見於賦詠實自東晉始方王謝諸賢南徙渡江北望丘壟其悲離感愴不在於仕進故其意念殊絶搜竒抉幽樂天以俟命而㑹稽號為南鎮将騁懐以攄其所尚故今之言㳺山水實自㑹稽始繇是而降㳺者益廣而専牧守之任者得有而畢具矣元微之以觀察使鎮㑹稽所辟幕客皆知名士號為絶倡後人作為蓬萊閣葢取微之詩語唐宋鉅作悉刻于其上雲内王侯叔能父蒞是邦政簡訟平百廢俱飭復閣之舊廼曰昔之諸賢意必有在登斯閣也將見夫同寅之肅和寮宷之靖共飛觥撃壺以彷夫微之昔時之盛巖壑交暎神閑意消不苛刻以暇豫彼俗吏瑣瑣夫豈知是也哉同郡儒士合賦詩若干首桷與叔能同官于朝審平昔清静簡易之論於是乎見雖老尚能為之賦之泰定三年正月甲子清容居士四明袁桷序馬氏族譜序譜以逺言懼其非吾祖也以近言有悲吾之不得已也金徙于南衣冠故蔟扶挈僵仆十失其九者有焉百不得其一者有焉難甫定遺童孤兒想像先人之容儀音聲借得於髣髴推名諱至於祖則有能言者矣上而髙曾不復有能言矣余嘗攷夫譜諜之書秦漢以後牽强附㑹世表姓纂僅取其近侣作史者不得不爾凡為子孫者罔敢以是為傳信河陽馬氏葢皆昔時之望族今元帥公知夫髙曾以上之不可以譜遂斷自其可知者為之旁行側注官位名諱以明其始卒葬年月以慎其終用意𢎞逺将以期其子孫之日盛嗚呼百年之計莫先於徳徳愈種則見於後人者不俟而自至晉丞相王文獻公導渡江始立家譜不及三世而蕃衍盛大史不絶書馬公之意葢若是願相與勉乎哉則得之矣泰定二年七月乙夘前史官袁桷書鄭原善思親詩編序鄭君復初舉進士之嵗時維三月值其嚴君始生之朝作為歌詩而終之曰移云自兹其立志誠逺且大矣夫仕莫不榮其親仕貴矣所尚貴乎自立不爾則其於貴也乎何有故昔之學仕者必求夫大賢者之格言以佩服之若鄭君者䇿名未離乎都門超識逺抱先之以不苟若是余嘗於殿廬識之冲然其容介然其操審必能有異乎衆也暨余還里咸言其在官也竒衺不入於市貴俠不登於庭盡職而無所顧避是其所蓄足以行所願矣泰定元年秋八月同校文江浙始見其屬和者凡一編嗟夫古之果於正誼必寜夫親而為親者計其詘辱将與之同患難而不之避故載於史傳者不一鄭君之志見初筮敭厯既逺聲譽益振始信夫家庭之教在乎夙昔誠不在夫今日也因申其㫖而為之辭丙寅歲八月壬辰袁桷序周彦祥存樂堂詩序往者淮甸為南北要衝耕耨不足以盡其地力彌望數十里皆草屋星散髙下每歲春秋避兵輙土窘稻麥老稚潛匿叢薄中丁男健婦守舍相偵伺黄塵翳天猶能在旁近結集保䕶卒然有相接持梃箠盡力以抗其甚不幸者則皆係累長驅䘖車逐馬故凡淮民之家子不識其父弟不知其兄因循茍活慈孝恭敬施於家庭之懿者未能也吁誠可悲也夫世祖皇帝一海宇淮始為樂土今四十餘年昔之父老言昔時之事未嘗不先之以欷歔繼之以幸喜野無閒民而詩書庠序之教駸駸乎雍熙之盛廬江周君彦祥於是作堂以奉其二親而名曰存樂予嘗以為生乎今之世有幸不幸存於其間故其愈後者則愈樂而生乎其前者若彦祥之二親是也彦祥之奉親當補其昔時之不可致推彦祥之年亂離﨑嶇猶耳接而身受至其諸孫則蔑有知之者噫豈非愈後者則愈樂然則彦祥之心所以樂其父母昆弟者可勝道哉太學博士姚君為之記善為歌詩者将别為一編廼首為之序彦祥今為某官白鶴詩序泰定元年春二月有㫖醮於崇真萬夀宫特進宗師吳公主祠事越四日有白鶴三集雲中指殿前五日復至旭日晏温執事有恪皆承睫仰視一口賛慶士大夫各為歌詩以侈其異嘗聞禮儀神明之事莫嚴於精意而諸物之畢至良係乎聖徳之通感惟今天子踐祚之初詢賢考能歛福以錫庶民籲天請命實不私於已祠祭之事遵叙以行罔有偏好昔漢宣帝勵精圖治嚴蕆祠事時則有白鶴集于廟庭異代同符稽諸行事實過於彼而祝釐奉祀以承上天者罔敢暇逸吳公葢有之焉絶地天通昔之聖人将以止夫禨祥之説天人之際合於自然葢有不期然而然者不然詩書所稱其得而廢之與詩若干首遂為之序春臺詩序老氏之學以澹然無欲為至道故凡人之所同然者以激言以相反至於榮觀燕處其徒日廣其説則曰吾教必若是侈靡盛大浸淫於天下其言曰如登春臺彼嘗非而鄙之今考其所為若不相侣視其言者吾猶以為近古也延平余君惟熙於是取以為齋名焉昔之盛時淳厚給足充然樂其身非直為耳目之美觀日作夕息相安於閭里康衢之謡撃壤之歌其教易行也今海宇一轍户口田野休養蕃廡涵嚌聖澤庶幾時雍之治惟熙慕古於是乎得之矣理適乎中人情之同随物而遷者過也極枯槁禁制以為至樂矯然者也惟熙嘗為威茂安撫司僉事今屬國史府通敏守禮推命名之雅其将樂夫天年同衆以求用於世者與集賢大學士郭公大書其户冊朝之卿士咸為歌詩曹伯明文集序江西之文曰歐陽王曾以慶厯以來為正宗舉天下師之無異辭宋金分裂羣然師眉山公氣盛意新於科舉為尤宜至乾道淳熙江西諸賢别為宗𣲖竊取國䇿荘周之詞雜進語未畢而更事遽起而輟斷續鉤棘小者一二言長者數十言迎之莫能以窺其涯而荒唐變幻虎豹竦而魚龍雜也嗚呼三公之文其思厚以深其理精以正凌厲乎諸子貞元而下曾勃然不肯自讓後之人懼蹈襲之譏卒至於濫觴淪胥而莫能以救可勝恨哉大徳中桷與端明曹公之子伯明甫為翰林屬其為詩文如桑麻榖粟切於日用不求酸鹹苦澁以傷乎味之正篤實渾厚與其履踐見於事物者實相表裏夫行以為先言實次之言不勝不足以害道翕翕夸詡含譏以射人者猶懼其不解方手指其説曰吾意葢有在若是而罹于人禍者多矣伯明以親老再為編修官補外以去幾二十年來京師為文若干卷得而讀之其哀窮舉躓略枝葉之學㫪容雅馴以循夫規矩它不能以詬病也夫慕其輕浮而欲求侣於瑣瑣者伯明之所不忍抑有聞焉老而能學吾二人之所宜繼炳燭之勤願相與切瑳焉清容居士集卷二十二欽定四庫全書清容居士集卷二十三元袁桷撰序送鄧善之應聘序近世先達之士類言求進于京師者多羇困不偶煦煦道途間麻衣弊冠柔聲媚色無以動上意其言若諄切懇􅍁後進之士懐疑而不進百以十數然遇不遇命也而言若是則抱道自足者益無志於世而或者亦得以窺其介且固焉夫道成於同而弊於孤雲龍之相從風水之相應其理然也往歲余與巴西鄧君道所以嘗以為今世無是决矣吾徒當力學為已閉門息心耕六籍之圃溉根以茂實若古逸民髙士退静自樂其於道也無害方是時君家錢塘囂塵五達之衝意寂而體舒無造門囁嚅之勞下帷授書衿佩森立公卿貴人皆傾下愛慕獨君無少矜喜而去來朋徒各盡恩意以相周奉其有不可强猶謙挹慰藉人咸以為其未遇也已異夫褊心者之倫則其遇當不止若是今年春承徵将如京師告余以行余固喜夫人之所期者有驗而其行也復将有説焉君子之出也大言以行道者夸誣之流也相時而行守身於不辱謹徳避難貞白而無愧斯近之矣方今食太官衣御府亡慮數百擬之漢世為盛吾意秉義懐仁之徒道不相類若貢禹之經明行絜區區車馬之對亦若無可取者苟不以是進則其氣昌而愈完行周而無躓於得喪益無病矣夫處順者逆言莫能入嗜味者腊毒無終悔予與君疇昔相好無所隠思所贈之誼而宻以告焉送曹伯明序議者謂故家世官陽明精絜之氣極于簡冊溢于圭組盛衰消長始相尋為無端焉嗟夫豈誠有是理哉百尋之木上干雲霄盤礴惨舒履之而後至其風雨雪霜之變適其事㑹理之不可詰者誰得而辨而茍一時之得失以自詭吾未之信也士患不自知而卒病夫知者迄莫可究至於凌髙躐深惝怳疾進幸其安肆顛越而莫救則豈其父兄之過至不幸糜爛墜覆與世為始終者要未得以成敗論也廬山曹伯明官翰林十有二年始為編修官議當叙遷曰愚名居先願以讓秩再滿則又曰大夫人春秋髙願補邑以行吾知其盛衰消長之理炳于胷中確乎不能以易者也維昔從祖文簡公既老來朝翩然東歸位不充其徳未幾先正端明公敦知止之誼慷慨力去邈乎髙風趾媺不墜謙以居之仁以成之振世德之緒使議者之言不出乎口其自伯明始因其行序以識之送范徳機序四方士㳺京師則必囊筆楮飾賦詠以偵候于王公之門當不當良不論也審焉以求售若乗必駿食必稻足趼而腹果介然莫有所遭夫争藝以自進宜有不擇焉者心誠知之孰慙其非故幸得之則歸于能其不得之則歸于人惕然而自治吾木之見也臨江范徳機㳺于兹三年矣語焉簡然行焉恂然嗇其菁華韜焉以深視世之言文辭位貴重者靳靳不自表夫子曰道不同不相為謀范君誠審焉抑不可知使不可知則凡辱與㳺者責莫能以辭也君所為詩文幽絜而静深怨與不怨皆存乎天慨然南歸善治其學彌謹所徇使果擇士耶無以易矣譬之璞焉蓄極而光遇寜有不遂者乎惜其行解以俟之送周子敬序温與閩地犬牙相入俗秀而矜絜子弟勝衣能文詞父兄相與言命束装負書以行四方劘切感動約不有所就不復見故凡困于有司則適從諸公貴人職牋記劇談論翺㳺以自逞其横厲捷發者讀太公孫吳書櫜鞬轅門建功業萬里樂生重遷卒無所思其故土然視閩俗為最少噫弊成于過髙安其所常義不能以自勝恬不知改積數十年來蔑有以議亦固矣當咸淳間周子敬以治經㳺錢塘聲至士趨未幾而科舉絶來四明授業于嘗所知己南望數十驛每悒悒不自置罄囊槖以歸拜其家君焉得奉終于其家夫情合於中情至而不從者非罪也縱情而不返極其所從於理乎何有始於榮其親終於私其身漠然而不接兹惑滋甚視子敬之道得以愧矣子敬将終老于吾鄉棄其田廬畀于季弟以奉先人之祀今年夏季弟疾亟貧不能以行天台趙叔度官于温載與俱歸審其心於季弟友且怡也桷與之交最深慕其静安絶毫髮偽妄蒼然長身風雨一室無子弟佽助而清韻雅語舉觴晏如與之違寧無介然者乎今歸于家其耄者必曰當終樂於我此土也㓜者則曰先生老于行悉于事某聞某戒願執簡以受去魯之意吾未知所决也化民成俗之道必自上始因俗以徵其謬子敬其何遜敢俟而質諸送劉習卿序今之為守令者據文法以具事事弊而法具雖更百吏焉無易也事當而文不具一撓詰之齚舌無所對歲部使者入境吏曹取舊牘相考訂附益完善至名押善題署恣所補不復問使者坐所治决事搜擿十不得一二然皆毫末靡細於政體不相涉故稱能吏者或以苛察議噫徒法不足以致理任情而失實故先王為法以禁其過久而繁滋則審於治者簡而易之使不病焉斯可矣大徳丁未浙東西以饑告殍移日屬于道官㑹其數于郷将賑活之其不實者究焉鄉登名于縣縣審而始聞于郡郡以事至重闔郡寮以議其一以故不預則旬月以俟廼得達部使者部發使於鄉復詢察而周詳始定其議令如夫幸民之饑乗而弊焉者羣下之過也因其弊而持久之則民之死者日益甚法顧安得以救有司者之意夫豈不知是拘於文狃於故相安而不改其勢然也今年夏中書掾汴劉習卿御史府舉為浙右肅政從事習卿精敏簡廉與余議古今事嘗欲以無法為法其施張而品節之者必中理道至於條據辨析灼與繩墨脗合向宦江南洒然無俗吏意據鞍賦詩危坐終日一語不及律令今從事職掌號總所部為至重故余舉今之所急者以告俾毋汨於常而變通焉彼瑣瑣守文者又烏足與語是送祝道士南歸序世祖皇帝取江南首詔召龍虎山嗣漢天師掌其教或曰其父觀妙公嘗推天人之要教繇是尊元貞制書嘗言之今上即位歲以天夀節命使者祝香于兹山延祐四年天冠山道士祝君為祠官将行求予言以餞噫盛衰消長相尋為無窮禎祥之説儒者之所不道守經執中則必一其説以立教然而窮居巖穴之士精思據㑹其為書也幽明簡深由變察來使之黙焉以知畏将以定夫天下之象夫豈荒忽以眩於衆理有所不能逃焉者若是矣老子之學法於簡易陰陽闔闢必本於其身因身以及物故凡水旱疾癘必責其徒其徒則曰吾無為也何取是若是則其教之廢也久矣昔先正肅公守饒觀妙公始十四五以禜祭上章入静室正肅公嘗與之論天運環合之道觀妙公愀然有言曰公老不復見當在四十年以後于時族祖永州親聆其説亟言之龍虎由觀妙以興祝君多藝能沉静篤志其歸山中正辭永命予不能以告敢誦所聞願有以推究則世人之所深望将不憚煩豈若彼大言者飽食自嬉以無聞於後姑勉乎哉贈宣城汪澤民登第歸里序今世論道理詞章為二塗師道徳之説者毫分縷析派其近似而刪黜之其言博以約據㑹統宗謂一足以總萬也然懼其辭工而勝理則必直致近譬山林頽放諺俗之語皆於是乎取甚者金石著述勦其説而師倣之莫得有議焉者矣昔者夫子言行見記於門弟子簡絜精粹嘗並於五經初非有意於辭也謂不若是不足以有傳也性與天道不可得聞私獨怪近世學者参錯輩出過子貢十百倍将惟其所尚而然邪抑羣聖之道存於書涵泳濡嚌不期然而能者歟科舉廢己久今天子崇闡文治損益條制以興其賢能八表之士連軫結袂于然以來然而沿襲之弊相尋於無窮愛憎之説若不相似宣城汪君叔志首上于春官報罷以歸則曰吾學未至焉耳探幽闡微遂益治其業戊午歲復來京師擢乙科授同知平江州以歸則又曰仕優而益學斯可矣将行求余贈言以歸余固感夫二者之不相同也綴言以績文将以明理也理不自得剽襲以求之文益弊而理日益逺将焉以為凖興之以化成天下實自有司始操繩墨審程度有司盡之矣合八音以成律吕師曠猶難之噫有司之任其果能有同乎維昔端明公誥命擅天下制作具備集衆美之效也慶流雲仍叔志之踵傳科于今十世矣志専而氣昌異於凡近其異也必能以復古家世趾媺莫叔志若也故余以昔之有疑者告之而因以勉焉夏四月越袁桷序送吳成季歸省序噫吾徒來京師視成季有三愧焉居京師者不宜以塊處蓬蓬然結鞍整袂惜日以進其不能是者目以為固野成季則不然閉門展書視日蚤莫氷渟而川止也達公貴人語未脱口納柔奉佞千巧百詭成季獨正色指畫朗言某事未當至論天下休養大計龜灼繩直聴者唶舌方疾趨以行不勝其愧成季㓜為方外士常所置論必曰吾父母皆耆年矣惕焉不得以朝夕養而吾徒将捐棄尊愛荒塵敗屋啜蔬飯糲業官以為生如無所容歸若是者愧之大者也今年春承詔如南得省其親樂不能以已而懐愧者亦争道而交賛夫人之情於道不逺極其所騖而卒莫之救化之者不足以導歟将人事之未思不復以致此歟唐之陽城語若鄙近薫然而歸養者凡數十人何則機使之然也儒於道最髙力不勝其弊則成季之出處吾當疾馳焉從而慕之整轅於四達之衢斯得矣又何愧焉因其行序以侈之送達兼善祠祭山川序古之為使者亦難矣哉存撫省聘諭言語協辭令必盡其誼嫚有致辱之道焉情則媮簡則侮約而有常敬以成禮斯其為使者之事矣然此特平世而言之也飛矢旁午國懸於三寸之舌操機以析明輕重推情偽定議於瞬息使不亦重乎哉奉天子命持節萬里外懾之而莫屈而因事専對宣威布徳函首入覲非夫勇智超絶不足致此厯千百年數人而已矣吾嘗觀夫列國諸臣禮以定儀言以叙志結禬執玉若合符節而其諷諭陳白足以截其矯泰蔑有敗事非强辭以言是其夙昔之所素備夫子之言曰専對不能其警夫四方之使與皇元一海宇偏陬逺島蹙縮候賔館無事於使者而歲以祠祭使望於山川分道四出其為使也若甚易至治三年集賢修撰達君兼善以使由恒山濟源東南上于㑹稽吾於兼善有言焉恒山古真定地也二河交流濁漳貫其旁郡縣築防歲不得息或言有運河在焉民居墊蕩冝詢其俗而條紀之濟源在懐州懐河南地相接昔之括地興賦民不勝其害河流靡常空灘遺磧墾殖以自肥者其誰與㑹稽杭相襟帶粟帛絲布丹漆綺繡之作倍於他郡竒衺夸誕故都之習不能以革獨㑹稽山水秀朗民朴案業往承大饑荒壟彌望猶不能盡耕昔有逸民戴安道賀知章其故家曰王謝能有若斯人者冝表而出之悉䟽歸以俟明天子之清問則得之矣因其行故序以告之送曾㢲堂南歸序景定中樞宻東陽馬公帥臨安先子職酒正入幕府于時廬陵御史曾公相後先佩鳴纓彯剖吏牘若破竹俱欲以功業自致運數合一兩家子弟東西數千里過庭入塾志同業同而僕適先為史院屬㑹御史仲子於京師年富志鋭屢䇿焉以儆不能止也皇慶承徵入翰林復㑹季子焉氣清貌謙不為汲汲計嘗曰仕以傳世岌然以取誚誠不敢平進以求而猶曰未宜吾有不甘焉今為應奉文字論者始歛口葢其為文敏而新其待人周以和夫孰曰不宜春三月謁告盡室以歸求言以處桷曰今居顯榮清宻者凛凛不自置名至矣文不能以稱文不能以稱造物之所不畀於是乎有覆絶之憂焉􅂱然以興萎然随之是則得者失之兆君何憾焉桷官翰林踰二十年老不戒止念之至者滋以懼将歸故山究五經之藴為書以蘄逺文詞之任老不能以進炳燭之勤願相與勉焉泰定元年三月四明袁桷序贈崔兵部序髙句麗崔君耐卿往督征税於京師不私其餘以進于官既又懼為後來者之莫繼焉則慊然曰吾豈為奉上之罪人哉復疏以告于上曰事適然願勿以為程數噫崔君仁矣哉今世善言利者督括虚籍峻鞭朴以求媚嘗諰諰以告吾所居官能贏餘以自效當升夫資秩相率以效朘削日廣而其徒争不肯自置其猥闒者則攘臂以取不顧利害其弊有不可勝言者今崔君兩得之不希于公不病于民絜矩之道至而儆夫在位者皆得以同是道也崔君往為内史府官見天子于王邸大器異之今即位首拜兵部員外郎兵曹之事多於昔飛符調發水陸之需頃刻在立辦寛則事不能以濟稍苛急民之病有甚於専征之弊崔君推昔日之心明以核之仁以怒之政績之著有踰於昔将步武日躋廣經濟之志不愆於素守桷也願拭目以觀因志其美以俟焉泰定元年三月癸夘四明袁桷序送王叔能守㑹稽序桷與北京王叔能交幾二十年其贊行省於江浙也盡心而不苛合上下之情婉而且加詳焉弗亟以邀美弗因以逞志執政宜之寮寀服之至治元年丞相慎選左司之熟於政體者叔能在選為都事英宗皇帝更庶政除前相所行不便事下詔天下命御史臺樞宻翰林集賢集議桷時得預末席叔能首言江南兩税已定復增賈區銀賦賈無常居賦重即逋逃今徵額籍具使無能輸将併於主户主户既主徭役是徭役之外别有銀賦将不勝其害羣公以為然新詔既下取首建議為多古之善言利者莫先於劉晏晏所行不至急刻而晏迄不善後是興利為害身本也躁於求進卒之自唐以來如晏者皆無以自保吁可無懼哉叔能世居燕比而樂於江南於江南厭其囂煩而樂於山川屢丐補於外宰輔察其志奏守㑹稽㑹稽王謝之所居泉石清美有不可勝道逸少安石經世素藴託丘壑以自負葢深取而有擬也昔之陳迹按行而搜摭之舉觴以酹其訪於民俗也不察其毛疵事至而應無欲以自化将見獄空訟息少者避於道老者㳺於衢撃壤以歌沐太平之治郡守之賢必以王公為第一矣因其行序以祝之贈孟久夫南臺掾序世嘗病夫儒與吏其道不同卒莫有一其説者為吏者曰法定於後王微忽不可以相混也徵調出入官簿淺深不可以踰越也童而師之猶不能以盡今儒者之説急於所緩髙而迂滯而踈卒一遇焉吾深知其莫能成事矣儒者則曰法有不忍人之意也審官别人制用有常沾沾然迎好以刻意非為治之本也然而為儒者莫有以見於用間嘗用之其肯綮節脉融貫昭晢之理疑有所滯而益得以藉口吁是誠難矣今天子崇尚儒術立進士科昔之舉茂才者咸試吏以盡其材智憲府舉按守令閭閻纎粟令式髙下日接于耳目果勤而敏修若視鑑焉瞭其妍醜無有逃遁於是儒吏之一倣自今始吏部從事孟君久夫以茂才舉者也兩屬于司憲復辟御史府矜抑自将盡其亷隅入吏部朝夕謹曹事人莫有識其面遇事守令甲不踰越旁暢曲就藹然猶守儒素吾知足以有用於世矣未幾江南御史臺復辟為掾将行袁桷告之曰御史臺職諸道黜陟歲終㑹事以亷直舉者不能得一二人黜者何多陟者恒寡激奨之道豈上有所未備邪守法而不變視其成牘惻然以求仁善人之用心非隳法以為直也州縣賢否孟君嘗知之矣執中以權使無偏焉亦儒者之説也故重之以言崔君都事餞行詩序今之言賛畫者以摭拾為能羣吏抱成牘入幕府一不可意輙曠日相持不决由是揣摩迎合弊有不勝言者矣昔人之善吏治事决於頃刻理定於造次安于其自然人莫能有以為非者心出乎公也海右師府事號最簡其治於民者七郡之守令係焉寓於軍旅總戎夫長之職任焉今而曰某事所行吾将諭之以從我又曰吾不能坐視其利病更謁迭請繇是有撓政侵官之譏雖不面議退而悉數其長短者皆是也夫其職在於奉行先之以更張上所增疑而下益得以議是殆昧於守官之道矣大名崔君義甫之為都事也未明攬衣坐署執筆無滯礙其不便者白於長官從大府以行一介之卒不入於所𨽻敦厚侃侃守正以自律其紿之者謝不與較養恬藏智閭巷之人不知崔君之賛帥府三歲解去而其不知者始曰詎不知崔君無囑託於州縣吾是以不知今而曰知殆惜其去而願後來者之與崔君同也噫功利增羡人所願學每率得竒禍而猶接踵不悟視崔君所為其果有悔乎郡之文士相率為歌詩以餞桷遂為之序贈陳太初序戰國之士以雄辨長説㳺諸侯立致卿相故其髙自譽道無所顧藉雖困躓有不肯悔揣摩相師遺言成編今七十二子之書皆足以為㳺之具也漢世尊尚黄老㳺士屏息武帝開絶域於萬里外㳺者復至盡其足之所厯圖冩險阨立功效能以其荒怪異物輸于地圖而口舌之學悉廢與戰國之㳺有異矣南北分裂㳺不越其國㳺之效不能以著唐立科舉各挾䇿自奮窮山水之勝履危陟幽則皆其羇窮不遇之所為見於詠歌盖不以為利達富貴也若是則㳺之道幾廢矣宋承唐舊巖居逸士見於聘徵㳺者益恥至於季年下第不偶者輙為篇章以謁藩府京淮閩廣旁午道路數十年不歸子弟不識其面目囊金輦粟求筦庫之職以自活視前之㳺戛戛然難相並矣世祖皇帝大一海宇招徠四方㑭盡計畫以自效雖誕謬無所罪㳺復廣於昔敝裘破履袖其囊封卒空言無當以其無所罪也合類以進省署禁闥駢肩攀縁卒無所成就余嘗入禮部預考其長短十不得一将遏其㳺以喻之㳺者訖不悟朝廷固未嘗抜一人以勸使果抜一人将傾南北之士老於㳺而不止也今㳺之最夥者莫如江西其拙㳺者惟浙東浙之東天台以能㳺稱四明之士不著於㳺録餘五郡間一見之括蒼陳太初壮歲能詞章得濟勝之理西適錢塘復來四明以其藝㳺公卿多深奨之業儒以為本復挾能以自張其寧有不遇者故余厯言㳺者之幸不幸太初之㳺夫豈若是然哉生之髙祖容州府君與先樞宻越公同為淳熙進士於其行得盡其言且命二子為歌詩以餞送俞教授囘里序吾郡教官繇至元丙子以來見於題名者亡慮數十人皆得而接識之其通於綜核者善移易故籍結熟郡守鉗士口不得發歲時表章經説疑義卒假耆舊以陰助誦聲寥寥講授不立不復以師道自任繇是諸生之亡賴者挾短長以剽竊廩稍而貴騃之子弟恃其可侮益得以恣睢有終歲不入于學宫極於弊壊而勸學之詔屢下為虚文矣始余以為吾郡惟然後官京師見教官選于吏部凡數百人罷老不勝任十居其六若吾郡之弊十有三其俊秀博習則皆為館閣掄選各得以自見而所謂若人者十僅居其一焉噫考昔時得人必在教官今不如昔或者謂入仕之門必慎其始故今之為教官不三考已致其事尚何能兾其惠淑之益哉合吾郡之教官得一人焉曰天台吳君宗彦吳以牋記㳺公卿其文辭亦闗絡合時用去三十餘年復得一人焉曰永嘉俞君希魯用中父其屬筆纚麗若錦機然五采彰而文宻也其行温然其容粹然聴其言若飲醇酎而愈恭也論理而不泛取友而不雜余交於俞君不一年而知其所為若是惜吾郡之後進習於故常不能以請業於其行序以餞之為歌詩凡若干併見于後送陳山長序郡博士而下其尊且専者莫若書院數十年來朱文公之説行祠宇徧東南各以四書為標凖毫杪擿抉於其所不必疑者而疑之口誦心臆孩提之童皆大言以欺世故其用功少而取效近禮樂政刑之本興衰治亂之迹茫不能以知纍纍冠綬礙於銓部老死下僚卒莫能以自見良有以也蘭亭有書院自東平王侯始右軍之學非止於一藝也經綸憂世寜不仕焉以見其志審勢陳害瞭然指掌非善於謀國者不能也語必堯舜髙自譽道卒至變易紛擾而莫可救視右軍之行事誠何如哉参政清敏陳公之曾孫鑑翁為長于蘭亭求余以言家世之正學不能以告憫夫世之通弊知長于彼者考右軍之傳倣其所言陳白于太守太守王侯通達國體求儒以自近君有言其寧有不遭乎送蔡府尹歸里序郡守之任亦重矣視其精神為之折衝御扶一不加意吏挾以侮民逞以姦故其食息嘗内省外顧非智與力兩全者不能也朝廷察為仕者之有病於吾民也於是著致事令而其罷軟昏眊不待年而具者朝廷亦不能以限之也余官京師見有請于廟堂自陳其剛强矍鑠雖不之許察其意猶有觖望噫羞惡是非人皆有之若是果何如哉濟寧蔡侯茂先之守於四明也屢引年以請于上考其年猶未至也既而曰吾宜休而不得謝可若何遂移疾家居踰三月始告于其同官及嘗所往來曰吾具舟江滸将行矣於是咸驚且誦曰蔡侯之來民實不知戢其竒哀返于雍熙不苛不黷歲則大熟俟復于所再命作牧自余歸里中數聆其議論明而通相時以行無矯激之過也保其身若是人孰得以議審侯之進退将以為不知止之勸聞于天朝其寧使夫終老于里閭則其去也葢抑将以有進也文學之士是宜為歌詩以餞遂首為辭泰定二年九月丙寅郡人前史官袁桷序送閔思齊調閩府序閩郡縣蓄産饒給仕於彼者咸曰可善更葢其疆理與京師相逺浙為要衝貢賦考工之役使者督責亡虚月而閩獨以絺繡為勞視若重任較二浙為十一耳閩浙二帥府府史更迭受任然後以閩地烟瘴蒙犯少優其歲月隴西閔君思齊繇浙東更於閩則曰不然九州分設唐虞之制也今皇元以仁武函諸夏卉裳重譯罔不臣服幅員倍古限南北取士非上意也立賢無方是則世祖之明訓而凡吾徒之居於南者稍得致通顯輒言財用掇竒禍或言刑法致深文根株排連牢不可破守正修己悉不復自達矣桷曰珠玉藴于山淵採擇者必之夫絶域是寜有逺邇耶世祖皇帝遣使徵聘必先夫江南歲月既逺聞者益荒見者益俠彼區區售技自獻者實不與昔時並思齊敏不自夸百受而不撓精於琴知急焉不足以知操縵将緩以求深懼其為孱緩也考其中聲按抑止泊澹兮若無營激兮若有感是則於政事文學法理於此盡矣蔑有加矣桷老矣遲君之還猶能皷南風之絃歌明月之篇其果有合乎泰定三年秋七月清容居士袁桷序送薛景詢教授常熟序泰定元年吾里進士上南宫曰薛君景詢程君時叔史君車父三人者皆故宦家所居皆在城東志同道同聲聞同意其厯階以陞比肩而袂接也未幾獨景詢下第于時余編試殿廬景詢不以咎而余獨恨景詢之不果遭也天子新即位推龍飛恩授常熟教授以歸将之官求言以導其行抑嘗考隋唐選舉之法不久即弊今夫所謂經義者以知行體用而鈴約之不中不逺經説萃于一家按其形模而脱􅜘焉不敢以自異也有司守固陋而程式之千士一律欲求其總核同異㑹衆美以合乎至論不可得矣賦貴於鋪揚因雕蟲之譏而以理致為長屈宋兩漢之作誠不若是之易也至於考晁董之對則方諸近作有不待辨而明者自設科取士桷未嘗不預議焉嚴以取之則近於隘俛以售之則鄰於率心恧焉以不釋薛君較藝於京師誠知其有幸不幸操車於四達之衢險阻曲直惟御是審則淑於是州者必有其道吾将見褎然秀出者推是州為首是則薛君之教也清容居士集卷二十三欽定四庫全書清容居士集卷二十四元袁桷撰序李慶長御史餞行序昔之公卿貴人居處要地言語出口足為世重輕也故希進之士聮袂接屨望塵伺色日若有所不足者其勢然也登用更迭一旦謝去則引結儔類議其短長甚者旁及其子弟姻黨得者未報其不得者常忿誹若是則毁譽之説固不足以為誠然矣大徳癸卯桷以太史屬事承㫖閻先生於翰林先生色莊慎許可待院屬必面質其長質之而猶以為疑也卒詢於嘗往還以考其詞學焉桷入院五日先生召堂上曰子能為制誥乎桷謝不敏頃之出片紙令試制草即具藁以進閱一月將登車輙命撰廟學詔如漢詔今體冬十月大㑹院屬令擬進五朝實録表桷得預擬焉先生始察而奬之即署為應奉文字間以事詣門下甥壻却立奉唯諾不敢仰視庭肅然也夫爭名者羣進速化之道莫易於自獻為之上者審焉而彌詳則其怨謗也實多久而議定必視其取士當不當固可考也先生壻隴西李慶長館于公有年矣朝舉優老之制為高唐州同知以便侍養先生下世議者之口始曰先生己矣繼之者其果有能近之者歟慶長之仕不急於進方墾田樹桑以裕其衣食翰林追先生之徳舉以為佐未幾臺徴為西臺御史桷始曰先生去國與殁幾一紀翰林追思其壻焉誠不亡矣臺糾天下士之清濁銖考而始用之慶長之平昔可見矣始為得人賀而終以見夫先生之行事焉則桷也亦竊有榮也已矣歌詩以光其行者皆朝紳桷以舊好不讓而為之序平章政事王公歸省魯公餞行詩序延祐六年平章政事王公居中書三年矣每奏事輙請于上曰臣疲懦不稱臣父年過八袠陛下赦其愚俾遂終養臣不任大願請踰四五不允後有詔曰宜官其子本郡以侍祖父公卒謝不敢冬十月皇太子受玉冊詔示中外始以其子某傳詔歸東平因省魯公焉魯公往歲嘗對詔使具奏曰臣齒髪未脱落願以弱息盡力事陛下公之雍容廟堂魯公之志也然公歲數請不置十有二月辛未始出允㫖公拜手稽首望闗謝翌日蓐食策馬遂行公卿大夫設祖席門外至則無及矣迺遣使者傳㫖以内醖精幣錫魯公猗歟盛哉桷嘗聞之君臣際㑹終始之道難矣昔之大臣一斥而不復者往往見於傳記今公之在位也精白自持卑讓若不足超然逺去詎捨國以自全也粤若稽古明王求忠臣於孝子之門吾知公之在家也閭里往還益知夫守令之賢否其不便於民者熟詢而究論之四方之使乘傳入驛將修容門下水旱盜賊之原財榖徴役之害虚心以求筆于簡牘歲時附奏益以彰畎畆不忘之忠而魯公方精彊遨嬉充然孺子之色或徹于上聽出處之道是皆不能有以豫計也維今聖天子孝治隆古昔一時廷臣生榮其親不一二數鋪揚詠歌詞林之職也遂各為歌詩庸敢不讓而首序焉瑞芝亭賦詠序昔之聖人建中和之本畜四靈以為應焉麟鳳則其儀龜龍效其文修火之利以制五穀養其太初壹情性以齊形色四方不同而養生送死莫敢有異焉者教使之然也中古而降道徳不能以一而昔之所睹悉以為異表章鋪揚圖記所載不常有於動植遂名之曰瑞焉繇是眩幽抉奇之士棄所服食吸空制景烹冶飛伏卒枯槁無所成就甚者則曰吾治法有未盡吁可哀也矣延祐五年中和夏真人明適承詔祝祠上清宮精一不懈竣事憩館于崇真院松竹交列覩厥墳壤擢莖而光玉質鏐章瑩然以敷咸曰是芝也誠為瑞稽圖徴史復曰無以異遂積竹為亭以落之迺曰繄吾道祖之應焉耳矣鏗鏘舂容攄藻獻秀筆爭綴而簡爭續也余讀而歎曰頌聲之變基於魯登高能賦始之以洋溢終之以託寓其理然也神農書定芝為上品神仙家服之云可得上夀蜿蜒清淑之氣嘗閟而不發地非愛其寶待其人而始彰也維今開府大宗師張公際休明之運陟降帝所幾五十年子孫繼承罔敢暇豫是芝之瑞吾見耄期稱道益莊而愈完表于山中夫豈榮觀之美挹其粹和道充氣腴異日駕青牛之車歸返故山撫芝一笑則其為瑞也畢矣願叙以為徴夀樂堂詩序延祐乙卯季夏桷乘驛留杭間則與友人泛舟一游葛嶺諸山穿幽入窮嘉木叢柳鬱然上下而相望也遂遵其蹊以升其坡陁有堂巋址粗完而不華冊其顔曰夀樂羣峰蜿蜒水光相屬前挹左舞顧登其堂而異之客曰此容齋李公習靜之所非所謂臺榭苑囿之觀也且昔之翬翼而侈者於公乎何取世有專鍾鼎之貴其得意盛時未嘗不寓興於山林泉石之清美疲精竭資彷象其舊游卒不知其所造今斯堂也不專乎構築不勞乎藝植心領於物外其得乎湖山者是幾有道之士也于時李公領元帥之符于海右桷復以間歸里因得覧茲堂之勝公笑且言曰土木之夸吾深鄙之洛陽名園多矣擅名專美於後世今何人哉夫動靜交養迺成其性錢唐諸山水渟泄起伏大者為盛衰小者為榮辱有得乎是則視兹堂之樸簡其㫖深矣至人之心如珠在淵樂之至者終身而不厭取諸在外非有損於内也願與爾邦之士率為歌詩而子序之退不得讓遂以昔之聞見者次以為之序送彭道士侍親詩序范文正公守番更定學宮咸言嗣是番為衣冠聚未幾彭尚書舉進士第一正直朝署為呉楚間領袖其弟忠毅公不幸守城身死二忠易名見於宋史作史者深有感焉嘉定初先正獻公越公俱在著作庭深言朱墨史避忌而宣政實録為魯諱時宰尼之後六十餘年皇元大一綂宋故家子孫變滅凘盡獨忠毅公裔孫南陽作而曰吾宜游於方外矣其道祖位秩視三公於視聴也尊且榮起處也不貸假以自貶嗣師呉公方藻思瑰識將樂其同而進之況於親者乎未踰年則曰詎宜久京師居母氏春秋高歸以奉則庶幾幸不墜矣將行且丐叙其情桷於是深有愧焉忠孝秉彛皇極之訓中古肇分重華是著更秦暴强而死節謹書踰千百年迄不能一二數獨於彭氏見之歌詩者寧得以辭也送文子方使安南序安南繇秦漢以來内郡縣世祖神武皇帝取宋荆揚益三州之全土大一綂東踞高句麗西度流沙金山王業之基不知紀極坐朝按圖指銖黍地曰兹南交州乎得不為武寧能以中國民甘心而係頸之遂俾成要荒之禮以歸蠻夷多疑其子常稱病不至禮謹㑹同尤嚴於錫命故其自署表曰世子臣某其所以容受而畏慴者實在是新天子即位更元曰至治遣使詔諭故事必遣近臣為之又擇能文辭通達國體者以貳之於是僉曰翰林修撰文君子方有使才實可任迺名上于天子而許之遂増秩為禮部郎中以行將行其友袁桷曰往使者鄱陽李侍郎思衍薊丘李侍郎衍天台陳郎中李河間李侍郎京皆得與交交人言鄱陽清介質直不絶口聞其俗善憸巧館餼供帳故不如法俟詰讓始成禮入其境也必迂途請野或謝以病緩歲月始迎春氣萌達黄霧苦雨然後拜使者而送焉其狙詐率類此而不知者常逞夸肆豪以受多言之羞昔讀左氏傳見列國諸臣取詩斷章以成好焉簡而明易而且和信由於𠂻而禮以辨之也故夫子之言曰雖多亦奚以為列國之臣得之矣況於朝廷乎又嘗聞李公言使者入境詰其館人一草木名字之微必聞於世子翌曰涉筆始具對蠻陬逺人設施周密若是無它焉懼削其土也交州之土産道里見地記而昔之入貢者又皆淺薄不足取於其不知者寜缺如也子方以余言為然乎若夫周折之宜守經以揚文徳則必曰天子仁聖明達萬里外子方優言之是則余無以告矣送程士安官南康序朝清望官曰翰林曰國子監職誥令授經籍必遴選焉始命獨東平之士什居六七或曰洙泗先聖之遺澤也誠宜然又曰其浸汪洋渟伏昔東諸侯闡興文儒飛矢交集絃歌之聲不輟於􅓺序有自來矣桷向為翰林屬所與交多東平他郡僅二三焉若南士則猶夫稊米矣士樂得所依連彚以進各以其所向上有以挽之下有以承之勢使之然也程君士安則不然程君魯士也獨游夫江之南幾四十年詢其先友則皆在上位者不獲於上豈程君之藝有未至焉者與嘗得其詩詞讀之視其同郡之仕於朝者亦殆相佀其大過人者誠顯矣而視與程君同者則誠枉而不逢者焉少仕於南御史臺後為吾里元帥府掾强貴者衊之卒得白而程君亦年以浸老今年司南康理曹以還嗟夫類聚以方士患不得之既得之則不宜以遺佚隨聲媚容置之良是矣才焉而不遇則在上者寧得以辭其責焉因其行叙以慰之夫子曰不怨天不尤人則亦曰有命焉耳矣咸為詩章凡若干首送陳景仁調官雲南序至治元年中書省選集賢都事陳君景仁調雲南官簿將行謂袁桷曰吾與子交久子寜無一言以贈乎於是有言曰在昔世祖皇帝寧一海宇幅員袤廣凡為仕者力不能以自達于京師故歲必遣朝廷望官即其地如選部注授焉省之逺者曰湖廣曰江西福建曰雲南其最逺莫如雲南故自三品而下皆得除擬奏而後出命視他省為最重其受任使者非清慎明正不足以當之維世祖繇壬子入吐蕃破䝉段二姓宋金所不能臣至是踰三百年始定神武偉著時則有若賽公稱合上意羈縻而綏撫者厥有攸治夫以蠻䝤之俗俾安其素習誠不在於煩促苛削也因其民風而俾之為官長者子孫不越於其境則安而簡易矣邊隙之生所從來久出於長民之貪黷殿最莫嚴於考課循歲月以善解視其成牘則調是官者雖離婁之明將何以辨之哉厥今御史循行郡縣察採是不而坐驛頃刻促具食上馬懼夫事之填委將終歲不能以盡也今之為遷調者居于是邦雍容詠歌得覽其山川詢其阨塞仕焉而己者入閭以問之其隱而在下者詳延以博詢之則仕於彼之士吾將瞭焉胷臆而示諸掌矣不然拾級循叙朱墨之職一介吏足以辦何假於陳君乎陳君清不近名慎而有守明足以養其厚正無失於過舉若是則足當其選矣余將奚言焉是宜率為歌詩以迓其歸送李溉之致祠山川序甚矣夫幅員嘗不能以合也五方之俗惟不能以合故地氣各乖於一偏昔之赫然以綂率之者嚴於方嶽望瀆海之為帝所由來久矣必皆致祀焉夫山澤通氣騰降蟠際卒之以立民食豈以它故哉在昔盛時惟漢唐近古能徧至而遵行之然而巫祝之祕或鄰於方士其餘偏方分裂帝號尊襲車輪馬跡南北不相踵接僑立望祭神弗顧格責之以一風俗成時雍者亦難矣世祖皇帝以仁武英叡成大一綂考先代祀典曰兹職方氏登載實萬姓重事遂歲遣從臣捧香幣各分道四出郡縣祗恪候驛謹絜視他使者為有加粤昔唐虞黜陟成於四岳昔之善使者不專於所命水旱疾病承制以便利之令守職如守法非儒者不足以語而生事者不保惜復將有以病焉抑難矣至治二年集賢都事李君溉之承詔首北嶽遵濟源轉北海終㑹稽焉以登其於行也將見夫挈瓢囊以就食者焉又將見夫餐餼之不給於適館者焉踰於大江東南之民外侈内枵罷於不作不役而歌臺暖榭心目飛蕩以貽無窮之害若是者不能以悉言矣溉之明國體所歴彫瘼願悉疏以白于執政若夫悲愉駭慕深林危徑矢於言辭而使夫人傳誦者於其歸也桷雖還里尚能叙而廣之郭子昭淮南亷司經歴餞行詩序淮南地廣袤昔號用武故其勁悍伉率遇事嫌曲輙私剖決以直不復上官府水有菱芡魚蟹之富平陸則兔鹿馳逐飛鳧鳴鴈䕃翳陂澤網獵凡食不丐假於外事簡而易治夫以易治而强治則變易不安曹相之治天下豈不用其心哉則亦曰煩擾非所先也余嘗過淮南道繇肅政府日未午官吏上馬去故視他道為最優汝寧郭子昭今為其幕長焉子昭之吏事不拘文以求苛者也若釃渠於川順其自然激射穿齧不能以逆水之性學優而辭工將考其山川詢其廢興抉搜幽奇悉出於翰墨廣陵有儒丈人曰王公逢原文甚古臨川王荆公敬企之願求其書以廣於四方今四海乂平將化其齗齗褒衣長襜使與計吏偕是則子昭之教在所急也為歌詩者俾余首為叙王正臣浙東亷司經歴餞行詩序朝廷置亷訪司總司曰監司曰使其屬有三每歲循行不與止受其成牘議輕重職簡且尊視聴黜陟專於一郡而所部他郡不復考故其毁譽常若不及或者病焉權莫重於循行今之言者曰歲五六月録囚秋七八月出司明年春還司所歴有程限疲精於某所則足跡不能盡於是有料簡之法焉民懷其寃卒無以自白相率以告於總治宜矜其情而許之矣議者則曰是在於行部侵越則事繁事繁則竂寀不相協安於平素守官以自全者為善計矣夫行部之寄為最重泛常以治之民不勝其病告于其上卒拒之以辭使一振舉之則歲之分治將悉心以究是它郡之事悉總於我謂專於一郡者非知言者也聊城王正臣以内臺掾出為浙東幕長通達治體守儒善斷今監司馬公嘗鎮江西諸郡皆嚴憚之是能知總制之道輔之以正臣事可立具浙東民俗簡易春温冬嚴相濟以須吾知其足以振采於一道於其行序以告之且率能歌詩者以餞焉送朱君美序許文正公定學制悉取資朱文公至仁宗皇帝集羣儒定貢舉法五經皆本建安書蔡氏為文公門人而春秋傳則正字胡公之從父文定公師友授受宗于一門㑹于一郡至若訓䝉士正史絯庋積筆録悉師于文公何其盛也夷考地圖閩粤繇秦漢始通今九州之地非不廣而道徳師表不敢有異於文公者繇文正公獨建大議而聖天子有以成之也今之為議者則曰南士淺薄不足取又曰其文學論議與中原大異夫行事必本於經考成均之法惟文公是師而南士獨有背何耶余嘗入議者之室其服食器用由南以來者頗若愜所好其無迺貴物而賤士與識患於不𢎞黨患於過偏自昔創業之君合一海㝢必取遐陬荒域之士以自近輔維昔世祖皇帝能知之選取盖可稽也文公五世孫煒君美以宸㫖入國學議者亦若不滿然以其所受學皆文公也視其子孫少假之今以書考之法出仕將行求余以言念昔先正獻公與文公俱以偽學坐禁錮政治更新善類彚進文公書大行於東南今六合一家文公之學行於天下矣士能通其學者其寜有固執之弊桷官京師踰二十年見昔時諸老津津於南士者甚衆考其異同其亦南士之不如昔耶其亦異者之不如於羣公邪君美以世濟令徳將見於蒞民經術政事余不能以告故歴南北好惡而知吾文公之道千萬世南北不能以易也送陳道士歸龍虎山序往歲見福唐張君見獨扵京師貌清氣完語簡而意消察其退靜泊然無求者也山中之人曰張君居室靚邃滋蘭藝松藏善本書盈庋督教其弟子恂恂卑讓見之者必知為其徒也至治元年嗣天師入覲君死且十年侍劒印者曰陳某初一見之甚佀吾張君也問之則曰亦福唐人也閩為儒林經典釋文陸公徳明所校定天下遵守莫敢異夫閩昔為荒陬言語不合於中土六經表章旁及諸子繇唐世始定而獨取於閩何邪九州之士未始以南北限陸公書積六七百年而不廢則其疑息而無可議者矣今則曰揚以南為蠻夷吾不知其何所自也其亦有所激也歟余將有言焉而末之能也嘗聞龍虎山尊崇吾聖人書絃誦之聲接於兩廡往銘空山雷君其於書若饑之於五穀朝暮不敢棄故其門人樹立偉著推張君蓄書之心觀陳子之甚佀知其刻厲寧能以中畫也邪兩京雄富夫既身履而目受之豪勁厖錯可夸可愕接於歌謠風氣之盛必將矢言沈深以鳴夫太平身安道充必不戚戚以求外也老子嘗曰無為無不為國之本也願歸以究之異日詢咨以承專美於前者將有繼矣勉乎哉事豫則備若然則其寜有不能者邪凡我同志宜為詩以餞送劉生歸鄉試序漢五經各立博士唐兼以詞賦取士至宋廢置不一然各精其能者始得為主司五經難以兼而詞賦號為淺且難以淺且難而兼五經孔鄭復生不能為也科舉廢既久先皇帝慨然崇文酌損為進士條制今將十年巖居谷隱習其學者家傳而户授其蕪拙而宜黜者主司之任也余嘗預考進士于禮部鄉貢而來者盖疑之而不敢有汰也汰則徳傷而體損繇江以南求試于外省多至八千餘人司繩墨者其無迺失於銓考與抑亦以其耳目聞見之不接者而疑之與以昔賢之所難而兼之其於任也實重古學之不講于今有年矣卒然加士林之上冒焉以承不咎于己而曰試者之未至故取之常合其譾薄進于禮部禮部不得已足其數觀其所取者則咎禮部之未至禮部諉受其責吾知夫八千之士功深而學優者詎不大有遺者矣廣信劉生任時來京師試入國學將叙次佐胄子講誦今歸省其母試于鄉生敏于文從余游焉厄人事不能以悉告霅有牟成父先生於羣經有攷而為書者也於詞學父師之所授充然而炳鏘然而和東南西蜀􅌸以有及也生負笈而問之若登泰山瞠乎有失矣使先生不以耄老辭則東南之士類于禮部者將㧞頴以進生蓋亦有得矣勉之哉仰高倡酬詩卷序今年春房山高公彦敬歸休于舊隱夏五月延陵呉君成季首為歌詩以致其懷賢之思於是次于其後者凡十餘人矣獨清河張侯與成季復肆奇逞敏纚纚用韻不輟筆未脱手語未終舌而兩家使者各踵户限故其飛籌急置如督餉道於劒閣棧道之險也角形擇利如薄虎象於蒐狩之野也風恬而水湧欲挂席而爭進也弓良而矢直欲並發而連的也至於夸豪競富金張之靡崇愷之侈焉噫何其至多若是也古之言倡酬者曰元白其次莫若皮陸彼皆因其事物之偶然有合於風雲泉石之清適故麗者流於情羇者鄰於怨而今也因房山之賢有以興其思復因其思以發其所養異夫逐物而忘已者多矣房山筆精墨潤澹然丘壑日見於游藝此詩之作其所以惓惓不忘者難與俗子語姑以見夫思賢之心在於寛閒自得之後不在於爵禄有列之時也詩成凡若干首云送陳仲剛序昔之職文墨議論者必擇其瑰逸俊磊以自近唯取其才焉才與徳不相並或者譏之謂徳不勝不足以為君子也今有番陽陳仲剛焉其言恂恂其度謹且循於事也不欲察其是否見一善焉不知其為矯且詐也翕而譽之人議之我且直之其不善也人議之則曰彼豈誠不善也將訓迪之俾有以悛之嗚呼是則人誰有議焉者矣黨同惡異以其類至鼎臠之遺酒食之失足以亡其國而廢其身可勝道哉吁是則有可憫者矣余向為史屬見南士焉執案牘者刻若法吏其滑稽跅弛不善避忌酒酣大言無所顧吾深憂之未幾而陳仲剛亦受其讒以去仲剛之失在不能以自斷彼之言者一無犯何慘也今朝廷下詔蒐舉遺逸仲剛可以仕矣而復以守資歴者不在是限遂以外郡校官補之始得為教授老至而濡滯彼獨何心哉喜怒以害天下之士莫嚴於後漢之季盛時清明孰敢少肆其毒不十年間今皆凘盡無在可歎也已可哀也已仲剛調湖廣將行于以悼其窮亦以激其有自立文辭之素能者不敢以告勉之哉陳彦恂餞行詩後序士之為吏病飭於内而騖於外者多矣飭乎内者無赫赫之功而亦不足以取仕騖於外者自處善士之目率先得大官厚禄故仕而臨民雖百里之邑其勢亦足以動衆智亦足以防口凡所居官將解印綬必諷諭能為文章者書刻其政績方古循吏殆未愜意間有不肯操筆輙威脅罪誅閭里耆艾爭相效承長縑巨軸聮衢表道先出郊餞祖語嘖嘖不自已迨其去官猶視彼黜陟為廢置而士不幸為師儒之官者則不能是盖其秩最卑勢最下其行事不能以致衆方苟度歲月以冀脱去故來也無聞去也無迹而儒者之道愈缺然矣噫先王致治之效必本於學校之興廢而謂其道不足以致譽以自棄者則過矣且譽果可以致而得哉余父友陳君以越博士歸于家三年將調官行邁越之鄉大夫以及博士弟子詠述遺愛致詞于家詩凡若干首同里之姻黨異郡之交友爭歎美贊誦詩亦凡若干首而天台胡公復叙昔日輿人之意圭璋交輝金石迭響殊績細行指掌畢具斯亦偉矣夫不求而自至者非媚也歲久而名益彰者非强也彼勞甚而無聞者非過也庸叙其言期以信于後敢繫于篇末云送洽師歸呉序四明學行於浙東西而南湖延慶寺實尊者闡繹之遺址陳忠肅公原觀想而為之記甲於東南至嘉定中史忠獻傾意營繕莊嚴妙密學子林立運逢壞空不四十年兩遭燬厄寺缺主者僉以為石泉洽公宜主是席至之日除榛削礫一以己任而四明罹旱疫之灾信者靡替施者莫能迺慨然曰吾故呉産也呉多信士凡頽垣廢址吾徒一詣其門輙金帛踵至高者矗雲霄樸者絢丹碧崇信生于心斥其餘財以貽浮屠氏非有所利益也嘗聞洽公化行呉中所至傾接盖以能靜止息之道廣為譬釋夫安於給足而哀樂喜怒為其營役則聞洽公之説者孰不開朗故其欣然以輸肅然以接夫豈聲音笑貌之傾動嗟夫露臺百金十家之産而大雄氏以側布為未足化其吝心非大言不足以警若是則是行也見其稇載以歸不日以就罔俾忠獻專美於前而忠肅之學願竊有取焉清容居士集巻二十四欽定四庫全書清容居士集巻二十五元袁桷撰碑獻州交河縣先聖廟碑尊聖人而親之有為廟之道焉廟也者享之以寧其神者也氣行于太虚莫窮其神天地日月星辰久而不息者也聖人之道與天地並而其炳然立言品節備具則猶夫日月星辰也人生則有死渙而復之亦必有道著其思以立其誠焄蒿悽愴没世而不忘故立廟之制親盡而祧祧而壇墠其愈逺者情不得而推也自唐以來祖立先聖廟天下郡縣皆以上丁致祭升降迎享有佀夫宗廟而復琢範土木象其神明故其廟也有堂無廂重屋四阿具體而制簡禮縁人情敬生於其心其從來也久則今之為廟者不得而廢矣夫子嘗曰祭神如神在神無在無不在有其誠斯知神矣獻州交河縣舊有廟學廟狹庳不足展事皇慶元年王君某為縣主簿治事之隙日率胥徒入學以受講迺與其令長僚屬勸士民出其贏財廣新孔子廟越明年十月告成維昔獻王纂輯古文補正六藝今州以是得名儒術之士宜為歌詩以侈厥美於是鄉大夫刑部員外郎葉蘇君俾志經始且請之以詩詩曰兩河舒舒民迄奠居理政孰先學廬是圖禮殿弗度墉棟庳穿我究我環築營燥堅嗟爾士子康色以喜出粟載車以相胥宇松栢甓石維鐡丹碧翼然崇崇聿完有恤王君之始民不知至暨來釁成其徒烝烝仰止獻徳胙土啟國絶續闡微維聖是則聖有載籍徳修靡忒毋辨以夸毋質而阿洋洋在庭若聞厥聲視而新宮以淑以繩獻州交河縣三皇廟碑司馬氏作史記斷自五帝世之言三皇者著天地人之説而强名之孔安國序書以伏羲神農黄帝為三皇或者疑焉晉皇甫謐述帝王世紀謂八卦之畫切於人身水火升降得以有象百病之理得以有類神農黄帝設五穀藥石為生民本謐之論是殆謂醫家者流而專言之也唐天寶禮官定議尊古帝祀三皇適與謐合皇元啟運詔天下郡縣立醫學因奉三皇以廟春秋謹祠之昔人有言曰庖犧神農順天之性育之者也黄帝除民之害救之者也乾坤之道合變以成民用之而不知象而示之凡所以各得其正者也誠在中矣宮居粒食順形色之正將以養而安之忘其和平紊其所之疾疢生焉博施濟衆堯舜猶不能以全其功則夫三聖人者法施於人而祀之誠宜也皇慶元年保定王君來主交河縣簿三月朔日有事于三皇敝垣蕪壇虚位望祀拜伏瞬息而禮以成告顧瞻惕若謀於令長語于若屬曰象設弗嚴其何以肅衆神道設教其㑹通之道也迺即其址廣而崇之削荒黜幽楹甓嚴密資鳩於民役成於工相胥以勸而莫知其勞為鏹三萬有贏其用之不給者悉輔而足之明年殿成三聖峩峩有嚴有飭遂落而祀之維我世祖皇帝神武不殺混合寰宇憂民之不全其天崇祀廣法俾尊其道術幸已厚矣不幸或罹于非辜此誠牧民者之責餘何咎焉民有與言交河之政有匿其婦而誣其姑者維我王君迹而推之婦姑以完盜狂攻刦吏隱之使緩王君之至越境斯得嗟夫六氣之流行夀夭不齊上之人尤惓惓然拯閔之而不至䧟而攘之則其為疾沴災旱者吾不知其何心也王君為政若是桷職在太史紀成宇而附書之奉化州三皇廟碑馬侯為州急先崇儒建尊經閣成作而曰學無田曷足養士表圭田租勵之於是鄉之儒合言兹實吾黨耻鄉校日毁青衿賦焉館粲有加士子知教盍助田以成侯志侯復曰先賢遺則惠養存殁規曷敢湮廢正籍端本耻格貪戢於是始言曰噫世祖皇帝行仁肇邦萬世永憲今獲守兹土疾沴不治黎民何辜迺建三皇殿初殿在廢觀址後徙寺旁庳隘弗稱詢圖考初厥地爽亢遂廣土而興之百柱翼成萬瓦鱗比厚者致泉力者輸役官不出賦而巋然光尊耆老贊企願紀其建立以彰侯績抑嘗聞庖犧闡極人居其中靈根湛純萬化是生坎離致用窮夫隂陽之機夀夭不齊彼實戕竊維大聖憂之樹藝五穀輔之以醫藥剛柔燥濕各施諸用神農之功也因其厚生迄於傷生以憫以原為之經問教之以知懼使各盡性命之道則夫黄帝之功詎少矣哉三聖炳著尊祀肇唐皇甫謐之論合於醫説道不虚矣為作樂章俾歌以祀表侯於無窮侯名驥徳字致逺官奉議大夫明爽幹飭吏民畏而愛焉是役也州之官咸佐之鄉老皇甫簡董役訖成前門九楹廊廡齋序二十八楹講堂五楹禮器備充圍繚丹堊咸曰美哉歌曰判鴻濛精一中八方圓握以通稽聖作逆不逢神之游雲霓從嗟彭殤曷恣縱簡差差指厥蹤𤣥籥啟人喬松煌煌大聖萬世功天昭昭日月星變化周純粹精木石土金盪至靈飛走食物各受令一日屢蘇民迺修齡覽九州雲泠泠是州秀淑守著能牲具肥酒齊馨日出作晦宴息守厥故常民用不極何顛僨自傷縱恣作慝帝有憂筆載籍目視毫釐脉寸尺智者驚保厥徳雲龍之髯杳無跡祀靡斁千萬億衢州重修三皇廟碑混沌既判民生之用日滋制器創物首於三聖詳見於宣尼之繫易儒者皓首棼莫能以究周外史掌三皇書秦厄既盡而其遺言間見於諸子可得而考者惟醫家者流見之天經時訓書禮之準也察其循環考其氣運不悉是不足以言醫之本也至於推萬化之原别九州之宜調神嗇精按摩導引湯液炮炙無一不究地利土膏率有合於農書之説若是者其繁且難有甚於吾儒則凡為醫者良不易言也小司馬作三皇本紀其精約不出於大傳而荒誕不稽悉得以訾病史遷之不作良有以也伏羲神農之書見於易黄帝書具在有依髣而為之者亦不失本㫖自唐肇建三皇祠世祖皇帝遵舊令遍祠州郡推仁濟衆比合前聖泰定元年夏三衢郡侯赫斯趙侯仲禮僉曰天子神聖不殺稱上意俾洽于羣生莫若立醫學於是與府判官定住君勸糾于其徒爭輸幣以助不三月殿以成告繪象有嚴禮器畢具惠民有廬校官有居閱明年亷訪副使真定白侯鐸邦謁廟學首肯口贊且割官沙田為畆若干以奉時祭咸願刻石以著永逺繫以詩曰大素絪緼品物類分經緯五行濟用立勲茫茫開元通幽合神炳諸典墳是究是勤盪摩三光區别九土沮洳晦冥或折或沮潤澤滲漉順而居處正陽昭晰以保純嘏有簡斯彰翫覈纂組民用不知其仁如天大帝述明播于垓埏春臺以登鴻澤日宣嘉穗合畆采鱗游川俾絶癘疵享其大年三衢之宮伊侯所築濟濟者徒愓若奉玉研精韋編以介藎穀侯云去矣祝彼千禄我庸作詩相祀是肅饒州安仁縣柳侯廟碑古昔祈報之禮得行於州黨閭里民神相通禦捍於無形厥有常祀一有水旱疾癘為其所憑依者尤卓然偉著五行之精成於太素摩盪轇轕主宰以名國有典禮莫得而僭維神依人以行實有姓字烈山氏之柱共工之勾龍周之先后稷死為其主後人擇其功徳之高者代而承之噫積虚以為氣氣散以為變居隂假陽人鬼之化行則凡今之列于祀典者皆本于是皇朝列聖下制詔以通幽潛遺徳著功表見郡國雖數千百年皆尊顯崇祀至大二年崇文𢎞道𤣥徳真人呉全節䝉被殊遇推榮其親退伏自念昔為孩提黨禜族酺從我父兄觴而祝之繄神是賴神之闡微肇唐咸通至宋宣和以來由侯以王肸蠁休嘉鄉大夫湯中炳志于祠下矣今歲時阜康神靈熈熈祥風甘雨莫窮其微犬牙接壤咸稱神效願上其事于禮部全節敢稽首集賢敷奏天子以昭神惠秋七月武宗皇帝御朝封顯靈溥惠沖祐真君命詞臣宣制而褒錫之是嵗真人歸至安仁縣以制書授神及饒國公饒國夫人吏士再拜呉氏長幼亦再拜禮成還風交雷挾雨來應安仁之人咸言曰明有禮樂幽有鬼神孝以揚之誠以昭之兹邑之美一舉而兼備孝生於心神之相之孰使之然哉縣長吏將刻神制書于祠真人屬為記按舊記真君姓柳名敬徳迺為作迎享送神詞三章以廣民思詞曰結𤣥雲兮文虬的容與兮山椒光晶熒兮横流帝皷導兮前驅山之阿兮神居迎羣睇兮與留儼素容兮絜貞佩泠音兮始停筍席兮翠遭棘匕兮紫搖露零零兮隕珠嘉薦湛兮以陶揮上牲兮吸秀芝巫揚廷兮靈之娭靈娭兮心降日簡兮益康日懸車兮松冥千童慘兮控軿鼓坎坎兮輪砰恍欲去兮心不寧神居兮山承宇汝居兮山下神詎去兮愁汝執𤣥徳兮歴九疑超無為兮終焉以歸徐州吕梁神廟碑神禹水功龍門吕梁惟最艱聖人述書隱而不言懼荒恠以汨真也陟于上帝受圖于河其事偉著豈誣也哉余宦京師過今吕梁者焉春水盛壯湍石瀰漫不復辨左迴右激舟檣林立擊鼓集壯稚循崖側足負綆相進挽又募習水者專刺櫂水涸則巖崿畢露流沫懸水轉為回淵束為飛泉頃刻不謹敗露立見故凡舟至是必禱于神神固靈矣夫集誠以致神靈繇衆成往之自信不惑者猶感悼自恐則今之所謂禄利奔走而不息寧得無歉于其中也邪昔世祖皇帝征南絶淮夢神扈蹕以行詔所至立䕶國祠吕梁故祠相傳歲已久此邦之人因其湍險復増重之繇是南北之舟至于祠下必禱焉彭城𨽻歸徳太守田君以事謁祠下肅瞻有加迺命立石以侈神績於是鄉之耆老鄭安仁復廣其廟基象設密嚴棟宇軒靚薦酹登降嚴飭有秩遂介總管錢塘姚君具圖狀願刻其事于石余待罪太史觀前代職方神祠徐州有廟曰孚濟曰顯濟皆曰龍神吕梁信天下竒險處也非神孰尸非龍孰居嶽瀆有祠不以姓氏著吕梁為河下流奔赴南海一息千里昔之神受令神禹顯微無常代謝上下隨運以化則今之神猶古之神也皇朝一四海貢輸金珠綺繒犀象水土精翫之物悉出東南舳艫相銜晝夜不絶道必繇徐州神司其職訖罔敢替怠依神以行相戒無虞神任匪輕矣迺作詩曰首河崑崙厥行靡恒或伏而舒或迅以凌在昔堯帝孟門震騰授禹以圖百神罔不承九野既疏沇水渾渾挾河以行北東斯奔積鐡懸壁怒雷赴川如霤斯注如蛟斯騫自涯刋山訖達其源河既南矣帝迹眇漫赫赫世祖威神耀天爰率貢琛萬桅盤旋引梯從繩以登以升耄歌稚和鼛皷受聴櫂夫佐前水師試命曰吾神是依捨神則病駢駢士子亦有商女爰集宇下釃酒致祀金龍蜿蜒以肖起止導其棘流如席如砥此邦之人仰神之來昻昻石松雲旂離離匪惟護之將永綏之山川出雲古言祠之崇堂豐堵耆老相宇戒而呌囂毋作神侮拾級有叙勿黷貨以沮神告萬年天子受祜奉化州開河碑奉化諸溪至龍潭畢㑹汪洋衍滙陂塘澗溝合流赴資國紆行凡六十里始達于江嵗霖雨不時溪江相迎上下交射漫流田堤或漂民廬舎昔之為政者懼焉於是築埭善坊潦至則泄旱則潴以灌輸繇資國埭注市橋循三山為廣平湖凡言湖通畎澮也湖之下有斗門必嚴其水則至是通鄭家滛古有隂溝或為滛溝皆取以達水今言滛名之省聲之訛也溪至是循明山稍折為揚橋水以折始善行將達江復限之為縣門曰進林曰常浦又益限之以埭曰車耆提閼有程則水旱不病今之善吏治者挈挈奉公上不自保政不能及此廣平馬侯驥徳至州曰皇元陞江南縣為州實租户口户繁租瘠何以稱綏惠田疇蕪闢兹惟殿最首吾視兹土抑溝洫漫滅以害吾民邪遂窮上源首資國耆老咸言市橋達車耆有故河往宋舟楫聮絡今趨江以行驚駭濤浪商賈不赴而市用益匱濬廣復舊則民其有瘳遂遵市橋至陳橋具畚鍤表深廣未及終日而遺石斷絶皆舊蹟儼著至何家埭或曰是郡乘不登積為豪民利水至是當行何障固焉於是次隄仆石埭復置卒守水門亦如之易資國埭為水明别立小柵以謹通塞廣平増斗門志舊有贍卒租亦復之於是昔之言紆行六十里皆得舟行以達于江矣史遷作河渠書能吏所紀廑一二數謝太傅守淮南水利博濟則自方之以召伯謝公偉功迄不廢馬侯之政良近矣迺係以詩俾勿墜詩曰閔閔汙萊舉趾厥艱婦饁子任火墾水芟相彼高下粤昔廡蕃有隄相之有泉養之崩奔交來設險以防彼防弗亟時其雨暘謀于在野集作㑹節低昻疏儲究爾墜遏饕强恣專訖孰俾是罰馬侯自南宣承皇風相攸以圖鞠草茂豐耆父交謁兹焉商功千鍤剖壤頽堤赴壑宛其遺基白石鑿鑿復常彌堅匪夸以丕作泉流湯湯隂洩陽潴江流馬奔懼而舒徐千帆縈紆入于市區河既復址侯斯戾止嘉穀羨穰甘棠薿薿維河之新告來者勿替碑隂凡大工役必資僚屬長官某同知某判官某吏目某實僉贊之州民之耆長大家某等歴考舊蹟且佐厥役吏奉令曰某等董工庀程州之南復有梁家灘闕碶戚家溪悉濬治之足溉田萬畆開河績最著庸附碑右以見侯政小者亦若是許州衡君去思碑至元初詔議立五事為牧民根本後數歲憂其有不奉行者輙總覈敦厲又時遣重臣循行以振植之大徳七年分命宣撫使糾嚴黜陟多罷所居官獨未聞有治行第一入徴為謀議邇臣者使者以功狀上丞相府府下東曹掾掾守法謂事任固當是束狀入書庋不復省繇是註墨抵𤯝歲率常書于憲部夫法不足以成政先王馭臣必先之以序爵其不幸而奪廢之者誠不忍於人也民為天下本郡縣守令常長於民民病其長嵗有所黜率天下之民常不善其長民獨何心哉余每過通邑大府碑首高下表植衢道讀其行事無一不皆古循吏而焯焯在人耳目又若相反甚者謂懼其威使而以媚夫人之為也俗媮而日艱濟之以淺薄之論上益以不信則是守令考課蹈視襲常安所從超越哉皇慶癸丑秋七月天子遣御史分察天下牧民賢否咸屏息俟命國子助教許昌趙君師顔言衡大夫氏守許賢解官三年矣其承大夫者亦已去過時而政存可以登紀子職在太史不溢美不希謟宜表石以昭永毋固辭桷謝不敢則又曰余叔父亷訪公師表河南置論少許可言大夫賢無異語誠不憚書衡大夫事第以州里嫌故遂雅屬子桷始謝不辭於是退以其郡士劉君廷瑞耆長郝守寧之狀摭而叙曰大夫為州質靜無亢異視民利害黙計而成除之州賦户二百歲久亡絶無所徴别輸他民以逭責民莫敢訴許為要衝遞馬户率多逃去竟三歲以民籍户四十二代之户代而民籍徭調如故大夫請于官而悉除之厚風俗敦尚孝讓考漢魏塚墓若陳太丘而下立鄉賢堂以祀于學復構廊宇以庥諸生而使之竟業臨潁縣有鄧艾口故地河南檄大夫按視將屯之大夫署筆曰鄧艾故屯繇魏下千餘歲未嘗復今有民若干耕其地墳壟居室環地左右一旦官墾闢大不便願俾民以已耕田歲入官賦猶屯田也河南是其議民往謝之大夫曰吾職也何謝為今世揭揭然以商𣙜為仕進路使大夫廣屯穀多得十萬石顯要可立致不忍數百民命為俑許人之思大夫宜社而祝之相與望其儀于天朝以徳我許人者日永久迺繫之以詩以篤不忘大夫名佐字君用廣平人詩曰瞻彼具茨英英其雲不稷不稌粤維邦君邦君之來我民不聞曰秋而嘗曰春而耘木之巃嵸維侯之宅侯轡在掌言戾于學有挈有任亦丱其角亦飲其醑言攷耆耄潁川之流其下黍稌嗟余逺祖及我鰥寡是播是蓻曷余敢震侮潁水之湄戢戢其牛利言鼔簧將復其陂陂云當復云誰之來邦君痡痡維衡大夫大夫言邁匪愠斯怒有翬者居有墳者墓咎匪我執言遵其所陂既完矣大夫旋矣熟而豚肩進其粲矣曰我不敢嘗爾歸爾鄉墓門之栢烏飛彭彭中田之廬椅桐稜稜云昔不如今永歌以康侯歸其組三載云逺許民之思復日以旦侯車在東彼從如龍侯車偃里誰為之朋有弁斯緌大庭團團瘁躬在公匪食其餐式昭去思攻珉以䥴嗣初維終慎永我傳華嚴寺碑太祖皇帝肇定區夏視居庸以北為内地户族散處皆安其簡易在憲宗皇帝時將有事西南底慎舊章建置靡遑時則世祖皇帝治軍和林相厥地利曰維灤陽展親㑹朝兹為道里得中稽衆契龜僉告允吉因城而名之曰開平焉歲在庚申世祖承大厯服建國改元削僭靖亂宗王殊邦奉貢效牽咸㑹同于開平繇是定為上都大興為大都兩京之制協於古昔矣省方有常庶職攸叙商旅子來置而勿征首建廟學乾艮二隅立二佛寺曰乾元曰龍光華嚴復立老子宫於東西化俗警䝉相須以成具訓淵逺將垂憲永以為民則仁宗皇帝在東宮如華嚴惕然永思粤維皇祖置慮𢎞廓建都功業弗克崇闡紹聞是我子孫不大彰顯爰命守臣臣某撤而廣之踰十年將成仁宗陟方繼天體道敬文仁武大昭孝皇帝北巡狩回上都首幸華嚴寺曰列聖在天神化合一朕罔敢有替述修聖明將於是有在廣植冥福神御周流宜得以届止其以先帝所構殿鎮于後維五方佛像在世祖時素有感異復廣大殿以居之梵相東西挾翼以從凡尊事棲息悉如其教以備又别賜呉田百頃安食其衆至治三年夏六月丁卯丞相入宿衞上都留守司同知臣某傳㫖命翰林宜為碑紀其成績俾萬姓䝉祉庶得以昭朕奉思臣桷竊㠯為天地生物無心以成維聖人有憂則曰物有不齊皇極是訓大雄氏則亦曰性本至善遷以隨欲欲由妄生性日益昏故為物為變至於摩盪轇轕生死靡分於是有懴解之説焉有追崇之説焉使生得以斷死得以離則本性湛空無有垢累道奚病矣華嚴設辭以富貴為喻終之以返真復初俾世之所景慕由境以入因境而悟入於無相其於喻也深有㫖矣世祖命名亦將以警夫迷俗愍濟羣動與前聖相合者實在是聖聖繼承靡有銖異臣桷屢從屬車聞首主是山者曰至温師以妙密縝緻為本行傳宗洞山與太保劉文貞公秉忠為方外交磊落有大計因得見世祖於潛邸陳對明朗遂大器之六傳曰惟夀今授司徒際遇隆赫於法祖有光夀能文辭守其道專固則永㠯傳謹再拜稽首為之銘曰於赫世祖武緯文經廣莫相攸堅墉斯城鑒觀羣生厥性有恒驕鷙忿鬭失常是行沈昵昏惑執妄是成維政與徳具訓以儆善本性初為明為靜猗與覺皇功始戒定或喻㠯空或設㠯境空解境悟真慧永證輝煌華嚴窮珍極瑰龍伏藻井雲疑瑤臺積香浮浮側瓴枚枚耄稚畢觀心掉膽摧相既永離虚空如埃世祖稽古是則是效暨于仁皇益闡乘教維皇御極承志廣孝曰列聖在天鴻績靡報顧瞻咨嗟展飾殊妙錫福兆民列聖之心拯彼大迷覺皇具陳謨烈顯承如歲之春物無癘疵膏熈沐淳億萬卜年刻銘堅珉興福頭陀院碑興福院在都城保大坊北院既成其主僧尼捨塵以其狀來謁曰捨塵王姓膠州即墨人也家世素奉佛今之言佛教有三禪以喻空教以顯實律則攝其威儀禁妄絶非鼎立以陳融㑹莫究惟頭陀教吾佛宣演形色自然汨其紛華而悲惱集焉外守或懈内持益離參而範之將釋諸塵以成安樂若是者誠有端緒矣教始於西竺盛於齊梁皇元建國今其教凡十傳捨塵始與其徒劉普照誓志游京師刻意問道日唯一食精嚴自牧以勞役為調伏菲薄為精進草茇安寄束身堅忍至元中今平章政事王公毅樞密副使呉公珪福建宣慰使李公果見而異之始買今院地至大徳某年平章政事賈公某邇院居審拾塵積行無退意遂與其夫人林氏引見于皇后下教出財帛建其殿曰慈尊俾開府知院月魯公暨賈公奏其事於皇帝皇太后咸曰可其悉以皇后私府輸助之延祐五年院告成復奉宸㫖禁護而掌其教者錫名清修妙行以褒美之是役也齋庖廡室皆捨塵所鳩建嘗謂釋氏之説福田利益姑警誘盲騃若曰離愛辭榮非感物而動者也真性虚湛奚假於外則其説近矣詞曰粤昔能仁蟬蜕侈華絪緼泰始雪霜勵磨厥性眇微五采眩訶毁形壞衣其儀不頗空假廣陳蕩恣斯病佩規帶衡迄莫内省兹惟艱哉爰參以竟惱繇樂積煩以欲騁除彼垢紛曰執中無競女徳效坤靜於鴻濛維大雄是師頭陀是宗人憫厥勞熈然以充善士曰來格于羣公三宮清穆昭事孔肅鑒觀宇縣作極錫福夸榮逐魂是究是度秉持法權俾民不黷伊教之興泊然纘承千甓固室百礎栱楹式尊其初匪維誕矜戒爾後人戰兢永寧清容居士集巻二十五欽定四庫全書清容居士集巻二十六元袁桷撰神道碑銘武義將軍梁公神道碑梁公諱禎字用之大名元城人父金吾公千為大名兵馬都總管既卒長子汴襲職㑹用兵江南復籍新軍别擇將家子統領中書樞密二府議以汴兼領公􅏌然曰兵事至重寧能使吾兄獨受責邪禎宜行死國效命弗辭也二府壯之攝授以新軍千夫長俾鎮睢州帥領兵將渡河攻宋將夏貴迎戰遂領所部分擊斬首若干級帥上功狀拜為真中統三年李璮叛攝本軍帥出擊功益最璮受擒方璮叛山東時調發旁午璮善戰故將士多失亡璮受誅軍帥俱恨之議悉屠其黨公密白宗王哈必赤曰璮逆黨非土著俱東南狂士宜汰擇以安新土宗王然其言從攻襄樊功益著加授武略將軍至元十一年鎮邳州十三年王師渡江州郡望風下常州獨守世祖皇帝命大帥率堅鋭併圍之州嬰守益固有將築橋登城城弩中將死檄公代將即輦木石齊城雉剗其險塹縁附以登城陷第功授武義將軍佩金符後改鎮嘉興羣盜出没江湖伺疑覺竊發獨展誠撫綏申令飭罰使不能少越繩墨㑹歲大饑捐己儲粟以食餓者郡益寧靜性沈默善計事天性孝友出於自然始公之考金吾衞上將軍當金亡時傍邑盜起侵掠金吾率衆列柵守鄉土天兵南下越境率父老持牛酒犒師城以降得完宋將彭斌渡河城中大震搜其首亂者誅之辛卯歲郡將蘇椿叛入南大將阿术魯怒將屠城金吾率宗人悉輸金帛詣軍前請命卒獲免公之妣張氏訓整有則金吾以兵亂失元配董氏踰二十年董氏還夫人即歸家政退處裕如也噫觀公卓然成就盖其家教有自再世樹徳傾身出口活人於大難其豐報盖有以也王父而上兵難事逺不獲考至元三十年年未七十願解兵致其事大徳元年正月某日卒于里舎年七十有一其年四月某日葬祔大名府西南白水村之先塋娶張氏大名織染局提舉津之女子紹祖襲爵佩金符仍鎮嘉興嚴重逺慮鎮遏衺慝悉不使入境後鎮烏江詢盜踪跡在海浦遣兵擒磔之郡鎮肅然延祐四年年六十終于軍四月某日祔先塋公女二人長適李居忠温州路照磨次適張鉉濬州判官紹祖娶天水郡侯秦穩女生子女各一人曰成襲祖職佩金符娶大名府安撫使宋天祐女女嫁承直郎佩金符頴州萬户府管軍千户劉輿輿之父中順君今為雲南屯田萬户府同知桷與之游最稔善議論嘗言昔時離亂大名城中幾駢首就死獨賴梁金吾得全活空郊敗井隐然鋒鏑遺跡猶在厥今梁公子孫世顯抑為善之報善有傳往史良不誣也輿以事狀來請銘迺不復辭銘曰草昧肇區雨雷風驅崩角喪元孰完厥居嶪嶪單壘斧鋋就屠壯哉金吾請命發徒稽顙瀝血氣填以歔春氷朗日稚耄夾扶或偃或興聚其室廬是生武義趾媺以繼粤維叛臣率黨狂猘交兵飛芻靡有寧嵗既殱彼魁迺徒斯薙武義曰吁罪有等第宜磔其兇此土何戾再世興仁隂功奫奫如璞斯玉如山斯雲大田多豐曷耔曷耘番番餘齡終樂里枌靖共以儀不瑕以温金符後先祖曽子孫白水之域松栢茂直為艱斯通爰表初植大名之城大耋日隔永言金吾曷其有極煌煌譜宗接佩踵舄有來墓門肅立以式公徳允昭後裔承則資善大夫資國院使贈資政大夫江浙等處行中書省左丞上護軍順義郡公諡貞惠吉魯爾博囉公神道碑銘并序至元二十九年世祖皇帝詔立肅政亷訪司監治諸郡濟南陳公闕實治慶元按覈官吏大小百餘人故工部尚書資國院使順義郡公時為治中獨受委任條其不便於民者上府力去之㑹大饑乘驛詣行省言慶元瀕海地狹隘歲熟猶仰給他郡非官賑給將移徙不便執政然其言為發粟四萬石後為亷訪副使復治慶元遺愛炳著耄稚一口迄稱叙不置大徳中桷備員翰苑屬時公為侍從每得奉議論必歴問衣冠緒族惓惓於舊治彌厚公薨將十年其子和上以儒雅善正論擢監察御史桷亦待罪集賢相與言公遺事御史則曰子實知吾先公為詳且神道之碑未樹子宜為銘桷謝不得辭遂次其官閥世譜而為叙曰公系出吉魯爾博囉氏諱伯行大父阿哩家西北部世安其俗精騎射父呼圖克勇冠軍伍天兵定中原因從征冒陣略地以積功領南宿州軍分鎮鄿縣後家于大名路之清豐縣焉公幼歲失鄿縣母夫人徐氏躬牧蒔紉織以贍稍長命從學里中張蔡公尹大名見而奇之後從丞相阿珠公征襄樊南渡江率先登復從丞相安塔哈鎮揚州議以州所領四萬户軍移鎮鄂而易鄂兩萬户軍更戍於揚奏已準白於鄂省丞相阿爾哈雅使者相望訖不肯發軍淮省丞相念非公不能辦即乘驛宣上㫖語竟鄂相色赤反目公前曰丞相何怒受上㫖怒怒且不敬丞相懼答曰吾怒安塔哈公復前曰上㫖非淮相所造公怒殆怒上願亟歸相益懼具酒食謝悔迺發軍丞相奇之録其勞以通國語專奏對歲率乘驛六七返世祖見而喜曰是黒髯使臣復來矣至元二十二年授承事郎調金壇縣長省執政官計慮江浙事繁夥非條達敷對莫能稱上意時征日本事不便念所使有詰難必忤㫖遂選公驛奏奏至即罷兵遷承直郎行省理問官省中事急速必命公詣御前皆得允㫖以歸世祖曰伯行昔朕以黒髯使臣目之今察其相貌誠温暖絜正俾以重任宜無負相桑哥方柄政寢命不下即再守舊職丞相移省江西征䝤冦奏公自輔授奉議大夫行省都鎮撫二十九年授慶元路治中慶元多故宋公相家時翰林學士王公應麟閉門不納客公首尊禮開説俾學者師事之里胥躪躒士族著片紙叱名立召庭下公責吏數罪俾書故官吏復聚謀行𣙜酤法壞富室釀具當益官利三倍公毁其牘不行州民某氏某以事遁江淮間傳王㫖起大家十餘姓徙置淮南傲睨指畫莫敢忤郡貳南士也益張大翕霍公察其姦利曰民籍始定上計此非淮南分地曷得徙願上省白事卒止之承接聲影纍纍蚩氓爭願出其門下㑹偽造印牒事敗大興路獲得其所署偽籍下郡逮捕公時再為理問羣氓造庭叩首伏罪公憫緩其事卒得貰大徳元年遷浙東海右道肅政亷訪副使復分治慶元縣有廢湖總戎官久據湮為田將輸官租以絶口公立決以溉民田撫循瘡痍磨刮驕冗皆素所習知而獨於鄉校諄切訓諭謂為宣化所宜急至今盖有賴焉同分治官􅘆弛日弄事爭上謁出入無禁公手疏力按之太傳丞相達爾罕公審察賢士擢工部侍郎日從丞相騎具言江南弊事數百條丞相首肯之且命治西京賈人積逋鉅萬得其實大徳八年成宗召對賜侍宴襲衣十一年成宗崩丞相受遺鎮遏嚴整獨命公掌諸庫藏鍵鑰唯謹諸王㑹朝頒賚有等自公品節纎粟毋敢譁丞相益器之遂陞尚書至大元年今上皇帝時為皇太子以本部官見問今何階官再拜謝不敢遂加正議大夫俾稱其職值營繕推佛寺恩賞悉謝不受從皇太子如五臺山頓遞如法而不病於民賜白金名馬以寵之太夫人喪朞年乞歸里特賜上尊俾祭于墓仍疾趣還朝以視事省更尚書授兩浙都轉運使力丏辭再授資善大夫資國院使復辭不允三年奉㫖過江南具條所行事宜即得疾卧寓舎四年三月己卯薨年六十有一公平居簡默絶聲色謙抑自閟遇事有發發即不可犯崇善斥惡若飢渴峩冠深衣于于庭廡曲盡恩意所至率招師訓諸子御史之教實有自來晚自號徳齋延祐四年特贈資政大夫江浙等處行中書省左丞上護軍順義郡公諡貞惠娶竒􅚕氏嚴正内治一不累公故所居官益自裕今封順義郡夫人男四長即御史諾木罕真習儒業以門功讓其季曰嘉琿今為武略將軍同知沔陽府事女一適衡山努江西亷訪司僉事孫男勝通銅臺清涼山孫女二長適太傅特爾格孫巴延直省舎人次適駙馬丞相伊克都䕶多爾濟長子南無釋迦以是年八月甲申葬公魏縣迺為銘銘曰伊涼之西沈鷙悍剛挽强策良樂其騰驤天祚神聖授兵龍荒凑輯部族以先啟行赳赳赴功星流電驅顯允宿州飛矢執殳裹瘡先登擐甲以趨履彼樂土籍魏奠居篤生尚書積學以藴力探其本游於鄉校不忮不忿展武誓身江流渾渾踣襄擣樊舟濟合盾計其功多司譯省中敷奏簡亮走驛歲終黒髯長身儀動帝瞳罷征除徭音詞鴻鐘靡忒其行弗矜以辭彼權抑之訖莫疵之再官洊歲究覈謾欺輕疑除蔓納于春熈丞相受命捕䝤西江辟公佐戎解甲受降彼强先覆轘于油幢摩之沃之革其愚狂佐政海壖恤䵩廣賑尊而儒先俾職具訓曰維此土衣冠振振勿為隳辱養真復淳儒彦在堂父老在廡夀母委蛇介彼春醑歲亦有康絜而秔稌去馬騑騑執轡如濡公復有來爭任爭扶悅其條教激頑蘇枯同列冒慝書章劾鋤端揆審官俾執事樞不譁以嚴不激以正庀工斯程賞至傴命品秩日崇經國陳政膏竭木萎水涸魚病積憂載馳疚闗我身計其便宜咋舌莫陳教子惟忠以報國恩不夸其贏淑施後人魏縣之原松栢堅貞錫命孔熺裒對以承倬彼光大維公之成勒銘表阡永垂厥慶資徳大夫紹慶珍州南平沿邊宣慰使播州安撫使侍衞親軍都指揮使上護軍追贈推忠效順公臣銀青榮禄大夫平章政事柱國封播國公諡忠宣楊公神道碑銘世祖聖徳神功文武皇帝奉辭興師于宋厥相賈某黷愎違信誓郡將悉解體不用命播州安撫使楊惠敏公邦憲襲土守邊至是十八世矣誓于衆曰渝合蹙隘荆州惴不保宋主且已降吾州逺王化聞大國有聖人當署欵奉籍俾若等耆稚完聚果後降汙鋒鏑吾寧忍哉衆稽首一口曰公言是無緩於是瀝誠挈州願上職方氏世祖大悦即璽書慰諭曰宋内附邊臣莫敢後播末奉命宜詔諭汝能承朕意其悉如宋制授官至元二十二年公薨是生公諱漢英字熈載年甫五齡母夫人田氏携朝于上京眉目刻削儀矩習如成人上摩其頂熟視之諭宰臣曰楊氏子孤弱可愍母子逺來宜悉以父爵錫襲之賜名賽音布哈公之為仕也授金虎符龍虎衞上將軍紹慶珍州南平等處沿邊宣慰使行播州軍民安撫使後加管軍萬户復拜侍衞親軍都指揮使進資徳大夫勳上護軍其治邊也改南詔驛道罷順元宣慰使升安撫司為宣撫司分定雲南地以東𨽻播以西𨽻新部減郡縣之冗員者若干屯丁之糧三去其一焉黄平素屬播宣慰使烏魯斯誘諸酋長詐以為新闢境獻于朝公發其姦而歸我使恥不勝誣言舊有雄威忠勝軍思播匿不以告當籍之交州公言納土時已𨽻籍為别户臺審覈如公言使益不得志詣樞密府白其事竟遣使者乘急傳將械公丞相與昔審覈官言無是事而烏魯斯卒以擅掠邊民獄具罷歸部蠻桑柘亂省議用兵公言賊勢方盛宜招諭之兵久無功而卒以公議相繼請降天兵討南詔道由播大發卒輦運以濟軍食隆濟賊日熾合鄂蜀二省重臣綂師出征檄公以民兵從甫出師卒與賊遇公力急戰大軍繼之降阿苴拔乍籠賊復合拒迄縛隆濟阿女以歸大徳四年南蠻盧奔掠劫大姓依險翳自固黎魯在新部者亦嘯劫蟻聚攻守議未決卒命公撫諭二賊請命遂置戍兵以歸六年詔出師復征蠻命公與田茂忠率二州民兵專討之茂忠以討他冦未至公獨分兵五道以進賊始却部蠻爭合從公度深入絶後應乃全師還次黄平七年茂忠始來議分民兵守險而公以疾薨于師年止四十公之治郡殺妖民王忠以絶芽孽大修泮宮招蜀之名士教厲以化夷俗至元二十七年詔郡縣上計播鄰壤不奉命公即括户口租税籍以進上大器之八朝京師弓矢鞍幣之賜不絶以平南功特賜玉帶兩被璽書俾世守其土預御宴輙與國戚相齒世祖嘗曰此兒聰解殆得天賦仁宗則曰此子貌沈厚類畏吾人復賜譯經佛圖象以寵之二相貞憲王忠獻王尤加器敬性純孝睦宗黨二兄殁道中請于朝而襲其爵寛厚重然諾嘗約以善馬贈士友友死趣贈之南北冠盖相依者無虚歲少讀濓洛書為詩文以體要為主所著書有明哲要覽九十巻桃溪内外集六十二巻幼嗜山水九州雄勝悉窮力以遊别自號為中齋子男四嘉貞嘉謩嘉祐嘉禧娶田氏榮禄大夫義敏公謹賢之女喜書史善筆扎封遵義郡夫人公薨之歲秋七月葬于桃溪祖域之東曽祖价宋閤門宣贊舎人雄威軍都綂贈威武寜武忠正軍節度使賜廟忠顯封威靈英烈侯妣田氏封齊安和政安康郡夫人贈永寧郡夫人祖文宗任和州防禦使播州沿邊安撫使國朝贈榮禄大夫同知樞密院事柱國封播國公諡崇徳妣田氏封播國夫人諡章靖父即惠敏公宋任左金吾衞上將軍安逺軍承宣使播州沿邊安撫使國朝授龍虎衞上將軍侍衞親軍都指揮使紹慶珍州南平沼邊宣慰使播州安撫使累贈推忠效順功臣銀青榮禄大夫平章政事柱國封播國公妣田氏封播國夫人諡貞順至治二年秋八月嘉貞來朝見天子於大明殿拜跪興即錫名曰延扎布哈禮宴如故事嘉貞昧死言曰先臣殁有年䘏典未獲敢以請詔下翰林禮部太常趣議追錫迺贈推忠效順功臣銀青榮禄大夫平章政事柱國封播國公諡忠宣田氏亦封播國太夫人而以忠宣所受官襲其子嘉貞為資徳大夫紹慶珍州南平等處沼邊宣慰使行播州軍民宣撫使播州等處管軍萬户侍衞親軍都指揮使上護軍嘉貞踵門言曰子職在太史植徳彰善宜以傳信先公隧碑未立願有述桷謝不得辭而為銘曰播唐内州鮮于啟兵憬彼西夷蹂躪弗庭虎欲浟浟谷川震騰乾符鼎移五季嗣興維并楊氏太師肇初往理其疆以黜以助相繼象賢執武霆驅奕葉昭宣臣宋奉圖中令之支踵徳趾媺再世死忠守節彌勵枕戈復讐斬首以謝􅂱􅂱展功䞇貢不替宋社踰南間道以前是生忠顯擐甲開先三帥締歡痛不有年立廟錫封歲時牲牷繇太師以降十有四傳崇徳效奇拯民脱危貽于後昆惠敏攸祗實天有命我弗敢違委心效誠世祖色怡審彼逆順朕不汝疵恭承赫奕恪事四帝弱齡奏言胷臆默計宵征邁途􅙀敿鍛􅀈或諭以生或矢以誓堤障一方不泯世勲盛徳沄沄如山出雲夀嗇爵穹奚憾之云揭碑隧門萬子孫紹聞漳州路同知朝列大夫贈汴梁路同知騎都尉開封郡伯馬公神道碑銘鳳翔府兵馬總判公諱昔里吉思以忠節死難廟食於治所汴為金南遷都作褒忠廟悉合享死事之臣兵馬公預焉兵馬贈恒州刺史鎮國上將軍夫人王氏太尉明徳公女方公提孤兵守空壘力抗不敵盡室投巨燄一媪抱嬰兒以逃是為禮部尚書諱月合幼歲悲憤感厲其先居天山因以兵馬官為馬氏植徳秉志贖士人之為奴者後皆為達官而子孫更業儒術卒致光顯焉禮部子諱世昌為尚書省左右司郎中傾貲粟結雋彦家日困落子孫益用儒自振是生漳州諱潤字仲澤父即以文墨入官初署荆湖道宣慰司令史遷吉州路經歴陞兩淮轉運司經歴改太平路當塗縣長官再調常州路武進縣長官進奉訓大夫知光州改漳州路同知皇慶二年卒于漳州實十一月某日年五十有九其佐荆湖調漕舟討䕫府山壁夾江峻矗樛木葛藟率藏敵者以衝突公上計帥府焚伐蔽翳取木藟結綯索挽舟衘尾以進漕事迺不缺在吉州治豪民絶其柄持郡守以刻急自任公以寛輔之郡事不撓有劫盜獄株連百餘户閱牘讞論止坐十餘人守終不能以奪也為轉運幕商人爭後先歲終鹽直不售公請刻籌第甲乙實巨筩俾商人自揲以抽鹽卒以辦縣當塗上疏言括馬料民徙户増賦為不便時柄臣桑哥力主議公獨以邑宰能奮言之其治武進如當塗刑其無良者而貸假之觴詠簡適皆相慕以化有拾松薪易酒滓尉以盜論公慰釋之守光州取官粟之羨者廣弟子員以食光久為用武地司馬丞相生于光公歲率諸生以祠民始知為儒以自重㑹有言利者請籍光閒田歲可得粟十萬石河南省下其事公執筆不肯署吏固請公曰官可免筆不可署卒不行州無茶租民間採山谷微末以食轉運司掩捕抵法㑹奉使出諸道問疾苦公疏所以轉運生事者各降官三資漳州負海障崖龍巖章浦數反易公命吏宣布上意始受令漸寧謐㑹有言漳州地産水精卒以獻言者代公始罷當塗時居儀真幾十年母夫人張氏語家世官簿微警之迺復仕所為詩曰樵隱集若干巻觀其命名足以知志意矣韋布踵門降席倒屣傾家治具輟所得俸高下賢否以奉而其教子晷刻不肯置以門功讓其弟禮長子祖常皇慶初桷得交于京師其為文詞深湛有師法嘗默器而期之科舉行祖常試汴梁南省皆第一於廷對以尊國氏族為第二祖義鄉貢進士祖烈江浙行省宣慰使祖孝與祖常同登進士第將仕郎陳州判官祖信國子生試中承事郎同知冀寜路保徳州事女二長適金雲次適劉某孫男五人武子以公䕃授將仕郎監常州路宜興州税文子獻子懿子惠子女孫五祖常官翰林應奉時請于朝贈尚書為正議大夫治書侍御史諡忠懿夫人白氏追封梁郡夫人公亦贈朝列大夫同知汴梁路總管府事騎都尉開封郡伯夫人楊氏追封開封郡君於是郎中之夫人張氏年八十有四矣祖常今為翰林待制承直郎兼國史院編修官願以其封婦者回授于張夫人噫盛矣哉某年某月某甲子將葬公于光州西樊原桷辱為文字交知且深乃求請銘銘曰節以起宗儒以紹傳誰其任之宗伯維先再世是承漳州象賢佐政慈寛智名不居養其熙光發于詩書尊聞勵行飭躬日劬載籍之藴心聲為言仰止不愆兹為徳源積小以高本本元元雲興崇山百穀頴栗鑒觀厥初豐報匪嗇揭其徳華昭銘以述武略將軍裕州知州李公神道碑銘太祖皇帝略定圅夏以河南北要害為分地徴科供索從守令取具版籍缺落富瘠莫能考至憲宗用兵西南調發煩重推擇宜民人者為尤難時則有若故武略李侯排解勸勵鄉人徳之死逾數十年仁聲善政歴歴在口耳在昔考循吏繇身後始定今於是見之侯諱英字彦臣滑州白馬縣人弱冠襲叔父宥爵以宣武將軍知滑州立條教惇孝讓㑹歲饑賦入莫能輸率其州民見世祖于汴啓曰兵興值饑民即逃亡將使此州為空城敢昩死請世祖動色從其啟中綂元年蝗食桑蠶賦病民獨建言約秋熟並取果逋負當以身任後至秋悉如約以入滑𨽻大名逺三百里糧餉轉輓不便侯請儲本州候逺近朝廷是其請方兵興時鎧甲糧餱率從豪民稱貸子母轉息旬月相倍豪民倚州督取復入見于上言不可陳對感切下其議執政執政咸是之繇是官償其本去其倍息别為内府籍以誌本始行田諮詢旌别勤惰如是治滑者三十年至元二年改順徳路判官尹清豐南宮兩縣二十一年授武略將軍知裕州二十五年改知房州所至以治滑為準而滑以久任其事益章灼可考不妄嘗言叔父撫我良厚今得以宦業自拔即歸其爵兄子儀觀修整酬酌庶務靜要而理得才不盡用多士惜之三十一年十月六日卒年六十有九娶郭氏先一年卒卒時年七十學浮屠法慈儉有度靡密總核允宜其家夫人有助焉是歲合葬于白馬縣大呉村曽祖義祖信父祐二子長元徳奉政大夫龍陽州知州次元忠朝列大夫慶元路治中女四適和義郭君寶馮徳臨魏仁元徳娶張氏子二熹燾燾蚤世女一適郭從道元忠娶孫氏子二熈杰女一適郭守中始元徳以給事東宮授贛州判官元忠佐御史府授新淦州同知公及見之戒曰壯歲長民宜清謹自重我昔罹兵艱赤手立職業若等展世勿棄暴則先徳永有紹我語弗可忘也今二子所至植立滑州之效於是乎見之桷待罪太史預修累朝諸名臣列傳是則滑州行事宜有紀謁告歸里元忠以事狀請銘銘曰粤若生民大君長之幅員芒芒牧守是資饑匪設糜疾匪命醫承化觀風察其阨疵展也李侯百罹是逢誅管援溺不希其功天聽匪高矢言率從不苛以夸不阿以容社有美榆田有嘉穀輿言無浮唯侯斯祝侯云逝矣厥績謖謖種徳孔深豐報有僕白馬之原松栢茂鮮詢彼耄倪遺愛是言家教允遵罔有虧愆爰表銘詩孫曽永傳奉政大夫同知東昌路總管府事蔡公神道碑銘延祐年紀丙辰仁宗皇帝推恩羣臣考視品秩榮其祖禰及其曽大父繇是單父蔡侯衍以僉事亷訪贈府君諱良輔汝弼甫奉政大夫同知東昌路總管府事驍騎尉單父縣子妣李氏單父縣君泰定元年新天子下詔大賚内外俾就所居官皆錫命蔡侯時為慶元路總管又贈嘉議大夫闕路總管上輕車都尉闕郡侯妣某氏闕郡夫人桷謁告歸里侯以郡侯事狀來請銘詳厥原自則由侯之祖父總轄府君諱旺始總轄嘗語于單父君曰吾逺祖世居徐州樹善不懈吾禄弗及食汝必有後後果興汝其與榮焉單父亦嘗語于侯曰汝祖訓語猶在耳若兄弟仕進皆祖徳啟佑總轄當金南遷時限河南為内界禁不得渡河歲大饑民爭就食河北潛戒舟夜渡所全活不可紀金愈迫河南亦轉徙皆竊據自保郡人丁綂領集衆萬人為宋前導總轄往依之署以部伍徐説曰宋師入汴兵弱不可用彼將無固志難與共事綂領從其策歸兵為農而宋將卒敗衂以遁所居曹州鄉曰東村有孟氏善居貨自厚總轄避難因家焉後與孟相雄長而卒以米帛賙其閭里之貧細歲鬻鹽増滲淤算以售市悉便之至元十九年八月卒年八十有三集其姻黨與素往來者叙遺言端坐以逝夫人孫氏閱十有二日相繼卒治葬東村闊板塋舊所乘馬負衣冠以從至塋悲鳴躑躅即死讀其行事則單父之追命侯兄弟膴仕之效實總轄君啟之單父天性明朗其所待接與其父率相類官雖卑一毫不以病民民益宜之家僮久役服者毁其約俾自便僮不忍去願服田以終老年八十一得與束帛令以卒卒時在大徳十年九月某日夫人李氏權某州之女俱祔于總轄塋所衍以臺察官入仕其行事正不近名去衺黜妖愷悌以宜于民而寛厚有度迪祖父遺訓復以燾後興盖未可測也季曰衡闕大夫趙州尹女一適汶上李闕孫五沖霄敏學山住某某孫女三適石定安石公安孟欽曽孫一奇山桷嘗謂為善無不報根固膏沃彌積以興責成旦暮考其所為不能以逺久宜矣若蔡氏祖父是誠可紀銘曰水蹇於山積流必東磅礴委順不希其逢有截之椿鬱兮輪囷秀儀長身襲和服醇匪高其門厥慶日増如茨之茂如木之升父緝子承既夀且康詔爾諸孫以受簡穰厚徳匪浮是庸紀録表于隧門以闡以續清容居士集巻二十六欽定四庫全書清容居士集巻二十七元袁桷撰神道碑銘朝列大夫同僉太常禮儀院事白公神道碑銘白於太原為令族至金源氏興太原衣冠為最盛而白氏兄弟相繼踵儒科故中大夫樞密院判官兼右司郎中輕車都尉南陽郡伯諱華字文舉其季也唐宋樞密無判官金天興帝賞器之特置職以寵繇是相仍自郡伯始郡伯後居真定生子四人俱有時名君諱恪字敬甫少警敏三歲善作字書八卦八字有以見于鄉先生元公好問公作詩深器之郡守上其能將薦于朝郡伯謝弗許稍長里之先進張先生耀卿愛其才奬拔力成就至元中世祖遣使詣州郡試明經生復門役君首預選弱冠試吏探姦拔寃獄具御史不能撓後為河南按察司書吏有尉卒利孀婦財未終喪强贅於姑家既而虐其婦復不禮其姑姑告於官絶之尉卒隱其罪屢訴終喪無明文事久不決君悉疏所犯聚邑人以告婦得終養其姑焉至元十四年江南建行臺御史大夫相威公慎簡所屬署君為掾史即條不便事凡二十大夫見世祖力陳之允十有八最著令者大辟成讞上刑部聽報可賈某公田租歲減什二十八年授從仕郎江東建康道提刑按察司經歴改荆湖占城等處行省都事時荆湖省臣某括財恣威福君度不可與共事辭不拜後果受誅二十四年改浙西提刑按察司經歴遷平江丁母羅夫人憂以夫人喪葬于呉將終老焉㑹詔舉不附權臣自晦者有以君辭荆湖事薦于上除福建宣慰司經歴閩郡廣逺豐歉不同是歲汀州穀善收戍兵所給糧不登數福泉興化穀驟踊有司議移三郡穀于汀君建言道途轉輸大無益發貴粟以賑三郡歸直于汀可多得穀誠兩便有司難之君署記曰使有罪願已獨受卒如其議而官之贏粮果増倍宣慰司復為省君治六曺文牘以俟平章某公知君簿領有能名受其籍以付吏三十一年丞相太傅公為湖廣平章君時為都事俾陳樞密院及本省利便侍丞相入覲有㫖允其奏復陞員外郎湖光聮絡左右江官吏秩禄歲一再受俸於省地逺得不償旅食有棄俸不願受者君建議隨所部以給迄今行之衡永戍兵耕閒田官出牛輸其租牛死不得落籍戍兵歲率鏹數十萬以酬君惻然計之曰牛死當納皮角于官除故籍而以官租捐納之則得矣戍兵繇是免害有省臣獻廣西地肥沃可為田徙湖南居民往耕之當調户五千君力言不可平章公是其議奏止之獻田者復調兵征思明發運粟入賊境道逺雨淖荷擔者各持去志君憂有他變出直募民民樂受以往峽州歲饑請粟于官有欲核驗始發君言饑民朝不及夕使核驗死當過半矣大徳二年進本省理問官推誠燭幽莫有滯濫而言論風采彬彬文雅盖以吏治濟其儒行者與四年改江西省理問官究偽楮獄得直于時翰林承㫖閻公復持士論賢否有言曰白文舉父子兄弟俱有文名敬甫幼負俊聲老不入翰林咎將誰執奏為翰林待制復同僉太常禮儀院事儀度閑整贊道禋祀動不踰矩蒼顔玉立真善為頌者也桷向為翰林應奉幸得侍同朝聆議論接顔色寛厚平實言金諸老行事歴歴指掌晚自號竹梧其為文不事雕飾扶掖後進侃侃自持知其於孝友有加也生丙午歲十有二月至大二年己酉四月卒于官年六十有三積階至朝列大夫有詩文若干巻藏于家某年某月某日葬于真定路真定縣之朱洛村曽祖仲温隱徳里居妣李氏祖宗完金故贈朝列大夫輕車都尉南陽郡伯祖妣李氏妣張氏羅氏君羅出也娶盧氏中書架閣管勾順之女翰林承㫖摯之女弟男五淵安福州儒學教授沆蘄州路䝉古教授皆蚤世湛今承事郎浙東道宣慰司都元帥府都事洙國子學正灝江西湖東道憲司書吏先卒女三長適李棠靜江路税課提領次適甄遂良季適李權河間路某州樂夀縣尹孫男八貞采暹辟楙闕樞桂孫女四曽孫男一女三湛為元帥府都事桷適請告歸里以事狀拜且言先君子嘗得與子同院銘莫如子桷謝不敢辭迺為之銘曰有完者圭藉之以韋不泄其温禋祀用祗受中以生剛柔是宜木神則仁其用不陂顯允太常幼敏且岐挹其粹精飭躬以教黜明養潛爰燭姦暴匪伊求之我曷望報道在一源挈以簡要詹詹炎炎益飾其巧佩玉舒徐六轡如濡執簡以陳矢言不迂彼計功者承色善趨較以虧成卒喪其軀有高維閎兹為守儒恒山之陽松栢茂直詔于雲仍是謹是則膴仕之初壎箎踵奕詢彼故老曰惟祖徳我銘孔昭庸告爾無斁贈翰林學士嘉議大夫馬公神道碑銘浙東道宣慰使都元帥馬公踵門以告曰惟吾先公隧道碑未立子職在太史勲舊死事貞逸之士嘗焯焯紀著登載金匱先公仕雖不顯其見之于世祖受學于碩師河内後進猶能誦習遺事敢以行實告它日上其事史館則子實前史官庶幾傳信可永久敢再拜以請謹按公諱充實字士輝覃懷河内人父庭大父某皇朝入中原略地定圖貢詔大帥專除授嘗得署郡縣副貳兵亂大父以上名諱弗可攷公八歲遭大喪從母完顔氏携載以從其夫李侯侯長萬夫隨征六盤善謀畫禆贊李益取自助六盤為高昌要衝高昌之俗收經史立校官地與西域接故其聲音文字詳於諸國公得其説而習焉世祖皇帝大一寰宇命以其國語别立文字用於印章宣勑其字母與西域相近公旁曲通暢單出雜比㑹其指歸學者爭詣門請業許文正公薦于上以儒服入見于柳林委曲問時事悉以國語對上大喜錫以錦帽語翰林學士承㫖某公左丞相耶律公宜以為稠人師遂僅授將仕郎懷孟路䝉古教授再授承事郎襄陽路均州判官然不樂仕進嘗曰我能知樹藝遂力治其閒田因原隰以種所宜木春華秋實茂鬱滿道過者咸曰此馬公手植也縣西有田二十餘頃皆先世業歲久勢家悉占其肥沃後服公純徳始願歸其田卒酬直以受方許文正公講授鄉里時靳許可遊其門者察以歲月始命執弟子禮獨見公篤厚温謹即俾就列授性理大義以躬行為先公能守之故其退讓無干進之念而恂恂里閈克修克儉皆師訓也文正公侍帝所無虚日懷孟素産地黄可釀酒其修治貴精謹上問文正卿弟子孰為誠實即以公對公素知製法得山中石泉如法釀以進許公之薦將繇是俾嚮用而事若不偶公復不以為介豈安於命分者與後有奏為河渠使者又將奏為䝉古院學士皆力謝不受里中有徳大師金内族年過百齡能知人夀夭前後俱尊異之公甫生一日徳夢其故友宋讓曰吾今為馬家子矣後抱示之摩頂即為笑容噫死生事不可詰若前史所載又有若佀焉者寧勿書卒于至元二十九年四月六日年六十葬于河内縣青平村先塋之次娶劉氏征西萬户某之女後公四年卒生二子長鑄即元帥公次鎔朝列大夫廣西海北道肅政亷訪副使次娶李氏生二子鋭奉議大夫廣州路治中次鋼皆蚤世女五人適陳吉甫張漢卿王某朱仲徳楊某鑄男四長徳潛内監尚衣次徳源徳淳皆國子生徳淳今為鎔後徳淵府學生女四適太祝王世昌戴彦實李起宗郭成可鋭男二徳潤徳温曽孫一孟孫至大三年鑄為禮部郎中推恩得贈翰林學士嘉議大夫上輕車都尉扶風郡侯諡莊惠劉氏贈扶風郡太夫人李氏封扶風郡夫人鑄官中奉大夫浙東道宣慰使都元帥又贈公某官劉氏贈某夫人大父贈某官大母完顔氏贈某夫人桷於是有言曰仕嘗患弗及其身殁而子榮推其榮以及其先而為善之效著矣世固有極其顯光殁無徳以傳卒至於子孫流播可勝道哉元帥公中外揚歴清白益著今帥浙東事不苛求而明燭幽隱不為已甚遺其後者猶先公之志是宜銘詩以昭來世銘曰相彼土田或隰或陵深根平培蓊焉以升實者缶之茹者釡之梓漆是供絲枲是輔種不亟求曰惟歲年視彼種徳亦云其然温温馬公植善無倦仕匪蹇時從我之願經緯聲音服習訓則奉盈彌謙以退以黙詔爾孫曽戰競是承蔽芾長松勿替厥聲翰林學士承㫖榮禄大夫遙授平章政事贈光禄大夫大司徒上柱國永國公諡文康閻公神道碑銘世祖皇帝應期握圖肇圅諸夏文經武緯各當厥職粤惟東平地接鄒魯時則有嚴忠武公披荆翦蕪扶植儒學作成逢掖卒能敷文帝庭風動八表鄆之得人號稱至盛而閻徐李孟世名以四傑焉自至元至于大徳更進迭用誥令典冊則皆閻公所獨擅公諱復字子靜幼入東平府學蜚聲炳著操筆綴詞賦音節和暢融液事理率占為舉首幼從贈翰林學士康公康大器之太常徐公道隆年長有聞譽不敢以後進待公在翰林最久贊書積几高下輕重擬議精切傳誦以為楷則其待僚寀擇敏秀者自近不滿意者不復强以文墨任滿不調雖請託亦不得以叙遷故事表牋自待制而下分撰公命各為一道輯其精良融為一家而别擬以示其屬始仕東平行臺書記御史臺掾至元八年入翰林為應奉文字進修撰十六年陞翰林直學士十九年侍講明年兼集賢侍講學士于時兩院皆領㑹同館繇是自應奉至侍講皆兼㑹同二十三年陞翰林學士改集賢學士大徳元年復除翰林學士四年拜翰林學士承㫖而知制誥修國史皆視其職以進其補外職則僉河北河南道提刑按察司事浙西道肅政亷訪使世祖陟方召公草詔于上都成宗繼崩復召公上都武宗即位首上疏曰惜名器明賞罰擇人材朝論韙之賜金錦白金以彰其直顧公老矣願致事以歸迺進階榮禄大夫遙授平章政事給半俸以佚其老且命壻李嗣宗特授承直郎同知高唐州以侍養仁宗在東宮時知公歸特遣使賜幣命公卿設祖帳于都門外桷嘗以院屬侍公入議事堂鵠峙山立中外各改容以奉語簡意足不屑屑持辯爭丞相而下皆傾動一日草詔書其語意難以入國語大臣疑之有集賢學士亦出微語公召掾史具紙筆請學士改撰學士大愧却立㑹食畢公改為之而前詔一字不復用一坐大驚公以文墨自任不肯為𦂳要官罷尚書省時世祖召入便殿諭以卿為執政官何如公謝不能世祖曰知讓誠美事宜勿强成宗擇相召公密問曰左丞相缺孰可任以江浙行省左丞相某對益稱上意其陳于上者大較若是定孔子主祀賜孔林洒掃及祀田皆所建明興國學論廟樂所助為多而其在憲府以敦本崇化為先務當大徳星變疏十九事皆切中弊壞成宗賜楮錢萬以優寵公受知成宗為深嘗問其所師承金玉幣器錫賚有加仁宗初政首命召公以疾辭皇慶元年三月某日年七十有七薨其年五月葬于先塋之側公將薨時夢游祠宮有道士迎問公年口占一詩以答覺而言曰吾殆云逝矣世方倚公為重而公不復少留可慨也矣其所為文號靜軒集内外制集若干巻將傳于世桷繇泰定元年得告歸里越明年公之壻奉直大夫南臺監察御史李嗣宗以書來海濱告曰子職在太史出處大致子侍承知為詳隧碑未立願登其事于石以貽永逺桷踧踖莫辭謹按閻氏平陽人今居高唐州曽大父衍贈嘉議大夫大司農卿永安郡公諡懿徳妣趙氏永安郡夫人祖和叔贈昭文館大學士資善大夫永安郡公諡昭獻妣武氏封永安郡夫人考忠故高唐主簿贈銀青榮禄大夫大司徒永國公諡惠穆妣牛氏劉氏追封永國夫人娶尹氏趙氏李氏男一嗣慶以䕃授奉訓大夫廣平路威州知州未任以疾卒女一孫男二翁安翁夀女適即御史君也公既下世婦弟淮東宣慰使李處恭時為吏部侍郎慨然曰吾寧使閻公終無以易名遂請于朝得贈光禄大夫大司徒上柱國永國公諡文康其姊亦封永國夫人而公三世亦以令典得追贈並榮猗歟休哉銘曰泰伯之曽食采於閻因邑為氏慶源涓涓太原之閻顯武後唐戰多著名分茅為王有孫曰象決科就文撫綏降邦拯其溺焚迢迢裔孫實家平陽試邑死事和川歸藏是生惠穆占籍名郡推誠急施樂善不靳教子有行俾離其鄉業精行成何求不償顯允文康以文偉著執其牛耳莫或敢侮斟酌泰和密勿元氣英露矞雲萬物屭贔鎮于詞垣幾四十年矜彼不能擢才進賢維我世祖養兹國珍薦更三宗猶昔舊臣公歸白雲多士盡悼凡今曰能亦公所造何以逺貽有豐其碑實茂聲𢎞播于銘詩周瑞州神道碑銘景定元二間賈相某隱城下盟罔宋帝理宗邀竒功外受强冦内括民業廷紳鉗舌奉風㫖稍異議輙諷臺臣斥去小者歸田里大者入蠻瘴時則有豫章周公以史館檢閱入對曰李璮繇山東來歸實急而求我區區一旅瞭然可見借援無功彼敗我辱招釁之道梁武在位四十餘年卒墮其計陛下臨御日久不宜復蹈前轍父全逆叛著在信史已登告于祖廟璮乞改正是作史者誣枉逆全行事淮東人猶能道此亦陛下在宥之所覩困獸投林誠不可使縱意干紊又曰臣近覩輔郡和市富室田業以備軍餉良以和糴廣造楮多楮多則楮益賤是誠不可不變通也今所在置司擇其上腴低直以酬又欲令賣田之主抱佃輸租歲或荒歉田主必當割他租以補他租既竭歸于耕夫耕夫逃亡歸于鄉役可謂獲近效而忘逺慮自漢以來納粟補官歴代循用翰粟既微補爵亦輕不足以動豪民臣以為宜繇尚書省樞密院吏員為出身定品格立止法則大家相胥以勸可以立辦粟可無糴楮可減造矣疏入相大怒言者急擊去而公風節言論著江表公諱應合字淳叟七歲授詩書通習大義年十七父如翼贈朝奉郎母胡氏贈安人相繼即世逮事王父友賢以卓行稱宋寧宗朝嘗旌其閭書棣華扁以賜號為棣華周氏嘗從棣華君至近郊望邑有火光亟返奉安人柩入祠堂袖神主以出王父竒之紹定四年詞賦應鄉書不中始悔曰吾安能事雕刻乃學春秋經結廬深密探微索幽從者益衆淳祐九年應試兩浙轉運司果冠諸生十年有㫖試轉運司者入别考復在首選授江陵府學教授待次歸里授生徒曲為講説㑹歲饑首率鄉黨立三事一曰貸貪民二曰濟疾苦三曰賑游末包公恢記曰是三者足補義社倉之未備十三年官江陵首講孟子曰壯者以暇日修其孝弟忠信此凡民也士無一日而不修士不當以壯幼論師友言行去其偏黨據㑹立要學者深徳之創鄉射齋申勵武備别立凡例以修郡乘趙丞相葵雅知名㑹宣撫荆湖辟為元竂以志書未成辭馬公光祖帥荆湖師援䕫路俾為屬主贊畫蜀事益急詔趣馬公援蜀馬公聽羣議不決公獨贊進師乃解開慶二年馬公帥沿江復佐江東兼長明道書院淳公嗣久絶詢諸池陽得五世孫偃孫以主奉稡二程遺語若干巻復以馬公命為新金陵志自史館歸外補通判饒州後攝郡事決疑剖奸絶煩擾催督部使者爭薦之咸淳三年主管華州雲臺觀四年通判寧國府其治如饒而補其前逋復攝郡事大修學宮除輸苗之不便於民復梅都官諸孫斥豪禁吏人不敢以犯湘帥汪公立信舊同寮奏辟通判潭州兼參議官丞相審治行目諸賢交章無虚歲亦欲俾出門下諭意長沙母行公不可相聞益怒㑹江文忠公在相位以國子監簿進擬亟命御史李珏褫劾徳祐元年登極恩復官是歲賈相兵敗走維揚起守寧國江西以瑞缺守辟知瑞州將治兵為固圉計與帥議不合劾去素善訓子長子天驥年六歲敏記誦宋有童子科俾習之年十一以能文詞舉後登上第人取以為法寰宇合一天驥守吉州迎以養却甘茹蔬感慨遁迹人不知太守為有父至元十七年卒年六十有八眉山程尚書公許嘗語曰君理義則濓溪章表佀平園以溪園自號為宜維周氏籍㑹稽唐以憲銜官鎮遏江州曰勍為御史中丞銀青光禄大夫因家江州六世孫曰師教訓生徒里人稱曰一經居士又三世曰昌元妣胡氏是生棣華君子男四長即天驥次天虎天鳳天龍女適朝奉郎經略參議官呉疇吉州教授劉明仲從仕郎潭州路湘隂令冷頥孫孫男十二志道某官志仁志徳志學志義志立志逺志禮志行志敏志伊志崇曽孫男十六女二四世孫十有八五世孫三娶王氏繼萬氏俱封安人某葬在吉水縣同水鄉臻善里鷓鴣山之原天鳳幼歲入官熟昔時言行罔缺軼桷備翰苑屬與之言論傾倒身履目接人則曰官簿不足恃久而曰彼兩家不可輕桷投紱歸里强使校文天鳳以泉州推官同在院未幾桷以喪子歸天鳳請銘銘曰蹇蹇史君内剛以文察其要機叩于帝閽䝉恥冒功厥腥四聞我后不知惟相之云佐郡未幾輙劾以去冥心委順不懼伊沮山鑱野刻勤彼纂組謂宜掌制命則不遇教子有謨見其提符我實故臣逃空以娯叔也秉文庭誥靡渝詵詵者孫冠佩是佀宦若不偶名則罔替昭銘松阡以告良史有元故贈中憲大夫中書吏部侍郎騎都尉陳留郡伯郭公神道碑銘大徳十一年桷再入翰苑郭侯郁文卿時為江浙行省都事獲締交焉見其受易學于侯先生得見尊公于庭下延祐五年文卿為中書檢校余時直集賢來往益密而其尊公正席危坐凡辱交于文卿者咸執弟子禮嘗聆其言曰吾兒幸竊禄位不敢以自喜其所行事未嘗不察其指要而足以垂後者亦將以示吾子若孫居吾語子焉始兒以吏能及格為掾都省定水縣門計功以便民民不敢謾而官費以省晉山薦饑且疾疫親歴其家去偽冒為善藥以治得活者三千人為宣徽都事行省都事勾稽奉公增餼羊若干而浚役于松江者去其工直十有六萬石吾懼其瘠于民也民不以病是則吾之所深喜也于時衞府調卒萬五千至都城計其往復俾俱以九月集白于省大臣大臣許之至則器甲精鋭士馬肅給為諸省冠其餘稽工㑹程而不志苛刻於余諸孫良有望矣其在浮梁也迎余以養見其治學宮立鄉校廣弟子員知余後裔之必有以儒術顯者矣公之語於余者知其嗣必昌也公飲酒不亂道金朝遺老行事猶能反復感慨鄉人尊為隱君是年八月卒于京師得年七十有六公諱天祐字祐之世居汴梁封邱縣吕村祖進考誠嘗職民千夫長娶林氏汴􅆝為金遷都兵逼野處僑居大名大帥器之因以長千夫郭氏大墓數十兵亂蹂藉不可攷而新塚猶存三房審其為大家明矣延祐六年八月某日葬于先塋郁為浮梁州以大賚恩進封奉政大夫知宜興州驍騎尉延祐七年郁授中順大夫知高郵府至治三年授中憲大夫同知兩浙都轉運鹽使司事泰定元年授亞中大夫僉江西河東道肅政亷訪司事二年七月贈公中憲大夫中書吏部侍郎騎都尉陳留郡伯未幾郁改授慶元路總管桷嘗以謂貴顯之及於親必原於逺祖親榮矣而考其若子之行事是猶望於後也自侍郎之無禄亞中公四歴要官桷略其治狀以侍郎之言為可證豐功茂徳見於去思誠不在是也配李氏累贈陳留郡君公男四長亞中次迪嘗為錢榖官厚海道運糧萬户府百户仁以黄陂主簿今為江浙行省掾郁娶孫氏封陳留郡君子三㴻渥國子生夀蚤卒迪娶崔氏子三厚娶崔氏子四仁娶孫氏亞中來乞銘銘曰大梁之區厄為兵墟層城鬱峩以薙以鋤維郭氏先歴有譜圖迢迢郭公在唐紫朱吏部有謙弗克以居以其先聞維訓菑畬味道養齡擊鮮以娯治官莅民考于庭趨大樸弗雕盛徳莫踰維公有子克遵令謨述銘孔昭勿替勿渝王氏先塋碑銘延祐四年中書左丞王公出為江浙省右丞將行天子遣使繇上京傳㫖曰毅其勿行七月拜中書省平章政事繇是推恩如令式得贈其曽祖為正奉大夫山東東西道宣慰使上護軍魯郡公妣周氏魯郡夫人於是平章拜命惕然有言曰維我祖蓄徳閟華慶貽孫曽惟昧實蔑克稱天子寵綏于臣子厥亦赫厚願叙先徳以收合宗譜子職在太史為我表而銘之桷謝不得辭謹按郡公名汜世家徳州平原金將亡士族奔播南徙郡公有子全甫七歲隨從母走亳州稍長壻田氏由須城鄆城三徙後占籍汶上晚歲嘗謂子曰吾幼罹兵凶僅能記我考妣名字遺牒舊事不復省今祖墓在平原郭東北五十里曰水務鎮我死力不能歸葬若等母忘平原也今以平章累贈資徳大夫江浙等處行中書省右丞魯國公公二子長曰玉次曰傑二女嫁張氏葛氏玉嘗一試吏輙謝去謙約無表襮策杖鄉社通慶弔煦煦無憊意今年八十有四以榮禄大夫河南河北等處行中書省平章政事柱國魯國公致政于家始平章以詹事歸養魯公曰聖天子軫齒召至渥我雖耄尚善飯汝不效犬馬報居家何為也又附詔使奏曰不佞老臣骸骨堅且强謹遣臣毅一心事陛下上大喜特授集賢學士資徳大夫其配郭氏朱氏封魯郡夫人後以推恩進郡公訖封魯公魯公子三人長平章平章子思恭思齊思聖思誠思明次子謙謙子思禮思義幼子鼎鼎子思道思問曰傑魯公弟也子四人愿讓諒懋傑孫思正思進思忠思温思益噫平原之墓繇郡公得封今始有表焉郡公之若祖若父名字弗可考隆然兆域則皆在其上而諸孫之與平章同高祖者凡四房猶在平原居平章振與于百年之後因郡公之追榮合譜繫族俾五世之本支横列旁附將使之孝謹自將益昌其祖可謂厚也已銘曰畇畇平原土墳宅舒民用泰寧聿勤佃漁自河雲奔邑屋播逋有孌者雛宵衣走途九折其行益南以趨繇亳投汶靡定厥止税于須城客鄆以俟復還于汶以鏄以耜望彼北河有隆坡陀企焉音容戰兢弗磨衡門之棲韜精養和曰我此有籍我墓伊何戒而孫子勿忘勿圯番番魯公樂道趾媺允也魯公不衒以試藝而黍稷亦有魴鯉遨嬉大耋訖用夀祉篤生平章為國之梁夸毗弗師佩瑀秉璋諤諤藎言百壬避剛始事東宮岌高傴讓告疾遄歸厥聲四揚魯公在堂曰汝來庭國恩靡效慎其寐興汝車疾驅我餬斯寧鴻化惟幾靖希隆平勿忿以媢勿喜以矜帝曰汝嘉庸遏南征乃晉平章衮衣具榮視品追秩三世是錫平原之塋松栢茂植維高維曽爰朂懿徳寸雲敷功下土霈澤嬋嫣祖芬肅爾承翼合宗别支秩秩母紊瞻彼中林王氏之本匪祖曷思匪譜孰辨春秋墓門蟄蟄在巘紹聞象賢繩武以昌平章之心孝思不忘刻銘先塋久載用光邢氏先塋碑邢氏世居彰徳安陽之交口村金亡大姓散走譜諜塚墓軼塞率高曽莫能考名字維邢繇酒使君始著君諱植字子實幼隨父母竄處林谷親疫死從兄林歸里力樹藝自給厚徳卑讓以先業奉其兄後居城中蓄善貨取贏頗以財自振尚義急賑兄無子訖盡力治生死每曰嗇用近禮愛物近仁執信守常吾何慊焉坐肆中有客數人貿縑於肆有白金遺焉追客莫及明日客至君先授之客曰果有遺不意在君所誠大長者相謝以去庚戌歲火災郡蕭侯率民携綆缶力用命不可滅至君舎乃反風侯敬禮之始以推擇為酒使歲終第籍上府窶户無所納乃悉以已財補輸之書劵於君者毁不問後不肯仕鄉閭化之至元二十四年三月二十有二日以夀卒于家年九十有六初娶李氏繼楊氏李生子曰徳裕字裕卿風度皎峻展拓所行整暢為儒吏擢本路録事路𨽻某王分土俾復為酒使至元四年銓選格行授將仕郎博州路録事遷潞州判官再遷從仕郎陽翟縣尹又遷承事郎藁城縣尹其莅博州調征南軍不使富民委役於貧潞州有疑獄立剖之而讞陽翟獄尤著民王氏有婢竊其簪珥酒壺以逃盜不可得詿誤相連坐乃密詢其素所徃來或曰王氏姪誘婢他之度不可俱行因殺之以利財後卒獲其姪一訊輙引服縣人大驚爭持酒殽以賀在藁城㑹真定無極縣軍隊長匿戍卒鏹二萬五千緡偽言室中夜遇盜告于官三年不能獲捕盜官多受罪挾疑佀坐獄者三十餘人府以白樞密院咸曰是能決陽翟疑獄者檄君以問入其室左右視驗實無有盜跡呼其孥二人别居之所對皆異辭遂直入其室發床下軍鏹咸在即日獄具而君以二十九年六月一日卒于官年六十有七初配王氏再配郭氏皆葬于交口之祖塋有子五人長曰秉仁字仁甫曰秉義某官曰秉禮曰秉智某官曰秉信女四人皆適士族孫七人女孫七人仁甫始由憲司筮仕入掾臺省兩為太醫院行省都事鐡冶正副提舉一再為二千石治撫州興學禮士盜不敢入境治廣平亦以善理寃獄有能名郡民立去思碑以祝之今以嘉議大夫禮部尚書致仕于家而槀城君卒以尚書為提舉時推恩得贈朝列大夫騎都尉河間郡伯王氏郭氏皆封河間郡太君尚書之長子温字孟直更迭省部繇御史徧歴中書左司官諳習故事而克謙慎修以禮度自處今授亞中大夫大名路總管將之官致尚書公之命曰父子俱受朝廷殊遇列三品夙夜兢惕實為先徳淳蓄再世以昌愳後人徒知邢氏之盛而莫知二祖之勗善培本者若是願刻諸墓上因子銘以昭示于後乃銘曰雲雷之交經綸靡寧上降下騰甲坼是承劬儉于躬不企其成蓄極斯泰奕奕振亨折獄探情罔用口才嗇以裕衆兹惟艱哉維子維孫享其胚胎仰俯橋梓播美益培霜雨濡降永思彌䖍詔而後昆絜其簋籩仕以飭身止以樂全過者必式兹為邢氏厚徳之阡任氏先塋碑銘青齊繇尚父啟封土沃民阜擅魚鹽之利山水險阨雄偉冠鄰壤昔時宰輔願優逸自便者爭乞守是土勝槩見於職方氏數千年盛矣劉豫猊父子背宋以千里赤子驅為兵徒犯順滅徳金主悟其元惡傳㫖就戮而青齊户口物故過半完聚未幾李璮復懷逆抗拒齊部所領益莽為墟落痛矣哉任姓世著滕州傳緒益逺有元帥府君諱杞又諱宏府君為逺祖葬于薛河源宏有七子擢文武科墓碑燬落今繇元帥府君始可譜府君娶王氏二子長曰鋭金武舉進士終千夫長次曰釗字某幼長戈革篤考古今成敗以進取自任鬱不得志持素所講習訓導鄉黨陳義抑惡片言總榮恥薰受以化咸曰繄任公所成就郡縣以其行舉于朝辟行軍總管再舉沂州臨沂令皆謝疾不就始繇沂州歸于滕築室祖墓一日蔓火燎于野逼墓次公號泣伏墓所有頃火繇它行郡嘗上其事府君曰吾得歸故里守丘隴奚外慕焉美鬢善容倜儻以隱逸自傲至元二十四年九月六日年八十有一卒以孫貴贈樂安郡伯娶周氏贈樂安郡君三子長曰榮曰滋曰英榮繇元帥府知事陞閩海道提刑按察司經歴以不樂入嶺嶠改授廬州嘉興總管府知事善心計仕泊如也以子貴贈某官樂安郡侯娶單氏贈樂安郡君生子四長曰居敬善吏事所至有能名為建康闕路總管今以通議大夫禮部尚書致仕娶王氏樂安郡夫人尚書子擇善承務郎樞密院都事執善江南諸道行御史臺譯從事女三孫三曽孫三曽孫女一曰居禮房娶李氏七子師善中政院管庫兼善泰寧路司獄思善蚤世明善進善悦善從善始學仕曰居仁房居仁為鷹房總管府經歴娶王氏馬氏志善適善達善宗善曰居義房娶丁氏伯善性善友善合子孫與曽孫四十一人郡伯次子曰滋房娶李氏生子四居安居信居寛居誠合孫與女二十一人郡伯季子曰英房四子居實居慶居厚居徳合子女十人嗚呼繇府君至于今凡五世通其譜幾百人世莫可儷豈非其孝感于鬼神蓄極以通故仕者振于朝而其未仕者各相勉思繩祖武以自顯匪表于墓則曷以彰盛徳擇善深湛雅思見事不苟與桷同備屬翰苑厚善而尚書亦屢瞻其儀度俾有述焉奚敢辭銘曰滕薛之間任國首封傳於東都齒秩有崇禮食是問􅊬其遺風泱泱三齊絲枲沃豐執智秉機厥俗攸同允也府君厄於兵囏閱詳興衰訓言間間左閭右塾化其慆姦隱身墓廬以號以攀仕不强希榮恥莫干雲藏靈淵磅礴蓊鬱朝躋于陵百谷瀰溢徳盛莫居子孫秩秩聿來墓門展祀芬苾叙昭辨穆孝謹罔失清容居士集巻二十七欽定四庫全書清容居士集卷二十八元袁桷撰墓誌銘翰林學士嘉議大夫知制誥兼修國史趙公墓誌銘代院長作大德七年正月辛亥翰林學士趙公晦叔卒于官其年十月中書右丞相入對天子曰趙與􅝾事世祖皇帝幾二十年事陛下亦將十年敦確清謹今既死無以歸骨于里敢奏以請於是天子命有司賻緍五千復給舟車傳費俾其喪歸將行孟實等以狀來請銘復往歲直翰林公為待制其叙遷也亦相先後知公尤詳義不得辭方至元十四年間公以驛來朝深衣幅巾見世祖於上京冰澄玉瑩詞氣整朗言宋亡根本所在親切感動世祖傾屬自是入翰林為待制為直學士累遷為真學士公之為侍講也言江南箕斂急督移括大姓宋世丘壟暴露皆大臣擅易書詔明㫖又言庚寅嵗大霧蔽塞正月甲辰虎來西城其徴為下臣執權簸政言雖不行而公閉門待罪後司徒公㑭同列諭意始復入署公毎視職清望近思欲以言議質直理道確近條縷報上故所言嘗若剴切無隱而世祖皇帝沈幾先物神量莫測或為公懼至平章政事不灰木公為公奏私負嵗積皇帝曰得非指故臣為虎者宜官酬其逋别給廩粟布帛以養由是始知君臣相與脗合明著如是曽祖伯洙宋朝議大夫知南外宗正事祖師雍宋朝議大夫直寶章閣考希聖宋宣教郎史館校勘髙祖宗正某南遷時丞台州黄巖因家焉伯祖師淵與朱文公纂次通鑑綱目凡例㣲言奥語耳受身履故公所行尤近嘗與許公仲平論伊洛閫域首言力行致知清簡惟高沈黙自秘皆東南極弊文以顯道捨是無以議許公深然之至觀公待人愛士恩禮周洽不為疏數翕訿其持家簡泊無復商榷計慮非深知道者不能也天性孝友自宗正而下四世力請于朝而復其役贖姻黨男女為奴而不能歸者凡十有一人始登宋辛未進士第為鄂州教授由鄂來京師迄為翰林學士知制誥同修國史積官至嘉議大夫年六十有二其所成就不為甚過而公以榮禄豐遇為可愧不獲老田里為可恨噫公之心如是而已矣初娶夫人舒氏不一嵗卒歸槖中装于婦翁不取今夫人史氏三男子孟實以公為侍講時特官為承事郎同知瑞安州事孟賚温州路蒙古學教授孟貫將以廕入官以某年某月某日歸葬于黃巖塔山之原復嘗讀大雅文王之詩曰商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京以知文王之德之盛商士之恪謹温遜篤承天心維我世祖明德造邦式混區夏内外小大共為帝臣而公陟降左右承賚接錫終始若一至於不幸而死今天子復申命而寵綏之則公死猶無死也是冝銘銘曰禄不斂贏謀不課利我以其拙彼以其智衣敝策駑内澡玉雪誦聲清泠鏗出金鐵謇謇九關壬人殞䰟維帝有訓四方于聞之身云亡之德不爽丘環麓茂一息以徃繄碑之豐維時之通尚詔後人以封以崇奉訓大夫昌平等處屯田總管贈亞中大夫永平路總管輕車都尉宣寧郡侯劉公墓誌銘太祖皇帝沈幾整武蹙金踰南迺肇定中原物土萌蘖横出迭變莫能稱上意將草芟而獸蒐之久而曰噫吾赤子也始料其民俾執藝丕作故家大姓争占籍自詣遂得脱鋒鏑野處以居飭材辨器咸精其能而人益效用國以富強猗歟盛哉故昌平屯田總管劉侯之祖仁時為金軍器局副使治于汴至是率其屬徙北以行副使之考秉文家河南世儒族讀書通大義審金將亡兩河大饑家故饒傾所積以食餓者或曰嵗荐饑宜善蓄以俟府君曰國迫民流旦夕當走守糓可乎守子孫可乎後副使繇燕居宣德奉府君以養終𦵏于宣德為祖域首焉副使隨軍而北也諸匠官所領道亡過半獨副使整部伍工作皆完繕帥大人奇勉之曰吾當入白上擢以羙官卒俾見太宗皇帝授諸路人匠提舉後陞總管以終其配馬氏故涿郡馬令公之女孫男三人長伯英雲州判官季伯豪安平縣尹仲即昌平君諱伯傑字巨卿習土俗騎射尤善諸部語言初從其父至大興見尹郭汝梅郭以能理劇知名善鑒識一見即命佐麾下使候賓館使者鞭帽駢集指畫不可辨能悉其語意周折省約使各慰謝以去尹益取自近壬子春憲宗獵漷州栁林尹日扈從治供頓一日上問尹近郊嵗入州戸籍多寡尹愕謝莫對輒從旁具對甚習上喜顧侍臣曰是人宜為官官寧有不能㑹供應官忤㫖受誅迺授警巡院判官即不避署事先白所司言京師號賈區奇貨善物可立致官減其直嵗盡且不與雖百置市令無益卒如所白而官取需始輯秩滿府咸曰捨劉君孰使遷本院副使再遷院使厯院四曰大興宛平易縣樂陵循撫慰煦倉卒泛索不假氣色卒不使煩擾事益以理古言京師號難治若内縣得一善滿輒蹈足以去君所為官凡七遷皆畿赤繁職使忤貴近一斥不復上驅民迎合將促數苛擾曷得更取迭用以自顯若是則其治狀可無愧矣其治樂陵也鷹房數百人從旁縣來糗肉滿馬尾意樂陵可稱意讀令諭之召其首曰使果犯誠不貰汝卒避去推樂陵所為政其治他縣與府院盖可知也後為昌平路屯田總管積官至奉訓大夫卒以至元二十三年四月某日年六十有五其葬在大興縣招賢鄉烽臺村之原男六安易縣尉蚤世弼監太倉支納致事裕宗皇帝年勞補官積遷中大夫建康路總管府事佐承務郎同知深州事敏從仕郎深州判官敬承事郎藏珍庫使女三長適幽州賀進次適承務郎尚舎監丞蕭某次適嵩州判官田從義孫男九可大將仕郎同知馬籠州事可久蚤世可浩崇祥院尚印可任幼侍東宫進義校尉行篋司藥局副使可復可真國子生餘尚幼孫女五長適安平王某次適幽州郭炫保定于傑幽州朱棟蔚州宋某延祐中贈典行致官三品得贈二代始追封亞中大夫永平路總管輕車都尉宣寧郡侯夫人宋氏宣寧郡夫人而祖父亦贈中順大夫宣德府知府驍騎尉宣寧郡伯配某氏宣寧郡君桷往與太常博士楊君宗瑞游過其塾見劉氏諸孫齊襟受經雍穆有度而建康公禮法自持未老倦游肅然以門戸訓勉今觀博士行述儒素之積實繇河南來禮不忘其本遭時熙明將於是乎振遂不讓而為銘銘曰巍巍元后成𤣥功鋋戈誕指中州從麏驚鼠􅇡耄與童土金石木獸草工各飭攸職程作供徙彼儒族漸勁雄敹甲奉貢朝紫宫語言清琅纊耳聰指掌代對剖臆胷天府赤縣更選庸聵瘖獷伏氓顒顒游刃不缺至理通大椿靈根壤墳豐美蔭蔽芾宏閥崇鑱銘堅珉德彌隆將仕佐郎信州路儒學教授陳君墓誌銘大德丁未余供奉翰林與廣信陳志仲游粹然以容慎宻不妄言間語昔時祖子孫家慶故事志仲莞爾言曰吾大父迪功君大母程夫人罹兵難時年七十餘我嚴君衛鄉保入侍二老人嬉戲盥饋奉禮如昔迪功君年愈高别築華山梅堂以奉益不復知有世事于時諸孫實五世矣迪功君號南隱翁翁終時年九十有四方南隱翁無恙時諸父皆逝唯吾老人力整門戸訓兄弟子後以儒術興者凡若干人幸為我記華山焉已酉嵗秩滿南歸余師剡源戴先生教授信州亦還言廣信多郡博士獨陳博士温譲材智篤素慎行為第一方有司急庸調徴儒生幾二千人能力言而盡復其役汝官京師有名敏學字志仲者其子也與之游乎未幾志仲以信州教授致仕命歸榮其親後為宫師府司經典籍稍遷太常留錢塘遇之則又曰吾親年七十時嘗為書授敏學曰年至而仕非古也壯者必仕仕不求禄養吾視大父年不敢跂幸氣血康完若二兄恂恂善持家勉若以仕勿懼也皇慶癸丑余復入史館志仲則以太常舉將為博士冬十有一月訃至凡所與游者皆入弔越三日凶服踵門泣不能言以國子博士虞集之狀授桷㑭為銘君諱萬里字德甫弋陽縣人幼善屬文長從工部侍郎韓公禾學詞章起居郎徐公直方受理學謝公枋得張公卿弼植志節咸淳癸酉薦于鄉後起家廣信書院大修燕居堂面帶湖立諸生論古今成敗道理遺言㣲㫖文質益損皆口授手畫諸生不忍去請于官留帶湖凡十年南隱翁卒學者咸㑹葬焉雅性寛厚善清言與人交久而彌篤歉嵗疾札發粟施藥以全活家多書讐證成善本謂諸子孫天佚吾老吾遺爾書守儒為凖守身為本餘何言哉壯嵗慨然慕詞學故於章啓語尤精噫方宋文治時立博學宏詞科番陽三洪公周文忠公迄致清顯至吕成公真文忠公闡正學彌貴重真傳諸徐鳯徐鳯傳諸尚書王公應麟公曰中是科者實有命晚嵗問難無以承諸生徒自辱爾桷聞是語愧汗累日今幸與志仲交意謂從廣信山中論竟斯道今不可得矣屬纊之日戒勿用浮屠事實以九月某日卒得年七十有六以某月某日將葬于永年鄉之吉田曽祖謙道祖應隆考文光即廸功君也長子誼次天驥皆為郡學官先娶程氏出次敏學將仕郎太常太祝今方氏出女三長適方晟次徐某次方天祐孫男七人長師中第五孫宏為大都路儒學録孫女五人曽孫女二人桷嘗謂士患不得名巖居谷隱一時推可多任俠尚輕重若先生者休然養名平進安時鄉閭化之郡縣企之孫曽承之殁有餘德古所謂鄉先生者陳氏之門見之矣是宜為銘銘曰日劬其躬以濬其逢不逢樂天脩齡以終帶湖之徒來㑹幽宫彼冽者泉樹之青松而子而孫慎其延𢎞式昭墓門百祀弗窮陳士直墓誌銘咸淳三年浙西提㸃刑獄戸部陳公卒大臣以公清直挺著特官其子暠伯是曰貴白甫有子命名長曰紹廉季曰紹庭㢘言清庭言直也壬午嵗余過奉化入其里居拜戸部夫人于堂下退揖貴白甫于賓次識二子焉其季紺頂斑􅃭眉目刻成􅂱然碧光流几席稍長羣諸生誦聲琅圓端黙絶外嗜又十年貴白甫居徙江滸復入城僑館則季已加冠字曰士直神益完貌益整肅客侍立無倚怠退具醪茗動中周折不復俟指顧間從士直坐書室鉛黄森錯卷帙整束受業退暇琴清筆潤花竹手植如幢列人咸曰誠有子桷則曰是宜夀且傳噫世胄彫薾夸者馳侈靡卑者淪頽仆幼儀雅言耳目不相接垂三十年脱有能自樹植皆野人窶子椎魯不入繩墨獨士直以故家兒接受薰熟而貴白甫身教簡易故人皆愛士直静且和足以蔚其宗余亦愛士直將挈而充之使益有令聞大德丁未余官禁林有言士直遵海東游京師遲之不復至已酉歸里貴白甫泣且言曰吾紹庭甫壯以九月某日亡矣其死也遺筆叙訣無他語獨屬兄置後以慰父母明年春兄果得男曰鑄配汪氏遂育以成其言𦵏地在宅西嶼山以辛亥十有二月某日􅉎㑭桷銘謹按官譜曽祖諱某宣義郎致仕贈朝散郎祖諱肖孫朝奉大夫戸部郎中浙西提㸃刑獄嗟夫世患不能持身既壯且脩振衣康莊御轡逺騁其進莫可止輪揉軛敗卒歸于命貴白甫秉德師古迄逢不淑莫紓其悲以貌期稱余復失之天乎是果不可知也庸銘以慰而翁銘曰有􅂱者珠復沈于淵云誰尸之蒼蒼維天雲乗嶼山兆食歸復詔而兄子以衍以續戴先生墓誌銘先生諱表元字帥初一字曽伯世為慶元奉化州人七嵗學古詩文多竒語年十三即加冠入鄉校從里師習詞賦輒棄不肯學諸父強之迺游臨安于時新安方尚書逢辰廬陵劉博士辰翁以論䇿表厲進士得先生程文大竒之咸淳已已入太學改嵗以三舎法升内舎生又踰年辛未試禮部第十人登進士乙科授建康府教授越乙亥嵗由建康歸遷臨安府教授行戸部掌故皆不就積階至文林郎大德甲辰先生年六十一矣㑹執政薦于朝起家拜信州教授秩滿授婺州以疾辭至大庚戌三月卒享年六十有七先生在建康時先處州通守是邦朝夕互還往先生眉目烱聳慷慨自奮欲以言語筆札為己任嘗曰科舉取士弊不復可改幸得仕矣宜濯然自異斯可也後二年失仕歸剡遂俾桷事先生始盡棄聲律文字力言後宋百五十餘年理學與而文藝絶永嘉之學志非不勤也挈之而不至其失也萎江西諸賢力肆于辭斷章近語雜然陳列體益新而變日多故言浩漫者蕩而倨極援證者廣而類俳諧之詞獲絶于近世而一切直致棄壞繩墨棼爛不可舉文不在兹其何以垂後先生深憫焉方是時禮部尚書王公應麟天台舒公岳祥師表一代先生獨執子弟禮寸聞隻語悉囿以為文其文清深整雅蓄而始發間事摹畫而隅角不露施於人者多尤自祕重不妄許與晚嵗翰林集賢以修撰博士二職薦論而先生不可復出矣維先子與先生總角相厚善暨先生登進士年盛氣邁故舊貶抑者不敢自進先子正色相輔復以不肖孤托于先生誘之迪之獲不失其身往嵗解官南歸於是先子捐館踰一紀矣先生始愴然曰先公之德幸勿墜嗚呼朋友道喪久矣過時而哀桷實何敢忘自昔孔門首分四科厯代之士率不能兼有尊德行者後文學世嘗病焉先生為文尤多於忠厚孝悌之語後之纂言者其必有所考夫文以蘄逺果能逺矣而近者五六十年或止百餘年其不幸者又皆為水火燬没亡紀使誠盡傳也則世有能名者不一二數然視今世焯焯所傳又皆無是事噫傳與朽始固不論也曽祖辛妣劉氏祖汝明妣鄭氏考灝妣王氏世多儒科伯祖􅇐端平初為宗學諭篤厚為時輩所尊先生詩文若干卷疾革猶手加繕定以所居鄉名曰剡源集治窆張村𦵏以至大元年三月某日娶陸氏子男四初陽次紀後庚幼儒女四壻曰陸孟孫孫肖翁徐公説袁庚孫孫男女八始先生兩授徒于鄞于宣于杭其徒散處莫㑹初陽等謂從學最久而知吾父者冝莫如桷遂俾誌其墓迺泣對不敢辭銘曰桓桓戴系立氏以謚信都九江集禮秉衛在漢國鈞守正忠毅别籍于剡貞德彌勵琅然孤桐不諂其逢浩歸衡門邈焉冥鴻二季重輝續其高風箋經暢隱雅言舂容厥壤犬牙旁邑是著方門之支本茂葉附展世斯赫宗黌攸輔詵詵餘慶聿踵先武振聲鋪華先生是承有􅂱者光不竦不凌在洋峩冠掩耳以行曲裾長襜祇繋其亨千塗競譌一轍交走正歧前驅白首莫疚發其粹精如瘖脱口如轡在手如藥在肘屢躓于艱秉禮益閑有泉潺潺有佩珊珊駕言東游曰知者天卒昌其文以終丘樊張原之栢先生手植彼高為南彼鬱者北告而嗣子以順以則昭銘墓門過者必式周隱君墓誌銘先王盛時以三物教民六行之不修則設刑以糾之是六者切於人道之日用故嚴以為之防其理然也降於戰國彛倫益斁孝友著於列傳擁強貲持短長縱恣郡國作史者復傳其事豈誠有激於世乎納粟之令行虚文益張實不見於鄉黨執筆以揚人之美不偽則佞吁可懼也矣廬陵曽君巽申與桷同在翰林狀其姻家周隱君之行曰君諱天錫字極翁言安路安福州人曽大父大成大父宗元平實自持以累舉恩授迪功郎臨江軍新喻縣丞父九鼎篤信行嵗饑能損粟直以售遇朋友急厄傾貲解援裕如也牟内翰領史事將薦以自近後不果文丞相信公靳許可扁其齋居曰信太學博士劉君辰翁實銘之是生隱君嘗以詞賦上轉運所江丞相讀其文奇之事親盡孝侍疾治喪悉如禮以遵父志其待於族姻洽於鄉鄰者彌有廣焉性不事表襮勸之仕謝曰吾求全吾初遂因以自號至元二十九年十一月年五十有二以卒娶蕭氏男長孺將仕郎征東等處儒學提舉孫男三福祺祉孫女四延祐五年四月甲辰𦵏栢溪之横原讀其狀則知夫厚德之延非一世繼志紹聞久而彌光泉蹇於山木生於地磅礴鬱積有自來矣君之逺祖廣為南唐節度押衙積憲衘為御史階金紫唐廣明以來有是官曽君平居語不妄孫禎曽壻也曽之先君監察御史縣桂陽時為湖南主文實拔君為首選事可證若是銘曰有錦絅之有玉匵之蓄兮續之是用榖之廬陵之原豐碑秩秩昭其幽光詞不以溢楊府君墓誌銘江南官簿大家運綂合一緒墜諜散流降不復可考或者謂聲聞詭激德不稱名馴致是理味其語淵乎有㫖哉箕疇叙五福首次以富終之以考終命而禄位弗叙若是則尸禄位者私善惡喜怒鈎名挈譽幸終其身其禍可勝道哉至治元年余校文南宫得一士曰張純仁廣信人也調鄞縣丞鄞為余里會謁告歸純仁踵門以其舅氏之狀請銘其受氏為武夷楊氏楊繇侍讀學士徽之翰林學士億顯後有徙信之弋陽今為弋陽人其曽祖諱崧祖元龍考汝翼妣三世曰李氏程氏江氏考能詩有集曰醉吟李君明通叙之君名謙之字謙叔嘗監麻沙鎮後不復仕其所從師曰謝公君直純仁之祖教授君某其事親有誣其考以重罪君總角詣庭直其寃其居室銖黍充牣使善裕其施于鄉損粟直以濟饑買田以助縣庠其宅南有重巖水石君能専美獨樂之其娶熊氏閫助迄成其家子三長昭德次拱辰先卒季進德孫男九孫女六曽孫一其生在寶祐丙辰卒以泰定元年正月某日年六十有九其𦵏在武石山噫所謂五福斯備者歟其自號曰謙山名字與號若不相捨兹其為延永也大矣是宜銘銘曰世以禄夸我弗企之積小以高莫或躓之峩峩長松美蔭日疏迄樂其全弗僣弗踰武石之山固爾體魄爰廣墓門過者是式劉隱君墓誌銘五經之學繇宋諸儒先緝續綂緒詩首蘇轍成鄭樵易首王洙東萊吕祖謙氏後始定十二篇胡宏氏辨周官余廷椿迺漸次第書有古文今文陳振孫掇拾援據確然明白言傳心者猶依違不敢置論至天台劉君正仲諱莊孫始憤然曰吾不能接響相附和尊聞紹言各為論著不没其實而先儒之傳益顯所為書曰易志一十卷詩傳音㫖補二十卷書傳上下篇二十卷周官集傳二十卷春秋本義二十卷其論春秋為魯史之舊是則發揚先儒之遺㫖喜著書能以詞藻達幽隱復為論語章㫖老子發㣲楚辭補註音釋深衣考而其所為詩文曰芳潤藁凡五十卷和陶詩一巻噫多矣哉學患不愽愽矣其必不能有以精也士生于今㑹衆以合一由谷而之川川以達于海盖其書具在獵英聚珍朝成夕上敏而求之者良不以為艱是則於劉君見之君少學古文湛深隠伏不見其涯涘落筆數百語詩工次和愈作愈平順而幽愁感歎思其平昔狀其羇窘鑒燭清澈物莫有逃遁者性嗜酒不解治生業幼侍其父府君昇自為師弟子從閬風舒先生岳祥游唱和不輟空林絶嶂目接耳受一寓於諷詠晚嵗先會稽郡公延入塾教諸甥桷相與論經㫖徃復不避輩行蓋君篤信周官而不鄙毎置議君亦不以為忤在太學五年不善為同輩文字不獲釋褐今其所為書先師尚書王公摠而叙之大德六年十二月某日卒年六十有九娶王氏後七年卒子三長主一早夭次存翁學翁女一適董可傳𦵏于士奥之龜峯劉為寧海儒族八世祖世充為吳越王錢氏板授官閬風里有二劉曰和叔曰允叔於君為曽叔祖有文名不大光顯至君父子亦若是今遺書具在詎果無傳也邪曽祖某祖某妣某氏其子存翁嘗請銘以久官翰林不克為至是二十有四年矣今復有請愀然謝曰隠君振華續光將大有傳耆舊凘盡桷敢不自勵銘曰探㣲證墜前哲功後學剽襲誣顓蒙偉哉卓識合異同輪囷卷帙浩不窮冥搜𤣥象歌渢渢弄筆為戲箋魚蟲辟雍三黜命莫逢紀述有在蓄極通墓門永揭昭儒宗曹士𢎞墓誌銘褒貶論春秋解經者失之作史者祖之則益失其㫖矣宋祚歴三百餘年經國之綱領治迹之盛衰實書以示後其義自見深文巧避多出其子孫而為國諱者掩而益彰沿襲不決何以傳信吾友曹士𢎞甫深憂之蒐摭遺逸不瞽於昔時之議論自成一家其貫穿出入年經月緯誅其私心附以旁證莫能逃遁桷往嵗亦嘗以是自任故書燬廢不復敢因㣲言曰帝在房陵豈乾侯之例邪外大夫不書卒書卒者其是邪士𢎞甫撫掌大以愚言為然嘗約吾二人當必任是事嗚呼士𢎞甫今徃矣以余之識闇志荒不復能有成矣士𢎞甫讀書目過即成誦理財養兵禮樂刑政之損益折衷於古經而以通今所宜行者為之準其見於用也不卑於簿領而志足以展用取於友也盡其所長覆護以捨短故舉世一皆以為賢奉親孝事兄以恭訓諸生専席廣説耳聆心會争踵門受業後卒致顯仕初為郡史燕公公楠為大司農辟以自近厯婺州純孝慶元丈亭廣德陳揚村杭村巡檢後入銓曹復授陳揚村揚村父老咸曰是嘗攝吾里者矣曹君善撫字今年饑必賑我我何之君諱毅武惠王裔孫五世祖某從隆祐太后辟兵過廬陵因家焉曽祖某祖某父某有詩集六卷祖妣鄒氏妣羅氏鄒氏以叔父某太學釋褐恩封孺人所為文若干巻纂言行編曰鈎𤣥凡五十六卷疾革命諸子曰必返汝祖母故塋吾魂氣無不之得地即埋我卒以至大三年四月某日年五十有二子男五人汝霖今為兩浙轉運司書吏汝舟饒州器資宣州皆以秀才舉馳以醫業入仕幼桐孫女一適劉某先卒孫男女七嗚呼人嘗恨位卑齷齪媚上甚則䇿功利以求進名在罪籍不自悔王公貴人持與奪生殺身死無足稱道較士𢎞所負所傳得失為何如也先師禮部尚書王公應麟為文餞之曰闕里高弟冉有用矛樊遲為右士𢎞為此官文武同方之道也侍講學士張公伯淳則曰伯淳官慶元士𢎞在慈溪與之友不敢吏朱雲也汝霖汝舟皆能世其學泰定二年汝舟以書抵余求銘實不敢辭銘曰匏也不食我心孔悲聿求王明以䇿以馳輪囷知聞如山蔟雲纂史闡名不屑於文緝墜紹緒執筆是紀年不稱德傳世則偉作銘允哀以詔我同志陳縣尉墓誌銘咸淳閲十禩諸縣獨奉化號多士流出入太學上南宫亡慮十餘人于時蜚聲秀穎旁縣皆歛手避讓一時傳誦習讀謂清選不嵗月可馴致未幾皇元合一皆失仕歸里挾䇿授徒疏糲自給俱不能享中夀子弟不自振飭復歸為農陳君亦咸淳甲戌進士不自矜襮接幼待賤謙挹愈加混跡蒿翳不知其為故官而得年且八十有一有子漢復能以儒自守其視前數公良夐過矣君諱觀字國秀嘗調臨安府新城縣尉十世祖棠尉奉化因占籍焉子孫日蕃其最顯者曰太學博士著於君為兄博士倅貳臨安君館于其家君之考承務亦在館既䇿名客館其兄復賀其父人咸榮之晚嵗足不入城府州争迎致率諸生以請業君一至即謝去徜徉巖壑侍博士窮幽抉竒連唱屬和有帙曰棣萼集其自為詩文曰竅蚓集嵩里集延祐五年三月疾忽作猶力書中庸一章以授漢是月某日卒祖諱某妣戴氏以守節著事見州志考某承務郎妣臧氏董氏孫男二時説時敏孫女一已嫁次未行今𦵏剡源鄉畢駐里祔于曽祖迪功某之兆銘曰日垂崦嵫亦既見斗實命不逢怨則屢疚布衣便便迄享大年執其韋編戒子于傳維陳令族詩書是續作銘昭昭以告必復静清處士史君墓誌銘大德七年桷官翰林史先生以書見貽不獲領後二十年子壁孫橐其書藁以示反復痛悼䇿勵于桷為甚重今撮要而表之曰斯文剥喪餘數十年師表郡縣學者應格則得未嘗于其人後生不説學亦未嘗知學剔偽務實而挽之古子宜勉焉非可以虚談兾也又曰吾將死得子文表于墓桷拜手讀之泫然以泣先生於外家為舅氏猶記拜先生於獨善坊論宦族纚屬文詞顯著獨缺自吳丞相開新河有相者曰邇後當踵有之甥宜自重先生於諸經窮探微㫖證墜緝缺不溺於諛聞剖釋正大而折衷一歸於前哲論古今得失必探情偽以暴其罪正色憤悱若造庭而受其責也為文邃古不雜異説手抄口講更僕不能以盡孝悌遜讓知其出自然也先生諱蒙郷字景正生而奇頷秀目七嵗善屬文年十二入國子學通春秋周官經復兼詞賦江文忠公萬里常參政挺時為大小司成器待之咸淳元年登進士第授迪功郎復州景陵縣主簿吕少保文德帥鄂檄入幕吕命先生勉蜀帥温和解正陽圍温疑吕猜阻不肯發㣲語撼之即就道凡所需器物一夕以辦温實先公帳下校却立曰史監軍誠有子調穿山鹽場諭義勸輸戸不知有箠榎十年改江陰教授復改平江至是不復仕故其詩文多感憤自喻禮部尚書王公應麟嘗勉曰思深辭悲學陶靖節其得之維鄞史族號相門曽祖諱浤蚤夭贈中散大夫祖諱彌鞏司封郎中贈少師司封以儒學致顯當貴盛時獨卑退自持鄉人稱為獨善先生妣臧氏華國夫人考諱肯之中大夫湖北提刑兼知常德府贈太中大夫妣趙氏周氏碩人太中熟邊事折衝料變有大帥才時宰尼之太中在湖北時謁告歸省從巴川陽公岊學易春秋一年復歸國學迺中上第士常患固陋株守皓首不寤先生識足以窺淵懿經緯一原合師友之㫖老而彌實確而不懈故其成就若是自號静清晚嵗罹厄窮講道不輟從者益衆天台多名山心樂之僑居者八年大德十年七月某日卒享年六十疾漸革語諸子曰我死必歸葬不能得資良累汝汝有志其果能成也是嵗十有一月柩歸祖墓明年𦵏于陽堂鄉穆奥之原娶陸氏朝請大夫將作監合之女子壁孫孫坒孫臺孫女伯佺適葉信公夢鼎之孫揆翁仲忱適紹興中書舎人潘公良貴之曽孫世演二女未行有文集二十卷易究一十卷託永逺於少賤誠不敢承命嵗月逾邁而壁孫能遵守不貳奉遺言以請曷敢以不腆為辭銘曰貞絜陸沈志裂金石秉言無郵厄則孰職驥伏于襄不稱其德塊獨結約忿決胷臆持丸障瀾盡瘁不休卒昌者名屢空靡憂生為完人歸藏于丘有子紹學曷怨以尤清容居士集卷二十八欽定四庫全書清容居士集卷二十九元袁桷撰墓誌銘浦經厯墓誌銘大德丙午桷與吳郡浦源如淵同佐史局史局總翰林職清簡屬筆將既輒羣坐臧否今古如淵呐不出口一日正襟瞪目援酌是否纚纚數百語經史綜錯深切治道且曰吾家君重然諾慷慨子歸且往見是嵗還吳始納謁焉見其設席尋丈車屨沓戸限茗絶觴舉輒口數州郡靡敝事傾耳㸃首皆僑寓達官竒其言將引以為他日助未幾授漕運府知事朝貴人㑭乘驛來京師昌言漕計十數事不便朝從其言即陞為經厯壬子嵗桷留吳最久遂益得奉議論痛言田税民役上下交困乏將繕治其説於素所傾宻者于時以婉語止之曰害不什一除旁出苛擾殆將重病之君立悟迺止後授黄州録事判官延祐乙夘君年六十一矣嘗謂知已多行事少平時措念挺挺可表著迄莫能自見一有委使排根抉蠧將欣然盡瘁方受檄推考而卒以疾至大故實四月庚午也嗚呼成周以三物教萬民降于司馬遷憤世嫉邪獨致意任俠君周於事物激不近刻任重致逺出戸而日昃噫幸歟其不幸歟浦為吳郡著姓君諱椿字闕世家崑山州曽大父某大父某植德潛閟父某貧而好施君少試吏以曲直視事不肯有高下簡易絶城府解排糾紛磊落輒自許壯嵗恥同凡輩始辟漕運府史熟其利害府薦于朝為照磨三遷為府經厯晚授黄州而志意莫遂詎命也夫娶陳氏男五長源以編修官授承事郎常熟州判官次厚與陳夫人先七嵗卒次湜浩津女嫁同里嚴震孫男五孫女二六月乙酉葬長洲縣陳墪之原銘曰璞隠于荆彼士泣之驥伏于車曷予縶之成者匪天為者匪人不成不為其風肫肫聿昌其始有子文偉高丘永安是謂受祉司天管勾焦君墓誌銘長安焦氏世逺軼莫究宗譜有諱紹先者金太武時始著進士籍生子繼祖為河南招討使招討生餘慶第詞賦科仕至中順大夫雲陽縣令金將亡國勢蹙僨日挈都南徙達官重族棄播不自保雲陽號儒家迺讀建除候占等書察便利生死法為隠避計死未幾有子曰永字某益究術自祕天兵下陜率里閈孥屬二百九人道金洋入蜀門蜀附定悉完聚歸後家岐陽遂以術顯靈臺因官焉至元庚辰靈臺卒年六十有八男二榮陜西四川陰陽提舉顯廣元路歸興倉使女一適輔某孫男四澤臨洮府税務大使溉將仕郎同知益良州事渥岳州路陰陽教授沇延安路陰陽教授其葬在咸寧縣龍首鄉南岡合配胡氏祔大德丁未孫沇奉集賢宋公所為先塋碑與靈臺君之事狀謁某京師且曰吾祖不顯于儒躬遘險艱食藝保緒晚嵗聚經史探玩意若有俟性温重無忤色紛難急乏力盡不瘁諸父兄嶄然自持承芬振華挈挈自厲匪我祖先德疇克有賴敢以是乞銘銘曰起儒維曽逃艱以承魄藏止止昭爾孫子俾復其始滕縣尉徐君墓誌銘君諱之綱字漢臣金以詞賦舉進士君為詞賦有能名㑹金將亡不得試作賦説以示學者窮幽闡㣲合金宋體指摘昔人鉅作嶻然不少讓上論隋唐曲盡幽眇久而曰是果為學邪益探道理以河南二程江南朱張胡蔡為根柢窮春秋易二經其言春秋失始三傳左氏誣為甚常事不書聖人之㫖也易更三聖麻衣誠偽書夫子十翼功並日月其言與朱文公合當是時南北盖未混也意識卓絶尚友於千載其言論金士疑之宋號以儒立國論亦如君言其所為書東齋黙志三卷皆經説也通融賦説三卷舉子學也麟臺雜著七卷其所為詩文也皇元畧中原定地戊戌嵗始招輯儒士君以明經選益都于時李璮以諸侯兵分省君以府學教授佐省事璮喜儒間問攻戰成敗陰蓄甲士習勞苦君講經曰使民以時相君不知也璮黙然又曰平王威烈周之衰也戰國之士知諸侯而不尊周唐世河北將士尊藩鎮而不知有唐其言簡直遂黜為滕州滕縣尉讒者復以黙誌羅君禍後璮果就誅而君亦已下世中綂四年八月某日也年七十有五配李氏郭氏嗚呼崎嶇兵塵士悉以童習自守磅礴河漢横流塞而天源深非君其誰邪淄川楊公序其文矣君世家單州後徙濟州祖鐸父革俱金進士配翟氏子敬至元十三年中明經無禄即世孫天麟十七年亦中明經次鳯以積勞為益都路臨朐縣尹今承務郎慶元路總管府經厯次士龍代州儒學正曽孫若干人鳯靖共宜官愀然言曰祖父節行經學先哲推重子嘗為文字官願誌墓道遂讀其所為書以叙迺為銘銘曰魯聖絶學蕪榛菅曲説恣臆紛翩翻浮聲急響曼以繁青紫決拾靡靦顔夫子勇志開𡨕頑手持寸膠清渾瀾雲陰駮霽白日還佐鎮陳誼數斥奸拂衣避席彼搆讒寥寥道綂孰異分正轍前趨南北貫厥功茂著儒碩先遺文傳信銘永刋龍興路司獄潘君墓誌銘元貞元年桷掌吕成公麗澤祠于時夀俊有數公能言乾道淳熙遺事嘗曰麗澤選不輕二潘君真名士子繼二潘亦僅僅焉大潘君吾里人以介直忿世死小潘君弼良輔處之麗水人介亦相近氣邁年盛用世必得善譽子善識之未幾良輔來金華望之魁偉壁立瞪目拱手廣席參錯未始出半語稍論古事輒躍然纚屬穿貫握手曰大潘君死吾與子真交承矣後游京師授贑州教授見中丞崔公議論剴發相感動關絡解剔不為翕翕附中丞喜聞四方利病即奏授廣東㢘訪司管勾架閣兼照磨是後余亦入為太史屬臺使者旁午入奏事咸言良輔有御史才廣東副元帥囊槖峒冦稍㢘察即縱冦搖動斂手弗敢問遂悉發其奸蠲德慶路官逋粮三萬石劾具幕長不法數事聞于臺立罷之監司欽察公悉付以事副帥益鬱怒誘引亡賴誣衊會省臺停其職而以君劾罷者復所居官未幾御史言論劾者罪著不宜復然君卒以是去江南行臺御史列署薦君宜久任憲職于時崔公已即世不復任君矣大德十年復為贑州教授以昔之治廣者為準闢田築宫訓士嚴整力請于官而復其役皇慶二年授龍興路司獄不卑某職悉疏宜行者以盡心焉部使者佟公憲府舊屬命治佐劊専利者凡得八百人悉除去之㑹佟公去官不逞復以他事相詿誤強訴者引君然君自是抑氣不能食以死嗟夫士患不得名名與謗常角立昧昧後福善不近名誠有為而言也若是者君幾近之矣君族祖父曰叔豹曰杞世儒科皆至二千石曽祖恕樂道不仕大父垕太學進士修職郎平江府吳江縣丞父應發薦于鄉文行瑰偉士尊稱之君幼孤母項氏招師教授俾植立其為文辭浩溔勢盛衝激巖嶽風止瀾静卒不露飄泊其善養氣者與所為文號冝山集若干卷讀易管見四卷詩一卷藏于家元配何氏子二人曰龍吉鳯翔女三人長適常鍮次林定老徐天祐再娶陸氏子二人鼎臣衡孫女一人適林街三娶陳氏女二人尚幼曰昇曰鑑皆庶生孫男女各四人君卒於延祐某年七月某日卒年五十有八桷在翰苑時嘗以君薦于承㫖程公程公曰吾固知之得無以南士累乎相笑而止至治元年二月承徴至京師預考禮部進士策名得林定老後登上第授奉化州同知定老踵門拜且言曰潘君實婦翁先生嘗知之矣將以今年八月庚申𦵏朱溪祖墓敢以銘請又言婦翁嘗從先人先人卒定老生未周矻矻撫字終以女妻之繇是悲且歎曰師友道喪久矣是尤冝書銘曰長紳峩冠日出脂韋莫窒其逢委蛇以嬉白駒在谷不屑不辱決臆過都孰縶其足生人匪艱成之實難丸泥障流彼駛者繁氣直以堅維德之完謂隘不由其名奚傳江陵儒學教授岑君墓誌銘慈溪黄宗卿震之季子叔英彦實甫壻餘姚岑氏咸言岑氏善擇壻彦實館其家以詩書授子弟彬彬于于鈎深纂𤣥融液品節各就條貫掉鞅於詞塲者尤宜焉延祐五年岑君良卿以詩義上禮部第二桷時為殿試讀巻官定甲乙七年其弟士貴貢于鄉桷以至治元年再入集賢預校文選詞賦工者擢前列暨拆名則士貴也國朝治定踰百年始立科舉江南行省有三而襄郢東西淮之士亦𨽻南選三嵗止七十五人登名上于庭者三黜其二岑氏連取之盛矣哉論德考實必推其前人士貴懐牒南歸以其先府君之狀來請銘君諱翔龍字雲起踰弱冠即起家為髙節書院長調和州敎授又調江陵教授幼警敏能文辭性慕髙潔以禮自持植廢舉缺㒺有怠事鄉里稱孝謹事大府能使貴盛者咸愛重之大德九年卒年四十有五吏部教官格年踰五十始得入州教授州不滿三十而接踵嘗數百人十五年始得授且守缺近三四年逺至七八年故多不能食禄而陞于路者非耆年則下世矣君以盛年徧歴宜蒞于民不得年以没前佚後窒若有憾者未一紀兄子登進士又三年子亦進士較其得失是則亦奚有憾焉也矣娶王氏先九年卒子男五文仲朝瑞為伯父後士貴今授某官季德盛楚村女一適鄞范某至大元年𦵏於上林鄉召奥之原古者銘藏于幽後揭於墓道懼人之弗先見也禮生於人情弗忍焉耳矣迺表以銘曰蒼姬展親岑亭啓封棘陽專居傳漢益隆矯矯舞陽佐運闡功後興儒碩錮禁以終定籍會稽支居鹽官三相佐唐偉績彌刋或鳴以詩載車和鑾降宋中㣲其譜實完蹇兮在山不駛不僨卒達于川百折混混孰導其先孰開其藴肇者不居來者益振執券獲酬雙璧是陳載考令德其馨絪緼我銘以昭益勵後人河間清鹽使郝君墓誌銘君諱從字從之霸州信安縣人壯嵗秀整植聲節與人交不為險薄意拯其急難里人推德之至元十三年為河間清鹽使副後陞正使治弗煩擾而政日以理始君從弟彬弱冠事裕宗後為工部尚書官寖顯從之曰吾郝氏繇大父宛平君多惠政後宜有顯者徴左尚書吾仕宜已矣會得末疾息心斷家事調佐寒暑力補治䇿杖閭里如平時踰二十年嘗謂其子志善曰才能不如古人擇今世賢公卿如古人者事之斯近之翕赫取貴艶非進身本也志善從太傅丞相之子大夫游始為北郊署丞為監察御史而君與世嗒然益若相遺者焉延祐五年十月某日卒年七十有一噫士患不知命逐日希影挈挈然不返若君能知止矣而其弟參大政罷歸閉門幾十年亦不出今拜大司農郝氏之昌殆未易量也考諱德仁妣李氏宛平縣君祖諱政以參政贈資德大夫尚書右丞追封薊國公諡康靖妣賈氏薊國夫人配劉氏二女長適楊居義次適集賢照磨李忠將以十有二月某日𦵏宛平君墓左御史來乞銘銘曰始竒終閟覿德日温訓言衡門不華以尊曄曄大椿灌膏培根弗利其身利其後昆翰林學士承㫖贈大司徒魯國王文肅公墓誌銘翰林承㫖贈大司徒魯國王文肅公至大三年六十有六薨京師假𦵏于城東隅至治元年其孤翰林待制士熙始克奉柩以某月某日𦵏東平祖塋瓠山之原士熙拜且泣曰墓上碑則父友翰林學士陳公儼屬比銘之矣今𦵏日薄知吾先公莫若子幸誌其歴官行事納諸幽堂桷不敢辭為之辭曰公諱構字肯堂年弱冠以詞賦入鄉校賈文正公一見器偉之禮載以歸㑭教授某子遂來京師至元十一年授翰林國史院編修官繇院中叙遷應奉修撰陞侍講進翰林學士訖承㫖佐丞相府為司直歴吏部禮部二郎中太常為少卿於臺外江北淮東道提刑按察使副内治書侍御史入省參議中書省事復出守濟南公之在翰林也辭命詔令多所撰述其最傳于朝者曰世祖皇帝謚冊追謚太祖冊武宗皇后冊於實録預修世祖成宗兩皇帝定武宗上尊號親享太廟儀在太常考輯因革有叙其佐丞相府剗刮蠧弊更始選士丞相齊魯公信從之為治書時值桑葛擅中書政柄嫉方直士檄公偕翰林承㫖魯國文貞卜忽木公覈究燕南錢糓約一月治辦公先事計畫不以累魯公㑹桑葛誅迺得免其按淮西不切切近名而吏亦不敢慢事治吏禮二部無缺緩同列見公署事不復視成牘以行參議府六年一時執政聴南士陳利便搜括田賦時平章政事何公榮祖與公正色不少讓摧萌折貪卒㑭其謀以寢始天兵平宋詔徴賢能李學士槃同受㫖公至杭首言宋三館圖籍太常天章禮器輿仗儀注當悉輦歸于朝董趙公文炳從其言今宋實録正史藏史院繇公以完守濟南寛貧民官逋修閔子祠復學田觴詠自娛而訟益以簡承㫖李公謙幼師之遷應奉卒推以先始受命勤敏通愽一時鉅公皆屈已期奬後卒與相並史館辟署亡慮數十人今相躡清要皆門下士其為文開閤詠諷落筆纚屬不止於王言為尤長臺閣故事資公始能奉行事兄戸部侍郎桓如嚴父惇婣睦宗在中書迄不肯私其親人益伏之同里陳公儼為孔顔孟教授年幾五十矣入徴拜監察御史未幾為翰林直學士蓋公昔嘗薦之王愷年七十為編脩官公請于朝以待制致其事資歴循叙銓衡所宜守文字官陞擢詔㫖具在後為繼者緘口不薦一士視公誠可愧也公之系繇琅琊居東平自八世祖為宋司農卿守鄆因家焉曽祖瑀登金進士第官奉訓大夫滄州無棣令妣范氏祖鐸以公官承㫖贈正奉大夫太常太卿妣杜氏臨沂郡夫人父公淵贈昭文館大學士資德大夫妣薛氏瑯琊郡夫人昭文當金亡時有兄三人攜妻孥南徙昭文私自念王氏大墓盡族以行孰與守下車伏草莽兄呼其名第不復得後騎迫大慟以去昭文傭保自活迄全其墓厚德勃興於公見之矣娶薛氏魯國夫人是生士熙再娶許氏皆先卒晚嵗得二子士㸃士然女一嫁薛晉士熙能文辭有聲將大用於世推薦賢之功王氏殆未艾也銘曰德充智周世莫與儔士林之標奬士無方譽髦珪璋孰阨其遭文鳴盛世金石雜比厥聲四昭子也允文戰兢紹聞嗚呼乎公之名益以高磁州知州程君墓誌銘程君諱翔字鵬舉以孝友聞于州里後其子若弟官江南恂恂愉愉夐然異衣冠常流於是江南之士族咸取以為則嗟夫世降俗媮能竭力以養者有矣友于之乖君師之嚴不能以户化若程君者發於良心成於身教是宜揭豐碑以昭示薄俗按其狀曰世家廣平大墓在城西南兵難譜軼獨記其父名約是生三子長即鵬舉仲曰翺仕至僉浙東㢘訪司事叔曰翼吉州治中二季以宦業表著皆君之教君綜家治生服其勤勞㑭弟悉意問學聚書延師靡宻叢雜一不使亂意弟則曰匪我之能維吾兄之成其事父承接意㫖日侍食俟可否或却食即不敢食懷甘割鮮斥幼者避席以立佐治湯液時其寒燠卒能以上夀終既除喪謹上冡禮修誠厲行分寸不使越繩墨鄉閭尊之昭文學士張公孔孫集賢學士劉公愻曰吾徒不能以卓行薦諸朝是誠有愧年七十有一卒於元貞二年正月七日𦵏某鄉娶張氏子四良弼良輔良佑良佐君疾革呼諸子曰父死異財違古禮慎遵我訓若君者懿德斯備而復以囑其子程氏之澤良未艾也良佑始仕在中書右司歴參議府户部宣徽院改授太常太祝出為鎮江常州推官浙東道宣慰司都元帥府都事甫解職以選守令授奉政大夫上都路興州知州孫十人孫女九人良佑來請銘君弟之子良能松江府横浦場司丞良士温州路永嘉場監運亦曰伯父事實將湮佚宜速銘以詔後君以推恩贈奉政大夫磁州知州驍騎尉追封廣平縣子張氏追封廣平縣君銘曰惟民初生其仁肫肫摩盪恣情有戾彛倫展也磁州執德養淳奉盈臨淵踧踖以遵陳饌在堂手函脆新候顔以趨厥容孔温爰用則之施于家人濟濟鴈行厥聲四聞永裕是嗣振于朝紳城南之塋有大維椿爰勵薄俗表兹堅珉榮禄大夫大司徒特進饒國吴公饒國夫人舒氏墓誌銘至大三年武宗皇帝廣孝錫類以翰林學士中順大夫致仕吳公克已特授榮禄大夫大司徒封饒國公妻舒氏饒國夫人夫婦同日受封其子𤣥德真人𤣥教嗣師全節歸饒州安仁縣下馬入里門奉制書跪堂上二老人却立望闕拜命誠夐軼前古延祐元年夀八十仁宗皇帝遵先帝故事錫上尊文錦以尊顯之表署宅里榮耀極致人子之崇侈其親者兹亦備矣𤣥教嗣師實開府大宗師張公留孫之大弟子延祐六年公與夫人夀八十有五五月丙辰公薨全節號泣不食得請于上倍道星馳以歸十有一月某日饒國夫人相繼即世嗚呼生榮死戚訖同以歸盛矣哉人子之事其親情至矣而養弗能以盡養足以盡而禄弗及者千萬焉貴極於王侯褒追之禮見於墓下則凡通顯之事親者十無二三焉合唐宋譜胄幾七百年具慶僅一二見吳氏之德胚胎磅礴是誠有由來矣喪禮莫嚴於儒者飾情表行哀不足而溢於禮者多矣𤣥德力行而兼有之兹難能也至治二年春全節泣且告曰將以九月某日合𦵏于崇德鄉山田原願述我先公先夫人之世系而銘之隧道有碑翰林學士元公則為之矣古者墓而不墳藏銘于幽懼世之久而弗知也視其姓名有不忍人之心焉後之慮其親者則曰立於墓人之見之者不忍矣何藏焉碑於隧斯敬矣銘於墓斯仁矣謹按番易吳氏皆祖番君芮饒公曽祖岳祖夢闕父鑑追封某官謚文靖妣陳氏追封饒國夫人公字祥甫卑讓自持不善者避之善者從之身貴矣禮鄉黨以和視後進煦然以奬誘觴至益持重戒其子侍帝左右毋以我耄為往返夫人舒氏諱妙真世儒族祖某父某公蚤事舅姑盡孝敬晚嵗主祭享親滌濯遇諱日淚涕滿頤睫内閫姻黨咸儀則之高堂齊眉人以為福德具備何憾焉子四詢承事郎誠蚤卒叔即𤣥德君季全義女二嫁某官孫男五人善集賢修撰能文詞孫女若干曽孫男女九人銘曰抑抑吳伯植節秉仁毁形以逃克昌𦙍孫傳國中圯是生番君得其民心徙王策勲代有顯賢支庶日繁廟食演裔饒惟邇親執經武夷源同派分是生饒公守謙以文大盈彌虚黜驕鏡昬厥配氏舒廬江之蕃相唐始興矢辭派騫楚吳犬牙譜諜是遵德儀嫓賢象服衯衯訓子以忠不私其門顯晦偕老死生同根道以易傳德以簡尊悼哉令宗允顯皇元海陰陳處士墓誌銘咸淳元二間吾里陳公肖孫以善政事驟用繇大理寺丞知嘉興輔郡未幾兼浙西提㸃刑獄踰年兼度支郎官人謂且大用矣會旁郡山冦起罷歸不數月疾卒喪除其子暠伯候平章賈某于馬前平章入政事堂謂宰屬曰陳肖孫一㢘可取冝與致仕恩官其子當上奏餘人勿得為例既授將仕郎宋社亡不復可仕矣鄉人尊之為海陰先生先生少嵗力古學不屑事科舉聚羣經師説商畧讎證下逮旁聞曲記遺言懿行譜牒星厯之説皆手抄與梓本書相並篤於信行傾急解難道里寒暑不廢其學深湛詳博尊聞傳信懼悞解者汨其真嘗禁止之非其友不友既友矣必反覆護衛不使有議之者友或叛去先生泊然不為言人益服之桷先處州府君於朋友義尤敦叙而先生行事亦相近故交好尤善厚先府君即世時來城中愛撫彌厚嘗曰汝父宜有後昔百受欺今詎使一無報邪大德五年桷備翰苑屬後屢遷先生喜溢眉睫曰吾所期誠不妄延祐六年二月得㣲疾作書與常往來戒用浮屠事且命桷誌其墓幸以故人子何敢辭先生字貴白甫世居奉化之鵁鶄山卒時年七十有七𦵏某鄉某原妣方氏封安人曽祖聰謀妣孫氏祖師稷以度支明堂恩贈朝散郎妣陸氏鄔氏追封安人娶樓氏子二人紹㢘紹庭孫二人先生仕不逢時學不展用熙熙然以夀終於後人有徴可無銘以俟銘曰駕車康衢佐䕫龍日昃之離命不逢寤言弗告隠志充畬田瘁耕黍稷豐考覈琬琰手澤功大椿養齡蔭巃嵸靈璞久閟合鴻濛是式是佀後當隆處士黄仲正甫墓誌銘嗚呼自聘舉之法疏人得以易售抱德藝者羞之後法始宻益不肯自進有薦之人不盡識或曰彼士奚足取又或曰士若是者衆使一取之將曳踵以至桷官翰林最久故有若吾黄仲正甫之賢明經博聞卒不能啓口以告于當路嗚呼今亡矣果使無傳則誠有罪矣仲正事母孝居家無語笑聲待弟姪不使有忤意持敬讓以禮宗姻鄉黨長者洽之幼者慕之其學汪洋暢整經以載道必考其精㣲幽顯之委折於史辨疆理氏族制度官名之興廢旁搜博徴曲而通確而明故為文辭纚屬不能以窮將臻乎極而始底于用欲以名世者不在仕進也有司三奉科舉令卒不應試而嘗以其説授于其徒昔者聖賢憂道不行於時由列國言之識遇焉斯得矣今天下一轍達而上者其説具在布衣焉以遺逸舉進以秩禄恧縮在下不能有為仲正之不屑者在是儒病通乎古而不知今昔之在上位顓重名其行事執愎誤後世甚者竊高爵講説他方以鈎徴召仲正嘗勃然不喜然竟不假以年則誠可哀也已仲正諱叔雅父震宗正少卿提舉浙東常平茶鹽咸淳間號名二千石晚嵗高遯以卒仲正不仕繼志焉耳矣世居慶元慈溪縣鳴鶴鄉曽祖世垚祖一鶚贈朝奉郎妣趙氏配鄭氏司農寺主簿大澤之女子二人正倫正倩今𦵏韋家奥之原延祐七年五月二十二日卒年五十有四銘曰闚觀稱貞舉世顯榮肥遯靡求孰為之升君允矣恬搴竒漱英求知者天卒韜智名有年不修莫究其成我銘孔哀以永厥聲將作監主簿蔣公墓誌銘朝奉大夫將作監主簿蔣公諱曉字堯臣淳祐七年進士以至元二十四年卒年七十有一𦵏奉化州長夀鄉邵奥之麓曽祖楩朝奉郎通判台州贈中奉大夫祖如愚朝請郎通判隆興府贈太中大夫曽祖妣張氏楊氏伍氏贈令人祖妣諸葛氏封安人贈淑人考嶠文林郎池州貴溪縣丞贈朝奉大夫妣湯氏贈宜人既𦵏三十有六年長子景先卒無子次子昭先次其先德家譜來請曰蔣實望族七世昭穆皆鉅公著銘罔缺軼我先人在時子以子孫禮見且承學今子在太史非子銘其誰宜桷不敢讓銘曰蔣姓宗姬函亭漢侯居鄞發祥唐季是稠厥孫評事清浄急施有嗣金紫益振以義忠肅陳公謫明絶朋俾子允師連桂以登曰高祖考宰邑孤高相京傳私卒忤以逃是生台州繼以隆興倅貳有聲再世是繩詵詵貴池丞邑退卑厥兄諫議職穹聞馳􅉖弟有孤將授門功公謝弗受迄升南宫試簿仙居復攝寧海却妖節浮民靡匱貸入理京獄直囚不刑探其隠奸大尹以驚出邑武進遄易分水嚴盜獗張召公顓治摩磔羸頑請粟食賑楮帛賦繁直疏罷進神存正祀學飾新象彼厖者叟祠祝泣想爰倅于越撫民彌加計臣増輸牘諫戢譁佐餉既終監舶蒞温香珠翠毳罔游于門輯為成書以儆墨惽彼相嫉㢘改司匭函白璧襲緹卒罹其讒晚佐繕營國步日窘墼竇食貧絶見喜愠少窺刑書復入詞學記言博精灑墨清犖譜書庚申文紀甲子視階郎中澤奏冡嗣嵗行丁亥九月庚戌飾巾辭終夀七十一厥嬪氏曹箋詩之曽子曰景先無禄絶承有季昭先守儒俟徴墓在州南先域接挹集藏于家厥帙為十維公儀觀偉古動人前聞後訛指掌剖陳巍坐若尸不傾不陂彼諂有徒正色以止耆舊川淪來者荒塞昭銘墓門以作後則清容居士集巻二十九欽定四庫全書清容居士集巻三十元袁桷撰墓誌銘墓表𦵏記宣武將軍夀春副萬户吳侯墓誌銘往者夀春為宿亳要衝犬牙相承城郭樓櫓移易無常所草舎殘缺狐兔出没道途間築覆土窖以避妻子短兵迎接利不利不復計猶持農器治田壤惴惴求活嵗率如是世祖皇帝以天兵取江南捨兩淮為最後至元十一年外渡江十二年平江東抵錢塘宋社告亡十三年兩淮争奉地圖以降無鏃刃之費天下大定而淮始得為樂土矣當是時吴侯祐以夀春歸職方其子安民字惠卿侍父承顔行率部伍招輯潰卒控曹橋下獨松渡越江畧定㑹稽台温三城南踰閩嶺拔莆田擒將李雄生俘其守臣而以功歸其父二大帥曰呉氏子宜第其戰多别有以賞勵乃署千夫長十四年父卒始襲爵佩金符為管軍總管鎮揚州十八年大治兵伐日本拜疏請行授宣武將軍征東副萬戸領淮東西兵以先舟師抵其國八月􅄓風大作器械軍士沈溺物故袽破舟亂流以經海島高麗日本二國常不相能遇高麗邏人問所以載與還而先帝亦厭兵罷征矣二十年建黄華反奉命往討之至政和縣獲賊將度九峰嶺接戰益急得其偽署圖籍虜驍將以歸十有二月昧爽進軍平溪華盡死力拒砦赤巖山盡俘其器甲族屬黄華始平迴鎮揚州二十一年省治杭州從與俱其年鎮湖州路南潯明年調嘉興路海鹽未幾復還南潯又還鎮夀春二十四年詔領軍討交趾至黄州罷兵二十六年鍾世明叛江西呉太仲叛興國縣搏竒蹂虚率以底寧上功司勲輒卑退不欲言三十年移鎮和州大德四年七月某日即世年五十有七娶楊氏先卒子男若干人長繼武襲其爵𦵏于宣武侯之墓左曽祖某祖某妣某氏予嘗聞古名將垂老呐呐若不能言祕畫勇畧壯嵗所施無留藴閲成敗得失已盡醇酒鐘皷夫豈託焉以自完者與烏江馬君某言吳侯知儒書後悟浮屠氏禪學充然若有得其女弟亦能為禪人偈語是皆世所鮮有者銘曰維昔淮甸勁雄莫侔一夫當百鋋戈怒投裹彼乾餱聿嚴盛秋養安懷慆苞桑靡謀天錫大帝神武興邦捨其喉襟投鞭浮江俘駑擒驍百城舂撞視彼彈丸後夫卒降桓桓吳侯效命奉職以其素能昭代著績褰裳先登飈掠電激或乗其􅇖或躡其跡瞻彼霍山雲流無蹤昔困于兵今黍芃芃繄帝之功維民之逢侯之幽宫松栢茂直告而孫子靡懈靡􅑯法其退謙恬静以黙我思于淮作銘示刻同知樂平州事許世茂墓誌銘端平三年蜀破衣冠大姓順流下東南至江陵十不存一二皆舟觸巖崿瞬息以死淳祐三年蜀益蹙避兵來南其物故與端平無異宋主憫其流離悉擢列在位大者輔政機備獻納外為閫臣郡將經術史學四方取以為宗則宋既亡故國世臣益困辱不自振淪胥泥塗非獨蜀士然也大德七年桷備史屬選與虞忠肅公孫集交許君松以湖廣掾上計京師詢其官簿則顯謨閣學士給事中少保諱奕之曽孫中奉大夫知紹熙府謚介節諱彪祖之孫奉議郎通判涪州諱長源之子君字世茂懿範世則珠貫而櫛比語西蜀事厯厯在指掌清言雅儀筆札擅簡古卑讓恥與後進較酒至醉愈恭不復作世俗語遂締與之交至大元年授潭州榷茶副使再見之貌益温論事盡繩墨智圓氣完欲以政理自表見故其為茶官也不務苛刻而課有贏羨仁宗皇帝立科舉以君考鄉試自喜曰吾嘗貢于鄉黜浮培實宜以稱明詔是嵗君所貢士入南省號為得人延祐五年授徽州路婺源州判官復與語輒愀然曰吾家繇開慶初辭簡池寓南康墳墓井邑生别踰五十年貧不能忘禄齷齪州縣弗得以文墨顯吾何為哉其治婺源益自振剔絶蔓探疑明以近民而盜跡不敢入境至治二年見其神益清貌益癯舉酒屢酌却雋永猶喜議當世事桷與翰林直學士曹君元用子貞共署薦為湖廣提舉儒學思以佚其老集賢直學士鄧君文原善之亦曰是舉誠不忝吾為江東分部使者嘗舉其政事文學矣十一月授承直郎饒州路同知樂平州事嵗終得上氣疾正月甲午終于邸舎年七十有二曽祖妣某氏祖妣某氏妣某氏娶趙氏再娶陳氏子男若干人女若干人孫男若干人始君居南康閉門授徒以奉母右丞燕公公楠開營田司知其賢取以為佐後遷行大司農益任之掾湖廣省六七年能以儒術輔法令事明理融無底滯固陋一時吏師尊禮之君始生踰百日晝夜啼不止有僧祝其頂曰汝為許氏子啼何為耶啼乃止未幾涪州下世年八嵗隨舅氏茶馬趙君寓江陵里有灾能取涪州神主奉以逃稍長益自奮勵諸老咸器偉故晚嵗宦業雖不大顯而行事有足稱者其喪歸以某月某日葬于某原子􅀈踵門以廣信劉君光事狀泣曰願請銘桷泣相向不復辭嘉定更元韓侂胄誅解偽學禁先少師正獻公曽大父樞宻越公相繼入著作庭給事中少保許公巍科首班著善類肅穆天下傾動未幾少保論外戚不合去今幾百二十年閲昔時題名求其嗣續率皆澌盡銷鑠而桷與世茂俱為曽孫相顧自保灰編墜簡證世德之舊於世茂實有望今死矣雖欲勿哀其可乎銘曰蜀繇秦開千載底寧英光蜚聲山川耀靈漢魏啓伐不假以兵唐宋踵規開門晝迎錦楹繡牆夸浮日矜帝鑒地圖百神震驚氈車轟轟金戈晶熒自西徂東舳艫貫繩或沈于淵或疫以乗蹇蹇許公疑丞弗登是生介節嬰彼孤城恂恂涪州弱息慎承流離拮据守其書籯儒以飭身政以裕名匪急於禄抗宗希成凡我士族欒范是懲東南之區凜其春冰我思許君是用述銘任隠君墓誌銘鄞甬東横溪多郡宗故家桷之七世祖祥符丞而下娶婦皆楊氏少保夫人曰申國太保曰越國魯國太師曰齊國幾三百年矣楊袁為中外表嵗時往還無虚日而甬東任氏與楊姻婭亦十餘傳一日任氏子元善介予表兄楊仁之以其先君子之狀求銘復録其十九世祖唐建州司馬逺之𦵏記以示其記曰建州生佶檢校尚書工部貟外郎兼侍御史是生崇試循州司馬循州生貞幹元和十三年補集賢殿供奉承㫖後為越州都督府功曹叅軍以終集賢生行規大中時以明經薦于鄉舉上第為蘇州司兵叅軍吾里士族莫先於樓袁楊蔣作郡志者於任有缺仕莫榮於集賢承㫖承㫖布衣為者也職撰述校理在元和時任不輕畀司兵以明經登唐上第尤偉著志亦不紀考孫吳有任光任奕皆鄮句章人今其地為鄞縣則建州蓋二賢之裔而先賢皆遺軼比予補郡乗亦缺然有愧矣嘗考大中以後鄞數為盜侵掠城燬蕩遷徙錢氏以宗親専節鎮租税刮剥民不堪奉昔時故族躪藉銷鑠於任氏槩可見至宋受版圖興文儒鄞士在汴始盛渡江以南雲滃川湧幾二百年而不幸數十年詩書廢墜望塵執𨽻欲為任氏十九世之傳不可得噫可勝嘆哉可勝道哉任君名天祺字君瑞曽祖汝諒祖用康父逢龍其居鄉善保衛徴調數起先事以備縣胥不能高下友其弟天麟弟病酒死曰吾不可使弟無後殯其喪俟我死必俱𦵏也大德七年六月某日卒年五十有八未幾婦顧氏亦卒以其遺言大德十一年十二月丁酉奉柩與弟及婦俱𦵏于吳公山之祖塋妻屠氏四子元善可善承弟後達善兼善孫男四立道𢎞道鳴道原道孫女三立道楊氏壻也銘曰世胄日顛任譜完堂堂文藝志録傳昔通今晦理則然鄉井急誼手可捐金峩東聳下泓泉蹇極遇順盈百川我銘考官以昭先歴十九世緒益延焯哉任恤德靡愆率而雲仍亘千年史景賢墓誌銘君諱韋卿字景賢鄞史氏故國世臣太師承相保寧軍節度使越忠定王諱浩為曽祖妣貝氏魏越國夫人太師中書令保寧昭信軍節度使衛忠獻王諱彌逺為祖妣潘氏齊魯國夫人觀文殿學士正奉大夫奉化郡公諱宇之為考妣趙氏高平郡主君幼成合矩度進退持奉侍立占對識者知真王孫筆墨書史楚楚自將皆有法郡公目送深念之稍長鉛采自陶冩蒼松㫁崖昂然有遺世意宫商敷宣綵鸞詠而鳯幽鳴也退静韜匿𡨕會於千載之上察其念良是矣郡公職二品君當以京官入仕生晚禄弗及至治三年秋八月得上氣疾却藥賦詩出别於宗親桷時官京師呼桷子瓘立牀下曰為吾語而翁求銘以昭吾志焉越翌日辛酉果卒嗚呼年甫四十有八章綬積襲隠顯有定數至於年亦不得永是可哀也已維忠定王桷外高祖幼習外家獻文世德相業焯在宋史不敢論獨叙三世夀考以増君之悲維忠定以三公居東湖三十年陪祠慶夀秀骨山立多士秉笏交語曰史太師真夀相年八十有九即世忠獻獨相二宗二十有七年總核庶政燭照藪納罔有缺年七十以終郡公恂退若癯儒龎眉素毫冰玉照焜鄉黨年七十有九迺終夀種彰灼若是君才不得一見施設年又不能以紹傳是大可哀也已子一性孫女二將以某年某月𦵏鄞縣陽堂鄉金嶴之原銘曰寥寥東陵瓜圓熟沈𡨕里閭企高躅達人知命化不恧手持參差入雲谷周公魯公儼初服奉蓍以占剥斯復學詩習禮在嗣續我銘孔悲辭匪瀆佳城鬰蒼覘宰木袁州知事孔君墓誌銘大德初元孔君昭孫明逺甫為慶元儒學正于時禮部尚書王先生應麟師表後進門無雜賓明逺以通家子執疑證訛桷每連席請益時則有教授某恣睢自負語侵先生迺憤然曰吾不能與之共處疏其謬誕十數事鳴憲府人益奇其抗直有先中丞遺風是後為蘄陽教授蘄陽舊為邊障地君能化其俗使稍就學久之丕變為儒士皇慶元年授慈溪縣主簿郡人咸曰是斥故教授者飭躬以廉民莫敢病未幾江浙省取為掾會歲歉計富人籍田出粟以賑吏不能舞文粟悉入市其直輙减宰輔竒之延祐某年授從仕郎東州知事秩滿泰定元年以疾卒時年六十有二君實孔子五十二世孫中丞為大宗傳四十有七世中奉公傳與其從子玠南徙三衢賜廟譜諜章灼而君之考諱某咸淳間為名太守後僉書樞宻院事職進資政殿大學士而大父某亦贈太子少師謚文介曽大父諱某贈某官妣某氏某氏某氏俱贈郡夫人噫士常患為世家紹宗趾媺懼難以繼仕顯矣德不稱無取也言足以斥姦發揚剛毅是則於孔君見之仕雖不大振於孔君何憾焉予嘗與君繇義烏同邸宿至婺學旬日危坐論古今各欲以名節相勉而懷竒抱介予輒讓不敢今歸老田里期為全人思一見明逺不可得至是淇來請銘安得勿哭也已娶王氏前進士集之女男六淇淮繼兄後海蚤世㳙繼弟後建德儒學正瀛慶元昌國州儒學正滸早夭女二闕陰王墉富春張順可某年某月𦵏葉水浮河原銘曰金剛而冰清行之成也白兮不緇德之貞也憤世嫉阿全粹精也謝彼戚施實蜻蛉也銘以揭之歸藏永寧也僉事范君墓誌銘大德六年范君子誠為平江路經歴于時桷將之京師道吳其郡大夫疑忌事多不決范君抱牘堂上定可否大夫頷頷不復有異議人皆曰是真賛畫才嗣後為掾中書仁宗皇帝在東宫興崇禮文廣廟祭凡視執政者率増贊書桷時日具紙墨君排剔研討使各中繩式莫有訾議嗣爾厭繁劇告外補湖州推官又為黄巖州州與鄞相犬牙治跡賢否嘗耳接巷議州民來鄞必曰吾州黄氏子號豪民范侯能挫抑之帖首受罪後予直集賢黄巖之儒生暨商于城坰者咸告曰黄生易黄冠訴范侯以不直遂議于大學士郭公訖不受其説精神籠絡貫穿于儒術法律將大展其用而其子景文踵門泣以告曰先君之不禄在泰定二年閏月某日得年七十道逺不克歸𦵏以是嵗二月某日與大父奉議君俱𦵏于平江路長洲縣武丘鄉白蓮橋之址原知先君莫如子敢以銘請謹按君諱忠其先京兆藍田人後籍真定今三世矣其為仕首受史丞相之孫耀辟為浙東宣尉府掾改受蘭溪主簿再辟江浙行省掾迺授平江路經厯又授揚州路經厯不赴改辟都省掾授湖州路推官以選能為海道府千户分治四明知台州黄巖州英宗皇帝詔風憲舉守令再知徽州婺源改同知福建轉運鹽司事泰定元年擢僉江南浙西道肅政㢘訪司事其簿蘭溪嘗攝尉事捕造偽楮當受賞君謝不取在湖州有訟弟死非命且疑弟婦受賂焚其尸君録囚考弟實以鬬死婦始得脱湖多淫祠毁三百六十以治官舎分漕四明首拓廰事嚴竦治具新天妃宫以肅祠使其治黄巖黄氏事最著正彛倫絶攘奪尸祝口誦宣著于郡乗婺源俗尚競渡易其舟為浮梁民不病涉在閩中鹽足於民而私貿者悉絶考其所居官興建鋤擊為已任絶功利守名實為君素志迄不展大用夀與禄不失其願亦可無憾矣嘗註禮殿祭器書二十巻歸于鄉學集賢王公仲常為文以美篤于慈孝䘏宗録孤故贈禮部郎中白公某壯嵗深奇之妻以女君感知已凡所為樂府梓刻以傳曽祖昻霄金大安元年進士官正議大夫同知静難軍節度使兼邠州觀察使祖元泰元授從仕郎同知解州事父天祐汀州路經厯贈奉議大夫真定路趙州知州驍騎尉元氏縣子景文由臨安主簿辟江浙行省掾敏修善吏事其進將未艾孫二公琇公琰孫女五乃為銘曰吏詬于儒以儒為拘儒以病吏其刻莫渝據會綂宗孰承其傳温温范侯趾媺紹先化其奇觚不急以干削豪翦強欲援以手謂不大逢亦既禄夀世方尚名我獨掎之彼喜以功縮武避之武丘之原松栢峙植魂無不之子孫承式鄭照磨墓誌銘鄭威敏公驤以靖康虜難死同州紹興録孤褒忠賜廟愍節至于其孫建德登進士第延賞守祠世嗣不絶五世孫諱元貞實奉祠事生孫曰端是生汝賢為江西安撫司準遣生檜為都酒庫官君之父也君諱文瑞字子祥生而骨相殊特府君深竒之稍長從鄉先生課程文有能聲科舉既廢居里閭以孝謹稱至元間下令舉儒吏實預首選試郡功曹移典玉山郡侯復取自近省授監平江路倉轉海道萬户案牘官再為海鹽州案牘轉行省鈔庫副使平江庾氏嵗入浩夥不得脱君獨以治辨稱海鹽多豪民殺人率遣奴償死君能直之行省積弊楮三年不毁君上言申其數而嵗除之後取以為法泰定元年勅授將仕郎浙東道宣慰司照磨兼承發架閣予見君于京師言議縝宻剸割苛冗中綮節暨官帥司下帷沈思吏跡不入戸勾稽研覈充然益有餘地古之善居官者必自持家始自衣冠丘墟不復給足荷戈負耒何可勝道念昔信實要衝君獨善理其身掇拾化治任能竭力相其天時權其贏竒卒昌於官以發其素藴是殆於君見之抑又聞之流光演休首於死節宋社云亡忠義之録一二僅見則威敏之澤雖十世未艾君續其承猗與盛哉其卒在泰定三年九月某日年六十有三某月某日𦵏某縣某鄉子男四謙亨復亨鼎亨泰亨女三嫁黄中正孫良玘葉原道皆仕族孫男七孫女七娶姚氏曽祖妣蘧氏祖妣劉氏妣謝氏謙亨奉柩將歸里踵門泣以告曰先生故大門知官譜唯詳而吾里獲銘者數家矧先子世系若是敢以請銘曰志專豐崇足昌其躬家傳于忠蹇事于公羙玉襲之良馬縶之不泄不辱以紹以續作之怦怦承之競競而子而孫視我斯銘文清薛處士墓誌銘孔子叙逸民謂其求志達道超然於塵垢之外心若槁木形若蟬蛻動莫有跡行莫可名其混世也物莫與俱𡨕神内觀返真潜虚若是者其近之矣故昔之善晦匿者草衣非食不導引以夀養其天年恣縱泉石厯探逺挹興至而若遺擇幽絜以養其雅操求於世吾不得而見之矣今得一人焉曰處士薛君勉薛君信州貴溪故儒家自其曽大父子徹以儒科縣南丹大父琢父士亨繼業進士君益以儒自勵居鄉黨教授名不蘄彰沖然有容守約自裕游湖湘極交廣返築室于宜陽納幽據勝為堂曰寶善以示子孫泰定三年四月某日卒年六十有八族黨姻戚咸會哭曰先生儒以紹傳兹其為文也宜矣固窮而無求貽書以遺後其得不謂之清乎遂私謚之曰文清子二𤣥羲𤣥儀𤣥羲與余為方外交在崇真宫數評議吾徒所當為事詞章清峭翰墨簡絜每視之嘗以為不可及君既死求銘於余實不敢辭在易蠱之上九不事王侯高尚其志而初爻則曰有子考無咎嗟夫離世絶俗念不存於家非子承意曷克臻濟是肥遯者猶相須以成也妣王氏配孔氏孫男二女一以某月某日葬銘曰㝠飛維鴻莫窮去還飄搖長裾游於海寰沈匿不羈謝彼世艱貞簡峻清玉雪者顔支離佀困爰養其遯先賢高風承耳接論葆真藏名永裕嘉問振振有子益昌者名三光盪摩服其粹精有大之松清風泠泠非培曷成非繼孰承海鹽州儒學教授袁府君墓表維袁氏四明大族繇處州太守諱轂試開封府第一登嘉祐四年進士第佐蘇文忠守杭文忠為同年生後贈光禄大夫生倉部郎中諱灼得罪政和以歸生贈朝奉諱埛朝奉生通議大夫諱文通議生龍圖閣學士贈少師諱燮嘗以禮部侍郎専史事謚正獻天下稱為絜齋先生桷七世祖諱㲄試開封以中書守當官遷祥符縣丞生曽孫為少傳同知樞宻院事諱韶贈太師越國公受學正獻公於宗譜為族子相踵登淳熙進士第同入秘書省為史官先後為侍從搢紳榮之正獻生子四人俱至名卿尚書東宫官而第三子最清顯嘉定七年進士第一再任國子祭酒仕至兵部尚書給事中實録史院修撰諱甫贈少傅謚正肅天下稱為蒙齋先生正肅次子諱徯通判潭州是生君諱裒字德平以安定長授海鹽州儒學教授未拜延祐七年六月二十日卒年六十有一嗚呼甲族鼎貴莫盛吾里甍棟接耀郡守丞監官議婚對未肯齒擬華腴争高姿庾悦澤可愛念遇大變故困辱不自完業無依歸貿貿以死者多矣方至元十五六年間故家猶亡恙海鹽時年二十桷年十四五移相議曰宦族久當圮宜蘄為傳逺計未幾正獻宅火留城南遂各盡晝夜濬源鈎思探索幽隠以黜陳辭為已任考閩蜀東浙永嘉湖南江西之儒先合其異同不在於貴耳雜書襲訛輯言行者尊之吾與子所當辨更二十年各宦游四方君以憂窘困躓酒酣語豪卒不少貶折詩筆益温雅簡絜察其學猶以昔所言自任桷繇集賢罷歸徃拜焉病且瘠不能起忽手書曰夜夢游南嶽署已判官遂釋之曰南正火也火為離為文明宜司以瑞太平今天子興文禄弗及其在乎子孫未旬日下世夫子作春秋譏世卿史非世官不能兩家子孫凡五為史官獨君不及用誠可憾曽祖妣邊氏秦國夫人祖妣趙氏衛國夫人妣趙氏封孺人子四曰霆曰杲曰銳曰奫孫一人有文集若千卷𦵏在正肅塋十步適迺表于墓曰桷備史屬號最久見秉筆者罔再傳獨東平王公其子文且賢纂修有能名嗚呼吾宗免矣夫君不得預為可吁厥子若孫永紹圖至治二年嵗次壬戌族姪具官桷表真定安敬仲墓表嗚呼金蹂宋踰南兩帝並立廢道德性命之說以辯愽長雄為詞章發揚稱述率皆誕漫叢雜理偏而氣豪南北崇尚幾何所分别當是時伊洛之學傳南劒至乾道淳熙士知尊其說闡明之朱文公統宗據會纎鉅畢備正學始崇又未幾偽學造謗咸諱其説以售仕于時金將亡各流離自保烏覩所謂經說哉有明其説者獨江漢趙氏私相筆録尊聞傳信稍自異流俗皇元平江南其書捆載以來保定劉先生因篤志獨行取文公書㑹稡而甄别之其文精而深其識専以正盖隆平之興使夫道德同而風俗一承熄續絶不在於目接耳受而有嗣也劉既死得其傳者曰安君焉君諱熙字敬仲其學汪洋静邃謂文以載道辭不勝不足以言理故其言脩以立於詩章幽而不傷慕貞絜之實將以自任其道者也道散於異端九流證拾於墜簡傳者益逺而書幸具在不知而作者則索於句讀之末㫖意㫁絶踵謬而莫悟君設對問以辨後作者悔而焚其書左氏浮誕不合經者悉去之續皇極經世書繇元豐至至大三年考家禮為祠堂以奉四世邑人化之教人也持敬為本解經必毫縷以析果知之必騐其所行弟子相從者常百餘人出入閭巷佩矩帶規知其為君之弟子其於劉先生也未嘗一見之盖篤信其書黙求以通焉者也劉亦知君足以傳道卒不得見焉君深悲之而於學有佀君無憾矣君之先太原離石人五世祖玠仕於金曽祖昇不仕祖滔以經童登第金將亡徙真定因居焉戊戌嵗詞賦入等占儒籍考松江東宣慰司照磨妣劉氏君少敏悟諸父咸器之素多疾嘗避隠封龍山然卒不得年至大四年五月某日卒年四十有二娶張氏焦氏子二塈垣女一嫁保定等路鷹坊總管王沖是嵗𦵏藁城縣安仁鄉先塋之側其卒也翰林學士王公思㢘以書唁其父曰自敬仲死詎安氏不幸士林不幸矣有遺文若干卷既𦵏之十三年門人蘇天爵述其事狀踵門曰黙齋先生天爵從學實有年先生之德之行願表于墓原使有考桷作而言曰真文忠公德秀與朱文公同里生不及事焉文公之學真實紹之侑食于廟于祠無異辭集賢劉公生愈後闡揚合一劉公功與真公並安君不得見劉公而道實有傳盛矣哉舂陵之學四方為有準矣某年某月某日具官袁桷表史猷父葬記代其子作大德丙午九月朔我先君子夀春推官卒于寢年七十有三越十月丙午葬其地邇高祖越忠定王墓次百步許先夫人郭氏卒𦵏十五年迺合窆焉嗚呼先君子諱徽孫字猷父少孤祖母嚴氏躬教督具諷先訓感悟于時史氏極貴盛夀春癯然整修奮棄子弟玩習搜紹淵懿族祖文靖公見之曰兒當以文名吾門稍長試吏為諸暨主簿從政精覈邑長缺使者㑭治幾一嵗入辟淮東治田事調揚州司理叅軍帥大器重悉以事付甫授夀春帥益取自佐循承直郎而先君子不復仕三十有三年矣有詩文若干卷晚讀陶靖節詩語近意逺視世德脗合深自慕儗平居無愠忤色筆墨清藝觴至輒就倣邵子觀物為詩數十篇久更困約益以理自得清日危坐道舊事緩語不絶口鄉黨賴焉嗚呼公旦等五男子為從伯父從叔父後者曰公玉公謩次公晝公旦女三已嫁仕族浙西提㸃刑獄贈少師諱彌正為曽祖紹興監酒贈朝奉大夫諱實之為祖朝請大夫通判處州諱顯卿為父將𦵏謹書納諸壙張府君墓田記平章留守亞安公介其掾韓叔亨致命於袁桷曰吾外大父張府君世燕大姓貞祐來兵革相尋獨府君逃難脫死每言避兵本末輒吁歎涕泗且曰吾譜諜亡缺使果得仕吾安能為祖父榮顯耶繇是益治生自裕強之仕弗願也至元十五年三月某日卒年六十有七外大母劉氏次黄氏俱無子一女劉出也嫁我先公中奉大夫湖南宣慰使後以䘏典贈金紫光禄大夫大司徒梁國公而吾母亦得封為梁國太夫人府君之塋在大興路大興縣宜泉里嵗時率外孫奠薦于塋下封植崇謹顧瞻咨嗟推其所自出其接于見聞者誠莫有怠也更數十年則曰禮有隆殺焉推服盡之義至於異姓則必曰先王制禮不可過也夫禮繇情生使張氏有後焉誠不敢越吾懼其塋域之蕪没詔于曽𤣥將有以謹諸為我記之桷聞諸春秋㑹盟稱辭甥舅之國雖數十世猶徼福於先君敦叙之義盖可考也掩骼埋胔先王之令典留守公之用心合於禮者之為也凱風寒泉藹然見於悽愴情之至也然則凡為子孫者寧不守其家訓也哉府君諱祥字瑞之壻梁公諱某外孫長即榮禄大夫平章政事大都留守領少府監行工部事佩金虎符武衛親軍都指揮使兼大都屯田事次某承務郎太府監左藏庫使次某奉議大夫太僕寺丞外曽孫凡若干人延祐四年九月某日具官桷記田氏先塋誌太僕田茂實君秀與桷交京師相好也大德乙已三月某日其先君子諱某年六十有五卒于河南君秀墨色蓬首哀不絶道兼晝夜行歸治其喪將窆于大塋卜以不吉告越二年始得吉于邙山之白李莊迺徙武畧君與夫人齊氏合𦵏以諱某君祔至大戊申君秀奉家譜言曰嗚呼先君子德豐而養薄孤之罪也田氏世居豐州有試金武舉科為環州司候者諱青金徙汴拜武略將軍總戎千夫屯鄧州鄧歸有元改為襄樊屯田官豐州墓夷徙始占籍于洛陽武畧吾大父也先君子嘗言金將亡城郭蟻潰四出馬塵南驅躪藉争死枯骼野燐千里一色豐州為路衝荒墟敗礫白日無人行聲自吾少年聞祖父言每震掉不自已今汝生盛明時重和累休振纓清朝吾老於斯上藝于田漁于河涵煦濡嚌食安閟華没齒誠樂也仕何慕焉茂實泣受其言而書之敢以為邙山之塋誌請桷曰噫夫邙山古之幽宅也穹隆袤廣可以數度自秦漢而降錮其封崇極于夸貴俠侈之士不知其幾後今變更高者為雲烟下者為水泉而慎終送死日相尋於此山愈完而愈新者何也夫貴以日計德以世計德足而貴不至者命也恃貴而忘德貴將恥之今君秀官于朝將貴矣念先君子之言警其宴安彌以自勵吾知田氏之墓滃然而豐茸必戒必護衍其子孫益守孝謹雖千百年無變而始田氏之譜者由武畧愈逺而愈可考者由太僕其尚勉之哉母夫人高氏慈儉有家則君秀今為奉直大夫太僕院判弟二德畯世英𦵏以某月某日袁桷誌高夫人葬記代作嗚呼我先考至元甲申嵗七月十有三日不禄昉時年二十有一平居嘗言吾宗世居遼陽始祖當金時以征遼功封太師有子十人皆拜節度使金亡太師子悉散軼獨曾祖岢嵐州節度紹其宗是生大父諱植為洛州防禦使妣大氏夫人洛州生近侍局副使諱世榮副使卒吾時年八嵗妣王氏夫人寓殯于陜因家焉夫人鞠撫之迄見其成人初娶郭氏前元帥左監軍巨濟之女後來大名經厯高用之無子察吾氣宇非凡近遂以汝母歸于我因定居大名而自洛州而下藁殯于陜者皆𦵏于元城縣之令公鄉焉先考諱昂字沖霄繇轉運幕職拜朝城武陟縣尉能以慈惠撫其民盜不敢犯後謝病退居樹德自秘重享年五十有九以終昉初掾集賢由院上中書自中書累遷為左司郎中出為潭州路總管太夫人視聴明徹總覈靡宻昉盡服王事一不使亂其志意未幾入為中政院同知拜中書省參知政事尚書省立後除江浙省參知政事至大四年詔官二品得贈二代繇是副使得追贈嘉議大夫大名路總管兼府尹上輕車都尉王夫人追封渤海郡夫人先考贈中奉大夫參知政事護軍渤海郡公夫人封渤海郡太夫人皇慶癸丑昉陞資善大夫為江浙行中書省左丞太夫人年益高屢疏終養延祐元年春復召為中書省參知政事奉夫人將北歸使者屢趣就道又未幾改拜集賢學士商議中書省事迺不敢辭遂侍夫人來京師是嵗十月十日以疾終于正寢享年七十有九嗚呼昉不孝先公亡恙時不能以禄為一日之養幸得奉先夫人以自慰垂三十年不自殞滅禍罹慈親攀號訴慕實無所容罪將以是年十有一月某日𦵏于先塋日薄未得謁銘于當代謹志其梗槩納諸壙男一昉女五人長適梁從晦大名等處管民提舉次適李允中萬盈屯丞二人蚤卒次適李好義承務郎齊河縣尹孫男三人筠孫夀孫和尚孫女一人孤子昉泣血謹誌趙令人𦵏記代作嗚呼宰孫大父為郎時先子樂清尹始試吏部静秀専恪鄞史氏號相家刑部再世國子生執禮秉度不以官簿矜許先夫人係永陽王族屬崇近莫敢議昏對永陽尊刑部愛樂清遂以歸乃受封令人而始嬪焉夫人姓趙氏諱孟柔曽祖師意追爵於吳謚宣獻祖希邐掌宗正食于㑹稽夫人沖黙謹視聴儀範不出屏閤相先子以和撫子若女無二意距先子𦵏始一紀夫人以殁殁時年五十有四嗚呼養不能盡哀未知稱乃大德丙午合封于樂清之兆而先夫人之亡適終喪矣痛徹于天彚事徴德將不懈有俟永陽諱與䒩夫人為長女刑部諱能之夫人為冢婦先子諱普卿宰孫為孤子女一嫁趙孟貫是嵗十月甲辰𦵏謹濡血為之記清容居士集卷三十欽定四庫全書清容居士集卷三十一元袁桷撰墓誌銘㙮銘附周夫人墓誌銘夫人諱天福朝議大夫知瑞州周公諱應合之女朝議大夫直寳章閣廣東經畧安撫知廣州冷公諱應澂之婦今湘陰尹名頤孫之配世為龍興武寧人瑞州以學行表後進論議惜許可湘陰拔童子科整敏善自晦亟愛重之故俾夫人以歸兩家為儒宗婦壻各得所擇衆咸曰在是夫人幼静慧受女史工正書二弟始就學日諷誦感發相勵事尊順謹媲徳儷義能使外有不知絜豆籩洽昭穆靡宻斟度恩意各盡夫宗宜焉二子曰有泰有益保抱具訓輙置筆札毋誑戲稍長約繩墨躬詰難嘗言吾誘弟以婉督汝以嚴皆一轍也善宜亟稱過不可得聞書種寜有斷乎年四十有九以卒是嵗大徳癸卯葬仁義鄉下畬里女六長許嫁周志行孫男三女二仲弟分宜丞天鳳來京師桷與之㳺議門户興植婦道允頼數稱夫人之賢過時而彌哀扵是有泰實來致湘陰之命銘曰有崇羲閭維周之敷展世秉文耳受口濡執彼閫儀來彛來祗宗承其和家安其慈誦聲在户嘉醑在廡叶于夫君婉徳以輔雙桐高岡附蕚煌煌擢榮舒英穀旦用光冽彼寒泉聿環墓田昭銘新宫實曼厥延方夫人墓誌銘湖廣儒學副提舉上饒劉君安徳恭甫之夫人方氏大徳庚子五月己未卒卜祔先墓不吉廼假𦵏于舎東越八年相中堂山兆以吉告於是其子光以事狀來京師謁陳郡袁桷銘夫人世居饒之徳興幼特静好其父隠君常抱膝上祝曰吾家世儒林當為汝慎擇婚對方是時上饒劉君某以太學名輩待次寧國教授歸授徒山中饒信地接武習進士業者率相戒師劉君始出鄉隠君慨曰捨劉氏子奚適即徳恭甫也未幾寧國死徳恭甫刻意振擢不以貧窶自慊隠君念夫人憫徳恭不自置察夫人意色無吝悕卒俾以歸徳恭甫壯嵗力問學預計偕生理靡密一不問夫人銖黍化治手劘而身理之者寒暑曲備方丙子兵變時徳恭甫傾家貲以完䕶為急夫人力贊之事定勉夫以仕且言曰盍亦少慰吾父意始伯姊嫁同里蔡氏蔡姊家侈盛脱簪琲以服亟摇手弗受自是終老無異飾生男子曰升老幼卒徳恭甫晚得光時夫人躬訓育抱咡慈嚴酌宜迄見光克紹其父業焉始光㳺京師與余交相久話言母儀悲泫不已余特以為母子至情不足異夫賢其媲子孝其母閭里知事者率能是及觀夫人之行與光終身之哀見焉若將弗及則帷閤衽席色笑敦厚制事以理夫豈勉而然哉噫是宜銘夫人諱柔則曽祖瑋祖應奎隠君諱逢吉卒時年六十有三子光瓊州教授今為中書屬從事孫男二至大二年將治葬徳恭甫亦即世扵是以某月某日祔銘曰詩始房中維教之基芣苢薄言和平以孳考視劉媛温恭具儀膏沐以韜絲枲是師外防内完拮据孔艱孩無矯慈諸御間間匪異其誠由衷允安興言遺思載汍載瀾女史日微徳音莫跂瞻彼墓田有顙斯泚松岡豐融不震不圮廣揚嘉芬式裕爾嗣盧母王夫人墓誌銘盧氏河北望族有諱仙者家深州武强縣金將亡武强為秦趙要衝嵗蹂兵不息由是徙家睢州兵浸南家益蕩析有子曰全掠為奴于時全生子曰榮甫十嵗審其父北行斷髮仰誓呼曰兒不獲見父寧即死行泣道中呼其父姓名道繇真定日號訴宛轉事益著里人憫之問所掠主無異辭卒義以歸父子復居武强稍長學書筭入鄉校試吏為縣從事時録事王君崇攝武强審盧氏子孝感且吏䏻廼曰吾女舎盧氏易取配遂以歸生子四曰文曰仁叔曰廷信季曰徳廷信生始三年不幸盧君卒夫人撫其四子力治桑枲甘苦淡垣屋庳狭内外整截有限程督訓𨗳過者無敢譁事其舅姑以夀終至元十三年詔考郡縣孝節扵是河北道提刑按察司審盧婦事不誣州達于禮部復除其家而廷信始仕江南調泉州晉江尉辟福建行省掾又掾江西叙遷為鄞縣丞復掾江浙未幾以才佐海道漕府陳不便事就領金符為温台千户嵗運粟視往嵗數三倍而夫人皆見之廷信為鄞丞余時里居見其處事精覈剔植蠧利官長不能出私語上府陳白伉直無隠嘗曰吾盧氏世為吏刻峭文致非以起宗吾父有孝行迄不得上夀稍自飭勵繄吾母之訓戒子孫為儒兾吾母慰意焉至大二年夫人卒年八十有六祔𦵏于先塋延祐二年天子孝治天下推賚存殁而廷信秩五品得贈其考奉議大夫真定路趙州知州驍騎衛尉栢鄉縣子夫人亦追封栢鄉縣君四年遣其子某來京師請銘桷待罪史館若盧氏事誠宜書今誌也無溢辭系以銘曰林林生民男室女家禮失俗淪企而禄奢維貞丈人尚古不遐卓彼孝童木升斯華承筐來嬪絶其榮夸四雛在户蓬首苦心甕牖屹城過者肅襟宅里表植栁槐森森頍弁奮揚滑甘具新大耋莫嗟淑徳岑嶔戒而孫子服儒以嗣教經展世厥武踵起有隆墓田大賚告祉式時芬苾永保千祀侯母王夫人墓誌銘世祖皇帝以仁立國敦節申義丕變醇厚至元八年時則有若太保劉文貞公議事省中増益令式繇是郡縣旌表綽楔槐柳光于往史猗歟休哉桷繇集賢歸里居録事判官侯玉踵門來言曰聞子嘗執筆太史節婦孝子嵗終必登于史籍玉也敢有言玉故居濮州郵城縣其先女真人曽祖敬嘗為金殿前將軍祖林金人匠總管父珪仕皇元為濮州儒學教授濮州不幸年四十有一以卒母王氏生子女六人惸然未勝喪吾母之教四子也皆身訓之其鞠二女也必教以纂組化治嫁娶耕稼能謹之以時家貧無生産而充然若有餘者繄吾母之力也玉兄弟既長而吾母益能綜核靡宻不知有缺怠故仕者得盡心於官政而不仕者孝謹稱里閭玉之為婺州永康縣巡檢時至大三年也母年七十有七以卒至是嫠居凡四十有餘年矣後復為婺之平凖庫副使婺之人知吾母行若是縣儒士具實言扵縣縣下於鄉加察考焉繇是以達于郡郡復移扵所居州州明扵禮部然後悉如詔旨旌于其鄉敢以是有請傳永逺嗚呼劉向作列女傳當熙明之時則肅雍平和藹然有闗雎士女之行至於末季則不幸不得全其生讀其書未嘗不興歎也孝慈耕桑帝堯表閭夫人生承平貧能以禮防少老一節實聖天子休養生息漸仁秉徳有自來矣盛矣哉能勿書乎夫人名妙善父某妣某氏長子伯巖勑授定海慈溪兩縣船官次某不仕幼即玉也女嫁某氏銘曰勵其躬訖于逢慈儉勤夀考終表華楹帝堯功過者式報媺豐劉夫人墓誌銘婦人之事舅姑有從其令者矣若近矣莫知其心焉有屈體承色先事以備逆志以求其得謂之孝與或曰是知及之考其中有疑焉今之為舅姑嚴重則生畏畏不能以洽玩弛則生怠怠近於凟閨門之訓厲以失之而容忍者於教乎何有在易之象曰家人嗃嗃婦子嘻嘻吾扵郝君鹽使從之之夫人有取焉夫人姓劉氏河間人父諱鼎母牛氏夫人之姑李嘗祝香以告曰願吾子孫生悉如劉婦噫此非出扵令與知也孝根於心怨咎莫知旻天中野且悲且懼若婦人貞静其誠慤顯著一語以盡兹其為孝也大矣夫人事夫之寡叔母夫之孤姪有恩愛鹽使病末疾嵗久不愈斥竭簮珥佐醫藥教子志善能植立兩見為監察御史至治二年某月某日卒年七十有二明年二月某日祔葬于西山之祖墓桷往銘鹽使君矣今御史復請銘夫人諛溢辭事史官所大戒婦人事不出閫户以孝養為飭躬本考其姑嫜之言是宜書銘曰有言閒閒有儀珊珊視其温寒靡覿愠顔從姑𤣥宅弗愧以懌繄爾後人以永作則韓夫人墓誌銘中原韓有二族居㑹稽者為安陽居廣信者為潁川龍圗閣學士無咎公師表一世其子仲正克紹家學搢紳號二韓父子而廣信别出一族曰侍郎公祥字履善常卿公補字復善嘉熙中士類稱為二韓兄弟桷族祖正肅公持節江東辟入幕府在後省復薦為國子官人皆曰正肅善選士二韓公聞望駸駸與潁川相並盛矣哉天運合一衣冠家澌滅幾盡江浙閩蜀大略相近余歸老里閭有儒生踵門而告曰容徐氏子祖母韓夫人無為大夫諱禋之女大夫二韓公之親弟也自夫人歸徐門克持其家事姑以孝著待夫之弟妹助裝以有室家其相夫也郤金以成美夫官建寜僚属有不孝其母者夫人引喻廣譬能使其妻訖事姑以禮訓子舉前史言行時刻畫故事人物以佐警戒故其子孫俱能守家教容又言曰徐故廣信大家刑部侍郎諱元杰實容從曽祖桷聞侍郎公侍講筵于時史丞相圖起復百僚皆進疏理宗猶豫不決侍郎獨微言曰邊事漸寜從戎以墨縗失國體丞相誠經濟老其才以用未晚也丞相聞是語憮然曰嵩之不得起復矣夫人之舅諱卿子朝奉郎權知嘉興府事其夫諱忠甫終廣徳建平尉夫人之曽祖大寜奉議郎知徽州婺源縣妣諸葛氏贈宜人祖貴玉贈朝請大夫妣端明汪公逵之孫女男一拱辰將仕郎信州路永豐縣主簿先八年卒女一順正適祝士貴孫男五宜容宅安竇孫女四卒以至治二年享年八十以泰定二年某月某日葬于某山容不逺千里來謁銘秀整足以興植使世家皆若是其曷有憂廼為銘曰亭亭兩家允為舊門服習懿徳克紹厥聞幼工女史粲其纂紉亦㳺扵藝靡不究勤母目既盲䑛膜還明來嬪于徐事姑益精奉脆擇甘順其性情不侈其長不夸其盈訓子督孫雅言諄諄龎眉秀姿儼兮淳真宦族日圮内教莫陳吁嗟夫人表兹堅珉定水源禪師塔銘大雄氏以已説剖三宗禪學汪洋廣博言意承接絶去文字稍契入輙證為知道小智大黠相煽以自髙律教廢棄食不知耕居不知工恣情於無畔岸而道益以昧唯妙源師獨憂之自嘉定十七年受具戒即㳺方明本心久而曰不耐塵勞心曷以制願習賤事以調御寓本州天寜寺嵗大饑赤足踵門以化後始歴清職曰吾得無媿名教矣其師愚公持正議不肯下宰相吴潛潛怒繫獄辱之退居精舎獨侍側辨難卒有疑義愚公啟機以示曰汝今太平矣愚公住徑山即俾首率僧衆愚已老學子林立寮下析微統宗愚喜力贊之主平江薦嚴内外事不一廢舉鼓山國清辭不就主泉州水陸院治若薦嚴而俗士益信慕愀然曰吾寜久是攜錫以歸桷先曽大父太師樞宻越公功徳院曰定水伯父賔州先府君處州議曰寺缺主者善趨謁迎奉吾兄弟不受能以寂照解脫為義則庶幾㝠福源公行堅望高使力請必不讓以素所往來者通意廼欣然以來桷時年十三或問曰吾儒性善與佛所言同否曰同感物而動漢儒失之由是有不同焉後廼曰儒釋二教分别有異在治人治心治人在五常治心在四大修五常治人之本修四大亂心之本道微世衰誠得一人焉不可得涕淚交下謂桷曰禄損則福益盍慎諸布衣鐡裓終日尸坐語徹機迅奔電絶壑不可制伏稍歛戢則瞬息在几席禪人仰之四方士尤宗之精於詩故宋名士喜之然不肯表襮舊築居扵越之雲頂將終願解定水以歸且命無建塔無火化以任其壊其徒不忍卒埋是山以至元十八年卒夀七十有五俗居象山縣姓陳氏為僧五十有九年銘曰道弊扵文巵言以宣繇簡逺超悟者曰繁空浮變騰若火燎天服竒食珍謂合自然師實已憂榮戚靡覩或逃于谷或伏于莽唯大雄是遵唯古徳是祖機以峻傳言以戒輔通黜興廢道曷敢替幽扃潛珍户屨屬係彼昧其承卒黯以逝昭銘授徒勿圮勿翳延慶入法師塔銘四明法智大師以天台教旨經緯導達學者謂為中興南湖寳講貫舊址踵主其席稍不厭衆議訾病交集歴代承接皆有足稱道至師居南湖千口無異辭師名善入傅姓世居定海大蓬因法師見異之淳祐十一年與半山彬師俾受具戒㳺諸方辨解究詣客東掖山著教家四書據㑹執約不以文字溺泥指畫勤懇從者樂其易簡初佛光法師居上竺提其徒悉使出門下于時有善良師與師相講習各植立不肯和附師與良議曰吾師大蓬兄能嗣之願再拜以嗣良後嗣圎覺頑空師而師卒能昌大蓬始典謁南湖後首教坐主赭山東臯世宗其説以角立為大病支離為末流泛不溢詞約不厓絶禪人士子咸傾仰之興仆復侵安衆靡懈泉南僧素宗禪學慕師徳重趼以請法智之學行扵東南六十餘州至是入海嶠人益竒之至大年中詔宣政行院慎採選勿阿意貪倖集議者曰南湖缺席捨師孰能遂以昔日所傳授者深省宻啟空假破建一性明静而互議交毁訖忘于言大蓬果有聞扵世崇本誓志師扵是有成焉其凡見扵修植施於人事今不復著錫號惠觀𢎞教法師而自號曰秋虚延祐闕年五月二十有六日示寂為僧六十三朞年七十有八化于城南頂骨得舎利𦵏法智祖廷而以爪髮歸東臯冡間之精舎至元間桷納交于東臯呐若不能言聆其坐講則汪洋罔詰秉行潔清癯容儼修粹然古徳有足興起弟子大倫正道等來乞銘廼為之銘曰四明之興匪事扵言橐籥萬殊貫于心源如水必東如矢必鵠末世濫觴語益以瀆佔畢究鋪千緒億條炎炎詹詹泛焉以寥師慨有憂約陳其辭探微發機㑹歸一岐承宗紹傳不希其逢謝彼翕訿矢心圖終後歸南湖振揭初説曰吾師有傳兹道不滅弗蔓其根弗瑕其璞癯然蕭閒廓以恬泊世教日淪躡雲徂高著爾懿徳我銘用昭天童日禪師塔銘紹定辛卯蜀破士大夫蔽江東下成都大慈寺主華嚴教僧之秀朗率棄舊業以教外傳㳺東南若癡絶冲無凖範導達後進表表名世者皆其門人而範之成就益衆天童師其一也師諱浄日號東巖俗居南康之都昌姓廖氏幼嵗喜誦佛書解大義常食蔬果以自持年十五告父母願為浮屠氏明年祝髪于廬山香林訪道仰山石霜遂入浙見冲師扵靈隠越二夏不契乃登徑山見無凖師範大許之語在傳道録後見西巖惠于天童恵無凖師大弟子其提示與無凖無異危機敏鋒迎拒莫覩風止水息渙然帖順遂宻契其旨卒服從之俾守蔵室後開先無文璨屈為第一璨亦僧之俊傑繇是譽聞益彰宋景定某年江東帥汪公立信慎許可推以主圓通咸淳某年江東漕使錢真孫俾兼領東林至元壬辰主育王三年歸隠雪竇大徳四年集公議主天童師之行峻絜以完語温氣和衆益得以親納其徒俾明徹復性不侈于言解其蔓惑處於世若無所施為遐邇嚮慕傑閣銅象無踵以至而於天童功最著久居東林化俗警衆民争繪以祝故其興天童廬山之民奉貲以助尤夥生宋嘉定十四年辛巳終至大元年戊申年八十有八僧臘七十有一將示寂戒其徒書韻語以示曰天為蓋兮地為函吾奚為乎塔與庵灰吾骨兮山阿言已矢兮勿鑱越二日沐浴端坐而逝其徒奉遺言以化齒根不壊遂歛藏于西巖之清風塢噫耆舊日淪争憝恣蕩甚扵世人理不勝欲靡然頺瀾莫有障窒觀師景行實泚其顙今弟子在浙東西江東西若干人蠻溪嶺嶠承師之教亦不可勝紀如砥等來請銘銘曰七情盪摩約性返源喻以攝持匪夸浮繁末俗濫觴競立險艱昡一駭百莫執其凡性本湛虗分别則二不以解通不以思擬寂非有存感迺隨義達摩之功空其所空奚後人騁馳庸失𤣥宗空不假為兹惟用中蜀學簡易師承其風開盲振瘖發機以示云彼摩尼非浄非穢往安自然是謂止止鮐背長身從者如水丹霞嵌空匪耀凡目曰兹山之頽否極斯復敬者效輸罔不率服山君來朝雲釃霧矗幻身既空勿鍤勿甓一氣孔周窮彼變易清風之塢石列五色恍焉如存嗣者是式廣恩仁法師塔銘師名可仁貫天台縣寧海姓胡氏號木庵㓜嵗㳺四明山居資福寺習天台鈔疏于時我曽大父樞宻越公治齊國楊夫人喪見師秀整儼恪俾以從服闋吾必以汝祝髮資楊夫人福越公以右司郎中歸召為軍器少監尹臨安樞宻之夫人周國陳氏曰師宜祝髪矣嘉定十三年設齋上竺迺得度于時月大師以講論訓諸徒願侍席側大師與越公厚善謂師曰今僧徒聰敏林立稍使一人預人間事得無害統體乎繇是在郡治間歸胡嶴展治林嶂一以任師在館中㕘政應公㒡猶未仕深器之曰使師不為僧其問學當與士子並中書舎人陳公耆卿時為臨安教授與師同里亦曰應公言然越公入政府例得經院迺相攸紫巖繩約四履峻危有階引泉有梯淬醯除險帖石助髙審面曲直周折獻秀紹定肇工淳祐告成屈以主席錫名曰廣恩崇福伯祖吉州大父尚書咸諉以事罔有弛缺往侍諸父時見師承接曲盡而恃氣凌鑠者不敢出慢語至扵桷四世矣噫逮今五傳有不善扶植者矣而師亦四傳守規蹈矩僅一二數兩家相視岌乎可懼桷繇翰苑歸登塔亭謂塔主子鎮曰往事將湮沒師之行業不可不紀其徒曰是在太史師以至元十七年某月某日入寂僧臘六十一度弟子二十有闕人有詩集若干卷大澤大雅相繼主是寺凡四十年規約散弛今有子堂子鎰子鎮子金子真猶能知師遺事下是不復解其寜有不哀也夫銘曰維大雄氏内寂外修不偏一能用彰以周在師敏通卒異其儔峩峩新宮百礎承宇以其彌縫莫或敢侮智周行圎耆年以輔成之匪艱承之孔難大訓厥徒黜慆砭頑昭銘以儆勿踰其閑延慶良法師塔銘天台之學其説汪洋浩博旁訓廣詁多至萬言學者讀其書前迷後遺究厥本旨更席不䏸以終良法師始疑之謂繇律以入則心以懾持繇禪以入則心以解脱𤣥文妙旨約以據要事理昭晰如瘖獲吐如盲獲覩其為書曰十門􅃌要約説三卷􅃌要餘論一卷教觀宏立門分户列貫穿出入莫窮其塗師以諸部證其義例條焉不紊示焉􅃌掌其為書曰教觀撮要四卷三千别説則其師覺法師之言具在舉世尚同因省立異良非苟扵言也師名善良字子直號月溪族姓朱氏定海縣人始祝髮浄居習律湖心㳺杭之大雄師頑空覺大師空問不二門所屬三諦三千其旨意與空合覺大師言辯簡峻師入其室嘗俾守講席後㳺浄慈訪禮禪師以古徳語叩辯禪語瞬息眩晃意師泥名相為可惑師徐曰三觀之旨不外乎是禮謝曰其歸振汝宗集慶寺成朝命選主席班從者亦皆精良晦法師主上竺任可否師預是選講大涅槃經聽者雲集師懸辯提機整暢理得然卒師頑空上竺不䏸强也主禪恵擇陽報國藥師治平户屨日接别為堂以處篝燈星列咸曰是宜繼四明矣嵗既久卒以輿論主延慶至元二十六年寺延燬茇舎草緝講論彌不輟大徳元年九月某日入寂僧臘六十年七十有九奉遺骨歸于祖闗桷居邇南湖幼嵗㳺起信堂羣僧誦聲接几席取其書讀之茫不能解泰㝢曺先生説曰取子直約説讀之斯解矣後來南湖覩其容和以莊其説坦以明始悟曰先生語不虚矣殁三十有一年弟子允恭來請曰公深知吾師吾教有行業碑敢以請迺不得辭銘曰天台之宗明性合理銖縷其别弊極口耳以言顯道言曷有止若舟在川茫不有涘若蓬繫風去莫以趾支離演文積沓縑楮迷途具茨珠探濁水至簡以求允究厥旨聚不滿握邇納步跬解其桎梏一貫真􅍗南湖之庭屨履纚纚振麈一言聞者竦起遺書具存毋敢訾毁昭哉是銘千祀勿圮空山雷道士墓誌銘孔子白文勝質則史班固亦曰道家者流出扵史官豈其然乎老子為周蔵室史酌古今治亂成五千言致用以凖易較其治良不誣也噫為老氏者其知此與河圗洛書聖人則之易書誠經緯也微言既湮傳注門户各立自勝易與書迄不能並士方齗齗然不可參錯進老子之説焉得力而勝諸士患無恒心遇不遇命耳曠百世而相感者吾得一人焉曰雷齊賢始予讀其書益知其所以言病乎世莫知其涯也齊賢所為書援據切至感厲舊發不蹈世俗繩墨合神以窮變盡變以翼道申言廣􅃌其扵力誠至矣今知齊賢者不若是則齊賢之意將終無以自表齊賢扵書無所不讀悉資以為是書者其道然也道散於九流百家同歸而殊塗唯老子最近然則易老誠相表裏耶嗚呼齊賢之志予深知之矣齊賢著書曰易圗筮通變義老子本義莊子旨義所為詩文二十卷和陶詩三卷齊賢名思齊家世臨川人幼棄家居烏石觀晚講授廣信山中暨終也復歸烏石治其窆而先表焉表曰空山雷道士之墓卒時年七十有二番陽吴成季廣信弟子也嘗曰空山先生承絶學扵蕩裂繕刻志意却甘茹苦光景變幻皆隠匿不道飛伏控握愈昡愈逺道無有矣今遺書具在匪吾徒私彰確者如是則行若藝猶其粗也陳郡袁桷以是銘銘曰入而不出神不可以物通而不寒用不能以怵膏軸御輪其行彌踆無適不宜曷問其津生以道為樞死以天為徒有隆空山泉流舒舒矯爾後人抑華食實弗繢弗雕我銘是質戴道士墓誌銘予讀桃源記私竊以為慕肥遯有遺扵世者之説云耳後讀地志則沅南地今號為桃源者不與王化邇安食水土無君臣守令之程節扵徴需乎何有嗣後地益闢桃源遂為壯縣溪峒増為十州今烏䏸辨桃源也哉或曰州有桃源宫累聖蠲復山水清湛其人惇厚直且信使䏸居之寧非桃源乎戴君道安和甫其人歟和甫成童辭家為道士性疏曠無畦町其師王君文卿器之俾逺㳺見開府大宗師于崇真宮隨其委令風雪承給不少替請扵人也事弗就弗止而人不以煩避之處扵衆也率退以自持衆先矣而君亦跋焉以及之故亦受制為龍瑞宮提㸃奉香于武當桃源性不喜臧否遇酒嗒然以忘然不復失事故職教者彌任器世人以記短長逐日影為䏸事君不䏸且鄙耻較其得失是真無懐尊盧之民矣豈唯桃源民哉往歸其宫攜酒邀父老㳺白馬洞天泂近長磧山酒酣援筆述韻語曰吾死必藏是延祐七年還京師明年改元至治正月某日微疾以逝年若干斥其囊資不䏸以歛遺言以弟子李禮謙領宮事和甫在崇真度弟子天台徐信初厚禮翰林待制虞君伯生俾教之伯生與予皆故家見後進傲誕不復與語獨信初給事無惰聞論文獻道徳嘗惕悚不自置信初果䏸為請銘君斯無憾矣某月某日𦵏是山銘曰棄方刓觚㫿盱以趨何誕之日多樸莫能扶瞻彼沅溪中季載圗其徳弗雕其人允符持觴養和奚憾之祛命也不尤卒為天徒通真觀徐君墓誌銘開府𤣥教大宗師張公留孫以𤣥道贊理陟降帝庭踰四十年其承次授受同流一源罔有支别故其弟子相傳多至六七十人以文辭議論達國體者為之嗣教其餘彬彬行䏸清整英發林立輩出或激昻自修則俾之挈綱振維往来京師山林間重其名教若是者寜不備矣夫開府弟子之最長者曰徐君余官翰林十有六年未始識之延祐四年開府年七十始來上夀閉户不復出户限邂逅于庭中若相避然者集賢大學士李公某傳詔醮崇真宮益避跡隠奥中集賢語開府曰聞高弟在是願接顔色可乎强之見揖以退復辭其師曰弟子歸山中不來矣願師自重至治元年専价走京師作訣别語衆咸疑焉未幾訃至灤陽以夏五月癸巳化于仙源宫得年八十有二扵是嗣師真人吴全節率其弟子為位以哭皆不勝其哀且以狀求余銘維徐故士族祖某父某君名懋昭字徳明饒餘干州人饒為衣冠望郡宋端明湯文清公丞相江文忠公善衡鑒幼獲接識之繇是棄仕譜為老氏學以其道㳺江淮間于時烽燧連警百里土舎不相接獨澗飲草茹以善勸勵俾崇信其法後皆化之開府公入皇朝隨侍二嵗即歸且誓曰釋老以募衆集施為䏸事叩門嚅囁抑獻笑且取誚吾不能若是當益貶損焉積數十年作仙源觀久之復作神翁觀佳木竒卉編緝墾治山林壠畆陂塘之利益充然衍裕卒䏸遂其初言嵗饑以餘食餓者不足則損直以售葛衣布幬十數年始一易見者服之老氏之學力本自治退足無欲其言黯以彰不知者以虛無釋之邈不相涉矣夫不丐扵外則必慎扵内宮室蔬穀絲麻丹漆之物燕興俯仰之節酬酢進退之儀人之生不䏸以缺也今而曰吾無求焉將何以取具世以役鬼神竊服食為道吾不䏸知之不惑扵衆則害扵民者寡考其自治則扵吾道合清浄富强昔之時君嘗師之則凡刻繕者誠得矣夫何疑焉余嘗侍開府公言語絶臧否耆而謙黙而簡退與嗣師㳺彌綸損益將以行其道是非家庭之教績業纂素能若是乎盛矣哉大徳六年制授主常州路通真觀皇慶元年制加保和通妙崇正真人二觀亦以璽書尉鎮焉以是年某月日𦵏某山開府再傳曰李立本陳義高義高明朗通豁器行瓌特贈粹文冲正明教真人皆蚤世今以次傳者曰余以誠何思榮吴全節孫益謙李奕芳毛頴達夏文泳薛廷鳳陳日新餘若干人將𦵏開府惻然曰吾弟子蚤從吾㳺其亡也不宜以薄迺命奕芳歸蒞𦵏銘曰林林生民厥初一原帝覇肇分兵刑日嚴維𤣥元君治道不繁節約寡求罔有僭貪榮觀超居𨗳迎泰和絶色屏味日用不頗後侈怪竒風揮電訶造舟搆臺百靈迄訛赫赫大帝尊企清浄𤣥風恬寂守貞自正温温開府不夸不佞于帝左右淵黙無競在師承之儉以繩之泯泯自營卒克興之道合古初訖莫我病銘昭真宅是式是證陸道士墓誌銘道家者流以清静無名為本時王以其宜扵治國靡然宗之傳世益薄長生之説侈卒茫昧不復講今世所傳惟法藥與術藥術又鄙棄不用而法僅傳謂其宜扵水旱疾病通得而用之也余行天下與方外士㳺率不得一二蓋其傳受訛缺浮靡恣蕩攝思握神罔不知所以而其祛役禁制按圖以求叱咤瞬息欲通靈扵􅆄蠁不可得也噫其教若是而為其學者又皆不自植立可哀也矣余居近東嶽行祠有陸氏者掌其祠有年矣其四世孫曰頤真㓜嵗識之儀觀秀整淵乎抱道之器與之語慎重不伐悒悒然欲求其師未䏸也日尊所聞抄綴盈箧樓楚公諸孫坦好黄老能以㕘考損益編簡往受其説遂為弟子後聞天台桐栢山有靈寳法福聖觀道士曺君為正傳往師之又聞維揚潘師得白真人上章法逺逰以受然不自表襮處羣衆益簡嘿丹經筮書星厯孤虚之術悉究􅍗旨要晚得末疾疾漸革呼其弟子陸宗𤣥張蒙生語授受本末且曰我死必得袁内翰誌文以信後是死為不朽當𦵏我扵先母之墓側墓在翔鳳鄉白石紫虚觀右紫虚樓君所建實繼其事曽大父軾大父景文考斗瑞生宋開慶元年殁時年六十有七實泰定二年七月某日也𦵏以某月某日其弟貴和實來請銘哀其志嘉其勤而卒不逢非命也與銘曰握竒制氣超鴻濛約束萬神驅霆風物無疵癘𤣥感功秘圗靈籥昭羣蒙後生棄暴甘盲聾嗟哉紫虚憂忡忡踰江越嶺兾一逢死生晝夜在反終不怛其化輪旋空恍兮步虚出雲中有縞之鶴來城東清容居士集卷三十一欽定四庫全書清容居士集卷三十二元袁桷撰行狀翰林學士嘉議大夫知制誥同修國史趙公行狀曽祖伯洙宋朝請大夫知南外宗正事贈金紫光禄大夫祖師雍宋朝議大夫直寳章閣考希聖宋宣教郎史館校勘公諱與􅝾字晦叔宋燕懿王徳昭九世孫髙祖子英宗正少卿避地南徙紹興間為台州黄巖丞家于縣之西橋至其子孫遺育蕃衍故今號西橋趙氏宗正有孫師淵字幾道官至太常丞為朱文公髙弟文公述通鑑綱目條分例舉整齊芟奪迄于成書皆太常所定其言理學藴奥心受耳属精析該􅃉非若語録所傳剽臆謬妄東南後進咸尊太常與黄榦氏並扵公為伯祖公少美儀觀音吐清徹讀經史大義必本家訓弱冠以易入宗學登咸淳辛未進士第用積舍法教授鄂州鄂為楚上流嵗備武不懈公視邊將翫弛而咸淳士大夫率恥言邊事迺䇿諸生而問曰文武之用不可偏廢韓范二公不以言武而失文曺彬狄青不以清談而喪武文事武備豫然後立時未幾王師絶江守以城獻公自念為宋國族鄂先内附兵勢若破竹不可支而歸道已斷絶不得返遂上書丞相伯顔公言宋權臣賈某柄國十有五年脅威罔主棄背信好事一至爾今得兾如藩臣嵗奉貢幣願緩師以行成焉書未報而錢塘已下實至元十三年也公知南北已混復上書丐返田里㑹大臣有竒公狀貌告于世祖皇帝十四年遣使上驛來京師幅巾深衣見扵上京天子清問温渥首詢其老㓜及江上事首尾其對復如上書所言特命給廪餼以俟用明年奏言江南郡縣户口繁黟當以簡易治近嵗有司急切興利殊失安輯新定之意臣生長江南悉習利害因條類為十六事以進大較以擇守令釋征歛厚風俗為急而末復以存活趙宗為請十六年入翰林為待制陞直學士復兼集賢又三年遷侍講學士預纂實録加太中大夫扵是侍講十四年矣累疏乞致事歸里雖未得旨而不入翰林者幾二年久之拜翰林學士自鄂之來京師凡二十有七載由里居而之鄂也適三十年每恨乖隔愈久兾一得請以終老丘壠常忽忽不樂秋風倚楹懐悲故鄉擁衾障袂聲出金石非復以宦達為可戀惜而志迄不遂抱疾朞嵗以卒大徳七年正月二十有二日也年六十有二積官至嘉議大夫公之為侍講也言江以南括責營聚皆大臣與其黨類私植貨累鉅萬願寛今年田租以緩赤子宋世陵寢毁掘及移徙故宗室大姓皆非初詔本旨乞正其私擅之罪天子以為然又言迺者庚寅嵗大霧四起越翼日癸巳夜地震地為臣道臣强則震至正月甲辰西城老虎就擒虎扵象為兊為金其著尤異咎在奸臣簸權令已執咎而宸斷未果願蚤正天誅以應變異上意若微忤而終不以罪由是居家待罪閲三月大司徒公自上京俾燕只干學士諭以復職後平章政事不灰木復為公奏逋負嵗積不䏸自養工曰得非􅃌桑哥為虎者宜令有司計逋以償嵗别給帛粟餘勿為例人益知世祖皇帝神武沉斷非真忤公公天性踈達與人交緩急髙下盡力傾引弗避不為刻峭自髙亦不復計得失成就故始争趨慕而間輙掉去訖無毫髪恨意傾觴煮茗費盡即止危坐清論一不以靡宻缺乏廢其雅道嵗時奠薦雖甚匱嗇猶豐絜盡力如舊禮自宗正四世而下皆請于朝而復其役族属男女以及鄉里之俘虜而北來者悉贖以歸凡十一人有張生貨藥西闗一日過之張死已數月矣亟歸視藥劵盡酬所負其家人不知也遂具以告而歸之一士人伺公錫賜時謾言當買田亳宿間計資與之嵗久不至後亦不問其受欺類如此同列有侮公為方拙暨死之日朝野咸曰善士已矣各賻奠哭弔終其歛事而同列亦悔昔日所侮為可愧往右丞許公仲平篤意道徳性命之學奮自飭厲以文公四書為標凖達官髙胄皆俛首承訓不敢怠公時至京師首言力行致知近世率清曠自髙言行若枘鑿不相入非先儒本旨許公深然之至觀其平居處身待人抑華養實許公雖死而昔時門人親聞其言者皆以為伊洛源委惟趙公為真佀益以知太常之學為可信至公為有傳矣有詩文若干卷類聚藏于家初娶舒氏御史中丞亶之五世孫未踰年而卒歛箧中裝歸其婦翁不取今夫人史氏奉直大夫知連州一之之女生三男子長孟實以公居朝廷久特官為承事郎同知瑞安州事孟賚温州蒙古學教授孟賢以廕入官孟實等欲求銘當世有道以信于後俾桷有述謹具厯官行事如右謹狀大徳七年七月日從表姪具官袁桷狀推誠保徳功臣開府儀同三司太傅上柱國追封薊國公諡忠哲梁公行狀公諱徳珪字伯温姓梁氏大興路良鄉人八世祖徳成遼末以勇力善貲雄鄉里生子吉不仕吉子伯緼金皇統進士官通議大夫同知河南府事遂贈吉安定郡伯郡伯孫牧牧子陟明昌進士官中奉大夫同知南京路都轉運司事亦贈其父安定郡侯郡侯有别墅金世諸名士日觴詠從之㳺中奉髫年能以詞章相周旋咸器偉之晚嵗直節善政深自植立值金亡終老扵里生衎為金承奉班祗候祗候生守信終隆興都轉運鹽使轉運生國禎終内藏庫提㸃是生公後以公為左丞時朝廷特號中奉曰通憲先生轉運贈榮禄大夫定國公諡忠毅提㸃贈榮禄大夫安定郡公諡僖敏公幼嵗給事昭睿順聖皇后宮中竒其器骨俾熟國語通奏對年十一太府長官愛之帥其弟徳瓚同見世祖命相者閱二兒相者曰後當貴帝頷之遂使從東平忠獻王安童習憲令儀注年十四即襲父職至元十六年升中書左司員外郎二十三年遷右司郎中踰年復左司二十六年進太中大夫總管大都等路打捕府仍領左司是嵗復右司二十八年㕘議尚書省事復遷中書二十九年世祖特旨拜㕘知政事成宗即位陞中書左丞大徳二年拜平章政事公未弱冠即官宫省踰三十年錢穀出入高下若指諸掌四方奏請率面授中書掾言某事當如律某當如先帝某年所行極邊宗王急驛調發卒無所從具同列拱手不能語公徐言軍用有故實泛索非故事不可行執筆量劑退考故籍無少訛誤戊子嵗地震北京世祖問今嵗刑部所報囚徒何煩多公對曰囚非犯刑罪特以徴索羅織無所從納故悉為囚在獄中上大感悟迺悉赦天下逋負京師供給繁夥屢奏蠲復之漕運根本江南浚治諸湖堤不宜使富民侵塞以殺水勢議自公始選部資厯吏不敢後先一時以事功自期者公亦與一二執政議超常格俾自効力大徳初元成宗恭儉守成一繩祖武公亦以朝政自任年穀豐熟四境寜謐廟堂大臣相戒以清浄為治凡上書言利害歛口不敢發自是希進者皆避匿後議相持既深朋聚比進乗事間發浸淫扵疑似之際㑹上不豫遂出公湖廣安置踰年上疾稍瘳罪一二幸臣急召公還都遂乗驛朝于上京上問卿從何來公環視嗚咽不敢對上賜酒饌命歸省其母諭以將再用至九月詔復入中書時公已得上氣疾與家人言向嘗逺謫今得再覲上明白母子相完聚即死且不恨何敢復有希進意遂却藥危坐謝事某日星殞西南有光流室中是夕薨年四十有六𦵏于宛平之樊村妻安氏今封薊國夫人柔静䏸家子一人某女三長適納速剌僉事次適伯達某路都提舉幼適某同知宣徽院今上改元詔録勲舊贈公推誠保徳功臣開府儀同三司太傅上柱國追封薊國公諡忠哲而公祖父亦復追命為國公母夫人完顔氏公能承侍盡道待二弟曲致恩意對賔客謙不失禮自以先諜踵世科尤重儒士詢考安定别墅為圗表章一時搢紳咸賦詠追美其事侍帝左右率偵候意嚮奬拔士類至扵决事占奏悃欵不讓而悉簡惬稱上意死雖十餘年朝廷至今猶稱道之前翰林修撰知髙郵府張某次公遺事命桷演潤將求鴻藻以表墓道桷與張侯曩同在翰林見一時行事張侯以親嫌為辭公之弟徳璋今益都總管昔為慶元判官時桷居鄉里得聆公言行遂不敢以草野為辭然舊聞中原故老嘗言梁斗南文采風度有陶靖節晚嵗志意後進争慕企久知迺通憲先生也先生言行在人口不絶方金將亡時士族解散澌盡暨獲平定推原高曽名字扵荒碑野塜之際皆缺軼無所考獨梁公八世官簿厯厯可据徳源深長通憲守儒之效著矣至若公行事在史冊者不敢有私姑次其出處大致使銘述者有考焉延祐三年九月某日翰林待制承務郎兼國史院編修官袁桷狀翰林承旨王公請諡事狀公諱搆字肻堂世居濰州家譜云與中書令同系八世祖某宋世為司農卿守鄆因家焉故今為東平人曽祖某金進士奉訓大夫滄州無棣令祖某以公貴贈正奉大夫太常大卿考某贈昭文館大學士資徳大夫公㓜嵗肄業郡學試詞賦入等杜先生仁傑深器之賈文正公居貞一見館以教其子載與來京師時太保劉文正公王文康公王文忠公持薦士權即辟為權國史院編修官丞相史公耶律公在政府聽公上事言論接以賔禮耶律公復戒其子以兄禮事焉至元二十一年授將仕郎命為真于時集議時政必使公預㑹裁酌之十二年丞相伯顔出師諭江南公實草詔是嵗渡江世祖命翰林直學士李槃與公偕行俾蒐擇儒藝之士明年春次杭州公見董夀公某曰故宋圖籍禮器具在宜收其祕書省天章閣翰林太常考集目録宋史異日必修纂遂悉輦歸于朝十四年充應奉翰林文字公辭曰少嘗受學于李先生謙今先生猶教授東平實不敢先遂以其官召李明年始受之十六年陞修撰凡制誥撰述文康公必以命公丞相齊魯國公和禮霍孫領翰林開司徒府授府司直世祖詔大臣議道藏可焚棄者公與議完救之十九年丞相阿合馬敗齊公入相議選舉更定法皆公手定遂授吏部郎中未幾改禮部後復吏部而翰林制誥猶諉公㕘詳焉二十二年遷太常少卿上方定宗廟修禮樂而公昔從故宋所輦還者皆得補缺二十四年出為江北淮東道提刑按察副使御史大夫率公陛辭上賜酒慰遣擊奸恵民淮民猶䏸言其事二十七年除治書侍御史故相桑哥嫉公命與故平章魯公卜忽木檢責燕南逋負公先馳驛㑹計簿領迄無所迎合謂魯公曰公近臣某復在言路相若苛責當受罪不以累公也未幾桑哥伏罪二十八年調選江西二十九年改翰林侍講學士三十一年世祖升遐成宗嗣位分院上都制誥多公次定徽仁裕聖皇太后知之特賜楮幣七千五百復命撰世祖祔廟諡冊攝司徒以導禮大徳改元纂修世祖實録陞翰林學士二年㕘議中書省事右丞相引見于栁林上問昔從何人丞相奏是和禮霍孫官属真儒者昔奉旨㕘用儒生今故用之時上初即位勵精文治年穀屢熟海内熙洽公從容二相間以薦士安静為急務後數年來執政希合生事將檢括増羡首以其䇿行東南公卒不肻附稱疾納禄幾一年七年朝廷更政獨公無所累歸里九年授濟南總管禮法自持嚴而不苛凡為民害者悉除去丞相荅剌罕見公所申牘咸從之十一年太師瀋陽王等奏俾乗驛造朝拜翰林學士承旨復修兩朝實録特命贈公二代公言臣本儒家遭逢四朝先世皆潛徳里士大國美諡懼無以稱以臣所居官授之誠以為過今羣臣封諡下太常必繇翰林議官品臣首踰越將無以服衆今上時為皇太子嘗詢翰林老成必首姚燧王搆手以酒賜之是嵗尊諡祖宗公撰太祖睿宗皇后諡冊賜楮幣萬緡正月撰皇后冊文攝侍中讀冊至大三年以疾薨公在朝廷踰四十年凡累朝憲章損益䏸悉舉源委翰林述作自為編修時已預撰先賢文懿尊酒敘綸咸有据依欲輯為臺閣舊聞而事莫遂崇拔後進雖未識面汲汲稱許不絶口性剛直有不善必面責之有文集三十卷藏于家子士熙今為翰林待制竊惟聖朝褒録臣下見扵令典謹摭其居官行事請扵太史上扵太常至若居家雜儀治民遺事悉弗敢次第延祐三年九月日門生翰林待制承務郎兼國史院編修官袁桷上李司徒行述代作嗚呼我先公之亡銓時年十有三遺言懿範誠不盡知雖知之亦不䏸盡詳少鞠于趙氏外家外大父諱某為南京同知先夫人嘗泣語銓曰汝父沉静寡言笑篤志嗜古卓然遵聖賢言行為矩範强之仕弗肻仕凝塵敗席家事靡宻弗顧疾革猶執卷瞠然若有思空約彌甚間嘗曰我幼孤長兄樞宻都事教我撫我繄汝舅之訓汝舅生三子長都事君從革次總判君從謙余叙為季生兵革中我先君每誨吾兄曰家世朔州罹亂離朝夕習騎射今邊宇寧謐諸兒宜守儒顯親母刻木吏為也都事受其言朝夕以詔二弟俾從學于九山李先生徵吾詎願不仕非其道不可也銓幼不䏸必其成後其語諸又曰大父之墓在朔州地逺不䏸至考其事則有紫陽楊先生之誌在戒其毋忘焉不幸某嵗卒年四十有一𦵏于南城栁村之原先公既卒家益困太夫人挈于外家化治銖粟率資以教銓稍長痛自感勵有以其名聞于世祖皇帝詔習儒業入國子學師許文正公焉後直省闥三年出為彰徳鐡冶提舉又十年同知歸徳府事始得致養于母夫人元貞元年過汴梁將歸京師不幸夫人卒扵汴卒時年五十有八奉柩歸𦵏于栁村相其地水齧洳不可旁祔迺卜扵西山金河口田峪之南得合𦵏焉冬十有一月某日也元貞元年為翰林待制又三年轉廣平等䖏鐵冶提舉改工部員外郎承檄視屯田鴈門鴈門地近朔州銓思念吾大父𦵏朔州在鄯陽灰河西一里今六十年榛莽不可攷有楊先生英誌在雖無䏸知吾以誠求寧卒使無知哉翼日驗誌徴旁近卒無有哭走于野有老叟年八十餘迺来曰李府君𦵏時吾嘗治畚鍤于灰河今西一里隆然者其墓也銓泣且拜得封崇以識焉楊先生之誌曰李君大父諱彦宏由彦為名者十八人自彦而别為玉者二十六人其諱玘者銓大父也我先考大父之幼子也都事有子曰某總判君無後銓由是奉都事而下皆合𦵏于西山而灰河之墓始樹楊先生之碑推大父燾後之徳遭時隆平非若昔時之永隔嵗時省墓則力猶可至也楊先生之誌又曰大父為山西西路課税時耳目所逮纎悉必陳扵長官有以榷麴牟利即峻拒絶後患或言郡縣始安輯宜用重典使不犯輙面折陳白非忠厚恤民本旨先公之誌翰林承旨王先生搆則曰拱璧駟馬流俗所恃嫭者先公無是心也銓無所肖似自工部改授朝列大夫揚州路同知臺擢為監察御史四年少中大夫河北河南道肅政副使五年移淮東未幾嘉議大夫常州路總管不六月召為㕘議中書省事又六月除禮部尚書復五月轉燕南河北道肅政㢘訪使改昭文館大學士中奉大夫治書侍御史今上皇帝推賚存殁扵是得贈大父資善大夫司農卿上䕶軍追封兾國公諡莊順祖妣王氏兾國夫人考榮禄大夫司徒上柱國追封兾國公諡端敏妣趙氏兾國夫人嗚呼銓無所肖似承藉先徳先夫人之訓厯厯在耳願因朝廷光顯之寵求文鉅公表扵墓道俾李氏子孫後有攸考謹再拜叙其事于右端敏公諱從益銓今為翰林侍講學士娶孫氏封兾郡夫人合三房孫凡幾人長某延祐四年九月日男翰林侍講學士中奉大夫知制誥同修國史李銓狀資徳大夫大都留守領少府監事兼武衛親軍都􅃌揮使知大都屯田事贈推忠贊治功臣銀青榮禄大夫平章政事澤國公諡忠宣鄭公行狀本貫澤州陽城縣澤陽鄉屯城里年四十七曽祖珪不仕祖臯故忠昌軍節度使父鼎故鎮國上將軍湖北道宣慰使贈銀青榮禄大夫中書右丞諡忠毅公諱制宜字扶威澤州陽城縣人大父節度當金危亡時以智略慷慨衛拯里社興屯田陂池之利年不展用是生忠毅公提天師勦羌蜀絶襄漢竒勲冠勇功次表煒官譜始著公忠毅公之嫡子也方勝衣時忠毅攜見世祖皇帝特視偉之命從大臣習給事儀忠毅遏冦死難世祖震悼迺即授金符襲平陽太原之軍而戍鄂焉公盛年受殊數益矜謹自重控伏將士怗首無撓犯湖廣行中書治鄂戎帥䇿馬進退承教令縮蹙不自給獨公争器重傾下鄂守缺長執政俾攝治日坐决文武兩府郡益以理凡數嵗訖不除鄂長官十九年詔治樓船有事扵島夷江滸地不足居船官城南有河家洲洲爽廣多居民中書行令遷洲屋仆徹墉瓦聲汹撼白日交走驚泣道上公行相旁近地與洲無異即趣還其居洲民争持牢醴拱謝公揮手曰安民吾職也何謝焉鄂多火災連晝夜交作或言城中隠姦利羅疑似者急治火可止公言咎在火政不明火未絶而復誣構彼何生為遂率軍士申令約立渠巷俟火所未至通徹其道火是日迺止有盗私立部號伏近郊日暮剽刼負擔者訛言將入城索之不得見數男子從城外来促數異顧命縛之省貴人曰得無以疑詿誤將出之明日過城東門見一少年乗白馬行且色動公呼曰汝賊也汝貌良人也何作賊不速言當訊汝少年叩首吐實復信宿日所捕亦同欵一郡大驚二十三年徴入侍中明年從駕北征願前敵效擊上曰鄭制宜死唯一子在宜勿使擊復請戰乃命從太師以行師還詔侍膳殿中加懐逺大將軍樞宻院判官春駕如上京院留母行公曰年少宜服勞願以偕行上愛而勿許二十八年超拜湖廣省㕘知政事是時鄂大臣集括歛為竒功上怒録其家公入辭上曰而父死賊難賞不及于汝今有盗臣貲財僮孥留貯于鄂者宜擇精善自取公對言某臣家入皆贓穢不可詰受之雖無汙然跡其由来寜無汙乎上益竒之鄂為舊治土俗厚薄悉周知其隠蘇枯翦彊翕然至和上知其能賜中金五千兩間嵗具口奏臣向留鄂治兵臣母知臣年未更事乞臣侍陛下宿衛今不以卑鄙預外政府朝夕思念不勝任敢昧死以請復徴為内臺侍御史安西地嵗牧馬牧人利曠逺率併入旁近世業民數訴理求地持軋不下命公乗急傳治其事覈地得三十萬頃考籍于官餘悉歸于氏三十一年拜行樞宻院副使院治衡州公統軍入衡下令不得入廬舎營部擇便地定井竈食罷畢發至暮整列就次道遇雨卒言宜止頓舎休憩公立雨􅃌畫訖一卒無敢宿民居道旁市井人雜語不知為官軍也湖南地介江廣賊負險煽昭賀聮絡廬陵諸屬邑大軍至即守固不復出嵗一捕冦率害善地冦伺去復嘯集如故公至相阸塞雜耕守戍據其出沒明語歸降者釋弗殺遂殱其酋長茶賊譚計龍匿兵器有異志立捕得之其弟舁貨以緩事公趣輸于軍卒正其罪成宗皇帝改元復别置副使一人與公同治公謂官溢常員先置者當罷入授大都留守領少府監未幾兼武衛親軍都􅃌揮使知大都屯田始進階資徳大夫公㓜熟内府營繕工巧供給祠祭之屬䏸通達緩急終嵗事集無曠敗至大宴席刀匕樽斚必命公董領以重其事大徳七年地震太原平陽公承命往視且言河東罹鉅創聖天子出粟幣以賑活之設一不及是負明詔死罪萬萬何可逭迺躬入里巷傷殘羸餒悉疏録以給有市官利征商詭言某地少災不宜費官廪征法宜如昔無所損公怒曰幸災困民民何罪且汝計征入何補縣官入言于上復其地三年公天性慤厚上宴大明殿獨侍立不惰命之飲再拜辭上察其意賜酒二壷使歸飲于家事母蘇氏至孝特封潞國太夫人以寵之錫賚無虗嵗復加賜海青俾入禁囿尤號為異數大徳十年二月五日以疾薨年四十有七其𦵏在某縣某鄉自公少時己知自貴乞名扵王文忠公王見而器之遂定其名字忠毅以死事顯故公彌欲以忠孝勉奬通敏有持守其居鄂十年善政藹著至今父老言鄭公真清士非他人比至守官靖正不以喜怒害事謙抑自晦中朝士大夫則曰鄭公真吉士也配可烈真氏丞相孛羅公之女子鈞今為懐逺大將軍武衛親軍都􅃌揮使至大更元特贈推忠贊治功臣銀青榮祿大夫平章政事澤國公復下太常定諡曰忠宣謹具厯官行事鴻筆碩彦得以取擇謹狀榮禄大夫大司徒特封饒國公吴公行述本貫饒州安仁縣開興鄉夀櫟里公諱克己字祥甫維吴氏逺有令緒泰伯以至徳讓嗣逃于吴周受殷命大封同姓而泰伯𦙍系因食采吴地子爵不絶周既衰吴越楚争王吴為越所僨子孫散處江湖間因以國氏夫差六世孫芮為秦番令有徳于番號番君漢次芮功封長沙而廟食番世不絶宗庶蕃衍凡占籍番者悉祖之安仁吴世儒家宋淳熙間有從朱文公講學曰某皆其譜諜公之曽祖岳祖夢旂養潛樂幽丘園晏如也父鑑服儒業言行矩範閭里是否能持平善諭俾率初後皆尊信之劬書教子誨之曰學非以干禄遇不遇命也故公受其訓而行之㓜静黙寡嗜好達生養和非仁義之言不言其居家也斥絶喜愠躬行以導之不逮者微語以警之其處于鄉也肅然如有容暴者化之以慈有為不善者輙自勵曰得無吴公知吾所為乎㓜督之以學壯奨之以仕稍有能輙譽之其成就也怡色若己得年益耆賔客造户無惰媮酒至愈莊夜分猶危坐治纎悉人皆曰吴公有子全節為𤣥教嗣師總攝江淮荆襄道教崇文𢎞道𤣥徳真人其好賢其持身常念若不及繄家教所致推公之徳視其子則猶可企也延祐六年五月𤣥徳扈駕上京桷以待罪集賢偕行公薨以五月丙辰訃至𤣥徳晝夜哭不絶泣且曰全節不天疾驅以歸願述先公之行以聲其哀桷謝曰述徳叙行宜在門人佐吏敢辭又曰猶子善辱與子㳺其何辭謹按𤣥徳真人㓜慕老子道年二十從大宗師開府張公入朝奉祠宮間嵗告歸省成宗皇帝憫許之大徳八年公與夫人夀七十上賜公上尊加帛俾乗傳以歸大徳十一年特拜翰林學士中順大夫至大三年武宗皇帝隆孝治恩賚中外臣子繇是超拜榮禄大夫司徒饒國公配舒氏饒國夫人而公考亦追贈昭文館大學士資善大夫饒國公諡文靖妣陳氏饒國夫人𤣥徳奉制書以歸延祐元年公夀八十天子遵成宗錫賜如故事延祐四年復降璽書復其家命守臣王都中表鄉曰榮禄里曰具慶𤣥徳築公所居堂曰晚香曰天爵翰林侍讀學士元公明善記之矣曰齊老則因宋孝宗所書扁以徴其實曰樵隠公所居自號以寓其冲澹之意焉公夀八十有五將以某月某日𦵏于鄉之山田原子四人長詢次誠蚤卒次𤣥徳真人次全義女若干人孫男若干人善集賢修撰蒙剛才致孫女若干人曽孫男女若干人始善来京師從㳺嘗出大父手書誡善制酒力纂述勿愒玩以自棄又誡其叔父持敬存誠為應天事神之本曰承君師母以我耄為辭幸未棄昭代甞惕然深念曷報稱數數道途非所望假我死何憾也水蹇扵山屈曲演迤遇順而始達非偶然也養深用嗇累逺益振扵吴氏有考世胄顛覆抑其所發者誠過耶嗚呼吾扵是見之矣桷也辱再世之㳺耳受目矚向為史官錫命享醴之禮嚴詳扵記註惇史純孝贊皇風闡鴻藻有自来矣遂不克讓奉于太史俾有考焉延祐六年七月日具官袁桷述清容居士集卷三十二欽定四庫全書清容居士集卷三十三元袁桷撰表誌西山阡表嗚呼我大父嚴州宋寳祐五年丁巳六月七日庚寅即世年六十有七後六十有七年是為皇元至治三年嵗在癸亥聖天子推恩文武錫命有秩不肖孫桷以從臣遂得贈中順大夫上騎都尉㑹稽郡伯大母令人王氏㑹稽郡君是嵗五月丞相忠獻王薦于英宗超拜侍講學士泰定元年又贈嘉議大夫禮部尚書上輕車都尉㑹稽郡侯郡君加㑹稽郡夫人嗚呼桷生七日而母史夫人卒先考處州嘗語曰汝外祖敷文轉運公諱賔之淳祐十一年辛亥嵗秋八月病且革嚴州詗疾候所命于時汝母年六嵗余年七嵗即􅃌曰吾女以中外表願奉公㓜子大父謝且立曰㓜子獲為越忠定王孫壻他日生孫寧負吾兩門哉桷泣受其語以識桷髫齓時喜聞遺事于時越公賔客子孫宦途著仕而大父逰從咸在嘗語曰越公為京尹十有一年擿括隠伏抑强振恵繄汝大父宻以贊外若韋布使世不知有子弟名字其居越公䘮盡喪禮喪除廬于墓不入城府者三年匪惟鄉人言之外州士大夫能言之退考于家乗曰初補承務郎監無為縣襄安鎮知建寜府浦城縣丞越公久侍從陞政府而執政子求外仕令不許故再任佑神觀紹定四年越公解機政始得授江南東路安撫司幹辦公事端平二年以侍養請于朝優許之充沿海制置司機宜文字淳祐七年通判嘉興兼尚書省提領田事所檢閱迺曰吾得以仕矣治府事無留難囹圄以空悉以越公尹京法治之郡守謝不能提領户部財用史宅之悉括諸司田阿媚奉上具籍百餘萬用户部印入御府而以副帙置三省始愀然曰吾不可復治乞歸三年授江陰軍力辭以疾後户部果督責浙西諸州虗籍守臣争納告丐罷言諸司田皆朝廷舊籍欲入虗籍則宜蠲舊籍未幾宅之死始悔罷而副帙在三省者國亡散落民間言利大臣深信之卒為東南害十一年知嚴州寳祐二年提舉台州崇道觀積官至中散大夫鄞縣開國子先處州登朝贈中奉大夫再以登極恩贈中大夫維我大父訓範嚴宻居家治具畢舉區别工技悉精其能堂奥危坐無笑色聚書至數萬卷圖畫鼎彛鑒裁得源委而先處州遵奉誡令教子晝夜不廢桷得以譾薄文藝敘升翰苑幾二十年再為集賢直學士今復超進為翰林侍講學士夙昔期望扵遺言見之今墓在桃源之西山王氏夫人合葬焉大父諱似道字子淵曽祖諱臯累贈太保妣楊氏越國夫人楊氏魯國夫人祖諱昇累贈太師衛國公妣楊氏齊國夫人考諱韶少傅同知樞宻院事資政殿大學士累贈太師越國公妣陳氏周國夫人配王氏平江府吴江縣癯庵先生份之四世孫蘇養直向伯恭張安國朱元晦諸賢賦詩于其家圃有詩集十卷行於世長子諱浚奉議郎淮西制置司機宜文字入皇元改授承務郎賔州同知娶史氏孫四曰棟楳棅栐孫女十曽孫五彦毅亨端辛孫女一先處州諱洪朝列大夫同知處州路總管府事贈中奉大夫浙東道宣慰使都元帥䕶軍㑹稽郡公娶史氏楊氏並追封㑹稽郡夫人子桷為嫡長孫女三曽孫二瓘瑾女四人四世孫男曮曄女徳秀袁為鄞聞姓晉政府繇越公始至于大父承緒展世不赫赫以求髙命所居堂曰拙逸曰得閒殆見其雅志將以俟于後矣夫徳厚者報深恃報自佚必不能以顯郡公事兄若父讓爵避財鄉黨至今能言惴慄四十年而教子督切則曰我大父之訓我不敢私今雖未厎于成詩書之澤殆能以自白嵗月逾邁交友故吏凘落幾盡隧碑有缺幾扵無傳是則有罪矧以不腆之文行于南北庸述祖徳刻于墓道俾子孫有考泰定元年嵗次甲子某月某日孫具官桷表先大夫行述先大夫諱洪字季源姓袁氏袁為明州著姓州陞為慶元宋仁宗朝詔外郡得籍開封舉進士嘉祐初為開封舉首者諱轂後通判杭州蘇文忠公時為郡太守日論文史典處州以終贈光禄大夫其宗諱榖亦占籍開封試進士厯官至祥符縣丞因家焉為公六世祖五世祖諱謂贈少保髙祖諱臯贈太保靖康難作隨青州兵復歸里積善好施年八十餘預言死期别親黨沐浴端坐以逝曽祖諱昇為明州助教贈太師衛國公樹徳力卑讓鄉里尊信郡有不軌大獄命公攝治即其家搜驗得偽署籍姓名一千餘人皆六縣大家不以送官立焚之異行遺事世多所傳錄妣楊氏封太恭人贈齊國夫人祖諱韶㓜學于族父正獻公燮登淳熙丁未第嘉泰禁道學自趙忠定以下皆入黨正獻公坐廢越公為吴江丞得罪蘇師旦俱家居避禍嘉定改元褒叙趙忠定公朱文公扵是相次被召先後為侍從搢紳榮之尹臨安十年神明愷悌自辛棄疾揚王休馬大同丘崈以後推公次之為同知樞宻院事以資政殿大學士銀青光禄大夫奉化郡開國公致仕贈太師越國公妣陳氏吉國太夫人贈周國夫人考諱似道中散大夫知嚴州總覈事物能通達損益然不樂仕進守次江陰將行乞祠祿以歸理宗異之贈中大夫妣王氏恭人贈令人公嚴州次子七嵗能諷誦詩書左氏通大義以越公遺表恩奏補承務郎年十七試吏部銓監鎮江府大軍倉明年道臨安馬光祖以樞宻為京尹上書往見之馬公喜謂曰是故袁越公孫耶光祖治京師皆先公條教今官位適相同然貴家諸郎多不達文墨是書果子所作當留以自近公謝不敏遂改辟監桃源酒庫檄入帥幕時馬公號嚴敏客多畏避不敢進率秉燭决諸曺事命四客坐四隅禁私語夜分間以成案俾閱先後是否一日擇巻牘繁冗者以試公公疏其要領言是事曲直微有隠某官所擬微兩端馬公大喜日以不决事委處分將俾徴旁邑逋負公謝曰初入官而以括責稱懼失先公遺訓馬公謝之禮部尚書李公伯玉薦可治劇邑中書舎人劉公震孫薦可理瘠縣馬公去國改兩浙轉運司幹辦公事轉運使胡太初刻峭善伺時相意旨公不樂之請告歸里胡亟怒以綠匣檄還司署曰不即来當議劾公起視事或咎之迺慰曰太初先子先樞宻門下士知予能官固若是後潛説友為轉運檄督寜國絹十六萬疋公婉謝曰嘉熙以来江東稅絹皆虗負實籍寜國尤甚莫若悉蠲虗名止取景定至今年逋且昔時嘗以不能謝馬公矣説友懼蠲數廣亟命他吏然卒不能辦為禮部貢院封彌官甫出院度宗忽降手札諭賈相曰舒津太學名士袁洪嘉定名臣孫宜與陞擢差遣舒同里人賈疑有内援遂除舒太常博士公為太社令就職兩月諷門下省論而舒亦以他事去賈相嘗曰浙東唯温處士可任事四明士不宜用于時髙公衡孫趙公汝楳以户部侍郎汪之林以汀州陸合以軍器少監章士元以太常少卿趙孟傳以贑州合執政官至守倅凡六十餘人皆家居月為一集約討論先哲言行不得議時事繇是公益得紬繹文獻深愛重自晦絶不通京師書問賈相悉偵知之迺命主管華州雲臺觀咸淳壬申遷通判建康府公閱事敏决老吏不敢紿慮獄句容有偽楮連坐二百餘人悉出之定議止誅其首帥趙溍貴騃不親庶務僚属上府謁不得入率用紫袋取畫諾公坐賔次命吏白帥今邊事益急惡少年掠奪市上將驕不習兵非紫袋可奉行帥聞即延入閤出遜語且曰將循視沿江諸屯壘苟可安便者毋忌也甲戌冬十有二月帥行郡中大驚争移徙出郭而村落民與故侯聮絡者復入城有約白晝罷市公詢扇亂者斬之戒門者毋納村民城中始安夜多火災有徼卒瞻對詳練公私以白金立署賊曺一夕卒馳報有賊約以二鼓縱火東門劫門鑰以出今賊俱在廟中治火具公遣卒往伺賊將出廟門捕二人有緼火在手即斬以㣘諸將留城者皆故侯部落至是益蹇傲願習射求官賞且曰在昔唯陳招捕習騎射今不能復見此等相公矣翼曰將巡城請公乗騎吏擇馴馬以進公命取將馬来將異之坐城上召諸將曰郡庫非制置使不敢用若等求較射吾當以私財定髙下語畢入射將挟矢前喏曰願奉約束然不敢先公手弓遂弦三發皆中革一入的將謝不敢公强之終不能並卒定其賞如初諸將前曰惜侍郎官晚然事不可為公嘿然侍郎盖江淮間幕府通稱也二月帥調精鋭居屯江城中羸卒數百相偶語有卒夜從江滸還言趙制置已南遁數日將解兵還淮西總領費伯恭棄軍資夜乗舟如通州入海賈相師潰歸揚州諸將率故侯部落將劫公出城公不得己微服間道歸臨安見太常丞吴浚浚舊為沿江參議與公厚善相對各泣下公曰國勢日蹙諸將率聞風内叛浚薦丞相陳宜中將留用之公願自劾待罪急辭去趙公孟傅尹臨安奏為浙西安撫使機宜文字不拜趙公制置慶元復奏為沿海制置司參議官公時已陞階朝奉郎亦不拜乙亥冬臨安奉表降謝太后詔諭東浙諸郡如命戒毋徒以百姓汙鋒鏑時入南軍道上虞餘姚焚掠以行聲言留軍慶元備禦居無何王師將壓境公見趙制置言南軍以具海舟實無意留旦夕必入城縱火當先攻甬東門宜戒火政分卒保東城以全居民未幾果縱火焚浮橋劫江滸城有備不得入舟出定海以行制置司改宣撫司復署為㕘議人心危疑旁郡邑相屯堡未散舊不快意扵衣冠者争上變入爵㕘議官陳允平素與王姓讐讐言新從福州航海来見陳參議為書蘓都統約以九月乗颿下慶元當出兵以迎又言禮部尚書髙衡孫而下三十餘人皆聮署勸進時張元帥督師將征南命招討使王世强圍捕鞫實公儒服立庭下見王辨陳參議與聮署書實亡有招討故為宋官寜知讐不為虗言王未應有戎服長髯者將登階見公亟下拜持抱曰此吾袁侍郎􅍗王前曰傅海舊為建康壕寨官承宣使阮思聰與侍郎巡城議立木栅阮言城廣不可守且木柵無所從得傅海答曰蔣山左右巨木可取撤近郊居民屋髙下附益可立具使果欲守良無難阮故呂太尉姻盛怒將以軍律抗對殺海袁侍郎悟旨急叱海入獄明日杖海而遣之今不知侍郎何故立庭下海願以身贖罪王大驚具賔禮以迎且告元帥帥引問之故公言安反側定新國當絶告訐羅織翼日元帥盛軍容坐府有告者復言奉化昌國某大家以故王為名一從台州黄巖来一從海上来帥立叱去之陳參議亦繇是得脫郡大疫具善藥以施死者給棺以殯後戒以為常行之踰二十年至元十五年從趙公朝京師覲世祖皇帝天語命班秩宜髙從行者一等將授總管以子㓜辭迺授朝列大夫同知邵武路總管府事以疾不赴至元二十年授温州路同知疾作復辭公㓜從王先生鑐學問戒以躬行為持身本毎授以言行編諸書公守而行之至是書陶靖節詩顔氏家訓為一編以寄意至元丙戌嵗侍御史程公奉詔徴士首寄聲起公公遜謝不敢當大徳二年改授處州路同知命下而公已捐館實是嵗二月十有八日享年五十有四先大夫性孝友事兄賔州如父器物田宅賔州所予者猶辭不敢受嚴州遺宅二悉讓兄子淡嗜好自建康歸即獨處清坐嘗曰綺縠聲色非潤身延年佳物諸君何慕焉喜賔客終嵗無虗日客去復具饌以俟不喜言人過或甚不能自重者猶覆䕶言無是事急施與家無長物嫁娶喪𦵏有不能舉者悉賑與之愛博而内明碩儒故官旁邑外郡俱館致教子弟嘗言吾交游宜廣汎愛親仁勿為臧否可也有客素依公調官京師願奉公文書以效勞久之客得官羣議咎客公以書慰之君果有得猶我之得客出書示議者迺止善尺牘琴奕諸藝皆過人不自詫襮毎言沽名激行為之良易然不可欺扵心晚嵗過郡土神祠桷侍行􅃌謂曰吾言出諸口今得視神無愧自丙子来冠屨雜糅抑負不自振嘗開釋防漸而扶植之或利害不便必正色廣論絶其萌蘖迺止殁之日鄉里無貴賤老穉皆驚惋不絶𦵏在鄞縣桃源鄉慈溪奥之原元配史氏太師丞相忠定史越王浩之曽孫祖彌堅資政殿學士贈太傅諡忠宣考賔之朝議大夫直敷文閣荆湖轉運副使再娶楊氏世儒家五世入太學景定壬戌太學進士太平州判官闕之女以宋明堂恩俱贈安人男一桷史出女三長適丞相史莊肅公嵩之孫似伯前將仕郎次適工部尚書余天任孫昌期前通仕郎次適資政殿大學士史巖之孫益伯前承務郎孫男二瓘瑾孫女四長適同知餘姚州事趙孟貫餘許嫁未行痛惟先大夫言履歴厯在人口耳蚤登膴仕將大有為迄不得展究尚義勇斷施止扵州里而中年泊然退静莫有知其意者不肖孤藐然嗣承懼嵗月之久失扵傳貽將益負不孝願託于立言大賢以求信于後世謹述厯官行事辱賜之銘而傳焉先君子蚤承師友晚固艱貞習益之訓傳扵過庭述師友淵源錄王鑐濟南人侍御史伯庠曽孫繇次翁始居鄞敦厚寡言㓜師之精理學多錄言行教人不喜矯飾壬戌進士張即之㕘政孝伯子孝祥從子善為頌語乾道淳熙事月日先後亡異史官李心傳嘗質之喜校書經史皆手定善本嚴州奉祠日相過從有絜疾語言清整待僮僕亦然書蔽其名書法之壞自張始特加太中大夫以夀終趙汝楳善湘子為宰相壻卑退自修精易象有易叙叢書可傳官至户部侍郎晚嵗以理財進用失士譽李伯玉鄱陽人為右司論事得罪後為禮部尚書薦以政事可作劇邑將入政府卒馬光祖婺州人號吏師改署佐其府性過急斷决無停滯一時新進效之鄉有馬元演時為仁和縣晨坐廨决事五百縣大治改官奏舉皆出馬公後為衢州坐殺饑民罷劉震孫東平人忠肅公元孫文清公之子魏文靖公之壻為喬丞相行簡樞属喬相與劉嘗言越公尹京政治晚嵗為宗正少卿兼中書舎人知為諸孫署剡曰嘉定名臣某有孫敏材宜理瘠縣胡太初天台人以清苦自檢治與處州季鏞同其父越公門下士胡晚始自言事見劉克莊所為銘劉黻永嘉人左史出治慶元于時奉祠山中以居鄉清修薦世號六士汪之林里人龍圖閣學士大猷族孫為諸王宮教授守汀州晚嵗十年不通時相書逮識樓宣獻公言出處大致不可易居同里巷貧益甚卒應文煒奉化縣人精史學年六十始入太學蚤游江淮吴毅甫作相兄淵守建康不去應作書諷之即謝事毅甫竒之招入相府不顧去史嵩之罷相猶子璟卿上書或言應為輔史相諷所屬掠治應益忿然卒得脫癸酉嵗襄陽降應言世事已去先子官金陵戒母攜妻孥凡所言得失悉中曹説侍講粹中曽孫父為山陽佐死難㓜絶葷娶精易象數論語詩春秋皆有解多折衷舊説嵗一再至易説為里人所竊今不傳聞在松江儒家王先生應麟兄弟中博學宏詞科為翰林學士禮部尚書咸淳詔冊辭命皆先生所作著書有春秋攷逸詩攷古易攷通鑑義例攷困學紀聞玉海一百卷文集一百卷先子命桷受業門下十年胡三省天台人寳祐進士賈相館之釋通鑑三十年兵難藁三失乙酉嵗留袁氏塾日手抄定註己丑冦作以書藏窖中得免定註今在家吴浚建昌人喜論兵為建康參議數凌侮郡將賈相督師舟泊龍灣客謁不得入吴大慟賈竒之後入為王宮教授累遷起居舎人嘗薦先子于陳丞相入南起義兵事不濟議降文丞相殺之戴表元辛未進士善論䇿失仕歸里力從諸先生能古文為金陵教授時與之同官家貧衣食喪𦵏咸賙之後留塾中有榆林集五十卷黄震慈溪縣人以清介聞賈相知之守撫州兼本路提㸃刑獄迄不能合坐論去性不喜鄉里獨作書以所為日抄一編寄贈陳蒙鄞縣人國子司業塤之子善筆札治獄多探竒嘗疑之後為淮西總領以浪用公帑罷貶建昌晚守温州夜别先子行益詭誕子孫散亡不可攷安劉汴人居鄞之小溪以詩義冠多士善清言三歴祕丞郎官素為賈相客安以科目自持卒不得顯用程鉅夫舊名文海郢州人今居建昌善鑒裁為侍御史時奉詔徴江南遺逸首薦先子以疾辭所薦士皆知名多至大官今為翰林學士承旨謝昌元資州人淳祐甲辰别院第一守封州提舉廣東常平㓜嵗見劉文節公光祖能道蜀士大夫言行可傳錄言蜀中亡事甚􅆭僑居于鄞入朝為禮部尚書青陽夢炎西蜀人使李壇善機辯賈相愛之為荆湖提㸃刑獄仕元朝為吏部尚書多智留夢炎三衢人事見國史晚為翰林承旨焚香擇吉日薦先子于御史中丞翰林修撰汪漢卿與桷官翰林時言之趙與􅝾黄巖人篤實無城府睦姻族與先子俱為史壻官京師嵗一遣問官至翰林學士卒盛夬金華人􅃉經學多本項安世氏丞相王爚薦為太學博士後通判慶元梅應發廣徳人與叔祖履道同補太學為慶元教授習詞科卒不成官至太府卿喜抄書先世書皆傳冩舒岳祥台州寧海人七嵗能作古文弱冠謁吴子良吏部大竒之吴學于陳耆卿舎人舎人學于葉適正則以師道自任好譏侮晚嵗詩益工官慶元時與之㳺後作書俾桷往事之劉莊孫學于舒能文詞深沉善精思家貧無書傳五經能黙與先儒合病廢卒樓槮宣獻公族孫精厯法言宋司天氣朔盈虗當改章法不可用未之信後授時厯頒言始驗舘于賔州伯父家四十年日布筭疑多財者貧老卒應發孫㕘知政事㒡之子父為翰林學士時能代父書命後祕其父書不出好博以蠱死史蒙卿乙丑進士拙程文黙誦五經其學喜竒説禮部尚書王公多傳授之卒以竒不合于王公陳定孫參知政事卓之孫為軍器監丞家居四十年嵗奉祭祀必哭泣年八十餘迺終余尚賔官至太府寺丞賈相入朝不得調孝友誠實鄉里交賢之謝翺南劍人僧圓志瑞州人俱能古文尚嚴簡氣鬱不自舒困死周宻湖州人與陳厚韓翼甫李義山咸淳初為運司同僚俱有吏才約貴日以字稱禁近俗名號陳能文端明存之弟韓安陽裔孫善持守李豪邁名吏夀朋之孫皆蚤卒周中丞祕曽孫晚嵗以鑒賞游諸公微失雅道葛慶龍南康人寓居四明僧舍精唐律詩酒酣能飛筆為數百言然棄不復錄有什一集極精警游越卒先夫人行述嗚呼桷始生之七日己不孝罹禍于先夫人音容永隔無所容罪毎侍先大夫嘗語曰汝生之年嵗大熱丙寅為火協于支干臨安居民繁湫坐地沃水猶喘息不得止茵席器案如執焦汝母體素弱一夕暴泄輙不可藥目光已離猶視汝在褓中復愀然曰桷来前念至是曷時可忘耶桷泣而記之又曰大父嚴州與汝外大父敷文公最相好伏臘治具悉相似商榷品目議論好惡無一不脗合汝祖母王令人史太師甥孫故於敷文通姻好益宻淳祐辛亥八月敷文病㿃下嚴州日問疾敷文力疾言吾有二兒二女皆未姻願以穉女屬公㓜子吾時年七嵗汝母年六嵗是月嚴州治幣問名閱七日敷文捐舘嚴州嵗時往敷文家撫汝母候笄期以主我中饋又無禄嚴州即世景定辛酉歸于我史氏號大門伯父賔州嚴峻汝母屈意朝夕承候無替惰分至大祭盛服俟廟門陳器薦牲饌低首傴立終日不少動性絜静無華飾從母廣國夫人為昭化軍節度使謝公埜配貴家競侈異獨無纎粟模效毎一􅍗親黨歸悉脫去鈿靨嘗言教兒嬰孩必蚤加訓整庶無為父母羞余年少時習騎射必正色切劘或從㕔屏偵問所與交有凡近者即掩被就睡明日徐曰先丞相家無此客先夫人少母張夫人所出張夫人生二女長適謝公先夫人既卒謝公日迎張夫人張夫人不肯去泣曰吾一外孫曷忍去卒撫字見桷有室張夫人言外祖敷文方死時汝母坐床下泣不置勸之食不食終日坐殯次不離服除一􅍗庶母房至嫁日始再􅍗别之家人莫有識其顔面者桷既長舅氏軍器監丞栁州某言忠定越王淳熙中召赴徳夀慶夀班孝宗曲宴問曰太傅㓜子今何姻忠定謝不敢孝宗曰吾為太傅成之是時崇憲靖王伯圭女方笄即封新安郡主以嫁忠宣是生敷文敷文長外家出宰武康縣縣蒲始歸里敷文言吾祖暨外祖皆真太師汝曺當謹擇婚對今甥已克堪問學慎毋忘外家敷文嘗言而母㓜静簡當有成竟迄不享年幸子在猶能慰吾意夫人諱棣卿字景華以宋明堂恩追封安人謹按史氏譜有舉八行者諱詔贈太師兾國公為五世祖曽大父諱浩舊學相孝宗純誠厚徳厯三公以太師保寜軍節度使魏國公致仕追封越王諡忠定妣貝氏封齊魏國夫人伯祖諱彌逺相寜宗理宗太師中書令祖考諱彌堅資政殿學士光祿大夫奉化郡開國公致仕贈太傅壯嵗尹臨安帥湖南多異政中令為相厯年滋多太傅不復肯仕家居十餘年端平改元諡忠宣妣趙氏新安郡主封衛國夫人考諱賔之朝議大夫直敷文閣荆湖北路轉運副使少事丘文定公崈以政事稱六為郡太守贈通奉大夫妣王氏恭人丞相忠定魯公淮之孫妣葉氏恭人俱贈碩人丙寅嵗冬十一月𦵏于鄞縣通逺鄉建奥之原卒時年二十有一後三十有三年先處州不祿懼體魄之不寜遂别𦵏于桃源鄉慈溪奥之原先處州諱洪朝列大夫同知處州路總管府事曽祖諱昇贈太師衛國公祖諱韶同知樞密院事資政殿大學士銀青光祿大夫奉化郡公致仕贈太師越國公父諱似道朝議大夫知嚴州贈中大夫男一人桷女二人長適丞相莊肅史公嵩之孫佀伯前將仕郎次適工部尚書余天任孫昌期前通仕郎先大夫晚得女一人適資政殿大學士史巖之孫益伯前承務郎孫男二瓘瑾孫女四長適同知餘姚州事趙孟貫餘許嫁未行私念桷孤苦不自振擢揆厥有生與先夫人違棄之日俱積今宰木已抱過庭之訓懼無以貽子孫敢求偉於文詞叙而銘之庶得以永考而有傳焉亡妻鄭氏事狀亡妻諱某姓鄭氏鄭為明州令族世家于鄞始自元祐舉進士至宣和時其孫入辟雍有諱某者當孝宗時為郎曺守平江寖著至太師尚書令忠定魏郡王諱清之以舊學相理宗官簿益盛故君之七世祖至髙祖皆贈太師魯國公魯公長子某國學進士贈中大夫妣邊氏封太碩人魯公配臧夫人素嚴忠定之生夫人將不舉邊氏亟詣姑取保乳之長歸于其姑後碩人生子諱某與忠定同登嘉定丁丑進士第邊碩人卒忠定為之服衰以報其子亦官至中大夫秘書監寳謨閣待制以終扵君為祖贈正奉大夫妣汪氏封太碩人待制生子諱某朝請大夫直祕閣主管建昌軍僊都觀扵君為考妣汪氏封宜人淳祐中忠定以師臣再相年益髙祕閣入閤承侍禆贊可否務總約體要纎秒不以類于時賈相帥京湖數張皇軍旅邀國用朝廷抑不下賈相恨議繇公出辛亥嵗丞相薨庚申賈入相由是積二十有三年不復出仕先處州繇太社令奉祠里居祕閣公多能言臺閣舊事數往還是時祕閣新喪子無他嗣庚午嵗迺得君客至嘗抱立左右錦􅃭珠髢注目不聽去處州戲曰他日願以為子婦祕閣愀然若有屬癸酉嵗處州通判建康府將之官宜人與祕閣餞飲于中堂共指桷曰誠宜為吾壻是嵗祕閣與宜人俱捐館居第在城東門外乙亥兵難作先處州以其遺言謀于其宗長始歸于我于時袁宗猶完盛先廟祭祀娣姒林立能卑順盡禮朔望承問無缺怠事桷外祖母張夫人甘柔凉燠調適以宜張夫人嚴整語相家内儀和珎組絲皆精巧有度君能耳受目悟而敬成之張夫人病革視藥膳連月不入寢處嘗曰新婦不獲事先姑得事夫人斯可矣性静厚寡言笑遇事不輙發而是否瞭然不能易故處親黨無間言處州㓜撫如已女君偵顔色承事幾二十年絶纎粟忤意己丑城中災遺物散燬先處州以它事往吴杭間意忽忽不樂間治觴具能使如平盛時祕閣所後子不自振君深憂之竊從招提命所後子嵗時以祀其先大徳戊戌嵗正月君産女病榮弱桷主史甥姻于杭二月十日丁夘亟歸視之則已不及矣大禍仍搆又八日而我先處州亦捐舘舎噫念昔少時私欲奮勵學問以自振植先處州愛之迺悉總攬酬酢俾不以亂其心不幸志昏能薄一無所成立四女二男皆君所出紉箴訓飭復能相其夫使有所不知及今一十有七年從宦京師藐然孤身若忘其家缺内佐之助靡宻綜錯日益加多而學益以落文誠不能以表君之志敢求扵故家之友人精扵言詞者誌而銘之君𦵏在鄞縣桃源鄉潘奥之原男瓘次瑾女一嫁餘姚州同知趙孟貫餘許嫁未行桷今為翰林待制是為先樞宻太師越公諱韶之第四曽孫先嚴州中大夫諱似道之嫡孫先處州朝列諱洪之孤子也外祖母張氏墓記外祖母張氏諱致和湖州徳清人嘉定六年七月生父某事趙崇憲靖王父子再世部樂伎年七嵗通音律桷曽外祖母新安郡主歸崇王家見而愛之載以歸俾事外祖敷文轉運史公稍長為侍姬户室靡宻總覈合繩墨外祖性嚴急挈長覆短使不有忤意囊箧甲乙隨旨諭立陳于前如是踰三十年生二女長和政郡夫人嫁太尉昭化軍節度使謝埜次即先妣㑹稽郡夫人歸于我先考諱洪朝列大夫處州路同知總管府事二女皆嫁宰輔家于時謝以后族貴顯先處州官臨安常卑讓疎之外祖母雖久居相門見謝壻侈靡踰限制心不樂而多留處州以静恬自怡咸淳二年丙寅夏六月㑹稽夫人實生桷甫七日洞下遽卒又未幾先處州病大熱垂死咸言不利於母將及父謝公願取已育之處州在病摇手不許外祖母排斥詬詈户之遂日訓飭調適且祝曰兒宜為史氏外翁自重八年謝公死泣曰吾固審若是吾盡力撫袁氏外孫他何之訖見桷娶婦生女至元二十四年二月某日卒年七十有五𦵏于先夫人墓左五十武㓜通書筭善心計處州事有未及始諷之終以舊事敷文者言之晚嵗病瞽纚纚言外家事曰汝外曽祖太傅忠宣公居東湖滄洲十有四年不復仕作書諫兄忠獻辭相位不輟嵗賜生日器幣辭一再始受後數年不復受鄭忠定丞相忠宣公塾師也敷文受學焉其舊第前為舊學夀皇書後為授經鄭相書皆有深旨又曰音樂慎勿蓄今世公卿女樂皆俚野不足聽惟太傅壻趙崇王悉祖樂髓景祐譜調八十四穿心相通嘗曰譜與易合吾不知易何圖可合汝識之又曰丁抗掣曳大住小住為喉舌綱領法曲散序忠宣刪正之曲有均猶韻也纍纍貫珠韻不絶也聲有盡拍以度非句斷也于時周待制邦彦孫璹扵太傅為中外表太師越忠定王嘗命譜清真詞手筆具在今付汝雖不解慎勿墜也舊以恩賜紅霞帔再封孺人記曰庶母不祀於孫而復曰祔于庶祖姑古不墓祭昔之大賢嘗慊然矣今夫禮縁扵情而義以制者懼後之昵於私者之過也先王營丘壟之大小無貴賤慎其始不幸有沮洳崩齧之患焉其修之也必有道是則扵吾外祖母非有過焉者矣以孤兒傳處州考其所自曰外祖母保鞠之恩重桷二子瓘瑾將竦然以加厚外祖母有田若干足以治墳壟奉春秋刻于碑陰懼瓘瑾之子若孫㓕其情義必曰禮有所不載遂具昔之訓撫行事立石于墓俾勿墜某年某月某日外孫具官袁桷謹誌清容居士集卷三十三欽定四庫全書清容居士集卷三十四元袁桷撰傳徐師顔傳徐君諱師顔字子愚逺祖天聖間繇太末徙新定故所居里以氏得名曰徐閈君始生時蓮出並蔕父母器之稍長讀經史心徹意領年十七授室君白大人當令兒從師外方迺游三衢習進士業入宋太學程試甲乙表流輩性倜儻急難嵗饑日具釡鬵滿庭廡值父喪慨曰世俗飯僧為冥福吾當活餓者以報親是嵗就食者幾萬人太守楊潮南書以勵旁邑至元十四年詔用兵入南俘虜日繫馬尾疲弱棄道上春大疫饑民旁午君出粟募民舁骼坎瘞可醫食者親撫視以活遇一女子扶曳蒼然氣微属問之曰吾三衢儒家女命載以歸稍長俾為士人妻客方達可館于君死已飭斂具其子辭不能行即指某地𦵏焉復嫁其孤女事繼母至孝一日妻治紉澣出微語君聞之自責不居内者幾月母言亡是叱妻具簪服拜堂下始復初外氏族黨嘗質田嵗久君束劵母前願奉田以償其承順率類此始為信州教授首言于郡復儒役七百人署所居曰道悦以奉母㑹母思歸即解去湖南缺提舉官集賢章舉之辭曰母在不宜逺遊受湖州迺歸秩滿視資當入縣佐君言昔為太學諸生中繩墨始得郡博士博士古官何縣為復授太平路教授所至必先新學宫嚴餼廩安定胡先生墓浮屠氏將夷圯之君力復而致祀焉在太平時治丁蘭王祥諸祠墓扵仁孝殆天性待諸生穆如也晚得末疾卒時年七十有四曽祖某祖某子男九人觀先卒頤為族弟仲龍後艮革為長興州教授節處州路教授益晉萃復未仕女二方丙子時游騎入人居大索二女争死之孫男二十人女三曽孫男女三人所著有上饒集吴興集姑熟集北㳺錄凡十卷大理卿陵陽牟公序其詩曰事親若徐積詩亦似之其子革留京師將歸泣言于袁桷曰先人力詩書宦不充其徳遺行又泯遏弗表見革等何以自樹將乞銘于翰林學士廣平程公以表墓子為之傳藏于家其可乎迺弗敢辭贊曰周官以鄉三物教萬民任恤之道戰國而降挟持以干兾幾於靡矣若徐君者不翕翕以近名禮以為防恬然孝謹彌老益安子孫滿門殁猶有稱旨哉蕭御史家傳公諱泰登字則平姓蕭氏逺祖繇唐末遷長沙占籍廬陵太和縣代有吉士曽祖諱逢辰官至中大夫當開慶間以安撫使副守鄉郡兵至卒急羣議撤近郊民居為清野大夫持議不下城守兵去里人徳之晚嵗築宅一區立田八百畆聚其族以教厚徳衍裕生徳安府觀察支使諱安中稱其先猷蚤嵗以亡徳安生中順大夫瓊州安撫副使諱元永玉雪矜謹倜儻自榮是生則平方㓜時頭角嶄異九嵗入鄉校治論語義屬筆精警稍長忽自悟儒以道得名事物險易當品節中理齷齪翦翦無益也弱冠試吏調永豐丞永豐多盗區跡巢穴僇之丞以治稱入京師授湖南儒學副提舉振直士氣使治靡宻者不敢撓部使者徐琰竒之言可為御史府屬㑹徐為中丞亟力言遂僉廣東道提刑按察司事廣東介絶嶺海幽篁深水蠻獠縱恣郡吏私表裏聲言獠不可治白日剽刦子女財物公贈遺良吏清謹者皆避讓郡縣多版授官姦宄馴積莫問使者循行擇善地坐嵗月即去至則躬厯所部劾治與獠相根蔕及積貪濫者八十七人皆罷之减始興貢銀之半疏其可宜行于臺者凡二十便事廣東民繇是知朝廷有犯贓律焉初至廣時讙言獠㓂入境亦欲以是嘗試一坐大驚徐曰督盗守令職署舎在是卒有警我輩何自即上馬出境軍將争率兵以進獠迺退是嵗至元二十八年天子下議羣臣言按察官糜爛不任職更名曰肅政㢘訪司遂以舊職解後新使者及御史咸言蕭按察治事纔二百日所論按皆引直當法不宜以舊官同罷牘甫上御史大夫書牘曰湏選用元貞改元成宗即位罷兵安南釋陪臣陶子竒歸命李衎為禮部侍郎奉詔往使之遂拜兵部郎中介其事明年二月入安南世子遣偽署官曰太尉迎詔空首不至地因問何得爾偽太尉曰國世子未至不敢先以黄盖二皂衣數十人清路入舘世子髠首跣足率從吏百餘人至館門前問聖天子起居却立曰主上新即大位二使者辱入敝境道里勞逺秋毫無所取誠切感忭敢昧死願聞明詔大意侍郎目郎中郎中前曰昔迺先王先諸蠻欵附朝廷録舊功將錫宥于汝小邦汝曷敢不祗畏畏克敬迺不墜厥命或少縱自恣天憲速罰弗敢逭宜肅恭盡事世子錯愕唯唯越三日備仗奉綵輿率朝服數十人導詔從褥道中行入其宮世子後從二使者授詔世子拜伏讀詔興稽顙曰小臣不自意獲寛大如是復命再拜遂定慰賀皇帝皇太后皇后表牋貢物儀注成禮迺還道繇思明時思明帥言石西州禄州皆本朝地為安南所侵幾二百里彼詭言山溪蠻阮盝出沒不相統虗文嵗往来無益至永平寨寨故宋戍兵遮道言實安南部領侵撓不得耕耨囬首語陶子竒山溪蠻誠所属奚號令不可止今已目覩當語而世子子竒不能對至是復命歸地蠻吏上下顧吝遂言吾非以侵疆来石西地不足輕重設奉辭致討汝何以自洗各屏息一口盡歸侵地故右丞相太傅公時治湖廣省聞復地亟喜之為設宴以勞凡安南所贈遺悉返之明年遷連州又明年改為江西儒學提舉儒者用廢已久新舊持短長科舉律令交排鄙不中節至則擇知名士禮致之𨗳誘後生斟酌可能行者為繩凖省檄慮囚有巡官及富民殺人誘傭奴以財俾自誣伏獄屢閱無異詞徐跡處所及所持刃亡有獨引囚曰若是汝當死咸欵實得出㑹詔使按問諸道守令治狀使囬丞相問官吏孰㢘使以儒學官蕭泰登對四年僉嶺南廣西道㢘訪司事海南都元帥薛闍干聲燄震海上多所為姦利不法立具章劾有詔雜治抵罪覈殺無罪七人焚掠村堡二十四奪私没奴婢六百七十五雜畜三千六百五十五過栁州出妖民誣詿者百三十七凡黜吏二百一十罷攝吏四十一六年進奉直大夫江南行臺監察御史分守江浙行省㑹嵗大饑吴流民扶曳滿道已定議出官粟守法吏言非朝旨不得擅語曰民命在旦夕後有詰責已捐貲以償何害為行省吏牘積糅叢雜首尾銜絡摇手莫敢問時已得疾呼掾史詰難視罪輕重悉坐之又别為副書筆其事使後母有出入羣吏大驚是嵗八月疾漸革趣治棺歛手書屬其子語侍疾者勿宜受贈賻遂登舟不復言卒時年三十有八歸𦵏于其鄉螺岡門外配楊氏繼彭氏子男三文孫憲孫昇孫女三大夫天性明爽閱具獄率不為吏蔽探情傅意多所出活非曲假恩貸以自異重然諾容采精絢達官大人皆傾耳與論事或言太剛必折徐正色曰今世士無有剛果折何憂也長子文孫静専自修留京師授翰林學士程公銘俾為家傳念與公同年生相後纔一月薾薄不自振然職在太史筆削傳信惟謹迺弗辭贊曰大江以南號多公卿比數十年闊焉無聞者何邪官御史府靳靳五六人或以激毁或以愞譏獨蕭公精謹自持正静益明物莫能逃守儒知通据法不阿使㕘錯天下三年可成也年不衍用名益以昌何恨焉史母程氏傳嗚呼余嘗得三卯錄讀之蜀禍之慘不忍言也夫朱禩孫之死而復生也蜀民就死率五十人為一聚以刀悉刺之迺積其屍至暮疑不死復刺之禩孫屍積於下暮刺者偶不及屍血淋漓入禩孫口夜半始蘓匍匐入林薄匿他所後出蜀為樞宻使嘗袒視人未嘗不泣下賀靖權成都録城中骸骨一百四十萬城外者不計嗚呼推是考盖可悲也蜀眉州史氏由唐吏部侍郎儼從僖宗幸蜀因家焉其先墓在青神將二十世宋世號名族其出蜀也今唯居湖州一房讀其遺事益悲之史母程夫人蘇文忠公之母之族也夫人將攜其家下峡江以槖金腰纒之兵暴至伏林莽與鄰嫗謀曰輸金果可生吾兒無資不復能出蜀史宗誠無噍類矣縱得生旦夕兵復至亦决死均死死以全史兒誠不恨嫗見身死為吾出腰中金告兒使速走須㬰兵果執母謝以實亡金遂遇害翼日嫗語于鄰告史氏兒児年甫十三從草野得尸如其言窆以歸且亟圖其象識曰史光母年五十有四嘉熙二年十月二十有七日申時死兵難児遂東南来占籍湖州刻意自奮以右科為浙東兵馬鈐轄鈐轄生子圭文嘉定儒學教授嘉定生子台孫某台孫儒術通吏文復有子幾人而史氏繇嘉熙至于今且四傳矣噫蜀繇秦帝入中夏至于宋凡一千五百餘年文物大盛絶不知有兵革一旦掃削殆盡迄今百餘年遺􅇕敗棘郡縣降廢幾半可哀也已可哀也已贊曰婦人内徳不出門房中歌廢戰國而下俱不幸以著非得已也諱莫甚於死從容反復烈士猶難之况士女乎歐陽公傳斷臂婦人以愧馮道夫人以死傳宗承平世澤於是乎見作史者烏得廢諸延祐七年十月壬子前史官㑹稽袁桷撰孫孝子傳表厥宅里首於唐虞若是則失其本心者見扵上古歟司馬遷傳貨殖滑稽或者譏其有激五典為治之本捨正而求異扵世道何補焉晉唐作史始立孝友勸勵後世靡然嚮風深有取焉孫孝子楫字濟川世為保定雄州新城人㓜倜儻讀書通大義其喪父也遵禮而不凟後調宣徳尹慨然曰吾惟母存何仕為不踰月謝去事母以上夀終而歸于田野者凡十七年兄蚤喪奉嫂彌謹卒為兄子授室姊贅李氏于家三十年將異居營近市髙燥以奉姊姊大慰喜録其孤有成性重然諾不自表襮有故人喪至日將𦵏適以故不及送抵暮促騎以往夜已分一家大驚其待友也有挂劔之義焉其居鄉隐約自持鄉多宦家絶不通問鄉人咸曰此孫孝子居也卒上其行于朝表其門閭始為燕南府史録事襄陽繼授宣徳繇宣徳名始著調興和路經厯改河東憲府属又調濟南卒拜監察御史今為浙東道㢘訪僉事其行事不阿多可紀余獨著其孝行扵父母兄姊朋友兼盡故特書太原郭幹卿嘗曰孫濟川少嵗能以其妻奩物償父兄逋一難能兄無子買妾以奉二難能郭靳許可今考其行信然前史官表桷曰曩在史院時嘗纂次世祖以来功臣列傳考實錄所著旌表令尤諄切至作隠逸孝行訖未有章灼篤實可以詔後世若孫孝子允其人哉韓威敏公家傳公諱政字君用姓韓氏髙祖諱天麟知金臨潢府有恵政民祠奉之卒𦵏城南因家焉曽祖諱垂髙州節度妣李氏祖文卿知耀州妣孫氏貞祐避兵南遷臨淄今為益都人父松之膂力善戰四駙馬募兵南征與之俱至下邳主將竒其勇俾率益都兵戍山陽戊子嵗攻宋揚州殁于陣公時年五嵗妣劉氏挈以家山陽明年益都為皇元所破淮南城守争遁去劉氏走奔莒居熢火山劉母家沂州其舅業醫命習之盡得其術復遇一醫繇是益精稍長猶隠醫以自活山東連嵗大擾入于汴復歸臨朐又復還青社時甫弱冠見叔父順始得拜淄州諸塋迺復從軍取海州掠東海破漣水皆在功簿塔察大王鎮遼東召公以從至于龍庭與議事不合卒以其嘗所計畫者告于世祖皇帝遂悉以邊陲大事委之至元十三年討西羌相威國王領兵即授嘉議大夫漢軍元帥監軍事佩金虎符軍中大驚曰監軍非國姓不得領裕宗在東宫心亦疑㑹入辭命以鎮庫弓挽之彀而復引者三始曰大帝善任使若是賜金錦衣一以行西入大磧斬馘凱聞還軍至臨潢得拜祖墓其碑記猶在十五年立五衛首授前衛親軍副都元帥指揮使復兼領左右衛屯田軍馬紀律整遏卒莫敢譁奏以屯田各歸于衛而治其無良者則諸衛各有統属上從之秋繕修大明殿以治具稱十九年加正議大夫充樞宻院判官二十年進治書侍御史二十三年改淮東道按察使善决事有拾遺者告于其所失輙誣以金公遣拾遺者而叱去之商人暴死于旅邸疑邸人殺之驗其嗜炙有毒邸人得釋其餘行事往往與傳記相合常出能吏上薦士十三人率致位通顯在御史府定議盧右丞牟利罪卒流徙之二十六年卒于官年六十有六𦵏于某鄉贈嘉議大夫闕部尚書上輕車都尉南陽郡侯諡威敏娶孫氏表氏石氏殷氏男八拱承務郎廣州路増城縣尹次振摶奉政大夫慶元路昌國知州拯御藥院副使次撝皆蚤卒次揆扶持女十人孫男若干人摶之治昌國也興儒學建三皇祠嘗紀其美績且命作家傳讀其隧碑襲慶趾媺有自来矣賛曰貞祐兵興中原士人無噍類獨臨潢以遺愛祠𦵏兹土三世牧守至於曽孫死事有光威敏是承北省臨潢南保臨淄難矣哉政合古先不茹不吐子孫繩繩宜哉有元開府儀同三司上卿輔成贊化保運𤣥教大宗師張公家傳公諱留孫字師漢系出清河東武城張氏留侯良之裔孫歆為司徒歆弟協為衛尉生魏太山太守岱自河内徙清河七代孫彞徙魏州昌樂為後魏侍中諡孝侯子始均復諡孝侯孝侯生晏之北齊兖州刺史生䖍雄為隋陽城令是生文瓘相唐髙宗子潛楊州刺史揚州生㝏為杭州刺史始居江南至公十五世今為信州貴溪縣人曽祖宏綱集賢大學士光禄大夫柱國魏國公諡安惠祖粹夫金紫光禄大夫大司徒上柱國魏國公諡康穆皆以公貴贈父九徳太中大夫同知江東道宣慰使司事累贈開府儀同三司大司徒上柱國魏國公諡文簡公早聞詩學道龍虎山見而慕之遂服道士服以漢天師所傳授㳺江淮間儀觀頎整見者尊異成願受其説有相者曰當貴極人臣而清竒絶俗視陶𢎞景葉法静殆將過之世祖皇帝平江南召嗣天師宗演選公從行北方地髙寒皆不樂居中遂委任其事門室清泊處之晏如也世祖祠幄殿裕宗入侍風雨卒至召見于上見其貌異常士而奏對簡異益器之風雨隨止遂賜廩給裘服俾嵗從北巡上與昭睿順聖皇后駐日月山后疾甚召至命愈其疾若有神人獻夢于后遂愈上大喜命為上卿鑄寳劒鏤其文曰大元賜張上卿敕兩都各建崇真宫朝夕從駕日昃命衛士提輿以歸内侍强登輿謝不受即步出禁門十五年加𤣥教宗師授道教都提㸃管領江北淮東淮西荆襄道教事佩銀印明年奏復宫觀令自别為籍有獻言者道藏經多殽雜宜焚去不録遂宻啟裕宗黄老書漢帝遵守清浄嘗以治天下非臣敢私言願殿下敷奏後上大悟召翰林集賢議定上章祠祭等儀注訖行于世十七年奉詔祠名山川給驛馬五十令訪遺逸以進敕輔臣設宴崇真宮復餞于國南門外回朝以所見聞剡于上上悉用之十八年七月皇曽孫生是為武宗上命擇嘉名以進是嵗分翰林集賢院為兩道教專掌集賢始自公議二十二年仁宗生復召命名今二帝廟諱雖用國語皆以公名義釋之二十五年預議集賢院賜七寳冠金錦衣玉珮珠履二十八年丞相桑哥敗上欲相完澤穆卜之得同人之豫公曰同人柔得位而應乎乾豫利建侯同人為得位豫為建侯彖傳之辭也陛下所擬為無疑未幾拜完澤公為相後卒受遺輔政二十九年開通恵河上問果便利對曰漕為國本孰敢議非是誠减民力取實效民必趨之繇是河役卒不為民病三十一年上不豫遣内侍諭隆福太后曰張上卿朕舊臣必能善事太子太子繇軍中歸即帝位是為成宗皇帝成宗慕道家説蕆祀彌盛在宥十年嵗輙祠上帝侈甚祕祝御名皆上所自署後有白鶴翔雲中命詞臣叙紀付史館元貞元年同知集賢院道教事大徳三年加大宗師别給銀印視二品上御便殿命講南華經七年上京旱兩京山西地震復命祠祝謝曰祠祝實臣職祭不欲數地道主静厥罰惟暘見扵五行傳災繇人興願應天以實布徳賑惠臣敢稽首以請上深頷之八年上御玉徳殿賜玉冠為夀十年制授上卿十一年興聖皇太后自懐孟還宫武宗即位加大真人知集賢院事至大二年領集賢院位大學士上是嵗再加特進時仁宗在東宫進講老子自是入侍必賜坐皇慶元年錫號輔成贊化二年命將作臣製玉刻文曰𤣥教大宗師手授曰以是傳教俾永逺延祐二年羣臣侍嘉禧殿上曰先朝備陟降持保無瑕缺者孰在咸未有對上語曰張上卿其人乎衆唯唯遂制授開府儀同三司號加保運四年以七十特敕設于其宫伎部畢列宰輔以下咸奉夀復命圖像鎮崇真宮賜璽文曰皇帝之寳命翰林學士承旨趙孟頫為贊兩宫傳賜翌日入謝俛奏曰臣際遇累朝惕惕顧念罔有替今年且衰耄不去辱聖世願歸老鄉里即死且不朽上不允七年英宗皇帝即位遵累聖優褒禮再降璽書至治元年益求去十二月壬子酌酒㑹弟子少頃入寢室修静端坐以化歛之日顔色完好舉體如蛻羽兩宫震悼賻贈有加宰輔至于士類咸曰福人逝矣傾城耄稚則曰善人亡矣皆弔哭盡哀及啟靷木氷載路觀者嗟愕始從日月山世祖即命公為天師却立以謝曰嗣天師漢張陵之裔今居龍虎山願正其傳繇自三十六代嗣師宗演至于今凡四傳皆公所匡翊美鬚長大癯然冲退不擇貴賤傾下承接奏告廣殿音聲激鏞鐘聞者凜竦賚錫無虗嵗未嘗奉已屢錫田園以食其徒當至元末嵗成宗新嗣位時宰不快於御史臺成宗是其言讓責中丞崔公彧崔懼問䇿安在曰當見丞相釋所以遂與俱詣相府相怒霽又與同謁近臣言御史臺世祖皇帝建立專以懲姦慆勢尊則綱紀明削之則臺不能立矣近臣大驚入言於上明日大宴大明殿諭崔曰臺為朕耳目朕曷不知憂卿等不職故告諭宜勿懼其盡心焉朕行為汝増重矣崔頓首拜手謝其彌縫國體婉順若是至於排解薦助人不知所自亦不肯自以為功絶口不言朝政貴客至争短長酒盡三爵即假寐客去禮復初暨喪還州郡縣接祭以俟今𦵏某縣某鄉祖師八人皆贈真人事在傳宗碑今嗣𤣥教為吴全節授特進上卿𤣥教宗師崇文𢎞道𤣥徳真人以真人佩銀印者三人夏文泳江淮荆襄等處道教都提㸃曰毛頴達掌遁教事曰王夀衍領杭州開元宫以真人制書命者三曰余以誠領鎮江路諸宮觀曰孫益謙領杭州佑聖觀延祥觀曰陳日新承詔興聖宮以璽書命者九曰何恩榮提㸃信州真慶宮曰李奕芳提㸃南嶽廟兼衡山昭聖宫夀寜宫曰張嗣房提㸃潭州嶽麓官曰薛廷鳳舒致祥張徳隆薛𤣥羲徐天麟丁應松皆奉兩宫崇真祠事其他弟子三十有八曰上官與齡何斯可彭齊年薛起東李世昌陳彦倫詹處敬于有興王景平蔡仲哲彭堯臣張汝翼馮瑞京祝永慶蔡允中張善式董襲常王國賓曺載静余克剛丁迪吉張居遜董宇定王用亨張顯良徐守勤彭一寜劉若冲彭師尹張逢吉趙有立程某施某葉某童某俔某上官某李某公兄子榮祖弟子熙祖亦以公故入宿衛榮祖為邵武路同知熙祖為衢州路同知泰定二年今上召全節曰𤣥教汝祖闡立其為朕祈永遂大祠扵長春復追贈某官前史官贊曰世祖皇帝闔一海宇蒐遺逸選藝能靡然踵来江南持政柄者不一二人卒不能善終何哉在御三十四年命相幾二十餘人或解罷或斥逐獨張公無少疵病目覩成敗至於五朝難矣哉葢其行無迹曲焉以全得老氏之旨五福斯備前古鮮著詩云昭明有融髙朗令終張公其近之拜住元帥出使事實至元二十九年今浙東元帥拜住公奉世祖旨以行軍招安使從征爪哇于時髙王二將為蠻兵所圍公深入㧞圍出之元貞二年奉成宗旨使西域哈贊王愛其才以尚衣職行軍有戰功賞金符金帶因令其入見於成宗復賜虎符皇慶二年仁宗以金印賜丞相孛羅且俾往哈児班答王所議事至中途遇也先不花王疑有間諜執以問荅曰今上所遣不過通嵗時問禮曷有他意王左右曰使者往奉皆言有啟邊生事形迹汝此行宜得要領可實言否則搒掠汝亦必言遂命跪大雪以問且搜其衣中無所有公曰王所問實不知且王從何所得是議王曰阿必失哈至是嘗言之且曰哈児班答王上近支也吾等族属存與留不可知後使者至必有處分今汝往彼必生事速吐情以告我曰王擁兵遮道使者急求去多詭辭以脱阿必失哈曷可信左右曰彼統軍九萬寧肯不自愛惜詐言以求脱遂縳公兩手納諸股擊之迺曰有璽書具在使臣往来有後先拜住萬死實不知取璽書視之始曰彼果無罪遂奪其虎符及丞相金印拘囚王所延祐元年五興兵内冦復遣使召公至獵所曰我已入汝境土矣公曰兄弟之國無内外彼地亦王地王往何所疑王曰親踈既分釁隙已兆勢不得不爾公徐言在昔太祖皇帝西征有訓若曰人不可以信讒讒入則宗親乖離宗親既離則百姓他適將貽笑扵敵國拜住嘗聞在成宗時先王有盟興滅國開闗塞以安百姓今言猶未冺絶使者掉舌生異同令王致疑拜住等良不稱職敢叩頭死罪以請王解顔曰吾欲遣汝詣上通好何如公謝不能時有不内附者梗於路遂罷行復以公往昔拘所未幾王薨延祐七年弟怯别王立王召曰在昔先王嘗遣汝詣上前後不果汝今宜以素所具奏者以聞是年秋入朝上曰太祖造邦孔艱惟和好惇叙則宗支允寜汝其以元帥職名乗驛諭朕意王既受上旨拊膺謝曰疆宇寜敉自此始汝来何遲也對曰使副有疾在道故不得速進王曰束旨極善使他人来吾亦不若是深信大較使臣多擅増减致啟邊禍公曰拜住来途中聆逃人言且云復將有兵變拜住實不信懼王惑其言而行人之言不得信於上是為虗行王宜熟察善計慮拜住不敢他引古事為比維昔定宗皇帝征把秃王有滅國真薛禪使者諫罷征嘗喻太祖得國之本明配日月量侔江海合天地之大徳故能混一海宇滅國真薛禪死已乆拜住不才願踵其䇿以獻後王從公言奏於上訖如約以平王遂遣使收兵四境而少尼其行且曰邏者猝遇將害汝遂設宴三日給符信䕶行俾歸於朝至治元年三月抵上京入見於上而王亦遣使奏拜住兩為行人不愛其身隆爵厚職所不吝然除拜非吾所預為語朝廷大臣善奏於上使得享至樂建牙纛為諸侯表得矣是年冬丞相拜住入奏嘉禧殿具以功簿言迺拜中奉大夫浙東道宣慰使都元帥官既滿類集行事俾桷為奉使事實云前史官袁桷曰太祖皇帝經畫區夏以磐石宗犬牙於龍興絶域之地四履奠安盛矣夫疆域既廣詔旨上意傳諭失實則時致疑争拜住公間闗險阻百慴不撓義正功倍以數百語解百萬之師非精白一心曷底於是計勲上多卒稱其職俾後之為人臣者益有勸焉清容居士集卷三十四欽定四庫全書清容居士集卷三十五元表桷撰内制昭憲元聖皇后諡冊文徳合乾元母儀正而宸極立道㕘泰治王化基而國本寧靖思保佑之功宜慎欽崇之典有嚴祔禮爰重尊名欽惟太皇太后陛下淵静體仁齊莊秉度憂勤潛邸清謐治朝内教洽乎宫庭懿範著于海㝢實生二聖光於前聞用貽沖人纂兹丕緒方將樂怡愉以承至養率恭儉以挹太和痛鑾輿之莫旋儼珠衣之如在謹遣某官奉玉冊玉寳上尊謚曰昭憲元聖皇后伏惟靈承顯冊陟配宗祧錫羨家邦永延祚𦙍英宗皇帝諡冊文瑶圖纉緒神已御於鼎湖玉冊揚休禮宜陞於太室悼降年之不永儼立政以如新爰述徽猷以傳信史欽惟皇帝陛下文明天縱剛健日嚴辨奸邪於嗣位之初彤廷祇畏廣儀注於治朝之際清廟肅雝絶封敕以杜憸人申憲章以勵多士罰兹無赦令必惟行君臨三載而有成知周萬物而莫隠豈運逢艱否大命靡終然號謹追崇尊名是著謹遣某官奉玉冊玉寳上尊謚曰睿聖文孝皇帝廟號英宗伏惟炳靈有赫歆格無違祔于新宫以妥以宜皇后冊文皇帝若曰在昔正始之道必先内治于以奉承宗祧化成天下朕嗣大厯服祇循憲章宜資配助用彰位號咨爾皇后淑慎柔嘉遵道是行輔佐王邸謙抑自持實生元子國本斯建興龍舊鎮介于紹封粤若臨御之初賛畫計慮厥相維多正位中宫天神協祥今遣某官授爾玉冊寳章坤順承天人道攸則表正母儀萬方是觀惟躬儉節用則徽音是嗣惟求賢審官則私謁靡干匡朕徳格朕心實為有賴詩書所稱罔專美于前代噫敬厥初終有慶尚其念哉以膺爾景命特命右丞相詔帝王之職在論立相于以表正百司綱領庶績朕纂承丕緒勵精求治然而凙有所未洽政有所未舉豈委任之道有遺缺與今特命中書左丞相拜住為開府儀同三司上柱國録軍國重事中書右丞相監修國史一新機務使邪正異途海㝢乂康以復中統至元之治所有便民條畫具列于後云云於戯朝廷既正著端本澄源之功風俗斯醇廣摩義漸仁之化咨爾有衆體予至懷戒飭曲阜廟學詔郡縣廟學崇奉之制所從來尚矣乃者大臣言曲阜廟學創建聿新將嚴飭以風厲四方朕甚慕之惟夫子之道行于天下崇教立化實始於魯可不知其所自與有司其益加明潔屏遊觀嚴洒掃以稱創立之美敬而勿䙝神明之道也茍完以教夫子之訓也其盡心焉毋怠閤皁山萬夀崇真宫加大崇真萬夀宫詔朕慨慕希夷式瞻殊勝蜿蜒磅礴之所兹神必靈虚静恬淡之徒其用彌廣睠彼仙翁之化境曰惟江右之名區歴年滋多嗣教不墜形而下者謂之地兹實景山神而明之存乎人載加美號承天之大與國無疆試進士䇿問延祐五年三月六日進制曰盖聞昔之聖人垂衣裳以成無為之治稽於書傳任賢設教品節備具諄諄然命之矣是無為者始於有為也事久則弊唐虞之世歴年滋多不聞其有弊也治莫重於定國體尊國勢綱常之分嚴風俗之化一國體定矣善惡之類明賞罰之制宜國勢尊矣亷逺堂髙上下之辨也量才授官莫得踰越國之大柄也若是者其道何以臻此記曰禮樂刑政四達而不悖王道備矣夫禮以防民樂以和志刑以禁暴政以善俗四者何所先也夙夜浚明卿大夫之徳也知其邪慝則知所以儆之知其困窮則知所以振之為吏習常恬不知省其故何也繼體守文善論治者尤以為難朕承累聖之丕緒宵旰圖治罔敢暇豫於變時雍若有缺然者子大夫觀乎㑹通酌古今之宜毋迂言髙論以稱詳延之美朕將有攷焉試進士䇿問泰定元年三月六日進制曰朕聞自昔聖王之治天下罔不在初政故舜之嗣位也明目達聰命九官咨十有二牧禮樂刑政之道粲然備具禹成厥功祇承于帝精一執中實聖聖傳心之要湯黜夏命以克綏厥猷為本武王勝殷首訪于箕子天人之際明矣詩之訪落公劉書之無逸立政亦惟成王嗣服之始君臣交修以成繼志述事之業唐虞三代其揆一也維我世祖皇帝聖神啓運時則有同心同徳之彦效謀輸忠故能混一區宇治化旁洽朕祗承丕緒永惟帝王事功見於經傳悉遵而行之時有古今制宜損益若稽世祖之宏規逺略垂統萬世夙夜寅畏以圖治安然人才之列於庶位者猶若未及治道之達于庶政者猶若未備子大夫其以前王之坦然明白可行於今者何䇿世祖政典之綱領當今未盡舉行者何事宜悉心以對以輔朕惟新之治先農祝文仲春令月原陸勸耕祗率舊彞以陳明祀惟兹艱食稼政允修相其隂陽迄獲豐廡司嗇祝文春土方興曰耘曰耔聿修耕藉庸薦常事維神功協先農種斂是司除菑布祉以成善嵗太嵗祝文年熟於酉曷敢震驚僝功在初率循其舊爰立寢宇匪曰廣居尚克相成以祈寧謐后土祝文至哉坤元以静為主匠石踰年寧免震疊寢宇畢治庸復其初敢伸潔䖍克相終事五方帝祝文五行之用相須以成維神司之萬物以靈相彼土宇撓神實多引誠致祈勿譴勿訶立皇太子告太廟祝文列聖延洪纂嗣大厯國本聿嚴太后有訓親王大臣僉言允同曰嫡曰長兹惟主器將建冊命首告于宗廟西鎮祝文地道静專載物惟職震竦失恒咎徵莫測側身内修秉徳若惕慎其政刑爰别淑慝迺戒輔臣香冊昭格籲復故常以厎寧謐司天臺祭告祝文太陽煌煌大明浴光咸池丕冒八表出震見離揆時朱明中街御輪體乾以行庶物駢臻法兹照臨實予一人爰潔芬祀庸遂民因太嵗嵗行歸終福禄是惇四時秉權百神攸遵禮有報祈徳用兆民時將平分雨暘協宜綏此金穰物無癘疵太衝本命卯為春門品物彚滋受命自天集兹蕃禧聿嚴省方髙明謹持大徳曰生繄震是出順隂養陽罔敢暇逸肅迎元本多祜有秩勝光鶉火之宫司南秉陽時維長養品物用章繄月之恒儷日以光兹實命元受福無疆芳薦式陳莞簟錫祥金星金精呈輝配日後先遇伏斯晦厥用不偏清商助威晱晱導前爰庸預祈以相坤寧吉蠲匪瀆戩榖是膺火星執法麗天俯承太陽曰兹贏縮厥有故常飭徳省躬導迎景光陽居大夏翼翼靡違順執合躔徳馨是祈土星昭哉填星徳隆倭遲􅂱􅂱中黄百榖阜滋斟酌元氣導迎丕基照臨元命肅將以祈嘉薦苾芬留俞靡違氐宿蒼龍首東兹維宿殿界于夘辰靡有忒僭經緯或凌曰有成憲彼不順行曷敢適從䖍命宗祝監兹寅恭房宿巡狩事嚴百司靡寧率彼徒御興言宵征天星之精實為準繩凌伏愆常推䇿布程蘭席令芳祇迎展誠心宿布政于宫上稽明堂維兹日永法天以行五緯疾遲渾象森著謂數實然嗣服彌懼祝冊致詞式筵菲具尾宿析木天津燕都所次維昔初基相攸塗塈民用不頗益遐以治靈臺考占庸啓震悸善言維從式致芬祀迎神天佑丕基一誠肅將瞻仰昊穹紫微騰光龍虎森衛鸞凰鏗鏘降兹瑶壇八音開張碧雲紓徐肸蠁斯皇送神靈斿歆顧靡亟靡遲敬天之休億載維期三垣潤明五曜逶迤玉斗宣光瑶壇受釐憺兮如存脱兮若遺楠木殿上梁祝文揆時夏季惟土居中百堵皆作震疊是恐不日以成帝令攸式棟隆之初以底元吉崇真萬夀宫設醮齋文序推良月式符坤厚之光誠揭層霄䖍致泰元之祝竹官汛潔蘂笈宣揚伏願神御顧臨靈斿昭格玉衡齊政永綏有道之長寳籙延年誕啟無疆之夀三宫悦豫四海乂安青詞天佑丕基肇啟乾元之始令行吉月於昭坤徳之祥寅畏在初籲尊惟重伏願監觀有赫敷錫無疆懷徳維寧溥羣生而康乂以慈為寳遂億載之怡愉皇帝本命長春宫祈福齋文獻嵗肇春懋對亨嘉之序祈天永命式臨元本之辰矯首層霄延真殊館伏願祥開泰治道合乾剛綏萬邦而致豐年咸躋仁夀錫五福而建皇極迄底雍熙青詞陽和肇嵗宜與物以皆春元本建辰敢自天而申命籲尊為大祗翼若初伏願帝鑒不違神功溥運成四時之玉燭允協昇平展億載之瑶圖恪依覆燾昊天上帝青詞皇極建中密運生成之造𤣥穹垂象益嚴寅畏之誠禮謹祈禳功深保佑伏願靈斿下今景緯順躔發政施仁迓丕基之永固側身修行迎嗣嵗之嘉祥崇真萬夀宫設醮齋文嵗慎省方爰恪遵於祖訓秋嚴報禮庸祇奉於𤣥科演繹瓊章敷陳瑶席伏願靈斿昭假叶氣周流玉燭常調遂家給人足之願皇圖永固致兵寢刑措之風青詞嗣守丕基心靡違於寅畏導迎繁祉嵗恪謹於修崇維徳在秋自天申命伏願祥雲開瑞景曜宣光怡愉永康受介福于王母清寜無斁錫皇極於庶民皇太后為皇太子祈福設醮齋文大威不逺好生洽於民心帝訓孔昭受祉施于孫子誠深保佑禮盡禱祈伏願飇馭肅臨雲輿駢集鴻圖鞏謐允諧載物之功燕翼綿𢎞永保貽謀之吉青詞正位宅中恪守成於祖武承天順則庸徼福以孫謀矯首層霄傾誠璇極伏願玉衡齊政金篋賜齡重輪重暉誕保無疆之慶有嚴有翼永恢長治之規長春宫散壇青詞祈報聿嚴儼神光之下顧精誠允格荷帝命之密符茀禄攸宜際蟠均慶伏願嵗成玉燭政叶璣衡孔盖繽紛歸三千之寳所瑶壇馥郁拱百二之皇圖興聖宫上梁文旭日蒼龍聳帝京之積翠層霄彩鳳流阿閣之霏烟巍成少廣之居盛極東朝之禮欽惟殿下道師清浄性合儉慈色石補天法女媧之妙用瑶池錫宴符王母之長生穆如薫風之自南粲若衆星之拱北陛下孝嚴温凊敬謹膳羞謂神遊泰初當廣鬱儀之宇而養以天下益新長樂之宫庶民子來百堵皆作倚空繡柱峩峩太乙之揚旌鬬角雕檐奕奕飛亷之奏舞彩宇周遭於禁雉寳華流曳於驂鸞匠石繕完蓍龜告吉舉脩梁於地上川嶽無譁成巨構於域中雲霞得色敢伸善頌庸賛昌辰抛梁東天雞初唱日輪紅漢殿瓊巵稱萬夀堯階寳扇擁重瞳抛梁西三素雲扶鳳輦低閬苑碧桃聞已種廣寒靈藥不須攜抛梁南薫風殿閣聳眈眈一色花光濃似酒十分松露滴如藍抛梁北帝子天孫來侍側何須玉檢告昇平擬把瑶編増鏤刻抛梁上僊藥輕調承露掌龍圖載見賛無為魚夢維占歌有象抛梁下女史未須誇鄧馬聖徳重歌韓愈詩徽音願續周王雅伏願上梁之後坤元廣大鼎命延𢎞雲需湛露之恩徳廣陽春之澤松深柏茂三宫同億載之歡風散雨濡九有順四時之序與天齊夀率土歸仁皇太后寢殿上梁文璇宫擁翠刻姑射之層山柏寢通雲儼廣寒之寳所凝神清浄協徳順承皇太后養備東朝尊臨北極天純佑命握四時而品物亨地用安身御六氣而隂陽理寳典深調於玉燭珠星連緯於紫躔陛下禮謹家人孝行天下謂榮觀合老氏之要道而廣居乃亞聖之至言令月書春惠風司律瑶池湧地龜吐瑞以成形畫棟騰雲燕銜文而獻秀髣十二樓之縹緲開億萬載之怡愉工師肅給以無譁多士驩呼而稱慶脩梁舉地率土皆春敢集歌謡庸伸賛祝抛梁東髣髴神君下夀宫絳闕雲光催曉日翠簾花影颺春風抛梁西靈杵𤣥霜煉紫泥露下預知金掌濕參横坐見玉繩低抛梁南咫尺天居接蔚藍底用麻姑擘麟脯共看帝子引鸞驂抛梁北色石神功㕘太極物無疵癘樂豐年道合希夷超至徳抛梁上紫微鈎陳肅𤣥象五兵不試太平年三聖重光天下養抛梁下内宴傳歡慶朝野遊魚漸識栁邊舟飛鳥時随花外馬伏願上梁之後乾清坤謐月穆星俞擊壤而歌阜康結繩以復淳厚千萬年永清於四表九五福悉萃于三宫楠木殿上梁文天道不言而庶類亨式嚴居所聖人無為而天下治爰法當陽坐朝知問道之勤側席審思賢之念揆辰考室申令鳩工欽惟陛下守位建中施仁濟衆陋竹宫之侈靡羞桂館之虚無宣室受釐未遑鬼神之問石渠論奏是資經術之明掄楩楠以擬棟梁審律度以合規矩爰居爰處乃寢乃興歌庶民之子來形四方之風動虹梁歡舉龜墨告從敢述輿情庸伸善頌抛梁東一朶紅雲泰嶽峯絳闕翠旌浮曙色玉階星弁整朝容抛梁西王母傳宣曼夀齊漏下銅壺催密炬庭傳丹詔擁金泥抛梁南薰風殿閣静潭潭帝子承顔催鶴駕宗王侍宴擁龍驂抛梁北紫微熒煌儼宸極五兵奏凱一車書萬國來朝合圭璧抛梁上玉燭金穰契𤣥象陽剛深法泰元尊至孝力窮天下養抛梁下百榖芃芃滿原野淳風再使比羲黄雅樂重宣繼韶夏伏願上梁之後乾坤合徳日月順行髙拱穆清景化溥霑於八表茂迎穰簡嘉祥均被於三宫率土歸仁與天齊夀普慶寺後殿上梁文積翠凌空儼諸天之層構側金布地成四梵之妙縁惟我皇帝陛下味道圓明宅心清浄深植善本靈山之付囑未忘廣種福田寳所之莊嚴彌奐像設㕘前而山立威儀殿後以雲趨一一青蓮層層貝葉爰以棲神而凝睇亦云澄觀以集思成祗樹園作平等觀虹梁將舉龍象具瞻抛梁東瞿曇瑞世日輪紅一手指天呈實際九旬談妙演宗風抛梁西雪山深處鵲巢低白足赤髭随地見紺眉青眼倚巖棲抛梁南要看彌勒與同龕擎竹莫㕘朝九九拈鎚且問後三三抛梁北大地山河光的的平齊斗柄布王春深拱宵衣開夀域抛梁上堯仁如天髙蕩蕩八風不動太平年四時平分真實相抛梁下川后山君擁風馬赤麟白鴈奏郊丘瑞麥嘉禾徧原野伏願上梁之後後天不老景緯齊光玉檢七十二君同觀三脊金輪萬八千嵗共拂銖衣四海永清三宫均慶天慶寺佛殿上梁文寳構凌空稱華嚴之富貴青蓮湧地成祗樹之神通雪堂老禪心匠虚明性宗真浄住南城數十載名滿江湖祝北闕億萬年日嚴香火雖紺宇禪扄之已敞而璇題秘殿之未雄靈山之法㑹如新黼扆之綸音已下無踵而至不日以成繡甍結飛霞稱兩旬之龍象金波麗鳷鵲儼第一之人天爰舉脩梁敢陳口號抛梁東須彌初見日輪紅願上吾皇千萬夀銖衣拂石宴春風抛梁西一朶紅雲映日低不用親遊天竺國只今寳所總菩提抛梁南軒窻面面是瞿曇欲問拈花微笑意雪堂老子睡方酣抛梁北殿角罘罳如翠織鐘魚解作梵王音日把心香祝宸極抛梁上大雄之尊夀無量聖朝方是太平初白馬迎經踵三藏抛梁下禪板蒲團不須假側金布地擬諸天香鉢如雲坐長夏伏願上梁之後乾坤泰治日月恒新豐年調玉燭之和正法拱金湯之固兩宫萬夀四海一家天夀節致語洪範九五福曰夀允屬至人上古八千嵗為秋實名治世仰天門之蔥鬱審雲闕之青圜黄道日明式紀老人之次金莖露肅有開上聖之祥慶浹叢霄歡騰榖旦恭惟皇帝陛下穆清居位剛健體元雷在地中消羣隂於既長風行水上示景命於方來辟雍建崇化之規象魏布新民之法以食為本歸漕粟於中都所寳維賢郤貢琛於絶域方且端冕以聴古樂惡酒而好善言麴蘖相臣簫勺多士瞻鳳皇來儀之瑞歌鳬鷖守成之詩克叶禹謨丕光周道某等伎陳九奏曲合三呼蘭有秀菊有芳願敷宣於律吕月重輪星重曜行登載於歌謡遥望天威敢陳口號羲和御日上蓬瀛盛旦曈曈集夀星冠珮雲排朝帝闕笙鏞春響藹宸庭瑶池已獻蟠桃實玉殿初開五葉蓂要識吾皇清浄理長生瓊液養脩齡清容居士集卷三十五欽定四庫全書清容居士集卷三十六元袁桷撰外制翰林學士承㫖榮祿大夫知制誥兼修國史遥授平章政事閻復贈光祿大夫大司徒上柱國追封永國公諡文康聲音與政通辭莫先於風雅易簡而理得治實效於乾坤維昔先皇歴選羣彦一道徳以垂統嚴誥命以興文奉璋孔峩執簡有度攷諸遺老號稱名臣具官某學博而智周材新而意古山立揚休之儀表望重縉紳日光玉潔之詞華才工黼黻進揆臣而竪國是避政柄以守儒榮畫㫖尚方密勿深符於上意澄清外服咨諏慎考於民風人物蓍龜典章衡石遽告休而還里終辭徴以養年脱屣如歸逝川滋逺噫徳輿制詔早已重於人間居易詩文今果傳於身後載加褒䘏式克欽承可妻李氏贈永國夫人魯侯燕喜之歌褒其令美敬仲凰飛之卜後將蕃昌事不偶然理難固必具官某妻某氏韞玉養徳佩蘭襲芳規矩不出於㕔屏律吕永諧於琴瑟守大家之戒静慎而禮法自防誦季女之詩恪恭而祭祀有度命之不淑報也宜豐噫茅土並封亦既慰文儒之願𤣥堂同穴尚欽承人世之榮可翰林學士承㫖榮禄大夫知制誥兼修國史劉賡贈三代曽祖深贈昭文館大學士資徳大夫追封邢國公謚康穆加上䕶軍泰山之雲起膚寸而成雨黄鍾之律累銖黍以立均徳胚胎於前人凙膏沐於後嗣具官某曽祖某持身圭璧篤學巾箱清白儒科曩共誇於鄉黨丹青帝制今復見於階庭念昔干戈攘擾之艱唯汝詩書種植之懿既開公社載廣王勲噫天勝人人勝天事果成於昭代子有孫孫有子慶永萃於一門増秩便藩疏恩㝠漠可祖肅中書左三部尚書商議中書省事致仕贈推忠賛治功臣金紫光禄大夫大司徒追封邢國公諡文獻加贈上柱國乾坤清夷真主昇而四海一風雲際㑹英傑出而庶績凝篤生股肱之臣能總喉舌之職亶惟熙運爰立鴻勲具官某祖某學博而通方才長而守正讀易悟損益之理觀文㕘忠質之宜中嵗投閒卒起裴度於既老平居緩獄審知定國之將興廟堂咨國是於蓍龜朝野係民瞻於柱石家聲允似子承曳履之榮書種有傳孫擅掌綸之美用永厥世以等其功噫四世三公亦既推赫奕之懿一門萬石尚毋忘孝謹之思可祖母鄭氏贈邢國夫人王臣外勞動資邦媛冢婦中饋訓立閫儀具官某祖母某氏佐餕靖共持家澹素縑緗整比齊襟拱立於北堂錡釡潔蠲斂袵儼趨於南澗子先仕顯孫復文榮噫沃壤再疏足示龍光之赫奕芳猷未逺尚瞻象服之委蛇爰詔後人式共爾位可父慤中奉大夫䕶軍彭城郡公加榮禄大夫大司徒柱國封邢國公帝堯雍熙擊壤之民鼓腹漢文寛厚扶杖之叟厖眉念累聖之仁恩俾遺老之夀俊具官某父某脫棄軒冕徜徉里閭誦讀詩書邈矣師承之舊陟降籩豆僾然孺慕之思壯年幹蠱以裕如晚節撝謙而泰定言追古往耄及意新種樹養生黙合三槐之故事巾車訪俗有符五栁之曠懷亨嘉真磻水之師朝著仰商山之皓兒年希有世號少儔噫周公拜前益慎威儀之則韓侯受命毋忘傴僂之恭可母彭城郡太夫人李氏追封邢國夫人貴子而不及親施仁宜厚揚名以之為孝報徳是先禮有追崇恩推錫賚具官某母身同隠遯性一柔嘉蘋藻恪共於春秋絲麻力勤於夙夜執喪慟絶竟三日而始蘇佐餕懽違遽中年而長徃是生賢嗣爰顯清朝噫翠輅魚軒亦既極小君之寵蜜章鸞誥尚再疏下泉之恩可妻冀氏彭城郡夫人追贈邢國夫人月圓而魄虧理或可詰劒成而神化物莫能推念兹偕老之盟言詎意中道而淪世具官某妻秉芳蘭茝佩矩珩璜奉舅姑以無違處娣姒而彌䖍年之不淑生也有涯噫鄉國大邦追錫永光於窀穸泉臺佳氣周流宜見於焄蒿可妻廖氏封邢國夫人相夫之道静淑是師承祀之儀潔蠲惟謹故貴得以從其爵而教必先脩其身具官某妻執禮奉盈守徳珮玉事舅嚴雞鳴之問逮下審桃夭之宜噫小君實諸侯之妻惟謙抑可以長保鉅鹿乃邢子之國惟儉素足以久安毋替戒詞以厎終吉可集賢侍讀學士中奉大夫李倜贈祖父二代祖懋河東宣撫撿察使贈嘉議大夫吏部尚書上輕車都尉追封冀寧郡侯諡文惠乾坤轉旋臣擇君而審事風塵膠轕民徯后以求生匪資談辨之折衝曷得從容而完聚昔有俊士聞于當年具官某祖懋沈鷙決機秋毫析理不背時而棄利魯連感燕將之風能因危以為功陳康歸蕭王之智按堵復鄉閭之舊開田廣井邑之繁全逃民山寺之中沒猶有祀憐故帥孤城之守許以自新謂宜膴仕之軒飛迺獨急流而髙避菟裘嘯傲合難兄難弟之懽犢車雍容追某水某丘之勝才不大用徳遺後人噫維此冀方存憂深思逺之㫖嗟爾孫子篤尊祖貴始之誠賜履舊邦克昌𦙍嗣可祖母張氏贈冀寧郡夫人婦人内訓愈久則事莫可稽聖朝鴻恩雖逺而凙益加厚錫類者教民之本顯親者繼志之基具官某祖母張氏語簡而嚴心静而正斂容如玉家庭服其母儀飣坐如山鄉閭師其懿徳益昌爾後克厎于成噫貽厥子孫不負窀穸之願烝畀祖妣爰疏湯沐之封營魂有知寵光無斁可祖母某氏贈冀寧郡夫人孝治天下教必本於興仁惠及萬方禮莫嚴於尊祖爰念瀛洲之彦庸推下泉之恩具官某祖母某氏韞玉無瑕服蘭有度采藻行潦雝雝承祀之顔殷靁南山黽黽勸夫之義生子允才而不淑傳孫濟美而始昌噫一門同封聿廣聖朝之凙三晉故壤足為里社之榮垂世彌光終古奚憾可父昱成都路防城軍民總管贈集賢侍講學士追封冀寧郡公古澗長松宜棟梁而弗施於太室韞匵美玉器瑚璉而莫致於合宫維先朝宣力之臣皆一時成徳之彦才不究用沒猶可稱具官某父昱沈思而好文敏斷而濟事地生天施知民悦以阜通城髙池深審人和以環守蜀為望郡職號劇曹足食足兵流馬相迎於道上為物為變飛鳬疑度於雲中天不以年子由之貴噫三牲之養榮親弗逮於膝前兩谷之間錫土有光於身後式嚴嘉命爰慰九泉可母仇氏贈冀寧郡夫人曽參風木之悲深嗟于身後孟宗冬筍之養得遂於生前事為至難道無全美具官某母仇氏遵行儉素服習勤勞不見其夫之榮舜華隕露猶幸有子之似蘭茁承春肆衍褒嘉同疏追錫噫金葩錦橐益増𤣥宅之光丹轂文軒允過板輿之樂清朝展慶故里聚觀可母韓氏贈冀寧郡夫人孟軻五鼎之饋禮非有踰子路三釡之悲情何可既仕獲通貴者常有禄不逮養者何多具官某母韓氏家法儉勤母儀慈恵化治絲枲生兒承膴仕之傳恪共蘋蘩奉祀守吉蠲之度鬛封已拱口澤猶存肆推錫類之仁誕布昭天之渥噫黄河一曲千里兹實故鄉白雲孤飛太行有光前躅烝嘗不墜褒寵如新可妻許氏封冀寧郡夫人君子偕老之宜國風所詠家人中饋之吉易象攸存作則閫儀來嬪瀛彦具官某妻許氏有諧琴瑟相夫之道無違不出㕔屏教子之心彌切惟静以正既樂且康噫蟋蟀唐都合儉禮而民始化采蘋南澗循法度而祀迺修遵錫舊封祇承景命可集賢大學士榮禄大夫致仕李謙贈光禄大夫柱國追封魯國公謚文正祚衍皇圖上聖聿開其正統教興文治鴻儒允際於清朝四時周而寒暑成八音宣而律吕比道關運數天篤忠純具官某藻思夙新蜚聲壯著處身閭里蔚然黄流之在中䇿名搢紳􅂱矣錦衣之尚絅早賛青宫之善迄編金匱之書疏傳十漸之簡嚴志遂四休之安佚碑板肆夏辭累貫珠詩篇林泉語深挾纊故老倚之為衡石諸生仰之如蓍龜大帶幅巾儼君實之在洛秀眉明目侔康成之居鄉既得夀以保終宜易名而廣譽土荒東魯爵列上公噫孔門設科先徳行而後文學漢廷取士首孝弟而次賢良舉世實難唯卿無愧可妻孫氏追封魯國夫人夷攷儒學之彦允資賢淑之妻從游外方米帛不干其念慮敦叙同姓籩豆式謹其威儀古有其人今見于汝具官某妻某氏温恭秉度禮制飭躬相敬如賔皓首不墮其繩墨有嚴教子青燈猶課以詩書惟小君之封用加矧大賢之忠宜錄爰伸並命以慰九原噫鵲巢而鳩居之惜未配夫官之貴告往而知來者庶永為婦徳之規於昭營魂裒對天寵可禮部尚書中奉大夫元明善贈二代祖海贈嘉議大夫祕書監太卿上輕車都尉追封清河郡侯諡貞惠青桐孫枝之良雲和所植紫芝靈根之秀商山是宜隱顯之用有時報施之效不忒具官某祖某養真巖壑䇿名里閭試吏緩刑卒應髙門之語抱孫竒骨可勝執硯之悲器卓犖以不羣量汪洋而莫測李翺之傳皇祖文已四馳王通之述府君事關百世禮嚴教孝爵侈勸忠噫東壁圖書爾尚詔後人之似故鄉湯沐益毋忘昭代之恩可祖母髙氏追封清河郡夫人珠藏九淵神光燭而愈閟蘭生空谷幽香耿而自持通塞維時存殁奚憾具官某祖母髙氏慶源演迤淑則和平種桑而望繭絲亦云勞止樹桐而中琴瑟夫豈偶然錫類者治世之湛恩尊祖者孝孫之美志噫爵書故里永為枌社之榮稱曰小君益表松阡之觀可父貢奉議大夫驍騎尉大名縣子贈中奉大夫吏部尚書䕶軍追封清河郡公諡孝靖種徳如藝木必閲世而始昌保身若奉盈惟持善者無愧窮達有命幽明不渝具官某父某孝友篤躬質直守道簞食卒安於簿領籯金始羨於縑緗不假以年益豐其報孝能繼志鬱成南陽之阡文以顯親行擬瀧岡之表肆加錫爵復舉易名噫丹詔流恩天官實古之冢宰宸章分土甘陵維爾之舊邦尚其營魂歆此殊命可母弭氏大名縣太君贈清河郡夫人孟軻大儒深藉斷機之訓仲由至孝每懷列鼎之悲審閫範之可遵愍堂封之彌逺具官某母弭氏孝慈有度淑慎無違禮行於家蘋蘩循治沚之素教施於子斧藻為朝廷之光已錫鴻恩爰加再命噫九原可作鸞書啟鄉郡之尊八座並榮象服稱小君之號可妻李氏大名縣君封清河郡夫人鵲巢起家之因實原勤儉燕喜受祉之美斯為樂康報之厚者始必勞持之素者終不懈具官某妻李氏習熟女史幽閑内儀儼服筓珈執謙沖而彌下恪共籩豆盡蠲潔以無踰百祿是遒再命而傴噫相其君子益知典禮之寅稱曰夫人毋忘主饋之訓可光祿大夫湖廣等處行中書省左丞相阿力海涯追封太師郡王四懸設樂必假鏞鐘之洪音八柱承天斯合明堂之巨構乾坤啟運川嶽降靈是生非常之偉人以佐一統之真主沒且不朽徳猶可稱具官某勇略致身英姿盖世羊祜平吳之䇿誰復先之楊素渡江而來何其神也據荆州以為之根本擣長沙以披其腹心兵勢建瓴皇威震電先皇帝知人而善任定功以行封倬彼雲漢之章廷無儔匹享有金石之奏位班侯王兼將相之重權契君臣之嘉㑹令肅風生於細栁政成人指其甘棠念耆定爾功實有資於賛助而大賚於廟必申錫以褒崇彌深撫髀之思莫遂圖形之想白雲已往青史如新噫齊岱為鍔石城為鋒朕已悉皇王之大武黄河如帶泰山如礪卿允為邦國之元勲詔爾後人無替先徳可妻某氏贈國夫人鵲巢起家因以為召南之首殷靁勸義足以成大夫之行矧江漢之舊邦昭柱石之偉績必資内助以佐髙賢具官某妻某氏澹泊無華静專有守良玉在匵襲中美以善藏幽蘭生林愛國香而自閟禀北庭之渾厚婉南澗之恪共方考禮以報功爰推恩而錫類噫西平有子足彰閫範之光魯侯令妻宜受國封之侈是惟崇徳尚克歆榮可太尉平章政事某特授太子太傅朝廷大䇿慶莫盛於建儲社稷重臣禮尤嚴於敬故功㕘羽翼政倚股肱具官某秉志精忠宣猷惇實黄閣調元之始允屬謀謨青宫選士之初必先徳義惟左右前後之人正斯君臣父子之道彰噫日重輪月重光宜益資於輔導書同文車同軌期咸厎於昇平往堅乃心祗若予訓可遥授平章政事某特封秦國公亶惟龍飛之初考圖數貢爰篤鷹揚之舊崇徳報功出命告廷分封啟宇具官某蚤乗熙運躬受真才絶北威名允著長城之助居中韜略密宣前箸之籌肆予纂承委以輔弼噫干戈弓矢于以昭武功山川土田斯以彰異渥祗服明命益殫嘉猷可中書左丞某封贈三代曽祖某贈資善大夫中書右丞追封髙昌郡公諡康懿粤昔髙昌肇邦藏經史以崇儒師立校官以訓子弟所從來久矣故其聰明才知通於聲音文字之學代不乏人具官某曽祖某誦詩讀書漸仁摩義得於鄉里之素若雲在淵勃然以升蓄極而通至曽𤣥而始見疏封舊㝢以報流澤之無窮尚其享哉可曽祖母追封髙昌郡夫人諸侯之制立廟以五親服未盡是猶有待於後也今爾曽孫某勤勞王家錫之山川土田而汝與封推其自則由𤣥孫啓之先王之㫖逺矣具官某曽祖母某蓄徳不耀保躬益貞敷佑後人輔弼不懈曽孫之慶至于五世其昌矣今從夫爵尚承朕恩可祖某贈榮祿大夫平章政事追封齊國公諡莊靖赫赫在上永遵繩武之思子子為孫爰述尊祖之義發揚潛徳追錫愍章具官某祖某明珠媚淵良玉韞匵言寡尤行寡悔祿不願干折中矩周中規動無踰則養真於攘擾之際味道於沖漠之初本碩枝繁源深流逺噫稽尚父之返葬咸謂分封仰周公之拜前允宜淑後載嘉正直庸受寵綏可祖母追封齊國夫人蘭長空林羞當户以自獻珠生巨海懼媚川而深藏矧為隱約之時曷表殊絶之行婦徳永閟孫賢可推具官某祖母某孝敬行於家門肅雝傳於閭里念昔日艱難之際為善是持至歴年磅礴之多興宗有驗恩分沐邑賚廣脂田噫綺繡冰紈莫慰生前之願文軒象服足為身後之榮可父某贈銀青榮祿大夫大司徒追封齊國公諡恭惠大明麗天羣隂伏於蔀室寸雲出岫甘㴻徧於寰區崇徳報功之典存繼世象賢之制著惟勲是錄于禰有光具官某父某潛珍養名砥節礪行王明受福井渫不食非所憂父教為忠籝金之藏奚足羨事久斯定時至乃亨念爾嗣之𢎞文生聞孫而佐治蟬聨朝著磬折里閭維積善之粹精宜流澤之溥博詢于集議庸爾展恩噫泱泱大風知紹封而益茂謙謙終吉詔承徳以靡虧可母追封齊國夫人積行累功允賴夫人之配承先共祭載歌季女之賢剛柔之道有恒倫紀之位斯定具官某母某氏持守貞白衣被潔清子又生孫莫計堆床之笏善必有慶久髙容駟之門議勲以褒藎臣錫命而及賢配亶惟異數足稱營魂噫三服齊官是在昔女工之訓五鼎廟食亦庶㡬孝祀之芬旌寵有光歆承無斁可榮祿大夫宣政院使領延慶使某贈推誠佐理功臣太師開府儀同三司上柱國追封齊國公諡文忠式觀景運灼考藎臣際乾坤清夷之時承風雲亨嘉之㑹精忠儼在褒恤庸加具官某慎慤而行方沈潛而量厚踐揚禁近官一品以益謙陟降邃嚴閲五朝而彌著恕能及物亷以律身經文譯潤之功深開宗明義詩書服習之訓久教子象賢維時輔臣佐我初政塤篪雅奏圭璋令儀盖徳厚者世必昌勲著者爵宜峻誕開公府庸正師垣儼精爽以如生合神明而無愧噫保兹青社斯為胙土之崇封以紫泥益見宻章之重體兹申錫期爾永承可妻封齊國太夫人馭爵酬功錄先臣之大節疏恩並命成賢嫓之芳猷往莫追尋生宜悦豫具官某妻某秉心淵静制行霜嚴悃愊無華佐餕惟精于五飯温恭有恪執容儼稱於六珈是生絲綸之英復得鹽梅之佐入室每諮於慈訓揚庭爰著其母儀噫誦齊風雞鳴之詩則貞女宜封於東土歌魯侯燕喜之頌則夀母益介於長年裒對殊恩恭承令祉可資徳大夫同知宣政院事某贈存誠秉徳功臣太傅開府儀同三司上柱國追封齊國公諡忠穆帝室興隆君臣交孚而同徳王庭肅穆弟兄相繼以共為睠若昔之揚休越今兹而錫命輿言是採䘏典有加具官某植節秋霜持評水鏡侍元戎于漢上屢奏凱功奉大帝於禁中益㕘聖諦凜有不可犯之色充然無自滿之心阿閣鳳凰虞廷屈軼績既昭於簡册望宜冠於巖廊噫舉賢上功爾猶存太公之生氣慎終追逺卿勿忘人主之殊恩尚其㝠魂享此休寵可妻追封齊國夫人王言惟作命揚于庭者為報功内訓不出門宜其家者為合徳有嘉賢嫓宜盡褒封具官某妻某秉徳芝蘭奉身玉雪逺行江漢之域勸義不違深居房闥之中服勤無斁考圖定地錫命縯綸噫取妻必齊盖有資於大國從夫之爵今已謂之小君昭于幽扃歆我異渥可監察御史沙某封贈祖父母祖某嘉議大夫行工部事專一修築宫城勾當今贈太傅開府儀同三司上柱國追封某國公諡武敏式考皇猷承命以永新邑爰立民極相宅以營成周輪奐彰施髙深鞏固言念梓材之彦興懷棫樸之官具官某祖父某氣壹而静專智圓而肅給順隂陽伐材木構寳殿以如規議逺邇程土功儼金城之有截通四方而罔缺傳衆力以聿成典制百工論道時趨於清切辨䕶少府使民每減其冗煩紫闈深教以手書墨詔屢傳於宸㫖亶惟際遇允協隆平覩設施而舊跡愈彰思典刑而老臣彌重誕開公爵復廣社封噫召公之誥簡明命庶丕作蕭相之謀宏逺俾後無加追命煥章營魂昭慰可祖母某氏追封某國夫人女教勤閨門夫獲修於六府皇恩治寰宇死得慰於九原睠惟藎臣成于良媛具官某祖母某韞玉制行範金作程化治絲麻宛昔日稽功之效潔清蘋藻儼承先盡職之能用施孝孫亦克王事方褒忠以大賚爰追命以並封噫蜜印昭天益侈桓楹之表脂田廣國式崇柏板之嚴茂對有光靈承無斁可茶迭兒局使沙正議贈父母父某正議大夫遥授工部尚書管領茶迭兒局人匠總管漢官密勿之邃首重細旃周廷朝㑹之嚴用資隂羽省方維嵗考古若今具官某父某才敏而通時慮深而應變春秋蹕道環徼廬虎士以無譁風雨屬車望帳殿翠華而有煥犄如鹿角整若魚麗曉籌争奮以啟行夕頓悉安其成列舊規儼在故老能言爰開大國之封式體先朝之任噫相王入大次禮猶想於肅雝論道惟三公恩豈殊於㝠漠詔爾後嗣祗予至懷可嫡母世官嗣業古罕其人工師致功今慎其職具官某母某肅著令徳恪嬪大家上承尊章察素絲五紽之儉下訓子婦審狐腋千金之難爰俾象賢式克紹後噫翟笰崇貴已享偕老之時密章廣恩足慰厚夜之望子能謙謹汝預寵光可生母佐中饋之職必假婉柔成繼世之賢實資訓飭泉遇蹇而利見水積小而始升具官某生母某勤勞夫門光寵盛代象服之貴宗婦攸同鸞誥之榮郷人所羨爰相𦙍嗣益慎忠嘉可資徳大夫紹慶珍州南平治邊宣慰使播州安撫使侍衛親軍都指揮使上䕶軍楊漢英贈推忠效順功臣銀青榮祿大夫平章政事柱國封播國公諡忠宣繼世立諸侯審象賢之有託推恩保四海在追逺以彌加有懷藎臣庸厚恤典具官某著徳遐域效誠先朝聰敏得於襁褓之初發于天性稚弱置於扈從之側斷自宸衷用能絶黨殊鄰投戈納欵尺天寸地負版奉圖先國後已之慮深尊主庇民之績著闡學傚文翁之化好賢師鄭武之風雅量鎮浮方櫜弓而箙矢澄懷味道時緩帶以輕裘出門興折軸之悲行壘應流星之兆何以勸善必也正名循故壤以加勲衍圭田而封土青綬崇副相之貴衮衣嚴辨章之稱噫忠孝傳家于以顯昭事厥辟之實殁存錫命所宜推圖任舊人之終精爽有知欽承無斁可妻田氏遵義郡夫人加播國太夫人婦人中饋歌采蘋則謹其承先大夫逺行誦殷靁則審其勸義禮有準則行無過踰具官某妻田氏嬪髙門之勲庸受外氏之經籍曹大家之女誡奉上克謙衛夫人之僊書教兒能學念王事靡盬之際知女子有行之宜夙夜傳恭寒暑循度噫從夫以貴今已位於小君勉子惟忠益有光於先正茂膺異渥式介長年可開府儀同三司上柱國錄軍國重事中書右丞相監修國史拜住贈清忠一徳佐運功臣太師開府儀同三司追封東平王謚忠獻八柱承天棟撓萌於巨構六飛御日輻説見於中街愍死難以成仁攷生榮而錫命具官某鼎彛王社閥閲相門自結主知應雲龍之異遇獨持國是炳蓍蔡之先㡬陳於上者不足言見於事者為可則斥聚斂之臣以靖四表誅黷貨之徒以正庶官庫無餘財抜葵之訓靡替門絶私謁懸衡之鑒益公天下望其治平朝廷以之模楷然盡言招過憸謀愈深選賢與能奸黨滋懼變成肘腋禍延股肱川嶽動摇日月昏翳雖元兇正罰足明朕心在壹惠易名姑慰卿意分茅故壤増爵維垣噫未眀入朝竟墮長魚之計盛服假寐孰為鉏慶之賢念此䀌傷恩斯優渥可妻某氏封東平王夫人星坼中台輔弼之虧果應舟藏半夜伉儷之情曷勝死者易名生焉從爵具官某妻某氏素系相閥克嬪王門纂組之功弗訓以習祭祀之謹於禮無違偕老之志莫酬並封之恩宜厚爰增湯沐庸縯絲綸噫司徒之妻問齊君以予邑蹶父之子樂韓土以相攸宣飭諸孤以保終譽可大中大夫内史府司馬狄琮贈榮祿大夫中書平章政事柱國追封冀國公諡貞毅山西諸將之英沈雄有自斗南一人之裔正直是傳爰産魁梧之賢以贊藩輔之政具官某少植竒節壯懷孤忠朱邸掄思引經説以開導細旃密勿詢治道以彌縫挺然廊廟之姿鬱有江海之量才見於用知無不言邊陲以之敉寧帷幄以之康濟朕纂嗣大歴圖任舊人方審象以博詢慨撫髀而莫覩興宗有似兹為柏臺之羽儀追逺彌加庸進槐階之品秩噫吕望老而賜履實文王之故臣丙吉生而受封迺悼考之遺徳事莫能偶恩宜有加可妻張氏贈冀國夫人逺行從政閔勤勞者著壼儀修身踐言循法度者執婦道允矣温恭之媛疏其赫奕之封具官某妻張氏謙以自持儉而有守酒食是議春秋之祭無違狐狸為裘風雪之需悉備既嘗艱阻莫遂恩榮噫兼謩入臺紹祖之傳彌振僧孺清道思母之念益深尚其營魂承爾嘉命可妻劉氏贈冀國夫人展如邦媛典刑傳於大門咺兮國英謨謀見於藩邸天相其配恩與之俱具官某妻劉氏珩璜母儀纂組女訓如璞韞石審玉人之琢磨若鳩在桑信君子之均一嗣為烏府之摸楷母増魚軒之寵榮噫繼世象賢于以錄先臣之舊慎終追逺庶㡬彰盛世之光綸誥下頒營魂祗服可清容居士集卷三十六欽定四庫全書清容居士集卷三十七元袁桷撰外制太傅右丞相伯顔贈太師開府儀同三司推誠翊運功臣淮陽郡王諡忠武乾坤呈符搆風雲之嘉㑹山川毓秀挺柱石之英賢夙奉宸猷丕揚帝訓惟不嗜殺人者能得天下而可與事君者實非鄙夫睠我元勲膺時碩望合太平之寰宇成一統之輿圖生為名臣殁有公論太傅右丞相伯顔機沈而識逺量重而器宏十乗啟行共服征南之妙算七騶咸駕黙傳濟北之遺編誓衆於鼔角之初過師於枕席之上具宣徳意誕廣仁聲簞食壺漿之迎咸知已後觴酒豆肉之賜士向無前是謂制勝而屈人兵抑亦好生以全天道丞相之功第一智士之譽無雙方謙牧以學卑愈䝉養而用晦角巾私第恂恂似不能言雞翹屬車斷斷猗無他技肆予纉服躬任受遺功成莫居年運而往格于皇天者有儀可象游於造物者不見而彰師尚父之崇名貞惠文之美諡益疏王爵庸示國恩噫彛器景鐘足銘邦家之偉績蜜章襚典斯昭泉壤之幽光尚其眀靈歆此殊命可平章政事亷希憲母某氏贈某國夫人温璞出於𤣥圃貞松産於徂徠良由地氣之完以合天和之藴故平章政事亷希憲母某氏柔嘉維則淑慎其思采蘋采藻之恪恭為絺為綌之素儉奉尊章於壯嵗樂其天全率娣姒之諸郎視為已出齊家以禮教嗣以忠用能為先朝社稷之臣啟奕葉簪纓之慶雖爵從夫貴莫得而加然義以子賢當崇其本益開湯沐之侈庸增窀穸之光是為異恩以旌舊徳可忽答的迷失公主追贈某國大長公主維王展親之道實先於惇叙粤昔慎終之典尤謹於追崇矧予同氣之賢是惟長主之貴廣疏異數庸寓至懷忽答的迷失公主玉海澄輝金枝毓秀充然婦徳成肅雝以為穠李之華相其夫家閔勤勞而勸殷靁之義婉順諧於日就儉慈出於天然美王姬下諸侯固異公宫之制問我姑及伯姊益深先朝之思胡不百年以永終譽肺腑之託云在手足之念彌鍾圭籥荐更湯沐儼舊爰開名國下慰營魂噫立愛惟親曷愧死生之初志以義度徳莫窮脩短之大原沒而有知服之無斁可宗正府寳哥贈祖父母祖某特贈推誠保運翊亮功臣開府儀同三司太尉上柱國追封恒山郡王諡忠靖風雲初際允資佐命之賢嵗月既徂庸厚報功之典亶惟平治爰錫褒嘉具官某祖某貫日精忠凌雲節槩載櫜弓矢翊龍徳於初潛以為股肱展鷹揚而無敵噫孝文拊髀豈惟思古之名臣顯宗圖形實欲方今於前世九原可作千載如新可祖母追封恒山郡王夫人慎終追逺本先王之至仁崇徳報功傳有國之令典具官某祖母某氏從夫早貴訓子克賢如山如河之儀容宜室宜家之愷悌肇封大國儼焉象服之新益慰九原歆此蜜章之寵可㕘知政事賈某贈官朕丕承大業逺究前圖肇邦九有之初紀綱備舉同徳一心之彦賛畫允資慨年運之云徂儼風猷而如昔具官某經術展緒孝亷起家侍㡬微於帷幄之中保身彌謹識變通於衡石之外得士尤多故一時出令之坦明皆先帝欲言之㫖意器能容物清不近名暨更南國之旬宣咸謂中朝之倚任方堅退佚益避權姦活千人有封考於爾嗣徳百世而祀論迺至公爰褒賢以勸功復易名而疏爵噫方叔壯猶之雅雖已美於盛時韋丹遺愛之碑實有俟於今日皦如精爽綏我寵光可淮西道宣慰使劉復亨妻趙氏贈某國夫人圖任舊人式表世臣之重烝畀祖妣用昭孝孫之賢維徳厚者慶益長而爵貴者報必逺具官劉無隱祖母趙氏鐘鼎望族山河令儀使節春行從子從夫之樂備女箴夜誦為母為婦之道全頌臺之彦有嘉漏泉之恩彌廣髙堂素象音容猶想於含飴故里佳城湯沐儼疏於刻蜜湛然精爽歆此褒崇可荆湖北道宣慰使劉澤妻孫氏贈某國夫人孝治聿嚴誕布蓼蕭之澤聖謨丕顯遐思屈軼之賢念服瘁於外藩允資成于内助恩昭並命光慰九泉具官劉無隱母孫氏里族髙華閫儀淑慎閉户而行盥饋曲盡婦儀暎雪以課詩書咸稱母訓桮棬之飲猶在茵鼎之養莫加位正小君已備沼蘩之徳爵崇大國益攄風木之思可㕘知政事趙世延贈曽祖母某氏雲中郡夫人積徳在於百年實資内訓褒封及其三世亶謂異恩勤勞藎臣服習先矩具官趙世延曽祖母某氏幽蘭雅度喬木舊傳殷靁雖閔其勤克彰忠節采蘩不失其職允佐肅雝膏之沃者根必深種之豐者穡益厚顯于西土咸曰大家維爾曽孫益彰有慶於戯秩秩先廟崇松楹柏板之儀翼翼小君承錦誥金花之寵奉先追孝錫類興仁可平章政事董某封贈三代九道曽祖昕贈光祿大夫司徒趙國公諡宣懿大裘無文可饗于帝良玉韞璞孰窺其珍灼知遺逸之民邁種渾圓之徳克昌厥後不在其身具官董某曽祖具官某畎畝怡愉里閭退讓開田種术深期蔽日之輪囷如山出雲莫測為霖之變化子能擇主孫亦象賢一門萬石之家聲四世三公之譜牒噫慎終追逺分茅宣曽矩之光崇徳報功推本協孫枝之願亶惟異渥寵爾營魂可曽祖母李氏追封趙國夫人岷山之源若甕而達于海至日之影如線而麗乎天信知明道不可以計功要在積微因之而成著具官董某曽祖母李氏槃阿共隱饁畝如賔惟耽積善之勤厥享降祥之騐百年未逺五世其昌噫象服表儀亦既慰賢勞之願蜜章刻篆斯有昭孝治之隆可祖俊贈翊運效節功臣太傅開府儀同三司上柱國追封夀國公諡忠烈加贈推恩翊運效節功臣依前太傅開府儀同三司上柱國改封趙國公諡忠烈駿命握乾誕啟中天之運豹韜宣武協成上國之光念風雲之㑹匪常而日月之流如駛爰新景命以慰故臣具官董某祖具官某被褐潛修棄書學敵戎馬驅攘之未定志已出塵雲龍㑹合之有開獨能就日察敵保臨淵之智挽彊夸貫札之精釋兵為農所活者衆延師教子其訓益深馬革裹屍深可憫生前之語虎頭食肉終有期身後之榮惟徳之厚者嗣必昌而功之著者禮必報肆朕嗣服念爾疇庸爰廣重封以彰異數噫修祖廟陳宗器在于君臣之交修光王室迓天休惟爾子孫之無斁精爽不昧寵渥其承可祖母李氏特贈夀國夫人改贈趙國夫人殷靁勸義於昭嫓徳之賢柏舟作詩爰表自防之志雖内教止傳於閨闥而懿範備著於鄉閭具官某祖母李氏淑慎持家嚴勤訓子斥簪珥以奉賢師之饌化絲枲以助先祭之供衡宇周旋人不識其面目闔門款洽族猶想其儀刑雖雙鯉之養弗居而八龍之譽罔替允惟賢母有光前聞兹予溥澤於世臣庸汝啟封於大國噫先正昭事已克光竹帛之傳夫人起家式歆承絲綸之訓用昭後嗣永肩一心可父文炳特賜贈諡金紫光祿大夫平章政事忠獻公加贈宣忠佐運開濟功臣太尉開府儀同三司上柱國追封趙國公仍諡忠獻君臣相資莫喻同心之美忠孝兩立斯為佐命之殊念汗簡曷能紀其勲而朝著猶足以優其禮維祖有訓非朕敢私具官董某父具官某沈毅而善謀明恕而敦本黒頭試邑棄官羞墨綬之卑赤脚從軍絶食望翠華之幸刑輕典以安反側釋降人以靖流離白日揮戈睥睨益張其羽翼長風破浪艨􅀈竟擣其腹心命在養民市不易肆取麥禾以陋鄭人之過收圖書以成蕭相之功嶺嶠宣威南人不復反矣朔方請使周公方且膺之恂恂持儒者之風諤諤挺大臣之節靖念丕圖之建彌深喬木之思格于皇天雖儼若帝庭之陟降渙其大號必有加𤣥宅之褒崇錫以嘉名胙之大國掌武襲建牙之舊開司増立㦸之榮九原如生終古永譽噫英才間出足為邦家之立基盛徳無瑕成爾子孫之逢吉載加殊命以賁營魂可母趙氏追封趙國夫人鵲巢推夫人之徳於配實難碩人歌衛侯之妻其賢可想具官某母趙氏秉心淑静主饋柔嘉建事皇姑克奉甘㫖於左右一視諸子莫窺憎愛之後先每傳家訓之忠勞遂致孤兒之死事噫開脂田而獲上國夐謂無儔被象服以從先塋幸哉有子可繼母某氏追封趙國夫人國族世貴鮮執禮以下人王臣功髙適合符而嫓徳具官某繼母某氏敦厚天性静專内儀瞻彼南山深得勸夫之義遵于行潦不失奉祀之恭有子忠賢為我宰輔噫推恩三世庸疏湯沐之封錫類九原益廣蓼蕭之澤可繼母王氏追封趙國夫人嶰谷之竹應律而氣自鳴十洲之膠續絃而竒乃見不有佐餕曷能相夫具官某繼母王氏組織婦工齋莊母道嵗時盥饋立蘭玉以無譁春秋烝嘗潔牲醪而有度嗣子極中書之貴一門疏大國之封噫生也有涯莫稱魚軒之樂死如可作尚歆鸞誥之榮可所生母樊氏追封趙國夫人綵衣之養莫罄其私心板輿之歡遂以為美事念風木之永感惜春草之寸暉具官董某所生母樊氏禮以母稱義由子貴勞謙終吉竟莫觀垂魚擁笏之榮一視同仁乃預享刻蜜演綸之寵允惟盛事服我異恩可集賢大學士張晏贈二代四道曽祖宇贈保節功臣銀青榮祿大夫大司徒追封魏國公諡文愍韋孟明經諸孫之傳始貴袁安卜葬三士之言若符膏之沃者日以光徳之厚者世益逺具官某曽祖某進修家塾退静鄉閭乾坤轉機徯后服先知之算干戈效勇舉宗成全殁之悲命也在天幸哉有子噫忠孝一門之盛事百世可知節義千古之大閑九原不作聿申景命庸建上公可曽祖母常氏追封魏國夫人盛徳之報若券取償内訓之施如玉韞璞聿行尊祖之禮益知起家之難具官某曽祖母常氏澹静無華儉勤有素清晨佐餕奉羔韭之肥甘晚嵗謀生治蠶麻之靡密積善有慶沒世不忘噫魯孝孫之詩宜告成于先廟魏大名之國爰錫命於九原服我鴻恩亶惟異數可祖英贈純徳秉義功臣太保儀同三司柱國追封魏國公諡簡懿幽蘭空林抱孤芬而永閟長松古澗垂巨䕃以自完明其道者不計功非其身者必在子具官張晏祖英徳若不足樂且有儀遇真主之龍興出關而俟喜佳兒之豹變潛邸以從居官恥商榷之謀接物多任俠之義念干戈首難彌深丘壟之思歸鄉里自娛益廣子孫之澤考其篤素允謂安行噫于公之門少髙兹言已驗畢萬之後必大今食其封爰詔後人益光前業可祖母劉氏追封魏國夫人徳盛起家允著夫人之懿時危秉志有髙列女之風盖在昔以為榮至于今而彌顯具官某祖母劉氏澡身蘭服耽耳椿齡重闈期冢婦之興宗一札勸孤兒之入侍忍乃有濟鑄金符緘口之銘安不忘危考室遜飛翬之制勗徳若是生賢可知噫徂賚孝孫已極登瀛之貴逮事王母益疏分國之恩幽泉有知純嘏無斁可資徳大夫江南諸道行御史臺中丞于璋贈推誠肅政功臣光祿大夫平章政事上柱國追封薊國公諡文簡善人天地之紀徳莫有加君子邦家之基沒猶不朽睠懷遺直追錫殊封具官于璋志藴忠貞運逢熙洽慶雲甘露氣和而動植自宜威鳳祥麟瑞應而猛鷙咸伏華要屢更於中外靖共彌保其始終緇衣不渝素絲靡替念在昔菁莪之彦皆先朝棫樸之功年運既徂風猷彌逺噫劉寛長厚允宜居鼎鼐之官胡廣中庸謂當久臺閣之任事乖往古恩浹九原咨爾營魂服我休命可妻某氏追封薊國夫人慎終追逺先王惇俗之盛心崇徳報功治朝馭臣之大勸恩褒臺彦澤及閫儀具官某妻某氏静淑自修柔嘉彌謹珩璜有節動常法於女箴圖史自娛身不逾於内則傷哉無子貴也從夫脂田廣大國之封蜜印慰九亰之望噫瑶琴别鵠早已棄於人間寳劒化龍竟相從於泉下尚期㝠漠歆此寵光可茅山第一峯大茅君特加封東嶽上卿司命太𤣥妙道沖虚聖祐真應真君静慕𤣥風灼觀往事無為曰道必刻意繕性而始成修身乃真非積行累功而莫就大茅君竒操矯俗精思集虚壹徳齋心受龜臺西華之祕㫖萬靈受職開金陵句曲之宗壇丹光千載以如新寳氣三峯而彌固發祥肇祉民到於今稱之逆雨寧風天之所助順也亶惟作聖允合祐神孔盖翠旌祀莫嚴于司命瓊文蘂簡禮爰謹於秩宗假兹聰明佐予平治可茅山第二峯二茅君特加封定籙右禁至道沖静徳祐妙應真君合人心理萬物禮宜順於鬼神建皇極錫庶民徵有稽於暘雨大江以東之地句曲維望而尊土樂昇平嵗稱稔足二茅君中峯司命西華鍊形作牧審煩擾之非修真得恬淡之要驂鸞導從塤篪儼奏於雲中化鶴來歸城郭時看於華表朕方推仁以濟衆靈宜妙物以祐民學道受之以神端有宗於李耳望祀不祈其福誠慕深於漢文嘉與函生誕敷景命可茅山第三峯三茅君特加封三官保命微妙沖慧仁祐神應真君氣化為神握隂陽而執要物來能應遇水旱以成功兹山之靈以氏為號三茅君不導引而夀體素純為真密從蒼龍承左右而無間時乗白鵠侍伯仲以逺遊荷天降休為民請命逍遙容與服光景以如新周流徜徉蒙祉福而無極肆加褒錫丕應隆平埋鼎髙峯爰慕軒轅之有道獻金空谷方薄光武而不為以赫厥靈同歸于治可吳全節特進上卿𤣥教大宗師運開至治法簡易以合泰元教審宗傳隆繼承以明正嗣用揚渙號誕聳具瞻具官某孝友中乎準繩詞華鏗乎金石居無思行無慮粹然令名禮為翼知為時協於王度陟降紫宸而匪懈賛襄琳館而益謙藏珠在淵雲五色而川媚納息于踵風八景以星從維列聖嚴珪幣之薦以格天而迺祖受劍印之錫而展世四十餘年專帝顧卑已行權三千之徒首汝賢小心盡瘁俾超華貫爰倣舊階侍清祠以表羣公度玉墀而膺六命祇若具訓允為異恩噫奏隂陽之和以祝釐則諸福可以畢至通神明之徳以事上則庶績底於咸熙守慈儉以佐無為遵希夷而賛有道式觀素履庸佩綸言可三十七代仙姑馮淑真特封靖明貞素夫人紹𤣥風而展世丕闡帝猷溥内則以疏恩勉從人爵仙姑馮氏簪纓素緒鞶悦芳儀嫓穀城之傳益師清浄守柏舟之操彌固堅貞受祉惟深錫名斯侈雲龍風虎之慶㑹亶謂有光舞鳳迴鸞之制書懋承無斁可昭應宫提㸃王氏金蓮特贈淵静𤣥素真人寂然不動知來去之有因湛焉長存宜死生之無間辭風雲之際㑹竟糠粃於世塵爰加異恩以彰殊遇昭應宫提㸃住持王氏金蓮早塵椒掖晚謝蘂宫修崇密契於九重錫賚屢承於三接浄如止水斯為至道之宗脱若太虚實本重𤣥之體尚歆嘉號庸表將來可長春宫提㸃常某授𤣥門演道大宗師掌教真人管領諸路道教所商議集賢院道教事治國以無為惟宗式符要道順物迺自然之理允謂至言長春宫提㸃常某槖籥重𤣥蓍龜萬變氣超渾沌灼知天地之根運際昇平黙賛隂陽之化方獨立以不改彌大盈而若沖爰紹真風以彰人望噫内觀形影斯泉石之素心外飭身名實朝廷之異渥保兹清浄俾以闡揚可昭瑞宫提㸃張惟一特授全徳靖明𢎞道真人太一宫提㸃神以知來至教匪存於象設人惟求舊褒封首錫於龍飛念扈蹕之宣勤黙儲祥而介福坤元具訓渙號揚綸昭瑞宫提㸃張惟一泉石古心冰霜雅操侍晨長樂澹焉若樸而妙感彰澄觀穆清廓乎不驚而衆虚集惟才全者徳不競而正靖者明愈昭闡道王庭葆真沖館噫有國之母以長久爾尚謹於祝釐立天之道曰隂陽當益思於觀復恭承嘉命助賛無為可廣誠靈妙演法真人江南諸路女冠諸宫觀都提㸃邵靈瑞特追封宗師二儀之生根於太極萬物之母始於有名推剛柔迭用之原悟坤乾交泰之理兹焉觀妙足以表微具官邵靈瑞野鶴孤標金芝内行亶麻姑之清淑允謂地靈慕南岳之沖虚聿工草聖通章帝闕備問宫闈􅂱矣龍光守大盈而自牧端然蟬蜕享上夀而弗居道氣常新仙風不墜噫女偊朝徹已傳宗師之篇帝堯時雍爰有化人之國錫兹美號昭我鴻恩可沖靖靈妙凝真法師𤣥元萬夀宫提㸃盧行益襲封真人道要易為功必假相傳之祕名盛難與繼益求自治之方矧兹女冠之慎修爰出朕綍以示勸具官盧行益沖澹若璞謹飭自繩侍蘂珠之宫宣琳琅而不瀆守萼緑之訓視金玉以如遺惟清浄者𤣥學之宗惟簡素者師資之本斯焉無忝足以有承噫誦赤松中誠之經卑退為徳考南岳内傳之㫖齋戒是先可五雷宗師沖靖先生留用光特加封五雷宗師沖靖至徳昭應真人天地交泰而雷出奮風霆流形而物露生神行兩間因體而始有用數合五位由柔而後成剛迺知變動之機不出隂陽之妙五雷宗師留用光㕘合太始摩盪無垠學道從師罹厄窮而不悔救災禦患卒韜斂以如遺詢諸長老之言考以輿圖之載損之又損承禎之語若符生而不生介象之歸非異運隆累洽道慕重𤣥思其人如欲見之宜加綸誥告諸往而知來者益勵羽流可通妙葆真先生髙士易如剛特加封通妙葆真文教真人式觀修真之徒多出好古之士伯陽柱下習典禮而道成𢎞景山中博載籍而書備髙士易如剛學通羣藝妙集衆虚師清浄以避堂可謂簡矣問鬼神而前席殆將近之韋編之繼絶孰傳洞章之補亡猶在無文不立松風恍其步虚與時偕行草露晞而羽化方企崇𤣥之館爰思列仙之居本無名而有名庸彰往古效先覺者後覺庶勸將來可臨江路閤皂山萬夀崇真宫住持四十六代傳籙嗣教宗師楊伯晉陞加太𤣥崇徳翊教真人性出於無始存存為成性之門道合於有為生生迺得道之奥式觀載籍爰有至人吐故納新以調其神齋心服形以制其炁于以濟衆因兹延齡具官楊伯晉守樸丹丘潛珍琳館吐息以踵陋熊經鳥申之迂藏珠于淵握龍變虎騰之要開九籥之祕記傳八景之𤣥文問年今見其復丁㑹月密推其納甲天台之召司馬損數術以理身羅浮之迎軒轅徹聲色而合徳朕悉兹理卿無復言聿加綍命之殊以重羽流之選噫居安易之序所當明天地之根修身徳乃真宜益究坎離之用贊敷皇極懋協鴻禧可毛穎達封真人主祭丁甲神道萬物之奥非虚不能以通微誠百行之源惟静斯足以制動聿求佐理爰慕希夷兹得有恒之人以賛無為之化崇真宫提㸃毛穎達澄心止水植節貞松禮為翼知為時澹然無競巧若拙辯若訥休乎有容藏名琳館之珍養粹𤣥門之望維昔世祖動遵軒轅占瑶光以探五行之精通紫煙以嚴六子之用山林肅潔星斗爛眀苟非其人靈弗顧矣不懈于位爾其勉之庸加綸誥之隆以示真卿之貴噫乾元天下治也浚明用變之功神物聖人則之敬謹祝釐之效有嘉恬靖永保恪恭可清容居士集卷三十七欽定四庫全書清容居士集卷三十八元袁桷撰表牋附進五朝實錄表皇祖有訓聿成四繫之書大歴無疆允纉五朝之治夙陳載筆上徹凝旒欽以邦啟治平運符熙洽禮樂刑政教化之具炳若丹青典謨訓誥誓命之文昭如日月維累聖繼承之述作實皇家混一之謀猷官謹具寮書嚴信史雖編摩之匪一幸聞見之悉同欽惟陛下祇奉鴻圖光膺龍御惟天佑于一徳咸曰湯孫受命丕若歴年悉循堯道仁宣孝治學廣文明臣某等職忝汗青官慙尸素帝王之制可舉今已萃於鉅編詩書所稱何加願有光於億載賀冊皇太子表黼扆當陽首重升儲之建彤庭叶吉誕承鏤冊之頒宗社以貞幅員胥賀中賀竊以天下之本在國在家皇極之言是彛是訓然知子莫若父故立嫡必以賢二美斯完羣情允屬信為非常之慶實開太平之基欽惟陛下駿命溥將燕謀敷遺本支百世咸推受震之亨夀考萬年益著離明之象臣等濫巾膴仕欣覩上儀金石鏗鏘知協風之從律乾坤清晏瞻景耀之宣精賀冊皇太子表代宣徽院作乾坤合徳立鼇極以建中日月繼明奉龜圖而示吉誕敷渙號允迪震亨中賀欽惟陛下寳歴儲祥璿源衍慶立嫡以長遵三代有道之常受命於天膺萬年永保之裕惟知子莫若父故治國先齊家上當帝心下定民志臣等恪共内府欣際昌辰太極稱觴效驩呼而率舞寢門視膳嚴唯諾以致恭賀正旦表代宣徽院作泰元衍䇿百二十日以為春乾御當陽於千萬年而受祜紫清叶奏丹陛傳臚中賀欽惟陛下盛徳在躬至仁育物象闕而垂治法祖訓是繩獸樽以招直言皇猷滋闡嗣嵗蒼規之始羣生玉燭之和臣等班列外朝職嚴内宰雲迴龍衮肅瞻天日之光星拱鵷行䖍祝岡陵之夀賀武宗皇帝登極表乗龍御天握純乾而居正斷鼇立極奠下土以宅中百辟一心四方胥賀中賀欽惟陛下聰明合道智勇冠倫承詔撫軍展素書之竒略登途受璽昭黄屋之珍符惟謳歌歴數之有歸繄祖考神祇之允格丕基永紹景命不移羣徯后以來蘇政與民而偕樂臣等班瞻文陛瑞仰層霄頒度量以朝諸侯三千同徳垂衣裳而治天下億萬斯年賀皇太后表為都省作六飛夾日奉大歴於聖人五色補天歸𤣥功於文母事關宗社慶浹宫闈中賀欽惟陛下教闡周南徳㕘太極以慈為寳夙資保佑之勤維道積躬聿致怡愉之養顯坤元之光大卜鼎命之延洪臣等幸列周行欣逢嘉㑹瑶池晝迥樂四表之驩心玉殿春迴衍東朝之曼夀賀聖節表本院天開景運篤有道之曽孫電繞神樞受介福于王母觚稜瑞靄閶闔儀傳中賀欽惟陛下誕紹蘿圖丕承葆命至仁育物得秋而萬寳成盛徳在躬居所而衆星拱當立綱陳紀之始新省刑薄斂之規郊廟肇禋朝野胥慶臣等名汙玉署目極璇霄廣文王有聲之詩載歌律吕衍中宗無逸之夀䖍祝華嵩賀聖節表代宗正府作乾御當陽甫際中天之運斗樞繞電式臨彌月之祥絳闕青蔥瑶京肅穆中賀欽惟陛下聰明合徳孝友根心偃武修文百神歆而九廟格敦本崇化皇極建而庶績熙爰開有道之長斯衍無疆之慶臣等職縻邦憲身阻廷趨有王者興行見温洛榮光之瑞祝聖人夀願増泰元神筴之書賀皇太后冊寳禮成表本院蘿圖衍瑞丕昭景命之祥寳冊騰輝誕紀慈元之懿聖心祗恪子道昭揚中賀欽惟陛下稽古聰明事親愛敬有國之母以長久致養聿嚴天道之要在隂陽飭躬彌謹禮行中禁慶洽九圍臣等職近鼇頭班聨龍尾玉巵前夀肅瞻長樂之儀彤筆特書願廣思齊之聖賀皇太后冊寳禮成表代宗正府作黄鍾應律協陽徳之初亨寳冊告廷奉坤元之至養尊歸慈極慶洽治朝中賀欽惟陛下愛敬積衷順承法道雍雍肅肅聖實本於太任怡怡愉愉孝有光於唐帝日勤初政風動八方臣等恪謹國章欣陪班署瑶池晝迥幸預聞管籥之音玉斚春融願䖍祝岡陵之夀賀皇太后冊寳禮成表為都省作乾旋坤轉定妙算於宫闈月吉辰良鏤徽音於典冊東朝禮著九㝢歡騰中賀欽惟陛下聖嗣太任道希少廣以天下母游神清浄之居惟泰元尊致謹怡愉之養允持慈寳益届夀祺臣等㑹弁鵷聨趨庭鼇抃陽回玉琯八音首協于黄鍾春滿瑶巵萬嵗齊呼於紫禁賀聖節表寳歴建元協重華之嘉運瑶光貫月開上聖之貞符盛徳在秋昊天有命中賀欽惟陛下智仁御極孝友根心丕顯王謨端拱巖廊之上達觀新邑式均道里之中取泰象於坤乾合離明之日月璇璣叶紀玉斗儲祥臣等祇率班聨肅瞻清穆宣昭鴻業載歌七月之詩耆定武功願繼萬年之雅史局謝鍚宴表立朝載筆交懷愒日之慙就館肆筵申錫需雲之寵恩傳宫醴光動廷紳中賀欽惟陛下黼黻先猷憲章祖武謂丹青信史紀二聖之鴻文念鉛槧微勞屬小人而燕賚魚藻歌騰於周室鳳簫聲遶於鈞天屇視朔以迎長粲飛霙而奏瑞上追槀飫下陋權輿臣等愧匪食功懽惟飽徳陽剛初復太平歌既醉之詩天威不違下拜祝無疆之夀賀正旦表為都省作㑹謹天朝文命敷于四海歴司人統攝提正於孟陬率由舊章曰為改嵗中賀欽惟陛下道裁天地政在璇璣崇郷黨以厲賢才聿嚴親䇿詔郡國而謹牧養爰廣使軺東漸西被以如春小往大來而交泰禮行雅夀捧瑶斚於東朝親納直言開獸尊於前殿亶惟平治允際亨嘉臣等祇率鵷行肅登龍尾𢎞敷五典慙退食以罔功永保萬年敢矢心而善頌賀正旦表本院清臺課歴允符顓頊之元明堂視朝茂正攝提之位陽迴象魏儀賛鴻臚中賀欽惟陛下經緯人文財成天地審賢良知古今之體能勵亷隅謂吏道以法令為師益嚴品節剛健密㕘於太極怡愉深謹於東朝車駕蒼龍導迎木徳樽開白獸詢採蒭言臣等才乏頌椒恩叨給札春王正月推五始之大原天子萬年納八荒於夀域賀皇太后正旦表嵗在攝提叶孟陬之令月歴符顓頊開太始之上元時届履端天綏眉夀中賀欽惟陛下清心慈儉至養怡愉數往知來利永貞而坤厚體中居順祉元吉以泰亨徽音惟日以恒新懿徳如春而益暢臣等職叨視草才乏頌椒絳闕五雲王母隃臨於黼座玉巵萬夀神堯親捧於瑶階全徳泰寧福慶皇太后尊號冊寳禮成賀皇帝表為都省作皇矣上帝丕昭立極之功至哉坤元申衍得名之典禮行宫壼化被寰區中賀欽惟陛下敬養日嚴文明天縱謂聖徳無加於孝爰盡討論而天子必有所尊載揚徽美御未央而登冊即長樂以展儀鳳泊鸞飄寳刻永光於秦璽雲蒸霧起翠華親下於堯階協氣醇和嘉生博厚臣等班聨㑹弁夀介奉觴太微三光之庭絪緼交泰有名萬物之母允合永貞賀皇太后正旦表丁已為都省作正月始和資坤元而蕃衍兩儀交泰綏夀祉以亨嘉徳協青幃瑞浮紫禁中賀欽惟陛下寳慈作則履順行仁龍衮奉觴喜溢椒花之頌龜臺簇仗坐觀蓂莢之祥審孫枝之正傳定國本以蚤建邦家大慶朝野均歡臣某等祗率鵷行式遵鳳歴正時成嵗百廿日以為春利用厚生萬億年而受祜賀皇太后正旦表集賢院褘衣視旦丕彰立極之功鳳歴頒春誕合建邦之嵗笙鏞翕繹黼繡昭明中賀欽惟陛下道協母儀教㕘女史承顔致養順徳備於九重正位在中行願符於六五朝賛聖神之治禁傳慈儉之謨臣等叨侍近班肅瞻嘉㑹玉巵為夀儼寳殿以雲從金篋錫齡樂瑶池而晝燕賀冊皇太子表集賢院前星定位仰宸極之聖謨陽月臨軒法坤元之慈訓光騰鏤冊儀謹傳臚中賀欽惟陛下稽古行仁憲天合道知子莫若父審恭敬之積中治國先齊家盡怡愉而致養惟宗祊繼體之事大玩易爻重明之象深蓍龜協祥匕鬯承嫡臣等職縻珍館班肅彤庭喜溢龍顔虎拜咸呼於萬嵗禮嚴鶴駕鸞和共徯於三朝冊皇太子賀皇太后表集賢院承天正位詒謀啟於重闈諏日揚廷渙號昭於寳冊大明繼照萬邦以貞中賀欽惟陛下色石功深黄裳徳順以似以續降葆命以丕基是訓是行席蘿圖而端本知立嗣必子之有自審建儲非私之惟公施于神孫繄我文母臣等職塵清貫班肅上儀簫韶九成願盡稱觴之慶本支百世式瞻主鬯之尊皇太子兼中書令賀表代宗正府作黼扆當陽懋對紫宸之慶𤣥龜叶吉丕昭寳冊之光八音播廷羣公㑹弁中賀欽惟陛下悦親有道立賢無方謂一人元良勢實尊於藩翰而中書政本命尤慎於樞機孝友宣昭仁慈溥博臣等恪司成憲欣覩縟儀卜七百年願衍周家之歴上千萬夀咸趨漢殿之班賀正旦表集賢院丹扆當陽頒發春之仁政清臺治歴符建國之昌期日之方中天其申命中賀欽惟陛下澤漸滲漉心玩神明盤銘監觀徳又新而無斁河圖則象祉元吉之有恒獸樽設席以招言龍衮坐朝而問道臣等瀛洲布武閶闔詔儀玉燭豐穰用制九年之蓄紫清蠖濩業隆萬世之基賀皇太后正旦表丙辰為都省作嵗指蒼龍密叶昭華之琯雲開褕翟首稱長樂之觴順履始和懋隆元吉中賀欽惟陛下儉慈作則清浄頣神色石功深妙裁成而交泰黄裳位正盡滲漉以皆春母儀循四序之周聖孝衍三朝之祉臣等職叨輔相效愧爕調拜捧椒花慶載臨於元日宴觀桃實祈永保於萬年賀正旦表壬戌本院是嵗閏五月肇祚發春仰正陽之布治歸餘成嵗審長至以觀生黼扆昭明彤庭肅穆中賀欽惟陛下仁推滲漉道協際蟠修徳錫符驗隂陽之消長發號出令則天地以裁成念丕圖演繼于祖宗究盛禮益嚴於上下臣等瀛洲接武文石趨班閏月定時泰治密齊於七政皇極錫福乾元永保於萬年賀太皇太后正旦表地天交泰隂教法乎坤元閏餘歸終寳歴増于夏五陽浮中禁瑞靄重闈中賀欽惟陛下端懿母儀慈明内範怡神少廣悟黄中通理之爻辨秩東郊樂青煒登平之景曰惟肇嵗兹用儲祥臣等給札承恩肅班稱慶筆徽音於彤管嵗不絶書望長樂之璇宫天惟曼夀進仁宗皇帝實錄表君臨十載式昭垂世之謨聖治萬方庸謹繫年之錄編摩玩愒敷奏凌兢欽以仁宗皇帝陛下濬哲積躬欽明稽古發揚乾健預清宫以候先皇祇奉坤元䖍問寢而娛太母審俗周知於民瘼授時彌切於嵗豐謂養性存心宜採於傳記而脩身治國必取於禮經監觀歴代之蓍龜夷攷前王之軌範政要採諍臣之讜議大學芟衍義之浮辭爰譯成書用俾博覽至若譽髦斯士擢不次以待非常爵人於朝表有功而抑妄進每遵帝範肇立儒科廣祖宗百年未備之規示子孫億代永貽之訓珠玉非寳旁招菁莪之賢農桑惟勤旋致嘉禾之瑞惡衣服以申縁履之禁省畋獵以彰開網之仁増胄子之官資限計吏之品級為民請命匪營一已之福田遇烖秉誠果應自天之甘澤與人不求備從善如轉圜河徙故灘謫斂臣於嶺徼雪深前殿憫戍卒於邊防常思創業之艱益慎守成之效道傳精一明授受之至公孝竭怡愉協繼承而無間凡兹殊美冠乎羣倫濡毫惟懼於荒蕪削牘復虞於缺軼雖盡巧心於舉要蔑窮茂績之敉功欽惟陛下葆命誕膺鴻圖丕顯窮神知化彰明聖之鋪張詢事考言採臣鄰之記注屢宣睿㫖迄萃鉅編雖天地之徳無俟於賛揚而日月之光有資於繪畫臣等職叨率屬識乏簡僚慕永貞之謹嚴詞慙韓愈稽太初之直核筆愧馬遷舊制進實錄表文有短長然未敢以數聨直致伏覩聖朝二帝實錄進表必加詳盡摘其所行事跡以序篇首桷大徳中嘗進五朝實錄表未免倣效前作今輒不揆遵守舊制撰成一篇或恐繁蕪别有副本庶便宣讀又十年御極聿修四繫之編億載揚休殊乏三長之筆祇成信史上徹宸旒中賀欽以仁宗皇帝陛下仁静根心温恭合徳詩書造士闡學制以設科法律為師嚴官規而限祿諏經作則稽古鑒今所寳惟賢卻獻琛而弗尚莫大於孝謹視膳以彌加蓍龜定主鬯之公棫樸藹奉璋之衆宜登琬琰永秘縑緗欽惟皇帝陛下慕切羮牆令行金石率時昭考摭言行以無遺迪惟前人繼聖明而有造臣等尊聞傳信竭思纂題閲歴嵗年已深慙於尸素經緯日月期不朽於汗青賀正旦表癸亥為都省作嵗正天門陳揆治朝之位歴新人統肅嚴魏闕之班四表迎祥八風順律中賀欽惟陛下仁施滲漉命受溥將輔相財成别忠邪而無黨斟酌損益合禮樂以同流圭璋藹多士之良玉燭兆大田之慶準繩乾健槖籥泰亨臣等補衮功慙更絃政拙萬年永錫仰瞻太極之尊六甲既周行履上元之運賀聖節表癸亥為都省作十月為陽於赫發祥之兆一人有慶丕昭嗣服之初出日之升降年以永中賀欽惟陛下斂時錫福握乾闡珍玩天地之心陽初升而來復發雷霆之令隂早辨於履霜繩祖武以雍熙格民風而醇厚道尊泰壹運接上元臣等叨列近司欣逢盛旦望翠華之行御瑞藹五雲趨絳闕以傳臚齊呼萬嵗牋賀皇太子受冊牋為都省作禮嚴中禁位建承華萬國以貞咸曰吾君之子四方來賀永厎烝民之生中賀敬惟殿下玉璞韞珍金枝表秀繼體而承匕鬯如嵗之春定志以協蓍龜維天其祐方謹雞鳴之問聿新鶴禁之居某等叨列政司欣傳制命父子君臣之道備允廣緝熙詩書禮樂之教崇式符繼照賀皇太子受冊牋代宣徽院作範金作寳禮成内朝簇仗演綸驩騰四宇協春秋之大義覃雨露之殊恩中賀敬惟殿下岐嶷天成温文夙就佩規帶矩正言正事之教成執玉奉盈事父事君之道備某等叨司庶府欣覩盛儀仰黄道之日長式符離照候明堂之星潤允謂震亨賀皇太子受冊牋本院體元更始肅瞻玉裕之姿崇徳計勲肇錫朱明之服宗支襲慶國本奠安中賀敬惟殿下英睿夙成藝文天縱清宫朝邸朱虚之功為髙審俗迎郊孟侯之賢允似受介福于王母繼明照於四方維軍國之樞機實政化之橐籥名倡百辟兩儀正而五緯齊徳和萬邦九榖熟而三農足某等職叨掌綍欣覩揚庭紀王子之吹笙有慙斧藻歌堯民之擊壤願廣丹青賀皇太子受冊牋代宗正府作盛徳動天誕受元良之冊萬邦為憲悉資文武之賢政本増崇皇基鞏固中賀敬惟殿下圭璋王度黼黻聖謨整齊乾坤指揮於旋轉之頃肅清宫廟怡愉於定省之間亶惟不世之勲庸舉非常之典某等職司宗籍欣覩王綸磐石既安願上則百斯男之頌權衡允稱克成曰三有俊之功賀皇太子正旦牋為都省作歴起上辛啓自天之申命嵗行維戊瞻出日之重光萬宇薰陶九垓滲漉中賀敬惟殿下功調玉燭政察璇璣宴錫龜臺密承歡於王母仗移鶴禁親奉夀於神堯維春之祺有秩斯祜某等導迎嘉節賛咏清時候銅琯之陽和式占泰定望青宫之蔥鬱允協震亨賀千秋節牋代太保府作月映彩雲慶仰猗蘭之瑞令行青陸書占𤣥鳦之祥維春之祺粤上斯已中賀敬惟殿下宅心聖學匡力皇圖廣邦家太平之基澤窮滲漉察天人同心之理下逮芻蕘仁孝合名中和叶徳某等展儀榖旦徯首叢霄夀考萬年敢陋千秋之頌本支百世願陳大雅之詩賀千秋節牋代詹事院作甲觀畫堂仰紀吹銅之瑞瑶山玉彩特書主鬯之勲維莫之春初吉云已中賀敬惟殿下蒼規體徳銀漢儲祥稽七政之有恒實循冬夏消羣隂於交泰爰法坤乾興鴻文以闡基握龍圖而佐運兩宫定省雍容化日之長四表謳歌瞻徯前星之耀某等具寮無補盛旦有光奉曲水之羽觴齊呼曼夀探泰元之神䇿允謂延洪賀皇太子正旦牋本院青規紀歴甫開嗣嵗之祥蒼震布和懋協少陽之象自天申祐與物為春中賀敬惟殿下經緯人文權輿政治三朝交泰聿嚴盛禮以奉觴四徳尊乾行美成功而瑑玉卜稔已符於祈榖登賢深味於拔茅慶洽宫闈仁施㝢縣某等叨塵顧問欣覩亨嘉聲徹鳳笙仰非霧非煙之瑞班随鶴駕歌重暉重潤之詩賀皇太子正旦牋為都省作嵗正璿璣丕應震亨之象春先寳歴允符泰治之祥絳闕光華青宫蔥鬱中賀敬惟殿下道随陽長徳與日新玩易中行密包荒而坱圠法天繼照永主器以彌綸稱觴前殿以承顔侍宴瑶池而受福某等禮成鶴禁敬謹鳬趨祈榖躬耕預卜金穰之兆頌椒介夀欣瞻玉裕之姿賀皇太子受冊牋集賢院明堂辨儀裒對重輝之耀昕朝發冊丕昭上嗣之賢宗社敉寧幅員驩慶中賀敬惟殿下孝仁生禀禮樂夙脩一人元良羽翼靡煩於商皓百揆時序英威共仰於秦王鶴駕之御日三烏輪之光明兩某等叨塵仙館末綴臚庭瀛水汪洋望瑶山而親切宸居蠖濩瞻青路以陪從賀皇太子正旦牋集賢院大歴更新叶皇祖建元之祚少陽正位隆神孫承嫡之基百辟是儀五辰攸叙中賀敬惟殿下應乾作命受震行仁嘉禮告成歸妹祉吉之象外朝佐治同人文眀之祥日就月將而緝熙小往大來而分類某等肅瞻玉裕謹候青幃詠歌重光紹天休而繼照弼諧庶績占嵗在之有年賀千秋節牋國恤未餘月百司皆擬賀表非禋後不進電繞斗樞允昭甲觀之瑞日昇暘谷行受明堂之朝宗社厎寧神祇協相中賀敬惟殿下欽文師古剛健法天或躍在淵龍徳合乎中正永言配命龜圖闡其延長仰震夙之非常審傳付之素定某等肅瞻睟表獲際重光聖孝有加羮牆之慕彌切民情共戴岡陵之祝益䖍賀千秋節牋本院心居天位前星耀於明堂卯為春門大電騰於甲觀盛徳集福至和儲祥中賀敬惟殿下體仁法元師古合道温恭事帝密賛化以生成問學積躬益緝熙而光大疇選黄髮之彦庸佐青闈之規如日之升降年維永某等肅瞻英偉䖍祝簡穰輯往則於瑶山一辭莫措探錫齡之金篋萬夀是期賀千秋節牋為都省作𤣥鳦發祥丕顯吹銅之瑞蒼龍協紀式昭主器之符紫禁懽騰璿源秀衍中賀敬惟殿下温文秉度仁孝積躬侍宴瑶池令徳令儀之可述問安内寢正言正事之足聞如嵗之春自天其祐某等導迎穰簡賛詠中和瞻出日之舒遲重光允繼望彩雲之蔥鬱曼夀是期賀皇后正旦牋本院王春謹時肇正内朝之治帝歴更始益嚴中禁之儀與物咸亨自天作合中賀敬惟殿下矩循内則言法徽音關雎詠歌禮避乎蘭殿之貴卷耳思念頌取于椒盤之文稽陽徳維如嵗之初考隂教曰履端于始某等清班接武穀旦趨朝日月並明願上千萬之雅夀天地交泰載歌元二之太平清容居士集卷三十八欽定四庫全書清容居士集卷三十九元袁桷撰啓上王尚書伏以瞻望聲容幸有登龍之舊披陳悃愊慙無吐鳯之長圗鼓勇之新功兾鑄頑扵大造掃門受業椷櫝致詞切念桷生不逢時長始知學伶俜素緒綺襦紈袴之習無聞零落青編漆簡汗書之蔵曷見久知我軰固當投之濁流靖念斯文豈宜束之髙閣操觚而歎詎秉異心倚柱而歌終持正色胸臆結約肝膽輪囷惟其用拙扵今将欲修名扵後載惟宏博世號殊科夷考哲賢咸稱異數當紹聖之首創盖以窮經為先至大觀之重删乃因代言而設唐朝疎略故退之自笑其俳優宋制精詳至文公欲加以深厚維較藝扵詞苑杳若探丸雖置身扵書林悉同畫餅茍非討論扵暇日孰能敷奏扵一時爰取舊䂓各成要覽涑水之尚徳筆纂金桴義山之好竒文編玉府初學記資騷人之屬對稽古編假進士之試文博要之粹扵丁年統類之塵扵乙夜斯皆品節之效可為區别之模然獨此書實難其例千門萬户恍焉莫知所之六律五音聞之不喻其意至若寝門路鼓遂成君子之欺御庫神弓終藉老兵之對望洋之歎浩浩測海之智􅀈􅀈一物不知過亦多矣兩端而竭恥莫甚焉信知梓慶之巧専益訝庖丁之技異伏惟内翰尚書先生南州元老故國重臣望壓搢紳聊復浮湛扵閭里文驚華夏未妨談笑扵江湖恥申公之蒲輪便管寜之紗㡌樹人為急奨士尤先子誠齊人侈以都邑之富波及晉國化其潢汙之卑是用忘揣顓蒙惠徼恩育鉤𤣥提要在眀公為壮嵗之筌蹄糾繆繩愆扵後生為百世之模範儻獲書傳扵琬琰尤當襲蔵扵巾箱與汝共之深議中郎之隘非吾徒也尚祈夫子之憐欲報無從未言先愧謝王尚書拔叔度扵幼童深慚非偶執李膺之下御竊喜同時敢縁擁篲之恭庸致摳衣之請衮褒語重茅塞心開伏念桷才實滯頑心尤退縮經箱塵寂莫逃家丞庶子之譏藝苑雲蒸誠駭翰林卿客之對深恐凋零扵冷譜固嘗論索扵陳編志不能以過人識不足以廣問戴盆望日勤無補扵三餘坐井窺天智有鄰扵五技衡門感嘆斗室屏營然而切觀盤盂之書致戒必謹韋弦之義繕性尤深茍非取則扵古經曷足振名扵来世虚心實腹學始類扵安絃閑邪存誠念實同扵執玉反觀典學之成訓爰採遜志之嘉名輙布請祈方虞僣躐豈駑駘已下尚希一顧之功然爰居何知遽享九奏之禮寒忩展玩絢兮虹蜺之章素壁髙張森然神鬼之䕶論深藥石字重璠璵已三復而吝消終九思而感併此盖伏遇某官言為楷範道藴經綸化閭里之澆風愍簮纓之弱息至誠樂易許傳新著之書雅量恢𢎞不棄一偏之士遂令少賤屢獲親承桷敢不躬勵前聞仰稱春秋之筆恪遵眀訓益加嵗月之功永依師門以堅壮志與陳無我論樂府伏承下教垂示雅詞退揆踈蕪敢居品藻復縁眀命之重庸誦談聞之迂執筆靦慙通函傴伏切以陽春白雪之唱和者固稀清廟朱絃之音知之尤寡厯觀樂府之傑出悉為詞林之緒餘良由萬物變化之愈多抑使五采章施之匪易龍文被寶鼎雕刻益精天馬駕鼓車低徊滋窘貫珠之音空在累黍之器莫傳吐角含商孰分其清濁析宫合徴莫辨其短長俚歌日煩古調㡬廢留連桃葉習晉世之風流淒切竹枝傳巴人之羇旅江南腸斷之句誰足近之涼州意外之聲今無是也風聲鳥葉常由動植之可通霓裳羽衣徒託神竒而自眩捨陽關三疊之清怨變南鄉九闋之狹邪樂意生香寫天機之妙理山光水色換俗子之凡容彼誇刻鵠之工詎悟承蜩之解精義無二至道不煩靖言思之孰可繼者伏惟無我學士詞華泉湧言吐氷清飛星急羽之秋文傾上幕投綸沈鉤之暇興滿南山每希白石道人之雅聲以成黄絹幼婦之佳製雪兒低唱未多學士之風髙墨客廣傳益見咸陽之紙貴桷尊聞惟謹快覩尤先用鹽洗金殊未眀扵物理以蠡測海徒竊笑其心思狂斐莫裁涵容斯幸回宗人袁慶逺教授同源分流夙感陶公之詠劬躬燾後每懐韓子之碑均此靈根褎然望姓切以經術基扵博士衣冠盛扵司空名節為天下髙言非其過歌詩著先人跡時與之俱念鼻祖嘗客扵上虞而耳孫分胙扵越土定居鄞水占籍開封西湖之佐蘇公風流儼在眀招而從太史文獻有傳光扵淳熈錮在嘉泰父子同館繼廣受之美談師生並朝陋禹宣之異禮京兆踵河南尹之祖武成均慕光禄公之家聲藐焉遺孤承此𤣥胄正倫之妬諸杜鑿地何心子雲之亡它楊泝江有考車書一致江海相逢豈無它人因以合譜伏惟教授學士摛詞展世敬業守儒謂鄧林之廣敷本扵一木探崑崙之無底散作群川田歸扵齊良非得已爰絶扵漢或曰未然驗賦形之不齊審受氏之有自處祧惟謹繫世是嚴然而内舉避親昔者之邉幅合族戒令先王之凖繩愧鸒鳩之圗南憫騏􅂹之伏􅌴羲之之别王述趣迺不同康樂之愛謝荘心誠有得桷偶縁鉛槧久汗絲綸傳呼欣大小戴之稱臭味鄙南北阮之騃蔀室而得眀月當道而逢夜光百世不遷揆宗子之非逺異姓為後幸譜牒之可通敦叙攸同參承伊始永懐繾綣曷鑒敷陳謝閻學士東觀英游乆欽諸老南州俚士獨守陳編念相望之逈然知無因而至爾何期銓鑒俾預薦揚惟清切之司存實作成扵俊乂王言之制曰七史官之長有三風動四方必訓詞之温雅詔垂萬世在書法之簡嚴維班馬之良不能繼獲麟之筆而燕許之體難以推倚馬之才藝不兩能物無全美筆則筆削則削非曲學之可為見所見聞所聞恐直情而難致古有斗米而作傳近多千金以致詞好惡成一已之私褒貶失當時之實掩長卷以竊嘆抱遺經而自娛故魏收以輕薄寡不咸稱穢史王通雖隠淪不仕獨著元經方今偉績無前太平有象大禮略封禪之記純誠汰郊丘之儀聲教萬邦文質二代追皇猷創業之永傳丕基嗣服之初必屬鴻文以揚駿徳彰施作繪極妙巧扵羣工雜比成音合天和扵衆耳拔犀之選非易聚毛之長亦難如桷者學不逮人志徒師古獻漢家三雍之頌庶或可能續周書王㑹之篇良非所任揆小材之雕鏤幸大冶之作成忘其顓蒙倍以踊躍兹盖伏遇某官儒林冠冕文藪凖繩桃李不言以成衆芳之春松栢後彫而貫四時之氣官僚慎簡載籍肇新争名扵朝難後来之居上脩身以道匪干進以依流深虞同升之譏上辱大賢之舉幸相知扵氣味迄無假扵聲容桷敢不益勵討論上酬奨拔求識李邕之面當已有期效彈貢禹之冠不㡬扵贅因風輸感執筆寫情嵗律云更神休所届庸致茵憑之禱密調鼎鼐之和賀鄧善之應奉兹審講徹皋比班登龍尾早居三字極鉛槧之光榮爰作一經萃縹緗之芳潤朝端色動江左文眀切以詞章之體與政相通禮樂之宜隨時斯舉誠少近古于以酌今釋訓聱牙固難返殷周之盛委心綺靡殆有鄰齊梁之風山東之詔令温然河西之璽書炳在往者諸賢不競故先云亡掇拾成言編聫賸語形模近巧難逃脱塹之譏刻畫傷和殊近鏤氷之累徒畫虎以類狗強令鶩而隨雞事非偶然時使之爾念欲復還其正氣抑嘗深探扵陳編然而木人石腸難以語經綸之事河目海口要當歸黼黻之才請誦所聞無出其右伏惟某官清言古瑟雅製方壺冶百鍊之金而成雲雷之竒合八珍之味以調薑桂之美當下帷之多暇每傾盖而劇談意得忘筌神閑䑛筆船容萬斛果自致扵水中芝産九莖宜載歌扵殿内夙嘗相勉今匪共諛桷倚馬才疎屠龍技謬歸来之詞莫擬遂初之賦或尋話茅舍扵玉堂當廑逺想謹蔗漿扵金盌兾保天和傾向之忱敷陳莫既夀鄭潜庵兹審玉宇金眀蓬壺瑞藹數環六甲堯年已合扵上元福擁三壬申旦適同扵洊九江湖相慶樽俎交歡伏惟内翰學士鬱鬱澗松昻昻野鶴辯排堅白共誇麈尾之清言書喜硬黄猶習蠅頭之細字方窮太始之理以與造物者游陋絳縣老人之年讀清溪道士之易踏龜殻而一笑持蟹螯以髙歌夢繞故園夀客相期扵晚嵗情親近局麯生肯負扵良辰桷傾接維新扳援實舊黄絹㓜婦之詞莫擬子墨客卿之賦未能八千嵗為秋願致長生之祝六十飬扵國佇看優禮之加薄物助誠副椷凟聽回交代潘檢閲誦子墨客卿之賦竊有􅈭昂聆諸老先生之言深相推挽審珠玉之將至愧糠粃之在前塵牘未遑巽言先枉伏惟内翰學士冰壺貯月水鑑懸秋下帷授徒有矻矻窮年之趣閉門樂道無憫憫望嵗之憂追北渚之嘯歌覽東齊之形勝斧藻樸素丹青炳靈相如封禪之書直譏其陋賈誼治安之䇿允謂可侔濯纓益振其髙風結綬良非其雅志金馬門之待詔有類俳諧白虎觀之談經亦㡬糅雜惟兹册府亶號詞林寶書如山汗簡若束方偃武修文之盛迺立經陳紀之初候日影扵松階詞容潤色瞻天威扵芝閣議許討論匪慎簡扵英髦曷専美扵治世除書一下輿論僉諧桷學匪適今才不逮古重以簮纓之舊猶工鉛槧之勤泉石寫心比元郎之漫仕山川感興追老杜之壮逰過廑幼婦之辭重託聞孫之好有懌其㫖不知所裁囬冷教授仰南州之喬木美䕃獨存望西山之慶雲英光猶在居然傾盖之幸辱以投函之謙斧藻溢情丹青炳目切以取士之岐不一用儒之道實髙賈誼少年憂國之䇿允著馬周逆旅入對之疏密諧法如牛毛賤若魚目将望然而引去寜挽之以必来方今人文交修禮樂備舉金馬碧雞之頌可被絃歌赤麟白鴈之祥宜書竹帛孰為稱選僉謂當仁伏惟賢良學士溟海扶摇清秋沆瀣圓冠方履儼魯國之舒徐漆簡汗書補羽陵之疎畧寶氣横鬱天葩芬竒方按軌以徐行羞登途而捷進青氈舊物行廣髙門白水同心益窺雅志幸雲龍之有應成針芥之相投遺以十朋之龜貴若連城之璧有味其㫖固難和扵太羮無徳以将敢亟酬扵雜佩銘膺感幸占對簡蕪賀吳編修兹審疏青汗簡寵錫章身史官之具三長英髦慎簡聖經之法五始盛事時書荷針芥之偶投慶雲龍之胥㑹編修内翰篤志精白結交老蒼審黄鐘扵希聲灼知律吕嗜昌歜之古味允適酸鹹維懐寶而深蔵終待價而一試筆耕云舊學殖焉窮桷師友川流獻文日墜喜而不寐類文子之同升樂以忘憂慨宣尼扵往昔斐然賛美蔑以效䂓夀貢仲章月暈虹蜺藹南漪之五色春浮花栁揆東作之平分孕彼玉人瑞兹寶運伏惟某官池塘逸興金石流波懸弧表四方之心逺游結駟落筆擬千古之作長嘯彈冠愛東方之偷桃専北門而視草盖将旬五日而後返抑亦一千嵗以来歸桷善頌莫陳雅㳺屢接沈香亭北行催芍藥之詞白玉堂前愧伴梅花之直薄儀侑祝副頴凟清賀鄧善之修撰伏審儒林著望詞苑領賢超近署之清班賛中朝之元化光膺異數允際重熙敢縁肺腑之私庸寫胸臆之藴切以王言之制始分于唐人文之精特盛扵宋故便扵宣讀者必資諧叶而直以訓告者當務簡嚴作者數公流為末𣲖學疎而才勝每師浩汗而失扵麤踈記贍而思遲必慕敷腴而拙扵裁剪鳬鶴不續蕭蘭莫分盖洗金以鹽當研物理而攻玉必石有假朋從厯年滋多此道不競蔵名淵黙莫窮龍虎之變騰處友善柔徒欣牛馬之奔走望風隨其臧否疾才摭其短長有符東晉之清談自謂西都之舊作昔君實不為四六語未嘗失朝廷之尊而温伯輙草卄二麻豈害為錢穀之吏必此為士其何敢言然作新斯文是在吾黨復古之道誠惟今兹起八代之衰昌黎固専其事振五季之弊師魯亦預有功樂在羣居道無孤立伏惟修撰學士丰姿凝湛雅量韜深大音希聲儼一獻九奏之意𤣥酒不和成百拜三行之儀中和養其本根英華發扵情性譬若夜光眀月衆咸以為寳珍方之威鳯祥麟人莫窺其形状陳太丘之容衆王茂𢎞之盡懽以為黼黻帝猷曷取竟寜之事丹青神化獨追正始之音桷幼讓門功早親庭誥探諸老之源委不知者謂得異書道前賢之心期無聞者猶譏曲説懼廢三槐之緒聊希五栁之恬為可汰之技官守不求之樸論要蘄傳後寜望叙遷欣覩除書缺修賀記幸燈火平生之舊道江湖相忘之言人皆曰賢亦既遂彈冠之願老而能學當益思炳燭之勤敢效頌規斯為處與囬趙大社伏以竪燎扶朝陽之光敢居斧藻贈貂得眀月之報庸謹襲緹三復先猷重陳素欵切以屬辭比事匪遵魯史之舊文微顯闡幽允正周王之大統無傳而著惟道是眀然而獲麟之箋有鄰神怪矢魚之訓詎止觀陳紛然賣餅之譏蕞爾垂旒之喻泥春正扵長厯循夏五之闕文郊用辛而非長日之時禘尊祖而雜圜丘之謬清言何補墨守徒矜投膠澄百尺之渾引髪舉千鈞之重首勲啖趙心學邵程義理精眀賴先儒之唘迪權衡輕重資前哲之賛揚嘗窺西周之簡編深陋後王之典禮致太平者猶有羣議言五伯者殆無全人廢學熈寜卒致為我之歎尊王慶厯遂多刻吏之嘲人物眇然年運而往伏惟大尹學士山林圭組燈火詩書返袂髙歌法天時扵五始下帷坐授悟人事扵三微載惟先正細氈奏對之書是為後學青箱纂輯之式集狐扵腋端有假扵翼成洗金以鹽良永慙扵瘢索桷困學有志强仕無功百年雁塔之聫登季世龍門之末至欒胥皂𨽻捫心有感扵同時管鮑交朋掉首未逢扵知已翕然針芥終以絲蘿萬二千五百家為鄉豈無好學二百四十餘年行事聿覩成書擁篲以陳伸函非禮尚祈矜采俯賜鑒融囬趙太社鄉飲習鄉上齒咸推大里之典型隆禮尊賢幸屬貞元之耆舊矧蟬冕三公之地在皋比一變之功人物眇然年運已往扵粲雙魚之牘孔昭二馬之期入學祭典修願廣太平之盛觀升歌主人獻敢隨後進以同登囬趙太社切以百人逐免祗益苦心一朝解牛敢煩敏手念洛社久存扵鄉約而杜陵感廢其家聲宰肉莫均㧞毛不與仰止金刀之禮樂陳兹典午之春秋無以易堯不如歸趙粲飛函而禮讓堅縮袖以勞謙君子是憂貪人斯幸潛魚畏餌雖自潔扵水中羣蟻慕羶卒相縁扵堂上其為計則得矣獨竊議其可乎難以立談終祈臥治匏五石而無用其果不能粟萬鍾以何加顧兹可陋僉謀懇切量瀆矜融夀徐徳剛七月八日涼生兎子瑞應麟兒𤣥祖流芳嵗逺猶傳其玉硯黄姑停宴夜分端俟扵銀津家聲之克振可覘宅相之深期有在桷陳人愈拙妙語莫工望閭里之葱葱阻舟航而耿耿九五一曰夀願益窮皇極之書四十不動心矧已開中年之袠薄儀侑祝善頌増情謝程承㫖爵人扵朝已甘遜避譽髦斯士忽被選掄小已惟驚大鈞有自切以王言之制炳若日星帝令之行潤如風雨三代訓誥誓命之作理雖同而體實殊累聖嵗月日時之編事若近而書貴備簡嚴足以成信史清切然後為文人才非甚長藝莫能擅皇眀唘御文治興圖漆書汗簡之竒来者不絶金泥玉檢之陋却而未遑寛大之詔數頒遺逸之聘屢舉宜得鴻碩以賛雍熈大􅉇乗風迺鸒鳩之斯集長鯨失水顧螻螘之所凌憫涇渭之孰分慨薰蕕而同置拾芥而取青紫彼謂不難相馬而視𤣥黄曷云有遇炙手可熱涌氣如山生能齊言豈荘嶽之所變恥與噲伍何淮隂之過髙惟末俗之實繁斯南士之不競離眀有照渙汗聿新鍊金扵陶冶之餘煮海扵剛鹵之後聚毛雖氄擢象是精懸水鏡扵廟堂今兹選衆審銓衡扵臺閣夙已簡僚閭巷駭聞江湖翹首桷之不佞人能具言性褊介而弗通學固陋而無補少承諸老欲窺龍馬之祕圗晚效一官深愧蟲魚之曲學守西樞之遺緒望北門之後塵待坐松階占對或言其可教散襟茅宇倚歌人數其太迂雖慚殺青之工僅免尸素之誚既云美解寜敢强留蒼狗浮雲幸逃物論白駒過隙謂失事機蠖久屈以奚伸鴻已飛而何慕私以恤緯之諛見敢言出綍之舊章知之非艱試可乃已泛觀唐世厯攷宋朝元白才髙必授題而方拜歐蘇望重免給札以即真誰謂秦無請從隗始惟智行其無事扵人何所不容然而争進駢肩一兎詎堪其百逐旁觀袖手前禽終失扵三驅彼非招而不来羌奚為而遽集議繇鴟閤功在鑾坡此盖伏遇某官間世宗工先朝元老文諧律吕八音振而四懸成智合蓍龜六虚周而三極建既任棟梁之重彌深參术之儲謂立賢無方當視朔南之員幅凡成人有徳豈拘州里之逺遐夾袋初謄青氈已復桷蒙恩若是圖報謂何欲酬國士之知願假客卿之對承眀三入莫能書赤麟白鴈之祥滄海重逰要飽識紫鳯天吴之異寸心有在千頴莫殫謝李承㫖五載辭榮已安初服一朝出命遽復舊氈三已何慚重来有靦切以太史編摩之所翰林清切之司貴慎密而熟扵憲章尚精敏而逹扵事勢欲取倜儻絶羣之士将貽落魄無檢之譏茍崇依違寡言之人必致脂韋不稱之弊原昔養才扵館閣之地盖當責效扵廊廟之時文治日興皇猷淵黙委諸元宰于以彰衡石之無偏詢扵輿言足以知蒭蕘之可擇克謹天戒慎簡乃僚肩摩足累之徒揚鞭而避巖棲穴處之隠接淅以来矧聲教久敷扵朔南而忠信可行扵蠻貊㧞茅以彚采葑不遺有如苦窳之蹤亦預陶甄之選兹盖伏遇某官精忠貫日盛徳格天髙宗之得傅巖營求諸野成湯之扵伊尹學焉後臣彌窮成性之存存益著匪躬之蹇蹇以匡王室其代予言惟宫府一體之意深念君臣同心之㑹罕願因知己庸敢竭愚難得者非常之機易失者不次之遇方今輿地紀載悉歸于梯航觀闕㑹朝相望其冠盖東漸西被上際下蟠法過密則煩擾而不安赦愈多則姦媮之滋幸理錢穀雖號為俗吏當究其出納之源議禮樂實本扵儒生孰眀其沿革之理同風俗以合志尚敦朴素以去竒袠言舉斯心可運諸掌然文盛必有武弊而陽長尤懼隂来積薪憂燃非賈誼之過計前籌借箸迺張良之逺謀和羮難壹其酸鹹成錦易工其萋斐有懸髙鑒奚假諛言桷累世詩書百年簮笏與銅臭而同傳敢謂未然為瓦注以自怡不㡬扵似當朱門炙手之日迺清林散髪之秋著書期身後之名擊缶遂山中之樂恩蒙乗傳非所據以屏營技止操觚将何為而報謝念承眀三入而奚補望天門九重而莫通大書特書執筆難施扵青簡一命再命循墻深愧扵素餐曷稱奨提惟甘樸直玉堂獨掩恍江南送客之情懐衡宇載瞻形稚子候門之夢寐願安静退以盡感藏賀曽提舉兹審望領儒先道光王化宣尼乗桴之意豈果居夷幼安度遼而還殆将易俗登􅌡可俟艤舟以須伏惟某官妙思春雲壮懐秋水掣鯨魚而游員嶠竒觀畢陳踞龜殻以挹浮丘妙言合奏身寄神京之陸海胸蔵東壁之木天允議居中詎宜補外桷屠龍技拙倚馬才疎詭御以告王良則云豈敢執鞭而慕晏子尚或可能不腆儀羞無文敬在招俞光逺入塾七嵗入小學幼儀深著扵曲臺三年通一經俚諺敢誇扵東魯先猷滋逺頴識無聞空多老翁不量力之譏莫慰大賢願汝為之意伏惟教授學士砭頑妙手鑄巧良模樂矣誨人陋孫寳之避舍憣然就道知李耳之入關談經排狗曲之嘲挟䇿恥免園之固以身徇道初何愧扵古先辭富居貧益有覘扵雅量尚煩負劍辟咡之訓以成洒埽應對之儀虚左以近側躬而俟清容居士集卷三十九欽定四庫全書清容居士集卷四十元袁桷撰啓疏附囬宣城郭教授雷煥江左諸賢夙慕敬亭之山水洛中九詠肯言京邑之風塵擔簦而賜璧一雙憑軾而下城七十竒節矯亢髙名激昻伏惟教授學士藻思春雲丰神秋月子綦隠几立言深愧扵炎詹林宗墊巾置論匪鄰扵危覈脱頴悟折衡之敏發硎窮肯綮之情流涕力疏扵治安多病恥陳其封禪懐章宿邸知富貴之有時棄繻入關審功名之之可卜方盛世興賢扵郡國詎長才抱道扵草茅雲龍類從㝠鵬運徙遴選金臺之彦孰敢居前深蔵寳劒之篇豈宜緩後方争求而識面謂鼎来以解頥顧懐刺而却行将舉扇以疾避長箋鯨掣蔀室珠輝桷學殖塵荒經畬徳墜儒林丈人之源委老矣亡傳子墨客卿之詞華終焉自失每念空餐而増淚誠思㧞茹以避賢位卑語輕望淺任重吾徒掌帝之制弗稱絲綸君子贈人以言有慚斧藻永繹其㫖不知所酬伏希亮察答郭山長家近神山那有望瀛之想禄尸玉署每慙玩嵗之羞将賦式微之歸忽膺連茹之寵捫心悸惕揆分僥踰桷智不逮人噐非越衆老而能學永希先世之勤樂以忘憂欲述聖門之志考兹盛代尊彼儒流選部推毛之精崇文㧞犀之舉謂南士後至難效盧前而靈胄逺尋所宜隗始白駒空谷振鷺西雝有来琳琅之書彌重錦繡之段客師之遇跛男子似若倒之汾陽之許謫仙人于今驗矣襲蔵是謹傳誦惟驚囬府學觀禮瀛州清切甫賦歸休泮水肅雝適嚴秩祀方謹陪庭之儀注遽承巽牘之詞華進執豆籩升聞金石惟素王道徳之懿合蒼姬文質之宜謂巍坐光榮不㡬淺陋而成令炳著斯為故常深嘉潔已以作新共企傳恭而復舊奉璋相事敢居髦士之先執禮遵前難免鄹人之誚答朱生一還故里分安野鶴之閒三入承眀衆哂黔驢之技櫛髪淒其已化捫心省以獨慚粲然霞裾申以氷繭蔀室獲兼金之耀衡門駭織翠之竒伏惟賢良學士汗簡功深韋編思切議詞章之弊􅒊扵揚劉發騷雅之幽擬於屈宋單出雜比為律吕五采一就分等夷靡然變藻繢之工綽矣成灝噩之古然而眀理者鄰扵直致修辭者萎扵曲裁謂箋記止媚上之文能之實少而制誥得儆衆之體作者猶難桷金匱世官青箱家學嘗自處扵木鴈深有哂扵土龍史乏三長敢述馬班之制作經迷五始莫推啖趙之淵微事與願違志隨年往幸覩清修之標度得攄磊落之襟期針芥有投漆膠彌固贈以繡段拜雖亟以莫辭酌彼金罍禮未成而先醉輪囷有感厓畧是酬囬楊編修綴班玉署悵諸老之川流晉秩金華撫微躬而涯返選繇鼎鼐事駭搢紳方虞按劒之疑忽荷遺珠之贈伏惟編修學士文裁錦段思湧繭絲目無全牛論固輕扵餘子智専老馬語或齒于陳人每憐炳燭之勤能破炙轂之辯嗜同昌歜玩比懸藜既接壤扵片雲復盍簮扵中禁事云有幸時不偶然桷久困京塵宜收朝蹟望蓬莱隔弱水肉羽難勝歸鄉里授諸生丹心尚炯敢因褒拂庸寫摧蔵賀臧户曹七十光分華旦瑞唘希齡兕觥以躋公堂允資禆賛鳩杖而遊鄉校實賴主維人瞻夀骨之有傳天挺蜚聲而彌壮桷陪游再世縻繫一官望廣顙之彭籛雲烟縹緲想脩容之姑射冰雪湛凝侑慶薄儀别陳副楮囬韓知州伏承劄翰俾篆碑顔詳讀再三莫殫萬一靖惟先正按察相公智謀超俗勇略立勲東西戰壘之出竒左右屯田之擇便矢穿楊葉彤弓昭大帝之恩斧破豫章金符儼百神之助烏府藹澄清之譽紫樞彰鎮静之謨薦士惟公共擬巨源之識量聴訟以理未誇廣漢之精眀至若更異代而振家聲以孤兒而傳宦牒績為罕匹人所難能編摩已著扵穹碑揚厲宜歸扵汗簡伏惟節使相公窮神述事立身揚名繼世象賢牧守之任相接為政以徳撫字之念彌加安陽之圖譜可尋潁川之風猷如在昔聞惟二今見其三某演誥罔功紬書無補龜趺屭贔幸附􅂹以託名蠆尾參差願濡毫而作傳尚賖參覿統祈鑒融夀史允叟數周甲子夀開絳縣之年瑞後中和慶萃金閨之彦槐堂馥郁榆社歡榮伏惟某官服食頥神希微養智撫松筠而閲嵗霜雪不移調茵鼎以樂天烟霞自得方将友安期扵瀛海揖子晉扵緱山坐觀盛衰笑視古今招邀親黨願成二老之風流約集耆英共繼九賢之真率薄儀侑祝副楮别陳埜甥定鄧氏西州勝士久欽翰墨之芳南國故家自笑冠裳之冷幸托根于外氏獲聫䕃扵清門不假揄揚遂諧婚對伏承某封闕參女史訓服姆師從子公埜習有童心才猶凡品每慙鐡鑪歩之誚敢意玉鏡臺之緣敦義有加申盟無斁陳不腆之幣爰以敬初叶和鳴之占永言綏後臨風瞻倚執筆感愉趙氏請婚代作眀珠當道愧無因而至前幽蘭深林敢不採而自佩庸假蹇脩之力允諧懿氏之占伏惟某人朗鑒冰清義襟河潤品題吾黨合閭里之衣冠繅藉斯文振家庭之詩禮有懐聫事歸擇賢宗不煩千金之致詞端藉七寳之合月翠屏宜晚行叅羣從之㳺白水同心益覬片言之助輙干将命恭俟報音長女許適趙氏西府垂芳遺編僅守北門視草一疏獨髙興懐二老之盍簮屈指故家之傳笏前言儼在嘉命是恭伏承令姪同知壮慕直清仕版方堅扵冰蘗而桷長女某幼遵婉娩閫儀粗習扵絲麻眼空餘子之隨羣人議迺翁之擇壻察其素履終以淡成萬里逺歸自訝子平之拙百年偕老願諧敬仲之占腴禮莫酬副書以載次女許適趙氏伏以漢庭甲乙曩已託扵同年商邑後先適相符扵千載仰止青雲之素巋然喬木之存施于孫曽成爾姻婭伏承長令嗣學士思深象管譽已藹扵階庭而桷第二女某工謹鞶絲職粗遵扵閫奥末習競夸其侈靡吾徒宜守以儉純此道清風斯盟白水仕非為貧也願早觀金題玉􅉜之竒言得無訒乎已預述竹笥綀裳之簡有嚴報禮庸謹副椷囬余氏議姻成季之勲象賢是嗣有媯之後教順惟慙念脩程方厯扵冰霜而賤跡幸安扵田里事適相偶時何敢違聿来金薤之華申告瓊茅之吉悉蠲繁縟以奉周旋直道而行固官箴之攸謹外言不入在壼範之必嚴匪惟弱息之有歸益見清門之足法奉板輿而調鼎膳所願事姑入玉堂以復家氈敢云傳壻莫攄喜臆庸致規言季女許適余甥百年事契仰止髙曽再世婚姻施于姑姪念造端扵幼嵗獲締好扵今辰允自氣同抑光肺附伏承令姪洒掃應對久遵夀母之規桷女保抱携持夙賴大家之訓展也衣冠之緒凛然弓冶之傳人亦有言吾為此懼魯衛兄弟禮已判扵立談秦晉舅甥事益難扵坐視勉焉亢植稱爾奨提叔女許適史氏秦晉甥舅之國論世可知朱陳嫁娶之村披圖儼在惟華閥孰比肩而擬迺衡門争接踵以前盛徳有容寒宗奚讓伏承令姪孫承奉衣被儒素綺襦之侈靡聞而桷女服習女工鞶絲之精未解念逰宦久塵扵當路而婚姻馴致扵失時立談璧雙訂諾金百綀裳未備敢云九十其儀鐡硯可傳行奏三千之牘囬史氏聘宦路因循莫酬宿諾相門清邃猶守舊規荷崇篤之愈加審姻婭之攸自書来尺素禮重兼金歌摽梅之詩懐惟有慊效投𤓰之報愧莫可言瑾請婚史氏元老傳宗専清名扵碧沚彌甥承緒邀餘福扵滄洲百年婚媾之孔昭再世姻親而允著伏惟某官某封闕内閫服習手絺繡以益精而桷男辟水従游躬簡編而粗謹惟閥閲吾徒之當保何閭閻餘子之争前謝彼濁流成是古道納采用鴈欲男女之及時端䇿拂龜審公侯之復始敢陳薄禮庸載副椷牟氏招贅書代作中年婿對每深禮本之思晚嵗家聲猶守儒林之舊盟既諧扵築館事宜免扵御輪老矣無能視之猶子伏承令嗣學精緗帙才詎止扵目前而某女某功謹鞶絲情難離扵膝下受餐願同其甘苦奉匜深謹扵寒温既重久要敢辭先施青氈硯在敢言翰墨之有傳銀燭屏開豫卜門闌之多喜疏易州文廟疏聖人之道極覆載莫得而名神眀之通若淵泉無往不在維上谷之古郡實陪京之奥區脱戰國任俠之風服五經仁義之訓化行衿佩家有衣冠然而揭䖍妥靈廟堂之制未舉設儀辨位籩豆之禮莫施雖像設之教唘扵後人而神棲之宫見乎累代事關我軰天祐斯文泮宫作詩願同功扵史克鄉校有頌豈専美扵鄭僑敢不盡心聿来胥宇翬飛鳥革佇㸔不日之成玉振金聲共享無言之化鄉閭樂助庠序増榮贈陳無我凌波圖疏右軍換鵞經不了生前之債東坡賣馬劵要求身後之名然而畫餅豈足充飢須信望梅亦堪止渴菊南道人璠璵古學瑚璉雅材江漢秋風付經綸扵獨笑冰霜晚嵗寄漫浪扵一官食苦茗而論事不休坐胡床而倚聲自若寜為雞口任刮龜毛丈夫豈願憐出門何礙平生不道乞對鏡奚慚信天公之記已成孔方兄之交頓絶雪車豪士㑹須奪吏部之金秋水逹人寜復貸監河之粟知心惟一具眼無雙張玉田歸杭疏采藥神山悟朱顔之今昨呼猿靈鷲勞清夢之去来要當青鞵布襪徒步徑歸誰信黄絹色絲空言何補弄笛恨邉雲􅃤澹坐忩惜江月淒涼落葉孤尊無復金貂之慷慨古梅千檻空懐玉照之風流食肉之相已非解牛之技焉用焦桐未遇斷木自慚風雪江湖肯後當時之置驛交㳺金石定先桑子之裹糧鄙騎驢㶚上之寒遂跨鶴揚州之願膝行而謝稛載以歸燈火話平生慰老弟兄之白髪詩書娛晚嵗還名祖父之青氈恩極無言情陳有靦周可竹移居疏借車載家具已知生理之疎騎馬傍人門可怪言辭之拙相期青眼少慰白頭可竹教授清比叢蘭􅋯如野鶴無殘盃冷炙之色有簞食瓢飲之安鼓琴授生徒近馬季長之標致隠居任漁釣入方𤣥英之品題㡬經茅屋之秋風厭聴小樓之春雨烏鵲三匝鷦鷯一枝欲尋莬裘之謀難課兎園之效昔和靖處士享西湖之樂不以告人然康節先生買天津之居嘗聞醵衆既自慙扵唘口要當㑹扵知心不惜一言母煩屢請門多長者共成来往之歡尊有賢人不廢倡酬之適鄉閭佳話湖海髙風許路教入館疏代人作道䘮扵千載之餘談經者逐章句之末士奮扵百代之後言理者析天人之微不有淵源孰為矩範某人學優聖域譽藹儒林光風霽月之心胸莫窮其藴清泉白石之志趣所養者深名羞少室之山人衆羨關西之夫子得英賢而教育終愧顓蒙美盛徳之形容莫殫善頌却前而請虚左以迎趙太社刻春秋法度編疏列國寳書慨混茫而亡紀三陳鐡㰅洞消息以深憂永瞻黍離之遷迄成葵丘之㑹蒼姬凛在素王是専攷牛耳之盟悉淪扵矯誣推麟趾之應莫捄扵衰顔匪惟凡例之嚴是曰筆削之正然而隕星退鷁非有褒貶歸賵求車實渝典禮直書其事足以誅亂臣之心曲説以箋殆有若法吏之口三傳角立羣儒狐疑維昔師臣侍經白虎今有賢子紹業青氈討論無歆向之嫌文獻續間平之美年運往矣風猷儼然幼讀父書若擣珍以和扵舉鼎老嚴家訓雖嗜芰猶守扵加籩泯然鄉校之闕遺懼爾世卿之淪靡願廣傳扵琬琰庸不墜扵箕裘白首書成允遂殺青之志清門人在益章夀梓之功戴先生刻遺文疏羊公峴山之碑深懐身後白傅雞林之集豈較目前是以壁中之蔵咸嗟其斷缺航頭之獻或議其改更念兹汗簡之勞多孰若夀梓之功博生乎今者嘗忽夫近志于古者或知其非爰舉耆先以告茂異剡源子少負竒志晚成大名潄六藝之菁華窮百氏之源委如得温璞以成連城之璧若裒吉金以合四懸之鏞世方尊崇老益平實夫人既慕其學是宜家有其書失今不圖斯咎誰執十年之計在木庶得廣傳同心其利斷金允宜共賛不在是舉曷成斯文穆叅軍市上之酬敢求美價蔡中郎帳中之陋徒蔽脩名尚仲良刋醫書疏類長沙張仲景書為十圖欲觀日月星辰疇咨繪畫多識鳥獸草木具訓傳模矧左圖右書之教備存内榮外衛之微莫辨張長沙類四證以眀治病之本朱南陽衍百問以推用藥之原其書雖完厥理難究爰有多聞之士聿成一覽之圖考百藥之君臣推五行之母子分弦濇扵坤艮别表裏之隂陽若逰建章咸旁通其門户猶入武庫悉能名其甲兵允得扵心如指諸掌欲推已而傳世必假衆以全功張廣樂扵鈞天詎資聴瑩挂髙堂之素璧端便覽觀共勉揮毫所期刻楮陳晦父致仕還家疏挂冠神武注晚嵗之蟲魚歸老鑑湖了餘生之麴蘖駭士林之一見合選部之二宜喜在眉端春生足下湖西致政陳教授長材韞匵敏手斵輪破㡌塵侵不辨支離之粟矮簷風急徒賡骯髒之歌鳥信天以無愁楊厄閏而彌老李太保亦為之恵米固以眼青蘇司業時賴其與錢終憐頭白漫浪江湖之迹淒涼山澤之癯囊無一錢空如懸磬扁舟下吳㑹願共謀屝屨之貲騎鶴上揚州庶益遂衡門之樂金陵鄭生應炎道士疏北闕上書著詠受嗔扵唐主南山種豆貽言増禍扵漢朝生也有涯安之若命金陵鄭生精神玉潔辭辯春霏負笈登途謂功名之来可立致下帷講道審義理之得為無窮淒涼灤水之情懐隠約金陵之夢寐将置身扵方外行抵掌扵人間柱史猶龍匪宣尼之私論塞翁失馬詎荘叟之寓言斷于乃心告兹多士青精顔色深培槖籥之功白日羽翰必假刀圭之助渝盟天厭效義風從真定劉謙父葬母疏貧迺士之常命有拘而淹屈孝為行之本力不逮以因循厯觀聖賢夷考傳記脱􅆖之贈成扵斯須挂劒之酬定扵往昔盖惻隐為人之固有而慷慨則世所共難謙父提舉臺閣蜚英江湖漫仕郎潛衰矣虀百甕以自怡吏隠蕭然粟五秉而誰助假墻壁以葬其先母閲嵗年莫返其故居雲聳松楸難合延平之劒煙迷鄉國似隔蓬莱之山傾麥舟則盖有其人指米廩亦當繼其事古推任恤義濟厄窮觀百金為夀之辭誠為過舉輟一朝享客之費是在勝流凡我同盟知此非僣史朝甫鳩金疏衮繡舊坊痛家氈之羽化簮纓故物存遺址扵霜餘非假重修曷能永逺昔梁公有廟以香火而綿長魏氏故荘因畊稼以蕪翳肯堂之志敢替居室之資孰謀矧此地號寳奎湖通碧沚四世五公之故躅十洲三島之仙蹤道氣分紅塵之囂勝槩接紫清之邃王珣捨宅虎丘之跡彌芳賀老棄家鴻禧之傳益著願慿衆力允成勝因鞏子固鳩金疏顔淵希聖簞瓢之樂有餘揚雄好𤣥甔石之儲不足道之充者身愈泰心之廣者貧益安子固經厯游藝精深養神恬静因五行而知貴賤響若蓍龜閲千官而審盛衰眀如水鑑腰難折米口厭言錢監河之粟誰償吏部之金莫奪廣厦寒士之願古盖有之綈袍故人之情今斯可矣一時傾盖相與揮毫竒禪師住天童疏身隔片雲更上玲瓏髙處心如止水久眀清浄本源行蔵不假扵脩為去住靡容扵擬議僉言惟挽一笑承當伏惟天童怪石禪師潛雷在淵美玉韞石法筵擊拂大辯若訥以難窮丈室閉門掩息如灰而莫測澹兮守僧伽之鐡鉢寂然䕶摩尼之寳珠不滯一方難違衆論雲無心而出岫允稱招提水有時而回川佇㸔興復祝聖主夀作天人師冲禪師住補陀疏平湖春藹久居水月之上方絶岸雲深要識海潮之瑞相雖神化無形而應感在世縁即境以示真選衆維公當仁無忝伏惟補陀大虚禪師澄源心鏡懸河辯鋒蔵室眼空一滴果投扵巨壑石盤手透正宗允紹扵東巖對逹官不下繩床示諸徒靡煩禪板睠惟寳刹上徹紫宸香幣絡繹扵道塗車馬駢闐扵島嶼發乎邇見乎逺變現莫窮左畫圓右畫方應酬非易敢煩主宰庸闡招提小白花香證西天之梵語空青水影印南海之圓光顯大士功祝聖人夀夀國堂師住廣恩疏法王寳刹殫億刼以莫窮盛徳佳城考五傳而必復維樞庭奉先而結構實木菴受畫以拮据子為孫孫為𤣥初無間隔公慙卿卿慙長卒致荒蕪羣議交譏諸方竊笑伏惟某人溥洞下之㫖益宻為山中之行最尊化鶴還家飛錫歸里翠浮松栢儼竒觀之舊模金透簷楹増清暉之秀色祝彤庭夀廣緑野恩南湖十六觀重脩疏想逐心生由思為而攝以觀行隨誠立積空假以歸扵中推西方清浄之樂邦解羣生昏垢之苦海法智尊者開講席扵是山介然比丘肇化境扵此地十六觀室烱銀樹之光眀八千由旬儼紫臺之芬郁坐無虚位儀具清規巍峩髣三里之現前拱衛恍諸天之如在若兹妙所允勝他方壊空乃算數之循環變幻成刧灰扵瞬息睠維名郡素號相鄉信士孔彰法身不昧陳諫議以筆墨為之翊賛史中令傾金帛盡其荘嚴古與今同事由衆舉掄楩楠扵澗谷采丹雘扵陶鈞蓮花湧七寳之池貝葉集諸香之案雲興膚寸徧龍澤而有年毛積毫釐成狐裘之無價以斯功徳作是因縁庸報皇恩咸増佛果永禪師還定水疏百年得意大槐宫真成一瞬千載還家華表鶴今喜重来山林以之鎮浮松栢為之改色去留何礙出䖏無心東州老禪骨格老蒼宗𤣥真浄沙盆之破已補佛法無多寒厓之倚如春機心盡掃厭聴蕉忩之㸃雨竟歸茅屋以㸔雲塜間之約遽忘菴外之事漸識微我弗顧盍歸乎来一宿閣中寜許當年之掉臂三生石上㑹須今日之㸃頭水已歸東車容虚左儀師住天台飛瀑寺疏如来四十二章已成經論天台萬八千丈難與度量爰開祖庭以揚教觀天台飛瀑寺儀公講師心懸水鏡辯雨天花跨逺道以獨逰觸緇塵而無染方且寄吟咏扵畦町之外追談笑扵江湖之間恵勤来京師歐公嘗進而與之語文暢游河朔栁子亦序以壮其行二美適同羣言允惬挽之不可去矣奚求飛雪懸厓捨枯薪而煮茗清風夾徑對眀月以倚松逈絶見知益増定慧真禪師住定水疏古人冡間樹下是大道塲彼䖏山色湖光乃真長物雖三宿恐成知見然一擊終有本原飛錫肯来虚車以待真公長老松源嫡嗣竹閣儒流大庾嶺擲衣了無諍語雙峰山舉拂允謂報恩卧白雲以送千帆之飛􅆽清泉以展一鉢之供為仁由已斯道覺民今年貧勝舊年幸尚有卓錐之地東澗水流西澗儼相望埋玉之阡夀祝三宫道叅七佛寳林塔重建疏如来以不二心作浮屠相至人以無縫手成窣堵縁睠兹寳林名冠東越平地湧起實許𤣥度之勝因兹山飛来有徐㑹稽之妙句徐浩詩兹山昔飛来今有墨本留寺中雖佛燈之相續奈刧灰之屢更萬里有行七層儼在中殿記靈山之㑹已為天下之先康衢歌擊壤之謡共效封人之祝雖云具足要在合尖願力精専等童子聚沙之戲神通溥博謝育王使鬼之能舉筆生風成功不日東嶽興造疏三宫空洞之中上通寥廓四海幅員之廣實有主維古稱岱宗仁並木帝伸為神屈為鬼端假去来生者飬死者蔵必資旋轉三十餘里之太嶽七十二司之真官爰謹鳩工用嚴象設居士垂鶴髪而成滕果詎止一年懐州號龍興而闡珍符永祈萬嵗丹青之費雖廣黒白之業可消煩孔方兄之㸃頭須楮先生之落筆五榖熟而人民育造化功深三階平而隂陽和生成道廣西隠道院重脩疏賀祕監千秋之觀門有水雲王大夫安化之廬居多竹樹爰宅清浄以成勝殊然而絳闕蘂宫乃梵靈之所幻桂棟蘭橑兹地産之所為若風落山木葉盡脱如舟在水波濤相凌故卦氣示還返之方而丹經著補服之妙兹惟人事必假衆修告扵棟梁視我墻屋華表驚其如故鬱蘿儼以常新伻来以圖還十二樓之森著神降之福祝三千嵗以遨嬉脩桐栢觀疏福地七十二所之最允屬金庭台山萬八千丈之髙實通丹闕維王子乗雲而税駕至僊翁禮斗以建壇谷神闡靈山君集異瀑水千尋而横練松花五葉以垂珠興公之賦曲盡其瑰竒擇木之碑悉書其逺始睠兹寳殿迺開元皇帝之經營攷彼漆書肇司馬山人之展布嵗月屢經扵代謝風霜曷任其枝梧羽人停鶴以興嗟客子控􅆖而問故巍峩道祖必資蠖濩以導迎縹緲虚皇宜假靚淵而崇奉計匠詎渉旬之可集商財非積萬以莫能瓊臺何昔日之易成玉局盖一時之神化匪資柱石曷濟津梁鼴鼠飲河願早貸清溪之水精衛填海當有憐白首之心烟霞改觀以翺翔草木懐新而鼓舞祝崇萬夀道賛重元清容居士集卷四十欽定四庫全書清容居士集卷四十一元袁桷撰議状附進郊祀十議状桷近奉勑牒受桷前件官拜命以来實竊戰汗自惟庸駑俚儒濵海蟄處平時所習不過以雕蟲篆刻粉飾其固陋誠不自意俾獲擢用捫心顧影愈積愧靦思欲上報朝廷之萬一退揆素志願以上陳竊伏思念國家車書混同之後聲文昭眀典章純備議禮考文實惟聖眀之大本觀㑹通以行典禮今維其時然因循有待㡬三十年得非睹厯代儀文之繁縟費用之浩博故由是而未舉也桷嘗質五經之本文較羣説之同異自漢而下良由鄭𤣥註釋殽雜遂不得其當若郊壇神位之侈靡牲牢尊罍之加多又皆出扵東西兩漢之舊増益愈繁而古禮愈失有司益憚其費而不敢議若嵗必親祀之説下至唐宋承平大盛猶不能一嵗一祀則厯代所行足以知非五經之正禮矣昔孫叔通奉漢髙㫖意成野外之儀獨魯兩生不至方是時承秦絶學使魯兩生號為知禮其補亡正誤當不至如叔孫通綿蕝而已故儒先惜兩生之不来而復議兩生之迂介金馬碧雞之頌茂陵封禪之書桷雖愚賤度不敢為獨懐區區之説以陳者實以郊祀為國之大事不應闊畧而未議方今翰林為清切之職典章文物悉自此成而衆賢肅和討論潤色不憂其不至謹獻所為郊祀十議以補缺佚偹皇朝之禮眀郊祀之本其亦有在若夫登降燔燎之儀禮文豐殺之異非十議所盡當别具以獻知其綱則其目可知矣将仕佐郎翰林國史院檢閲官袁桷状郊祀十議序五帝不相沿樂三王不相襲禮所由来尚矣損益之道其㫖同焉嬴政絶滅三代典禮臆為之制禮經廢缺殘灰斷壁收合扵西漢之世名為宗周而祠祭廣衍皆祖秦舊逮王莽尊信周官後漢二鄭申釋名義違異扵五經者旁傅曲㑹皆得以合自漢而降言禮者悉本扵此愚嘗紬繹經傳尊聞審問繄儒先是證郊社大典秦漢而下莫有疑議惟合祭同異其詳可得聞矣若郊非圜丘帝非天帝沿襲舊説卒無與正夫天無二日是天尤不得有二也五帝非人也然不得謂之天作昊天五帝議祭天嵗或為九或為二或以變禮者為正作祭天名數議圜丘不見扵五經郊不見扵周官作圜丘非郊議后土社也先儒言之而復疑焉作后土即社議三嵗一郊非古也作祭天無間嵗議燔柴古經之可見者也周官以禋祀為天其義各㫖作燔柴泰壇議祭天之牛角繭栗用牲于郊牛二合配而言之也禮成于周公未之有改増羣祀而合祠焉非周之制矣作郊不當立從祀議郊質而尊之義也眀堂文而親之義也作郊眀堂禮儀異制議郊用辛魯禮也卜不得常為辛猶至日之不常為辛作郊非辛日議北郊不見扵三禮尊地而遵北郊鄭𤣥之説也作北郊議多聞闕疑先聖有訓私不自量揆妄為之説實有恧焉鴻藻碩儒洽通上下其必有以折𠂻而深證之大徳五年春三月具官袁桷序昊天五帝議言昊天者有三説鄭𤣥六天之妄攻之者衆矣王肅謂祭天有二冬郊圜丘春祈農事若眀堂迎氣皆祭人帝厯唐而下則謂郊祀配天者為昊天眀堂配上帝者為五帝甚者因其説之不通併孝經后稷配天本文而非之其説紛雜良由天與帝之號不眀故耳夫在郊者謂之天在眀堂者謂之帝河南程氏曰萬物本乎天人本乎祖故冬至祭天而以祖配之以冬至者氣之始也萬物成形于帝人成形扵父故季秋饗帝而以父配之以季秋者物成之時也胡宏氏曰天言其氣帝言其性其説是矣故由其在郊則以其逺祖配尊而無文之義也由其在眀堂則以其父配尊而親之之義也鄭氏六天本扵讖緯攻之者雖力而卒莫敢廢漢魏以来名號不一漢初曰上帝曰太一元始曰皇天上帝魏初元間則曰皇皇天帝梁則曰天皇大帝至唐始曰昊天上帝從長孫無忌之議而廢六天之謬後復尊鄭而不敢廢者盖鄭氏謂星經之天皇即周官之昊天上以合夫周官而下復合夫従祀扵是郊之所主為昊天而其壇之二等復有天皇焉此存鄭之説至扵唐宋而不敢廢者以此也王肅言眀堂為人帝者固非而攻王者未嘗不泥扵五帝至以眀堂之祀五帝其来已久或者又謂禋祀五帝為祭天以此病肅然卒無以歸扵一當之論愚嘗獨謂五帝非人帝其所謂人帝者五帝之配耳且五帝非天也新安朱氏之定五帝有取夫家語五帝之説天有五行木火土金水分時化育以成萬物其神謂之五帝而不敢加天以混之唐永昌之勑亦曰天無二稱帝是通名承前諸儒互生同異乃五方之帝亦謂為天自今郊祀惟昊天上帝稱天餘五帝皆稱帝證以二説則六天之説不攻而自破五帝之誤可證而不誣矣獨黄榦泥夫鄭學謂饗帝于郊而風雨節寒暑時非人帝所能為殊不知五人帝者若太皡是也五人神者若勾芒是也今以五行之官名佐成上帝而稱五帝何憂不能寒暑節風雨時獨不可稱天帝以混夫昊天上帝之號耳陳祥道言五帝無預乎昊天上帝其説良是而下文言上帝則五帝兼存焉此亦泥夫鄭説又謂眀堂之上帝兼昊天與五帝而一之其説又不通獨三山林岊言古之祭上帝與祭五帝之禮以經推之禮莫盛扵周周之祭上帝亦曰祀天郊祀之天眀堂之上帝即一也郊祀従簡為報本反始以稷配眀堂従備為大饗報成以文王配稷王業所始文王王業所成從其類也祭扵郊曰天扵眀堂曰上帝天言兆朕帝言主宰也周官先言祀上帝次言祀五帝亦如之謂大臣之賛相有司備具至其圭幣則五帝各有方色未嘗與上帝混同也愚嘗妄謂周官無眀堂郊天之文先儒必欲合扵五經其説愈不可解天官太宰祀五帝則掌誓戒後云祀大神示亦如之鄭謂大神示即天地也是重五帝扵大神示也五帝之説盛扵吕不韋之月令先儒嘗言周官為戰國時書故周官之言五帝多扵祀天而其禮之大者未嘗不與祀天並玉樂雖重扵上帝而充人掌牲牷止扵五帝小司寇之實鑊水納亨士師之沃尸及王盥皆止扵五帝詩書所載未嘗有五帝之號尊上帝而黜五天帝要不為無據也祭天名數議天嵗有九祭鄭𤣥之説也何以謂之九祭祀昊天扵圜丘五天帝扵四郊復立郊祀眀堂而為二龍見而雩帝扵南郊此九祭也王肅之祭有二謂天惟有一嵗有二祭南郊之祭為圜丘以冬祭其祈農事也以春祭謂之二祭梁崔靈恩宗鄭而黜王不過謂郊丘不可為一而五帝之祀同為天帝眀堂之不可廢猶大雩之不可廢也自唐以後非六天者皆是而九祭之名微與鄭異者則謂春祈穀夏大雩秋眀堂冬圜丘兆五帝扵四郊為九祭厯代尊黜異同不過出扵三者之説愚獨以為其説皆無足取證鄭氏之五天帝不得為天前已辨之詳矣以圜丘南郊為二者分帝為太微為天皇而非昊天之本名也王肅之祈農事先儒之言大雩愚請得而論之按月令元日祈穀扵上帝噫嘻之小序春夏祈穀扵上帝祈穀之祭非郊與眀堂之比也善乎盧陵胡氏之論曰鄭謂此即郊按郊特牲云郊之用辛此云元日善日則不必辛郊特牲又云郊迎長日之至註引易説謂春分日漸長則此未春分也易説三王之郊一用夏正孟獻子云啓蟄而郊則此未啓蟄也獻子又云郊祀后稷以祈農事此不祀后稷而祀帝也足眀此但祈穀非郊天大祭詩云春夏祈穀豈謂郊乎先儒亦言祈者以民食之重有求扵天不得與南郊眀堂並而大雩之祭尤不宜與二大祭同議按春秋之書雩旱祭也司巫女巫之舞雩皆不得已吁嗟乎而求之義其甚者則歌哭而請禮之變也爾雅曰雩號祭也春秋書雩之例三傳雖有異同大較紀其旱烖之極若昭公之季年一月而兩書焉足以見夫旱之極矣謂夫子紀魯之僣者非也魯之雩壇舞詠而歸者非歟又按鄭注周雩壇在南郊之旁則非郊天之壇眀矣詩之小序自歐陽氏蘇氏朱氏疑而去之者已久詳小序之箋則先已有疑扵本文故其箋曰月令孟春祈榖扵上帝夏則龍見而雩是與夫是與者疑之之辭也春猶得以祈榖言夏不得以祈穀言矣孔疏知是與為若不審之辭復引仲夏大雩以祈穀實為證是徇小序之失不若毛氏之置疑也祀天之禮有常有變有因事之祭若國故之旅于上帝師行之類于上帝天地之大烖疾病水旱皆不得不禱于天孰謂雩旱而可為常祭者也今定以南郊為一眀堂為二此為一嵗之大祭若祈農事雖非變禮要為祭之次者吕令固有議之者矣獨祈農扵上帝誠不可廢而元日之祭不得與郊祭並故兩存而復議之圜丘非郊議圜丘之名獨見扵周官大司樂詩書春秋儀禮之所不載二戴禮先儒謂出扵漢儒今不復引以周官考之圜丘非祀天之地其本文曰凡樂圜鐘為宫黄鐘為角太簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至扵地上之圜丘奏之若樂六變則天神皆降可得而禮矣函鐘為宫太簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至扵澤中之方丘奏之若樂八變則地示皆出可得而禮矣鄭康成釋以為禘祭又謂天神為北辰地示為崑崙厯代相承皆謂祀天扵圜丘王肅之徒雖難鄭説能知禘之非祀天而謂郊即圜丘圜丘即郊其説牽雜而不能定愚按圜丘非郊也圜丘非祀天之所獨鄭康成言之既不䏻合扵詩書儀禮而扵周官復有所背以周官之本文言之止言扵地上圜丘奏之不聞其祀天扵圜丘也况大司樂前云奏黄鐘歌大吕舞雲門以祀天神奏太簇歌應鐘舞咸池以祭地示夫祀天神祭地示其樂與圜丘所奏實異則當以黄鐘大吕雲門為祀天不當用圜丘降神之所而遽言為祀天之所也其祭地也亦當以太簇應鐘咸池為祭地不當用方丘降神之所為祭地之所也鄭康成知其説之不通遂釋前天神為五帝日月星辰圜丘之天神為北辰後来紛紛沿襲其説而王肅六天之辨復泥扵祀天圜丘之説不䏻詳眀其本文而折其謬乃謂郊即圜丘圜丘即郊故崔靈恩孔頴逹咸宗鄭而黜王夫大司樂既無祀天圜丘之文而鄭氏天神復釋為二有不待辨而眀按釋圜丘者謂為自然之丘非人力所為其説與爾雅合雍鎬近郊宜或有此若後代國都扵平衍之地将人力而為之耶抑亦為壇以象之耶或曰圜丘祀天鄭康成必本扵前代愚曰詩書易春秋儀禮之所無者不必信鄭氏之説本扵秦始皇祠八神地主之圜丘又漢武帝作十九章之歌以正月上辛用事甘泉圜丘二者皆非祀天鄭氏隂取之而不敢眀證其事若謂南郊即圜丘北郊即方丘不知周官四郊非南北郊之郊詩書春秋之郊非圜丘之制不得合而為一謂祀天扵圜丘者特鄭氏之説初非周官大司樂之本文陳祥道禮書謂祭祀必扵自然之丘所以致敬燔瘞必扵人為之壇所以盡文亦宗鄭之説而微異崔靈恩義宗亦宗鄭黜王而所謂郊即圜丘圜丘即郊之誤乃不能正其説厯漢至宋諸儒悉不過以周官傅合扵詩書春秋滋以唘後来之誤故為之辨新安朱氏亦疑大司樂本文五峯胡氏非圜丘天神降地示出見文集后土即社議周官無祭地之文先儒言之詳矣而其言近扵地者有五曰地示大示土示后土社是也鄭氏之釋地示則曰北郊神州之神及社稷夫以北郊為祀地此祀之大者不得合社與稷而言合社與稷是為三祀非祭地眀矣曰大示鄭無眀釋或謂大示乃地示之大者祀地以北郊為大則地示之大者将何以祀之曰土示鄭謂原隰平地之神此又非祀地矣曰后土鄭氏則直謂后土黎所食者后土官名死為社而祭之又曰后土土神不言后土社也其答田瓊則曰此后土不得為社者聖人制禮豈得以世人之言著大典眀后土土神不得為社至扵太祝建邦國告后土鄭復曰后土社神獨此説違戾特甚唘厯代之訛謬實自此始按尚書曰告扵皇天后土孔注曰社也泰誓之宜扵冡土亦社也召誥之社扵新邑者亦后土也甫田之以社以方注社后土也后土與社皆地之稱今悉疏經文之可證者而言之泰誓曰郊社不修禮曰祭帝扵郊所以定天位也祀社扵國所以列地利也又曰郊所以眀天道社所以神地道又曰郊社所以事上帝又曰眀乎郊社之義又曰禮行扵郊而百神受職禮行扵社而百貨可極若然則社即后土后土即社鄭氏之釋大宗伯既以黎所食者為是而復有所疑而不决扵是答田瓊之問以后土不得為社四者之説更相背謬而方丘北郊復為二説終莫䏸定至胡宏氏始定郊社之義以為祭地扵社猶祀天扵郊也故泰誓曰郊社不修而問公祀扵新邑亦先用二牛扵郊後用太牢扵社記曰天子将出類乎上帝宜乎社而周禮以禋祀祀昊天上帝以血祭祭社稷别無地示之位四圭有邸舞雲門以祀天神兩圭有邸舞咸池以祭地示而别無祭社之説則以郊對社可知後世既立社又立北郊失之矣此説足以破千古之惑故新安朱氏中庸郊社亦以社為祭地取夫胡氏而獨以其廢北郊之説為未然愚按北郊不見扵經獨見扵鄭氏鄭氏之北郊非至日方丘之祭攻鄭氏神州之説者多而不䏻辨鄭氏北郊之不經攻合祭之説者力而不攻以地為郊之失亦始扵王氏郊以祀天社以祀地謂郊為祀地吾知其不出扵六經也春秋書魯之郊止扵郊天不聞其郊地也用牲幣于社間于兩社皆天子之制也謂魯為僭郊社則可以魯郊為祀地則不可雲漢之詩曰祈年孔夙方社不莫又曰自郊徂宫宫社宫也告天地之禮郊宫為二則詩之郊亦非祀地也朱氏亦曰周官止言祀昊天不言祀后土先儒之言祭社者為是其言周官禮大神祭大示皆無眀文是深有疑扵周官之非全書也或謂社不足以盡地此盖因諸侯大夫皆得立社遂因此以致疑按大宗伯王大封則先告后土又曰建邦國先告后土謂之后土者建國之始稱若武成之告于后土者是也左祖右社親地之道也此言社之名成扵告后土之後也先儒謂尊無二上故事天眀獨行扵天子而無二事地察故下逹扵庶人而且有公私焉胡宏氏曰諸侯之不敢祭天猶支庶之不敢繼祖也諸侯之得祭地猶支庶之各母其母也其説為是且社有等差至扵州黨族閭愈降愈少獨天子之社為羣姓而立王社之説孔疏謂書傳無文其説莫攷陳祥道釋社后土之辨終泥扵鄭氏至謂建邦國先后土為非社曽不知社之未立其不謂之后土其可乎祭天無間嵗議古者天必嵗祭三嵗而郊非古制也然則曷為三嵗而郊也三嵗之禮始扵漢武其祀天也不扵泰壇而扵甘泉壇有八觚席有六采文章采鏤之飾玉女樂石之異鸞輅騂駒之靡瑄玉寳鼎之華其禮也侈其用民也勞如之何其勿三年也至扵後世不原其本而議其末三年之祭猶不䏻舉其䏻力行者若唐之太宗享國長久亦不過三四至宋仁宗以後始克遵三年之制夫三年一祭己不得為古則一二舉者尤非禮也蘇氏曰秦漢以来天子儀物日以滋多有加無損以至扵今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得廕補親屬非周禮也自宰相宗室已下至百官皆有賜賚非周禮也先儒又曰古之郊禮以事天也以報本反始以教民尊上也天子前期齋戒命冡宰誓百官而蒞事焉事之莫尊者也近世則變矣三年而一郊其所事者則軍旅億醜之賞賚耳事軍旅億醜之賞賚則誠不専扵享帝制不一扵報本夫郊以報一嵗生物之功也夫豈三嵗一生物而三嵗一報耶古者大路素而越席大圭不琢大裘不飾牲用繭栗器用陶匏謂徳産精微物所以稱故其文至簡而其誠至慤近世盛鸞輅冕服珠玉金繒之飾惟懼不華内闕觀宫一夕之具惟恐不工其文至繁而其費至廣豈所以降格天神之意邪如是則郊天之禮自漢而下皆非古制禮樂百年而後興誠䏻如三代之禮其繭栗陶匏費不為甚廣罷壇陛從祀之位止以始祖為配則千百年之廢禮墜樂由是而舉豈不甚盛其或不與祭則如大宗伯所謂若王不與祭祀則攝位鄭氏之釋量人亦曰冡宰佐王祭亦容攝祭庶㡬破千古之陋上以合扵天道而下足以解諸儒之疑議云燔柴泰壇議儀禮覲禮曰祭天燔柴祭山丘陵升祭川沈祭地瘞祭法亦曰燔柴扵泰壇祭天也瘞埋扵泰折祭地也爾雅曰祭天曰燔柴祭地曰瘞薶祭法爾雅雖各自為書而其説與儀禮合者獨燔柴無異周官曰以禋祀祀昊天上帝實柴祀日月星辰槱燎祀司中司命飌師雨師夫周官之柴歸扵日月星辰而以禋祀為祀天是不與儀禮合也禮器曰至敬不壇掃地而祭不壇非燔柴也掃地而祭非周官之祀也合儀禮周官禮器三書而言之實有不同自鄭氏必欲合三禮之説為一而後人附㑹者曲為之遷就崔靈恩則謂先燔柴及牲玉扵丘訖次乃掃地而祭祭天之法皆扵地上以下為貴故不祭扵人功之壇陸佃則曰祭天之禮升煙扵泰壇奏樂扵圜丘所以致天神也天神皆降可得而禮然後掃地而祭樂者陽也其聲無形故奏扵自然之圜丘煙者陽中之隂其氣有象故燔扵使然之泰壇至扵禋祀實柴有異扵儀禮鄭氏則云禋煙也三祀皆積柴實牲體扵日月言實柴扵昊天言禋三祀互相備矣其釋覲禮則曰燔柴祭天祭日也祭天為祭日則祭地瘞者祭月也日月而云天地靈之也敢各疏其穿鑿以從古禮經之正周官之不與儀禮易詩書春秋合者不止扵祀天地今止因三禮之異同諸儒之附㑹而言其非是夫周官之圜丘乃奏樂之所非壇也自漢而下皆祀扵圜丘己失周官之意崔氏謂圜丘即壇為人功之壇按釋圜丘者為自然之丘非人功之壇崔説與釋圜丘者異矣使果從壇下掃地而祭則燔柴扵人功之壇不可謂質而獨掃地之祭得謂之質矣若然則儀禮之燔柴為末而掃地之祭為本厯攷梁陳以来不聞有祭扵圜丘之下者是崔氏之説不得以行也陸氏謂自然者為丘使然者為泰壇是祀天之壇有二愚嘗謂合扵周官則泰壇之制未嘗有合扵儀禮則燔柴之制無圜丘厯代之失祀扵圜丘非是陸氏獨不䏻證其誤是為二壇者亦非也鄭氏謂禋煙也詩生民之禋祀書之禋扵六宗禋扵文武釋者謂禋敬也又曰精意以享之謂也使從鄭説以禋為煙則六宗之祀不得與上帝並而祀文武扵宗廟又難與燔柴之祭同也鄭氏之釋燔柴以祭天為祭日祭地為祭月其説尤妄是殆尊周官之書其不可合者遂臆説以非古禮如夏正郊天迎長日之至圜丘南郊二天帝之説類皆若是古禮經獨覲禮為天子禮捨燔柴為祭天則此書又如王安石之罷黜不䏻以用于世戴記之合扵經傳者先儒類皆取之若王制禮器儒行眀堂位等篇固有疑之者矣獨燔柴泰壇為祭天與古禮合特取其説泰壇雖不見扵儀禮然從古傳襲未嘗不以壇壝為正覲禮之壇十有二尋周公之三壇同墠司儀之為壇三成去祧為壇下至周末齊侯為柯之盟有壇先君適四國未嘗不為壇况祀天欽崇之實其可廢壇壝哉郊不當立從祀議郊有從祀西漢未之見也禮之失始扵建武建武采元始之制而為之元始王莽之政也王莽之失在分牢在同祭不聞其從祀也杜佑尊時王之禮而深知其非謂從祀之坐近古皆有梁陳及扵國朝始相沿􅊞夫謂之近古者非古眀矣開元之禮成扵徐堅之徒而開寳所作祖扵開元大較從祀損益咸取扵建武今因開元所定而論著其非是其第一壇曰五帝曰大眀夜眀以周官言之五帝之祀在四郊大眀夜眀以實柴而朝日夕月之制復見扵經傳此不得混而一之之證也壇之第二與第三皆以星經為之制杜佑謂天有萬一千五百二十星地亦如之考其所祭知其壇壝之不足以容也遂為外官内官以别而節其數開寳以後又復増五嶽四瀆飌師雨師之類而併祭之其壇愈廣其牲牢愈繁而其禮愈失考扵周官則大宗伯之實柴槱燎此又不得混而為一之證也今考扵虞書其類上帝之後則行六宗山川羣神之祀不聞其合祭也湯之𤣥牡武成之柴望皆若此矣召誥用牲扵郊牛二者后稷配天之始也若魯之三望雖為非禮亦皆無總祀之理自漢而下牲犢尊罍之數不勝其煩其郊禮之費竭九州之貢賦不足以供由是雖三年之祭亦不能舉壇壝繁雜宫縣四立有司臨事登降偪仄懼不䏻以周旋跛倚顛仆無所不至昔之儒先能議合祭天地之非而不䏻正合祭羣祀之失䏻以親郊為是而不能以三年一郊為非䏻知牛羊供給之費廣而不能盡角繭栗之誠慤甚者配帝之争不决遂有二配帝扵壇上依違莫從一至扵是今若悉如三代典禮不傷財不害民一嵗一郊則何憚其不可行也按晉泰始明堂罷六天止設昊天上帝坐唐顯慶亦止祀昊天扵眀堂宋元豐眀堂亦罷從祀獨郊天從祀循􅊞舊誤眀堂與郊天禮儀異制議晉摯虞議曰郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖眀堂之祭備物以薦三牲並陳􅇼豆成列禮同人理故配以近考新安朱氏曰為壇而祭故謂之天祭扵屋而以神示祭故謂之帝晉傅𤣥亦云扵郊尚質扵眀堂尚文若然則儀文悉皆有異矣郊以特牲眀堂以牛羊詩曰我将我享維羊維牛此牲之異者也燔柴以報陽也猶宗廟之祼鬯也眀堂與宗廟近則燔柴乎何有沈約宋志謂郊有燔柴眀堂無禋燎郊以逺人而尊堂以近人而親不必盡同此説是席用藁鞂器用陶匏象天之質也玉爵代匏尊罍簋俎之属一以宗廟此元豐議禮之得也郊之祭用氣也進孰之失始扵唐自唐以降未之有改也記曰郊血大饗腥三獻爓一獻孰解者曰郊祭天也大饗袷祭也三獻社稷五祀也一獻羣小祀也郊不以血而以孰薦禮之䙝而失之甚者也然則眀堂之祭其不進孰與曰聖人亨以享上帝上帝眀堂之稱也用扵眀堂而不用扵郊其義眀矣特牲少牢之始扵薦孰大夫之禮也用大夫之禮扵郊不可也用扵眀堂近宗廟也配羣祀扵郊非禮矣眀堂國中也邑外曰郊引而近之其瀆莫大焉尊罍尚質也彞以盛鬱鬯郊得以用之也記曰黄目鬱氣之上尊彞得謂之尊也孔疏六彛上經八尊無鬱鬯以言宗廟有鬱鬯其實天地亦有秬鬯之彞用疏布宗廟亦有八尊用畫布互舉以眀義定尊罍扵天地六彞扵宗廟鄭氏之説也開元遵而不用扵郊猶曰以質不以文眀堂宗廟之近而文物之極也其不用也則野矣凡此皆禮儀文質之異不可以不辨也郊非辛日議郊特牲曰郊之祭也迎長日之至也又曰郊之用辛也周之始郊日以至鄭𤣥謂迎長日者建卯而晝夜分也三王之郊一用夏正其釋周之始郊日以至則謂魯之始郊日以至魯無冬至祭天圜丘之事是以建子之月郊天示先有事也夫以迎長日為建卯胡氏非之至矣三王之郊以寅則冬至圜丘之祭是周以冬為春矣正月正嵗猶曰以子為首若以冬為春則非矣盖郊之用辛言魯禮也周之始郊日以至言周以冬至而郊也易周為魯以附夫臆鑿之論則大有所不可周為周王魯為魯公合周魯為一禮曷不曰魯之始郊日以至葉夢得氏曰以郊為迎長日之至下言郊之用辛周之始郊日以至正以别魯禮鄭氏反之强以建卯為日至甚矣其好誣也冬至祭天此周之正禮不可易者孟春建寅之郊盖祈榖之祭魯雖得郊不得同扵天子是以因周郊之日以上辛三卜不從至建寅之月而止魯郊殆周祈榖之郊故左氏謂唘蟄而郊也或曰郊必以辛周之制與曰以至日而祭則至日非常以辛也魯之郊雩皆辛是用辛魯之禮也然則周郊非辛與曰周官祀大神則卜日崔靈恩謂卜日以至為主不吉始用他日是有疑扵卜也横渠張氏謂日至不必卜日周之始郊日以至言日至則不容卜言月至則有卜卜日則失氣至之時矣是定以為不卜日也曲禮曰大饗不問卜吕大臨謂天時隂陽之至日月素定故不問卜若他饗則問卜矣或又曰周之不用辛有所本與召誥曰越三日丁巳用牲扵郊非辛也至翼日而社非卜也五經異義春秋公羊説禮郊及日皆不卜常以正月上丁成王命魯使卜從乃郊故魯以上辛郊不敢與天子同也是足以眀周郊之非辛矣厯代之月時不一獨唐武徳以冬至祀天孟春辛日祈糓扵南郊䏻􅂑二說而裁正之號為近古故特表而出之北郊議北郊之名不見扵五經謂北郊見扵周官鄭𤣥之論也周官無北郊之本文因鄭𤣥䜟緯之説而與周官並行者王莽劉歆實為之始也先儒能攻王莽南北合祭之議而不知立北郊之説者始扵匡衡成扵王莽捨其大而議其細相承謬誤今千七百餘年矣敢推其本始而詳言之夫周官圜丘方丘為奏樂之地非祭之所圜丘之辨詳矣鄭氏祭地之法有二夏至之日祭崑崘之神扵澤中之方丘一也正月祭神州地示扵北郊二也是方丘北郊為二今合而言之不知其何所始也按大宗伯之本文鄭氏之不䏻釋者有二曰以血祭以貍沈以疈辜則曰不言祭地此皆地示祭地可知以黄琮禮地則曰禮地以夏至謂神在崑崙者至扵大司樂之地示則又曰祭扵北郊鄭氏既以方丘北郊為二而後人之尊鄭者未嘗不以方丘北郊合而為一神州䜟緯非之者至矣至若方丘之不為祭所北郊之無所經見皆泥其説而無有辨之者或曰北郊始扵匡衡非王莽自為之説謹按漢志髙帝因北畤而備五帝至武帝時后土猶未立建始之際方正南北郊匡衡張譚以天隨王者所居援據禮經皆自為損益若所引祭地扵泰折在北郊就隂位之説今戴記無北郊之文陳祥道禮書知其説之無所據遂謂南郊祀天則北郊祭地祀天就陽位則祭地就隂位以强合夫鄭氏北郊之説夫郊非天不足以言社非地不足以盡二者相對如天地之不可以合祭也謂之郊地其何所據哉先儒䏻眀祭之不可以合而不䏻辨社之不可以為郊沿􅊞建始之弊自漢而降無有知其非者祀地之為社詳見扵后土之議尊地之説莫先扵罷方丘廢北郊以全古禮之正或者謂𤣥璜禮北方孟冬迎氣北郊古不得而廢愚謂鄭氏之言人帝五精帝扵地無預王肅之攻鄭𤣥其説雖行扵泰始惜其説猶以郊丘為一故宗鄭者多而王説復廢馴致今日郊社盛禮方由是損益以承三代之正罷北郊之謬其不在兹乎國學議成周國學之制略扵大司樂其遺禮可法者見扵文王世子三代而上詳莫得而聞焉漢武表章六經興太學至後漢為尤盛唐制微附益之而其制愈加詳宻今可考也宋朝承唐之舊而國學之制日隳至扵紹興國學愈廢雖名三學而國學非真國子矣當時布衣從公卿牒補入國學而真國子入學者十無一二夫所謂三舍法者崇寜宣和之弊也至秦檜而復増之月書季攷又甚夫唐眀經帖括之弊唐楊綰嘗曰進士誦當代之文而不通經史眀經但記帖括投牒自舉非側席待賢之意宋之末造類不出此今科舉既廢而國朝國學定制深有典樂教胄子之古意儻得如唐制五經各立博士俾之専治一經互為問難以盡其義至扵當世之要務則略如宋胡瑗立湖學之法如禮樂刑政兵農漕運河渠等事亦朝夕講習庶足以見􅀴濟之實往者朱熹議貢舉法亦欲以􅀴説㑹萃如詩則鄭氏歐陽氏王氏吕氏書則孔氏蘇氏吳氏葉氏之類先儒用心實欲見之行事自宋末年尊朱熹之學脣腐舌弊止扵四書之註故凡刑獄簿書金榖户口靡宻出入皆以為俗吏而争鄙棄清談危坐卒至國亡而莫可救近者江南學校教法止扵四書髫齓諸生相師成風字義精熟蔑有遺忘一有詰難則茫然不䏻以對又近扵宋世之末尚甚者知其學之不䏻通也扵是大言以盖之議禮止扵誠敬言樂止扵中和其不渉史者謂自漢而下皆覇道其不䏻詞章也謂之玩物喪志又以昔之大臣見扵行事者皆本扵節用而愛人之一語功業之成何所不可殊不知通逹之深者必悉天下之利害灌膏養根非終扵六經之格言不可也又古者教法春夏學干戈秋冬學羽籥若射御書數皆得謂之學非若今所謂四書而止儒者博而寡要故世嘗以儒詬誚由國學而化成扵天下将見儒者之用不可勝盡儒何䏻以病扵世作國學議修遼金宋史搜訪遺書條列事状猥以非才備員史館㡬二十年近復進直翰林仍兼史職茍度嵗月實為罔功伏覩先朝聖訓屢命史臣纂修遼金宋史因循未就推原前代亡國之史皆係一統之後史官所成若齊梁陳隋周五代正史李延夀南北史房𤣥齡等晉書或稱御撰或著史臣此皆唐太宗右文稽古數百年分裂事志悉得全備至宋倣依唐世爰設官局以成唐書是則先朝屢命有合太宗文明之盛卑職生長南方遼金舊事鮮所知聞中原諸老家有其書必䏻搜羅㑹萃以成信史竊伏自念先髙叔祖少傅正獻公燮當嘉定間以禮部侍郎秘書監専修宋史具有成書曽祖太師樞宻越公韶為秘書著作郎遷秘書丞同預史事曽叔祖少傅正肅公甫吏部尚書商俱以尚書修撰實録譾薄弱息獲際聖朝以繼先躅宋世九朝雖有正史一時避忌今己易代所宜改正昔司馬遷班固皆以父子相傳遂䏻成書劉知㡬劉餗劉賛咸以家世舊聞撰成史通史例輙不自揆庸用條析兼本院宋朝名臣文集及雜書紀載悉皆遺缺亦當著具書目以備采擇者一宋太祖實録舊有兩本一是李昉諸臣所為太宗屢曽宣索已有避忌至真宗咸平再脩王禹偁直書其事出為黄州禹偁所著建隆事足見深意前實録無太宗叩馬一段後録増入顯是迎合一杜太后金縢之事趙普因退居洛陽太宗嫉之後以此事宻奏大宗大喜秦王廷美吳王徳昭齊王徳芳皆繇普以死今宋史普列傳無一語及之李燾作通鑑長編亦不敢載私家作普别傳始言普将死見廷美坐扵牀側與普忿争其集號巽巖集所宜搜訪一天聖三朝正史紀載多有謬誤盖修史官夏竦所為吕夷簡受成而已其列傳遂以冦準丁謂同傳所宜改正若此非一一洪邁作神哲徽欽四朝史扵時髙宗在徳夀宫多所避忌立傳亦有蕪類所宜刋削當直書徽宗亡國之罪一徽宗違盟契丹童貫復燕城正史回避所合改正一徽欽圍城受辱北行􅇜幽正史不載所有雜書野史可備編纂今具扵後三朝北盟㑹編靖康傳信録孤臣泣血録靖康草史靖康奉使靖康遺録裔夷謀夏録陥燕記南歸録靖康録犯闕録偽楚録松漠紀聞偽齊録起戎録痛憤録建炎復辟記己酉航海記建炎扈從録中興遺史一元符至元祐事趙鼎雖扵紹興改正亦有隠諱今可考證増入者今具扵後邵氏辨誣元祐黨籍傳尊堯集丁未録符祐本末一宋世九朝莫詳長編而可資證援叅考復别有書今院中長編不備諸書並缺今具扵後續通鑑長編長編紀事本末國紀九朝通畧編年備要建隆編隆平集元符詔㫖治迹統類兩朝國史紀志東都事畧仁皇典訓國朝要㑹續㑹要一太史公作世表年表至秦楚之際復為月表致意極深晉代播遷魏宗勃起所宜為表以分年統時兵火湮厄南北二史無所憑依卒不䏻就至歐陽脩任史官之責獨䏻扵宰相方鎮年月譜系盖宰相之任匪輕推年可以考得失方鎮之害最重因年可以推盛衰宋朝興亡繇是可考目今舊書尚有而史院無存今具扵後百官公卿表宰輔拜罷表録百族譜麟臺舊事宰輔編年一禮樂厯代帝王不相沿􅊞自聶崇義作三禮圖多有舛誤樂自王朴李照胡瑗范鎮魏漢津房庶皆有異同史志所載止扵一時而諸家所陳罔有紀載其樂志止詳扵樂髓新經禮書若元豐集議未之有載其書尚在可備討論今具扵後開寳通禮開寳通禮義纂分門禮選禮閣新編太常新禮慶厯祀儀太常因革禮郊廟奉祀禮文致和五禮大饗眀堂禮鹵簿記本院止有宣和濮議東嚮議一兵刑徭役􅈇運度支隨俗施政莫敢偏廢趙元昊用兵保甲義勇保馬等制羣臣各有議論王安石以顧役行扵河北司馬温公以差役行扵東南各有不便王安石青苖貸息大壊極弊繇是馴致靖康之禍所宜博採奏議及食貨等書以備作志經濟集羣臣奏議三司攷㑹計録救荒録刑統一宋翰林視唐尤加清重有雜書可補志書者金坡遺事翰林雜記續翰林志一地志宋有成書太平寰宇記皇祐方域圖志皇祐地理新書元豐九域志一纂修史傳必當先以實録小傳附入九朝史傳仍附行状墓誌神道碑以備去取琬琰集諸家文集涑水紀聞邵氏聞見録春眀退朝録夢溪筆談龍川墓志歸田録續歸田録可談談叢師友雜志童蒙訓晁氏客語清豐懿範韓忠獻遺事忠獻家傳申國春秋歐公本末蘇魏公譚訓師友談記王鞏聞見録桐隂舊話王沂公筆録張乖厓言行録胡安定言行録王沂公别録舊聞證誤唐介事實范太史遺事鄒道鄉語録豐清敏遺事文昌雜録楊文公談苑麈史䏻改齋漫録石林燕語嘉祐雜志東齋紀事談圃澠水燕談避暑録王鞏雜録秀才閒居録却掃編揮麈録後録三録典故辨疑吕氏家塾廣記諸降王當别立傳三朝史所載簡畧宜用偽史叅照作世家倣歐陽脩五代史例十國紀年九國志吳越備史南唐書江南録南唐近事蜀檮杌閩王事迹江南野史一宋代疆理北不盡燕城南不盡交趾西不盡靈夏東不盡髙麗宜倣晉書載記各紀其事當訪尋四境關渉諸書髙麗圖經至道雲南録趙元昊西夏事實交趾記丙午録遼金誓書國書本末使遼録西夏事宜一李筠李重進本非叛臣實漢周之忠臣宋史作叛臣傳所宜改正韓通亦周忠臣歐陽脩作五代史不立韓瞠眼傳議者非之又如諸方僭竊皆宜立傳宋史悉諱今宜㑹萃立傳李順方臘王則甘陵代叛記趙諗有事實儂智髙有平蠻事蹟一歐陽修作唐書厯志悉取一行十議造厯之法見扵志書宋世五朝志應天厯乾元厯儀天厯崇天厯眀天厯亦號詳備獨熈寜奉元厯􅀴元祐觀天厯崇寜占天厯大觀紀元厯洪邁作志不䏻盡紀所宜訪求厯草見扵志中大抵厯不差不改得其造厯更改則後有攷民間通厯學者亦有其書所宜搜訪一神宗元豐以前官制似唐亦有増損元豐以後官階勲爵分為二途史志雖詳難便檢閲官制新典官制舊典官制通考一藝文志自元豐後該載未盡宜以今世所行書籍備載舊制進呈者入書目亦當以館閣書目為主分類補入自惟志學之嵗宋科舉已廢遂得専意宋史亦嘗分彚雜書文集及本傳語録以次分别不幸西城火灾舊書盡燬然而家世舊聞耳受目覩猶䏻記憶或者謂國亡史不宜脩南方鄙儒詎敢置論年齒衰邁分宜歸老田里曠官縻職實為罔功而區區素藴亦蘄别白以稱朝廷奨拔之厚凡所具遺書散在東南日就湮落或得搜訪或得給筆札傳録庶䏻成書以備一代之史謹呈翰林國史院謹状清容居士集卷四十一欽定四庫全書清容居士集卷四十二元袁桷撰䇿問問答附大都鄉試䇿問延祐四年先王之政莫先於養民洪範以食為先故昔之水旱歴年多而民不病者有以也周漢上計簿以周知民數三年則大比以登于王府制國用之法日計嵗㑹使之裕如者将以預其備也大無麥禾春秋非之則周知民數将悉民以備不虞歟其止為國用乎耿夀昌立常平皆以為便或以不便罷之其去取可得聞歟京師天下之本實粟重内理所當急唐貞觀轉運之法嵗不過三十萬石後雖増多然止給軍用至于貞元所入不過四十餘萬石而京邑未嘗有闕抑内地無閒土民不仰於官歟抑有司定制無泛冗歟聖天子惠養元元實粟内畿間遇不登漕運或不能足今天時雨澤上協聖心中外豐熟九年之蓄九榖之數可講而行也将取諸民而􅇱諸意其有煩擾也社倉之法唐首用之後復有科折之患焉斂散之法壊扵後人國服為息之辯非本㫖也蔵富於民貧者得以濟乎榖賤傷農因時而官收之積嵗朽腐何以處之上下給足因其豐穰而講行實在今日習進士業者通識時務宜陳説便利以俟講明焉㑹試䇿問至治元年夫書者即古之史孔子刪述自唐虞二典以訖于周之文侯之命附以費誓秦誓而三墳八索九丘諸書皆芟而不録至其約史記修春秋託始扵魯隠公元年實周平王之四十九年也褒善貶惡特書屢書至獲麟而絶筆前乎唐虞之所著豈不過於文侯之命等篇而去彼取此泝平王而上沿獲麟而下豈無可紀之事而絶不為書是皆有深意存焉司馬子長創為史記首軒轅以逮漢武或有孔子所芟者子長乃從而録之後人翕然以為有良史之才愛其雄深雅健凡操史筆者如班孟堅范蔚宗諸儒争相蹈􅊞是祖是式而未有取法於春秋者焉豈聖言宏逺匪常人所可擬其彷彿邪自荀悦倣左氏傳為漢紀體製稍為近古扵是袁宏孫盛之徒並為編年之書而學者或忽而不習終不若子長史記盛行于世司馬公編資治通鑑造端於周威烈王二十三年繫年叙事歴漢唐以終五代勒成一家之言淵乎博哉此近代所未有也其亦得聖人之意否乎我國家隆平百年功成治定禮樂方興纂述萬世之鴻規敷闡無窮之丕績吾儒之事也故樂與諸君子討論之諸君子游心載籍聞見滋廣其於書春秋之所始終史記通鑑之所以製作必詳究而明辯之矣願聞其説江浙鄉試䇿問泰定三年用賢之道治天下國家先務也人才之賢否本乎心術之邪正邪正者義利公私之辨君子小人之所由以分古之時宜無有黷貨而鬻獄者然伊訓曰其刑墨先儒謂貪以敗官之刑也吕刑論五過之疵亦曰惟貨又曰無或私家于獄之兩辭當時諄切告戒已如此漢去古未逺嘗舉孝亷矣乃或萬家之縣無應令者或闔郡不薦一人豈自昔㢘吏已難其選歟賈長沙之言曰有坐不亷而廢者曰簠簋不飭或謂此粗可厲亷隅之士而頑頓亡恥者不格也賢良若董仲舒公孫𢎞兒寛皆稱經術而公孫𢎞卒以布被脱粟之詐見譏當世則亷者又未可深信歟楊震辭暮夜之金劉寵却父老之餽世以為美談然震之刺荆州寵之守㑹稽皆治行卓著民咸徳之豈亷特守已之一節而惠澤之及民者不專在是歟方今聖明在上薦紳之士分布中外封贈足以遂顯揚禄廩足以供事育而十二章之典又嚴且宻也刑賞勸懲之道亦至矣然亷者守法奉公未必見知貪者嗜利營私不為少戢豈刑賞之外猶有當加意者歟官吏之貪亷其於政事之臧否民生之休戚所係至重也諸君有明當世之務者其悉意以對答髙舜元春秋七問問先儒謂春秋常事不書凡書者皆非常也非常者見其不正也又謂事之非常者誌于􅁽又謂有貶無褒邵子謂録實事而善惡形乎其中愚竊謂如桓公以管仲九合諸侯以奨王室孔子是之如許叔入于許又如葵丘之盟同盟于幽又如書有年書大有年公弟叔肹卒豈皆非不善歟若謂無褒舉録而罪之者愚所未曉邵子之説是歟非歟答春秋書法惟吾邵子知之録實事而善惡形乎其中者是也又曰五覇功過不相掩先褒其功後貶其罪夫是之謂褒貶其言得之獨所謂褒貶者是唘後世紛紛之疑也常事不書其説得之而謂非常者不正則非矣謂事之非常有貶而無褒亦非矣㑹稽袁桷曰無褒之義諸人皆知之無貶之義子何知之姑以隠桓之事言之桓之弑兄猶以公稱何取乎其貶也夫人姜氏人皆醜之㑹于禚夫子不削其夫人何言乎其貶此直書而見其非常也許叔入許褒貶皆無之也許絶十有五年而直書之何褒何貶焉是直書而見其非常也葵丘幽首止召陵之盟齊桓之尊王明矣謂之貶邪吾實不敢以子糾葵丘之説考之皆孔孟之言也貶何從而生與季子来歸愚不敢謂之貶也褒其可乎此皆書非常之例也有年大有年因桓宣之時而書之亦非褒貶此亦非常事也宣公之螽蝝饑見扵十五年螽見扵六年大旱見於七年自文公時不雨之書不一則其十六年之大有年誠宜書何褒貶焉是非常而書無疑矣叔肹兄弟之義明矣書之亦非常也問左傳載晉申生以僖四年十二月縊于新城而經書於五年之春晉里克以僖九年弑卓子而經書於十年正月晉以僖十年冬殺㔻鄭而經書於十一年春經傳不同劉原父謂傳與經不同者左氏作書雜取當時諸侯史䇿䇿有用夏正者有用周正者錯雜文舛往往而迷故經所云冬左謂之秋也此説然不答以日南至考之例差兩月劉氏之説得之矣温麥周禾又似夏正然杜氏悉取正月為十一月唘後人之議者皆杜氏也問晉殺其大夫里克衛殺其大夫寗喜愚竊謂晉衛殺其大夫似大夫無罪而晉衛殺之里克寗喜果無罪邪有罪邪答稱國以殺大夫罪累上也纂例之説得之矣劉氏言里克不聽優施之謀寗喜不從孫林父之亂陳乞不隨景公之貳晉無殺世子之禍衛無遂君之惡齊無立嬖孽之變以此言之里克寗喜之罪著矣或言晉衛二公皆惡其専偪而殺之理容有之然總殺大夫之例此特一節耳不如罪累上為正問文十二年子叔姬卒先儒謂春秋内夫人則書薨𦵏吾女為外夫人則書卒按禮云女子許嫁笄而字伯仲叔季皆字也已嫁之女各以國氏如紀伯姬宋伯姬之類是也今子叔姬笄而字之卒不繫扵國何也答叔季之卒以左氏考之似若可證然僖公之九年復書伯姬卒則是許嫁而有字當以成人之䘮待之也以曽子問考之婿為之服書其卒亦非常事也詳見經解問澶淵之㑹諸國大夫皆貶書人而虎牢無貶文何哉答公之盟大夫自隠公始也然猶曰宋人莒人考其時疑非大夫也荘公蔇防之盟夫子不得而諱也僖盟于齊楚與中夏盟之始也再盟于翟泉與大夫盟王子之始也然猶不書公以隠之至成公之盟蜀夫子迺直書之則諸侯之㑹荆人自成公始也魯大夫㑹諸侯之大夫迺衰周之常也城虎牢紀大夫之實也故兩㑹于戚皆直書之獨澶淵之㑹魯無大夫而後人遂以為貶例左氏之説遂以諱魯大夫其謬戾莫甚於此公㑹荆蠻猶不得而諱澶淵之㑹何其諱與善乎陳君舉之説曰晉之城杞合十二國之大夫為悼夫人於澶淵合十三國之諸侯大夫為共姬也晉為盟主區區宋杞晉已細矣愚謂魯大夫若叔孫豹仲孫羯使果預㑹夫子皆直書之獨澶淵之㑹魯不復預書之者記晉之細也大夫稱人已見凡例或疑魯大夫不㑹何以書余答之曰齊狄􅉀邢齊衛胥命蔡侯鄭伯㑹于鄧如此例不一皆非魯事何疑扵澶淵之無魯也左氏之説不可據者類此它國自盟㑹不書卿名見陸氏纂例問荘九年夏公伐齊納子糾齊小白入于齊糾與小白皆庶子任氏謂小白是子糾之庶弟争國自立孫氏亦謂子糾是桓兄胡氏却謂子糾是小白之弟何也答按史記以小白為糾弟明矣而先儒謂小白為兄者由齊小白入齊之説唘之也愚直謂紀年既逺姑當從司馬氏之記若謂齊小白而謂之兄則子糾之説雖出左氏不應獨從公榖之説子者子般之例見之是也按論語公子糾其義甚明糾為魯甥魯故納之夫子之與桓之義管仲之説詳矣或者不逹降糾為弟者此因齊小白之書以論夫子謂之過焉可也夫子之書齊小白正是不當立之書法糾為長當立明矣問經閔元年春王正月經無所云公羊何從而傳之答慶父之禍三傳通能言之前後不同盖有追而紀之有張其本之法者有言禍首之法者通貫于一年之中無害也答髙舜元春秋四問問襄二十有五年衛侯㑹于夷儀此衛侯剽也是年衛侯入于夷儀者衛侯衎也衎入夷儀不名復歸于衛而名之舜元謂衛侯衎失地之君也失地之君恒名之衎入夷儀不名者其脱文歟答衛侯入夷儀與鄭伯突入櫟之事相似而實非故夫子一名之一不名之夷儀故邢地滅為衛所邑衛侯之入不得主其國政也寗喜弑剽而衛侯始入衛故夫子始書衛侯衎言其復國也鄭伯突之入櫟雖非國都而諸侯之相與者在突而不在忽遇于垂居櫟之鄭伯也政在於突夫子安得不名之則衛侯之入夷儀在所不當名至入于衛則當名矣先儒之説皆有所未安執事謂入夷儀當名疑為脱文則衎之入衛将名乎将不名乎吾故曰此夫子之深意也問崔杼逆光而立之經書齊殺其大夫髙厚殺之不以其罪也公子嘉叛晉而起曹師者經書曰鄭殺其大夫公子嘉公子嘉與髙厚之辭同何歟答自榖梁言稱國以殺為有罪杜預則又為稱名為有罪之論紛紛不決陳殺其大夫洩冶冶豈有罪哉謂之無罪則殺陽處父得無罪乎或又以累上之文書之則凡殺大夫皆非國君矣左氏之言殺髙厚公子嘉一以為崔杼一以為國人其説自相矛盾獨公羊云稱國以殺君殺大夫之辭為得之桷謂専殺大夫諸侯之罪而大夫之有罪無罪實不係焉有罪不可殺况無罪乎以此論之凡言殺大夫者盖可見矣問襄公之世有穆姜齊姜説者謂穆姜成公之母謂齊姜成公之妻舜元謂何由知乎成母成妻答穆姜宣公初即位之所逆也通於僑如見成公之十六年其卒也見襄之九年齊姜者即襄元年姜氏薨者是也其逆也見於成公之十四年問吴子使札来䀻書札與曹椒秦術無異稱焉左氏公羊皆謂以札賢而進吴子説者又謂札辭國而亂者札之為也舜元謂吴夷狄之國札之賢類不得通扵此也札不書族不書字不書公子何賢乎札也屈完書族札不書族與曹椒秦術之使夫何異哉答吴札楚椒同例何褒貶之有二人皆公子故不書姓若屈完非公族屈氏出於莫敖者也薳罷来䀻則蒍氏也謬始扵公榖不攷而自破矣答髙舜元經史疑義十二問問易有辭象變占太𤣥以方州部家擬辭象變占其太𤣥方州部家九首之説傳諸世者請喻其所長答太𤣥以盖天之法為之方州部家在上此地承天之説也起於牛宿隨天而左行也方州部家者以元而生三方方為三州州為三部部為三家其所謂八十一者則棄其方州部而言之也先儒多以辭象變占擬𤣥之方州部家僕獨以為非易成六十四卦之後一卦之内必有辭焉有象焉有變焉有占焉是四者缺一不可也揚氏之𤣥既棄其方州部而獨取家而為八十一復取八十一而為七百二十九以賛是方州部者縁三以起於家若無預者焉先儒嘗言太𤣥與卦氣圖偶合邵子亦言易之卦始於乾而終於未濟𤣥之首始於中而終於養中者法於中孚養者法於頥此始終之異自邵子温公荆公尊𤣥之後如三蘇譏𤣥之説遂棄不道然其中十有七卦分而為二義殊不可曉所謂卦氣圖公辟侯大夫卿之定卦亦不能通執事其詳思之問易有起於中孚者未究其理答易起中孚先儒之説甚詳今録其説曰先儒言卦起中孚非也中孚復起於甲子耳盖由揚雄作太𤣥以初卦準中孚故先儒誤以為卦起中孚耳夫六十四卦首之以乾坤何以言起於中孚耶夫子分上下經而上經三十卦始於乾坤終於坎離下經三十四卦始於咸恒終扵既濟未濟且乾配甲而起扵子坤配乙而起扵丑故六十四卦歴乾之甲子泰之甲戊噬嗑之甲申至坎離凡三甲而上經三十卦盡矣又歴咸之甲午損之甲辰震之甲寅至節而周凡六十卦為六六三百六十爻一年之日周矣而中孚小過既濟未濟之四卦繼莭之後謂中孚復起甲子可也謂卦起中孚不可也且乾為十一月之卦而起甲子莭為十月之卦而得癸亥由是知上經三十卦是陽生於子而終於已下經三十卦是隂生於午而終扵亥至中孚而陽氣復生於子故亦為十一月之卦自乾之起甲子至莭六十卦而終是四其河圖十五之數為三百六十爻爻當一日而為六十卦一年之候也自中孚之起甲子至未濟四卦而終是四其六子之數凡二十四爻而爻當一氣為二十四氣應一年之候也或又曰何取於四其六子之數應之曰中孚巽上兑下小過震上艮下併既濟未濟坎離互體為六子少陽少隂六子之氣分布於四時故四之以應二十四氣耳亦應四其河圖十五數而日當一卦凡六十日為六十卦一年之候也其淵妙如此問易占法其取騐於人者當何所祖本爻之變處當何為主答占法唯程沙隨得之嘗以左氏考之古必有占書今旣㪚軼但當以變者為主然一爻之變猶可究索至二爻三爻之變則茫不可通舊聞唐正􅀸深於筮若二爻變者便不敢臆斷古人心虛静因動生變隨變而推有千萬變而不可盡者今人心念駁雜無感而遂通之理縱有所感其感不一當從何處下手康莭推象變之説亦不外此説卦乃占之本能通其類尚庶㡬僕甚有意於此然一行作吏終未有至静工夫茍能静斯得矣問古儀禮今所存者可見端緒未審於盛周之時曽盡行之乎為後世立教乎愚所未曉答禮為禮儀為儀成周盛時自天子至于士皆躬行而親習之者聘射燕饗昏冠之禮考於經無有不合謂存于書而不行者非也後人因周官一書謂周公營洛之後所成未及舉行遂併儀禮有疑其説陋甚亡取按藝文志以儀禮謂之禮古經未嘗有儀禮之名先儒疑後漢學者見十七篇中有儀有禮遂合而名之者是也問大小戴記其盡取諸扵經乎摭漢儒之説乎望喻其取諸於經者如何取諸於漢儒者如何答二戴之學原於后倉而小戴盛行者繇馬融盧植等考合衆家古文之文附之遂刋而行名為禮記今冠昏鄉飲酒射燕聘義為古經之羽翼而中庸大學又為傳道之書若學記樂記皆集古書而為之者其有駁雜則哀公問儒行王制明堂位禮運諸篇先儒已嘗置疑至若大戴禮之哀公問投壺與小戴禮無異若曽子之大學與祭義相似其餘又與荀子賈誼書相出入者則大戴之不及小戴多矣鄭康成後漢之精禮學者獨大戴未嘗為之注朱文公有取踐阼釁廟等篇然學者觀其㑹通不當貴耳而廢目也問黄鐘為宫則三分損一以下生林鐘之徴林鐘之徴復三分益一以上生太蔟之商太蔟之商損一以下生南吕之羽南吕之羽益一以上生姑洗之角姑洗之角損一以下生應鐘之變宫云云益損數理未逹答太極元氣函三為一三者天地人也故必以三而損益之三統相通始成律吕陽之生隂曰下律也隂之生陽曰上吕也正變之説自古有之陳暘樂書去其清聲不考之過不然安得成八十四調哉問井田制治願聞其詳答井田舊有圖譜然不通開方之法悉如棊局又兼以周官授地之法相參悉非舊制盖鄉遂井田皆司馬法之説惟可與周官合而不可與孟子合先儒必欲合而一之愈不可通盖井牧小司徒之法井衍沃左傳之法丘井黄帝之法漢書井田亦與孟子微異秦廢井田開阡陌僕嘗謂井田古制至秦始廢兵農相通非井田之制此未易遽言也問周官及月令真偽之理請喻其詳答周官或謂周公營成周後成此書而不及行其説無所據甚者方之為戰國隂謀之書吾不知其何者為隂謀也或又言劉歆偽為歆何所為而偽為之耶三説皆非僕嘗謂周八百年其間更革損益不一穆王之吕刑夫子不存于書或者又将以為周公之所作矣兩漢唐宋歴年不及周王之半而官制更改皆有成書則周官之書當審為周時所作特不能定為何王時書也然周官井田禘祫郊社絶無其名先儒必欲以郊為圜丘井田為授地之類難以勉從實以其書列官分職整然有條欲强合於諸經遂不得不支離其説其餘可疑者五峯言之詳矣月令具見吕覽為吕不韋書無疑陸徳明云此是吕氏春秋十二紀之首後人刪合為此蔡伯喈王肅言周公所作皆非也月令云命太尉賛桀俊此盖秦官鄭氏釋之眀矣問春秋於王正月上左傳加一周字其義有所謂無所謂答春秋云王正月左氏云周王正月皆周之正月然左氏増周之一字其跡若與夫子同而其釋經實有不同今世之以周正為夏十一月皆唘於左氏如書雲物取温麥之類直以春夏秋冬更易而改書之後人紛紛之謬誤左氏其尤也正朔之説家有成書非立談可盡聞吴幼清亦與鄙見合不審得其説否問周子太極圖上一空圈下二空圈當存當舎乞喻之答太極圖的確自陳希夷傳二圏乃成人成仙之説非面陳不可問三國之時司馬公邵康莭朱文公三子之言不同誰之言為是答司馬編年之法當時較量極費力然既謂之編年不得不爾終建安而始魏亦自有深意但不合謂諸葛公入寇耳朱文公帝蜀自正但後連書晉事又不可曉若書莽大夫揚雄卒大與春秋書法不同莽為亂臣賊子春秋未有書家臣之禮僕嘗謂正統二字扵經無所見尚書止有大統二字漢歴法有三統二字後人泥正統之説故皆不通前後遮䕶不得律以大義則漢以後皆當缺書若用編年備事温公之法盡矣邵氏經世以不書事故可糢糊無罅漏然此老少年先從春秋下工夫終占得道理端正問窮理盡性以至於命又不知命無以為君子也與公伯寮其如命何又知命者不立乎巖墻之下其義同否答命也者禀於有生之初也夫人之生天所與者有一定而不能移先儒雖有理氣之分以命言之其實一也天以命人者氣人受於天者理若仁義禮智則理也貧賤夀夭則氣也是豈命有二也哉析之雖殊命則一也尚論古聖賢之言命者其辭㫖盖有不同亦各從其所由而發之唘道徳之門者有之逹微妙者有之有不得已而言之者有之又有有為言之者有之故易曰窮理盡性以至於命孔子言知命孟子亦曰知命知其命者夫是之謂君子君子之所以知之者修身成徳順其正而已至若見危亡身不茍去就死宗廟社稷城郭封疆者皆得其正者也自罹刑戮此以罪致而不知命者矣孔子曰公伯寮其如命何言公伯寮何預焉在我者豈委而廢在天者豈强以必今之言命者悖於此至若不保其身死於巖牆之下當在不弔之義然所謂命者乃天命之命孟子之言詳矣答髙舜元十問問吾自衛反魯然後樂正雅頌各得其所答樂正非謂四代之樂有誤而正也魯用四代之樂是魯僣用之失非四代之樂非也夫四代之樂各有律吕夫子安得而正諸古者房中之樂為二南朝聘㑹同燕飲鄉射為二雅告神之歌為周頌頌為周王所得行也歌與樂相並而作三終之義可得而考也季子觀樂歌詩亦與樂相通無以議為也至扵樂正雅頌各得其所則有不可不辨者范寗言孔子列黍離於國風殊不知季子之歌王固為王矣歌小雅而曰周徳之衰是歌六月至于何草不黄矣鹿鳴至于菁菁者莪皆美詩也曷言乎周徳之衰乎今之小雅皆夫子所定則凡歌鹿鳴至扵菁菁者莪非周徳之衰是雅頌之得所復與樂正明矣太史公謂仁義陵遅鹿鳴刺焉夫子以前雅之無别明矣故司馬氏作孔子世家曰關雎為風始鹿鳴為小雅始文王為大雅始清廟為頌始是真謂夫子所定夫子皆絃歌之以求合㲈武雅頌之音若是則豈得不謂之詩樂相合然則謂夫子正四代之樂實非也季子之歌大雅誠文王之徳矣然民勞至于召旻此周之亂也何文王之徳乎故凡可以合于樂者小雅至于菁菁者莪而止大雅至于卷阿而止衰亂之詩不得入於樂矣頌之得其所者夫子直書周頌以别則魯之配天烝禘閟宫之廟皆非禮矣歌周頌之詩於魯侯之廟則奚取三家之堂夫子之意眀矣魯頌非告神之歌謂之頌者頌之變然敬之小毖振鷺閔予小子諸篇亦非告神之詩善乎太史公之言曰成王作頌推已懲艾悲彼蒙難觀至扵此則後人之效魯而溢美者誠可羞矣商頌是夫子之祖正考父所作夫子殷人遺聞墜簡附以傳後觀其辭想其世之宋而不足證可知矣肆直而慈愛商之遺聲也歌商之説次扵雅頌夫子之意深矣雅頌得所樂亦正矣非他有樂也即雅頌之歌樂也問邵子謂天覆地地載天天地相函故天上有地地上有天答邵子言天依乎地先儒言地在其中盖如磨然上下皆天虛者為氣只天之形濁者為體只地之形所謂天上有地者日月五星周行晝夜日没扵地下但認得地在其中則天上天下皆可通矣問邵子謂數起扵午答數起於午微妙不可言已生之數皆順天而行復至於乾也未生之數皆逆天而行姤至於坤也非午不能起陽盡於午由静而動此知来之妙邵子之秘先儒未嘗言之問邵子謂天行不息未嘗有晝夜人居地上以為晝夜故以地上之數為人之用答邵子曰先天學心法也圖從中起萬化萬事生乎心又曰先天圖者環中也方圓之圖尤宻所謂地上之數為人之用方圖是也用九環中則依天而行圓圖是也合天而行附地而生故人為萬物之靈而乾之九三九四其功用尤可見問邵子聲音之學及字母淵源答縱為四聲横為七音鄭漁仲之説備邵子聲音之學出於其父名古號伊川丈人有圖譜行于世温公切韻皆源於此然此學由西域来今所謂三十六字母亦從彼出中國四聲甚拙至沈約始明七音先儒嘗言中聲合於天籟若如近世祝泌觀物解中韻譜却又入樂工清濁之拘荘子謂樂出虚乃邵子心法但得伊川丈人圖子一觀亦得髣髴後漢風角鳥占亦不出此然非至静工夫未易能通也問芣苢説者謂車前其子治婦人難産愚謂采之於詩殊無義味其中必有其義乞教之答芣苢謂治婦人難産政如釋螽斯芍藥之謬也先儒謂叙物以言情謂之賦情體物也索物以託情謂之比情附物也觸物以起情謂之興物動情也此詩兼興賦之體古樂府中魚戲蓮葉東魚戲蓮葉西之詩深得此意難以語言盡也問詩關雎謂之國風自王季為西伯至紂又命文王典治國南文王作邑於豐乃命岐邦周召之地為周公召公采地至武王定天下巡狩述職陳誦周國之詩以觀民風俗得二公之徳教尤純者属太史分而國之謂之周南召南作樂用之被之筦絃以為房中之樂又謂太姒稱后此追稱云耳其義何如答地志扶風雍縣東北有周城東南有召城文王之為西伯周召未得封也武王伐紂以後周召未得封也周召之封始於相成王以後詩序不足證今直以行露甘棠考之明言召伯此不可通之一也夫既以二南為文王在周南則為王在召南則為公此不可通之二也太姒在周南為后妃在召南為夫人此不可通之三也關雎之作太史公所言不一或為刺或為康王以後詩但先儒之説林立雖有鄙見未易陳道若復異論此又似吴幼清宗象山之謗興矣世無真學貴耳賤目難以立談問作史及編年實録凡例答日厯起居注時政記條目歐陽公言之詳矣實録迺加謚以後書必有臣傳亦有字數限式宋元豐以後日厯壊於王安石建炎以後日厯壊於秦檜至咸淳之謬尤不足據然遺書舊聞皆足考證若欲討論非經月議論不可問四六格式及速成之方檢閲之書答牋表之説當别詳具此雖小技更僕未易言大要寡學而才氣差敏㨗者直師東坡南渡以後皆宗之金源諸賢只此一法惟荆公一派以經為主獨趙南塘單傳莫有繼者汪彦章則㳺乎蘇王之間若欲精究當取夏英公楊文公翟忠惠綦北海王疎寮元章簡王禹玉張安道劉莘老諸人文字置几案賤子當面言源委矣問古賦當祖何賦其體製理趣何由髙古答屈原為騷漢儒為賦賦者實叙其事體物多而情思少登髙能賦皆指物喻意漢賦如楊馬枚鄒皆實賦體至後漢雜騷詞而為賦若左太沖班孟堅兩都賦皆直賦體如幽通諸賦又近楚辭矣晁無咎言變離騷續楚辭其説甚詳私謂賦有三變自後漢之變為初栁子厚之賦為第二蘇黄為第三今欲稍近古觀屈原橘賦賈生鵩賦為正體又如馴象鸚鵡諸賦猶不失古曹植諸小賦尤雅潤但差萎弱耳清容居士集卷四十二欽定四庫全書清容居士集卷四十三元袁桷撰祭文祭余寺丞代大人作維年月日某謹致祭于故知郡寺丞余公親翁之靈嗚呼哀哉世日澆巧為善者希惰士尚媮智士死竒公獨為善窮日孜孜始終其心夷險不移方公少年貴盛莫比顯允文昌玉莭絲轡笑談春生叱咤電起公獨趨庭㢲若處女維昔晏安雲冠霧裾一車當道百役避衢官有未便入閤勸除公獨守謙癯然清儒世禄日蕃兄怨弟咨囊珠匱玉宴見以時公獨友于髙堂春熈寒衾朝飱二難怡怡守官唯勤不矜其智尺牘撫問各盡親意人有急難公先其慮族有困乏公遺之食天運既遷飄風􅈭阿棲遅精廬髪化其皤末疾未㡬奄然無何嗚呼哀哉維我與公三世有素知公之詳匪以姻故天道與人先後莫暏事或未然曷咎曷怒陂陁墓田自公親卜世途昬茫之死何惑永念殊隔泣涕莫復酹兹一觴以寫哀臆尚享祭外祖代大人作城南之望奕世惟賢接武辟雍厥聞藹然紛綸五經曰鄭屯田維公髙曽廣塾以延諸老簮盍二獻是先遺言懿範公承其全體涵中和靈珠媚川粃糠世機徳容渾圓囿身書林徘徊孤鶱亦既食實紹兹家氈世徳儉微喬木蒼煙紛紜欒胥岌其疾顛掇拾耆舊列于簡編籧廬方床卷舒窮研其語雖寡其意實傳秀眉玉色投老愈妍謂享大耋事胡不然俛仰疇昔今三十年嵗在丙寅憂患日纒孌彼諸雛不能飛翾請昬於公以煦以憐服􅊞粹温雍容周旋雖乏偕老情實不遷飄風揚塵畏途屯邅為善斯懼公無愠言昔者逺行相望越燕甘脆莫奉於禮實愆歸省床下公疾沈綿形枯神朗遺墨愈鮮属託孔深悲不可宣淳厖日希百巧相梴執玉奉盈敢以自完公死何恨如雲在天式陳酒殽辭盡淚漣尚享祭李兩山代大人作維公周敏之才英偉之彦金精璞温不假琢鍊摩蒼雲以髙翔目九日而不眩造物之畀盖将以固斯文之元氣閲天下之事變故其始也脱略畦町卷書長哦浩然經濟之意忘其冠切雲之嵳峩分席扵諸老䛕言腐談拱手以置覩江流之如帶凛丸泥之莫倚鳴雞號寒籌筆疾書負囊封以叩關維石友之與俱事往既莫得咎而所以保衛先緒者常兢兢以懐圖嗟今之人志與運乖道與時違介者卒至於困而爽者或流乎卑抑嘗反覆出處之大致每惕然以深思而公雍容兩端不茹不吐莫余敢侮試命南荒酬勞於東浙之濵既不以利其身亦不以望於今玩理忘世孰能踰於斯人者乎幸公之强謂坐進此道以鎮當世之浮薄而事有不可料狂雲飄奔隕晴日之飛雹滔滔川流逝者如斯往不可復徒以為生者之悲昔某辱知文昌公白首故吏三十年于兹始得見公于金華握手傾倒酒酣耳熱各相視不復道念此意冷今聞公䘮愈重不競之歎公魂在天一息八極雖千里其奚逺我哀之長敢緘辭以薦番江怒瀾其有相余之悲黯也尚享祭王尚書維年月日以清酌之奠祭于内翰給事尚書先生之靈曰道大如天學廣如漢企而望之自涯而返末俗濫觴昧彼一貫捨學而言所執愈渙伊洛之盛嗣扵乾淳析仁辨義脩己治人先民有訓其言諄諄稽經探本纂史輯聞匪黙以髙匪誕以守降于叔季其弊莫救千士一律躪訛踵陋坐曹清談迎事拱手文散武萎禮㢮樂虧敦㨿其全以為國毗篤生我公是宗是師天清景温前旌後麾窮源崑崙賔日扶桑磅礴萬類衆曷敢當積潤滉漾舒光煒煌探巖排碕纎巨畢蔵若農有秋箱輸廩峙若龍起淵雷震雨施九招希聲昌歜古味爰薦公宫以享以蒞灌膏養腴心君清澄讜言訪對屈軼在廷羣疑未決神龜示靈化被姦饕淳風泠泠天運悠邈公亦永歎學絶道傾死灰莫然獨行誰儔獨立誰言吾非斯人其誰與傳翳翳里門易窮三陳捨泣而歌謂天莫聞劍失其光蘭銷其薰柴桑沈冥王官混淪年已逮耇秉燭繼晷一柱承天四海仰企蔽牛之隂百草茂美謂享大耋以淑後士云胡微疾永蜕世塵嵗匪龍蛇其理莫詢訴詞重華蹇兹遺臣曰士之弊逮今弗振桷以蒙昧請業門下反覆可教授以端緒有疑必開有謬必舉語其平生載出載處兾登斯堂舉觴以祝詎期須㬰望公以哭蹻蹻小子抵掌掉目哀哀吾儕殞首莫贖死生之原千古一致瘁躬報徳匪哀以既風雨神交却立鬼魅秉心靡渝服義靡墜庶㡬公魂慰此耿特皦如兹觴之志罔慝拜手薦公公其来格矢詞致誠有淚俱滴尚享祭胡梅澗先生維年月日袁桷謹以清酌時羞之奠祭于梅澗先生胡公之靈嗚呼司馬氏續素王之㫖歸成萬世之標準過髙之議始於王覇謂秦漢而下不得並混取法於唐虞之雍熈其見於所行迄無以救其元本習剽竊以為工者絺繪變幻乗虛附近語新意粲過都而疾馳自涯而遽返其不謬者則已為過幸書愈傳而學愈陋論愈髙而事愈謬紛紛比比孰有尸其責以自任曠百年而一見知畀與者之所靳維先生負淵海之學執事物之樞用功於青雲决科之前大究若訥小得若愚網羅搜抉極竹素之秘而其微細委瑣猶不遺於初虞襲釋例於杜氏著履霜堅氷之㫖條分目舉而牛李棄地之争黨子制父之議前人之有疑者雖取舎有在以明迃叟當時之不得已至於孜孜衛翼拾遺補誤亦㡬乎司馬氏之忠臣而無負江上之䇿不行於老姦蒙昧草野避聲却影年運而往知吾道之愈難寫心聲之悲憤聽澗水之潺湲隂陽倚伏何得而非辱何失而非福匪歴代消長融㑹胸臆其何能若是之藎榖甲申之嵗先生出峡訪先子於城南桷時弱冠氣盛望先生之道不知佩玉之利於徐趨駕車之不可脱銜也先生微機以抉之再而赧三而竭垂頭却立畢志以請業由是始得知二千餘年之内論事不可以一概而所謂非三代不陳者實要君以行怪憂患荒落負先生之訓相望信宿猶兾往復以自振迅書来自冬属託孔懃諄諄已近扵期耆之語感多而疑成懼不能以久親語未脱口而㑹事己陳一老之不憖斯文之所係而不肖所受之深者恩不止於玉成哀不止於流涕痛遺書之已稡異夫草𤣥之隘茍志願之不泯雖少屈而何害掃兒童之哀悼陳一觴以自誓盖事有至難而可成時不可以終逝炳然之書安能久名山之副蔵迄垂闡於盛世公之精誠理寜有昧矢兹一言以俟其㑹溪流奔豗雲木黯䨴相此皦如魂兮其返斾也尚享祭戴先生維至大四年嵗在辛亥三月癸酉朔越二十有四日丙申學生袁桷謹以清酌庶羞之奠敬祭于剡源戴公先生之靈功業可以致君而名不得以潤身科舉足以取士而文不足以行世二岐孔分厥害實深彼沾沾之白首汔莫能自悟卒翳于榛莽而漠然為太虚也先生之識成于髫年失仕以歸素業永捐篝燈蓬髪支笻聳肩抉拾天巧落其華妍視雲在山散為飛泉戊寅之秋愚騃無肖承先子之命以奉洒埽謂百尋之宇拱把之木曷中梁柱凛然師訓顔汗舌吐維臨淵是懼維執玉是慕經事爰久先子棄養十年之間百摺相望深源厚殖莫知其力往嵗先子嘗曰徳非我敢専而世由是傳萬物五色絢兮翩翩吾懼汝之一偏也先生隠几驚坐以起曰汝毋忘父訓嗚呼文以承道徳以承世父師在天終莫敢墜矢文寫哀有淚如洗尚享祭危功逺神室既虛周流無跡巖巖先天風水湧􅈭念兹先契論叙夙昔魂兮有歸勿怖勿惻尚享祭楊内翰文代作維年月日翰林學士承㫖正議大夫知制誥同脩國史閻復等謹以酒脯之奠致祭於故翰林學士楊公之靈沄沄濟源始於王屋逹為清泉以合四瀆篤生令賢浥此渟滀砥行立名不謟不凟發身以儒分教東魯佩規帶方莫余敢侮爰歸承眀編簡斯補徘徊嵗周庸振華武鋪宣帝謨草木五色清心無華外損中益雍容成均訓掌是職鏘鏘佩衿曰古遺直晚歸鑾坡實為舊物炳燭無倦寜以耄屈長松之貞幽蘭之鬱瑰詞玉篆粲若黼黻川流星徂典刑日淪豈期纒綿隕兹徳人我老意短我悲孔新敬率具寮薄奠以陳尚享祭王瓠山承㫖維年月日門生具官袁桷謹以酒殽之奠昭告於翰林承㫖瓠山先生王公之靈芒芒九州求應惟類粤昔先民疆理制治考賢論方角立競訊大同莫諧多士兹弊始公南来黒髪嶷嶷挈其圖書是根是柢我先大夫接識辭氣晚嵗在京閔恤昧稚曰覺有先後士無遐邇矞雲在空萬物五采毋匿彼光厥誨以仕迺居禁林執度量士不見其人有簡斯揆手書諄諄而父不死眀有帝制幽有信史削煩養膏汝駿其媺聿来承公傴伏屏俟公車東行跂望靡已公車来朝載色載喜彼山維雲彼堂維戺帶兮委兮告我知已其餞伊何教言靡靡塵之朝飛曷其有既弗寜履冰竟爾用逝外踐内揚於粲終始敷文宣昭秩秩在耳吁嗟公兮公往弗墜凡今寠人冒疾有技視公之為有泚以愧愧能止之止孰可嗣嗣今企而彼嗣不躓聞哀于鄉承睫涌淚殯宫有紖淚盡斯矢佩玉曳裾玩月愒嵗寫心何言弗辱罔貳嗚呼哀哉尚享祭吴饒公維延祐六年閏八月癸丑朔越十有二日甲子具官袁桷謹以清酌庶羞之奠敬祭于大司徒饒國吴公之靈寸雲興功甕源湯波磅礴奫沄徳同其科稽公𤣥胄行仁于番隆汙迭仍卒昌靈柯是生上嗣髙挹泰和手握𤣥機萬象畢羅不翕以隨不媚以頗允謂家教靡勞琢磋維公純篤里社婆娑耆夀好禮受祐則那外謙養恭内温守和鄉國賜履紆垂佩珂燕豆孔陳湛焉春酡或車扵閭或舟扵河恂恂熈熈皷缶以歌書来京師戒言匪苛勿私我躬瘁公靡他告而孫子劬書暮哦觀化有終奄然微痾有子純孝涕洟交沲回視吾儕泚顙實多國恩懋昭賁於陂陁生無憾私没無缺蹉仰止盛徳白雲嵯峨南望伊阻心思云瘥承交再世其舊如何薄奠逺陳矢言匪阿尚享祭黄仲正嗚呼世儒謏聞昧焉求容天命罔知曳裾憧憧迄莫有成祇尤其逢惟我仲正甫日韜其躬退讓益卑殖學若農謙兮虚谷訥兮太沖恭不近卑夷不失中粤昔耆舊慶厯闡宏鋤荒廣聞維公維卿世胄疾顛欒范是程君獨憫之仰天撫膺緝簡差差綴書聚蠅經緯譜諜範圍日星若綱斯網若臂斯肱維嵗壬辰盛名日起泮宫舒遅不泄其美維我先子一見驚喟曰姿宇儀觀先大夫是似大夫令名士有定誄謂君嗣之克踵厥媺奉于家塾羣幼漸被彼幼困蒙迄莫有唘僕實與君針芥宻投窮𤣥蒼垠探源渠搜比律為均擣珍為羞彼昧不知議莫與酬先子云亡南北異輈嵗月逾邁塵積敝裘君書到手云胡永留中年相同繭室豫脩今訖南歸動色相慰運有顯晦官實郵置曰汝二子教實未至空林荒野黜彼聽視三餘養功先徳是嗣彼夸逐魂氣蹶彌圮屬觴孔深君以疾告話言慎矜罔有顛倒長年駒隙囊虚禄稍汝易漸完吾與汝校麟經説幽吾願汝斆詞林榛蕪書圃川浩執轡以驅不失其𨗳伏枕瞬息疾危奔泉鄉失成彦親失令賢謂天盖髙則莫敢言謂徳靡脩余曰不然承契疇昔今三十年金蘭合交矧維姻聨薄奠寫哀涕盡莫殫嗚呼哀哉尚享祭袁府君稽乾淳之盛際多士闡其皇風唘城南之文㑹首屯田之封崇維正獻之模範實髙躡其遺蹤植大本以沃心廣經説而訓蒙雲負笈而鵠立越公兹焉以相從懐試牒而不上考舊譜而合宗登慈恩以後先黨籍熖而避鋒洎大明之更絃俱玉珮於秘蓬靈椿儼其不凋桂聨芳以増隆髣安陽之成憲與桐木而相通凛風雲之變更丹林殞其青葱粲千金之美裘淟涊辱而蒙茸雪霜厲以交隕復融風之相攻履蹇武以不前慘胡為乎泥中合情話以交慰證墜簡而彌縫䑕行忩以窺燈各飣坐以炯瞳意凌空而肆竒效並飛以追鴻神投淵以摶怪争交手而捧龍或舉觴而心眩或擊筑以氣雄窮探蟻扵珠曲駕採蓮於神峯語不泄而益婉詞欲陳而彌封瞻懸瀑於踞石聽空籟於舞松運通塞以莫推各分岐而西東嵗協洽以入燕益磅礴其心胸馬伏軛以悲嗚詎示之以不逢亟返駕以式微疾果侵乎令躬念兩家之敦叙五世閲而攸同原伯魯之世胄交衢泣其憧憧蚊秋集而失喙菌露漙而慘容憫坌垢以多虞爰返真乎顥穹天柱鬱其朱明校緑籍以昭融玩死生之情状周流竟乎鴻濛陟帝廷而不震承顔僾乎先公賜二笥以永蔵靈根衍以和沖觀萬化之終始深有悲夫夏蟲陳薄奠以永訣抑以寫夙昔之悲衷嗚呼哀哉尚享祭張宗師維至治元年嵗次辛酉十有二月庚子朔越十有八日丁巳具官袁桷謹以香茗之奠告於開封𤣥教大宗師張公之靈曰維公以篤碩之姿冲静之量執儉與勤靡有恣放際遇五朝貴盛莫伉口絶否臧身守謙讓大盈益虚小徳彌諒衆罔置疵異莫敢謗絪緼無垠如雲在天亦既作止脱焉蔵淵金冠玉圭四十五年緼袍蕭齋弗競弗鮮易簀以逝嗒然癯僊死生亦大公寜慊然賤子在京踰二十載每黙察之謂可免悔笑言孔殷觴至彌愛聞公觀化寜不永慨凡我南士命有顯晦五福之全莫與公配一奠寫忱盛徳曷沬靈㳺来歸昭鑒如在祭外祖淳祐辛亥大父嚴州養逸家居我外大父敷文繇臨漳解組歸于里閭是嵗八月抱疾以吁曰吾女甫六嵗相宜生佳兒将曷所從維嚴州夫人我中外表俾它日以事問名不旬日嗒然以終辛酉之嵗歸處州府君實惟次壻官于京畿是生不孝子曰桷七日以逝外祖母張氏鞠之曰果長成有立我敷文無愧吾女亦不死㓜嵗多疾兼以羸弱昧昏先處州督過不置稍長知外家為王門尅自奮勵遂獲見于鄉大夫鄉先生曰是子其有聞桷生丙寅先夫人之亡三十有三年處州無禄禍罰酷纒閉門省愆曰吾何以報劬勞之恩是外祖之期卒莫能紹聞矣備員史館掌制十年復叨集賢今復歸于詞垣雖學不稱其職則吾外大父㝠漠之中當以昔言為真然矣久宦亰師不能展省墓田謹遣男瓘以酒殽之奠陳告曰桷母史夫人以上恩得封㑹稽郡君今叨塵三品宜得追封郡夫人歸老故里敢省墓以陳言盡而情無窮涕與淚淪尚享祭趙子昻承㫖維至治三年嵗次癸亥六月辛酉朔越二十有七日丁亥從表弟具官袁桷謹以清酌庶羞之奠敢昭告于翰林承㫖榮禄趙公之靈曰河嶽之精上為列星形而為人孰著炳靈茫茫禹甸萬不一䏻維公之生服食粹精幼敏于學雲英天葩崑崙五色散而為河其見有卓其别有科書證古文律合泰和肩曹躪鮑絀荘廣騷身承萬牛手題六鼇神㳺靡窮燈螢補勞運通承休官于兵曹嘉名既彰日厎于髙大縑豐碑喜愠靡辭或與其竒或削其疵窮櫩華居卒為其師行不矜細語不擇辭客去我休嗒然相忘英英玉闕璨兮珩璜心如虚舟云返其鄉鷗波大雅曰兹徜徉都有異傳愛者以匿嵗月既深傳者維的聞訃莫奔相視動色世失名士曷有南北維我外祖崇王外孫桷實史出絲蔓是論乙酉之嵗定交論文我賦孔深公辭彌敦俯仰三紀獲接佩履薦墨専特屬以史事彼雖藐然公意則侈今承後塵或謂是似哭不慿棺葬不視穴雖云係縻禮則有缺嵗月如流心志若割薄奠寫忱以告永訣嗚呼哀哉尚享祭史車父助教維昔外家過扵侈盛乾坤轉旋咸謂其将不競矣文治聿興闔郡不薦者㡬三舉桷以譾薄考校輙與而私以計則曰我外家譜諜若是計偕之来抑疑且自懼也嗚呼車父色蒼而貌淳規矩不踰扵常人其考經也守儒先之説罔敢越踰吾則曰五經之説弊極則返昔有議而必除渙然怡然知鄙説之不妄而冒昧固陋得奉身扵殿廬嗚呼區區之心兄悉知之矣投老還山書疏不置意謂衰朽猶能相奉以劇議也靈輀逺歸痛徹心膂暮年哭子因兄之䘮涕泗不已可哀也夫其可置也夫嗚呼哀哉尚享祭定水真禪師維皇慶二年三月辛夘朔越八日戊戌具官袁桷謹以香茗之奠告于雙峰長老真師之塔空性返真匪以言先詮要混殽强名為禪立禪唘宗假言以宣語黙動作斯言之筌末派沄淪若蔓斯延巧迺嫉之斵方毁圓彼尚辭者復㨿其顛視之莫名執不以權駕彼駑馬㝠途加鞭在昔源公孤立巖泉食苦避甘養其徳全匪石匪金以刻以鐫来者却立恣言佔諠疾抱遺衣涕語漣漣信宿熟視維師是傳師来斯丘若源之在前毁心以完沈珠于淵謂支離茍生何有嵗年散形而歸雲升在天一髪挽鈞事實眇綿縻爛缺敗曷其有痊陳茗寫心其然其然尚享祭定水源禪師維師之行力垢穢而益清也維師之言事韜匿而益明也志異乎衆知者不以為介居處乎獨識者不議其隘壊械脱粟憂道之無傳涕與淚漣辭俗避世将處夫懸厓之顛誓隕其年以厲夫貪鄙而卒不能以遂願也戊寅之冬㑹于先塋師抉其㫖神光晶熒匪事扵解粲焉緯經曰無體無方簡易是程世道日淪夸誕益臻望洋以行靡知其津維師之示寂今四十有六年桷也周㳺南北亦既垂老何授徒烝烝而罔有以紹雙峰之山實演法之所有祠歴年塵翳莫覩適臨忌辰薄奠式陳以寫我衷愫尚享祭湖心奎律師維泰定三年嵗在丙寅四月乙亥朔越十有一日乙酉具官袁桷謹以茗果之奠告於前湖心漢章律師之靈維師以峻絜縝宻之行儀于叢林不言而耄稚所仰無文而顓蒙所欽壊祴薄飯攝念一室梵唄震動絶怖畏以息其貪嗔末世頽波毁戒壊律罔止扵一人鰍鱔縱恣侮夫澄海之巨鱗雖心不為動持清議者何縮吻而咽瘖暮専一丘将挽退静之質以為比鄰今嵗之春㑹言諄諄手書至門遺語益親勸余以老之将至息機心而罷哦吟念故老之斯盡紛攘臂以自陳視師之行其嚚曷悛今師往矣寜不戚辛薄奠寫懐庶其鑒歆尚享祭育王眀禪師慨禪林之盛時争摩擊以相接或勵行以安行或發機扵危掣辨鋒激以奔雷𤣥鑰契而吸鐡遵古聖之矩範接前賢之軌轍於斯時也師能承其餘風以考其異同數十年来兹道不競角立争騁遺言懿行罔有深省師獨巋然玉几之峯㑹衆説以持正繁霜孤松巨浸一航凜乎誠不可以當相㑹未㡬遺書在門痛耆舊之欲盡知典刑之莫存髙年昭明曷有䀌傷如月在天孰存孰亡持兹一奠以寫餘光祭王蓬山精氣神之交媾兮動死地而莫可詢魂既升而茫忽兮有假夫攝鍊以存存彼學仙者之自任兮謂能持精思以叩夫帝閽鬱儀兮繽紛髣靈霄兮粲以文目渺渺兮空洞睟容髣兮神君道至簡兮宜鋤耘絶聴視兮合渾淪蓬山為鄉兮海為門是生王仙兮合吐吞劬躬以訪道兮老益以勤窮還反之變化兮莫逃夫大垠慨宗伯之上征兮壮嵗實預其駿奔守不懈以自将兮二父合情以彌敦數九九而益少陽兮不怛乎世劫之邅屯念初志兮兾有聞侍靈斿兮駕長雲歸来乎隠仙兮塵曷以坌祝文壬子嵗除告祖禰祝文舊嵗冬十月将入直翰林舟来吴門知有代者乃不果行菑畬先疇爰築室是承徭役紛更復逗留以治靖念烝嘗不克親奉是慄是懼秋九月得疾㡬殆庸禱於祖禰幸獲有瘳十月既望蒙恩復授舊職遣官趣驛以進退惟譾薄承藉先徳迄克臻兹言歸于家敢潔酒饌合祀於中堂尚祈相綏以保嘉吉丙辰嵗告追封祝文承藉先䕃有列於朝今踰十稔叨恩次對亦復再留䘏典既行咸得追榮其父母而桷視先考品秩有懸格未應得先妣從先考之爵今追封為㑹稽郡君妻鄭氏亦獲追封為㑹稽縣君縻繫京師未能遄歸異日将告于墓下爰羞酒殽䖍告行宇敢告戊午嵗終告祖禰祝文癸丑之春蒞官於朝今兹六稔烝嘗之奉弗克親薦夙夜惕心次對再叨亦滿秩考嵗聿云暮潔陳庶羞以伸永慕尚相其成俾歸奉松楸桷之大願尚享己未封贈祝文延祐丙辰春叨塵待制霈典普行得追榮于我考妣是嵗翰苑扈從不以官秩髙下咸獲霑恩獨吏部申明謂子職既卑難擬於父繇是僅獲追封妣為㑹稽郡君丙辰秋八月復獲再任惕然松楸之念朝夕不置将俟代南歸捧黄以告墓下夏五月踰滿忽䝉誤恩超陞為直學士靖惟僥倖皆考妣劬勞覆燾之徳奉職伊始曷敢告還謹奉宣命令孫瓘跪讀於墓所保祐無斁俾獲為全人以無負先訓桷之至願敢告己未告鄭氏縣君祝文向以叨榮侍從追崇典行遂得恩及扵妻因循再任晉秩集賢卒未可歸令子瓘以副黄焚白敢告辛酉嵗終祭祖禰祝文桷濫官於朝踰二十載舊嵗南歸将一意誓墓以奉祭祀承詔復舊春三月来京即預考士四月供職復扈蹕開平八月始還孱弱之質﨑嶇道里迄獲平善皆我祖宗保祐之功嵗聿云暮庸奉祀扵㝢廬俾遂平康二子瓘瑾克紹詩書以光祖徳不肖孤實有祈望惟隂相而黙成之尚享壬戌春祭祖禰祝文三月甲戌中書奏奉改直翰林退省淺學非所宜當實我祖禰胚胎前光而不肖嗣冐膺是天寵扈蹕有嚴将上開平脆弱之質驅馳不堪車馬脩途冀有以扶翼使獲歸田以奉松楸不勝大願次子瑾俾入成均敢庸䖍告相其有成尚享癸亥封贈告廟祝文慿藉先䕃獲綴從班䘏典肇新祖考嚴川府君得贈中順大夫上騎都尉㑹稽郡伯祖妣王氏令人贈㑹稽郡君考處州府君贈亞中大夫輕車都尉㑹稽郡侯妣史氏郡君贈㑹稽郡夫人妣楊氏安人贈㑹稽郡夫人妻鄭氏縣君贈㑹稽郡夫人今秪承宣命奉祀于寓舎以申䖍告淺薄承緒戰兢靡遑晉秩侍講實繇祖徳深厚弱息踵武克已樹徳敢不夙夜伏祈鑒歆以永終譽敢告告嚴州府君祝文登極之詔以推恩錫命為首越小大臣罔不承澤桷以侍臣獲追榮于二代而我祖考今得贈中順大夫上騎都尉㑹稽郡伯祖妣贈㑹稽郡君追惟付託之重實篤意于先大夫不肖孫朝夕思念靡有替墜踰六十有七年獲遂初志霜露既降謹以副黄俾瓘焚白近叨綸音晉秩侍講行能淺薄大懼弗克荷負先徳𢎞逺冀有以綏祐贈典有加行申告于墓下敢告告處州府君祝文登極有詔以推恩錫命為首小大臣罔不承澤越今始奉行桷以侍臣獲追榮于二代而先考得贈亞中大夫輕車都尉㑹稽郡侯妣史氏贈㑹稽郡夫人妣楊氏贈㑹稽郡夫人靖惟義方之教期勵甚逺種徳殖義奏身以淑後者鄉黨所共知施於孤兒得食其豐報霜露既降謹以副黄俾長孫瓘焚白以鑒近叨綸音晉秩侍講忝竊踰分惟寵綏而唘祐使行能無愧獲為全人則世徳永逺施于諸孫俾有慿奉敢告告鄭氏縣君祝文往嵗已膺縣君之命今䘏典既開位在三品追爵彌髙繇是陞為㑹稽郡夫人天澤深厚魂其欽承敢告謁告還家祭祖祝文庚申蒙恩被召再入集賢連嵗疊除大懼不克負荷日夕念歸以䖍奉祭祀為急守職有嚴不敢遽去今者謁告歸里将杜門息心力教子孫永承松楸之䕃私心未遂惟隂相以成其私禴祭有嚴敬奉昭穆合食于新堂敢布由衷尚享追封祝文綴跡朝著今踰二紀行能譾薄大懼弗䏻稱職迺者先丞相忠獻王不以卑鄙驟加超擢叨塵二品今上嗣位大賚中外視其職秩悉俾追榮繇是祖考加贈嘉議大夫禮部尚書上輕車都尉追封㑹稽郡侯祖妣王氏加封㑹稽郡夫人考加贈中奉大夫浙東道宣慰使都元帥䕶軍追封㑹稽郡公妣史氏加封㑹稽郡夫人妣楊氏加封㑹稽郡夫人成命己頒庸告於逺祖敢告立碑告墓祝文維泰定二年嵗在乙丑十有二月丁丑朔越三日己夘男具官桷敢昭告於妣史氏㑹稽郡夫人七日而孤先郡公以家教之謹始於嬰孩䏻言即授書甫七嵗詩書語孟皆己誦習而書之澤桷以嫡長當受都公讓於兄子甲戌嵗先公陞貟郎法當從是進秩且得以官其子先公正色曰我即死官亦不以與鄉書國學儀圖以紹世徳汝之責也纎粟靡宻先公一以自任遂得専意問學師友之淵懿皆躬探而力討辛丑嵗登名於翰苑凡二十有五年僥忝踰分皆考妣之垂裕隧碑未立每䀌然扵懐往官待制清河元公擅金石之作遂獲乞銘吴興趙公専翰墨之美得求其書今已十年而桷齒髪漸衰亟刻石立扵墓右亦欲俾子孫知儒學足以發身扵是有考謹以清酌庶羞敬奉考中奉大夫浙東道宣慰使都元帥䕶軍㑹稽郡公妣楊氏㑹稽郡夫人合祭尚享祭外祖母張氏祝文嗚呼自先夫人之亡我外祖母不忍棄其諸孤鞠育撫訓日期成立以報罔極桷今幸不墜先訓官扵翰林集賢者二十有五年而先夫人之誌始得成就載惟厚恩懼子孫之不詳亦登具扵誌上今兹立石敬以清酌蔬食用伸䖍告尚享立碑告墓祝文幼承嚴訓遂得悉意於藝文有列於朝大懼遺言懿行之罔傳向為次對廣平程公辱在先友適為院長迺求其銘是後叨塵二品封贈疊加不敢易其舊文遂刻於碑右乙未之日實為誕辰庸建碑于隧道嗚呼厚徳如山百不寫一靖惟孝思曷有殫極敢告男瓘祔祭文男瓘不幸蚤夭已安葬於錢湖黄奥之原日月不居已經卒哭禮宜祔于王父大母今兹陳設殽饌有事于中堂敬以其主祔孤兒孤女冀相其成俾宗緒不墜則實有望敢告男瓘祔廟文盛年長往亦既妥安其體魄矣卒哭事竣當祔主于祖廟設祭中堂其從與享清容居士集巻四十三欽定四庫全書清容居士集卷四十四元袁桷撰雜文放生池祝聖文重華廣孝琴奏五絃成湯克仁網開三面式届正陽之月宻符元命之辰寸地尺天歸皇恩於不有四生萬類涵惠澤以無窮恭惟陛下功契重𤣥道融衆妙鳶飛魚躍極上下之昭眀馬負龜呈發隂陽之靈秘臣等依承真䕃詠賛昌期天地大徳曰生想洋洋而圉圉文武萬邦為憲咸肅肅以雝雝碧海波澄瑶池仙下鮑王廟祈雪祝文維神廟食兹土㡬千餘禩比嵗饑疫荐臻户口耗絶意者降罰自天神不得以有請也飛蝗蔽天神能相其穡事俾獲無害而入冬以来陽不斂蔵雷電晝作月臨嘉臘同雲之候迄莫有覩深竊懼之雪為五榖之精協應以時則遺𦙍原隰者可以弭伏民無疾疫春有東作千里之幸使者觀風於此朝夕徯念神於斯民休戚彌重願力闡明靈叶賛於山川錫以嘉瑞勿愆其期以絶菑害益足以彰神之賜賀東嶽表莭應蒼龍紀岱宗之元祀雲舒彩鳯流阿閣之祥光萬姓庭趨百靈弁㑹中賀恭惟氣超混沌功運冥茫稟木帝之精仁施無際悟谷神之藴道妙難名永孚于休必得其夀臣等肅蠲瑶斚祗演琅函望齊魯之青葱天威彌近恨蓬瀛之拘縶肉翅難飛又庚子嵗甲辰日陽徳鍾靈龍集式符扵天統昌辰紀瑞虹流上合扵堯年五福錫民百神受職臣聞至仁無極如嵗之春盛徳莫名惟天為大故䏻彰施黼黻以盡人文之妙休養封殖以成品類之和幽明相通顯微無間極際蟠而均被亘今古以常新佳氣鬱葱神光孚逹中賀恭惟位冠羣后功賛無為玉檢金泥極昔王之潤色丹山赤水覽海國以遨逰爰假青煒以諧寳典臣等傾心雲闕注目霓旌呼萬嵗三莫侍鈞天之廣莫方百里五徒推東魯之幅員又是嵗三月十九日立夏瞻雲喬嶽叶盛徳之在春受厯清臺揆發祥而維夏四方来賀六合同風中賀恭惟樞紐隂陽權衡品物金穰玉燭以成三時之和丹臺紫清以佐九皇之治雖真逰之無跡幸神御之有嚴光挟龍輿下琳宫而布武燕分麟脯傅玉斚以流恩海觀塵清城闉瑞靄臣等式循舊典庸展上儀大道無言莫測絪緼之始人心不逺益窮肸蠁之微又天作髙山實尊魯甸位冠羣后兹為岱宗良辰揆維莫之春多士仰思皇之祐中賀恭惟受元氣始為萬物宗七十二君莫測神庭之秘三千餘里有開日觀之祥睠兹海壖實維侯服斥鹵竭魚鹽之利生聚紀蠶麻之功民食每假於轉輸土俗猶存扵浮靡雨暘微戾伏臘遽乖敢因善頌之誠庸致預祈之懇絳旂丹轂宻除疵癘之妖紫府清都彌降簡穰之祉然後東皇太乙錫宴鈞天夀宫神君追逰化國遹廣聪明之聖懋昭長育之仁眷此有生施於無極又時維暮春誕紀盛旦嵗行吉亥丕昭令辰蒼龍宣長育之仁玉燭唘豐穰之瑞中賀恭惟希夷道廣亭毒功深神化無方寸雲合而甘澤溥精誠有感巖石固而積霤穿臣等身囿海圻心傾日觀萬年永保降祥敢擅扵斗牛大徳曰生衍夀益齊扵箕翼東嶽殿上梁文伏以海觀澄清聳神山之紫翠仙閭縹緲靄雲闕之青紅光景常新規圖改舊伏惟隂陽合徳髙明配天三宫空洞之逰道無不在六虚周流之妙用莫能窺睠兹海壖古稱鉅鎮亷讓被先王之澤詩書敦故老之風榖粟桑麻行協三登之慶象犀珠玉聿来重譯之邦神符黙契扵天心嘉貺式資扵帝力洋洋在上蕩蕩無名雖兆祀之苾芬愧掲䖍之庳隘今太守顧瞻下宇咨度廣居龜卜既從鳩工斯集雕欒藻井峩然金雀之棲玉階彤庭鬱若彩鸞之舞雲光五色花氣千層誕揚仁惠之聲益廣循良之政梓人之道類相敢愧裁成王者之徳好生益申賛詠今兹榖旦庸畢偉功虹梁初舉扵池中鳯輦疑從扵天下載色載笑来宴来娭輙采歡謡少揚盛事抛梁東天雞午夜日輪紅風馬雲車歸帝所丹臺紫府布皇風抛梁西江濶城迴細栁低簇騎共看紅叱撥踏歌時聽白銅鞮抛梁南簇簇山光擁翠嵐蓂葉隂陽元有準蛙聲水旱不須占抛梁北滄波不動平如席祥風甘露瑞豐年大貝南金書絶域抛梁上仙藥未須承露掌絳宫神闕自回環玉檢金繩空悵望抛梁下萬井春風樂皇化雕題交趾九夷朝草笠黄冠八方蜡伏願上梁之後乾坤清宴星斗潤明蘿圖永衍扵皇基椿夀益延扵睿算六府三事百吏兆民雍容治世之音翺翔太和之域物無疵癘家用平康結繩追渾沌之風擊壤繼康荘之詠神祇受職動植霑仁梓潼青詞陽春布徳誕開震夙之辰天運興文允協亨嘉之㑹四方来賀萬神闕恭惟道合希夷氣超混沌揚靈西蜀通肹蠁扵妙庭佐治中州職銓衡扵帝所維桂籍固嚴扵取與而芸編復騐其勤勞至道無私積善有慶某學拘鉛槧業保簮裳教子未能企世科之必復傳家有託守先訓以丕承庸展素忱式陳薄薦伏願祥光紛郁􅆊氣開通孔盖翠旌覽徳輝扵九土虎符龍劵錫慶澤扵一門梓潼醮齋文瑞靄層霄誕紀降靈之莭誠傾魏闕有嚴事帝之儀慶接九垓芳垂百世恭惟至仁育物𤣥感闡幽受色筆夢寐之中睟容有赫厠金牓銓衡之際嘉兆宻符允懐一經教子之心適值大比興賢之嵗雖登崇有數難以預祈然神化無方終期黙運伏願祥光下燭飈馭恍臨桂籍書名願俟家氈之復棘闈進步思成盆繭之抽詞盡意長恩深感集宴交代鄧集賢致語繡衣南國屢施白簡之威玉佩中朝允稱金閨之彦惟姻好實侔扵兄弟迺交承永紹扵雲仍愧乏弦歌式陳籩豆伏惟交代集賢相公雲霄自致風月無邉給札玉堂氣欲呑扵頴横經壁海坐嘗撤扵臯比清言王謝之比肩妙畫鍾張之接踵與人無競詎論鵬鷃之鉅纎處身以和不計雁鳬之雙乗京師之望君實洛社之慕堯夫廟堂掄材㑹弁已同扵諸老巖壑動色拔茅肯後於吾徒盖将拄笏以看西山披裘而傲北雪老子之興不淺先生之祝何如特進宗師大真人幼結文盟壮持道紀度弱水之萬里騎氣而逰登紫微之九重步虚以進謂孔老之同友自若晉鄭之焉依避堂尊賢授粲禮客諸衆官或逺使絶域或近職内銓俱精神磊落之英實羽翼賛襄之士儀生彩鳯武接祥麟我翰林脩史大夫針芥宻投金蘭久託候松階之日影舊若塤箎踵蓬島之雲光今慚糠粃悟三已之無愠知四休之當宜敢以心聲上陳口號婆娑老子倦東吴笑挹胥濤傲太湖坐使千巖為几席䏻令萬籟作笙竽瀛洲法曲行刋譜酒國長春莫計壺賴有嘉賔相勸舞玉山蹔倒不須扶亡是公代聽雪主人宴客致語疾病相扶持迺天倫之至理酒食召僚友亦人道之常彛挹南斗以為漿夢鈞天而廣奏熒煌接席醲郁陳歡清容居士素褐癯儒青氈舊緒投簮逸海岸有古松流水之心騎馬傍人門無冷炙殘盃之色困頓扵俎豆弦歌之事沈淪扵醫藥卜筮之流匪曰卑陬亦云曠逹喜愠既不形于色口腹亦何累扵人聽雪主人出壑清冰臨風玉樹陽和盎面士疑挟纊之恩冲粹積躬衆美虚車之讓鼎烹而調衆口杯水以勝萬言給月支風陋人間之腥腐屠龍膾鳯窮天外之珍羞厥徳不回何恙弗已方将肥羜以速諸父庸示等差弊袴以待有功悉除僥覬芳筵縹緲雅集舒徐露墮三危化逡巡之麴糵風號萬竅陳廣莫之笙竽享若太牢澹如明水敢陳口號少賛神交玉堂學士詫英豪濯濯天葩簇錦袍擬上瑶池擘麟脯不将金帳飲羊羔長卿多病縁消渇坡老長貧漫老饕從此青州化烏有夢迴霜月冷如刀太虚道士劾清容子文鑄金作象深垂饕餮之文索米為飢何異侏儒之拙迺知芻豢之悦我口不如禮義之根人心傳書染指之卑易著濡首之悔詭稱聞道實曰費辭清容子山澤迂疎氷霜傲睨乏燕頷虎頭之相初非適時為牛溲馬勃之才猶言蔵用徒禀薑桂之性殊乏參术之和望似木雞出語争疑其鐡石癯如野鶴持身或近乎膏梁岐黄之問對匪専元白之唱酬莫預已廢三餘之業獨夸一藝之長隤其家聲恥莫甚矣同乎流俗已實為之弗思尚口之凶猶見朶頥之色昔茅容雞黍詎為設客之資而張翰鱸蓴迺在還鄉之日捨飯蔬飲水之自得為蒙袂輯屨之可憐不為盤飱固難免跨驢之誚我有斗酒要當為得魚之歡幸前倨而後恭姑小懲而大戒尚期深省以贖往愆涼州牧白羽乞致仕表控扼喉衿粗謹揚清之莭叨承掌握莫甦中暍之民知見㡬而作之良致陳力不能之請眀時匪棄小已實兢伏念山澤癯儒江湖野性樊籠久困難自致扵雲騰邉幅自修徒强追於時好心已忘於虚室手慵炙扵權門勇不足以沈舟技莫施於秉翟畏趙盾之日固曲盡其巧心憎元規之塵終有慚於眯目羞踽踽凉凉之行鄙媛媛姝姝之能謀乏知兵謬忝三軍之寄材非補衮莫資四皓之成荷執中之從權俾持麾而自效然而動静之道莫逃扵數代謝之理亦維其時今者扶摇在空蓐收届候羊角之哀已急鴻毛之順實先雖酒泉之封相與絡聫而雪山之衝深惟扞格服不衷而災也清有餘而簡之鄣面見人詎堪寒士之誚翳身而舞不逃宛丘之譏况臣翼蔽非長骨立早見久尸重寄深懼大何同異之論方興終難徇習磷緇之瑕已露必致投閒兹盖伏遇某官八柄馭臣一時講武治天下運諸掌式契古初繫一人謂之風灼觀民志憐蓐席之舊物希箧笥之厚恩動之斯和固己遂馳驅之微願揮之不去誠有乖名莭之大閑優哉香山之歸凜矣杜郵之戮先猷儼在遺訓具存矧兹蒲栁之姿惕若桑榆之景亟全末路俾就完人問温樹而不言深疑過謹開浴堂而召對未忍自捐得請為期束装以俟答詔式瞻天文俯察世道求賢自輔故建官以廣其見聞使民以時故用人弗責其全備卿皎若明月穆如清風早振儀於天朝晝承問於温室盛秋守塞力丐散閒當宁念功莫違雅素飾賁無咎持謙有終朕執中而慊然卿為計則得矣百年過隙要當從佚老之歡萬物為銅行復俟秉鈞之用勿云致事不我告猷可特授扶風公致仕擇日降制廬陵蕭静安作白羽扶風公致仕制凉州牧白羽謝表余因擬乞致仕表及批答漢雲字説雲漢之萌進於坤而踰於乾其昭然者隂也隂何乗於陽乎天地之初至静而虚根於隂矣隂者陽之先夫下而上者為升鶉火之中隂之基也隂見而極陽始著明萬物彚貞各返其生生而不已復歸於隂其環無端其去無趾故曰體之者隂也用之者陽也廬陵蕭道士字曰漢雲知所後先引而明之道不逺人合性與神其道得矣老氏之學捨是奚自庸俟而質諸張子敬字説乾坤之用近取扵人者必始扵敬敬立則誠始存聖人繫辭㫖且深矣自伊洛之説行各希美名然徐察視履矜矜於外者猶慊然于内豈果以為外飾哉余嘗聞中原諸老言許文貞公教授諸生窮髪之北皆負笈以請一聞善言有終身行而不倦者是殆其至静未散先進禮樂之遺意子敬居河西沈厚黙靖莫敢自暇内外交養在已治人悉本扵是尚勉之哉史文振字説丞相史忠武王以雄韜淵謀佐上聖合㝢縣㓛書鼎彛勲在琬琰厥子若孫章綬承接至于雲礽罔有替墜時則有若今江浙省管勾君勾稽知微謙謹保緒譬之巨木蔽芾百里羣柯交䕃條逹而不紊亦盛矣哉一日以書抵余曰鐸受名扵父兄而字未之有竊有請焉嘗考文武之事不能以兼而鐸焉則能以備丞相之勲殫扵武事則今之振文事者繄後人是望敢字之曰文振夫文非止於詞章而已縝宻而不泄著而明翕然以成其聲也清以亷宣明國家之盛俾後之人夷考世臣之系則必曰允文允武罔俾専美扵前代余扵文振實有望焉余孝友命名説邃古命名六相七輔莫得而詳也八愷八元或得以有解焉是則命名之説其始扵周乎周之初猶未聞其説也申繻之言名有五則夫今之問名者皆本於是私獨怪夫世降而俗漓髙者希扵聖卑者希於禄余閲夫歴代之史傳獨漢為近古皆以一字為則至扵方術有所不足貴徳命為義則於東魯余君見之成王夫子之訓先儒紬繹不能為言矣或者喋喋然為言其無乃贅而不知非者與余君方力行以為本因義以究其實是不在於吾徒之告異時行脩扵家庭顯扵朝著願勉之哉俾勿賛則得之矣平山説唐僧一行陋周畿漢志之陿始定南北兩戒而山川之肇源止伏一覽以盡可謂善矣然而磅礴雄險隠然若有所限其支脈連属猶屏蔽自衛焉睹所謂平山哉余嘗出居庸上桑乾始識其衍迤之勢千里若一方若布席圓若拱璧氈廬蔽空凝雲積雪杳不察其髙下故其行者如升虚騎者如凌風忘登頓之勞繇是逹扵金山靡有紀極而視兩戒之説倍蓯未足以議也王侯設險以防國徳不勝不足以恃是則幽州之北山不以險稱雄絶萬世朝九州以函諸夏豈峻極于天者非山之謂與在易之象曰地中有山謙不言山在地中謂有髙大之實蔵於地謙之象也余嘗聞洞庭諸山跬步巖㟧謝君獨取其平焉久留京師願至開平知盛世之廣洗耳目之固陋歸於故里卧逰以思登東山以小魯夫豈虚言哉琴述贈黄依然往六十年錢塘楊司農以雅琴名於時有客三衢毛敏仲嚴陵徐天民在門下朝夕損益琴理刪潤别為一譜以其所居曰紫霞名焉自渡江来譜之可考者曰閣譜曰江西譜閣譜由宋太宗時漸廢至皇祐間復入祕閣今世所蔵金石圖畫之精善咸謂閣本盖皆昔時秘閣所庋而琴有閣譜亦此義也方閣譜行時别譜存扵世良多至大晟樂府證定益以閣譜為貴别譜復不得入其學寖絶紹興時非入閣本者不得待詔私相傳習媚熟整雅非有亡蹙僨遽之意而兢兢然國小而弱百餘年間盖可見矣曰江西者由閣而加詳焉其聲繁以殺其按抑也皆别為義例秋風巫峽之悲壮蘭􅆏洛浦之靚好将和而愈怨欲正而愈反故凡騷人介士皆喜而争慕之謂不若是不足以名琴也方楊氏譜行時二譜漸廢不用或謂其聲與國亡相先後又謂楊氏無所祖尤不當習噫楊司農匿前人以自彰故所得譜皆不著本始其為今世所議無可言余嘗習司農譜又數與徐天民還往知其聲非司農所能意創間以問天民時天民誇詡猶司農也謾對焉終不以悉余益深疑之而莫以據後悉得廣陵張氏譜而加校焉則蔡氏五弄司農號為精加紬繹皆張氏所載獨楊氏隠抵不述耳今世琴調清商號為最多郭茂倩記古樂府琴辭亦莫盛扵清商杜佑氏叙論雅樂謂楚漢舊聲猶傳扵琴家蔡氏五弄楚調四弄至唐猶存則今所謂五弄非楊氏私製明甚議者悉去之不可也按廣陵張氏名巖字肖翁嘉泰間為叅預居霅時嘗謂閣譜非雅聲扵韓忠獻家得古譜復從互市宻購與韓相合定為十五巻将鋟于梓以預韓氏邉議罷去其客永嘉郭楚望獨得之復别為調曲然大抵皆依蔡氏聲為之者楚望死復以授劉志芳志芳之傳愈尊而失其祖愈逺天民嘗言楊司農與敏仲少年時亦習江西一日敏仲由山中来始弄楚望商調司農驚且喜復以金帛令天民受學志方故今紫霞獨言劉郭而不言廣陵張氏傳授皆楊氏與其客自私之蔽越有徐理氏與楊同時有奥音玉譜一巻以進律鑒琴統入官其五弄與楊氏亦無異晚與楊交楊亟重之益知楚漢舊聲非楊氏所作余来京師見鼓琴者與紹興所尚微近苐重緩如寛厚長者余不能以是説告之也黄君依然豫章太史之裔以琴逰公卿余未識之而余之嗜琴當有同者故書其源緒以解夫今世之惑而因以告之贈醫者陳生鄞衣冠家為最盛閭里棟宇相接屬議醫藥尤尚選擇輙考論其世又察其詞色温謹涉於儒者始得進焉每視疾必先告以虚實先後始筆簡牘議其月日以校重輕有不如式者争詬病詆笑於時待之也良厚而所謂醫者亦咸自愛重不敢妄試車軌混合南土㳺宦居多中原人壤髙氣厚所服餌率宜寒凉由是羣醫争視好尚迎合間有奇中遂復以施於鄉黨十失其半夫泥於古者非通論而强試其所不可吁亦殆矣余官京師時遇南士之稍適扵時者服食嗜好茫不可分辨疑誠中州人也莭宣之不時亦復以攻𨗳之法自治問者未退已倉卒不復救輕千金之軀以夸眩誠有罪猶諉曰是不通至扵業醫捨風土燥濕之宜以逐近利利未獲而害日以甚吾不知其為何心也里中陳氏子某世為醫祖父篤厚君子也力訓諸子讀古醫書長子辨論開博余每見之則曰醫不可以泥古徇今則非矣又未㡬而死心每悼之後二十年其孫復自立不墜余迺有言曰夸言以為容非術之工也媚時以自售非術之究也相其州里審其表裏神而行之日踵於門者莫可禁雖嫉媢遏抑不足為子懼朂哉以樹道何憂焉示羅道士近世通南北謂吴中所習琴為浙譜其咎在楊司農纉諱其所自譜首扵嵇康四弄韓忠獻家有之􅇑胄為平章遂以傳張恭政其客永嘉郭楚望始紬繹之今人不察百喙莫以解精扵琴者始知之北有完顔夫人譜實宋太宗閣譜余幼嘗學之其聲數以繁完顔譜獨聲緩差異而裹聲良同字本扵右軍今而曰浙字琴本扵蔡嵇今而曰浙譜吁其孰能解之玉笥羅道士大章秀敏且文其㳺扵藝也必求其極致傳余操調嘗以幽逺沖寂之㫖語之當扵其心盖愈澹則人愈厭余将終老故山異日大章能芒鞋以訪一倡三歎之遺尚有以相告聲生扵無形而悲愉感愕之跡畢具古人之事扵斯者豈徒然哉因書以告之贈番易筆工童生咸淳間湖州筆工馮生製筆得截法圓不至輭媚勁不至峭直一筆可作萬字馮生死其弟若孫漸變家法然猶有韻度近世子昻承㫖擅書名吴中筆工争進技庭下率形製相類書不滿卷則己成秃翁盖毫熟則易乏如脂韋之士寜復生氣子昻不言其短将以為彼養生計来京師劉自謙編脩以番易童生筆為贈絶類玉山徐氏舊製先正肅公平生惟用徐筆守番最久徐氏妙法豈童生家世能傳之耶梔蠟粉澤識者所哂譬如行車慎操其輈詭遇獲十蔑有效矣右軍製筆法傳諸葛氏嘗作右軍筆進栁誠懸栁不能用吾徒書記姓名童生之哂甚扵諸葛願勉之三吴専利将却走以避峩峩清逺可用扵朝審矣清容居士集巻四十四欽定四庫全書清容居士集卷四十五元袁桷撰題跋皇姑魯國大長公主圖畫奉教題徽宗扇面水殿風髙菡蓞清手題紈扇墨花輕君王猶道宫中熱竟上臨潢五國城定武蘭亭薛郎輕薄盜為鄰蟹爪金鐘眩世人從此子孫千百億錦囊玉軸各稱真牧羊圖髙栁風清曉日蒼牧童隨處候隂涼似嫌挟䇿當年客物我胸中兩未忘吴元瑜四時折枝吴生天機握羣動彩筆隨時作輕重幽如静士槃澗歌妍若妖娥漢宫寵娟娟交鳴疑欲語宛轉不去情相送宣和殿前花似玉珍禽低昻手堪捧傳言寫生論甲乙御筆親題羣軰竦一朝百幻歸逝水舊苑凄凉麥成壟君不見桑間栗留田間雀難作折枝奉宣索九馬圖九衢塵沸各低頭水暗荒陂得自由矯首天池欲歸去乗風緩從玉皇㳺江貫道煙雨圖江生泉石本膏肓刻削經營入𣺌茫老樹雨深龍翼重隔川雲冷縠紋長吟鞍欲度愁溪徑漁艇将歸認石梁擬向此中尋隠計底須紫禁謁虚皇貫道紹興間召至行在所一夕而卒周増水塘秋禽圖蘆葦蕭蕭秋水清拒霜迎日鬬紅英鵁鶄屬玉休驚訝嵗晚江天得共行王振鵬狸奴畫堂緑幕鎮犀懸花影雲隂得散眠自是主家扃鎖宻晚風縁木捕新蟬天王供佛圖諸天陳妙供奉佛演大乗佛以施受之佛亦墮因果所施不願報自然福無量布金與獻花輕重同一念若以多寡論富者日増益天王䕶虚空如月七寳合正覺無等夷即不入生滅世人重施報萬刼成輪迴問佛佛不言彈指即成就徐白秋塘戲魚圖魚背水深一尺溪毛日暎千絲似笑釣鼇狂客獨騎瘦馬歸遅惠崇小景惠崇作畫荆國王文公屢褒奨之亰卞作宣和譜堅黜之何耶余嘗評惠崇逺景不踰扵吴頭楚尾殆如大年朝陵止見西洛山水然黄太史作詩曰坐我瀟湘洞庭豈其芒鞋踰楚而南胸次浩蕩非少年所作也此卷得之黄太史松風閣詩謂松有風松不知謂風入松風無形聲繇形始成言六書者取焉肇扵無名入扵有名萬化之始吾未始以妄聴松動風動當扵混沌以前得之斯可矣王生鬼戲圖青天白日其呈怪獻醜迺敢是昔人嘗云有錢鬼可使無錢鬼揶揄作斯圖者其無迺逆旅燈下見其情状抑亦貂裘珠帽視窶人子類以此目之邪出山佛像世尊雪山成道時日食一麻一米其枯槁盖可見天王八十億衆猶未深伏故其獰雄怪醜溢扵面目胡跪合掌當是浄瓶不動以後儀相若曰相好端嚴閉目則失相由目成有相俱妄或有問曰丈六金身真妄曷辨荅者曰清浄妙法身無住亦無去明月印海波白雲倚巖樹折枝錢生調露滴花枝蜂蝶無知鎮日隨記得畫橋流水處雙紅背立隔簾窺隆茂宗羅漢子昻評畫要是具眼隆無住葉石林門僧久居升山故其作畫極多徳夀宫評畫以隆為龍眠嫡嗣今觀此巻信然周昉金星兊景肅萬寳秋水瀉銀潢渺渺帝子降寳冠縠文裳凝睇白玉京晶熒動摇光手弄鵾雞絃運撥雲飛揚正心秉無回緩莭申以商西逰升廣寒東迴從扶桑龜臺鈞天奏八景儼髙張出入復安窮隠見定有常閶闔下符貺嗣嵗歌穰穰稽首連蜷靈萬年奉虚皇黄居寳湖石水禽圖峩眉雲疊翠淒迷更着層峯小殿西誰信蜀王辭劒閣鴛鴦飛盡杜鵑啼􅆊隆䕶法神威音無善亦無嗔獰目揚眉定有因欲識世間平等觀雲如流水月如輪馬賁秋塘水禽圖古木荒陂澹澹秋禽鳬髙下意夷猶似憐天際南飛雁年去年来不自由孤鶴圖一庭涼月白萬里海雲清似欲乗天女排空入帝京唐摹鍾繇賀捷表賀捷表唐摹有二本褚河南微瘦而勁峭徐季海差肥而沈着此本盖自季海来若希白長沙帖所摹則祖河南舊本施武子墓田丙舎石刻與此筆法無異觀此足以知前人鈎搨之工孔世三十八白而長身猶取其類况此實曽𤣥也與宜重寳之傳古龍賛下土焦聲嗷嘈靈在湫蕩逰遨鼓以風挟以濤受帝令行林􅆏百榖成神功韜庶徴叙靈靡勞何尊師醉猫攪甕翻盆勢不禁晚風辭醉首岑岑醒来獨立䦨干畔四壁無聲蟋蟀吟羅漢圖四果圓融得自如天台樓閣總虚無何人繪畫供青眼拍手雲中笑客愚錢舜舉禾䑕七尺長身愧負多清時空食㡬囷禾營營蒼䑕嚵分寸不奈詩人總譴訶徽宗鸂鶒太液池清皺碧羅兩禽相對盪春波當年肯憶閻中令䑛筆和鈆恨未磨徽宗桃核圖三足之烏千嵗芝當年曽作帝王癡黄龍府裏沙溪淺準擬平分作酒巵蕭照江山圖蕭郎解作湖山圖上皇一見玉色愉明知此景落歌舞别灑妙墨為訏謨長江吐吞恨無極突兀金鼇障西北雞鳴不聞中夜起零落烽臺候朝夕蒙衝揚帆去如仰遥望青徐在吾掌諸公坐談籌畫䟽年年送使𤓰州上輪囷米舟踰沔水驕将髙眠載吴妓卷蘆吹笛斜陽愁折箠投江等兒戲只今承平五十年蜀荆賈客船相聫箜篌傳歌賽神舞不信人間有今古順宗墨行濃淡娟娟涼月低昻淺淺春雲胸次何須千畝筆端咫尺平分臣然山水空江浩蕩挟秋聲不是匡廬只秣陵老子定回神觀静笑渠艇子浪千層趙昌折枝瑶池朶朶玉精神滴露研朱竟奪真蛱蝶不知遮繡幕飛来猶認故園春時苖留犢圖伯夷采薇身苦飢人言周土夷受譏鶴翻孤松蟬嘒栁絜腹得免身中肥昔聞汲井嘗投錢清白之子推父縑人生作事在平易鄒子受金非慊然時君作吏心不懈一犢相辭匪奇怪當年孝亷争入徴壺飱柴車魏王令㣲宗瓊蘭殿記記中云湖湘佳致足以指顧其髣髴玉殿遥思湘水逰欲看虞帝九疑秋二君野死難相似宫女當年一様愁蘇李河梁圖李藻曽作河梁客山迴溪水灣春看人北上秋見雁南還燕文貴山水翰林學士将仕郎守雲州雲應縣主簿晚色蒼茫外秋聲縹緲間亂溪環水佩千嶂疊雲鬟曉瀑村舂急風林寺鐸閒片帆如可託吾欲與君還海潮圖銀潢清淺瑞星輝的的秋光下紫微欲識潮音真實相落迦山畔五銖衣海狗窠石圖靈璧層峰負六鼇藥欄花檻翠周遭如何畫史同羣吠不與君王繪旅􅋙王振鵬錦標圖界畫家以王士元郭忠恕為第一余嘗聞畫史言尺寸層疊皆以準繩為則殆猶修内司法式分秒不得踰越今聞王君以墨為濃淡髙下是殆以筆為尺也僚丸秋奕未嘗以繩墨論孫吴之論兵亦猶是也然嘗聞鑒古之道必繇其侈靡者言之余扵畫㫁有取焉龍舟之圖得無近似不然昔之所傳者安得乆逺至是耶㣲宗梅雀圖金帝母家宋外孫筆畫好樂餘風存披圖勘書儼相似天水别記牙籖分明昌宫中三萬軸盡日雲忩看不足平明鐵騎踰河来玉􅞃金題碎車轂上皇寫生工入神一枝瀟洒江南春天興之初汝南失猶解傳蔵記年日卷題天興元年蔵記為言當年愛遺墨不如洗手還河北黄宗道播州楊氏女長頭黒髪垂𤣥雲矯矯馬首雙手分彫弓寳刀左右挟欲領鐡騎趨崑崙前關濤湧如壊墻後砦百溜奔溪篁羣蠻簇唇争呌囂云是楊家女子功最髙旋如長蛇轉空洞快若俊鶻凌風飄還家膏沐帶簮珥父母見之眼垂淚君不聞木蘭女兒着金鎧年少從軍顔不改一朝脱役歸故鄉樂府相傳至今在魯國大長公主圖畫記至治三年三月甲寅魯國大長公主集中書議事執政官翰林集賢成均之在位者悉㑹于南城之天慶寺命秘書監丞李某為之主其王府之寮寀悉以佐執事籩豆静嘉尊斚潔清酒不强飲簮佩雜錯水陸畢湊各執禮盡歡以承飲賜而莫敢自恣酒闌出圖畫若干巻命隨其所能俾識于後禮成復命能文詞者叙其嵗月以昭示来世竊嘗聞之五經之傳左圖是先女史之訓有取扵繪畫将以正其視聽絶其念慮誠不以五采之可接而為之也先王以房中之歌逹扵上下而草木蟲魚之纎悉因物以喻意觀文以鑒古審時知變其謹扵朝夕者盡矣至扵宫室有圖則知夫禮之不可僣溝洫田野則知夫民生之日勞朝覲賛享冕服懸樂詳其儀而慎別之者亦将以寓其儆戒之道是則魯國之所以襲蔵而躬玩之者試有得夫五􅀴之深意夫豈若嗜竒哆聞之士為耳目計哉河水之精上為天漢昭回萬物矞雲興而英露集也吾知縑緗之積寳氣旁逹候占者必扵是乎得泰定元年正月具官袁桷記清容居士集卷四十五欽定四庫全書清容居士集卷四十六元袁桷撰題跋書孝宗賜史忠定王褒賢臣頌後右王褒聖主得賢臣頌乾道八年先忠定王守福唐孝宗皇帝御書遣使繇郡治所賜也始忠定為直講時嘗沐是賜實署御名且書王字于後是後繳帖以進遂復被是賜焉猗歟盛哉惟聖主之得賢臣唯髙宗傳説事相脗合方王之為直講訏謨定計盖已見扵三善之陳告監先王之成憲惟孝宗足以承式克欽承旁招俊乂惟忠定足以繼舊學之素夫豈若持守希阿光禹輩然哉故其在相位也知恢復為正論時有未至則寜受衆誚而不避相位三月正色引去未㡬符離潰師張魏公首乞速定和議則昔之未敢出師盖實在是家居十年王之心事露白扵天而昔之言恢復者皆大言取官位一無所成就至是君臣交孚過闕入對寳畫森著實彰厥㫖非偶然也桷之外大父敷文户部為王嫡孫是生㑹稽郡君桷實親出學術荒薄為國朝史官十五年獲纂金宋舊史簡帙繁廣猶未克就五世孫公升王之大宗獲寳是卷他日願上扵太史俾有考焉延祐七年十月己酉外曽孫具官袁桷拜手頓首謹書書彭忠毅汝方贈官誥後忠毅公實尚書器資公之親弟以尚書門功補太廟齋郎故終身為右選官方臘䧟歙睦杭三州衢介扵中公以孤城分守卒罵賊以死當時贈典亦至厚矣嗚呼豐亨豫大之説行馴致靖康長驅中原皆望風迎降嘗讀兩朝忠義録而悲之則公盖居其首見危致命臣子之當為徹彼桑土不能不憾扵宣政之事使龍圖公正色朝著事寜有是哉書髙安蔡中允誥後嗚呼宋仁宗世康莭邵先生以為日之方中至今南北議論無以易何則賢人多而朝廷治故也今觀髙安蔡中允誥身而桷世為史官請得以考焉故事進士第一獨命詞以其相繼者為首次其甲乙若幕職縣佐則總其詞命以畀之石揚休字昌言眉山人蘇明允先生所敬尊者以髙第為同州推官誥中首稱是也元豐前率沿唐官制舊六曹尚書侍郎總為階官入政府始得之吏部専職則有三班審官流内銓等官誥中署權判即判流内銓也知制誥舍人職也亦元豐正之翰林學士權判曰郊宋郊也言前已改名非也李淑五為翰林學士景祐間元憲同院淑忌其先登譛之曰姓符國號名應祀天實斯年也始更名焉曰絳陽夏謝希深也謂為韓絳者亦非也是年父億為參知政事無父子同要地之理竊考仁宗更元凡九而史官與歴年圖景祐止四年為寳元今誥曰景祐五年倘不知者寜不置疑焉吾敢為蔡氏子孫言之景祐實有五年六月前猶五年也至秋七月郊上尊號曰寳元皇帝凡十四字遂更寳元焉是則自七月始為寳元紀年者莫知遂悉以寳元元年書之先正獻公以秘書監禮部侍郎領史事先越公為秘丞著作郎覩舊史聞扵家庭者若是輔之不鄙謂余世習臺閣故事遂書以歸若夫賛美感慨有諸賢説在不容扵言矣至治元年九月丁丑史官袁桷書題放翁訓子帖放翁先生送其子之官獨書荘子二章以訓或曰五經切近而書荘子何耶余曰自農師右丞相尊臨川臨川宗老荘故其家學世守之此二章足以涉世變清而容物逺禍之基也喜怒哀樂不入扵胸次進徳之本也紹熈黨禍萌蘖故逢迎者廢扵嘉定標榜者錮扵慶元雖善惡岐而當時仕進者寜不自重先生教子之意深矣晚嵗一出終能全身以歸觀此盖可知矣袁桷書題汪龍溪與從子書後汪氏皆祖新安故先生祭其逺祖有曰散處諸邑非雲則仍今玉山番陽宣城新安皆同所自獨新安之宗其别為三貴賤貧富角立不相通叙世逺源分故若是耶先生居饒之徳興而宣城諸房皆祖之先生嘗謝其宗衮舉刻有曰渡江而上傷不見扵它揚其敦叙同姓無彼我之異中興誥令盖合王蘇之精整明暢文獻益逺桷以荒陋備員詞林踰十年每惕念罔敢替敬觀遺墨因以識景仰之志至治元年十月壬戌四眀後學袁桷書跋朱文公與辛稼軒手書晦庵嘗以卓犖奇才股肱王室期辛公此帖復以克已復禮相勉朋友琢磨之道備矣嘗聞先生盛年以恢復為最急議晚嵗則曰用兵當在數十年後辛公開禧之際亦曰更須二十年閲歴之深老少議論自有不同焉者矣公所居號帶湖一夕而燼時文公猶無恙慶元四年公復殿撰此書盖戊午嵗以後所作至六年則文公夢奠矣今觀此帖益知前賢講道彌老不廢炳燭之功良有以也夫跋蔡君謨帖蘇文忠評忠惠行書第一後見莆田所刻亦主此論亰卞師其從兄而名莭虧䘮愧恧多矣爾雅姊妹之子為甥至晉世則謂之郎忠惠日習晉帖語與之俱化矣題曽文昭詩文昭文肅當貧苦時皆舎人撫字迄見有成至扵制誥則殆青過扵藍尚書省記實公所作後評文者謂當為萬世法器資番陽彭公與公同臺熈豐改更乃若有不同者幸以内相謝事卒為全人後作史者宜深考焉跋曽文肅帖顧子敦為河北轉運時實司馬公作相之時子宣猶在外服建中調停之説既興善惡玉石黨碑既成則子宣亦復同傳後之作史其去取為如何嘗讀丞相日記類其子姪若公衮輩縁飾術不可不慎扵紹興作史見之跋楊補之月賦逃禪老人出處清峭當與魏林同傳思陵愛其所作宫梅将召見之一夕遁去此真方外士昔人言蜀無他楊以九州言揚州或言輕揚或言維揚子雲寂寞賴此能紹宗矣跋米元章帖中年養生惟獨宿第一東坡貶謫有權發遣之語山谷戒行堅嚴有漫種老生涯之詩信知未易脱釋景逺余故人能寳襄陽二帖晚嵗煎熬良不能自存釋氏嘗扵此騐生死關聞之者足以戒矣書東坡寄真隠詩東坡先生作續養生論知及之而未知守者晚嵗慕丹元子真隠翁桷嘗深疑之道以氣為母文以思為宗二者相反聚散有不同耳神行六虚止者合扵自然朝市而能之者無是也故近世方外之説釋性命為二途平叔之學不復傳言語動作一謂之性卒未見有超然者巽堂内翰明至理通𤣥微異時登紫霄峰願相與竟其説坡仙㳺八極之表必撫掌視吾二人矣跋晉帖晉帖見扵淳化多不成文盖唐文皇去其㫁爛以成卷軸今十七帖號可讀餘則不然矣姜堯章作絳帖釋文旁證曲引有功扵金石缺亦疑之此帖盖唐人搨本欲求文義則㡬臆説矣跋于湖帖于湖先生與王宣子皆紹興進士第一而皆以政事發身二公皆守湖南此帖盖于湖江東宣子尹京時也杼山劉季髙寓金陵于湖守行宫納謁杼山杼山曰守謁當有故于湖曰願求書法杼山野服以肅于湖拜而受之今其書盖與劉無異也文獻彫落因㢲堂内翰出其書敢以過庭所聞者告焉書陸子履賀復熈河詩後王樞宻開熈河功成而萬骨枯矣至元祐初司馬公堅欲棄横山之地深恐生事之人復啓邉隙故耳維州牛李之事是温公去取之本心後之評史當扵是考焉陸子履歐公之上客作是詩其亦有媚夫上之意厥今皇圖窮吐蕃而西唐宋之恥一洗而盡時則有若縂帥汪公以元戎經略桷舊為史官得鋪揚其偉績今獲觀此卷始知英賢夷考往事以展拓其素藴盛矣哉跋定武稧帖歐陽公著集古録言定武二民家各有石較其本纎毫不異是則定武有二本從来久矣後宋諸賢謂薛向之子嗣昌私易定武本别刻石以留公庫此論千人一律今以歐公所論則明有二本薛守定武果易以歸則民間猶有一本是公庫本為苐三本矣議者又謂嗣昌鑱損湍流帶右天以亂真後入宣和曲水亭余嘗毫髪辨證亦微有不同此卷壓角小印正嗣昌名印而米襄陽親跋尤真舊蔵張參政孝伯家其子寺丞即之以書名一時大變古體遂不能傳印識猶可考也今以余平昔所見本悉疏扵後不損本趙眀誠本前有李龍眠蜀紙畫右軍象後明誠親跋眀誠之妻李易安夫人避難寓吾里之奉化其書畫散落往往故家多得之後有紹勲小印盖史中令所用印圖畫者今在燕山張氏家王順伯本苐一跋是王黼順伯名厚之號復齋有金石録家蔵石刻鐘鼎篆籀鑑銘泉譜侔内府其家兵後不廢近嵗丁未饑越新昌尤慘遂悉散落始歸于龍翔道士黄石翁黄秘不示人後有順伯為浙西提舉時擕入秘省諸賢題名皆有其最著者樓宣獻劉文莭今亦歸張氏趙子俊孟籲得扵閩中有樓宣獻跋剪碎作冊葉與前一本無異今歸子昻承㫖家蘇承㫖易簡苐一跋後有元豐諸賢同觀于鄞之城南崇法院有舒信道字畫然不著名在内侍譚氏家精神無毫髪恨趙子固本舟過嘉興遇風舟没子固疾呼曰蘭亭在否舟人負以出子固作跋識其事復題八大字曰性命可輕此寳難得子固死入賈相家賈敗籍于官有官印歸濟南張參政斯立今在集賢大學士李叔固家潘經略畤本題識皆徳鄜手書滿軸余以有米跋本遂贈鄧善之文原鄧借田師孟師孟有借書不還癖因留之余跋乃剪去矣損本龍圖閣學士劉公克荘本細書滿紙後有賈相跋亦滿紙括蒼鄭陶孫為福建儒學副提舉得之為翰林應奉貧質于甆器劉氏屢入子錢卒以逋重為劉氏所得有叔信父印損本多有叔信父篆印盖宣和曲水亭既成亟以御筆繇亰兆薛嗣昌家宣取留内璫所暮夜以匱金紙即越蟬翼紙疊三紙連印故下本肥中本着中上本微瘦然皆無異此本子昻得扵都城装成册葉甆器劉生手之不置以銀壺杯盂易之翰林承㫖趙孟頫家本得扵霅溪陳侍郎振孫伯玉號直齋其家蔵書冠東南今盡散落余家亦得其數十種此本亦有叔信甫印翰林侍讀學士張伯淳本有黄豫章跋余每疑鑱損與山谷差有後先然本無異前數本更俟他日以考題薛紹彭帖長安薛道祖與米元章劉巨濟為三友朝夕議論晉唐雜蹟圖畫然其作字則各自成一家紹興中購薛米書最急悉以小璽印縫後御府刻米帖十卷而道祖書不得入石客杭見道祖書一巨卷于駙馬都尉楊公家精神峻整遂深疑紹興不入石之故問于子昻子昻曰薛書誠美微有按模脱墼之嫌余不能書而深識其語私嘗謂米襄陽書政如黄太史作詩之變芒角刷掠求扵匵韞川媚則蔑有矣學魯獨居之男子於道祖見之至治二年八月乙亥袁桷記魯公坐位帖坐位帖真蹟在亰兆安氏家嘗刻以傳世吴中復守永興謂安氏石未盡筆法因再模刻此二本余家咸有之安氏子孫分析坐位帖乃剖為二此帖至行香寺僕射指後不復有盖吴安石刻本卓頭髙指後别為一行遂由是平分為兩是安氏兄弟不學之謬東坡見安師文時帖尚全嘗手搨數十本余得坡公搨本於東平王氏無纎毫失真旁用眉陽蘇氏及趙郡蘇軾印記米襄陽少年嘗臨之邵伯温亦云安氏析後不復見全本此卷筆法絶類米老往見乞米帖墨蹟扵子昻家子昻以重資得之余心有疑而不敢言余得此帖紙色行墨絶相類遂定為米老所臨無疑延祐二年八月丁丑袁桷氏記書梅聖俞詩後都官公與歐陽公繇河南幕府締交最久至嘉祐元年始一薦為直講距都官之死僅五年耳故王荆公挽詩有云貴人憐公青兩眸吹嘘可使髙岑樓坐令隠約不見收空能乞錢助饋餾此盖為歐公發也崑體之變至公而大成變扵江西律吕失而渾厚乖馴致後宋弊有不勝言者敬觀詩帖精思以求益為之懼至治三年嵗次癸亥正月丁未後學袁桷書黄華帖名庭筠米襄陽學段季展得其刷掠奮迅故作大字悉祖之考諸右軍筆陣實未有是體蕭齋丈二盖其鼻祖季展之變繇是始沈傳師實為雲仍米良有所本矣黄華老人百一帖評品悉祖寳章故其大字超軼抗衡桷舊閲金帝實録老人為脩撰時坐擅議朝政受杖噫使在慶厯元祐寜有是耶至治三年二月史官袁桷書書錢王板授某官長洲縣五代擾攘十國各有年號獨武肅不以數十州之地自負﨑嶇航海入貢中土其設心置慮良逺至再傳則亦建立元號良繇更易不常尊重其一方者不得不爾唐末多板授官扵此見之唐有勅授官與此無異隆殺有等惟錢氏能守之相時以行一門盛事上極宰輔内為都尉與宋同為終始吁盛矣哉吴越皆本武肅而散處淮甸亦其苗裔展觀無斁因為之書書孔子廟堂碑永興公守智永舊法故唐能書人盡變唯永興號為苐一以右軍譜系猶在也余嘗見大周本於故家精神遒整其雲仍散落不復可考此當在嫡孫行唐人唯魏華得正傳孔頴逹碑與虞相似或云孔卒時永興下世已乆書皇甫君碑渤海公以險勁易王體故碑石照耀四裔大小皆合宜右軍世傳皆小楷霜寒帖稍展至筆陣圖則疑非真再傳為千文為廟堂碑確守繩墨稍廣拓非歐不能余嘗評歐書化度苐一皇甫碑與温恭公伯仲臨池積年必領其妙余幼不學書酷喜蔵歴代金石覽此益重自棄之歎題劉共甫與朱文公書劉共甫樞宻世濟忠節而其文詞昭示扵隆興乾道之際四方聳動詎止一經生學士哉樞宻隧碑實文公所撰文公受知樞宻實繇韋齋吏部先友事契此書盖在江東留守時所作扶植故家解釋僚友非盛徳不至是古道寥落肅觀益増泚顙至治三年十有二月袁桷書跋李公擇尚書帖公擇尚書手蹟惟鳯墅石刻一見之元祐間為正人以黄太史為甥它不足論山房蔵書以待天下士盛徳至矣哉題子昻書靈寳經承㫖公作小楷着紙如飛每謂歐禇而下不足論此經尾題詎下世纔兩月痛當作慟書徽宗御書詩道君書此詩當在寳籙宫所製筆法飛動有凌雲步虚之意真元杳㝠詩中有一㸃真元在杳冥之句騐扵五國城下殆詩䜟與㤗定元年三月癸夘袁桷書跋李時雍墨蹟思陵翰墨志謂熈豐以後蔡襄李時雍體製方入格律繇是紹興初年二公字畫俱用紹興小璽印縫此卷政初年所收宋世諸賢筆法終不逮唐隴西公書深有懐素氣象觀此足以知其源委徽宗賜温益搨本黄庭温益以王邸舊僚崇寜初即拜中書侍郎其傾邪翕訿見扵陳忠肅公之疏迫鄒忠公渡海侵侮范忠宣諸賢之貶湖南而崇寜之主愈近而不疑何哉賈生師傅之論得之矣益死未二十年而其子已登次對典大藩又何哉國之亡也宜矣黄庭真蹟在建中靖國刻為秘閣續帖後易為大觀帖余舊得劉無言雙鉤蘭亭今復得此感昔人寵遇之非當因書以為纍臣之痛泰定二年七月丙寅袁桷記跋米元章書趙崇公墓誌故事宗室墓誌例属翰苑撰述嘗觀歐陽公王華陽李淇水王臨川所撰殆得玉牒之五六而其蕃衍盛大一一皆然今觀崇公墓誌多有可書故鄭太宰所作得盡製作之美噫京城括索盡籍以行獨太祖諸孫號為疏逺渡江勃興皆得奉朝請人事之不可料襄陽此卷龍跳虎卧不盡賛述太宰此文亦稱合作惜與王将明蔡元長同傳訖蔽其名可為歎息劉貢父與羅正之手帖彭城劉舎人晚入西掖以元祐元年十二月赤城羅公為開封縣令此帖云相望累年不忘瞻渇盖元祐二年書也嘗考二公相知之舊始扵彭城公之守曹曹為盜區彭城公緩刑而盜息赤城公時為濟隂縣其必有禆扵劉公故其以事罷歸即需章留之有曰伏以羅適自臨百里将及二朞奉詔條主扵恪恭聴獄訟號為簡諒有識詠頌咸謂得古人之風愿民服従可以當屬城之冣惜其未盡施設遽爾罷歸輙徇輿情亟陳囊奏朝廷遂允其請後自開封推官為府界提㸃刑獄其制詞曰强力民事知其要務亦公所為也羅公政績湮落少見漫摭其事書扵後云書潞公帖潞公兩守永興其一自秦州徙知皇祐之五年也其一自洛入覲到郡不數日即召還為樞宻使治平之二年也此帖謂旦夕赴雍㳺嵩之約竟不如願盖入覲時所作也嘗考潞公之居洛始扵皇祐二年之立廟其三年罷政知許州五年徙秦復知永興未嘗一日歸河南也至嘉祐三年始判河南八年復判河南居洛凡六年方家居無事暢心適意莫過扵窮極山水之樂而嵩山去洛無信宿乃不能一踐此約何哉昔王逸少欲逰蜀都汶嶺弗果每為終身恨公晚年居洛㡬三十年山水清詠見扵篇什其與逸少之恨異矣潞公學蘇靈芝書余嘗見靈芝易州碑豐峭特甚觀此筆法尤相肖越國袁桷書跋荆公帖吕嘉問以元豐元年自金陵改知潤州二年四月落職罷郡方是時朝廷積息之弊極矣公時家居然猶不悟其非何哉昔山谷老人嘗言荆公不甚知人痛痒余謂此説殊不近理夫人之厚薄皆生扵情之好惡方熈寜間荆公之所惡者多矣至扵晚年而其所好者又皆背叛構祸宜其平昔簡牘漠然若無世俗之情今觀此帖勞問勤懇且憂其乏絶噫以嘉問之姦何得公之深若此余嘗讀荆公與嘉問詩末章云所懐在分襟藉草淚如洗惜不為范蜀公司馬公諸賢發之跋富韓公帖神宗初年鋭志更治虚席以俟冨公之来然當其時言不足以勝辨徳不可以厭智君臣之際難矣此帖謂舁杖自便盖斯時也嘗三復公求退之章未始不扼腕痛憤而或者謂公逆知五行休咎之説而退則過矣跋蔡忠惠帖蔡忠惠書筆圓韻滿盖其楷法精到所至今人作書先事行草是猶未能言而强之以歌也近世行體多尚嫵媚回視忠惠書凛凛有清介之氣跋王岐公帖前賢作家問語質而情周非如今人從事筆墨長語今觀此帖亦足以少勵薄俗矣趙清獻公帖清獻公祖墓與陶山陸右丞祖墓相邇紹興間陸氏地為攢陵清獻旁近墓地亦皆歸朝廷而不絶其祠祭先朝陵寢遭賊韜之酷痛通于天而趙氏祖墓亦莽為丘墟矣又聞陸氏祖墓復歸王氏今觀此帖慨不自勝陸放翁答杜賢良求牒試書金華杜氏昆弟文學行義大科異等固其常也然自孝皇設科之初有司輙抑而不取故李文簡公之子賢良猶不免謗議自此其科遂廢今觀此帖有愛莫助之之意則一試牒其肯為杜氏惜昔葉正則序龍川之文曰使同甫不登進士則為狼藉人矣噫科舉之弊果足以困天下之士哉書東坡凉熱偈東坡先生作蔵院記自謂夢中所作文不加㸃至作魚魫冠頌落筆驚坐則所謂夢中語特神其説耳今觀涼熱偈語亦與前二文相似釋氏之書皆自梁隋諸臣翻譯故語質而文窘至若楞嚴由房融筆授始覺暢朗公文如萬斛泉風至水涌鳯翔祈文與訓誥相表裏則房融文體一規近之如洗金以鹽濯錦以魚不亦易也焦火凝氷廓然于得䘮之域嶺海炎瘴又何足道三挹遺墨清風泠然書鄭資政伯祖中散題名後山水清事非矻矻朱墨吏所可與鄭公邑長扵斯而三㳺雁山則其清浄之政盖可見矣雁蕩之名自唐末始著故前賢罕有至者此碑字畫頗有顔魯公東林題名筆意益可為鄭氏家寳跋米元章書陶寂本唐彦謙後石晉時避帝諱改曰陶後納唐氏為壻可怪米元章書歐陽公常曰士大夫不眀氏族與禽獸無異然自晉世渡江譜牒散亡夷虜殽互賜姓别族漫不可考要難以盡責也潞公之先本敬氏易而為文失製字之體今陶氏為婚于唐虧人倫之義盖石郎之害不止割十六郡而已米老本曠逹之士而能書此為戒亦足以知前輩非茍扵一藝者吴傳朋書曽丞相夫人虞美人草詩鴻門玉斗紛如雪十萬降兵夜流血咸陽宫殿三月紅覇業已随煙燼滅隂陵失道非天亡剛强必死仁義王英雄本學萬人敵安用慘戚悲紅粧三軍散盡旌旗倒玉帳佳人坐中老香魂先逐劒花飛新血化為原上草芳心寂寞寄寒枝舊曲聞時似斂眉怨悒徘徊愁不語恰如初聼楚歌時清魂杳杳令誰主玉骨他年恥為土㑹當移植漢王宫更伴樽前戚姬舞右瀛國魏夫人虞美人草歌紹興乙夘七月廿八日吴傳朋為沈守約書南豐諸曽與王廣陵為文字交吴紫溪實廣陵之外孫扵曽氏有素則此詩為文肅夫人所作無疑噫熈寜之逢迎建中之調停夫人獨無一語諫其夫而且倚聲弄筆尚論漢髙之戚姬何耶前輩嘗言婦人與知文墨非美事殆有深意然曽氏子孫空青艇齋世傳江西之燈閫庭淵懿有自来矣紫溪自謂筆法得栁半葉體不知此語何所自豈與魯公屋漏法相類然不可强解也跋黄太史帖此一帖疑在黔南時所作有云慎言重行盖息影畏禍之餘意釋氏與太史有縁輟錢奉馬其意盖可見跋東坡黄州謝表昌黎公潮州謝表識者謂不免有哀矜悔艾之意坡翁黄州謝表悔而不屈哀而不怨過扵昌黎多矣然余嘗讀嶺海謝表有云人皆相傳其已死臣亦自厭其餘生言至扵此章蔡之罪可勝數哉書劉元城與李荘簡公書後崇觀間老亰竊威簸權天下善類皆禁錮不用而汪龍溪葉石林陳簡齋號為渡江名賢亦嘗出門下至若元城先生龜山先生荘簡李公進退言議為一代矩範而元城奉祠南京龜山被召荘簡為尚書郎始余嘗疑之久而後知拯世之道有不得不如是也原老京當垂耄之年逆知公論之不可揜張觷以一書生微言警悟悔心之萌黨禍漸解向微諸公少貶以自逭則其無所顧藉之意将必置諸死地而後止方了齋之為尊堯也其意盖亦若是至扵羣姦轇轕用權之道迄不可救由是聲罪而正之吁豈了齋之願若是也朋黨之禍盛扵東漢張讓之䘮持正論者一律獨一陳仲弓往弔後卒賴以解禍乃知志士仁人之用心雖相逺數千百載盖未嘗不相同也此卷皆先生與荘簡公書清名勁莭其淵源實自兹始至紹興和議之首荘簡入參大政皆昔時所聞扵諸老救弊之説逺歴瘴霧其大莭盖自可見惟元城先生字畫端謹之妙有不待賛述敢因荘簡出處之事推先哲之所未發者而書于後丁酉嵗正月丙寅四明後學袁桷書跋唐鎮遏使侍御史倪亞手帖桷與番陽倪仲寳同為太史属一日出其先鎮遏公墨刻一通以示實象山先生識焉俾桷有述謹按鎮遏使廢置之始繇貞元間悉屬諸刺史而邉扵溪峒連扵蠻徼者則特置城鎮而刺史不與焉廣明以来江淮之地秦畢孫楊迭相雄角而鎮遏之職𨽻于莭度信為犬牙要衝雄石鎮之得名實貞元以前遺令唐制御史别為憲銜自押衙都虞候至兵馬使凡十有二年而始為監察又積年而遷止扵侍御史其功髙而軍倍迺得為中丞焉故當時稱謂咸以中丞為貴今此帖言中丞誠尊稱也仲寳言御史之傳今十六世而丘隴昭穆封植彌謹遺言舊諜日補其未備譬之岷江初若甕口而至于海者其源逺故也念昔吾里衣冠故胄皆為文安公之門人俯仰變更而事有不可言敬觀遺墨實勞我心仲寳尊祖敬賢其深匵蔵之俾勿壊大徳乙巳四明袁桷書跋李後主詩藁右散騎常侍徐鉉奉使汝隂泣觀故國主詩筆太平興國壬午嵗前十二月十六日西湖北臺記李主辭廟北行時猶倚聲製曲不知降王宅果淒抑也晚嵗幽憤溢于歌詠竟以憂死獨徐鼎臣守遺臣舊禮痛東鄰之煽禍怨歸錢氏而此卷文僖寳之何耶鼎臣題識足厲薄俗方承平時士風藹然故莫有疑迕使以文為害則當如律令矣悲夫重光書世謂撥鐙然不解何語按書記言推拖撚拽乃具秘訣先徳學士為李西臺余嘗見其三體道徳經及風后廟碑審為無疑天駟監太平興國四年置監有左右復各有二故此印云第一也畢少董文簡公裔孫繇東平南遷多蔵圖畫雜蹟後入秘府紹興間人謂之畢谷董李丞相在翰林三十年太平興國八年始入政地如扈李二學士今玉堂集猶存其制誥趙嘗預修實録所謂初本者是也徐公八分世不多見益可貴重時中宜正色深寳勿為豪巧者簸侮是日袁桷重記跋姚子敬所蔵東坡書飛白記東坡先生語慶厯皇祐未嘗不感歎三復此正紹述深意熈寜諸子迺始崇是議元符間何耶舊見蔡君謨飛白廣不盈尺此字當與是記相屬思陵購先朝書入秘府悉去題識今不可復覩而記為子敬所寳誠可感也夫東坡玉堂制草淳化後學士院紙貢從池陽唐五代所用迺矮麻紙熈陵愛李氏澄心遂易此制蘇公此卷正號玉堂底本桷見文潞公吕申公辭免平章批答有賈相私印疑當時故家剪以修媚與此紙無異今留河東李士𢎞袁桷識清容居士集卷四十六欽定四庫全書清容居士集卷四十七元袁桷撰題跋題唐玉真公主六甲經靈飛六甲經一卷唐開元間書當時名能書者莫若李泰和徐季海然皆變習行體獨鍾紹京守鍾王舊法余嘗見愛州刺史碑黄庭經無毫髮違越至開元間從貶所入朝一時字畫皆出其手此卷沈着遒正知非經生輩可到審定為紹京無疑昌隆公主睿宗第九女景雲元年入道改封玉真因以名觀方盛夏時工役迫急羣臣諫䟽咸入魏知古之疏有曰陛下為公主造觀將祈福祐季夏之辰興工犯禁百姓居宅卒然逼迫令其轉移功徳何有觀地葢太平公主之舊第也唐世諸主多强入道以為報本㝠福否則和戎以弭國難為女子者不亦難哉併識其事于後跋竺氏藏舒沈二先生書二先生授學鄉里時踵門而登巍科膴仕者固不一二數殊異以後衣冠淪落有不忍言者獨剡源竺君嗣孫稷猶能守儒保世庋藏二先生遺墨惟謹桷伏讀沈公書誨有曰兢兢自持若果能爾何用師友審竺君誠能用力於是舒公誌其嵗月則曰樂道其教子薦更百年敦厚愷悌之澤今復未艾竺君諸孫宜力修而善繼焉俾勿墜袁桷書題唐臨講堂司州帖臨書如九方臯相馬遺其𤣥黄筆意洞達妙在轉摺若拘然位置不復有神韻矣唐臨十七帖較閣帖多異此卷紙品墨色真數百年前舊物宋世唯蘇才翁米襄陽得此妙解能書者必能深辨跋鄭太宰奏撰樂章故事圜丘明堂孟享宿齋之夕六宫起居奉表必委學士翼日復命它學士作宣答詞車駕還宫始賀慶成及錫賚亦皆學士所為詞臣書詔填委葢不止是也自元祐以後罷合祭儀文悉倍舊規國用不足二蔡之徒悉遵王安石熈豐理財之法史官書之未嘗不慨嘆也鄭皇后三為妃嬪始正后位實大觀四年之十月今觀太宰鄭公奏撰樂章之文在十二月實此年也鄭相世居開封三開茅社雖繇椒掖之貴而其子孫殆有能以詩書自顯都承公興裔詳習刑政今世所行大理格目實自公始蟬聨官簿見於周文忠公所為墓碑四世孫出示手勑足以見一時文物之美噫翩翩不富之戒又何其速也延祐三年五月甲子史官袁桷書書唐臨蘭亭紹興内府故藏定武蘭亭文皇摹本所刻故毫髮無踰矩至徧賜諸王羣臣則皆一時能書所臨精神横逸雖扺掌相似然猶以為優孟也余所見元嘉賜本第一神龍第二蘇才翁家本第三才翁本則祖神龍褚河南悞字本第四馮承素本二第五禇庭誨本第六陸柬之本第七最後復見米老所傚禇河南本第八傚馮承素本第九今見此為十矣十本皆臨書與定武㣲異同又皆繭紙非雙鈎響榻所可作米友仁定此為模本失之矣况此卷濃淡結構皆出已意每攬二字落筆尤竒媚米老臨模誑一世豈此法不以授其子耶柯敬仲好法書而近世輙效米老眩易者十有八九故余特叙所見且以為貴耳賤目之戒跋齊竟陵王蕭子良書叙云齊永明三年正月十九日換自書契以訪唯文字象形鳥跡總成一卷韋續纂書體中有張芝一筆書鍾繇行狎書曹喜懸針篆書杜伯度章草書此卷葢五十六體之十一耳蕭子良書不傳於世獨述書賦其書有力而無體此卷是唐響榻粉蠟本筆力遒勁有智永舊法宗少文作一環草蕭齊咸慕之子雲書政與此類文皇乃深非之何耶圭璧殘斷然猶審為朝覲遺寳吾於此書亦云跋栁城懸隴西李夫人誌顔魯公錐沙印泥法僅傳於藏真誠懸真得其遒勁魏晉𨽻書以匾古為工至唐虞永興禇河南猶守舊法唐世碑刻作字逾廣遂以長勁為能而晉法悉變矣近世書家不屑顔栁競為李北海書而𨽻體遂絶余拙於書而善鑒未有能易余言者往嵗嘗見栁公書清靜經西昇經靈寳經易賦心經凡五卷當以此誌為第一題定武損本損本定武多匱金蟬翼越紙所印字彌精神不知者迺以纎瘦疑之當宣和流觴亭闕昌宣索急驛以進内侍梁闕以蟬翼三紙連覆得百餘本故上本差瘦中本肥瘦得宜最下本與不損肥本亡異雖非北紙實皆薛氏所竊本也此本葢是薛氏舊本紙墨昏渝殆猶東郭子綦垢弊愈甚而神益清望而就之真有道之士也跋懐素草書四帖藏真論右軍書未若深服後迺為黄長睿所貶殆釋氏所謂報縁員嶠寳晉之餘復㳺戲唐蹟吾意後人無敢出議口當以是為徴跋歐陽詢隅隩帖評書家嘗言率更書難雙鈎葢其落筆全在骨法若填補肥媚則失其體舊見唐彦猷摹鄱陽帖筆意絶近此卷殆髣髴之矣跋聖教序三藏記舊經生多習之李西臺人品髙猶不免蹈襲今觀此卷遺其𤣥黄非有拘窘蓬萊神仙海鏡雲滅濡毫而踞龜殻非此翁也耶跋懐素自叙自叙墨蹟俱有蘇子美補字凡見數本董遒進徳夀殿者為第一然子美所補皆同殆不可曉善鑒定者終莫能次其後先今觀員嶠所書貴耳賤目之士願加詳焉跋急就篇索靖急就王廙所藏僅存於衣摺是渡江時已不完章法㣲茫轉摺之分少失之則訛謬矣自唐以後遂不敢以是擅名觀此足以驗筆塚之功噫誠難矣夫跋懐素聖母帖劉綱得道四明余嘗欲㳺山中攀懸崖坐石牕問超世之㫖而未得今觀此帖極偉怪素為文世未之見而此帖亦世少摹刻觀法書㡬三十年謏聞若是是果孤陋耶跋玉笥觀李後主牒漢武南巡以天柱為南嶽而江西諸山言神仙者皆宗之玉笥山記所言漢武良本此至蕭子雲撰立館碑有曰清虚之館葢其地也李重光以蕞爾小邦當開寳末年兵勢寖迫奉宋正朔不暇給而猶曰御批此殆終身不去帝號之誚所行文又曰凖教則王制也南唐之亡城陷猶誦佛不輟渡江雖功在曹彬而江面濶狹表裏實一僧圗獻于太祖宋史闕言耳九華先生道家者流李主得國之效觀其成敗為之憮然前史官袁桷書跋蔡君謨汶嶺帖君謨行書蘇文忠定為第一其所摹右軍諸帖形模骨肉纖悉備具莫敢踰軼至米元章始變其法超規越矩雖有生氣而筆法悉絶矣昔人嘗言程李御兵各善其用學程之道猶魯男子也君謨葢深知此唐人雙鈎多横榻執筆尊謹懼其妄出胷臆也今觀汶嶺帖較唐文皇棗木本益足取徴延祐五年六月㑹稽袁桷書秘閣續帖劉無言雙鈎開皇蘭亭元祐間詔以秘閣舊蹟淳化所未臨摹者命劉燾無言董其事為續帖十卷至建中靖國畢工後大觀間蔡京復增臨十卷去無言所題命京改題通為二十卷後復有孫過庭書譜今世號為太清樓帖是也開皇真本後繇榷塲復入徳夀御府號神龍蘭亭紙前後角有神龍半璽葢唐中宗時所用印也理皇下嫁周漢長公主于駙馬都尉楊鎮故事奠雁奏進禮物一百有二十奩理皇從復古殿取神龍蘭亭為第一奩以報宋社亡楊氏子不能守歸于濟南張參政斯立大徳末年復歸集賢學士李某余得見之以百花蟠龍官作錦為褾首前有希世藏小璽真竒物也此卷正為無言在秘閣親摹事見無言手跋向氷文簡公裔孫當韓侂胄聚閲古圗畫皆出氷鑒定自淳熈後圗籍考訂之富惟霅溪向氏錫山尤延之諸暨王厚伯三人然字畫最惡拙及今與僕遂成四人延祐七年二月六日越袁桷記時官集賢獲覩此卷賈相舊物也跋蘇文忠與黄師是尺牘黄師是寔先浦城人其父頴州府君好謙與二蘇公為同年進士師是遂與蘇公家通姻譜嘗為提㸃刑獄文忠有曰白首沈下吏緑衣有公言之句所謂緑衣葢指侍婢朝雲言師是官職之不遷云爾師是官至侍制其弟宰星變上疏論蔡京遂長流海島有子子㳺脱驂以𦵏歐陽徹張魏公義之後居四明之奉化此帖縫印曰仁儉者為子㳺之子而視師是為伯祖仁儉之曾孫應春以詩學教授鄉里後其子皆為達官桷嘗聞長老言其家所藏二蘇公帖凡數十紙五世澤衰皆散落殆盡此帖盖遭母章碩人之䘮文忠所慰唁者舊亦嘗見石本今獲真蹟為之深有感焉跋米元章書元章壯年學蕭誠書後學段季展最後悉意師禇河南其體三變晚復規模大令往往行書為長御府米帖有楷書周官性不耐拘檢時有塗注中原諸賢所見周官葢行書也草書之變始張旭行書之變由米老葢其鎮逸政相似耳孫過庭嘗自言作書無一筆大令善書者必能評其優劣也跋汪氏推恩誥右信州汪氏孺人誥一道實夀聖齊明廣慈備徳呉大后夀七十時孝宗上夀康夀殿推髙年恩所賜也紹熈五年復以八十行慶夀禮未㡬孝宗崩危疑之際定立曾孫母儀四朝猗歟盛哉嘗考乾淳之際國境寧謐天子以孝治天下一時郡縣以年髙聞于朝者視汴史惟最多舊制男女凡年登百嵗得官封仕而父母年九十官封如民百嵗而慶夀恩八十以上始得預如前制差等焉張氏自待制時為宦族則汪氏之年耆葢可知矣參政師㸃葢施公施為廣信人首相文定王公淮實桷外祖母碩人之大父于時文定作相其母夫人猶迎養相府君臣廣孝於是可見元傑沈靜好修學老子道猶能寳家牒於易代之後故國喬木藹然遺思桷也世為史官得無書乎袁桷記題李龍眠雅集圗龍眠舊作雅集圗在元豐間于時米元章劉巨濟諸賢皆預葢宴于王晉卿都尉家所作也嗣後詩禍興京師侯邸皆閉門謝客都尉竟以憂死不復有雅集矣元祐更政蘇文忠公為中書舍人黄太史入史館張右史晁河中為正字秦少㳺以品秩最下亦校黄本書籍未㡬晁以憂去又未㡬趙挺之論蘇公少㳺魯直同一䟽否則晁亦在䟽中矣噫元二之際號為翕和黨論之萌葢已兆朕良可悲也此圗盖作于元祐之初龍眠在京後預貢舉考斯時之集則孰為之主歟曰此安定郡王趙徳麟之集也徳麟力慕王晉卿侯鯖之盛見於題詠文潛嗜飲樽罍滿几者其實也少㳺凝然有思其小秦王之意乎魯直每遇家妓輒書裙帶今乃題卷猶故態也東坡公精神凌厲見於筆墨而待門下三客葢未嘗以此易彼嘗考文章盛時各展素藴故六君子别集體製各備後宋之弊以華貫為重墓中之文前歸於周文忠公樓宣獻踵之至於末造劉龍學専之矣仰止英躅庸書于後題八馬圗後龍眠嘗作明皇八馬圗此葢其雲仍也奚官調牧深得沙苑間意態畫評云人稱髙名馬虧先匠余於斯圗亦云題雙竹圗彭城遺𣲖如俞且軒梁率菴皆有蕭洒意態世人貴耳賤目正不免如米老牛即戴嵩象即章得之誚此卷雙折枝煙雲慘淡展閲晴齋頗有莊生去國㡬年之意書藝祖皇帝十節度風雲圖後杯酒釋兵柄此啓運立極之基也然文盛武衰亦自此始攬風雲圗痛當作慟遺民袁桷書以辟穀圗夀張治中俾識其後參預篤素張公孝伯于湖先生之從弟為貳卿時有以辟穀圗為初度夀翫其詩語典宻超逺非參預公不能受未㡬入西府又陪㡬政偽學之禍公實彌縫雖一手獨拍國史時政至今猶可考也晚歸桃源領祝釐十餘年康强夀考是生樗寮太中公亦以字畫醖藉重一時年過八十作字猶嫵媚本茂枝亘有自來矣桷大父嚴州於太中情好深厚每相顧語時事艱蹇思欲如參預公嘉泰時不可得風雲變更此圗遂為袁氏家寳思得留侯裔孫以永兩家傳襲之美治中張公精神炳燿篤志文物於吾家族祖正肅公有三世之舊振轡甬水言語氷雪誠信金石優㳺孫讓而發不可犯事不徒作超然有黄石公審勢之道桷往㳺金華聴言論之緒覩兹佳辰敢以參預張公所至者為祝俛仰疇昔今百二十年矣庸書所聞為公夀四明後學袁桷書題趙希逺山水前賢議大年山水平逺多朝陵往回所見今觀此圗殊有泉石意態吾鄉樓宣獻公嘉泰坐錮十年不作子公書問趙尚書時方尹行都其猶子輩行後先不同要知此畫不當以此為重近世附㑹率類此題家山圗巖壑朱鴻臚翰墨繪事乾淳諸老咸尊許之余屢見其書洛神賦飛湍圗當未易入書畫家評品信知前賢逰戲不得以藝名目竹墅先生舊為江行圗登瀛圗復因思陵書法充為學書韻譜使之較藝書畫二博士意其猶朱鴻臚也藝成而下韋仲將閻立本懊恨莫雪則知㳺戲深意未為害道桷客錢塘獲觀家山圗於其從孫一清典刑日淪雅思清集萃于墻屋之被文繡宜深寳藏以示同志題赤壁圗空濛寒江望斷壁如日色羈臣謫子作凄然懐土語似傷正氣余嘗讀囚山諸賦深惜其才其不遇果命歟覽此長卷益知東坡翁百折不撓非景物可動為之一噱題模本重屏圗重屏圗至汝隂王明清氏始定正坐者為南唐李中主像余嘗見樓宣獻公家周文矩所畫初本前有祐陵御書樂天偶眠一章噫承平盛時君臣圗治而區區慕企耆年之安佚禍及於身國亡於嗣苞桑之戒有自來矣此卷模榻不遺毫髪迺喬仲常所製深得龍眠筆意而精巧過之以此辨定書牟端明脱鞾圗黄魯直返棹圗贊後子昻畫時守當途所贊嘉定改元首召樓宣獻公為翰林學士承㫖更十七年不復有繼而學士亦乆虚不用寳慶初首用鄭忠定公時則有若洺水程公相繼為學士端平則真文忠嘉熈則魏文靖文忠不肯拜命文靖不兩月即入政府矣淳祐特用三人曰端明李公參政應公其以不能辭者呉丞相一人耳至景定始踵用徐公端明牟公獨牟公至咸淳初猶學士噫四十一年理宗所命内相不過四五人則凡號為學士者誠難矣方陵陽李先生特以史局入蜀為㕘謀首辟先生以自近蒼黄出蜀李公造朝願給筆札補其書先生之助為多龍翔之役丁董氣燄無敢犯一麾出守惓惓憂國絶僥踰鼠穴之蠧初圗見之感指摘文致之弊太史之圗見之裕于子孫經術淵懿為東南師表故國喬木殆於是見之矣念昔至元乙酉嘗從子昻承旨公于錢塘于時年少氣鋭各欲以文墨自見此圗之作實在是嵗鼇頭之兆殆表於是桷也學不加進而志日益懦肅容斯圗其亦有所感也夫延祐四年九月袁桷書題楊補之梅逃禪居士平生文章字畫清勁簡潔獨作梅花習宫體豈宋廣平遺意邪徳夀殿深愛之嘗命作横披親御翰墨懼以是干進即脱身還里士大夫自重若此可以見昔時之盛題湯叔雅梅舊見叔雅作三杳圗踰二丈遺其女凖奩田四十畆清實清矣如太清何叔雅性慕曠逹其繪事有山林枯槁之意徳夀殿迺不喜之何耶遇不遇有命昔人評詩謂栁塘春水真富貴語叔雅豈故為是以自况然予嘗聞評畫家言竹外一枝水邉摇落非叔雅不能葢棺論始定於此圗見之李成寒林李光丞畫多入御府在民間者其子天章以金帛悉購藏故米元章作無李論此卷王都尉畫帙中物余留京師見寳繪堂畫帙僊佛折枝禽畜凡三帙後入宣和太上皆御題姓名復加寳璽宣和最重光丞山水今裝潢犀軸皆舊物葢從畫冊表而出之者摺文猶在而後紙略剪去至治元年十一月丙子導尊號玉冊置省中歸坐南牕書題小坡竹石牧牛圗小坡竹石綽有父風後倅定武罵賊不屈以死其風節不墜光于前人矣坡翁流落困苦有悔不長作多牛翁之語將買田終老于陽羡而志迄不遂此圗之作無乃聆庭訓以寓初意與江南䆉稏千里一色乆客于京塵莊舄故鄉之思無言而色已動覽之悵然題李伯時馬性圗仁廟賜郝參政此圗為龍眠李元中作龍眠三李元中厠伯時豈淺淺哉嘗聞伯時欲工馬形狀或有告者曰非入天廐不可今世所傳好頭赤等圗悉天廐摹寫鳴立起俛神氣洞馬腹矣後復有告者曰子性非馬性入於自然寧有悔悟使真入之曷有出理曰是懺悔作大士像袁桷曰性以理成物具理具區别有殊性善益彰惟我仁宗皇帝溥博濟物一視同仁其所以際待大臣者實有差等其膺是賜非臣彬不足以稱龍御上賔先臣不接踵以逝誠有是也夫嗣子升至治二年命小臣袁桷叙本末謹稽首拜手為之書題王黄華墨竹黄華老人祖襄陽筆墨至於平世不遇卒至窮困流離時使之然使生元祐盛時實不在米老下文丹淵用墨意在筆前觀此卷豈在彭城下邪徳常評古精詣遂取其評以書題李龍眠十六羅漢象龍眠白描多用呉道子卧蠶筆若一用界畫法則非真矣此卷山林嶔崟骨相巉崿猶有離王舍城真態非復有江右卑弱儀度神閑意定視天台靈鷲直瞬息事龍眠神氣洞馬腹晚修蓮社得無𡨕㑹耶題彦敬子昻蘭蕙梅菊畫卷余嘗見彦敬子昻親作繪事生香踈影光透紙墨觀者莫不歛衽二公既下世摹傳益多優孟之叔敖㡬不可辨觀此生意猶侍杖屨時也題子昻撃磬圗君子聴磬聲則思死封疆之臣蒯聵父子之亂於斯時也聖人得無所感柴也其來由也其死事果有至於此名畫記有擊磬圗不存子昻創意作此本其亦有所感也夫題鄭有之蘇黄海棠詩卷吾鄉樓楚公為令登封得嵩山之石以歸自渡江來南北隔絶其孫宣獻公遂築樓扁曰登封而貯石於其上京洛慨歎其記文實三致意焉華陽自甲午之破衣冠南來不一二數土地之宜登於王所者悉絶若竒花美木往往於前賢題詠中髣象而不復可覩金華鄭有之北山先生宣撫公之裔孫其家有蜀棠一本猶傳以為宣撫公自鎮蜀歸時手植有之復得摩圍閣所刻東坡海棠賦一篇又得黄太史所草合為一卷每花時舉酒展卷髙歌居然萬里之勢見於眉睫其與宣獻公之意政相似余嘗聞牛竒章聚花石之竒麗而身不及享近者内翰洪公築瓊圃於第而㡬致竒禍孰若宣撫公清名懿行淑於後人一花之㣲猶存於百數十年之後古人有言曰十年之計在木百年之計在徳今徳與木俱存而無墜豈不美與謹書其事于後他日訪喬木之居坐花隂之下舉觴相屬當為賦其事書趙監酒墓記後唐世宗室其初皆有封爵世逺親盡遂與異姓之臣雜而仕宦至或流落民間故作史者深為之歎惜然而石堤谷之慘則又有甚可歎惜焉者也宋太祖懲前代之失諸降王子孫皆得登仕版而柴氏錢氏復與為婚姻號為最盛至於靖康大變流離南來皆得奉國牒以見于宗廟絶猜疑之嫌於此可見余嘗自紹興以來考其世系彬彬秀出亡慮數十人至若魏王諸孫雖其族屬號為疏逺卓然可傳者詞華則徳莊仲白清謹則徳老父子抑有以知祖宗垂裕之盛乙未秋趙君開叔出其皇祖監酒君之銘謂余曰此相國程公之所作也監酒君於魏王為九世孫而文昌公之從子也文昌師性命之説於慈湖先生為時儒宗曩先人官廣陵時詔以家世舊聞甚習暨歸餘姚故居毎拜髙曾墓下讀諸老所述先徳夙夜畏懼不能承嗣丙子奔播善和故書與墓碑俱燬為庶為奴不敢自恨獨欲求程公之銘不可得也惕然於心㡬二十年今復獲于四明之族黨誠不勝慰喜其為我記其事余曰世之畏禍者多矣變姓之張禄别族之輔氏葢思以自全也今君之喜非昔之喜也君方以易推䇿隐市以自活易之道非止於是其憂患之深者也養其支離以盡其天年斯足以不辱其先矣餘不足為道姑書其事而歸之書進脩堂徃還尺牘始曾大父越公從正獻公時通判少卿方總角誦書正肅公方入小學于時諸生從正獻公凡數百人公教不及諸子母夫人戴氏手模顔魯公大字以教諸孫宗盟之好實夫人啓其議故越公少年作字亦習此體後伯祖通判大父嚴州尤相與模學進脩堂書體兩家敦叙情誼於書牘猶可見也嘉定癸酉嵗正獻公自九江召歸郎省越公亦自桐廬入為奉常屬官後正獻公為待從而越公復入著庭同朝凡六年後三年正獻公奉祠歸里越公以列卿尹臨安公作詩十章相寄奬勵尤深而其首章有曰少年妙譽已超然不肯隨羣茍目前葢猶言昔時遲赴禮部相從事也暨正獻公薨越公挽章有曰燕堂聨族子講席後諸生葢言合譜時事也自正獻公而下書牘無慮數百皆藏二父房往嵗從兄子禮舉此卷以授己丑之灾凡先世舊物一夕而燼獨此以藏于故山獲全追念二祖宗盟之始今已百二十年舊聞零落懼不復記憶因書識于後俾後之子孫得以有考云甲午嵗良月曾孫桷謹識書馮將軍翠峰詩後金煬渡江世人咸稱采石功為雄偉而不知煬之首謀以海道進兵為第一向非膠西用竒决勝則長驅海陵江左殆未可保始余閲李伯微甫繫年書深疑紀采石之事為多膠西之事為略間閲傳記則知前輩已議雍公之張大而伯微甫雜記亦書雍公經理闗陜之不遂葢未嘗不置疑於其間也膠西之戰李寳功誠不得冺若馮將軍事獨不見於史可恨惟趙氏遺史所記號為詳悉而所謂當時卓然奇功皆歸於李寳之偏將曹洋乃於馮將軍深有異論且謂獨請海艘借勇以避虜棄陣却走於凱旋之先余嘗反復其事有知其不然者夫軍法莫嚴於背兵李寳非能假馮將軍者也其㨗也實寳命曹洋詣闕以奏洋安得不掩美以自稱方是時猶槩受其賞將軍之不却走也明矣所傳聞異辭聖人猶疑之遺史重妄之罪深矣微正獻公直筆以行遺事則將軍之功不止於冺焉而已也桷曾大父樞宻越公尹行都時築射圃曰旬閲下教出將軍射法以試士伍白首軍校猶能誦將軍射譜樞宻公訓閲之勤山陽㺯兵公以不發兵坐視責時宰由是去國于時領兵殿巖者㡬欲承受風㫖襲夏震遺志以報私恩每思將軍之忠烈有不待子孫而後傳也今觀翠峰題詠諸老贊述滿卷獨正肅公書尾之語猶不滿於紹定之事噫其亦有望於後者與彭叟成紀正裔今為范氏後馮范之譜猶臨卭髙魏之譜也昔陶商翁劉景文以邉將有能詩名將軍翰墨之美誠不愧古昔彭叟以詩書迪紹前人光其當不止此敢辨遺史之妄以補家乘復以勵彭叟云丁酉歲正月辛未越國袁桷書書史文靖為西山先生薦黄參軍家問嘗讀西山先生通文靖公啓有曰四紀奉常之第三州刺史之符華塗咸擬於直登雅操獨安於平進又曰青原彭蠡善政有百年之思太白東湖勝賞窮四時之樂味繹詞㫖葢不以赫奕為可貴也紹定元二先生去國文靖亦歸老里第今觀薦士之急遂因父以致其子而文靖諄諄訓諭尤以先生為重絶干撓之嫌於斯可見桷聞諸老言永國為相時欲迎公政府就養不一嵗而返方永國之入相也公獨言參預應公宜為文字官應時以議端平兵事謫歸里未㡬果得召命將入國門劉濮二豎相繼論去公聞之歎恨數日噫父子至親宜無所嫌避在隆興時若張紫㣲之總得近世之江文忠誠有不可處若文靖父子誠無可議一時廷紳不免有趙括之譏慨貴盛之不常愍天運之日圮三復遺墨肅襟以嘻是嵗五月乙亥年家孫袁桷謹書于其曾孫益伯題識之後書張仲實家譜後古者别姓收族莫嚴於祖廟自宗法不行各尊其禰不待數世而視為絶族葢譜諜不修廟制不立迄無所藏附故耳唐世廟院之法猶有遺意至宋令甲非君賜不得立由是公卿大臣各懐安茍且視以為難事自渡江來承賜者亡㡬其所立廟率燬於火或撤去不復立而獨張忠烈王故廟易代猶無恙方承平時張氏族號最盛散處都邑其房院稱號各以數目為别嵗時烝嘗男女長㓜悉列廟下而復擇宗子以主祀傳于今其法葢未墜也昔摯虞以漢亡之後譜傳之失子孫不能言其先祖推其本始作族姓昭穆夫當流亂之餘理固若是而先儒以為厚風俗之道亦莫若明於譜系今仲實因故廟之舊合七世之譜旁行邪上如指諸掌慨今思古將襲徳踵媺使夫來者之有以自振而其可傳者非止於章綬赫奕而已夫尋丈之木其旁達拳曲者莫病於本也阿閣之鳯翺翔振迅者無害於徳也惟其有之者斯似之也書曰紹聞衣徳言又曰迪惟前人光仲實其朂之矣袁桷識清容居士集卷四十七欽定四庫全書清容居士集卷四十八元袁桷撰題跋書張忠烈王傳後世言老子書富國强兵以予觀之是未足知其説老子言佳兵者不祥而陳平亦言隂謀道家所忌夫其書學道者之所祖而言用兵有不得已之意則兵者非真喜用也宣政以來老姦宦竪爭㺯兵立功於僥倖馴致靖康之禍議者謂佳兵於此可見矣至於建炎兵不得不用而一時狃宴媮之乆長驅南來蔽遮阻厄者皆望風奔突驍將巨鎮遂廣立屯衛以自重而東南民力匱轉輸供給之苦未㡬而紹興用事者言罷兵矣方是時秦氏子誠無所容罪獨張忠烈王有適墮偃月之計而後無與辨之者當罷兵之初莊簡李公嘗同其議檜之始未可以遽議也論檜之罪當成於罷王西府之任葢姦臣造謀未始不假宿徳重望以厭服衆論事成而即排之者毋怪其若是故李公之去也不數月而王雖一嵗而去則亦有所不免夫事之毁譽難定於一時而視其子孫始足以知昔時之行事漢髙宻侯鄧禹功為中興第一遲遲長安無以辭光武之責至其訓子孫俾各習一藝則其善後良有古意唐李勣垂殁之訓嚴且明矣敬業之覆宗滅祀終不可逭豈非立后之議誠有遺憾也今王聞孫彬彬滿於家乗施及五世崇徳植學卓卓表著猶不可一二數則是非之公當由是而見因書所聞以附于家傳之後書史忠定王貸錢劵後桷年十三四時有鄉先生應君文煒年八十餘善談論乾淳諸老舊事為桷言外髙祖忠定越王未第時僦富民錢氏坊以養越國夫人洪氏今天童松徑東臯先生精舍即坊故址也當紹興甲子嵗越國夫人夀周甲子忠定王假坊錢為酒食以合姻族閭里禮甚具坊故屬浙東常平司至秋七月不勝輸官之苦留繫于越宿越賣餅湯媪家是嵗鄉試期已迫忠定王不得歸里鬱鬱悵望媪㣲問曰秀才何負官逋如是遂具以前對翼日媪召兒與共約曰我積錢百千以治終事今悉與秀才輸官若中秋試必速償我毋惜也王歸果與計偕實紹興之十四年至乾道間王以衮衣偃藩養越國夫人于越時媪猶亡恙王命使者車迎媪坐堂上拜之欲官其子媪謝弗受曰願丞相子孫他日官越毋忘媪家時賑與足矣後忠獻為常平使者復命駕媪家拜其像與其子坐且遺金帛甚厚應君又言樞宻公帥越余時相從湯媪諸孫猶在樞宻公紹先志如初特伺候門下旬日為異耳今獲從五世孫公升允叟伏覩手劵夷攷嵗月去秋試纔二月當從此劵以償湯媪而桷所聞於應君者不誣謬為可信謹書以補家乘之缺維王盛徳厚行垂裕無極以允叟五世大宗兢恪遵奉睦宗廣孝下賢急施當不止智周於家庭惠盡於鄉黨而已也桐木之韓由南澗而愈昌申國之吕至太史而益著韓吕五世孫聞望若此允叟其有以勗之書曰迪惟前人光又曰紹聞衣徳言因以勉允叟併以自勵書焦節婦傳後唐虞之事載籍莫詳往讀劉氏外紀胡氏皇王紀等書記帝堯之時孝慈力耕桑者表其門閭雖遐邈無本非有類於荒怪不經吾取以為始焉世衰道㣲日淪於媮彤管之詩先儒或疑為季代之作於是淑徳内範與男子並稱若列女傳所載張芝桓女之徒皆得如帝堯時故事亦足以惇行表勵噫其意亦深且明矣桷㳺呉門讀中丞徐公為焦氏婦傳誠可謂懿厥哲婦而其彰明之始實自其弟焦侯發之昔屈原作楚詞悲切反復而獨推髙陽之𤣥胄女􅎐之嬋媛葢其好徳之心根於自然移為忠君愛國猶不敢忘其所自使原幸得其時則其光榮之道不假於原之自陳也方今焦侯以明達粹雅嘗舉正於省闥前徽貞行將以請于太史氏更生蔚宗之筆足以稱是非如李文公之傳揚節婦不得入唐史為可恨也詩曰此令兄弟綽綽有裕焦侯孝友之道於是乎備矣敢書所聞于後大徳庚子越袁桷書書湯西樓詩後玉溪生往學草堂詩乆而知其力不能逮遂别為一體然命意深切用事精逺非止於浮聲切響而己也自西崑體盛襞積組錯梅歐諸公發為自然之聲窮極幽隠而詩有三宗焉夫律正不拘語腴意贍者為臨川之宗氣盛而力夸窮抉變化浩浩焉滄海之夾碣石也為眉山之宗神清骨爽聲振金石有穿雲裂竹之勢為江西之宗二宗為盛惟臨川莫有繼者於是唐聲絶矣至乾淳間諸老以道徳性命為宗其發為聲詩不過若釋氏輩條達明朗而眉山江西之宗亦絶永嘉葉正則始取徐翁趙氏為四靈而唐聲漸復至於末造號為詩人者極凄切於風雲花月之摹寫力孱氣消規規晚唐之音調而三宗冺然無餘矣夫稡書以為詩非詩之正也謂捨書而能名詩者又詩之靡也若玉溪生其㡬於二者之間矣吳門湯君往得其過葛嶺諸詩玉辟邪鐵如意之警䇿有得乎玉溪生之深切精逺余每欲蒐其精良者而一讀之來呉門其從㳺陳子乆相過知湯君之詩雕搜㑹稡皆子乆任其事余不識湯君而知其用意間有與余合遂書玉溪生作詩之源委宋三宗詩體之變以慰湯君庶知湯君非苟於言詩者子乆嘗學于湯不知余言能有合於湯否噫詩至於中唐變之始也若玉溪生者跂而望之其不至者非不進也子乆年富才俊它日追風雅之正返雲咸之音其視余言殆猶糠粃也大徳庚子四明袁桷書書髙息齋嚴母方氏夫人墓誌後息齋先生蚤嵗入辟雍受知于龜山楊先生後掌國子於熈興五峯先生一書忼慨明白遂即挂冠致事辨春秋王霸未嘗不嚴正而簡明也成均學制至咸淳之末猶復遵守其或變更傅㑹皆大臣私意或謂與宣和三舍法㣲近是殆不知先生本於周官乘聲附響無以議為也蒨聞遺落麟臺故史三厄無從考訂郡志疏缺能言髙氏出處大致譜諜官號亦不多見而桷以先世遺藏得其集註䘮禮若奏牘之見於㑹要者猶一二條目至於他文則皆未之知也今年春得讀嚴母方夫人墓銘其叙師友婚姻之好不以窮達渝易足以知先生成均之法出於閭塾之遺意而方夫人崇師教子不得與流俗同也噫師友道廢遂耻以師自言陳稽古印綬惡遇舊館人者有之矣婚姻禮乖雖潘揚之睦猶以貧富異心尚何敢修師友之誼敦婚姻之舊於富貴利達之後也夷攷漢唐傳記嚴母之賢者莫若延年與武彼二子苛酷驕蹇遂不幸使内則懿範見於史氏今嚴氏儒雅奕世聞孫與計偕登仕版者亦不絶書則方夫人之賢不著於郡乘嚴氏之幸也巨川往嵗南極交廣蒐竒補軼多四方聞見今垂老隠居充然自足不假於當世而獨卷卷表章先夫人之訓範以示厥後復使髙先生之遺文振暴於二百年之後謏聞寡見由是而廣惇本崇禮由是而興不亦韙與謹書其後而歸之大徳壬寅二月九日袁桷書書呉興張景芳祖母費夫人所作華嚴偈頌後南軒先生祖母魏國夫人日誦華嚴得心法於佛日杲佛日杲之頓悟機辨亦由華嚴或謂華嚴乃佛富貴此葢以妄測妄非知道者方魏國學佛時忠獻以忠正謫居南軒先生從五峯㳺學子孫為一代師表未始諱言魏國為異端也近世崇正之説方新凡類近釋氏者子孫皆掩匿不著于家乘今呉興張景芳獨次其祖母夫人偈頌以光示子孫忠厚孝謹將繇爾以興敢書宗衮之事以勉大徳壬寅良月望日越袁桷書書鄭潛庵李商隠詩選李商隠詩號為中唐警麗之作其源出於杜拾遺晚自以不及故别為一體玩其句律未嘗不規規然近之也拾遺愛君憂國一寓於詩而深譏矯正不敢以談笑道若商隠則直為訕侮非若為魯諱者使後數百年其詩禍之作當不止流竄嶺海而己也桷往嵗嘗病其用事僻昧間閲齊諧外傳諸書籖于其側冶容褊心遂復中止私以為近世詩學頓廢風雲月露者㡬於晚唐之悲切言理析指者鄰於禪林之曠達詩雖小道若商隠者未可以遽廢而議也客京師潛庵鄭公示以新選一編去其竒衺俚艶讀其詩若截狐為裘播精為炊無一可議去取之當良盡於此昔蕭統定文選至淵明詩存者特少故議之者不置至王介甫選唐百家詩莫敢異議而或者又謂筆札傳録之際多所遺落嗜好不同固難以一今此編對偶之工一語之切悉附于左商隠之詩如是足矣覽者其何以病因書其説而歸之書定興王成之墓臺記後自古不修墓之説見於禮經世媮俗浮遺墟敗塚子孫有泚其顙而莫以為怪抑不知必誠必信當自其始至不幸而修者非禮之正也自墓田定尋丈崇卑之制穰穰世胄率從事翁仲雲闕之靡麗發丘模金蔑有遺藏抑不知制令之始盖以防其侈非俾之薄内以事外也定興王成之躬負土之勞髙為墳臺積至尋丈絶推埋之望而慎終謹始復合於聖人立言之本意吾友李伯宗甫特叙表其事余嘉其純孝之實而復以是説告之大徳癸卯七月既望四明袁桷書書陸淳春秋纂例後近世春秋家立褒貶於字義茫不知盡性之理按其形模以中有司程式為精巧天理人慾三尺童子矜矜然猶能言之春秋之學廢矣習三傳者唯文詞是師左氏盛而公穀廢矣武夷胡氏作傳止於七家唐世傳春秋者皆廢矣噫士何事春秋哉吾里樓宣獻公晚嵗欲明義例之説時永嘉陳君舉舍人為春秋傳遂序其意而焚其稿每語後進當以唐陸淳集注纂例清江劉氏傳為下手余家所藏纂例乃寳章桂公所校號為精善按纂例他無善本審此書廢己乆聞蜀有小字本惜未之見唐志纂例十卷集注三十卷㣲㫖二卷辨疑七卷余來杭復得㣲㫖二卷迺皇祐間汴本聞苕溪直齋陳氏書目咸有之當搜訪以足此書以假友人得脱灰燼劉氏傳迺先越公居宥府時岳肅之侍郎所遺家諱咸以絳羅覆其上二書當永為子孫寳俾勿墜書鄭潛昭曾祖東谷先生諡議後胡忠簡論王正道時不知其後之忠烈也廟有碑史有傳斯無愧矣三槐名孫﨑嶇擾攘欲以竒計立功業不幸有脱略名教之誚使不若是則㡬為狼籍人矣今觀栝蒼鄭公覆諡猶不恕置議禮義名節士之大閑謹于正道葢將以謹夫後來者耳渡江百餘年屢厄權相獨定諡無敢希指至若賜諡則由舍人行詞端平以後諡愈多而名愈濫惜不得鄭公有以正之嗚呼悲夫書朔齋先生都梁第一樓詩後南豐記擬峴臺欲與州民同其樂至朔齋先生之賦都梁第一樓則欲與之同其憂非深知民隠者言不至是此卷筆勢有籌筆驛詩態度嘉定以後士大夫不復崇尚字學獨公與莆田陳復齋號能書二公出處相近要未可以一藝名書朔齋送弟牧翁十絶後朔齋先生以宗正兼直後省于時先子方入轉運幕府一見道問家世即以科目剡薦至今照牒猶襲藏也今得拜觀遺墨其藹然友于之意見于篇翰前哲愈逺古道日媮摛章繪詞言行實不相顧觀此亦足以媿警書髙使君脉圗後吾鄉嘉定以後故家諸賢獨髙使君衍孫興寄冠珮清逸儼整如晉世圗畫賢士宅旁植水竹竒石號曰竹墅其食必按本草其居處必順叙寒燠銖分脉法如指諸掌往時搢紳類能夸詡之數十年來士益困不復知有清事桷幼與其諸孫一清相過往見一便面即使君脉圗也于時一清方編類經方惜日不自置叔祖文昌公猶無恙其尊聞于家庭者尤精確可傳信今㡬二十年而一清所為醫書十事亦成矣宓戲作易神農為本草至黄帝述素問難經等書三聖人未嘗以卜筮醫藥為鄙九流肇分漢世儒者猶不得尊則此復何議至陶𢎞景孫思邈貞白為髙能令天子大臣傾下敬愛則道與神完者未可以一槩論也一清方逰公卿間清名舊閥當益以貴重敢誦所聞書附脉圗使來者得以攷清容居士書題忽訥監司畫像詩卷後成都郡治歴唐宋㡬五六百年牧守皆有畫像政績可紀若韋相國張益州愈遠而愈不忘其治守無狀耄倪咸指其像爭詬詈以病葢棺事定豈虚語哉忽訥監司按臨長沙墓木已拱其子脱帖木兒宣武公知遺愛之被於長沙也至厚嵗乆而冺落將懼夫子孫之叙述者未足以傳信固雖豐碑善頌皆迫於一時之指使考其相與社而祝之者審像以觀則得以察其平昔治行之實永乆而益信詎家庭之所少而逺求數千里之外哉徧觀鉅軸其意有若未盡桷也職在太史韋丹之碑其能肯多讓願泚筆以俟書白敬甫三嵗作大字卷栁栁州劉賔客在海嶠為二童作詩有曰小兒㺯筆不能嗔涴筆書牕且賞勤栁州則曰聞道近來諸子弟臨池㝷己厭家雞二賢期待如此彼二童迄莫能有聞梧竹先生一為元公期奬卒有成就在易蒙之六五解者謂黙識心通為顔子得之今聞夀考先生實何愧焉傳示子孫俾無斁以承書胡評事夢昱印紙桷幼嵗嘗讀曾大父樞宻越公家乘言寳慶改元九月旦胡評事進對首言濟邸死非上㫖當立孤以明本意于時相臣震怒入對兩宫乞黜去未㡬御史李知孝希㫖具疏削籍度嶺先公時尹錢塘力遏閤言削籍故事必下京兆書考功籍公遲不肯署復三入閤相怒曰趣書何言宿留凡七月始下公曰不十載當悔復吾毋為禍首且考功籍謹不涉署後必有知我者繇是戒兵士善䕶復宻以錢鏹相遺贈自後先公門人王公邁亦踵論濟邸事而公亦被黜去端平末年公始得諸老叙復桷獨不得與胡氏子弟參論來京師豫章周儀之間言是事桷具所以儀之曰胡公諸孫携考功紙來與子語誠不妄噫呉夫人之復封端平之初也復立濟祀徳祐之末也馴致於此其何可言剛簡丁丑試集英先公時為參詳併識于是謹書其後而歸之乙已嵗三月甲戌袁桷書書呉景山樂府景山呉先生佐金陵閫府時先子實為貳車亦入幕嘗為桷言先生壯嵗客羣公飛牋疾記坐宴席即就就亦弗視言論氷雪懐吐竒磊不肯屈人下晚始第奉常嘗鬱鬱自慨語昔時承平事謂今當不復有未幾逃難解散先生亦竟謝人世後十餘年其子博文為四明郡博士先子家居敦叙夙昔猶一日也桷客京師博文適先後至迺出先生手澤一通以示葢方回堯章之伯仲非如劉改之徒喑嗚叱咤以氣為言者也唐子西之詠梅不免以倨傲得罪先生之詞藴而不露哀而不怨情見乎辭而莫知其止殆駸駸乎國風矣俯仰疇昔悲不自勝并志先子遺語而歸之大徳乙巳契家子四明袁桷書書黄彦章詩編後元祐之學鳴紹興豫章太史詩行于天下方是時紛立角進漫不知統緒謹愞者循音節宕跌者擇險固獨東菜吕舍人憫而憂之定其𣲖系限截數百輩無以議而宗豫章為江西焉豫章之詩夫豈惟江西哉解之者曰詩至於是蔑有能繼者矣數十年來詩益廢為江西者嘗慷慨自許掉鞅出門卒遇虎象空拳恣睢復却立循避不敢近使解者之言迄幸而中噫然則其果不可以復古與桷來京師遇黄生景章于旅次問其譜别于太史為七世而尚書公叔敖之所自出示其詩宫商敷宣黯然不遇之意絶乎詞氣吾知其充然以修興太史氏之學者非子其誰也夫别江西之宗者是不至太史之堂者也曠百載而有俟捨其諸孫曷有望焉念嘉泰間尚書之孫犖為常平使者于呉曾大父樞宻越公丞邑呉江檄定理役時蘇師旦驟幸顯獨絶請託無隠使者大喜得剡于朝而改邑焉俯仰百年門下之誼猶一日庸叙疇昔而勉之大徳乙已八月中秋書于其詩後書劉將軍詩言用兵者必曰師尚父讀其遺書多竒簡韻語非深知詩者不至爾噫采薇杕杜詠歌勞苦雖賤㣲者猶能知則古言詩抑豈有文武異哉今觀劉將軍詩藹然有觀民風審知止之意使髙達夫劉景文復生攬轡並行未知孰先後也陳郡袁桷書題金承安樂府幼嵗見老樂工歌梨園音曲若不相屬而均數無少間斷猶纍纍貫珠之遺意也承安老人所補歌曲按其音節無少異此殆以文為戲者黄豫章嘗評小山樂府為狹邪之皷吹豪士之大雅風流日逺惜不得共論承平王孫故態為之慨然書清江羅道士詩後往嵗卜居城南遇梓人焉曰築室之制崇廣纖鉅必謹其規體楩楠杞梓若一而用之則堂觀亭室各不相類余於是悟作詩法亦猶是也近世工清儉者局於律師宕逸者鄰於豪角立墨守迄無以融液詩㡬乎息矣噫風雅頌之體夫子何自而分哉清江羅道士詩余讀之審劑輕重分析清濁大者合繩墨小者適程度似欲各取其長誠非苟於言詩者余聞學仙之説内固而神益清養之以嵗年斯熟矣詩其果有二道乎題蕭安撫迪後記老瞞視天下事如探丸晚嵗真態始見李衡號良二千石猶不免為諸兒計慮迺知情愛雖䧺烈有所不忘蕭公安撫副使書迪後記上推本始旁及䟽逺教之食之一語不及其私觀者興起噫故國世臣俯仰事變何害不有獨蕭氏孫曾為名大守賢御史官薄益顯今四世孫文孫靜敏好學年弱冠上書御史府言救荒事皆切實語行受選用種徳之報是真有慶矣尚勉之哉書謝道士歸洞庭詩卷後古之善養生者必適夫寛閒之地順其隂陽使神足以恬不能有動於心苟絶其所為深林嵁巗隠翳自處將感悔震掉日有不給且外不能以自治其理内者奚以合榮觀之道豈徒言哉江湖之水至岳陽而安流停蓄廣衍動靜交養括蒼馮道士居之三十年安且樂矣北逰京師縱耳目之廣益舒其和平夫山極於燕水極於洞庭求其怪險不可得將安於自然道入于自然則刻形毁志竊據詭幻者吾不知其説也今歸主其徒與之㳺者各為歌詩四明袁桷叙書張侍郎孫祖傳存靖齋銘後夀張先生精忠讜論為一代師表其居家御飭子弟遺言懿範故家往往猶能傳誦稱道聞其曾孫脩謹自振能世其家一日示以深寧先生所作存靖齋銘凜焉大訓巍然于頽波横流之域紬繹㫖意㴱有感焉者也靖念曾大父樞宻越公淳熈癸卯與文靖公同薦于鄉至嘉定間同在館閣今百三十有八年兩家子弟罔敢曠墜而桷承教於深寧先生者彌厚敢益以自勵亦以勉夫張君焉辛亥嵗後學袁桷書書鄭魯公全拙齋銘後粤昔先正忠獻韓公詩書五世其父康州牧工於詞章尹河南富鄭公誌其事渡江南來忠獻張公忠肅虞公尚論其世皆著書立言有以自見至于二公發揚光顯百餘年間懦夫庸子猶能仰止自厲審其先徳源委端有來也太師魯國鄭公劬躬敏行是生忠定丞相為穆陵舊學其四世孫奕夫示公所為全拙齋銘紬繹莊生之用大不㡬於贅矣念昔先曽大父越公嘉定丁丑編次集英進士是嵗丞相實奉廷對紹定辛卯復同在宥府桷以先世餘緒獲壻門下風塵荐更甬東世槐不可復覩深以為拙㡬辱而巧鄰薄與其薄也寧辱桷不佞猶願於魯公取法焉敢以自勵亦以勉夫鄭氏諸孫深味之書鄭魯公嘗充達菴記後占夢之書具于藝文自漢而下其學己不可究雖間有占驗往往鄰於附㑹聞忠定公以魯公所夢遍閲釋道諸書迄莫能解今雖廣為箋釋使能言于未遇之前誠果竒矣忠定布衣時嘗夢有告公者他日公官位當止尚書後除禮部辭不拜由内相入政府身後卒贈尚書令此夢之符有不待辨而明者因以舊聞併補于家乘書髙宻鄭節婦傳後舊令義士節婦焯然表著者得入國史實縁周召二南正始之道此殆其遺意也世祖皇帝天兵下山東膺東諸侯之任者維髙宻鄭公聞昔時諸老言僭亂以後削荒易頑納諸軌範繄鄭公是倚褒嘉之典書于太史澤遺子孫振家聲以趾媺者纓緌相接内教嚴整薰然正直流于士女終始貞潔桷待罪史館異日得秉筆書鄭公家世遺事附録節婦于後亦足以光盛世文明熈洽之偉焉得而遜諸跋瑱山經徳堂記後象山先生作晦菴先生晚嵗每言陸文安公之門人多得踐履是葢深憂其徒之學鄰於上達後百餘年黨同惡異空言相髙其弊有甚於昔今觀瑱山呉氏編次師友淵源罔有缺軼是又其門人之諸孫也勉之哉晦菴之言是誠有驗矣延祐改元陳郡袁桷書呉饒公制書跋史遷序道家以清凈為至言作封禪書唯紀祠祝符應㫖哉言乎能知史遷之㣲斯近之矣皇朝累聖繼體守文基祚鞏隆維臣全節職掌𤣥學敷澤道徳夸誕肸蠁之説悉所不取祈天永命與易範相表裏至大三年褒嘉典刑遂特貽其祖父哀榮備美聞者歆企粤昔開元有臣法善前席之對皆理道要術追顯先代而史官紀載弗克偉著論者惜之恭讀贊書景命於爍移孝為忠全節之志罔敢自替太史氏誠宜泚筆以登信史使知皇元崇尚實邁往古來者得以有考云延祐改元史臣桷謹記跋象山先生經徳堂記後朱文公荅項平甫書云子思以來教人之法惟以尊徳性道問學兩事為用力之要子靜所説専是尊徳性事而某平日所論問學上多所以為彼學者多持守可觀而看義理不細某自覺於為已為人多不得力今當反身用力去短集長庶㡬不墮一邉今觀文安公所作經徳堂記瑱山呉伯厚乃其門人諸孫持守之學有舊謹録文公語于前俾愧夫世之貴耳賤目者願勉之哉書南劔謝君程文後李漢定昌黎文獨序其古賦而明水賦不得入今世定為外集者葢趙氏本也唐宋以詞賦取士其所為文率不傳後至王安石改經義獨張庭堅陳古正義闡儒先之㣲㫖故東菜吕氏取而第之往嵗聞閩中諸先賢如莆陽二劉正字三山二林公皆别為程文傳于其家而鄭屯田鍔通五經資其説以取進士皆私相秘藏非其門人傳授不可復得屯田嘗講授四明樓宣獻沈端慮皆諸弟子于時談經之士専守師説非若後時鑿新逞竒以取有司之悦而昔時為有司者又皆温良敦厚以成國家之盛今世之所傳者斷自乾道淳熈之際彬彬然猶可考也延平謝君用和示其先人所為詩論反其程文文獻之徴將於是有取噫宋世帖經墨義之制雖見於史莫得詳自吕申公試卷之編行而其法具在謝君之意余深知之史氏之為宋史者尚宜有取焉史官袁桷書書順堂記後抑嘗觀易而知乾坤之用焉坤固順也而承天者逆也乾坤定而人行乎其中仰觀乎天七政繫焉猶不得與天同則人之所以法坤者猶法天也事坐於有為貧富夀夭遵其自然庸詎知吾之謂逆者非順也耶故動心忍性者逆之用存心養性者順之體也尚書元公以順之道由逆相須蜀郡虞博士取坤順以為徳余謂李君能盡天道斯能盡人事之理矣書廬陵蕭煥有救荒䇿後救荒莫弊於鬻度牒宋世大儒猶不免遵而行之民益墮而食益衆矣鬻爵之令盛於秦漢然不使之治民猶有成周遺意降于後王令下而中變習為固常望望然以去於是禁抑興而敲扑繁矣廬陵蕭煥有來京師簡靜自修心鄙諸人咄嗟取大官閉門無競一日上書御史府陳救荒三䇿三策行而祿弗及噫今世上書率資以為仕進然卒未嘗有見用者甚者圗絶域覈税畝以自便朝廷清明卒報罷而猶未悔視煥有三䇿寧不有愧然天下之弊在於斟酌損益救荒有書而先賢素講猶有缺然年至而學益加煥有之進殆未已也延祐丙辰八月旦日史官袁桷書書余國輔詩後余嘗以為聲詩述作之盛四方語諺若不相似考其音節則未有不同焉者何也詩盛於周稍變於建安黄初下於唐其聲猶同也豫章黄太史出感比物聨事之冗於是謂聲由心生因聲以求㡬逐於外清濁髙下語必先之於聲何病焉法立則弊生驟相模倣豪宕怪竒而詩益浸滛矣臨川王文公語規於唐其自髙者始宗師之拘焉若不能以廣較而論之其病亦相似也余君國輔生臨川守宗㑹源其所為詩質者合自然華者存至理雍容悼歎知時之不遇猶先王國風之意也小弁之怨為親親黍離之憫為宗周酌古之詩詳之矣秉彞好徳詩之道也在昔先正以是言之矣桷從子瑛曩嘗獲師國輔仰其髙風敢申以言之書程君貞詩後風雅異義今言詩者一之然則曷為風黄初建安得之雅之體漢樂府諸詩近之蕭統之集雅未之見也詩近於風情性之自然齊梁而降風其熄矣繇宋以來有三變焉梅歐以紆徐寫其材髙者凌山嶽幽者穿巖竇而其反覆蹈厲有不能己於言者風之變盡矣黄陳取其竒以為言言過於竒竒有所不通焉蘇公以其詞超於情答然以為正頽然以為近後之言詩者爭慕之音與政通因之以復古則必於盛明平治之時唐之元和宋之慶厯斯近矣感昔時流離兵塵之衝言不能以宣其愁而責之以合乎古亦難矣夫詩之言風悲憤怨刺之所由始去古未逺則其道猶在越千百年日趨於近是不知國風之作出於不得已之言也程君貞其為詩淡而和簡而正不激以為髙舂容怡愉將以鳴太平之盛其不遇之意發乎心而未始以為怨也雅也者朝廷宗廟之所宜用儀文日興絃歌金石迭奏合響非程君其誰宜也願勉乎哉書杜東洲詩集後蘇文忠自渡嶺海以後詩律大變葢其精神氣槩逢海若而不慴噴薄變化迎受之而莫辭昔之善賦詠者必窮涉歴之逺至於空巖隠士其所諷擬不過空林古澗語近意短又安能足以廣耳目之竒冩胷臆之偉哉杜君臣傑乘漕艎遵神山閲海市觀光於上京食氷囓雪足跡之所歴不盡不止壯矣哉故其所為詩視其篇題誠足以奪山林之固陋至於鍛鍊之工搜抉之巧發於心聲自然合笙鏞之間歌錯錦綺之竒文夫豈率意而為之者信以知逺逰之有益於斯文也余五度居庸留京師㡬二紀閲舊藁無一竒語始從君挂席南斗則殆將有進矣因書以歸清容居士叙清容居士集卷四十八欽定四庫全書清容居士集卷四十九元袁桷撰題跋書番陽生詩延祐丙辰余守直玉堂有以詩一編相示曰此番陽忠宣公族孫所作也忠宣忠節起家其子文恵文安文敏三公以宏博登政府竒辭奥學與漆書盤盂相表裏未始以詩名也然則詩果何自哉唐詩之完成於文敏詩繇文敏興矣詩盛於唐終唐盛衰其律體尤為最精各得所長而音節流暢情致深淺不越乎律吕後之言詩者不能也自次韻出而唐風益絶豪者俚腴者質情性自别皆規規然禪人韻偈為宗益不復有唐之遺音矣此編意新語清優柔不倨將因先世之編以復唐舊吾知其進未止也噫儒者之事博而且難泛焉以講將勞而寡成守一而充之因以考夫風雅之㣲㫖知詩之立言各有其體諷諫詠賦無不曲盡其情狀精者為言况於詩而可以易焉余雖未接識因其詩願有以廣之跋集書金剛經古佛如來説性本空性空不壊離相常寂相本虚幻若無所往則名實相相由性成迺得堅固凡諸音聲及莊嚴事一念無為咸獲殊勝譬如燃燈由火所傳百千燈明不見火跡金剛正體廣博妙宻擬議分别即生變滅爰集衆手不涉塵刹三十二分各不相統初無雜亂亦絶知解指有長短字有大小以平等觀象體逈忘遍滿一切不遺錙銖靈山付囑亦復如是慧光印空如月在水謂作功徳即墮輪迴㑹稽袁桷書書綵衣堂楊次公記後余讀禮經首五服於髙祖私怪數十百年卒未有為之服者損益降殺沿於時王獨五服定制不敢有所更易豈誠有待者耶今得於綵衣周氏而見之矣中古之論上夀百嵗視唐虞時若不相似或者謂情偽滋多世日以薄過是而能夀非通於隂陽性命之説不能也隂陽性命易老相表裏先天無極其圗具在悉傳於希夷陳先生先儒言之矣綵衣翁迺得而師之見於郡志趙清獻美周屯田致政綵衣詩皆為老人所作湯文清嘗詩而美之夫何疑焉昔孫思邈生隋開皇至唐永淳年過百袠周公其似之歟所以踰於孫思邈之死其孫未生五世咸集孰有如周氏者哉周今為饒大族傳十四世而宋亡有孫復為方外之學嘗聞紹定間有余君隠于番號甕隠老人年九十餘釋魏伯陽書自叙源委謂得於綵衣周氏君今南歸試求其書祖徳之傳則猶可攷也延祐四年二月甲子㑹稽袁桷書書虞伯生送周南翁序後大徳六年余嘗作郊祀十議上於奉常周漢唐宋偽雜之説悉釐正之十年朝廷作圜丘得預議焉位卑而語輕越職議禮若有所不可者勿議焉耳矣至大辛亥集賢司直周君以方士祠祭乘驛上天壇行濟源雍虞伯生氏叙而餞之將使之推致其節文以陳于上㫖哉言矣復議其禮與沉瘞相近噫其信然矣禮之祭天未始與山川同舉也地為社主遺而不言地獨安所附乎或曰祭山縣則地葢瘞歟禮莫嚴於博士博士秩七品禮官不敢以僚屬待大典禮封諡博士用印専達可否禮官唯諾惟謹伯生奉常三年昔之所藴見於周君之贈言合方士之説而復有疑焉者其必見於因革矣周君明辨博習所承於虞君者甚厚因其説願得以攷焉其可乎㑹稽袁桷識書龍陽傅氏旌表記後博施濟衆夫子不以與人於易謙則曰稱物平施聖人立言夫豈一偏者哉近世詞華盗衣食者用心褊陋輒以為大病李君之記藹然忠厚使誠若是當上史館宜書曰某年詔立義倉鼎州龍陽民傅氏首入田千畆則國家之義俱得矣惜其事猶未至延祐四年九月㑹稽袁桷書書真定武仁夫靜夀堂記後仁人心也非性也仁果靜乎靜者仁之所獨性之靜者人之所同也然則聖人之言靜夀其果不可知乎聖人與衆同夫豈獨専其靜哉養其心者惟靜焉耳矣感物而靜斯得之矣感物而動記禮者之失也夫子之言曰感而遂通天下之故斯靜也非動也余嘗聞諸胡子胡子本於程子而朱子用之靜動互用隂陽之機非仁靜之説余豈好辨尊其所聞敢因以復於命名者焉㑹稽袁桷書書凌生功課厯後解經而括其義例繫辭傳惟盡之釋章句以盡㫖意記禮者得之三傳例立經之義乖矣稽古萬言書之㫖微矣昔之盛時口相傳授猶懼其臆度𤣥言興微㫖不復有統緒隠暢之立是殆猶近古也明經設而帖括煩禮科設而義羅作將安取士哉深於楚聲卒悔其篆刻蘭溪之學殆未可非也自王介甫深嫉其説晚卒不能以救悔益多而弊益甚南北分裂而相師成風者皆介甫舊制無以五十百步為也皇朝酌凖之制秀士得以自勵溺於前者則曰非格律不可格律焉自出哉其誕漫不統則又曰法何自立竄竊腐語率意直志文益弊矣經益何自而明矣賈董之對切而婉婉非將順也惡盡言而攻上者非切謂也便于宣揚童葢習之矯焉以自文者誠不知其初歟昔之哲賢由是而知非慎之至也師徳試于國子復類登于賔興譬之適逺轅無有不正者勉之哉俟其成行有以告矣為作功課厯引越袁桷氏丁巳十一月識題進士梁宜致慤亭記後舍奠墓左解之者以禮神言之然則祭墓非古歟禮生於情親之至者彌不可以媮也在昔先正司馬文正公定家祭禮弗忍焉者多矣張宣公獨卓然罷屏乆而深悔迺卒復之心之不寧是則先王有所不廢也禮經殘缺非止祭墓焉耳矣展哭于墓猶秉周禮充類以使夫民之歸厚則今通國所行誠不曰背於古矣荏平梁君表其墓亭曰致慤致慤之著羮墻之見也著莫大于思誠悦親有道夫豈幽明之間哉詩云神保是饗孝孫有慶余於彦中見之求隂於地莫近於體魄王侯而下降殺有等􅇶惕悽愴夫豈禘嘗之謂哉記禮之失也余願與梁君深究而辨明焉書虞伯生從子豐登字説後往嵗余與伯生甫同官于朝有毁宋故家者瞋目發赤擿數無遺藴余固曰彼不遜若是耶伯生曰毋庸戚吾徒不振誠有罪當自治以俟定於是悉取夫人師友之源委臺閣儀注之損益精思紬繹凛凛然不敢一日廢將二十年伯生率以文詞名諸公桷也力不加進而自治者則亦罔敢豫延祐五年其弟徳常登進士第故家之誚將於是乎息今年從子豐登侍仲父來京師以其弟兄之字説來示呉幼清之所期者至矣余何敢言雖然願因大父致政公命名之意而廣焉授地之法休田以逢年者全其力也仁熟之效在於善所養與與翼翼古曰有年其豐登之謂與維致政公徳充而位卑重施樂善敦薄興讓休田之義也施于有成曾孫之稼吾見其東且齊矣弸中以文外仲父訓迪有自來矣獨感夫昔者之詬病因以告二子願勉夫哉越袁桷伯長甫書題徐天民草書甲申乙酉間余嘗受琴於瓢翁問譜所從來迺出韓忠獻家葢通南北所傳皆閣譜宣和譜北為完顔譜南為御前祇應譜今紫霞前譜是也韓譜湮廢已乆東嘉郭楚望始紹其傳毛楊徐皆祖之不知者咸稱浙譜由毛楊自秘其傳故耳蔡氏四㺯嵇中散補之其聲無有雷同孰謂浙人能之乎瓢翁酒酣好作草書嘗冩前人悲憤之詞一日言中散廣陵散漫商君臣道喪深致意焉至毛敏仲作塗山専指徴調而雙絃不復轉調與嵇意合非深知音者不能又曰學琴當先本書傳俗韻自少仲連得法於其子余以作吏荒落向嘗作琴述言歴代所譜𣲖系因覽先生遺墨俯仰疇昔今三十六年矣延祐六年仲夏丁丑越袁桷書書括蒼周衡之詩編詩有經緯焉詩之正也有正變焉後人闡益之説也傷時之失溢於諷刺者果皆變乎樂府基於漢實本於詩考其言皆非愉悦之語若是則均謂之變也歟建安黄初之作婉而平覊而不怨擬詩之正可乎濫觴於唐以文為詩者韓吏部始然而舂容激昂於其近體猶規規然守繩墨詩之法猶在也宋世諸儒一切直致謂理即詩也取乎平近者為貴禪人偈語似之矣擬諸採詩之官誠不若是淺蘇黄傑出遂悉取歴代言詩者之法而更變焉音節凌厲闡幽揭明智析於秋毫數殫於章亥詩益盡矣止矣莫能以加矣故今世學詩者咸宗之括蒼周君衡之㳺京師極其㳺目之所寓悉歸於詩浩溢閎博葢將因言以宣情而於眉山公之學深有慕而跋之者其為志亦勤矣夫水宗於海百折而卒至者非一日之功也故余力叙詩學之源委俾反而求之周君氣盛年富進進不懈異日胥㑹必當以余言為然也延祐六年閏八月庚申前史官㑹稽袁桷書書仇按察父訓子詩後淵明退之諸賢惓惓訓子形於歌詩聴之藐藐迄不能繼父業手澤存焉之戒良可悲也獨康節先生有子伯温捧其先人之詩日篤不墜卒有成立此葢絶無而僅有今觀致政仇公三詩遺墨如新其子按察清節吏能炳炳可紀用不展志諸孫嶄然各自立宦業有法曰以祖訓為則顔氏之庭誥栁氏之家範奕葉毋變今於仇氏之門見之矣書曰汝克昭乃顯祖用成爾顯徳勉之哉王使君都中年像圗詩卷粤昔故家江左之王贊皇之李其髙自標致不以華腴為可貴故其凌厲絶俗則有若元禮文饒官為一集卓然以名閥自重其視世胄珥貂紆綬猶褓中兒耳閩王俟都中幼嵗登膴仕抱負竒氣折節慕義其為政先愷悌而後功利宦績光顯為東南牧守表官為一象葢將憫嵗月之如流厲志考徳俾日進焉若年之有加而無斁也抑嘗聞之今之為吏起於荒窶嘗病不知其所為葢其習講之道非有所素也宦學之門受察於父兄之側遇事剖析白首吏拱手不敢議其徴取者良有自來桷念昔曾大父太師樞宻越公嘉定間以著作郎考南省多士獨得參政留耕先生後登上第直道大節為淳祐全臣雖不及相天下士今猶嗟惜之施于諸孫詩書之澤葢未巳也桷學不加進懼世徳之㣲凛然自治敢以通家之舊願相與勉焉以求似夫世臣之文獻金章紫綬豈足為吾兩家榮觀哉延祐六年八月辛丑契家弟四明袁桷書題樓生詩集海隂陳處士嘗言吾婦兄樓某善治生昧爽以興即整理靡宻某租某山出入俱有法又治其所嘗往來岡缺怠於是酌酒盡暮暮而醒醒而吟凡是者三十年樓之上世故為呉越王鎮遏使因所居有廟里民祠之㡬四百年今樓君已下世其子崧伯為余弟之子之夫始以其集相示曰踈懶嘻若前言果踈懶邪詩盛於江西吾鄉以詩自名者率祖之其浸滛者為韓梅壬午癸未嵗余始悔悟海隂譏之曰自言學術有悟門不謂師承廢於是今讀樓君詩天和混融不露斧鑿而其平淡造詣有陶韋之風焉理勝則無疵果有疵議者不能發口文士善譏評後率不振僕不敢若是書以歸尚勉之雅俗類厥考足永逺矣書茅生家譜余待罪翰林嘗草三茅君加封制書深以為神仙家功行累積子孫必盛茅則希姓則今江南茅氏豈其苖裔也與或曰三茅君既仙去安得有後余應之曰老子為道祖老子之子宗五傳而為王太傅今李姓皆祖則茅氏之祖也夫何疑吾鄉公相家受原伯魯之誚厚貲腴田談笑立棄其困辱有下於皁𨽻甚者發丘壠惡言其家世之盛靖觀茅氏之自重有泚其顙者多矣漢氏以試籀書始得為吏而唐宋制令玉冊官必通文詞者始得為茅氏守藝猶近於儒者之事矣盛徳若不足老子之㫖尚勉哉必有以興復矣跋子昂贈李公茂詩松雪翁詩法髙踵魏晉為律詩則専守唐法故雖造次酬答必守典則然於贈别等詩則僅見之淮隂李公茂胷次磊落言論吐氷雪擅幕府畫諾事無停留士大夫喜從之㳺宜松雪翁繾綣而樂道之阮公服常白觀此足為人物論矣跋宜春夏君與上饒陳先生文蔚講經書問自武夷之説行其門人矜重自秘皆株守拱立不能親有所明辨獨勉齋黄公奮然衛道以其同焉者析之曲焉者直之使後之人無以議湯文清公後出復以昔之所深疑者充廓之是則武夷之忠臣矣今觀宜春夏先生自明壯嵗從上饒陳先生文蔚問答疑難無苟同之病紬繹㣲㫖夐然于尊聞之外汲井養源端木表正蓄徳集善至是盡矣其孫震以進士來京師以桷族叔祖特進尚書公遺墨相示葢守宜春時與其大父交好良厚今八十年矣師友道䘮愚者守之薄者背之欲求其自得不可得夷考武夷釋中庸與易傳輒異夫程楊者夫豈得已觀此得以攷焉題何子方丹書後金石草木藥品見於神農書二者不得以偏廢也自唐世方士飾侈説以動上聴卒致蹂僨以弊或者不察遂因以置議焉厥今四海一轍而南北方劑判為二塗昔人嘗言藏用檐頭三斗火陳承篋内一壺水二者胥失之矣金石變化鄰於鴻寳故昔得道之士近取於身而法之内外交養厥功著焉今世所傳實祖劉先生爾朱先生余嘗得其書而讀之水火之騰降日月之摩盪差毫髮則不能成也故其起死也如神而非以増其聲色之奉歴亘古而不可廢者其説具在貴溪何大方料簡切於人用者為十二方本於神農參於難素復以五金八石之論曲暢而闡㣲焉其師陳君善父號名醫宋世公卿深重泉源木本有自來矣合南北之偏於大方有望嘗聞龍虎經有火記六百散落雲笈願歸而求之則其藥愈神而人益信矣年月日四明袁桷書書江陵唐氏族譜後集賢修撰番易呉公善作江陵唐府君墓銘叙述世系於質肅公八世矣府君之子洞雲願揭徳正傳俾桷有述焉繼質肅公立朝偉節在宋史而獨减死令莫定是否敢於府君之誌而詳言之熈寧元年著謀殺已傷自首者减二等為定律主是議者王安石許遵也非是議不得行者參知政事唐公御史中丞吕公獻可判刑部劉孝叔御史劉公玉錢安道翰林學士司馬公也許遵在宋循吏傳蘇黄門深取之且謂其年髙多子孫繇减罪之報桷考宋史則减殺議自登州婦人殺夫自首始唐公論為綱常本王許之議非也公以新法憤死後詳定勑令者卒於是而兩疑焉宜定律曰謀殺自首减等如遵議在天屬如唐公議若是則兩得之矣公之子淑問為名御史是唐公亦誠有後哉唐故餘杭大族侍讀學士詢實同所自其居江陵繇公父殿直君始質肅公事實紀其諸孫在朝者歴歴可考宋社既亡衣冠故緒闔郡不能以一二觀呉君所為銘則世次猶可考也抑嘗聞之鮑靚以司𨽻系孫為道士王逺知以琅邪太傅孫為茅山觀主皆知名當時今洞雲佐治開元宫居京師二十年貞幹善謀其源委有自來矣夫樂道人之善儒者之事質肅公之不得伸於一時事若有待庸書碑隂以告夫為史官者有攷焉書永嘉王母香几銘記禮者之言曰先祖之徳善功烈鼎而銘之衛孔悝是也嘉言不忘子張之書紳是也席机觴豆受於老臣則几銘舊矣况母訓乎口澤之存嵗乆則弊為文傳信凡之存亡復何預焉以儒成名几之銘滋乆矣庸書以俟跋劉真人帖養生家性命分為二途而性宗之説與命宗各有七焉丘祖師以談笑詼譎活中州萬姓至其二傳為長生劉真人或疑其有留滯之意嘗讀淵明詩有云感被栢下人深有感愴劉真人則曰墓中長有真空景豈非先兆乎至治二年春二月丁卯拜醮長春宫為長沙余君善之書題姚雪齋右丞草金源諸賢皆師懐素其法繇黄太史始葢一時崇尚蘇黄遡本以求則黄本懐素蘇本徐季海二美兼備則雪齋先生俱得之詩昉於蘇駸駸乎太白矣字源於黄則與之俱為懷素之弟子矣桷也獲㳺玉堂得與其猶子承㫖公侍筆硯繼入集賢復與公之子侍論議今觀遺墨敢發明前賢之淵懿使後者得有攷焉至治二年㑹稽袁桷書于悦心堂書姚牧菴贈播州楊安撫漢英樂府大徳末年桷以史屬預修成宗實録于時承㫖姚先生實領史事見其塗抹詳定若不經意而一受潤色即粲然與班馬並此殆其天資學力相須以成者思播楊侯朝覲本末見於太史先生執筆尤致意焉惟昔楊侯以中原大族世領䕫府羈靡之州當蜀破一時名士咸徃依故其文獻承接的有源委聚書訓子益振起光采推姚公不妄許與之心是所謂立賢無方則凡司文衡取士類於是有攷侯之子頥正君來都温慎儒雅與之論前朝事悉纚纚不絶示姚公所贈樂府因書以歸之書葉信公家問後信公貴為宰輔不忘貧為舊事壯嵗客吾里從學城南楊氏書塾楊氏館遇甚厚咸淳丙寅以資政守四明舊往還皆重報之而以次子通判應友君為楊壻人咸服其盛徳咸淳政事一歸賈相江公萬里以告老去馬公廷鸞以稱病去信公先二公以歸賈每憾之後再召將中以事而公卒繇曹娥以遁天時人事至此有不能容力可勝道哉竹友君嘗獲識于先人侍側廣顙豐下其談論猶有王謝家風度俯仰四十年而其子能以方外士保其家譜信公諸孫於余為外表則漸就零落浮雲變更夫豈葉氏敬觀遺墨為之愴然至治二年秋九月癸丑袁桷書書楊安撫訓子詩後魯周公傳三十四世夫子紀二百四十二年之行事所不忍言是則伯禽以後為無聞矣家訓之嚴莫盛於顔氏若包孝肅司馬文正庭誥儼在至諸孫而靡傳君子之澤五世而斬夫豈徒言哉播州楊忠宣公其子襲爵作詩訓示韋𤣥成之詩有曰於戲後人惟肅惟謹無忝顯祖以蕃漢室公之詩有焉今宣撫君盛年執謙問學日積金玉厥躬以承休譽克昭乃顯祖視魯公世家實為有光尚勉之哉則忠宣公實永不朽矣題呉浩然詩卷讀羣公詩玩把不能去手氣與理俱明矣氣繇物以成形而下者為道邪為人邪人心非與道悖亦非氣質舉世相承吾何敢言觀浩然亦知道矣書朱氏精舎圗詩卷婺女史學之盛有三家焉東萊之學據經以考同異而書事之法得於夫子之義例以褒貶而言者非夫子㫖矣龍川陳同父急於當時之利害召人心感上意激頑警媮深以為世道標凖志不成而年逝識者悲其不遇焉説齊唐與政蒐集精要綱挈領正俾君臣得以有考禮樂天人圗書之㑹稡力返於古是則論史者無遺藴矣噫自宋忠簡公以經濟才不得展用故其鄉之後進匡國輔世為首論人事不齊則亦曰有數焉耳矣方咸淳初義烏朱氏兄弟四人並登進士第而伯仲季尤得名其季宰定海余得識之見其貫今古若身歴而知其是否其為文簡而明據㑹以歸于一者也竦然以叩之則曰吾於伯仲曷敢望後聞其兄仲晦君􅂱論事廟堂與南士持政柄者不合為理成精舍圗以歸而中原忠純儒雅之士藻繪褒拂皆今士大夫之所仰慕而不可見者亦盛矣哉近世南北之黨分朱君以越産不合於南士而中原諸賢有愛於朱君審諸賢忠摩之至則朱君之承接者必有其道立賢無方於諸賢見之羣而不黨於朱君見之於是夫重有感焉書楊御史奏稿後御史言事有二不幸焉折羣隂初萌之機論國是於未定之日若難矣不至履其危而蹈其禍也至若姦孽肆兇株黨連結箝口拱手者千士一律至是而有言焉非夫捨成敗死生不能也鄒道鄉審於田承君劉元城决於母氏其所處既定故其直節焯焯偉著有若楊御史之言事其感憤厲奮悉出胷臆嶺海刀鑊雖在目睫猶徃矣忠矣哉昔人嘗言御史以言事得名有闗夫世道之升降方今天子聖明小大臣罔不承恪楊君論思辰告非若前日之難匪初惟艱尚懋敬之以永終譽題潘伯潤家譜幼嵗聞寧海藩繁昌公以文學政事得名羣公交薦乆官江淮其猶子伯潤嘗從以行飛牋急檄一時争稱道之科舉既廢假館浙右辱其講授者皆楚楚可觀然而剛不容物論事直見底藴脂韋者良忌之每語繁昌公輒涕洟見于顔面繁昌死無後逃難蕩析而伯潤垂白服斬衰以繼晚嵗手書宗譜以示其子惓惓于繁昌尤切噫今世以田宅財物爭為後若繁昌之死當掉去不顧矣伯潤所為誠足以警厲薄俗子孫其有興者願書此以俟至治三年十月袁桷書書鮑仲華詩後宋太宗真宗時學詩者病晚唐萎薾之失有意乎玉臺文館之盛絺組彰施極其麗宻而情流思蕩奪於援據學者病之至仁宗朝一二鉅公浸易其體髙深者極凌厲摩雲决川一息千里物不能以逃遁考諸國風之㫖則蔑有餘味矣歐陽子出悉除其偏而振絜之豪宕悦愉悲慨之語各得其職今之言文章者皆其門人而於詩則不復有同焉嘗深疑之其力不能似之與抑其心之和平不得與之同與降于後宋言詩者人人殊而歐陽子之詩訖未有宗之者滁陽鮑君庭桂仲華以詩一編介余所從㳺郝君時升求余叙語完氣平其於景也不刻削以為能順其自然以合於理之正考其從來有似夫歐陽子之㫖矣今滁人思公數百年猶一日也而其篇詠見於一泉一石者復得其遺民而宗仰之仁聲之入人深於是乎見晉本乎唐憂深思逺有堯遺風余於仲華其殆近之與至治三年十有二月某日袁桷書書李𢎞道朝天録司馬氏探極南北之㳺蹟私怪其動心導志不専為書晚嵗憤悱始以㳺歴者散見於紀傳入于渤海則禹所傳者異矣纂歴代之書以為言其沿革旁分而散見誠宜矣自漢趙充國班超於金城玉門纖悉利害至唐西南備邉亦得其要領是誠有指歸夫古之善使者必通達道里周知阨塞為主上道若曰行記南北之變易詢於道途父老之説葢未足憑也今天下一家由淮而燕者同一舟轍淮泗合流九河故道諸儒置議不已㳺於京城山前十六郡之名漫不能考陸務觀范至能携志書以行或猶有詬病之者豫章李君以能為北行録簡而明博而文而於在朝之羣彦咸深致意焉桷也學未足以傳後願刪之以俟他日之成也書紇石烈通甫詩後言詩者以三百篇為宗主論固善矣然而鄙淺直致㡬如俗語之有韻者或病之則曰是性情之真奚以工為千士一律迄莫敢議其非是紇石烈堯臣示其先府君怡閑吟稿一編玩其詞㫖藻繪融液一本於大厯貞元之盛而幽深婉順則㡬於國風之正矣府君舊貴族遺言雅聞得於先朝之故老壯嵗轍迹半天下富盛羈愁感慨歡悦之事目受而心㑹冥搜逺想不極其摹寫不止用意若是故成就實足以自見桷舊得拜府君於堂下聆其議論明潔而簡易讀其詩如親見之焉㤗定元年三月某日袁桷書書郝伯常經題黄樓水龍吟後郝公以使事館儀直日襆被蓐食引馬於庭下請歸館使謝以未有㫖如是者十有六年在館中觀書不輟其未見者從制置司以假所作蜀漢書皆拘留時稿定方是時宋相以滔天之惡蒙蔽朝論士大夫咸以道學縁飾殆如風痺不知痛痒公葢目覩其弊今觀此詞其意㫖可知矣公之子為侍讀學士嘗與桷言公奉使時侍讀甫四嵗後回京師年十九以戎服見拜且泣公閉目不顧進退不敢其父友命易衣冠以進始與語焉前賢典刑峻整若是視近時父兄之御子弟泚顙實多因書舊聞以補遺事㤗定元年三月癸卯四明袁桷書書張子仁少監族講後張侍中曽孫忠文公叔夜忠確公克戩皆以死節表表著靖康宋史忠義傳兄弟並立餘人不能兼也後其子孫入南一在四明一在福唐紹興推恩葢首及之都水少監張君子仁葢其裔孫惓惓以宗譜未備綱羅附綴支分而𣲖别之歴歴在指掌其勤且勞積二十年始成焉族譜散軼皆由兵戎之遷徙晉世故家南北隔絶各立譜系元魏以來賜姓紛雜譜莫能考歐陽子作宰相表用志良苦而私為渤海譜猶有缺文是則為譜者誠不易矣今子仁能追考其所自又復以職業自見光于前人其官都水興廢舉軼廟堂以其諳歴陞其官以居然子仁有不懌者桷曰胡安定先生以水利為一科故其弟子若羅適顧臨皆為名監司水土職在司空古尤不輕世以善理財穀為能吏厥今漕渠之粟嵗致千萬石數倍遼海不害于民而京師益以羡吾知考治行者必以子仁為首夫何慊然因書其宗譜且以勉焉跋呉子髙詩詩本性情能知之矣本於法度知之不能詳矣風雅頌體有三焉釋雅頌復有異焉夫子之别明矣黄初而降能知風之為風若雅頌則雜然不知其要領至於盛唐猶守其遺法而不變而雅頌之作得之者十無二三焉故夫綺心者流麗而莫返抗志者豪宕而莫拘卒至夭其夭年而世之年盛意滿者猶不悟何也楊劉弊絶歐梅與焉於六義經緯得之而有遺者也江西大行詩之法度益不能以振陵夷渡南糜爛而不可救入於浮屠老氏證道之言弊孰能以救哉呉子髙居湖湘為詩以法度自守髙者騰霄漢幽者抉泉石憂樂得中合於採詩之説矣俟神人於執期望飛仙於蓬瀛侈心之萌帝者之事公卿之作雅頌得之願與子髙異日相見而論焉燕都宋本誠甫進士第一槖子髙詩俾有語遂書以歸之清容居士集卷四十九欽定四庫全書清容居士集卷五十元袁桷撰}
