平湖堤栁千萬縷時繫落日傳笙簫宴安侈習卒未盡癡兒騃女猶喧佻名王之孫古英武韜鈴夜誦聴寒刁徒兵晝閲逐奔馬舟師夜渡追輕舠坐令長城鎮南服鱷鯢落膽夷姦妖煌煌輿圖久櫜戢紫燕九陌嘶風驕胷中府庫貴商略談笑横槊真雄超丹書之功在金匱願趾世媺輝皇朝嗣天師墨竹𤣥雲空飛著無跡濃淡晴溪護寒碧碌碌玉石圓且竒古澗因依養顔色僊人紫宫朝未移平安日報春熙熙生綃陳情寫初意為問白鶴來何遲送趙簿正卿歸養胙城淵明投幘酒初熟𢎞景挂冠丹始成何如奉輿歸故里夜聴慈竹平安聲食蓮分甘舍雲泠得魚入饌泉水清門前槐栁緑隂直㑹有雙鶴飛來迎送保寧萬戸出鎮古閬州鵑樹飄紅蜀帝飛錦屏横空十二眉天狼夜沈北斗正筆花列陣書成圍拾遺舊題山鬼嘯文石縱横碧苔燒將軍好文歌太平桂酒讙迎梓潼廟子昂寒篠枯槎圖靈柯連蜷排石角海風吹秋折繁萼亭亭明玕左右從呼吸𤣥雲起隂壑猛思誓欲歸河源從者亦返清泠淵河源露重星嵳峩清泠之淵多蛟鼉上天下天意沈惻化作蒼龍張素壁玉堂之仙墨成沼穎脫淋漓翻浩溔鐡幹飛光明月流翠節參差飄窈窕昂身突兀太古春峥嶸赤立驚絶人支頤觀象洞𤣥化芳朽成嵗非吾真澧州通濟橋洞庭水發波湯湯老蛟挾舟恣低昂何人空中化樓閣斷鼇為石虹為梁澧陽太守黙無語朱墨塵深失修舉萬里南來春未歸離家想爾曽題柱近有善書僧日温妙明温華亭人明眉山人也余嘗識明于玉几山其年未四十温老矣余識于靈隠視其書之髙下亦類夫年也閏十月有僧攜明書示余遂各為一章美之且記二子之出處焉老温作書誰授訣少學潘郎繞城帖興來握筆㺯春妍靄靄芳叢閙飛蝶平生大字顔魯公晚復顛放少露鋒論功古法雖未至瀟灑要是僧中雄醉裏蒲萄墨為骨秋葉東西雲樹勃裹繒急㸃數𤣥珠不識公卿是何物只今書畫名已傳華亭鶴唳悲流年西方金仙在何天寄聲為了塵中縁其二蜀明貌癯肩聳山我與之語清且閒聞其作書誠險艱自製美筆出袖間流落金題入清笈魚鑰無聲帳中閲暎水寒蓴凝素波側石枯藤挂斜月西風玉几雲翩翩黄衣渡江聴清猿逢人醉寫數十紙山僧示我相誇傳歐陽父子病骨立誠懸繼之天為泣楚優抵掌真偶然妙解無言君合識善之攜酒招遊西湖值雷雨分韻得杯字南山樹影糊輕煤北山雲花玉崔嵬絶憐我輩少姿媚幻此異景窮竒瑰湖光山色兩愁絶更挾新雨除飛埃千年龍公睡忽醒頃刻駕浪鞭春雷我生倦游端有意陳迹黯淡漫蒼苔擬將鐡笛寫清怨復恐翠袖含餘哀主人佀怪不解樂故結勝侣攜樽罍翩翩六鶴舞晴翮華表清唳雲光開絶憐山雞强聨翼照水寒影空徘徊謝公屐齒殊濟勝偪仄蓬宇徒低摧娟娟新青故堤栁片片輕白孤山梅春風佳游詎易得相與一笑同銜杯賦金華方君雙魚硯海上鰜魚雙鬛紅振鬛直上嫦娥宫佀嫌嫦娥太孤絶耿耿冰雪難為容須臾梅枯不可下駢頭躍入空巖罅翠藤交絡石谼深太古風雷摧變化得意相忘睡酣熟開眼重光弄蛾緑跳銀破練何足竒共飽雲闕作寒玉良工感此同死生㝠搜巧琢存其形世人翕霍漫刎頸對此三挹顔為赬𤣥英聞孫古俠士脱粟論交傾意氣朅來風兩泊江千拂拭雙魚落清淚平生謝子金石交詩魂寂歴飄黄茆此中濡毫作新誌免與俗子同譏嘲寄張伯雨道士兼簡鄧慶長二首寢扉曉入香爐雲尸坐朝日雙臉醺南山鐘磬佀有約北山禽鳥如相聞楊枝低昂碧霞袖藕葉清淺青霓裙更欲深居入林壑築壇夜禮三茅君越羅作衫花纂纂今年身長覺衣短垂虹大堤迎棹船綵袖翩躚酒巵暖還家閉門百不知桐葉題詩緑隂滿鄰坊為約張隠居細雨湖橋乗欵段清容居士集卷六欽定四庫全書清容居士集卷七元袁桷撰古詩七言煮茶圖并序煮茶圖一卷髣石忩史處州燕居故事所作也石窗諱文卿字景賢外髙祖忠定王曽孫儀觀清朗超然綺紈之習聚四方竒石築堂曰山澤居而自號曰石窗山樵此圖左列圖卷比束如玉筍錦繡間錯旁有一童出囊琴拂塵以俟命右横重屏石窗手執烏絲攬書展翫疑有所構思屏後一几設茶器數十一童傴背運碾緑塵滿巾一童篝火候湯蹙脣望鼎口若懼主人將索者如意麈尾巾壺硯紙皆纎悉整具羽衣烏巾玉色絢起望之真飛僊人予意永和諸賢放浪泉石當不過是而其泊然宦意翰墨清灑誠足以方駕而無愧甲午冬十月其孫公疇出以相示因記而賦之以發千古之逺想云石窗山樵晉公子獨鶴蕭蕭煙竹裏月湖一頃碧琉璃髙築虛堂水中沚堂深六月生凉秋萬柄風摇紅旖旎遵南更有山澤居四面晴峰插天倚憶昔玉門豪盛時甲族丁黄總朱紫曉趨黄閣袖香塵俯首脂韋希嶲美一官逺去長安門徳色欣欣對妻子豈如髙懷脱榮辱妙出清言洗紈綺郡符一試不挂意岸幘看雲臥林墅平生嗜茗茗有癖古井汲泉和石髓風回翠碾落晴花湯響雲鐺衮珠蘂齒寒意冷復三咽萬事無言歸坎止何人丹青悟天巧落筆毫茫研妙理黄梁初炊夢未古舊事淒零誰復紀展圖縹眇憶遺蹤玊珮珊珊響秋水贈張玊田循王五世孫來鄞設卜肆將軍金甲明如日勒馬橋邉清警蹕淮壖徹衛羽書沈置酒行宫功第一蟬冠熊軾填髙門英英玉照稱聞孫張鎡號納齋堂名玉照百年文物意未盡玊田公子尤超羣紫簫吹殘江水立野雉驚塵暗原隰夜攀雪栁踏河冰竟上燕臺論得失丈夫未遇空逺遊秋風淅瀝銷征裘翩然騎鶴歸海上一笑相問誇綢繆兩曜奔飛互朝夕璇府森芒蠡莫測要須畫紙為君聴落筆雌黄期破的壺中白日常髙懸道逢落魄呼醉眠清歌停雲意慘淡倚聲更度飛龍篇題子昂浴馬圖苜蓿原空雪新積羣馬飢鳴渡江食大梁公子心未平一匹宛駒萬夫敵圉人初浴意氣増跨轡已晚知無成雲窗徘