  - {type: variant, offset: 6, length: 0, content: '', WYG: 一元袁桷撰贓導游賦陳郡袁桷家於甬之隅足不踰闕而四方交游徃復之義亦能舉其槩聞吳興子昂趙子清名雅言為作導游賦道予所蘊亦以見夫思其人而不可見之意詞曰嘗悲乎好游之士閱終歲而莫聞非秉志而媚私亦飾行以矯羣方其命車於王良假驂於造父過屠繒之沛弔絃歌之魯許身結志慷慨傴僂抗銅盤以矢辭握幽蘭而結賦炫華堂之冰雪眇修途之霜露葢將修斷金之利雖䦧牆而莫我敢侮息肩於門晞髪於廬不一歳月迨見夫蠅聲而歌倚楹而吁雖千里之異殊何老壯之卒逾也世有索居肥遯墼門塞竇尊委俚之聞友汗青之朽是猶談智於尺寸測日於戸牖猛虎嚵嚼幽猱悲啾獨行無儔謹揉其輈粲彼一士與時偕藏具大塊之清淑服忠厚以自昌余將徃而未得倚呉山以相望振衣中庭萬籟寂𤣥頎形廣顙㫬兮翩翩墜余以言曰懐辛之椒人或議其妖充梁之木人或惡其獨夫既自以為直而亦豈不以為曲阮生自持幾於目語削木已漫假手於祖匪達人之曠羇終察察乎亷隅余囅然而笑喟然而思拂龜以占莫測其疑抑搔首而欷􅒣故髣髴以致期遂申之以辭連城之璧佩以容兮環龍之劒喜其鋒兮伊若人兮物不可同兮我欲從兮樂有終兮江山兮複長方舟兮可航辭未竟童子擁篲而前曰豈所謂千載之人耶吾當從子而西矣雲林賦若知雲乎昭昭然服光以廣微隆然廓然又似夫五色萬物而沉幾來弗以趾去弗以馳其始也盤辟夾輔輪輪囷囷孰合其處所其終也寸芒以興導轟轟啟鈴鈴汨沮洳襄丘陵若慕而佇若泣而赴愀兮哀不知所訴蜿蟬眇綿含英吐鮮逌傾葢而忘返粲接席以爭先誠果樂乎莫與之宣形成乎無形名生於有名囿於家林允為儀刑奉蓍占之曰居髙而卑佩矩带䂓升於木無徃不復不泄不辱言歸其谷伊南維湖將以為居齋三日祝而蒞諸薈兮中峰式瞻其端為章為祥為輪為冠風以潤之雨以需之挾陰而􅌵乘陽而舒朝飛夕躋莫窮其棲有翼者鵠遵於其涯曰將有行自東徂西綏而迎之維墉之崇施而流之維泉之通以沐以容是謂雲林之宫𤣥雲石賦泗流迴淵禹朝步兮秉陰發竒靈鼇負兮玉質墨章浮帝都兮廉辨以清協磬濩兮堅剛洞虗積元感兮磅礴太素屹空嵌兮靜居泊如日儀以湛兮虗一闡圖握九讚兮八方宣明二儀竅兮抱形介貞合窈眇兮絪絪縕縕道之奥兮肇稱𤣥雲吾將以觀衆妙兮淳賦粤若䆳古仁風熙熙擊壤灌陰以佚以嬉巷無夭瘥物無癘疵祥麟應囿靈龜負池樂以導和禮以黜衺奫奫其春渾渾其天守冲若虗不夸不鐫佩矩帯䂓養於深淵擬諸樸兮文理具宣擬諸象兮充然混完見不以迹視不以形斟酌太和肧胎粹精居之莫疑神維壹清若有若亡訖莫可名二儀絪縕肇分化醇人行乎中孰全其真注兹𤣥酒淡兮在尊御史氏尹敏學潛珍服習典謨葆厥靈根齋居靜儀人莫可聞攷諸庖羲其名曰淳玉龜杖賦有璞於此純綸氤氳瑶光之精為靈為文謹櫝以藏不泄孔溫穹窿中乾夷靜合坤淵淵其容深深其神爰有善木含章揚芬飾端以儀徃來無垠鬱峩壽宫有粲者雲維季翼翼聿懐彼濆跪而祝諸以奉番君曰履道坦而元吉者歟任重而不希其力者歟視下而無危嬉戲如兒審時而行得艮以防抑心自强厎夫康莊其形不孤其智若圓化而神之曷知其遷以相以持是謂期頤桐柏觀賦孫興公天台賦運意髙簡忘象以求斯得之凝和盧君居是山以桐柏觀圖授余曰子為我縯繹其景不揆瓦石援筆為之賦曰厚坤載徳台山効靈蜿蜒扶輿天孫之精僊書易之以桐柏敞神界為金庭轇轕三光磅礴太空睇暘谷之倒景卒莫能擬諸形容也睠彼華頂羣山啟蹤倡九牧以執玉巍冠仰其顒顒香林玉霄夾驂以從華林不彫卧龍嵸巃玉泉御右法蓮殿戎東峙翠微西蹲紫霄巧面勢以規輔𤣥扄沉沉乎泬寥維妙有之珍館匪攀援之可求除三彭之内蕩守中戒以默脩影息於鄧林機忘於海鷗上池飲之以洞視金膏服之而冥搜不然者良不能以乆留也粤昔子晉韜精帝京弄參差於緱山摶扶揺以遐臨瓊䑓儼其龜負雙闕屹乎龍蹲正右弼以贊化千齡髣乎氤氳故兹山也四面削成中心如掌真風合於冥廓梵炁通乎肸蠁三井之泉千尺之潭臯羽警其瀼露髯羊匿於陰嵐飛梁凝冰側足涉褰翠藤流霜觸纓捫縁梭溪交流以織文忽螮蝀之鉤連望飛瀑之懸絶日五色而成妍夫樂與餌過客所止夸誕逐魂踐形者恥長生之藥眇茫於神山執期之候詼譎於五利却衰䟽頑簡易理得其亦有所益乎菌蠢春秀篔簹冬萌五葉之松三脊之香丹光騰於金鼎冰泉徹於銅罌服食之而不墜身輕忽焉以復丁企列僊之遺蹤葛翁䇿名於太極斗晶熒於樞紐金光雜流於瑶席納雷谷之砰磕窮幽淵之罔象丹鳳昔焉以來儀凡羽厥今以避讓諒守貞以制氣匪狡獪以增誑法不孤立道不虗行繼之者白雲先生受素書於軒轅襲帝胄於典午憺寡言而無營思坐忘以遐舉承唐皇之明問敷清淨之舊章署漆書於寶幢迎黄雲於玉堂厥後憲章希夷範圍靈寳誦蘂珠之𤣥文過期頤以終考若是者誠何異於蓬島或有言曰樓臺榮觀方士侈崇夷考是山不綺而豐不幽而通廓兮其有容閟兮其訖逢味興公之抉竒訊擇木之寫真若増其嶔崟盡其窈深身不羽而凌遡俄曾城以瑤林迺若丹霞伏光鐵柯舒英集衆妙以凝睇髣三真之傳經擬金剛於鐵磨警黑業於鴻鐘何錢李之二王莫能悟其祿終猿抱子以望月虎伏威而諷風靈璈清以集鸞哀弦急而驚鴻爰自有而即無眇壹氣之鴻濛悼南國之蒸歊髣天都之肅冽彼夏蟲與火鼠徒自煎以内熱申之以辭曰帝子下兮雲中質通明兮粹冲覽炎洲兮垢紛節容與兮兹峰蓬瀛杳兮無極浪滔天兮不可以屐境荒滅兮亡益曰此留兮吾將以内息神為凥兮氣為輿朝紫霞兮暮清都黜視聽兮道靡渝歴千劫兮復故初雲凝素兮中壇鈴流露兮日暾三灾屏兮嘉祉繁語夫世人兮歸休乎靜觀椿堂賦為宜春彭有年道士作昔嘗疑夫漆園之叟學幻而逃虗詢蟲魚之疏考風土之書莫之敢圖余游上京有客北窮夫金山西歴夫賀蘭南踰雕題東超三韓囅然而言芒芒禹跡子所履者誠然乎冬裘夏葛寒暑之運環也今也日臨中街霜飛冰霾毳集於踵貂挾於懐戴斗接淅承露凝桮子安視而靡猜駭聞忽見知奚窮乎齊諧吾先枚夫九州者而言之屢熟之稻南州是專十丈之蓮華峰所傳栝化石以錫貢樟生庭而為州梅梁分以鎮妖牂牁肇乎維舟杞犬吠而質變葠人形以劑投華平雒常瑞於皇圖蓂莢屈軼盛於堯世木沉産子以成國樹古眩精而為魅松分秦王之封柏擅蜀相之祠若是則復何疑焉在昔大帝窮源崑崙見北溟之鵬視之若雪即之如雲得其遺羽丈尋不能以論是齊物者非寓言也耶維老彭之遺裔握六氣以自馴肇兹齋居其名為椿二儀絪縕周流無垠則以自儀道合至淳吸兮若鞴旋兮若輪肅兮似秋熙兮如春行乎六合而不躓則所謂八千者吾猶以為歳年之稊米也客揖而去遂為之賦仁壽堂賦合江老人杜氏行年八十有二其鄉人尊之以仁壽因名其堂子輝卿今為蜀省掾來京師求賦賦曰合江老人生於三卯歳之中秀睂疎明鮐背隠隆家事𠡠斷遺聞㫪容口欲宣而彌哽情屢發而莫逢㑹稽生揖而進曰生居東南襲輕飫甘耳不屬於鉦鼓目不接於戈錟合江之事相傳於游談願削牘書槧俾鴻筆以有參老人改容正襟徃佀可尋夢若初覺病猶在身方其誓師斗城滅親割情盟重於白馬命輕於浮塵黄風颺沙千戍屏營擁若波湧排若算經危堞隳而礮激闒㦸護而矢承躄者瞽者各有攸職熏窒旁穴旦不遑夕壞館門毁甃石樹列對峙填負旁阸卓飛泉於雲根起清流之千尺目不能承睫氣不得納息黑祲障空燐煙蔽江横厲排蕩抶擊舂撞擬效順思投降提奬之主怒莫敢當忽風歛而川止活噞喁於鼎湯噫嘻吁此其瑣譾者耳華陽之徃躅肇於文翁悉於太冲纖侈日滋繇是鑠景福盪醇風鬼嘯髙居神泣巨峰棧閣如砥萬騎突馳火連摩圍氛翳峨睂築京觀以專戮甚槀街之陳尸順舟而下者十不得一緣澗歴塹視京垓之豪釐﨑嶇古渝前彭後余保衣冠之弱緒猶興文以舒徐逮夫六合㑹同彈丸震驚發渙號以澡雪緝政俗以治平則夫兩州之土民無遺鏃之害歌帝徳以底寜㑹稽生仰而愀俯而笑在易之象復存於碩果物極者斯通盛過者斯禍維今老人熙熙其天休休其心事至不忮智藏惟深式是表儀化而慆淫國有耄叟鄉有善人仁壽錫名爰則其淳感古樂今兹其為擊壤之堯民樂水圖賦東坡先生脫逺游之履衣紫絲之衣與黄冠師跪坐息機臨清泠之淵憩巨樾之陰意消言忘其得在心飛泉琮琤寒源杳深悲塵寰之隘險抱竒璞而莫陳將以善夫濟世之極樂至理以自新維兹水之無倪非智者莫能以鑒彼河伯之好夸終望洋而浩嘆翳西海之沈羽竟其說以恠誕小大不同其病則通駭於所聞者忽所見誠哀乎舉世之盲聾余嘗披神禹之地圖考先生之轍迹而誦之方其發軔于瞿塘千里一瀉鑒燕安之酖媒悟孤孽之非禍雖盛氣之飄忽已足窮物理之化迨其中年倦趨分符東上慨河流之奔駛城不没者三板先生胼胝以先激而返之有以遏其性之狂悍伊文登之貝宫空百幻以自獻實精誠之冥通異燃犀之獲譴至於羣妖肆憎百懾相乗先生怡然而行試正命於巨浸儼安流之無驚耿耿明夜乘桴南歸海若息波馮夷効竒混六鑿於一噫信天地之不私匪深於水者其能若斯耶玩王孫之游藝弄五采於素絲聴之而無聲即之而若遺若然者欲以求先生之所樂無異畫餅之充飢餘閒齋賦曷不觀夫農父之治田春耕夏耘晝作夜緝望嵗常有思憫苗若不及候其陰晴謹其涼熱食不滿嗛目不承睫穡事告成以祀以享入此室處曰余將有養休其四肢里閭熙熙甕牖迎陽兹其為一歳之隙得以自怡者與古之志士範圍天地之初冥搜密籌心如淵珠據㑹以集要積神以合虗冬爐夏葛謝而弗居逮其蓄極以通若燭計龜卜物莫能沮燕居申申欲不踰矩倚門而歌聲裂金石恢乎其有容順化而有得葢其勤者若此則其終也迺以豫佚惟昔賢之肥遯屹乎其頽波青林扶疎擢兹瓊柯味道以觀澹乎不頗閱世推移飲兹無何養其粹精不激不阿有客仰止摭其嘉名以處以息慨然而言曰悲濁垢之駢臻御吾輪兮焉窮愍逐日以道死異惜陰之度功厥今金馬公車履舄接踵承色以求為疲為冗退食以休濯其靈根藏真養恬疏清滌袢庸式庸佀著于門顔維四民之有制實士農之居先惰于初者躓于後弊于智者罹于艱歸休乎君援琴而歌曰羣動兮夜息質貿兮吾徒曷猖恣不能以自適書兮在庋斝兮在席復吾初兮以無忒息齋賦慨太素之日凋服仁義者亦幾乎外馳百幻眩晃衆愛糾縻側身於積薪之上試命於累卵之危髪盡化而齒將終竟不得要領以自持端木之智工於言結駟之徳色索其中誠餒然也史遷之足老於行悲憤之書不能以全其生也東門之悔華亭之悲是猶碎轂而大輻掘泉而止渴何其遲也古之至人止於其所不止休於其所不休兢兢惕惕不得而名之强名曰息夫息形者神清息事者愚絶息心者心愈馳息名者名愈徹莊周之息影為荒唐陶潛之息交為慨慷是皆未得其當若然者其必有自息之方夫知古而不知今謂之陸沉世故之岐多人事之機深生乎下都兮又安能超舉以絶塵惟李侯之靜好藹鄒魯之淳風不求異乎人黙息以厎于鴻濛振纓而趨簿領如棼上下雜糅否臧混淪一息而求之何異解牛之芒刃𦕈目於毫分也退居申申圖書領賓不喜不慍寂然含珍吾有以知其息之外陳者矣夫天地之理動靜濟焉偏一而用則為五行之沴人身之氣如車軸窒而不流則為疾癘為末廢若侯者其何以為息之體而余以為外陳者豈侯之意歟他年成功而歸晞髪於彭咸洗耳於箕潁味乾健之㫖以極君子之理吾不知侯之所謂息者其信然耶其寓言耶凝雲石賦為張希孟作文登之宫積濤成雪天風蕩摩海氣幻滅嶔崟蜿蜒堅若金鐵大者成巒小者成穴蜂房羣綴蟻曲百結爰有張子抉竒發珍藉以文錦炷以古熏陋博山之侈靡髣爐峰之氤氳湛然塵消號為凝雲有客哆而笑曰南山朝隮奮搏無垠太素為母五嶽為賓合虗成形積潤以神今子友一拳於几席雲何自而凝哉張子倚梧而言曰窘尋丈者不能以喻大語荒忽者適足以資惟人惟至靈品物是賴明而通之呼吸萬􅄜决為奔騰興為霮䨴其來無趾其去莫閡唯古至人韞玉以匱藏明于幽養神于獨内澄外觀嗒若槁木靜以自儀無䘮無辱念此石友其徳不凟燕居相忘庸以熏沐則夫所謂凝雲者不待於外而自足也客喜而悟遂為之賦紅梅賦閒閒羽仙朝歸絳都冰淳雪峙湛焉澄居候寒圭之㣲影察衆芳之榮枯草藏荄而永閟木脫葉以無徒彼陰陽之眇密曷能返乎𤣥虗於是天迴景溫機抉候促吉雲豐融美虹纚屬睠炎洲之嘉植淟乎其忍此垢濁也儼蘂珠之揚靈貯初服於太素沐九芒之粹精蟠翠氣以内䕶赬容耿以自持兮抱冲密而莫吐衣赤霜之羽袍曳文錦之靈佩棄明月之寒璫綴飛瓊以為琲匪徇色以自誇表昭質之莫昧凜世坌之如焚赩微慍以卻背惟深根固蔕之不可恃兮將求化以養晦繄煒􅂱之滑稽懼夫惡朱者之見毁鵠日浴以鷇離鶴舞丹而希壽念形色之莫踐徒變幻以眩售萬籟凝寂穆然長思絢此的皪申之以辭辭曰貎充心明道之腴兮葆光罙貞慎徳樞兮渥丹自持惟受初兮不爍不騰莫可踰兮時至神完吾其敷兮吾其敷兮物莫與俱兮九華臺賦混元之峰鬱為仙閭霏青駭紅嶔崟相扶下垂清溪百流是趨昔有羽士恍兮承跗縞衣𤣥裳其化莫追爰有堯年之叟植杖戒鉏顧瞻童土式崇墳壚黜幽導竒以薙以除層臺演觀積成為郛拾級以升家林滿圖迺擢孤芳絜泉廣疏錫名九華葆兹清腴有客蒞止披情徐吁曰登髙能賦大夫之職也為我賦諸客曰皦皦廪秋天風奏竽哀鴻赴空寒蟬抱梧脫者如掃縮者如枯落妍歛英還形太虗存莫可禦去莫可居相彼九華孰為有渝含章金衡承元坤輿弗媚弗私苦心秉愉迴黄抱素包寒紛敷飛霜溢露言沾其濡獨立養完孰云彼汙世服姣靚飾脂效姝嗜脭豢醇溲甘芼萸維爾茹口哆焉如荼耿持空榛曷知我蕪叟曰好不可一鴟鴉蝍蛆鉤以為直石以為琚變奪五采睢睢盱盱已或自售適増詆誣寄懷於言觴至不餘九九默操㗳焉蘧廬我生之辰天清景舒庸采以脩庶其遂初山空無塵白雲在裾歸與歸與吾以子為徒與墨竹賦屹書林之䆳清襲空翠以膏沐察羣芳之交妍糗紫芝而不肉化蒼煙於寸頴皦森束其寒玉有客叩門指而言曰夭夭申申吾不知其親悃悃欵欵吾不知其怨懼獨立之絜矜徒三刖以自獻爰有童子擁篲以前曰東南之美以植則繁大盡斵採小為烹煎曷扶其清孰庥其生零西摧東山崩谷嗚取億及秭莫知我名維我先生念兹磅礴探𤣥窟之太和布靈根於𦕈邈取方諸於承露和不死之至藥寄遺跡於須臾避𤣥冥之饕虐故其凌風出塵廓兮如神承春飲鮮從兮如雲疾掃却顧猶歐冶之鑄郢人之斤也且客獨不觀夫鑑之與形媸妍脩􅊏各窮其精惟靜者能以燭至動而所謂詼譎變幻迺足以覈萬物之情望南山之崔嵬目九日而不瞬匪好夸以昡竒良以解夫謏聞者之慍語未具先生振衣坐忘與客相顧卷縑以酬一笑而去素軒賦太原白無咎徴名字于易復以素名軒實維其祥乞賦陳郡袁桷賦曰維太初之混茫兮𦕈昭質其孰分二儀迭其交媾兮肇清濁而成文翕九垓其同風兮佩鉤矩以播芬邈焉黄唐之仁聲兮極黼黻以成憲忠與質其相環兮迄蒼姬而莫變亘終古之同軌兮成後來者之過眩徴載籍於竹簡兮淳風鬱然以未墜憫太和之淪胥兮希絜已以自致三熏沐而揚靈兮儼前聖之遺㫖悟宣尼之自筮兮繇告之以不樂曰丹漆不文兮白玉不琢質不可以受飾兮道不可以雜敦厚靜止兮弗居其華惟無色而自色兮物莫能與之加爰錫名以表厲兮雖顛越其靡它凜世垢之淟涊兮蘄旁證以冀直聃演言以清淨兮戒目盲於五色墨諄諄以兼愛兮悲棼如其何益冕朱裏而外𤣥兮衮襲裘而不裼淡𤣥酒之無和兮輅盡誠而越席顔執仁以不違兮炯虗室之内煥商舉隅而起予兮懼絜矜夫倩昐噫童子之微言兮警曾氏之華睆捨沐浴以孤泣兮兆有知夫孝子乗結駟以夸容兮終内熱而殞愧車美澤而可鑑兮曷栖栖夫靡止彼馬師之食藝兮亦能遺𤣥黄而洞理羌若人之好脩兮妬芳澤之日恣將乗飛亷以上征兮揚古帝之正則悃愊欵欵而彌貞兮固丹府之介特書盤盂以參倚兮慮夫龜之不食揭嘉名于户冊兮振白首以莫忒申以辭曰茫茫重𤣥物之先兮剛柔相摩文以宣兮反初復真徳迺全兮履素莫渝吾將以無愆兮冬窩賦濟南潘仲徳家商河治其田廬塊土纍石以處左經右子刻意厲行斟度古昔將力避世不復近歳終順陰陽之理慎居于中而名曰冬窩未幾聞于朝為太史屬太史職清簡仲徳獨憂之復以昔日命名者揭以自警余聞異之為之賦曰噫嘻夫世之善養名者豈惟冬與朝而興夕而趨執轡在手承塵滿裾僕夫告痡寒冰厲鬚剽飛英於窶數巧膏沐而睢盱懼分忽之不前戒良辰以先驅矜清揚之婉娩猶春溫而于于何自而冬乎大盜之智不以胠篋巧賈之利不以操割葢將足不超閾而踵接其席目不承色而議推其徳美容峩峩雅言迤迤爰處爰居載笑載歌閟無傳之靚䆳又何為乎冬窩也哉潘子曰不然冬為天終萬物葢藏陽微如芒外枯内傷甲者若縮伏者若亡裂者為阱凝者為防歘吸以吹浩溔莫當口含飛霜睫承流漿三光青熒五嶽仆僵故其蟄處也隆然以龜深息而卑卑其徐行也蹩然據危俛僂而施施疏房上宫連氛累靄嶔崟阻深束縕以載鑿坏者遁煬竈者遜當此之時食不飽菽藿衣不襲裘鞹悻悻然角進而憑陵將弗折而自缺且夫藏明養陽必謹其獨大智若辱大容若谷紛載籍之蘊祕糅衆說之桎梏折精華以彌縫豐蔀屋之光燭吾非以嵁岩為居鹿豕為娛友幽闃而棄斯徒也念居蠖之未伸凜自縮而不惴謹清寜以冲嗇御六氣之宼沴將以游乎萬物之初順四時而成歲也榕軒賦南粤之區溫風戞摩積炎吹雲流金為波少負老息盼兹庭柯爰有弱木攀縁嘉生連理纚結附枝膏凝蔭旋萬牛廣容專城千柱承宇百尋傲空羣焉莫爭希賢同風長與少殊如昂如顒溜微生於一髪寄豐壤而敷茸詎擁腫以丐全眇頽波之容容厥類滋夥其名曰榕東魯先生見而笑之曰目無常形嫫母以為能耳無常聲折楊以為清美醜相乗孰完其生眷兹連蜷棄諸同辭薪者鄙之斵者訾之輪者絶之器者揮之夫好惡不齊莫與之爭吾何行焉舉觴以噫噫極而歌歌曰木之詵詵匪委佗兮木之萋萋匪婆娑兮巧為彼矢名為彼戈徂徠維松新甫維柏柰何柰何客有踵門而言曰議物産者必以良舎所用而求無用將安所嚮先生曰多謀者神泣多才者形傷維彼阻窮百虐備嘗蔚然以修充然以光四海立賢勿云其方窮髪之北殆將駭兮榕兮榕兮吾以為楷兮復庵賦為恒山李謙父作揚子之衝千流交趨蔽帆雲凝炙轂雷􅌵塵奔瓦聨擁關蹋衢土衍隰匀深耒廣畬百技眩衺千賈獻姝爰有倦游之叟卜龜食吉構兹廜㢝不斵不甓茹玉芝而三咽膏𤣥髪以若漆與客瞰空觴而言曰今夫所謂歸老者其名鮮鮮其行爰爰脱機於韓盧之吻息影于菟裘之巔造者絶屐奉者謝饋嘗仰屋以嘆感極以悸悸極而悔黯崦嵫之􅉴離揚滄浪而莫􅬭若是者吾奚以為歸世有習静之士逃聲於無形避害於有名山鬼獨嘯悲猿凌兢掩耳疾匿脫焉如驚是焉知天地之性哉磅礴之理不能以獨運􅃤者舒者疾者徐者足以窮萬物之真維昔此邦犬牙東南前江右山朝煙夕嵐憑髙而望則去者如箭淨者如練杳者如線效者如獻日出而作連岡燒空交蘆舞風土臺崔嵬野田豐茸昔之荒煙􅕃草恍不知其處所寄遺蹤於白鳥問秋風於賓鴻夫觀萬不同恒維其機今吾乞身於未老寄此土而食於斯也素書滿牀旨酒在巵鄰熙社恬子順孫祗不脂不韋不激不靡視昔歸全而索隠者相去幾希靜者動之根息于外者其内若焚川流徂東龍返為雲日沉于淵朝升為暾其本元元其生芸芸簡兮廬乎靚無渝乎又何懐乎土乎擬剡亭賦為吳成季作英英維祥織流成章雙峯嶔崟紫芝熒煌峙立澄冰𤣥言飛霜爰有化鶴之叟迅翮珎館舒風盤霄歸而歌曰兹山兮沃膏陽霏兮夕濤吾還兮不崇朝將何為乎逍遥昔之命駕者興極而意已盡卧游膏盲者不千里而接軫去若隙駛留若柯寄情不及親豈我輩之謂耶彼櫟輪囷爰衍爰溉彼桂扶疎以嗣以賚養苗者擢其嘉牧羊者去其害植楹兮鼇負布甍兮鱗萃我季兮圉圉孫並曾兮陳廡蹇獨余兮不留目凝睇兮屢顧芳菲菲兮在林誓將築兮奉所欽卜龜兮于庭􅓪言兮揚靈彼􅆪兮奚投返真兮思冥學道者天完逸老者延齡順以養榮息以固形刻意枯槁者吾猶謂之善盜而我之髣象豈果有所羡而自表者耶道本於無名擬之而變成鉤深者泉如珠在淵遇風為漪激流為川彼剡伊何源逺不遷則而企之於亘斯年餘軒賦為程士安作世有好名之士佩玉長裾鳴騶導衢候者接踵對者奉諛日三接而色喜坂九折而懐吁欠伸委蛇顧而子孫且言曰夷考昔人吾何能擬哉榱楹鬭空旌旄樹霄部曲中街膏壤近郊悵兮屏營慨兮鬱陶若是者何囂囂也爰有靜士卑然素儒載凥為輿游物之初粟不滿缶屢空泊如爰笑爰處擬諸華腴昔東方生見􅃧于侏儒翫世味道忘身之蘧廬維程子客于江之南幾四十年幻者如飄風逝者如回淵禍生於公餗罪成於細旃撫心以思孰省其愆徃游于其軒太古為春無懐為年探圖宓戲受厯軒轅在易大畜剛止以育徳日新而自足者也昔之至人道充以為富聲出金石柳生其肘席不蔽坐飯不充糗今子之居酒時滿斚蔬時滿把視昔之窶者溢且夥矣程子憮然曰吾誠夸矣隠居圖賦陳子築居唐奥之山復繪隠居圖摭其某水某丘之雅名署於其旁以寓朝夕不忘之意每遇佳客輒指以示若挽而使之游從於其間也間謂袁桷曰夫畫以髣境畫之所不能及者吾雖知之而不能數與人言之且境必有趣趣之精華非言不傳也子其為我摭名以發其趣桷對不敢辭迺為之賦曰陳子倦游江湖整轅言旋顧瞻先廬徜徉里門四壁寒寂頽然維藩詢闉闍之遺跡儼中堂之猶存弔零落之舊叟撫徬徨之驚魂於是悲極而喜喜極復悟悟而言曰人生一世惟靜者智盛不可持翫不可恃三家之市其行跂跂四達之衢其言姝姝一以巧為媒一以酖為居吾懼其獨立而誰與趨拂龜以占兆於唐山之隅若質而華若翳而明缺者如玦環者如城相其隂陽築室繩繩被以杉松瀦以芡菱棄塵世之喧啾牖乾坤之清明爰命雅客展以輕冰之楮化以五采之頴􅊏濃如春曲直若領吐秀獻竒發牘炯炯鄰輞川之清妍敵草堂之幽靚故雖踰江越嶠適市造朝挹此粲者神凝各消有不待北山之移八公之招也客有言者曰擁裘而歌者意率類於慨慷登髙而賦者事常失於荒唐吾敢按夫子之圖而代言其詳東越之區山水冠世發抉地靈前王後謝維君之居敞若神界若迺石塘界其前雷峰守其要馬領冠其巔羊巖負其奥周以青鮮横以磊砢近若迎笑逺若却坐嶔􅍶何山挾輈以殿浮游閬峰振弁以見上有石屋梁欐參屬紛披寒苔聨絡怪木恍飛仙之遺跡鑿幽竇以守獨前林杳靄丹光騰天伯陽一去而不返𤣥鶴盤空而將還飲石室之寒露問山人之何年然此特隠居之外美析而舉之有不可勝言者矣晴原漲春千桃爛雲飛英滿溪織流成文支寒藤之瘦骨度略彴之微險觧瓢􅆽泉一舉三咽藹桑麻之故交爭聚首而繾綣前有惠林濃綠婀娜投冠觧襟脩然清夏欣衆葉之敷陰訝楞梅之吐火秋畦離離黄菊斕斑爰泛黍酒駐兹頽顔懐千古之處士酹悠然之南山歳窮境空長木號風寒岑晃曜巋然中峰渟膏溢銀噴如飛龍匯為澄潭窮髪鑒容烹以碧玉之鼎瀹以雲腴之茗神清意寒語爽心冷葢將忘塵世之事而深以内省也相彼雙門囿兹羣山清風常來客去不關圖書自娯鄰社莫干有堂寛閒扁兹嘉名悼白雲之何徃悲先友之日零瓊樓舞空清曉萬變黙坐以觀翕忽詭幻賓天衢之出日駭青紅之紛眩鳥衝煙而辭枝兎驚林而絶坂嶺濛濛而人度露漙漙而葉顫念哀鴻之相求時遺我以好音緣小墅之横岡花竹儼其成陰悵舉世之莫從歌風雨之苦吟迺歌曰歲將晏兮莫留過故居兮懐憂山坡陀兮四屬吾拮据兮以屋懼世徳之顛隕兮習肥遯以藎穀駕余􅆖兮屏營耕石田兮果腹究出處之何心兮幸余髪之未化為我語山中之人兮吾将歸老于其下清容居士集卷一欽定四庫全書清容居士集卷二元袁桷撰騷辭附愍誓哀謝先生受穆清之元陽兮一精白以抗修閶闔睒睒其初麗兮執正辭以告猷黯朱光而不燭兮妖羣立以縱恣飾詩禮以逞誣兮曰余將焉所詣胷臆結約而莫達兮史告之以寡言心屏營以靡置兮導􅎶斾而為之先揭徳華之魁壘兮勵來者之不前一成旅以興邦兮仡然莫余敢擬州纍纍以十百兮夫何寛衣而廣袂燃積薪以逞安兮羣豢食而自戲竭精液復疾呼兮卒莫能進其詞振飄風於林籟兮葉脫故而懐新衆喁喁以雜居兮謇獨立而號呻矢危忱於帝閽兮星委地以如琲何執愚之慎矜兮守隘說於顛沛持空薄之一髪兮振千鈞於層冰力弗勝而殆兮猶夸夫守道之經企女紀之傾輪兮極迅翼以恣徃九疑靈妃􅆭玉容兮鑑鼓瑟其音蕩重華倐焉以㝠􅊬兮凛舊徳之日䘮乗桴游於中流兮海若息波以竚望棹夷猶而靡行兮羌何為乎此路砉然揚靈窮晦冥兮朱鬛乗旗挾以震怒澎湃蕩簸激回渦兮爰深逝以欷􅒣懐縮恧而失據兮寜忍歸夫故居死無能終報兮生莫知其曷圖貴化人之冲漠兮絜肥遯以自遜蒙垢紛為汙濁兮薄日月之吐吞墼門竇於荒滅兮屏精明以黜聞超飛霞而上征兮遇武夷之神君逝者翳于山丘兮夸誕逐其營魂覽三聖之古簡兮宣尼實為之彌縫謂道無古今兮孰與之傳虗九九而内明兮剛桑錯焉以敷宣翫朝歩之竒文兮握竒五以黜煩建中極而滅端兮成品物之自然湛然一以貫兮曷知其後先數京垓以成變兮迎拒之而莫偏歛莫知其跡兮為道之全夫形既不可以乆擅兮神與之為槖籥迫朝逐而日騁兮引正命以自絶棘戔戔于車道兮精離榦以蕭屑秋陰􅉃其凄骨兮熠螢光之明滅手三秀而不忍茹兮腹殷殷其雷裂奄兮愀兮忽以放逸兮何昭昭其章徹亂曰𤣥神凌兢兮命壽不得長闒茸曼衍兮既樂且康衆皆馴怙兮靈胡然而秉方擷雲英兮微光佩雜芳兮彌章駕赤鯨兮騰驤絶六虗兮放八荒注北斗為漿兮内熱不敢嘗林有桂蘭兮水有鰋魴所思弗見兮奚故鄉挈眇風兮樂未央吁嗟逆化兮寜怛傷廣招深寜先生乗虬上征江海殄瘁湘纍遺痛千載猶一日也柳車爰行瞻望永隔門人袁桷竊取宋玉招魂述廣招以反其義其詞曰竊獨悲此翳濁兮身鞠恧而莫明服三后之貞則兮秉忠純以内兢繩古義以自抗兮懔微躬之莫勝懼天命之不吾與兮晚更號以深寜委靈魄於𤣥宅兮挾清神以上征重華􅃤其無容兮矚下矩之險隘侈九夷之曠邈兮申前聖之遺戒一去而莫返兮八靈孰能以震駴乃命小臣戴縰秉旄注精髙冥而下招曰茫茫封丘麕豕萃只炳靈奔飛杳交㑹只嬋嫣清芬孰返斾只縱横幽房雜厖怪只魂兮歸來其益以駭只東門熒煌平蕪層陰只靈宫紫芝萎以泯只流鈴揺空訴夸滛只𤣥蛇蒼鼠若擾馴只魂兮歸來激越吟只題躞蹂躪白蟫飛只滅方鑿迂傳致以肥只鬭青綴白眩􅊏竒只折楊黄華司體儀只魂兮歸來彼相疑只沃隰修畛鞠薺茂只狂夫冶游胡憯後只南山白石曷以永年只式擷其嶶悵周原只歸來歸來其孰能庥魂只愁雲旋宇陰􅄜振幕只素空霏塵清晝激雹只虎蜼黄目屏陳設只精鑿後置􅪈蠡施張只伊嗚仰天雜猖狂只甘脭恣睢禮不可防只魂兮歸來悉無以當只魂兮乗桴登瀛壖只海觀日浴爛紅殷只晳容長裾襲古先只漆書竹簡遂研鑽只崑崙穹隆疑有至人只妙顔紫蕤休徳日新只吐珍納和與道為鄰只雕題祝髪禮讓興仁只桂蠧咀吞味芳辛只幽蘅嘉芷佩孔文只相羊湘纍盼若存只承挹清塵徘徊翩翻只天光淳耀㑹弁森扈只肅容展威受多祜只斬几破觚斯皇輔只龍圖昭回布髙矩只開陰閉陽庶類蕃嘉只捫歴箕尾建崇牙只翦理姦巫靜無譁只照示下土循羲媧只河公海神瑰以迅只貝宫鮫室祕怪雜孕只瓊英琪柯錯繽紛只鞭龍誅蛟霈澤湛潤只魂兮逺游戢凌紊只揚歌舒嘯化幽憤只重曰嗟所思之不得見兮儼冰雪之遺容繄遲遲而容與兮松柏日其葱蘢悵幢帷之咫近兮長虬脫焉以追風蛻塵居之險艱兮捨崇蘭之新封塤箎迭其和奏兮聨雲車以陪乗粲琳琅之遺編兮俾泯絶之足證匪離羣以自絜兮誠不忍夫騖騁超整駕以言從兮懼見譏乎後聖揖虗漠而言旋兮耕書曰以振厲諒神明不吾欺兮庶終承乎嘉惠千秋兮靡長白雲兮相望魂兮歸來其母我忘也七觀翰林先生納榮息機謝白玉之堂將歸于麻源之山房越公孫懐牘濡頴託物喻志考圖審曲若鑑之納視言忘而意消類别而理備有郢大夫癯然褐衣目不接乎黼黻耳無聞於律吕囅而言曰登髙能賦淫㬅荒忽智專者魂强形滯者物逐昔吳州來觀詩東魯言有度徴有據厲階於枚生濫觴於曹王先生楚産也雲夢汗澷巫峽㠝岏胷藏腹蟠公孫不足以教我先生殺青南山積簡羽陵若網有綱若墨有繩舉凡暢微我其聆諸越公孫曰太素􅃄熅清濁奠儀雨風露雷動植攸孳辨方審良民用不疵六氣以沴日夭其世彼諄諄者皇曰汝命實長厥土燥剛相其溫凉我生命在天順以受年巖居谷飲中道以隕執書以觀有涕汍瀾陋彭鑑之逆理兮何恣縱而益顔言技可以進道兮吾當繇是以返觀納腸補藏憯忍莫竟石立土踊孛彗迕逆吾猶以為天地之病也脩身俟命道之大經先生之正也大夫曰神之所行何體何方拘者為儒請更端以告僕夫越公孫曰靈曜宣精五紀順明察幽考微法天以行形氣芸芸吉凶卑髙觀象以分韜兮靈根感不以言繇動彰靜百神受祜虚者為音質者為數昔后稷氏之職黍稷薿薿智者過謀胡盡其地力民日作慝相攸食墨風雨斯蔽連雲岌嶪飛不得垂喙履不敢仰視旁營萬家地記萌芽赭衣僨蹶而淮水復絶鑄鼎伏姦能沉于淵吁嗟而求桑林之羞要荒擾馴王㑹盈庭獻琛効珍物不可枚陳雞豚以時父恬孫嬉何助邊􅌸思屈曲洲島家累千金資先生昔居列僊之館據要集思謂象以理明妖由人興守諄芒法清寜却走馬于郊謝重譯之雉陋三脊之茅熙熙陶陶舒舒夭夭不言而歳成無營而事貞夫子不云乎一致而百慮其是之謂乎郢大夫曰汎觀博聞於道彌損願滌耳以抉其蘊越公孫曰粤昔尼父唯俎豆是斆擊刺坐作因民以教蒐苗獮狩車徒卒究厥今輿圖八表同厯四貉交軌月竁風丘冰天桂海馳心望雲請命欵塞千廬星環八屯山列羽林繙經飛騎皷笈然而樂成者難與圖事守文者不足語智嘗聞之兵農同封耕戰同功魚鱗鴈行敵莫我敢當府散籍移萬姓流離强帥拉脅外寇憯肌卒不可拄支後王鑒觀法日以繁厖者罷者恇者羸者駢頭引吭食粟而嬉開門納兵百郡是師何草廬髙吟﨑嶇雜耕何杜氏之子傳癖孔深而緩帯以征射以容觀劒以氣言批亢擣虗孰知其隅折衝厭難莫窮其畔至若握𤣥圖視龜文縱横起止與易象相表裏者驟語之吾懼大夫之竦眙也大夫曰兵者不祥之器未效此知也越公孫曰炳靈心君闢乾闔坤情聲相宣立度出均昭昭鴻藻緗縹是存敢先論楚材而言之漻漻乎形畏垢而將翥也霏霏乎睫承露而欲訴也荒蹊斷葦燐滅没而疑聚也織文揚徽攬芳菲而雜組也少焉商飇號鳴金石琮琤逐虎摶兕韝鵰鏇鷹寄莽蒼於一瞬乗扶揺以孤征終緩轡以就日愴倐淪乎西傾噫悲何為哉古有巖居之士抱竒抉幽潄芳深林憩寂凍流憺乎其若遺窈兮其若留鉤盤助之為回旋虗牝答之為獻酬猿三疊而墮淚鶴九轉而凝愁鉤𤣥採微迄無終窮瑶席敷張髙歌慨慷語初麗而終放託餘韻於宫商然此其戔戔者耳攟拾蒼雅刮磨誥盤微粲貝編飛英露漙何譏乎肉食之鄙猶鄭穆而魯桓也大夫不聞之乎鐘石絲竹各隨其聴隆汙有時其所遭者命摩盪堪輿吸呼羲娥矢為帝詞叶為賡歌五嶽贊襄百靈護呵不棘不茨如砥如磨發濳漏泉掖民陽春瑰逸為新簡絜為真列若戸居别若渭分雍容者珩璜冲逺者英莖縷絶而緒續醴甘而齊清昔之擅名偉著耿兮其不能以十百程也浮聲切響直意肆志澎湃訇溘滔滔莫止据理者夸飾言者哇嫫母兮姑射鉛刀兮鏌鋣謇莫任兮奈何大夫曰文章與政通玉署之職也文勝質則史更言其大者越公孫曰矻矻中壘校讎靡寜世本年紀繫于麟經捨相府圖書泯其緯經炳麟金匱汔罔敢配迺司馬氏決榛鋤翳麗者為譏激者為刺升陟世家表籍作紀言諸侯無史史立周圯鄙儒畫墁削章刪凡爝火並日卒澌盡莫傳昂昂荀袁辭約義完何班范家至耿光綿緜相繼擬述百世一律素王簡編如日在天熒煌髙張孰敢附肩鴻化以漓研探益疲穢者闒者襲者濫者淟涊畏禍希企市價諂不表直俚不師雅若聾皷鐘若盲策馬元經附訛唐厯受呵後有紀略迄莫同科尹石猛志證古比事百不一試歐陽氏出方名山所藏復大同而小異勢不兩立其魯史之謂厥今繫諜川盈記註􅌨比故志存廢興之源典章酌損益之致登瑶山而神駭游鄧林而目眯般倕効吁隨和發涕操觚之士吾將見其心赧而神悸也先生登祕丘覽羣玉積石倉標朱目墨兵筆削融液乎粹精囿赫胥鄰大庭大夫宜從下風而乞靈也大夫曰皇王惟熙帝霸孔􅇖我心增悲韓愈不為史名以四馳何庸知焉越公孫曰煌煌古帝别生聚方煥乎陶唐五服正邦五典率常導之無違民用熙熙授之以時聿來孜孜降于三王厥緒曰孳集成于蒼姬黼黻憲章金石命令緝熙太和宣昭羣姓􅊏鉅之備粲乎其有秩也豐殺之制屹乎其有截也三光重輝百辟拱列歲時易移而浸淫蘖芽弱者綴旒强者鋋戈智者探嚢勇者拔河搏犀象屠蛟鼉飛矢請命旁午係車焱乎浮雲迅乎奔塵炙轂滑稽之士紛然而並陳棄仁恩假鬼神混君臣各馳騁而懐新數千百年人亡而說具勞乎離婁不足以一視也薾乎王良不足以一御也其最大可病者恬泊守真可以養身不可以治民絶性棄命黔首螙病孟軻氏有作吾見其髠鉗而舌咋也言未既郢大夫曰天藏山中瑾瑜匿瑕問以辨之厥徳日華儒者詬病卒不能以勝何道最髙子盍陳之毋激毋勦越公孫曰古昔顓童受業閭塾書數首通訓故是屬聲歌象舞目接身服相親有恒日用不瀆後帝不相襲縁祀興文八音􅋁􅋁五禮紜紜鑑鏘莫明而聚訟若焚鄭說乖誤後圖踵循象制益湮周官别出議者欲一繁紊綜錯操網而入林適越而轅北也類禮孔勤五厄莫存後有倣補去取未就􅌰乗虬驂雲字以文合聲以音比旁行敷落侏離狄鞮文軌同風不能以一致孔壁莫推二經蕃蕪聱牙為今簡儷為古謂道統是傳曷敢有語詩基文王而周召先興首章異同衆說沸騰風雅變言美者為訾直者為詆魯頌紀異秦誓告終何後學瞢瞢迄莫之通麟麟魯經議口法吏謂齊晉無褒而日月具刺紛若蠭蝟眇若糠粃不虗其心不明厥視遺珠抱疑探篋積毁然此特人文之經緯政治之用體也三聖述作包河緫洛二儀生于心萬化制乎神迎之而莫親拒之而彌存疑者遁者愕者困者湛兮消兮委兮昭兮沉思遺物形離超兮激迴飈兮閴而寥兮縱雲翺兮憺兮儒先從我招兮郢大夫曰始吾見公孫疲􅒵若不足突梯若避辱靡精槁神何齗齗然也今知子矣永譽處矣吾與翰林先生徜徉此土小年大年猶以為朝暮也桷不佞遺諜守儒號東南故家志學之歳先子命繕治書錄觀史志略錄部第時見舛雜稍長得博考先賢藏書總目矻矻三十年合傳短長迺成一家承㫖程公作藏書山房于麻源三谷命桷賦之遂作七觀極道源委延祐三年歳在丙辰七月癸丑㑹稽袁桷誌嶽麓圖辭嶽司南兮齊紫㝠懋陽徳兮炳靈二老兮素綦握鴻濛兮矢詞百泉兮一谷釃為川兮為瀆玉霏霏兮日光湛淵默兮含章至言兮在圖同八方兮遂初重華逝兮不返晝猿啼兮虎當坂望䑓兮蘼蕪蹇一士兮拮据百楹兮承宇􅆽山瓢兮以為醑松風冷兮琅琅儼振佩兮髙岡朱羲出兮揚靈積隂伏兮大明百泉飲兮在齒懔交流兮不可以止嗣徳兮孔艱清徴激兮回瀾悠然閣辭鄱之西兮峰圍圍虎豹屹兮雄姿綬蜿蜒兮紫屬旌駊騀兮虹垂之人兮槃阿畏羲娥兮髙駝築榮觀兮通明手參差兮以娯棟隆兮示背榮翼兮聳喙鑑匯雪兮鄱之區捄有七兮日􅆽採鞠兮黄裳緝萸兮紫囊芳冥冥兮夕暉憺獨睇兮擬所思雲飛英兮山之阜為予留兮不遐以處秉貞兮神專觴彌劇兮益完山中之樂不可以乆遲予返兮悠然楊堅州治孟津金堤成作金堤辭波湯湯齧我堤民昏墊晝負擕地不寜緣木棲楊侯之來承帝則順事陰氣神以懌赤蛇蜿蜒吸桂漿百谷受令故瀆常彼隰柔桑猗澤維秔侯言神綏曷敢功民言侯績天心通百妖伏精金石宣明三旬有役金堤是復石田山房辭大梁馬伯庸寓居光州作石田山房為作辭曰淮歛波兮練繒峰植秀兮翠旌翦黄榛兮布耕石戔戔兮稜稜思夫人兮造攻雲電合兮追鋒遺鏃兮齧足壤逸休兮果腹神符一兮告祺藹惠則兮貽思靈之來兮歳祠不鄙夷兮以嬉疏房兮笋席溫風至兮靚密儼竹素兮横陳曰靜脩兮手澤世芬兮日起百稔兮無斁石田兮有秋累胼胝兮吾奚以愁謹樹藝以自朂兮植先徳兮無媮雝本兮頴豐導泉兮澮通夫豈不知有善歲兮吾曷敢燕遨以幸逢望八公兮巖巖王孫悄兮莫還積荒幻以自迷兮捨息土而弗芟衆芳婉其披離兮秋霜慘不能以實謝紫芝之療飢兮治精鑿以煉質亂曰苗詵詵兮善吾耘兮日出作兮永裕樂兮學猶殖兮吾將以為則兮雪江圖辭雲𤣥積兮素摩挽羲車兮馮河蘆戢戢兮倒戈岡伏匿兮鸛鵝昭朗兮夕徹羣動寂兮影滅超逍遥兮一舸食糓精兮腹羸地險兮曷憑馬飲波兮夜騰委素練兮宇清舉皓首兮吾奚以屏營垂綸亭辭為宋誠父作漢滔滔兮日傾東滄浪兮泠泠蹇一士兮沉冥垂芒鍼兮不屑以罾明玕兮貝宫朱蔚兮青葱魚戢鱗以為衛兮龍騰章以屏氣謝娟嬛之嘗巧兮口垂沫以縱恣吾寜養之以歳年兮寳祕鬱而不宣豈直鈎以違衆兮守釣道之自然時至而迅舉兮匪荒幻之詭誘保貞志以遂初兮考銘言于耆叟世俗眇其莫同兮永訖依夫前聖之所究巨峰辭為呉成季作千嶂兮嶔崟特峰挺兮絶垠泉交流兮織文粲霄臺兮鱗鱗檜節兮松纛接路兮以遨儼至人兮清寥休徳新兮日昭神曾舉兮重𤣥大帝儼兮授簡以宣曰渾沌其無迹兮孰為之傳氣積兮九乾五緯從兮右旋逆知來兮順以徃握靈機兮測天狀葆正命兮滅企妄受帝語兮還神京山之下兮雲亭亭澹獨樂兮復丁則㤗始兮道甫成雲中辭氣芒忽兮孰窮其升淵迴旋兮挾以騰圓為輪兮直者繩握歛散兮莫名山之椒兮日暾彼獨黯兮上屯從豐隆兮駿奔需不進兮惛惛下土兮垢氛靈夷猶兮曷存炯余視兮屏息桂酒􅆽兮瑶席法𤣥化兮以康食神功脗兮奚以跡衆甫集兮粹精憺將逝兮廓清春雨辭𤣥陰固兮内凝渰薈蔚兮溟沐興注兮建瓴疾兮灑兵下土兮沃焦謇徜徉兮紫霄來弗以趾兮去莫可招澹幽士兮空山息視聴兮玉顔帝青廓兮􅄜沉虗牝汨兮潺湲謂彼有聲兮耳益以瞶疑不釋兮詢于大塊義婦辭東平孫珪妻盧氏彼棖煌煌兮過者式之黯予心之初兮孰或測之紡兮于房伊雛孔傷饋兮于堂我姑永望余不聊生兮矢神告之歳月遷流兮卒迺復之鸞鏘兮飛鵠松柏茂兮朝露沐石可泐兮志莫虧儼舜英兮介壽祺哀蘭操盱江呉允文咸淳末與家君同佐江東幕府允文慷慨喜論功業倚青溪檻張髯頓足籌邊事歴歴在口傲視府公每一至賓次席甫坐即去督府舟抵龍灣金陵郡文武郊迎謁入皆謝不納獨允文立江亭掩袂大慟必求見始退未幾以王宫教授名方是時江淮幕府僚佐言性命道徳者悉詭號為知兵得入朝言事而允文疇昔素論兵尤竒偉可聴故得驟遷為起居郎復直舎人院流離南方寓䖍州時文丞相總兵兵侵弱允文復以平時論兵丞相獨傾下之兵日迫丞相酒酣與允文論生死允文未及答丞相呼軍校斬之噫允文要為竒男子其未答也抑將有所為也桷九歲時嘗拜允文於家君坐上想其風采凜凜猶有生氣今覩所作墨蘭不自知其悲之無從也作哀蘭操以矢之暇日當弄絃繹聲以配易水之悲壯幽蘭兮秋風炯命兮不逢剡剡兮素蕤零露裛兮莫持望崇岡兮不得返悵江南兮愈逺叢棘兮戔戔欲駕兮無轅孑中野兮屏營芳隕失兮玉零謂我為非兮吾何辭已兮已兮其將何之幽蘭兮勿悲生失據兮死有期思夫君兮意極從逆化兮何隳蘭竹操為子昂作柔者不卑剛者不凌貿貿雪霜心兮以寜且清噫招過學恭吾曷敢以從彼髙者砠彼俯者磧各全以生不媚奚慝尋不可以枉寸能有所長亦獨何心兹奚以傷戔戔兮叢棘髙者下兮曲者直揚靈兮靡慆介石兮誰瀆功成者去兮孰尸其榮辱為佩兮弗忍以刈為杖兮弗忍以戕杖弗以扶危佩弗以服香其咎曷當履維徳基其無缺以自隳噫黄可玉哀辭孔子叙逸民所尚不同愛其近道吁是有感於世也耶又曰不得中行必也狂狷乎狷者有所不取矣剛絜養正矯矯然離垢立竒語益不合行日以􅄶若是者誠不取矣苟為之不能知知之而自警者得一人焉曰南康黄先生可玉可玉名石翁世儒家居廬山下少多疾父歌强使為道士讀聖人書能知其心謂道與言不可以有行也必藏智頽放以自養約結制行非介以為異也其著書極於憂患者困之通也嘗曰曼容姱節支離不能也平丗易足吾何為乎是空巖隠穴廓然契領至則曰游聲養名非士之實跂而望之去聖逾逺故其所為詩文靜而不馳溢於哀忿則可玉自號之曰狷叟者其果知矣可玉所居室多唐宋雜蹟間疾作閉户反復在手疾止危坐若思客至馳辨榮辱可玉閉目不復答而人始咎之嘗與余言吾鄉善醫曰劉開能已竒疾里人病噎嘔藥不愈劉徃視之云廬山某日雲氣開君憑軒眺引之當愈後卒如其言余少固多疾今疾益劇不知用劉治法可已否相視大笑余來京師報書言茅山陶公黄庭出可急購購成當同議中黄畢法未幾竟以疾死嗚呼可玉年幾六十死矣可哀也已學老子道志於壽余不志爾謂其世無侣而哀者亦介之的也伯玉砥礪志節歳乆益湮讀其自為銘知可哀也已故為作哀辭辭曰朱光絜精受昭質兮熅熅靈根曷幽鬱兮鉤深索竒儼古聖兮徳充以尊履制行兮卹彼拱璧奠皇圖兮劌以為隅衆引誣兮呴俞突梯道之非兮挾輈以行慎樞機兮層冰在蹊踐其絜兮幽蘭允芳誠不敢裂兮清𤣥返真氣始升兮謝彼莞濁超變騰兮空山闃虗蕙蒸殽兮渰焉白雲從我招兮林彦栗哀辭道家言黜聰明去健羡形神始完是果為得道耶古者上夀百二十歳竊不死之說者則曰脩之益真其道彌親壽而無徳與名君子恥之故脩短有命遺壽焉猶可言也名徳不至其澌盡腐滅又安所取哉古之人若是者衆矣永嘉林寛字彦栗形癯而器溫其於學也汲汲然逐日以補有不足焉則力探簡􅁽以自證其為文必達於理而始精於詞謂詞者載理之具也理不足焉詞雖精無益也深思以求之旁取傳記之說𠞰絶傅㑹據宗統原以㑹于一復懼其未盡是也則祕重自念將周游四方闕疑廣聞目擊而心領焉噫若可謂勤也矣道散於九流百家彌給者至矣其弊有不勝言者汎濫俚雜尸坐瞠目漸入於無聞之傳余嘗察彦栗知其心有深憂者焉余始見於姑蘇氣和以謙再見於京師愀然以思取士之道非一嚴畛域析毫髪有司者之過遺逸不舉則凡吾徒在官者誠有罪矣彦栗志不在是推彦栗之志在問學為之而不克就若是者是真有命矣悲夫延祐六年三月卒于京師年闕十有闕其弟宇友謹哭曰吾必奉䘮歸姑蘇姑蘇吾先人所藏遂為之辭以申其哀焉辭曰氣清明兮受元陽徳弸中兮闇以章絜太古兮儼九皇播絜精兮瓊圃芳力未具兮志則専一葦渺兮濟巨川慨不進兮道逺邅白晝速兮陰風旋數實紀兮吾何愆路孔脩兮神獨還靈旐翻兮木葉丹儼夫人兮在空山玉蓉冠兮紫佩蘭𤣥教大宗師返真朝元歌九章以前導雲飄飄丹臺何岧嶤中有授經之老顔不彫三光盪摩四時代謝神來歸靈承帝罔敢替謁珠庭寥陽空洞六聖儼思九垓熙春羣黎受禧昔騰章閶闔通金書儼在水旱功朝重華五嶽奠形飛車揚鈴翔鸞騰晃金精下視垢濁何沉冥昔者之來運有遭今者之徃清且邀神虞娭匪衢以乗匪車以征葢葺兮摩旌洞簫激兮泠泠磅礴一氣兮冥冥精思道樞兮跪頫聆𤣥雲駝玉几差差文織成龍章鳳翥相緯經大言鴻濛小言毫銖道在瓦礫匪别區念昔人世我非娯啟圖籥煌煌文成厥𦙍嗣昌靈之紹合永貞陟降四紀心兢兢視彼成虧凜春冰髙朗脫屣辭世榮靈胄光簡兮無言默兮若存生以不生為根死以不死為門絶學丕傳黜其知聞五千之言世永傳握重𤣥熙洽休明紫蕤朱英侍帝左右夀考寜啓祐𤣥緒何繩繩嗣昭代歲無害佩鏘鳴兮衣綷縩昌期運髙維松層岧岧歛玉顔養金膏鍊形以昇朝帝青周流萬變鎮神京佳城髙清容居士集卷二欽定四庫全書清容居士集卷三元袁桷撰古詩四言再從姪瑛幼孤學道龍虎山自傷不能鞠擕述祖徳以勉之煌煌𤣥胄家越徙鄞隠道閟躬三世養真是生祥符觀光績文占籍浚儀佐邑孔勤粤有光祿亦奉于越聿魁開封老守于括少保恂恂卑退靜閲太保靈承逃難乗筏大耋韜明閭里胥洽篤生衛公喬柯茂豐敦讓貽則攝獄自公絶􅕃秉仁千人著功冥報氤氳維垣錫崇於赫少傅受學族祖諱覺有書解行於世正獻亦師之習繹典謨正獻同宇正獻首科少傅踵舉正獻淳熙辛丑登第少傅次舉于鄉衞公夜夢神告曰汝子宜遲上南省甲辰闔郡被黜淳熙丁未中丙科三歳學于正獻公復師以研繄我族父昭穆㑹稽非宗疇譜同源迢迢宴堂是叙少傅挽正獻詩曰宴堂聨族子講說後諸生相臣嫉忠同黨同錮韓􅇑胄擅權正獻以大學士罷入偽學少傅以論蘇師旦亦廢正學勃興象山武夷相繼登朝奉常羽儀維我少傅抱其魁竒曰經武有本日用不疲絶幣罷書感勵孜孜迺登東觀迺佐宰司歲為閹茂正肅冠廷嘉定甲戌正肅進士第一正獻祕監兼祭酒當是時越公為秘丞兼樞宻院檢詳越公登第已二十八年正獻休休少傅繩繩載史纂謨致事以行少傅作程均嬴紀經翼翼京邑十載敉寜憬彼介狄迴戈指淮鐵駟豗喧為厲之階公在宥密展誠弼諧悉卒宵征拉其妖霾緫戎輔京秉纛受齊李全叛以同知樞宻院浙西制置使姦沉于淵公歸在里徵彼夀俊縣車告止于時徴公及東陽葛公參政宣公皆不至三公年皆近八十矣三啓公府永楚賜履復荒于齊終越以祀冡子廬陵克謹其承曰惟瑞安儉不近名生我俊兄志學蜚英上試銓曹計偕薦膺余年尚孩企焉戰兢女紀既蒙訖籙更符匪曰愚智阨窮同塗火焚髙閎戚戚告瘏不敏其芸莫植其居泯奄長夜䀌然永徂念子之稚孔薿孔朗不寜以餬俾游泬荒我雖異途與汝同情無為夸淫無溺燕朋壹爾氣神履冰奉盈我宗匪微徳芬匪沬來者之榮逝者之戒沾沾懐新不究其敗鑒彼太素曷其有壞述我祖徳送爾言邁匪窮咏歌申以用誡張孝子汴張元綱之父為南陽屯丞母卒焉葬於府之南灘元綱痛不得復于里銜悲茹辛縮板負土崇為堂形尺以二十周廣之度十有二尋屹然而嵬望然而臺甃以陶甓堅靚慎密構亭于中以庥其神屏傭役躬畚築謂鞠育之義由已而始盡於是朞年迺成河南田君秀摭事徴實謂桷俾有述詩曰粤若古先巢穴奠居奫奫其仁詵詵其愚返真𤣥丘精麋魄枯如蛻斯登如鷇斯哺後王後民百幻具師顧瞻本初寜不爾思虆梩蓬顆惕焉表微歲月既遷孰封以機窮慆恣華輟泣而夸力殫於民禮廢於家千夫丁丁逞巧莫譁風淫雨饕卒為泥沙嗟嗟小子内省是嗣維張孝子無貨財是恃無奔走是㑭宰如嵮如惟手拮据夕號其陰朝升其􅇕我心匪墜我力匪痡焦肺愒肝翳翳慈顔曰天有命兹土是䖍宛彼飛烏亦集于原隠而萃之有阜孔堅魂庥于所不畏不侮汴水湯湯其流匪沮孤征云邁入此室處申以顯之以詔爾永慕徐母表閭大名徐夫人以節名于夫宗晚居錢塘有詔表閭江南於是其子大夫公執憲東浙食豐享榮侈且至矣廣彤管之懿傳青簡之信舂容整嚴熱筆林立四明袁桷廣為頌詩以備遒人之採詩曰婦道貴桑厥義彌剛柔以内施剛以外防􅂱􅂱秀芝空林自持永辭春榮三秀何虧維魏徐母玉雪其躬端操靜閑凜焉髙風念昔惸惸黄鵠孔悲婉彼孤雛不能奮飛春條其桑秋勤其穡聿懐深憂世徳靡忒漢􅊔張芝歛却駙馬黄髪稜稜髙秀里社蜀女周度斷髪表心矢言堅石厲躬鍛金沛有桓女少名其宗援刀割耳之死莫從繄此三粲代表其閭垂裕莫聞靖言長吁桓桓大夫退食自公擊鮮具甘是宴是崇朂哉大夫教忠于朝養和服寛慈令孔昭四海晏清士節莫著歸為閫範陰教是助雙闕峩峩天澤所表維夫人節維大夫孝我庸孔勤亦莫我敢效歌此擇辭永言申之過者必容四方其訓之致樂堂為鄱陽周南翁作有嚴周門寢宇孔齊溫其碩容西南有閨爰琢甓楹爾養爾承慎而絜清以燠以明維大夫母柔恭俾壽嗟余季來教言孔懋木之彬彬視其同根有渰者雲孰隮而升伯也于房仲氏中唐先子之淑翕焉以光我堂如跂我懷靡止載車以行不竦不倚周京斯弁旨甘有衍匪旨甘則怡樂且靡違彼堂在阿樹松峩峩黄髪皤皤童舞婆娑于以樂康于焉作歌臺氏舞衣堂彼崇者堂白雲中央蒼蒼維松舒泉湯湯有羜孔碩有醪孔芳差池東西率祖以行令徳允脩不震不侮孫曰吾祖祖曰吾父服其斑斕式歌且舞飲以大瓢爰擊其缶維咏維猶垂手以招有髧者髦彼雛夭夭永祈黄耉福祿宣昭左右承翼見其二毛厥居安矣亦既完矣樂時永清俾廡俾蕃肄其幼儀雝雝桓桓宜爾雜服終焉考槃古詩五言舟中雜詠十首好花避車塵飛入黄河洗河流政茫茫一去不得底納汙有至道胡為愛清泚念兹物理深𤣥籥從此啓飛鴈翔南雲避說端有得舊年春風歸雪花大如席陰陽眇難窺造物司其職慎勿事炎凉來徃任行役道逢射生船有鶴馴且臞青絲閉其目病翼寒蕭踈臯禽九天來此豈真吾徒獨言羽毛佀盤桓為長吁家奴拾枯草走兎來相親生來不識兎却立驚其神行人笑彼拙歸來始嚬呻乃知特幸脫未信吾奴仁白葦生寒沙殘花摇敝帚燕都百萬家借爾作薪槱物微生最下功用迺堪取大勝桃李花矜矜鬭妍醜清夜視北斗正色摇我前迺知中州殊譊譊浪談天召公化南國美教來自燕乾坤儻一致地氣何由偏紙鳶帖晴空飛輪走盤線東風恣昂藏得意隨手轉攀雲政相喜墮地忽復怨兒童豈知此得失終戀戀惡馬少駕車駑馬多駕船駕船勿戚戚駕車何翩翩渠命有通塞誰能别媸妍君看鹽車下淚隕如奔泉春菘種北土三年變蔓菁一為居養移自覺顔無情南山植松苗深根定生苓千年化㙠魄豈比春菘榮鸕鷀漾晴空意態極楚楚翻風蒼雪迴轉日爛銀舞盤旋傲飛鴻清逺敵凡羽須臾下魚陂愧我覺疾去車行二十八韻乗車古云貴此意昔空羡河流露枯沙桑本接晴甸大車蓬蓬前小車轔轔殿髙緣縮先登却立駭所見隆如龜戴殻縳如蠶裹繭効駕何昂昂帖耳復戀戀髙岡互回伏逺樹時隠見禪趺恣掀簸尸寢作瞑眩初疑肝膽傾漸覺手足顫兩耳傳鳴雷雙眸瞥飛電縈迴蟻旋磨局促蟲負版氣奔驚七還心嘔復三咽地軸從此翻日輪肯同轉軒輷怒交撞戚速急欲戰馬悲望雲嘶牛走見月喘惡箠恣調伏詈語極鄙賤中宵不知勞亭午輒告倦揩摩髀消肉舎弃足成趼薾慙朝飱薄重勝春酲湎土霧散游絲沙塵起飛麪咫尺方欲離頃刻已莫辨素衣緇漸化𤣥髪白新變人言道途苦我意舟檝便雍容漸追昔麗縟時想緬輭輪貴尊賢下足表置傳曳柴清時羞髙葢羣牧選况兹軌轍同及此寰宇徧詩成記勞勷旅次時慰唁餞王叅議以風帆目力短江空嵗年晚為韻澄觀學求道八景雲青紅上畏羲娥流鞭霆跨追風相知不在貎相見誰為容持此金石心坐閱寒暑中昂昂萬斛舟浩蕩揚雲縿好風助其端瞬息千里帆層波激飛雪正色令愈嚴坳堂覆桮水止足拘庸凡昔年九方臯相馬不以目想其遺𤣥黄神氣洞馬腹東方有一士被髪羮不肉居然使之來不復困邊幅浮榮一羽輕至道萬鈞力達人固靈根清靜執寜極凄凉江海念别至勿戚戚空餘好賢心一矢貫千的魯聖勤經綸坐席常不暖事來非其意稅冕或恨晚每懐千嵗憂百嵗常苦短叩牛有真理短褐歌石爛機心起風雨平陸能成江苟非養其恬事至誰能降此心皦明月爽氣通八窻長空掃林莽寒飇助舂撞鉶羮有至味易牙敢加豐醯鹽强調適衆口終難同澹泊本真性清淳豈纖容一朝饗帝所祥雲藹晴空文章工世媚此道非真詣有如東家施捧心學夭麗公文雲雷尊落筆即千歳棐几生晴漪三沐古錦藉平居挽士意寳鏡懸秋天清影閱今古寒光萃蚩妍凄凉塵土姿朗鑒勞評銓相親耿無語相期欲忘年雛鳳棲桐枝清音起冲逺英英異羣羽秀色日以婉詩書有真託我輩同一莞深根在永閟衝霄未云晚次韻虞伯生夜坐炎晶爍草露木末望西顥靜躁誰為尸翕忽紛寸抱志士法天運炳燭不在老羣經固其郛積神以為寳陋彼多言生希名太𤣥草山林詎心違歳月付幽討擾擾徒為名努力在此道地氣環中州槖籥均宇内中宵炎溽頻露坐猶憒憒逺窮太古雪欲徃終有徠馳神極寥廓我筆不可載栖形竹素園萬化等歴塊相期江湖深慎勿寒暑礙秋風起天末紉蘭結幽佩次韻伯生弱冠事墳典里曲譏凉凉螢爝不勝火矧敢扶朝光驅車出門交一粲逢清揚罍尊實𤣥酒至饗不在觴慎勿飲世人徒令攪空腸紛綸五經學逺祖遺仲翔知賢恨己晚相見復慨慷至道縣日月無言炳陽秋辟世端有方低昂少淹留汲古理脩綆寒泉漾清流永懐魯兩生議禮終秉周我言失造次燥吻譚郊丘此悔行已止歸田賦宜休空餘六籍意歳晚期冥搜再次韻伯生兼簡仲章二首重柳積清潤曉日疑蒼凉萬化同一氣斯須變朱光夙志尚幽隠清夢時悠揚愧非酒中聖客至同覆觴委心理縑簡念至迴中腸時節忽已迅秋雲鴈南翔相期慎素業載歌慨以慷俗士同酷暑可人似清秋邂逅得二子傾心為渠留相望塵隕霧相親汗交流積雨暗京國苔痕生道周神交徑心醉何必登糟丘著書君已定彈冠我當休唯餘舊詩律支頤費雕搜徳生詩律清逺少與之比嗟歎不足復次韻二首皎皎明月裾美製異厖凉薄游起嘉譽妙選歸明光濡毫百王度麗思方抽揚澡身佩璜琚慎徳銘豆觴蕭艾不並處三嗅懐剛腸永愧斥鷃姿側身厠鵬翔終然願胥附竭誠以慨慷𤣥鶴警清露逺思凌髙秋長松有佳蔭嚘然為之留譬彼明月光那能染黄流洋洋日以徃天風迴不周畏此颯爽凉行當返浮丘同憂有竒士詩來賦歸休遺經倘可理墜緒期旁搜鞭馬圖為狄誠父作生駒萬里意所向知無前圉人忌其徳未試先加鞭要令俛首馴使我常相憐伯樂死已乆此道不復傳駕車困泥塗伏櫪老歳年所用非所養誰能别蚩妍畫師逐時美謂爾誠當然披圖重嘆嗟我意何由宣張希孟嘉慶圖其祖伯祖皆年過九十舜泉清且甘歴山秀而朗淳風邈泠泠舊俗遺穰穰怡愉二老歡敦厖百歳長銀光浮勝頰素髪垂過項階庭尊孝謹閭里化廉讓春風連理枝晴日九節杖犢車共東西漁舫同下上蠶麻課餘閒豚韭随薄養薇山悲首陽菊潭陋胡廣愧彼非禮羅居然嬰世網孫枝孕天葩祖風躡遺響含飴記疇昔興門慰期奬冥鴻天機韜喬松白雲徃緬焉清風佳庶作髙山仰游長春宫分韻得萊字珠宫敞殊界積構中天臺神清歴倒景青紅隠蓬萊羣山助其雄衮衮從西來八荒音禹甸為此增崔嵬舊邑環蟻垤清泉覆流盃雲低落日淨莽蒼同飛埃緬懐古僊伯采芝雪毰毸長春豈酒國殺氣為之迴天風起髙寒玉珮聲徘徊空餘水中輪歴錄環春雷之人去已乆松聲有餘哀次韻徐志友雜詠十首師川樞密五世孫喬木空雪霜孤枿存十一遺聞備家乗零落寜有述文勝理固然相道返初質志士心未降黽勉終昔日刻志非不工畏脩迺其怠勞生悟其機靜默希逺害棄觚强浮湛念至時永慨佳人在空谷不復夸絶代嘉賓秩初筵至饗不在酒傷哉囚飲徒醉目恣可不獨絃不成音短袂莫回肘恃此百尺臺誰復憂蟻朽至道存遺音我琴不堪撫愛此素心人更僕請遽數文章有正律短計工百沮寡言徒自髙憂熏汗如雨盈盈道間花秀色爭餘春舉俗競愛之孤芳愧陳人譬彼鏡中月照影終有塵八荒已同雲客行復踆踆玩易悲三陳微服志已迫胡為守其恬正色養神宅迺知無邪詩經緯貫三百載籍天所扶終古脫五厄古來操􅀈功時至能安絃近復顛倒之擊石求飛煙峩冠儼尸坐委虵養脩年廢此汗簡勞謂可一唯傳談經各户牖正道誰當承朝菌不知朔夏蟲復疑冰髙堂屹崇構相彼甋與瓴師門有遺訓此語非吾能豫章古詩法萬折江海偉層波激竒觀妙用安可幾妥語非不能萎薾乃氣累東湖有真傳廊廟振朱屣天風眇東南碧雲澹凝戀嗜芰同苦心相得不在見黄塵各道里玉雪起清逺它年有飛鴻為我繫書箭再次韻答仲章仲寳十首東南有竒觀萬户粲如一覽古幽思深擬筆追七述芳澤同聚塵清淨葆昭質所憂不可言凝睇悲落日良苗没深蕪穡人志其怠無端揚飛塵螟􅠀賈深害力耕未逢年歲晚空永慨深悲采芝士却穀全季代春雲倚春山摇蕩如春酒相親在顔色念子心獨不薄飯時充腸短袖不掩肘髙樓政清歌盈盈自芳朽驅車學逺游古劔終夜撫長安袂成雲我去何足數相知有竒士不畏道里沮寒風振枯林落葉起清雨西山鬱佳氣萬古留青春夐露巖壑姿邀彼車上人之人有行役莫浣車中塵空餘白玉泉隨車走踆踆長松養華滋陋彼霜霰迫虬枝結層陰下庇十畝宅擾擾區中人生歲寜滿百慎勿以智夸相逢復相厄新月無定姿低昂起初弦南飛有孤鴈驚沙度踈煙一為居養移來徃忘歲年感物非不多音書為誰傳束髪交老蒼道大誰能承澄心養真源寒泉護清冰傷哉注巧勞欲作千金瓴豈無須臾好陶人愧非能淵明仕浮湛投劾志始偉愛此松菊佳餘年悵無幾八表雲鶴還不作身後累陶然且就飲軒冕真敝屣我家古城南喬木起清戀空江納雲影清夢時一見相逢故人深各念居止逺他年東南來贈君以竹箭三次韻酬周儀之虞伯生十首英英雲中君含思歌大一迴鸞舞天葩流粲杳莫述報之不成章玉雪耿素質臨風發長謡庸以永今日昔學空巖居之人怒其怠哀猿雜山狖驚嘯欲我害天隠神所藏别之空悵慨桃源閟深竇亦復知晉代道逢學仙人御氣不飲酒我笑初無言彼已嗔我不哀哉守其愚繫石猶在肘冥化随悲風淪淪骨成朽逺客思故園孤松為誰撫露白天宇清鴻歸暮雲數誓將畢幽計勿為此游沮念子知我深神交泣天雨楚歌惜白日燕歌蕩青春哀樂自逐時流幻區中人我生功名念素領無􅊏塵飛鳶竟跕跕啄雀徒踆踆羲娥挾雙輈冉冉老見迫丹臺潄靈霞瓊蕊生尺宅控摶無須臾詭幻已千百慎此陰陽機逃虗脫真厄竒樹生南薰清坐彈五絃淳風邈永古白雲赴蒼煙世故日以媮俛仰随歳年折腰倘為酒猶足青簡傳破瓴居井眉勺水不得承寒橰轉餘瀝天風助為冰舊質儼有在誰言真破瓴愧彼埏埴功成壊非汝能龔生夭夭年苦節亦良偉輪囷閱書傳此事寜有幾口腹非過謀形骸迺真累所以商山翁終復著漢屣少年恣青春歡至無復戀一為關河行常恐不得見新鴈雲中來飛飛落南逺歸心耿無寐寒更促浮箭題汴梁推官周子明三獄詩卷三章結漢網清淨歌元元後世益以密姦慆日云繁治法如理絲衆棼政多端一絲不得直萬緒何由完虗心納衆口至理藏片言永念死者哀更推生者寃汴州古循吏三獄成平反天道詎幽逺于公有髙門題弋陽巖山精舎圖紅塵落青山飛瀑遽洗之孕此巖中居寒膏漾淪漪白雲偉衣冠修松古鬚眉書聲出虗牝杳杳空中箎桃源有神界天光固幽機一為漁父游妙筆工研窺至今武陵郡山水傳清暉次韻仲章蔡村阻風足弱辭北騎身輕落南航懐别意滉瀁問俗心悠揚豚韭供嵗歉蠶麥扶時康幽事不滿眼薄念時迴腸天風進蕭蕭海日懸凉凉喧豗土囊裂悵羡雲帆翔衆樹失髙下老鶴追微茫而我獨偪仄與子同阻長靜退實守道躁趍迺捐常愛此金石貞詎為道里忙相從果無悔後㑹誰當忘次韻陳畬齋七首明月明年何處看為韻秋月如靜士炳然河漢明白雲護其清迸作飛空瓊此月不受彩却行印中庭白雲忽不見我思徒英英靈魄表空輪随陽産金玦須臾白璧成盈盈懼顛越陰陽環無端變化終未歇獨恨今時人相忘舊時月人言月有桂天風墮微馨開軒睇扶疎西與銀河傾桂本空中塵那能助虧盈朗鑒自終古匪待今夕明舊年客清秋望月如望年長身兀孤影哀鴻起清圓落葉墮我後北斗戴我前勞生果有役念至心懸懸海觀濯銀雪金精融太和照我身上衣光耀何其多感此萬里意逝將飲亡何亡何豈真樂臨風託長歌暝樹迴朝光驚烏不知處羣動俱念安客行有程度熠燿驚宵征熒熒化餘腐豈不畏跋履眠食在謹護殘醒强清坐朔風生樹端客袂何皎皎客扇何團團念此㑹合意永與明月看他年返舊壑願比青松完蔣商卿叙其先人客金陵與先子事契末章復以見屬次韻堂堂金陵州草草石臺路羽書急星馳鋒車却金錯飛雲古戍基積雪寒沙步我舟欲輕行我馬何跼顧乃翁入門初此夕傾葢故寒暄謝浮語信宿陳薄具兹年心尚孩維時歲云暮艱虞脫九死邂逅欣再遇貞姿固青松雅曲廢朱鷺二老古先民百嵗等童孺微疴隔音容鉅痛割心腑孤根擢遺肄淳鷇悲弱羽緬懐青氈舊力守韋編素伊優笑侏儒呫囁陋章句珥貂匪七葉插架同四庫談空齊諧虗守樸燕說固芳林極薈蔚溟海窮混濩迺知山中雲政異巖下趣心聲要成律易象那可註羣賢凛無幾餘子兢自數愛君思如泉愛君美如瓠願為汪汪深勿作翕翕附巨構千礎承珍裘百狐聚混世同餔糟勞生已嘗醋整冠儼初服拂衣謝紛務溝斷寜繪犧户樞詎為螙情深盡傾倒醉劇多謬誤忘機絶矜絜落筆化塵腐水深嘉魚潛雲重樛木怒翩翩林間鶴栖栖井中鮒飄零記疇昔慷慨合和喣辱贈難與酬臨風復成賦集廉園芳菲廉家園換我塵中春古樹不受采白雲為之賓中列萬寳枝夭娜瑶池神背立飲清露耿耿猩紅新幽蜂集佳吹炯鷺摇精銀層臺團松葢其下疑有人奕罷忽仙去飛花點枰茵髙藤水蒼佩再摘誰為紉濯纓及吾足照暎鬚眉真暝色起孤鳥寒光蕩青蘋信美非故居整馬來城闉次韻仲章杜門今日慵出門尸坐觀我生忽有故園思寫之不成聲舎北兩朱櫻翠羽垂流纓舎南青桐樹亭亭如葢傾念此永契濶為爾增拂嬰歸雲跂西山臨風意縱横暮歸馬鳴千柳昏犬吠一星出晴坌暗歸道客子塵滿骨入門視踈燈隠若眼中物展書弗能誦浩氣彌硉兀古來惜陰士志有不黔突愧我非等倫顧影竦毛髮寒風肅羣動勁氣激清樾飢烏念其安驚噪落林月迺知造化理壤壤殊未歇贈黄教授歸閩中壺山束銀筆秀色倚車蓋其人清且明十室九冠帯林鄭陳方劉祥雲布卿靄緬惟乾淳初朝野實交泰執耳為之盟多士森弁㑹澄懐味蘭芷正色炳蓍蔡彌綸古編簡粲錯列文貝百川已東流末派擁溝澮飛霜隕喬木變脫等蟬蛻艱難老文學世徳芬未沬布袍黑嶙峋慘澹萬里外希音繹風雅一鼓瘖萬籟宛彼孤飛鴻鳴聲何噦噦飢來念其安飲啄欣有賴凉風振修衢肅肅返征斾懐賢不成章因之結長嘅送許世茂歸武昌二首其祖慶元大魁先公嘗與同朝岷江下奔流日夜東南趍艱虞六十載蜀客無完居纎脩挂晴練五老為之廬招彼素心人蒼翠垂流珠峨峨銀臺公懐寳耿未攄青桐擢孫枝下此佳鳳雛絢爛五采翼披霞表亨衢清音冥鴻逺逸興蒼鷹俱食竹戀苦志餐風養真腴誓將八極周覽徳為貞符嵗月諒有盡雲端復躊躇躊躇固吾事荏苒悲征途蒼莽鸚鵡洲日落楓葉赤昂昂處士恨􅕃草化為碧之士輕且儇之人何急窄至今千載下投筆弄鋒鏑銀城太古雪轉首一消釋雍容詩書郎浩氣裂金石裵回登臨意寒波静如席相逢各萬里末契論夙昔咿嚘語未盡征鴈起暝色凄凉衣冠聚山海窮畢弋翳翳桑榆光人物眇可識停􅆖望前坡去馬記初驛題金華洞圖二首巍巍靈居秀遥岑擁赬霞聞昔受道時三洞為其家金精裂飛魄躡武凌青華遺彼一寸松樛柯養真芽瞬息服光景神丹起槎牙下有千歳脂百靈靜無譁此豈甚祕之服食世所夸真凡路永隔輕生竟如麻其二五嶽扶神州葛稚川地記言金華能避洚水之患洚水胡為魚兹山鎮無極不竦復不渝静閱浩劫理兩曜跳𤣥珠矯首二皇君寳冠白雲輿方瞳駐真盼獨垢紛何如霏煙聳空翠滴露凝流蘇神鈞合虗牝松聲自笙竽窈兮忽不見諒此寜非居送張上卿燎黄上塜素質超崑崙瓊胎孕崆峒指木為我母問𤣥為我翁承暉企春榮百嵗如捕風朝暾何朗耀莫景何葱蘢返真紫虗臺合歡朱陵宫迴鸞從舞鳳景命來圓穹妙感非世窺揚靈憺無蹤湛兮合冥㑹道一為之宗沉沉白雲闕雙鶴鳴青松念此不得見惙焉遲相從壽何平章二首方壺屹祥觀髧彼綠髪仙執簡朝帝居髙演清浄言雲為八表雨水作四瀆泉炳文一以施握之不盈拳頫首陳至詞囊括希其全成虧匪至理願言葆真𤣥琅琅黄石書功成迺言去豈不思濟時默焉念其素山中赤松柯云是童所樹長養媚以深屈曲美無度神光滿澗谷希夷澹無慮願持一觴言眉夀在謹護次韻雜詩五首有客一馬歸屋角羣星明念此惜日苦羲輪何西傾粲粲風中花弱豔夸芳榮而我獨枯槁欲學身後名少年觀滄海天濤碧因依下有珊瑚株紅光射雲暉玩之不忍舎歘吸雙龍飛逺為塵中游坐覺顔色違哀哉西山士飢食周原薇昔狂愛竒士接席多大言中道邂逅之捐生誓俱存傾家謝其意酒至絶不論此士今已矣長年常閉門幽居集竒觀積雪明寢扉湛湛新陽舒寒光騁熹微咿嚘南歸鴈長鳴示其機出處諒有素觴來為之揮朝游東門曲壊道荆棘存纍纍者誰冡舉觴酹其魂死無落魄名生有呫喋言所以荷篠翁臨流潄潺湲遺簪隠世徳忍垢躬灌園豈忘輕肥念苟得誠少恩采采松上花飢來助吾餐壽程内翰二首蕩蕩長夀居丹梯峻蒼旻中有龜鶴所老仙為之馴維時夏初至園林綠蓁蓁萬神峩冠環參差楊七均行雲鎮清樾靈波激層津振衣游帝青下土何其塵運與千歳期正色光景新無為理清浄世儒汨其真君子法簡易坐致羲皇淳車蓋交道周嘉醑盎在房有客東南來髙歌奉清觴一歌白日還再歌青春揚師曠世固有八音盪翺翔迴鳳下竒雲猗桐非故岡覽之不食實三嗅遺孤芳皎皎金石姿令徳豫且康窮河覩崑山出日賓扶桑介此黄髪期因之結成章别仲章飄飄貢公綦逺乃至關河關河冰為天積雪流銀沙前有林間烏後有馬上笳烏啼思我親笳鳴思我家川流去不息羣山赴嵯峨余行已東南朝曛散微霞念兹日不見持觴釂餘嗟别吳養浩十首以願為江海深勿作盆盎淺為韻弧矢懸髙門卓犖四海願登車逶且遲永念道里逺雞鳴當宵行執轡上長坂西北何其髙飛雲列竒觀游神竹素園古聖儼若思至道篤靜極執簡欲受之上有竒耦文摩盪光離離持以禦魑魅魑魅不敢為維東匯為湖浩溔通三江懷哉紫芝叟月明潄飛淙小言諒以清大言淳且厖去去日未逺奔流鼓舂撞昔聞方壺居誓欲徃滄海操舟迅前邁雲雨白皚皚層瀾眇空洞肉翅不可待朝陽潄靈霞一食毛髪改古有無媒女閉門泣春深手擲雲錦梭流光耀晴陰千葩翠交結宛轉不可尋浮雲為之佇幽凰為之吟昌歜懐古辛在徳不在物屈曲寒澗底詎以險自屈有客同嗜之至享寜勿勿芳年匪淹留薄采消永鬱雲和髙岡桐龍腹裂冰雹攫之淳且深謖謖震寥廓彈者不復語徃者誰可作𤣥雲浮陰來開户失雙鶴緱山仙人居上有玉女盆解髪三沐之清冰盪寒紋神膏釋翠縷跪坐晞朝暾蟬蛻有變化蟪蛄安足論客來南榮下欣言酌醍盎觴舉壺已空盤辟復三讓享之不成章何以為客貺客言君當休商聲助予悵草茂木萋萋水勁石翦翦相思關梁深相對顔色淺停雲眇為愁殽蒸可崇饌食之寜永飢臨分復三咽度淮寄養浩竹清寒房靜殘月在西壁悄悄燈影微尸坐棄枕席井華飲蟾蜍𤣥雲成五色明知非世謀精詣在六籍我行長淮浪凍樹挾春碧夢子白紵寛雙眸炯空激書來婁在手此意何的的數面不成歡逺别迺復惻歸鴈臨風翔先之寄深臆懐伯生春雨消路塵春風散林纈蕩蕩長安門客子千萬轍城陰有一士淡食羮不啜采彼松上露煮石化晴雪沈冥護真性觴至那復說向來舌本談今作耳根熱維南有樛枝巖溜滋百結在徳良自防居屯詎為折念此長夜深寒光吐殘月酬蕭靜安提舉二首溜泉散餘塵稍稍軒檻清孤凰起天末縹緲參差鳴佳音寂萬籟異采含蜚英衆葉豈不光終然哆春榮翩翩者何雛和之欲成聲迺知雲間意非復區中情有客何方來贈以雙南金維時夏初溽寒光激𤣥陰至靜閱真賞獨晤諧希音伊江渺風濤伊林復﨑嶔出處各未得冥思結長吟於粲不能報泠泠手中琴題劉充之載月圖磊落太古月摇蕩湘君波寒晶爍膏露倒景流銀渦湛湛洲渚浄天風泛飛槎晃蕩神界中四客歗且歌憑虗歴空洞金粟摇靈柯流光閟星斗怪影窺蛟鼉服食詎在酒三咽顔為酡俯仰㑹合初逝者已山阿昂昂菊間叟秉芳獨婆姿微茫信可傳披圖重吟哦壽賈叅議二首粲粲雪中松八表迴鸞翔下有采蓍叟澄觀振髙岡握蓍玩鴻濛竹簡儼在旁湛焉貫纍珠炳變猶龍章笑指青松言貞固以自防絪縕迺𤣥化清雲表竒光嘉平維吉辰初陽起天心彩鳳龡參差落落空洞