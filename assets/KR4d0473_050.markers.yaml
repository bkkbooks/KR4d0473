  - {type: variant, offset: 9, length: 0, content: '', WYG: 日因憶此詩作俳諧體奉寄平生愛詩復愛酒晚嵗畏名兼畏茶年過五十不歸去底用中年始憶家四明衣冠山水窟人道風流勝永嘉爾來愁絶各閉戸方信中年始憶家我眠船中五十日飯有飛塵鬢有沙古言墨頭須萬里底用中年始憶家春風一架爛金沙憶昨同醉遺烏紗山東禁酒不得飲方信中年始憶家題鄭潜昭玉堂藁雲漢天孫古錦機秋風槎上解相期迴鸞舞鳳曽翻得不用人間五綵絲春睡牽人渴思濃小窗誰贈宻雲龍自憐舌本那知許急寫緘題佀舊封宫娥奕棋圖争先春色在眉端圍坐佳人著意看可是相憐饒不得東風自怯五更寒求酒為愛雲房酒盎清涓涓殘溜滴春聲夜來梅月十分白嗅盡梅花看月明輕輕梅花春風面却佀道人微醉時只恐花飛失君意更酌叵羅歌小詞小詞歌徹飲叵羅一寸清霏奈客何窗外馬蹄猶不住誰道江南春水多我家舊醸碧琉璃色壓花枝朶朶低頗怪春深未歸去花下杜鵑應亂啼伯生約賦竹枝詞因再用韻君家竹葉江水清我家竹枝三峽聲三峽水隨江上去迴首望鄉終眼明簇簇青帘蕩子期飄飄紅杏三月時青帘紅杏總輕薄自展碧牋書我詞暮雲纎纎如越羅勸子不去知子何桃花水深放船了却憶闗山塵土多愛君酒滑滑如泥白眠义手頭愈低南鄰琵琶不堪聴自舞柘枝驚春啼舟中得功逺瓊花露戯成三絶瓊花瑞露十分清客裏相看眼倍明自是江南春色好錯教騎馬到京城平生嗜酒不殢飲最憶停盃微醉時花下盈盈佀相待莫教春倒最濃枝繁􅀈觀裏花如雪留取清隂待我來應有真真花底坐生香一曲舞三臺梁山濼梁山水濼八百里容得碧鷗千萬羣愧我扁舟數歸路晚風掠陣入蒼雲嫩草豐茸間軟浦一川晴緑映春蕪平岡散牧分雲錦簇簇斜陽是畫圖大船曬網小船罾知是吳儂喚得譍共説五湖難住却朔風吹雨捲千塍仲章以余賦瓊花露因成陽臺之句次韻月下看花花氣清羨君不飲更分明五雲破曉迴歸馬疑上天邉碧玉城我愛瓊花賦酒詩雪香憔悴可憐時平山芍藥開如斗擬揀肥紅作贈枝相如肺渴非闗酒多病却迴江上來可是春風消不得白頭吟憶舊琴臺送危功逺翩翩海燕近宫城的的天鵝度上京癡坐江南未歸客夜聴春樹滚潮聲居庸闗外雪糢糊簇騎分明是畫圖猶有深春後歸雁見君曽宿洞庭湖天柱峰前第一詞風清月冷鶴先知京城可是無吟思眼看飛花下筆遲送吳成季五絶牆東杏樹花千片片片隨風到馬頭只恐花飛不解走度闗時節暮雲羞北雪初消未見山䭾鈴聲雜佩珊珊㢘家池館春風好獨看牡丹惟我閒上京新酒玉津津薄醉深春惱殺人截取當年釣竿竹捲筒相寄不嫌頻詩瓢淅瀝風前樹雪在深村月在梅從此不須生感慨晚寒更上望鄉臺鼇峰路與僊峰近取次詩筒日往來慙愧阿戎松下坐洞門深鎖碧桃開長沙鄧醫年七十餘遊京師二兒扶小車得酒即醉類有道者劉充之號曰夀軒且令賦詩大兒椎髻小兒了拍手青天在小車剛道人間易榮辱醉歸齊插碧桃花南極星明湘水邉七還猶是小行年囊中紫粉誰傳得酒盡君歸我亦眠醉面赬如紫玉盤天風吹上月團團擬翻新譜朝元引雪壓梅花鐵笛寒平原賈氏戱綵堂鶴髮稜稜水石村飛花蛺蝶舞兒孫人間朱紫争先取落日微茫政倚門晚訪仲章不遇小院春濃落照閒碧篁相對乳禽還晚風陣歇游絲盡留得歸雲在屋山梅溪圖玉人楚楚意逍遥隔水擕琴不受招回首芳林真嫵媚春風歌館聴吹簫三逕圖遶舍山青流水新春風吹玉緑勻勻意行已復支笻去從此何須問主人静芳亭簾外羣山當畫屏白雲如水度中庭松花落逕無人掃失却莓苔一半青貯香亭長安何處認飛花片片相隨十萬家唯有碧桃天外種露華清淺玉交加大年宿雁圖寒雁沙汀睡已成雁奴翹首獨深驚朝陵閒說燕王事恨殺人間兄弟情次韻馬伯庸應奉絶句一十八首𤣥都觀裏桃花句沉香亭前芍藥詞今年春風佀憐我明年春風更相思肥紅盈盈錦步障淺黄深深緑油幕絶憐舊嫁小娉婷一曲生香淚雙落垂髻雙雙白馬郎看花不語愁晝長堂前有婦不肯守遍愛吳姬與趙娼緑栁髙低千萬樹翠竹横斜三兩家妾非江南蕩子婦不許郎君烏帽斜五臺山前雪如席千古萬古摇銀光驅馬莫飲澗邉水澗水能令馬穿腸小樓昨夜聴琵琶推手却手怨王家不辭逺嫁盧龍道可憐長城骨如沙海南不愁珠翠少家家共籠秦吉了夜聴言了佀秦聲賈客年年不知老紅衣夜唱娑羅樹云是西天好兒孫吹螺日飲官法酒笑渠騎馬傍人門吳兒蕩漾楚兒癡酒酣垂手索題詩桃葉不傳渡江曲竹枝空歌三峽詞老鶴攀松舞月色哀猿坐樹啼天光一喜一悲盡今古慷慨不如秦舞陽誰家弄玉矜少年採蓮艇子歌娟娟轉首那知顔色老猶抹横雲啼鏡前京華作客不知老燈花明滅摇寒房為問涉江下灧澦何如種竹滿篔簹金門羽客恣狡獪清曉𤣥文總不看朝騎白馬穿閬苑夜乗白鶴下天壇妾顔不比夭桃枝妾心不如傾日葵羞著主衣當筵舞蓬鬢荆􅁫却自宜燕山芍藥大如斗千朶萬朶凝春煙健羨南京馬供奉醉著宫袍不上船向曽六月桓州住雪歇前巖散氷樹王郎馬郎太愁生兩騎雙雙辭我去呉門艇子淮南船我慣乗之眼欲穿老來愛酒不得飲歸向桃源種秫田烏靴窄窄稱宫袍雙鬢風翻見二毛聞道中山止十驛急須乗馬釀松醪還馬伯庸文藁乗槎深夜問支機天女流梭舞鳳飛回首人間金粟盡剪燈愁製五銖衣逸馬圖瑶池宴罷周王耄牛首蛇身騁怪靈漢使近從西極返龍媒元是世間形試馬圖二駿翩翩勢並驅轉頭槽櫪總庸奴秋風萬里雲容與不用青絲强縶拘散馬圖秋盡川原草樹