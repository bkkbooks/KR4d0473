道人香色都忘却月落空闌始一凭交枝風動碧層層揮手芳塵謝不勝解帶暮雲真韻勝歛襟午日是驕能取青嫓白憐雕鏤抱紫迴黄合變騰宫錦競傳新拾得沉香停檻喚誰凭紫府淵淵十二層濃春如酒力初勝苦心佀怨鮫綃薄敏手難誇羯鼓能雨立無言慙委靡地行何術可超騰雲窗烏几誰消得時許飛瓊月下凭次韻師孟西曹即事兼簡子貞儀曹二首時議定律令盛世昭明復古初掃除弊事獨温舒牛毛置令心徒褊鳥跡遺文體本疎齊相避堂憐獄市鄭人鑄鼎泣刑書晝簾一度薰風曲欲寫琴心愧不如蕭疎門巷落花初楊栁隂中指望舒辨拙莫窮三耳妄塵深坐見二毛疎覆蕉得鹿非真夢㸃筆成蠅豈誤書慷慨聴君人物論雕蟲我亦陋相如次韻贈峩眉侯道士築宫江陵白苧藤冠自在身獨看潭影認清真還丹已化千年雪玩易重尋太古春楚觀江流通白帝蜀山雲氣接青神㝠鴻南北疑無跡萬里乗風問世人次韻陳貴白中秋見懷玊人海上振衣來一曲清商鐵笛裁碎露晶熒疑水立横雲缺落佀山頽夘君端有鎔銀術西帝慚無斫桂才往嵗相思江北路夜闌曽上望鄉臺次韻鄭景尹詠梅十首笑壓羣芳雪霽吟㸃粧詞筆補春林衝風曳白疑含笑暎日抽黄轉苦心鐵石横陳羣羽避氷霜獨立二毛深阿戎故是調羮種可為閒情淚滿襟醉倚孤根散髮吟他年鼎鼐出園林黄鬚雅相非凡種白面清談豈素心湖月歌殘銀燭冷湘雲弄罷玊龍深疎明可是無春思角曉霜清整翠襟幽人為愛水邉吟雪滿疎籬月滿林魂冷不知莊叟化神清難撓楚王心寒蜂戀蜜須猶綴霜蠣含漿色轉深千古湘纍詎無意廣騷從此酹靈襟手提色筆朗飛吟雲佩衝寒入寶林雅操獨髙淹海角微陽初動識天心鏤氷嘗巧機猶淺切玊疑神用始深回首羣芳半麤俗倚風三嗅為開襟回首白頭悲故吟清愁萬疊起雲林東君宻注非無意北客相逢訝有心絳闕雲低珠蘂迸碧潭風定玊徽深色香要是人間世更上凌虚始散襟萬里相逢得放吟醉揩雙目傲瓊林龍沙慘澹明妃怨漁笛凄清處士心餐玊佀嫌𤣥圃冷笑雲應喜翠微深何人更作江南句翻使兒曹競挽襟欲看南雪倚簷吟㸃檢春風第一林天與陽和誰借力晚持精白轉虚心氷蠶半蜕眉猶濕凍蠟初銷淚漸深夜半花神應有語覆觴從此斷袢襟梳風帶雨為渠吟揮手唐昌陋鶴林壯髮初生齊暎額童顔已就静齋心野蠶成繭輪囷富玊兔抽毫刻畫深莫遣風姨强攘袂故教月姊與聨襟十分深酌十分吟烏帽支笻故繞林月下無言疑背面水邉獨立佀傷心珠成蠟鳳王郎巧笙徹青鸞帝子深嵗晚自知誰與伴風篁摇影互交襟參殘霜急尚孤吟恍恍神游古蹛林四皓局殘惟一色三郎鼓罷了無心珠游鐵網青琅潤苔補虬枝壞衲深擬把鸞膠固青蔕未須殘雪墮衣襟贈潘山人夢中得前二句因續之布韈青鞋今已矣看山舊眼碧深深空憐石馬駐荒塜不見金魚飛翠岑地鏡有書穿石乳土圭何術候天心行年七十足稱老牛臥前坡為指尋次韻景尹酴醿二首光隂風雨短長亭花到春餘倍有情翠蔓倚松超直幹錦江縁酒錫嘉名蛻蛟纒影青雲聳么鳳啼芳新雨輕白面郎君休翦綵好將椽筆賦西京不將名字博西凉留取餘春在一觴當扆珠衣迎面立曲房寶靨捧心裝碧雲一色行明月翠幄千層護夕陽揮手朱殷空爛熳敢將清思寄幽凰可久齋二首虚室心源百尺澄深深龜息養空清一川鷗鷺古儀表四海弟兄真性情璧玉誰人傳至樸鏞鐘何處問希聲芒鞋直訪苕溪上雪透梅枝鬭月明三十六宫春不老何人月窟重推陳亭亭倚盖浮空碧匝匝空輪颺素塵郢客詞工端自苦海翁機息可相親支頤擬問庖犧易笑指靈蓍佀有神送長洲江都史官曹無事日提壺一榻深明晝倚梧稻蠏水低歌拍拍蓴鱸秋冷夢蘧蘧長年簿領慚錐子晚嵗生涯羨木奴千里布帆歸思好雁聲伊軋起菰蒲昌上人游京師欲言禪林弊事甫入國門若使之去者昌余里人幼嵗留吳東郡遺老及潁秀自異者多處其地以余所識聞若承天了天平恩穹隆林開元茂皆可依止遂各一詩以問訊虎丘永從游尤久聞其謝世末為一章以悼人說江湖少舊僧懸崖深掛一枝藤採苓欲取千年魄擊石曽烹六月氷天上星辰端歴歴胷中樓閣自層層相逢只説前朝事知是松源第四燈青鞋髙掛天平壁指㸃雲門三兩峰禪榻已容黄葉覆詩瓢從把碧苔封曉風殘月千村櫓細雨疎煙隔水舂我向京塵疑老盡吳山清淺越山濃獨木山寮不出門一瓶一鉢送朝昏巖迷鳥跡千崖泣松吼龍吟萬壑奔掩息端如雞抱子愛閒屢見竹生孫海門月落寒潮急凖擬乗槎與共論玊几峰頭第一枝老禪吃吃我深知曽將鐵杵敲氷骨佀怪鉛刀割宻脾法外無心猶涉解句中有眼即成疑袈裟不展蒲團穏此是開元妙總持我識虎丘三十年精神霄漢鶻張拳機當危處即燒印語到盡時難續絃路涉兩岐空有泣溪流一滴竟無傳雙峰古樹蒼藤􅇢時有子規啼徹天手調千嵗廣寒藥擬補月輪蟾已飛眼見昔人歸逝水心憐志士惜殘暉孤花苦别生香樹急雪深憐壞色衣為愛同鄉復同客絶慙同調不同歸山人歸去意何如八尺方牀自卷舒側岸採茶敲石火隔峰翦竹溜清渠碧潭印月菱花鏡白雁横空貝葉書後日相尋定何處不於吳下即康廬次韻王繼學蕭蕭寒雀下庭除一榻蘧蒢是我居雪後看山雙眼浄風前攬鏡二毛疎退之掌制慙存藁退之四十八嵗知制誥一年僅存崔羣户部一制余年相同亦草一制伯玉知非定止車深愧年華増老大還家早注故山書除夜雪黄雲黯淡夜如何晚勢參差更馺娑著地不隨人跡亂舞空偏入麥苗多鴉驚列炬穿珠樹馬趁初朝映玉珂嵗律詎隨人事改故將嚴冷轉陽和元日朝廻積素稜層厚載坤天雞三唱日初暾千官山立歸文石六衛嵩呼徹禁門花帽舞風喧法曲椒觴承露