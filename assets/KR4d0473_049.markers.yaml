  - {type: variant, offset: 0, length: 8150, content: 清容居士集卷第四十九題䟦書番陽生詩延祐丙辰余守直玉堂有以詩一編相示曰此番陽忠宣公族孫所作也忠宣忠節起家其子文恵文安文敏三公以宏博登政府竒辭奥學與漆書盤盂相表裏未始以詩名也然則詩果何自㢤唐詩之完成於文敏詩繇文敏興矣詩盛於唐終唐盛衰其律體尢為㝡精各得所長而音節流暢情致㴱淺不越乎律吕後之言詩者不能也自次韻出而唐風益絶豪者俚腴者質情性自別皆䂓䂓然禅人韻偈為宗益不復有唐之遺音矣此編意新語清優柔不倨将因先世之編以復唐舊吾知其進未止也噫儒者之事博而且難泛焉以講将勞而寡成守一而充之因以考夫風雅之㣲㫖知詩之立言各有其體諷諫詠賦無不曲盡其情狀精者為言況於詩而可以易焉余雖未接識因其詩願有以廣之跋集書金剛經古佛如来說性本空性空不壞離相常寂相本虚幻若無所往則名實相相由性成乃得堅固凢諸音聲及莊嚴事一念無爲咸獲殊勝譬如燃燈由火所傳百千燈明不見火跡金剛正體廣博妙宻擬議分別即生變滅爰集衆手不渉塵刹三十二分各不相統初無雜亂亦絶知觧指有長短字有大小以平等觀象體迥忘遍滿一切不遺錙銖靈山付囑亦復如是慧光印空如月在水謂作㓛徳即墮輪迴㑹稽袁桷書書綵衣堂楊次公記後余讀禮經首五服於髙祖私怪百數十年卒未有為之服者損益隆殺沿於時王獨五服㝎制不敢有所更易豈誠有待者耶今得於綵衣周氏而見之矣中古之論上夀百歲視唐虞時若不相佀或者謂情偽滋多世日以薄過是而能夀非通於隂陽性命之說不能也隂陽性命易老相表裏先天無極其圗具在悉傳於希夷陳先生先儒言之矣綵衣翁乃得而師之見於郡志趙清獻美周屯田致政綵衣詩皆為老人所作湯文清嘗詩而美之夫何疑焉昔孫思邈生隋開皇至唐永淳年過百袠周公其佀之歟所以踰於孫思邈之死其孫未生五世咸集孰有如周氏者㢤周今為饒大族傳十四世而宋亾有孫復為方外之學嘗聞紹㝎間有余君隱于番號甕隱老人年九十餘釋魏伯陽書自叙源委謂得於綵衣周氏君今南歸試求其書祖徳之傳則猶可攷也延祐四年二月甲子㑹稽袁桷書書虞伯生送周南翁序後大徳六年余嘗作郊祀十議上於奉常周漢唐宋偽雜之說悉釐正之十年朝廷作圗丘得預議焉位卑而語輕越職議禮若有所不可者勿議焉耳矣至大辛亥集賢司直周君以方士祠祭乗驛上天壇行濟源雍虞伯生氏叙而餞之将使之推致其節文以陳于上㫖㢤言矣復議其禮與沈瘞相近噫其信然矣禮之祭天未始與山川同舉也地爲社主遺而不言地獨安所附乎或曰祭山縣則地盖瘞歟禮莫嚴於博士博士秩七品禮官不敢以􅒼属待大典禮封諡博士用印專逹可否禮官唯謹惟謹伯生奉常三年昔之所藴見於周君之贈言合方士之說而復有疑焉者其必見於因革矣周君明辨博習所承扵虞君者甚厚因其說願得以攷焉其可乎㑹稽袁桷書書龍陽傅氏旌表記後博施濟衆夫子不以與人於易謙則曰稱物平施聖人立言夫豈一偏者㢤近世詞華盜衣食者用心褊陋輒以為大病李君之記藹然忠厚使誠若是當上史館宜書曰某年詔立義倉鼎州龍陽民傅某首入田千畝則國家之義俱得矣惜其事猶未至延祐四年九月㑹稽袁桷識書真㝎武仁夫静夀堂記後仁人心也非性也仁果静乎靜者仁之所獨性之静者人之所同也然則聖人之言静夀其果不可知乎聖人與衆同夫豈獨專其静㢤飬其心者惟静焉耳矣感物而静斯得之矣感物而動記禮者之失也夫子之言曰感而遂通天下之故斯静也非動也余嘗聞諸胡子胡子本於程子而朱子用之静動互用隂陽之㡬非仁静之說余豈好辯尊其所聞敢因以復於命名者焉㑹稽袁桷書書凌生㓛課曆後觧經而括其義例繫辭傳惟盡之釋章句以盡㫖意記禮者得之三傳例立經之義乖矣稽古萬言書之㫖微矣昔之盛時口相傳授猶懼其臆度玄言興微㫖不復有統緒隐暢之立是殆猶近古也明經設而帖括煩禮科設而義羅作将安取士㢤㴱於楚聲卒悔其篆刻蘭溪之學殆未可非也自王介甫㴱嫉其說晚卒不䏻以救悔益多而弊益甚南北分裂而相師成風者皆介甫舊制無以五十百歩為也皇朝酌準之制秀士得以自勵溺於前者則曰非格律不可格律焉自出㢤其誕漫不統則又曰法何自立竄竊腐語率意直志文益弊矣經益何自而明矣賈董之對切而婉婉非将順也惡盡言而攻上者非切謂也便扵宣揚童蓋習之矯焉以自文者誠不知其初歟昔之哲賢由是而知非慎之至也師徳試于國子復類登于賓興譬之適逺轅無有不正者勉之㢤俟其成行有以告矣為作㓛課曆引越袁桷氏丁己十一月識題進士梁宜致慤亭記後舍奠墓左觧之者以禮神言之然則祭墓非古歟禮生於情親之至者彌不可以媮也在昔先正司馬文正公㝎家祭禮弗忍焉者多矣張宣公獨卓然罷屏乆而㴱悔乃卒復之心之不寧是則先王有所不廢也禮經殘缺非止祭墓焉耳矣展哭于墓猶秉周禮充類以使夫民之歸厚則今通國所行誠不曰背於古矣荏平梁君表其墓亭曰致慤致慤之著羹牆之見也著莫大於思誠恱親有道夫豈幽明之間㢤詩云神保是饗孝孫有慶余扵彦中見之求隂於地莫近扵體魄王矦而下降殺有等怵惕悽愴夫豈禘甞之謂㢤記禮之失也余願與梁君㴱究而辨明焉書虞伯生從子豐登字說後往歲余與伯生甫同官于朝有燬宋故家者瞋目發赤擿數無遺藴余固曰彼不遜若是耶伯生曰毋庸戚吾徒不振誠有罪當自治以俟㝎於是悉取夫人師友之源委臺閣儀注之損益精思紬繹凛凛然不敢一日廢将二十年伯生率以文詞名諸公桷也力不加進而自治者則亦罔敢豫延祐五年其弟徳常登進士第故家之誚将於是乎息今年從子豐登侍仲父来京師以其弟兄之字說来示呉㓜清之所期者至矣余何敢言雖然願因大父致政公命名之意而廣焉授地之法休田以逢年者全其力也仁熟之效在於善所飬與與翼翼古曰有年其豐登之謂與維致政公徳充而位卑重施樂善敦薄興譲休田之義也施于有成曽孫之稼吾見其京且齊矣弸中以文外仲父訓廸有自来矣獨感夫昔者之詬病因以告二子願勉夫哉越袁桷伯長甫書題徐天民草書甲申乙酉間余嘗受琴於瓢翁問譜所從来乃出韓忠獻家盖通南北所傳皆閣譜宣和譜北爲完顔譜南爲御前祇應譜今紫霞前譜是也韓譜湮廢已乆東嘉郭椘望始紹其傳毛楊徐皆祖之不知者咸稱浙譜由毛楊自秘其傳故耳蔡氏四㺯嵇中散補之其聲無有雷同孰謂浙人能之乎瓢翁酒酣好作草書嘗寫前人悲憤之詞一日言中散廣陵散漫商君臣道喪㴱致意焉至毛敏仲作塗山專指徴調而雙絃不復轉調與嵇意合非㴱知音者不能又曰學琴當先本書傳俗韻自少仲連得法於其子余以作吏荒落向甞作琴述言歴代所譜派系因覽先生遺墨俯仰疇昔今三十六年矣延祐六年仲夏丁丑越袁桷書書栝蒼周衡之詩編詩有經緯焉詩之正也有正變焉後人闡益之說也傷時之失溢扵諷剌者果皆變乎樂府基於漢實本於詩考其言皆非愉恱之語若是則均謂之變矣歟建安黄初之作婉而平羈而不怨擬詩之正可乎濫觴扵唐以文為詩者韓吏部始然而舂容激昂於其近體猶䂓䂓然守繩墨詩之法猶在也宋世諸儒一切直致謂理即詩也取乎平近者為貴禪人偈語佀之矣擬諸採詩之官誠不若是淺蘇黄傑出遂悉取歴代言詩者之法而更變焉音節淩厲闡幽掲明智析於秋毫數殫扵章亥詩益盡矣止矣莫能以加矣故今世學詩者咸宗之栝蒼周君衡之㳺亰師極其㳺目之所寓悉歸扵詩浩溢閎愽盖将因言以宣情而扵眉山公之學㴱有慕而跂之者其為志亦勤矣夫水宗扵海百折而卒至者非一日之功也故余力敘詩學之源委俾反而求之周君氣盛年富進進不懈異日胥㑹必當以余言為然也延祐六年閏八月庚申前史官㑹稽袁桷書書仇按察父訓子詩後淵明退之諸賢惓惓訓子形扵歌詩聽之藐藐迄不䏻繼父業手澤存焉之戒良可悲也獨康節先生有子伯温捧其先人之詩日篤不墜卒有成立此盖絶無而僅有今觀致政仇公三詩遺墨如新其子按察清節吏能炳炳可紀用不展志諸孫嶄然各自立宦業有法曰以祖訓為則顔氏之庭誥桺氏之家範奕葉母變今扵仇氏之門見之矣書曰汝克昭乃顯祖用成爾顯徳勉之哉跋王使君都中年像圗詩卷粤昔故家江左之王贊皇之李其髙自標致不以華腴為可貴故其淩厲絶俗則有若元禮文饒官為一集卓然以名閥自重其視世胄珥貂紆綬猶褓中兒耳閩王侯都中㓜歲登膴仕抱負竒氣折節慕義其為政先愷悌而後㓛利宦績光顯為東南牧守表官為一象盖将憫歲月之如流厲志考徳俾日進焉若年之有加而無斁也抑甞聞之今之為吏起扵荒窶甞病不知其所為葢其講習之道非有所素也宦學之門受察於父兄之側遇事剖析白首吏拱手不敢議其徴取者良有自来桷念昔曽大父太師樞宻越公嘉定間以著作郎考南省多士獨得參政畱耕先生後登上第直道大節為淳祐全臣雖不及相天下士今猶嗟惜之施于諸孫詩書之澤盖未己也桷學不加進懼世徳之微凛然自治敢以通家之舊願相與勉焉以求佀夫世臣之文獻金章𬗋綬豈足為吾兩家榮觀㢤延祐六年八月辛丑契家弟四明袁桷書題樓生詩集海隂陳處士甞言吾婦兄樓某善治生昩爽以興即整理靡宻某租某山出入俱有法又治其所嘗往来㒺缺怠於是酌酒盡暮暮而醒醒而吟凢是者三十年樓之上世故為呉越王鎮遏使因所居有廟里民祠之㡬四百年今樓君已下世其子崧伯為余弟之子之夫始以其集相示曰踈懶嘻若前言果踈懶邪詩盛於江西吾郷以詩自名者率祖之其浸淫者為韓梅壬午癸未歲余始悔悟海隂譏之曰自言學術有悟門不謂師承廢扵是今讀樓君詩天和混融不露斧鑿而其平淡造詣有陶韋之風焉理勝則無疵果有疵議者不能發口文士善譏評後率不振僕不敢若是書以歸尚勉之雅俗類厥考足永逺矣書茅生家譜余待罪翰林甞草三茅君加封制書㴱以為神仙家功行累積子孫必盛茅為希姓則今江南茅氏豈其苖裔也與或曰三茅君既仙去安得有後余應之曰老子為道祖老子之子宗五傳而為王太傳今李姓皆祖則茅氏之祖也夫何疑吾鄉公相家受原伯魯之誚厚貲腴田談笑立棄其困辱有下於皁隸甚者發丘壠惡言其家世之盛靖觀茅氏之自重有泚其顙者多矣漢世以試籀書始得為吏而唐宋制令玉册官必通文詞者始得為茅氏守藝猶近於儒者之事矣盛徳若不足老子之㫖尚勉㢤必有以興復矣跋子昂贈李公茂詩松雪翁詩法髙踵魏晉為律詩則專守唐法故雖造次酬荅必守典則然扵贈別等詩則僅見之淮隂李公茂胷次磊落言論吐冰雪擅幕府畫諾事無停畱士大夫喜從之㳺宜松雪翁繾綣而樂道之阮公服常白觀此足為人物論矣跋宜春夏君與上饒陳先生文蔚講經書問自武夷之說行其門人矜重自秘皆株守拱立不能親有所明辨獨勉齋黄公奮然衛道以其同焉者析之曲焉者直之使後之人無以議湯文清公後出復以昔之所㴱疑者充廓之是則武夷之忠臣矣今觀宜春夏先生自明壯歲從上饒陳先生文蔚問荅疑難無苟同之病紬繹微㫖夐然扵尊聞之外汲井飬源端木表正蓄徳集善至是盡矣其孫震以進士来亰師以桷族叔祖特進尚書公遺墨相示盖守宜春時與其大父交好良厚今八十年矣師友道喪愚者守之薄者背之欲求其自得者不可得夷考武夷釋中庸與易傳輒異夫程楊者夫豈得已觀此得以攷焉題何子方丹書後金石草木藥品見扵神農書二者不得以偏廢也自唐世方士飾侈說以動上聽卒致躁僨以弊或者不察遂因以置議焉厥今四海一轍而南北方劑判為二塗昔人甞言蔵用檐頭三斗火陳承箧内一壺冰二者胥失之矣金石變化鄰扵鴻寳故昔得道之士近取扵身而法之内外交飬厥功著焉今世所傳實祖劉先生爾朱先生余甞得其書而讀之水火之騰降日月之摩盪差毫髮則不能成也故其起死也如神而非以増其聲色之奉歴亘古而不可廢者其說具在貴溪何大方料簡切於人用者為十二方本扵神農參扵難素復以五金八石之論曲暢而闡微焉其師陳君善父號名醫宋世公卿㴱重之泉源木本有自来矣合南北之偏扵大方有望甞聞龍虎經有火記六百散落雲笈願歸而求之則其藥愈神而人益信矣年月日四明袁桷書書江陵唐氏族譜後集賢脩譔番陽呉公善作江陵唐府君墓銘叙述世系於質肅公八世矣府君之子洞雲願揭徳正傳俾桷有述焉維質肅公立朝偉節在宋史而獨減死令莫㝎是否敢於府君之誌而詳言之熙寧元年著謀殺已傷自首者減二等為㝎律主是議者王安石許遵也非是議不得行者參知政事唐公御史中丞吕公獻可判刑部劉孝叔御史劉公玉錢安道翰林學士司馬公也許遵在宋循吏傳蘇黄門㴱取之且謂其年髙多子孫由減罪之報桷考宋史則減殺議自登州婦人殺夫自首始唐公論為綱常本王許之議非也公以新法憤死後詳㝎勅令者卒於是而兩疑焉宜㝎律曰謀殺自首減等如遵議在天屬如唐公議若是則兩得之矣公之子淑問為名御史是唐公亦誠有後㢤唐故餘杭大族侍讀學士詢實同所自其居江陵由公父殿直君始質肅公事實紀其諸孫在朝著歴歴可考宋社既亾衣冠故緒闔郡不能以一二觀呉君所為銘則世次猶可考也抑甞聞之鮑靚以司隸系孫為道士王逺知以琅邪太傅孫為茅山觀主皆知名當時今洞雲佐治開元宫居亰師二十年貞幹善謀其源委有自来矣夫樂道人之善儒者之事質肅公之不得伸於一時事若有待庸書碑隂以告夫為史官者有攷焉書永嘉王母香几銘記禮者之言曰先祖之徳善㓛烈鼎而銘之衛孔悝是也嘉言不忘子張之書紳是也席机觴豆受於老臣則几銘舊矣況母訓乎口澤之存歲乆則弊為文傳信几之存亾復何預焉以儒成名几之銘滋乆矣庸書以俟䟦劉真人帖飬生家性命分為二途而性宗之說與命宗各有七焉丘祖師以談笑詼譎活中州萬姓至其二傳為長生劉真人或疑其有畱滯之意嘗讀淵明詩有云感彼柏下人㴱有感愴劉真人則曰墓中長有真空景豈非先兆乎至治二年春二月丁丣拜醮長春宫為長沙余君善之書題姚雪齋右丞草書金源諸賢皆師懷素其法由黄太史始盖一時崇尚蘇黄遡本以求則黄本懐素蘇本徐季海二羙兼備則雪齋先生俱得之詩昉扵蘇駸駸乎太白矣字源扵黄則與之俱為醉素之弟子矣桷也獲㳺玉堂得與其猶子承㫖公侍筆硯繼入集賢復與公之子侍論議今觀遺墨敢發明前賢之淵懿使後者得有攷焉至治二年㑹稽袁桷書于恱心堂書姚牧菴贈播州楊安撫漢英樂府大徳末年桷以史屬預脩成宗實錄于時承㫖姚先生實領史事見其塗抹詳㝎若不經意而一受潤色即粲然與班馬竝此殆其天資學力相須以成者思播楊侯朝覲本末見於太史先生執筆尢致意焉惟昔楊侯以中原大族世領䕫府羈靡之州當蜀破一時名士咸往依故其文獻承接的有源委聚書訓子益振起光采推姚公不妄許與之心是所謂立賢無方則凢司文衡取士類扵是有攷侯之子頤正君来都温慎儒雅與之論前朝事悉纚纚不絶示姚公所贈樂府因書以歸之書葉信公家問後信公貴為宰輔不忘貧約舊事壯歲客吾里從學城南楊氏書塾楊氏館遇甚厚咸淳丙寅以資政守四明舊往還皆重報之而以次子通判應友君為楊壻人咸服其盛徳咸淳政事一歸賈相江公萬里以告老去馬公廷鸞以稱病去信公先二公以歸賈每憾之後再召将中以事而公卒由曹娥以遁天時人事至此有不䏻容力可勝道㢤竹友君甞獲識于先人侍側廣顙豐下其談論猶有王謝家風度俯仰四十年而其子能以方外士保其家譜信公諸孫於余為外表則漸就零落浮雲變更夫豈葉氏敬觀遺墨為之愴然至治二年秋九月癸丑袁桷書書楊安撫訓子詩後魯周公傳三十四世夫子紀二百四十二年之行事所不忍言是則伯禽以後為無聞矣家訓之嚴莫盛於顔桺若包孝肅司馬文正庭誥儼在至諸孫而靡傳君子之澤五世而斬夫豈徒言㢤播川楊忠宣公其子襲爵作詩訓示韋玄成之詩有曰於戯後人惟肅惟謹無沗顯祖以蕃漢室公之詩有焉今宣撫君盛年執謙問學日績金玉厥躬以承休譽克昭乃顯祖視魯公世家實為有光尚勉之㢤則忠宣公實永不朽矣題呉浩然詩卷讀羣公詩玩把不能去手氣與理俱明矣氣由物以成形而下者為道邪為人邪人心非與道悖亦非氣質舉世相承吾何敢言觀浩然亦知道矣書朱氏精舍圖詩卷婺女史學之盛有三家焉東莱之學據經以考異同而書事之法得於夫子之義例以襃貶而言者非夫子㫖矣龍川陳同父急於當時之利害召人心感上意激頑警媮㴱以為世道標準志不成而年逝識者悲其不遇焉說齊唐與政蒐集精要綱挈領正俾君臣得以有考禮樂天人圖書之㑹稡力返於古是則論史者無遺藴矣噫自宋忠簡公以經濟才不得展用故其鄉之後進匡國輔世為首論人事不齊則亦曰有數焉耳矣方咸淳初義烏朱氏兄弟四人竝登進士第而伯仲季尢得名其季宰㝎海余得識之見其貫今古若身歴而知其是否其為文簡而明據㑹以歸於一者也竦然以叩之則曰吾於伯仲曷敢望後聞其兄仲晦君燁論事廟堂與南士持政柄者不合為理成精舍圖以歸而中原忠純儒雅之士藻繪襃拂皆今士大夫之所仰慕而不可見者亦盛矣㢤近世南北之黨分朱君以越産不合扵南士而中原諸賢有愛於朱君審諸賢忠厚之至則朱君之承接者必有其道立賢無方於諸賢見之羣而不黨於朱君見之於是夫重有感焉書楊御史奏藁後御史言事有二不幸焉折羣隂初萌之機論國是於未㝎之日若難矣不至履其危而蹈其禍也至若姦孽肆兇株黨連結箝口拱手者千士一律至是而有言焉非夫捨成敗死生不能也鄒道鄉審於田承君劉元城決於母氏其所處既㝎故其直節焯焯偉著有若楊御史之言事其感憤厲奮悉出胷臆嶺海刀鑊雖在目睫猶往矣忠矣㢤昔人甞言御史以言事得名有闗夫世道之升降方今天子聖明小大臣㒺不承恪楊君論思辰告非若前日之難匪初惟艱尚懋敬之以永終譽題潘伯潤家譜㓜歲聞寧海藩繁昌公以文學政事得名羣公交薦乆官江淮其猶子伯潤甞從以行飛牋急檄一時争稱道之科舉既廢假館浙右辱其講授者皆楚楚可觀然而剛不容物論事直見底藴脂韋者良忌之每語繁昌公輒涕洟見于顔面繁昌死無後逃難蕩析而伯潤垂白服斬衰以繼晚歲手書宗譜以示其子惓惓于繁昌尢切噫今世以田宅財物争為後若繁昌之死當掉去不頋矣伯潤所為誠足以警厲薄俗子孫其有興者願書此以俟至治三年十月袁桷書書鮑仲華詩後宋太宗真宗時學詩者病晚唐萎薾之失有意乎玉臺文館之盛絺組彰施極其麗宻而情流思蕩奪扵援據學者病之至仁宗朝一二鉅公浸易其體髙㴱者極淩厲摩雲決川一息千里物不能以逃遁考諸國風之㫖則蔑有餘味矣歐陽子出悉除其偏而振絜之豪宕恱愉悲慨之語各得其職今之言文章者皆其門人而扵詩則不復有同焉甞㴱疑之其力不能佀之與抑其心之和平不得與之同與降于後宋言詩者人人殊而歐陽子之詩訖未有宗之者滁陽鮑君庭桂仲華以詩一編介余所從㳺郝君時升求余叙語完氣平其於景也不刻削以為能順其自然以合於理之正考其從来有佀夫歐陽子之㫖矣今滁人思公數百年猶一日也而其篇詠見於一泉一石者復得其遺民而宗仰之仁聲之入人㴱於是乎見晉本乎唐憂㴱思逺有堯遺風余於仲華其殆近之與至治三年十有二月某日袁桷書書李弘道朝天録司馬氏探極南北之㳺蹟私怪其動心導志不專為書晚歲憤悱始以游歴者散見於紀傳入于渤海則禹所傳者異矣纂歴代之書以為言其沿革㫄分而散見誠宜矣自漢趙充國班超扵金城玉門纖悉利害至唐西南備邊亦得其要領是誠有指歸夫古之善使者必通逹道里周知阨塞為主上道若曰行記南北之變易詢於道途父老之說盖未足憑也今天下一家由淮而燕者同一舟轍淮泗合流九河故道諸儒置議不已㳺於京城山前十六郡之名漫不能考陸務觀范志能擕志書以行或猶有詬病之者豫章李君以能為北行録簡而明博而文而扵在朝之羣彦㴱咸致意焉桷也學未足以傳後願刪之以俟他日成之也書紇石烈通甫詩後言詩者以三百篇為宗主論固善矣然而鄙淺直致㡬如俗語之有韻者或病之則曰是性情之真奚以工為千士一律迄莫敢議其非是紇石烈堯臣示其先府君怡閒吟藁一編玩其詞㫖藻繪融液一本扵大曆貞元之盛而幽㴱婉順則㡬於國風之正矣府君舊貴族遺言雅聞得扵先朝之故老壯歲轍迹半天下冨盛羇愁感慨歡恱之事目受而心㑹冥搜逺想不極其摹寫不止用意若是故成􅈬實足以自見桷舊得拜府君於堂下聆其議論明絜而簡易讀其詩如親見之焉泰袁元年三月某日袁桷書書郝伯常經題黄鶴樓水龍吟後郝公以使事館儀真日襆被蓐日引馬於庭下請歸館使謝以未有㫖如是者十有六年在館中觀書不輟其未見者從制置司以假所作蜀漢書皆拘畱時藁㝎方是時宋相以滔天之惡䝉蔽朝論士夫咸以道學縁飾殆如風痺不知痛痒公盖目覩其弊今觀此詞其意㫖可知矣公之子為侍讀學士甞與桷言公奉使時侍讀甫四歲後囬亰師年十九以戎服見拜且泣公閉目不頋進退不敢其父友命易衣冠以進始與語焉前賢典刑峻整若是視近時父兄之御子弟泚顙實多因書舊聞以補遺事泰㝎元年三月癸丣四明袁桷書書張子仁少監族譜後張侍中曽孫忠文公叔夜忠確公克戩皆以死節表表著靖康宋史忠義傳兄弟竝立餘人不能兼也後其子孫入南一在四明一在福唐紹興推恩盖首及之都水少監張君子仁盖其裔孫惓惓以宗譜未備綱羅附綴支分而派別之歴歴在指掌其勤且勞積二十年始成焉族譜散軼皆由兵戎之遷徙晉世故家南北隔絶各立譜系元魏以来賜姓紛雜譜莫能考歐陽子作宰相表用志良苦而私為渤海譜猶有缺文是則為譜者誠不易矣今子仁能追考其所自又復以職業自見光于前人其官都水興廢舉軼廟堂以其諳歴陞其官以居然子仁有不懌者桷曰胡安㝎先生以水利為一科故其弟子若羅適頋臨皆為名監司水土職在司空古尢不輕世以善理財穀為能吏厥今􅒩渠之粟歲致千萬石數倍遼海不害于民而京師益以羡吾知考治行者必以子仁為首夫何慊然因書其宗譜且以勉焉䟦呉子髙詩詩本性情能知之矣本於法度知之不能詳矣風雅頌體有三焉釋雅頌復有異焉夫子之別明矣黄初而降能知風之為風若雅頌則雜然不知其要領至於盛唐猶守其遺法而不變而雅頌之作得之者十無二三焉故夫綺心者流麗而莫返抗志者豪宕而莫拘卒至夭其天年而世之年盛意滿者猶不悟何也楊劉弊絶歐梅興焉於六義經緯得之而有遺者也江西大行詩之法度益不能以振陵夷渡南糜爛而不可救入扵浮屠老氏證道之言弊孰能以救㢤呉子髙居湖湘為詩以法度自守髙者騰霄漢幽者抉泉石憂樂得中合於採詩之說矣候神人於執期望飛仙扵蓬瀛侈心之萌帝者之事公卿之作雅頌得之願與子髙異日相見而論焉燕都宋本誠甫進士第一橐子髙詩俾有語遂書以歸之清容居士集卷第四十九, WYG: ''}
