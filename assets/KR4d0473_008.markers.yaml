  - {type: variant, offset: 5460, length: 0, content: '', WYG: 舊學蕪三史新居隘一㕓煎熬魚煦轍奔竄鳥驚弦擬整登山屐伯長須乗破浪船出關塵已逺徳平過埭意爭先歸舶攢桅聚伯長浮梁斷鎖懸潮渾江葑没徳平塍破岸藤纒戍栅依樟宻伯長官堤砌石平機閒蠶喚織徳平砧響鴈傳箋乍靜喧煩耳伯長猶欣輾轉眠鶻橋華屋廢徳平鵝匯曲河連稛實閒濃具伯長鹺嚴絶竈煙急裝紅蔽膝徳平辮髮黒垂肩估客編文貝伯長村家緯木棉生涯疲剥割徳平世路窘迍邅龕室休行客伯長郵亭嘆逝川韝鷹圍獵罷徳平聨騎縱遊旋路轉分支港伯長川明幻别天鄮城花已暗徳平甬水恨空傳數堠搜唐刻伯長題詩紀宋編㑹堂夫子像徳平汲井隠居泉海眼藏龍窟伯長山心射鹿田水鳴知棹急徳平岸走訝途遷隠見岡巒近伯長低昂橘柚鮮青山猶五里徳平緑樹已千年歸犢如雲擁伯長閒花似火然苧裳遊女淨徳平蘆管野伶妍繫纜披團氅伯長循溪捨竹箯徑香幽菊傲徳平土薄假山偏燈火精廬古伯長衣冠故物全登門論}
