  - {type: variant, offset: 4835, length: 348, content: 舊學蕪三史新居隘一門里煎熬魚煦轍奔竄鳥驚弦擬整登山屐長伯須乘破浪船岀關塵已逺平徳過埭意爭先歸舶攅桅聚長伯浮梁斷鎖縣潮渾江葑没平徳塍破岸藤纏戍柵依樟宻長伯官堤砌石平機閑蛬喚織平徳砧響鴈傳箋乍静喧煩耳長伯猶欣輾轉眠鶻橋華屋廢平徳鵝匯曲河連稛實閒農具長伯鹺嚴絶竈煙急裝紅蔽膝平徳辮髮黑垂肩倨客編文貝長伯村家緯木檰生涯疲剥割平徳世路窘迍邅龕室休行客長伯郵亭歎逝川韝鷹圍獵罷平徳聮騎緃逰旋路􅗗分砬港長伯川明幻别天鄮城花已暗平徳甬水恨空傳數堠搜唐刻長伯題詩紀宋編㑹堂夫子像平徳汲井隱居泉海眼蔵龍窟長伯山心射鹿田水鳴知棹急平徳岓走訝途遷隱見崗巒近長伯低昂橘柚鮮青山猶五里平徳緑樹已千年歸犢如雲擁長伯閒花佀火然苧裳逰女浄平徳蘆管野伶妍繫纜披團氅長伯循溪捨竹箯徑香幽菊傲平徳土薄假山偏燈火精廬古長伯衣冠故物仕登門論, WYG: ''}
