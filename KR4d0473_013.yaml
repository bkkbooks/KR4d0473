  text: 清容居士集卷第十三
  hash: sha256:df83901ad87855122d8d7d58c7358dfe191e1e66235b5ee50da29cb715efb4f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_013-1a}
body:
  text: 絶句七言團扇圖玉樹秋殘翠影疏掩門何處望金輿昭陽殿裏渾間事最恨當年李婕妤擊梧圖萬樹梨園已失春秋聲颯颯起胡塵君王獨立梧桐下不見當年鎖諌人韓幹五王出游圖花蕚樓髙怯翠衾平明聨騎走芳林讓皇可是無忠益一曲凉州恨最深夜讀唐將遺事二首合江雨暗裂珠旗鼙鼓鼕鼕怒促圍不是帝豝車上去元戎那得衮衣歸雉尾雲深漢殿開將軍鐡馬響春雷太平未覩匆匆去空憶君王白玉杯秋山圖蔟蔟麻姑十二闌倚空搖落總塵寰卧逰京洛誰消得一榻松風響珮環童時侍先人泊京口旅樓一月正對江山樓繁麗特甚江津流民散處不可悉數今皆不復有追憶舊事因成絶句十首碧瓦參差第一樓風旗獵獵喚行舟兵厨有酒真堪飲不學弓刀也白頭紅䄂姢姢舞旋齊鑾江一曲唱尤竒西湖院落曽翻得未識君王知不知燈火闌珊月色低少年乘醉馬東西樓頭畫角聲悲壯又聽歌聲促曉雞白葦蕭疏野火焚流民草舍各星分沙田土瘦新耕得寧死江頭不作軍朱門髙插相風旗千里船行總得知稻米流脂江上去健軍何處是男兒日日樓頭算酒錢峩冠太守號籌邉鳴騶傳入丹陽館為是行都過客船淮馬低如果下騮春風小隊打紅毬日斜臺上人爭看銀碗分明第一籌明月曽愁多景樓幅巾長袖是清流金焦山勢元相望不掩諸公富貴羞有山掩諸劉改之舊羞之句公富貴硯山園下將軍宅脫却兜鍪强學儒聞說髙堂擁紅粉醉翻筆陳墨糢糊白雲一去愁千疊此地重來百不如空憶當年覔梨棗小樓燈火了殘書最嚴時在先人課子廢講誦旅樓不雪中招虞伯生祝丹陽空林一色十分春羞殺髙眠獨笑人喚取東坊虞博士紅爐同㸃奪胎銀金芽初熟白皚皚䄂手爐邉未盡開為請招真老髙士且須騎馬抱琴來梁山濼千頃芙蕖送我船碧香紅影弄姢姢梁山風景能消得不到西湖却十年支家口蕩底天鵝雜櫓聲南鄉今有幾長亭錢湖未盡滄洲興臥看荷花十二汀黃河乘槎使者問河源織女相逢事惘然從此競傳天上去不知滄海幾桑田耿山一蔟山腰總賣薪語音猶是舊吳人江湖水濶從今住更肯輕生學買臣古黃河口溫溫河水似湯泉送我南歸意萬千入海定從天上去不知重㑹是何年黃樓詩到徐州不用題危濤千尺壓金堤羣峯翠盡蘇仙去萬古黃流日又西伏日度淮伏日隂隂蕩棹船詩腸氷雪碧淮鮮黃塵自是人間暑不識薰風在五絃過髙郵一片歸雲一片帆芰荷深處緑蒲灣鵁鶄可是無情思不及沙鷗自在間甓社湖甓社湖中新水清風牽荇帶引帆行靈妃夜度霓裳冷輕折菱花玩月明聞見飛蝗眼見度淮鄉又聽吳田水渺茫總怨春來雪五尺變風變兩變年荒渡揚子江一舸中泠煙雨飄片帆閃閃浪招招倚闌僧在半空語南去北來今幾潮俞光逺治余别墅口占奉謝種竹澆花俟我還花成雲塢竹成山相逢且說相思恨更說何時得共間周子敬三年不寄一書口占奉寄伏日松隂酒一壺抱琴身與鶴身癯故人天外慵傳信唯憶楞伽是舊書聞仲正新得掌珠道中奉寄知君已厭添丁事與我同看納甲書别後匡㡷清夢少春來又獲掌中珠懷應德茂瘦石支笻逼仄吟吳山雲冷越雲深江湖老盡誰知己獨聽寒泉響玉琴明皇醉歸圖日暮毬場醉欲歸停鞭更進紫霞杯老髯未省霖鈴曲猶願君王欵欵回過故人墓湖曲深深鎖墓田種松成本起蒼煙欲窮精爽周流處雲在青山月在天送昌上人江南山水一枝藤更上雲中第五層昨夜西風傳鴈信露華如雪月如氷方𫀆圎帽眼如鶖問訊紅衣不㸃頭剛道西天同佛住箜篌琴瑟勝南州題葛仙翁移居圖翁媪相擕入翠微轉頭猶有可憐兒丹砂不是神仙藥勾漏歸來鬢已絲黃松瀑索酒殘春聽雨元無著恰似槽床淺滴聲活水飛花誰駐得願隨小榼夜深傾祝丹陽飲馬圖天馬從來不受塵水清深愛自由身髯奴未識相忘處手控青絲强屈伸舊春花下與東嘉周子敬聮詩有人到中年始憶家之句余坐舟中五十日因憶此詩作俳諧體奉寄平生愛詩復愛酒晚嵗畏名兼畏茶年過五十不歸去底用中年始憶家四明衣冠山水窟人道風流勝永嘉爾來愁絶各閉戶方信中年始憶家我眠船中五十日飯有飛塵鬢有沙古言墨頭須萬里砥用中年始憶家春風一架爛金沙憶昨同醉遺烏紗山東禁酒不得飲方信中年始憶家題鄭潜昭玉堂藁雲漢天孫古錦機秋風槎上解相期廽鸞舞鳳曽翻得不用人間五色絲春睡牽人渴思濃小窗誰贈密雲龍自憐舌本那知許急寫緘題似舊封宫娥奕棊圖爭先春色在眉端圍坐佳人著意看可是相憐饒不得東風自怯五更寒求酒為愛雲房酒盎清㳙㳙殘溜滴春聲夜來梅月十分白嗅盡梅花看月明輕輕梅花春風面却似道人微醉時只恐花飛失君意更酌叵羅歌小詞小詞歌徹飲叵羅一寸清霏奈客何窗外馬蹄猶不住誰道江南春水多我家舊釀碧琉璃色壓花枝朵朵低頗怪春深未歸去花下杜鵑應亂啼伯生約賦竹枝詞因再用韻君家竹葉江水清我家竹枝三峽聲三峽水隨江上去回首望鄉終眼明蔟蔟青帘蕩子期飄飄紅杏三月時青帘紅杏總輕薄自展碧箋書我詞暮雲纎纎如越羅勸子不去知子何桃花水深放船了却憶關山塵土多愛君酒滑滑如泥白眠義手頭愈低南鄰琵琶不堪聽自舞柘枝驚春啼舟中得功逺瓊花露戲成三絶瓊花瑞露十分清客裏相看眼倍明自是江南春色好錯教騎馬到京城平生嗜酒不殢飲最憶停杯微醉時花下盈盈似相待莫教春倒最濃枝繁禧觀裏花如雪留取清隂待我來應有真真花底坐生香一曲舞三臺梁山濼梁山水濼八百里容得碧鷗千萬羣愧我扁舟數歸路晚風掠陳入蒼雲嫩草豐茸間軟蒲一川晴緑映春蕪平岡散牧分雲錦蔟蔟斜陽是畫圖大船曬網小船􅊻知是吳儂喚得譍共說五湖難住却朔風吹雨捲千塍仲章以余賦瓊花露因成陽臺之句次韻月下看花花氣清羡君不飲更分明五雲破曉回歸馬疑上天邉碧玉城我愛瓊花賦酒詩雪香憔悴可憐時平山芍藥開如斗擬揀肥紅作贈枝相如肺渴非關酒多病却廽江上來可是春風消不得白頭吟憶舊琴臺送危功逺翩翩海燕近宫城的的天鵝度上京癡坐江南未歸客夜聽春樹衮潮聲居庸關外雪糢糊蔟騎分明似畫圖猶有深春後歸鴈見君曽宿洞庭湖天柱峯前第一詞風清月冷鶴先知京城可是無吟思眼看飛花下筆遲送吳成季五絶墻東杏樹花千片片片隨風到馬頭只恐花飛不解走度關時莭暮雲羞北雪初消未見山䭾鈴聲雜佩珊珊廉家池館春風好獨看牡丹惟我間上京新酒玉津津薄醉深春惱殺人截取當年釣竿竹捲筒相寄不嫌頻詩瓢淅瀝風前樹雪在深村月在梅從此不須生感慨晚寒更上望鄉臺鼇峯路與仙峯近取次詩筒日往來慙愧阿戎松下坐洞門深鎖碧桃開長沙鄧醫年七十餘遊京師二兒扶小車得酒即醉類有道者劉充之號曰夀軒且令賦詩大兒椎髻小兒丫拍手青天在小車剛道人間易榮辱醉歸齊插碧桃花􅊨南極星明湘水邉七還猶是小行年囊中紫粉誰傳得酒盡君歸我亦眠􅊨醉面赬如紫玉盤天風吹上月團團擬翻新譜朝元引雪壓梅花鐵笛寒平原賈氏戲綵堂鶴髮稜稜水石村飛花蛺蝶舞兒孫人間朱紫爭新取落日微茫政倚門晚訪仲章不遇小院春濃落照間碧篁相對乳禽還晚風陳歇游絲盡留得歸雲在屋山梅溪圖玉人楚楚意逍遙隔水擕琴不受招廽首芳林真嫵媚春風歌館聽吹簫三徑圖繞舍山青流水新春風吹玉緑勻勻意行已復支笻去從此何須問主人靜芳亭簾外群山當畫屏白雲如水度中庭松花落徑無人掃失却莓苔一半青貯香亭長安何處認飛花片片相隨十萬家唯有碧桃天外種露華清淺玉交加大年宿鴈圖寒夜沙汀睡已成鴈奴翹首獨深驚朝陵間說燕王事恨殺人間兄弟情次韻馬伯庸應奉絶句一十八首玄都觀裏桃花句沉香亭前芍藥詞今年春風似憐我明年春風更相思肥紅盈盈錦步障淺黃深深緑油幕絶憐舊嫁小娉婷一曲生香淚雙落垂髻雙雙白馬郎看花不語愁晝長堂前有婦不肯守遍愛吳姬與趙娼緑栁髙低千萬樹翠竹橫斜三兩家妾非江南蕩子婦不許郎君烏帽斜五臺山前雪如席千古萬古搖銀光驅馬莫飲澗邉水澗水能令馬穿腸小樓昨夜聽琵琶推手却手怨王家不辭逺嫁盧龍道可憐長城骨如沙海南不愁珠翠少家家共籠秦吉了夜聽言了似秦聲賈客年年不知老紅衣夜唱娑羅樹云是西天好兒孫吹螺日飲官法酒笑渠騎馬傍人門吳兒蕩漾楚兒癡酒酣垂手索題詩桃葉不傳渡江曲竹枝空歌三峽詞老鶴攀松舞月色哀猿坐樹啼天光一喜一悲盡今古慷慨不如秦舞陽誰家弄玉矜少年採蓮艇子歌娟娟轉首那知顔色老猶抹橫雲啼鏡前京華作客不知老燈花明滅搖寒房為問涉江下灔澦何如種竹滿篔簹金門羽客恣狡獪清曉玄文總不看朝騎白馬穿閬苑夜乘白鶴下天壇妾顔不比夭桃枝妾心不如傾日葵羞著主衣當筵舞蓬鬢荆叉却自宜燕山芍藥大如斗千朵萬朵凝春煙健羡南京馬供奉醉著宫𫀆不上船向曽六月桓州住雪歇前巖散氷樹王郎馬郎太愁生兩騎雙雙辭我去吳門艇子淮南船我慣乘之眼欲穿老來愛酒不得飲歸向桃源種秫田烏靴窄窄稱宫𫀆雙鬢風翻見二毛聞道中山止十驛急須乘馬釀松醪還馬伯庸文藁乘槎深夜問支機天女流梭舞鳯飛廽首人間金粟尺剪燈愁製五銖衣逸馬圖瑶池宴罷周王耄牛首蛇身騁怪靈漢使近從西極返龍媒元是世間形試馬圖二駿翩翩勢並驅轉頭槽櫪總庸奴秋風萬里雲容與不用青絲強縶拘散馬圖秋盡川原草樹空冷雲嗚咽似呼風太平天子櫜弓矢留得間身落照中次韻繼學伯庸上都見寄隂隂棕殿水雲蒼鳷鵲風微夏日長渾似醴泉宫畔境千官齊立從文皇紗縠單衣珮水蒼碧箋裁詔繭絲長日斜雙入通明殿雲母屏前對玉皇相思盡日鬢毛蒼赤土塵深怨路長忽憶鏡湖明月夜藕花清淺棹餘皇題危㓛逺山水雲作糢糊氷作稜玉峯深鎖鐵崚嶒欲問先天觀前路釣叟捲蓬終不譍孔節婦表門鳯逐麒麟天上飛深鍾涼月獨鳴機春風猶是人間世華表亭亭護落暉墨梅圖鐵石氷霜百世身疏明瘦直一生真玄雲借我凌寒便直上鈞天試早春雪繭輕蒙絶㸃塵小窗晴日得橫陳夢回猶記溪橋路黯淡相看喜似人蜀女繡牛圖絶壁連雲翠木稠五丁空作蜀王羞浣花女子聞鵑苦繡作春風萬古愁錢舜舉折枝菊醉别南山十五秋鴈聲深恨夕陽樓寒香似寫歸來夢背立西風替蝶愁子昂控馬圖雪積流沙冰歇巖天池飛舞入殽函奚官可是相拘檢笑領春風白玉銜渡水羅漢圖洞口泉分岸渺茫意行的的水中央相看總絶神通想不用折蘆歸故鄉次韻繼學天寶宫禱雨見懷小著羅衫涼似秋梨花寒重雪交流瓊林宴罷傳宣急不許祠官用虎頭的的雲團白玉杯可堪羊角兩驂開松花深處塵如雪知是龍歸鶴未來千林紅紫鬪京城一朵姚黃露有聲惆悵可人何處覔獨行花下到天明新雨悠揚人未歸逺山凝碧綴雲衣捲簾擬作庭前舞㸃㸃團沙栁絮飛送嶼上人玉几前峯慘翠顔瘦藤挑雪度三關黃塵似作松花落歸鴈南來我北還東南蕭寺𣑽王音禪榻蛛絲薜荔深我欲與君同面壁首拚雙屣挂松林東溪老子詩三略的的瑛盤貯夜光擬把玉簫松頂坐穿雲吹徹九天涼月映寒燈雪映簷故鄉夢斷酒初忺因思舊宅梅霖後新竹齊抽碧玉尖寄天童岫長老太白山髙雪四圍孤峯翠織五銖衣誰言老子寒無力獨擁紅爐更下幃贈南嶽道士歐陽君丹鼎芙蓉生玉床紫泥封固結玄霜道人急歸巖屋守不使月明騰夜光崔白竹昔年家住篔簹谷葉葉凌雲對此同近日畫師爭斂手垂頭疑在栁隂中往嵗南歸啇隱長老逺惠佳句不獲承貺次韻叙懷席帽亰塵草載强風前數髮白於霜藝編不檢蛛絲幕斑馬専門萬古香桑乾嶺上是天心萬樹松花積翠深兩度灤陽三伏節片雲飛雪是晴隂烏紗承笠霏霏土短䄂持鞭窄窄風冬盡不知梅蘂白春來深愧杏花紅啇隱長老以余歸喜溢翰墨愧歎之餘次韻以謝少年學道惡加鞭掩息支頤絶語言玉几老禪曽對坐茶甌如雪閉寮門沈沈雲頂絶天風不展袈裟萬念同眼見永師傳妙密虎丘殘塔夕陽中龍歸石落無消息碧眼長身振祖傳江上白鷗元不礙潮回月出滿樓前春日奉㫖侍祠太乙朝罷觀齊中紅梅花藏春塢裏功夫密一一羣英㸃絳唇共道紫皇分上瑞須知太乙露天真斗柄分明指孟陬紅爐橫簇化工收先皇寶曆今重建應許南枝在上頭次韻砥平石草載冰霜興已終復於馬上送年窮雙峯閣上慿欄立疑有子規啼晚風燕山長驛四十五雪擁金臺玉作層疑是黃虀消不得何年投老得依僧我翁緑野舊精廬樓閣連雲畫不如贏得髙人欹枕卧膽瓶冰蘂樂冬餘恩師髙住湖邊寺清夏菱花閲錦波妙趣通玄鄰粲可清言協律近隂何砥師平地湧金仙不詫虛空不說禪怪我往來增白髮雲龍新碾汲清泉省庵三十六宫春寂寂月華如水碧雲真空齊宴坐天心轉知是羲皇太古人姚子中左司墨竹雪花搖曵被春欺的的琅玕侍玉墀千嵗玄霜誰拾得紫薇花畔寫參差斗巖搖光游戲下塵寰曽被山僧駐不還從此夜深隨鶴度玉衣清淺珮珊珊歸德王瓊母表閭寶奩香瑣繡羅衣不許春來蛺蝶飛得見慈烏好顔色門前槐栁引雛歸西寧李處士碑初作元復堂堂吏部睢陽叙耿耿中郎有道碑㸃檢清河金石録的於處士絶諛辭博平王獻妻徐氏表閭無子無夫鬢影蓬兩家王母事相同原妻王逢有傳宋史臨川妙筆傳青史我輩空令兩耳紅離宫圖龍首渠開王氣埋淺沙殘草認天街當年金屋寒鴉聚時有耕人拾寶叉子昂逸馬圖神駿飄飄得自間天池飛躍下塵寰青絲絡首誰收得留與春風十二間通叟狀元以祕書滿職言歸泊然若無營者桷舊與殿廬詳定得通叟卷氣完以充議者爭緘口今其南歸以子昂畫馬求言愴然以别吾徒之責深缺然矣至治元年八月二十九日桷書薛濤箋蜀王宫樹雪初消銀管填青㸃㸃描可是春山留不住子規聲斷促歸朝十樣蠻箋起薛濤黃筌禽鳥趙昌桃浣花舊事何人記萬劫春風燐火髙理皇題馬麟野芳佳木圖午嵗上題丙重慶城頭翠木圍陽羅堡畔野花稀卅年竟換人間世弦管西湖認落暉亥恰卅年丙午至乙題寒拾圖三人携手共嘲吟古殿修廊自在尋石壁忽開靈怪絶可禁飛瀑海潮音舒貴和以黃菊相贈賞挹逾六十日短句奉還深碧齊九秋風度玉精神的的寒英不落塵還向清齊調火候明年散作萬枝春雲峯圖融融泄泄互低昂絶頂瓊冠白玉裳聞道溪南三尺雨道人推枕召髯羊揚節婦傳鳯簫吹徹碧雲天眼見孤凰淚欲穿回首春風三十載槐花如玉栁如綿宫女賞花圖一架薔薇錦障稠滿庭蜂蝶替人愁玉環已侍昭陽殿側近傳杯得自由宫女度曲圖望瀛法曲紫霞觴更按伊州奉玉皇翠竹凉深宫院密新聲那得過宫墻靜中齊玉宇寥寥星斗沉千林籟寂印天心羲皇猶是人間世嶰谷參差不用尋張氏承祜堂幼弄青梅共繞床白頭舉按話尊嫜竹花已老桐花發雛鳳參飛列畫堂題何尊師醉猫縱橫社穴恣穿窬抵掌摩鬚不奈渠賴有連錢能遣醉晚風殘日卧庭除題初平起羊圖舊跨髯羊入帝青天瓢如注散清泠明知制氣歸吾手好與松間護茯苓題鮮于伯機拱北樓樂府氣湧如山壓海潮髙樓明月更吹簫從兹徑直虛皇筆春蚓秋蛇擅市朝簡馬伯庸象榻香濃翠幌春美人倦繡態橫陳平明欲進朝天襪小立蘭燈尉帖頻山水圖髙閣何人傲獨醒蒼松流水倍分明絶憐艇子搖山影猶與行人管送迎書懷二紀驅馳鬢已班臨風數鴈悟知還山中舊種松千樹從此歸休手自芟三月草九日女孫生朝今七嵗久客京師未嘗食其湯餅舊見林鬳齊為女孫作絶句事適相類瑾子云當次林韻且録林詩于後福慧曽傳兩足尊願將清貴屬髙門大家女誡夫人筆付與袁家第一孫舊留書册今猶在時放漁竿教女孫憶昨華光侍至尊䄂香清曉候金門隱居放言憐子憐孫玉雪顔更憐諸壻守家山若教總使紆青紫老盡京師更不還古道寥寥世不聞麥舟髙誼薄青雲邇來忽作苞苴看買得南宫免校文以琴弦寄永嘉周子敬五色鸞膠世莫傳春雷迸石響流泉永嘉七十四居士玄鶴來時就榻眠堯民圖子題泰定甲衢尊深酌舞蹁躚鼓腹行歌樂自然共道帝堯新紹運九州重見上元年育王長老見惠茶瓜次韻奉答玉几峯橫寶塔前彌天消息是真傳蒲團禪板都忘却似笑當時手指天迸石春芽寶所藏枯松手拾許深烹能令星斗珠璣綻要使江山錦繡張道人種玉光千頃深陋長安畝一金只恐冰霜難下齒特將妙語助清音蜀江圖三峽盤渦灔澦堆層巒百丈鼓聲催從今盡向金牛路杜宇深啼喚不回巢溪堂風攪危巢樹樹秋更騎牛背濯清流舉頭總是人間世朝市山林且自由餘慶堂閉門春熟酒醪香深夜書聲度北堂不羡崔盧官譜好盛栽松竹俟成行題李士弘墨竹漫山桃李艷紛紛嵗晚相看有此君昨夜墨池新雨過淡煙輕掃一窗雲碧海無塵玉作壷琅玕清淺露流珠相思忽憶侯都史為爾疏封墨大夫題管道士雷谷古竇隂隂一線泉中有伏龍方晝眠何人握固坐其下霹靂送雲催上天盧溝符氏酒亭茅屋疏煙報午雞金沙清淺水亭低羲和勸汝一杯酒勿與行人東復西牧羊圖後有閻先生詩次韻感舊因成二首嬰兒御氣草堤眠能使雙羊合自然莊叟不知蝴蝶夢覺來重作養生篇玉質堂堂地下眠雲龍風虎各加鞭松隂舊日趨庭客整佩蘭臯駐集仙李唐牛䆉稏原空蟋蟀吟秋來乞得自由身平蕪又見𥻘𥻘緑復與田翁共苦辛閔思齊調閩府榕葉隂隂荔子丹碧巖深處潄潺湲秋聲只在瑶琴上曽聽龍吟杳靄間道山堂上文書靜寺寺題詩滿碧蕉昨夜海神隨雨過緑箋為作小詞招水仙圖日暮佳人十二鬟臨風解佩意閒間當年曽立通明殿笑押蛾眉第一班百鷺圖紫宸深處立清班聽履雍雍得自間歸向江湖尋老伴展圖猶在五雲間絶句五言信州招真觀二十八詠小隱巖山鬼小兒足木精游女神據㑹學真隱下視飛花塵馨香巖深睡失明珠猛走飛流涎松花卷輕雨滴滴百重泉學堂巖露盤下金薤雲笈流珠纓泠泠寒巖下猶有嬰兒聲鬼谷巖縱橫太古石短長千嵗藤感彼巖居子獨飲古澗冰升仙臺寥寥入太清金門繚紫垣或云有官府微誦五千言釣臺垂綸落澄潭小魚倏然來大魚引之去釣石何崔嵬一線天兹山可容天舉世皆笑之我不答此語鼓腹支其頤五面石分一只成五五石各有一誰能據其上面面不相失寒月泉曉汲寒泉清明月各在缶缶空不見月引水復在手金沙嶺金沙雖為貴履之傷我足愧彼側布人欲獲無量福長生池飲水人已去山中多白頭青蘋空淺處時見玉蟾游老人峯髙帽側整整秀嶺深重重積此太古雪遂名老人峯三山石三山不可度絶壁峙書堂流水日浩浩太極彌茫茫磜潭沉沉無砥谷央央太古雲赤日焦下土老蛟眠不聞玉簾泉截玉作明簾不知簾外事應有碧眼仙隔簾見人至石人峯餐玉未得法變形成楚囚九轉乞換骨三沐期㸃頭仙足巖山深猿狖驚瞬息下神步空飛本無跡長嘯上天去月巖顧莬樂嬉遨入地不得騁化為白玉泉倣徨返東井雷公巖神鈞起空洞隂火生羽翰我耳若不聞白雲在天冠道人巖道人本無姓對客那有言龍口迸石髓鳥跡開雲根丹井金鼎閟寒泉真火彌不壞年深定飛騰子夜吐光怪洗藥池靈根乘月吠肉芝生土肥濯以上源水千嵗永不饑鳯山孤飛千仞岡兩翼化為石年年春風時山花成五色風洞罡風轉空輪浩劫不停息此為天地根視之杳無跡逍遙巖形留非自在何者為逍遙青松在谷口白雲在山腰長廊巖飛吟起霞珮馭氣躡天梯碧雲布參差纎修與巖齊龍口巖弄月紅玻瓈匿雲紫芙蓉近已厭狡獪納息玄虛中靈湫靈龜道其前游鯈殿其後嵗久深自韜清夜巖下走朱􅌪楊栁青地近滄州余愛其名雅作古調五首朱􅌪楊栁青明日是清明地下不識醉悲歡總人情朱􅌪楊栁青客亭塵漫漫為你多離别我生無由完朱􅌪楊栁青黃河㵼如注還俟飛絮時相同入海去朱􅌪楊栁青自愛青青好亦如逺行客相逢不知老朱􅌪楊栁青桃杏鬪顔色顔色雖不同時節各自得墨蘭飛瓊散天葩因依空巖側守黑聊自韜不與衆草碧仙人紫玉枝化為水蒼佩獨立搖落中秋風得相貸次韻宿清風軒覺寺澥滴正天風净雲衣海眼卷石髮醉起撲殘燈獨看端正月石湫二水橋寧為千丈清不作一尺渾古語有涇渭橋水何人分虛一欲問鴻荒事何如鰲極時三三與七七在手不須知題應德茂遊吳紀事二絶澗束冰泉咽松懸月露清何人㑹真趣細坐與君評聽鶴鴛湖曉呼猿鷲嶺昏十年南北恨無語獨銷魂雲鏡團團白玉光直入寒奩砥昭徹誰為容空飛本無趾霧香含章楚澤東晚思凄冥冥剖之久不食三嗅揚其靈竹西前導扶桑日廣招閭闔風天心須正位不必問西東清容居士集卷第十三
