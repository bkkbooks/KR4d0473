body:
  text: 雜文放生池祝聖文重華廣孝琴奏五絃成湯克仁網開三面式届正陽之月密符元命之辰寸地尺天歸皇恩於不有四生萬類涵惠澤以無窮恭惟陛下㓛契重玄道融衆妙鳶飛魚躍極上下之昭眀馬負龜呈發隂陽之靈祕臣等依承真䕃詠贊昌期天地大德曰生想洋洋而圉圉文武萬邦為憲咸肅肅以雍雍碧海波澄瑶池仙下鮑王廟祈雪祝文維神廟食兹土幾千餘祀比嵗饑疫荐臻户口耗絶意者降罰自天神不得以有請也飛蝗蔽天神能相其穡事俾獲無害而入冬以來陽不斂藏雷電晝作月臨嘉臘同雲之候迄莫有覩深竊懼之雪為五榖之精協應以時則遺胤原隰者可以弭伏民無疾疫春有東作千里之幸使者觀風於此朝夕徯念神於斯民休戚彌重願力闡明靈叶贊于山川錫以嘉瑞勿愆其期以絶菑害益足以彰神之賜賀東嶽表節應蒼龍紀岱宗之元祀雲舒彩鳯流阿閣之祥光萬姓庭趨百靈辨㑹中賀恭惟氣超混沌㓛運冥茫禀木帝之精仁施無際悟谷神之藴道妙難名永孚于休必得其夀臣等肅蠲瑶斚祗演琅函望齊魯之青葱天威彌近恨蓬瀛之拘縶肉翅難飛又庚子嵗甲辰日陽德鍾靈龍集式符于天統昌辰紀瑞虹流上合于堯年五福錫民百神受職臣聞至仁無極如嵗之春盛德莫名惟天為大故䏻彰施黼黻以盡人文之妙休養封殖以成品類之和幽明相通顯微無間極際蟠而均被亘今古以常新佳氣鬱葱神光孚逹中賀恭惟位冠羣后㓛贊無為玉檢金泥極昔王之潤色丹山赤水覽海國以遨逰爰假青煒以諧寶典臣等傾心雲闕注目霓旌呼萬嵗三莫侍鈞天之廣莫方百里五徒推東魯之幅員又是嵗三月十九日立夏瞻雲喬嶽叶盛德之在春受曆清臺揆發祥而維夏四方來賀六合同風中賀恭惟樞紐隂陽權衡品物金穰玉燭以成三時之和丹臺紫清以佐九皇之治雖真游之無跡幸神御之有嚴光挾龍輿下琳宫而布武燕分麟脯傅玉斚以流恩海觀塵清城闉瑞靄臣等式循舊典庸展上儀大道無言莫測絪緼之始人心不逺益窮肸蠁之微又天作髙山實尊魯甸位冠羣后兹為岱宗良辰揆維莫之春多士仰思皇之祐中賀恭惟受元氣始為萬物宗七十二君莫測神庭之祕三千餘里有開日觀之祥眷兹海壖實維侯服斥鹵竭魚鹽之利生聚紀蠶麻之㓛民食每假於轉輸土俗猶存於浮靡雨暘微戾伏臘遽乖敢因善頌之誠庸致預祈之懇絳旗丹轂密除疵癘之妖紫府清都彌降簡穰之祉然後東皇太乙錫宴鈞天夀宫神君追逰化國遹廣聰明之聖懋昭長育之仁眷此有生施于無極又時維莫春誕紀盛旦嵗行吉亥丕昭令辰蒼龍宣長育之仁玉燭啓豐穰之瑞中賀恭惟希夷道廣亭毒㓛深神化無方寸雲合而甘澤溥精誠有感巖石固而積霤穿臣等身囿海圻心傾日觀萬年永保降祥敢擅于斗牛大德曰生衍夀益齊於箕翼東嶽殿上梁文伏以海觀澄清聳神山之紫翠仙閭縹眇靄雲闕之青紅光景常新規圖改舊伏惟隂陽合德髙明配天三宫空洞之游道無不在六虛周流之妙用莫能窺眷兹海壖古稱巨鎮廉讓被先王之澤詩書敦故老之風穀粟桑麻行協三登之慶象犀珠玉聿來重譯之邦神符默契于天心嘉貺式資于帝力洋洋在上蕩蕩無名雖兆祀之苾芬愧揭䖍之庳隘今太守顧瞻下宇咨度廣居龜卜既從鳩工斯集雕欒藻井峩然金雀之棲玉階彤庭鬱若彩鸞之舞雲光五色花氣千層誕揚仁惠之聲益廣循良之政梓人之道類相敢愧裁成王者之德好生益申贊詠今兹榖旦庸畢偉㓛虹梁初舉于地中鳯輦疑從于天下載色載笑來宴來娭輒采歡謡少揚盛事拋梁東天雞午夜日輪紅風馬雲車歸帝所丹臺紫府布皇風拋梁西江濶城回細栁低簇騎共看紅叱撥踏歌時聽白銅鞮拋梁南簇簇山光擁翠嵐蓂葉隂陽元有凖蛙聲水旱不須占拋梁北滄波不動平如席祥風甘露瑞豐年大貝南金書絶域拋梁上仙藥未須承露掌絳宫神闕自回環玉檢金繩空悵望拋梁下萬井春風樂皇化雕題交趾九夷朝草笠黃冠八方蠟取與而藝編復驗其勤勞至道無私積善有慶某學拘鉛槧業保簮裳教子未能企世科之必復傳家有託守先訓以丕承庸展素忱式陳薄薦伏願祥光紛郁𣑽氣開通孔蓋翠旌覽德輝於九土虎符龍劵錫慶澤於一門梓潼醮齊文瑞靄層霄誕紀降靈之節誠傾魏闕有嚴事帝之儀慶接九垓芳垂百世恭惟至仁育物玄感闡幽受色筆夢寐之中睟容有赫厠金榜銓衡之際嘉兆密符允懷一經教子之心適值大比興賢之嵗雖登崇有數難以預祈然神化無方終期默運伏願祥光下燭飈馭恍臨桂籍書名願俟家氈之復棘闈進步思成盆繭之抽詞盡意長恩深感集宴交代鄧集賢致語繡衣南國屢施白簡之威玉佩中朝允稱金闈之彥惟姻好實侔于兄弟乃交承永紹于雲仍愧乏弦歌式陳籩豆伏惟交代集賢相公雲霄自致風月無邉給札玉堂氣欲吞于兔頴橫經璧海坐嘗撤于臯比清言王謝之比肩妙畫鍾張之接踵與人無競詎論鵬鷃之巨纎處身以和不計鴈鳬之雙乘京師之望君實洛社之慕堯夫廟堂掄才㑹辨已同于諸老巖壑動色拔茅肯後於吾徒蓋將拄笏以看西山披裘而傲北雪老子之興不淺先生之祝何如特進宗師大真人幼結文盟壯持道紀度弱水之萬里騎氣而逰登紫微之九重步虛以進謂孔老之同有自若晉鄭之焉依避堂尊賢授粲禮客諸衆官或逺使絶域或近職內銓俱精神磊落之英實羽翼贊襄之士儀生彩鳯武接祥麟我翰林修史大夫針芥密投金蘭久託候松階之日影舊若塤箎踵蓬島之雲光今慙糠粃悟三已之無愠知四休之當冝敢以心聲上陳口號婆娑老子倦東吳笑挹胥濤傲太湖坐使千巖為几席䏻令萬籟作笙竽瀛洲法曲行刋譜酒國長春莫計壺賴有嘉賔相勸舞玉山暫倒不須扶亡是公代聽雪主人宴客致語疾病相扶持乃天倫之至理酒食召僚友亦人道之常彛挹南斗以為漿夢鈞天而廣奏熒煌接席醲郁陳歡清容處士素褐癯儒青氈舊緒投簮逸海岸有古松流水之心騎馬傍人門無冷炙殘杯之色困頓于爼豆弦歌之事沈淪于醫藥卜筮之流匪曰卑陬亦云曠逹喜愠既不形于色口腹亦何纍于人聽雪主人出壑清氷臨風玉樹陽和盎面士疑挾纊之恩冲粹積躬衆美虛車之讓鼎烹而調衆口杯水以勝萬言給月支風陋人間之腥腐屠龍膾鳯窮天外之珍羞厥德不回何恙弗已方將肥羜以速諸父庸示等差弊袴以待有㓛悉除僥覬芳筵縹眇雅集舒徐露墮三危化逡巡之麴糵風號萬竅陳廣莫之笙竽享若太牢淡如明水敢陳口號少贊神交玉堂學士詫英豪濯濯天葩簇錦袍擬上瑶池擘麟脯不將金帳飲羊羔長卿多病緣消渴坡老長貧漫老叨從此青州化烏有夢回霜月冷如刀太虛道士劾清容子文鑄金作象深垂叨餮之文索米為飢何異侏儒之拙乃知芻豢之恱我口不如禮義之根人心傳書染指之卑易著濡首之悔詭稱聞道實曰費辭清容子山澤迂踈冰霜傲睨乏燕頷虎頭之相初匪適時為牛溲馬勃之才猶言藏用徒禀薑桂之性殊乏參术之和望似木雞出語爭疑其鐡石癯如野鶴持身或近乎膏梁岐黃之問對匪専元白之唱酬莫預已廢三餘之業獨夸一藝之長隤其家聲耻莫甚矣同乎流俗已實為之弗思尚口之凶猶見朵頥之色昔茅容雞黍詎為設客之資而張翰鱸蓴乃在還鄉之日捨飯疏飲水之自得為蒙袂輯屨之可憐不為盤餐固難免跨驢之誚我有斗酒要當為得魚之歡幸前倨而後恭姑小懲而大戒尚期深省以贖往愆涼州牧白羽乞致仕表控扼喉襟粗謹揚清之節叨承掌握莫蘇中暍之民知見幾而作之良致陳力不能之請眀時匪棄小已實兢伏念山澤癯儒江湖野性樊籠久困難自致于雲騰邉幅自修徒强追於時好心已忘於虛室手慵炙于權門勇不足以沉舟技莫施於秉翟畏趙盾之日固曲盡其巧心憎元規之塵終有慙於眯目羞踽踽凉凉之行鄙媛媛姝姝之能謀乏知兵謬忝三軍之寄材非補衮莫資四皓之成荷執中之從權俾持麾而自效然而動靜之道莫逃于數代謝之理亦維其時今者扶搖在空蓐收届候羊角之哀已急鴻毛之順實先雖酒泉之封相與絡聮而雪山之衝深惟扞格服不衷而災也清有餘而簡之鄣面見人詎堪寒士之誚翳身而舞不逃宛丘之譏况臣翼蔽非長骨立早見久尸重寄深懼大何同異之論方興終難徇習磷緇之瑕已露必致投間兹蓋伏遇某官八柄馭臣一時講武治天下運諸掌式契古初繫一人謂之風灼觀民志憐蓐席之舊物希篋笥之厚恩動之斯和固己遂馳驅之微願揮之不去誠有乖名節之大間優哉香山之歸凜矣杜郵之戮先猷儼在遺訓具存矧兹蒲栁之姿惕若桑榆之景亟全末路㑭就完人問溫樹而不言深疑過謹開浴堂而召對未忍自捐得請為期束裝以俟答詔式瞻天文俯察世道求賢自輔故建官以廣其見聞使民以時故用人弗責其全備卿皎若眀月穆如清風早振儀于天朝晝承問於溫室盛秋守塞力丐散間當寧念㓛莫違雅素飾賁無咎持謙有終朕執中而慊然卿為計則得矣百年過隙要當從佚老之歡萬物為銅行復俟秉鈞之用勿云致事不我告猷可特授扶風公致仕擇日降制制凉州牧白羽謝表余因擬乞致廬陵蕭靜安作白羽扶風公致仕批答仕表及漢雲字說雲漢之萌進於坤而踰於乾其昭然者隂也隂何乘於陽乎天地之初至靜而虛根於隂矣隂者陽之先夫下而上者為升鶉火之中隂之基也隂見而極陽始著明萬物彚貞各返其生生而不已復歸于隂其環無端其去無趾故曰體之者隂也用之者陽也廬陵蕭道士字曰漢雲知所後先引而明之道不逺人合性與神其道得矣老氏之學捨是奚自庸俟而質諸張子敬字說乾坤之用近取於人者必始於敬敬立則誠始存聖人繫辭㫖且深矣自伊洛之說行各希美名然徐察視履矜矜于外者猶慊然于內豈果以為外飾哉余嘗聞中原諸老言許文貞公教授諸生窮髮之北皆負笈以請一聞善言有終身行而不倦者是殆其至靜未散先進禮樂之遺意子敬居河西沉厚默靖莫敢自暇內外交飬在已治人悉本於是尚勉之哉史文振字說丞相史忠武王以雄韜淵謀佐上聖合㝢縣㓛書鼎彛勳在琬琰厥子若孫章綬承接至于雲仍罔有替墜時則有若今江浙省管勾君勾稽知微謙謹保緒譬之巨木蔽芾百里群柯交䕃條逹而不紊亦盛矣哉一日以書抵余曰鐸受名于父兄而字未之有竊有請焉嘗考文武之事不能以兼而鐸焉則能以備丞相之勳殫於武事則今之振文事者繄後人是望敢字之曰文振夫文非止於詞章而已縝密而不泄著而明翕然以成其聲也清以廉宣明國家之盛俾後之人夷考世臣之系則必曰允文允武罔俾専美於前代余於文振實有望焉余孝友命名說邃古命名六相七輔莫得而詳也八愷八元或得以有解焉是則命名之說其始於周乎周之初猶未聞其說也申繻之言名有五則夫今之問名者皆本於是私獨怪夫世降而俗漓髙者希於聖卑者希於祿余閲夫歷代之史傳獨漢為近古皆以一字為則至於方術有所不足責德命為義則於東魯余君見之成王夫子之訓先儒紬繹不能為言矣或者喋喋然為言其無乃贅而不知非者與余君方力行以為本因義以究其實是不在於吾徒之告異時行修於家庭顯於朝著願勉之哉㑭勿替則得之矣平山說唐僧一行陋周畿漢志之狹始定南北兩戒而山川之肇源止伏一覽以盡可謂善矣然而磅礴雄險隱然若有所限其支脉連屬猶屏蔽自衛焉睹所謂平山哉余嘗出居庸上桑乾始識其衍迤之勢千里若一方若布席圓若拱璧氈廬蔽空凝雲積雪杳不察其髙下故其行者如升虗騎者如凌風忘登頓之勞繇是逹于金山靡有紀極而視兩戒之說倍蓯未足以議也王侯設險以防國德不勝不足以恃是則幽州之北山不以險稱雄絶萬世朝九州以函諸夏豈峻極于天者非山之謂與在易之象曰地中有山謙不言山在地中謂有髙大之實藏于地謙之象也余嘗聞洞庭諸山跬步巖崿謝君獨取其平焉久留京師願至開平知盛世之廣洗耳目之固陋歸于故里卧游以思登東山而小魯夫豈虛言哉琴述贈黃依然往六十年錢塘楊司農以雅琴名于時有客三衢毛敏仲嚴陵徐天民在門下朝夕損益琴理刪潤别為一譜以其所居曰紫霞名焉自渡江來譜之可考者曰閣譜曰江西譜閣譜由宋太宗時漸廢至皇祐間復入祕閣今世所藏金石圖畫之精善咸謂閣本蓋皆昔時袐閣所庋而琴有閣譜亦此義也方閣譜行時别譜存于世良多至大晟樂府證定益以閣譜為貴别譜復不得入其學寖絶紹興時非入閣本者不得待詔私相傳習媚熟整雅非有亡蹙僨遽之意而兢兢然國小而弱百餘年間蓋可見矣曰江西者由閣而加詳焉其聲繁以殺其按抑也皆别為義例秋風巫峽之悲壯蘭臯洛浦之靚好將和而愈怨欲正而愈反故凡騷人介士皆喜而爭慕之謂不若是不足以名琴也方楊氏譜行時二譜漸廢不用或謂其聲與國亡相先後又謂楊氏無所祖尤不當習噫楊司農匿前人以自彰故所得譜皆不著本始其為今世所議無可言余嘗習司農譜又數與徐天民還往知其聲非司農所能意創間以問天民時天民誇詡猶司農也謾對焉終不以悉余益深疑之而莫以據後悉得廣陵張氏譜而加校焉則蔡氏五弄司農號為精加紬繹皆張氏所載獨楊氏隱抵不述耳今世琴調清商號為最多郭茂倩記古樂府琴辭亦莫盛於清商杜佑氏叙論雅樂謂楚漢舊聲猶傳於琴家蔡氏五弄楚調四弄至唐猶存則今所謂五弄非楊氏私製明甚議者悉去之不可也按廣陵張氏名巖字肖翁嘉泰間為參預居霅時嘗謂閣譜非雅聲於韓忠獻家得古譜復從互市密購與韓相合定為十五卷將鋟于梓以預韓氏邉議罷去其客永嘉郭楚望獨得之復别為調曲然大抵皆依蔡氏聲為之者楚望死復以授劉志芳志芳之傳愈尊而失其祖愈逺天民嘗言楊司農與敏仲少年時亦習江西一日敏仲由山中來始弄楚望商調司農驚且喜復以金帛令天民受學志方故今紫霞獨言劉郭而不言廣陵張氏傳授皆楊氏與其客自私之蔽越有徐理氏與楊同時有奧音玉譜一卷以進律鑒琴統入官其五弄與楊氏亦無異晚與楊交楊亟重之益知楚漢舊聲非楊氏所作余來京師見鼓琴者與紹興所尚微近第重緩如寬厚長者余不能以是說告之也黃君依然豫章太史之裔以琴游公卿余未識之而余之嗜琴當有同者故書其源緒以解夫今世之惑而因以告之贈醫者陳生鄞衣冠家為最盛閭里棟宇相接屬議醫藥尤尚選擇輒考論其世又察其詞色溫謹涉于儒者始得進焉每視疾必先告以虛實先後始筆簡牘議其月日以校輕重有不如式者爭詬病詆笑于時待之也良厚而所謂醫者亦咸自愛重不敢妄試車軌混合南土游宦居多中原人壤髙氣厚所服餌率冝寒凉由是羣醫爭視好尚迎合間有奇中遂復以施于鄉黨十失其半夫泥於古者非通論而强試其所不可吁亦殆矣余官京師時遇南士之稍適於時者服食嗜好茫不可分辨疑誠中州人也節宣之不時亦復以攻導之法自治問者未退已倉卒不復救輕千金之軀以夸眩誠有罪猶諉曰是不通至於業醫捨風土燥濕之宜以逐近利利未獲而害日以甚吾不知其為何心也里中陳氏子某世為醫祖父篤厚君子也力訓諸子讀古醫書長子辨論開慱余每見之則曰醫不可以泥古徇今則非矣又未幾而死心每悼之後二十年其孫復自立不墜余乃有言曰夸言以為容非術之工也媚時以自售非術之究也相其州里審其表裏神而行之日踵于門者莫可禁雖嫉媢遏抑不足為子懼朂哉以樹道何憂焉示羅道士近世通南北謂吳中所習琴為浙譜其咎在楊司農纘諱其所自譜首於嵇康四弄韓忠獻家有之托胄為平章遂以傳張參政其客永嘉郭楚望始紬繹之今人不察百喙莫以解精於琴者始知之北有完顔夫人譜實宋太宗閣譜余幼嘗學之其聲數以繁完顔譜獨聲緩差異而裹聲良同字本於右軍今而曰浙字琴本於蔡嵇今而曰浙譜吁其孰能解之玉笥羅道士大章秀敏且文其遊於藝也必求其極致傳余操調嘗以幽逺冲寂之㫖語之當于其心蓋愈淡則人愈厭余將終老故山異日大章能芒鞋以訪一倡三歎之遺尚有以相告聲生於無形而悲愈感愕之跡畢具古人之事於斯者豈徒然哉因書以告之贈番昜筆工童生咸淳間湖州筆工馮生製筆得截法圓不至軟媚徑不至峭直一筆可作萬字馮生死其弟若孫漸變家法然猶有韻度近世子昻承㫖擅書名吳中筆工爭進技庭下率形製相類書不滿卷則已成秃翁蓋毫熟則易乏如脂韋之士寧復生氣子昂不言其短將以為彼養生計來亰師劉自謙編修以番易童生筆為贈絶類玉山徐氏舊製先正肅公平生惟用徐筆守番最久徐氏妙法豈童生家世能傳之耶梔蠟粉澤識者所哂譬如行車慎操其輈詭遇獲十蔑有效矣右軍製筆法傳諸葛氏嘗作右軍筆進栁誠懸栁不能用吾徒書記姓名童生之哂甚於諸葛願勉之三吳専利將却走以避峩峩清逺可用於朝審矣清容居士集卷第四十四
