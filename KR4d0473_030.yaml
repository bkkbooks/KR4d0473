body:
  text: 墓志銘墓表葬記附宣武將軍夀春副萬户吳侯墓志銘往者夀春為宿亳要衝犬牙相承城郭樓櫓移易無常所草舍殘缺狐兔出沒道途間築覆土窖以避妻子短兵迎接利不利不復計猶持農器治田壤惴惴求活嵗率如是世祖皇帝以天兵取江南捨兩淮為最後至元十一年冬渡江十二年平江東抵錢塘宋社告亡十三年兩淮爭奉地圖以降無鏃刃之費天下大㝎而淮始得為樂土矣當是時吳侯祐以夀春歸職方其子安民字惠卿侍父居顔行率部伍招輯潰卒控曹橋下獨松渡越江略㝎會稽台溫三城南踰閩嶺拔莆田擒將李雄生俘其守臣而以功歸其父二大帥曰吳氏子宜第其戰多别有以賞勵乃署千夫長十四年父卒始􅊞爵佩金符為管軍總管鎮揚州十八年大治兵伐日本拜疏請行授宣武將軍征東副萬戶領淮東西兵以先舟師抵其國八月颶風大作器械軍士沈溺物故袽破舟亂流以經海島高麗日本二國常不相能遇高麗邏人問所以載與還而先帝亦厭兵罷征矣二十年建黃華反奉命往討之至政和縣獲賊將度九峯嶺接戰益急得其偽署圖籍虜驍將以歸十有二月昧爽進軍平溪華盡死力拒寨赤巖山盡俘其器甲族屬黃華始平回鎮楊州二十一年省治杭州從與俱其年鎮湖州路南潯明年調嘉興路海鹽未幾復還南潯又還鎮夀春二十四年詔領軍討交趾至黃州罷兵二十六年鍾世明叛江西吳太仲叛興國縣搏竒蹂虛率以砥寧上功司勳輒卑退不欲言三十年移鎮和州大德四年七月某日即世年五十有七娶楊氏先卒子男若干人長繼武􅊞其爵葬于宣武侯之墓左曽祖某祖某妣某氏豫嘗聞古名將垂老呐呐若不能言祕畫勇略壯嵗所施無留藴閲成敗得失已盡醇酒鍾鼓夫豈託焉以自完者與烏江馬君某言吳侯知儒書後悟浮屠氏禪學充然若有得其女弟亦能為禪人偈語是皆世所鮮有者銘曰維昔淮甸徑雄莫侔一夫當百鋋戈怒投裹彼乾餱聿嚴盛秋養安懷慆苞桑靡謀天錫大帝神武興邦捨其喉襟投鞭浮江俘駑擒驍百城舂撞視彼彈丸後夫卒降桓桓吳侯效命奉職以其素能昭代著績褰裳先登飈掠電激或乘其巇或躡其迹瞻彼霍山雲流無蹤昔困于兵今黍芃芃繄帝之功維民之逢侯之幽宫松柏茂直告而孫子靡懈靡忒法其退謙恬靜以默我思于淮作銘示刻同知樂平州事許世茂墓志銘端平三年蜀破衣冠大姓順流下東南至江陵十不存一二皆舟觸巖崿瞬息以死淳祐三年蜀益蹙避兵來南其物故與端平無異宋主憫其流離悉擢列在位大者輔政機備獻納外為閫臣郡將經術史學四方取以為宗則宋既亡故國丗臣益困辱不自振淪胥泥塗非獨蜀士然也大德七年桷備史屬選與虞忠肅公孫集交許君松以湖廣掾上計京師詢其官簿則顯謨閣學士給事中少保諱奕之曽孫中奉大夫知紹熙府諡介節諱彪祖之孫奉議郎通判涪州諱長源之子君字丗茂懿範世則珠貫而櫛比語西蜀事歷歷在指掌清言雅儀筆札擅簡古卑讓耻與後進較酒至醉愈恭不復作世俗語遂締與之交至大元年授潭州榷茶副使再見之貌益溫論事盡繩墨智圓氣完欲以政理自表見故其為茶官也不務苛刻而課有贏羡仁宗皇帝立科舉以君考鄉試自喜曰吾嘗貢于鄉黜浮培實宜以稱明詔是嵗君所貢士入南省號為得人延祐五年授徽州路婺源州判官復與語輒愀然曰吾家繇開慶初辭簡池寓南康墳墓井邑生别踰五十年貧不能忘祿齷齪州縣弗得以文墨顯吾何為哉其治婺源益自振剔絶蔓探疑明以近民而盜迹不敢入境至治二年見其神益清貌益癯舉酒屢酌却雋永猶喜議當世事桷與翰林直學士曹君元用子貞共署薦為湖廣提舉儒學思以佚其老集賢直學士鄧君文原善之亦曰是舉誠不忝吾為江東分部使者嘗舉其政事文學矣十一月授承直郎饒州路同知樂平州事嵗終得上氣疾正月甲午終于邸舍年七十有二曽祖妣某氏祖妣某氏妣某氏娶趙氏再娶陳氏子男若干人女若干人孫男若干人始君居南康閉門授徒以奉母右丞燕公公楠開營田司知其賢取以為佐後遷行大司農益任之掾湖廣省六七年能以儒術輔法令事明理融無底滯固陋一時吏師尊禮之君始生踰百日晝夜啼不止有僧祝其頂曰汝為許氏子啼何為耶啼乃止未幾涪州下世年八嵗隨舅氏茶馬趙君寓江陵里有災能取涪州神主奉以逃稍長益自奮勵諸老咸器偉故晚嵗宦業雖不大顯而行事有足稱者其喪歸以某月某日葬于某原子踵門以廣信劉君光事狀泣曰願請銘桷泣相向不復辭嘉㝎更元韓托胄誅解偽學禁先少師正獻公曽大父樞密越公相繼入著作庭給事中少保許公巍科首班著善類肅穆天下傾動未幾少保論外戚不合去今幾百二十年閲昔時題名求其嗣續率皆澌盡銷鑠而桷與世茂俱為曽孫相顧自保灰編墜簡證世德之舊於世茂實有望今死矣雖欲勿哀其可乎銘曰蜀繇秦開踰千載底寧英光蜚聲山川耀靈漢魏啓伐不假以兵唐宋踵規開門晝迎錦楹繡墻夸浮日矜帝鑒地圖百神震驚氈車轟轟金戈晶熒自西徂東舳艫貫繩或沈于淵或疫以乘蹇蹇許公疑丞弗登是生介節嬰彼孤城恂恂涪州弱息慎承流離拮據守其書籯儒以飭身政以裕名匪急於祿抗宗希成凡我士族欒范是懲東南之區凜其春氷我思許君是用述銘任隱君墓志銘鄞甬東橫溪多郡宗故家桷之七世祖祥符丞而下娶婦皆楊氏少保夫人曰申國太保曰越國魯國太師曰齊國幾三百年矣楊袁為中外表嵗時往還無虛日而甬東任氏與楊姻婭亦十餘傳一日任氏子元善介豫表兄楊仁之以其先君子之狀求銘復録其十九世祖唐建州司馬逺之葬記以示其記曰建州生佶檢校尚書工部貟外郎兼侍御史是生崇試循州司馬循州生貞幹元和十三年補集賢殿供奉承旨後為越州都督府功曹參軍以終集賢生行規大中時以明經薦于鄉舉上第為蘇州司兵參軍吾里士族莫先於樓袁楊蔣作郡志者於任有缺仕莫榮於集賢承旨承旨布衣為者也職撰述校理在元和時任不輕畀司兵以明經登唐上第尤偉著志亦不紀考孫吳有任光任奕皆鄮句章人今其地為鄞縣則建州蓋二賢之裔而先賢皆遺軼比豫補郡乘亦缺然有愧矣嘗考大中以後鄞數為盜侵掠城燬蕩遷徙錢氏以宗親専節鎮租稅刮剝民不堪奉昔時故族躪藉銷鑠於任氏槩可見至宋受版圖興文儒鄞士在汴始盛渡江以南雲滃川湧幾二百年而不幸數十年詩書廢墜望塵執隸欲為任氏十九世之傳不可得噫可勝嘆哉可勝道哉任君名天祺字君瑞曽祖汝諒祖用康父逢龍其居鄉善保衛徴調數起先事以備縣胥不能高下友其弟天麟弟病酒死曰吾不可使弟無後殯其喪俟我死必俱葬也大德七年六月某日卒年五十有八未幾弟婦顧氏亦卒以其遺言大德十一年十二月丁酉奉柩與弟及婦俱葬于吳公山之祖塋妻屠氏四子元善可善承弟後達善兼善孫男四立道弘道鳴道原道孫女三立道楊氏壻也銘曰世胄日顛任譜完堂堂文藝志録傳昔通今晦理則然鄉井急誼手可捐金峩東聳下泓泉蹇極遇順盈百川我銘考官以昭先歷十九世緒益延焯哉任恤德靡愆率而雲仍亘千年史景賢墓志銘君諱韋卿字景賢鄞史氏故國世臣太師承相保寧軍節度使越忠㝎王諱浩為曽祖妣貝氏魏越國夫人太師中書令保寧昭信軍節度使衛忠獻王諱彌逺為祖妣潘氏齊魯國夫人觀文殿學士正奉大夫奉化郡公諱宇之為考妣趙氏高平郡主君幼成合矩度進退持奉侍立占對識者知真王孫筆墨書史椘椘自將皆有法郡公目送深念之稍長鉛采自陶寫蒼松斷崖昂然有遺世意宫商敷宣綵鸞詠而鳯幽鳴也退靜韜匿冥會于千載之上察其念良是矣郡公職二品君當以京官入仕生晚祿弗及至治三年秋八月得上氣疾却藥賦詩出别語於宗親桷時官京師呼桷子壦立牀下曰為吾語而翁求銘以昭吾志焉越翌日辛酉果卒嗚呼年甫四十有八章綬積􅊞隱顯有㝎數至於年亦不得永是可哀也已維忠㝎王桷外高祖幼習外家獻文世德相業焯在宋史不敢論獨敘三世夀考以增君之悲維忠㝎以三公居東湖三十年陪祠慶夀秀骨山立多士秉笏交語曰史太師真夀相年八十有九即世忠獻獨相二宗二十有七年總核庶政燭照藪納罔有缺年七十以終郡公恂退若癯儒厖眉素毫氷玉照焜鄉黨年七十有九乃終夀種彰灼若是君才不得一見施設年又不能以紹傳是大可哀也已子一性孫女二將以某年某月葬鄞縣陽堂鄉金嶴之原銘曰寥寥東陵瓜圃熟沈冥里閭企高躅達人知命化不恧手持參差入雲谷周公魯公儼𥘉服奉蓍以占剝斯復學詩習禮在嗣續我銘孔悲辭匪瀆佳城鬱蒼覘宰木袁州知事孔君墓志銘大德初元孔君昭孫明逺甫為慶元儒學正于時禮部尚書王先生應麟師表後進門無雜賓明逺以通家子執疑證訛桷每連席請益時則有教授某恣睢自負語侵先生乃憤然曰吾不能與之共處疏其謬誕十數事鳴于憲府人益奇其伉直有先中丞遺風是後為蘄陽教授蘄陽舊為邊障地君能化其俗使稍就學久之丕變為儒士皇慶元年授慈溪縣主簿郡人咸曰是斥故教授者飭躬以廉民莫敢病未幾江浙省取為掾會歲侵計富人籍田出粟以賑吏不能舞文粟悉入市其直輒減宰輔竒之延祐某年授從仕郎袁州知事秩滿泰㝎元年以疾卒時年六十有二君實孔子五十二世孫中丞為大宗傳四十有七世中奉公傳與其從子玠南徙三衢賜廟譜諜章灼而君之考諱某咸淳間為名太守後僉書樞密院事職進資政殿大學士而大父某亦贈太子少師諡文介曽大父諱某贈某官妣某氏某氏某氏俱贈郡夫人噫士常患為世家紹宗趾媺懼難以繼仕顯矣德不稱無取也言足以斥姦發揚剛毅是則於孔君見之仕雖不大振於孔君何憾焉豫嘗與君繇義烏同邸宿至婺學旬日危坐論古今各欲以名節相勉而懷竒抱介豫輒讓不敢今歸老田里期為全人思一見明逺不可得至是淇來請銘安得勿哭也已娶王氏前進士集之女男六淇淮繼兄後海蚤世涓繼弟後建德儒學正瀛慶元昌國州儒學正滸早夭女二適山陰王墉富春張順可某年某月葬葉水浮河原銘曰金剛而氷清行之成也白兮不緇德之貞也憤世嫉阿全粹精也謝彼戚施實蜻蛉也銘以揭之歸藏永寧也僉事范君墓志銘大德六年范君子誠為平江路經歷于時桷將之京師道吳其郡大夫疑忌事多不決范君抱牘堂上㝎可否大夫頷領不復有異議人皆曰是真贊畫才嗣後為掾中書仁宗皇帝在東宫興崇禮文廣廟祭凡視執政者率增贊書桷時日具紙墨君排剔研討使各中繩式莫有訾議嗣爾厭繁劇告外補湖州推官又為黃巖州州與鄞相犬牙治迹賢否嘗耳接巷議州民來鄞必曰吾州黃氏子號豪民范侯能挫抑之帖首受罪後豫直集賢黃巖之儒生暨商于城埛者咸告曰黃生易黃冠訴范俟以不直遂議于大學士郭公訖不受其説精神籠絡貫穿于儒術法律將大展其用而其子景文踵門泣以告曰先君之不祿在泰㝎二年閏月某日得年七十道逺不克歸葬以是嵗二月某日與大父奉議君俱葬于平江路長洲縣武丘鄉白蓮橋之北原知先君莫如子敢以銘請謹按君諱忠其先京兆藍田人後籍真㝎今三世矣其為仕首受史丞相之孫耀辟為浙東宣尉府掾改受蘭溪主簿再辟江浙行省掾乃授平江路經厯又授揚州路經厯不赴改辟都省掾授湖州路推官以選能為海道府千户分治四明知台州黃巖州英宗皇帝詔風憲舉守令再知徽州婺源改同知福建轉運鹽司事泰㝎元年擢僉江南浙西道肅政廉訪司事其簿蘭溪嘗攝尉事捕造偽楮當受賞君謝不取在湖州有訟弟死非命且疑弟婦受賂焚其尸君録囚考弟實以鬪死婦始得脫湖多淫祠毁三百六十以治官舍分漕四明首拓廰事嚴竦治具新天妃宫以肅祠使其治黃巖黃氏事最著正彛倫絶攘奪尸祝口誦宣著于郡乘婺源俗尚競渡易其舟為浮梁民不病涉在閩中鹽足於民而私貿者悉絶考其所居官興建鋤擊為己任絶功利守名實為君素志迄不展大用夀與祿不失其願亦可無憾矣嘗鑄禮殿祭器書二千卷歸于鄉學集賢王公仲常為文以美篤于慈孝頒宗録孤故贈禮部郎中白公某壯嵗深奇之妻以女君感知已凡所為樂府稡刻以傳曽祖昻霄金大安元年進士官正議大夫同知靜難軍節度使兼邠州觀察使祖元泰元授從仕郎同知解州事父天祐汀州路經厯贈奉議大夫真㝎路趙州知州驍騎尉元氏縣子景文由臨安主簿辟江浙行省掾敏修善吏事其進將未艾孫二公琇公琰孫女五乃為銘曰吏詬于儒以儒為拘儒以病吏其刻莫渝據會統宗孰承其傳溫溫范侯趾媺紹先化其奇觚不急以干削豪翦強欲援以手謂不大逢亦既祿夀世方尚名我獨掎之彼喜以功縮武避之武丘之原松柏峙植魂無不之子孫承式鄭照磨墓志銘鄭威敏公驤以靖康虜難死同州紹興録孤褒忠賜廟愍節至于其孫建德登進士第延賞守祠世嗣不絶五世孫諱元貞實奉祠事生孫曰端是生汝賢為江西安撫司準遣生檜為都酒庫官君之父也君諱文瑞字子祥生而骨相殊特府君深竒之稍長從鄉先生課程文有能聲科舉既廢居里閭以孝謹稱至元間下令舉儒吏實預首選試郡功曹移典玉山郡侯復取自近省授監平江路倉轉海道萬户案牘官再為海鹽州案牘轉行省鈔庫副使平江庾氏嵗入浩夥不得脫君獨以治辦稱海鹽多豪民殺人率遣奴償死君能直之行省積弊楮三年不毁君上言申其數而嵗除之後取以為法泰㝎元年勑授將仕郎浙東道宣慰司照磨兼承發架閣豫見君于京師言議縝密剸割苛穴中綮節暨官帥司下帷沈思吏迹不入戶勾稽研核充然益有餘地古之善居官者必自持家始自衣冠丘墟不復給足荷戈負耒何可勝道念昔信實要衝君獨善理其身掇拾化治任能竭力相其天時權其贏竒卒昌於官以發其素藴是殆於君見之抑又聞之流光演休首於死節宋社云亡忠義之録一二僅見則威敏之澤雖十世未艾君續其承猗與盛哉其卒在泰㝎三年九月某日年六十有三某月某日葬某縣某鄉子男四謙亨復亨鼎亨泰亨女三嫁黃中正孫良玘葉原道皆仕族孫男七孫女七娶姚氏曽祖妣􅕋氏祖妣劉氏妣謝氏謙亨奉柩將歸里踵門泣以告曰先生故大門知官譜唯詳而吾里獲銘者數家矧先子丗系若是敢以請銘曰志專豐崇足昌其躬家傳于忠蹇事于公美玉􅊞之良馬縶之不泄不辱云紹以續作之怦怦承之競競而子而孫視我斯銘文清薛處士墓志銘孔子敘逸民謂其求志達道超然於塵垢之外心若稿木形若蟬蛻動莫有迹行莫可名其混世也物莫與俱冥神內觀返真潛虛若是者其近之矣故昔之善晦匿者草衣菲食不導引以夀養其天年恣縱泉石厯探逺挹興至而若遺擇幽潔以養其雅操求於世吾不得而見之矣今得一人焉曰處士薛君勉薛君信州貴溪故儒家自其曽大父子徹以儒科縣南丹大父琢父士亨繼業進士君益以儒自勵居鄉黨教授名不蘄彰沖然有容守約自裕遊湖湘極交廣返築室于宜陽納幽據勝為堂曰寶善以示子孫泰㝎三年四月某日卒年六十有八族黨姻戚咸會哭曰先生儒以紹傳兹其為文也宜矣固窮而無求貽書以遺後其得不謂之清乎遂私諡之曰文清子二玄羲玄儀玄羲與余為方外交在崇真宫數評議吾徒所當為事詞章清峭翰墨簡潔每視之嘗以為不可及君既死求銘於余實不敢辭在易蠱之上九不事王俟高尚其志而初爻則曰有子考無咎嗟夫離世絶俗念不存於家非子承意曷克臻濟是肥遁者猶相須以成也妣王氏配孔氏孫男二女一以某月某日葬銘曰冥飛維鴻莫窮去還飄搖長裾遊於海寰沈匿不羈謝彼世艱貞簡峻清玉雪者顔支離似困爰養其遁先賢高風承耳接論葆真藏名永裕嘉問振振有子益昌者名三光蕩摩服其粹精有大之松清風泠泠非培曷成非繼孰承海鹽州儒學教授袁府君墓表維袁氏四明大族繇處州太守諱轂試開封府第一登嘉祐四年進士第佐蘇文忠守杭文忠為同年生後贈光祿大夫生倉部郎中諱灼得罪政和以歸生贈朝奉諱埛朝奉生通議大夫諱文通議生龍圖閣學士贈少師諱燮嘗以禮部侍郎専史事諡正獻天下稱為潔齋先生桷七世祖諱玨試開封以中書守當官遷祥符縣丞生曽孫為少傅同知樞密院事諱韶贈太師越國公受學正獻公於宗譜為族子相踵登淳熙進士第同入祕書省為史官先後為侍從縉紳榮之正獻生子四人俱至名卿尚書東宫官而第三子最清顯嘉㝎七年進士第一再世國子祭酒仕至兵部尚書給事中實録史院修撰諱甫贈少傅諡正肅天下稱為蒙齋先生正肅次子諱徯通判潭州是生君諱裒字德平以安㝎長授海鹽州儒學教授未拜延祐七年六月二十日卒年六十有一嗚呼甲族鼎貴莫盛吾里甍棟接耀郡守丞監官議婚對未肯齒擬華腴爭高姿度悅澤可愛念遇大變故困辱不自完業無依歸貿貿以死者多矣方至元十五六年間故家猶亡恙海鹽時年二十桷年十四五移相議曰宦族久當圮宜蘄為傳逺計未幾正獻宅火留城南遂各盡晝夜濬源鈎思探索幽隱以黜陳辭為己任考閩蜀東浙永嘉湖南江西之儒先合其異同不在於貴耳雜書􅊞訛輯言行者尊之吾與子所當辨更二十年各宦遊四方君以憂窘困躓酒酣語豪卒不少貶折詩筆益溫雅簡潔察其學猶以昔所言自任桷繇集賢罷歸往拜焉病且瘠不能起忽手書曰夜夢遊南嶽署已判官遂釋之曰南正火也火為離為文明宜司以瑞太平今天子興文祿弗及其在乎子孫未旬日下世夫子作春秋譏世卿史非世官不能兩家子孫凡五為史官獨君不及用誠可憾曽祖妣邊氏秦國夫人祖妣趙氏衛國夫人妣趙氏封孺人子四曰霆曰杲曰鋭曰奫孫一人有文集若千卷葬在正肅塋十步邇乃表于墓曰桷備史屬號最久見秉筆者罔再傳獨東平王公其子文且賢纂修有能名嗚呼吾宗免矣夫君不得預為可吁厥子若孫永紹圖至治二年嵗次壬戌族姪具官桷表真㝎安敬仲墓表嗚呼金蹂宋踰南兩帝並立廢道德性命之説以辨博長雄為詞章發揚稱述率皆誕漫叢雜理偏而氣豪南北崇尚幾何所分别當是時伊洛之學傳南劒至乾道淳熙士知尊其説闡明之朱文公統宗據會纎巨畢備正學始崇又未幾偽學造謗咸諱其説以售仕于時金將亡各流離自保烏覩所謂經説哉有明其説者獨江漢趙氏私相筆録尊聞傳信稍自異流俗皇元平江南其書稇載以來保㝎劉先生因篤志獨行取文公書會稡而甄别之其文精而深其識専以正蓋隆平之興使夫道德同而風俗一承熄續絶不在於目接耳受而有嗣也劉既死得其傳者曰安君焉君諱熙字敬仲其學汪洋靜邃謂文以載道辭不勝不足以言理故其言修以立於詩章幽而不傷慕貞潔之實將以自任其道者也道散於異端九流證拾於墜簡傳者益逺而書幸具在不知而作者則索於句讀之末旨意斷絶踵謬而莫悟君設對問以辨後作者悔而焚其書左氏浮誕不合經者悉去之續皇極經世書繇元豐至至大三年考家禮為祠堂以奉四世邑人化之教人也持敬為本解經必毫縷以析果知之必驗其所行弟子相從者常百餘人出入閭巷佩矩帶規知其為君之弟子其於劉先生也未嘗一見之蓋篤信其書默求以通焉者也劉亦知君足以傳道卒不得見焉君深悲之而於學有似君無憾矣君之先太原離石人五丗祖玠仕于金曽祖升不仕祖滔以經童登第金將亡徙真㝎因居焉戊戌歲詞賦入等占儒籍考松江東宣慰司照磨妣劉氏君少敏悟諸父咸器之素多疾嘗避隱封龍山然卒不得年至大四年五月某日卒年四十有二娶張氏焦氏子二塈垣女一嫁保㝎等路鷹坊總管王沖是歲葬藁城縣安仁鄉先塋之側其卒也翰林學士王公思廉以書唁其父曰自敬仲死詎安氏不幸士林不幸矣有遺文若干卷既葬之十三年門人蘇天爵述其事狀踵門曰默齋先生天爵從學實有年先生之德之行願表于墓原使有考桷作而言曰真文忠公德秀與朱文公同里生不及事焉文公之學真實紹之侑食于廟于祠無異辭集賢劉公生愈後闡揚合一劉公功與真公並安君不得見劉公而道實有傳盛矣哉舂陵之學四方為有準矣某年某月某日具官袁桷表史猷父葬記代其子作大德丙午九月朔我先君子夀春推官卒于寢年七十有三越十月丙午葬其地邇高祖越忠㝎王墓次百步許先夫人郭氏卒葬十五年乃合窆焉嗚呼先君子諱徽孫字猷父少孤祖母嚴氏躬教督具諷先訓感悟于時史氏極貴盛夀春癯然整修奮棄子弟玩習搜紹淵懿族祖文靖公見之曰兒當以文名吾門稍長試吏為諸暨主簿從政精核邑長缺使者㑭治幾一嵗入辟淮東治田事調揚州司理參軍帥大器重悉以事付甫授夀春帥益取自佐循承直郎而先君子不復仕三十有三年矣有詩文若干卷晚讀陶靖節詩語近意逺視世德吻合深自慕擬平居無愠忤色筆墨清藝觴至輒就放邵子觀物為詩數十篇久更困約益以理自得清日危坐道舊事緩語不絶口鄉黨賴焉嗚呼公旦等五男子為從伯父從叔父後者曰公玉公謨次公晝公亘女三已嫁仕族浙西提點刑獄贈少師諱彌正為曽祖紹興監酒贈朝奉大夫諱實之為祖朝請大夫通判處州諱顯卿為父將葬謹書納諸壙張府君墓田記平章留守亞安公介其掾韓叔亨致命於袁桷曰吾外大父張府君世燕大姓貞祐來兵革相尋獨府君逃難脫死每言避兵本末輒吁歎涕泗且曰吾譜諜亡缺使果得仕吾安能為祖父榮顯耶繇是益治生自裕強之仕弗願也至元十五年三月某日卒年六十有七外大母劉氏次黃氏俱無子一女劉出也嫁我先公中奉大夫湖南宣慰使後以恤典贈金紫光祿大夫大司徒梁國公而吾母亦得封為梁國太夫人府君之塋在大興路大興縣宜泉里嵗時率外孫奠薦于塋下封植崇謹顧瞻咨嗟推其所自出其接于見聞者誠莫有怠也更數十年則曰禮有隆殺焉推服盡之義至於異姓則必曰先王制禮不可過也夫禮繇情生使張氏有後焉誠不敢越吾懼其塋域之蕪沒詔于曽玄將有以謹諸為我記之桷聞諸春秋會盟稱辭甥舅之國雖數十世猶徼福於先君敦敘之義蓋可考也掩骼埋胔先王之令典留守公之用心合於禮者之為也凱風寒泉藹然見於悽愴情之至也然則凡為子孫者寧不守其家訓也哉府君諱祥字瑞之壻梁公諱某外孫長即榮祿大夫平章政事大都留守領少府監行工部事佩金虎符武衛親軍都指揮使兼大都屯田事次某承務郎太府監左藏庫使次某奉議大夫太僕寺丞外曽孫凡若干人延祐四年九月某日具官桷記田氏先塋志太僕田茂實君秀與桷交京師相好也大德乙已三月某日其先君子諱某年六十有五卒于河南君秀墨色蓬首哀不絶道兼晝夜行歸治其喪將窆于大塋卜以不吉告越二年始得吉于邙山之白李莊乃徙武略君與夫人齊氏合葬以諱某君祔至大戊申君秀奉家譜言曰嗚呼先君子德豐而養薄孤之罪也田氏世居豐州有試金武舉科為環州司候者諱青金徙汴拜武略將軍總戎千夫屯鄧州鄧歸有元改為襄樊屯田官豐州墓夷徙始占籍于洛陽武略吾大父也先君子嘗言金將亡城郭蟻潰四出馬塵南驅躪藉爭死枯骼野磷千里一色豐州為路衝荒墟敗礫白日無人行聲自吾少年聞祖父言每震掉不自已今汝生盛明時重和纍休振纓清朝吾老於斯土藝于田漁于河㴠煦濡嚌食安閟華沒齒誠樂也仕何慕焉茂實泣受其言而書之敢以為邙山之塋志請桷曰噫夫邙山古之幽宅也穹隆袤廣可以數度自秦漢而降錮其封崇極于夸貴俠侈之士不知其幾後今變更高者為雲煙下者為水泉而慎終送死日相尋於此山愈完而愈新者何也夫貴以日計德以世計德足而貴不至者命也恃貴而忘德貴將耻之今君秀官于朝將貴矣念先君子之言警其宴安彌以自勵吾知田氏之墓滃然而豐茸必戒必護衍其子孫益守孝謹雖千百年無變而始田氏之譜者由武略愈逺而愈可考者由太僕其尚勉之哉母夫人高氏慈儉有家則君秀今為奉直大夫太僕院判第二德畯丗英葬以某月某日袁桷志高夫人葬記代作嗚呼我先考至元甲申嵗七月十有三日不祿昉時年二十有一平居嘗言吾宗丗居遼陽始祖當金時以征遼功封太師有子十人皆拜節度使金亡太師子悉散軼獨曾祖岢嵐州節度紹其宗是生大父諱植為洺州防禦使妣大氏夫人洛州生近侍局副使諱世榮副使卒吾時年八嵗妣王氏夫人寓殯于陜因家焉夫人鞠撫之迄見其成人初娶郭氏前元帥左監軍巨濟之女後來大名經厯孫用之無子察吾氣宇非凡近遂以汝母歸于我因㝎居大名而自洺州而下藁殯于陜者皆葬于元城縣之令公鄉焉先考諱昂字沖霄繇轉運幕職拜朝城武陟縣尉能以慈惠撫其民盜不敢犯後謝病退居樹德自祕重享年五十有九以終昉初掾集賢由院上中書自中書纍遷為左司郎中出為潭州路總管太夫人視聽明徹總核靡密昉盡服王事一不使亂其志意未幾入為中政院同知拜中書省參知政事尚書省立後除江浙省參知政事至大四年詔官二品得贈二代繇是副使得追贈嘉議大夫大名路總管兼府尹上輕車都尉王夫人追封渤海郡夫人先考贈中奉大夫參知政事護軍渤海郡公夫人封渤海郡太夫人皇慶癸丑昉升資善大夫為江浙行中書省左丞太夫人年益高屢疏終養延祐元年春復召為中書省參知政事奉夫人將北歸使者屢趣就道又未幾改拜集賢學士商議中書省事乃不敢辭遂侍夫人來京師是嵗十月十日以疾終于正寢享年七十有九嗚呼昉不孝先公亡恙時不能以祿為一日之養幸得奉先夫人以自慰垂三十年不自殞滅禍罹慈親攀號訴慕實無所容罪將以是年十有一月某日葬于先塋日薄未得謁銘于當代謹志其梗槩納諸壙男一昉女五人長適梁從晦大名等處管民提舉次適李允中萬盈屯丞二人蚤卒次適李好義承務郎齊河縣尹孫男三人筠孫夀孫和尚孫女一人孤子昉泣血謹志趙令人葬記代作嗚呼宰孫大父為郎時先子樂清尹始試吏部靜秀専恪鄞史氏號相家刑部再世國子生執禮秉度不以官簿矜許先夫人侍永陽王族屬崇近莫敢議昏對永陽尊刑部愛樂清遂以歸乃受封令人而始嬪焉夫人姓趙氏諱孟柔曽祖師意追爵於吳諡宣獻祖希邐掌宗正食于會稽夫人沖默謹視聽儀範不出屏閣相先子以和撫子若女無二意距先子葬始一紀夫人以殁殁時年五十有四嗚呼養不能盡哀未知稱乃大德丙午合封于樂清之兆而先夫人之亡適終喪矣痛徹于天彚事徴德將不懈有俟永陽諱與莫夫人為長女刑部諱能之夫人為冢婦先子諱普卿宰孫為孤子女一嫁趙孟貫是嵗十月甲辰葬謹濡血為之記清容居士集卷第三十
