body:
  text: 傳徐師顔傳徐君諱師顔字子愚逺祖天聖間繇太末徙新定故所居里以氏得名曰徐閈君始生時蓮出並蒂父母器之稍長讀經史心徹意領年十七授室君白大人當令兒從師外方乃遊三衢習進士業入宋太學程試甲乙表流輩性倜儻急難嵗饑日具釡鬵滿庭廡值父喪慨曰世俗飯僧為冥福吾當活餓者以報親是嵗就食者幾萬人太守楊潮南書以勵旁邑至元十四年詔用兵入南俘虜日繫馬尾疲弱棄道上春大疫饑民旁午君出粟募民舁骼坎瘞可醫食者親撫視以活遇一女子扶曳蒼然氣微屬問之曰吾三衢儒家女命載以歸稍長俾為士人妻客方達可館于君死已飭斂具其子辭不能行即指某地葬焉復嫁其孤女事繼母至孝一日妻治紉浣出微語君聞之自責不居內者幾月母言亡是叱妻具簪服拜堂下始復初外氏族黨嘗質田嵗久君束劵母前願奉田以償其承順率類此始為信州教授首言于郡復儒役七百人署所居曰道悅以奉母㑹母思歸即解去湖南缺提舉官集賢章舉之辭曰母在不宜逺游受湖州乃歸秩滿視資當入縣佐君言昔為太學諸生中繩墨始得郡博士博士古官何縣佐為復授太平路教授所至必先新學宫嚴餼廩安定胡先生墓浮屠氏將夷圯之君力復而致祀焉在太平時治丁蘭王祥諸祠墓于仁孝殆天性待諸生穆如也晚得末疾卒時年七十有四曽祖某祖某子男九人觀先卒頤為族弟仲龍後艮革為長興州教授節處州路教授益晉萃復未仕女二方丙子時游騎入人居大索二女爭死之孫男二十人女三曽孫男女三人所著有上饒集吳興集姑熟集北游録凡十卷大理卿陵陽牟公序其詩曰事親若徐積詩亦似之其子革留京師將歸泣言于袁桷曰先人力詩書宦不充其德遺行又泯遏弗表見革等何以自樹將乞銘于翰林學士廣平程公以表墓子為之傳藏于家其可乎乃弗敢辭贊曰周官以鄉三物教萬民任恤之道戰國而降挾持以干兾幾于靡矣若徐君者不翕翕以近名禮以為防恬然孝謹彌老益安子孫滿門殁猶有稱旨哉蕭御史家傳公諱泰登字則平姓蕭氏逺祖繇唐末遷長沙占籍廬陵太和縣代有吉士曽祖諱逢辰官至中大夫當開慶間以安撫使副守鄉郡兵至卒急羣議撤近郊民居為清野大夫持議不下城守兵去里人德之晚嵗築宅一區立田八百畝聚其族以教厚德衍裕生德安府觀察支使諱安中稱其先猷蚤嵗以亡德安生中順大夫瓊州安撫副使諱元永玉雪矜謹倜儻自榮是生則平方幼時頭角嶄異九嵗入鄉校治論語義屬筆精警稍長忽自悟儒以道得名事物險易當品節中理齷齪翦翦無益也弱冠試吏調永豐丞永豐多盜區跡巢穴僇之丞以治稱入京師授湖南儒學副提舉振直士氣使治靡密者不敢撓部使者徐琰竒之言可為御史府屬㑹徐為中丞亟力言遂僉廣東道提刑按察司事廣東介絶嶺海幽篁深水蠻獠縱恣郡吏私表裏聲言獠不可治白日剽劫子女財物公贈遺良吏清謹者皆避讓郡縣多版授官姦宄馴積莫問使者循行擇善地坐嵗月即去至則躬歷所部劾治與獠相根蒂及積貪濫者八十七人皆罷之减始興貢銀之半疏其可宜行于臺者凡二十便事廣東民繇是知朝廷有犯贓律焉初至廣時歡言獠寇入境亦欲以是嘗試一坐大驚徐曰督盜守令職署舍在是卒有警我輩何自即上馬出境軍將爭率兵以進獠乃退是嵗至元二十八年天子下議羣臣言按察官糜爛不任職更名曰肅政廉訪司遂以舊職解後新使者及御史咸言蕭按察治事才二百日所論按皆引直當法不宜以舊官同罷牘甫上御史大夫書牘曰須選用元貞改元成宗即位罷兵安南釋陪臣陶子竒歸命李衎為禮部侍郎奉詔往使之遂拜兵部郎中介其事眀年二月入安南世子遣僞署官曰太尉迎詔空首不至地因問何得爾僞太尉曰國世子未至不敢先以黃蓋二皂衣數十人清路入館世子髠首跣足率從吏百餘人至館門前問聖天子起居却立曰主上新即大位二使者辱入弊境道里勞逺秋毫無所取誠切感抃敢昧死願聞眀詔大意侍郎目郎中郎中前曰昔乃先王先諸蠻欵附朝廷録舊㓛將錫宥于汝小邦汝曷敢不祗畏畏克敬乃不墜厥命或少縱自恣天憲速罰弗敢逭宜肅恭盡事世子錯愕唯唯越三日備仗奉綵輿率朝服數十人導詔從褥道中行入其宫世子後從二使者授詔世子拜伏讀詔興稽顙曰小臣不自意獲寬大如是復命再拜遂定慰賀皇帝皇太后皇后表箋貢物儀注成禮乃還道繇思眀時思眀帥言石西州祿州皆本朝地為安南所侵幾二百里彼詭言山溪蠻阮盝出沒不相統虗文嵗往來無益至永平寨寨故宋戍兵遮道言實安南部領侵撓不得耕耨回首語陶子竒山溪蠻誠所屬奚號令不可止今已目覩當語而世子子竒不能對至是復命歸地蠻吏上下顧吝遂言吾非以侵疆來石西地不足輕重設奉辭致討汝何以自洗各屏息一口盡歸侵地故右丞相太傅公時治湖廣省聞復地亟喜之為設宴以勞凡安南所贈遺悉返之眀年遷連州又眀年改為江西儒學提舉儒者用廢已久新舊持短長科舉律令交排鄙不中節至則擇知名士禮致之導誘後生斟酌可能行者為繩凖省檄慮囚有巡官及富民殺人誘傭奴以財俾自誣伏獄屢閲無異詞徐跡處所及所持刃亡有獨引囚曰若是汝當死咸欵實得出㑹詔使按問諸道守令治狀使回丞相問官吏孰廉使以儒學官蕭泰登對四年僉嶺南廣西道廉訪司事海南都元帥薛闍干聲焰震海上多所為姦利不法立具章劾有詔雜治抵罪核殺無罪七人焚掠村堡二十四奪私沒奴婢六百七十五雜畜三千六百五十五過栁州出妖民誣詿者百三十七凡黜吏二百一十罷攝吏四十一六年進奉直大夫江南行臺監察御史分守江浙行省㑹嵗大饑吳流民扶曳滿道已定議出官粟守法吏言非朝旨不得擅語曰民命在旦夕後有詰責已捐資以償何害為行省吏牘積糅叢雜首尾銜絡搖手莫敢問時已得疾呼掾史詰難視罪輕重悉坐之又别為副書筆其事使後母有出入羣吏大驚是嵗八月疾漸革趣治棺斂手書屬其子語侍疾者勿宜受贈賻遂登舟不復言卒時年三十有八歸葬于其鄉螺岡門外配楊氏繼彭氏子男三文孫憲孫升孫女三大夫天性眀爽閲具獄率不為吏蔽探情傅意多所出活非曲假恩貸以自異重然諾容采精絢達官大人皆傾耳與論事或言太剛必折徐正色曰今世士無有剛果折何憂也長子文孫靜専自修留京師授翰林學士程公銘俾為家傳念與公同年生相後才一月薾薄不自振然職在太史筆削傳信惟謹乃弗辭贊曰大江以南號多公卿比數十年闊焉無聞者何邪官御史府靳靳五六人或以激毁或以愞譏獨蕭公精謹自持正靜益眀物莫能逃守儒知通据法不阿使參錯天下三年可成也年不衍用名益以昌何恨焉史母程氏傳嗚呼余嘗得三卯録讀之蜀禍之慘誠忍言也夫朱祀孫之死而復生也蜀民就死率五十人為一聚以刀悉刺之乃積其尸至暮疑不死復刺之祀孫尸積于下暮刺者偶不及尸血淋漓入祀孫口夜半始蘇匍匐入林薄匿它所後出蜀為樞密使嘗袒視人未嘗不泣下賀靖權成都録城中骸骨一百四十萬城外者不計嗚呼推是考蓋可悲也蜀眉州史氏由唐吏部侍郎儼從僖宗幸蜀因家焉其先墓在青神將二十世宋世號名族其出蜀也今唯居湖州一房讀其遺事益悲之史母程夫人蘇文忠公之母之族也夫人將携其家下峽江以槖金腰纒之兵暴至伏林莾與鄰嫗謀曰輸金果可生吾兒無資不復能出蜀史宗誠無噍類矣縱得生旦夕兵復至亦决死均死死以全史兒誠不恨嫗見身死為吾出腰中金告兒使速走須㬰兵果執母謝以實亡金遂遇害翼日嫗語于鄰告史氏兒兒年甫十三從草野得尸如其言窆以歸且亟圖其象識曰史光母年五十有四嘉熙二年十月二十有七日申時死兵難兒遂東南來占籍湖州刻意自奮以右科為浙東兵馬鈐轄鈐轄生子圭文嘉定儒學教授嘉定生子台孫某台孫儒術通吏文復有子幾人而史氏繇嘉熙至于今且四傳矣噫蜀繇秦帝入中夏至于宋凡一千五百餘年文物大盛絶不知有兵革一旦掃削殆盡迄今百餘年遺墟敗棘郡縣降廢幾半可哀也已可哀也已贊曰婦人內德不出門房中歌廢戰國而下俱不幸以著非得已也諱莫甚于死從容反復烈士猶難之况士女乎歐陽公傳斷臂婦人以愧馮道夫人以死傳宗承平世澤于是乎見作史者烏得廢諸延祐七年十月壬子前史官㑹稽袁桷撰孫孝子傳表厥宅里首于唐虞若是則失其本心者見于上古歟司馬遷傳貨殖滑稽或者譏其有激五典為治之本捨正而求異於世道何補焉晉唐作史始立孝友勸勵後世靡然嚮風深有取焉孫孝子楫字濟川世為保定雄州新城人幼倜儻讀書通大義其喪父也遵禮而不瀆後調宣德尹慨然曰吾惟母存何仕為不踰月謝去事母以上夀終而歸于田野者凡十七年兄蚤喪奉嫂彌謹卒為兄子授室姊贅李氏于家三十年將異居營近市髙燥以奉姊姊大慰喜録其孤有成性重然諾不自表襮有故人喪至日將葬適以故不及送抵暮促騎以往夜已分一家大驚其待友也有挂劔之義焉其居鄉隱約自持鄉多宦家絶不通問鄉人咸曰此孫孝子居也卒上其行于朝表其門閭始為燕南府史録事襄陽繼授宣德繇宣德名始著調興和路經歷改河東憲府屬又調濟南卒拜監察御史今為浙東道廉訪僉事其行事不阿多可紀余獨著其孝行于父母兄姊朋友兼盡故特書太原郭幹卿嘗曰孫濟川少嵗能以其妻奩物償父兄逋一難能兄無子買妾以奉二難能郭靳許可今考其行信然前史官袁桷曰曩在史院時嘗纂次世祖以來功臣列傳考實録所著旌表令尤諄切至作隱逸孝行訖未有章灼篤實可以詔後世若孫孝子允其人哉韓威敏公家傳公諱政字君用姓韓氏髙祖諱天麟知金臨潢府有惠政民祠奉之卒葬城南因家焉曽祖諱垂髙州節度妣李氏祖文卿知耀州妣孫氏貞祐避兵南遷臨淄今為益都人父松之膂力善戰四駙馬募兵南征與之俱至下邳主將竒其勇俾率益都兵戍山陽戊子嵗攻宋揚州殁于陳公時年五嵗妣劉氏挈以家山陽眀年益都為皇元所破淮南城守爭遁去劉氏走奔莒居熢火山劉母家沂州其舅業醫命習之盡得其術復遇一醫繇是益精稍長猶隱醫以自活山東連嵗大擾入于汴復歸臨朐又復還青社時甫弱冠見叔父順始得拜淄州諸塋乃復從軍取海州掠東海破漣水皆在功簿塔察大王鎮遼東召公以從至于龍庭與議事不合卒以其嘗所計畫者告于世祖皇帝遂悉以邊陲大事委之至元十三年討西羌相威國王領兵即授嘉議大夫漢軍元帥監軍事佩金虎符軍中大驚曰監軍非國姓不得領裕宗在東宫心亦疑㑹入辭命以鎮庫弓挽之彀而復引者三始曰大帝善任使若是賜金錦衣一以行西入大磧斬馘凱聞還軍至臨潢得拜祖墓其碑記猶在十五年立五衛首授前衛親軍副都元帥指揮使復兼領左右衛屯田軍馬紀律整遏卒莫敢譁奏以屯田各歸于衛而治其無良者則諸衛各有統屬上從之秋繕修大眀殿以治具稱十九年加正議大夫充樞密院判官二十年進治書侍御史二十三年改淮東道按察使善决事有拾遺者告于其所失輒誣以金公遣拾遺者而叱去之商人暴死于旅邸疑邸人殺之驗其嗜炙有毒邸人得釋其餘行事往往與傳記相合常出能吏上薦士十三人率致位通顯在御史府定議盧右丞牟利罪卒流徙之二十六年卒于官年六十有六葬于某鄉贈嘉議大夫部尚書上輕車都尉南陽郡侯諡威敏娶孫氏表氏石氏殷氏男八拱承務郎廣州路增城縣尹次振摶奉政大夫慶元路昌國知州拯御藥院副使次撝皆蚤卒次揆扶持女十人孫男若干人摶之治昌國也興儒學建三皇祠嘗紀其美績且命作家傳讀其隧碑􅊞慶趾媺有自來矣贊曰貞祐兵興中原士人無噍類獨臨潢以遺愛祠葬兹土三世牧守至于曽孫死事有光威敏是承北省臨潢南保臨淄難矣哉政合古先不茹不吐子孫繩繩宜哉有元開府儀同三司上卿輔成贊化保運玄教大宗師張公家傳公諱留孫字師漢系出清河東武城張氏留侯良之裔孫歆為司徒歆弟協為衛尉生魏太山太守岱自河內徙清河七代孫彞徙魏州昌樂為後魏侍中諡孝侯子始均復諡孝侯孝侯生晏之北齊兖州刺史生䖍雄為隋陽城令是生文瓘相唐髙宗子潛揚州刺史揚州生㝏為杭州刺史始居江南至公十五世今為信州貴溪縣人曽祖宏綱集賢大學士光祿大夫柱國魏國公諡安惠祖粹夫金紫光祿大夫大司徒上柱國魏國公諡康穆皆以公貴贈父九德太中大夫同知江東道宣慰使司事纍贈開府儀同三司大司徒上柱國魏國公諡文簡公兄聞詩學道龍虎山見而慕之遂服道士服以漢天師所傳授游江淮間儀觀頎整見者尊異成願受其說有相者曰當貴極人臣而清竒絶俗視陶弘景葉法靜殆將過之世祖皇帝平江南召嗣天師宗演選公從行北方地髙寒皆不樂居中遂委任其事門室清泊處之晏如也世祖祠幄殿裕宗入侍風雨卒至召見于上見其貌異常士而奏對簡異益器之風雨隨止遂賜廩給裘服俾嵗從北巡上與昭睿順聖皇后駐日月山后疾甚召至命愈其疾若有神人獻夢于后遂愈上大喜命為上卿鑄寶劒鏤其文曰大元賜張上卿敕兩都各建崇真宫朝夕從駕日昃命衛士提輿以歸內侍强登輿謝不受即步出禁門十五年加玄教宗師授道教都提㸃管領江北淮東淮西荆襄道教事佩銀印眀年奏復宫觀令自别為籍有獻言者道藏經多殽雜宜焚去不録遂密啓裕宗黃老書漢帝遵守清淨嘗以治天下非臣敢私言願殿下敷奏後上大悟召翰林集賢議定上章祠祭等儀注訖行于世十七年奉詔祠名山川給驛馬五十令訪遺逸以進敕輔臣設宴崇真宮復餞于國南門外回朝以所見聞剡于上上悉用之十八年七月皇曽孫生是為武宗上命擇嘉名以進是嵗分翰林集賢院為兩道教專掌集賢始自公議二十二年仁宗生復召命名今二帝廟諱雖用國語皆以公名義釋之二十五年預議集賢院賜七寶冠金錦衣玉珮珠履二十八年丞相桑哥敗上欲相完澤穆卜之得同人之豫公曰同人柔得位而應乎乾豫利建侯同人為得位豫為建侯彖傳之辭也陛下所擬為無疑未幾拜完澤公為相後卒受遺輔政二十九年開通惠河上問果便利對曰漕為國本孰敢議非是誠減民力取實效民必趍之繇是河役卒不為民病三十一年上不豫遣內侍諭隆福太后曰張上卿朕舊臣必能善事太子太子繇軍中歸即帝位是為成宗皇帝成宗慕道家說蕆祀彌盛在宥十年嵗輒祠上帝侈甚祕祝御名皆上所自署後有白鶴翔雲中命詞臣叙紀付史館元貞元年同知集賢院道教事大德三年加大宗師别給銀印視二品上御便殿命講南華經七年上京旱兩京山西地震復命祠祝謝曰祠祝實臣職祭不欲數地道主靜厥罰惟暘見于五行傳災繇人興願應天以實布德賑惠臣敢稽首以請上深頷之八年上御玉德殿賜玉冠為夀十年制授上卿十一年興聖皇太后自懷孟還宫武宗即位加大真人知集賢院事至大二年領集賢院位大學士上是嵗再加特進時仁宗在東宫進講老子自是入侍必賜坐皇慶元年錫號輔成贊化二年命將作臣製玉刻文曰玄教大宗師手授曰以是傳教俾永逺延祐二年羣臣侍嘉禧殿上曰先朝備陟降持保無瑕缺者孰在咸未有對上語曰張上卿其人乎衆唯唯遂制授開府儀同三司號加保運四年以七十特敕設于其宫伎部畢列宰輔以下咸奉夀復命圖像鎮崇真宮賜璽文曰皇帝之寶命翰林學士承旨趙孟俯為贊兩宫傳賜翌日入謝俯奏曰臣際遇纍朝惕惕顧念罔有替今年且衰耄不去辱聖世願歸老鄉里即死且不朽上不允七年英宗皇帝即位遵纍聖優褒禮再降璽書至治元年益求去十二月壬子酌酒㑹弟子少頃入寢室修靜端坐以化斂之日顔色完好舉體如蛻羽兩宫震悼賻贈有加宰輔至于士類咸曰福人逝矣傾城耄稚則曰善人亡矣皆弔哭盡哀及啓靷木氷載路觀者嗟愕始從日月山世祖即命公為天師却立以謝曰嗣天師漢張陵之裔今居龍虎山願正其傳繇自三十六代嗣師宗演至于今凡四傳皆公所匡翊美鬚長大癯然冲退不擇貴賤傾下承接奏告廣殿音聲激鏞鐘聞者凜竦賚錫無虗嵗未嘗奉已屢錫田園以食其徒當至元末嵗成宗新嗣位時宰不快于御史臺成宗是其言讓責中丞崔公彧崔懼問䇿安在曰當見丞相釋所以遂與俱詣相府相怒霽又與同謁近臣言御史臺世祖皇帝建立專以懲姦慆勢尊則綱紀眀削之則臺不能立矣近臣大驚入言于上眀日大宴大眀殿諭崔曰臺為朕耳目朕曷不知憂卿等不職故告諭宜勿懼其盡心焉朕行為汝增重矣崔頓首拜手謝其彌縫國體婉順若是至於排解薦助人不知所自亦不肯自以為功絶口不言朝政貴客至爭短長酒盡三爵即假寐客去禮復初暨喪還州郡縣接祭以俟今葬某縣某鄉祖師八人皆贈真人事在傳宗碑今嗣玄教為吳全節授特進上卿玄教宗師崇文弘道玄德真人以真人佩銀印者三人夏文泳江淮荆襄等處道教都提㸃曰毛頴達掌遁教事曰王夀衍領杭州開元宫以真人制書命者三曰余以誠領鎮江路諸宮觀曰孫益謙領杭州佑聖觀延祥觀曰陳日新承詔興聖宮以璽書命者九曰何恩榮提㸃信州真慶宮曰李奕芳提㸃南嶽廟兼衡山昭聖宫夀寧宫曰張嗣房提㸃潭州嶽麓官曰薛廷鳳舒致祥張德隆薛玄羲徐天麟丁應松皆奉兩宫崇真祠事其它弟子三十有八曰上官與齡何斯可彭齊年薛起東李世昌陳彥倫詹處敬于有興王景平蔡仲哲彭堯臣張汝翼馮瑞京祝永慶蔡允中張善式董襲常王國賓曺載靜余克剛丁迪吉張居遜董宇定王用亨張顯良徐守勤彭一寧劉若冲彭師尹張逢吉趙有立程某施某葉某童某倪某上官某李某公兄子榮祖弟子熙祖亦以公故入宿衛榮祖為邵武路同知熙祖為衢州路同知泰定二年今上召全節曰玄教汝祖闡立其為朕祈永遂大祠于長春復追贈某官前史官贊曰世祖皇帝闔一海宇搜遺逸選藝能靡然踵來江南持政柄者不一二人卒不能善終何哉在御三十四年命相幾二十餘人或解罷或斥逐獨張公無少疵病目覩成敗至于五朝難矣哉蓋其行無迹曲焉以全得老氏之旨五福斯備前古鮮著詩云昭眀有融髙朗令終張公其近之拜住元帥出使事實至元二十九年今浙東元帥拜住公奉世祖旨以行軍招安使從征爪哇于時髙王二將為蠻兵所圍公深入拔圍出之元貞二年奉成宗旨使西域哈贊王愛其才以尚衣職行軍有戰㓛賞金符金帶因令其入見于成宗復賜虎符皇慶二年仁宗以金印賜丞相孛羅且俾往哈兒班答王所議事至中途遇也先不花王疑有間諜執以問答曰今上所遣不過通嵗時問禮曷有他意王左右曰使者往來皆言有啓邊生事形迹汝此行宜得要領可實言否則搒掠汝亦必言遂命跪大雪以問且搜其衣中無所有公曰王所問實不知且王從何所得是議王曰阿必失哈至是嘗言之且曰哈兒班答王上近支也吾等族屬存與留不可知後使者至必有處分今汝往彼必生事速吐情以告我曰王擁兵遮道使者急求去多詭辭以脫阿必失哈曷可信左右曰彼統軍九萬寧肯不自愛惜詐言以求脫遂縳公兩手納諸股擊之乃曰有璽書具在使臣往來有後先拜住萬死實不知取璽書視之始曰彼果無罪遂奪其虎符及丞相金印拘囚王所延祐元年王興兵內冦復遣使召公至獵所曰我已入汝境土矣公曰兄弟之國無內外彼地亦王地王往何所疑王曰親踈既分釁隙已兆勢不得不爾公徐言在昔太祖皇帝西征有訓若曰人不可以信讒讒入則宗親乖離宗親既離則百姓他適將貽笑于敵國拜住嘗聞在成宗時先王有盟興滅國開關塞以安百姓今言猶未泯絶使者掉舌生異同令王致疑拜住等良不稱職敢叩頭死罪以請王解顔曰吾欲遣汝詣上通好何如公謝不能時有不內附者梗于路遂罷行復以公往昔拘所未幾王薨延祐七年弟怯别王立王召曰在昔先王嘗遣汝詣上前後不果汝今宜以素所具奏者以聞是年秋入朝上曰太祖造邦孔艱惟和好惇叙則宗支允寧汝其以元帥職名乘驛諭朕意王既受上旨拊膺謝曰疆宇寧敉自此始汝來何遲也對曰使副有疾在道故不得速進王曰來旨極善使他人來吾亦不若是深信大較使臣多擅增减致啓邊禍公曰拜住來途中聆逃人言且云復將有兵變拜住實不信懼王惑其言而行人之言不得信于上是為虗行王宜熟察善計慮拜住不敢他引古事為比維昔定宗皇帝征把禿王有滅國真薛禪使者諫罷征嘗喻太祖得國之本明配日月量侔江海合天地之大德故能混一海宇滅國真薛禪死已久拜住不才願踵其䇿以獻後王從公言奏于上訖如約以平王遂遣使收兵四境而少尼其行且曰邏者猝遇將害汝遂設宴三日給符信護行俾歸于朝至治元年三月抵上京入見于上而王亦遣使奏拜住兩為行人不愛其身隆爵厚職所不吝然除拜非吾所預為語朝廷大臣善奏于上使得享至樂建牙纛為諸侯表得矣是年冬丞相拜住入奏嘉禧殿具以功簿言乃拜中奉大夫浙東道宣慰使都元帥官既滿類集行事俾桷為奉使事實云前史官袁桷曰太祖皇帝經畫區夏以磐石宗犬牙于龍興絶域之地四履奠安盛矣夫疆域既廣詔旨上意傳諭失實則時致疑爭拜住公間關險阻百懾不撓義正功倍以數百語解百萬之師非精白一心曷底于是計勳上多卒稱其職俾後之為人臣者益有勸焉清容居士集卷苐三十四
