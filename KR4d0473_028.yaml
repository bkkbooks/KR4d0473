body:
  text: 墓志銘翰林學士嘉議大夫知修國史趙公墓志銘長作代院大德七年正月辛亥翰林學士趙公晦叔卒于官其年十月中書右丞相入對天子曰趙與􅝾事世祖皇帝幾二十年事陛下亦將十年敦確清謹今既死無以歸骨于里敢奏以請於是天子命有司賻緡五千復給舟車傳費俾其喪歸將行孟實等以狀來請銘復往歲直翰林公為待制其叙遷也亦相先後知公尤詳義不得辭方至元十四年間公以驛來朝湥衣幅巾見世祖于上京冰澄玉瑩詞氣整朗言宋亡根本所在親切感動世祖傾屬自是入翰林為待制為直學士纍遷為真學士公之為侍講也言江南箕斂急督移括大姓宋世丘壟暴露皆大臣擅易書詔明㫖又言庚戌嵗大霧蔽塞正月甲辰虎來西城其徴為下臣執權簸政言雖不行而公閉門待罪後司徒公俾同列諭意始復入署公每視職清望近思欲以言議質直理道確近條縷報上故所言嘗若剴切無隱而世祖皇帝沉幾先物神量莫測或為公懼至平章政事不灰木公為公奏私負嵗積皇帝曰得非指故臣為虎者宜官酬其逋别給廩粟布帛以養由是始知君臣相與吻合明著如是曽祖伯洙宋朝議大夫知南外宗正事祖師雍宋朝議大夫直寶章閣考希聖宋宣教郎史館校勘髙祖宗正某南遷時丞台州黃巖因家焉伯祖師淵與朱攴公纂次通鑑綱目凡例微言奧語耳受身履故公所行尤近嘗與許公仲平論伊洛閫域首言力行致知清簡惟高沉默自祕皆東南極弊攴以顯道捨是無以議許公湥然之至觀公待人愛士恩禮周洽不為疏數翕訿其持家簡泊無復商榷計慮非湥知道者不能也天性孝友自宗正而下四世力請于朝而復其役贖姻黨男女為奴而不能歸者凡十有一人始登宋辛未進士第為鄂州教授由鄂來亰師迄為翰林學士知制誥同修國史積官至嘉議大夫年六十有二其所成就不為甚過而公以榮祿豐遇為可愧不獲老田里為可恨噫公之心如是而已矣初娶夫人舒氏不一歲卒歸橐中􅏻于婦翁不取今夫人史氏三男子孟實以公為侍講時特官為承事郎同知瑞安州事孟賚溫州路蒙古學教授孟貫將以䕃入官以某年某月某日歸葬于黃巖塔山之原復嘗讀大雅文王之詩曰商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京以知文王之德之盛商士之恪謹溫遜䔍承天心維我世祖明德造邦式混區夏內外小大共為帝臣而公陟降左右承賚接錫終始若一至於不幸而死今天子復申命而寵綏之則公死猶無死也是冝銘銘曰祿不斂贏謀不課利我以其拙彼以其智衣敝策駑內澡玉雪誦聲清泠鏗出金鐵謇謇九關壬人殞魂維帝有訓四方于聞之身云亡之德不爽丘環麓茂一息以往繄畀之豐維時之通尚詔後人以封以崇奉訓大夫昌平等處屯田總管贈亞中大夫永平路總管輕車都尉宣寧郡侯劉公墓志銘太祖皇帝沉幾整武蹙金踰南乃肇㝎中原物土萌蘖橫出迭變莫能稱上意將草芟而獸搜之久而曰噫吾赤子也始料其民俾執藝丕作故家大姓爭占籍自詣遂得脫鋒鏑野處以居飭材辨器咸精其能而人益效用國以富強猗歟盛哉故昌平屯田總管劉侯之祖仁時為金軍器局副使治于汴至是率其屬徙北以行副使之考秉攴家河南世儒族讀書通大義審金將亡兩河大饑家故饒傾所積以食餓者或曰嵗荐饑宜善蓄以俟府君曰國迫民流旦夕當走守榖可乎守子孫可乎後副使由燕居宣德奉府君以養終葬于宣德為祖域首焉副使隨軍而北也諸匠官所領道亡過半獨副使整部伍工作皆完繕帥大人奇勉之曰吾當入白上擢以美官卒俾見太宗皇帝授諸路人匠提舉後升總管以終其配馬氏故涿郡馬令公之女孫男三人長伯英雲州判官季伯豪安平縣尹仲即昌平君諱伯傑字巨卿習土俗騎射尤善諸部語言初從其父至大興見尹郭汝梅郭以能理劇知名善鑒識一見即命佐麾下使候賓館使者鞭帽駢集指畫不可辨能悉其語意周折省約使各慰謝以去尹益取自近壬子春憲宗獵漷州柳林尹日扈從治供頓一日上問尹近郊嵗入州戶籍多寡尹愕謝莫對輒從㫄具對甚習上喜顧侍臣曰是人宜為官官寧有不能㑹供應官忤㫖受誅乃授警巡院判官即不避署事先白所司言京師號賈區奇貨善物可立致官減其直嵗盡且不與雖百置市令無益卒如所白而官取需始輯秩滿府咸曰捨劉君孰使遷本院副使再遷院使厯院四曰大興宛平易縣樂陵循撫慰煦倉卒泛索不假氣色卒不使煩擾事益以理古言京師號難治若內縣得一善滿輒蹈足以去君所為官凡七遷皆畿赤繁職使忤貴近一斥不復上驅民迎合將促數苛擾曷得更取迭用以自顯若是則其治狀可無愧矣其治樂陵也鷹房數百人從㫄縣來糗肉滿馬尾意樂陵可稱意讀令諭之召其首曰使果犯誠不貰汝卒避去推樂陵所為政其治它縣與府院蓋可知也後為昌平路屯田總管積官至奉訓大夫卒以至元二十三年四月某日年六十有五其葬在大興縣招賢鄉烽臺村之原男六安易縣尉蚤世弼監太倉支納致事裕宗皇帝年勞補官積遷中大夫建康路總管府事佐承務郎同知湥州事敏從仕郎湥州判官敬承事郎藏珍庫使女三長適幽州賀進次適承務郎尚舍監丞蕭某次適嵩州判官田從義孫男九可大將仕郎同知馬籠州事可久蚤世可浩崇祥院尚印可任幼事東宫進義校尉行篋司藥局副使可復可真國子生餘尚幼孫女五長適安平王某次適幽州郭炫保㝎于傑幽州朱棟蔚州宋某延祐中贈典行致官三品得贈二代始追封亞中大夫永平路總管輕車都尉宣寧郡侯夫人宋氏宣寧郡夫人而祖父亦贈中順大夫宣德府知府驍騎尉宣寧郡伯配某氏宣寧郡君桷往與太常博士楊君宗瑞游過其孰見劉氏諸孫齊襟受經雍穆有度而建康公禮法自持未老倦游肅然以門戶訓勉今觀博士行述儒素之積實由河南來禮不忘其本遭時熙明將於是乎振遂不讓而為銘銘曰巍巍元后成玄功鋋戈誕指中州從麏驚鼠竄耄與童土金石木獸草工各飭攸職程作供徙彼儒族漸徑雄敹甲奉貢朝紫宫語言清琅纊耳聰指掌代對剖臆胸天府赤縣更選庸貴瘖獷伏氓顒顒游刃不缺至理通大椿靈根壤墳豐美蔭蔽芾宏閥崇鑱銘堅珉德彌隆將仕佐郎信州路儒學教授陳君墓志銘大德丁未余供奉翰林與廣信陳志仲游粹然以容慎密不妄言間語昔時祖子孫家慶故事志仲莞爾言曰吾大父迪㓛君大母程夫人罹兵難時年七十餘我嚴君衛鄉保入侍二老人嬉戲盥饋奉禮如昔迪㓛君年愈髙别築華山梅堂以奉益不復知有世事于時諸孫實五世矣迪㓛君號南隱翁翁終時年九十有四方南隱翁無恙時諸父皆逝唯吾老人力整門戶訓兄弟子後以儒術興者凡若干人幸為我記華山焉己酉歲秩滿南歸余師剡源戴先生教授信州亦還言廣信多郡博士獨陳博士溫讓材智䔍素慎行為第一方有司急庸調徴儒生幾二千人能力言而盡復其役汝官京師有名敏學字志仲者其子也與之游乎未幾志仲以信州教授致仕命歸榮其親後為宫師府司經典籍稍遷太常留錢塘遇之則又曰吾親年七十時嘗為書授敏學曰年至而仕非古也壯者必仕仕不求祿養吾視大父年不敢跂幸氣血康完若二兄恂恂善持家勉若以仕勿懼也皇慶癸丑余復入史館志仲則以太常舉將為博士冬十有一月訃至凡所與游者皆入弔越三日凶服踵門泣不能言以國子博士虞集之狀授桷㑭為銘君諱萬里字德甫弋陽縣人幼善屬文長從工部侍郎韓公禾學詞章起居郎徐公直方受理學謝公枋得張公卿弼植志節咸淳癸酉薦于鄉後起家廣信書院大修燕居堂面帶湖立諸生論古今成敗道理遺言微㫖文質益損皆口授手畫諸生不忍去請于官留帶湖凡十年南隱翁卒學者咸㑹葬焉雅性寬厚善清言與人交久而彌䔍歉嵗疾札發粟施藥以全活家多書讐證成善本謂諸子孫天佚吾老吾遺爾書守儒為凖守身為本餘何言哉壯嵗慨然慕詞學故於章啓語尤精噫方宋攴治時立博學宏詞科番陽三洪公周攴忠公迄致清顯至吕成公真攴忠公闡正學彌貴重真傳諸徐鳯徐鳯傳諸尚書王公應麟公曰中是科者實有命晚嵗問難無以承諸生徒自辱爾桷聞是語愧汗纍日今幸與志仲交意謂從廣信山中論竟斯道今不可得矣屬纊之日戒勿用浮屠事實以九月某日卒得年七十有六以某月某日將葬于永年鄉之吉田曽祖謙道祖應隆考文光即迪功君也長子誼次天驥皆為郡學官先娶程氏出次敏學將仕郎太常太祝今方氏出女三長適方晟次徐某次方天祐孫男七人長師中第五孫弘為大都路儒學録孫女五人曽孫女二人桷嘗謂士患不得名巖居谷隱一時推可多任俠尚輕重若先生者休然養名平進安時鄉閭化之郡縣企之孫曽承之殁有餘德古所謂鄉先生者陳氏之門見之矣是宜為銘銘曰日劬其躬以濬其逢不逢樂天修齡以終帶湖之徒來㑹幽宫彼冽者泉樹之青松而子而孫慎其延弘式昭墓門百祀弗窮陳士直墓志銘咸淳三年浙西提㸃刑獄戶部陳公卒大臣以公清直挺著特官其子皓伯是曰貴白甫有子命名長曰紹廉季曰紹庭廉言清庭言直也壬午嵗余過奉化入其里居拜戶部夫人于堂下退揖貴白甫于賓次識二子焉其季紺頂斑襦眉目刻成燁然碧光流几席稍長羣諸生誦聲琅圓端默絶外嗜又十年貴白甫居徙江滸復入城僑館則季已加冠字曰士直神益完貌益整肅客侍立無倚怠退具醪茗動中周折不復俟指顧間從士直坐書室鉛黃森錯卷帙整束受業退暇琴清筆潤花竹手植如幢列人咸曰誠有子桷則曰是宜夀且傳噫世胄雕薾夸者馳侈靡卑者淪頽仆幼儀雅言耳目不相接垂三十年脫有能自樹植皆野人窶子椎魯不入繩墨獨士直以故家兒接受薰熟而貴白甫身教簡易故人皆愛士直靜且和足以蔚其宗余亦愛士直將挈而充之使益有令聞大德丁未余官禁林有言士直遵海東游京師遲之不復至已酉歸里貴白甫泣且言曰吾紹庭甫壯以九月某日亡矣其死也遺筆叙訣無怛語獨屬兄置後以慰父母明年春兄果得男曰鑄配汪氏遂育以成其言葬地在宅西嶼山以辛亥十有二月某日窆俾桷銘謹按官譜曽祖諱某宣義郎致仕贈朝散郎祖諱肖孫朝奉大夫戶部郎中浙西提㸃刑獄嗟夫世患不能持身既壯且修振衣康莊御轡逺騁其進莫可止輪揉軛敗卒歸于命貴白甫秉德師古迄逢不淑莫紓其悲以貌期稱余復失之天乎是果不可知也庸銘以慰而翁銘曰有燁者珠復沉于淵云誰尸之蒼蒼維天雲乘嶼山兆食歸復詔而兄子以衍以續戴先生墓志銘先生諱表元字帥初一字曽伯世為慶元奉化州人七嵗學古詩文多竒語年十三即加冠入鄉校從里師習詞賦輒棄不肯學諸父強之乃游臨安于時新㝎方尚書逢辰廬陵劉博士辰翁以論䇿表厲進士得先生程文大竒之咸淳已已入太學改嵗以三舍法升內舍生又踰年辛未試禮部第十人登進士乙科授建康府教授越乙亥嵗由建康歸遷臨安府教授行戶部掌故皆不就積階至文林郎大德甲辰先生年六十一矣㑹執政薦于朝起家拜信州教授秩滿授婺州以疾辭至大庚戌三月卒享年六十有七先生在建康時先處州通守是邦朝夕互還往先生眉目炯聳慷慨自奮欲以言語筆札為己任嘗曰科舉取士弊不復可改幸得仕矣宜濯然自異斯可也後二年失仕歸剡遂俾桷事先生始盡棄聲律文字力言後宋百五十餘年理學興而文藝絶永嘉之學志非不勤也挈之而不至其失也萎江西諸賢力肆于辭斷章近語雜然陳列體益新而變日多故言浩漫者蕩而倨極援證者廣而纇俳諧之詞獲絶于近世而一切直致棄壞繩墨棼爛不可舉文不在兹其何以垂後先生湥憫焉方是時禮部尚書王公應麟天台舒公嶽祥師表一代先生獨執子弟禮寸聞隻語悉囿以為文其文清湥整雅蓄而始發間事摹畫而隅角不露施於人者多尢自祕重不妄許與晚嵗翰林集賢以修撰博士二職薦論而先生不可復出矣維先子與先生總角相厚善暨先生登進士年盛氣邁故舊貶抑者不敢自進先子正色相輔復以不肖孤托于先生誘之迪之獲不失其身往嵗解官南歸於是先子捐館踰一紀矣先生始愴然曰先公之德幸勿墜嗚呼朋友道喪久矣過時而哀桷實何敢忘自昔孔門首分四科㦄代之士率不能兼有尊德行者後文學世嘗病焉先生為文尢多于忠厚孝悌之語後之纂言者其必有所考夫文以蘄逺果能逺矣而近者五六十年或止百餘年其不幸者又皆為水火燬沒亡紀使誠盡傳也則世有能名者不一二數然視今世焯焯所傳又皆無是事噫傳與朽始固不論也曽祖辛妣劉氏祖汝明妣鄭氏考灝妣王氏世多儒科伯祖杰端平初為宗學諭䔍厚為時輩所尊先生詩文若干卷疾革猶手加繕㝎以所居鄉名曰剡源集治窆張村葬以至大元年三月某日娶陸氏子男四初陽次紀後庚幼儒女四壻曰陸孟孫孫肖翁徐公說袁庚孫孫男女八始先生兩授徒于鄞于宣于杭其徒散處莫㑹初陽等謂從學最久而知吾父者冝莫如桷遂俾志其墓乃泣對不敢辭銘曰桓桓戴系立氏以諡信都九江集禮秉衛在漢國鈞守正忠毅别籍于剡貞德彌勵琅然孤桐不諂其逢浩歸衡門邈焉冥鴻二季重輝續其高風箋經暢隱雅言舂容厥壤犬牙㫄邑是著方門之支本茂葉附展世斯恭宗黌攸輔詵詵餘慶聿踵先武振聲鋪華先生是承有燁者光不竦不凌在泮峩冠掩耳以行曲裾長襜祇繫其亨千塗競訛一轍交走正歧前驅白首莫疚發其粹精如瘖脫口如轡在手如藥在肘屢躓于艱秉禮益間有泉潺潺有佩珊珊駕言東游曰知者天卒昌其文以終丘樊張原之柏先生手植彼高為南彼鬱者北告而嗣子以順以則昭銘墓門過者必式周隱君墓志銘先王盛時以三物教民六行之不修則設刑以糾之是六者切於人道之日用故嚴以為之防其理然也降於戰國彛倫益斁孝友著於列傳擁強資持短長縱恣郡國作史者復傳其事豈誠有激於世乎納粟之令行虛文益張實不見於鄉黨執筆以揚人之美不僞則佞吁可懼也矣廬陵曽君巽申與桷同在翰林狀其姻家周隱君之行曰君諱天錫字極翁吉安路安福州人曽大父大成大父宗元平實自持以纍舉恩授迪功郎臨江軍新喻縣丞兄九鼎䔍信行嵗饑能損粟直以售遇朋友急厄傾資解援裕如也牟內翰林領史事將薦以自近後不果文丞相信公靳許可扁其齊居曰信太學博士劉君辰翁實銘之是生隱君嘗以詞賦上轉運所江丞相讀其文奇之事親盡孝侍疾治喪悉如禮以遵父志其待於族姻洽於鄉鄰者彌有廣焉性不事表襮勸之仕謝曰吾求全吾初遂因以自號至元二十九年十一月年五十有二以卒娶蕭氏男長孺將仕郎征東等處儒學提舉孫男三福祺禎孫女四延祐五年四月甲辰葬柏溪之橫原讀其狀則知夫厚德之延非一世繼志紹聞久而彌光泉蹇於山木生於地磅礴鬱積有自來矣君之逺祖廣為南唐節度押衙積憲銜為御史階金紫唐廣明以來有是官曽君平居語不妄孫禎曽壻也曽之先君監察御史縣桂陽時為湖南主文實拔君為首選事可證若是銘曰有錦絅之有玉櫝之蓄兮續之是用榖之廬陵之原豐碑秩秩昭其幽光詞不以溢楊府君墓志銘江南官簿大家運統合一諸墜牒散流降不復可考或者謂聲聞詭激德不稱名馴致是理味其語淵乎有㫖哉箕疇叙五福首次以富終之以考終命而祿位弗叙若是則尸祿位者私善惡喜怒鉤名挈譽幸終其身其禍可勝道哉至治元年余校文南宫得一士曰張純仁廣信人也調鄞縣丞鄞為余里會謁告歸純仁踵門以其舅氏之狀請銘其氏為武夷楊氏楊由侍讀學士徽之翰林學士億顯後有徙信之弋陽今為弋陽人其曽祖諱嵩祖元龍考汝翼妣三世曰李氏程氏江氏考能詩有集曰醉吟李君明通叙之君名謙之字謙叔嘗監麻沙鎮後不復仕其所從師曰謝公君直純仁之祖教授君某其事親有誣其考以重罪君總角詣庭直其寃其居室銖黍充創使善裕其施于鄉損粟直以濟饑買田以助縣庠其宅南有重巖水石君能専美獨樂之其娶熊氏閫助迄成其家子三長昭德次拱辰先卒季進德孫男九孫女六曽孫一其生在寶祐丙辰卒以泰㝎元年正月某日年六十有九其葬在武石山噫所謂五福斯備者歟其自號曰謙山名字與號若不相捨兹其為延永也大矣是宜銘銘曰世以祿夸我弗企之積小以高莫或躓之峩峩長松美蔭日疏迄樂其全弗僣弗踰武石之山固爾體魄爰廣墓門過者是式劉隱君墓志銘五經之學由宋諸儒先緝續統緒詩首蘇轍成鄭樵易首王洙東萊吕祖謙氏後始㝎十二篇胡宏氏辨周官余廷椿乃漸次第書有古文今文陳振孫掇拾援據確然明白言傳心者猶依違不敢置論至天台劉君正仲諱莊孫始憤然曰吾不能接響相附和尊聞紹言各為論著不沒其實而先儒之傳益顯所為書曰易志一十卷詩傳音㫖補二十卷書傳上下篇二十卷周官集傳二十卷春秋本義二十卷其論春秋為魯史之舊是則發揚先儒之遺㫖喜著書能以詞藻達幽隱復為論語章㫖老子發微楚辭補注音釋湥衣考而其所為詩文曰芳潤藁凡五十卷和陶詩一卷噫多矣哉學患不博博矣其必不能有以精也士生于今㑹衆以合一由谷而之川川以達于海蓋其書具在獵英聚珍朝成夕上敏而求之者良不以為艱是則於劉君見之君少學古文湛湥隱伏不見其涯涘落筆數百語詩工次和愈作愈平順而幽愁感歎思其平昔狀其羇窘鑒燭清徹物莫有逃遁者性嗜酒不解治生業幼侍其父府君升自為師弟子從閬風舒先生嶽祥游唱和不輟空林絶嶂目接耳受一寓於諷詠晚嵗先會稽郡公延入孰教諸甥桷相與論經㫖往復不避輩行蓋君䔍信周官而不鄙每置議君亦不以為忤在太學五年不善為同輩文字不獲釋褐今其所為書先師尚書王公總而叙之大德六年十二月某日卒年六十有九娶王氏後七年卒子三長主一早夭次存翁學翁女一適董可傳葬于士奧之龜峯劉為寧海儒族八世祖世充為吳越王錢氏板授官閬風里有二劉曰和叔曰允叔於君為曽叔祖有文名不大光顯至君父子亦若是今遺書具在詎果無傳也邪曽祖某祖某妣某氏其子存翁嘗請銘以久官翰林不克為至是二十有四年矣今復有請愀然謝曰隱君振華續光將大有傳耆舊澌盡桷敢不自勵銘曰探微證墜前哲功後學剽􅊞誣顓蒙偉哉卓識合異同輪囷卷帙浩不窮冥􅊧玄象歌渢渢㺯筆為戲箋魚蟲辟雍三黜命莫逢紀述有在蓄極通墓門永揭昭儒宗曹士弘墓志銘褒貶論春秋解經者失之作史者祖之則益失其㫖矣宋祚㦄三百餘年經國之綱領治迹之盛衰實書以示後其義自見深文巧避多出其子孫而為國諱者掩而益彰沿􅊞不決何以傳信吾友曹士弘甫深憂之搜托遺逸不瞽於昔時之議論自成一家其貫穿出入年經月緯誅其私心附以㫄證莫能逃遁桷往嵗亦嘗以是自任故書燬廢不復敢因微言曰帝在房陵豈乾侯之例邪外大夫不書卒書卒者其是邪士弘甫撫掌大以愚言為然嘗約吾二人當必任是事嗚呼士弘甫今往矣以余之識暗志荒不復能有成矣士弘甫讀書目過即成誦理財飬兵禮樂刑政之損益折衷于古經而以通今所宜行者為之準其見于用也不卑于簿領而志足以展用取於友也盡其所長覆護以捨短故舉世一皆以為賢奉親孝事兄以恭訓諸生專席廣說耳領心會爭踵門受業後卒致顯仕初為郡史燕公公楠為大司農辟以自近㦄婺州純孝慶元丈亭廣德陳揚村杭村巡撿後入銓曹復授陳揚村揚村父老咸曰是嘗攝吾里者矣曹君善撫字今年饑必賑我我何之君諱毅武惠王裔孫五世祖某從隆祐太后辟兵過廬陵因家焉曽祖某祖某父某有詩集六卷祖妣鄒氏妣羅氏鄒氏以叔父某太學釋褐恩封孺人所為文若干卷纂言行編曰鉤玄凡五十六卷疾革命諸子曰必返汝祖母故塋吾魂氣無不之得地即埋我卒以至大三年四月某日年五十有二子男五人汝霖今為兩浙轉運司書吏汝舟饒州器資宣州皆以秀才舉馳以醫業入仕幼桐孫女一適劉某先卒孫男女七嗚呼人嘗恨位卑齷齪媚上甚則䇿功利以求進名在罪籍不自悔王公貴人持與奪生殺身死無足稱道較士弘所負所傳得失為何如也先師禮部尚書王公應麟為文餞之曰闕里高第冉有用矛樊遲為右士弘為此官文武同方之道也侍講學士張公伯淳則曰伯淳官慶元士弘在慈溪與之友不敢吏朱雲也汝霖汝舟皆能世其學泰㝎二年汝舟以書抵余求銘實不敢辭銘曰匏也不食我心孔悲聿求王明以䇿以馳輪囷知聞如山蔟雲纂史闡名不屑於文緝墜紹緒執筆是紀年不稱德傳世則偉作銘允哀以詔我同志陳縣尉墓志銘咸淳閲十祀諸縣獨奉化號多士流出入太學上南宫亡慮十餘人于時蜚聲秀穎㫄縣皆斂手避讓一時傳誦習讀謂清選不嵗月可馴致未幾皇元合一皆失仕歸里挾䇿授徒踈糲自給俱不能享中夀子弟不自振飭復歸為農陳君亦咸淳甲戌進士不自矜襮接幼待賤謙挹愈加混迹蒿翳不知其為故官而得年且八十有一有子漢復能以儒自守其視前數公良敻過矣君諱觀字國秀嘗調臨安府新城縣尉十世祖棠尉奉化因占籍焉子孫日蕃其最顯者曰太學博士著於君為兄博士倅二臨安君館于其家君之考承務亦在館既䇿名客館其兄復賀其父人咸榮之晚嵗足不入城府州爭迎致率諸生以請業君一至即謝去徜佯巖壑侍博士窮幽抉竒連唱屬和有帙曰棣萼集其自為詩文曰竅蚓集嵩里集延祐五年三月疾忽作猶力書中庸一章以授漢是月某日卒祖諱某妣戴氏以守節著事見州志考某承務郎妣臧氏董氏孫男二時說時敏孫女一已嫁次未行今葬剡源鄉畢駐里祔于曽祖迪功某之兆銘曰日垂崦嵫亦既見斗實命不逢怨則屢疚布衣便便迄享大年執其韋編戒子于傳維陳令族詩書是續作銘昭昭以告必復靜清處士史君墓志銘大德七年桷官翰林史先生以書見貽不獲領後二十年子壁孫橐其書藁以示反復痛悼䇿勵于桷為甚重今撮要而表之曰斯文剝喪餘數十年師表郡縣學者應格則得未嘗于其人後生不說學亦未嘗知學剔僞務實而挽之古子宜勉焉非可以虛談兾也又曰吾將死得子文表于墓桷拜手讀之泫然以泣先生於外家為舅氏猶記拜先生於獨善坊論宦族纚屬文詞顯著獨缺自吳丞相開新河有相者曰邇後當踵有之甥宜自重先生於諸經窮探微㫖證墜緝缺不溺於諛聞剖釋正大而折衷一歸於前哲論古今得失必探情僞以暴其罪正色憤悱若造庭而受其責也為文邃古不雜異說手抄口講更㒒不能以盡孝悌遜讓知其出自然也先生諱蒙鄉字景正生而奇頷秀目七嵗善屬文年十二入國子學通春秋周官經復兼詞賦江文忠公萬里常參政挺時為大小司成器待之咸淳元年登進士第授迪功郎復州景陵縣主簿吕少保文德帥鄂檄入幕吕命先生勉蜀帥溫和解正陽圍溫疑吕猜阻不肯發微語撼之即就道凡所需器物一夕以辦溫實先公帳下校卻立曰史監軍誠有子調穿山鹽場諭義勸輸戶不知有箠檟十年改江陰教授復改平江至是不復仕故其詩文多感憤自喻禮部尚書王公應麟嘗勉曰思深辭悲學陶靖節其得之維鄞史族號相門曽祖諱浤蚤夭贈中散大夫祖諱彌鞏司封郎中贈少師司封以儒學致顯當貴盛時獨卑退自持鄉人稱為獨善先生妣臧氏華國夫人考諱肯之中大夫湖北提刑兼知常德府贈太中大夫妣趙氏周氏碩人太中熟邊事折衝料變有大帥才時宰尼之太中在湖北時謁告歸省從巴川陽公岊學易春秋一年復歸國學乃中上第士常患固陋株守皓首不寤先生識足以窺淵懿經緯一原合師友之㫖老而彌實確而不懈故其成就若是自號靜清晚嵗罹厄窮講道不輟從者益衆天台多名山心樂之僑居者八年大德十年七月某日卒享年六十疾漸革語諸子曰我死必歸葬不能得資良纍汝汝有志其果能成也是嵗十有一月柩歸祖墓明年葬于陽堂鄉穆奧之原娶陸氏朝請大夫將作監合之女子壁孫墓孫坒孫臺孫女伯佺適葉信公夢鼎之孫揆翁仲忱適紹興中書舍人潘公良貴之曽孫世演二女未行有文集二十卷易究一十卷託永逺於少賤誠不敢承命嵗月逾邁而壁孫能遵守不二奉遺言以請曷敢以不腆為辭銘曰貞潔陸沉志裂金石秉言無郵厄則孰職驥伏于襄不稱其德塊獨結約忿決胸臆持丸障瀾盡瘁不休卒昌者名屢空靡憂生為完人歸藏于丘有子紹學曷怨以尤清容居士集卷第二十八
