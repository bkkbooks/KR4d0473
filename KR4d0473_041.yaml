body:
  text: 議狀附進郊祀十議狀桷近奉勑牒受桷前件官拜命以來實竊戰汗自惟庸駑俚儒濵海蟄處平時所習不過以雕蟲篆刻粉飾其固陋誠不自意俾獲擢用捫心顧影愈積愧靦思欲上報朝廷之萬一退揆素志願以上陳竊伏思念國家車書混同之後聲文昭眀典章純備議禮考文實惟聖眀之大本觀㑹通以行典禮今維其時然因循有待幾三十年得非睹厯代儀文之繁縟費用之浩博故由是而未舉也桷嘗質五經之本文較羣說之同異自漢而下良由鄭玄注釋殽雜遂不得其當若郊壇神位之侈靡牲牢尊罍之加多又皆出于東西兩漢之舊增益愈繁而古禮愈失有司益憚其費而不敢議若嵗必親祀之說下至唐宋承平大盛猶不能一嵗一祀則厯代所行足以知非五經之正禮矣昔叔孫通奉漢髙㫖意成野外之儀獨魯兩生不至方是時承秦絶學使魯兩生號為知禮其𥙷亡正誤當不至如叔孫通綿蕝而已故儒先惜兩生之不來而復議兩生之迂介金馬碧雞之頌茂陵封禪之書桷雖愚賤度不敢為獨懷區區之說以陳者實以郊祀為國之大事不應闊略而未議方今翰林為清切之職典章文物悉自此成而衆賢肅和討論潤色不憂其不至謹獻所為郊祀十議以補缺佚偹皇朝之禮眀郊祀之本其亦有在若夫登降燔燎之儀禮文豐殺之異非十議所盡當别具以獻知其綱則其目可知矣將仕佐郎翰林國史院檢閲官袁桷狀郊祀十議序五帝不相沿樂三王不相襲禮所由來尚矣損益之道其㫖同焉嬴政絶滅三代典禮臆為之制禮經廢缺殘灰斷壁收合于西漢之世名為宗周而祠祭廣衍皆祖秦舊逮王莽尊信周官後漢二鄭申釋名義違異于五經者旁傅曲㑹皆得以合自漢而降言禮者悉本于此愚嘗紬繹經傳尊聞審問繄儒先是證郊社大典秦漢而下莫有疑義惟合祭同異其詳可得聞矣若郊非圜丘帝非天帝沿襲舊說卒無與正夫天無二日是天尤不得有二也五帝非人也然不得謂之天作昊天五帝議祭天嵗或為九或為二或以變禮者為正作祭天名數議圜丘不見于五經郊不見于周官作圜丘非郊議后土社也先儒言之而復疑焉作后土即社議三嵗一郊非古也作祭天無間嵗議燔柴古經之可見者也周官以禋祀為天其義各㫖作燔柴泰壇議祭天之牛角繭栗用牲于郊牛二合配而言之也禮成于周公未之有改增羣祀而合祠焉非周之制矣作郊不當立從祀議郊質而尊之義也眀堂文而親之義也作郊眀堂禮儀異制議郊用􅉝魯禮也卜不得常為􅉝猶至日之不常為􅉝作郊非􅉝日議北郊不見于三禮尊地而遵北郊鄭玄之說也作北郊議多聞闕疑先聖有訓私不自量揆妄為之說實有恧焉鴻藻碩儒洽通上下其必有以折衷而深證之大德五年春三月具官袁桷序昊天五帝議言昊天者有三說鄭玄六天之妄攻之者衆矣王肅謂祭天有二冬郊圜丘春祈農事若眀堂迎氣皆祭人帝厯唐而下則謂郊祀配天者為昊天眀堂配上帝者為五帝甚者因其說之不通併孝經后稷配天本文而非之其說紛雜良由天與帝之號不眀故耳夫在郊者謂之天在眀堂者謂之帝河南程氏曰萬物本乎天人本乎祖故冬至祭天而以祖配之以冬至者氣之始也萬物成形于帝人成形于父故季秋饗帝而以父配之以季秋者物成之時也胡宏氏曰天言其氣帝言其性其說是矣故由其在郊則以其逺祖配尊而無文之義也由其在眀堂則以其父配尊而親之之義也鄭氏六天本于讖緯攻之者雖力而卒莫敢廢漢魏以來名號不一漢初曰上帝曰太一元始曰皇天上帝魏初元間則曰皇皇天帝梁則曰天皇大帝至唐始曰昊天上帝從長孫無忌之議而廢六天之謬後復尊鄭而不敢廢者蓋鄭氏謂星經之天皇即周官之昊天上以合夫周官而下復合夫從祀于是郊之所主為昊天而其壇之二等復有天皇焉此存鄭之說至于唐宋而不敢廢者以此也王肅言眀堂為人帝者固非而攻王者未嘗不泥于五帝至以眀堂之祀五帝其來已久或者又謂禋祀五帝為祭天以此病肅然卒無以歸于一當之論愚嘗獨謂五帝非人帝其所謂人帝者五帝之配耳且五帝非天也新安朱氏之定五帝有取夫家語五帝之說天有五行木火土金水分時化育以成萬物其神謂之五帝而不敢加天以混之唐永昌之勑亦曰天無二稱帝是通名承前諸儒互生同異乃五方之帝亦謂為天自今郊祀唯昊天上帝稱天餘五帝皆稱帝證以二說則六天之說不攻而自破五帝之誤可證而不誣矣獨黃幹泥夫鄭學謂饗帝于郊而風雨節寒暑時非人帝所能為殊不知五人帝者若太皡是也五人神者若勾芒是也今以五行之官名佐成上帝而稱五帝何憂不能寒暑節風雨時獨不可稱天帝以混夫昊天上帝之號耳陳祥道言五帝無預乎昊天上帝其說良是而下文言上帝則五帝兼存焉此亦泥夫鄭說又謂眀堂之上帝兼昊天與五帝而一之其說又不通獨三山林岊言古之祭上帝與祭五帝之禮以經推之禮莫盛于周周之祭上帝亦曰祀天郊祀之天眀堂之上帝即一也郊祀從簡為報本反始以稷配眀堂從備為大饗報成以文王配稷王業所始文王王業所成從其類也祭于郊曰天于眀堂曰上帝天言兆朕帝言主宰也周官先言祀上帝次言祀五帝亦如之謂大臣之贊相有司備具至其圭幣則五帝各有方色未嘗與上帝混同也愚嘗妄謂周官無眀堂郊天之文先儒必欲合于五經其說愈不可解天官太宰祀五帝則掌誓戒後云祀大神示亦如之鄭謂大神示即天地也是重五帝于大神示也五帝之說盛于吕不韋之月令先儒嘗言周官為戰國時書故周官之言五帝多于祀天而其禮之大者未嘗不與祀天並玉樂雖重于上帝而充人掌牲牷止于五帝小司寇之實鑊水納亨士師之沃尸及王盥皆止于五帝詩書所載未嘗有五帝之號尊上帝而黜五天帝要不為無據也祭天名數議天嵗有九祭鄭玄之說也何以謂之九祭祀昊天于圜丘五天帝于四郊復立郊祀眀堂而為二龍見而雩帝于南郊此九祭也王肅之祭有二謂天惟有一嵗有二祭南郊之祭為圜丘以冬祭其祈農事也以春祭謂之二祭梁崔靈恩宗鄭而黜王不過謂郊丘不可為一而五帝之祀同為天帝眀堂之不可廢猶大雩之不可廢也自唐以後非六天者皆是而九祭之名微與鄭異者則謂春祈穀夏大雩秋眀堂冬圜丘兆五帝于四郊為九祭厯代尊黜異同不過出于三者之說愚獨以謂其說皆無足取證鄭氏之五天帝不得為天前已辨之詳矣以圜丘南郊為二者分帝為太微為天皇而非昊天之本名也王肅之祈農事先儒之言大雩愚請得而論之按月令元日祈穀于上帝噫嘻之小序春夏祈穀于上帝祈穀之祭非郊與眀堂之比也善乎盧陵胡氏之論曰鄭謂此即郊按郊特牲云郊之用􅉝此云元日善日則不必􅉝郊特牲又云郊迎長日之至注引易說謂春分日漸長則此未春分也易說三王之郊一用夏正孟獻子云啓蟄而郊則此未啓蟄也獻子又云郊祀后稷以祈農事此不祀后稷而祀帝也足眀此但祈穀非郊天大祭詩云春夏祈穀豈謂郊乎先儒亦言祈者以民食之重有求于天不得與南郊眀堂並而大雩之祭尤不宜與二大祭同議按春秋之書雩旱祭也司巫女巫之舞雩皆不得已吁嗟乎而求之義其甚者則歌哭而請禮之變也爾雅曰雩號祭也春秋書雩之例三傳雖有異同大較紀其旱烖之極若昭公之季年一月而兩書焉足以見夫旱之極矣謂夫子紀魯之僣者非也魯之雩壇舞詠而歸者非歟又按鄭注周雩壇在南郊之旁則非郊天之壇眀矣詩之小序自歐陽氏蘇氏朱氏疑而去之者已久詳小序之箋則先已有疑于本文故其箋曰月令孟春祈穀于上帝夏則龍見而雩是與夫是與者疑之之辭也春猶得以祈穀言夏不得以祈穀言矣孔疏知是與為若不審之辭復引仲夏大雩以祈穀實為證是徇小序之失不若毛氏之置疑也祀天之禮有常有變有因事之祭若國故之旅于上帝師行之類于上帝天地之大烖疾病水旱皆不得不禱于天孰謂雩旱而可為常祭者也今定以南郊為一眀堂為二此為一嵗之大祭若祈農事雖非變禮要為祭之次者吕令固有議之者矣獨祈農于上帝誠不可廢而元日之祭不得與郊祭並故兩存而復議之圜丘議圜丘之名獨見于周官大司樂詩書春秋儀禮之所不載二戴禮先儒謂出于漢儒今不復引以周官考之圜丘非祀天之地其本文曰凡樂圜鐘為宫黃鐘為角太蔟為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至于地上之圜丘奏之若樂六變則天神皆降可得而禮矣函鐘為宫太蔟為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至于澤中之方丘奏之若樂八變則地示皆出可得而禮矣鄭康成釋以為禘祭又謂天神為北辰地示為崑崙厯代相承皆謂祀天于圜丘王肅之徒雖難鄭說能知禘之非祀天而謂郊即圜丘圜丘即郊其說牽雜而不能定愚按圜丘非郊也圜丘非祀天之所獨鄭康成言之既不能合于詩書儀禮而于周官復有所背以周官之本文言之止言于地上圜丘奏之不聞其祀天于圜丘也况大司樂前云奏黃鐘歌大吕舞雲門以祀天神奏太蔟歌應鐘舞咸池以祭地示夫祀天神祭地示其樂與圜丘所奏實異則當以黃鐘大吕雲門為祀天不當用圜丘降神之所而遽言為祀天之所也其祭地也亦當以太蔟應鐘咸池為祭地不當用方丘降神之所為祭地之所也鄭康成知其說之不通遂釋前天神為五帝日月星辰圜丘之天神為北辰後來紛紛沿襲其說而王肅六天之辨復泥于祀天圜丘之說不能詳眀其本文而折其謬乃謂郊即圜丘圜丘即郊故崔靈恩孔頴逹咸宗鄭而黜王夫大司樂既無祀天圜丘之文而鄭氏天神復釋為二有不待辨而眀按釋圜丘者謂為自然之丘非人力所為其說與爾雅合雍鎬近郊宜或有此若後代國都于平衍之地將人力而為之耶抑亦為壇以象之耶或曰圜丘祀天鄭康成必本于前代愚曰詩書易春秋儀禮之所無者不必信鄭氏之說本于秦始皇祠八神地主之圜丘又漢武帝作十九章之歌以正月上􅉝用事甘泉圜丘二者皆非祀天鄭氏隂取之而不敢眀證其事若謂南郊即圜丘北郊即方丘不知周官四郊非南北郊之郊詩書春秋之郊非圜丘之制不得合而為一謂祀天于圜丘者特鄭氏之說初非周官大司樂之本文陳祥道禮書謂祭祀必于自然之丘所以致敬燔瘞必于人為之壇所以盡文亦宗鄭之說而微異崔靈恩義宗亦宗鄭黜王而所謂郊即圜丘圜丘即郊之誤乃不能正其說厯漢至宋諸儒悉不過以周官傅合于詩書春秋滋以啓後來之誤故為之辨五峯胡氏非圜丘天神降地新安朱氏亦疑大司樂本文文集示出見后土即社議周官無祭地之文先儒言之詳矣而其言近于地者有五曰地示大示土示后土社是也鄭氏之釋地示則曰北郊神州之神及社稷夫以北郊為祀地此祀之大者不得合社與稷而言合社與稷是為三祀非祭地眀矣曰大示鄭無眀釋或謂大示乃地示之大者祀地以北郊為大則地示之大者將何以祀之曰土示鄭謂原隰平地之神此又非祀地矣曰后土鄭氏則直謂后土黎所食者后土官名死為社而祭之又曰后土土神不言后土社也其答田瓊則曰此后土不得為社者聖人制禮豈得以世人之言著大典眀后土土神不得為社至于太祝建邦國告后土鄭復曰后土社神獨此說違戾特甚啓厯代之訛謬實自此始按尚書曰告于皇天后土孔注曰社也泰誓之宜于冡土亦社也召誥之社于新邑者亦后土也甫田之以社以方注社后土也后土與社皆地之稱今悉疏經文之可證者而言之泰誓曰郊社不修禮曰祭帝于郊所以定天位也祀社于國所以列地利也又曰郊所以眀天道社所以神地道又曰郊社所以事上帝又曰眀乎郊社之義又曰禮行于郊而百神受職禮行于社而百貨可極若然則社即后土后土即社鄭氏之釋大宗伯既以黎所食者為是而復有所疑而不决于是答田瓊之問以后土不得為社四者之說更相背戾而方丘北郊復為二說終莫能定至胡宏氏始定郊社之義以為祭地于社猶祀天于郊也故泰誓曰郊社不修而周公祀于新邑亦先用二牛于郊後用太牢于社記曰天子將出類乎上帝宜乎社而周禮以禋祀祀昊天上帝以血祭祭社稷别無地示之位四圭有邸舞雲門以祀天神兩圭有邸舞咸池以祭地示而别無祭社之說則以郊對社可知後世既立社又立北郊失之矣此說足以破千古之惑故新安朱氏中庸郊社亦以社為祭地取夫胡氏而獨以其廢北郊之說為未然愚按北郊不見于經獨見于鄭氏鄭氏之北郊非至日方丘之祭攻鄭氏神州之說者多而不䏻辨鄭氏北郊之不經攻合祭之說者力而不考以地為郊之失亦始于王氏郊以祀天社以祀地謂郊為祀地吾知其不出于六經也春秋書魯之郊止于郊天不聞其郊地也用牲幣于社間于兩社皆天子之制也謂魯為僭郊社則可以魯郊為祀地則不可雲漢之詩曰祈年孔夙方社不莫又曰自郊徂宫宫社宫也告天地之禮郊宫為二則詩之郊亦非祀地也朱氏亦曰周官止言祀昊天不言祀后土先儒之言祭社者為是其言周官禮大神祭大示皆無眀文是深有疑于周官之非全書也或謂社不足以盡地此蓋因諸侯大夫皆得立社遂因此以致疑按大宗伯王大封則先告后土又曰建邦國先告后土謂之后土者建國之始稱若武成之告于后土者是也左祖右社親地之道也此言社之名成于告后土之後也先儒謂尊無二上故事天眀獨行于天子而無二事地察故下逹于庶人而且有公私焉胡宏氏曰諸侯之不敢祭天猶支庶之不敢繼祖也諸侯之得祭地猶支庶之各母其母也其說為是且社有等差至于州黨族閭愈降愈少獨天子之社為羣姓而立王社之說孔疏謂書傳無文其說莫考陳祥道釋社后土之辨終泥于鄭氏至謂建邦國先后土為非社曽不知社之未立其不謂之后土其可乎祭天無間嵗議古者天必嵗祭三嵗而郊非古制也然則曷為三嵗而郊也三嵗之禮始于漢武其祀天也不于泰壇而于甘泉壇有八觚席有六采文章采鏤之飾玉女樂石之異鸞輅騂駒之靡瑄玉寶鼎之華其禮也侈其用民也勞如之何其勿三年也至于後世不原其本而議其末三年之祭猶不能舉其能力行者若唐之太宗享國長久亦不過三四至宋仁宗以後始克遵三年之制夫三年一祭巳不得為古則一二舉者尤非禮也蘇氏曰秦漢以來天子儀物日以滋多有加無損以至于今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭大廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得廕𥙷親屬非周禮也自宰相宗室已下至百官皆有賜賚非周禮也先儒又曰古之郊禮以事天也以報本反始以教民尊上也天子前期齊戒命冡宰誓百官而涖事焉事之莫尊者也近世則變矣三年而一郊其所事者則軍旅億醜之賞賚耳事軍旅億醜之賞賚則誠不専于享帝制不一于報本夫郊以報一嵗生物之功也夫豈三嵗一生物而三嵗一報耶古者大路素而越席大圭不琢大裘不飾牲用繭栗器用陶匏謂德産精微物所以稱故其文至簡而其誠至慤近世盛鸞輅冕服珠玉金繒之飾唯懼不華內闕觀宫一夕之具唯恐不工其文至繁而其費至廣豈所以降格天神之意邪如是則郊天之禮自漢而下皆非古制禮樂百年而後興誠能如三代之禮其繭栗陶匏費不為甚廣罷壇陛從祀之位止以始祖為配則千百年之廢禮墜樂由是而舉豈不甚盛其或不與祭則如大宗伯所謂若王不與祭祀則攝位鄭氏之釋量人亦曰冡宰佐王祭亦容攝祭庶幾破千古之陋上以合于天道而下足以解諸儒之疑議云燔柴泰壇議儀禮覲禮曰祭天燔柴祭山丘陵升祭川沈祭地瘞祭法亦曰燔柴于泰壇祭天也瘞埋于泰折祭地也爾雅曰祭天曰燔柴祭地曰瘞薶祭法爾雅雖各自為書而其說與儀禮合者獨燔柴無異周官曰以禋祀祀昊天上帝實柴祀日月星辰槱燎祀司中司命飌師雨師夫周官之柴歸于日月星辰而以禋祀為祀天是不與儀禮合也禮器曰至敬不壇掃地而祭不壇非燔柴也掃地而祭非周官之祀也合儀禮周官禮器三書而言之實有不同自鄭氏必欲合三禮之說為一而後人附㑹者曲為之遷就崔靈恩則謂先燔柴及牲玉于丘訖次乃掃地而祭祭天之法皆于地上以下為貴故不祭于人功之壇陸佃則曰祭天之禮升煙于泰壇奏樂于圜丘所以致天神也天神皆降可得而禮然後掃地而祭樂者陽也其聲無形故奏于自然之圜丘煙者陽中之隂其氣有象故燔于使然之泰壇至于禋祀實柴有異于儀禮鄭氏則云禋煙也三祀皆積柴實牲體于日月言實柴于昊天言禋三祀互相備矣其釋覲禮則曰燔柴祭天祭日也祭天為祭日則祭地瘞者祭月也日月而云天地靈之也敢各疏其穿鑿以從古禮經之正周官之不與儀禮易詩書春秋合者不止于祀天地今止因三禮之異同諸儒之附㑹而言其非是夫周官之圜丘乃奏樂之所非壇也自漢而下皆祀于圜丘已失周官之意崔氏謂圜丘即壇為人功之壇按釋圜丘者為自然之丘非人功之壇崔說與釋圜丘者異矣使果從壇下掃地而祭則燔柴于人功之壇不可謂質而獨掃地之祭得謂之質矣若然則儀禮之燔柴為末而掃地之祭為本厯考梁陳以來不聞有祭于圜丘之下者是崔氏之說不得以行也陸氏謂自然者為丘使然者為泰壇是祀天之壇有二愚嘗謂合于周官則泰壇之制未嘗有合于儀禮則燔柴之制無圜丘厯代之失祀于圜丘非是陸氏獨不䏻證其誤是為二壇者亦非也鄭氏謂禋煙也詩生民之禋祀書之禋于六宗禋于文武釋者謂禋敬也又曰精意以享之謂也使從鄭說以禋為煙則六宗之祀不得與上帝並而祀文武于宗廟又難與燔柴之祭同也鄭氏之釋燔柴以祭天為祭日祭地為祭月其說尤妄是殆尊周官之書其不可合者遂臆說以非古禮如夏正郊天迎長日之至圜丘南郊二天帝之說類皆若是古禮經獨覲禮為天子禮捨燔柴為祭天則此書又如王安石之罷黜不䏻以用于世戴記之合于經傳者先儒類皆取之若王制禮器儒行眀堂位等篇固有疑之者矣獨燔柴泰壇為祭天與古禮合特取其說泰壇雖不見于儀禮然從古傳襲未嘗不以壇壝為正覲禮之壇十有二尋周公之三壇同墠司儀之為壇三成去祧為壇下至周末齊侯為柯之盟有壇先君適四國未嘗不為壇况祀天欽崇之實其可廢壇壝哉郊不當立從祀議郊有從祀西漢未之見也禮之失始于建武建武采元始之制而為之元始王莾之政也王莾之失在分牢在同祭不聞其從祀也杜佑尊時王之禮而深知其非謂從祀之坐近古皆有梁陳及于國朝始相沿􅊞夫謂之近古者非古眀矣開元之禮成于徐堅之徒而開寶所作祖于開元大較從祀損益咸取于建武今因開元所定而論著其非是其第一壇曰五帝曰大眀夜眀以周官言之五帝之祀在四郊大眀夜眀以實柴而朝日夕月之制復見于經傳此不得混而一之之證也壇之第二與第三皆以星經為之制杜佑謂天有萬一千五百二十星地亦如之考其所祭知其壇壝之不足以容也遂為外官內官以別而節其數開寶以後又復增五嶽四瀆飌師雨師之類而併祭之其壇愈廣其牲牢愈繁而其禮愈失考于周官則大宗伯之實柴槱燎此又不得混而為一之證也今考于虞書其類上帝之後則行六宗山川羣神之祀不聞其合祭也湯之玄牡武成之柴望皆若此矣召誥用牲于郊牛二者后稷配天之始也若魯之三望雖為非禮亦皆無總祀之理自漢而下牲犢尊罍之數不勝其煩其郊禮之費竭九州之貢賦不足以供由是雖三年之祭亦不能舉壇壝繁雜宫縣四立有司臨事登降逼仄懼不能以周旋跛倚顛仆無所不至昔之儒先能議合祭天地之非而不能正合祭群祀之失能以親郊為是而不能以三年一郊為非能知牛羊供給之費廣而不能盡角繭栗之誠慤甚者配帝之爭不决遂有二配帝于壇上依違莫從一至于是今若悉如三代典禮不傷財不害民一嵗一郊則何憚其不可行也止設昊天上帝坐唐顯按晉泰始明堂罷六天從祀獨郊天從祀循􅊞舊誤慶亦止祀昊天于眀堂宋元豐眀堂亦罷眀堂與郊天禮儀異制議晉摯虞議曰郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖眀堂之祭備物以薦三牲並陳籩豆成列禮同人理故配以近考新安朱氏曰為壇而祭故謂之天祭于屋而以神示祭故謂之帝晉傅玄亦云于郊尚質于眀堂尚文若然則儀文悉皆有異矣郊以特牲眀堂以牛羊詩曰我將我享維羊維牛此牲之異者也燔柴以報陽也猶宗廟之祼鬯也眀堂與宗廟近則燔柴乎何有有燔柴眀堂無沈約宋志謂郊人而親不必盡同此說是禋燎郊以逺人而尊堂以近席用藁鞂器用陶匏象天之質也玉爵代匏尊罍簋俎之屬一以宗廟此元豐議禮之得也郊之祭用氣也進孰之失始于唐自唐以降未之有改也記曰郊血大饗腥三獻爓一獻孰解者曰郊祭天也大饗祫祭也三獻社稷五祀也一獻羣小祀也郊不以血而以孰薦禮之䙝而失之甚者也然則眀堂之祭其不進孰與曰聖人亨以享上帝上帝眀堂之稱也用于眀堂而不用于郊其義眀矣特牲少牢之始于薦孰大夫之禮也用大夫之禮于郊不可也用于眀堂近宗廟也配羣祀于郊非禮矣眀堂國中也邑外曰郊引而近之其瀆莫大焉尊罍尚質也彞以盛鬱鬯郊得以用之也記曰黃目鬱氣之上尊彞得謂之尊也經八尊無鬱孔疏六彛上之彞用疏布宗廟亦有八尊用畫布互舉鬯以言宗廟有鬱鬯其實天地亦有秬鬯義以眀定尊罍于天地六彞于宗廟鄭氏之說也開元遵而不用于郊猶曰以質不以文眀堂宗廟之近而文物之極也其不用也則野矣凡此皆禮儀文質之異不可以不辨也郊非􅉝日議郊特牲曰郊之至也迎長日之至也又曰郊之用􅉝也周之始郊日以至鄭玄謂迎長日者建卯而晝夜分也三王之郊一用夏正其釋周之始郊日以至則謂魯之始郊日以至魯無冬至祭天圜丘之事是以建子之月郊天示先有事也夫以迎長日為建卯胡氏非之至矣三王之郊以寅則冬至圜丘之祭是周以冬為春矣正月正嵗猶曰以子為首若以冬為春則非矣蓋郊之用􅉝言魯禮也周之始郊日以至言周以冬至而郊也易周為魯以附夫臆鑿之論則大有所不可周為周王魯為魯公合周魯為一禮曷不曰魯之始郊日以至葉夢得氏曰以郊為迎長日之至下言郊之用􅉝周之始郊日以至正以别魯禮鄭氏反之强以建卯為日至甚矣其好誣也冬至祭天此周之正禮不可易者孟春建寅之郊蓋祈穀之祭魯雖得郊不得同于天子是以因周郊之日以上􅉝三卜不從至建寅之月而止魯郊殆周祈穀之郊故左氏謂啓蟄而郊也或曰郊必以􅉝周之制與曰以至日而祭則至日非常以􅉝也魯之郊雩皆􅉝是用􅉝魯之禮也然則周郊非􅉝與曰周官祀大神則卜日崔靈恩謂卜日以至為主不吉始用它日是有疑于卜也橫渠張氏謂日至不必卜日周之始郊日以至言日至則不容卜言月至則有卜卜日則失氣至之時矣是定以為不卜日也曲禮曰大饗不問卜吕大臨謂天時隂陽之至日月素定故不問卜若他饗則問卜矣或又曰周之不用辛有所本與召誥曰越三日丁巳用牲于郊非􅉝也至翼日而社非卜也五經異義春秋公羊說禮郊及日皆不卜常以正月上丁成王命魯使卜從乃郊故魯以上􅉝郊不敢與天子同也是足以眀周郊之非􅉝矣厯代之月時不一獨唐武德以冬至祀天孟春􅉝日祈穀于南郊能取二說而裁正之號為近古故特表而出之北郊議北郊之名不見于五經謂北郊見于周官鄭玄之論也周官無北郊之本文因鄭玄䜟緯之說而與周官並行者王莾劉歆實為之始也先儒能攻王莾南北合祭之議而不知立北郊之說者始于匡衡成于王莾捨其大而議其細相承謬誤今千七百餘年矣敢推其本始而詳言之夫周官圜丘方丘為奏樂之地非祭之所圜丘之辨詳矣鄭氏祭地之法有二夏至之日祭崑崙之神于澤中之方丘一也正月祭神州地示于北郊二也是方丘北郊為二今合而言之不知其何所始也按大宗伯之本文鄭氏之不能釋者有二曰以血祭以貍沈以疈辜則曰不言祭地此皆地示祭地可知以黃琮禮地則曰禮地以夏至謂神在崑崙者至于大司樂之地示則又曰祭于北郊鄭氏既以方丘北郊為二而後人之尊鄭者未嘗不以方丘北郊合而為一神州䜟緯非之者至矣至若方丘之不為祭所北郊之無所經見皆泥其說而無有辨之者或曰北郊始于匡衡非王莾自為之說謹按漢志髙帝因北畤而備五帝至武帝時后土猶未立建始之際方立南北郊匡衡張談以天隨王者所居援据禮經皆自為損益若所引祭地于泰折在北郊就隂位之說今戴記無北郊之文陳祥道禮書知其說之無所据遂謂南郊祀天則北郊祭地祀天就陽位則祭地就隂位以强合夫鄭氏北郊之說夫郊非天不足以言社非地不足以盡二者相對如天地之不可以合祭也謂之郊地其何所据哉先儒能眀祭之不可以合而不能辨社之不可以為郊治􅊞建始之弊自漢而降無有知其非者祀地之為社詳見于后土之議尊地之說莫先于罷方丘廢北郊以全古禮之正或者謂玄璜禮北方孟冬迎氣北郊古不得而廢愚謂鄭氏之言人帝五精帝于地無預王肅之攻鄭玄其說雖行于泰始惜其說猶以郊丘為一故宗鄭者多而王說復廢馴致今日郊社盛禮方由是損益以承三代之正罷北郊之謬其不在兹乎國學議成周國學之制略于大司樂其遺禮可法者見于文王世子三代而上詳莫得而聞焉漢武表章六經興太學至後漢為尤盛唐制微附益之而其制愈加詳密今可考也宋朝承唐之舊而國學之制日隳至于紹興國學愈廢雖名三學而國學非真國子矣國子入學者十無一二當時布衣從公卿牒𥙷入國學而真夫所謂三舍法者崇寧宣和之弊也至秦檜而復增之月書季考又甚夫唐眀經帖括之弊唐楊綰嘗曰進士誦當代之文而不通經史眀經但記帖括投牒自舉非仄席待賢之意宋之末造類不出此今科舉既廢而國朝國學定制深有典樂教胄子之古意儻得如唐制五經各立博士㑭之専治一經互為問難以盡其義至于當世之要務則略如宋胡瑗立湖學之法如禮樂刑政兵農漕運河渠等事亦朝夕講習庶足以見經濟之實往者朱熹議貢舉法亦欲以經說㑹萃如詩則鄭氏歐陽氏王氏吕氏書則孔氏蘇氏吳氏葉氏之類先儒用心實欲見之行事自宋末年尊朱熹之學脣腐舌弊止于四書之注故凡刑獄簿書金穀户口靡密出入皆以為俗吏而爭鄙棄清談危坐卒至國亡而莫可救近者江南學校教法止于四書髫齓諸生相師成風字義精熟蔑有遺忘一有詰難則茫然不能以對又近于宋世之末尚甚者知其學之不能通也于是大言以蓋之議禮止于誠敬言樂止于中和其不涉史者謂自漢而下皆霸道其不能詞章也謂之玩物喪志又以昔之大臣見于行事者皆本于節用而愛人之一語功業之成何所不可殊不知通逹之深者必悉天下之利害灌膏養根非終于六經之格言不可也又古者教法春夏學干戈秋冬學羽籥若射御書數皆得謂之學非若今所謂四書而止儒者博而寡要故世嘗以儒詬誚由國學而化成于天下將見儒者之用不可勝盡儒何能以病于世作國學議修遼金宋史搜訪遺書條列事狀猥以非才備員史館幾二十年近復進直翰林仍兼史職茍度嵗月實為罔功伏覩先朝聖訓屢命史臣纂修遼金宋史因循未就推原前代亡國之史皆係一統之後史官所成若齊梁陳隋周五代正史李延夀南比史房玄齡等晉書或稱御撰或著史臣此皆唐太宗右文稽古數百年分裂事志悉得全備至宋倣依唐世爰設官局以成唐書是則先朝屢命有合太宗文眀之盛卑職生長南方遼金舊事鮮所知聞中原諸老家有其書必能搜羅㑹稡以成信史竊伏自念先髙叔祖少傅正獻公燮當嘉定間以禮部侍郎祕書監専修宋史具有成書曽祖太師樞密越公韶為祕書著作郎遷祕書丞同預史事曽叔祖少傅正肅公甫吏部尚書商俱以尚書修撰實録譾薄弱息獲際聖朝以繼先躅宋世九朝雖有正史一時避忌今已易代所宜改正昔司馬遷班固皆以父子相傳遂䏻成書劉知幾劉餗劉贊咸以家世舊聞撰成史通史例輒不自揆庸用條析兼本院宋朝名臣文集及雜書紀載悉皆遺缺亦當著具書目以備采擇者一宋太祖實録舊有兩本一是李昉諸臣所為太宗屢曽宣索已有避忌至真宗咸平再修王禹稱直書其事出為黃州禹稱所著建隆遺事足見深意前實録無太宗叩馬一段後録增入顯是迎合一杜太后金縢之事趙普因退居洛陽太宗嫉之後以此事密奏太宗大喜秦王廷美吳王德昭秦王德芳皆繇普以死今宋史普列傳無一語及之李燾作通鑑長編亦不敢載私家作普别傳始言普將死見廷美坐于牀側與普忿爭其集號巽巖集所宜搜訪一天聖三朝正史紀載多有謬誤蓋修史官夏竦所為吕夷簡受成而已其列傳遂以冦準丁謂同傳所宜改正若此非一一洪邁作神哲徽欽四朝史于時髙宗在德夀宫多所避忌立傳亦有蕪纇所宜刋削當直書徽宗亡國之罪一徽宗違盟契丹童貫復燕城正史回避所合改正一徽欽圍城受辱北行邅幽正史不載所有雜書野史可備編纂今具于后三朝北盟㑹編靖康傳信録孤臣泣血録靖康草史靖康奉使靖康遺録裔夷謀夏録陷燕記南歸録靖康録犯闕録僞楚録松漠紀聞僞齊録起戎録痛憤録建炎復辟記己酉航海記建炎扈從録中興遺史一元符至元祐事趙鼎雖于紹興改正亦有隱諱今可考證增入者今具于后邵氏辨誣元祐黨籍傳尊堯集丁未録符祐本末一宋世九朝莫詳長編而可資證援參考復别有書今院中長編不備諸書並缺今具于后續通鑑長編長編紀事本末國紀九朝通略編年備要建隆編隆平集元符詔㫖治迹統類兩朝國史紀志東都事略仁皇訓典國朝㑹要續㑹要一太史公作世表年表至秦楚之際復為月表致意極深晉代播遷魏宗勃起所宜為表以分年統時兵火湮厄南北二史無所憑依卒不䏻就至歐陽修任史官之責獨䏻于宰相方鎮年月譜系蓋宰相之任匪輕推年可以考得失方鎮之害最重因年可以推盛衰宋朝興亡繇是可考目今舊書尚有而史院無存今具于后百官公卿表宰輔拜表罷録百族譜麟臺舊事宰輔編年一禮樂厯代帝王不相沿􅊞自聶崇義作三禮圖多有舛誤樂自王朴李照胡瑗范鎮魏漢津房庶皆有異同史志所載止于一時而諸家所陳罔有紀載其樂志止詳于樂髓新經禮書若元豐集議未之有載其書尚在可備討論今具于后開寶通禮開寶通禮義纂分門禮選禮閣新編太常新禮慶曆祀儀太常因革禮郊廟奉祀禮文致和五禮大饗眀堂禮鹵簿記有宣和本院止濮議東嚮議一兵刑徭役漕運度支隨俗施政莫敢偏廢趙元昊用兵保甲義勇保馬等制羣臣各有議論王安石以顧役行于河北司馬溫公以差役行于東南各有不便王安石青苖貸息大壞極弊繇是馴致靖康之禍所宜博採奏議及食貨等書以備作志經濟集羣臣奏議三司考㑹計録救荒録刑統一宋翰林視唐尤加清重有雜書可𥙷志書者金坡遺事翰林雜記續翰林志一地志宋有成書太平寰宇記皇祐方域圖志皇祐地理新書元豐九域志一纂修史傳必當先以實録小傳附入九朝史傳仍附行狀墓志神道碑以備去取琬琰集諸家文集涑水紀聞邵氏聞見録春眀退朝録夢溪筆談龍川略志歸田録續歸田録可談談叢師友雜志童蒙訓朝氏客語清豐懿範韓忠獻遺事忠獻家傳申國春秋歐公本末蘇魏公談訓師友談記王鞏聞見録桐隂舊話王沂公筆録張乖崖言行録胡安㝎言行録王沂公别録舊聞證誤唐介事實范太史遺事鄒道鄉語録豐清敏遺事文昌雜録楊文公談苑麈史能改齊漫録石林燕語嘉祐雜志東齊紀事談圃澠水燕談避暑録王鞏雜録秀才間居録却掃編揮麈録録後録三典故辨疑吕氏家孰廣記一諸降王當别立傳三朝史所載簡略宜用僞史參照作世家倣歐陽修五代史例十國紀年九國志吳越備史南唐書江南録南唐近事蜀檮杌閩王事迹江南野史一宋代疆理北不盡燕城南不盡交趾西不盡靈夏東不盡髙麗宜倣晉書載記各紀其事當訪尋四境關涉諸書髙麗圖經至道雲南録趙元昊西夏事實交趾記丙午録遼金誓書國書本末使遼録西夏事宜一李筠李重進本非叛臣實漢周之忠臣宋史作叛臣傳所宜改正韓通亦周忠臣歐陽修作五代史不立韓瞪眼傳議者非之又如諸方僭竊皆宜立傳宋史悉諱今宜㑹稡立傳李順方臘王則叛記甘陵伐趙諗有事實儂智髙事蹟有平蠻一歐陽修作唐書曆志悉取一行十議造曆之法見于志書宋世五朝志應天曆乾元曆儀天曆崇天曆眀天曆亦號詳備獨熙寧奉元曆經元祐觀天曆崇寧占天曆大觀紀元曆洪邁作志不䏻盡紀所宜訪求曆草見于志中大抵曆不差不改得其造曆更攺則後有考民間通曆學者亦有其書所宜搜訪一神宗元豐以前官制似唐亦有增損元豐以後官階勳爵分為二途史志雖詳難便檢閲官制新典官制舊典官制通考一藝文志自元豐後該載未盡宜以今世所行書籍備載舊制進呈者入書目亦當以館閣書目為主分類𥙷入自惟志學之嵗宋科舉已廢遂得専意宋史亦嘗分彚雜書文集及本傳語録以次分别不幸城西火灾舊書盡燬然而家世舊聞耳受目覩猶䏻記憶或者謂國亡史不宜修南方鄙儒詎敢置論年齒衰邁分宜歸老田里曠官縻職實為罔功而區區素藴亦蘄别白以稱朝廷奬拔之厚凡所具遺書散在東南日就湮落或得搜訪或得給筆札傳録庶䏻成書以備一代之史謹呈翰林國史院謹狀
