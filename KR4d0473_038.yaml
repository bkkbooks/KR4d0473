body:
  text: 表牋附進五朝實錄表皇祖有訓聿成四繫之書大曆無疆允纉五朝之治夙陳載筆上徹凝旒欽以邦啟治平運符熙洽禮樂刑政教化之具炳若丹青典謨訓誥誓命之文昭如日月維累聖繼承之述作實皇家混一之謀猷官謹具寮書嚴信史雖編摩之匪一幸聞見之悉同欽惟陛下祇奉鴻圖光膺龍御惟天佑于一徳咸曰湯孫受命丕若㦄年悉循堯道仁宣孝治學廣文明臣某等職忝汗青官慙尸素帝王之制可舉今已稡於鉅編詩書所稱何加願有光於億載賀冊皇太子表黼扆當陽首重升儲之建彤庭叶吉誕承鏤冊之頒宗社以貞幅員胥賀中賀切以天下之本在國在家皇極之言是彛是訓然知子莫若父故立嫡必以賢二美斯完羣情允屬信為非常之慶實開太平之基欽惟陛下駿命溥將燕謀敷遺本支百世咸推受震之亨夀考萬年益著離明之象臣等濫巾膴仕欣覩上儀金石鏗鏘知協風之從律乾坤清晏瞻景耀之宣精賀冊皇太子表院作代宣徽乾坤合徳立鼇極以建中日月繼明奉龜圖而示吉誕敷渙號允迪震亨中賀欽惟陛下寳曆儲祥璿源衍慶立嫡以長遵三代有道之常受命於天膺萬年永保之裕惟知子莫若父故治國先齊家上當帝心下㝎民志臣等恪共内府欣際昌辰太極稱觴效驩呼而率舞寢門視膳嚴唯諾以致恭賀正旦表院作代宣徽泰元衍䇿百二十日以為春乾御當陽扵千萬年而受祜紫清叶奏丹陛傳臚中賀欽惟陛下盛徳在躬至仁育物象闕而垂治法祖訓是繩獸樽以招直言皇猷滋闡嗣嵗蒼規之始羣生玉燭之和臣等班辨外朝職嚴内宰雲迴龍衮肅瞻天日之光星拱鵷行䖍祝岡陵之夀賀武宗皇帝登極表乗龍御天握純乾而居正斷鼇立極奠下土以宅中百辟一心四方胥賀中賀欽惟陛下聰明合道智勇冠倫承詔撫軍展素書之竒略登途受璽昭黄屋之珍符惟謳歌曆數之有歸繄祖考神祇之允格丕基永紹景命不移羣徯后以來蘇政與民而偕樂臣等班瞻文陛瑞仰層霄頒度量以朝諸矦三千同徳垂衣裳而治天下億萬斯年賀皇太后表省作為都六飛夾日奉大曆於聖人五色補天歸玄功於文母事關宗社慶浹宫闈中賀欽惟陛下教闡周南徳參太極以慈為寳夙資保佑之勤維道積躬聿致怡愉之養顯坤元之光大卜鼎命之延洪臣等幸列周行欣承嘉㑹瑶池晝迥樂四表之驩心玉殿春迴衍東朝之曼夀賀聖節表本院天開景運篤有道之曽孫電繞神樞受介福于王母觚棱瑞靄閶闔儀傳中賀欽惟陛下誕紹蘿圖丕承葆命至仁育物得秋而萬寳成盛徳在躬居所而衆星拱當立經陳紀之始新省刑薄斂之規郊廟肇禋朝野胥慶臣等名汙玉署目極璇霄廣文王有聲之詩載歌律吕衍中宗無逸之夀䖍祝華嵩賀聖節表府作代宗正乾御當陽甫際中天之運斗樞繞電式臨彌月之祥絳闕青葱瑶京肅穆中賀欽惟陛下聰明合徳孝友根心偃武修文百神歆而九廟格敦本崇化皇極建而庶績熙爰開有道之長斯衍無疆之慶臣等職縻邦憲身阻廷趨有王者興行見温洛榮光之瑞祝聖人夀願増泰元神筴之書賀皇太后冊寳禮成表本院蘿圖衍瑞丕昭景命之祥寳冊騰徽誕紀慈元之懿聖心祗恪子道昭揚中賀欽惟陛下稽古聰明事親愛敬有國之母以長久致養聿嚴天道之要在隂陽飭躬彌謹禮行中禁慶洽九圍臣等職近鼇頭班聨龍尾玉巵前夀肅瞻長樂之儀彤筆特書願廣思齊之聖賀皇太后冊寳禮成表府作代宗正黄鍾應律協陽徳之初亨寳冊告廷奉坤元之至養尊歸慈極慶洽治朝中賀欽惟陛下愛敬積衷順承法道雍雍肅肅聖實本於太任怡怡愉愉孝有光於唐帝日嚴初政風動八方臣等恪謹國章欣陪班著瑶池畫迥幸預聞管籥之音玉斚春融願䖍祝岡陵之夀賀皇太后冊寳禮成表省作為都乾旋坤轉㝎妙算於宫闈月吉辰良鏤徽音於典冊東朝禮著九㝢歡騰中賀欽惟陛下聖嗣大任道希少廣以天下母神㳺清浄之居惟泰元尊致謹怡愉之養允持慈寳益屆夀祺臣等㑹弁鵷聨趨庭鼇抃陽回玉琯八音首協于黄鍾春滿瑶巵萬嵗齊呼於紫禁賀聖節表寳曆建元協重華之嘉運瑶光貫月開上聖之貞符盛徳在秋昊天有命中賀欽惟陛下智仁御極孝友根心丕顯王謨端拱巖廊之上達觀新邑式均道里之中取泰象於坤乾合離明之日月璇璣叶紀玉斗儲祥臣等祇率班聨肅瞻清穆宣昭鴻業載歌七月之詩耆㝎武功願繼萬年之雅史局謝鍚宴表立朝載筆交懷愒日之慙就館肆筵申錫需雲之寵恩傳宫醴光動廷紳中賀欽惟陛下黼黻先猷憲章祖武謂丹青信史紀二聖之鴻文念鉛槧微勞屬小人而燕賚魚藻歌騰於周室鳳簫聲遶於鈞天屆視朔以迎長粲飛霙而奏瑞上追槀飫下陋權輿臣等愧匪食功懽惟飽徳陽剛初復太平歌既醉之詩天威不違下拜祝無疆之夀賀正旦表省作為都㑹謹天朝文命敷于四海曆司人統攝提正於孟陬率由舊章曰為改嵗中賀欽惟陛下道裁天地政在璇璣崇郷黨以厲賢才聿嚴親䇿詔郡國而謹牧養爰廣使軺東漸西被以如春小往大來而交泰禮行雅夀捧瑶斚於東朝親納直言開獸尊於前殿亶惟平治允際亨嘉臣等祇率鵷行肅登龍尾弘敷五典慙退食以罔功永保萬年敢矢心而善頌賀正旦表本院清臺課曆允符顓頊之元明堂視朝茂正攝提之位陽廻象魏儀贊鴻臚中賀欽惟陛下經緯人文財成天地審賢良知古今之體能勵廉隅謂吏道以法令為師益嚴品節剛健密參扵太極怡愉深謹扵東朝車駕蒼龍導迎木徳樽開白獸詢採芻言臣等材乏頌椒恩叨給札春王正月推五始之大原天子萬年納八荒扵夀域賀皇太后正旦表嵗在攝提叶孟陬之令月曆符顓頊開太始之上元時屆履端天綏眉夀中賀欽惟陛下清心慈儉至養怡愉數往知來利永貞而坤厚體中居順祉元吉以泰亨徽音惟日以恒新懿徳如春而益暢臣等職叨視草才乏頌椒絳闕五雲王母隃臨於黼座玉巵萬夀神堯親捧於瑶階全徳泰寧福慶皇太后尊號冊寳禮成賀皇帝表省作為都皇矣上帝丕昭立極之功至哉坤元申衍得名之典禮行宫壼化被寰區中賀欽惟陛下敬養日嚴文明天縱謂聖徳無加於孝爰盡討論而天子必有所尊載揚徽美御未央而登冊即長樂以展儀鳳泊鸞飄寳刻永光於秦璽雲蒸霧起翠華親下於堯階協氣醇和嘉生博厚臣等班聨㑹弁夀介奉觴太微三光之庭烟煴交泰有名萬物之母允合永貞賀皇太后正旦表都省作丁已為正月始和資坤元而蕃衍兩儀交泰綏夀祉以亨嘉徳協青煒瑞浮紫禁中賀欽惟陛下寳慈作則履順行仁龍衮捧觴喜溢椒花之頌龜臺簇仗坐觀蓂莢之祥審孫枝之正傳定國本以蚤建邦家大慶朝野均懽臣某等祗率鵷行式遵鳳曆正時成嵗百廿日以為春利用厚生萬億年而受祜賀皇太后正旦表院集賢褘衣視旦丕彰立極之功鳳曆頒春誕合建邦之嵗笙鏞翕繹黼繡昭明中賀欽惟陛下道協母儀教參女史承顔致養順徳備於九重正位在中行願符於六五朝賛聖神之治禁傳慈儉之謨臣等叨侍近班肅瞻嘉㑹玉巵為夀儼寳殿以雲從金篋賜齡樂瑶池而晝燕賀冊皇太子表院集賢前星定位仰宸極之聖謨陽月臨軒法坤元之慈訓光騰鏤冊儀謹傳臚中賀欽惟陛下稽古行仁憲天合道知子莫若父審恭敬之積中治國先齊家盡怡愉而致養惟宗祊繼體之事大玩易爻重明之象深蓍龜協祥匕鬯承嫡臣等職縻珍舘班肅彤庭喜液龍顔虎拜咸呼於萬嵗禮嚴鶴駕鸞和共徯於三朝冊皇太子賀皇太后表院集賢承天正位詒謀啟於重闈諏日揚廷渙號昭於寳冊大明繼照萬邦以貞中賀欽惟陛下色石功深黄裳徳順以佀以續降葆命以丕基是訓是行席蘿圖而端本知立嗣必子之有自審建儲非私之惟公施于神孫繄我文母臣等職塵清貫班肅上儀簫韶九成願盡稱觴之慶本支百世式瞻主鬯之尊皇太子兼中書令賀表府作代宗正黼扆當陽懋對紫宸之慶玄龜叶吉丕昭寳冊之光八音播廷羣公㑹弁中賀欽惟陛下悦親有道立賢無方謂一人元良勢實尊於藩翰而中書政本命尤慎於樞機孝友宣昭仁慈溥愽臣等恪司成憲欣覩縟儀卜七百年願衍周家之曆上千萬夀咸趨漢殿之班賀正旦表院集賢丹扆當陽頒發春之仁政清臺治曆符建國之昌期日之方中天其申命中賀欽惟陛下澤漸滲漉心玩神明盤銘監觀徳又新而無斁河圖則象祉元吉之有恒獸樽設席以招言龍衮坐朝而問道臣等瀛洲布武閶闔詔儀玉燭豐穰用制九年之蓄紫清蠖濩業隆萬世之基賀皇太后正旦表都省作丙辰為嵗指蒼龍密叶昭華之琯雲開褕翟首稱長樂之觴順履始和懋隆元吉中賀欽惟陛下儉慈作則清浄頣神色石功深妙裁成而交泰黄裳位正盡滲漉以皆春母儀循四序之周聖孝衍三朝之祉臣等職叨輔相效愧爕調拜捧椒花慶載臨於元日宴觀桃實祈永保於萬年賀正旦表嵗閏五月壬戌本院是肇祚發春伸正陽之布治歸餘成嵗審長至以觀生黼扆昭明彤庭肅穆中賀欽惟陛下仁推滲漉道協際蟠修徳錫符驗隂陽之消長發號出令則天地以裁成念丕圖演繼于祖宗究盛禮益嚴于上下臣等瀛洲接武文石趨班閏月㝎時泰治密齊扵七政皇極錫福北元永保扵萬年賀太皇太后正旦表地天交泰隂教法乎坤元閏餘歸終寳曆増于夏五陽浮中禁瑞靄重闈中賀欽惟陛下端懿母儀慈明内範怡神少廣悟黄中通理之爻辨秩東郊樂青煒登平之景曰惟肇嵗兹用儲祥臣等給札承恩肅班稱慶筆徽音於彤管嵗不絶書望長樂之璇宫天惟曼夀進仁宗皇帝實錄表君臨十載式昭垂世之謨聖治萬方庸謹繫年之錄編摩玩愒敷奏凌兢欽以仁宗皇帝陛下濬哲積躬欽明稽古發揚乾健預清宫以候先皇祇奉坤元䖍問寢而娛太母審俗周知於民瘼授時彌切於嵗豐謂養性存心宜採於傳記而脩身治國必取於禮經監觀厯代之蓍龜夷攷前王之軌範政要採諍臣之讜議大學芟衍義之浮辭爰譯成書用禆博覽至若譽髦斯士擢不次以待非常爵人於朝表有功而抑妄進每遵帝範肇立儒科廣祖宗百年未備之規示子孫億代永貽之訓珠玉非寳旁招菁莪之賢農桑惟勤旋致嘉禾之瑞惡衣服以申縁履之禁省畋獵以彰開網之仁増胄子之官資限計吏之品級為民請命匪營一已之福田遇烖秉誠果應自天之甘澤與人不求備從諫如轉圜河徙故灘謫斂臣於嶺徼雪深前殿憫戍卒於邊防常思創業之艱益慎守成之效道傳精一明授受之至公孝竭怡愉協繼承而無間凡兹殊美冠乎羣倫濡毫惟懼於荒蕪削牘復虞於缺軼雖盡巧心於舉要蔑窮茂績之敉功欽惟陛下葆命誕膺鴻圖丕顯窮神知化彰明聖之鋪張詢事考言採臣鄰之記注屢宣睿㫖迄萃鉅編雖天地之徳無俟於賛揚而日月之光有資於繪畫臣等職叨率屬識乏簡僚慕永貞之謹嚴詞慙韓愈稽太初之直核筆愧馬遷聫直致伏覩舊制進實錄表文有短長然未敢以數行事跡以序篇首桷大徳中嘗進聖朝二帝實錄進表必加詳盡摘其所遵守舊制撰成一篇或恐繁蕪别有副五朝實錄表未免倣效前作今輒不揆宣讀本庶便又十年御極聿修四繫之編億載揚休殊乏三長之筆祇成信史上徹宸旒中賀欽以仁宗皇帝陛下仁静根心温恭合徳詩書造士闡學制以設科法律為師嚴官規而限祿諏經作則稽古鑒今所寳惟賢卻獻琛而弗尚莫大於孝謹視膳以彌加蓍龜定主鬯之公棫樸藹奉璋之衆宜登琬琰永秘縑緗欽惟皇帝陛下慕切羮牆令行金石率時昭考摭言行以無遺迪惟前人繼聖明而有造臣等尊聞傳信竭思纂題閲厯嵗年已深慙於尸素經緯日月期不朽於汗青賀正旦表都省作癸亥為嵗正天門陳揆治朝之位曆新人統肅嚴魏闕之班四表迎祥八風順律中賀欽惟陛下仁施滲漉命受溥將輔相財成别忠邪而無黨斟酌損益合禮樂以同流圭璋藹多士之良玉燭兆大田之慶準繩乾健槖籥泰亨臣等補衮功慙更弦政拙萬年永錫仰瞻太極之尊六甲既周行履上元之運賀聖節表都省作癸亥為十月為陽於赫發祥之兆一人有慶丕昭嗣服之初出日之升降年以永中賀欽惟陛下斂時錫福握乾闡珍玩天地之心陽初升而來復發雷霆之令隂早辨於履霜繩祖武以雍熙格民風而醇厚道尊泰壹運接上元臣等叨列近司欣逢盛旦望翠華之行御瑞藹五雲趨絳闕以傳臚齊呼萬嵗牋賀皇太子受冊牋省作為都禮嚴中禁位建承華萬國以貞咸曰吾君之子四方来賀永厎烝民之生中賀敬維殿下玉璞藴珍金枝表秀繼體而承匕鬯如歲之春㝎志以協蓍龜維天其祐方謹雞鳴之問聿新鶴禁之居某䓁叨列政司欣傳制命父子君臣之道備允廣緝熙詩書禮樂之教崇式符繼照賀皇太子受冊牋院作代宣徽範金作寳禮成内朝簇仗演綸驩騰四宇協春秋之大義覃雨露之殊恩中賀敬惟殿下岐嶷天成温文夙就佩規帶矩正言正事之教成執玉奉盈事父事君之道備某等叨司庶府欣覩盛儀仰黄道之日長式符離照候明堂之星潤允謂震亨賀皇太子受冊牋本院體元更始肅瞻玉裕之姿崇徳計勲肇錫朱明之服宗支襲慶國本奠安中賀敬維殿下英睿夙成藝文天縱清宫朝邸朱虚之功為髙審俗迎郊孟侯之賢允佀受介福于王母繼明照於四方維軍國之樞機實政化之橐籥名倡百辟兩儀正而五緯齊徳和萬邦九榖熟而三農足某等職叨掌綍欣覩揚庭紀王子之吹笙有慙斧藻歌堯民之擊壤願廣丹青賀皇太子受冊牋府作代宗正盛徳動天誕受元良之冊萬邦為憲悉資文武之賢政本増崇皇基鞏固中賀敬維殿下圭璋王度黼黻聖謨整齊乾坤指揮於旋轉之頃肅清宫廟怡愉於定省之間亶惟不世之勲庸舉非常之典某等職司宗籍欣覩王綸磐石既安願上則百斯男之頌權衡允稱克成曰三有俊之功賀皇太子正旦牋省作為都曆起上辛􅢳自天之申命嵗行維戊瞻出日之重光萬宇薰陶九垓滲漉中賀敬維殿下功調玉燭政察璇璣宴錫龜臺密承歡於王母仗移鶴禁親奉夀於神堯維春之祺有秩斯祜某等導迎嘉節賛詠清時候銅琯之陽和式占泰㝎望青宫之葱鬱允協震亨賀千秋節牋府作代太保月映彩雲慶仰猗蘭之瑞令行青陸書占玄鳦之祥維春之祺粤上斯已中賀敬維殿下宅心聖學匡力皇圖廣邦家太平之基澤窮滲漉察天人同心之理下逮芻蕘仁孝合名中和叶徳某等展儀榖旦徯首叢霄夀考萬年敢陋千秋之頌本支百世願陳大雅之詩賀千秋節牋院作代詹事甲觀畫堂仰紀吹銅之瑞瑶山玉彩特書主鬯之勲維暮之春初吉云已中賀敬維殿下蒼規體徳銀漢儲祥稽七政之有恒實循冬夏消羣隂於交泰爰法坤乾興鴻文以闡基握龍圖而佐運兩宫定省雍容化日之長四表謳歌瞻徯前星之耀某等具寮無補盛旦有光奉曲水之羽觴齊呼曼夀探泰元之神䇿允謂延洪賀皇太子正旦牋本院青規紀曆甫開嗣嵗之祥蒼震布和懋協少陽之象自天申祐與物為春中賀敬維殿下經緯人文權輿政治三朝交泰聿嚴盛禮以奉觴四徳尊乾行美成功而瑑玉卜稔已符於祈榖登賢深味於拔茅慶洽宫闈仁施㝢縣某等叨塵頋問欣覩亨嘉聲徹鳳笙仰非霧非煙之瑞班随鶴駕歌重暉重潤之詩賀皇太子正旦牋省作為都嵗正璿璣丕應震亨之象春先寳曆允符泰治之祥絳闕光華青宫葱鬱中賀敬維殿下道随陽長徳與日新玩易中行密包荒而坱圠法天繼照永主器以彌綸稱觴前殿以承顔侍宴瑶池而受福某等禮成鶴禁敬謹鳬趨祈榖躬耕預卜金穰之兆頌椒介夀欣瞻玉裕之姿賀皇太子受冊牋院集賢明堂辨儀裒對重輝之耀昕朝發冊丕昭上嗣之賢宗社敉寧幅員驩慶中賀敬維殿下孝仁生禀禮樂夙脩一人元良羽翼靡煩於商皓百揆時序英威共仰於秦王鶴駕之御日三烏輪之光明兩某等叨塵仙館末綴臚庭瀛水汪洋望瑶山而親切宸居蠖濩瞻青路以陪從賀皇太子正旦牋院集賢大曆更新叶皇祖建元之祚少陽正位隆神孫承嫡之基百辟是儀五辰攸叙中賀敬維殿下應乾作命受震行仁嘉禮告成歸妹祉吉之象外朝佐治同人文眀之祥日就月将而緝熙小往大来而分類某等肅瞻玉裕謹候青煒詠歌重光紹天休而繼照弼諧庶績占嵗在之有年賀千秋節牋擬賀表非禮後不進國恤未餘月百司皆電繞斗樞允昭甲觀之瑞日昇暘谷行受明堂之朝宗社厎寧神祇協相中賀敬惟殿下欽文師古剛健法天或躍在淵龍徳合乎中正永言配命龜圖闡其延長仰震夙之非常審傳付之素定某等肅瞻睟表獲際重光聖孝有加羮牆之慕彌切民情共戴岡陵之祝益䖍賀千秋節牋本院心居天位前星耀於明堂丣為春門大電騰于甲觀盛徳集福至和儲祥中賀敬維殿下體仁法元師古合道温恭事帝密贊化以生成問學積躬益緝熙而光大疇選黄髮之彦庸佐青闈之規如日之升降年有永某等肅瞻英偉䖍祝簡穰輯往則於瑶山一辭莫措採賜齡之金篋曼夀是期賀千秋節牋省作為都玄鳦發祥丕顯吹銅之瑞蒼龍協紀式昭主器之符紫禁懽騰璿源秀衍中賀敬惟殿下温文秉度仁孝積躬侍宴瑶池令徳令儀之可述問安内寢正言正事之足聞如嵗之春自天其祐某等導迎穰簡賛詠中和瞻出日之舒遲重光允繼望彩雲之葱欝曼夀是期賀皇后正旦牋本院王春謹時肇正内朝之治帝曆更始益嚴中禁之儀與物咸亨自天作合中賀敬維殿下矩循内則言法徽音關雎詠歌禮避乎蘭殿之貴卷耳思念頌取于椒盤之文稽陽徳維如嵗之初考隂教曰履端于始某等清班接武穀旦趨朝日月竝明願上千萬之雅夀天地交泰載歌元二之太平清容居士集卷第三十八
