body:
  text: 律詩七言亷右丞園號為亰城第一名花幾萬本右丞有詩次韻閉戶春深詩􅑂侵卷簾新燕掠清陰亭亭梅月能消酒肅肅松風獨和琴新筍未容穿石徑落花時許輔雲林主人妙手隨機轉萬本姚黃磨紫金禊日與剛中待制至廉園閉門不納駐馬久之復次韻雲鎖亭臺煙霧侵難將禊迹擬山陰花飛竹外疑紅袖水度松間自玉琴駐馬客回迷逺路倚闌人在隔清林誰言洞口無消息一見應須直萬金送孫道士歸杭送鴈南飛十五年朔風吹雪上華顛梨花的的疑蝴蝶燕子深深似杜鵑東野先生愁外句西湖處士夢中緣抱琴獨去知無奈一棹春江水拍天次韻王寅甫侍讀蒞醮長春宫飄飄笙鶴雨絲輕聽徹靈璈曲再成玉案香分花有影瑶階松瞑露無聲九枝燈裏開真景三素雲中賀太平莫怪錦𫀆衣袖冷還家從此羡長生蛻骨稜稜似鶴輕觚壇危處玉為成天街正候三能色雲所疑呼萬嵗聲氣篆通靈歸廓落心章祈嵗報清平金穰上瑞吾皇意不用神芝朵朵生題張宗魯編修詩集鴈落峯寒晝飲氷碧雲為構玉為稜已除白髮三千丈疑上瑶臺第幾層松頂露涼旋整鶴原頭火淨撇遊鷹何人妙解精新句剔盡風簷一寸燈送李伯英秀才歸廬陵黑頭徒步謁神州䔩䔩飛塵鬢已秋日暮競傳鸚鵡賦天寒誰解驌驦裘鴈聲未歇砧聲續燈影初銷月影流可是親知留不得故園清興起滄洲次韻答周秀才湛湛玄雲起研山桃花為色玉為顔溟鵬水擊三千里天馬風生十二間芳草春濃堪試筆長空秋盡獨憑闌松階翠影流如滴遲子擕書共往還次韻成季灤陽見寄客思如癡日似年晚風投幘思悠然看山不逐馬蹄去得句時從鴈足傳紅緑芰荷秋岸岸青黃蒲稗雨田田蒪鱸有興愁無奈欲問渾河下水船次韻陳又新登臺底用惜春菲平楚微茫落照時燒後斷碑遺鳥迹耕餘殘璧隱蠶眉泉分去路蕭蕭玉山聳歸雲蔟蔟旗駐馬應須更搔首逺煙回鴈不勝詩西湖空濛圖舊隱湖山筆底收相從京洛意中遊昏昏車馬飛花雨寂寂鍾魚落葉秋千古登臨翻作夢百年歌舞漾清愁何當化鶴看滄海不用呼猿汲澗流次韻張秋泉盆梅三首萬里南來帶白雲低徊猶作自由身孤根齧雪疑無伴冷蘂餐霞别有春頗憶西湖頻入夢不煩東井與生神相看嵗晚真清絶疑是瑶臺第一人深明閣裏江南樹老鶴翹翎似病身𥿄屋藏雲團白雪丹臺朝日輔青春蒼苔有恨悲山鬼翠袖無言倚洛神回首空林歸未得凄􅋽相對獨關人華頂空餘萬疊雲獨將清影伴吟身虬枝欲抉窗前月驛信能通塞外春底用施鉛鄰越女從教剪水恣波神碧虛仙客清無奈留作新詩故惱人次韻仲章遊南城二首瑶閣雲深野馬昏分明日月引天門峯回九鎖疑無路水過三叉别有村頗怪鶯花春不負却嫌雞黍約誰存山童閉户茶煙暝客至從渠未許論側身千仭苦不早愛此春從天際浮北雪西山憐我瘦黃塵白日送君遊翩翩目送雲中鴈杳杳機忘海上鷗今古登臨總陳迹倚闌何事起清愁贈王君佐精神映日碧芙蕖直節昂昂衆不如十載長安心似水一官淮海食無魚少年已擬治安策晚嵗肯為封禪書聞道功名須皓首鐵冠簪髮莫嫌疏送蕭立道歸天台華頂雲寒人不到煩君為上最髙層天雞正呌三更日海鶴曾餐六月氷客路微茫同脫木鄉情依約近歸僧還家莫作採芝叟背負青天傲大鵬送李景山使交趾萬里雲南把一麾日南重見使車馳思家不作玉門表得句擬題銅柱碑象譯舊傳周禮樂馬人遺俗漢威儀桄榔溪驛疑飛雪樹樹梅花九月時九日書懷烏帽衝塵鬢漸皤黃花慵插獨婆娑新霜去鴈天機少落日歸雲雨意多拄笏看山真我事持螯把酒為君歌登臺欲盡鄉關望一徑松陰長薜蘿慰曾道士積構層巔聳玉臺松花浮翠雪皚皚終然一笑騎鯨去可是長眠化蝶來身外乾坤憐納芥壺中日月隘浮杯何人欲問先天事隱几蒼髯換不回抵滄州先簡善之應奉黃金臺上英賢滿白玉堂中步武新愧我青塵暗顔色羡君碧眼映精神春風未信看花少午夜應知視草頻北望五雲開曉霽相思那得勝相親送李彥謙赴西臺御史百二山河驄馬遊西風渭水思悠悠鶴翻古柏千年雪鶻擊平蕪九月秋拄笏漢陵尋玉鴈解鞍蜀道問金牛官曹朱墨何時了一榻清吟是勝流張虛靖圜菴扁曰歸鶴次韻招仙遊館構亭亭萬疊松寒曉日青玉局謙殘春換劫石臺丹在草通靈紅羊赤馬悲滄海白虎蒼龍儼大庭為愛子喬笙鶴美月􅋽時許夜深聽送華道士降香武當山神君夀與玉皇同嵗嵗香傳第一峯龍虎使來紅日擁龜蛇靈在碧苔封萬年松子天風奏九節蒲根澗水舂博士文工成故事石牀為採玉芙蓉送虞伯生降香還蜀省墓玉雪祠官貂帽低笑乘飛燕上天梯寶幡繡重團金粟鈿合香嚴印紫泥官饌每供千嵗鹿驛程深聽五更雞流沙可是河源地搖首揚鞭更欲西丞相墳前雙闕摧泉聲隱隱柏崔嵬金牛已向秦中去銅馬空傳渭上來叢竹雨留銀燭淚落花風揚楮錢灰百年華表塵千劫聞道曾孫始一回再次韻振衣千仭笑雲低捫厯星辰復劒梯度坂政須三尺箠入關應笑一丸泥神君祭重祠青馬墨客才工頌碧雞萬里遨頭端不負花開緩醉玉東西閣道新平舊石摧望鄉使客意嵬嵬犀牛坐見降王去杜宇聲隨望帝來三卯録成魂有磷五丁神泣劫揚灰推釃欲作鄉鄰會揮手先催弩矢回三次韻觸石危藤壓路低哀猿送客上丹梯一百八盤雲亦雨二十四畨花似泥解珮浮遊憐野馬振衣亭育聽天雞拾遺已去武侯逺空戀祠堂與瀼西時平弔古莫心摧去驛斜陽指馬嵬曲曲松陰隨帽轉層層山影入杯來草玄有意池留墨觀象無心筯畫灰為問丈人今在否青牛穿嶺日千回送王繼學修撰馬伯庸應奉分院上都二首玉亰髙處雪流脂連插雞翹緑鬢垂蹀躞有泥歌獨漉琵琶無夢説相思黑河舊樂催填譜白海名花擬進詞羽獵上林俱罷賦卿雲何以報眀時淺坡平疊磧漫漫拂嶺青簾罨畫看氈屋起營羊胛熟土房催頓馬通乾挏官走驛傳金碗氷正分奩貯玉盤莫上鄉臺望南北白雲微處是槍竿寄王儀伯太守維揚太守文章伯故疊荒煙取次題逆浪風髙淮白上寒沙雲落海青低極知后土花如雪不惜平山醉似泥跋馬使君官驛畔揚鞭却在夕陽西夀劉承旨兹審齡開希有文潤太平玉杖造朝樂堯階之化日銖衣拂石歌舜殿之薰風夀擁靈椿歡傳故梓敢陳善頌庸贊令辰稜稜鶴髮映方瞳玉帶桓圭一品崇禁署清名行世久髙門盛德與天通升堂衣並老菜子警國詩傳衛武公共道榴花宜結實緑陰濃淡駐杯中孟習卿都事母八十歸省關中其家四世科第祖十五當金三時舉進士終待制鶴髮初開九九年東西雙鳳集庭前官燉乃兄夀母煌亦歸篋藏龍榜金花淡案捧鸞書鈿軸鮮竹筍清甘宜夕饌萱花芳逺傲春妍風流文物關中舊點檢諸孫射䇿編送李元章宰陜縣稅冕觚壇匹馬歸冥鴻斜日悟天機眀時法律心常鄙小邑弦歌願豈違潁水初霜黃葉下華山新雨碧雲飛當今人物須公等行見鋒車入帝畿次韻李伯宗苦熱庭院無眠夜氣深繁星閃閃漏沉沉祝融焮火翻初劫姑射疑氷易舊心角枕雲蒸紋欲斷蠟燈煙暖淚難禁蕭騷忽作還家夢翠木扶疏萬竹森次韻程士安睡鶴疏翎慵受朔風侵谷口雲歸自在心蝶化不知人事改蟻酣空憶世塵深珠宫胎息天濤靜寶所神遊斗柄沉何事驚烏繞林樹月殘衝曉議晴陰次韻陳海陰三月雪花飛作氈春風似欲駐新年夢當好處成烏有歌到狂時近自然村樹緑齊黃烏界海山青盡白鷗天何人會得龎公意布領長披不上船次韻院長退朝書懷兼送李元章廟令三首踐阼篇陳夙致齋明良慶會叶榮懷南山豹聳文章潤嶰谷凰鳴律吕諧黃閣規模深倚注金鑾人物費推排夜光照坐羣傾動誰道驪龍左耳乖朝回深坐碧雲齋無限家林入素懷整頓乾坤新禹貢剪裁氷雪舊齊諧觚稜望日紅蓮擁蹀􅞃看山玉筍排魚水政親那棄得白鷗相對莫相乖曾著蟬冠會宿齋陽春玉雪映澄懷黑頭瑞世須竒遇白眼論交自寡諧騕裊當階身獨障門者叱出之有乘馬入廟含桃薦廟手親排蕭蕭匹馬投山縣人事相催似好乖題鯫齋蒙蒙眇眇傲滄溟羞殺任公夢未醒寄館蠅鬚猶綺靡深藏黍粒獨清寧掌中旋舞憐飛燕案上能行笑巨靈惆悵九衢長劒客駢肩堂下慕遺腥送東平程太守泰嶽巖巖鄆水清分符投老得安榮百年禮樂維時舉比屋衣冠合早評馬鬛舊封蒼檜老龍鱗古殿緑蕪平髙唐路近羊生泣東望憑公為寫情送周南翁分刺池陽桞亭松露十分甜秋浦天青鴈拂簷黃葉滿庭君吏隱白頭掩卷我郎潛風催帆影迷紅蓼江送歌聲入畫簾惆悵九華金碧洞謫仙人逺月纎纎次韻雙頭菊三首袖舞西風大小垂駢頭顒立傲霜姿步搖髙擁車同入笑靨初鈿坐共移素質斷金疑並蒂間情餐玉喜浮眉蓮池睡冷鴛鴦起似怨秋聲有恨離碧雲低壓玉繩垂鸞鵠交翔表異姿白帝司秋金已肅黃人捧日馭初移蘂宫罷講扶雙髻桂館霜餘却十眉剩掃雕搜兒女態象中眀兩見黃離空庭雲盡露珠垂翠羽交分大雅姿氣服中黃心獨苦光浮大白眼爭移智瓊有約徒誇額亰兆多情却畫眉桃李爭妍真不遜故留雙玉伴支離閣皂山青玉軒晦庵容齋諸賢觴詠之地虞伯生作記吳成季令賦詩江南琳館蕭間地一一新文付集賢真誥總傳天外語禁經未數酒中仙步虛巖近琅玕響禮斗壇空薜荔緣諸老會文題詠絶誰將鳳觜續離弦題揭曼碩詩卷深湛妙思筆鋒收的的冥鴻楚岸秋直以紫芝招綺夏擬將白羽定曹劉松濤夜漲驚金谷花雨春濃爛錦洲此意徊徨人未識期君玩月上南樓送衛大隱回錢塘曾孫衛清叔諤諤中丞骨已仙滄洲漁火起寒煙魏公賜宅猶傳笏元子磨崖可賣錢夜雨鼠鬚編素業春風麈尾話行年西湖雲鎖梅花凍休浪狂歌酌酒船送華道士住宗陽宫黑髮祠官佩水蒼萬松深處對虛皇黃柑有法能為酒紫术無飢可當糧招鶴舞虛山月冷檄龍吹雨海天􅋽瑶池欲問長生事汲澗研朱寫緑章剪刀草手截溪流護翠苗層陰淡蕩碧雲嬌秋風玉殿叉留股晴日朱筵舞折腰眉缺可能分燕尾頂荒猶解插雞翹翻思往嵗南方厄羣釆空陂恨未銷燕尾尓雅芍是也南鳬茈一名剪刀一名採食方飢嵗馬伯庸擬李商隱無題次韻四首金縷歌殘月滿江玉顔曾憶侍油幢象牀雲重恩専一鯨錦波翻賜疊雙春淺正宜氈作幕夜􅋽深恨魫為窗浣沙可是無靈匹側足寒溪濺石淙翠簾匝匝護朱光千葉宫桃滿院香閬苑有鸞通尺素靈橋無鵲寄流黃上林賦罷歸巴蜀興慶詞工謫夜郎不是月中親度曲世人那解聽霓裳相期心似石城潮日望晴虹結彩橋却月眉愁歌漸逺凌波步近意非遙抽琴有恨回清角疊袖無塵轉緑腰弄玉最憐隨鳯去秋來誰與伴吹簫白髮詞臣兩耳垂華諛堆笏陋牛醫宫娥引燭催麻日院吏傳更寫制時蠟撚化生秋夕賜翠標疊勝嵗華移低頭欲説唐朝舊願侍虛皇進玉巵送浦如淵辭官南歸厭聽朝雞擁被吟吳船水滑碧千尋平洲種橘清霜重小墅栽花緑霧深瞿鵲真能談孟浪鴟夷端自愛浮湛因君搖蕩還家思燭影秋房恨不禁送李公敏薊州之官幼著儒官佩楚蘭文章元不給飢寒風前野馬停杯却天際冥鴻拄笏看作計政須千樹栗養生那用九還丹偏州事簡登臨足花下題詩更倚闌劉婦表門丞妹王中空林露下菊無馨玉雪深闈飬暮齡河水泛舟雲耿耿湘潭鼓瑟雨冥冥夜燈孤鴈鳴何切古鏡離鸞舞已停晚嵗不須多感慨雙楹髙亞柳枝青永新闕氏義門銀髮稜稜鶴骨尊舊傳庭誥付諸孫要同公藝書藝館還擬自倫標楔門春酒緩歌常棣雅夜燈深候鶺鴒原他年欲向廬陵客詢是龍岡第幾村送桞唐佐出守懷