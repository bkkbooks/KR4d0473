body:
  text: 祭文祭余寺丞代大人作維年月日某謹致祭于故知郡寺丞余公親翁之靈嗚呼哀哉世日澆巧為善者希惰士尚媮智士死竒公獨為善窮日孜孜始終其心夷險不移方公少年貴盛莫比顯允文昌玉節絲轡笑談春生叱咤電起公獨趨庭巽若處女維昔晏安雲冠霧𥚑一車當道百役避衢官有未便入閤勸除公獨守謙癯然清儒世禄日蕃兄怨弟咨囊珠匱玉宴見以時公獨友于髙堂春熈寒衾朝飱二難怡怡守官唯勤不矜其智尺牘撫問各盡親意人有急難公先其慮族有困乏公遺之食天運既遷飄風激阿棲遅精廬髪化其皤末疾未㡬奄然無何嗚呼哀哉維我與公三世有素知公之詳匪以􅊚故天道與人先後莫睹事或未然曷咎曷怒陂陁墓田自公親卜世途昬茫之死何惑永念殊隔泣涕莫復酹兹一觴以寫哀臆尚享祭外祖代大人作城南之望奕世惟賢接武辟雍厥聞藹然紛綸五經曰鄭屯田維公髙曽廣塾以延諸老簮盍二獻是先遺言懿範公承其全體涵中和靈珠媚川粃糠世機徳容渾圓囿身書林徘徊孤鶱亦既食實紹兹家氈世徳險微喬木蒼煙紛紜欒胥岌其疾顛掇拾耆舊列于簡編蘧廬方床卷舒窮研其語雖寡其意實傳秀眉玉色投老愈妍謂享大耋事胡不然俛仰疇昔今三十年嵗在丙寅憂患日纒孌彼諸雛不能飛翾請昏于公以煦以憐服􅊞粹温雍容周旋雖乏偕老情實不遷飄風揚塵畏途屯邅為善斯懼公無愠言昔者逺行相望越燕甘脆莫奉於禮實愆歸省床下公疾沈綿形枯神朗遺墨愈鮮属託孔深悲不可宣淳厖日希百巧相挻執玉奉盈敢以自完公死何恨如雲在天式陳酒殽辭盡淚漣尚享祭李兩山代大人作維公周敏之才英偉之彦金精璞温不假琢鍊摩蒼雲以髙翔目九日而不眩造物之卑蓋将以固斯文之元氣閲天下之事變故其始也脱略畦町卷書長哦浩然經濟之意忘其冠切雲之嵳峨分席扵諸老䛕言腐談拱手以置覩江流之如帶凛丸泥之莫倚鳴雞號寒籌筆疾書負囊封以叩關維石友之與俱事往既莫得咎而所以保衛先緒者常兢兢以懐圖嗟今之人志與運乖道與事違介者卒至扵困而爽者或流乎卑抑嘗反覆出處之大致每惕然以深思而公雍容兩端不茹不吐莫余敢侮試命南荒酬勞扵東浙之濵既不以利其身亦不以望扵今玩理忘世孰能踰於斯人者乎幸公之强謂坐進此道以鎮當世之浮薄而事有不可料狂雲飄奔隕晴日之飛雹滔滔川流逝者如斯往不可作徒以為生者之悲昔某辱知文昌公白首故吏三十年于兹始得見公于金華握手傾倒酒酣耳熱各相視不復道念此意冷今聞公䘮愈重不競之歎公䰟在天一息八極雖千里其奚逺我哀之長敢緘辭以薦番江怒瀾其有相余之悲黯也尚享祭王尚書維年月日以清酌之奠祭于内翰給事尚書先生之靈曰道大如天學廣如漢企而望之自涯而返末俗濫觴昧彼一貫捨學而言所執愈渙伊洛之盛嗣扵乾淳析仁辨義脩己治人先民有訓其言諄諄稽經探本纂史輯聞匪黙以髙匪誕以守降于叔季其弊莫救千士一律躪訛踵陋坐曹清談迎事拱手攵散武萎禮㢮樂虧孰㨿其全以爲國毗篤生我公是宗是師天清㬌温前旌後麾窮源崑崙賔日扶桑磅礴萬類衆曷敢當積潤滉漾舒光煒煌探巖排碕纎巨畢蔵若農有秋箱輸廩峙若龍起淵雷震雨施九招希聲昌歜古味爰薦合宫以享以蒞灌膏養腴心君清澄讜言訪對屈軼在廷羣疑未決神龜示靈化被姦饕淳風泠泠天運悠邈公亦永歎學絶道傾死灰莫然獨行誰儔獨立誰言吾非斯人其誰與傳翳翳里門易窮三陳捨泣而歌謂天莫聞劔失其光蘭銷其薰柴桑沈冥王官混淪年已逮耇秉燭繼晷一柱承天四海仰企蔽牛之隂百草茂美謂享大耋以淑後士云胡微疾永蜕世塵嵗匪龍蛇其理莫詢訴詞重華蹇兹遺臣曰士之弊逮今弗振桷以蒙昧請業門下反復可教授以端緒有疑必開有謬必舉語其平生載出載處兾登斯堂舉觴以祝詎期湏臾望公以哭蹻蹻小子抵掌掉目哀哀吾儕殞首莫贖死生之原千古一致瘁躬報徳匪哀以既風雨神交却立鬼魅秉心靡渝服義靡墜庶㡬公䰟慰此耿特皦如兹觴之志罔慝拜手薦公公其来格矢詞致誠有淚俱滴尚享祭胡梅澗先生維年月日袁桷謹以清酌時羞之奠祭于梅澗先生胡公之靈嗚呼司馬氏續素王之旨歸成萬世之標準過髙之議始於王覇謂秦漢而下不得並混取法於唐虞之雍熈其見扵所行迄無以救其元本習剽竊以為工者絺繪變幻乗虛附近語新意粲過都而疾馳自涯而遽返其不謬者則已為過幸書愈傳而學愈陋論愈髙而事愈謬紛紛比比孰有尸其責以自任曠百年而一見知卑與者之所靳維先生負淵海之學執事物之樞用功扵青雲决科之前大究若訥小得若愚網羅搜抉極竹素之秘而其微細委瑣猶不遺於初虞􅊞釋例扵杜氏著履霜堅氷之㫖條分目舉而牛李棄地之争黨子制父之議前人之有疑者雖取舎有在以眀迃叟當時之不得已至扵孜孜衛翼拾遺𥙷誤亦㡬乎司馬氏之忠臣而無負江上之䇿不行扵老姦蒙昧草野避聲却影年運而往知吾道之愈難寫心聲之悲憤聽澗水之潺湲隂陽倚伏何得而非辱何失而非福匪歴代消長融㑹胷臆其何能若是之藎糓甲申之嵗先生出峡訪先子扵城南桷時弱冠氣盛望先生之道不知佩玉之利扵徐趨駕車之不可脱䘖也先生微機以抉之再而赧三而竭垂頭却立畢志以請業由是始得知二千餘年之内論事不可以一㮣而所謂非三代不陳者實要君以行怪憂患荒落負先生之訓相望信宿猶兾往復以自振迅書来自冬属託孔懃諄諄已近扵期耆之語感多而疑成懼不能以久親語未脱口而㑹事已陳一老之不憖斯攵之所係而不肖所受之深者㤙不止扵玉成哀不止扵流涕痛遺書之已稡異夫草玄之隘茍志願之不泯雖少屈而何害掃児童之哀悼陳一觴以自誓蓋事有至難而可成時不可以終逝炳然之書安能久名山之副蔵迄垂闡於盛世公之精誠理寜有昧矢兹一言以俟其㑹溪流奔豗雲木黯䨴相此皦如䰟兮其返斾也尚享祭戴先生維至大四年嵗在􅉝亥三月癸酉朔越二十有四日丙申學生袁桷謹以清酌庶羞之奠敬祭于剡源戴公先生之靈功業可以致君而名不得以潤身科舉足以取士而文不足以行世二岐孔分厥害實深彼沾沾之白首汔莫能自悟卒翳于榛莾而漠然為太虚也先生之識成于髫年失仕以歸素業永捐篝燈蓬髪支笻聳肩抉拾天巧落其華妍視雲在山散為飛泉戊寅之秋愚騃無肖承先子之命以奉洒埽謂百尋之宇拱把之木曷中梁柱凛然師訓顔汗舌吐維臨淵是懼維執玉是慕經事爰久先子棄養十年之間百慴相望深源厚殖莫知其力往嵗先子嘗曰徳非我敢専而世由是傳萬物五色絢兮翩翩吾懼汝之一偏也先生隠几驚坐以起曰汝毋忘父訓嗚呼文以承道徳以承世父師在天終莫敢墜矢文寫哀有淚如洗尚享祭危功逺神室既虛周流無跡巖巖先天風水湧激謨草木五色清心無華外損中益雍容成均訓掌是職鏘鏘佩衿曰古遺直晚歸鑾坡實為舊物炳燭無倦寜以耄屈長松之貞幽蘭之鬱瑰詞玉篆粲若黼黻川流星徂典刑日淪豈期纒綿隕兹徳人我老意短我悲孔新敬率具寮薄奠以陳尚享祭王瓠山承旨維年月日門生具官袁桷謹以酒殽之奠昭告于翰林承旨瓠山先生王公之靈芒芒九州求應惟類粤昔先民疆理制治考賢論方角立競訿大同莫諧多士兹弊始公南来黒髪嶷嶷挈其圖書是根是柢我先大夫接識辭氣晚嵗在京閔恤昧稚曰覺有先後士無遐邇矞雲在空萬物五釆毋匿彼光厥誨以仕迺居禁林執度量士不見其人有簡斯揆手書諄諄而父不死眀有帝制幽有信史削煩養膏汝駿其媺聿来承公傴伏屏俟公車東行跂望靡已公車来朝載色載喜彼山維雲彼堂維戺帶兮委兮告我知已其餞伊何教言靡靡塵之朝飛曷其有既弗寜履氷竟爾用逝外踐内揚於粲終始敷文宣昭秩秩在耳于嗟公兮公往弗墜凡今寠人冒疾有技視公之為有泚以愧愧能止之止孰可嗣嗣今企而彼嗣不躓聞哀于郷承睫涌淚殯宫有紖淚盡斯矢佩玉曵𥚑玩月歲愒寫心何言弗辱罔貳嗚呼哀哉尚享祭吴饒公維延祐六年閏八月癸丑朔越十有二日甲子具官袁桷謹以清酌庶羞之奠敬祭于大司徒饒國吴公之靈寸雲興功甕源湯波磅礴奫沄徳同其科稽公玄胄行仁于番隆汙迭仍卒昌靈柯是生上嗣髙挹泰和手握玄機萬象畢羅不翕以隨不媚以頗允謂家教靡勞琢磋維公純䔍里社婆娑耆夀好禮受祜則那外謙養恭内温守和郷國賜履紆垂佩珂燕豆孔陳湛焉春酡或車扵閭或舟扵河恂恂熈熈皷缶以歌書来亰師戒言匪苛勿私我躬瘁公靡他告而孫子劬書暮哦觀化有終奄然微痾有子純孝涕洟交沲回視吾儕泚顙實多國恩懋昭賁於坡陁生無憾私没無缺蹉仰止盛徳白雲嵯峨南望伊阻心思云瘥承交再世其舊如何薄奠逺陳矢言匪阿尚享祭黄仲正嗚呼世儒謏聞昧焉求容天命罔知曵𥚑憧憧迄莫有成祇尤其逢惟我仲正甫日韜其躬退讓益卑殖學若農謙兮虚谷訥兮大冲恭不近卑夷不失中粤昔耆舊慶暦闡宏鋤荒廣聞維公維卿世胄疾㒹欒范是程君獨憫之仰天撫膺緝簡差差綴書聚蠅經緯譜諜範圍日星若綱斯網若臂斯肱維嵗壬辰盛名日起泮宫舒遅不泄其美維我先子一見驚喟曰姿宇儀觀先大夫是似大夫令名士有㝎誄謂君嗣之克踵厥媺奉于家塾羣幼漸被彼幼困蒙迄莫有啓僕實與君針芥宻投窮玄倉垠探源渠搜比律為均擣珍為羞彼昧不知議莫與酬先子云亡南北異輈嵗月逾邁塵積弊裘君書到手云胡永留中年相同繭室豫脩今訖南歸動色相慰運有顯晦官實郵置曰汝二子教實未至空林荒野黜彼聽視三餘養功先徳是嗣彼夸逐魂氣蹶彌圯屬觴孔深君以疾告話言慎矜罔有㒹倒長年駒隙囊虚禄稍汝易漸完吾與汝校麟經説幽吾願汝斆詞林榛蕪書圃川浩執轡以驅不失其導伏枕瞬息疾危奔泉郷失成彦親失令賢謂天蓋髙則莫敢言謂徳靡脩余曰不然承契疇昔今三十年金蘭合交矧維􅊚聨薄奠寫哀涕盡莫殫嗚呼哀哉尚享祭袁府君稽乾淳之盛際多士闡其皇風啓城南之攵㑹首屯田之封崇維正獻之模範實髙躡其遺蹤植大本以沃心廣經説而訓蒙雲負笈而鵠立越公兹焉以相從懐試牒而不上考舊譜而合宗登慈㤙以後先黨籍熖而避鋒洎大眀之更絃俱玉珮於秘蓬靈椿儼其不凋桂聮芳以増隆髣安陽之成思與桐木而相通凛風雲之變更丹林殞其青葱粲千金之美裘淟涊辱而蒙茸雪霜厲以交隕復融風之相攻履蹇武以不前慘胡為乎泥中合情話以交慰證墜簡而彌縫䑕行窓以窺燈各飣坐以烱瞳意凌空而肆竒效並飛以追鴻神投淵以摶怪争交手而捧龍或舉觴而心眩或擊筑以氣雄窮探蟻扵珠曲駕採蓮於神峯語不泄而益婉詞欲陳而彌封瞻懸瀑於踞石聽空籟於舞松運通塞以莫推各分𡵨而西東歲恊洽以入燕益磅礴其心胷馬伏軛以悲鳴詎示之以不逢亟返駕以式微疾果侵乎令躬念兩家之敦叙五丗閱而攸同原伯魯之丗胄交衢泣其憧憧蚊秋集而失喙菌露漙而慘容憫坌垢以多虞爰返真乎顥穹天柱鬱其朱明校緑籍以昭融玩死生之情状周流竟乎鴻濛陟帝廷而不震承顔僾乎先公賜二笥以永蔵靈根衍以和沖觀萬化之終始深有悲夫夏蟲陳薄奠以永訣抑以寫夙昔之悲衷嗚呼哀哉尚享祭張宗師維至治元年嵗次􅉝酉十有二月庚子朔越十有八日丁巳具官袁桷謹以香茗之奠告于開封玄教大宗師張公之靈曰維公以篤碩之姿冲静之量執儉與勤靡有恣放際遇五朝貴盛莫伉口絶否臧身守謙讓大盈益虚小徳彌諒衆罔置疵異莫敢謗絪緼無垠如雲在天亦既作止脱焉蔵淵金冠玉圭四十五年緼𫀆蕭齋弗競弗鮮易簀以逝嗒然癯僊死生亦大公寜慊然賤子在亰踰二十載每黙察之謂可免悔笑言孔殷觴至彌愛聞公觀化寜不永慨凡我南士命有顯晦五福之全莫與公配一奠寫忱盛徳曷沬靈斿来歸昭鍳如在祭外祖淳祐辛亥大父嚴州養逸家居我外大父敷文繇臨漳解組歸于里閭是嵗八月抱疾以吁曰吾女甫六嵗相宜生佳兒将曷所從維嚴州夫人我中外表俾它日以事問名不旬日嗒然以終􅉝酉之嵗歸䖏州府君實惟次壻官于亰畿是生不孝子曰桷七日以逝外祖母張氏鞠之曰果長成有立我敷攵無愧吾女亦不死㓜嵗多疾兼以羸弱昧昏先䖏州督過不置稍長知外家為王門尅自奮勵遂獲見于郷大夫郷先生曰是子其有聞桷生丙寅先夫人之亡三十有三年䖏州無禄禍罰酷纒閉門省愆曰吾何以報劬十有七日丁亥從表弟具官袁桷謹以清酌庶羞之奠敢昭告于翰林承旨榮禄趙公之靈曰河嶽之精上為列星形而為人孰著炳靈茫茫禹甸萬不一能維公之生服食粹精幼敏于學雲英天葩崑崙五色散而為河其見有卓其别有科書證古攵律合泰和肩曹躪鮑絀荘廣騷身承萬牛手題六鼇神㳺靡窮燈螢𥙷勞運通承休官于兵曹嘉名既彰日厎于髙大縑豐碑喜愠靡辤或與其竒或削其疵窮櫩華居卒為其師行不矜細語不擇辭客去我休嗒然相忘英英玉堂燦兮珩璜心如虚舟云返其郷鷗波大雅曰兹徜徉都有異傳愛者以匿嵗月既深傳者維的聞訃莫奔相視動色世失名士曷有南北維我外祖崇王外孫桷實史出絲蔓是論乙酉之嵗㝎交論文我賦孔深公辭彌敦俯仰三紀獲接佩履薦墨専特屬以史事彼雖藐然公意則侈今承後塵或謂是似哭不慿棺葬不視穴雖云係縻禮則有缺嵗周如流心志若割薄奠寫忱以告永訣嗚呼哀哉尚享祭史車父助教維昔外家過扵侈盛乾坤轉旋咸謂其将不競矣攵治聿興闔郡不薦者㡬三舉桷以譾薄考校輙與而私以計則曰我外家譜諜若是計偕之来抑疑且自懼也嗚呼車父色蒼而貌淳規矩不踰扵常人其考經也守儒先之説罔敢越踰吾則曰五經之説弊極則返昔有議而必除渙然怡然知鄙説之不妄而冒昧固陋得奉身扵殿廬嗚呼區區之心兄悉知之矣投老還山書疏不置意謂衰朽猶能相奉以劇議也靈輀逺歸痛徹心膂暮年哭子因兄之䘮涕泗不已可哀也夫其可置也夫嗚呼哀哉尚享祭㝎水真禪師維皇慶二年三月􅉝夘朔越八日戊戌具官袁桷謹以香茗之奠告于雙峰長老真師之塔空性返真匪以言先詮要混殽强名為禪立禪啓宗假言以宣語黙動作斯言之筌末派沄淪若蔓斯延巧迺嫉之斵方毁圓彼尚辭者復㨿其㒹視之莫名執不以權駕彼駑馬㝠途加鞭在昔源公孤立巖泉食苦避甘養其徳全匪石匪金以刻以鐫来者却立恣言佔諠疾抱遺衣涕語漣漣信宿熟視維師是傳師来斯丘若源之在前毁心以完沈珠于淵謂支離茍生何有嵗年散形而歸雲升在天一髪挽鈞事實眇綿縻爛缺敗曷其有痊陳茗寫心其然其然尚享祭㝎水源禪師維師之行力垢穢而益清也維師之言事韜匿而益明也志異乎衆知者不以為介居䖏乎獨識者不議其隘壊祴脫粟憂道之無傳涕與淚漣辤俗避世将䖏夫懸厓之㒹誓隕其年以厲夫貪鄙而卒不能以遂願也戊寅之冬㑹于先塋師抉其旨神光晶熒匪事扵觧粲焉緯經曰無體無方簡易是程丗道日淪夸誕益臻望洋以行靡知其津維師之示寂今四十有六年桷也周㳺南北亦既垂老何授徒烝烝而罔有以紹雙峰之山實演法之所有祠歴年塵翳莫覩適臨忌辰薄奠式陳以寫我衷愫尚享祭湖心奎律師維泰㝎三年嵗在丙寅四月乙亥朔越十有一日乙酉具官袁桷謹以茗果之奠告于前湖心漢章律師之靈維師以峻絜縝宻之行儀于叢林不言而耄稚所仰無攵而顓蒙所欽壊祴薄飯攝念一室𣑽唄震動絶怖畏以息其貪嗔末世頽波毁戒壊律罔止扵一人鰍鱔縱恣侮夫澄海之巨鱗雖心不為動持清議者何縮吻而咽瘖暮専一丘将挽退静之質以為比鄰今嵗之春㑹言諄諄手書至門遺語益親勸余以老之将至息機心而罷哦吟念故老之凘盡紛攘臂以自陳視師之行其嚚曷悛今師往矣寜不戚􅉝薄奠寫懐庶其鍳歆尚享祭育王眀禪師慨禪林之盛時争摩擊以相接或勵行以安行或發機扵危掣辨鋒激以奔雷玄鑰契而吸鐡遵古聖之矩範接前賢之軌轍於斯時也師能承其餘風以考其異同數十年来兹道不競角立争騁遺言懿行罔有深省師獨巋然玉几之峯㑹衆説以持正繁霜孤松巨浸一航凜乎誠不可以當相㑹未㡬遺書在門痛耆舊之欲盡知典刑之莫存髙年昭眀曷有䀌傷如月在天孰存孰亡持兹一奠以寫餘光祭王蓬山精氣神之交媾兮動死地而莫可詢魂既升而茫忽兮有假夫攝鍊以存存彼學仙者之自任兮謂能持精思以叩夫帝閽鬱儀兮繽紛髣靈霄兮粲以文目渺渺兮空洞睟容髣兮神君道至簡兮宜鋤耘絶聴視兮合渾淪蓬山為郷兮海為門是生王仙兮合吐吞劬躬以訪道兮老益以勤窮還反之變化兮莫逃夫大垠慨宗伯之上征兮壮嵗實預其駿奔守不懈以自将兮二父合情以彌敦數九九而益少陽兮不怛乎世劫之邅屯念初志兮兾有聞侍靈斿兮駕長雲歸来乎隠仙兮塵曷以坌祝文壬子嵗除告祖禰祝文舊嵗冬十月将入直翰林舟来吴門知有代者乃不果行菑畬先疇爰築室是承徭役紛更復逗留以治靖念烝嘗不克親奉是慄是懼秋九月得疾㡬殆庸禱于祖禰幸獲有瘳十月既望蒙恩復授舊職遣官趣驛以進退惟譾薄承藉先徳迄克臻兹言歸于家敢絜酒饌合祀于中堂尚祈相綏以保嘉吉丙辰嵗告追封祝文承藉先䕃有列于朝今踰十稔叨恩次對亦復再留䘏典既行咸得追榮其父母而桷視先考品秩有懸格未應得先妣從先考之爵今追封為㑹稽郡君妻鄭氏亦獲追封為㑹稽縣君縻繫京師未能遄歸異日将告于墓下爰羞酒殽䖍告行宇敢告戊午嵗終告祖禰祝文癸丑之春蒞官于朝今兹六稔烝嘗之奉弗克親薦夙夜惕心次對再叨亦滿秩考嵗聿云暮絜陳庶羞以伸永慕尚相其成俾歸奉松楸桷之大願尚享己未封贈祝文延祐丙辰春叨塵待制霈典普行得追榮于我考妣是嵗翰苑扈從不以官秩髙下咸獲霑恩獨吏部申明謂子職既卑難擬於父繇是僅獲追封妣為㑹稽郡君丙辰秋八月復獲再任惕然松楸之念朝夕不置将俟代南歸捧黄以告墓下夏五月踰滿忽䝉誤恩超陞為直學士靖惟僥倖皆考妣劬勞覆燾之徳奉職伊始曷敢告還謹奉宣命令孫瓘跪讀于墓所保祐無斁俾獲為全人以無負先訓桷之至願敢告己未告鄭氏縣君祝文向以叨榮侍從追崇典行遂得恩及于妻因循再任晉秩集賢卒未可歸令子瓘以副黄焚白敢告􅉝酉嵗終祭祖禰祝文桷濫官于朝踰二十載舊嵗南歸将一意誓墓以奉祭祀承詔復舊春三月来京即預考士四月供職復扈蹕開平八月始還孱弱之質﨑嶇道里迄獲平善皆我祖宗保祐之功嵗聿云暮庸奉祀扵㝢廬俾遂平康二子瓘瑾克紹詩書以光祖徳不肖孤實有祈望惟隂相而黙成之尚享壬戌春祭祖禰祝攵三月甲戌中書奏奉改直翰林退省淺學非所宜當實我祖禰胚胎前光而不肖嗣冒膺是天寵扈蹕有嚴将上開平脆弱之質驅馳不堪車馬脩途冀有以扶翼使獲歸田以奉松楸不勝大願次子瑾俾入成均敢庸䖍告相其有成尚享癸亥封贈告廟祝文慿藉先䕃獲綴從班䘏典肇新祖考嚴川府君得贈中順大夫上騎都尉㑹稽郡伯祖妣王氏令人贈㑹稽郡君考䖏州府君贈亞中大夫輕車都尉㑹稽郡侯妣史氏郡君贈㑹稽郡夫人妣楊氏安人贈㑹稽郡夫人妻鄭氏縣君贈㑹稽郡夫人今祗承宣命奉祀于㝢舎以申䖍告淺薄承緒戰兢靡遑晉秩侍講實繇祖徳深厚弱息踵武克己樹徳敢不夙夜伏祈鍳歆以永終譽敢告告嚴州府君祝攵登極之詔以推恩錫命為首越小大臣罔不承澤桷以侍臣獲追榮于二代而我祖考今得贈中順大夫上騎都尉㑹稽郡伯祖妣贈㑹稽郡君追惟付託之重實䔍意于先大夫不肖孫朝夕思念靡有替墜踰六十有七年獲遂初志霜露既降謹以副黄俾瓘焚白近叨綸音晉秩侍講行能淺薄大懼弗克荷負先徳弘逺兾有以綏祐贈典有加行申告于墓下敢告告䖏州府君祝攵登極有詔以推恩錫命為首小大臣罔不承澤越今始奉行桷以侍臣獲追榮于二代而先考得贈亞中大夫輕車都尉㑹稽郡侯妣史氏贈㑹稽郡夫人妣楊氏贈㑹稽郡夫人靖惟義方之教期勵甚逺種徳殖義奏身以淑後者郷黨所共知施于孤児得食其豐報霜露既降謹以副黄俾長孫瓘焚白以鍳近叨綸音晉秩侍講忝竊踰分惟寵綏而啓祐使行能無愧獲為全人則世徳永逺施于諸孫俾有慿奉敢告告鄭氏縣君祝文往嵗已膺縣君之命今䘏典既開位在三品追爵彌髙繇是陞為㑹稽郡夫人天澤深厚魂其欽承敢告謁告還家祭祖祝攵庚申蒙恩被召再入集賢連嵗疊除大懼不克負荷日夕念歸以䖍奉祭祀為急守職有嚴不敢遽去今者謁告歸里将杜門息心力教子孫永承松楸之䕃私心未遂惟隂相以成其私禴祭有嚴敬奉昭穆合食于新堂敢布由衷尚享追封祝攵綴跡朝著今踰二紀行能譾薄大懼弗䏻稱職迺者先丞相忠獻王不以卑鄙驟加超擢叨塵二品今上嗣位大賚中外視其職秩悉俾追榮繇是祖考加贈嘉議大夫禮部尚書上輕車都尉追封㑹稽郡侯祖妣王氏加封㑹稽郡夫人考加贈中奉大夫浙東道宣慰使都元帥䕶軍追封㑹稽郡公妣史氏加封㑹稽郡夫人妣楊氏加封㑹稽郡夫人成命已頒庸告于逺祖敢告立碑告墓祝攵維㤗定二年嵗在乙丑十有二月丁丑朔越三日己卯男具官桷敢昭告于妣史氏㑹稽郡夫人七日而孤先郡公以家教之謹始於嬰孩能言即授書甫七嵗詩書語孟皆已誦習尚書之澤桷以嫡長當受郡公讓于兄子甲戌嵗先公陞貟郎法當從是進秩且得以官其子先公正色曰我即死官亦不以與郷書國學儀圖以紹世徳汝之責也纎粟靡宻先公一以自任遂得専意問學師友之淵懿皆躬探而力討辛丑嵗登名于翰苑凡二十有五年僥忝踰分皆考妣之垂𥙿隧碑未立每䀌然于懐往官待制清河元公擅金石之作遂獲乞銘吴興趙公専翰墨之美得求其書今已十年而桷齒髪漸衰亟刻石立于墓右亦欲俾子孫知儒學足以發身扵是有考謹以清酌庶羞敬奉考中奉大夫浙東道宣慰使都元帥䕶軍㑹稽郡公妣楊氏㑹稽郡夫人合祭尚享祭外祖母張氏祝攵嗚呼自先夫人之亡我外祖母不忍棄其諸孤鞠育撫訓日期成立以報罔極桷今幸不墜先訓官于翰林集賢者二十有五年而先夫人之誌始得成就載惟厚恩懼子孫之不詳亦登具于誌上今兹立石敬以清酌蔬食用伸䖍告尚享立碑告墓祝攵幼承嚴訓遂得悉意於藝攵有列于朝大懼遺言懿行之罔傳向為次對廣平程公辱在先友適為院長迺求其銘是後叨塵二品封贈疊加不敢易其舊攵遂刻于碑右乙未之日實為誕辰庸建碑于隧道嗚呼厚徳如山百不寫一靖惟孝思曷有殫極敢告男瓘祔祭攵男瓘不幸蚤夭已安葬于錢湖黄奥之原日月不居已經卒哭禮宜祔于王父大母今兹陳設殽饌有事于中堂敬以其主祔孤児孤女冀相其成俾宗緒不墜則實有望敢告男瓘祔廟攵盛年長往亦既妥安其體魄矣卒哭事竣當祔主于祖廟設祭中堂其從與享清容居士集巻第四十三
