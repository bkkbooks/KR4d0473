body:
  text: 記馬元帥防倭記自昔待蠻夷之國必傳詔令以諭説之稍失撫馭則狙詐百出甚者嗜錙銖之甘傾接如素所交往失上國體簸侮訕笑于兹有年矣今天子考獻令於疆域中書省奏曰蠻夷之不庭實守禦長吏餌利忘公弊不可日長維㝎海實慶元屬縣附海司鎮遏遵考舊迹兹其為泊艤之所舶有㝎制輸其物以上于官勿入郡城勿止貿易則得以永逺虛聲生疑駱驛傳騎亡益也是宜選帥臣清白有譽望者制置其事上可其奏泰㝎二年冬十月倭人以舟至海口於是行省僉曰非馬公孰得當是選公乘驛至縣即宣諭上意始疑駭不肯承命反復申諭訖如教於是整官軍合四部以一號召列邏船以示備禦戢科調減騶從除征商之姦嚴巡警之實慮民之投憲為文以諭收其帆櫓器械而舶法卒不敢移減自便事既畢賈區市虛陳列分錯咿嚘爭竒踏歌轉舞川后山君德色效靈而公之淵思曲畫若防之制水不可得以殫述自始訖終凡一百三十有七日古之禦邊莫踰于諸葛武侯韋臯善繼史有述焉今公創始於前願後之賢帥規隨以成非惟鄉里之奠安則國家懷來將自兹始王會之篇桷願有繼焉兩浙轉運鹽使分司記國朝定煮海之賦倍於前代邦用是資其選官委任為不輕兩浙設總司於杭東西屬郡率置分司以董督四明號為東浙繁夥飢饉荐罹逋負益廣急之則疲薾愁嘆黧色骨立見於耄稚故受其任者為最難桷官翰林時預議中書堂嘗白丞相乞減嵗額丞相頷其議于時大臣咸然其説卒以户部籍不能易是後憂國者迄減其直繼今善謀邦計之士亦將有以待也泰定元年冬分司燬三年張侯伯威蒞是邦以官楮若干委于郡郡守郭侯曰兹役不可緩必擇善於營繕者是屬曰阮君申之縣庠之興尹能紹之曰尉周君一夔尉廨久湮尉能起之兹其以是屬僉謀曰取于山里胥是刪鬻於市大賈以喜將視其材市於民堅完縝密是則不負於郭侯之教矣六月闡工九月告成聽事崇嚴夾舍拱揖門臺有敘百堵具列斧斤鼛鼓不徹于垣周君則曰尉雖不才囹圄之設非我職矧轉運府設是則益以病盍去諸復以楮之餘者歸于司官常患不得其人急奉於公怨讟滋興况復因之以竊其利周君則不然人皆曰作之登登周君是承去其榜笞民完以熙若是則任其職者絶呌囂息追逮其賦寧有不登于天府昔之使者遺愛揭於堅珉矣後之來者登斯堂也藹然仁政將屢書不絶桷老矣尚當見之泰㝎四年二月庚寅具官袁桷記鄞縣小溪巡檢司記城南門折行四十五里曰小溪鎮宋元豐置焉唐曰光溪鎮以監酒稅煙火得名治平元年罷酒稅以便民獨掌煙火凡言煙火職民訟水火盜賊其地三境交接大江貫其中羣溪畢會水清泠如明鏡巖巒擁秀千篙競發碧瓦朱甍翬聳鱗比望之如神仙居宋紹興中北客多樂居之魏文節公結圃墅與客大梁張武子為詩友其它如安儀同孫王尚書相繼卜築而為是鎮者于于飬恬承接履舄爭鬪絶庭下桷幼嵗舟至溪上猶能記髣佛也皇朝一海宇立巡檢司于是地而舊鎮久廢故家亦湮沒毁散仕者率苟循嵗月處隘踵陋不復以崇嚴為事泰㝎元年白君察罕不花蒞是職與父老言曰司徼之所不在荒寂則在獷惡吾獨愛是溪有先賢之遺俗薪者販者前歌後休絶枹鼓之警罷干棷之邏吾心固勤焉亦是土循謹之素願廣聽事以表兹溪咸曰然於是木踵以至甓效以來三年夏闡工九月告成逺迎龍湫近接虹梁舉觴以落而懷牒巧訟者各屏息以避有合夫道德齊禮之義乃相與歌曰作之蒸蒸罔聞其聲養其髙明心清以寧不卑其官惟後來是承吳江重建長橋記震澤東受羣川汪洋巨浸至吳江尤廣衍地為南北衝千帆競發駛風怒濤舂擊噴薄一失便利莫能制唐刺史王仲舒築石堤以順牽挽宋慶曆八年邑宰李問始造長橋繇是各捨舟以途來往若織水齧木腐嵗一治葺益為民病泰㝎元年冬州判官張君顯祖始蒞事曰兹實首政稽工程財莫知攸出當謀於民民有調役維浮屠善計度長衢廣殿瞬息以具吾語諸其有獲廣濟僧崇敬實來敬言伐木為梁弗克支逺易以石其迄有濟參知政事馬思忽公以督運至吳乃采其議周詢以籌首捐資以勸敬復曰作事謀始不可不慎有善士姚嘉禾人能任大工役必屈以委繪圖相攸經畫畢具咸服姚議於是參政諉郡守郭侯鵬翼役未興丞相答剌罕公朝京師回道繇吳江郡白橋議丞相曰吾必首倡即捐萬緍而府縣士民相胥以勸平章髙公貫公繇湖廣江西來自江浙力囑張君俾終是工杜侯貞來守是土亦曰張之言然閏正月建橋明年二月橋成長一千三百尺有竒揵以巨石下逹層淵積石既髙環若半月為梁六十有一釃其剽悍廣中三梁為丈三百以通巨舟層欄狻猊危柱贔屭甃以文甓過者如席舊有亭名垂虹周遭嵳峩因名以增榮觀焉是役也敬師鳩徒輸財實三之二贏財十萬復以為寶帶橋助姚總其綱張君首議出於仁政事有吻合而是州興役見知於丞相誠出大幸厥今運舟相聨驛使旁午咸曰丞相謀國經逺張君美績繇是得書將永逺無極繫之以詩曰茫茫禹甸昔鄰于魚維四載功兹為具區有失其防羣嗸喁喁曰維李侯構兹虹梁經始孔艱任負揚揚嵗老水泐臨履若驚張君蒞官飭我初政曰兹橋匪修涉者益病召彼耆老貨布莫競相國之來六轡徐徐詢事審宜以究以圖割其緍錢㑭民樂輸橋既成矣虹飛于江千柱承宇羣流回矼儼兮層城爛其軒窗張君籌思相國成之彼清淨士式克承之千嵗永賴我庸以銘之陸氏捨田記吳越舊俗敬事鬼神後千餘年爭崇尚浮屠老子學棟甍遍郡縣宋帝南渡公卿大臣多出兩浙而制令入政府得建宫院崇祖禰驅石輦木空巖閴寂之地髙下晃曜財日益耗而弊莫可救矣故稍自給足者亦承風效施跬步瞬目日不勝其繁吁可禁哉宋社亡故家日降辱過昔所崇建揮手若不相識甚者翦夷其墓田豚蹄之祭不通于焄蒿而卒未有能懲戒夫厲階於初其習聞者不變故雖善説巧譬終莫能以改也夫錫山陸元俊以其母夫人楊氏捨田之狀且告曰陸故吳望族大父凱恬靜絶企騖觀老子書若有得所與交多聞人是生先府君愈孝謹自治讀司馬公書不釋手人勸之仕則曰吾承事於家者未至安能弊內以益外哉未幾大父母相繼卒吾府君拮據治窀穸不幸以毁卒又不幸弟鐵孫卒於是吾母曰為物為變魂之屈而不能伸者也氣化則魂升求於家祭記禮者盡之矣求於窈冥則莫若清淨焉是依汝父若弟其往也無悔而吾惓惓者情有盡而哀終身不可以有盡也今將割田若干歸于城北之洞虛觀以廣其時思吾知守禮者矜其情而曲許之焉事不永久則吾之志墮當求能文詞者為之傳其文傳田不復可易矣田不可易則汝父弟與吾志俱不朽矣其言若是㑭余信其言者吾友陽榖李君希哲也希哲於陸母為姻聨善屬文遜于豫者求徵以示公也警其子孫而余前言惓惓復將以警夫觀中之徒知以輿言為可畏也袁桷記野月觀記養生説有二焉北祖全真其學首以耐勞苦力耕作故凡居處服食非其所自為不敢享蓬垢疏糲絶憂患慕羡人所不堪者能安之調伏攝持將以復其性死生夀夭泊然無繫念駸駸乎笁乾氏之學矣東南師魏伯陽其傳以不死為宗本於黃帝韜精鍊形御六氣以遊夫萬物之表其夀命益長者謂之仙而所傳確有派繫先儒深有取焉夫人之所受為命其夭閼戕賊必不能盡其年過於厚者非自裕也盡性知天踐形以全其正斯二者俱得之矣天台多羽人居遺迹勝所相望不絶宋世有大梁趙公宗卿某佐縣黃巖樂而家焉踰二百年子孫益繁衍詩書孝友簪笏不絶於家乘四世孫與慶虛中父遁世樂道從北方之學者而慕之志強氣堅脅不至席今踰十年矣遂築室委羽山之西北八牖四房兩翼三楹靚深以明于以坐忘不知寒暑之代謝順其天年以入於自然者也而名之曰野月焉月猶身也則而象之者得無似乎吾按其圖東西仙源南企大有北顧商丘誠仙人棲息之所境清則神湛嘗聞張平叔産是州王子晉居桐柏山二人皆以不死傳信盡性可以至命虛中得至靜之説願取平叔書讀之將見王子而肅之矣道無異同不偏於一者則盡善桷也行南歸願踵門請其説尚當賦之至治元年九月四眀袁桷記沖菴記御史臺都事開封賈君華甫以沖名其居謂袁桷曰為我敷繹而記之余於易先後天之説精思以求而嘗得其説焉沖漠無迹易之初也二儀定位其氣果有分哉是氣也隂陽得之則為日月星辰為河漢為山嶽凝而瑞于世為甘露為慶雲形而在下四靈連理之應係焉其於人也受中以生則與天地之未判同也曰生矣氣亦果有分哉曰寂然者初之未始離者也感以應不動乎內者也心君清寧行乎六氣而不沴處乎寒暑而無背則中和者內外之樞紐也昔之聖人言夫上者為道下者為器變通事業允屬夫人若是則全其大和以養吾生休休焉復奚遜焉存誠以立乾之本也持敬以直坤之本也聖人惓惓致辭焉隂陽之用備矣氣生於無形成於有形聚散反復晝夜不置朂哉勉夫將不能以病矣華甫官京師踰二十年踐歷清劇其於事物也充然若迎刃與人交謙以善防臧否之色絶顔面而損益髙下各有攸當是其飬之有素外不能動者矣其名曰沖不幾似夫華甫竦然曰唯遂為之記順堂記大德八年余與天台陳君剛中為翰林屬剛中素簡曠不耐酬接獨其族子萬里禆益俯仰客至能使盡歡禮洽而氣和真翩翩良子弟也家居于台之三台山之下凡十有一世宋世第科目聲黌序代有其人焉古之言令族必曰荀陳曰王謝非貴華腴也薰德以為善積小以為髙絶於聲音笑貌篤躬以行者斯近矣萬里三遊京師未嘗不與之言齊家修身察其所養益充厚調官以歸謂余曰遴築堂以奉吾母兄弟三人而仲弟居于外今將挽之以歸抑反身而思之我不能和協以至於是邪則又曰遴其母以妻孥之私若是邪昔之歌常棣之詩情義之曲盡焉者也而夫子蔽之曰順願則順焉其殆庶幾矣桷曰天地以順動不順為逆焉孛于辰為震為孽春秋紀之順天地之經義者孝之本矣陳仲子喻於稿壤世人行事不若仲子則升斯堂油然以興不逺而復何憂焉化由身始蓋何病焉為之歌曰彼山巑岏孰啓源兮世十有一嗣宗蕃兮木之詵詵本可分兮謂本可分兮枝曷以存季也孔艱憂心薰兮伯也鬱陶求于原兮歸來歸來兮我母永歡兮積慶堂記往嵗朝廷廣錫類之澤於中外繇是執政大臣得追榮其三世今集賢大學士平章大慈公時為翰林承旨捧制書告于厥曽暨祖考惕然以思曰嗣子守先緒敬篤弗敢替陟降帝廷嘉惠日接靡有間兹惟前人寵綏功我康懿公潛光葆真植德在拱把至安惠公封樹益虔美蔭磅礴蓄久而未振逮先考文敏公則亦旁達秀發聞譽光灼矣然祿弗稱其報今膺是穹顯居室完好弗先烈是思曷稱永久遂扁其堂曰積慶有取於坤之文言如臨如存知所以近天子之光者實有攸自桷也獲殿次集賢得升公之堂而㑭有言焉古之能孝者食息跬步不忘其本而詩人之推原則亦曰孝孫有慶是皆其先祖之徂賚夫源深則流長恃而不浚將壅焉以竭譬之善賈貨殖之積所從來久矣因其饒而日取之用殆有盡今平章公朝夕承顧問委心微言觸類以感悟廣聞以通導善經達權以天下休戚為己任所陳於上者外雖不能知覩命名之意若堂焉以構播焉以穫實崇乃先公之德以垂裕於萬子孫毋怠則凡登斯堂者亦將倣以尊祖河潤九里夫豈徒言乎哉樂全齋記真㝎李君允希微甫故儒家幼慕沖曠閲其遊記曰登恆山聆天雞觀出日焉遵太行上王屋山嵩華少室視昔時好竒之士遺迹鑱刻悲愈怪愕歷歷在目而徼福頌語何侈愚也南踰江淮地險不足恃矣震澤禹功能知尊之錢塘故王都囂溽靡習未有改遂窺禹穴望蓬萊久之歷天台赤城知孫興公司馬承禎肥遁益有旨武夷九曲其仙者誠然與道統之傳有自矣過九江審瀦匯之本匡山之截乎長江者非偶然也衡山為南嶽灊山望祭抑深疑之氣舒而神完則曰吾於鍾山其止乎遂日廣松竹桃杏鼎壺几硯之屬于以娛其客且益以自佚鍾山故衣冠之所僑寓也繇晉以南名士居焉今將居是丘以樂之為何如益展其地曰山房堂曰靜修齋曰樂全軒曰松風而命其樂全者㑭余記余嘗悲好遊之士名足以成矣文足以傳矣而不能全其身蓋其沉恣豢養恃才以肆危機駭浪蹈之而莫知遇事瓦解其悔恨悼惜若無所容其生非若夫子之宋之陳之衛之不遇蓋德以輔名道以喻志捨是則非以自豫也希微生盛眀之世居于中州以仕焉若水達于川孰能禦遏今而曰卜居于南土豈託而逃者與余居京師見持政柄者皆善思索位置遇大利害輒執咎不能解而南士以疏逺得免希微之居南夫豈遂其靜退與抑亦耳目之所接有感而然與遂為之辭曰顒顒鍾山霸基承兮英光蕩摩隱德貞兮泉纚纚兮玉鈴松搖搖兮翠旌維潔士之定居兮山神憺兮以受令合正命兮萬化成神無方兮飬千齡竹鳯石屏記繇開平西南行七百里稍折西北其地有泉如懸簾五色貫射在昔世祖皇帝名之曰三不刺以其國語志之也地曠衍均成沙居民鮮少地所宜惟瓜悉發南戍卒墾樹之瓜絶甘美按燉煌多種瓜沙土疏利根蔓善達分水無沮洳昔常以江漢人廣其田號會稽其事政相似至治元年今天子巡北邊望祭陵寢昭文館學士史公以屬車從旄旗交章鼓柝傳警頓次之暇則詢其遺俗千里一色林光野燒絶不接目睫怪石犬牙層獻迭見遂得一屏若水玉澄徹雲根屹成巖崿雕鏤其上有叢竹森列旁出一木緑葉密成前隱采鳳回咮導前以飛五采紛敷不假於琢削而生意屈曲造物有以畀之者因名之曰竹梧來鳯為圖以紀之余嘗聞地之宜於五榖者男女必繁夥充斥盡力以食其土若夫絶漠廣域其寶玉光怪不可名狀而其人類寡鮮得非夫地之氣其凝結者為星辰為河嶽其聖其賢者為君師以長牧之至于不能以自見者則萃其精眀剛潔之質以伏于荒野一得所遭而其緹襲繅薦又甚於他好豈不幸哉方今天子寶賢飭躬以孚佑于下民兹石之瑞和氣之感與抑亦開太平之應以告成于天與史公往在至元間從大帝出征嘗得二石中空如塤出虛成奏其一具北斗形余嘗聞史公好養生説玉石吾寶視於內者何如也至治三年三月袁桷記曰生堂記天台道士項君子虛通岐黃書其治病不擇富貧輒徒步以往處藥候脈有源委蓋所居鄉有老醫能理傷寒受其説傷寒首經絡未有不通是而能為醫者治所居室名之以曰生且求記於余噫今之醫未嘗不以生為心也技薄而學淺貿貿然以遊人之門恣意剖決遂使夫人之夀夭不得以盡其正命十蓋有五六者焉薄人之危剛燥疏補重其疾以利厚資則凡所謂生者不存於其心矣天地之於品物寒暑代天台道士項君子虛通岐黃書其治病不擇富貧輒徒步以往處藥候脈有源委蓋所居鄉有老醫能理傷寒受其説傷寒首經絡未有不通是而能為醫者治所居室名之以曰生且求記於余噫今之醫未嘗不以生為心也技薄而學淺貿貿然以遊人之門恣意剖決遂使夫人之夀夭不得以盡其正命十蓋有五六者焉薄人之危剛燥疏補重其疾以利厚資則凡所謂生者不存於其心矣天地之於品物寒暑代謝日用而不能以知為之君師以正其綱常為之醫以療其疾病是醫之道其贊化育者厥功茂著仁為人心操存動止於醫殆得其全矣余嘗聞道家者言陶弘景增本草飛走蟲魚類例有殺生心此蓋誘俗鄙俚之論犧牲養人千萬世不能以易藝不如古人挾一囊以自行巢氏之説畢具於所挾矯誣滋甚矧有若豫前所言者其為醫之禍最速矣子虛氣正而色剛立志不苟視財帛如糞土耐習勞苦師全真之説養心若保赤子其未通者必有以日廣活人愈多仰俯不怍斯其為德也大矣庸俟以紀至治三年九月袁桷記信州貴溪縣楊林橋記貴溪環山為縣大溪貫其中支流為楊林秋夏水至奔潰莫能禦嵗病涉焉當淳熙年有僧允懷任其事懷陸出也象山文安公勉之曰徒杠輿梁觀政之本是則昔時盛平轉輸供調之勞守令有所不暇及矣考於成周除成梁道于先王之財賄不用役民之法其無乃因其隙而用之故不煩于官者良有以也二千年來著律令者長吏率遵守文具飾傳舍除驛道為急使者所弗至不復計省民所必趨而顓受其害于是乎有倡義者焉懼其嗇於財也則復有利益之説焉噫民之所利上所當興顧其力有不能事與勢實有違者夫豈惟今也哉龍虎山為老子祖宫其民食其業以遊於襄陜廣蜀嵗幾萬人而江淮復不與道繇楊林咸惴惴焉求於上則有未及謀於私則曰亦盍思以為永久於是山之道士曰傅某章某首出資以倡之主兹山者董某曰事宜是鄉之耆老某亦曰吾等詎坐視遂伐木聚石聳為飛梁危湍駛流帖俯於履轍之下訖成於至治元年十有一月明年董君􅊞常來亰師命余以記余讀老子之書曰修之鄉德乃長又曰儉故能廣刻志繕行則其自貶損者夫豈厚生以自飬民困於徭役牧之者不能以告于上因令所著而強之將轉散而他往清淨之學不有衛翊其何以為教三君子之志深且逺永詔後之來楊林之橋其何有廢焉小領水亭記薛君玄卿自京師歸上清二年矣習靜修德日治其文詞刋落雕飾以求進于道暇日遊小領領分為兩側足以上過者岌嶪然龍虎山為治所其教行南北故凡驛騎之旁午商賈之輻湊皆本於龍虎而道必繇于小領玄卿坐其旁見行者之至是皆假以憩息良憫其勞貴賤固一等也遂築館于領之西曰崇賢作亭于領之東曰振衣命道人日具茗水承接以休其心昔之善喻者曰夸父逐日而不返今世汲汲然道途者皆夸父也故其捫歷河漢而不懾困厄蠻瘴而不懼方其去鄉里辭妻子漠然無惘惘之色其羇窮逆旅饘粥藥餌之不給而猶曰我有命焉奚以憂至于久勞而思逸若登兹領然者未嘗不心一而念同當是時使幡然有得吾知其絶迹于是途必矣玄卿曰領之東古象山陸文安公講道之地其西為臺山突兀秀峙南為雲林麈湖聖井琵琶諸峯歷歷可數北則潛山之井邑稠密髙下雞犬桑柘望之如神仙居吾知夫仕焉而已登兹領也必曰吾不復為人間事矣其善蓄而給足者則曰吾行其少息矣王公貴臣捧香而來于山亦知老子不辱莫先于善退往來鮮少將見夫青牛白鹿之士倚古松而聽流水登斯亭也願為之執鞭以俟焉斯可矣遂掇其語而為之文泰定元年正月壬寅清容居士袁桷記友恭堂記余幼居鄉合郡里巷考門閎之髙者十居其六七焉先公撫余首而言曰自圭組之日盛而兄弟之虧有不可勝言者今可稱道惟史忠獻王與汝曽外祖忠宣公白首若一次則曰余忠惠其季尚書貧無副衣出入互易貴且死也約同葬尚書之子寺丞不替是道以京秩讓其弟所後子二百年來登顯仕亡慮數十姓中外宦簿俱遍歷獨號能盡兄弟道為難蓋其貴盛之極勢軋於相等稍避嫌以退則若無所容其身以為吾才不能以見用者兄弟使然也不再傳而其祖父之所蓄棟積稛聚各私利其美好黨署賔客強凌很勝嵗時敘昭穆占對簡略觴豆不設強成禮即退言至是良可哀也又曰吾之事賔州汝雖嫡長讓其爵于兄子凡世所慕好吾一不以問怡色拱立若幼子弟積誠以感遂悔焉而益以親汝以孤子承吾宗何憂焉若有子孫衆多能率我以行則知吾門殆未父也受其言于今四十年余官集賢日近醫藥命次子瑾來侍久之復還翰林屢謁告以請不得命長子瓘撤舊室之蠧腐搆新堂以俟歸書屢至將以盡侍養之道余曰父子異宫兄弟同處古之制也幸有尚書公之堂在可以逸老則斯堂若兄弟居之誠宜遂名曰友恭實取夫先公之遺訓焉夫為公侯之後得為幸矣恣其私心以泯夫天倫氓隸之所不忍因詩書而成衣冠不幸不勝衣冠而卒泯其詩書則昔之髙門今不能一二者其病首在是越公之書在山中而余再世之積實倍焉二子能讀而守之又將見吾諸孫之有成而翁授首之泰㝎元年月日清容居士記種德堂記蔡侯茂先以其先郡侯之狀求銘托其行事古君子也少間謁余為種德堂記其名實侯崇祖之本意昭揭于户册者集賢大學士郭公安道之所篆而歌詠其事以光顯悉余同院之故人也若是則余何敢辭郡侯之樹德蓋不止於鋕銘之所紀而因事以詠則宜有取於行實昔人有言隂德猶耳鳴想其平居篤厚廣施於鄉惻然以求其急難御於家也敏其力者貰之不足者周之懼飭躬之未能蚤夜以思則曰所求合乎古未能也蘄正乎有道之士則曰吾所為能盡善邪燭計利害得無慊邪施於族者洽於肌髓與訓於家者蹈履足以日化與朝培而夕修望嵗焉不求報豐飬之以年祝之於子期之于孫磅礴浸漬斯其為種德之本旨也茂先今為良二千石其季為太守鸞翥鵠峙羽儀清朝盡忠補過以先其祖父吾知其曽雲少者謹于里門長者服于王庭恂恂孝慎日補其未備考其興隆與德良未艾也書曰率乃祖考之攸行又曰汝克昭乃顯祖願相與勉桷也亦從是得以有益焉泰㝎元年冬十月甲子四眀袁桷記春暉堂記翰林院都事韓君友謙居京師有年矣往嵗築堂以奉其母夫人未幾下世今復名其堂曰春暉示不忘初也命余記其事焉孟子生於戰國距舜之時幾二千餘嵗矣而其言終身之慕者則必曰惟舜一人焉耳矣昔之聖人懼其不能皆然也為之令以教之為之表以勸之而作史者復取其卓異者以彰眀之教益詳而行益微吁可嘆也矣孝根於心人之所同繇古而論宜不若是薄然而缺焉所從來久立其名者良有以也杯圈手澤存而不察非孝之實吾知夫韓君之升斯堂也雞鳴則思其進盥之儀饋食以列則思其嗜好之若初將惕然而奉之日入而息陳其枕簟暗乎其有聞也故其居於家也望之而在前思之而若著其處於鄉也身無虧焉言無擇焉鄉之老者曰韓氏之澤有在矣其先人之教未忘也立于班朝無有父母兢兢若臨于其側而人始曰若是者其殆幾於永慕矣吾聞友謙佐治大尹執禮自持不為苛刻矯亢人安其業而化俗敦教飢渴之於飲食義方之訓有自來矣昔孟氏之子于其羇愁困窮之際始矢于言情之感也友謙仕不離鄉遭世隆平卒取其言感之正也桷也官于朝七稔矣升春暉之堂得無愧乎賀蘭堂記靈武李公居錢塘三十年築其第之堂而名曰賀蘭志不忘本也會桷自京師還乃命志之桷嘗紬書于太史按賀蘭山在靈武保靜縣西草木青白望之如駁馬然者土音語駁為賀蘭而昔之居是山者復因以為姓在唐天寶時靈武號要衝後卒能以一旅之衆興復舊業至李王有其地天下易代凡九姓獨靈武以十餘州相傳者三百餘年其民沉鷙尚勇土壤沃曠氈酪駝馬給足無凶歉國狹而慮密各以金革相保衛患難垂乏絶不少變精急専一迄能奉其君長蓋傳愈久則俗愈定太祖皇帝經略西土為武功首靈夏舊地始臣服委質然猶強節好義䇿殊勳受上賞者史不絶書李公之仕于江南也常兢兢然惠綏不忍侮其鰥寡而其于浙東也事若有素今所領七郡四為其守矣風俗媺惡皆示諸掌而惓惓思於賀蘭者亦將有以振夫萎薾之習使吳越之土如吾賀蘭者斯可矣古者氏族之别必錫于其土雖逺處他邑其不紊殽者因是以有考賀蘭之山承平日滋昔時之草木意其豐茸嘉美當盛于公去鄉里之日而斯堂之封植五采交錯密然成文者心猶以為賀蘭也食必祭先耕則祭嗇斯須不敢遺其初種德崇報有開必先以似以續殆將見之公其以余言為徴也沉香石記唐虞之時曷有玩其耳目哉余讀貢書至青州則有怪石者焉今文登諸島洲往往掇拾珍怪置几席間物易得而可喜則雖聖人是誠有所不廢矣浙東括蒼山松化為石其文理真如松或曰踰千年乃爾人為至靈其化之不可測也為聖焉為神焉受成而不變者木與石至積之嵗月則貫射於日星磅礴於霜露光怪駭愕充然黝然為珀為玉有不可悉名者矣嘉榖為莠穡夫憂之鷹之為鳩橘之為枳其遷之若是則亦有美惡存於其中焉京城田舜舉為太醫院屬治其燕居眀潔靚幽得一石望之如水沉樛結宛轉巖崿刻削薦以文石過者咸以為海南土産也似是而非其為怪石也奚以疑故變至於道君子之所勉子盍慎諸樂善堂記雲間繇魏晉以降多文人磅礴秀潔故其言辭幽麗瑰雅喻物形狀無留遁常驚動海宇是其人誠精於言者也或曰其地介海挾江波濤魚龍善噴薄變化人居其中者咸似之宋世文儒益光顯冠帶相望數十年來習始變舟楫極蠻島竒貨善物往往充上國力事生産廣田侈居擬於王侯而仕者亦爭願食于其土夫事久則變變則迭為乘除因其見聞上之人寧有不遏其萌芽㝎其準式者與惟烏溪趙質夫之居於鄉也悃愊以無營恂恂里閭足不踐公府汰其侈華日安于平素其鄉人之不善者避之嘗曰積豪以希富富不能永也積書以教子吾其盡心焉勸之仕不能動苟利於人者誠求之泉石以為腴德充以完嗒然忘世其樂道肥遁焉者歟未幾其子庭芝登進士第人始有言曰是殆將復其初矣昔故多文物不幸為大家以財雄是其地氣厚積之使然也趙君不屑意焉於是以儒名抑進之則必以文顯文與行相須以成余嘗上庭芝之文於殿廷繇是以求之探源泝流苟不止則其學益粹聲聞之逺無疑矣庭芝詣門曰嚴君以樂善名堂願有記退而詢諸其往來遂以行事為之記質夫名宗文大父以積善聞于鄉樂善之義袒是亦樂齋記永嘉陳子敬客京師居城南東隅車輪馬蹄之聲奔激若雷雹大雨泥淖入數尺賈區豕圈參錯啾唧土俗雜南北不可辨入子敬門槐隂植幢蓋寒苔斑菊側布踈密清泉滿洗白雲在户坐者不欲去去者復再至君蒼髯抵掌一榻為席顧余而言曰此亦樂齋也髙王父宣撫公受薦史太師太師若髙外大父舊家遺德泯然罹變更漆園吏之意為我終始而言之夸者以愧感者以喟不幾於道乎桷幼聞長老言君里宅雄甲勝㯫重樓疏軒旁薄倒景飛鳥怖而海雲伏也君方少年挾䇿以自劬漠然其中若不能一朝處稍壯入太學喜名而益竒蒹葭芙蕖之蕭爽招提廜㢝之空絶境寂意冷疾筆落紙自得於杳靄千頃之外望者知非綺紈世子弟而視窶人子復不相似何其盛也今一廢不得復廢復坐刻畫居京師十年無知已力慷慨引助視重垢積戾頑然持牒爭洗濯不三宿告去君意氣當復摧抑闒茸而怡然以理勝豈榮觀之旨託焉以自逃者與屢空晏如榮辱不足以纍豆羮見色情怵于內也使向時沉溺自恣卒遇不遂意冝朝夕弗給又安得為十年計天乎其成之者至矣噫使果止是耶則亦無以自樂夫強之而不復必巽德以處太夫人春秋髙不能自眀寧勿歸也少貶以求樂於是乎有在陳子勉乎哉慎交而寡言正車于塗其終能有以直矣清容居士集卷第十九
