  text: 清容居士集卷第十一
  hash: sha256:aafed01c540e57f739ad58e993594c5cc87764b1da7f11378f038ea8bad8c50b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_011-1a}
body:
  text: 律詩七言過揚州憶昔六首令威化鶴千年返列子御風旬日遊已信銷沉同此意莫將寂歷起清愁江流今古空陳迹山色有無知幾秋赫赫當年成砥事斜陽眀滅隱滄洲漢東之國古隨州一老昻藏死即休黑髮虎頭真骨相青春麈尾鬪風流人言謝傅為朝鎮誰信鍾儀作楚囚浩蕩乾坤納今古好將汗簡寫千秋空遺蒸壤白如銀不見當年指畫因髙視漢庭無出右清談洛學竟成真極知羽扇為癡具更恨烏衣是偶人六合車書端有意百年荆棘已生春蕭蕭凍雨濕旌旄猶著殷紅舊戰𫀆金碗昔聞歸馬埒牙牌誰肯信龍韜樓頭換箭鼓聲急堂上傳杯歌韻髙到底姦雄有真態木綿菴畔鬼車號連檣米艦接江湄鞭撻東南力已疲虛籍漸成藩鎮侈辟書時被廟堂移清風號野黃蘆淨亂雨傳更畫角悲從此甲兵端不用書生有味老清時四城賦擬張衡麗十鑑書同賈誼哀四城公有十鑒賦江東腹裏春秋納雲夢案頭今古起風雷青衫不受折腰辱守厲文翁劾去舊尉慈溪為郡白眼豈知徒步回道歸里乙亥間舟泊城南更回首寒風吹淚下天台懷寧三省此詩屬胡觀物黃河不信從天下濟水那知有伏流自古乾坤合神化空將簡牘費冥摉張華博物身終死鄒衍談天舌竟休我亦從今銷綺語春風碧眼玩沙鷗客中端午簡善之海城紅憶石榴新海子空看芍藥春節物似憐遊宦客風埃終愧醒吟人已無蒲酒澆清恨那用蘭湯浣素塵健羡南坊鄧供奉團欒圍坐笑歌頻再次韻尚憶山城節序新榴花疑是十分春田園處處祠蠶祖祠蠶㝎絲價浙間以端午門户家家插艾人可怪詩書成白眼却從車馬識紅塵思家那似携家樂尊酒招邀莫厭頻次韻酬王參議槐隂散髮亭亭午花影持杯拍拍春佳節擬酬懷古意清風不礙笑雲人光隂滿眼消黃妳世事忘言煮緑塵相望江湖知已久相親杖屨莫嫌頻玊堂合歡花初開鄭潛昭率同院賦詩次韻一樹髙花冠玉堂知時舒卷欲雲翔馬嘶不動遊纓聳雉尾初開翠扇張舊渴未須餐玉屑嘉名端合紀青裳雲窗霧冷文書靜留取餘清散逺香名合歡今但名合歡崔豹古今注青裳一名不著而青裳之笑壓春菲緑滿堂翩翩清暑獨髙翔錦雞朝日輕霞吐彩鳯舒雲密翠張中散舍傍銷緑綺婕妤扇底泣黃裳芭蕉可是無情思一展隨風不解香風流一老笑烘堂解佩看花欲共翔夜露未晞歸翼斂朝陽初旭怒髯張霧窗不用青綾𬒳天闕誰縫緑縹裳朱槿黃葵效開斂爭妍那得有清香次韻鄭應奉苦雨漏天有術那能輔息壤無功不願豐漠漠雲隂來委羽昏昏水氣接垂虹災尤甚吳門水車塵已逐油泥黑龍火渾疑野燒紅萬里乘除同此意相看咄咄且書空觀間間齋紅梅次蘇公姿字韻四首莫恨飛瓊花信遲相看氷雪已芳時蘂珠霞輔春風面蕚緑雲開旭日姿骨相未須嫌火色精神真欲傲氷肌何人瀟灑紅綾裏巧暈輕煤畫折枝臘底飛霙瑞已遲天將絳雪報清時施朱可是良工手輔衮端歸大雅姿溜溜溫泉傳賜浴斑斑辱井愧淪肌閉門已覺寒如許回首江南竹外枝雲閣香溫睡覺遲不堪殘角曉鐘時玊妃瓊屑難為從青女鉛華敢弄姿可怪鮫綃能幻色誰將猩血解填肌團團似就回文錦薄暮凝愁上翠枝筆底氷清落句遲花神已報艷陽時疏眀不作顛狂夢嫵媚猶存諫諍姿酒力衝寒端著臉枕痕破曉欲侵肌道人不愛人間色乞取初開第一枝夀善之二月栁青春滿枝十分蕉葉不須辭黑頭政謝赤松子碧眼故憐黃口兒玊井蟾蜍吞暗浪錦𫀆蛺蝶舞遊絲雲窗松暝文書靜蚤晚行修野外儀次韻仲章遊長春積翠中天下土昏坡陀深處轉金門松間不遇釆芝客雲裏空憐打麥村華表鶴歸城已換滄洲人去栁空存髙堂靈骨疑金鎖應許重遊得細論八極端能合寸眸丹梯危盡覺身浮手持玉笛誰為贈背負青天我獨遊山影西來疑駐馬雲光南去似輕鷗人間底用重回首樂極無愁果有愁次韻仲章舟中思南湖緑隂濃處彩毫揮忽憶春殘理棹歸約略晚花圍錦幄招邀稚筍試斑衣長年客影如雲度五月湖光似雪飛從此清林供笑傲莫看回鴈損天機再次韻到手清觴不用揮滿川帆影逐風歸花前自憶堂前竹道上重看身上衣虛牝鳴秋通澗急伏雌驚曉隔林飛還家絶勝從遊樂只恐雲窗趣斷機倦客慵將麈尾揮倚篷日日聽催歸澄波自映烏紗帽小雨深憐白紵衣花徑春殘人獨立松林雲冷鶴孤飛相思此地今如許萬里重回且息機次韻仲章過彭城山影涵青簇簇來周遭城角漸低回梁分曲直雙龍下水合縱橫萬馬回鑄冶已銷遊子俠登樓誰負謫仙才凄􅋽正字寒如許萬疊蒼雲鎖翠苔仲章詩律大進數日道中論詩亦頗相合復次前韻以勉之氣摩屈賈欲平揮格律論詩要有歸石髓定成千嵗乳藕絲空綴五銖衣寒原草盡蒼鷹攫􅋽月松隂白鶴飛從此窮河天已近還家何用詫支機仲章詩律已入唐人風調而下語猶未馴妥殆類禪人過橋斷橋之意近世學者類有此失仲章德業逺大當不若是此殆其弄翰也次韻落落懸河巧發揮盤渦洄洑竟東歸苦心欲寄千年簡妙語誰傳半夜衣野馬㓛名甘却走雕蟲翰墨愧橫飛多言要是平生纍瞪目相忘杜德機玉色橫陳羽扇揮江湖邂逅似忘歸終憐古調難為瑟誰信天香不染衣汀草弄妍成背怨山雞照影惜分飛鮫人雨夜珠成滴清曉知裁第幾機平生俗客手曾揮愛子清新欲倦歸北闕正鳴蒼玉佩南湖空製芰荷衣麒麟瑞世非關走雕鶚呈空不為飛薄宦政須成吏隱莫將奔逐墮危機舟中將次淮南行𣸪敘别而仲章歸程可還家作端午次韻述情曽憶登舟送客揮艱難何事獨南歸楚鄉水暖沈菰黍江國雲深潤葛衣坡筍緑迎馴鹿過海榴紅駐小鶯飛笑顔已極誰為語絶倒無嫌似陸機中秋次韻貴白桂子香飄露濕巾廣寒疑使月為賔流螢不受十分釆過鴈真成一點塵吹徹梅花天外思飲殘竹葉夢中身靈河自有乘槎便擬轉神山閲爛銀寄王參議輞川新樹緑勻勻睡起慵軒岸葛巾穿石飬魚回小隱盈缸釀秫輔長春胸藏醫國三年艾天與傳家一角麟蒼狗白雲今已定不應談笑卷經綸玊堂文杏合歡枝共説仙翁賦有詩日暮團團空翡翠雨寒點點自燕脂塗鴉舊詔追遺事揮麈清談輔雅詞千古襟期誰與共相親那得勝相思泊支家口望瓠山僅一舍復寄天平水闊鴈參差下有髙人坐不移懸榻定知延孺子泛舟無奈似徽之晴雲滿塢開新畫落月穿梁想令姿眼底憐才誰復近裹糧端擬話心期次韻應德茂寒食見懷寒食光隂君莫遊亂花羞别古枝頭山家𧖟浴雨穿屋海步魚腥浪蹴舟楊栁飛時疑是老杜鵑啼處不緣愁詩來未盡相思意刁斗寒清月過樓次韻史猷父春遊夜歸留取餘春伴白頭落花如雪翠如流提壺不用頻沽酒垂栁偏能獨繫舟過兩月開雲母障隔湖燈映水晶毬還家已覺衣裳冷遙聽鐘聲是竹洲戲贈黃仲正好花不受丹青鑄碧眼難將白黑分萬里宛駒出龍種十年野鶴異雞羣知卿未盡才難數酌我毋多酒易醺午夜池塘有新夢好將色筆寫春雲再用韻答仲正愛子十年燈火勤相看不惜錦機分飛花映水空憐色去鴈出雲終念羣一寸春霏生逺思五更清夢了殘醺詩來陡覺秋濤衮海嶼青飛片片雲泊彭城復懷黃樓黃樓髙下復誰識白塔短長應得知萬里風煙歸傑作百年雨露起深思文章自昔為時忌翰墨于今作世師從此江湖掩篷去碧雲斜日數遊絲泗水泗水青於古蔚藍因依碧藻淨相涵逰魚細數心空羡活火新烹舌自甘可怪然犀望牛渚底煩斬虎觸蛟潭清湍混混歸滄海不惜臨流涴舊衫歌風臺長安葅醢恣猖狂頭白翻思守四方不悟宫中由吕氏却憂身後有吳王老翁後嗣真癡弱逰子故鄉空慨慷千古英雄多此意荒臺清淺水微茫清眀水落渾黃風晦冥不知節物是清眀道旁新塜悲歡盡栁下長亭聚散輕門靜鞦韆歸燕逐沙寒笭箵過魚驚河南禁酒河陽飲醉醒相看總有情宜逺樓紫翠光中擁翠鬟分眀倒影落西山逰塵自逐鍾聲去過雨能將月色還萬里關河新勝槩一天星斗舊躋攀絶憐想像空題詠後會應須共倚闌李學士畫壁初成席上分韻得毫字春樹纎穠隱碧桃秋山磊落湧銀濤天邉雨露歸青障物外煙霞入素毫有客支笻臨水徑何人解珮憶蘭臯滄洲景物供題品準擬淋漓奪錦𫀆次韻危公逺道士豫為年家驪塘族孫與筆勢翩翩千丈坡一天清逺佩飛霞金莖欲採珠宫露鐵箭能敲玊璧砂人物滄洲憐我輩氷霜喬木擅君家百年此意知誰會相視無言眼倍花閉門積雪擁平坡誰把餘醺散綺霞挂瀑解裁天外練熬波竟化海中砂機心著物那成語句眼論詩合到家從此相親勝相望不妨渴墨醉成花再次韻家世清聲起諫坡江湖邂逅忽披霞新姿正似三眠栁妙語能為九轉砂杯寫黃封來禁道窗留白醉近仙家殷勤懸榻何時下準擬寒空詠雪花朱顔氷雪映瑶坡清曉朝陽漱碧霞神目豈堪容玉屑聖胎端可化金砂碧桃有實誰為種玄鶴無心莫問家可怪春風滿詞筆硯池頻與滌氷花遊城南次韻陳玉峯市橋水斷緑交加簇騎隃尋處士家坐聽蟲聲行木葉卧看雲影落簷花清晨釆露筠籠重薄暮沽春烏帽斜一徑寒英端手種好烹晴緑代煎茶送真定任生束髮從戎天外萍還家何事説飄零花前秉燭頭疑黑馬上看書眼倍青倚劒獨憐今古月吹笳時憶短長亭故人烏府頻相問一笑惟尋雙玉瓶次韻史允叟殘菊白鴈西風幾夕陽故園牢落是它鄉獨憐夀客三秋晚不受玄神一夜霜曉沐緩垂蒼玉珮晚粧愁帶紫羅囊凝香深院誰消得時許飛瓊點額黃次韻元復初簡危公逺客舍光隂幾驛亭天邉白日轉重溟擬將竹葉留春住共慰杏花隨雨零鶯入上林貪翠蕚鶴旋華頂傲青冥十年道舊元文學為笑無心似水萍蔡逢原編修婦翁夀八十堂堂經學古儒風三世相傳八十翁靈夀杖扶雲兩屐延年水飲月雙瞳間逢好客猶花下倦憶前朝似夢中閭社從今誇盛集重行彩袖舞杯空次韻陳無我題石窗故居煙雨歸來别有春支頤曽作笑雲人還家未信三千里拂石今看第幾塵往事黃梁方就枕多情白髮竟沾巾故園未覺秋容淡留取孤香次第新夜别俞生半秋歸夢常繚繞三十六雷煙樹重山名所居髙處為雷台人謂山欲别秪看今夜月無眠更聽五更鐘青簾出市橋邉路白鴈連天海上峯聞道還家有新樂不妨雲榻臥髙舂次韻正旦會朝閶闔春回旭日鮮花光搖曳珮仙仙金蓮漏下催初刻玊筍班齊祝萬年香擁衮龍開黼座風回笙鶴舞鈞天朝元法曲誰傳得歸醉蓬萊話日邉送山人還江南白鴈南來愛朔風掉頭我亦一枝笻澄江去浪疑奔馬古澗歸雲似伏龍釣石水移黃葉滿丹爐煙冷碧苔封從今不説人間事更上岧嶤第幾重次韻田師孟詠牡丹積翠瑶亰玊作層笑餐承露議誰勝腰寬似稱黃金重心巧終憐刻楮能蜀客錦機流水浣茅仙丹鼎彩雲騰道人香色都忘却月落空闌始一憑交枝風動碧層層揮手芳塵謝不勝解帶暮雲真韻勝斂襟午日是驕能取青嫓白憐雕鏤抱紫回黃合變騰宫錦競傳新拾得沉香停檻喚誰憑紫府淵淵十二層濃春如酒力初勝苦心似怨鮫綃薄敏手難誇羯鼓能雨立無言慙委靡地行何術可超騰雲窗烏几誰消得時許飛瓊月下憑次韻師孟西曹即事兼簡子貞儀曹二首律令時議定盛世昭眀復古初掃除弊事獨溫舒牛毛置令心徒褊鳥迹遺文體本疏齊相避堂憐獄市鄭人鑄鼎泣刑書晝簾一度薰風曲欲寫琴心愧不如蕭疏門巷落花初楊栁隂中指望舒辨拙莫窮三耳妄塵深坐見二毛疏覆蕉得鹿非真夢點筆成蠅豈誤書慷慨聽君人物論雕蟲我亦陋相如次韻贈峩眉侯道士築宫江陵白苧藤冠自在身獨看潭影認清真還丹已化千年雪玩易重尋太古春楚觀江流通白帝蜀山雲氣接青神冥鴻南北疑無迹萬里乘風問世人次韻陳貴白中秋見懷玊人海上振衣來一曲清商鐵笛裁碎露晶熒疑水立橫雲缺落似山頽卯君端有鎔銀術西帝慙無斫桂才往嵗相思江北路夜闌曽上望鄉臺次韻鄭景尹詠梅十首笑壓羣芳雪霽吟點粧詞筆輔春林衝風曳白疑含笑映日抽黃轉苦心鐵石橫陳羣羽避氷霜獨立二毛深阿戎故是調羮種可為間情淚滿襟醉倚孤根散髮吟他年鼎鼐出園林黃鬚雅相非凡種白靣清談豈素心湖月歌殘銀燭冷湘雲弄罷玉龍深踈眀可是無春思角曉霜清整翠襟幽人為愛水邊吟雪滿踈籬月滿林魂冷不知莊叟化神清難撓楚王心寒蜂戀蜜須猶綴霜蠣含漿色轉深千古湘纍詎無意廣騷從此酹靈襟手提色筆朗飛吟雲佩衝寒入寶林雅操獨髙淹海角微陽𥘉動識天心鏤氷嘗巧機猶淺切玉疑神用始深回首羣芳半粗俗倚風三嗅為開襟回首白頭悲故吟清愁萬疊起雲林東君密注非無意北客相逢訝有心絳闕雲低珠蘂迸碧潭風定玊徽深色香要是人間世更上凌虛始散襟萬里相逢得放吟醉揩雙目傲瓊林龍沙慘淡明妃怨漁笛凄清處士心餐玊似嫌玄圃冷笑雲應喜翠微深何人更作江南句翻使兒曺競挽襟欲看南雪倚簷吟點檢春風第一林天與陽和誰借力晚持精白轉虛心氷蠶半蛻眉猶濕凍蠟初銷淚漸深夜半花神應有語覆觴從此斷袢襟梳風帶雨為渠吟揮手唐昌陋鶴林壯髮初生齊映額童顔已就靜齋心野蠶成繭輪囷富玊兔抽毫刻畫深莫遣風姨強攘𬒮故教月姊與聨襟十分深酌十分吟烏帽枝笻故繞林月下無言疑背面水邉獨立似傷心珠成蠟鳳王郎巧笙徹青鸞帝子深嵗晚自知誰與伴風篁搖影互交襟參殘霜急尚孤吟恍恍神遊古蹛林四皓局殘惟一色三郎鼓罷了無心珠遊鐵網青琅潤苔輔虬枝壞衲深擬把鸞膠固青蒂未須殘雪墮衣襟贈潘山人句因續之夢中得前二布襪青鞋今已矣看山舊眼碧深深空憐石馬駐荒塜不見金魚飛翠岑地鏡有書穿石乳土圭何術候天心行年七十足稱老牛臥前坡為指尋次韻景尹酴醿二首光隂風雨短長亭花到春餘倍有情翠蔓倚松超直幹錦江緣酒錫嘉名蛻蛟纒影青雲聳么鳳啼芳新雨輕白面郎君休翦綵好將椽筆賦西京不將名字博西􅋽留取餘春在一觴當扆珠衣迎面立曲房寶靨捧心裝碧雲一色行眀月翠幄千層護夕陽揮手朱殷空爛熳敢將清思寄幽凰可久齋二首虛室心源百尺澄深深龜息養空清一川鷗鷺古儀表四海弟兄真性情璧玉誰人傳至朴鏞鍾何處問希聲芒鞋直訪苕溪上雪透梅枝鬪月眀三十六宫春不老何人月窟重推陳亭亭倚蓋浮空碧匝匝空輪揚素塵郢客詞工端自苦海翁機息可相親支頥擬問庖犧易笑指靈蓍似有神送長洲江都史官曺無事日提壺一榻深眀晝倚梧稻蟹水低歌拍拍蓴鱸秋冷夢蘧蘧長年簿領慚錐子晚嵗生涯羡木奴千里布帆歸思好鴈聲伊軋起菰蒲昌上人遊亰師欲言禪林弊事甫入國門若使之去者昌余里人幼嵗留吳東郡遺老及潁秀自異者多處其地以余所識聞若承天了天平恩穹隆林開元茂皆可依止遂各一詩以問訊虎丘永從遊尤久聞其謝世末為一章以悼人説江湖少舊僧懸崖深挂一枝藤採苓欲取千年魄擊石曽烹六月氷天上星辰端歷歷胸中樓閣自層層相逢止説前朝事知是松源第四燈青鞋髙挂天平璧指點雲門三兩峯禪榻已容黃葉覆詩瓢從把碧苔封曉風殘月千村櫓細雨疏煙隔水舂我向亰塵疑老盡吳山清淺越山濃獨木山寮不出門一瓶一鉢送朝昏巖迷鳥迹千崖泣松吼龍吟萬壑奔掩息端如雞抱子愛間屢見竹生孫海門月落寒潮急凖擬乘槎與共論玊几峯頭第一枝老禪吃吃我深知曽將鐵杵敲氷骨似怪鉛刀割密脾法外無心猶涉解句中有眼即成疑袈裟不展蒲團穩此是開元妙揔持我識虎丘三十年精神霄漢鶻張拳機當危處即燒印語到盡時難續絃路涉兩岐空有泣溪流一滴竟無傳雙峯古樹蒼藤罥時有子規啼徹天手調千嵗廣寒藥擬補月輪蟾已飛眼見昔人歸逝水心憐志士惜殘暉孤花苦别生香樹急雪深憐壞色衣為愛同鄉復同客絶慙同調不同歸山人歸去意何如八尺方牀自卷舒側岸採茶敲石火隔峯翦竹溜清渠碧潭印月菱花鏡白鴈橫空貝葉書後日相尋定何處不於吳下即康廬次韻王繼學蕭蕭寒雀下庭除一榻蘧蒢是我居雪後看山雙眼淨風前攬鏡二毛疏退之掌制慙存藁崔羣户部一制余年相同亦草一退之四十八嵗知制誥一年僅存制伯玉知非定止車深愧年華增老大還家早注故山書除夜雪黃雲黯淡夜如何晚勢參差更馺娑著地不隨人迹亂舞空偏入麥苗多鴉驚列炬穿珠樹馬趂初朝映玉珂嵗律詎隨人事改故將嚴冷轉陽和元日朝回積素稜層厚載坤天雞三唱日初暾千官山立歸文石六衛嵩呼徹禁門花帽舞風喧法曲椒觴承露湛皇恩新年欲奉瑶池對願借扶搖與化鯤萬國梯航滿禁衢卉裳象譯語音殊鳳簫聲送纎腰舞雉扇行分兩翼趨花氣欲浮金鑿落雲光疑下錦流蘇詞臣不識金泥祕點指薇垣頌六符偶術末章答繼學承眀三入並時流俯仰深慙此地遊誰謂東南無美箭極知西北有髙樓韋編舊學隂陽祕汗簡功深嵗月修三史如山詩思少那能走馬過長楸金鑾深處是家氈玊雪青春不負賢會見鳯毛能掌制定知麟角可膠弦浮榮芻狗寧居後曲學雕蟲敢避先慙愧南州徐孺子每看塵榻屢澘然雪後畫角初消已弄晴曉看突兀眼偏明寒窗駐景成虛白凍樹裁春點素瓊北户埋藏疑有迹南枝搖曳若為情憑君欲問飛霙巧水自白雲山自橫送李署丞歸許下春風得意故還鄉月白霜清傍曉裝燕頷定承新鳯詔馬蹄猶戀舊鵷行溪邉父老欣相過燈下兒童訝已長我亦辭家經一載青天歸鴈攬離腸清容居士集卷第十一
