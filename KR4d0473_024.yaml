body:
  text: 序李慶長御史餞行序昔之公卿貴人居處要地言語出口足為世重輕也故希進之士聮袂接屨望塵伺色日若有所不足者其勢然也登用更迭一旦謝去則引結儔類議其短長甚者旁及其子弟􅊚黨得者未報其不得者常忿誹若是則毁譽之説固不足以為誠然矣大德癸卯桷以太史屬事承旨閻先生於翰林先生色莊慎許可待院屬必靣質其長質之而猶以為疑也􅌰詢于嘗往還以考其詞學焉桷入院五日先生召堂上曰子能為制誥乎桷謝不敏頃之出片紙令試制草即具藁以進閲一月將登車輒命撰廟學詔如漢詔今體冬十月大會院屬令擬進五朝實録表桷得預擬焉先生始察而奬之即署為應奉文字間以事詣門下甥壻却立奉唯諾不敢仰視庭肅然也夫爭名者群進速化之道莫易于自獻為之上者審焉而彌詳則其怨謗也實多久而議定必視其取士當不當固可考也先生壻隴西李慶長館于公有年矣朝舉優老之制為高唐州同知以便侍養先生下世議者之口始曰先生己矣繼之者其果有能近之者歟慶長之仕不急於進方墾田樹桑以裕其衣食翰林追先生之德舉以為佐未幾臺徴為西臺御史桷始曰先生去國與殁幾一紀翰林追思其壻焉誠不亡矣臺糾天下士之清濁銖考而始用之慶長之平昔可見矣始為得人賀而終以見夫先生之行事焉則桷也亦竊有榮也已矣歌詩以光其行者皆朝紳桷以舊好不讓而為之序平章政事王公歸省魯公餞行詩序延祐六年平章政事王公居中書三年矣每奏事輒請于上曰臣疲懦不稱臣父年過八帙陛下赦其愚㑭遂終養臣不任大願請踰四五不允後有詔曰宜官其子本郡以侍祖父公卒謝不敢冬十月皇太子受玉册詔示中外始以其子某傳詔歸東平因省魯公焉魯公往歲嘗對詔使具奏曰臣齒髮未脫落願以弱息盡力事陛下公之雍容廟堂魯公之志也然公歲數請不置十有二月辛未始出允旨公拜手稽首望關謝翌日蓐食策馬遂行公卿大夫設祖席門外至則無及矣乃遣使者傳旨以內醖精幣錫魯公猗歟盛哉桷嘗聞之君臣際會終始之道難矣昔之大臣一斥而不復者往往見於傳記今公之在位也精白自持卑讓若不足超然逺去詎捨國以自全也粵若稽古明王求忠臣於孝子之門吾知公之在家也閭里往還益知夫守令之賢否其不便於民者熟詢而究論之四方之使乘傳入驛將修容門下水旱盜賊之原財榖徴役之害虗心以求筆于簡牘歲時附奏益以彰畎畝不忘之忠而魯公方精強遨嬉充然孺子之色或徹于上聽出處之道是皆不能有以豫計也維今聖天子孝治隆古昔一時廷臣生榮其親不一二數鋪揚詠歌詞林之職也遂各為歌詩庸敢不讓而首序焉瑞芝亭賦詠序昔之聖人建中和之本畜四靈以為應焉麟鳳則其儀龜龍效其文修火之利以制五穀養其太初一情性以齊形色四方不同而養生送死莫敢有異焉者教使之然也中古而降道德不能以一而昔之所睹悉以為異表章鋪模圖記所載不常有於動植遂名之曰瑞焉繇是眩幽抉奇之士棄所服食吸空制景烹冶飛伏卒枯稿無所成就甚者則曰吾治法有未盡吁可哀也矣延祐五年中和夏真人明適承詔祝祠上清宫精一不懈竣事憩館于崇真院松竹交列覩厥墳壤擢莖而光玉質鏐章瑩然以敷咸曰是芝也誠為瑞稽圖徴史復曰無以異遂積竹為亭以落之乃曰繄吾道祖之應焉耳矣鏗鏘舂容攄藻獻秀筆爭綴而簡爭續也余讀而歎曰頌聲之變基於魯登高能賦始之以洋溢終之以託寓其理然也神農書定芝為上品神仙家服之云可得上夀蜿蜒清淑之氣嘗閟而不發地非愛其寶待其人而始彰也維今開府大宗師張公際休明之運陟降帝所幾五十年子孫繼承罔敢暇豫是芝之瑞吾見耄期稱道益莊而愈完表于山中夫豈榮觀之美挹其粹和道充氣腴異日駕青牛之車歸返故山撫芝一笑則其為瑞也畢矣願敘以為徴夀樂堂詩序延祐乙卯季夏桷乘驛留杭間則與友人泛舟一遊葛嶺諸山穿幽入窮嘉木叢柳鬱然上下而相望也遂遵其蹊以升其坡陀有堂巋址粗完而不華册其顔曰夀樂群峰蜿蜒水光相屬前挹左舞顧登其堂而異之客曰此容齋李公習靜之所非所謂臺榭苑囿之觀也且昔之翬翼而侈者於公乎何取世有專鍾鼎之貴其得意盛時未嘗不寓興於山林泉石之清美疲精竭資倣象其舊遊卒不知其所造今斯堂也不專乎構築不勞乎藝植心領於物外其得乎湖山者是幾有道之士也于時李公領元帥之符于海右桷復以間歸里因得覽兹堂之勝公笑且言曰土木之夸吾深鄙之洛陽名園多矣擅名專美於後世今何人哉夫動靜交養乃成其性錢唐諸山水渟泄起伏大者為盛衰小者為榮辱有得乎是則視兹堂之朴簡其旨深矣至人之心如珠在淵樂之至者終身而不厭取諸在外非有損於內也願與爾邦之士率為歌詩而子序之退不得讓遂以昔之聞見者次而為之序送彭道士侍親詩序范文正公守番更定學宮咸言嗣是番為衣冠聚未幾彭尚書舉進士第一正直朝著為吳楚間領袖其弟忠毅公不幸城守身死二忠易名見於宋史作史者深有感焉嘉定初先正獻公越公俱在著作庭深言朱墨史避忌而宣政實録為魯諱時宰尼之後六十餘年皇元大一統宋故家子孫變滅澌盡獨忠毅公裔孫南陽作而曰吾宜遊於方外矣其道祖位秩視三公於視聽也尊且榮起處也不貸假以自貶嗣師吳公方藻思瑰識將樂其同而進之況於親者乎未踰年則曰詎宜久京師居母氏春秋高歸以奉則庶幾幸不墜矣將行且丐敘其情桷於是深有愧焉忠孝秉彛皇極之訓中古肇分重華是著更秦暴強而死莭謹書踰千百年迄不能一二數獨於彭氏見之歌詩者寧得以辭也送文子方使安南序安南繇秦漢以來內郡縣世祖神武皇帝取宋荆揚益三州之全土大一統東踞高句麗西度流沙金山王業之基不知紀極坐朝按圖指銖黍地曰兹南交州乎得不為武寧能以中國民甘心而係頸之遂㑭成要荒之禮以歸蠻夷多疑其子常稱病不至禮謹會同尤嚴於錫命故其自署表曰世子臣某其所以容受而畏懾者實在是新天子即位更元曰至治遣使詔諭故事必遣近臣為之又擇能文辭通達國體者以二之於是僉曰翰林修撰文君子方有使才實可任乃名上于天子而許之遂增秩為禮部郎中以行將行其友袁桷曰往使者鄱陽李侍郎思衍薊丘李侍郎衎天台陳郎中李河間李侍郎京皆得與交交人言鄱陽清介質直不絶口聞其俗善憸巧館餼供帳故不如法俟詰讓始成禮入其境也必迂途請野或謝以病緩歲月始迎春氣萌達黃霧苦雨然後拜使者而送焉其狙詐率類此而不知者常逞夸肆豪以受多言之羞昔讀左氏傳見列國諸臣取詩斷章以成好焉簡而明易而且和信由於衷而禮以辨之也故夫子之言曰雖多亦奚以為列國之臣得之矣況於朝廷乎又嘗聞李公言使者入境詰其館人一草木名字之微必聞於世子翌日涉筆始具對蠻陬逺人設施周密若是無它焉懼削其土也交州之土産道里見地記而昔之入貢者又皆淺薄不足取於其不知者寧缺如也子方以余言為然乎若夫周折之宜守經以揚文德則必曰天子仁聖明達萬里外子方優言之是則余無以告矣送程士安官南康序朝廷清望官曰翰林曰國子監職誥令授經籍必遴選焉始命獨東􅊭之士什居六七或曰洙泗先聖之遺澤也誠宜然又曰其浸汪洋渟伏昔東諸侯闡興文儒飛矢交集弦歌之聲不輟于􅓺序有自來矣桷向為翰林屬所與交多東􅊭他郡僅二三焉若南士則猶夫稊米矣士樂得所依連彚以進各以其所向上有以挽之下有以承之勢使之然也程君士安則不然程君魯士也獨遊夫江之南幾四十年詢其先友則皆在上位者不獲於上豈程君之藝有未至焉者與嘗得其詩詞讀之視其同郡之仕於朝者亦殆相似其大過人者誠顯矣而視與程君同者則誠枉而不逢者焉少仕於南御史臺後為吾里元帥府掾強貴者衊之卒得白而程君亦年以浸老今年調南康理曺以還嗟夫類聚以方士患不得之既得之則不宜以遺佚隨聲媚容置之良是矣才焉而不遇則在上者寧得以辭其責焉因其行敘以慰之夫子曰不怨天不尤人則亦曰有命焉耳矣咸為詩章凡若干首送陳景仁調官雲南序至治元年中書省選集賢都事陳君景仁調雲南官簿將行謂袁桷曰吾與子交久子寧無一言以贈乎於是有言曰在昔世祖皇帝寧一海宇幅貟袤廣凡為仕者力不能以自達于京師故歲必遣朝廷望官即其地如選部注授焉省之逺者曰湖廣曰江西福建曰雲南其最逺莫如雲南故自三品而下皆得除擬奏而後出命視他省為最重其受任使者非清慎明正不足以當之維世祖繇壬子入吐蕃破蒙段二姓宋金所不能臣至是踰三百年始定神武偉著時則有若賽公稱合上意羈縻而綏撫者厥有攸治夫以蠻獠之俗俾安其素習誠不在於煩促苛削也因其民風而㑭之為官者長子孫不越於其境則安而簡易矣邊隙之生所從來久出於長民之貪黷殿最莫嚴於考課循歲月以善解視其成櫝則調是官者雖離婁之明將何以辨之哉厥今御史循行郡縣察採是不而坐驛頃刻促具食上馬懼夫事之填委將終歲不能以盡也今之為遷調者居于是邦雍容詠歌得覽其山川詢其厄塞仕焉而己者入閭以問之其隱而在下者詳延以博詢之則仕於彼之士吾將瞭焉胸臆而示諸掌矣不然拾級循敘朱墨之職一介吏足以辦何假於陳君乎陳君清不近名慎而有守明足以養其厚正無失於過舉若是則足當其選矣余將奚言焉是宜率為歌詩以迓其歸送李溉之致祠山川序病矣夫幅員嘗不能以合也五方之俗惟不能以合故地氣各乖於一偏昔之赫然以統率之者嚴於方嶽望瀆海之為帝所由來久矣必皆致祀焉夫山澤通氣騰降蟠際卒之以立民食豈以它故哉在昔盛時惟漢唐近古能遍至而遵行之然而巫祝之祕或鄰於方士其餘偏方分裂帝號尊襲車輪馬迹南北不相踵接僑立望祭神弗顧格責之以一風俗成時雍者亦難矣世祖皇帝以仁武英睿成大一統考先代祀典曰兹職方氏登載實萬姓重事遂歲遣從臣捧香幣各分道四出郡縣祗恪候驛謹潔視他使者為有加粵昔唐虞黜陟成於四嶽昔之善使者不專於所命水旱疾痛承制以便利之令守職如守法非儒者不足以語而生事者不保惜復將有以病焉抑難矣至治二年集賢都事李君溉之承詔首北嶽遵濟源轉北海終會稽焉以登其於行也將見夫挈瓢囊以就食者焉又將見夫餐餼之不給於適館者焉踰於大江東南之民外侈內枵罷於不作不役而歌臺暖榭心目飛蕩以貽無窮之害若是者不能以悉言矣溉之明國體所歷雕瘼願悉疏以白于執政若夫悲愈駭慕深林危徑矢于言辭而使夫人傳誦者于其歸也桷雖還里尚能敘而廣之郭子昭淮南廉司經歷餞行詩序淮南地廣袤昔號用武故其徑悍伉率遇事嫌曲輒私剖決以直不復上官府水有菱芡魚蟹之冨􅊭陸則兔鹿馳逐飛鳧鳴鴈蔭翳陂澤網獵足食不丐假于外事簡而易治夫以易治而強治則變易不安曺相之治天下豈不用其心哉則亦曰煩擾非所先也余嘗過淮南道繇肅政府日未午官吏上馬去故視他道為最優汝寧郭子昭今為其幕長焉子昭之吏事不拘文以求苛者也若釃渠於川順其自然激射穿齧不能以逆水之性學優而辭工將考其山川詢其廢興抉搜幽奇悉出於翰墨廣陵有儒丈人曰王令逢原文甚古臨川王荆公敬企之願求其書以廣方今四海乂平將化其齗齗褒衣長襜使與計吏偕是則子昭之教在所急也為歌詩者㑭余首為敘王正臣浙東廉司經歷餞行詩序朝廷置廉訪司總司曰監司曰使其屬有三每歲循行不與止受其成牘議輕重職簡且尊視聽黜陟專於一郡而所部他郡不復考故其毁譽常若不及或者病焉權莫重於循行今之言者曰歲五六月録囚秋七八月出司明年春還司所歷有程限疲精於某所則足迹不能盡於是有料簡之法焉民懷其冤卒無以自白相率以告於總治疑矜其情而許之矣議者則曰是在於行部侵越則事繁事繁則寮寀不相協安於平素守官以自全者為善計矣夫行部之寄為最重泛常以治之民不勝其病告于其上卒拒之以辭使一振舉之則歲之分治將悉心以究是它郡之事悉總於我謂專於一郡者非知言者也聊城王正臣以內臺掾出為浙東幕長通達治體守儒善斷今監司馬公嘗鎮江西諸郡皆嚴憚之是能知總制之道輔之以正臣事可立具浙東民俗簡易春溫冬嚴相濟以須吾知其足以振采於一道於其行序以告之且率能歌詩者以餞焉送朱君美序許文正公定學制悉取資朱文公至仁宗皇帝集羣儒定貢舉法五經皆本建安書蔡氏為文公門人而春秋傳則正字胡公之從父文定公師友授受宗于一門會于一郡至若訓蒙士正史統庋積筆録悉師于文公何其盛也夷考地圖閩粵繇秦漢始通今九州之地非不廣而道德師表不敢有異於文公者繇文正公獨建大議而聖天子有以成之也今之為議者則曰南士淺薄不足取又曰其文學論議與中原大異夫行事必本於經考成均之法惟文公是師而南士獨有背何耶余嘗入議者之室其服食器用由南以來者頗若愜所好其無乃貴物而賤士與識患於不弘黨患於過偏自昔創業之君合一海宇必取遐陬荒域之士以自近輔維昔世祖皇帝能知之選取蓋可稽也文公五世孫煒君美以宸旨入國學議者亦若不滿然以其所受學皆文公也視其子孫少假之今以書考之法出仕將行求余以言念昔先正獻公與文公俱以偽學坐禁錮政治更新善類彚進文公書大行於東南今六合一家文公之學行於天下矣士能通其學者其寧有固執之弊桷官京師踰二十年見昔時諸老津津於南士者甚衆考其異同其亦南士之不如昔耶其亦異者之不如於羣公邪君美以世濟令德將見於蒞民經術政事余不能以告故歷南北好惡而知吾文公之道千萬世南北不能以易也送陳道士歸龍虎山序往歲見福唐張君見獨于京師貌清氣完語簡而意消察其退靜泊然無求者也山中之人曰張君居室靚邃滋蘭藝松藏善本書盈庋督教其弟子恂恂卑讓見之者必知為其徒也至治元年嗣天師入覲君死且十年侍劒印者曰陳某物初一見之甚似吾張君也問之則曰亦福唐人也閩為儒林經典釋文陸公德明所校定天下遵守莫敢異夫閩昔為荒陬言語不合於中土六經表章旁及諸子繇唐世始定而獨取於閩何邪九州之士未始以南北限陸公書積六七百年而不廢則其疑息而無可議者矣今則曰揚以南為蠻夷吾不知其何所自也其亦有所激也歟余將有言焉而末之能也嘗聞龍虎山尊崇吾聖人書絃誦之聲接於兩廡往銘空山雷君其於書若飢之於五穀朝暮不敢棄故其門人樹立偉著推張君蓄書之心觀陳子之甚似知其刻厲寧能以中畫也邪兩京雄富夫既身履而目受之豪徑厖錯可夸可愕接於歌謠風氣之盛必將矢言沉深以鳴夫太􅊭身安道充必不戚戚以求外也老子嘗曰無為無不為國之本也願歸以究之異日詢咨以承專美於前者將有繼矣勉乎哉事豫則備若然則其寧有不能者邪凡我同志宜為詩以餞送劉生歸鄉試序漢五經各立博士唐兼以詞賦取士至宋廢置不一然各精其能者始得為主司五經難以兼而詞賦號為淺且難以淺且難而兼五經孔鄭復生不能為也科舉廢既久先皇帝慨然崇文酌損為進士條制今將十年巖居谷隱習其學者家傳而户授其蕪拙而宜黜者主司之任也余嘗預考進士于禮部鄉貢而來者蓋疑之而不敢有汰也汰則德傷而體損繇江以南求試于外省多至八千餘人司繩墨者其無乃失於銓考與抑亦以其耳目聞見之不接者而疑之與以昔賢之所難而兼之其於任也實重古學之不講于今有年矣卒然加士林之上冒焉以承不咎于己而曰試者之未至故取之常合其譾薄進于禮部禮部不得已足其數觀其所取者則咎禮部之未至禮部諉受其責吾知夫八千之士功深而學優者詎不大有遺者矣廣信劉生任時來京師試入國學將敘次佐胄子講誦今歸省其母試于鄉生敏于文從余遊焉厄人事不能以悉告霅有牟成父先生於羣經有考而為書者也於詞學父師之所授充然而炳鏘然而和東南西蜀蔑以有及也生負笈而問之若登泰山瞪乎有失矣使先生不以耄老辭則東南之士類于禮部者將拔頴以進生蓋亦有得矣勉之哉仰高倡酬詩卷序今年春房山高公彥敬歸休于舊隱夏五月延陵吳君成季首為歌詩以致其懷賢之思於是次于其後者凡十餘人矣獨清河張侯與成季復肆奇逞敏纚纚用韻不輟筆未脫手語未終舌而兩家使者各踵户限故其飛籌急置如督餉道於劒閣棧道之險也角形擇利如薄虎象於搜狩之野也風恬而水湧欲挂席而爭進也弓良而矢直欲並發而連的也至於夸豪競富金張之靡崇愷之侈焉噫何其至多若是也古之言倡酬者曰元白其次莫若皮陸彼皆因其事物之偶然有合於風雲泉石之清適故麗者流於情羇者鄰於怨而今也因房山之賢有以興其思復因其思以發其所養異夫逐物而忘已者多矣房山筆精墨潤淡然丘壑日見於遊藝此詩之作其所以惓惓不忘者難與俗子語姑以見夫思賢之心在於寬間自得之後不在於爵祿有列之時也詩成凡若干首云送陳仲剛序昔之職文墨議論者必擇其瑰逸俊磊以自近唯取其才焉才與德不相並或者譏之謂德不勝不足以為君子也今有番陽陳仲剛焉其言恂恂其度謹且循於事也不欲察其是否見一善焉不知其為矯且詐也翕而譽之人議之我且直之其不善也人議之則曰彼豈誠不善也將訓迪之㑭有以悛之嗚呼是則人誰有議焉者矣黨同惡異以其類至鼎臠之遺酒食之失足以亡其國而廢其身可勝道哉吁是則有可憫者矣余向為史屬見南士焉執案牘者刻若法吏其滑稽跅弛不善避忌酒酣大言無所顧吾深憂之未幾而陳仲剛亦受其讒以去仲剛之失在不能以自斷彼之言者一無犯何慘也今朝廷下詔搜舉遺逸仲剛可以仕矣而復以守資歷者不在是限遂以外郡校官補之始得為教授老至而濡滯彼獨何心哉喜怒以害天下之士莫嚴於後漢之季盛時清明孰敢少肆其毒不十年間今皆澌盡無在可歎也已可哀也已仲剛調湖廣將行于以悼其窮亦以激其有自立文辭之素能者不敢以告勉之哉陳彥恂餞行詩後序士之為吏病飭於內而騖於外者多矣飭乎內者無赫赫之功而亦不足以取仕騖於外者自處善士之目率先得大官厚祿故仕而臨民雖百里之邑其勢亦足以動衆智亦足以防口凡所居官將解印綬必諷諭能為文章者書刻其政績方古循吏殆未愜意間有不肯操筆輒威脅罪訹閭里耆艾爭相效承長縑巨軸聮衢表道先出郊餞祖語嘖嘖不自已逮其去官猶視彼黜陟為廢置而士不幸為師儒之官者則不能是蓋其秩最卑勢最下其行事不能以致衆方苟度歲月以兾脫去故來也無聞去也無迹而􅚨者之道愈缺然矣噫先王致治之效必本於學校之興廢而謂其道不足以致譽以自棄者則過矣且譽果可以致而得哉余父友陳君以越博士歸于家三年將調官行邁越之鄉大夫以及博士弟子詠述遺愛致詞于家詩凡若干首同里之姻黨異郡之交友爭歎美贊誦詩亦凡若干首而天台胡公復敘昔日輿人之意圭璋交輝金石迭響殊績細行指掌畢具斯亦偉矣夫不求而自至者非媚也歲久而名益彰者非強也彼勞甚而無聞者非過也庸敘其言期以信于後敢繫于篇末云送洽師歸吳序四明學行於浙東西而南湖延慶寺實尊者闡繹之遺址陳忠肅公原觀想而為之記甲於東南至嘉定中史忠獻傾意營繕莊嚴妙密學子林立運逢壞空不四十年兩遭燬厄寺缺主者僉以為石泉洽公宜主是席至之日除榛削礫一以己任而四明罹旱疫之災信者靡替施者莫能乃慨然曰吾故吳産也吳多信士凡頽垣廢址吾徒一詣其門輒金帛踵至高者矗雲霄朴者絢丹碧崇信生於心斥其餘財以貽浮屠氏非有所利益也嘗聞洽公化行吳中所至傾接蓋以能靜止息之道廣為譬釋夫安於給足而哀樂喜怒為其營役則聞洽公之説者孰不開朗故其欣然以輸肅然以接夫豈聲音笑貌之傾動嗟夫露臺百金十家之産而大雄氏以側布為未足化其吝心非大言不足以警若是則是行也見其稇載以歸不日以就罔㑭忠獻專美於前而忠肅之學願竊有取焉清容居士集卷第二十四
