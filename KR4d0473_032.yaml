  text: 清容居士集卷第三十二
  hash: sha256:044deac747688b9fbec9633467f7eb07dc742fc280df5beba9a877a9463de8fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_032-1a}
body:
  text: 行狀翰林學士嘉議大夫知制誥同修國史趙公行狀曽祖伯洙宋朝請大夫知南外宗正事贈金紫光祿大夫祖師雍宋朝議大夫直寶章閣考希聖宋宣教郎史館校勘公諱與􅝾字晦叔宋燕懿王德昭九世孫髙祖子英宗正少卿避地南徙紹興間為台州黃巖丞家于縣之西橋至其子孫遺育蕃衍故今號西橋趙氏宗正有孫師淵字幾道官至太常丞為朱文公髙第文公述通鑑綱目條分例舉整齊芟奪迄于成書皆太常所定其言理學藴奧心受耳屬精析該邃非若語録所傳剽臆謬妄東南後進咸尊太常與黃幹氏並于公為伯祖公少美儀觀音吐清徹讀經史大義必本家訓弱冠以易入宗學登咸淳辛未進士第用積舍法教授鄂州鄂為楚上流嵗備武不懈公視邊將玩弛而咸淳士大夫率耻言邊事乃䇿諸生而問曰文武之用不可偏廢韓范二公不以言武而失文曺彬狄青不以清談而喪武文事武備豫然後立時未幾王師絶江守以城獻公自念為宋國族鄂先內附兵勢若破竹不可支而歸道已斷絶不得返遂上書丞相伯顔公言宋權臣賈某柄國十有五年脅威罔主棄背信好事一至爾今得兾如藩臣嵗奉貢幣願緩師以行成焉書未報而錢塘已下實至元十三年也公知南北已混復上書丐返田里會大臣有竒公狀貌告于世祖皇帝十四年遣使上驛來京師幅巾深衣見于上京天子清問溫渥首詢其老幼及江上事首尾其對復如上書所言特命給廪餼以俟用眀年奏言江南郡縣户口繁夥當以簡易治近嵗有司急切興利殊失安輯新定之意臣生長江南悉習利害因條類為十六事以進大較以擇守令釋征斂厚風俗為急而末復以存活趙宗為請十六年入翰林為待制升直學士復兼集賢又三年遷侍講學士預纂實録加太中大夫于是侍講十四年矣纍疏乞致事歸里雖未得旨而不入翰林者幾二年久之拜翰林學士自鄂之來京師凡二十有七載由里居而之鄂也適三十年每恨乖隔愈久冀一得請以終老丘隴常忽忽不樂秋風倚楹懷悲故鄉擁衾障袂聲出金石非復以宦達為可戀惜而志迄不遂抱疾期嵗以卒大德七年正月二十有二日也年六十有二積官至嘉議大夫公之為侍講也言江以南括責營聚皆大臣與其黨類私植貨纍巨萬願寬今年田租以緩赤子宋世陵寢毁掘及移徙故宗室大姓皆非初詔本旨乞正其私擅之罪天子以為然又言乃者庚寅嵗大霧四起越翼日癸巳夜地震地為臣道臣強則震至正月甲辰西城老虎就擒虎于象為兑為金其著尤異咎在姦臣簸權令已執咎而宸斷未果願蚤正天誅以應變異上意若微忤而終不以罪由是居家待罪閲三月大司徒公自上京俾燕只干學士諭以復職後平章政事不灰木復為公奏逋負嵗積不能自養上曰得非指桑哥為虎者宜令有司計逋以償嵗别給帛粟餘勿為例人益知世祖皇帝神武沉斷非真忤公公天性踈達與人交緩急髙下盡力傾引弗避不為刻峭自髙亦不復計得失成就故始爭趍慕而間輒掉去訖無毫髮恨意傾觴煮茗費盡即止危坐清論一不以靡密缺乏廢其雅道嵗時奠薦雖甚匱嗇猶豐潔盡力如舊禮自宗正四世而下皆請于朝而復其役族屬男女以及鄉里之俘虜而北來者悉贖以歸凡十一人有張生貨藥西關一日過之張死已數月矣亟歸視藥劵盡酬所負其家人不知也遂具以告而歸之一士人伺公錫賜時謾言當買田亳宿間計資與之嵗久不至後亦不問其受欺類如此同列有侮公為方拙暨死之日朝野咸曰善士已矣各賻奠哭弔終其斂事而同列亦悔昔日所侮為可愧往右丞許公仲平篤意道德性命之學奮自飭厲以文公四書為標凖達官髙胄皆俯首承訓不敢怠公時至京師首言力行致知近世率清曠自髙言行若枘鑿不相入非儒先本旨許公深然之至觀其平居處身待人抑華養實許公雖死而昔時門人親聞其言者皆以為伊洛源委惟趙公為真似益以知太常之學為可信至公為有傳矣有詩文若干卷類聚藏于家初娶舒氏御史中丞亶之五世孫未踰年而卒斂篋中裝歸其婦翁不取今夫人史氏奉直大夫知連州一之之女生三男子長孟實以公居朝廷久特官為承事郎同知瑞安州事孟賚溫州蒙古學教授孟貫以廕入官孟實等欲求銘當世有道以信于後俾桷有述謹具歷官行事如右謹狀大德七年七月日從表姪具官袁桷狀推誠保德功臣開府儀同三司太傅上柱國追封薊國公諡忠哲梁公行狀公諱德圭字伯溫姓梁氏大興路良鄉人八世祖德成遼末以勇力善資雄鄉里生子吉不仕吉子伯溫金皇統進士官通議大夫同知河南府事遂贈吉安定郡伯郡伯孫牧牧子陟眀昌進士官中奉大夫同知南京路都轉運司事亦贈其父安定郡侯郡侯有别墅金世諸名士日觴詠從之遊中奉髫年能以詞章相周旋咸器偉之晚歲直節善政深自植立值金亡終老于里生衎為金承奉班祗候祗候生守信終隆興都轉運鹽使轉運生國禎終內藏庫提點是生公後以公為左丞時朝廷特號中奉曰通憲先生轉運贈榮祿大夫定國公諡忠毅提點贈榮祿大夫安定郡公諡僖敏公幼歲給事昭睿順聖皇后宫中竒其器骨俾熟國語通奏對年十一太府長官愛之帥其弟德瓚同見世祖命相者閲二兒相者曰後當貴帝頷之遂使從東平忠獻王安童習憲令儀注年十四即襲父職至元十六年升中書左司員外郎二十三年遷右司郎中踰年復左司二十六年進太中大夫總管大都等路打捕府仍領左司是嵗復右司二十八年參議尚書省事復遷中書二十九年世祖特旨拜參知政事成宗即位升中書左丞大德二年拜平章政事公未弱冠即官宫省踰三十年錢穀出入高下若指諸掌四方奏請率面授中書掾言某事當如律某當如先帝某年所行極邊宗王急驛調發卒無所從具同列拱手不能語公徐言軍用有故實泛索非故事不可行執筆量劑退考故籍無少訛誤戊子嵗地震北京世祖問今嵗刑部所報囚徒何煩多公對曰囚非犯刑罪特以徴索羅織無所從納故悉為囚在獄中上大感悟乃悉赦天下逋負京師供給繁夥屢奏蠲復之漕運根本江南浚治諸湖堤不宜使富民侵塞以殺水勢議自公始選部資歷吏不敢後先一時以事功自期者公亦與一二執政議超常格俾自效方大德初元成宗恭儉守成一繩祖武公亦以朝政自任年穀豐熟四境寧謐廟堂大臣相戒以清淨為治凡上書言利害斂口不敢發自是希進者皆避匿後議相持既深朋聚比進乘事間發浸淫于疑似之際會上不豫遂出公湖廣安置踰年上疾稍瘳罪一二幸臣急召公還都遂乘驛朝于上京上問卿從何來公環視嗚咽不敢對上賜酒饌命歸省其母諭以將再用至九月詔復入中書時公已得上氣疾與家人言向嘗逺謫今得再覲上眀白母子相完聚即死且不恨何敢復有希進意遂却藥危坐謝事某日星殞西南有光流室中是夕薨年四十有六葬于宛平之樊村妻安氏今封薊國夫人柔靜能家子一人某女三長適納速剌僉事次適伯達某路都提舉幼適某同知宣徽院今上改元詔録勳舊贈公推誠保德功臣開府儀同三司太傅上柱國追封薊國公諡忠哲而公祖父亦復追命為國公母夫人完顔氏公能承侍盡道待二弟曲致恩意對賔客謙不失禮自以先諜踵世科尤重儒士詢考安㝎别墅為圗表章一時縉紳咸賦詠追美其事侍帝左右率偵候意嚮奬拔士類至于決事占奏悃欵不讓而悉簡愜稱上意死雖十餘年朝廷至今猶稱道之前翰林修撰知髙郵府張某次公遺事命桷演潤將求鴻藻以表墓道桷與張侯曩同在翰林見一時行事張侯以親嫌為辭公之弟德璋今益都總管昔為慶元判官時桷居鄉里得聆公言行遂不敢以草野為辭然舊聞中原故老嘗言梁斗南文采風度有陶靖節晚嵗志意後進爭慕企久知乃通憲先生也先生言行在人口不絶方金將亡時士族解散澌盡暨獲平定推原高曽名字于荒碑野塜之際皆缺軼無所考獨梁公八世官簿歷歷可據德源深長通憲守儒之效著矣至若公行事在史册者不敢有私姑次其出處大致使銘述者有考焉延祐三年九月某日翰林待制承務郎兼國史院編修官袁桷狀翰林承旨王公請諡事狀公諱構字肯堂世居濰州家譜云與中書令同系八世祖某宋世為司農卿守鄆因家焉故今為東平人曽祖某金進士奉訓大夫滄州無棣令祖某以公貴贈正奉大夫太常大卿考某贈昭文館大學士資德大夫公幼嵗肄業郡學試詞賦入等杜先生仁傑深器之賈文正公居貞一見館以教其子載與來京師時太保劉文正公王文康公王文忠公持薦士權即辟為權國史院編修官丞相史公耶律公在政府聽公上事言論接以賔禮耶律公復戒其子以兄禮事焉至元二十一年授將仕郎命為真于時集議時政必使公預會裁酌之十二年丞相伯顔出師諭江南公實草詔是嵗渡江世祖命翰林直學士李槃與公偕行俾搜擇儒藝之士眀年春次杭州公見董夀公某曰故宋圖籍禮器具在宜收其祕書省天章閣翰林太常考集目録宋史異日必修纂遂悉輦歸于朝十四年充應奉翰林文字公辭曰少嘗受學于李先生謙今先生猶教授東平實不敢先遂以其官召李眀年始受之十六年升修撰凡制誥撰述文康公必以命公丞相齊魯國公和禮霍孫領翰林開司徒府授府司直世祖詔大臣議道藏可焚棄者公與議完救之十九年丞相阿合馬敗齊公入相議選舉更定法皆公手定遂授吏部郎中未幾改禮部後復吏部而翰林制誥猶諉公參詳焉二十二年遷太常少卿上方定宗廟修禮樂而公昔從故宋所輦還者皆得補缺二十四年出為江北淮東道提刑按察副使御史大夫率公陛辭上賜酒慰遣擊姦惠民淮民猶能言其事二十七年除治書侍御史故相桑哥嫉公命與故平章魯公卜忽木檢責燕南逋負公先馳驛會計簿領迄無所迎合謂魯公曰公近臣某復在言路相若苛責當受罪不以纍公也未幾桑哥伏罪二十八年調選江西二十九年改翰林侍講學士三十一年世祖升遐成宗嗣位分院上都制誥多公次定徽仁裕聖皇太后知之特賜楮幣七千五百復命撰世祖祔廟諡册攝司徒以導禮大德改元纂修世祖實録升翰林學士二年參議中書省事右丞相引見于栁林上問昔從何人丞相奏是和禮霍孫官屬真儒者昔奉旨參用儒生今故用之時上初即位勵精文治年穀屢熟海內熙洽公從容二相間以薦士安靜為急務後數年來執政希合生事將檢括增羡首以其䇿行東南公卒不肯附稱疾納祿幾一年七年朝廷更政獨公無所纍歸里九年授濟南總管禮法自持嚴而不苛凡為民害者悉除去丞相答剌罕見公所申牘咸從之十一年太師瀋陽王等奏俾乘驛造朝拜翰林學士承旨復修兩朝實録特命贈公二代公言臣本儒家遭逢四朝先世皆潛德里士大國美諡懼無以稱以臣所居官授之誠以為過今羣臣封諡下太常必繇翰林議官品臣首踰越將無以服衆今上時為皇太子嘗詢翰林老成必首姚燧王構手以酒賜之是嵗尊諡祖宗公撰太祖睿宗皇后諡册賜楮幣萬緡正月撰皇后册文攝侍中讀册至大三年以疾薨公在朝廷踰四十年凡纍朝憲章損益能悉舉源委翰林述作自為編修時已預撰先賢文懿尊酒敘論咸有據依欲輯為臺閣舊聞而事莫遂崇拔後進雖未識面汲汲稱許不絶口性剛直有不善必面責之有文集三十卷藏于家子士熙今為翰林待制竊惟聖朝褒録臣下見于令典謹托其居官行事請于太史上于太常至若居家雜儀治民遺事悉弗敢次第延祐三年九月日門生翰林待制承務郎兼國史院編修官袁桷上李司徒行述代作嗚呼我先公之亡銓時年十有三遺言懿範誠不盡知雖知之亦不能盡詳少鞠于趙氏外家外大父諱某為南京同知先夫人嘗泣語銓曰汝父沉靜寡言笑篤志嗜古卓然遵聖賢言行為矩範強之仕弗肯仕凝塵敗席家事靡密弗顧疾革猶執卷瞪然若有思空約彌甚間嘗曰我幼孤長兄樞密都事教我撫我繄汝舅之訓汝舅生三子長都事君從革次總判君從謙余敘為季生兵革中我先君每誨吾兄曰家世朔州罹亂離朝夕習騎射今邊宇寧謐諸兒宜守儒顯親母刻木吏為也都事受其言朝夕以詔二弟俾從學于九山李先生徵吾詎願不仕非其道不可也銓幼不能必其成後其語諸又曰大父之墓在朔州地逺不能至考其事則有紫陽楊先生之志在戒其毋忘焉不幸某嵗卒年四十有一葬于南城栁村之原先公既卒家益困太夫人挈于外家化治銖粟率資以教銓稍長痛自感勵有以其名聞于世祖皇帝詔習儒業入國子學師許文正公焉後直省闥三年出為彰德鐡冶提舉又十年同知歸德府事始得致養于母夫人元貞元年過汴梁將歸京師不幸夫人卒于汴卒時年五十有八奉柩歸葬于栁村相其地水齧洳不可旁祔乃卜於西山金河口田峪之南得合葬焉冬十有一月某日也元貞元年為翰林待制又三年轉廣平等處鐵冶提舉改工部員外郎承檄視屯田鴈門鴈門地近朔州銓思念吾大父葬朔州在鄯陽灰河西一里今六十年榛莾不可考有楊先生英志在雖無能知吾以誠求寧卒使無知哉翼日驗志徴旁近卒無有哭走于野有老叟年八十餘乃來曰李府君葬時吾嘗治畚鍤于灰河今西一里隆然者其墓也銓泣且拜得封崇以識焉楊先生之志曰李君大父諱彥宏由彥為名者十八人自彥而别為玉者二十六人其諱玘者銓大父也我先考大父之幼子也都事有子曰某總判君無後銓由是奉都事而下皆合葬于西山而灰河之墓始樹楊先生之碑推大父燾後之德邅時隆平非若昔時之永隔嵗時省墓則力猶可至也楊先生之志又曰大父為山西西路課稅時耳目所逮纎悉必陳于長官有以榷麴牟利即峻拒絶後患或言郡縣始安輯宜用重典使不犯輒面折陳白非忠厚恤民本旨先公之志翰林承旨王先生構則曰拱璧駟馬流俗所恃嫭者先公無是心也銓無所肖似自工部改授朝列大夫揚州路同知臺擢為監察御史四年少中大夫河北河南道肅政副使五年移淮東未幾嘉議大夫常州路總管不六月召為參議中書省事又六月除禮部尚書復五月轉燕南河北道肅政廉訪使改昭文館大學士中奉大夫治書侍御史今上皇帝推賚存殁于是得贈大父資善大夫司農卿上護軍追封兾國公諡莊順祖妣王氏兾國夫人考榮祿大夫司徒上柱國追封兾國公諡端敏妣趙氏兾國夫人嗚呼銓無所肖似承藉先德先夫人之訓歷歷在耳願因朝廷光顯之寵求文巨公表于墓道俾李氏子孫後有攸考謹再拜敘其事于右端敏公諱從益銓今為翰林侍講學士娶孫氏封兾郡夫人合三房孫凡幾人長某延祐四年九月日男翰林侍講學士中奉大夫知制誥同修國史李銓狀資德大夫大都留守領少府監事兼武衛親軍都指揮使知大都屯田事贈推忠贊治功臣銀青榮祿大夫平章政事澤國公諡忠宣鄭公行狀本貫澤州陽城縣澤陽鄉屯城里年四十七曽祖圭不仕祖臯故忠昌軍節度使父鼎故鎮國上將軍湖北道宣慰使贈銀青榮祿大夫中書右丞諡忠毅公諱制宜字扶威澤州陽城縣人大父節度當金危亡時以智略慷慨衛拯里社興屯田陂池之利年不展用是生忠毅公提天師勦羌蜀絶襄漢竒勳冠勇功次表焯官譜始著公忠毅公之嫡子也方勝衣時忠毅携見于世祖皇帝特視偉之命從大臣習給事儀忠毅遏冦死難世祖震悼乃即授金符襲平陽太原之軍而戍鄂焉公盛年受殊數益矜謹自重控伏將士怗首無撓犯湖廣行中書治鄂戎帥䇿馬進退承教令縮蹙不自給獨公爭器重傾下鄂守缺長執政俾攝治日坐決文武兩府郡益以理凡數嵗訖不除鄂長官十九年詔治樓船有事于島夷江滸地不足居船官城南有何家洲洲爽廣多居民中書行令遷洲屋仆徹墉瓦聲洶撼白日交走驚泣道上公行相旁近地與洲無異即趣還其居洲民爭持牢醴拱謝公揮手曰安民吾職也何謝焉鄂多火災連晝夜交作或言城中隱姦利羅疑似者急治火可止公言咎在火政不眀火未絶而復誣構彼何生為遂率軍士申令約立渠巷俟火所未至通徹其道火是日乃止有盜私立部號伏近郊日暮剽劫負擔者訛言將入城索之不得見數男子從城外來促數異顧命縛之省貴人曰得無以疑詿誤將出之眀日過城東門見一少年乘白馬行且色動公呼曰汝賊也汝貌良人也何作賊不速言當訊汝少年叩首吐實復信宿日所捕亦同欵一郡大驚二十三年徴入侍中眀年從駕北征願前敵效擊上曰鄭制宜死唯一子在宜勿使擊復請戰乃命從太師以行師還詔侍膳殿中加懷逺大將軍樞密院判官春駕如上京院留母行公曰年少宜服勞願以偕行上愛而勿許二十八年超拜湖廣省參知政事是時鄂大臣集括斂為竒功上怒録其家公入辭上曰而父死賊難賞不及于汝今有盜臣資財僮孥留貯于鄂者宜擇精善自取公對言某臣家入皆贓穢不可詰受之雖無汙然迹其由來寧無汙乎上益竒之鄂為舊治土俗厚薄悉周知其隱蘇枯翦強翕然至和上知其能賜中金五千兩間嵗具口奏臣向留鄂治兵臣母知臣年未更事乞臣侍陛下宿衛今不以卑鄙預外政府朝夕思念不勝任敢昧死以請復徴為內臺侍御史安西地嵗牧馬牧人利曠逺率併入旁近世業民數訴理求地持軋不下命公乘急傳治其事核地得三十萬頃考籍于官餘悉歸于民三十一年拜行樞密院副使院治衡州公統軍入衡下令不得入廬舍營部擇便地定井竈食罷畢發至暮整列就次道遇雨卒言冝止頓舍休憩公立雨指畫訖一卒無敢宿民居道旁市井人雜語不知為官軍也湖南地介江廣賊負險煽昭賀聮絡廬陵諸屬邑大軍至即守固不復出歲一捕冦率害善地冦伺去復嘯集如故公至相厄塞雜耕守戍據其出沒眀語歸降者釋弗殺逐殱其酋長茶賊談計龍匿兵器有異志立捕得之其弟舁貨以緩事公趣輸于軍卒正其罪成宗皇帝改元復别置副使一人與公同治公謂官溢常員先置者當罷入授大都留守領少府監未幾兼武衛親軍都指揮使知大都屯田始進階資德大夫公幼熟內府營繕工巧供給祠祭之屬能通達緩急終嵗事集無曠敗至大宴席刀匙樽斚必命公董領以重其事大德七年地震太原平陽公承命往視且言河東罹巨創聖天子出粟幣以賑活之設一不及是負眀詔死罪萬萬何可逭乃躬入里巷傷殘羸餒悉疏録以給有市官利征商詭言某地少災不宜費官廪征法宜如昔無所損公怒曰幸災困民民何罪且汝計征入何補縣官入言于上復其地三年公天性慤厚上宴大眀殿獨侍立不惰命之飲再拜辭上察其意賜酒二壷使歸飲于家事母蘇氏至孝特封潞國太夫人以寵之錫賚無虗嵗復加賜海青俾入禁囿尤號為異數大德十年二月五日以疾薨年四十有七其葬在某縣某鄉自公少時己知自貴乞名于王文忠公王見而器之遂定其名字忠毅以死事顯故公彌欲以忠孝勉奬通敏有持守其居鄂十年善政藹著至今父老言鄭公真清士非他人比至守官靖正不以喜怒害事謙抑自晦中朝士大夫則曰鄭公真吉士也配可烈真氏丞相孛羅公之女子鈞今為懷逺大將軍武衛親軍都指揮使至大更元特贈推忠贊治功臣銀青榮祿大夫平章政事澤國公復下太常定諡曰忠宣謹具歷官行事鴻筆碩彥得以取擇謹狀榮祿大夫大司徒特封饒國公吳公行述本貫饒州安仁縣開興鄉夀櫟里公諱克己字祥甫維吳氏逺有令緒泰伯以至德讓嗣逃于吳周受殷命大封同姓而泰伯胤系因食采吳地子爵不絶周既衰吳越楚爭王吳為越所僨子孫散處江湖間因以國氏夫差六世孫芮為秦番令有德于番號番君漢次芮功封長沙而廟食番世不絶宗庶蕃衍凡占籍番者悉祖之安仁吳世儒家宋淳熙間有從朱文公講學曰某皆其譜諜公之曽祖嶽祖夢旗養潛樂幽丘園晏如也父鑑服儒業言行矩範閭里是否能持平善諭俾率初後皆尊信之劬書教子誨之曰學非以干祿遇不遇命也故公受其訓而行之幼靜默寡嗜好達生養和非仁義之言不言其居家也斥絶喜愠躬行以導之不逮者微語以警之其處于鄉也肅然如有容暴者化之以慈有為不善者輒自勵曰得無吳公知吾所為乎幼督之以學壯奬之以仕稍有能輒譽之其成就也怡色若己得年益耆賔客造户無惰偷酒至愈莊夜分猶危坐治纎悉人皆曰吳公有子全節為玄教嗣師總攝江淮荆襄道教崇文弘道玄德真人其好賢其持身常念若不及繄家教所致推公之德視其子則猶可企也延祐六年五月玄德扈駕上京桷以待罪集賢偕行公薨以五月丙辰訃至玄德晝夜哭不絶泣且曰全節不天疾驅以歸願述先公之行以聲其哀桷謝曰述德敘行宜在門人佐吏敢辭則又曰猶子善辱與子遊其何辭謹按玄德真人幼慕老子道年二十從大宗師開府張公入朝奉祠宮間嵗告歸省成宗皇帝憫許之大德八年公與夫人夀七十上賜公上尊加帛俾乘傳以歸大德十一年特拜翰林學士中順大夫至大三年武宗皇帝隆孝治恩賚中外臣子繇是超拜榮祿大夫司徒饒國公配舒氏饒國夫人而公考亦追贈昭文館大學士資善大夫饒國公諡文靖妣陳氏饒國夫人玄德奉制書以歸延祐元年公夀八十天子遵成宗錫賜如故事延祐四年復降璽書復其家命守臣王都中表鄉曰榮祿里曰具慶玄德築公所居堂曰晚香曰天爵翰林侍讀學士元公眀善記之矣曰齊老則因宋孝宗所書扁以徴其實曰樵隱公所居自號以寓其沖淡之意焉公夀八十有五將以某月某日葬于鄉之山田原子四人長詢次誠蚤卒次玄德真人次全義女若干人孫男若干人善集賢修撰蒙剛才致孫女若干人曽孫男女若干人始善來京師從遊嘗出大父手書誡善制酒力纂述勿愒玩以自棄又誡其叔父持敬存誠為應天事神之本日承君師母以我耄為辭幸未棄昭代嘗惕然深念曷報稱數數道途非所望假我死何憾也水蹇于山屈曲演迤遇順而始逹非偶然也飬深用嗇纍逺益振于吳氏有考丗胄顛覆抑其所發者誠過耶嗚呼吾于是見之矣桷也辱再世之遊耳受目矚向為史官錫命享醴之禮嚴詳於記注惇史純孝贊皇風闡鴻藻有自來矣遂不克讓奉于太史㑭有考焉延祐六年七月日具官袁桷述清容居士集卷第三十二
