body:
  text: 清容居士集卷四十一元袁桷撰議状附進郊祀十議状桷近奉勑牒受桷前件官拜命以来實竊戰汗自惟庸駑俚儒濵海蟄處平時所習不過以雕蟲篆刻粉飾其固陋誠不自意俾獲擢用捫心顧影愈積愧靦思欲上報朝廷之萬一退揆素志願以上陳竊伏思念國家車書混同之後聲文昭眀典章純備議禮考文實惟聖眀之大本觀㑹通以行典禮今維其時然因循有待㡬三十年得非睹厯代儀文之繁縟費用之浩博故由是而未舉也桷嘗質五經之本文較羣説之同異自漢而下良由鄭𤣥註釋殽雜遂不得其當若郊壇神位之侈靡牲牢尊罍之加多又皆出扵東西兩漢之舊増益愈繁而古禮愈失有司益憚其費而不敢議若嵗必親祀之説下至唐宋承平大盛猶不能一嵗一祀則厯代所行足以知非五經之正禮矣昔孫叔通奉漢髙㫖意成野外之儀獨魯兩生不至方是時承秦絶學使魯兩生號為知禮其補亡正誤當不至如叔孫通綿蕝而已故儒先惜兩生之不来而復議兩生之迂介金馬碧雞之頌茂陵封禪之書桷雖愚賤度不敢為獨懐區區之説以陳者實以郊祀為國之大事不應闊畧而未議方今翰林為清切之職典章文物悉自此成而衆賢肅和討論潤色不憂其不至謹獻所為郊祀十議以補缺佚偹皇朝之禮眀郊祀之本其亦有在若夫登降燔燎之儀禮文豐殺之異非十議所盡當别具以獻知其綱則其目可知矣将仕佐郎翰林國史院檢閲官袁桷状郊祀十議序五帝不相沿樂三王不相襲禮所由来尚矣損益之道其㫖同焉嬴政絶滅三代典禮臆為之制禮經廢缺殘灰斷壁收合扵西漢之世名為宗周而祠祭廣衍皆祖秦舊逮王莽尊信周官後漢二鄭申釋名義違異扵五經者旁傅曲㑹皆得以合自漢而降言禮者悉本扵此愚嘗紬繹經傳尊聞審問繄儒先是證郊社大典秦漢而下莫有疑議惟合祭同異其詳可得聞矣若郊非圜丘帝非天帝沿襲舊説卒無與正夫天無二日是天尤不得有二也五帝非人也然不得謂之天作昊天五帝議祭天嵗或為九或為二或以變禮者為正作祭天名數議圜丘不見扵五經郊不見扵周官作圜丘非郊議后土社也先儒言之而復疑焉作后土即社議三嵗一郊非古也作祭天無間嵗議燔柴古經之可見者也周官以禋祀為天其義各㫖作燔柴泰壇議祭天之牛角繭栗用牲于郊牛二合配而言之也禮成于周公未之有改増羣祀而合祠焉非周之制矣作郊不當立從祀議郊質而尊之義也眀堂文而親之義也作郊眀堂禮儀異制議郊用辛魯禮也卜不得常為辛猶至日之不常為辛作郊非辛日議北郊不見扵三禮尊地而遵北郊鄭𤣥之説也作北郊議多聞闕疑先聖有訓私不自量揆妄為之説實有恧焉鴻藻碩儒洽通上下其必有以折𠂻而深證之大徳五年春三月具官袁桷序昊天五帝議言昊天者有三説鄭𤣥六天之妄攻之者衆矣王肅謂祭天有二冬郊圜丘春祈農事若眀堂迎氣皆祭人帝厯唐而下則謂郊祀配天者為昊天眀堂配上帝者為五帝甚者因其説之不通併孝經后稷配天本文而非之其説紛雜良由天與帝之號不眀故耳夫在郊者謂之天在眀堂者謂之帝河南程氏曰萬物本乎天人本乎祖故冬至祭天而以祖配之以冬至者氣之始也萬物成形于帝人成形扵父故季秋饗帝而以父配之以季秋者物成之時也胡宏氏曰天言其氣帝言其性其説是矣故由其在郊則以其逺祖配尊而無文之義也由其在眀堂則以其父配尊而親之之義也鄭氏六天本扵讖緯攻之者雖力而卒莫敢廢漢魏以来名號不一漢初曰上帝曰太一元始曰皇天上帝魏初元間則曰皇皇天帝梁則曰天皇大帝至唐始曰昊天上帝從長孫無忌之議而廢六天之謬後復尊鄭而不敢廢者盖鄭氏謂星經之天皇即周官之昊天上以合夫周官而下復合夫従祀扵是郊之所主為昊天而其壇之二等復有天皇焉此存鄭之説至扵唐宋而不敢廢者以此也王肅言眀堂為人帝者固非而攻王者未嘗不泥扵五帝至以眀堂之祀五帝其来已久或者又謂禋祀五帝為祭天以此病肅然卒無以歸扵一當之論愚嘗獨謂五帝非人帝其所謂人帝者五帝之配耳且五帝非天也新安朱氏之定五帝有取夫家語五帝之説天有五行木火土金水分時化育以成萬物其神謂之五帝而不敢加天以混之唐永昌之勑亦曰天無二稱帝是通名承前諸儒互生同異乃五方之帝亦謂為天自今郊祀惟昊天上帝稱天餘五帝皆稱帝證以二説則六天之説不攻而自破五帝之誤可證而不誣矣獨黄榦泥夫鄭學謂饗帝于郊而風雨節寒暑時非人帝所能為殊不知五人帝者若太皡是也五人神者若勾芒是也今以五行之官名佐成上帝而稱五帝何憂不能寒暑節風雨時獨不可稱天帝以混夫昊天上帝之號耳陳祥道言五帝無預乎昊天上帝其説良是而下文言上帝則五帝兼存焉此亦泥夫鄭説又謂眀堂之上帝兼昊天與五帝而一之其説又不通獨三山林岊言古之祭上帝與祭五帝之禮以經推之禮莫盛扵周周之祭上帝亦曰祀天郊祀之天眀堂之上帝即一也郊祀従簡為報本反始以稷配眀堂従備為大饗報成以文王配稷王業所始文王王業所成從其類也祭扵郊曰天扵眀堂曰上帝天言兆朕帝言主宰也周官先言祀上帝次言祀五帝亦如之謂大臣之賛相有司備具至其圭幣則五帝各有方色未嘗與上帝混同也愚嘗妄謂周官無眀堂郊天之文先儒必欲合扵五經其説愈不可解天官太宰祀五帝則掌誓戒後云祀大神示亦如之鄭謂大神示即天地也是重五帝扵大神示也五帝之説盛扵吕不韋之月令先儒嘗言周官為戰國時書故周官之言五帝多扵祀天而其禮之大者未嘗不與祀天並玉樂雖重扵上帝而充人掌牲牷止扵五帝小司寇之實鑊水納亨士師之沃尸及王盥皆止扵五帝詩書所載未嘗有五帝之號尊上帝而黜五天帝要不為無據也祭天名數議天嵗有九祭鄭𤣥之説也何以謂之九祭祀昊天扵圜丘五天帝扵四郊復立郊祀眀堂而為二龍見而雩帝扵南郊此九祭也王肅之祭有二謂天惟有一嵗有二祭南郊之祭為圜丘以冬祭其祈農事也以春祭謂之二祭梁崔靈恩宗鄭而黜王不過謂郊丘不可為一而五帝之祀同為天帝眀堂之不可廢猶大雩之不可廢也自唐以後非六天者皆是而九祭之名微與鄭異者則謂春祈穀夏大雩秋眀堂冬圜丘兆五帝扵四郊為九祭厯代尊黜異同不過出扵三者之説愚獨以為其説皆無足取證鄭氏之五天帝不得為天前已辨之詳矣以圜丘南郊為二者分帝為太微為天皇而非昊天之本名也王肅之祈農事先儒之言大雩愚請得而論之按月令元日祈穀扵上帝噫嘻之小序春夏祈穀扵上帝祈穀之祭非郊與眀堂之比也善乎盧陵胡氏之論曰鄭謂此即郊按郊特牲云郊之用辛此云元日善日則不必辛郊特牲又云郊迎長日之至註引易説謂春分日漸長則此未春分也易説三王之郊一用夏正孟獻子云啓蟄而郊則此未啓蟄也獻子又云郊祀后稷以祈農事此不祀后稷而祀帝也足眀此但祈穀非郊天大祭詩云春夏祈穀豈謂郊乎先儒亦言祈者以民食之重有求扵天不得與南郊眀堂並而大雩之祭尤不宜與二大祭同議按春秋之書雩旱祭也司巫女巫之舞雩皆不得已吁嗟乎而求之義其甚者則歌哭而請禮之變也爾雅曰雩號祭也春秋書雩之例三傳雖有異同大較紀其旱烖之極若昭公之季年一月而兩書焉足以見夫旱之極矣謂夫子紀魯之僣者非也魯之雩壇舞詠而歸者非歟又按鄭注周雩壇在南郊之旁則非郊天之壇眀矣詩之小序自歐陽氏蘇氏朱氏疑而去之者已久詳小序之箋則先已有疑扵本文故其箋曰月令孟春祈榖扵上帝夏則龍見而雩是與夫是與者疑之之辭也春猶得以祈榖言夏不得以祈穀言矣孔疏知是與為若不審之辭復引仲夏大雩以祈穀實為證是徇小序之失不若毛氏之置疑也祀天之禮有常有變有因事之祭若國故之旅于上帝師行之類于上帝天地之大烖疾病水旱皆不得不禱于天孰謂雩旱而可為常祭者也今定以南郊為一眀堂為二此為一嵗之大祭若祈農事雖非變禮要為祭之次者吕令固有議之者矣獨祈農扵上帝誠不可廢而元日之祭不得與郊祭並故兩存而復議之圜丘非郊議圜丘之名獨見扵周官大司樂詩書春秋儀禮之所不載二戴禮先儒謂出扵漢儒今不復引以周官考之圜丘非祀天之地其本文曰凡樂圜鐘為宫黄鐘為角太簇為徴姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至扵地上之圜丘奏之若樂六變則天神皆降可得而禮矣函鐘為宫太簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至扵澤中之方丘奏之若樂八變則地示皆出可得而禮矣鄭康成釋以為禘祭又謂天神為北辰地示為崑崙厯代相承皆謂祀天扵圜丘王肅之徒雖難鄭説能知禘之非祀天而謂郊即圜丘圜丘即郊其説牽雜而不能定愚按圜丘非郊也圜丘非祀天之所獨鄭康成言之既不䏻合扵詩書儀禮而扵周官復有所背以周官之本文言之止言扵地上圜丘奏之不聞其祀天扵圜丘也况大司樂前云奏黄鐘歌大吕舞雲門以祀天神奏太簇歌應鐘舞咸池以祭地示夫祀天神祭地示其樂與圜丘所奏實異則當以黄鐘大吕雲門為祀天不當用圜丘降神之所而遽言為祀天之所也其祭地也亦當以太簇應鐘咸池為祭地不當用方丘降神之所為祭地之所也鄭康成知其説之不通遂釋前天神為五帝日月星辰圜丘之天神為北辰後来紛紛沿襲其説而王肅六天之辨復泥扵祀天圜丘之説不䏻詳眀其本文而折其謬乃謂郊即圜丘圜丘即郊故崔靈恩孔頴逹咸宗鄭而黜王夫大司樂既無祀天圜丘之文而鄭氏天神復釋為二有不待辨而眀按釋圜丘者謂為自然之丘非人力所為其説與爾雅合雍鎬近郊宜或有此若後代國都扵平衍之地将人力而為之耶抑亦為壇以象之耶或曰圜丘祀天鄭康成必本扵前代愚曰詩書易春秋儀禮之所無者不必信鄭氏之説本扵秦始皇祠八神地主之圜丘又漢武帝作十九章之歌以正月上辛用事甘泉圜丘二者皆非祀天鄭氏隂取之而不敢眀證其事若謂南郊即圜丘北郊即方丘不知周官四郊非南北郊之郊詩書春秋之郊非圜丘之制不得合而為一謂祀天扵圜丘者特鄭氏之説初非周官大司樂之本文陳祥道禮書謂祭祀必扵自然之丘所以致敬燔瘞必扵人為之壇所以盡文亦宗鄭之説而微異崔靈恩義宗亦宗鄭黜王而所謂郊即圜丘圜丘即郊之誤乃不能正其説厯漢至宋諸儒悉不過以周官傅合扵詩書春秋滋以唘後来之誤故為之辨新安朱氏亦疑大司樂本文五峯胡氏非圜丘天神降地示出見文集后土即社議周官無祭地之文先儒言之詳矣而其言近扵地者有五曰地示大示土示后土社是也鄭氏之釋地示則曰北郊神州之神及社稷夫以北郊為祀地此祀之大者不得合社與稷而言合社與稷是為三祀非祭地眀矣曰大示鄭無眀釋或謂大示乃地示之大者祀地以北郊為大則地示之大者将何以祀之曰土示鄭謂原隰平地之神此又非祀地矣曰后土鄭氏則直謂后土黎所食者后土官名死為社而祭之又曰后土土神不言后土社也其答田瓊則曰此后土不得為社者聖人制禮豈得以世人之言著大典眀后土土神不得為社至扵太祝建邦國告后土鄭復曰后土社神獨此説違戾特甚唘厯代之訛謬實自此始按尚書曰告扵皇天后土孔注曰社也泰誓之宜扵冡土亦社也召誥之社扵新邑者亦后土也甫田之以社以方注社后土也后土與社皆地之稱今悉疏經文之可證者而言之泰誓曰郊社不修禮曰祭帝扵郊所以定天位也祀社扵國所以列地利也又曰郊所以眀天道社所以神地道又曰郊社所以事上帝又曰眀乎郊社之義又曰禮行扵郊而百神受職禮行扵社而百貨可極若然則社即后土后土即社鄭氏之釋大宗伯既以黎所食者為是而復有所疑而不决扵是答田瓊之問以后土不得為社四者之説更相背謬而方丘北郊復為二説終莫䏸定至胡宏氏始定郊社之義以為祭地扵社猶祀天扵郊也故泰誓曰郊社不修而問公祀扵新邑亦先用二牛扵郊後用太牢扵社記曰天子将出類乎上帝宜乎社而周禮以禋祀祀昊天上帝以血祭祭社稷别無地示之位四圭有邸舞雲門以祀天神兩圭有邸舞咸池以祭地示而别無祭社之説則以郊對社可知後世既立社又立北郊失之矣此説足以破千古之惑故新安朱氏中庸郊社亦以社為祭地取夫胡氏而獨以其廢北郊之説為未然愚按北郊不見扵經獨見扵鄭氏鄭氏之北郊非至日方丘之祭攻鄭氏神州之説者多而不䏻辨鄭氏北郊之不經攻合祭之説者力而不攻以地為郊之失亦始扵王氏郊以祀天社以祀地謂郊為祀地吾知其不出扵六經也春秋書魯之郊止扵郊天不聞其郊地也用牲幣于社間于兩社皆天子之制也謂魯為僭郊社則可以魯郊為祀地則不可雲漢之詩曰祈年孔夙方社不莫又曰自郊徂宫宫社宫也告天地之禮郊宫為二則詩之郊亦非祀地也朱氏亦曰周官止言祀昊天不言祀后土先儒之言祭社者為是其言周官禮大神祭大示皆無眀文是深有疑扵周官之非全書也或謂社不足以盡地此盖因諸侯大夫皆得立社遂因此以致疑按大宗伯王大封則先告后土又曰建邦國先告后土謂之后土者建國之始稱若武成之告于后土者是也左祖右社親地之道也此言社之名成扵告后土之後也先儒謂尊無二上故事天眀獨行扵天子而無二事地察故下逹扵庶人而且有公私焉胡宏氏曰諸侯之不敢祭天猶支庶之不敢繼祖也諸侯之得祭地猶支庶之各母其母也其説為是且社有等差至扵州黨族閭愈降愈少獨天子之社為羣姓而立王社之説孔疏謂書傳無文其説莫攷陳祥道釋社后土之辨終泥扵鄭氏至謂建邦國先后土為非社曽不知社之未立其不謂之后土其可乎祭天無間嵗議古者天必嵗祭三嵗而郊非古制也然則曷為三嵗而郊也三嵗之禮始扵漢武其祀天也不扵泰壇而扵甘泉壇有八觚席有六采文章采鏤之飾玉女樂石之異鸞輅騂駒之靡瑄玉寳鼎之華其禮也侈其用民也勞如之何其勿三年也至扵後世不原其本而議其末三年之祭猶不䏻舉其䏻力行者若唐之太宗享國長久亦不過三四至宋仁宗以後始克遵三年之制夫三年一祭己不得為古則一二舉者尤非禮也蘇氏曰秦漢以来天子儀物日以滋多有加無損以至扵今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得廕補親屬非周禮也自宰相宗室已下至百官皆有賜賚非周禮也先儒又曰古之郊禮以事天也以報本反始以教民尊上也天子前期齋戒命冡宰誓百官而蒞事焉事之莫尊者也近世則變矣三年而一郊其所事者則軍旅億醜之賞賚耳事軍旅億醜之賞賚則誠不専扵享帝制不一扵報本夫郊以報一嵗生物之功也夫豈三嵗一生物而三嵗一報耶古者大路素而越席大圭不琢大裘不飾牲用繭栗器用陶匏謂徳産精微物所以稱故其文至簡而其誠至慤近世盛鸞輅冕服珠玉金繒之飾惟懼不華内闕觀宫一夕之具惟恐不工其文至繁而其費至廣豈所以降格天神之意邪如是則郊天之禮自漢而下皆非古制禮樂百年而後興誠䏻如三代之禮其繭栗陶匏費不為甚廣罷壇陛從祀之位止以始祖為配則千百年之廢禮墜樂由是而舉豈不甚盛其或不與祭則如大宗伯所謂若王不與祭祀則攝位鄭氏之釋量人亦曰冡宰佐王祭亦容攝祭庶㡬破千古之陋上以合扵天道而下足以解諸儒之疑議云燔柴泰壇議儀禮覲禮曰祭天燔柴祭山丘陵升祭川沈祭地瘞祭法亦曰燔柴扵泰壇祭天也瘞埋扵泰折祭地也爾雅曰祭天曰燔柴祭地曰瘞薶祭法爾雅雖各自為書而其説與儀禮合者獨燔柴無異周官曰以禋祀祀昊天上帝實柴祀日月星辰槱燎祀司中司命飌師雨師夫周官之柴歸扵日月星辰而以禋祀為祀天是不與儀禮合也禮器曰至敬不壇掃地而祭不壇非燔柴也掃地而祭非周官之祀也合儀禮周官禮器三書而言之實有不同自鄭氏必欲合三禮之説為一而後人附㑹者曲為之遷就崔靈恩則謂先燔柴及牲玉扵丘訖次乃掃地而祭祭天之法皆扵地上以下為貴故不祭扵人功之壇陸佃則曰祭天之禮升煙扵泰壇奏樂扵圜丘所以致天神也天神皆降可得而禮然後掃地而祭樂者陽也其聲無形故奏扵自然之圜丘煙者陽中之隂其氣有象故燔扵使然之泰壇至扵禋祀實柴有異扵儀禮鄭氏則云禋煙也三祀皆積柴實牲體扵日月言實柴扵昊天言禋三祀互相備矣其釋覲禮則曰燔柴祭天祭日也祭天為祭日則祭地瘞者祭月也日月而云天地靈之也敢各疏其穿鑿以從古禮經之正周官之不與儀禮易詩書春秋合者不止扵祀天地今止因三禮之異同諸儒之附㑹而言其非是夫周官之圜丘乃奏樂之所非壇也自漢而下皆祀扵圜丘己失周官之意崔氏謂圜丘即壇為人功之壇按釋圜丘者為自然之丘非人功之壇崔説與釋圜丘者異矣使果從壇下掃地而祭則燔柴扵人功之壇不可謂質而獨掃地之祭得謂之質矣若然則儀禮之燔柴為末而掃地之祭為本厯攷梁陳以来不聞有祭扵圜丘之下者是崔氏之説不得以行也陸氏謂自然者為丘使然者為泰壇是祀天之壇有二愚嘗謂合扵周官則泰壇之制未嘗有合扵儀禮則燔柴之制無圜丘厯代之失祀扵圜丘非是陸氏獨不䏻證其誤是為二壇者亦非也鄭氏謂禋煙也詩生民之禋祀書之禋扵六宗禋扵文武釋者謂禋敬也又曰精意以享之謂也使從鄭説以禋為煙則六宗之祀不得與上帝並而祀文武扵宗廟又難與燔柴之祭同也鄭氏之釋燔柴以祭天為祭日祭地為祭月其説尤妄是殆尊周官之書其不可合者遂臆説以非古禮如夏正郊天迎長日之至圜丘南郊二天帝之説類皆若是古禮經獨覲禮為天子禮捨燔柴為祭天則此書又如王安石之罷黜不䏻以用于世戴記之合扵經傳者先儒類皆取之若王制禮器儒行眀堂位等篇固有疑之者矣獨燔柴泰壇為祭天與古禮合特取其説泰壇雖不見扵儀禮然從古傳襲未嘗不以壇壝為正覲禮之壇十有二尋周公之三壇同墠司儀之為壇三成去祧為壇下至周末齊侯為柯之盟有壇先君適四國未嘗不為壇况祀天欽崇之實其可廢壇壝哉郊不當立從祀議郊有從祀西漢未之見也禮之失始扵建武建武采元始之制而為之元始王莽之政也王莽之失在分牢在同祭不聞其從祀也杜佑尊時王之禮而深知其非謂從祀之坐近古皆有梁陳及扵國朝始相沿􅊞夫謂之近古者非古眀矣開元之禮成扵徐堅之徒而開寳所作祖扵開元大較從祀損益咸取扵建武今因開元所定而論著其非是其第一壇曰五帝曰大眀夜眀以周官言之五帝之祀在四郊大眀夜眀以實柴而朝日夕月之制復見扵經傳此不得混而一之之證也壇之第二與第三皆以星經為之制杜佑謂天有萬一千五百二十星地亦如之考其所祭知其壇壝之不足以容也遂為外官内官以别而節其數開寳以後又復増五嶽四瀆飌師雨師之類而併祭之其壇愈廣其牲牢愈繁而其禮愈失考扵周官則大宗伯之實柴槱燎此又不得混而為一之證也今考扵虞書其類上帝之後則行六宗山川羣神之祀不聞其合祭也湯之𤣥牡武成之柴望皆若此矣召誥用牲扵郊牛二者后稷配天之始也若魯之三望雖為非禮亦皆無總祀之理自漢而下牲犢尊罍之數不勝其煩其郊禮之費竭九州之貢賦不足以供由是雖三年之祭亦不能舉壇壝繁雜宫縣四立有司臨事登降偪仄懼不䏻以周旋跛倚顛仆無所不至昔之儒先能議合祭天地之非而不䏻正合祭羣祀之失䏻以親郊為是而不能以三年一郊為非䏻知牛羊供給之費廣而不能盡角繭栗之誠慤甚者配帝之争不决遂有二配帝扵壇上依違莫從一至扵是今若悉如三代典禮不傷財不害民一嵗一郊則何憚其不可行也按晉泰始明堂罷六天止設昊天上帝坐唐顯慶亦止祀昊天扵眀堂宋元豐眀堂亦罷從祀獨郊天從祀循􅊞舊誤眀堂與郊天禮儀異制議晉摯虞議曰郊丘之祀掃地而祭牲用繭栗器用陶匏事反其始故配以逺祖眀堂之祭備物以薦三牲並陳􅇼豆成列禮同人理故配以近考新安朱氏曰為壇而祭故謂之天祭扵屋而以神示祭故謂之帝晉傅𤣥亦云扵郊尚質扵眀堂尚文若然則儀文悉皆有異矣郊以特牲眀堂以牛羊詩曰我将我享維羊維牛此牲之異者也燔柴以報陽也猶宗廟之祼鬯也眀堂與宗廟近則燔柴乎何有沈約宋志謂郊有燔柴眀堂無禋燎郊以逺人而尊堂以近人而親不必盡同此説是席用藁鞂器用陶匏象天之質也玉爵代匏尊罍簋俎之属一以宗廟此元豐議禮之得也郊之祭用氣也進孰之失始扵唐自唐以降未之有改也記曰郊血大饗腥三獻爓一獻孰解者曰郊祭天也大饗袷祭也三獻社稷五祀也一獻羣小祀也郊不以血而以孰薦禮之䙝而失之甚者也然則眀堂之祭其不進孰與曰聖人亨以享上帝上帝眀堂之稱也用扵眀堂而不用扵郊其義眀矣特牲少牢之始扵薦孰大夫之禮也用大夫之禮扵郊不可也用扵眀堂近宗廟也配羣祀扵郊非禮矣眀堂國中也邑外曰郊引而近之其瀆莫大焉尊罍尚質也彞以盛鬱鬯郊得以用之也記曰黄目鬱氣之上尊彞得謂之尊也孔疏六彛上經八尊無鬱鬯以言宗廟有鬱鬯其實天地亦有秬鬯之彞用疏布宗廟亦有八尊用畫布互舉以眀義定尊罍扵天地六彞扵宗廟鄭氏之説也開元遵而不用扵郊猶曰以質不以文眀堂宗廟之近而文物之極也其不用也則野矣凡此皆禮儀文質之異不可以不辨也郊非辛日議郊特牲曰郊之祭也迎長日之至也又曰郊之用辛也周之始郊日以至鄭𤣥謂迎長日者建卯而晝夜分也三王之郊一用夏正其釋周之始郊日以至則謂魯之始郊日以至魯無冬至祭天圜丘之事是以建子之月郊天示先有事也夫以迎長日為建卯胡氏非之至矣三王之郊以寅則冬至圜丘之祭是周以冬為春矣正月正嵗猶曰以子為首若以冬為春則非矣盖郊之用辛言魯禮也周之始郊日以至言周以冬至而郊也易周為魯以附夫臆鑿之論則大有所不可周為周王魯為魯公合周魯為一禮曷不曰魯之始郊日以至葉夢得氏曰以郊為迎長日之至下言郊之用辛周之始郊日以至正以别魯禮鄭氏反之强以建卯為日至甚矣其好誣也冬至祭天此周之正禮不可易者孟春建寅之郊盖祈榖之祭魯雖得郊不得同扵天子是以因周郊之日以上辛三卜不從至建寅之月而止魯郊殆周祈榖之郊故左氏謂唘蟄而郊也或曰郊必以辛周之制與曰以至日而祭則至日非常以辛也魯之郊雩皆辛是用辛魯之禮也然則周郊非辛與曰周官祀大神則卜日崔靈恩謂卜日以至為主不吉始用他日是有疑扵卜也横渠張氏謂日至不必卜日周之始郊日以至言日至則不容卜言月至則有卜卜日則失氣至之時矣是定以為不卜日也曲禮曰大饗不問卜吕大臨謂天時隂陽之至日月素定故不問卜若他饗則問卜矣或又曰周之不用辛有所本與召誥曰越三日丁巳用牲扵郊非辛也至翼日而社非卜也五經異義春秋公羊説禮郊及日皆不卜常以正月上丁成王命魯使卜從乃郊故魯以上辛郊不敢與天子同也是足以眀周郊之非辛矣厯代之月時不一獨唐武徳以冬至祀天孟春辛日祈糓扵南郊䏻􅂑二說而裁正之號為近古故特表而出之北郊議北郊之名不見扵五經謂北郊見扵周官鄭𤣥之論也周官無北郊之本文因鄭𤣥䜟緯之説而與周官並行者王莽劉歆實為之始也先儒能攻王莽南北合祭之議而不知立北郊之説者始扵匡衡成扵王莽捨其大而議其細相承謬誤今千七百餘年矣敢推其本始而詳言之夫周官圜丘方丘為奏樂之地非祭之所圜丘之辨詳矣鄭氏祭地之法有二夏至之日祭崑崘之神扵澤中之方丘一也正月祭神州地示扵北郊二也是方丘北郊為二今合而言之不知其何所始也按大宗伯之本文鄭氏之不䏻釋者有二曰以血祭以貍沈以疈辜則曰不言祭地此皆地示祭地可知以黄琮禮地則曰禮地以夏至謂神在崑崙者至扵大司樂之地示則又曰祭扵北郊鄭氏既以方丘北郊為二而後人之尊鄭者未嘗不以方丘北郊合而為一神州䜟緯非之者至矣至若方丘之不為祭所北郊之無所經見皆泥其説而無有辨之者或曰北郊始扵匡衡非王莽自為之説謹按漢志髙帝因北畤而備五帝至武帝時后土猶未立建始之際方正南北郊匡衡張譚以天隨王者所居援據禮經皆自為損益若所引祭地扵泰折在北郊就隂位之説今戴記無北郊之文陳祥道禮書知其説之無所據遂謂南郊祀天則北郊祭地祀天就陽位則祭地就隂位以强合夫鄭氏北郊之説夫郊非天不足以言社非地不足以盡二者相對如天地之不可以合祭也謂之郊地其何所據哉先儒䏻眀祭之不可以合而不䏻辨社之不可以為郊沿􅊞建始之弊自漢而降無有知其非者祀地之為社詳見扵后土之議尊地之説莫先扵罷方丘廢北郊以全古禮之正或者謂𤣥璜禮北方孟冬迎氣北郊古不得而廢愚謂鄭氏之言人帝五精帝扵地無預王肅之攻鄭𤣥其説雖行扵泰始惜其説猶以郊丘為一故宗鄭者多而王説復廢馴致今日郊社盛禮方由是損益以承三代之正罷北郊之謬其不在兹乎國學議成周國學之制略扵大司樂其遺禮可法者見扵文王世子三代而上詳莫得而聞焉漢武表章六經興太學至後漢為尤盛唐制微附益之而其制愈加詳宻今可考也宋朝承唐之舊而國學之制日隳至扵紹興國學愈廢雖名三學而國學非真國子矣當時布衣從公卿牒補入國學而真國子入學者十無一二夫所謂三舍法者崇寜宣和之弊也至秦檜而復増之月書季攷又甚夫唐眀經帖括之弊唐楊綰嘗曰進士誦當代之文而不通經史眀經但記帖括投牒自舉非側席待賢之意宋之末造類不出此今科舉既廢而國朝國學定制深有典樂教胄子之古意儻得如唐制五經各立博士俾之専治一經互為問難以盡其義至扵當世之要務則略如宋胡瑗立湖學之法如禮樂刑政兵農漕運河渠等事亦朝夕講習庶足以見􅀴濟之實往者朱熹議貢舉法亦欲以􅀴説㑹萃如詩則鄭氏歐陽氏王氏吕氏書則孔氏蘇氏吳氏葉氏之類先儒用心實欲見之行事自宋末年尊朱熹之學脣腐舌弊止扵四書之註故凡刑獄簿書金榖户口靡宻出入皆以為俗吏而争鄙棄清談危坐卒至國亡而莫可救近者江南學校教法止扵四書髫齓諸生相師成風字義精熟蔑有遺忘一有詰難則茫然不䏻以對又近扵宋世之末尚甚者知其學之不䏻通也扵是大言以盖之議禮止扵誠敬言樂止扵中和其不渉史者謂自漢而下皆覇道其不䏻詞章也謂之玩物喪志又以昔之大臣見扵行事者皆本扵節用而愛人之一語功業之成何所不可殊不知通逹之深者必悉天下之利害灌膏養根非終扵六經之格言不可也又古者教法春夏學干戈秋冬學羽籥若射御書數皆得謂之學非若今所謂四書而止儒者博而寡要故世嘗以儒詬誚由國學而化成扵天下将見儒者之用不可勝盡儒何䏻以病扵世作國學議修遼金宋史搜訪遺書條列事状猥以非才備員史館㡬二十年近復進直翰林仍兼史職茍度嵗月實為罔功伏覩先朝聖訓屢命史臣纂修遼金宋史因循未就推原前代亡國之史皆係一統之後史官所成若齊梁陳隋周五代正史李延夀南北史房𤣥齡等晉書或稱御撰或著史臣此皆唐太宗右文稽古數百年分裂事志悉得全備至宋倣依唐世爰設官局以成唐書是則先朝屢命有合太宗文明之盛卑職生長南方遼金舊事鮮所知聞中原諸老家有其書必䏻搜羅㑹萃以成信史竊伏自念先髙叔祖少傅正獻公燮當嘉定間以禮部侍郎秘書監専修宋史具有成書曽祖太師樞宻越公韶為秘書著作郎遷秘書丞同預史事曽叔祖少傅正肅公甫吏部尚書商俱以尚書修撰實録譾薄弱息獲際聖朝以繼先躅宋世九朝雖有正史一時避忌今己易代所宜改正昔司馬遷班固皆以父子相傳遂䏻成書劉知㡬劉餗劉賛咸以家世舊聞撰成史通史例輙不自揆庸用條析兼本院宋朝名臣文集及雜書紀載悉皆遺缺亦當著具書目以備采擇者一宋太祖實録舊有兩本一是李昉諸臣所為太宗屢曽宣索已有避忌至真宗咸平再脩王禹偁直書其事出為黄州禹偁所著建隆事足見深意前實録無太宗叩馬一段後録増入顯是迎合一杜太后金縢之事趙普因退居洛陽太宗嫉之後以此事宻奏大宗大喜秦王廷美吳王徳昭齊王徳芳皆繇普以死今宋史普列傳無一語及之李燾作通鑑長編亦不敢載私家作普别傳始言普将死見廷美坐扵牀側與普忿争其集號巽巖集所宜搜訪一天聖三朝正史紀載多有謬誤盖修史官夏竦所為吕夷簡受成而已其列傳遂以冦準丁謂同傳所宜改正若此非一一洪邁作神哲徽欽四朝史扵時髙宗在徳夀宫多所避忌立傳亦有蕪類所宜刋削當直書徽宗亡國之罪一徽宗違盟契丹童貫復燕城正史回避所合改正一徽欽圍城受辱北行􅇜幽正史不載所有雜書野史可備編纂今具扵後三朝北盟㑹編靖康傳信録孤臣泣血録靖康草史靖康奉使靖康遺録裔夷謀夏録陥燕記南歸録靖康録犯闕録偽楚録松漠紀聞偽齊録起戎録痛憤録建炎復辟記己酉航海記建炎扈從録中興遺史一元符至元祐事趙鼎雖扵紹興改正亦有隠諱今可考證増入者今具扵後邵氏辨誣元祐黨籍傳尊堯集丁未録符祐本末一宋世九朝莫詳長編而可資證援叅考復别有書今院中長編不備諸書並缺今具扵後續通鑑長編長編紀事本末國紀九朝通畧編年備要建隆編隆平集元符詔㫖治迹統類兩朝國史紀志東都事畧仁皇典訓國朝要㑹續㑹要一太史公作世表年表至秦楚之際復為月表致意極深晉代播遷魏宗勃起所宜為表以分年統時兵火湮厄南北二史無所憑依卒不䏻就至歐陽脩任史官之責獨䏻扵宰相方鎮年月譜系盖宰相之任匪輕推年可以考得失方鎮之害最重因年可以推盛衰宋朝興亡繇是可考目今舊書尚有而史院無存今具扵後百官公卿表宰輔拜罷表録百族譜麟臺舊事宰輔編年一禮樂厯代帝王不相沿􅊞自聶崇義作三禮圖多有舛誤樂自王朴李照胡瑗范鎮魏漢津房庶皆有異同史志所載止扵一時而諸家所陳罔有紀載其樂志止詳扵樂髓新經禮書若元豐集議未之有載其書尚在可備討論今具扵後開寳通禮開寳通禮義纂分門禮選禮閣新編太常新禮慶厯祀儀太常因革禮郊廟奉祀禮文致和五禮大饗眀堂禮鹵簿記本院止有宣和濮議東嚮議一兵刑徭役􅈇運度支隨俗施政莫敢偏廢趙元昊用兵保甲義勇保馬等制羣臣各有議論王安石以顧役行扵河北司馬温公以差役行扵東南各有不便王安石青苖貸息大壊極弊繇是馴致靖康之禍所宜博採奏議及食貨等書以備作志經濟集羣臣奏議三司攷㑹計録救荒録刑統一宋翰林視唐尤加清重有雜書可補志書者金坡遺事翰林雜記續翰林志一地志宋有成書太平寰宇記皇祐方域圖志皇祐地理新書元豐九域志一纂修史傳必當先以實録小傳附入九朝史傳仍附行状墓誌神道碑以備去取琬琰集諸家文集涑水紀聞邵氏聞見録春眀退朝録夢溪筆談龍川墓志歸田録續歸田録可談談叢師友雜志童蒙訓晁氏客語清豐懿範韓忠獻遺事忠獻家傳申國春秋歐公本末蘇魏公譚訓師友談記王鞏聞見録桐隂舊話王沂公筆録張乖厓言行録胡安定言行録王沂公别録舊聞證誤唐介事實范太史遺事鄒道鄉語録豐清敏遺事文昌雜録楊文公談苑麈史䏻改齋漫録石林燕語嘉祐雜志東齋紀事談圃澠水燕談避暑録王鞏雜録秀才閒居録却掃編揮麈録後録三録典故辨疑吕氏家塾廣記諸降王當别立傳三朝史所載簡畧宜用偽史叅照作世家倣歐陽脩五代史例十國紀年九國志吳越備史南唐書江南録南唐近事蜀檮杌閩王事迹江南野史一宋代疆理北不盡燕城南不盡交趾西不盡靈夏東不盡髙麗宜倣晉書載記各紀其事當訪尋四境關渉諸書髙麗圖經至道雲南録趙元昊西夏事實交趾記丙午録遼金誓書國書本末使遼録西夏事宜一李筠李重進本非叛臣實漢周之忠臣宋史作叛臣傳所宜改正韓通亦周忠臣歐陽脩作五代史不立韓瞠眼傳議者非之又如諸方僭竊皆宜立傳宋史悉諱今宜㑹萃立傳李順方臘王則甘陵代叛記趙諗有事實儂智髙有平蠻事蹟一歐陽修作唐書厯志悉取一行十議造厯之法見扵志書宋世五朝志應天厯乾元厯儀天厯崇天厯眀天厯亦號詳備獨熈寜奉元厯􅀴元祐觀天厯崇寜占天厯大觀紀元厯洪邁作志不䏻盡紀所宜訪求厯草見扵志中大抵厯不差不改得其造厯更改則後有攷民間通厯學者亦有其書所宜搜訪一神宗元豐以前官制似唐亦有増損元豐以後官階勲爵分為二途史志雖詳難便檢閲官制新典官制舊典官制通考一藝文志自元豐後該載未盡宜以今世所行書籍備載舊制進呈者入書目亦當以館閣書目為主分類補入自惟志學之嵗宋科舉已廢遂得専意宋史亦嘗分彚雜書文集及本傳語録以次分别不幸西城火灾舊書盡燬然而家世舊聞耳受目覩猶䏻記憶或者謂國亡史不宜脩南方鄙儒詎敢置論年齒衰邁分宜歸老田里曠官縻職實為罔功而區區素藴亦蘄别白以稱朝廷奨拔之厚凡所具遺書散在東南日就湮落或得搜訪或得給筆札傳録庶䏻成書以備一代之史謹呈翰林國史院謹状
