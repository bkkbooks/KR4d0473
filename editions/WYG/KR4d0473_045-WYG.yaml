  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_WYG_045-1a, image: WYG1203/WYG1203-0595a.png}
body:
  text: 清容居士集卷四十五元袁桷撰題跋皇姑魯國大長公主圖畫奉教題徽宗扇面水殿風髙菡蓞清手題紈扇墨花輕君王猶道宫中熱竟上臨潢五國城定武蘭亭薛郎輕薄盜為鄰蟹爪金鐘眩世人從此子孫千百億錦囊玉軸各稱真牧羊圖髙栁風清曉日蒼牧童隨處候隂涼似嫌挟䇿當年客物我胸中兩未忘吴元瑜四時折枝吴生天機握羣動彩筆隨時作輕重幽如静士槃澗歌妍若妖娥漢宫寵娟娟交鳴疑欲語宛轉不去情相送宣和殿前花似玉珍禽低昻手堪捧傳言寫生論甲乙御筆親題羣軰竦一朝百幻歸逝水舊苑凄凉麥成壟君不見桑間栗留田間雀難作折枝奉宣索九馬圖九衢塵沸各低頭水暗荒陂得自由矯首天池欲歸去乗風緩從玉皇㳺江貫道煙雨圖江生泉石本膏肓刻削經營入𣺌茫老樹雨深龍翼重隔川雲冷縠紋長吟鞍欲度愁溪徑漁艇将歸認石梁擬向此中尋隠計底須紫禁謁虚皇貫道紹興間召至行在所一夕而卒周増水塘秋禽圖蘆葦蕭蕭秋水清拒霜迎日鬬紅英鵁鶄屬玉休驚訝嵗晚江天得共行王振鵬狸奴畫堂緑幕鎮犀懸花影雲隂得散眠自是主家扃鎖宻晚風縁木捕新蟬天王供佛圖諸天陳妙供奉佛演大乗佛以施受之佛亦墮因果所施不願報自然福無量布金與獻花輕重同一念若以多寡論富者日増益天王䕶虚空如月七寳合正覺無等夷即不入生滅世人重施報萬刼成輪迴問佛佛不言彈指即成就徐白秋塘戲魚圖魚背水深一尺溪毛日暎千絲似笑釣鼇狂客獨騎瘦馬歸遅惠崇小景惠崇作畫荆國王文公屢褒奨之亰卞作宣和譜堅黜之何耶余嘗評惠崇逺景不踰扵吴頭楚尾殆如大年朝陵止見西洛山水然黄太史作詩曰坐我瀟湘洞庭豈其芒鞋踰楚而南胸次浩蕩非少年所作也此卷得之黄太史松風閣詩謂松有風松不知謂風入松風無形聲繇形始成言六書者取焉肇扵無名入扵有名萬化之始吾未始以妄聴松動風動當扵混沌以前得之斯可矣王生鬼戲圖青天白日其呈怪獻醜迺敢是昔人嘗云有錢鬼可使無錢鬼揶揄作斯圖者其無迺逆旅燈下見其情状抑亦貂裘珠帽視窶人子類以此目之邪出山佛像世尊雪山成道時日食一麻一米其枯槁盖可見天王八十億衆猶未深伏故其獰雄怪醜溢扵面目胡跪合掌當是浄瓶不動以後儀相若曰相好端嚴閉目則失相由目成有相俱妄或有問曰丈六金身真妄曷辨荅者曰清浄妙法身無住亦無去明月印海波白雲倚巖樹折枝錢生調露滴花枝蜂蝶無知鎮日隨記得畫橋流水處雙紅背立隔簾窺隆茂宗羅漢子昻評畫要是具眼隆無住葉石林門僧久居升山故其作畫極多徳夀宫評畫以隆為龍眠嫡嗣今觀此巻信然周昉金星兊景肅萬寳秋水瀉銀潢渺渺帝子降寳冠縠文裳凝睇白玉京晶熒動摇光手弄鵾雞絃運撥雲飛揚正心秉無回緩莭申以商西逰升廣寒東迴從扶桑龜臺鈞天奏八景儼髙張出入復安窮隠見定有常閶闔下符貺嗣嵗歌穰穰稽首連蜷靈萬年奉虚皇黄居寳湖石水禽圖峩眉雲疊翠淒迷更着層峯小殿西誰信蜀王辭劒閣鴛鴦飛盡杜鵑啼􅆊隆䕶法神威音無善亦無嗔獰目揚眉定有因欲識世間平等觀雲如流水月如輪馬賁秋塘水禽圖古木荒陂澹澹秋禽鳬髙下意夷猶似憐天際南飛雁年去年来不自由孤鶴圖一庭涼月白萬里海雲清似欲乗天女排空入帝京唐摹鍾繇賀捷表賀捷表唐摹有二本褚河南微瘦而勁峭徐季海差肥而沈着此本盖自季海来若希白長沙帖所摹則祖河南舊本施武子墓田丙舎石刻與此筆法無異觀此足以知前人鈎搨之工孔世三十八白而長身猶取其類况此實曽𤣥也與宜重寳之傳古龍賛下土焦聲嗷嘈靈在湫蕩逰遨鼓以風挟以濤受帝令行林􅆏百榖成神功韜庶徴叙靈靡勞何尊師醉猫攪甕翻盆勢不禁晚風辭醉首岑岑醒来獨立䦨干畔四壁無聲蟋蟀吟羅漢圖四果圓融得自如天台樓閣總虚無何人繪畫供青眼拍手雲中笑客愚錢舜舉禾䑕七尺長身愧負多清時空食㡬囷禾營營蒼䑕嚵分寸不奈詩人總譴訶徽宗鸂鶒太液池清皺碧羅兩禽相對盪春波當年肯憶閻中令䑛筆和鈆恨未磨徽宗桃核圖三足之烏千嵗芝當年曽作帝王癡黄龍府裏沙溪淺準擬平分作酒巵蕭照江山圖蕭郎解作湖山圖上皇一見玉色愉明知此景落歌舞别灑妙墨為訏謨長江吐吞恨無極突兀金鼇障西北雞鳴不聞中夜起零落烽臺候朝夕蒙衝揚帆去如仰遥望青徐在吾掌諸公坐談籌畫䟽年年送使𤓰州上輪囷米舟踰沔水驕将髙眠載吴妓卷蘆吹笛斜陽愁折箠投江等兒戲只今承平五十年蜀荆賈客船相聫箜篌傳歌賽神舞不信人間有今古順宗墨行濃淡娟娟涼月低昻淺淺春雲胸次何須千畝筆端咫尺平分臣然山水空江浩蕩挟秋聲不是匡廬只秣陵老子定回神觀静笑渠艇子浪千層趙昌折枝瑶池朶朶玉精神滴露研朱竟奪真蛱蝶不知遮繡幕飛来猶認故園春時苖留犢圖伯夷采薇身苦飢人言周土夷受譏鶴翻孤松蟬嘒栁絜腹得免身中肥昔聞汲井嘗投錢清白之子推父縑人生作事在平易鄒子受金非慊然時君作吏心不懈一犢相辭匪奇怪當年孝亷争入徴壺飱柴車魏王令㣲宗瓊蘭殿記記中云湖湘佳致足以指顧其髣髴玉殿遥思湘水逰欲看虞帝九疑秋二君野死難相似宫女當年一様愁蘇李河梁圖李藻曽作河梁客山迴溪水灣春看人北上秋見雁南還燕文貴山水翰林學士将仕郎守雲州雲應縣主簿晚色蒼茫外秋聲縹緲間亂溪環水佩千嶂疊雲鬟曉瀑村舂急風林寺鐸閒片帆如可託吾欲與君還海潮圖銀潢清淺瑞星輝的的秋光下紫微欲識潮音真實相落迦山畔五銖衣海狗窠石圖靈璧層峰負六鼇藥欄花檻翠周遭如何畫史同羣吠不與君王繪旅􅋙王振鵬錦標圖界畫家以王士元郭忠恕為第一余嘗聞畫史言尺寸層疊皆以準繩為則殆猶修内司法式分秒不得踰越今聞王君以墨為濃淡髙下是殆以筆為尺也僚丸秋奕未嘗以繩墨論孫吴之論兵亦猶是也然嘗聞鑒古之道必繇其侈靡者言之余扵畫㫁有取焉龍舟之圖得無近似不然昔之所傳者安得乆逺至是耶㣲宗梅雀圖金帝母家宋外孫筆畫好樂餘風存披圖勘書儼相似天水别記牙籖分明昌宫中三萬軸盡日雲忩看不足平明鐵騎踰河来玉􅞃金題碎車轂上皇寫生工入神一枝瀟洒江南春天興之初汝南失猶解傳蔵記年日卷題天興元年蔵記為言當年愛遺墨不如洗手還河北黄宗道播州楊氏女長頭黒髪垂𤣥雲矯矯馬首雙手分彫弓寳刀左右挟欲領鐡騎趨崑崙前關濤湧如壊墻後砦百溜奔溪篁羣蠻簇唇争呌囂云是楊家女子功最髙旋如長蛇轉空洞快若俊鶻凌風飄還家膏沐帶簮珥父母見之眼垂淚君不聞木蘭女兒着金鎧年少從軍顔不改一朝脱役歸故鄉樂府相傳至今在魯國大長公主圖畫記至治三年三月甲寅魯國大長公主集中書議事執政官翰林集賢成均之在位者悉㑹于南城之天慶寺命秘書監丞李某為之主其王府之寮寀悉以佐執事籩豆静嘉尊斚潔清酒不强飲簮佩雜錯水陸畢湊各執禮盡歡以承飲賜而莫敢自恣酒闌出圖畫若干巻命隨其所能俾識于後禮成復命能文詞者叙其嵗月以昭示来世竊嘗聞之五經之傳左圖是先女史之訓有取扵繪畫将以正其視聽絶其念慮誠不以五采之可接而為之也先王以房中之歌逹扵上下而草木蟲魚之纎悉因物以喻意觀文以鑒古審時知變其謹扵朝夕者盡矣至扵宫室有圖則知夫禮之不可僣溝洫田野則知夫民生之日勞朝覲賛享冕服懸樂詳其儀而慎別之者亦将以寓其儆戒之道是則魯國之所以襲蔵而躬玩之者試有得夫五􅀴之深意夫豈若嗜竒哆聞之士為耳目計哉河水之精上為天漢昭回萬物矞雲興而英露集也吾知縑緗之積寳氣旁逹候占者必扵是乎得泰定元年正月具官袁桷記清容居士集卷四十五
