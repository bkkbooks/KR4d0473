body:
  text: 清容居士集卷四十八元袁桷撰題跋書張忠烈王傳後世言老子書富國强兵以予觀之是未足知其説老子言佳兵者不祥而陳平亦言隂謀道家所忌夫其書學道者之所祖而言用兵有不得已之意則兵者非真喜用也宣政以來老姦宦竪爭㺯兵立功於僥倖馴致靖康之禍議者謂佳兵於此可見矣至於建炎兵不得不用而一時狃宴媮之乆長驅南來蔽遮阻厄者皆望風奔突驍將巨鎮遂廣立屯衛以自重而東南民力匱轉輸供給之苦未㡬而紹興用事者言罷兵矣方是時秦氏子誠無所容罪獨張忠烈王有適墮偃月之計而後無與辨之者當罷兵之初莊簡李公嘗同其議檜之始未可以遽議也論檜之罪當成於罷王西府之任葢姦臣造謀未始不假宿徳重望以厭服衆論事成而即排之者毋怪其若是故李公之去也不數月而王雖一嵗而去則亦有所不免夫事之毁譽難定於一時而視其子孫始足以知昔時之行事漢髙宻侯鄧禹功為中興第一遲遲長安無以辭光武之責至其訓子孫俾各習一藝則其善後良有古意唐李勣垂殁之訓嚴且明矣敬業之覆宗滅祀終不可逭豈非立后之議誠有遺憾也今王聞孫彬彬滿於家乗施及五世崇徳植學卓卓表著猶不可一二數則是非之公當由是而見因書所聞以附于家傳之後書史忠定王貸錢劵後桷年十三四時有鄉先生應君文煒年八十餘善談論乾淳諸老舊事為桷言外髙祖忠定越王未第時僦富民錢氏坊以養越國夫人洪氏今天童松徑東臯先生精舍即坊故址也當紹興甲子嵗越國夫人夀周甲子忠定王假坊錢為酒食以合姻族閭里禮甚具坊故屬浙東常平司至秋七月不勝輸官之苦留繫于越宿越賣餅湯媪家是嵗鄉試期已迫忠定王不得歸里鬱鬱悵望媪㣲問曰秀才何負官逋如是遂具以前對翼日媪召兒與共約曰我積錢百千以治終事今悉與秀才輸官若中秋試必速償我毋惜也王歸果與計偕實紹興之十四年至乾道間王以衮衣偃藩養越國夫人于越時媪猶亡恙王命使者車迎媪坐堂上拜之欲官其子媪謝弗受曰願丞相子孫他日官越毋忘媪家時賑與足矣後忠獻為常平使者復命駕媪家拜其像與其子坐且遺金帛甚厚應君又言樞宻公帥越余時相從湯媪諸孫猶在樞宻公紹先志如初特伺候門下旬日為異耳今獲從五世孫公升允叟伏覩手劵夷攷嵗月去秋試纔二月當從此劵以償湯媪而桷所聞於應君者不誣謬為可信謹書以補家乘之缺維王盛徳厚行垂裕無極以允叟五世大宗兢恪遵奉睦宗廣孝下賢急施當不止智周於家庭惠盡於鄉黨而已也桐木之韓由南澗而愈昌申國之吕至太史而益著韓吕五世孫聞望若此允叟其有以勗之書曰迪惟前人光又曰紹聞衣徳言因以勉允叟併以自勵書焦節婦傳後唐虞之事載籍莫詳往讀劉氏外紀胡氏皇王紀等書記帝堯之時孝慈力耕桑者表其門閭雖遐邈無本非有類於荒怪不經吾取以為始焉世衰道㣲日淪於媮彤管之詩先儒或疑為季代之作於是淑徳内範與男子並稱若列女傳所載張芝桓女之徒皆得如帝堯時故事亦足以惇行表勵噫其意亦深且明矣桷㳺呉門讀中丞徐公為焦氏婦傳誠可謂懿厥哲婦而其彰明之始實自其弟焦侯發之昔屈原作楚詞悲切反復而獨推髙陽之𤣥胄女􅎐之嬋媛葢其好徳之心根於自然移為忠君愛國猶不敢忘其所自使原幸得其時則其光榮之道不假於原之自陳也方今焦侯以明達粹雅嘗舉正於省闥前徽貞行將以請于太史氏更生蔚宗之筆足以稱是非如李文公之傳揚節婦不得入唐史為可恨也詩曰此令兄弟綽綽有裕焦侯孝友之道於是乎備矣敢書所聞于後大徳庚子越袁桷書書湯西樓詩後玉溪生往學草堂詩乆而知其力不能逮遂别為一體然命意深切用事精逺非止於浮聲切響而己也自西崑體盛襞積組錯梅歐諸公發為自然之聲窮極幽隠而詩有三宗焉夫律正不拘語腴意贍者為臨川之宗氣盛而力夸窮抉變化浩浩焉滄海之夾碣石也為眉山之宗神清骨爽聲振金石有穿雲裂竹之勢為江西之宗二宗為盛惟臨川莫有繼者於是唐聲絶矣至乾淳間諸老以道徳性命為宗其發為聲詩不過若釋氏輩條達明朗而眉山江西之宗亦絶永嘉葉正則始取徐翁趙氏為四靈而唐聲漸復至於末造號為詩人者極凄切於風雲花月之摹寫力孱氣消規規晚唐之音調而三宗冺然無餘矣夫稡書以為詩非詩之正也謂捨書而能名詩者又詩之靡也若玉溪生其㡬於二者之間矣吳門湯君往得其過葛嶺諸詩玉辟邪鐵如意之警䇿有得乎玉溪生之深切精逺余每欲蒐其精良者而一讀之來呉門其從㳺陳子乆相過知湯君之詩雕搜㑹稡皆子乆任其事余不識湯君而知其用意間有與余合遂書玉溪生作詩之源委宋三宗詩體之變以慰湯君庶知湯君非苟於言詩者子乆嘗學于湯不知余言能有合於湯否噫詩至於中唐變之始也若玉溪生者跂而望之其不至者非不進也子乆年富才俊它日追風雅之正返雲咸之音其視余言殆猶糠粃也大徳庚子四明袁桷書書髙息齋嚴母方氏夫人墓誌後息齋先生蚤嵗入辟雍受知于龜山楊先生後掌國子於熈興五峯先生一書忼慨明白遂即挂冠致事辨春秋王霸未嘗不嚴正而簡明也成均學制至咸淳之末猶復遵守其或變更傅㑹皆大臣私意或謂與宣和三舍法㣲近是殆不知先生本於周官乘聲附響無以議為也蒨聞遺落麟臺故史三厄無從考訂郡志疏缺能言髙氏出處大致譜諜官號亦不多見而桷以先世遺藏得其集註䘮禮若奏牘之見於㑹要者猶一二條目至於他文則皆未之知也今年春得讀嚴母方夫人墓銘其叙師友婚姻之好不以窮達渝易足以知先生成均之法出於閭塾之遺意而方夫人崇師教子不得與流俗同也噫師友道廢遂耻以師自言陳稽古印綬惡遇舊館人者有之矣婚姻禮乖雖潘揚之睦猶以貧富異心尚何敢修師友之誼敦婚姻之舊於富貴利達之後也夷攷漢唐傳記嚴母之賢者莫若延年與武彼二子苛酷驕蹇遂不幸使内則懿範見於史氏今嚴氏儒雅奕世聞孫與計偕登仕版者亦不絶書則方夫人之賢不著於郡乘嚴氏之幸也巨川往嵗南極交廣蒐竒補軼多四方聞見今垂老隠居充然自足不假於當世而獨卷卷表章先夫人之訓範以示厥後復使髙先生之遺文振暴於二百年之後謏聞寡見由是而廣惇本崇禮由是而興不亦韙與謹書其後而歸之大徳壬寅二月九日袁桷書書呉興張景芳祖母費夫人所作華嚴偈頌後南軒先生祖母魏國夫人日誦華嚴得心法於佛日杲佛日杲之頓悟機辨亦由華嚴或謂華嚴乃佛富貴此葢以妄測妄非知道者方魏國學佛時忠獻以忠正謫居南軒先生從五峯㳺學子孫為一代師表未始諱言魏國為異端也近世崇正之説方新凡類近釋氏者子孫皆掩匿不著于家乘今呉興張景芳獨次其祖母夫人偈頌以光示子孫忠厚孝謹將繇爾以興敢書宗衮之事以勉大徳壬寅良月望日越袁桷書書鄭潛庵李商隠詩選李商隠詩號為中唐警麗之作其源出於杜拾遺晚自以不及故别為一體玩其句律未嘗不規規然近之也拾遺愛君憂國一寓於詩而深譏矯正不敢以談笑道若商隠則直為訕侮非若為魯諱者使後數百年其詩禍之作當不止流竄嶺海而己也桷往嵗嘗病其用事僻昧間閲齊諧外傳諸書籖于其側冶容褊心遂復中止私以為近世詩學頓廢風雲月露者㡬於晚唐之悲切言理析指者鄰於禪林之曠達詩雖小道若商隠者未可以遽廢而議也客京師潛庵鄭公示以新選一編去其竒衺俚艶讀其詩若截狐為裘播精為炊無一可議去取之當良盡於此昔蕭統定文選至淵明詩存者特少故議之者不置至王介甫選唐百家詩莫敢異議而或者又謂筆札傳録之際多所遺落嗜好不同固難以一今此編對偶之工一語之切悉附于左商隠之詩如是足矣覽者其何以病因書其説而歸之書定興王成之墓臺記後自古不修墓之説見於禮經世媮俗浮遺墟敗塚子孫有泚其顙而莫以為怪抑不知必誠必信當自其始至不幸而修者非禮之正也自墓田定尋丈崇卑之制穰穰世胄率從事翁仲雲闕之靡麗發丘模金蔑有遺藏抑不知制令之始盖以防其侈非俾之薄内以事外也定興王成之躬負土之勞髙為墳臺積至尋丈絶推埋之望而慎終謹始復合於聖人立言之本意吾友李伯宗甫特叙表其事余嘉其純孝之實而復以是説告之大徳癸卯七月既望四明袁桷書書陸淳春秋纂例後近世春秋家立褒貶於字義茫不知盡性之理按其形模以中有司程式為精巧天理人慾三尺童子矜矜然猶能言之春秋之學廢矣習三傳者唯文詞是師左氏盛而公穀廢矣武夷胡氏作傳止於七家唐世傳春秋者皆廢矣噫士何事春秋哉吾里樓宣獻公晚嵗欲明義例之説時永嘉陳君舉舍人為春秋傳遂序其意而焚其稿每語後進當以唐陸淳集注纂例清江劉氏傳為下手余家所藏纂例乃寳章桂公所校號為精善按纂例他無善本審此書廢己乆聞蜀有小字本惜未之見唐志纂例十卷集注三十卷㣲㫖二卷辨疑七卷余來杭復得㣲㫖二卷迺皇祐間汴本聞苕溪直齋陳氏書目咸有之當搜訪以足此書以假友人得脱灰燼劉氏傳迺先越公居宥府時岳肅之侍郎所遺家諱咸以絳羅覆其上二書當永為子孫寳俾勿墜書鄭潛昭曾祖東谷先生諡議後胡忠簡論王正道時不知其後之忠烈也廟有碑史有傳斯無愧矣三槐名孫﨑嶇擾攘欲以竒計立功業不幸有脱略名教之誚使不若是則㡬為狼籍人矣今觀栝蒼鄭公覆諡猶不恕置議禮義名節士之大閑謹于正道葢將以謹夫後來者耳渡江百餘年屢厄權相獨定諡無敢希指至若賜諡則由舍人行詞端平以後諡愈多而名愈濫惜不得鄭公有以正之嗚呼悲夫書朔齋先生都梁第一樓詩後南豐記擬峴臺欲與州民同其樂至朔齋先生之賦都梁第一樓則欲與之同其憂非深知民隠者言不至是此卷筆勢有籌筆驛詩態度嘉定以後士大夫不復崇尚字學獨公與莆田陳復齋號能書二公出處相近要未可以一藝名書朔齋送弟牧翁十絶後朔齋先生以宗正兼直後省于時先子方入轉運幕府一見道問家世即以科目剡薦至今照牒猶襲藏也今得拜觀遺墨其藹然友于之意見于篇翰前哲愈逺古道日媮摛章繪詞言行實不相顧觀此亦足以媿警書髙使君脉圗後吾鄉嘉定以後故家諸賢獨髙使君衍孫興寄冠珮清逸儼整如晉世圗畫賢士宅旁植水竹竒石號曰竹墅其食必按本草其居處必順叙寒燠銖分脉法如指諸掌往時搢紳類能夸詡之數十年來士益困不復知有清事桷幼與其諸孫一清相過往見一便面即使君脉圗也于時一清方編類經方惜日不自置叔祖文昌公猶無恙其尊聞于家庭者尤精確可傳信今㡬二十年而一清所為醫書十事亦成矣宓戲作易神農為本草至黄帝述素問難經等書三聖人未嘗以卜筮醫藥為鄙九流肇分漢世儒者猶不得尊則此復何議至陶𢎞景孫思邈貞白為髙能令天子大臣傾下敬愛則道與神完者未可以一槩論也一清方逰公卿間清名舊閥當益以貴重敢誦所聞書附脉圗使來者得以攷清容居士書題忽訥監司畫像詩卷後成都郡治歴唐宋㡬五六百年牧守皆有畫像政績可紀若韋相國張益州愈遠而愈不忘其治守無狀耄倪咸指其像爭詬詈以病葢棺事定豈虚語哉忽訥監司按臨長沙墓木已拱其子脱帖木兒宣武公知遺愛之被於長沙也至厚嵗乆而冺落將懼夫子孫之叙述者未足以傳信固雖豐碑善頌皆迫於一時之指使考其相與社而祝之者審像以觀則得以察其平昔治行之實永乆而益信詎家庭之所少而逺求數千里之外哉徧觀鉅軸其意有若未盡桷也職在太史韋丹之碑其能肯多讓願泚筆以俟書白敬甫三嵗作大字卷栁栁州劉賔客在海嶠為二童作詩有曰小兒㺯筆不能嗔涴筆書牕且賞勤栁州則曰聞道近來諸子弟臨池㝷己厭家雞二賢期待如此彼二童迄莫能有聞梧竹先生一為元公期奬卒有成就在易蒙之六五解者謂黙識心通為顔子得之今聞夀考先生實何愧焉傳示子孫俾無斁以承書胡評事夢昱印紙桷幼嵗嘗讀曾大父樞宻越公家乘言寳慶改元九月旦胡評事進對首言濟邸死非上㫖當立孤以明本意于時相臣震怒入對兩宫乞黜去未㡬御史李知孝希㫖具疏削籍度嶺先公時尹錢塘力遏閤言削籍故事必下京兆書考功籍公遲不肯署復三入閤相怒曰趣書何言宿留凡七月始下公曰不十載當悔復吾毋為禍首且考功籍謹不涉署後必有知我者繇是戒兵士善䕶復宻以錢鏹相遺贈自後先公門人王公邁亦踵論濟邸事而公亦被黜去端平末年公始得諸老叙復桷獨不得與胡氏子弟參論來京師豫章周儀之間言是事桷具所以儀之曰胡公諸孫携考功紙來與子語誠不妄噫呉夫人之復封端平之初也復立濟祀徳祐之末也馴致於此其何可言剛簡丁丑試集英先公時為參詳併識于是謹書其後而歸之乙已嵗三月甲戌袁桷書書呉景山樂府景山呉先生佐金陵閫府時先子實為貳車亦入幕嘗為桷言先生壯嵗客羣公飛牋疾記坐宴席即就就亦弗視言論氷雪懐吐竒磊不肯屈人下晚始第奉常嘗鬱鬱自慨語昔時承平事謂今當不復有未幾逃難解散先生亦竟謝人世後十餘年其子博文為四明郡博士先子家居敦叙夙昔猶一日也桷客京師博文適先後至迺出先生手澤一通以示葢方回堯章之伯仲非如劉改之徒喑嗚叱咤以氣為言者也唐子西之詠梅不免以倨傲得罪先生之詞藴而不露哀而不怨情見乎辭而莫知其止殆駸駸乎國風矣俯仰疇昔悲不自勝并志先子遺語而歸之大徳乙巳契家子四明袁桷書書黄彦章詩編後元祐之學鳴紹興豫章太史詩行于天下方是時紛立角進漫不知統緒謹愞者循音節宕跌者擇險固獨東菜吕舍人憫而憂之定其𣲖系限截數百輩無以議而宗豫章為江西焉豫章之詩夫豈惟江西哉解之者曰詩至於是蔑有能繼者矣數十年來詩益廢為江西者嘗慷慨自許掉鞅出門卒遇虎象空拳恣睢復却立循避不敢近使解者之言迄幸而中噫然則其果不可以復古與桷來京師遇黄生景章于旅次問其譜别于太史為七世而尚書公叔敖之所自出示其詩宫商敷宣黯然不遇之意絶乎詞氣吾知其充然以修興太史氏之學者非子其誰也夫别江西之宗者是不至太史之堂者也曠百載而有俟捨其諸孫曷有望焉念嘉泰間尚書之孫犖為常平使者于呉曾大父樞宻越公丞邑呉江檄定理役時蘇師旦驟幸顯獨絶請託無隠使者大喜得剡于朝而改邑焉俯仰百年門下之誼猶一日庸叙疇昔而勉之大徳乙已八月中秋書于其詩後書劉將軍詩言用兵者必曰師尚父讀其遺書多竒簡韻語非深知詩者不至爾噫采薇杕杜詠歌勞苦雖賤㣲者猶能知則古言詩抑豈有文武異哉今觀劉將軍詩藹然有觀民風審知止之意使髙達夫劉景文復生攬轡並行未知孰先後也陳郡袁桷書題金承安樂府幼嵗見老樂工歌梨園音曲若不相屬而均數無少間斷猶纍纍貫珠之遺意也承安老人所補歌曲按其音節無少異此殆以文為戲者黄豫章嘗評小山樂府為狹邪之皷吹豪士之大雅風流日逺惜不得共論承平王孫故態為之慨然書清江羅道士詩後往嵗卜居城南遇梓人焉曰築室之制崇廣纖鉅必謹其規體楩楠杞梓若一而用之則堂觀亭室各不相類余於是悟作詩法亦猶是也近世工清儉者局於律師宕逸者鄰於豪角立墨守迄無以融液詩㡬乎息矣噫風雅頌之體夫子何自而分哉清江羅道士詩余讀之審劑輕重分析清濁大者合繩墨小者適程度似欲各取其長誠非苟於言詩者余聞學仙之説内固而神益清養之以嵗年斯熟矣詩其果有二道乎題蕭安撫迪後記老瞞視天下事如探丸晚嵗真態始見李衡號良二千石猶不免為諸兒計慮迺知情愛雖䧺烈有所不忘蕭公安撫副使書迪後記上推本始旁及䟽逺教之食之一語不及其私觀者興起噫故國世臣俯仰事變何害不有獨蕭氏孫曾為名大守賢御史官薄益顯今四世孫文孫靜敏好學年弱冠上書御史府言救荒事皆切實語行受選用種徳之報是真有慶矣尚勉之哉書謝道士歸洞庭詩卷後古之善養生者必適夫寛閒之地順其隂陽使神足以恬不能有動於心苟絶其所為深林嵁巗隠翳自處將感悔震掉日有不給且外不能以自治其理内者奚以合榮觀之道豈徒言哉江湖之水至岳陽而安流停蓄廣衍動靜交養括蒼馮道士居之三十年安且樂矣北逰京師縱耳目之廣益舒其和平夫山極於燕水極於洞庭求其怪險不可得將安於自然道入于自然則刻形毁志竊據詭幻者吾不知其説也今歸主其徒與之㳺者各為歌詩四明袁桷叙書張侍郎孫祖傳存靖齋銘後夀張先生精忠讜論為一代師表其居家御飭子弟遺言懿範故家往往猶能傳誦稱道聞其曾孫脩謹自振能世其家一日示以深寧先生所作存靖齋銘凜焉大訓巍然于頽波横流之域紬繹㫖意㴱有感焉者也靖念曾大父樞宻越公淳熈癸卯與文靖公同薦于鄉至嘉定間同在館閣今百三十有八年兩家子弟罔敢曠墜而桷承教於深寧先生者彌厚敢益以自勵亦以勉夫張君焉辛亥嵗後學袁桷書書鄭魯公全拙齋銘後粤昔先正忠獻韓公詩書五世其父康州牧工於詞章尹河南富鄭公誌其事渡江南來忠獻張公忠肅虞公尚論其世皆著書立言有以自見至于二公發揚光顯百餘年間懦夫庸子猶能仰止自厲審其先徳源委端有來也太師魯國鄭公劬躬敏行是生忠定丞相為穆陵舊學其四世孫奕夫示公所為全拙齋銘紬繹莊生之用大不㡬於贅矣念昔先曽大父越公嘉定丁丑編次集英進士是嵗丞相實奉廷對紹定辛卯復同在宥府桷以先世餘緒獲壻門下風塵荐更甬東世槐不可復覩深以為拙㡬辱而巧鄰薄與其薄也寧辱桷不佞猶願於魯公取法焉敢以自勵亦以勉夫鄭氏諸孫深味之書鄭魯公嘗充達菴記後占夢之書具于藝文自漢而下其學己不可究雖間有占驗往往鄰於附㑹聞忠定公以魯公所夢遍閲釋道諸書迄莫能解今雖廣為箋釋使能言于未遇之前誠果竒矣忠定布衣時嘗夢有告公者他日公官位當止尚書後除禮部辭不拜由内相入政府身後卒贈尚書令此夢之符有不待辨而明者因以舊聞併補于家乘書髙宻鄭節婦傳後舊令義士節婦焯然表著者得入國史實縁周召二南正始之道此殆其遺意也世祖皇帝天兵下山東膺東諸侯之任者維髙宻鄭公聞昔時諸老言僭亂以後削荒易頑納諸軌範繄鄭公是倚褒嘉之典書于太史澤遺子孫振家聲以趾媺者纓緌相接内教嚴整薰然正直流于士女終始貞潔桷待罪史館異日得秉筆書鄭公家世遺事附録節婦于後亦足以光盛世文明熈洽之偉焉得而遜諸跋瑱山經徳堂記後象山先生作晦菴先生晚嵗每言陸文安公之門人多得踐履是葢深憂其徒之學鄰於上達後百餘年黨同惡異空言相髙其弊有甚於昔今觀瑱山呉氏編次師友淵源罔有缺軼是又其門人之諸孫也勉之哉晦菴之言是誠有驗矣延祐改元陳郡袁桷書呉饒公制書跋史遷序道家以清凈為至言作封禪書唯紀祠祝符應㫖哉言乎能知史遷之㣲斯近之矣皇朝累聖繼體守文基祚鞏隆維臣全節職掌𤣥學敷澤道徳夸誕肸蠁之説悉所不取祈天永命與易範相表裏至大三年褒嘉典刑遂特貽其祖父哀榮備美聞者歆企粤昔開元有臣法善前席之對皆理道要術追顯先代而史官紀載弗克偉著論者惜之恭讀贊書景命於爍移孝為忠全節之志罔敢自替太史氏誠宜泚筆以登信史使知皇元崇尚實邁往古來者得以有考云延祐改元史臣桷謹記跋象山先生經徳堂記後朱文公荅項平甫書云子思以來教人之法惟以尊徳性道問學兩事為用力之要子靜所説専是尊徳性事而某平日所論問學上多所以為彼學者多持守可觀而看義理不細某自覺於為已為人多不得力今當反身用力去短集長庶㡬不墮一邉今觀文安公所作經徳堂記瑱山呉伯厚乃其門人諸孫持守之學有舊謹録文公語于前俾愧夫世之貴耳賤目者願勉之哉書南劔謝君程文後李漢定昌黎文獨序其古賦而明水賦不得入今世定為外集者葢趙氏本也唐宋以詞賦取士其所為文率不傳後至王安石改經義獨張庭堅陳古正義闡儒先之㣲㫖故東菜吕氏取而第之往嵗聞閩中諸先賢如莆陽二劉正字三山二林公皆别為程文傳于其家而鄭屯田鍔通五經資其説以取進士皆私相秘藏非其門人傳授不可復得屯田嘗講授四明樓宣獻沈端慮皆諸弟子于時談經之士専守師説非若後時鑿新逞竒以取有司之悦而昔時為有司者又皆温良敦厚以成國家之盛今世之所傳者斷自乾道淳熈之際彬彬然猶可考也延平謝君用和示其先人所為詩論反其程文文獻之徴將於是有取噫宋世帖經墨義之制雖見於史莫得詳自吕申公試卷之編行而其法具在謝君之意余深知之史氏之為宋史者尚宜有取焉史官袁桷書書順堂記後抑嘗觀易而知乾坤之用焉坤固順也而承天者逆也乾坤定而人行乎其中仰觀乎天七政繫焉猶不得與天同則人之所以法坤者猶法天也事坐於有為貧富夀夭遵其自然庸詎知吾之謂逆者非順也耶故動心忍性者逆之用存心養性者順之體也尚書元公以順之道由逆相須蜀郡虞博士取坤順以為徳余謂李君能盡天道斯能盡人事之理矣書廬陵蕭煥有救荒䇿後救荒莫弊於鬻度牒宋世大儒猶不免遵而行之民益墮而食益衆矣鬻爵之令盛於秦漢然不使之治民猶有成周遺意降于後王令下而中變習為固常望望然以去於是禁抑興而敲扑繁矣廬陵蕭煥有來京師簡靜自修心鄙諸人咄嗟取大官閉門無競一日上書御史府陳救荒三䇿三策行而祿弗及噫今世上書率資以為仕進然卒未嘗有見用者甚者圗絶域覈税畝以自便朝廷清明卒報罷而猶未悔視煥有三䇿寧不有愧然天下之弊在於斟酌損益救荒有書而先賢素講猶有缺然年至而學益加煥有之進殆未已也延祐丙辰八月旦日史官袁桷書書余國輔詩後余嘗以為聲詩述作之盛四方語諺若不相似考其音節則未有不同焉者何也詩盛於周稍變於建安黄初下於唐其聲猶同也豫章黄太史出感比物聨事之冗於是謂聲由心生因聲以求㡬逐於外清濁髙下語必先之於聲何病焉法立則弊生驟相模倣豪宕怪竒而詩益浸滛矣臨川王文公語規於唐其自髙者始宗師之拘焉若不能以廣較而論之其病亦相似也余君國輔生臨川守宗㑹源其所為詩質者合自然華者存至理雍容悼歎知時之不遇猶先王國風之意也小弁之怨為親親黍離之憫為宗周酌古之詩詳之矣秉彞好徳詩之道也在昔先正以是言之矣桷從子瑛曩嘗獲師國輔仰其髙風敢申以言之書程君貞詩後風雅異義今言詩者一之然則曷為風黄初建安得之雅之體漢樂府諸詩近之蕭統之集雅未之見也詩近於風情性之自然齊梁而降風其熄矣繇宋以來有三變焉梅歐以紆徐寫其材髙者凌山嶽幽者穿巖竇而其反覆蹈厲有不能己於言者風之變盡矣黄陳取其竒以為言言過於竒竒有所不通焉蘇公以其詞超於情答然以為正頽然以為近後之言詩者爭慕之音與政通因之以復古則必於盛明平治之時唐之元和宋之慶厯斯近矣感昔時流離兵塵之衝言不能以宣其愁而責之以合乎古亦難矣夫詩之言風悲憤怨刺之所由始去古未逺則其道猶在越千百年日趨於近是不知國風之作出於不得已之言也程君貞其為詩淡而和簡而正不激以為髙舂容怡愉將以鳴太平之盛其不遇之意發乎心而未始以為怨也雅也者朝廷宗廟之所宜用儀文日興絃歌金石迭奏合響非程君其誰宜也願勉乎哉書杜東洲詩集後蘇文忠自渡嶺海以後詩律大變葢其精神氣槩逢海若而不慴噴薄變化迎受之而莫辭昔之善賦詠者必窮涉歴之逺至於空巖隠士其所諷擬不過空林古澗語近意短又安能足以廣耳目之竒冩胷臆之偉哉杜君臣傑乘漕艎遵神山閲海市觀光於上京食氷囓雪足跡之所歴不盡不止壯矣哉故其所為詩視其篇題誠足以奪山林之固陋至於鍛鍊之工搜抉之巧發於心聲自然合笙鏞之間歌錯錦綺之竒文夫豈率意而為之者信以知逺逰之有益於斯文也余五度居庸留京師㡬二紀閲舊藁無一竒語始從君挂席南斗則殆將有進矣因書以歸清容居士叙清容居士集卷四十八
