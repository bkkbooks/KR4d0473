seq: 11
front:
  text: 石精神聳煮茗跑泉齒頰香愧我嵗窮驚浪走愛君年盛鄙清狂古松流水平生願後㑹蒲團共燭光
  hash: sha256:c6919b60aa815e36b8a3047a0e00dc7f697a869f635390c12e775e30e12c3cc8
body:
  text: 冀寧徐母表閭月落孤幃霜滿墀篝燈深䕶褓中兒肯為别鵠相思操得見慈烏返哺詞槐栁拂雲森宅里芝蘭擁砌映門楣髙堂飣坐雙眸炯時說初年涕浹頥清容居士集卷十欽定四庫全書清容居士集卷十一元袁桷撰律詩七言過揚州憶昔六首令威化鶴千年返列子御風旬日遊已信銷沉同此意莫將寂歴起清愁江流今古空陳迹山色有無知幾秋赫赫當年成底事斜陽明滅隠滄洲漢東之國古隨州一老昂蔵死即休黒髮虎頭真骨相青春麈尾鬭風流人言謝傅為朝鎮誰信鍾儀作楚囚浩蕩乾坤納今古好將汗簡寫千秋空遺蒸壤白如銀不見當年指畫因髙視漢庭無出右清談洛學竟成真極知羽扇為癡具更恨烏衣是偶人六合車書端有意百年荆棘巳生春蕭蕭凍雨濕旌旄猶著殷紅舊戰袍金盌昔聞歸馬埒牙牌誰肯信龍韜樓頭換箭鼓聲急堂上傳盃歌韻髙到底姦雄有真態木綿菴畔鬼車號連檣米艦接江湄鞭撻東南力已疲虚籍漸成藩鎮侈辟書時被廟堂移清風號野黄蘆浄亂雨傳更畫角悲從此甲兵端不用書生有味老清時四城賦擬張衡麗十鑑書同賈誼哀公有四城賦江東十鑒腹裏春秋納雲夢案頭今古起風雷青衫不受折腰辱舊尉慈溪為郡守厲文翁劾去白眼豈知徒步回乙亥間道歸里舟泊城南更回首寒風吹淚下天台此詩屬胡懷寧三省觀物黄河不信從天下濟水那知有伏流自古乾坤合神化空將簡牘費㝠摉張華博物身終死鄒衍談天舌竟休我亦從今銷綺語春風碧眼玩沙鷗客中端午簡善之海城紅憶石榴新海子空看芍藥春節物佀憐游宦客風埃終媿醒吟人已無蒲酒澆清恨那用蘭湯浣素塵健羡南方鄧供奉團欒圍坐笑歌頻再次韻尚憶山城節序新榴花疑是十分春田園處處祠蠶祖浙間以端午祠蠶定絲價門户家家插艾人可怪詩書成白眼却從車馬識紅塵思家那佀攜家樂尊酒招邀莫厭頻次韻酬王參議槐隂散髪亭亭午花影持盃拍拍春佳節擬酬懷古意清風不礙笑雲人光隂滿眼消黄妳世事忘言煮緑塵相望江湖知已久相親杖屨莫嫌頻玊堂合歡花初開鄭潜昭率同院賦詩次韻一樹髙花冠玉堂知時舒卷欲雲翔馬嘶不動游纓聳雉尾初開翠扇張舊渴未須餐玉屑嘉名端合紀青裳雲牕霧冷文書静留取餘清散逺香崔豹古今注青裳一名合歡今但名合歡而青裳之名不著笑壓春菲緑滿堂翩翩清暑獨髙翔錦雞朝日輕霞吐彩鳳舒雲宻翠張中散舍傍銷緑綺婕妤扇底泣黄裳芭蕉可是無情思一展隨風不解香風流一老笑烘堂解佩看花欲共翔夜露未晞歸翼歛朝陽初旭怒髯張霧牕不用青綾被天闕誰縫緑縹裳朱槿黄葵效開歛争妍那得有清香次韻鄭應奉苦雨漏天有術那能補息壤無功不願豐漠漠雲隂來委羽昏昏水氣接垂虹吳門水菑尤甚車塵已逐油泥黒龍火渾疑野燒紅萬里乗除同此意相看咄咄且書空觀閑閑齋紅梅次蘇公姿字韻四首莫恨飛瓊花信遲相看氷雪已芳時蘂珠霞補春風面蕚緑雲開旭日姿骨相未須嫌火色精神真欲傲氷肌何人瀟洒紅綾裏巧暈輕煤畫折枝臘底飛霙瑞已遲天將絳雪報清時施朱可是良工手補衮端歸大雅姿溜溜温泉傳賜浴斑斑辱井愧淪肌閉門已覺寒如許迴首江南竹外枝雲閤香温睡覺遲不堪殘角曉鐘時玊妃瓊屑難為從青女鉛華敢弄姿可怪鮫綃能幻色誰將猩血解填肌團團佀就迴文錦薄暮凝愁上翠枝筆底氷清落句遲花神已報艷陽時疎明不作顛狂夢嫵媚猶存諫諍姿酒力衝寒端著臉枕痕破曉欲侵肌道人不愛人間色乞取初開第一枝夀善之二月栁青春滿枝十分蕉葉不須辭黒頭政謝赤松子碧眼故憐黄口兒玊井蟾蜍吞暗浪錦袍蛺蝶舞游絲雲牕松暝文書静蚤晚行修野外儀次韻仲章遊長春積翠中天下土昏坡陁深處轉金門松間不遇採芝客雲裏空憐打麥村華表鶴歸城已換滄洲人去栁空存髙堂靈骨疑金鏁應許重游得細論八極端能合寸眸丹梯危盡覺身浮手持玉笛誰為贈背負青天我獨游山影西來疑駐馬浮雲南去佀輕鷗人間底用重回首極樂無愁果有愁次韻仲章舟中思南湖緑隂凝處彩毫揮忽憶春殘理棹歸約略晚花圍錦幄招邀稚筍試斑衣長年客影如雲度五月湖光佀雪飛從此清林供笑傲莫看迴雁損天機再次韻到手清觴不用揮滿川帆影逐風歸花前自憶堂前竹道上重看身上衣虚牝鳴秋通澗急伏雌驚曉隔林飛還家絶勝從遊樂只恐雲牕趣㫁機倦客慵將麈尾揮倚篷日日聴催歸澄波自映烏紗帽小雨深憐白紵衣花徑春殘人獨立松林雲冷鶴孤飛相思此地今如許萬里重迴且息機次韻仲章過彭城山影涵青簇簇來周遭城角漸低佪梁分曲直雙龍下水合縱横萬馬回鑄冶已銷游子鋏登樓誰負謫仙才凄凉正字寒如許萬疊蒼雲鎖翠苔仲章詩律大進數日道中論詩亦頗相合復次前韻以勉之氣摩屈賈欲平揮格律論詩要有歸石髓定成千嵗乳藕絲空綴五銖衣寒原草盡蒼鷹攫凉月松隂白鶴飛從此天河窮已近還家何用詫支機仲章詩律已入唐人風調而下語猶未馴妥殆類禪人過橋斷橋之意近世學者類有此失仲章徳業逺大當不若是此殆其弄翰也次韻落落懸河巧發揮盤渦洄洑竟東歸苦心欲寄千年澗妙語誰傳半夜衣野馬功名甘却走雕蟲翰墨愧横飛多言要是平生累瞪目相忘杜徳機玉色横陳羽扇揮江湖邂逅佀忘歸終憐古調難為瑟誰信天香不染衣汀草弄妍成背怨山雞照影惜分飛鮫人雨夜珠成滴清曉知裁第幾機平生俗客手中揮愛子清新欲倦歸北闕正鳴蒼玉佩南湖空製芰荷衣麒麟瑞世非闗走雕鶚呈空不為飛薄宦政須成吏隠莫將奔逐墮危機舟中將次淮南行復叙别而仲章歸程可還家作端午次韻述情曽憶登舟送客揮艱難何事獨南歸楚鄉水暖沈菰黍江國雲深潤葛衣坡筍緑迎馴鹿過海榴紅駐小鶯飛笑言已極誰為語絶倒無顔佀陸機中秋次韻貴白桂子香飄露濕巾廣寒疑使月為賔流螢不受十分采過雁真成一㸃塵吹徹梅花天外使飲殘竹葉夢中身靈河自有乗槎便擬轉神山閲爛銀寄王參議輞川新樹緑勻勻睡起慵軒岸葛巾穿石養魚迴小隠盈缸釀秫補長春胷蔵醫國三年艾天與傳家一角麟蒼狗白雲今已定不應談笑卷經綸玊堂文杏合歡枝共説仙翁賦有詩日暮團團空翡翠雨寒㸃㸃自燕脂塗鴉舊詔追遺事揮麈清談補雅詞千古襟期誰與共相親那得勝相思泊支家口望瓠山僅一舍復寄天平水濶雁參差下有髙人坐不移懸榻應知延孺子汎舟無奈佀徽之晴雲滿塢開新畫落月穿梁想令姿眼底憐才誰復近裹糧端擬話心期次韻應徳茂寒食見懷寒食光隂君莫游亂花羞别古枝頭山家蠶浴雨穿屋海步魚腥浪蹴舟楊栁飛時疑是老杜鵑啼處不縁愁詩來未盡相思意刁斗寒清月過樓次韻史猷父春游夜歸留取餘春伴白頭落花如雪翠如流提壺不用頻沽酒垂栁偏能獨繫舟過兩月開雲母障隔湖燈映水晶毬還家已覺衣裳冷遥聴鐘聲是竹洲戯贈黄仲正好花不受丹青鑄碧眼難將白黒分萬里宛駒出龍種十年野鶴異雞羣知卿未盡才難數酌我無多酒易醺午夜池塘有新夢好將色筆寫春雲再用韻荅仲正愛子十年燈火勤相看不惜錦機分飛花映水空憐色去雁出雲終念羣一寸春暉生逺思五更清夢了殘醺詩來􅈝覺秋濤衮海嶼青飛片片雲泊彭城復懷黄樓黄樓髙下復誰識白塔短長應得知萬里風煙歸傑作百年雨露起深思文章自昔為時忌翰墨于今作世師從此江湖掩篷去碧雲斜日數游絲泗水泗水青於古蔚藍因依碧藻浄相涵游魚細數心空羨活火新烹舌自甘可怪然犀望牛渚底煩斬虎觸蛟潭清湍混混歸滄海不惜臨流涴舊衫歌風臺長安葅醢恣猖狂頭白翻思守四方不悟宫中由吕氏却憂身後有吳王老翁後嗣真癡弱遊子故鄉空慨慷千古英雄多此意荒臺清淺水微茫清明水落渾黄風晦㝠不知節物是清明道旁新塜悲歡盡栁下長亭聚散輕門静鞦韆歸燕逐沙寒笭箵過魚驚河南禁酒河陽飲醉醒相看總有情宜逺樓紫翠光中擁翠鬟分明倒影落西山遊塵自逐鐘聲去過雨能將月色還萬里闗河新勝槩一天星斗舊躋攀絶憐想像空題詠後㑹應須共倚闌李學士畫壁初成席上分韻得毫字春樹纎穠隠碧桃秋山磊落湧銀濤天邉雨露歸青障物外煙霞入素毫有客支笻臨水徑何人解珮憶蘭臯滄洲景物供題詠准擬淋漓奪錦袍次韻危公逺道士驪塘族孫與予為年家筆勢翩翩千丈坡一天清逺佩飛霞金莖欲採珠宫露鐵箭能敲玊壁砂人物滄洲憐我輩氷霜喬木擅君家百年此意知誰㑹相視無言眼倍花閉門積雪擁平坡誰把餘醺散綺霞掛瀑觧裁天外練熬波竟化海中砂機心著物那成語句眼論詩合到家從此相親更相望不妨渇墨醉成花再次韻家世清聲起諫坡江湖邂逅忽披霞新姿正佀三眠栁妙語能為九轉砂杯寫黄封來禁道牕留白醉近仙家慇懃懸榻何時下準擬寒空詠雪花朱顔氷雪暎瑶坡清曉朝陽潄碧霞神目豈堪容玉屑聖胎端可化金砂碧桃有實誰為種𤣥鶴無心莫問家可怪春風滿詞筆硯池頻與滌氷花游城南次韻陳玉峯市橋水㫁緑交加簇騎隃尋處士家坐聴蟲聲行木葉卧看雲影落簷花清晨采露筠籠重薄暮沽春烏帽斜一徑寒英端手種好烹晴緑代煎茶送真定任生束髮從戎天外萍還家何事説飄零花前秉燭頭疑黒馬上看書眼倍青倚劒獨憐今古月吹笳時憶短長亭故人烏府頻相問一笑惟尋雙玉瓶次韻史允叟殘菊白雁西風幾夕陽故園牢落是他鄉獨憐夀客三秋晚不受𤣥神一夜霜曉沐緩垂雙玊珮晚粧愁帶紫羅囊凝香深院誰消得時許飛瓊㸃額黄次韻元復初簡危公逺客舍光隂幾驛亭天邉白日轉重溟擬將竹葉留春住共慰杏花隨雨零鶯入上林貪翠蕚鶴旋華頂傲青㝠十年道舊元文學為笑無心佀水萍蔡逢原編修婦翁夀八十堂堂經學古儒風三世相傳八十翁靈夀杖扶雲兩屐延年水飲月雙瞳閒逢好客猶花下倦憶前朝佀夢中閭社從今誇盛集重行彩袖舞杯空次韻陳無我題石窗故居煙雨歸來别有春支頤曽作笑雲人還家未信三千里拂石今看第幾塵往事黄梁方就枕多情白髮竟沾巾故園未覺秋容淡留取孤香次第新夜别俞生半秋歸夢常繚繞三十六雷煙樹重所居山名台人謂山髙處為雷欲别秖看今夜月無眠更聴五更鐘青帘出市橋邉路白雁連天海上峰聞道還家有新樂不妨雲榻臥髙舂次韻正旦㑹朝閶闔春迴旭日鮮花光摇曳珮僊僊金蓮漏下催初刻玊筍班齊祝萬年香擁衮龍開黼座風迴笙鶴舞鈞天朝元法曲誰傳得歸醉蓬萊話日邉送山人還江南白雁南來愛朔風掉頭我亦一枝笻澄江去浪疑奔馬古澗歸雲佀伏龍釣石水移黄葉滿丹爐煙冷碧苔封從今不説人間事更上岧嶤第幾重次韻田師孟詠牡丹積翠瑶京玊作層笑餐承露議誰勝腰寛佀稱黄金重心巧終憐刻楮能蜀客錦機流水浣茅僊丹鼎彩雲騰道人香色都忘却月落空闌始一凭交枝風動碧層層揮手芳塵謝不勝解帶暮雲真韻勝歛襟午日是驕能取青嫓白憐雕鏤抱紫迴黄合變騰宫錦競傳新拾得沉香停檻喚誰凭紫府淵淵十二層濃春如酒力初勝苦心佀怨鮫綃薄敏手難誇羯鼓能雨立無言慙委靡地行何術可超騰雲窗烏几誰消得時許飛瓊月下凭次韻師孟西曹即事兼簡子貞儀曹二首時議定律令盛世昭明復古初掃除弊事獨温舒牛毛置令心徒褊鳥跡遺文體本疎齊相避堂憐獄市鄭人鑄鼎泣刑書晝簾一度薰風曲欲寫琴心愧不如蕭疎門巷落花初楊栁隂中指望舒辨拙莫窮三耳妄塵深坐見二毛疎覆蕉得鹿非真夢㸃筆成蠅豈誤書慷慨聴君人物論雕蟲我亦陋相如次韻贈峩眉侯道士築宫江陵白苧藤冠自在身獨看潭影認清真還丹已化千年雪玩易重尋太古春楚觀江流通白帝蜀山雲氣接青神㝠鴻南北疑無跡萬里乗風問世人次韻陳貴白中秋見懷玊人海上振衣來一曲清商鐵笛裁碎露晶熒疑水立横雲缺落佀山頽夘君端有鎔銀術西帝慚無斫桂才往嵗相思江北路夜闌曽上望鄉臺次韻鄭景尹詠梅十首笑壓羣芳雪霽吟㸃粧詞筆補春林衝風曳白疑含笑暎日抽黄轉苦心鐵石横陳羣羽避氷霜獨立二毛深阿戎故是調羮種可為閒情淚滿襟醉倚孤根散髮吟他年鼎鼐出園林黄鬚雅相非凡種白面清談豈素心湖月歌殘銀燭冷湘雲弄罷玊龍深疎明可是無春思角曉霜清整翠襟幽人為愛水邉吟雪滿疎籬月滿林魂冷不知莊叟化神清難撓楚王心寒蜂戀蜜須猶綴霜蠣含漿色轉深千古湘纍詎無意廣騷從此酹靈襟手提色筆朗飛吟雲佩衝寒入寶林雅操獨髙淹海角微陽初動識天心鏤氷嘗巧機猶淺切玊疑神用始深回首羣芳半麤俗倚風三嗅為開襟回首白頭悲故吟清愁萬疊起雲林東君宻注非無意北客相逢訝有心絳闕雲低珠蘂迸碧潭風定玊徽深色香要是人間世更上凌虚始散襟萬里相逢得放吟醉揩雙目傲瓊林龍沙慘澹明妃怨漁笛凄清處士心餐玊佀嫌𤣥圃冷笑雲應喜翠微深何人更作江南句翻使兒曹競挽襟欲看南雪倚簷吟㸃檢春風第一林天與陽和誰借力晚持精白轉虚心氷蠶半蜕眉猶濕凍蠟初銷淚漸深夜半花神應有語覆觴從此斷袢襟梳風帶雨為渠吟揮手唐昌陋鶴林壯髮初生齊暎額童顔已就静齋心野蠶成繭輪囷富玊兔抽毫刻畫深莫遣風姨强攘袂故教月姊與聨襟十分深酌十分吟烏帽支笻故繞林月下無言疑背面水邉獨立佀傷心珠成蠟鳳王郎巧笙徹青鸞帝子深嵗晚自知誰與伴風篁摇影互交襟參殘霜急尚孤吟恍恍神游古蹛林四皓局殘惟一色三郎鼓罷了無心珠游鐵網青琅潤苔補虬枝壞衲深擬把鸞膠固青蔕未須殘雪墮衣襟贈潘山人夢中得前二句因續之布韈青鞋今已矣看山舊眼碧深深空憐石馬駐荒塜不見金魚飛翠岑地鏡有書穿石乳土圭何術候天心行年七十足稱老牛臥前坡為指尋次韻景尹酴醿二首光隂風雨短長亭花到春餘倍有情翠蔓倚松超直幹錦江縁酒錫嘉名蛻蛟纒影青雲聳么鳳啼芳新雨輕白面郎君休翦綵好將椽筆賦西京不將名字博西凉留取餘春在一觴當扆珠衣迎面立曲房寶靨捧心裝碧雲一色行明月翠幄千層護夕陽揮手朱殷空爛熳敢將清思寄幽凰可久齋二首虚室心源百尺澄深深龜息養空清一川鷗鷺古儀表四海弟兄真性情璧玉誰人傳至樸鏞鐘何處問希聲芒鞋直訪苕溪上雪透梅枝鬭月明三十六宫春不老何人月窟重推陳亭亭倚盖浮空碧匝匝空輪颺素塵郢客詞工端自苦海翁機息可相親支頤擬問庖犧易笑指靈蓍佀有神送長洲江都史官曹無事日提壺一榻深明晝倚梧稻蠏水低歌拍拍蓴鱸秋冷夢蘧蘧長年簿領慚錐子晚嵗生涯羨木奴千里布帆歸思好雁聲伊軋起菰蒲昌上人游京師欲言禪林弊事甫入國門若使之去者昌余里人幼嵗留吳東郡遺老及潁秀自異者多處其地以余所識聞若承天了天平恩穹隆林開元茂皆可依止遂各一詩以問訊虎丘永從游尤久聞其謝世末為一章以悼人說江湖少舊僧懸崖深掛一枝藤採苓欲取千年魄擊石曽烹六月氷天上星辰端歴歴胷中樓閣自層層相逢只説前朝事知是松源第四燈青鞋髙掛天平壁指㸃雲門三兩峰禪榻已容黄葉覆詩瓢從把碧苔封曉風殘月千村櫓細雨疎煙隔水舂我向京塵疑老盡吳山清淺越山濃獨木山寮不出門一瓶一鉢送朝昏巖迷鳥跡千崖泣松吼龍吟萬壑奔掩息端如雞抱子愛閒屢見竹生孫海門月落寒潮急凖擬乗槎與共論玊几峰頭第一枝老禪吃吃我深知曽將鐵杵敲氷骨佀怪鉛刀割宻脾法外無心猶涉解句中有眼即成疑袈裟不展蒲團穏此是開元妙總持我識虎丘三十年精神霄漢鶻張拳機當危處即燒印語到盡時難續絃路涉兩岐空有泣溪流一滴竟無傳雙峰古樹蒼藤􅇢時有子規啼徹天手調千嵗廣寒藥擬補月輪蟾已飛眼見昔人歸逝水心憐志士惜殘暉孤花苦别生香樹急雪深憐壞色衣為愛同鄉復同客絶慙同調不同歸山人歸去意何如八尺方牀自卷舒側岸採茶敲石火隔峰翦竹溜清渠碧潭印月菱花鏡白雁横空貝葉書後日相尋定何處不於吳下即康廬次韻王繼學蕭蕭寒雀下庭除一榻蘧蒢是我居雪後看山雙眼浄風前攬鏡二毛疎退之掌制慙存藁退之四十八嵗知制誥一年僅存崔羣户部一制余年相同亦草一制伯玉知非定止車深愧年華増老大還家早注故山書除夜雪黄雲黯淡夜如何晚勢參差更馺娑著地不隨人跡亂舞空偏入麥苗多鴉驚列炬穿珠樹馬趁初朝映玉珂嵗律詎隨人事改故將嚴冷轉陽和元日朝廻積素稜層厚載坤天雞三唱日初暾千官山立歸文石六衛嵩呼徹禁門花帽舞風喧法曲椒觴承露湛皇恩新年欲奉瑶池對願借扶摇與化鯤萬國梯航滿禁衢卉裳象譯語音殊鳳簫聲送纎腰舞雉扇行分兩翼趨花氣欲浮金鑿落雲光疑下錦流蘇詞臣不識金泥秘指㸃薇垣頌六符偶術末章荅繼學承明三入並時流俯仰深慙此地游誰謂東南無美箭極知西北有髙樓韋編舊學隂陽秘汗簡功深嵗月修三史如山詩思少那能走馬過長楸金鑾深處是家氊玊雪青春不負賢㑹見鳯毛能掌制定知麟角可膠絃浮榮芻狗寧居後曲學雕蟲敢避先慙愧南州徐孺子毎看塵榻屢澘然雪後畫角初消已弄晴曉看突兀眼偏明寒牕駐景成虚白凍樹裁春㸃素瓊北户埋藏疑有跡南枝摇曳若為情憑君欲問飛霙巧水自白雲山自横送李署丞歸許下春風得意故還鄉月白霜清傍曉裝燕頷定承新鳯詔馬蹄猶戀舊鵷行溪邉父老欣相過燈下兒童訝已長我亦辭家今一載青天歸雁攬離腸清容居士集卷十一
