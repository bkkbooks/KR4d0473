body:
  text: 清容居士集卷十四元袁桷撰絶句五言附六言雜詩輓詩雙雁圖秋風限南北何事往來頻並宿寒蕪際應憐自在身六月二十四日夜夢剡源師同遊山寺主僧延入丈室出梅花畫巻賦詩旁有胡用章先生坐主僧下時剡源對席僕居其次案上緑竹一枝青翠可愛剡源賦詩桷即援筆一白不受采重𤣥今罷論忩前有緑竹密雪打黄昏漁樵問答圖翠嶺邀黄鳥蒼波玩白鷗偶因平地坐始識世間愁新安郡嶺南十詠清江釣月神魚竊金液為龍復為光平波無纎雲有餌不肯嘗空谷耕雲斜側龜背戲髙下魚麗圖阿童踵其後黄犢為前驅蒼峯卓筆仰手判虚白昭囘爛星斗遂令山下泉復作之𤣥走碧巘舒屏古藤青步障曲曲靜相宜春晚巖花發生絹印折枝楓林巢鶴絶頂秋聲急盤旋作我家不須金掌露且服赤城霞雪澗浮龜飛湍齧雪根千載見五色中有九九文舉世人不識峻嶺扶車前行已可戒後行復何如懐哉王陽生靜言表其閭圓岡掲斗晞髪步上帝空巖泣山妖厯厯化為石喬松導前杓古寺垂虹飛虹飲長澗垂首不能收僧從背上行水流橋不流雙溪合璧鳴玉抱山根上有金蟾翁指揮鐡如意化為雙白龍子昂蘭竹墨戲𤣥霜落銀繭飄飄湘江佩服媚疑䙝之碧忩靜相對二迸地麟角精摩空鳳毛聳寒泓散晴煤桃李争色動題龍虎圖玉淵發靈籟摩盪超九天調鉛靜召之帖首在我前二寒松翳幽篁得意當路隅急以真一水坐令侍瓊琚墨竹四絶謇謇凌雲志霜餘節更存春風宜管領生意屬兒孫右老奮雷初出地承露已凌烟願從朝元駕為旄拂九天右嫩直道犯無隱虚心明且清側身思逺舉巖壑養深情右風曉沐換新緑萬采成空塵守黒心不緇同𤣥道彌真右雨墨蘭蕙四絶金明秋林清月白楚天碧美人眇愁予服媚永今夕二采芝不成仙食薇難療飢結兹以為佩臨風酹湘纍三天香落銀楮秋聲入𤣥筆何如湘夫人促軫鼓靈瑟四組綬何承承琲珠復纍纍相視不以色紛披映簾帷題悟律師語詩卷萬樹叢雲裏千巖急雪時世塵俱不到端坐誦君詩二壊衲翻經帙匡牀㸃律科看山無限思一一付吟哦子昂枯木竹石圖亭亭木上坐楚楚湘夫人因依太古石融液無邊春六言厚齋先生以詩借玩辭次韻項子沈㝠學古芸芸萬變觀爻閉閤清香宴坐斯人端可神交二已悟長年坎離更窮逆數先知補亡已滿三篋問事誰携一瓻題湖曲小景穆陵御題詩句流水無言寂寂落花有意􅆴􅆴往事空餘華屋倚闌愁絶江南送鄧師禹歸龍虎山小帽飛花一寸輕舟流水三分落日獨歸洞口隔溪短笛猶聞獐猿圖細草豐茸古洞斜柯厯落寒雲信道乾坤消息端須類聚同羣孤雲在水同源一色出山萬緒千條欲趁驂鸞整整更同笙鶴飄飄二規矩方圓在手輕清重濁隨形宋子不須苦賦屈生為我揚靈三白雁似憐片影碧潭深映無心獨上紫霄峯半參差吹徹飛吟題陳文翁畫扇淡淡孤花欲笑娟娟雙蝶疑愁無奈寒螀得意竟專落日啼秋題美人圖西施辭家已意存越入宫誰解圖吳故苑秋風麋鹿扁舟夜月江湖昭君鬢影愁添塞雪花枝羞殺宫春誰道佳人傾國解從絶域和親馮妃目送亭亭秋水腰迴欵欵春風為問下車搏虎何如御坐當熊班姬望幸眸凝秋水倚愁眉簇春山已悟篋中紈扇須看鏡裏朱顔洛妃可怪夢中説夢底須愁裏添愁落日春風王子多情不解綢繆緑珠金谷煙迷清曉玉簫聲恰餘寒可恨花鈿委地當時莫倚危闌夀陽一片花飛宫裏十分春滿眉端底用流酥㸃綴更煩圓玉槎團張麗華結綺塵空樓暗景陽春㫁鐘遲紅葉無言在手同成井上胭脂次韻潛昭焚香意絶豈能生慧心清定解通神一穗黄雲滿几故将綺語撩人二甲煎烟消吐艶鷓斑湯暖凝脂道人機心已盡清坐唯餐兩梨三紙帳温雲如醉綺樓春夢成虚知見何須盡絶詩成要是禪餘四宫様昔傳心字羅紋指甲争工往事桃花流水黄塵蔓草寒風潛昭九日贈龍團次韻月轉舊裁玉胯雲爐温浴銀芽九日殷勤相贈淡羅猶記金花二閲世已成清玩傳觀那識餘甘寳篋政須千襲瓷甌未許同參題伯庸所藏子昂竹石伯夷清宜典禮子路勇成冠軍日落虎驚没羽潭幽龍走凌雲二胸中丘壑玩世眼底煙雲凜秋岸幘欲澆磊磈解衣深聼颼飀墨竹蘆葉不禁秋色柳枝那解春聲醉閲小忩横幅風囘雨轉雲清子昂墨萱扇為湖南楊晉母作墨蜨巧分釵股𤣥蟬髙綴冠梁莫厭南州炎溽為添北户清凉雪谷曉行圖過翼凄凄巖谷曠懐納納乾坤我欲想思命駕入猶髙卧扄門髙彦敬逺山木石圖為紀夢符學士作身比寒厓枯木心似浮雲太虚落日前峯堪隱丹青𣺌渺愁予復成黄髮蒼顔並轡白雲青山比肩誰道風流已矣只今圖畫依然春雲出岫駘蕩巫山態度悠揚洛浦精神春去似歸閨裏月出端疑水濱謝氏梅坡謝家雁行兄弟一枝偏出南州低昂肯受殘雪瀟洒猶堪盛秋劉生還廣信省親就試萬馬隨雲北上孤鴻趁暑南飛欲踏三山海浪願隨寸草春暉頥齋多言不直杯水異味能生五兵何以深深閉息丹臺出日初清禮闈倡酬乙卯次韻禮部李公二首明詔傳巖谷相㩦入帝京心同蛛網織意擬鵠巢營選徳珪璋器掄材杞梓楹龍門能化鯉端不負平生二黼坐思文渙號行鵠袍林立萃天京釣絲已具六鼇手彩筆誰傳五鳯名寳鑑懸空深照影神鋒躍冶莫容情百年禮樂重開運此道何須問兩生次韻監試李仲囦御史四首髙墉䕶脩庭列仗嚴棘闈昭代闡文治多士舒且遲謬言職緘縢晝日深下帷昂昂子大夫咫尺瞻天威願罄悃欵忠少奉白玉墀直言諒無隱寜懼菲與萋二中朝尊夀俊入徴垂安車念彼巖谷生惠然命來趨鵬飛企天池鳳息思髙梧煌煌六籍功不與稊稗俱明皇燭遐邇追琢璠與璵雅詠廣棫樸仁風暢騶虞三髙堂集羣英摇佩蒼玉寒朗鑑明月髙雅量滄海寛上承丹扆心舉逸修廢官繻童入關内芝叟辭商顔陋彼馬上翁慨慷空溺冠四皎皎鵠抱子旅進翔廣廷明時昭曠典如醉眸初醒稽古廼正學敢言但桓榮昌歜詎正味咸池在希聲古云儒匪迂雍容佐文明餘思續皇雅黼黻歌昇平次韻郭巖卿清穆黼坐更化絃儒館集議招列仙玉堂射䇿興羣賢鵠袍賈勇思登先輪囷奏牘誰三千利若武庫森矛鋋巍如繩直清廟堧常山之蛇首尾連胸臆結約言不愆峩峩相國水鏡懸手捧詔墨金花鮮大為梁柱小杙椽令嚴虎士齊烽烟遊絲日靜風翼翾羣曹坐井難觀天大鈞槖籥品物甄代天有命司其權錙銖美醜精評詮方臯相馬遺黄𤣥嫫母敢作千金妍工輸守度成方圓萬目一口非幸然斟酌損益牛無全慶雲五色罘罳邉彤庭珠貫臚聲聨明堂正席開几筵扶杖觀化嗟華顛煌煌龍牓天門前金吾控騎青絲鞭夾道動色爭駢肩詩書往昔成遺捐聲教丕合今無偏瓦金之注同一誕慎勿逞説窮雕鐫皇元文運齊天年秋闈倡和丁巳次韻席士文御史至道白璧重小言浮雲輕詞場次後先理致貴坦明捧心匪正色偏師乃竒兵駢駢白袍子昂首争疾行味道絶嫵媚清心養和平謇諤御史公懼我遭譏評當道謝駑駘朝陽歌鳳鳴次韻士文感興宣尼倦遊躅㝠思立天紀洗心悟盈虚應物合參倚羣雄争霸盟騁意立私史崎嶇東周君削弱絶統體約言正墜典執筆乃託始後王迭雄長正閏亂朱紫説吻江海深短長争四起太羮實鉶鼎𤣥冕表朱裏返真非無人未𣲖失𤣥理金璧騰虚空謂是可不死或言影響功駭愕壓餘子齊居玩芸芸作事首存悔洗心探羲爻變動寔由已神珠守深淵光怪孰可比矯矯林中鶴絜白不受耻紛紛堂下蟻聚羶亦無幾流光企羲娥慎獨守素履之人金石心年運任坎止中年勇聞道晚嵗復未已驅車望前川操轂敢濡軌八月二十有二日范京尹同㑹秋闈天使傳詔命温問試䇿貢士賜以法酒臣桷等望闕再拜以叙飲謄録官翰林應奉臣翼述其歌詩謹用次韻五雲閶閤祥鸞流紫皇御極圖神洲巍煌京師首文化計吏四出巖阿求城南儒宫極蕭爽古木落月凝清秋麻衣東西白鵠峙鳥帽髙下寒鴉稠朱顔廣顙粲胄子佩服觿礪懸吳鈎兵奇欲奪趙氏璧氣盛直卧元龍樓范侯機深妙彈壓鷄翹蚤嵗同宸旒傳宣温訓慎去取瓦釜勿以黄金酬宫壺午傳瑞露重翠質縝栗緘封周微臣望拜感莫語願上史館書徽猷百年墜典起盛世慶雲五色開公侯興文云初道任重滄海浩𣺌難方舟眉山之蘇詎常士過眼獨賞須梅歐夜闌心掉不得語瑟縮凍吻歌丕休次韻王正臣書史試院書事二首貢士搜天巧經營縹𣺌間露蟲吟嘖嘖雨葉戰澘澘董賈傳醇正揚劉陋險艱銓衡同水鏡辱贈不知還二古殿蒼雲裏踈星出樹間案燈光閃閃簷溜滴澘澘便覺登瀛易誰言與選難白頭心更苦滄海探珠還次韻宋質夫應奉秋闈書事二首廣寒清徹桂花黄影落空庭夜露凉七札巧穿誰矢直大鼇連舉我竿長神清難入胥華國賦古須看古戰場一朶紅雲傳堪露夜深齒頰凝天香二草廬星列藉寒莎欲擬隆中事若何倚筆看天塵境絶衮辭翻海怒濤多特衡要使心常赤題牓誰言髮盡皤盛世崇文徧寰宇遺賢寜肯老巖阿次韻席士文御史六首煌煌文運起賔興樸學無知謝未能北斗夜横東壁正露檐危坐獨凌兢二槐木森森雲影開諸生曵履起輕埃明河可是人間物端用乘槎八月來三文鋒鏖戰白差差沉著無聲午漏時掣海碧鯨翻古製翔雲彩鳳吐芳辭四倚筆看天思獨難懸庭秦鏡敢藏奸東方射䇿三千牘始信明時取士寛五多病支離百不堪挑燈眼眩罷清談廣寒果有娑羅樹須踏天梯上蔚藍六烏府先生玉屑清論文冲淡去浮輕要令我輩平如砥不使與言負聖明秋闈倡和丙寅江浙至治三年八月十五日乘驛騎抵榆林于時善之祭酒仲囦學士伯生伯庸二待制同在驛舍傷感増悵今忽同校文于江浙因述舊懐萬馬穿塵入𣺌茫遺臣一日九廻腸碧雲碎碎琉璃影白月離離菡蓞光雁足無書來海島龍髯有恨達衡湘誰知此日同文館把手無辭醉十觴三十年前與倪仲深泛湖作中秋今幸同與校文中庭月色如晝短句叙舊昔年同泛凌風舸白眼論交屈指難楓葉參差山影矗藕花凌亂水聲乾我方烏帽穿黄霧君正羊裘潄碧瀾歸隱始知人世換無端此地更凴闌中秋束周儀之推官伯明都事兄氣與西山爽氣髙酒酣燈冷各稱豪不隨北雪追燕騎徑上南雲踏海鼇桂醑的知侔沆瀣蔗漿端可獻蒲萄衰年投紱慙真隱更為君王選俊髦汪叔濟推官鄭復初判官周本道判官同校文江浙因思歐陽兖公王岐公事政相類不可無一言以成故事短章述懐長冠黒髮雁行齊讜對彤庭陋木鷄直以中聲生玉琯更將五采藉𤣥圭文章贍足期穿札經術精深鄙印泥我輩直須雙目炯肯令餘子誚昏迷次韻假省掾妙筆翻空厯杳茫更馳紫電騁沙場珠璣已綴三千牘斧藻能成十二章易水臺髙招國俊廣寒路近裛天香相君盛徳憐駑劣給燭分茶與激揚再次韻白頭歸隱髪荒荒那識當年古戰場文雉朝陽金吐綬潛虬迸霧火為章才超董賈文如織語壓淵雲墨有香㑹見彤庭冠多士始知我輩陋宣揚輓詩謝尚書學易書臺地資州有李鼎祚讀書臺榭公治易詞林起壮猷家空辭蜀道禄薄度南州曽知封州復為廣東倉曹愛石雲生坐看書月過樓凄凉甬水曲風竹自蕭颼二晚嵗功名異蒲輪禮數温嘉謀傳竹帛肥遯寄丘園散號南儒貴自號為敕賜南儒峩冠北客尊㝠㝠乘鶴去空想典型存史觀文奕世調元貴南東第一家紫綸傳密札緑髪擁髙牙往事霜前木餘齡霧裡花陽明真洞啟跨鶴整飛霞二故國衣冠聚凋零獨此賢勞生樂蟬蜕遺魄寄牛眠丹旐前官貴青箱舊物全哀榮今莫比笳鼓閙晴川李宣慰思衍宏才卓犖聳羣雌悵望心期晚嵗違江海夜長談舌壮闗山春㫁客魂飛枇風給月文空在逐電追雲事竟非神理綿綿那得盡冡頭新栢翠成園二白首功名汗漫休一官鎩翮玩清秋終憐苡薏難消瘴肯用蒲萄强博州萬事浮雲今已定百年公論與誰謀羊生未洒西門泪落日寒江水亂流史猷文少小昂昂意長冠脱綺襦交遊金谷聚談笑玉山扶舊雨三槐宅西風五柳湖空令後生輩彈鋏陋為儒二妙語千年簡英姿百世期忍聞淮水絶不見雍門悲往事雲歸壑空言水覆巵相從今已矣寒泪滴氷澌王尚書秋水雙蓮孕英英吐異分詞章納雲夢禮樂訂河汾丹詔三軍泣清名四海聞西風傾落日乘鶴叩蒼雲二晚嵗艱難意衡門老病身蜀山迷望帝楚澤痛靈均皮弁終辭徴深衣晚任真蓋棺今已定千載有遺民三燕説經生濫齊諧學究輕微言空有意獨拍已無聲墨澤鷄林貴青氊虎觀榮新銘前進士幽抱付誰明四再世登龍舊淵源許管窺西山遺正緒東澗結㝠知腹笥名空在眉梨夀竟違重歌妾薄命寒泪滴塵瓻楊夫人丹桂香殘紫菊蔫轉頭何自失芳年錦裙舊綉空為記玉軫新聲已莫傳散騎文成殘月泪彩箋書罷白雲仙人間總有相思恨不用松風激澗泉潘少白星厯張平子丹砂葛稚川書田終晚嵗酒國送長年世味雲行水心期月印天諸郎聞競爽蒼碣定重鐫史湖州夫人清白吳興守稜稜老吏師風霜塚上木玉雪閫中儀種徳桑千本傳家桂一枝春暉有餘報遺範合蒼碑文集賢家聲垂宇宙更作列仙儒袁粲那無傳嵇康已不孤金鷄官驛暝白鷺古洲蕪不盡修文意端從地下圖其二死者不可作家兒常自嫌奉輿薊門角叱馭越山尖猿落三更泪霜飛六月炎人方愛嵇紹我亦愧陶潛三前朝三百載慷慨盡斯人天地有消息江湖多賤貧許人憐老母叱馭作忠臣邂逅成丘首猿啼似有神黄夫人錦堂鶴髮玉稜層猶是承平舊典刑鸞誥日邉傳御札狨鞍花外候仙軿室如明鏡心如水庭有斑衣案有經回首人間真蜨夢澗松摇佩起泠泠悼章斯逺學道求仙二十年飲氷齧雪竟蒼然錦機㫁幅朝元賜銀燭殘膏醮斗傳役鬼有靈符絶筆爊金無術鼎飛鉛昨宵同我堦前飲今日憐君地下眠二烏府先生聲似鐘希年羆夢喜溶溶擬看廣領傳青簡誰信方瞳學赤松秋月白于銀鑿落夕陽紅似錦芙蓉燕山甬水五千里從此空飛減去蹤悼張道士海上神仙十二鬟思君疑在有無間桃花褪水青春急柳絮團風白日閒芸室燈昏螢閃閃藥壇雨冷竹斑斑他生欲了重𤣥事煩乞神膏駐好顔吳君載金谿人妙年玉雪佩幽蘭麈尾英賢接往還萬里出門車折軸九天無路虎當闗青燈黄卷家仍在古木清溪福竟慳賴有韓公三世舊已將椽筆誌瑶環夏昭文晚嵗心清眼界平看雲没幘養修名徒憐化鶴悲滄海不見迴鸞下玉京觀物無心𤣥草滿愛吟有句墨花輕蒼山日落簫聲急似有仙家白鹿迎熊處士三閭千古恨五柳一生賢石䕶栽花徑泉分種秫田松髙青耿耿竹净緑娟娟欲識凄凉意埋名手自填危功逺道士紅日翳黄埃騎鯨徹九垓詩瓢風厯厯丹鼎雪皚皚紫府調仙掌朱宫育聖胎相期千古意獨立重徘徊劉古昂教授矯矯南鵬翼昂昂野鶴姿剪燈千古事彈鋏半生詩棋罷黄粱熟歌殘玉樹萎溽雲催雨急相送不勝悲成都何徳三處士蒲應奉其弟子也晚居興元江漢清秋老岷峨故國身潛川珠玓瓅韞匱玉孚尹逸興蟬離垢癯容鶴寫神發硎經席正炙轂辯鋒新素業詩千簏幽居黍一囷非辭魯生激自樂管寜淳水近蘋交佩巖低溜墊巾詩清􅆐母泣詞整燕雛親夢往蕉疑鹿書成筆感麟山觀天外象梅閲静中春燐墨魂猶慘槐黄事可詢極知情惘惘徒意走䞭䞭舊里傳遺藁空堂象素真故人調鼎鼐弟子演絲綸靖節名堪重文中躅可循悠然端有意念此竟誰陳吳饒公種徳槐三樹傳清桂一枝晚年香欵欵天爵嵗熈熈大賚開茅社殊恩辨土宜執謙容受谷詠道樂沿沂玉帶朝元服朱顔浴日姿菊泉便上夀橘井養清資引竹藤侵履看花柳拂巵跨鞍人共仰扶杖客争疑霜暖柑分釀年豐黍作糜黄封浮瑞露白醉擁晴曦京國輸甘㫖鄉閭表羽儀齊年堂上扁通徳里間楣可謂疇離祉胡然不憗遺烏傷情有感蟬蜕樂無涯孝養傾千古褒榮盛一時誰成太史傳㑹俟侍臣碑王秋山翩翩玉雪養修名絶頂穿松午日青别墅忽迴迎客犬空林猶隱讀書螢苔荒琹薦春無迹風攪詩瓢樹有靈萬叠蒼雲埋玉去好將銀管寫沉㝠廬陵李主簿青山暗淡畫圖中雁塔塵深進士空可恨餘勛收汗馬極知往事費雕蟲暮年榮辱非吾意此道升沉屬至公松竹蕭蕭自今古清秋裁此託㝠鴻趙令人永陽郡王與䒩女靈漢雲昏彩鳳沉參差聲絶露沾巾髙堂玉樹竟芳殞寳篋金花空素陳鮫室不知珠滴泪仙壇曽見海揚塵百年精爽真㝠㑹一掬清溪是劍津吳夫人上饒徐覺民主簿母玉樹雕殘浩刼還稜稜鶴髮獨清全種桑不作十年計指廩能生萬灶烟白璧養成𤣥圃失華堂歌罷板輿懸坡陂積翠松千本準擬飛雲歸墓田黄如山兵後還家意苦辛白雲落落泪沾巾松花麫麥厨常净貝葉書經筆有神蝸角可憐蠻氏國鵑聲猶記蜀王身白頭編簡成春夢的的餘勛付後人劉伯宣中丞死三十年延祐丁已嵗始得諡忠憲朝中各為挽詩烏臺雲黯栢蕭蕭秋雨聲悲廿四橋置獄可能生長倩入門端不祭臯陶墓前飛鳥傳新象身後騎鯨下大招聖代昭明青史著願將直筆紀奸妖東平段衡率壮嵗投鞭夜度江前茅親授百城降後軍長物惟書篋别墅閒情獨酒缸燕憶香銷塵滿榻鶴驚琴冷月當忩傳家舊有籝金諺手種堦前璧一雙何徳三處士雪色鬚眉兩臉春市中能作笑雲人簪花欲舞鳥啼急放鶴初迴蜨夢真茶灶烟收門掩晝詩瓢風動筆生塵婷婷小女思翁醉欲剪巾紗泪滿唇家賣烏紗染入得宜士夫咸取之播州宣撫楊資徳掌武傳無敵崇儀續上多精思書竹帛英譽蓋山河絶北驚逺海投南鎮太和襲封緺滿篋錫誥錦成窠皎皎明玕樹亭亭碧玉柯之無文緥認宫羽短襦哦魏帝奇何並唐家悦李過幼成端有種帝鍳的無頗玉帳龍韜秘青箱鳳篆摩教民風偃草撫俗水旋渦斥境嚴銅柱征戎指錟戈雅遊春結佩小隊曉鳴珂士飽歌于蒍軍懽釂叵羅追亡窮古澗濟勝極幽蘿寸地歸王化羣蠻守治科細氊侔密纊善馬敵名駝客有依劉憾人傳嗣産歌氣融汶嶺雪量納蜀江波葛相功猶在韋王事若何雲仍賢莫比君長禮無苛閉户時披褐看山暫脱鞾填詞鶯囀切促軫雁聲搓芝嶺圖空想桃源境類訛盛年真國器妙質竟山阿世徳蟬聨備家聲骥子峩播川彌震耀峴石詎沉磨真定史萬户髙陽之徒也至死忽題詩而逝一身蠶作繭兩曜蟻旋磨投筆人境忘長嘯泉下卧二月流白羽觴風送朱絲絃欲識無生樂熟睡三千年三玉雪陽春五十年詩成書罷珮翩躚擬將北斗為罌缶不向人間酌酒泉臨江熊君浮湛原不礙清影透溪扉木落行雲泣山空病鶴飛詩書誰素業江海獨天機此意何人㑹哀笳慘暮暉至治丞相輓詩次韻李仲囦學士重𤣥開葆命上聖席蘿圖盛徳涵諸夏深仁浹八區降靈申作翰稽古禹陳謨初日行黄道羣星拱紫樞神羊庭辨直貪獸鼎垂模纁帛招賢俊鋼金辟佞諛撫床論密勿借筋契都俞明月青銅鏡中秋白玉壺律成懸象魏禮缺補鴻都士進三千牘奸誅十二衢彌縫前後正損益古今殊相業傳喬梓英標瑞竹梧痴蟇元有兎猛虎果非貙内坐占華蓋中階仰泰符令嚴顓白帝漏下候黄姑萬騎𤣥雲蔽羣狐黒夜呼銜枚兇有約解帶僕云痛象燬端因齒龍眠竟失珠聞驚燧人氏事異夏區夫闒㦸交馳驛重弓競接途殺青誰執簡泣血漫成湖史記羮梟賜經簿齒馬誅隂氛動天地遺痛感樵蘇故壘烟攅棘荒原燐積蕪邦刑窮剿絶陽澤起萎枯趙氏兒猶在山公女不孤勲名昭令甲精爽與天徒帝所隨升降神仙辨有無雜詩破衣僧橦花楮絲枲纂新乃成敝鐡裓及肉身剛柔亦摧毁真空掃真壊大願開大智渇欲飲清泉飢欲思美味隨彼所願心以解嗔惱累王侯與長者糞土金玉貴何以慰彼思長夀則歡喜夀本同我衣仰箭勢還墜堅忍莫精進設衣以自譬懼彼不信我投焰五采異老僧機已寂贊嘆非本意意絶道始彰從此㫁三世熾盛光佛偈寳光生虗空旋如火車輪肉眼一見之欣怖難思議謂光由身生我身與汝同口眼鼻舌心光亦何曽出無生亦無滅是由定慧成衆生受五濁七曜日鑒臨四餘在虚空摩盪不暫停列宿值四方好樂各有職或争彼貪嗔或増彼滛慾居處各侈靡恣飽窮膏脂天神與魔鬼行住隂伺察爰假躔次環俾女作疾忒佛言彼有罪須當盡懴悔若更攘割之安得名慈悲矧此缺陷世植果㑹有因罪既從是消福亦從是増般若無損益萬念隨積刼還彼清净根衆生永安樂緑隂堂山偈十首奉寄開元㫁江長老緑隂堂前碧樹齊千枝萬枝雲凄凄生靈不令鷓鴣舞襌板時許倉庚啼二緑隂堂前春笋生大着錦棚小織成老禪一一㸃頭角要使參天來鳳鳴三緑隂堂前初凉夏芭蕉為扇椒為漿日汲井華三百斛側聽漁父歌滄浪四緑隂堂前古佛身刼火不壊金色新笑殺丹霞㫁知見暖得病軀生障塵五緑隂堂前萬境空掩息不語超鴻濛有人立雪問大意山神泣走號寒松六緑隂堂前自在時不拈公案不題詩僧來住夏與竹杖客去逢春贈柳枝七緑隂堂前秋葉凋湖翻白浪魚龍驕我有鐡鉢水一勺彈脂送爾歸扶摇八緑隂堂前夏木清千紅掃盡雪層層有僧忽問栢樹子斫却栢枝僧始譍九緑隂堂前結小參以手直指車始南現前虚空付火梵過去功徳歸瞿曇十緑隂堂前合自然不學吟詩不學襌應許清容老居士睡盡髙舂猶愛眠還源菴沃焦山下水歸東端與銀河一㸃通誰信道人能掩息手提渾沌擲虚空清容居士集卷十四
