body:
  text: 清容居士集卷五元袁桷撰古詩五言為贑川連教授賦梅城稜稜太古根縈帶鐡不如飛塵望其藩却走奔無餘中有冰玉人指揮萬瓊琚低昂受其職補理成扶胥天空斗摇寒令嚴察孤虚練袍立清夜鮮明在犀渠積雪誰為驕慷慨紛糢糊隂陽本一氣開門使之俱險絶貴有道面壁非吾徒司農起視旦蝶夢方蘧蘧泊貫州次韻仲章沙塵暗河津遊雲蕩無餘忽忽萬里念眇眇孤鴻俱風水淹行頓異縣非故居雞鳴逐前邁殘星澹遺珠空林野氣肅古樹慘不舒飢禽何其悲驚飛挾鳴雛迺知俛啄意愧我將焉如道逺怯驚隘終憶山中廬誓言息機事解纓慎馳驅初夏鬱新溽永日誰為娛因之寫初志臨風復躊躇次韻吕學正古意二首初筵秩嘉賔容氣清且明至饗不在酒尊罍粲東榮傷哉崇飲徒偏宕四坐驚中有獨醒士靦然愧非輕持觴懼濡口孤吹幽篁鳴永飢詎遺禮俎實期充庭苦心嗜昌陽古簡香莫識之人逺持贈藉以五色石宻節懷黝章寒暑端莫易三咽迴中腸起止良得力舉世希妍英椒蘭政紛職慎勿强嗜之􅆽泉澡其徳次韻元復初春思三首凍樹迴青陽羇禽競新哢喧喧人語浮稍稍春事動澄心絶芳華小睡足幽夢夢覺天宇新朝光集飛棟遊塵逐平臯秀色翳榛莽油雲互東西鬱抑不能雨昭蘇在𤣥功竟夕復延佇何當抉其顛振翮窮委羽逺客芳草思湛湛天外舟坐令親知疎低徊此淹留古樹擢竒石清流滙芳洲素心諒有在胡不為兹遊雨後聞鶯衆卉沐新雨幽光澹餘情岸幘碧忩冷卷簾白雲生起坐調素絃促軫流鶯鳴佀言田家苦招我田中行昨宵隠其雷願言興滿盈送李徳隆經歴其父居澧陽因乞郡江陵以便省養悠悠澧陽川飛鴻去無極白雲眇何方抑鬱萬里色念之不得從肉臂誰為翼翩然領南郡解此終嵗憶楚宫昔壯麗冠珮立瑶席瓊英輯佳思落筆洒金碧凄其千載下正氣堅鐡石想此問俗餘酹酒追寂歴平生功名意甘㫖惕朝夕懷章遂其初居夷亦云適藝蘭襲孤芳種橘企嘉植永言區中塵過隙殊未息節婦吟為蒙氏作幽蘭浄如洗晻靄桑麻墟天低泣清露因依護紛敷春風逺相負迺在萬里餘明月流素光願鑒夫君裾荷戈力行役誓將保無渝難以一日歡永失千載娛蕩蕩明河側雙星隨斗移㑹合靡有覩恍惚生怪竒古意不復識今情益多疑契濶三十春百年以為期白首一邂逅孤芳秉華滋感此初意深臨風託長辭次韻范徳機海鵠篇黄鵠海上來逍遥遊帝所寥寥九萬里五采紛異覩朝霏西山霞暮結平地土喧啾舞晴翠鵠首不復頫孤鳴者何禽振翮亦遐舉憺兮邂逅之落月耿清侣芝糧産層顛蘭珮在逺浦八表同其光欲言淚如雨臨分致黄鵠出處各有許方壺渺麟洲輪囷為君佇送任懷可跕跕水上鳶游游釜中魚鳶飛不得息魚呴何時蘇興言夙行邁晴秋振脩途挈衣海上州出日摇珊瑚采瓊以為糧拾羽以為裾妙言感芳蕤流光曜陽烏盛意勿復沮清氛静無餘維南有英雲矯首出門初團團御飛盖隨君為躊躇勗哉植明徳含章俟昭圖同復初功逺飲仲章家觀芍藥分韻得一字深沈碧雲居錯落紫瓊色芳菲護餘春清和表昭質髙叢吐騂剛新茁角繭栗傾心愛膏露正色浴初日含香紫宸朝奏舞彤庭佾駢頭澹如無背面意愈密杯翻王母下斗碎壯士失霏霏玉生煙漾漾珠吐液絶容第無雙薄醉飲真一嫣然屬幽賞為爾寫清逸洛詠五首示洛人張孟功任大正晴雲起嵩嶽變化如游龍感彼金谷人聚散同飛蓬縈紆古瀍澗百井争汲舂昔有陳思王作賦雕層空相望不得語遺情寄㝠鴻金隄手所植荒淫竟無蹤三川鼐沈淪洛水以土勝如何羣英聚千載兵甲競僊人王子喬吹笙白雲頂下視北邙塚今為狐兔穽㫁碑化灰刼來者日以盛箕山水泠泠側聴發深省森森古名園玩芳納𤣥覽澹然觀物翁欣至情不減看花烏帽落秀色起晴臉一一卿相居舉觴雲氣湛尸坐寒暑遺妙言天地範一去三百年寒松白雲黯昔有好竒士絶頂觀海浪神泣肝膽翻興逸天地放泥金與玉檢縱筆紀其妄兹山久寂寞著屐事幽訪太少何岧嶤兩曜隨下上彩鸞凌風翔疑有帝子降經郛闡微言理窟洞𤣥化汲汲嵩山叟反復窮代謝白璧匪有瑕後賢極譏射麟經書薨卒外臣不以假如何莽大夫簡牘得矜詫往聖既莫從掩袂效喑啞贈汪生投簪事却掃衡門無雜賔衝擔鳥雀噪魁梧見斯人遺我以琲珠神光絢嶙峋風雅久不作雄辭逞齗齗愛君春雲姿回旋轉空輪飛英不受采積潤凝青蘋老我意苦短念此情彌親疇昔侍金鑾挽士志莫申薦禰固百一視君鮮儔倫先聖六籍功願言善彌綸辱贈莫能報清風響蒼筠感興明月不受采澄波偶成文壌壤𤣥黄中至理孰能分南山有琪樹䝉彼山上雲層隂閟朱光積潤養竒芬深林葆真素芳妍澹無聞昨來京國遊緇塵日芸芸永念丘壑趣攬衣意如焚題王眉叟溪月圖水清不受觸月髙不受浴空景兩相忘松風進虛谷之人閲真静引手還在目服之飛上天溪流浄如玉書孝子卷道旁拾枯松汲水作糜粥堂前九十母啜粥端勝肉人言五鼎養形渥迺有辱擊鮮豈無具彼網不敢觸乃翁三尺墳慈烏為之築亭亭忘憂花甘露手可掬花開醉春風百嵗初轉轂之士歡有餘之人何不足夜泊城北有懷孫秦二學士英英二學士黼黻元祐初功名軋姦黨翰墨尊寰區維昔淮南邦風流藹清都至今舊文采老蚌遺神珠百年俎豆廢荒城屹秋蕪黒首總論武舊老時言儒白雲去已久來往今何如蒼蒼灌木隂曽聞駐瓊裾艱難視天運俛首猶唐虞稻米竭秋歛菱芡餘嵗儲白鷗眇天末蘆葦寒蕭疎懷賢願有在佇立情躊躇淮口阻雨二首曉雨壓風力我帆同欵段怗怗篷底眠晝日慘易短獨行既無儔欲去不得返㝠濛水雲重寂歴榆栁㫁淮流既東馳我行安可緩縈迂泝三义始覺人語亂艱難意如斯寒鴉佇江岸小雨不作潮餘情在春樹㝠鴻歸興深振翼美無度凄凉舊如此荏苒已増嫵茫茫昔荆榛桑柘青幾許淮水去不休嵗閱今與古風雲合浩蕩我輩勞步武人言上水地沙流半焦土行役儻自然春雲起飛霔詠史四首青青虞美人欲舞不解前漫漫劉寄奴醫國真茫然風迴下相里寒沙起蒼煙徘徊古彭城亦復多流泉二者骨已朽胡為事春妍人生要垂芳豈託小草傳丈夫與女子籍籍同悲憐寰宇設天險圖書已周知鴻溝定疆理屈意陳卑辭永觀沛公豪豈無懷土思羣雄亦鄉黨輕家迺相隨時來各忍性不復兒女悲它年過沛宫父老垂涕洟井邑圖新豐雞犬猶前時論功食湯沐故里俱無遺成敗論昔人興懷重嗟咨留侯晚辟榖端有避禍意逺招商山翁不復為漢計平生老鋒鏑帷幄乃真智南宫論非諛意冷終有忌雍容視國本孱子匪神器此坐端可惜欲言且深慮代王豈不佳語出禍立至羽翼從汝成矰繳幸我避百年願已足投老空立異不見吹簫民功成終械繫人言漢淮隂晩嵗何卑陬英賢多混跡豈復論恩讐泊舟楚山川緬懷意悠悠責人斯無難此意猶前脩近世輕薄兒流落曽相投飢來或乞食寒至將索裘一朝青雲上泯黙懷深羞髙視絶舊好削跡同避仇當年睚眦意談笑能相酬韓生固瑣瑣終勝青雲流斯人我非慕微言儆羣媮次韻仲章初夏即事吏隠習疏曠晨起遺世情積栁含緑潤幽葵表朱明誰云地氣髙炎暑從兹生新潦變歊溽飛塵増墳盈養痾尋丈内跬步不復行雲浮晚色盡平湖起秋聲炎凉在頃刻變化何縱横繕性合天和愧彼塵網嬰有懷金石交飛盖何由傾城南亭平生泉石意勝處時相闗似聞城南亭層隂絶塵闤初夏結清讌尊斚連珮環凉襟納虛白妙顔尊渥丹髙歌互激越白日虛且閒志適不願足後㑹期躋攀晴霞澹天末迴首疑僊寰讀范徳機東坊槀范子東坊居深巷蔽樛木架上一帙書牆東數叢菊明月照西山清夜勤盥沐學為孤鳳吟非絲亦非竹隂陽合萬籟逸饗振林谷水花不受唾天衣那有觸玊署青裳枝三嗅羞獨宿滄洲有真趣從此謝榮辱武當張道士京師禱雨迴山中古有巖居子抱朴尸𤣥㝠被髮空洞遊蒼莽窮帝青手持九九文蜿蜒合揚靈維斗司其紐習坎鞭流霆良疇已懷新燥露滋明星滌滌原野燄迴風轉塵腥無譁夜下令瞬息不得停兹人秘元化長跪耳黙聆崑崙挾潢漢紫霧嘘青萍𤣥鶴渰以凄百谷奔零零浮侈不足慕趣使歸巖扃天地古槖籥錬一清且庭詭幻嵗已暮願言養脩齡觀梅分韻得影字月窟迴初陽瑰室習真静深居碧雲合澄觀白日永南枝歴煙霧北雪辭嶠嶺蟠柯翠交加疎萼玉秀整三襲雜纎繒一漱芙蓉井浴鵠採其光寒蜂妬其影將養憂過分泯黙發深省天空流蟬墮露泠𤣥鶴警歌罷誰與言觴至不復逞送陳仲剛歸番昜浩蕩南客心峥嶸西山雲憶昔登王畿縑緗集同文執簡玉署側藻思抽竒芬明世合儒彦詎有楚越分羣姝嫉蛾眉念至肝膽焚番江滙新田甘雨催初耘不念别者苦孤翮誰為羣重栁積翠霧酒盡不得醺扁舟鼓新棹晴川浄芸芸送薛𤣥卿歸吳予時有上京之行飄飄江海遊渺渺闗河役燕鴻有相避客子無定跡南山火雲髙北山雪新白想此六月時相顧各動色堠傍青松樹上有雙鵠翼愛君慎舟楫戒我専寢食擾擾行路難風花亂如棘有感皎皎白面生長鋏學短長箕坐激楚聲大言響髙堂有客將止之反脣臂欲攘客退不敢言彼怒庸何傷盈盈百花露擬作終嵗糧露晞百花隕掩袂翻徬徨董道士雷泉齋淵淵養空洞摩盪升天行翻車震崑崙旋空紫金明下有五采雲散絲隕珠英以彼一寸光八表須臾成逆順有正性變合無流形火以明益枯水以堅始凝無為合冲澹神化凌上清三月十二日自殿廬歸舍梨花盛開薄暮與陳汝海花下小飲兩人一百嵗共飲三十杯雙花夾蒼檜夭桃倚晴臺白團燕山雪紅注天台醅振鷺擬髙下遊蜂謝徘徊昂首冠接䍦捧心舞毰毸殘日凝餘霞迴風起輕雷不念影寂寂但惜光皚皚珠衣㸃綴滅粟尺彌縫裁團圓粧奩巧宛轉寒紋迴香深妬紫檀色靚羞蒼台幸兹艶陽盛不以塵土摧凡卉工後先孤根静栽培翫芳悟觀象擷英審掄才輘轢青紫場躪藉錦繡堆髙羞折腰栁逸亞横枝梅慇懃識花意浩蕩為我開殿廬龍光動瑣忩駒影催相迎復相恨欲去還相陪停雲儼若思落月寒如灰當歌願秉燭渇吻驚恥罍送祝丹陽使武當山夙昔山水郡浮身宅冰霜迴首楚望深乗車升武當上有天一池夾日紅熒煌𤣥雲起丹甲羣螭恣騰驤攀崕靈夀杖坐日芙蓉牀琳琅徹廻鸞儼立承天香麻衣採芝叟百嵗鬚眉蒼授子以易知永視元運長摩娑古金人轇轕日月光中臺古􅍶崒天風振層岡揮手謝來者下土何遑遑贈陳文翁求篆扁往聖抉天巧蟲魚構瑰竒辛勤汗簡功淪落誰傳兹昂昂子陳子掇拾靡棄遺清齋浄無塵素壁懸秦碑佀欲臥其下畫腹鬼神悲氣酣落長牋屈曲生妍姿㫁嶂立冰箸迴波捲蓴絲百幻頃刻成長鋒勁如錐解衣坐晴忩青眸光陸離客喧意自寂手敏心相違逺憐李氏子自謂一代師蒼徨大夫門筆冷情依依得非金注昬竟墮豪俠欺我家竹石居甕牖迎春曦煩君作佳扁朝夕舒頑疲夜月走魑魅晴雲鬱蛟螭髙張駭衆客傳觀恐羣兒能事敢强迫妙處通天機㑹須風日清醉墨傾淋漓送李平叔之信陽維昔文昌公幽蘭閟孤芳髙秋振餘清百卉争歛藏颯爽眉髪古峩冠坐鄞庠歌詩闡温柔宫商起虚堂絢爛五色雲縹緲鳴鸞凰至今老諸生猶能記鏗鏘乗風侍金華蹇諤懷剛腸諫疏納帝榻百壬斂妖芒年運既莫從精爽回雲鄉空餘子雲宅澗水猶湯湯永思古遺直江湖渺相望朅來芙蓉峯喬木鬱以蒼凝然孫枝秀妙譽參珪璋投牒山水州清溪趁輕艎羣公列贈語握手揮離觴我生識面晚懷賢意何長慨兹衣冠胄蒹葭隕飛霜交衢泣零落寸心實徬徨斯文儻未墜龍虎回天章願言紹正學青雲縱翺翔贈徐中丞二首南海有𤣥鶴孤唳雲稜層天池不肯下厭此魚鼈腥露冷懷長飢慘澹舒寒翎空巖蔽喬松鬱鬱太古青喬松意何悄隂籟驅羣靈下有散髮翁黙誦離騷經妙言粲瓊芝孰視眸晶熒鏗然拔長劒神光發新硎倐忽去已逺𤣥鶴空晼晚為言來何遲迴峰起前巘鳬氏裒吉金紅鑪範黄鍾鍾成飾雕簴岌嶪蟠虬龍大鳴淳以希小鳴和且冲髙懸饗羣帝祥雲布青紅羣帝難强留一去三千秋張筵設尊斚庸錫南諸侯一擊黄鵠來再擊飛雲收徬徨不敢聽亟以還中州師曠世本有左髙悵誰謀終然侍帝所天地歌同流拙訥齋樗櫟老薪槱雁以不鳴烹受形既非材卒莫全其生在昔有至人觀化通百靈至言貫圖象妙意窺璣衡乃為萬物宗熙熙遂生成髧彼青牛君深根護靈扃永哂鄉原子木偶欺聾盲設喻深止之跬步増慎兢世路日榛棘韜精事沈㝠滄江渺何許願言濯吾纓送鄯陽劉縣令之官宣寧二首嵬嵬馬邑州火山蒸鬱陶霜勁角弓直草净蒼鷹絛平沙細成塵迴風湧銀濤想彼强盛時馳突聲嗷嘈烽煙徹雲表低昂望前旄樓煩古喉襟燕秦據其尻八月秋氣肅千家釀蒲萄帝京布文教列邑施官曹井屋魚鱗齊禾黍黄雲髙幡然土俗變怗首羞雄豪出宰試敏手良庖靡更刀善政舊諜傳據案除民饕村村煙火通長塗罷建櫜雞鳴流水逺雁過平陂翺餘情樂觴詠臨風謝喧囂題文與可風雨墨竹妙筆抉天巧黒雲參差髙偃疑受雨深俊欲凌風翺颯爽隨舒卷清凉散塵囂湛湛不受暑靈籟虛忩號緬懷文湖州玉雪人中豪想此磅礴時葆光解天弢老僧道機熟形影隨目逃持以深贈之生意窮秋毫髙齋夜氣寂定回起層濤答李生裕尚書大同公曽孫英英金華伯皓首人中龍横經古鄞水歌詩儆羣䝉舊為鄉里教授歌風雅以訓諸生正色侍邇英微言動宸聪一疏不合意孤身轉秋鴻俯仰乾坤旋舊聞渺遺蹤坐令詩書宅寒雲翳孤桐維曽秉文度月印五采虹知我夙昔侣贈言啓舂容清朝集文儒直筆書清忠作史聖有訓狐裘靦䝉茸挽士貴無方正色誰為宗虚舟萬斛積遇順凌剛風明時詎淹留勗徳㑹有逢題巨然楓林雅集圖楓林集虚秋灝氣轉寥廓坡危草纖纖水路石鑿鑿四子何方來黄塵滿芒屩據流濯其清班荆坐盤礴山童注新泉支鼎拾薪籜方囊濟勝具一一隨取索想彼笑談時天弢脫塵縛上追巢許髙下陋山王薄凄凉金谷宴腥羶甕鷄樂又疑東山遊粉鈿汙花萼老僧習止觀雅趣隨筆落振衣從之遊素壁儼酬酢避塵軒飄風捲飛蓬咫尺隔煙霧馳車與急騎憧憧走當路各云有所之瞬息不得語山陽荷蓧翁守舍視日暮酌彼澗下泉膏沐美無度寒光映玉頰浩論巖中趣永謝征塗人看雲養真素次韻伯生榆林中秋榆林月中來今月向此出天低鳥翼滅野浄田事畢驛馬西北鳴候吏語喧唧我行起視夜炯若積雪白昂頭望𤣥宫耿耿駐營室坐令八方澄不使萬景没徘徊清影孤躑躅悵後發送鄭景尹還里蟬冕生詩書世胄迺鄙夷沈沈喬木宅風煙暗茅茨此理固莫詰或言有盛衰堂堂魏王勲談笑帝者師風雲締嘉㑹青史傳忠規諸孫静且秀振鷺遊天池鄉社三十年永謝紈綺姿興至來上國窺探抉幽竒聞聞與見見栁下揚鞭辭前聖六籍功尊聞審羣疑江源發甕口濫觴渺無涯願持一寸膠黄流化清漪天風捲秋濤舟楫慎所持時至諒有得衡門詎棲遲李野齋别墅圖别墅依平陂翳翳桑麻隂田翁理農具晴雲起遥岑于時春事初佳樹響鳴禽先生朝出遊呼童佩瑶琴仲也行比肩叔也聲相尋興至或坐石臨流散虚襟有客携酒壺勸我手自斟共言羲皇時古風藹淳深巍巍居仁里盛徳世所欽三鳳在髙岡參飛起清音恂恂化卑讓嵗往猶傳今披圖儼見之慰我夙昔心子昂人馬圖飄騰天山霧盪摩玉京雲耿耿萬里姿矯首空其羣迺翁愛神駿泚筆五采分翁歸侍帝所乗化觀芸芸彼亦與之俱追風超九垠時松雪翁已下世一年題墨蘭圖秉芳空林中介石交不黷飛英散𤣥佩受露以膏沐羣妖春炫晝墨守益慎獨豈不念嵗晏自獻傷我足矯矯金石交挽之不盈掬疏清湛虚心振直耿絜腹昊天有正令俛仰萬物肅臨風獨躊躇白駒儼空谷次韻瑾子過梁山濼三十韻大野豬東原狂瀾陋左里交流千尋峯㑹合百谷水量深恣包藏神静莫比擬碧瀾渺無津緑樹失其涘揚帆鳥東西擊楫鷗没起長橋篙師歌短渡販客止天平雲覆幕灣迴路成砥鷹坊嚴聚屯漁舍映渚沚栁絲翠如織荇帶組交薿出日浮鉦金明霞紆綬紫一歃澆腸迴三頮慰顙泚髙桅列魚貫逺吹笙鳳觜前奔何無休後進復不已遶如林烏旋疾若坂馬駛飄飄愧陳人歴歴見遺趾流移散空洲崛强尋故壘波清鳬聚陣日落魚㑹市土屋危可縁草广突如峙蓮根漲新圩蒲芽護荒坻水花碧團團雲葉白迤迤濬脩出飛泉闡闢搜故址緬思重華帝允屬夏后氏彛倫著箕疇偉功傳遷史目力渺無窮行跡端可紀前村捋柔桑沃壤接良耜餘芳錦堆爛宿麥翠圍侈迺知東魯儒終作中朝士養源滙滉瀁包荒納遐邇驅馳屢經過感歎復慰喜南還幸遂願永雪洗耳恥憶昔三首憶昔白雲阡有松如車輪初日炫五采湛湛珠露勻是時十四五恍不知其因有客笑指之慈䕃在汝身猛志親六籍百川渺無津懷刺慎所從一一先朝臣文昌古遺直談經鬱紛綸授以漆簡書經緯通天人碧波掣鯨魚瑞錦翻麒麟昌歜世所鄙食之迺竒珍厠身金鑾中黽俛二十春懼貽先師羞執筆常逡巡即今已六十誓墓廬松筠厚徳靡有報淚與寒泉淪外家甘盤宅門閎誠煒煌髙懸金碧牓中有衮繡堂珠璣左右侍絲竹儼成行幼不識慈顔到彼心徬徨每嵗兩過之嚴訓具有方膏梁病居養久爾生惰荒七嵗誦詩書十齡學詞章駸尋志學嵗折節師老蒼紀事法班馬㝠心契羲黄謬與時彦交寶書閲琳琅今兹乞南歸往事増慨慷興懷陶與蘇秉筆追耿光凱風有遺思願言繼餘芳寥寥帝王州我翁佐其治有亭名朝陽青溪清且駛旁有籌邉閣羣公集裾翠翹翹萬芰荷雨過争旖旎飛觴羽書來翕霍江上燧峩冠及遊談戎弁生縱恣予時侍其旁側耳聴論議翁言不見取投劾乃謝事坐令百萬家解甲豎降幟徘徊夕陽亭晉宋政相佀重巖圖為劉明叟迺翁作夙昔慕清隠振衣躡層巒飛鳥出天末白雲生樹端稍覺所歴險撫松獨盤桓緬彼巖中人塵世靡有干飢食千嵗芝朱顔炯團團一日不見之披圖儼清歡崩崖罥枯藤迴流起危湍微茫暝色共凌亂生綃寒心期果㝠㑹願言力加餐王叔載以江梅有佳實託根桃李場為韻見貽因次其韻百川既東流震澤成三江學海詎有窮泝源探敦龎緬彼學古人善問如鐘撞簞瓢豈在樂摳衣願為邦六籍㑹有厄禍繇漢晉開支離起田孟誣偽興姚梅綿蕞匪正禮區區存曲臺吟詠既莫分褒貶以為才峨峨神京秀轍跡貫九有奉璋弁如雲執轡沃在手欲窮羲黄心編簡滅科斗研摩詎無念急景謝衰朽風雨􅆾素期山雞鳴喈喈豈不念夙昔愛此日夕佳平明視青天羲輪御中街榮悴㑹有時願言壯其懷髙門深寧翁晚嵗悲絶筆愛彼樸樕才化為楩楠質春花五采妍秋至詎俱實遺文粹東楹賤子願叙述昔聞中書垣上有紫微閣微言續九丘妙義追八索嶔岑大厦傾作記金鑾託深悲在廣招寥寥鈞天樂少小不自持曲學尊蕪繁舉觴一釂之為言護深根先天有至理能使月窟温談笑襲師訓詎知雪齊門斥鷃不能飛欲作搶榆髙何如阿閣鳳守真始風翺志士惜短日碩人養屯膏蕭脂始薦鬯食黍迺雪桃昔年委閭巷初不願禄仕紬書探異門擬作前國史念至事益非委命以修已勿為衆所譏不如道旁李君才如江梅不入桃李場徬徨念先猷貫鵠始挽彊後生捕形影争言早升堂唯餘白髮士耿耿無它腸董生噩上人以叔載韻見貽再次韻闗河一轍跡耿耿明天江五方各異俗中州誠駿龎吾欲上帝閽帝閽不敢撞終然返初服養佚歸海邦逺宦三十年石田今始開觀象慕易京登真想仙梅夙昔希石匠嵗晚成輿臺志念詎不深樸􅈪慙非才弱冠慕静居掩息空萬有老禪深愛之微笑示以手忍欲如忍事吸醯過三斗終然寒松勁不作朝菌朽鞾帽成戚施逆耳風其喈昂然望南山愛彼日夕佳朝來何所見萬馬盈天街所以巢居子終然養澄懷辛勤下帷生涌思不停筆範鑪鎔吉金變化銷其質湛深陋雕蟲多聞覈萍實袖手毋自藏盛世富紀述噩師禪林秀宛在諸天閣當其調護時危石繫朽索作賦極翦裁衆物各有託氲氲荆山玊洋洋咸池樂𤣥圃有琪樹不使枝葉繁譬彼積學人芟蕪養天根嵗暮霜雪至銅柯生晏温一為梁棟材落落懸金門吾師深寧翁屹屹泰華髙佳哢時一遊不使凡羽翺方壺貯神藥變為五色膏服之生羽翰陋彼東方桃稟性非好遊亦不願禄仕感彼獲麟翁歴聘删魯史正緒願有傳固陋敢私已年衰絶聞見謝彼井上李少壯勿自摧振容上詞場鵜膏淬寒鋒談笑摩堅彊藉以雜纎羅貯以白玉堂辱贈莫知報因之結中腸芳思亭大父尚書公治圃南郊有堂亭凡十五方池脩廊屈折便宜雨甚亦無礙遊事逮今荒廢踰四十年故基陳跡不復可考近築一亭雜植花木廣不踰畝髣其萬一名之曰芳思玩其英華將以紬繹志興翰墨有紹是則先公之志作詩示瓘瑾併求親友同賦侃侃尚書公投紱理泉石五堂適寒暑十亭送昕夕瓊英𤣥圃秀美䕃嘉樹碧脩廊不受雨來往隨履舄紅雲漲方塘丹霞耀翠席嘉魚黄金掌瞥見眇莫測辛勤三十年深逝晦朝蹟遺訓示子孫樹藝比其徳浮雲變須臾百幻倐消蝕空餘鄭公莊耕稼給衣食緬彼行樂時衆植各有職以兹一畝園髣像見疇昔幽葩與羣卉生意日不息朝陽潄靈根三咽妙紬繹曠懷事幽賞誓矣躬六籍次韻袁季厚惠苦筍楊梅二首食苦不願餘甘回迺稱美空巖養滋味老叟清晨起斵之玉箸圓拾以付稚子駢頭萃豪門咀吞訝金矢維時朱明中盛徳協清徴翛然在隂翳儼與松柏峙玉液生華池可廢杜康祀含章守元吉黄中本通理絜腹表正性要以除穢滓初如橄欖食不作即且棄世方尚腥羶易牙正専味愧我清齋客足音跫然佀空巖迸瓊珠蕭蕭白雲中恍疑羣仙立欲脫煙霧叢招提者誰主日出撞金鐘笙簧激清濁旌盖摇青紅遂令彼林谷徴索恨靡窮侍臣久歸田不數蔗椀功頃筐逺相致齒頰生冰風昂昂長松盖下有萬馬容同源匪異本斯文永為宗清容居士集卷五
