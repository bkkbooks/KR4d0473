body:
  text: 清容居士集卷四十四元袁桷撰雜文放生池祝聖文重華廣孝琴奏五絃成湯克仁網開三面式届正陽之月宻符元命之辰寸地尺天歸皇恩於不有四生萬類涵惠澤以無窮恭惟陛下功契重𤣥道融衆妙鳶飛魚躍極上下之昭眀馬負龜呈發隂陽之靈秘臣等依承真䕃詠賛昌期天地大徳曰生想洋洋而圉圉文武萬邦為憲咸肅肅以雝雝碧海波澄瑶池仙下鮑王廟祈雪祝文維神廟食兹土㡬千餘禩比嵗饑疫荐臻户口耗絶意者降罰自天神不得以有請也飛蝗蔽天神能相其穡事俾獲無害而入冬以来陽不斂蔵雷電晝作月臨嘉臘同雲之候迄莫有覩深竊懼之雪為五榖之精協應以時則遺𦙍原隰者可以弭伏民無疾疫春有東作千里之幸使者觀風於此朝夕徯念神於斯民休戚彌重願力闡明靈叶賛於山川錫以嘉瑞勿愆其期以絶菑害益足以彰神之賜賀東嶽表莭應蒼龍紀岱宗之元祀雲舒彩鳯流阿閣之祥光萬姓庭趨百靈弁㑹中賀恭惟氣超混沌功運冥茫稟木帝之精仁施無際悟谷神之藴道妙難名永孚于休必得其夀臣等肅蠲瑶斚祗演琅函望齊魯之青葱天威彌近恨蓬瀛之拘縶肉翅難飛又庚子嵗甲辰日陽徳鍾靈龍集式符扵天統昌辰紀瑞虹流上合扵堯年五福錫民百神受職臣聞至仁無極如嵗之春盛徳莫名惟天為大故䏻彰施黼黻以盡人文之妙休養封殖以成品類之和幽明相通顯微無間極際蟠而均被亘今古以常新佳氣鬱葱神光孚逹中賀恭惟位冠羣后功賛無為玉檢金泥極昔王之潤色丹山赤水覽海國以遨逰爰假青煒以諧寳典臣等傾心雲闕注目霓旌呼萬嵗三莫侍鈞天之廣莫方百里五徒推東魯之幅員又是嵗三月十九日立夏瞻雲喬嶽叶盛徳之在春受厯清臺揆發祥而維夏四方来賀六合同風中賀恭惟樞紐隂陽權衡品物金穰玉燭以成三時之和丹臺紫清以佐九皇之治雖真逰之無跡幸神御之有嚴光挟龍輿下琳宫而布武燕分麟脯傅玉斚以流恩海觀塵清城闉瑞靄臣等式循舊典庸展上儀大道無言莫測絪緼之始人心不逺益窮肸蠁之微又天作髙山實尊魯甸位冠羣后兹為岱宗良辰揆維莫之春多士仰思皇之祐中賀恭惟受元氣始為萬物宗七十二君莫測神庭之秘三千餘里有開日觀之祥睠兹海壖實維侯服斥鹵竭魚鹽之利生聚紀蠶麻之功民食每假於轉輸土俗猶存扵浮靡雨暘微戾伏臘遽乖敢因善頌之誠庸致預祈之懇絳旂丹轂宻除疵癘之妖紫府清都彌降簡穰之祉然後東皇太乙錫宴鈞天夀宫神君追逰化國遹廣聪明之聖懋昭長育之仁眷此有生施於無極又時維暮春誕紀盛旦嵗行吉亥丕昭令辰蒼龍宣長育之仁玉燭唘豐穰之瑞中賀恭惟希夷道廣亭毒功深神化無方寸雲合而甘澤溥精誠有感巖石固而積霤穿臣等身囿海圻心傾日觀萬年永保降祥敢擅扵斗牛大徳曰生衍夀益齊扵箕翼東嶽殿上梁文伏以海觀澄清聳神山之紫翠仙閭縹緲靄雲闕之青紅光景常新規圖改舊伏惟隂陽合徳髙明配天三宫空洞之逰道無不在六虚周流之妙用莫能窺睠兹海壖古稱鉅鎮亷讓被先王之澤詩書敦故老之風榖粟桑麻行協三登之慶象犀珠玉聿来重譯之邦神符黙契扵天心嘉貺式資扵帝力洋洋在上蕩蕩無名雖兆祀之苾芬愧掲䖍之庳隘今太守顧瞻下宇咨度廣居龜卜既從鳩工斯集雕欒藻井峩然金雀之棲玉階彤庭鬱若彩鸞之舞雲光五色花氣千層誕揚仁惠之聲益廣循良之政梓人之道類相敢愧裁成王者之徳好生益申賛詠今兹榖旦庸畢偉功虹梁初舉扵池中鳯輦疑從扵天下載色載笑来宴来娭輙采歡謡少揚盛事抛梁東天雞午夜日輪紅風馬雲車歸帝所丹臺紫府布皇風抛梁西江濶城迴細栁低簇騎共看紅叱撥踏歌時聽白銅鞮抛梁南簇簇山光擁翠嵐蓂葉隂陽元有準蛙聲水旱不須占抛梁北滄波不動平如席祥風甘露瑞豐年大貝南金書絶域抛梁上仙藥未須承露掌絳宫神闕自回環玉檢金繩空悵望抛梁下萬井春風樂皇化雕題交趾九夷朝草笠黄冠八方蜡伏願上梁之後乾坤清宴星斗潤明蘿圖永衍扵皇基椿夀益延扵睿算六府三事百吏兆民雍容治世之音翺翔太和之域物無疵癘家用平康結繩追渾沌之風擊壤繼康荘之詠神祇受職動植霑仁梓潼青詞陽春布徳誕開震夙之辰天運興文允協亨嘉之㑹四方来賀萬神闕恭惟道合希夷氣超混沌揚靈西蜀通肹蠁扵妙庭佐治中州職銓衡扵帝所維桂籍固嚴扵取與而芸編復騐其勤勞至道無私積善有慶某學拘鉛槧業保簮裳教子未能企世科之必復傳家有託守先訓以丕承庸展素忱式陳薄薦伏願祥光紛郁􅆊氣開通孔盖翠旌覽徳輝扵九土虎符龍劵錫慶澤扵一門梓潼醮齋文瑞靄層霄誕紀降靈之莭誠傾魏闕有嚴事帝之儀慶接九垓芳垂百世恭惟至仁育物𤣥感闡幽受色筆夢寐之中睟容有赫厠金牓銓衡之際嘉兆宻符允懐一經教子之心適值大比興賢之嵗雖登崇有數難以預祈然神化無方終期黙運伏願祥光下燭飈馭恍臨桂籍書名願俟家氈之復棘闈進步思成盆繭之抽詞盡意長恩深感集宴交代鄧集賢致語繡衣南國屢施白簡之威玉佩中朝允稱金閨之彦惟姻好實侔扵兄弟迺交承永紹扵雲仍愧乏弦歌式陳籩豆伏惟交代集賢相公雲霄自致風月無邉給札玉堂氣欲呑扵頴横經壁海坐嘗撤扵臯比清言王謝之比肩妙畫鍾張之接踵與人無競詎論鵬鷃之鉅纎處身以和不計雁鳬之雙乗京師之望君實洛社之慕堯夫廟堂掄材㑹弁已同扵諸老巖壑動色拔茅肯後於吾徒盖将拄笏以看西山披裘而傲北雪老子之興不淺先生之祝何如特進宗師大真人幼結文盟壮持道紀度弱水之萬里騎氣而逰登紫微之九重步虚以進謂孔老之同友自若晉鄭之焉依避堂尊賢授粲禮客諸衆官或逺使絶域或近職内銓俱精神磊落之英實羽翼賛襄之士儀生彩鳯武接祥麟我翰林脩史大夫針芥宻投金蘭久託候松階之日影舊若塤箎踵蓬島之雲光今慚糠粃悟三已之無愠知四休之當宜敢以心聲上陳口號婆娑老子倦東吴笑挹胥濤傲太湖坐使千巖為几席䏻令萬籟作笙竽瀛洲法曲行刋譜酒國長春莫計壺賴有嘉賔相勸舞玉山蹔倒不須扶亡是公代聽雪主人宴客致語疾病相扶持迺天倫之至理酒食召僚友亦人道之常彛挹南斗以為漿夢鈞天而廣奏熒煌接席醲郁陳歡清容居士素褐癯儒青氈舊緒投簮逸海岸有古松流水之心騎馬傍人門無冷炙殘盃之色困頓扵俎豆弦歌之事沈淪扵醫藥卜筮之流匪曰卑陬亦云曠逹喜愠既不形于色口腹亦何累扵人聽雪主人出壑清冰臨風玉樹陽和盎面士疑挟纊之恩冲粹積躬衆美虚車之讓鼎烹而調衆口杯水以勝萬言給月支風陋人間之腥腐屠龍膾鳯窮天外之珍羞厥徳不回何恙弗已方将肥羜以速諸父庸示等差弊袴以待有功悉除僥覬芳筵縹緲雅集舒徐露墮三危化逡巡之麴糵風號萬竅陳廣莫之笙竽享若太牢澹如明水敢陳口號少賛神交玉堂學士詫英豪濯濯天葩簇錦袍擬上瑶池擘麟脯不将金帳飲羊羔長卿多病縁消渇坡老長貧漫老饕從此青州化烏有夢迴霜月冷如刀太虚道士劾清容子文鑄金作象深垂饕餮之文索米為飢何異侏儒之拙迺知芻豢之悦我口不如禮義之根人心傳書染指之卑易著濡首之悔詭稱聞道實曰費辭清容子山澤迂疎氷霜傲睨乏燕頷虎頭之相初非適時為牛溲馬勃之才猶言蔵用徒禀薑桂之性殊乏參术之和望似木雞出語争疑其鐡石癯如野鶴持身或近乎膏梁岐黄之問對匪専元白之唱酬莫預已廢三餘之業獨夸一藝之長隤其家聲恥莫甚矣同乎流俗已實為之弗思尚口之凶猶見朶頥之色昔茅容雞黍詎為設客之資而張翰鱸蓴迺在還鄉之日捨飯蔬飲水之自得為蒙袂輯屨之可憐不為盤飱固難免跨驢之誚我有斗酒要當為得魚之歡幸前倨而後恭姑小懲而大戒尚期深省以贖往愆涼州牧白羽乞致仕表控扼喉衿粗謹揚清之莭叨承掌握莫甦中暍之民知見㡬而作之良致陳力不能之請眀時匪棄小已實兢伏念山澤癯儒江湖野性樊籠久困難自致扵雲騰邉幅自修徒强追於時好心已忘於虚室手慵炙扵權門勇不足以沈舟技莫施於秉翟畏趙盾之日固曲盡其巧心憎元規之塵終有慚於眯目羞踽踽凉凉之行鄙媛媛姝姝之能謀乏知兵謬忝三軍之寄材非補衮莫資四皓之成荷執中之從權俾持麾而自效然而動静之道莫逃扵數代謝之理亦維其時今者扶摇在空蓐收届候羊角之哀已急鴻毛之順實先雖酒泉之封相與絡聫而雪山之衝深惟扞格服不衷而災也清有餘而簡之鄣面見人詎堪寒士之誚翳身而舞不逃宛丘之譏况臣翼蔽非長骨立早見久尸重寄深懼大何同異之論方興終難徇習磷緇之瑕已露必致投閒兹盖伏遇某官八柄馭臣一時講武治天下運諸掌式契古初繫一人謂之風灼觀民志憐蓐席之舊物希箧笥之厚恩動之斯和固己遂馳驅之微願揮之不去誠有乖名莭之大閑優哉香山之歸凜矣杜郵之戮先猷儼在遺訓具存矧兹蒲栁之姿惕若桑榆之景亟全末路俾就完人問温樹而不言深疑過謹開浴堂而召對未忍自捐得請為期束装以俟答詔式瞻天文俯察世道求賢自輔故建官以廣其見聞使民以時故用人弗責其全備卿皎若明月穆如清風早振儀於天朝晝承問於温室盛秋守塞力丐散閒當宁念功莫違雅素飾賁無咎持謙有終朕執中而慊然卿為計則得矣百年過隙要當從佚老之歡萬物為銅行復俟秉鈞之用勿云致事不我告猷可特授扶風公致仕擇日降制廬陵蕭静安作白羽扶風公致仕制凉州牧白羽謝表余因擬乞致仕表及批答漢雲字説雲漢之萌進於坤而踰於乾其昭然者隂也隂何乗於陽乎天地之初至静而虚根於隂矣隂者陽之先夫下而上者為升鶉火之中隂之基也隂見而極陽始著明萬物彚貞各返其生生而不已復歸於隂其環無端其去無趾故曰體之者隂也用之者陽也廬陵蕭道士字曰漢雲知所後先引而明之道不逺人合性與神其道得矣老氏之學捨是奚自庸俟而質諸張子敬字説乾坤之用近取扵人者必始扵敬敬立則誠始存聖人繫辭㫖且深矣自伊洛之説行各希美名然徐察視履矜矜於外者猶慊然于内豈果以為外飾哉余嘗聞中原諸老言許文貞公教授諸生窮髪之北皆負笈以請一聞善言有終身行而不倦者是殆其至静未散先進禮樂之遺意子敬居河西沈厚黙靖莫敢自暇内外交養在已治人悉本扵是尚勉之哉史文振字説丞相史忠武王以雄韜淵謀佐上聖合㝢縣㓛書鼎彛勲在琬琰厥子若孫章綬承接至于雲礽罔有替墜時則有若今江浙省管勾君勾稽知微謙謹保緒譬之巨木蔽芾百里羣柯交䕃條逹而不紊亦盛矣哉一日以書抵余曰鐸受名扵父兄而字未之有竊有請焉嘗考文武之事不能以兼而鐸焉則能以備丞相之勲殫扵武事則今之振文事者繄後人是望敢字之曰文振夫文非止於詞章而已縝宻而不泄著而明翕然以成其聲也清以亷宣明國家之盛俾後之人夷考世臣之系則必曰允文允武罔俾専美扵前代余扵文振實有望焉余孝友命名説邃古命名六相七輔莫得而詳也八愷八元或得以有解焉是則命名之説其始扵周乎周之初猶未聞其説也申繻之言名有五則夫今之問名者皆本於是私獨怪夫世降而俗漓髙者希扵聖卑者希於禄余閲夫歴代之史傳獨漢為近古皆以一字為則至扵方術有所不足貴徳命為義則於東魯余君見之成王夫子之訓先儒紬繹不能為言矣或者喋喋然為言其無乃贅而不知非者與余君方力行以為本因義以究其實是不在於吾徒之告異時行脩扵家庭顯扵朝著願勉之哉俾勿賛則得之矣平山説唐僧一行陋周畿漢志之陿始定南北兩戒而山川之肇源止伏一覽以盡可謂善矣然而磅礴雄險隠然若有所限其支脈連属猶屏蔽自衛焉睹所謂平山哉余嘗出居庸上桑乾始識其衍迤之勢千里若一方若布席圓若拱璧氈廬蔽空凝雲積雪杳不察其髙下故其行者如升虚騎者如凌風忘登頓之勞繇是逹扵金山靡有紀極而視兩戒之説倍蓯未足以議也王侯設險以防國徳不勝不足以恃是則幽州之北山不以險稱雄絶萬世朝九州以函諸夏豈峻極于天者非山之謂與在易之象曰地中有山謙不言山在地中謂有髙大之實蔵於地謙之象也余嘗聞洞庭諸山跬步巖㟧謝君獨取其平焉久留京師願至開平知盛世之廣洗耳目之固陋歸於故里卧逰以思登東山以小魯夫豈虚言哉琴述贈黄依然往六十年錢塘楊司農以雅琴名於時有客三衢毛敏仲嚴陵徐天民在門下朝夕損益琴理刪潤别為一譜以其所居曰紫霞名焉自渡江来譜之可考者曰閣譜曰江西譜閣譜由宋太宗時漸廢至皇祐間復入祕閣今世所蔵金石圖畫之精善咸謂閣本盖皆昔時秘閣所庋而琴有閣譜亦此義也方閣譜行時别譜存扵世良多至大晟樂府證定益以閣譜為貴别譜復不得入其學寖絶紹興時非入閣本者不得待詔私相傳習媚熟整雅非有亡蹙僨遽之意而兢兢然國小而弱百餘年間盖可見矣曰江西者由閣而加詳焉其聲繁以殺其按抑也皆别為義例秋風巫峽之悲壮蘭􅆏洛浦之靚好将和而愈怨欲正而愈反故凡騷人介士皆喜而争慕之謂不若是不足以名琴也方楊氏譜行時二譜漸廢不用或謂其聲與國亡相先後又謂楊氏無所祖尤不當習噫楊司農匿前人以自彰故所得譜皆不著本始其為今世所議無可言余嘗習司農譜又數與徐天民還往知其聲非司農所能意創間以問天民時天民誇詡猶司農也謾對焉終不以悉余益深疑之而莫以據後悉得廣陵張氏譜而加校焉則蔡氏五弄司農號為精加紬繹皆張氏所載獨楊氏隠抵不述耳今世琴調清商號為最多郭茂倩記古樂府琴辭亦莫盛扵清商杜佑氏叙論雅樂謂楚漢舊聲猶傳扵琴家蔡氏五弄楚調四弄至唐猶存則今所謂五弄非楊氏私製明甚議者悉去之不可也按廣陵張氏名巖字肖翁嘉泰間為叅預居霅時嘗謂閣譜非雅聲扵韓忠獻家得古譜復從互市宻購與韓相合定為十五巻将鋟于梓以預韓氏邉議罷去其客永嘉郭楚望獨得之復别為調曲然大抵皆依蔡氏聲為之者楚望死復以授劉志芳志芳之傳愈尊而失其祖愈逺天民嘗言楊司農與敏仲少年時亦習江西一日敏仲由山中来始弄楚望商調司農驚且喜復以金帛令天民受學志方故今紫霞獨言劉郭而不言廣陵張氏傳授皆楊氏與其客自私之蔽越有徐理氏與楊同時有奥音玉譜一巻以進律鑒琴統入官其五弄與楊氏亦無異晚與楊交楊亟重之益知楚漢舊聲非楊氏所作余来京師見鼓琴者與紹興所尚微近苐重緩如寛厚長者余不能以是説告之也黄君依然豫章太史之裔以琴逰公卿余未識之而余之嗜琴當有同者故書其源緒以解夫今世之惑而因以告之贈醫者陳生鄞衣冠家為最盛閭里棟宇相接屬議醫藥尤尚選擇輙考論其世又察其詞色温謹涉於儒者始得進焉每視疾必先告以虚實先後始筆簡牘議其月日以校重輕有不如式者争詬病詆笑於時待之也良厚而所謂醫者亦咸自愛重不敢妄試車軌混合南土㳺宦居多中原人壤髙氣厚所服餌率宜寒凉由是羣醫争視好尚迎合間有奇中遂復以施於鄉黨十失其半夫泥於古者非通論而强試其所不可吁亦殆矣余官京師時遇南士之稍適扵時者服食嗜好茫不可分辨疑誠中州人也莭宣之不時亦復以攻𨗳之法自治問者未退已倉卒不復救輕千金之軀以夸眩誠有罪猶諉曰是不通至扵業醫捨風土燥濕之宜以逐近利利未獲而害日以甚吾不知其為何心也里中陳氏子某世為醫祖父篤厚君子也力訓諸子讀古醫書長子辨論開博余每見之則曰醫不可以泥古徇今則非矣又未㡬而死心每悼之後二十年其孫復自立不墜余迺有言曰夸言以為容非術之工也媚時以自售非術之究也相其州里審其表裏神而行之日踵於門者莫可禁雖嫉媢遏抑不足為子懼朂哉以樹道何憂焉示羅道士近世通南北謂吴中所習琴為浙譜其咎在楊司農纉諱其所自譜首扵嵇康四弄韓忠獻家有之􅇑胄為平章遂以傳張恭政其客永嘉郭楚望始紬繹之今人不察百喙莫以解精扵琴者始知之北有完顔夫人譜實宋太宗閣譜余幼嘗學之其聲數以繁完顔譜獨聲緩差異而裹聲良同字本扵右軍今而曰浙字琴本扵蔡嵇今而曰浙譜吁其孰能解之玉笥羅道士大章秀敏且文其㳺扵藝也必求其極致傳余操調嘗以幽逺沖寂之㫖語之當扵其心盖愈澹則人愈厭余将終老故山異日大章能芒鞋以訪一倡三歎之遺尚有以相告聲生扵無形而悲愉感愕之跡畢具古人之事扵斯者豈徒然哉因書以告之贈番易筆工童生咸淳間湖州筆工馮生製筆得截法圓不至輭媚勁不至峭直一筆可作萬字馮生死其弟若孫漸變家法然猶有韻度近世子昻承㫖擅書名吴中筆工争進技庭下率形製相類書不滿卷則己成秃翁盖毫熟則易乏如脂韋之士寜復生氣子昻不言其短将以為彼養生計来京師劉自謙編脩以番易童生筆為贈絶類玉山徐氏舊製先正肅公平生惟用徐筆守番最久徐氏妙法豈童生家世能傳之耶梔蠟粉澤識者所哂譬如行車慎操其輈詭遇獲十蔑有效矣右軍製筆法傳諸葛氏嘗作右軍筆進栁誠懸栁不能用吾徒書記姓名童生之哂甚扵諸葛願勉之三吴専利将却走以避峩峩清逺可用扵朝審矣清容居士集巻四十四
