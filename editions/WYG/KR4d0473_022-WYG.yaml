body:
  text: 清容居士集卷二十二元袁桷撰序韓泗州老人詩序往八十年金蹙于汴盡汴民咸勝兵抗闘不得息聞其父老泣撫黄稚謂不幸生亂離使言承平時疑卒未見果承平耶余不得見得見也必若等也不十年而金亡乂四十年世祖一轍迹郡縣轉輸屯戍徭徴江以北悉撤省而汴為樂土今三十年矣私恠當時父老言合龜卜特不知得年者幾何人又不知得年而果伕樂者為何如人夫夀與富天不能並畀錙銖之較願與計莫以勝也大徳丙午韓泗州君美書來京師曰余家嚴君偕老于汴俱八十矣桷與泗州交㝡深官於吾鄉㝡久與之言文詞道政事切直近實今守於泗泗與汴水陸道相望甘㫖致問不絶汴總河南十數州得領公府事上汴奉觴跪行盡其私歡二老人方彊明艾和㳺戲閭里登坡陁極榛翳臨車飛礮動在耳眼嘗指而慨已而以喜而泗州又能清謹愷悌祝其神明以養其志慮休休焉不知其将耄古之所謂陶唐氏之民者於韓氏見之矣中都之士咸美而賦四明袁桷為之序張氏宗譜序宗以族言斯古也别以為宗記始也大宗非諸侯之制也居小宗而遺大宗自鄭氏大記之釋失之缺其大宗小宗乎何取然則曷為大宗也大宗之法不施於庶昆弟謂之别者大夫學士悉有宗也天子以國諸侯以封世守其祀莫敢為宗下于庶人而言宗焉遺其大宗不可也大夫士有常宗由大宗而為小宗小宗不可以承祖故分而言之小宗之嫡斯大宗矣此繼别之義也張氏之各得為宗也奈何張譜始於東平東平其大父善也東平之長子禮為豐縣丞豐縣東平之大宗也其季義居於東昌死復𦵏焉有子五人長曰叔温為髙沙屯官東昌之大宗也古者適於他國皆别為宗國一而地異别之義斯近矣張譜䡍於兵逆而數之首豐縣之禰悉張氏子孫更數十百年宗不能易也髙沙之禰居東昌合豐縣為小宗始髙沙為大宗宗各有别尊祖之道斯備矣張姓出于姬至周而氏著祖于韓其得望者十二曰襄陽洛陽河東始興馮翊吳郡平原清河河間中山曰魏曰蜀東平譜祖以上名不得而次合賢與貴侈而書之失近據逺譜其疑矣惟貴與賢不偕同也誠貴矣非賢不能傳使果賢邪雖弗貴焉可也張氏之先墓隤於河族厄于逃今若孫若曾咸曰别為始者猶邇也至東昌而復别何敢忘之太和之季叔恭敬父則曰為譜辨宗百世猶今也且昔之不幸吾猶慊恧焉噫敬父之心思而深肅肅然念其先敏儒以自持其興也於是乎在敬父今為宗正府左右司都事大徳丁未作亭于東昌之墓旁表曰宗會翰林學士廣平程公為之記太子文學魏郡元君復初系之以詩而俾余為譜史官袁桷述廬陵羅氏世譜序黄帝二十五宗距唐堯猶未逺世系昭穆混錯若不可考置而不論者謂其詳不可聞也禮莫詳於周展親别宗强本弱枝之慮品式備具不數百年難生於所親兵車日尋卒之顛覆僨絶何也其所以繼之者非其道也禮生於人情貴貴親親禮之大經繇貴而失親聖如周公猶不能以制宗法之不講所由來舊矣後漢鄭康成謂諸侯之别子為大宗自大夫士而下皆不當有由是常宗之法廢貴為王公其所以承攝者止於五世鄭氏之説誤也譜諜學廢姓氏殽雜獨孔氏子孫更數千百年厯厯可紀而姬氏享國八百餘祀秦漢之際已散䡍僅存後王盛衰抑無以議為矣或者謂孔子垂世立訓貴不以位故其所傳久逺然考諸傳記蠻夷小邦率一姓數十世噫立禮以辨位位尊而益争昔之聖人夫豈不知其有是哉消長之理相尋於無窮其不可詰者數存焉耳矣廬陵羅氏譜繇唐至今為世凡十有五為𣲖凡十有八旁行邪上如指諸掌合職方氏小史之記貴盛累葉者亦莫能並統宗合源一其所尚必有其道参差不齊物之理也先之以孝謹終之以卑讓黜爵貴徳雖百世可推也桷也公侯之子孫因羅氏之譜諜将有感夫昔時之興廢企焉若不及而終之以自勉者亦羅氏譜之微㫖也延祐丙辰八月史官袁桷序臨川危氏族譜序姓氏之學魏晉以下無稽焉歐陽子作宰相世系切切然将私其親然卒數世亡䡍是則凡言譜諜者缺之焉得矣氏族混於周之東遷祖以為氏猶之可也别族改氏因其官簿以相沿襲益繁多矣繇是為賜姓為缺文一氏而兩望同源而别𣲖至於推律觀物慕風嚮化雜然而前陳其避禍者託焉以自逃承宗繼絶漫不可考竄易傳㑹紛然莫能辯者數千百年皆是也宗法之不講所從來久謂百世不遷者徳如后稷也斯可矣后稷而不能則凡為吾徒者得無懼乎孟子有言曰君子之澤五世而斬均小人而言之何邪昔之親盡葢見于孟子然而私淑之道充孟子而能為之者吾於危氏之譜其殆庶幾矣夫逺而不可明者理之常也究其初以合乎貴賤貧富其心博其㫖微将使夫困者通盈者持危氏之盛循環無窮於是乎有考焉是矣維漳州大夫於桷曾大父樞宻越公同淳熙進士同一科同著作同為番陽文敏公之門人其弟南昌君族祖正肅公實銘其墓桷來京師族孫有成嘗曰兩家疇昔若是譜非子叙不可不幸有成卒其弟歸其骨于臨川遂不負其言而序之熊西玉文集序粤昔以經賦科進天下士有司崇尚日異辟雍居俊㳺尤為凖繩音節程度更創迭變雲翕影附各以其伎進拘者輙困躓不得上方是時蜚英溢行為時所推重連百州之地不能以什一數邈音聲之近絶師弟子之敬和筆繕扎傳誦不止其好慕實使之然也當咸淳初江以東言熊公焉余師剡源戴公言為同舍郎時學官始授題熊公據案瞪目鉤深摘微落筆澄澈理融意新蠶則績而珠纚屬也未幾失仕東歸沉𡨕簡編空林窮厓之怨横溢間發而安之有命不憤不悱猶昔日年壮意盛之所作擬諸於徳殆其微與噫陶唐氏之亡厯年滋多精深憂思愈逺愈在極周陵遅諸子相繼有作是則先王之澤不可以一日冺自漢而下殆無以議何則理不勝弊焉故爾夫弊不極不足以自振此强仁者之所宜知嘗聞公閉門盡心索六藝之藴以極逺紹後之學者是宜有考故不知其不能而申其説命序之者實壻張拱辰氏也陳元吉韻海序近世儒先以韻書首於江左其理未竟論者疑焉夫聲與韻文字之自然童歌巷語肇於唐虞旁叶偶傳與君臣賡歌相表裏非若今世拘拘然以清濁為髙下論也小學廢已久言六書皆本於許慎或者謂揚雄太𤣥竒字與許氏不合皆其私臆殊不知屈氏而下若司馬諸賦其不易解辨豈亦其所自製故昌黎韓子謂凡為文冝略識字則世所謂許學者茍趨省易實秦相斯之學也按魏李登始為聲韻増益衍廣實原七均七均之説成於江左江左之文綺而萎其於韻若法律為師條分目析錙銖之不可混也降於隋唐守其説而莫之變能變者宋惟吳棫氏今世所行唐韻博極羣籍之要見於其序而近世附益終莫能已噫學其果有止也邪眉山陳君元吉少以春秋試有司第一南極交廣以㳺夫幽兾之平衍搜竒尊聞包絡攟拾因韻以廣卒為是書名曰韻海班然而居編懸在庭各得其職雖第而輕重之同律吕也屬辭比事春秋之教殆猶其微與昔顔魯公為韻海鏡源集古今韻字凡三百餘卷識者謂其摭華撮要該於理著四庫散落不具而今也卒俟君以成合流納污愈逺愈清至於海者百川之功聚也敢誦所聞而因以序之鄆城馬節婦詩序詩始婦人先王盛時天地萬物之理推變審情者若是矣不幸而大故守中秉徳合於自然憂辱恐懼葢不能以相動也二南之化行於天下未及數百年陵夷變遷首於國君夫人聖人憂之錄於風雅書於春秋後有述作尤惓惓焉以致其意嗟夫乾坤之道相濟以成者也皇元一海宇累下詔郡縣孝子節婦按實旌植是謹鄆城王母其状曰馬氏年少喪夫養姑鞠子纎粟盡恩禮閫户循飭四十年終始不易由是鄉老言于州州上其事禮部繇是得加桓表焉桷待罪太史歲終常㑹以奏書然陳詩以觀史官之職也凡我同志什為詠歌先之以憂勤終之以燕樂足以見夫國家徳化之廣非止為王氏榮也豈不美歟長子質山東宣慰府掾季獻今為翰林院都事云蕭克有字序在昔先民理得於簡易其言動視聴之方不求合於禮而所謂禮者何其日用而不知也唐虞之際黎民時雍至於湯武出而禮益立於是升降揖讓以成其容為之珩璜以節其步武為之弁冕以嚴其首服黼黻有度尊彛有數温柔剛毅寛嚴張弛之教復品節而備具之噫可謂至矣世益衰而法益繁悉刑以防其情民之日不幸者非天之所與殊也俗媮而説龎教不足以勝靡然從上以自治其亦未知其本始焉者也周之衰諸子馳騁激於世者黜仁絶禮以自髙急於近功則皆苛迫峭刻益莫知其所措聖人政刑徳禮之論幾乎其息書曰臣人克有常憲解之者曰憲猶法也奉有其常者也民之初生淵乎其仁詩書禮樂造士之具也不由是而推奉法以為固有夏后氏之世吾誠知其不若是也廬陵蕭御史之子憲其師黄君字曰克有請其説於余詩曰天生蒸民有物有則克有之義備矣假於外以為常将失其所謂由己之道修其由己之道莫若乎禮故余先言其得於天者如是而復以學禮之説告袁氏舊書目序袁氏舊書目者目袁氏舊書之存于今者也始曾大父越公舉進士時貧不能得書書多乎抄强記至用髙祖妣齊國夫人魚魫冠學書後官中都凡二十有五年乃務置書以償宿昔所志其世所未有則從中祕書及故家傳録以歸於是書始備矣于時國家承平四方無兵革之虞多用文儒為牧守公私間暇撃鮮享醴㑹寮屬以校讎刻書為美績至於細民亦皆轉相模鋟以取衣食而閩之建蜀之益其最著者也紹定辛夘公自宥府歸里遂累土為堂貯所得書於東西榮公日處其中客至不復道世事顧嗜陳黄詩擇其適意者手書為編寓物詠歌與道㳺遨休休焉不知其年之将耄如是者七年而薨舊書之傳距于今四世矣桷㓜聞公從學正獻公時有手校九經旁説疑義皆附書左右最為精善欲從諸父一觀而未得又欲合諸父之藏分第為目録亦不果竊嘗謂天下之物聚多者終必散或者早計於未散則庶幾幸有一存之理遂悉藏於山中己丑之灾偕家人渡江以逃袁氏之書一夕而盡昔之預計者乃幸而獲全嗚呼此公之靈有以啓其衷也惟公以勤勞起家其書之傳不幸而不存固當歸之於數其幸而獲存者敢不襲藏心思而躬踐之以求無忘前人之意謹次其本始書以為舊書目序袁氏新書目序余少讀書有五失焉雅觀而無擇濫閲而少思其失也博而寡要攷古人之言行意常退縮不敢望其失也懦而無立纂録史籍之故實一未終而屢更端其失也勞而無成聞人之長唯恐不及将疾趨從之而輙出其後其失也欲速而過髙好學為文未能蓄其本經術隐奥茫乎其無所適從泛然而無所闗决是又失之甚者也夫為學之道用志不能不一用力不能不専農夫莽而廣種不如狹墾之為實也工人泛而雜學不如一藝之為精也往者書未模印時争傳冩授讀較余所藏之書不能十一而士以三年通一經其自得之實皆足以傳世垂後其視余之書多無成者豈古人所謂沃土無善民之説與往年春書燬于火偃仰草茇所失物不復追憶而於書獨不能忘懐已乃思前之五失一旦而悟将從事於内以求自得之實其年夏大人過故都復購遺闕篋載以歸意者斯文之富将過乎昔而余又思旁搜逺録侔夫昔日之藏矣噫年未至於壮其五失可以亟改也而古人之志余亦竊有慕焉用識吾過以為袁氏新書目序首文子方安南行記序始余讀載記帝王疆理不盡於衡山而虞書致日廼南極交州是則要荒不責其貢賦使者雖歲往返亡害也馬伏波議兵法與建武帝合勞民入於潦霧蚺蛇之地其得意自叙反不若賈君房建罷撃議時俗升降略地定功後王所尚者然與唐置安南都䕶府獻令鮮薄同羈縻州開元詔太史測天下晷交州為南履凖事與唐帝類不聞其有僭拒事也萌芽侈心承詔㫖以肆誅索一不得意而曰損國體者是誠盜臣也已世祖文武皇帝神幾洞察不加以兵而安南畏威不敢朝終五世削王爵以奉貢今天子即位頒正朔議遺使於是文君子方拜禮部郎中為使副以行辭命専達儀注品節唯子方是毗入其境不旬日卒致命以還稽諸往使五十年所未有也還都示予行記一編夫誦詩専對夫子之計也予於書獨有取焉宣上意儆有衆誓命焉有考山川導别表土俗以宜于民莫詳於貢書至若贊帝徳以傳示永久是非史官不能子方以論譔奉使事三者将兼而取之誠於詩書殆相表裏矣蠻荒首長俾知夫中國有人焉者其自子方始窮極珍麗媚上以營夫已者子方不知其説也是宜廣梓以告于後之使者云年月日袁桷序白季清母夫人受新封詩序春秋經錫命之制復王以品秩益展其追榮倣古則今至于是大備今皇帝嗣大厯服桷時在翰林得與議典章儀注僉曰勲爵古制以人子所居官褒崇之罔俾専美于前代定其格入奏皇帝曰可輕外重内非廣孝道視所居官咸大賚之詔下皆叩首望闕謝浙東元帥府都事白君湛即以其所宜封者為母盧夫人請于朝得封太原郡太君盧白皆中原望族盧以父詞鳴翰林白氏再世持雄辨清言氷雪繅藉聞者莫不興起若是者尤足以振耀也噫世之崛然因其夫與子蒙爵命者多矣未有若盧白之清望足以厭服于當代恃其世家白君之所不敢朝夕温凊陳白其所行事秉心以公張弛興革孰不曰是真世家彼夸詡者誠不足為兩家重也郡之儒士相率為歌詩以贊俾桷首為序泰定元年冬十有一月前史官袁桷書甬山集序文章與時為髙下誠哉是言也宋祚将亡國學考文其悲哀促急不能以一朝居四方翕然取則凌躐上第至今殘編斷牘讀之令人歎恨不己葢士生斯時能自抜以表見者不一二數有一人焉則又韜匿冲晦與世若不相接始予少時見三江李君在明于史塾其貌癯然其語汨然僅知其為長者也下世十餘年子汲以所為詩文十卷號甬山集相示貫穿籠絡悉本于五經之微㫖而優柔反覆羈而不怨曲而不倨藹然六義之懿宫商相宣各叶其體情至理盡守之以嚴無直致之失世之號能為詩文者率不過是較一時之輩流實居其最惜乎昔時之承接不足以知其萬一也維昔秉義公以盛徳燾裕世科聨踵今五傳矣論其詞章則擬於先世為有光汲能廣而傳之惠於吾鄉俾其子孫得以遵守豈不韙哉泰定二年冬十月袁桷序蓬萊閣詩序㑹稽為禹㑹諸侯之所自嬴政一登而其山川之勝迄兩漢孫吳莫不表章或者謂當是時征伐蠻粤為用武地而士大夫在朝廷簪筆執牘以奉天子之㳺宴顧安得從事於荆榛險絶以暢其耳目哉惟太史遷出於流落不偶以至而見於賦詠實自東晉始方王謝諸賢南徙渡江北望丘壟其悲離感愴不在於仕進故其意念殊絶搜竒抉幽樂天以俟命而㑹稽號為南鎮将騁懐以攄其所尚故今之言㳺山水實自㑹稽始繇是而降㳺者益廣而専牧守之任者得有而畢具矣元微之以觀察使鎮㑹稽所辟幕客皆知名士號為絶倡後人作為蓬萊閣葢取微之詩語唐宋鉅作悉刻于其上雲内王侯叔能父蒞是邦政簡訟平百廢俱飭復閣之舊廼曰昔之諸賢意必有在登斯閣也將見夫同寅之肅和寮宷之靖共飛觥撃壺以彷夫微之昔時之盛巖壑交暎神閑意消不苛刻以暇豫彼俗吏瑣瑣夫豈知是也哉同郡儒士合賦詩若干首桷與叔能同官于朝審平昔清静簡易之論於是乎見雖老尚能為之賦之泰定三年正月甲子清容居士四明袁桷序馬氏族譜序譜以逺言懼其非吾祖也以近言有悲吾之不得已也金徙于南衣冠故蔟扶挈僵仆十失其九者有焉百不得其一者有焉難甫定遺童孤兒想像先人之容儀音聲借得於髣髴推名諱至於祖則有能言者矣上而髙曾不復有能言矣余嘗攷夫譜諜之書秦漢以後牽强附㑹世表姓纂僅取其近侣作史者不得不爾凡為子孫者罔敢以是為傳信河陽馬氏葢皆昔時之望族今元帥公知夫髙曾以上之不可以譜遂斷自其可知者為之旁行側注官位名諱以明其始卒葬年月以慎其終用意𢎞逺将以期其子孫之日盛嗚呼百年之計莫先於徳徳愈種則見於後人者不俟而自至晉丞相王文獻公導渡江始立家譜不及三世而蕃衍盛大史不絶書馬公之意葢若是願相與勉乎哉則得之矣泰定二年七月乙夘前史官袁桷書鄭原善思親詩編序鄭君復初舉進士之嵗時維三月值其嚴君始生之朝作為歌詩而終之曰移云自兹其立志誠逺且大矣夫仕莫不榮其親仕貴矣所尚貴乎自立不爾則其於貴也乎何有故昔之學仕者必求夫大賢者之格言以佩服之若鄭君者䇿名未離乎都門超識逺抱先之以不苟若是余嘗於殿廬識之冲然其容介然其操審必能有異乎衆也暨余還里咸言其在官也竒衺不入於市貴俠不登於庭盡職而無所顧避是其所蓄足以行所願矣泰定元年秋八月同校文江浙始見其屬和者凡一編嗟夫古之果於正誼必寜夫親而為親者計其詘辱将與之同患難而不之避故載於史傳者不一鄭君之志見初筮敭厯既逺聲譽益振始信夫家庭之教在乎夙昔誠不在夫今日也因申其㫖而為之辭丙寅歲八月壬辰袁桷序周彦祥存樂堂詩序往者淮甸為南北要衝耕耨不足以盡其地力彌望數十里皆草屋星散髙下每歲春秋避兵輙土窘稻麥老稚潛匿叢薄中丁男健婦守舍相偵伺黄塵翳天猶能在旁近結集保䕶卒然有相接持梃箠盡力以抗其甚不幸者則皆係累長驅䘖車逐馬故凡淮民之家子不識其父弟不知其兄因循茍活慈孝恭敬施於家庭之懿者未能也吁誠可悲也夫世祖皇帝一海宇淮始為樂土今四十餘年昔之父老言昔時之事未嘗不先之以欷歔繼之以幸喜野無閒民而詩書庠序之教駸駸乎雍熙之盛廬江周君彦祥於是作堂以奉其二親而名曰存樂予嘗以為生乎今之世有幸不幸存於其間故其愈後者則愈樂而生乎其前者若彦祥之二親是也彦祥之奉親當補其昔時之不可致推彦祥之年亂離﨑嶇猶耳接而身受至其諸孫則蔑有知之者噫豈非愈後者則愈樂然則彦祥之心所以樂其父母昆弟者可勝道哉太學博士姚君為之記善為歌詩者将别為一編廼首為之序彦祥今為某官白鶴詩序泰定元年春二月有㫖醮於崇真萬夀宫特進宗師吳公主祠事越四日有白鶴三集雲中指殿前五日復至旭日晏温執事有恪皆承睫仰視一口賛慶士大夫各為歌詩以侈其異嘗聞禮儀神明之事莫嚴於精意而諸物之畢至良係乎聖徳之通感惟今天子踐祚之初詢賢考能歛福以錫庶民籲天請命實不私於已祠祭之事遵叙以行罔有偏好昔漢宣帝勵精圖治嚴蕆祠事時則有白鶴集于廟庭異代同符稽諸行事實過於彼而祝釐奉祀以承上天者罔敢暇逸吳公葢有之焉絶地天通昔之聖人将以止夫禨祥之説天人之際合於自然葢有不期然而然者不然詩書所稱其得而廢之與詩若干首遂為之序春臺詩序老氏之學以澹然無欲為至道故凡人之所同然者以激言以相反至於榮觀燕處其徒日廣其説則曰吾教必若是侈靡盛大浸淫於天下其言曰如登春臺彼嘗非而鄙之今考其所為若不相侣視其言者吾猶以為近古也延平余君惟熙於是取以為齋名焉昔之盛時淳厚給足充然樂其身非直為耳目之美觀日作夕息相安於閭里康衢之謡撃壤之歌其教易行也今海宇一轍户口田野休養蕃廡涵嚌聖澤庶幾時雍之治惟熙慕古於是乎得之矣理適乎中人情之同随物而遷者過也極枯槁禁制以為至樂矯然者也惟熙嘗為威茂安撫司僉事今屬國史府通敏守禮推命名之雅其将樂夫天年同衆以求用於世者與集賢大學士郭公大書其户冊朝之卿士咸為歌詩曹伯明文集序江西之文曰歐陽王曾以慶厯以來為正宗舉天下師之無異辭宋金分裂羣然師眉山公氣盛意新於科舉為尤宜至乾道淳熙江西諸賢别為宗𣲖竊取國䇿荘周之詞雜進語未畢而更事遽起而輟斷續鉤棘小者一二言長者數十言迎之莫能以窺其涯而荒唐變幻虎豹竦而魚龍雜也嗚呼三公之文其思厚以深其理精以正凌厲乎諸子貞元而下曾勃然不肯自讓後之人懼蹈襲之譏卒至於濫觴淪胥而莫能以救可勝恨哉大徳中桷與端明曹公之子伯明甫為翰林屬其為詩文如桑麻榖粟切於日用不求酸鹹苦澁以傷乎味之正篤實渾厚與其履踐見於事物者實相表裏夫行以為先言實次之言不勝不足以害道翕翕夸詡含譏以射人者猶懼其不解方手指其説曰吾意葢有在若是而罹于人禍者多矣伯明以親老再為編修官補外以去幾二十年來京師為文若干卷得而讀之其哀窮舉躓略枝葉之學㫪容雅馴以循夫規矩它不能以詬病也夫慕其輕浮而欲求侣於瑣瑣者伯明之所不忍抑有聞焉老而能學吾二人之所宜繼炳燭之勤願相與切瑳焉清容居士集卷二十二
