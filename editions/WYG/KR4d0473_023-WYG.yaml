body:
  text: 清容居士集卷二十三元袁桷撰序送鄧善之應聘序近世先達之士類言求進于京師者多羇困不偶煦煦道途間麻衣弊冠柔聲媚色無以動上意其言若諄切懇􅍁後進之士懐疑而不進百以十數然遇不遇命也而言若是則抱道自足者益無志於世而或者亦得以窺其介且固焉夫道成於同而弊於孤雲龍之相從風水之相應其理然也往歲余與巴西鄧君道所以嘗以為今世無是决矣吾徒當力學為已閉門息心耕六籍之圃溉根以茂實若古逸民髙士退静自樂其於道也無害方是時君家錢塘囂塵五達之衝意寂而體舒無造門囁嚅之勞下帷授書衿佩森立公卿貴人皆傾下愛慕獨君無少矜喜而去來朋徒各盡恩意以相周奉其有不可强猶謙挹慰藉人咸以為其未遇也已異夫褊心者之倫則其遇當不止若是今年春承徵将如京師告余以行余固喜夫人之所期者有驗而其行也復将有説焉君子之出也大言以行道者夸誣之流也相時而行守身於不辱謹徳避難貞白而無愧斯近之矣方今食太官衣御府亡慮數百擬之漢世為盛吾意秉義懐仁之徒道不相類若貢禹之經明行絜區區車馬之對亦若無可取者苟不以是進則其氣昌而愈完行周而無躓於得喪益無病矣夫處順者逆言莫能入嗜味者腊毒無終悔予與君疇昔相好無所隠思所贈之誼而宻以告焉送曹伯明序議者謂故家世官陽明精絜之氣極于簡冊溢于圭組盛衰消長始相尋為無端焉嗟夫豈誠有是理哉百尋之木上干雲霄盤礴惨舒履之而後至其風雨雪霜之變適其事㑹理之不可詰者誰得而辨而茍一時之得失以自詭吾未之信也士患不自知而卒病夫知者迄莫可究至於凌髙躐深惝怳疾進幸其安肆顛越而莫救則豈其父兄之過至不幸糜爛墜覆與世為始終者要未得以成敗論也廬山曹伯明官翰林十有二年始為編修官議當叙遷曰愚名居先願以讓秩再滿則又曰大夫人春秋髙願補邑以行吾知其盛衰消長之理炳于胷中確乎不能以易者也維昔從祖文簡公既老來朝翩然東歸位不充其徳未幾先正端明公敦知止之誼慷慨力去邈乎髙風趾媺不墜謙以居之仁以成之振世德之緒使議者之言不出乎口其自伯明始因其行序以識之送范徳機序四方士㳺京師則必囊筆楮飾賦詠以偵候于王公之門當不當良不論也審焉以求售若乗必駿食必稻足趼而腹果介然莫有所遭夫争藝以自進宜有不擇焉者心誠知之孰慙其非故幸得之則歸于能其不得之則歸于人惕然而自治吾木之見也臨江范徳機㳺于兹三年矣語焉簡然行焉恂然嗇其菁華韜焉以深視世之言文辭位貴重者靳靳不自表夫子曰道不同不相為謀范君誠審焉抑不可知使不可知則凡辱與㳺者責莫能以辭也君所為詩文幽絜而静深怨與不怨皆存乎天慨然南歸善治其學彌謹所徇使果擇士耶無以易矣譬之璞焉蓄極而光遇寜有不遂者乎惜其行解以俟之送周子敬序温與閩地犬牙相入俗秀而矜絜子弟勝衣能文詞父兄相與言命束装負書以行四方劘切感動約不有所就不復見故凡困于有司則適從諸公貴人職牋記劇談論翺㳺以自逞其横厲捷發者讀太公孫吳書櫜鞬轅門建功業萬里樂生重遷卒無所思其故土然視閩俗為最少噫弊成于過髙安其所常義不能以自勝恬不知改積數十年來蔑有以議亦固矣當咸淳間周子敬以治經㳺錢塘聲至士趨未幾而科舉絶來四明授業于嘗所知己南望數十驛每悒悒不自置罄囊槖以歸拜其家君焉得奉終于其家夫情合於中情至而不從者非罪也縱情而不返極其所從於理乎何有始於榮其親終於私其身漠然而不接兹惑滋甚視子敬之道得以愧矣子敬将終老于吾鄉棄其田廬畀于季弟以奉先人之祀今年夏季弟疾亟貧不能以行天台趙叔度官于温載與俱歸審其心於季弟友且怡也桷與之交最深慕其静安絶毫髮偽妄蒼然長身風雨一室無子弟佽助而清韻雅語舉觴晏如與之違寧無介然者乎今歸于家其耄者必曰當終樂於我此土也㓜者則曰先生老于行悉于事某聞某戒願執簡以受去魯之意吾未知所决也化民成俗之道必自上始因俗以徵其謬子敬其何遜敢俟而質諸送劉習卿序今之為守令者據文法以具事事弊而法具雖更百吏焉無易也事當而文不具一撓詰之齚舌無所對歲部使者入境吏曹取舊牘相考訂附益完善至名押善題署恣所補不復問使者坐所治决事搜擿十不得一二然皆毫末靡細於政體不相涉故稱能吏者或以苛察議噫徒法不足以致理任情而失實故先王為法以禁其過久而繁滋則審於治者簡而易之使不病焉斯可矣大徳丁未浙東西以饑告殍移日屬于道官㑹其數于郷将賑活之其不實者究焉鄉登名于縣縣審而始聞于郡郡以事至重闔郡寮以議其一以故不預則旬月以俟廼得達部使者部發使於鄉復詢察而周詳始定其議令如夫幸民之饑乗而弊焉者羣下之過也因其弊而持久之則民之死者日益甚法顧安得以救有司者之意夫豈不知是拘於文狃於故相安而不改其勢然也今年夏中書掾汴劉習卿御史府舉為浙右肅政從事習卿精敏簡廉與余議古今事嘗欲以無法為法其施張而品節之者必中理道至於條據辨析灼與繩墨脗合向宦江南洒然無俗吏意據鞍賦詩危坐終日一語不及律令今從事職掌號總所部為至重故余舉今之所急者以告俾毋汨於常而變通焉彼瑣瑣守文者又烏足與語是送祝道士南歸序世祖皇帝取江南首詔召龍虎山嗣漢天師掌其教或曰其父觀妙公嘗推天人之要教繇是尊元貞制書嘗言之今上即位歲以天夀節命使者祝香于兹山延祐四年天冠山道士祝君為祠官将行求予言以餞噫盛衰消長相尋為無窮禎祥之説儒者之所不道守經執中則必一其説以立教然而窮居巖穴之士精思據㑹其為書也幽明簡深由變察來使之黙焉以知畏将以定夫天下之象夫豈荒忽以眩於衆理有所不能逃焉者若是矣老子之學法於簡易陰陽闔闢必本於其身因身以及物故凡水旱疾癘必責其徒其徒則曰吾無為也何取是若是則其教之廢也久矣昔先正肅公守饒觀妙公始十四五以禜祭上章入静室正肅公嘗與之論天運環合之道觀妙公愀然有言曰公老不復見當在四十年以後于時族祖永州親聆其説亟言之龍虎由觀妙以興祝君多藝能沉静篤志其歸山中正辭永命予不能以告敢誦所聞願有以推究則世人之所深望将不憚煩豈若彼大言者飽食自嬉以無聞於後姑勉乎哉贈宣城汪澤民登第歸里序今世論道理詞章為二塗師道徳之説者毫分縷析派其近似而刪黜之其言博以約據㑹統宗謂一足以總萬也然懼其辭工而勝理則必直致近譬山林頽放諺俗之語皆於是乎取甚者金石著述勦其説而師倣之莫得有議焉者矣昔者夫子言行見記於門弟子簡絜精粹嘗並於五經初非有意於辭也謂不若是不足以有傳也性與天道不可得聞私獨怪近世學者参錯輩出過子貢十百倍将惟其所尚而然邪抑羣聖之道存於書涵泳濡嚌不期然而能者歟科舉廢己久今天子崇闡文治損益條制以興其賢能八表之士連軫結袂于然以來然而沿襲之弊相尋於無窮愛憎之説若不相似宣城汪君叔志首上于春官報罷以歸則曰吾學未至焉耳探幽闡微遂益治其業戊午歲復來京師擢乙科授同知平江州以歸則又曰仕優而益學斯可矣将行求余贈言以歸余固感夫二者之不相同也綴言以績文将以明理也理不自得剽襲以求之文益弊而理日益逺将焉以為凖興之以化成天下實自有司始操繩墨審程度有司盡之矣合八音以成律吕師曠猶難之噫有司之任其果能有同乎維昔端明公誥命擅天下制作具備集衆美之效也慶流雲仍叔志之踵傳科于今十世矣志専而氣昌異於凡近其異也必能以復古家世趾媺莫叔志若也故余以昔之有疑者告之而因以勉焉夏四月越袁桷序送吳成季歸省序噫吾徒來京師視成季有三愧焉居京師者不宜以塊處蓬蓬然結鞍整袂惜日以進其不能是者目以為固野成季則不然閉門展書視日蚤莫氷渟而川止也達公貴人語未脱口納柔奉佞千巧百詭成季獨正色指畫朗言某事未當至論天下休養大計龜灼繩直聴者唶舌方疾趨以行不勝其愧成季㓜為方外士常所置論必曰吾父母皆耆年矣惕焉不得以朝夕養而吾徒将捐棄尊愛荒塵敗屋啜蔬飯糲業官以為生如無所容歸若是者愧之大者也今年春承詔如南得省其親樂不能以已而懐愧者亦争道而交賛夫人之情於道不逺極其所騖而卒莫之救化之者不足以導歟将人事之未思不復以致此歟唐之陽城語若鄙近薫然而歸養者凡數十人何則機使之然也儒於道最髙力不勝其弊則成季之出處吾當疾馳焉從而慕之整轅於四達之衢斯得矣又何愧焉因其行序以侈之送達兼善祠祭山川序古之為使者亦難矣哉存撫省聘諭言語協辭令必盡其誼嫚有致辱之道焉情則媮簡則侮約而有常敬以成禮斯其為使者之事矣然此特平世而言之也飛矢旁午國懸於三寸之舌操機以析明輕重推情偽定議於瞬息使不亦重乎哉奉天子命持節萬里外懾之而莫屈而因事専對宣威布徳函首入覲非夫勇智超絶不足致此厯千百年數人而已矣吾嘗觀夫列國諸臣禮以定儀言以叙志結禬執玉若合符節而其諷諭陳白足以截其矯泰蔑有敗事非强辭以言是其夙昔之所素備夫子之言曰専對不能其警夫四方之使與皇元一海宇偏陬逺島蹙縮候賔館無事於使者而歲以祠祭使望於山川分道四出其為使也若甚易至治三年集賢修撰達君兼善以使由恒山濟源東南上于㑹稽吾於兼善有言焉恒山古真定地也二河交流濁漳貫其旁郡縣築防歲不得息或言有運河在焉民居墊蕩冝詢其俗而條紀之濟源在懐州懐河南地相接昔之括地興賦民不勝其害河流靡常空灘遺磧墾殖以自肥者其誰與㑹稽杭相襟帶粟帛絲布丹漆綺繡之作倍於他郡竒衺夸誕故都之習不能以革獨㑹稽山水秀朗民朴案業往承大饑荒壟彌望猶不能盡耕昔有逸民戴安道賀知章其故家曰王謝能有若斯人者冝表而出之悉䟽歸以俟明天子之清問則得之矣因其行故序以告之送曾㢲堂南歸序景定中樞宻東陽馬公帥臨安先子職酒正入幕府于時廬陵御史曾公相後先佩鳴纓彯剖吏牘若破竹俱欲以功業自致運數合一兩家子弟東西數千里過庭入塾志同業同而僕適先為史院屬㑹御史仲子於京師年富志鋭屢䇿焉以儆不能止也皇慶承徵入翰林復㑹季子焉氣清貌謙不為汲汲計嘗曰仕以傳世岌然以取誚誠不敢平進以求而猶曰未宜吾有不甘焉今為應奉文字論者始歛口葢其為文敏而新其待人周以和夫孰曰不宜春三月謁告盡室以歸求言以處桷曰今居顯榮清宻者凛凛不自置名至矣文不能以稱文不能以稱造物之所不畀於是乎有覆絶之憂焉􅂱然以興萎然随之是則得者失之兆君何憾焉桷官翰林踰二十年老不戒止念之至者滋以懼将歸故山究五經之藴為書以蘄逺文詞之任老不能以進炳燭之勤願相與勉焉泰定元年三月四明袁桷序贈崔兵部序髙句麗崔君耐卿往督征税於京師不私其餘以進于官既又懼為後來者之莫繼焉則慊然曰吾豈為奉上之罪人哉復疏以告于上曰事適然願勿以為程數噫崔君仁矣哉今世善言利者督括虚籍峻鞭朴以求媚嘗諰諰以告吾所居官能贏餘以自效當升夫資秩相率以效朘削日廣而其徒争不肯自置其猥闒者則攘臂以取不顧利害其弊有不可勝言者今崔君兩得之不希于公不病于民絜矩之道至而儆夫在位者皆得以同是道也崔君往為内史府官見天子于王邸大器異之今即位首拜兵部員外郎兵曹之事多於昔飛符調發水陸之需頃刻在立辦寛則事不能以濟稍苛急民之病有甚於専征之弊崔君推昔日之心明以核之仁以怒之政績之著有踰於昔将步武日躋廣經濟之志不愆於素守桷也願拭目以觀因志其美以俟焉泰定元年三月癸夘四明袁桷序送王叔能守㑹稽序桷與北京王叔能交幾二十年其贊行省於江浙也盡心而不苛合上下之情婉而且加詳焉弗亟以邀美弗因以逞志執政宜之寮寀服之至治元年丞相慎選左司之熟於政體者叔能在選為都事英宗皇帝更庶政除前相所行不便事下詔天下命御史臺樞宻翰林集賢集議桷時得預末席叔能首言江南兩税已定復增賈區銀賦賈無常居賦重即逋逃今徵額籍具使無能輸将併於主户主户既主徭役是徭役之外别有銀賦将不勝其害羣公以為然新詔既下取首建議為多古之善言利者莫先於劉晏晏所行不至急刻而晏迄不善後是興利為害身本也躁於求進卒之自唐以來如晏者皆無以自保吁可無懼哉叔能世居燕比而樂於江南於江南厭其囂煩而樂於山川屢丐補於外宰輔察其志奏守㑹稽㑹稽王謝之所居泉石清美有不可勝道逸少安石經世素藴託丘壑以自負葢深取而有擬也昔之陳迹按行而搜摭之舉觴以酹其訪於民俗也不察其毛疵事至而應無欲以自化将見獄空訟息少者避於道老者㳺於衢撃壤以歌沐太平之治郡守之賢必以王公為第一矣因其行序以祝之贈孟久夫南臺掾序世嘗病夫儒與吏其道不同卒莫有一其説者為吏者曰法定於後王微忽不可以相混也徵調出入官簿淺深不可以踰越也童而師之猶不能以盡今儒者之説急於所緩髙而迂滯而踈卒一遇焉吾深知其莫能成事矣儒者則曰法有不忍人之意也審官别人制用有常沾沾然迎好以刻意非為治之本也然而為儒者莫有以見於用間嘗用之其肯綮節脉融貫昭晢之理疑有所滯而益得以藉口吁是誠難矣今天子崇尚儒術立進士科昔之舉茂才者咸試吏以盡其材智憲府舉按守令閭閻纎粟令式髙下日接于耳目果勤而敏修若視鑑焉瞭其妍醜無有逃遁於是儒吏之一倣自今始吏部從事孟君久夫以茂才舉者也兩屬于司憲復辟御史府矜抑自将盡其亷隅入吏部朝夕謹曹事人莫有識其面遇事守令甲不踰越旁暢曲就藹然猶守儒素吾知足以有用於世矣未幾江南御史臺復辟為掾将行袁桷告之曰御史臺職諸道黜陟歲終㑹事以亷直舉者不能得一二人黜者何多陟者恒寡激奨之道豈上有所未備邪守法而不變視其成牘惻然以求仁善人之用心非隳法以為直也州縣賢否孟君嘗知之矣執中以權使無偏焉亦儒者之説也故重之以言崔君都事餞行詩序今之言賛畫者以摭拾為能羣吏抱成牘入幕府一不可意輙曠日相持不决由是揣摩迎合弊有不勝言者矣昔人之善吏治事决於頃刻理定於造次安于其自然人莫能有以為非者心出乎公也海右師府事號最簡其治於民者七郡之守令係焉寓於軍旅總戎夫長之職任焉今而曰某事所行吾将諭之以從我又曰吾不能坐視其利病更謁迭請繇是有撓政侵官之譏雖不面議退而悉數其長短者皆是也夫其職在於奉行先之以更張上所增疑而下益得以議是殆昧於守官之道矣大名崔君義甫之為都事也未明攬衣坐署執筆無滯礙其不便者白於長官從大府以行一介之卒不入於所𨽻敦厚侃侃守正以自律其紿之者謝不與較養恬藏智閭巷之人不知崔君之賛帥府三歲解去而其不知者始曰詎不知崔君無囑託於州縣吾是以不知今而曰知殆惜其去而願後來者之與崔君同也噫功利增羡人所願學每率得竒禍而猶接踵不悟視崔君所為其果有悔乎郡之文士相率為歌詩以餞桷遂為之序贈陳太初序戰國之士以雄辨長説㳺諸侯立致卿相故其髙自譽道無所顧藉雖困躓有不肯悔揣摩相師遺言成編今七十二子之書皆足以為㳺之具也漢世尊尚黄老㳺士屏息武帝開絶域於萬里外㳺者復至盡其足之所厯圖冩險阨立功效能以其荒怪異物輸于地圖而口舌之學悉廢與戰國之㳺有異矣南北分裂㳺不越其國㳺之效不能以著唐立科舉各挾䇿自奮窮山水之勝履危陟幽則皆其羇窮不遇之所為見於詠歌盖不以為利達富貴也若是則㳺之道幾廢矣宋承唐舊巖居逸士見於聘徵㳺者益恥至於季年下第不偶者輙為篇章以謁藩府京淮閩廣旁午道路數十年不歸子弟不識其面目囊金輦粟求筦庫之職以自活視前之㳺戛戛然難相並矣世祖皇帝大一海宇招徠四方㑭盡計畫以自效雖誕謬無所罪㳺復廣於昔敝裘破履袖其囊封卒空言無當以其無所罪也合類以進省署禁闥駢肩攀縁卒無所成就余嘗入禮部預考其長短十不得一将遏其㳺以喻之㳺者訖不悟朝廷固未嘗抜一人以勸使果抜一人将傾南北之士老於㳺而不止也今㳺之最夥者莫如江西其拙㳺者惟浙東浙之東天台以能㳺稱四明之士不著於㳺録餘五郡間一見之括蒼陳太初壮歲能詞章得濟勝之理西適錢塘復來四明以其藝㳺公卿多深奨之業儒以為本復挾能以自張其寧有不遇者故余厯言㳺者之幸不幸太初之㳺夫豈若是然哉生之髙祖容州府君與先樞宻越公同為淳熙進士於其行得盡其言且命二子為歌詩以餞送俞教授囘里序吾郡教官繇至元丙子以來見於題名者亡慮數十人皆得而接識之其通於綜核者善移易故籍結熟郡守鉗士口不得發歲時表章經説疑義卒假耆舊以陰助誦聲寥寥講授不立不復以師道自任繇是諸生之亡賴者挾短長以剽竊廩稍而貴騃之子弟恃其可侮益得以恣睢有終歲不入于學宫極於弊壊而勸學之詔屢下為虚文矣始余以為吾郡惟然後官京師見教官選于吏部凡數百人罷老不勝任十居其六若吾郡之弊十有三其俊秀博習則皆為館閣掄選各得以自見而所謂若人者十僅居其一焉噫考昔時得人必在教官今不如昔或者謂入仕之門必慎其始故今之為教官不三考已致其事尚何能兾其惠淑之益哉合吾郡之教官得一人焉曰天台吳君宗彦吳以牋記㳺公卿其文辭亦闗絡合時用去三十餘年復得一人焉曰永嘉俞君希魯用中父其屬筆纚麗若錦機然五采彰而文宻也其行温然其容粹然聴其言若飲醇酎而愈恭也論理而不泛取友而不雜余交於俞君不一年而知其所為若是惜吾郡之後進習於故常不能以請業於其行序以餞之為歌詩凡若干併見于後送陳山長序郡博士而下其尊且専者莫若書院數十年來朱文公之説行祠宇徧東南各以四書為標凖毫杪擿抉於其所不必疑者而疑之口誦心臆孩提之童皆大言以欺世故其用功少而取效近禮樂政刑之本興衰治亂之迹茫不能以知纍纍冠綬礙於銓部老死下僚卒莫能以自見良有以也蘭亭有書院自東平王侯始右軍之學非止於一藝也經綸憂世寜不仕焉以見其志審勢陳害瞭然指掌非善於謀國者不能也語必堯舜髙自譽道卒至變易紛擾而莫可救視右軍之行事誠何如哉参政清敏陳公之曾孫鑑翁為長于蘭亭求余以言家世之正學不能以告憫夫世之通弊知長于彼者考右軍之傳倣其所言陳白于太守太守王侯通達國體求儒以自近君有言其寧有不遭乎送蔡府尹歸里序郡守之任亦重矣視其精神為之折衝御扶一不加意吏挾以侮民逞以姦故其食息嘗内省外顧非智與力兩全者不能也朝廷察為仕者之有病於吾民也於是著致事令而其罷軟昏眊不待年而具者朝廷亦不能以限之也余官京師見有請于廟堂自陳其剛强矍鑠雖不之許察其意猶有觖望噫羞惡是非人皆有之若是果何如哉濟寧蔡侯茂先之守於四明也屢引年以請于上考其年猶未至也既而曰吾宜休而不得謝可若何遂移疾家居踰三月始告于其同官及嘗所往來曰吾具舟江滸将行矣於是咸驚且誦曰蔡侯之來民實不知戢其竒哀返于雍熙不苛不黷歲則大熟俟復于所再命作牧自余歸里中數聆其議論明而通相時以行無矯激之過也保其身若是人孰得以議審侯之進退将以為不知止之勸聞于天朝其寧使夫終老于里閭則其去也葢抑将以有進也文學之士是宜為歌詩以餞遂首為辭泰定二年九月丙寅郡人前史官袁桷序送閔思齊調閩府序閩郡縣蓄産饒給仕於彼者咸曰可善更葢其疆理與京師相逺浙為要衝貢賦考工之役使者督責亡虚月而閩獨以絺繡為勞視若重任較二浙為十一耳閩浙二帥府府史更迭受任然後以閩地烟瘴蒙犯少優其歲月隴西閔君思齊繇浙東更於閩則曰不然九州分設唐虞之制也今皇元以仁武函諸夏卉裳重譯罔不臣服幅員倍古限南北取士非上意也立賢無方是則世祖之明訓而凡吾徒之居於南者稍得致通顯輒言財用掇竒禍或言刑法致深文根株排連牢不可破守正修己悉不復自達矣桷曰珠玉藴于山淵採擇者必之夫絶域是寜有逺邇耶世祖皇帝遣使徵聘必先夫江南歲月既逺聞者益荒見者益俠彼區區售技自獻者實不與昔時並思齊敏不自夸百受而不撓精於琴知急焉不足以知操縵将緩以求深懼其為孱緩也考其中聲按抑止泊澹兮若無營激兮若有感是則於政事文學法理於此盡矣蔑有加矣桷老矣遲君之還猶能皷南風之絃歌明月之篇其果有合乎泰定三年秋七月清容居士袁桷序送薛景詢教授常熟序泰定元年吾里進士上南宫曰薛君景詢程君時叔史君車父三人者皆故宦家所居皆在城東志同道同聲聞同意其厯階以陞比肩而袂接也未幾獨景詢下第于時余編試殿廬景詢不以咎而余獨恨景詢之不果遭也天子新即位推龍飛恩授常熟教授以歸将之官求言以導其行抑嘗考隋唐選舉之法不久即弊今夫所謂經義者以知行體用而鈴約之不中不逺經説萃于一家按其形模而脱􅜘焉不敢以自異也有司守固陋而程式之千士一律欲求其總核同異㑹衆美以合乎至論不可得矣賦貴於鋪揚因雕蟲之譏而以理致為長屈宋兩漢之作誠不若是之易也至於考晁董之對則方諸近作有不待辨而明者自設科取士桷未嘗不預議焉嚴以取之則近於隘俛以售之則鄰於率心恧焉以不釋薛君較藝於京師誠知其有幸不幸操車於四達之衢險阻曲直惟御是審則淑於是州者必有其道吾将見褎然秀出者推是州為首是則薛君之教也清容居士集卷二十三
