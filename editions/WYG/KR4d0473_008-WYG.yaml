猶抱殘槐鴈仍驚折蘆滉瀁露莖溜空清冰柱酥或云勢已盡又言理非殊先時明堂嚴薄刑蓐收誅浮華敵春凘斂實侔冬輸慘立各動色沉思儼徐趨鴻鈞轉橐籥緹室潛葭莩觀物昧休徵永歌啟貞符又九月十五日作徳平伯長繼學金神縮兊澤水妃表𤣥英西郊散冰粟北戸垂珠栟三登發重瑞六莖凌孤清白藏縞衣舞顥氣霓裳呈楚客迷望眼羌戎候軍聲桂粉靈杵飛穀精露囊盛降霜鄒子憤停日陽侯争澄霄鶴失頂空江鷺摇晴菊貞返素樸木落超空明鏗鏘商籟諧大小藍璞成蕎花䞉壟畝梅蘂光檐楹初疑蚊蚋集漸覺鵝鸛迎漢盤結夜瀣韓堂滅宵檠陽和趣報社嚴凝儼書正掩袂青女避沾巾素靈驚擊鷹眩莽蒼樹羽登崢嶸長楊散旃屋五纛增門閎絮團桞殘葉鹽裏荷留莖鉛飄孀娥匣旄落少昊旌井梧炫銀牀庭櫻轉珠纓萬入西帝遊六變坤母寜初驚遽然至忽訝乃爾輕單衣亟搗素黄裳倐飄瓊陶姬却帳暖唐皇咽簫横昊天有正命殺氣何横行沈沈宸居肅兩兩台階平朔吹偶先集澤雷久藏鳴碩果理固在飛葭澹無營槍竿嶺伯生伯長有嶺名槍竿其上若棧閣白雲亂石齒青峯轉帘脚積冰太古陰出礦無底壑馬飲沆瀣泉鷹盪扶摇幕轍跡委垂紳人聲發虚槖舄飛接鳥背羽没疑虎鞹霧松秋髮長霜果春頰薄升樵不知疲獨徃端有愕兢兢矛頭淅扤扤井口索凝睇見日觀引手探月廓南下眇塵海北廣絡沙漠金橋羣仙迎玉幢百神鑿禽鳴蜀帝魂鐵鑄石郎錯鈎鈐挂闌干欃槍斂鋒鍔屬車建前旄馳道徇嚴柝載筆三人行弭節半途却送曾編修伯長竒鶴慕南雲俊鶻欣北雪行藏龜左顧去住坂九折纂書墨兵從擬制銅史挈佩委松籟回冠峩星光徹塼花窺日輪井藻旋風鐵歸思紅葉髙家憂紫荆裂晨裝發五兩夕祖謝駟驖沙明石痕瘦川逺桅影列吳歌導鷗舞楚製慘鶉結汀葭青女臨岸橘黄人揭組練危瀑懸簫㲈古灘咽詩箋江神幻目送山君别炯炯鴈集洲挺挺鸛鳴垤賈颿魚貫直僧屐鷺飛滅前坡指迎帽舊墓拜表碣明知紹世譜詎肯逐宦轍兒孤文襁昏女乳粉鈿湼深思振鴒原後𦙍起鳯穴過都塊非厯去魯淅豈接歌驪念睽違瞻蟾數盈缺李成古木層陰舞𤣥蛟積溜落銀繭迸空太古枝伯長側石千嵗蘚寒柯紐交樛霜枿釋餘泫繼學俯憐巖壑幽仰矚雲霞淺雄姿虎當嵎鎩翮鶴立巘長身屈迴紋曲蓋表繆篆矯矯却岱封昂昂陋桐翦初疑居移鄙漸覺坐閱鮮靈光魯國巋屈軼虞廷彦蔽牛我當容化羊君莫辨山霾養洮沐窻霧勤澡鬋直非龍髯觸勢若鹿角偃蕭騷閟馳飇戃怳集㣲霰𤣥黄馬師遺丹青犧尊靦采苓乃夷猶卧雪何輾轉清容居士集卷八
