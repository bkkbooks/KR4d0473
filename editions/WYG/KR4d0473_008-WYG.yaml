body:
  text: 清容居士集卷八元袁桷撰歌行吳船行吳船團團如縮龜終嵗浮家船不歸茅檐舊業已漂没一去直北纔無飢清晨煮茶茶味惡薄暮熬虀虀力薄不憂江南雲氣多止畏淮南風雨作去年水淺畱金溝今年水深上新州終朝但知行客苦盡嵗不識離家愁大兒跳踉新九嵗小兒學行蓬作地維舟未解矴舟牢盡日彎篙仰天視吳人不解矴舟終日操篙船頭娶婦通姻譜知是淮南捕魚户寄語鄉儂莫怨尤它年水深為汝憂淮船行淮船船薄薄如紙客行船頭怒如鬼布衫黒漆鶻雙拳邂逅相争渾欲死船長不識丹雘巧却識江雲佀飛礮風來急鼓響鼕鼕轉艣爭篙復喧閙淮東燒鹽白如玉我船輕行一萬斛淮陰米麥如京坻我船破浪帆如飛為語吳儂莫相勝昔日汝輩同嬰兒蜿蜿淮山起晴翠船已辭鄉不相對轉篷它日望江南猶勝當年吹出塞越船行越船十丈青如螺小船一丈飛如梭平生不識飄泊苦旬日此地還經過三江潮來日初晚九堰雨慳河未滿當時却解傍朱門醉眼看天話長短年來官府催發綱經月辛苦鬢已霜布裘漫作貂裘具入門意氣猶猖狂自古魚鮭厭明越明日今朝莫論說買魚沽酒不計錢被髪江頭傲明月勸君莫作越船婦一去家中有門户沙上攤錢輸不歸却向鄰船盪雙艣清明行東風吹桞鵞眼新家家清明忙殺人微雲細雨作春色輕車急馬團飛塵大墳崇臺甃花石新檜珠幢當户植小墳纍纍俱土堆髙下尊卑人莫識豚肩韭餅雜珍味水飯飄零多古意把杯直欲酹重泉頫首填膺下真淚須臾無言各環坐折桞攀桃争噉炙新愁已向眼前寛舊事翻疑夢中過行客徘徊亦㽞勸薄暮前歌下村坂悲歡盡日總春風白髪年年不知換君不見江南卿相墓五鳳飛樓鎖煙霧諸郎錢癡恣歌舞不識當年出勤苦楊花飛盡猶不來空有啼烏滿荒樹河橋行黄河之船如切瓜黑金鋪釘水爬沙髙桅不肯著船底四面綯索相交加輪囷薪槀浮山來淮船争避吴船開徃回南北任衣食不學蕩子多嫌猜好風千帆亂流去我獨抱辛走行路從來宴安多後虞一失天公不相顧觧凌已過桃花來黄河正月為解凌水二三月為桃花水泝流九曲揚飛埃不聞赤鯉上天上但見魚鼈争喧豗船前飬驢豕同圈借力於驢共牽挽莫嫌我鞭太麤毒大勝江南人代畜鞦韆詞二首鞦韆髙整垂楊樹紅緑周遭華表柱誰家女子惜餘春東擲西抛不停住不停住日將暮莫送飛花上天去雲間緩聽玉參差為問乗鸞在何處河外吹沙沙衮塵鞦韆架上望行人桃紅栁緑今如許却背春風踏沙路踏沙路不歸去流鶯紫燕驚相語明日清明應未知回首江南夕陽暮天禄硯滴歌為瓠山㕘議作君不見南陽宗資墓傍地刻石稜稜絶相似荒榛暗草風雨頑墨本摩挲了無意又不見光和玉堂銅作模爬沙引水如渴烏清流我輩不堪用空與乳臭供歡娱那似南唐李中主玉軸牙籖日容與聚金為寶化黄銀一寫形模足纎鉅口銜紫芝不敢茹㣲捲清波恣吞吐千年異質變真態晝日書窻起煙霧慵軒老人金鑾僊筆底萬斛釃清泉坐令口吻不敢燥俛首效用誇無前麒麟瑞世那可忌獬豸觸邪誰顧憐要知此意政相類肯與石鼎同烹煎憶昔漢家劉生滯空閣青藜一星隕飛魄彼將辛苦了殘年猶勝時人譏寂寞江南病子塵滿骨萬事無言成鶻突願求一滴洗餘昬却怪王公無長物新安芍藥歌送胡伯恭之婺源洛陽花枝如美人㸃㸃不受塵土嗔輕朱深白鑄顔色髙亞緑樹争精神那如新安紅芍藥透日千層光閃爍碧雲迸出紫琉璃風動霓裳凝綽約我聞種花如種玉盡日陰晴看不足㣲雲澹蕩增寵光細雨輕濛賜湯沐何人看花不解理香雪紛綸手中毁酒酣跌宕空低昂得意須臾竟如此翩翩驌驦雲中君愛花直欲畱青春青春如流欲歸去明年看花君合住天瓢歌天瓢之液如黍珠緹以十襲拱萬夫帝青寥寥誰可上回風扇坌揚焦枯何人夜坐守瑰室九闗清嚴集虚一河車厯録雲迴環帝鼓奔騰山鬼泣中有一老翁絳旂朱幘鞭飛龍手持赤字書直入𤣥𡨕宫取瓢上天去羲和側馭追豐隆人言此瓢不易倒瞬息人間成浩溔聊將戲劇轉清涼玉散珠跳為渠好積神為寶寶乃成語黙變詭通僊靈丹臺紫府杳無跡丁公壬女徒多名張侯之妙不可詰見月入水月豈濕觧衣倚樹寒滿襟逺視銀河暝如漆晉寧丁節婦歌明月何團團不照孤飛鸞妾心無虧盈畱作白頭看堂前青桐樹慈烏旋繞來無數朝引三兩雛返哺日落聲嗚嗚誰人挾彈窺我烏守樹長泣眼為枯人生莫作陌上花東風飄蕩隨泥沙望夫之石何亭亭不如長衫立素屏流梭夜織燈青熒黄姑側聽中屏營天帝與植雙桓楹木盤可鑚河可塞千年苦心誰復識哀牢夷送張子元僉事雲南哀牢夷蒼山疊翠雲無梯洱河西傾去無底晴日倒射紅琉璃相傳沈木兒背坐曾遨嬉築城蜿蜒似龍尾千古髯君乃其始縛繩駕長橋皮船中蕩摇危顛石樓髙百尺子孫生長今漁樵空林明月手可拾仰飲飛流鬚髮濕寒藤􅇢徑側足行飢猿兒啼䑕人立慘淡虚無間鳥道開人寰峨眉東望止一髮參旗玉井閃閃上下隨躋攀君不聞木皮岡前九折坂客行胡為車欲返又不聞青溪關上三碉城纍纍戰骨耕未平輕家許國要有道矍鑠是翁誇不老張公子當有行繡衣青春照瓊英笑跨紫燕辭天京朝餐五粒之松子暮食側生紅入齒從來蠻客尊漢官但飲亡何端有理南飛雁足何憧憧不能與日隨西東相思望君日西下去天一握疑有雲氣時相通安南行送李景山侍郎出使輶軒使者安南來紫泥封詔行風雷濕雲翻空海波立鐵網山裂狂蛟摧神京煌煌鎮無極火鼠燭龍窮髪北彈丸之地何足論蚯蚓為城霧為域瘴江如墨黄茅昬羣蠻渡江江水渾千年白雪不到地十月青梅猶滿村赤脚摇脣矜捷鬬竹箭藏蛇雜猿狖崛强曽誇井底蛙低徊自比泥中獸龍飛天子元年春萬邦執璧修臣鄰朱干玉戚廣庭舞笑問銅柱今何人君不聞重譯之人越裳氏有道周王輸白雉又不聞防風之骨能專車神禹震怒行天誅李侯桓桓水蒼珮舌本懸河四方對後車並載朝未央稽䫙九拜乞取金印歸炎荒次韻黄可玉古墨行寶刀曉割千嵗松神膏摩盪長檠工明窻飛塵散𤣥粉匕劑直與黄金同澄心欠伸初睡起綺疏碧芽烹火龍金星濡毫試輕重雪跡㸃㸃畱羈鴻嘗聞老奚對膠法經月下擲清池中蟄如寒蛟纒鐵柱霹靂光紅與神遇晴暉淡蕩浮雲陰咫尺鍾山隔朝暮潘郎再拜口流涎手揣不敢汙其氊睿思殘珪宻封識舉世那得窺完全絶憐江南文治極清賞沈著忘籌邊玉清峩峩墨卿泣此寶脫幻今無傳星灣寒泉白雲宅中有舊物懐杯圈銅魚飛符不易合金釵畱股那有縁撐腸拄腹貴善用知白始觧𤣥中𤣥暮年長物等嚼蠟借此寓意哦詩篇鄭公諸孫保遺笏滌志黽勉窮韋編慎勿小智窺寥天嗚呼李生之墨三百有幾年不如陳郎墨守行千年李宫人琵琶行先皇金輿時駐蹕李氏琵琶稱第一素指推卻春風深行雲停空駐晴日居庸舊流水浩浩湯湯亂人耳龍岡古松聲寂寂厯厯不足聽天鵝夜度孤鴈響露鶴月唳哀猿驚鵾絃水晶絲龍柱珊瑚枝願上千萬夀復言長相思廣寒殿冷芙蕖秋蔟金鵰袍香不留望瀛風翻浪波急興聖宫前斂容立花枝羞啼蝶旋舞别調分明如欲語憶昔從駕三十年宫壺法錦紅茸氈駝峯馬湩不知數前部聲催擅板傳長樂晝濃雲五色侍宴那嫌頭漸白禁栁慈烏飛復翾為言返哺明當還朝進霞觴辤輦道母子相對猶朱顔君不聞出塞明妃恨難贖請君換譜迴鄉曲渝州老人歌新城彭大雅築渝州太守築城瞰江堅且牢月挂斗柄山鬼號州民纍纍下江去蜀水入漢纔容舠渝州何嗷嘈攀縁翠木㕘井髙不愁灔澦作人鮓但願淅米雲安去如馬憶昔彭太守晚得一州大如斗征西將軍華表柱白鶴不來猿狖守小兒舞槊紅離離大兒挽車上棧遲渴飲古澗之層冰暮宿古松之危枝渝江之水人馬瞬息渡排石列栅猶支持年年草青記新厯不識烽火平安是何夕赫日涌紅輪金雞飛報渝州民空梁燕回候歸語小牆花發舒啼痕渝州老人面如漆家住金陵年七十含辛老入巴江路猶記墳前白楊樹前岡甕崩流後岡蚓成丘社翁相詢傳父祖里婦驚猜訝吳語澆酒酹墳封四尺程氏之墳從此識君不聞武擔之山五丁土嵗嵗春風啼杜宇大雨醉歌寄王待制海風吹天黒嵯峨九衢積溜分江沱壊墻羣蟻上枯木方池遊鯉跳鳴荷似聞南鄰王學士閉門把卷工吟哦髙張障泥倦行水垂簾倚枕遊槐柯北鄰老生病無力玩易忘象窮羲媧垂楊詵詵翠旄舞幽葵湛湛朱顔酡憶昨祠宫醮雷所被髮繞甕揮且訶縛茭搏泥肖龍狗噀酒噴霧刑牲鵝寸雲在手不受令挾以風伯飛塵劘虚皇神功絶聲色髯羊怗首辭巖阿君不聞夸父逐日死飲河愚公避影跡愈多曹相畫一日亡何草廬髙卧梁父歌板築飛詔起雲蘿百年两曜如擲梭志士惜日鬢益皤會須深泥絶行道免使褦襶之士肩足相累摩龍尾歌送文子方著作調官雲南朝辭龍尾道暮徃龍尾城七尺遊龍當道鳴春雪未觧四蹄輕憶昔哀牢夷來漢賓蘭倉夜渡歌苦辛皮船之浪墨雲沈沈繩橋之雨青泥滛滛登山採桐皮側見五粒松手攀欲入口疑是沈木背坐慘澹悲回風鳥飛不能住哀猿忽相逢旁有儋耳翁為言太古之遺蹤諸葛丞相韋郡王村村列祠堂瓢笙銅鼓羣巫舞牛殽蘭藉羞瓊漿六詔之王無厯紀唐帝傾師邊將死建隆天子不用武玉斧手畫大渡河兩股蠻酋易馬來黎雅恣言茶錦不當價神武皇帝開聖元薙獮窟穴張王官篚筐歲入長安道賈客辭家不知老文著作聽我辭去天萬里夷民疲織罽瀝猩血煎金鑄褭蹏夜行碉門夷疾追平明出闗面如泥却來京師望塵拜蔟金毳袍向市賣文著作今典雲南之選部目光透牘提筆署翦彼荆棘薰蘭當户西南之人手加額太史重修考功格月海歌水國紅葉下萬山白嵯峨扶胥無垠接天際望舒力挽沈金波人言老蟾那有光為借三足之烏起熒煌烏已入地蟾在天此說詎得然或言大塊蓬蓬氣為主浮空五色神后輔顧免在腹不得吐下入八瀛金碧聚貝宫樓臺珠結户穹龜前驅老蛟舞千人之目皆在水各持一月得歡喜夜闌斗轉銀河傾變滅消沉去無趾敬亭歌送鄭子寔遊敬亭棗實纂纂羅衣單抱琴背日隨鴈還今年六月居庸關馬蹴石子流彈丸曉渡灤河水水渾不見底中有三尺鯉素書不成字似疑戒我慎出入五侯之鯖過客止羮覆手爛將奈何仰視流光去如矢行路大難歸樵空山或言山有虎豹嶺有榛菅歸漁于河河有蛟鼉去將隨波舊家汳渠溝已塞錢塘煙蕪歸不得敬亭白雲何離離二僊霞衣坐翠微手持紫玉簫和以丹桂辭大言泠泠小言纍纍勸子勿為道途苦幽蘭深谷不當户空青滿巖玉流乳手繪朝元之圖萬神舞秋江釣月圖歌南山舞空趨翔鸞北山人立如啼猿長流東來貫其腹謂是浙水屈曲萬丈之上源大魚奔騰鰭鬛焦小魚委靡隨江潮中有白玉蟾落落五采凝不消人言此蟾在天主陰魄淪没何為水中宅籊籊千尺綸蟾永不受吞廣寒髙居凌紫清日逐烏御不得停愛此江水碧倒空浴影潛金精感君纒綿如有素瞬息還須上天去君不聞任公子東海投竿非小智又不聞嚴先生羊裘古瀬成髙名君家慈母占畢逋百尺樓觀端可居黄金之鈎不復理明月年年在秋水二老歌王景先省郎㓜孤祖母及其母鞠之今迎養京師烏啼風滿窻機鳴月當房辛勤三十年護此玉雪郎大母呼孫牀下讀阿㜷烹雞炊黍熟黍熟不敢嘗命兒奉姑旁姑言春在長安枝東風滿林深折之一折不得語再折春膴膴白雲何相隨下馬忽在户驅馬還家上堂拜婦姑繡衫錦為帶長安之花果如斗不辭看花飲春酒三馬歌東坡三馬贊本羌水渾蜂