body:
  text: 清容居士集卷十五元袁桷撰開平第一集甲寅延祐改元五月三日分院十五日始達開平得詩數篇録示兒曹居庸闗太行領羣山萬馬髙下拜平蠻轉城隍隱隱南北界危坡互交牙寒溜寫泙湃隂風𤣥虬湧巨石忽崩壊周遭青松根下有古木砦石皮散青銅云是舊戰鎧天險不足慿厯刦有成敗驅車上林杪出日浴光怪肅肅空巖秋天風迅行邁雨中度南口山寒絶禽鳥獨聞子規啼石壁飛雨驟衆木摇凄凄瘦馬蹴亂石髙下齧其蹄陟巘沮洳深漸覺所厯低暝色起亭午土屋流寒泥須臾過雷聲倐忽生晴霓水清亦可渡戒僕踰前溪重午日宿南口小店寒雨鳴石峽蕭蕭五月秋道逢采藥人不識葵與榴氣清諧令節暑溽想南州凉颸木末來動色思重裘猶持一巵酒慰彼湘纍愁桑乾嶺漠漠天都近天梯爾許長青帘矗山影烏㡌拂雲光行客穿珠曲居人綴蜜房端窮萬里目那識九廻腸渡懐來沙嶺沙清圓石瘦千里聞風聲驅此觳􅑌車索索莎鷄鳴逺山列翠席近坡環碧城髙下各有險轍跡那由平驚兎導我前厯碌為之驚天低雲摇蕩土廣塵縱横謬膺翰墨選逺行有期程回頭望南坂初月隨風生草地帶水殘沙似暗潮平坡軟草緑迢迢不須回首更南望下馬同兒摘地椒龍門瀚海雙龍鐡鱗甲捲壑拏雲蹲冀闕千泉百道凑東南急雨翻空迸晴雪古言神禹功最多導山鑿石疏九河幽都之地不復顧乃使雙龍下地成盤渦隂風何颼颼磅礴太古秋崩岸落車礮怪木森戈矛碎沙晴日鋪金麩云是昔日當闗挽勁之僕姑寒泉組練結九曲亭午赫日光糢糊車聲何轔轔昨宵急水迷無津垂堂之言猶在耳游子商人行不已子規徹天呼我歸翠華北幸那得辭龍門之石髙不磨泚筆書我龍門歌彈琴峽在居庸寒泉飛玉峽誰彈使成聲下有戰士骨嗚咽水中鳴絲石本異調摩戞生虧成鑿迹非神禹佳兵構秦嬴駐馬為聽之逝者何不平虚牝納新雨急促濁復清重華初省方百神静相迎為作薰風弦散彼巖下情雲州天濶雲中郡剛風起泬寥氊房聨澗曲土屋覆山椒橦布朝朝市通薪户户燒遥看塵起處深羡霍嫖姚次韻虞伯生題祝丹陽道士摹九歌圖玉眸精佇朝玉皇五采萬物迎初陽神君空洞光茫茫瑶席合奏樂未央沉幾經綸白為章寸膚帝青下填阬朝挾朱鳥招八方旋輪風轉盪金剛君山之峯隃可望玉女鼓瑟哀不傷世職𤣥籍元運昌靈夀給扶顔色蒼賜齡金篋難度量仲氏之道誰為長深根抱一真有常下憫濁世生復亡浴精昧谷暾扶桑寥陽昭徳森九芒亘刦永寳天地光安流舒舒復湯湯儼思白璧謝汝將厯險有戒毋垂堂乘貍從豹何陸梁菰蒲粔籹絃管張積變不化遊益荒屈子調苦心忠良歌罷雲遏投靈湘簫巫鼓胥紛莫詳嚴嚴祝史遺鉛黄握管用九神歸藏出入森衛視錦嚢伏日書懐二首伏日急雨來端坐披重裘中天異寒暑兹維帝王州碧草記初夏堅氷在餘溝野曠無留禽積潦不復收飛雲屡晴隂蒼莽天宇秋營營壁間蠅就暖旬日謀𤣥㝠自成嵗髙下各有求悵彼南飛雁素心愧難酬二晨起萬竈煙墨雲何輪囷念昔種松者用志良苦辛寒沙草漫漫萬騎來無津樹之似雲柵積雪迷秋春車大棟復楹小車槱與薪空餘千嵗脂成此官路塵我衣素修潔暫汙不敢嗔俛焉拾餘煤作書記其因題李士𢎞學士畫明復齋風竹虚聲出素壁冷冷天地秋矧此三伏凉居然索重裘盪摩神光旋戞擊元露浮浩蕩白玉京頃刻瀟湘洲昂昂貟嶠仙筆底寒颼颼髙齋襲道氣深根淡無求慈雲堂周南翁祖母萬竹鳳岡下虚堂聳翠㣲隔林聽返哺前嶺望孤飛山立斑斕服牛眠錦繡圍諸孫有遺範致樂報春暉南翁近築致樂堂奉母送濯伯玉之官雲南蕩蕩哀牢國耕桑換不毛官船乘驛穩銅鼓報衙髙事簡歸王化民淳汰吏曹端知清浄理山水縱遊遨次韻玉堂畫壁至人悟窮達斂跡寓壟畆良苗貴深扶撅土戒蒿莠靄靄新陽浮髙下接紫宙跨犢東南行問事一俯首新雨㵼溝塍交流媚川後輟耕非素心帝命資左右相彼前山雲倐迷復還岫卷舒樂槃澗署壁寫其舊清秋映空谷風雨百神守夙昔經濟姿志不在盃酒要使風俗淳斯民樂仁夀秋谷耕雲明月入水底摩盪空江雪昻昻垂綸翁在雪不在月悟彼𤣥化理不寐坐明發我舟非無槳我車詎無軏迂儒守繩樞世胄貫華閥願以千尺竿裁為濟川笩寒江釣雪再次韻粤商有阿衡肥遁樂畎畆深耕力其勤嘉榖寜有莠時來起丘園勛業冠宇宙持此金石心黽勉佐元首維敬在一徳維訓守先後髙風邈難追白雲在前岫堂堂匡濟功匪以夙昔舊譬彼執御人先道謹為右精忠百壬避正色九闗守我昔夢見之再拜酬巵酒容谷秋思深圖之奉千夀維昔師尚父垂老鬚眉雪突兀江海姿韜精忘嵗月坐石投其竿秘籥時一發載車與之歸在徳不在軏念昔經濟人事定始功閥寒江眇風濤乘桴可知筏上都客舍王𢎞為作風竹門巷泥深笑獨清此君瀟洒未忘情無端昨夜風花急却送秋聲作雨聲金主畫孟浩然騎驢圖生前明主已遭嗔身後君王為寫真家國總縁詩句廢灞陵猶勝蔡州塵二木葉山前雪似銀軟裘難作自由身想因嵗晚朝陵後故寫騎驢處士真三北闕明言不上書蹇驢何自入西都閉元天子元無分留與他生作畫圖李陵臺天盡弮空計未踈囊封朝奏似憐渠漢家天子春秋責從此降臣直筆書二雲衮零沙風衮灰眼穿猶上望鄉臺隴西可是無回雁不寄平安一字來上都楊節婦吹徹玉參差孤鸞天外飛匣藏身後劍篋寳嫁時衣夀樂龎眉聳心清鶴骨肥諸郎新玉立孝謹報春暉開平第二集登候臺蜿蜒西龍岡緑草摇晴波旁有雙玉井石角増嵳峩明良佐神運目力窮坡陀層垣睥睨雄寳構通羲娥昻昻鐡竿聳飛鳥光盪摩土屋粘蜜房文氊圍錦窠緬思皇猷逺嘿止松林戈匪以清暑遊跋履勞鳴珂隂森晚嵗晦寒沙聚羣駝悲笳月初上戴斗瞻天河次韻伯宗同行至上都遊塵捲飛蓬積水翻驚波羣山擁雙闕勇勢凌岷峨藉草各小憇側身復登陀纎峰修眉聳佇立愁湘娥仰視北斗光􅂱􅂱疑肩摩田父指我言昔日搜鵰窠吾皇罷畢弋射乂生投戈二客何舒遲直可鳴朝珂銀罌傳緑蟻翠釡登紫駝出處愧我異愛君筆懸河再次韻答李彦方應舉良㑹難自陳嵗月流頺波念昔邂逅初黒髮雲冠峩羣公擅碑板雄文記頭陀于時接英武奉身如素娥粲粲白玉署墨沼争漸摩所思筆成塚不計印積窠君時皎氷霜正色羞倒戈習隱吏金馬弔古師銅駝瞬息已廿載愧彼桑乾河伯宗再次韻復叙舊玉署日倒影綺忩水迴波堂前雙樹琪暑清緑雲峩君時坐其下凉漪起陀陀悲商激湘纍急羽凌韓娥執簡諒且直惜日勤編摩盛世昭休明卑枝鳥争窠掀髯紀其端刻佞侔鉛戈占風騐靈烏聼水悲老駝俯仰各努力解佩投于河伯宗遊華嚴寺次韻二首平蕪寒磧際突兀梵宫尊白日開金地青蓮擁紺園城低千障擁塔静一鈴喧夙昔荘嚴果無言急掩軒二欲問生公法年深不上堂㫁雲成密㴻深樹當疎篁十地三乘要諸天百和香𤣥機我素解何日勘禪房上京襍詠雲䕶中街日風開北户天千溝凝白雪萬竈起青烟午溽曽持扇朝寒却衣綿松林空有界剪伐不知年二土屋層層緑沙坡簇簇黄馬鳴知炮急雁過識天凉墨菊清秋色金蓮細雨香内園通閬苑千樹壓羣芳三天闕虚無裏城低納逺山白榆迷雁塞青草補龍灣市簇家家近官清日日閒重遊深問俗漸恨鬢毛斑四舊嵗寒冬惡霏霏土雨迷門荒懸馬革草净絶牛蹄列帳烟光慘空營月色低縣官捐粟帛嵗晚得扶攜五上國饒為客天凉眼倍青白魚沙際網黄鼠草間翎芍藥圍紅斗麻姑綴玉釘漸知塵骨換振佩接青㝠六天錫清凉國晴霞綻雪峰月低疑墮兎雲近得攀龍寳鑑頒氷撤筠籠賜果封白頭貂帽客為我話深冬七駝鼓村村應傳更趨進程草肥凉露白樹薄曉風清帳殿横金屋氊房簇錦城屬車流水度細㸃侍臣名八伏日瓊林宴名王總内朝帽尖花壓翠衣角錦團貂炙熟牛酥芼醅深馬乳澆柘枝旋舞急宛轉稱纎腰九市狹難馳馬塵深易没車凍蠅争日聚新燕掠風斜晚汲喧沙井晨炊㫁木槎閭閻通茗酪俗簡未全奢十長夏崇真館疎簾洒静便支頥推萬古心息契重𤣥月窟忩如雪天瓢酒似泉主人憐老客下榻不曽懸再次韻帝京環陸海平野接氷天龍吐青林火狼沉紫塞烟風花秋黯淡雲葉雨連綿昔日君臣意深符卜洛年二寳閣凌空涌金壺映日黄梵音通朔漠法曲廣伊凉御榻惟經帙宫爐獨篆香吾皇清净徳銀管願垂芳三髙下雲中樹踈明雪外山坡凹茅結屋嶺轉水回灣禁路分馳道沙場當内閑通明風露冷時許侍清班四晨起儀臺立烟青望眼迷草低鷹側目車逼馬迴蹄風勁弓絃直泥融柱礎低蚊蠅深斂跡麈尾不須攜五紫極中天正森森接帝青雁歸傳帛信雉落舞紅翎寳所金千頃朱門帶萬釘瀛洲清淺處髙坐納空㝠六昔年曽扈蹕宿直對鼇峰錦掣蘭苕翠波翻墨沼龍起居青簡注除拜紫泥封共説先皇日千官總住冬七土驛髙低置蒼茫七日程馬通分熠燿牛酪注深清殘雲明珠闕繁星列火城前山黄白處草藥不知名八千堞蜂腰凸羣山馬首朝沙場調俊鶻草窟射豐貂閙舞花頻簇狂歌酒恣澆今年春事減土舍雪齊腰九箭落驚遊騎翎傳督運車土風殊楚越驛道倣褒斜細雨三更枕清秋八月槎夜聽繁管急漸習五陵奢十長齋孤館静捧腹睡便便酒㫁眸凝碧塵深鬢返𤣥凍蜂粘暖草乳雁啄氷泉過翼時頻數鄉心日夜懸李陵臺次韻李彦方應奉前坡聳頺基云是望鄉臺往事已厯厯亂石何嵬嵬想此二子别袂結不能開河梁白日速朔風衮沙堆漢法重失律輕生表奇才一跌不能返欷歔壮心摧形影胡越分骨肉參商乖萬事已瓦解誰能寫余哀昂昂司馬生義色與壯懐子卿固偉節屬國何低徊褒功實謭淺議刑良刻哉坐令衛律輩嵗望邉城來次韻李齊卿呈閒閒嗣師清都逼紫㣲瑶光流玉壇隂厓太古雪伏日生午寒澄懐集遐思黒髮竹皮冠𤣥闗轉輕雷銀潢激層瀾取彼白石詞寄以朱絲彈一彈去日短再彈行路難兩躍疾飛隼歸雲生樹端逺遊感夙昔努力慎風餐西京李齊卿讀所贈吳公詩愛之遂次其韻温温紫玉姿揚休升觚壇維時夜氣肅璇璣動芒寒辟公閲多士謂宜錫𤣥冠環水赴文海俾爾揚清瀾東南有髙樓繁吹和急彈我獨念子意希聲世知難遺情寄寥廓㝠鷹𣺌雲端去住靡所止精思勿忘餐伏日伏日隂隂九月天雲邊桂露十分鮮侍臣已入清凉境不到凌虚未是仙二偷桃曼倩語言尖伏日歸來割肉亷那似蓬萊風露冷重裘端坐絶趨炎松林行隂隂松林八百里昔日傳言為界址𤣥雲捲甲天馬來雪兎霜狐先委靡山前犬牙十六州石郎屈膝輕相投淺沙圓石古轍迹草青草枯無盡愁闕拂天鎮南北萬井燃松烟似墨大車闕龍角全小車輪囷束矛㦸松花落子芽復抽不如昔日當道稠採薪之人不辭闕出郭十里争相酬君不聞雪山之西銅柱南混同鴨緑成東漸金山橐駞争貢寳剪取平林作馳道採摩姑官山摩姑天下無迸石菌蠢攅寳珠阿香執御雲中驅天瓢急注争葩荂玉京髙門散金鋪剩欲㸃綴完無膚萬釘寳帶山澤癯圓如佛螺綴頭顱累如秬黍連二稃羶根未許相糢糊􅝥泉石鼎鳴笙竽急投小烹養甘腴上池三咽生醍醐五芝髙著神農書吾欲比之議匪迂天花代北嚴貢輸永言定論兄弟俱尚尊賜張上卿薛𤣥卿賦詩次韻龜眸鶴骨煉純陽言合靈蓍行有常黼坐近曕堯日月屬車逺度漢封疆英雲玉佩開仙府湛露瓊巵出尚方可怪相如多病渇願分金掌接恩光再次韻居庸曉次日初陽肅肅龍旗出奉常獸殿頻趨恩有秩鵲爐深祝夀無疆氷壺酒滑通真一雲閣香清接上方静夜屢陪談麈樂燈摇寒燼目摇光復成二篇羞逐羣芳度艶陽丰神𢎞景筆元常氣雄轉斾攻秦壁色正登壇復魯疆易玩天皇遊太古書看王㑹補殊方平生物論深涇渭寳鑑懸空背透光二孤鳳清聲出嶧陽沖天采羽越尋常清心常侍真醫國束髮從師屢出疆明月乘鸞通碧落空江瘞鶴憶朱方詩囊取次傾珠琲一一清圓敵夜光西京任庭瑞樂善齋大鈞妙無心變化各有職元陽執樞紐羣動遂生息達人洞顯幽語黙絶窺測尸居碧忩曉觀萬養真寂春葩陽林秀衆采紛薿薿上有黄鸝鳴下有遊鹿迹嗒然遺世情至道在几席芝眉紫綸巾舉酒起玉色桐孫䕶清風竹母引白石素心絶榮侈天爵夐有得敦龎古遺民過里車已式願言表其閭庶以昭帝則白雲閒齋武當靈峰通廓寥下有白雲䕶山腰朝入寢扉結翠被暮宿丹井騰金瓢神君握機不盈寸頃刻倒影旌幢飄道人夙昔慣所見更上岧嶤抉斗杓送金華王生不到金華洞于今二紀餘偶逢騎鶴客為覔牧羊書芸笈秋消蠧萱堂暮饌魚江湖易衰感暫且問樵漁建昌李生城南别墅雲樹黒㣲茫依稀見竹房山空遼鶴化市近海鷗藏逸興王官谷幽禪華子岡展圖塵眼瞇剩欲濯滄浪開平第三集辛酉至治元年二月庚戌至京城壬子入禮闈考進士三月甲戌朔入集賢院供職四月甲子扈蹕開平與東平王継學待制陳景仁都事同行不任鞍馬八日始達留開平一百有五日繼學同邸八月甲寅還大都得詩凡六十二首道途良勞心思彫落姑録以記出處耳是嵗八月袁桷序次韻繼學途中竹枝詞居庸夾山僧屋多鑿石化作金彌陀但有行車度流水不見舉拂談懸河二紅袍旋風漾金泥車前把酒長跪齊忽聼琶琶相思曲迎郎北來背面啼三氊房錦幄花簇勻酥凝叠餅生玉塵晚傳宫壺檀板急酒轉一巡先吐茵四土屋苫草成廜㢝前床翁媪後小姑我郎南來得小婦蘆笛聲聲吹鷓鴣五雲州山如五朶雲老松積鐡霾青春遂令古雪不肯化萬杵千爐煎貢銀六山後天寒不識花家家髙晒芍藥芽南客初來未諳俗下馬入門猶索茶七寒風捲蓬沙轉黄駐馬問路路轉長紅衣簇簇入新市指㸃壚頭稱上方八朔雲蕩蕩愁燭龍土房擁被睡髙舂披衣上馬過前驛清霜急雪時相逢九瀛洲往嵗侍宸居一度還家一度踈近行閉平十二驛眼望南雁傳鄉書十閶闔雲低接紫宫水精凉殿起薰風侍臣一曲無懐操能使八方歌㑹同四月二十六日曉霜逺坡殘月露零零曉壓椒花玉作屏他年若問南州説疑是鄒生逞怪靈戯題樺皮褐裳新脱玉層層紅葉朱蕉謝不能儗製小冠韜短髮意行雲水一枝藤望雲州望雲州裏松花白金閣山前木葉丹駐馬摇鞭遊不到還家寫作畫圖看次韻薛𤣥卿南還題驛二首思君葉落見參旗碧眼㣲醺倍陸離比上開平復南去却如返棹剡溪時二碧忩雲冷思凄凄曉搨黄庭眼未迷宜向山隂道中住聼風聽雨聼猿啼次韻答陳明復漢殿髙懸五丈旗羽人朝奏佩江離緑章已徹蒲團坐正是金門月上時二碧雲深處草凄凄誰道桃源路已迷昨夜紫霄峰頂坐天鷄子夜鳥先啼再次韻行殿風髙十二旗碧雲深處紫流離相如獻賦誰能繼有客瀛洲獨立時二烟籠沙磧凍雲凄錦簇椒花五色迷不是朝天騎馬倦寒鷄自怯曉鐘啼次韻李伯宗學士途中述懐山巍磧瘦馬逶遲盡日雲隂變四時曉渡桑乾雪新作倚松參坐鬬題詩二李陵臺下日遲遲惆悵河梁執别時漢武不知歌四牡千年競作五言詩三縈紆馳道屬車遲白髮㣲臣際盛時侍獵能追上林賦登臺願繼栢梁詩四紫禁天低夏日遲深紅芍藥勝春時共仰雲孫李學士樂府新填更進詩五内宴初筵舞尉遲榴花未吐艾花時宫詞乆矣無王建把筆争傳應制詩六鼇峰土冷菊花遲滴滴金明八月時留取東平老學士烹羊分韻酒催詩端午謝吳閑閑惠酒客裏端陽景物殊待晨分釀出偏壺松間尚積千年雪澗底難尋九節蒲霏玉論陳醫國艾研硃手寫辟兵符侍臣陡覺蓬萊近簇簇宫花徧蕋珠榆林白榆天上生北塞傳真種漢皇究邊略盛秋此為重神武開帝京赤縣官曹擁井邑生聚繁折㦸出耕壟考昔所種榆禾黍日菶菶繁絃雜伎部一一承天寵盛衰諒有時前山碧雲涌龍虎臺羣山朝宸居層臺納靈秀百泉暗東西千嶂明左右沙磧水多伏流先皇雄畧深省方嵗巡狩翠華懸中天問俗首耕耨沉沉貔貅壘濯濯鷹犬藪前行節駝鼓執御各在手侍臣仰天威長跪四方奏往聞父老言羅拜上萬夀山桃與黍酒啟齒時一嗅乘雲去無踪過者必稽首登坡望儲胥紫氣徹牛斗居庸闗扈蹕朝上京嚴裝戒修途首夏天宇肅寒雲慘不舒足弱跨鞍窘喋喋詢前途縈紆入南口松籟吹笙竽在昔恃險隘當闗守千夫一朝天馬來巖崿成康衢大統叶天運神武開皇謨信矣經啟功聿超神禹圖桑乾嶺兹山西北來旋轉十二雷昔人望鄉處生别何崔嵬我來坐絶頂雲漢森昭回出日騰金鉦積露流銀臺長空不受暑雪花散皚皚氊車引繩過屈曲腸九迴㣲踪愧三至南望心低徊長風馬耳迅何當賦歸來李老巖層巒積明秀深崦罘罳圍千松受新雨一一流珠璣少憇倚絶厓清湍激林霏睡醒日亭午隔溪啼秭歸昔有山水癖黽勉登王畿欣此澗谷幽亭亭白雲飛素懷倘自喻出處諒無違龍門蒼厓出雙闕羣山頫首尊隂風起晴雷摩盪晝日昏銕峽擁偪仄百川為之奔疑下有龍湫逞怪蹲天門渰兮出膚寸頃刻黄流渾側徑出石壁巨浸存遺痕緬昔設天險事乆難窮論征衣襲輕雨神君儼雲根獨石亂石各參布兹山以獨稱磅礴太素初星隕遺其形磊落絶衆附昂昂耿晶熒此土積隂沍草木無光精疑有華表人宴坐陳廢興前車何繩繩去馬何騰騰問之了不應油然白雲興晚發蓐食慎王事曉星當前户跨馬官道行細草泣寒露亂石鳴琮琤啼鳥守荒樹行行未十里問堠坐當路年衰脛力拘望逺彌窘步天風捲飛蓬白日互吞吐深知非世才歸耕誓先墓合門嶺寒沙髙岡聚積溜開土門地媪神功奇兹焉奉帝尊先皇嵗巡幸屬車爛華軒令嚴植前茅髙下相攀援魚貫别後殿蟻行定前屯飛九落千尺瞥裂驚危轅履險深自持人情戒居安寒雲蔽出日去去踰前村赤城兹山浴曉日墻壁流丹砂昔聞天台峰云受珠宫霞地氣有南北變化無殊差埴墳登禹書頳壤勞民嗟感彼山上松黒鐡留槎牙形色有正性染入徒増夸至今温泉下金鼎烹靈芽灤河近山馬昂􅐢逺山鳳騰羽百谷奔亂流屈曲長虵赴維時雨新過急溜槽床注居人匯為井千屨集沙步寒光澄玉膏甘冽過牛乳兹泉成白溝巨浸合沮洳蓮芡充餱糧魚蝦足租賦塞翁話疇昔陋彼成險固往事不復論沄沄日東去次韻虞伯生墨竹畫壁墨雲參差平地湧碧忩淅瀝寒風生截為崆峒白玉管蟄龍夜嘯幽鳳鳴六月雪花飄上京峥嶸直與星斗平出門忽作江海興推枕先聞金石聲楊花曲上都楊柳瘦且堅葉葉不展圓如錢年年飛花作端午逺客乍見心茫然上都飄雪不知數此花與雪相旋舞黄鸝聲絶孤雁鳴萬騎千車互來去手攀短條心欲絶宛轉成毬恨初結寒風飛蓬捲車輪㸃㸃相亞隨明滅南鄰蕩子衣夜單曉望出日如黄綿辛勤掇拾不敢棄願刮龜毛同作氊伯宗學士悉知鄙作唐律叙謝峩冠疎髮老詞臣筆底花飛㸃㸃春千里闗山勞夢寐百年泉石換精神蕪城賦罷生新恨䕫府詩成嘆絶塵更有御園紅芍藥生香一曲柘枝新四月廿一日與繼學同出健徳門而伯庸以是日入都城作詩寄之二子出北門一客南門來燕鴻兩相避矯首氣崔嵬客有百和香我有蒲萄盃把盃客不見我心為之灰願留百和香以待二子回乞酒潘景梁學士長夏蕭齋學晝眠鼇峰深處酒如泉山瓢從此通來往準擬宫袍不上船次韻繼學急雹散晴雪仲夏天氣清閉户北忩坐稍稍新月生客至設棋局言忘遺世情盡日無王事自雲與簷平重午聨句夏峰表奇雪天京候端陽寒襲宫羅輕瑞登水鏡光烏輪麗北陸龍舟競南湘蠅虎逞王國蜥蜴嚴帝房事訛汚習陋風烈壚壤剛擁貂繋綵絲飛鞭賭瓊漿帶重公莫舞簪飄艾如張雁分列瑶席魚貫登紫廊白乳謝角黍青蒲截鵞肪重離天門正習坎地軸方靈符瑩丹砂羽箭穿白楊戀闕葵日傾懐家麥秋凉羮鴞傳大官懸虎步天罡鵙噤百壬斂螽動九子昌嶻嶭翠屏偃浩溔白海長扇藏婕妤泣標聳飛亷忙紅苞當階藥碧縷雕盤香宫花金抺額廐仗玉鏤鍚鈴催寳貼進拍奏霓裳揚舉鼎凝脂膏載車寔餦餭蒲萄㶑灧瀉琵琶宛轉傷蟾蜍闕未乖驌驦裘難藏伏日奩果貢薰風鑑氷洋瀛洲畏獨往玉署思同翔裝馬曲綵絲絡頭百寳装猩血入纓火齊光鍚鈴交驅八風轉東西夾翼雙龍岡伏日翠裘不知重珠帽齊肩顫金鳳絳闕蔥蘢旭日初逐電迴光颷斗動寳刀羽箭鳴玲瓏雁趐却立朝重瞳沉沉椶殿雲五色法曲初奏歌薰風酮官庭前列千斛萬甕蒲萄凝紫玉駝峰熊掌翠釜珍碧實氷盤行陸續須臾玉巵黄帕覆寳訓傳宣争頫首黒河夜渡辛苦多畫㦸雕閎總勛舊龍媒嘶風日將暮宛轉琵琶前起舞鳴鞭静蹕宫門閉長跪齊聲呼萬嵗嘉禾圖土膏滲陽春連連垂黄雲仁聲九垓被地瑞昭人文穰穰大同郡嘉穗表奇芬擢莖秀雙岐駢首誓不分稃聨珠琲光苞簇綵綬紋老農善視之神化非耕耘維皇調玉燭嵗功合氤氲帝力畆􅅵深擊壤歌放勛圖成上金匱寳軸森香芸侍臣丹筆工秉心述前聞願旅天子命補亡追典墳蘇武牧羊抱雛圖寒氊齧盡節旄稀野曠風低短草肥忽見嬋娟新月上却疑身似夢中歸李仲賓墨竹圖筆底𤣥雲氷雪姿雲洲玉佩映參差如何昔日閻中令晚嵗羞稱老畫師開元恩長老以詩送北禪講師遊上京末章及見余子灤陽次韻乘槎親見玉繩流底用蒲萄與海榴紫塞接天星戴斗白雲垂地水浮漚蠅頭可但窮三載麈尾懸知又九州問訊開元老禪伯詩瓢今向太湖浮王淡遊墨竹隂隂密葉鐡鈎鎻淡淡踈柯水玉簪客向流離渾老盡臨風題筆望江南次韻繼學竹枝宛轉詞長年乆客學吳儂應對嫦娥認妾容聞道秋來三十日雪花飄處似深冬二聞郎腰瘦寄當歸望盡天邊破鏡飛昨夜燈花圓似粟倚門不肯送郎衣三宫羅叠雪撚金龍即去香奩手自封還家貂裘綿百結教妾今年兩度縫四年年河鼓度天津郎在灤陽見得真今夕定知郎到日桂花浮魄滿香輪約八月十五日抵京陳景仁都事以詩惠酒次韻閉門擁雪絶知聞壊壁行蝸古篆文誰遣白衣傳剥啄新詩如雪酒如雲二短髮藤冠似晉賢瀛洲獨坐酒如泉明知白眼輕餘子客至題詩似屋椽題贈翰林何生殘月踈星送曉鐘伊吾聲徹炯雙瞳盛年事業須黄卷盡日交遊謝碧筩案上蟾蜍承夜露門前叱撥立秋風君家居士多隂徳佇看鷄翹列殿中嗣天師墨戲四絶横塘野色深聳身對秋水守獨非自夸感彼蜻蛉子右枯蓮孤鴛守雌氣之母見一道之宗配合貴有得丹光結芙蓉右枯蓮鴛鴦二禽詎無知秋聲起天外蘆枝為我旌蓮葉為我蓋右蘆荷水禽髙籟日惻惻水花淡無踪孤鴻招不來汎汎以自容右蘆荷孤鳬果老圖御氣如嬰兒變化能成形再過趙州橋滅跡絶怪靈清容居士集卷十五
