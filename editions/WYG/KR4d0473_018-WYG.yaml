body:
  text: 清容居士集卷十八元袁桷撰記慶元路鄞縣學記粤昔授受緒絶空虚固陋之學淪於人心言理者人人殊師記問者質而不化詞章篆刻决裂六藝糜爛而不可救師儒有憂之據道徳性命之要毫分縷析鑿鑿乎其不可相紊也繇是士得以一其視聴皇王之道復興於千數百年之後可謂盛矣世祖皇帝混同區夏崇學校定國子學成憲皆東南儒先而朱文公所說咸取以為經史模楷於是窮徼絶域中州萬里之内外悉家有其書然而急近功者勦取其近佀以為口耳之實天人禮樂損益消長切扵施為所宜精思而熟攷者一以為凡近迂緩而不講至於修身養心或相背戾而不相佀則緣飾儼黙望之莫有以窺其涘際夫明絶學以承先聖之統可謂難矣弊生於苟易守其說而湮其本將不勝其弊載籍極博莫嚴於五經教人之法莫詳於三物揚子雲云丘陵學山而不至於山惡夫畫也鄞舊有學王文公安石為宰時延㑹稽杜先生醇教之學者輩出至大二年郡大火學燬之主邑之學曰孔文雋董儒金始建講堂禮殿未及完而去皇慶二年三衢姚熈載實來是嵗天子下科舉詔同知郡事吴郡張侯某顧瞻陋蕪首曰其何以稱上意迺率郡官而助之邑令梅君遇春丞簿龎君滋范君祐咸曰吾長扵是兹役曷可逭嚴工庀程戒𨽻業者咸輸以佐閱二年夫子像成侑從有叙門廡庖廋塗雘繚繞之屬堅宻精粲學宫之制完且具矣姚君迺曰鄞號多士昉杜先生宜作先賢祠以祀鄞士之興其自今始乎嘗謂學校宫室殿謁循行風俗之使者未嘗不督厲修繕獨教法未定雖聰明自任猶不敢髙下以議今明詔四出郡侯首創其原姚君又能推本前人尊師之㫖深有所寓桷雖官朝廷因姚君之請知張侯之美遂以學校之弊首叙其說庶㡬吾里秀士强敏自修詢考耆哲篤行於顯微内外之實文質交資上承詳延將以復乎昔時之盛則姚君之闡微其意深矣庸刻於石願有以俟焉鄮山書院記粤若古儒先各以方國所尊祭於學社自漢而降定孔子祀餘悉徹廢今百年來始有事于先師其居邑講習治官㳺衍之地崇闡相望或者病焉夫氣流六虚神而存之聚者易推逺者難窮聲音笑貌之感若將企焉如弗及者理有在也合吴越楚蜀之地咸尊以師惟朱文公世祖皇帝一海㝢定胄子學取文公訓註為學制郡縣益遵守而祀於江南者復得推衍大徳二年四明趙夀家儒科慨然請於朝曰伊吾祖鄂州善待從文公㳺今天子興是學願割田别居以祠而名曰鄮山事甫下趙氏即世七年三山林徳載氏奉命祇事屋毁弗稱旋辟田没不可問覈故整圯實完實成奠薦齋明陟降儼肅賔老佐祭侯伯合餕又三年㑭繫其事於石俾桷曰維我四明薦紳先生辨釋著微實相表裏源同流分塗殊轍一合私而惡異標榜之弊也炳然㝷訓理何外焉學以殖身徳以敦本斯道立矣執空說以為證弊不勝舉惟性與道匪言是夸桷懼兹久願相與勉焉林君精敏慎修宜展於世文公之學不墜審由是也大徳丁未春後學袁桷記鄞縣興造記鄞為縣延亘三百里環山帶江西為沃區其民盡地利近東瀦為湖土廣而俗雜逐島嶼魚鹽之利出沒於海上嵗千百數林藪川澤之隷於鄞者不假於外故號為劇邑邑復輔城以居尤為難治縣上事郡署曲直縱舍承指意一不得便輒指擿辱撓闗臨相通縣勢始振後凡為縣者率用是自治而民益困矣大徳七年師府始移鎮控扼水陸衆曰郡有二府縣益不可理八年真定盧廷信氏丞于兹推勤服廉沈㫁静修罪䟽於囹訟辤於庭朞月而郡侯尊焉大府任焉它邑之讞咸質以定旁郡之賕悉檄以正顧瞻四周令主簿是謀先時縣燬經始陿庳不足廣迺撤而新鳩材于山負者以競輸役於徒民以不病首於臺門㕔堂亭廡凡五十餘楹智周而勞簡噦然以深翼然以容謁者趨者視聴易慮於是耆艾讙然以謡曰伊丞之來吾民不知吏屩既荒吾民相忘彼庭開明維丞之平雍雍其堂富民恐傷有亭是休思賢悠悠丞之戾止勿譁以喜後兮今兮維今是佀咸謂桷嘗職太史筆削無避溢遂不得讓役始扵乙巳之十月越明年成丞嘗為行掾中書有吏能令長忻都次為東平周汝弼氏簿澄江朱申氏也余愛其成紀以示後俾知鄞為可治大徳十年十二月曰袁桷記西洛書院記河南薛公遵先君子之命建義學於永寧矣龍頭山有故跡焉蒼崖嶄然宋元祐中天台羅適正之大刻其上曰洛書錫禹之地正之安定胡先生門人善水利所至通陂埭屯田之美按地志永寧併長水縣長水東臨洛川記傳云洛書所出今龍頭山新立禹祠而薛公仰止亦近得請於朝為書院遂更其名曰西洛且㑭夫後人知禹洛書之誠有自粤昔九疇垂象示文夸誣相矜祖緯襲符漢世明經之士汨扵休咎莫窺其真厯千餘年儒先大興闡天人之袐方圓相通正學以眀然同黨之說勝一以為已是一以為傳授數精理湮皇極之建卒無以大通民有恒性君師作之以修以綏如彼北辰樞紐運行内静若動莫窮其化凡厥有生極迺固有性者為聖復者為賢作而新之維后是訓庸保其極則民永以乂保極者民作極者君運而制諸若兀之在握輪之在御皆聴命於我孰先後焉孰終始焉四時萬化之理繇是而備謂之攸叙夫豈捨已而隨彼也昔大禹佐理水土攸平君臣交修抑亦有定制洛為天下中碩儒訓傳家有其書慎厚遜讓猶有先王之遺風陞西洛之堂者當慨然以思謹其執中將見夫作人如新之驗由鄉而達於邦國勵之翼之示諸於掌皇極之訓其效可成也薛公名友諒温宻有文今為翰林直學士推先志之私淑焕而廣之為屋凡若干楹又將延師以教後之學者而屬筆於桷故以昔之所聞者著為之記建城夫子廟堂記景城縣東南三十里有故城焉曰建城漢為中水縣地金大定中以其地北臨滹沱南薄御河徙縣於今所二水交流名之曰交河焉皇慶元年保定王君領縣簿事循河故堤水落冬月先期率民以補其缺頽霖雨時至則因其防而巡督之河不横流政簡民佚觀風省俗聿來於兹望其井屋聮屬誠阜且康於是士林之秀曰劉國芝耆老韓昌等言曰建城舊有先聖廟城址日圯而廟莫敢廢在昔許文簡公安仁嘗撤而新之未幾金亡居室燬蕩而獨巋然以存至元戊子國芝之父禎遂易扵文簡公之故居以詔於里士絃誦之聲家至而日化矣王君周旋里門念崇而新之於是治書侍御史張侯完以書來曰吾里夫子廟易代有存許劉儒先作新之志子盍廣諸敢以楮幣若干為里人勸於是下令輯工奠方闡基表植巷道庭宇邃嚴以丹以塗論講有堂㳺息有廡明年率其儒生落而祀之迺介刑部員外郎葉蘇君㑭志其事粤自塾庠序學之制不明而士無所於學州縣有學率嵗時奠祭貿貿道途謹修其故常於造士乎何有成周之學備四代而畿内為序十有二為庠三百左右之塾復不預焉噫先正教學之興何其盛也學必釋菜於先師虞庠為鄉學有堂有序得行釋菜之禮記禮者之言也釋菜於廟則自魏晉始也遵古之學從今之禮損益之變不亦可乎且鄉校不毁鄭人美之今天子下詔明鄉里選舉之法建城之學者由是而陞司徒者將皆敦讓重厚敏者謹其藝能恂恂于于仰止昔賢舉不絶書而王君化民成俗之美庶得以傳於後王君以習國語始為樞宻院從事名某治縣有法類是封龍山書院重修記世祖皇帝以盛徳深仁正位纂圖越二年始立翰林院真定李文正公首以碩徳耆夀俊召為翰林學士未幾告老以歸隠於封龍山封龍在恒山之陽公㓜侍東平府君受業焉地舊有書院兵革蹂躪公拮据盡力以成之故其居朝廷也食息不忘兹山天子察憫其志㑭食致政之祿以終老於是公作新斯文逺近之士咸秀出暨公下世踰二十年其從公而顯者曰史忠武公諸子曰杠曰闕曰杞曰煇廉訪使荆㓜紀集賢學士焦養直廉訪僉事張翼宣撫崔某其餘贊成均授鄉里名不能悉數而真定之學者升公之堂拜公之像未嘗不肅容以増逺想也皇慶二年其曽孫慎言為翰林屬仁宗有詔省掾用儒士擢入佐左司院中選都事僉曰李文正公為翰林肇端其曾孫宜以居未㡬拜監察御史而於封龍也惓惓悉如公之志嵗久蕪漶不治徃至治元年為司農屬時請於司農符下其道㢘訪丹漆木甓悉撤以新御史有言曰繼述志事子孫所謹我先公之為兹也實將以佐國家之盛願子記之桷曰致太平經濟之道章句佔畢不能以盡也文正公恬扵進取率躬以化其鄉耄至而辭祿徳之本也導掖其秀民仁之至也其徒卒昌扵時孰不曰文正公所作成也今遺書具存在扵書院者宜究其委源考三代之所以長秦漢之所以失反躬以思平治之道如指諸掌將反覆以陳於上李氏世守家法則書院永永代有嘉譽其繕修也益廣扵今曰矣本末具前記不再書慶元路醫學記醫之書作於上古乎後人猶疑焉隂陽氣運之說與易書禮相脗合蟲魚草木之精詳扵詩尤近之然其辭義奥古卒莫能通曉非專治者不能也先王知之始為之師以教之後復立學以長之生人之本繇是備矣至元壬辰濟南陳公祥為肅政廉訪副使來四明遵詔㫖立醫學學成甫十有八年燬焉其地近市狹紊咸病展事鄞縣西有故主簿㕔事基及傍近地蕪礫不治於是故授徐君源道等請於郡遷以廣之迺斤其舊地得財若干以治土木郡侯完顔公首為之勸推官賀某贊補其役𨽻於醫籍者胥率錢以輔之逾年而學完殿廡翼成軒闊深静㑹予自京師還里屬記其事余㓜嘗聞長老言鄉里多名醫皆修謹退讓呐呐然若不勝衣察脉視色必原扵井谷經絡之微眇調製湯液必通乎風土之宜甘辛燥濕内外相為表裏者悉參取扵經傳故其術百不一失懷疑審問求正扵勝已無忌悻之謬道同而氣和相遜以禮相處以義而昔時公卿家激厲奬與之道又能使盡其術而無愧噫亦盛矣今皇宇恢廓五方士民參雜乎州里拘而不達將不勝其弊率焉以僥倖懼其深有所失也徐君世儒醫教授是邦今二十餘年重静而不撓昔之所聞徐君深知之廣天子好生之徳諄諄然語之使後之學者誦其書母執一以自滿虚心遜志復昔時之長厚不幸罹於疾病將得盡其順受無夭閼之害則徐君之教不亦闡乎余歸田里尚幸而有見也白石書院記釋奠先聖先師定著於祀典而鄉社之所宜祭皆廢不舉宋初肇建四書院釋奠釋菜之禮悉遵令甲若鄭𤣥所言髙堂生毛公制氏之徒皆不得專祭僅列扵從祀濂洛之說行於是先賢之祠競立首扵其鄉復推其居官游歴之地甚者謂其觀風宣化雖其足跡之所不至亦當有祠夫古不墓祭謂其神專於其居室也又曰不歆非類謂懼其瀆而不正也今郡縣朱文公祠㝡廣各慕恱胥勸終莫能有病之者繇是空巖海嶼屹然巋立而入仕者借是以為資歴何先賢祠祀先後盛衰之不同也朱文公之髙弟曰黄文肅公天下尊之曰勉齋先生其學以持敬為先探微鉤深以極夫操履之實懼其守之不專則蚤夜以思歛其粹精絶其枝蔓正誼明道見於經濟故其臨川漢陽之政惓惓於征繕獄訟而論者始不敢以儒為侮守邊議戎衆皆咎時宰用非所宜而公益得以攄其素講事至而不懼政成而不迫是則儒者之效惟先生足以及之先生嘗曰吾於江東之友得三人焉曰李敬子胡伯量蔡元思時廣信之儒先劉君養浩盖獲登其門朝夕習益悉以先生之指授者為標準寳慶元年入太學舍法成淳祐七年授寧國府教授後進之士從劉君者無虚日相地於白石山為精舍以處學者祥刑使者建安蔡公抗扁之曰白石書院蔡公之於文肅皆文公之門人從劉君者悉稱為白石先生天運合一白石之子也嘗安輯其齋廡因曰先君之承先師曷敢墜替誦聲屨武益廣其舊後為湖廣儒學副提舉以殁有子曰光􅂧慨然曰大父師友之傳不可以不垂乆逺文公祠遍江南祠文公則文肅道得以尊久遂買田築宫中為禮殿書院之制悉備殿北立文公祠以文肅侑食後立大父祠繇是傳授之㫖益信所𨽻有司上其事於中書省省允其言始定置山長入選調既成㑭桷書始末著於石章噫文肅文公之忠臣也疑者補之異者同之不以一時之辨争而立其黨與見於成書故其匡輔之功若文公之於程子今之尊文肅者能若是斯得矣光今為史院編修官敏達知治體文肅之學是誠有望焉者也昌國州重修學記青社韓侯莅是州踰年顧瞻學宫頽圯曰至喟然嘆曰化民成俗必自學始爰相厥攸鉤稽負逋治其島租墾其閒田究整是先泰定元年十月甲子役興用工二千有八百計緍錢二千有五百匠石曰食之費則諸生欣輸以佐扵是殿堂門廡齋庖池徑咸得備具謂桷繇翰苑歸㑭記其事桷甞聞之先儒以明理為綱領譏詆漢唐不少假濂洛之說盛行誠敬忠恕毫分縷析一以體用知行槩而申之繇是髫齓之童悉能誦習髙視闊步轉相傳授禮樂刑政之具獄訟兵甲之實悉有所不講哆口避席謝非所急言詞之不工則曰吾何以華藻為哉考覈之不精則曰吾何以援据為哉吾唯理是先唯一是貫科舉承踵駸駸乎魏晉之清談疆宇之南北不接乎視聽馴致社亡求其授命死事率非昔時言性理之士後之學者寧勿置論而循其故習者哉昌國惟四明海中州士之興起自紹熈始著樓宣獻公袁正獻公楊文元公尚書深寧王公嘗記其建學論堂之本始揚雄有言曰百川學海而至於海善喻者也首之以訓詁之精次及夫名物度數之宻由小成至於大成非積年不能以至周官鄉三物之教詎止執一而以為傳道之要殆不可也委流安行由蹇而達訖歸於海學之功也侯名摶字仲舉既興其學迺復儒役以為大比之勸學之士子寧不自勵敢執筆以俟是役也州之長某州同知黄棟孫判官張信吏目陳益學正孫恕皆叶贊其事泰定二年二月癸卯具官袁桷記昌國州醫學記醫之道即夫人身以備三才其說與易箕疇詩禮相表裏亦大矣哉盖昔之君師聰明神聖因夫五行以寓於五常之形氣致坎離之用以合其隂陽推其運行以齊夫寒暑考九州風土之宜别温凉燥濕之髙下蟲魚草木纎悉備具非博習廣聞者不能也至於七情既發之偏必求其中以返於正皆吾儒傳心之極論有察於聲氣臭味之眇忽考之於遺書受之於家庭積歲年不能以竟而掌政令者從是稽其醫事以制廪禄是則寧有夭閼疵癘之憾也哉南北地氣有大不同而為之醫者各執已論近者急於好尚而恣縱不能商度十失五六誠可罪也秦漢之主卒望海求不死藥藥詎能令不死盖其空巖絶島磅礴於巨浸之際絶囂塵接雲霧靈根異草得地氣之正方外隱士時採其竒絶精良以療治輒竒中而功倍今所謂海上方皆其苖裔而昔之集方論者復蒐類於蛟龍之窟穴海於天地間號㝡鉅焉得以有遺也昌國為州四履皆海至元二十九年始立三皇祠綿蕝不稱韓侯治儒學既竟復莅醫學兹曷以奉揭䖍廣其故址而二倍之泰定元年冬十月正殿成復立論堂翼以東西前為儀門外為神門廊廡有序祠象儼赫首以圭租勸民胥成不三月咸樂以助復遵詔㫖為恵民藥局工既畢書來㑭書其事於石桷嘗謂疾痛疴癢切於吾身者猶民之身也民困魚鹽侯能紓之儒病徴科侯能復之既憂其生又懼其罹扵疾病使夫習為醫者講肄以精其術故余歴叙醫家者流其學實難三聖之書昭然具存反覆紬繹皆得以完其生是侯仁政之本愈逺而愈不可忘也定海縣重修記定海為縣自昔號重地鎮遏戍守異於它所南受諸蕃絶域之颿舶東控島夷不庭之邦商賈舟楫噴薄出沒據㑹濟勝實東南之竒觀也皇元考圖受貢益倍於異代信使香幣渡海嵗不絶縣令將迎曰疲於供事視公宇若傳舍嵗益圯剥至治二年忻都君始莅事曰吾受天子命長邑扵是失撫字則奚以仕嵗適大歉徴租扵民將不勝逋負計嵗所入一萬有竒遂覈其實止輸竒於官鹽賦嵗不登民益以困卒請而蠲若干嚴飭官驛置𨽻人以候過客而復其役久而曰吾將治所居以聳民視瞻一撤以新為楹五十餘瓴甓木石丹漆箭鐡皆堅緻可永久教諭蔣君昭先列其行事㑭為記余謂治縣莫先於宜民承上意而不鳴其疾苦甚者増羡以求媚善譽乎何有縣當水陸之衝輒黙計嵗月得觧職即謝去植仆舉弊終其身未能也若是則忻都君之行事汲汲慕古將有以大其所為夫豈苟計目前之功效者㦲余特記其興造使來者有攷蔣君所述多善政不復著推其所為舉綱以遺目盖可知矣是役也尹曹敏中主簿薛炳悉力贊治故迄用有成新建鄞縣尉廰記郡治絶江其地名甬東吴王居甬句為古浹口號甬江在今海濵海達於江入扵奉化西釃於餘姚縈紆回曲綿亘百餘里鄞為縣分東西以浮梁為界東之民習網罟魚鹽以自業其地膏沃有湖可以灌浸率不善墾治春至輒率其子弟文身櫂歌出没扵海島伺危薄險對面成姦宄憲令昭著至死有所不避尉以廵督為職自宋雍熈間置尉治扵彼盖重其地以鎮遏迄今數百年游手益夥捕繫無虚日廨燬於兵踰五十年尉率其兵徒随所寓無常地訊録之所不具扵觀瞻莫格其非而任益以困矣至治三年廬陵周君一䕫來視故址曰吾不可不自重首為外門復為廨門中建㕔事挾以賔榮輔以吏舍後設燕居以休其勞清流匯池花木列植周繚塗雘皆足以支永久吏有言者曰尉職在察盗囹圄不立奚尉之為兹土之民俗弊已久鹺禁之嚴莫窮其窟穴朝夕胠發纍纍旁午不有以居將曷能以有處尉笑曰道徳齊禮夫子之訓也獄市無擾相國之言也閱數月獄以空告於是輿人有言曰尉之申申非取異以求新塞其姦慆養其淳真彼疇鱗鱗良苗氲氲尉之去兮將以告夫後之人役始扵泰定元年秋八月成於二年之二月郡人具官袁桷記浙東廉訪司重建澄清堂記國家肇置肅政廉訪司浙之東以婺女為緫治而行部使者凡六人讞審殿黜循歴於六郡總治之使二人坐鎮於婺六郡嵗終必以其成牘歸子總治定其可否以上於御史臺持綜覈之實執與奪之柄厥任實不輕矣夫以輿地之廣貢賦之夥天子不能以自治必假扵守令焉守令不能以公其心又假扵耳目焉以重其寄大其居室聳其視瞻廉逺堂髙非直為觀美也聴事之所繇唐歴宋嵗久頽剥不治至治二年中奉大夫馬公為使於是邦顧瞻改容曰兹不可不為先務邦之耄倪亦曰兹實聴政之本扵是郡請於中書行省計郡餘財以為匠費崇其堂隍稍北以構柱甓孔新庭廡邃宻名之曰澄清復為燕居之室於其後曰迎華觀經始扵是年之九月明年五月告成中奉拜湖廣行省叅知政事以去資善大夫思蘭公甫至則曰中奉公之恵後若是宜紀其事未幾拜南臺中丞資政大夫岳烈公繼為使亦曰是誠不可軼於是僉命桷為之記中奉資政嘗牧於吾鄉皆得而接識往㑹中奉公於京師謂余曰民之多寃繇循行者不盡其辭吾往浙東將使六郡之疴癢亦切扵吾身後聞其所行果有所不避資政公廉而守正牧民如已子遺愛於四明人能言之中丞公得見於㑹通河議論氷雪以刺劾為已任是則三公之行事深有合夫至公之論抑又聞之事患有所不明知而不有所舉藉藉於道塗之民口不可以防也苟明矣不少恕焉則法舉而徳不足以化今使者五人皆遴選在位於以見聖上振整之初政登斯堂也則相與講習見扵施設不薾以避不苛以求陽喣隂肅吏民率服胥保恵以承於上其治豈不偉哉夫志同議同任事同七郡之民孰不鼓舞以嚌詠太平之盛桷舊職太史慕前賢壁記警戒之實因以謏聞而為之辭明逺堂記澄清堂成紀興繕之本末矣叅政馬公奉聖天子明詔廵行江浙復至婺女見其燕居之堂舊曰迎華觀者而更其名曰明逺取其切於觀風之道副使馬公經歴祖君冕復求記於余於是屬筆為之辭曰今夫七郡之黜劾悉萃於澄清吏抱其牘鴈鶩以進卒不敢妄議其可否將求其生欲重其罰情皆不能以得也精思以究必退省焉以品節之事窘扵一庭而智足以見萬里古之善馭吏者不泥於法律不事扵朱墨故其革姦警饕無言而化成必有其本也在昔聖人明目達聰百僚在官定扵三載之考績夫豈有他哉維東浙負山聮海風俗不一强者雜諼詐柔者率罷軟撫摩之道各有攸處登斯堂也必攝齊肅容悉議其所宜行退於燕居申申夭夭燭照數計考七郡之幽隱如指諸掌名之曰明逺孰曰不宜今叅政公之按行非家至而户到也是則明逺之㫖講之熟矣則凡後之來者益得以省察俾勿壞泰定三年四月丁丑具官袁桷記新修司獄司記國朝肇置司獄司専以掌守囚禁職卑而勞猥為其官常憒憒不得志浮湛坐曹日數嵗月希善代謁吏部者每請託求免注繇是視為傳舍狴犴之不修桎梏之不整所至皆是憲部審决亦有所不暇及簡漏相仍其勢然也永嘉林君龍澤之來守是官也曰吾不可不自振考其成牘剔疑擿姦重者上憲府輕者白郡守多有所變易罪以不寃囚民宜之久之曰獄不可不繕營至大二年獄既燬支敝植仆僅存其制於是除地撤瓦築堂三楹曰平恕堂後燕室曰種徳左右翼軒環以吏廡迺築髙門迺闢圜土養疾有堂奉神有祠繚以瓦垣浚以甘井取足備具各中繩墨盖先之以已俸而官若民迺悉為之助不旬月而告成噫亦難矣昔人言不卑小官扵林君見之州縣疑獄郡輒以委林君揣情以求其生量事以正其罪羣吏抱案詣庭下無虚日是則林君之果能令官大也書曰典獄非訖于威惟訖于富若是則寧有私謁者乎余直集賢林君時為掾史處事立具今覩其政績顯白足可稱道庸紀嵗月是役也興於某年某月成扵某年某月泰定三年嵗在丙寅郡人具官袁桷記慈溪縣興造記泰定二年冬十一月保定孫公楫循行四明至於慈溪覩其縣治壯麗整宻咨嗟徘徊詢諸縣人邑長為誰咸曰此昔烏忠顯之所成也忠顯為縣首治董孝子祠以化俗次修孔子廟三皇祠曰儒以長民醫以養民又治社壇嚴其齋宿以謹水旱迺曰迎詔禮賔兹不可不䖍傳驛休息宜慎其寒燠興繕既畢始曰吾亦得以廣居於是矣語未終孫公曰是誠可紀載扵是命進士翁心傳為圖俾桷為之記聴事五楹髙其前三楹焉堂曰清清淳化中尹張叔達璽書之所褒因其名而築之者也挾以吏舍厨湢獄室縣門鼓樓前後有序縣治之後有小湖湖之中為洲花竹四列風蓮水柳暎翳繚繞為亭以庥其居有四曰思政佐治以察民隱也曰柳意勝覽以樂其神觀也圖既畢復言忠顯之政墾萊輯亡役不病扵民去其姦饕以為政本今其去十有三年思如一日而其繕營足以支永久扵是有驗噫今之為縣嘗患夫土豪之控持也其始也利以誘之終三年更徴需歛散一聴其命户稅更易拱手莫與之抗甚者為之囊槖可哀也已孫公之來兹邑也其亦有所感表去尹之美亦將以警夫來者余昔在太史觀循吏之實書以示後忠顯不求名而名自至孫公之為使者夫豈計目前以為黜陟哉始忠顯之滌篆也漫不可考謹視之實秭歸縣印言扵攸司而更正之其精覈率類是則凡今之為縣者廣使者之用心以成其政績桷雖老尚當記之泰定二年嵗在乙丑冬十有二月甲午郡人具官袁桷記定海縣學藏書記定海為縣南接蠻島汪洋數千里食息可至厥今號為重屯四方語言咿嚘侏離交衢旁午褒衣儒冠見者訾議考諸郡乗惟沈端憲一人嗣後接武猶班班可考泰定二年春某官始來為令迺曰縣固有學學必聚書冥行空言講習何補武城絃歌先聖是取進鄉小民首於文辭其必自聚書始迺與主簿龎君首捐俸資復命教諭汪宗江出學粟㑭儒職樊惟肖胡驥繇杭置經史若干卷又諭學之耆老曰經以窮理史以究成敗廣聞修辭惟子集是宜是亦不可缺復得若干卷將刻石列目以示永久謁記扵余念昔在殿廬見令尹之兄在廡下察其儀貌莊肅知非凡近後果為進士第一見令尹于國學儀端語温審其頡頏萃於一門今兹掌其邑尤以教學為已任抑嘗聞之聚書非難寶書為難校官之不職悉資以奉權貴甚者竊其故籍挾之以逃其㝡甚者漫漶散落一不挂眼三者之病比比皆是今刻於石將杜其漸後之來者寧得不自勉乎慶元路重修先聖廟記河南郭候視郡事之初首定役法郡民日困鹺事旬月按覈數嘗不登郭侯知其奸利迺言曰病在私商潜轉輸其所贏餘卒不入公籍民病不可藥也於是罷賈區分四廂俾總之鱐醢豉脯各趨其時視計口之授畧相等復竦然曰吾職司學校兹曷可少緩督大小學謹授業斥其偽冒以其餘粟大修孔子廟扵是進郡博士陸晉之學正録胡某毛某而言曰漢文翁立學歴唐宋幾二千年猶完緻君等知其故乎少間曰教在不墜其不廢在繕修迺曰若殿若儀門風雨剥圯在丹雘先聖崇嚴列祀肅雝在作繪定章服在禮象又曰講有堂書有樓吾亦曷敢後姑徐徐為之吾願㑭是邦服習仁義秀乂林立遣詣王朝將自兹始桷繇禁署歸里凡三年愛中和樂職之詩首為詩以咏贊侯名郁字文卿所至官以興學為本詩曰茫茫海甸聿仁義邦圭組積榮失其敦厖嵗亦云徂夸侈則降維侯之來靡瘼不知曰維泮宫風化攸基竦其具瞻象神之儀藻井繪櫨絢分承式降陟有嚴是奉是翼匪土木之工職教攸則瞻彼㦸門有飛戾止斯翬煌煌五采屬纚鏘鍠八音粲曰在耳嗟爾後生無媮以誕無逸豫伴奐遵我侯度以靖以獻奉璋有峩伊侯之願鄞縣學興造記延祐元年桷記鄞學之興造矣甫一紀職鄞學者括蒼林君傳以事狀來言昔之經度踰扵舊址廩入不給故其結構塗塈缺焉未周鄞之尹曰阮君周翰治縣未幾有恪殿謁首以興繕為急割俸以勵儒生於是歩履有甓繚繞有墉礱以宻石華以堊丹象設有嚴講席齋廬足以稱絃誦而從祀一百有五悉易以塑合儒先之宜祀者為祠以庥少間曰既完矣盍廣教以振士類立小學師二人而増弟子員凡五十人泰定三年二月朔告成復命桷記維鄞自王文公延杜先生以君師為端本故後之繼承經術淵懿蹇蹇大節見扵史傳者凡數公衣冠日隆微近功利而懐忠抱徳盛扵乾道淳熙之際遺言正學傳扵今猶未泯周翰之先公嘗分刺是邦厖眉褒衣諸老森立盖嘗極尊賢之禮矣今兹作新亦將有意夫斯道考問徳業吾猶以為有在也周翰名申之池陽人林君字以道非怠其職以苟度者扵是乎見魯公修宫形扵歌頌系以詩曰維鄞之峯煌煌金精其江縈紆挾城以行磅礴元化孕兹羣英其英伊何鬰彼瑚璉不戚施以求是則是憲發其精忠匪石可轉曰尹之來庭誥是遵顧瞻廟廷風墮雨昬土金丹漆有炳其文宫既完矣失教則缺循循子佩自今以始罔敢越以道氏林葺搆揭揭杜先之訓百世服膺有失其猷將夸誕是興凡升論堂戰兢以承清容居士集卷十八
