front:
  text: 舊川淪來者荒塞昭銘墓門以作後則
  hash: sha256:a55ca262af5ce8b9fefaad313b6cd49cc43e64a9936ae8faff80a32791cbb8d8
body:
  text: 清容居士集巻二十九欽定四庫全書清容居士集巻三十元袁桷撰墓誌銘墓表𦵏記宣武將軍夀春副萬户吳侯墓誌銘往者夀春為宿亳要衝犬牙相承城郭樓櫓移易無常所草舎殘缺狐兔出没道途間築覆土窖以避妻子短兵迎接利不利不復計猶持農器治田壤惴惴求活嵗率如是世祖皇帝以天兵取江南捨兩淮為最後至元十一年外渡江十二年平江東抵錢塘宋社告亡十三年兩淮争奉地圖以降無鏃刃之費天下大定而淮始得為樂土矣當是時吴侯祐以夀春歸職方其子安民字惠卿侍父承顔行率部伍招輯潰卒控曹橋下獨松渡越江畧定㑹稽台温三城南踰閩嶺拔莆田擒將李雄生俘其守臣而以功歸其父二大帥曰呉氏子宜第其戰多别有以賞勵乃署千夫長十四年父卒始襲爵佩金符為管軍總管鎮揚州十八年大治兵伐日本拜疏請行授宣武將軍征東副萬戸領淮東西兵以先舟師抵其國八月􅄓風大作器械軍士沈溺物故袽破舟亂流以經海島高麗日本二國常不相能遇高麗邏人問所以載與還而先帝亦厭兵罷征矣二十年建黄華反奉命往討之至政和縣獲賊將度九峰嶺接戰益急得其偽署圖籍虜驍將以歸十有二月昧爽進軍平溪華盡死力拒砦赤巖山盡俘其器甲族屬黄華始平迴鎮揚州二十一年省治杭州從與俱其年鎮湖州路南潯明年調嘉興路海鹽未幾復還南潯又還鎮夀春二十四年詔領軍討交趾至黄州罷兵二十六年鍾世明叛江西呉太仲叛興國縣搏竒蹂虚率以底寧上功司勲輒卑退不欲言三十年移鎮和州大德四年七月某日即世年五十有七娶楊氏先卒子男若干人長繼武襲其爵𦵏于宣武侯之墓左曽祖某祖某妣某氏予嘗聞古名將垂老呐呐若不能言祕畫勇畧壯嵗所施無留藴閲成敗得失已盡醇酒鐘皷夫豈託焉以自完者與烏江馬君某言吳侯知儒書後悟浮屠氏禪學充然若有得其女弟亦能為禪人偈語是皆世所鮮有者銘曰維昔淮甸勁雄莫侔一夫當百鋋戈怒投裹彼乾餱聿嚴盛秋養安懷慆苞桑靡謀天錫大帝神武興邦捨其喉襟投鞭浮江俘駑擒驍百城舂撞視彼彈丸後夫卒降桓桓吳侯效命奉職以其素能昭代著績褰裳先登飈掠電激或乗其􅇖或躡其跡瞻彼霍山雲流無蹤昔困于兵今黍芃芃繄帝之功維民之逢侯之幽宫松栢茂直告而孫子靡懈靡􅑯法其退謙恬静以黙我思于淮作銘示刻同知樂平州事許世茂墓誌銘端平三年蜀破衣冠大姓順流下東南至江陵十不存一二皆舟觸巖崿瞬息以死淳祐三年蜀益蹙避兵來南其物故與端平無異宋主憫其流離悉擢列在位大者輔政機備獻納外為閫臣郡將經術史學四方取以為宗則宋既亡故國世臣益困辱不自振淪胥泥塗非獨蜀士然也大德七年桷備史屬選與虞忠肅公孫集交許君松以湖廣掾上計京師詢其官簿則顯謨閣學士給事中少保諱奕之曽孫中奉大夫知紹熙府謚介節諱彪祖之孫奉議郎通判涪州諱長源之子君字世茂懿範世則珠貫而櫛比語西蜀事厯厯在指掌清言雅儀筆札擅簡古卑讓恥與後進較酒至醉愈恭不復作世俗語遂締與之交至大元年授潭州榷茶副使再見之貌益温論事盡繩墨智圓氣完欲以政理自表見故其為茶官也不務苛刻而課有贏羨仁宗皇帝立科舉以君考鄉試自喜曰吾嘗貢于鄉黜浮培實宜以稱明詔是嵗君所貢士入南省號為得人延祐五年授徽州路婺源州判官復與語輒愀然曰吾家繇開慶初辭簡池寓南康墳墓井邑生别踰五十年貧不能忘禄齷齪州縣弗得以文墨顯吾何為哉其治婺源益自振剔絶蔓探疑明以近民而盜跡不敢入境至治二年見其神益清貌益癯舉酒屢酌却雋永猶喜議當世事桷與翰林直學士曹君元用子貞共署薦為湖廣提舉儒學思以佚其老集賢直學士鄧君文原善之亦曰是舉誠不忝吾為江東分部使者嘗舉其政事文學矣十一月授承直郎饒州路同知樂平州事嵗終得上氣疾正月甲午終于邸舎年七十有二曽祖妣某氏祖妣某氏妣某氏娶趙氏再娶陳氏子男若干人女若干人孫男若干人始君居南康閉門授徒以奉母右丞燕公公楠開營田司知其賢取以為佐後遷行大司農益任之掾湖廣省六七年能以儒術輔法令事明理融無底滯固陋一時吏師尊禮之君始生踰百日晝夜啼不止有僧祝其頂曰汝為許氏子啼何為耶啼乃止未幾涪州下世年八嵗隨舅氏茶馬趙君寓江陵里有灾能取涪州神主奉以逃稍長益自奮勵諸老咸器偉故晚嵗宦業雖不大顯而行事有足稱者其喪歸以某月某日葬于某原子􅀈踵門以廣信劉君光事狀泣曰願請銘桷泣相向不復辭嘉定更元韓侂胄誅解偽學禁先少師正獻公曽大父樞宻越公相繼入著作庭給事中少保許公巍科首班著善類肅穆天下傾動未幾少保論外戚不合去今幾百二十年閲昔時題名求其嗣續率皆澌盡銷鑠而桷與世茂俱為曽孫相顧自保灰編墜簡證世德之舊於世茂實有望今死矣雖欲勿哀其可乎銘曰蜀繇秦開千載底寧英光蜚聲山川耀靈漢魏啓伐不假以兵唐宋踵規開門晝迎錦楹繡牆夸浮日矜帝鑒地圖百神震驚氈車轟轟金戈晶熒自西徂東舳艫貫繩或沈于淵或疫以乗蹇蹇許公疑丞弗登是生介節嬰彼孤城恂恂涪州弱息慎承流離拮据守其書籯儒以飭身政以裕名匪急於禄抗宗希成凡我士族欒范是懲東南之區凜其春冰我思許君是用述銘任隠君墓誌銘鄞甬東横溪多郡宗故家桷之七世祖祥符丞而下娶婦皆楊氏少保夫人曰申國太保曰越國魯國太師曰齊國幾三百年矣楊袁為中外表嵗時往還無虚日而甬東任氏與楊姻婭亦十餘傳一日任氏子元善介予表兄楊仁之以其先君子之狀求銘復録其十九世祖唐建州司馬逺之𦵏記以示其記曰建州生佶檢校尚書工部貟外郎兼侍御史是生崇試循州司馬循州生貞幹元和十三年補集賢殿供奉承㫖後為越州都督府功曹叅軍以終集賢生行規大中時以明經薦于鄉舉上第為蘇州司兵叅軍吾里士族莫先於樓袁楊蔣作郡志者於任有缺仕莫榮於集賢承㫖承㫖布衣為者也職撰述校理在元和時任不輕畀司兵以明經登唐上第尤偉著志亦不紀考孫吳有任光任奕皆鄮句章人今其地為鄞縣則建州蓋二賢之裔而先賢皆遺軼比予補郡乗亦缺然有愧矣嘗考大中以後鄞數為盜侵掠城燬蕩遷徙錢氏以宗親専節鎮租税刮剥民不堪奉昔時故族躪藉銷鑠於任氏槩可見至宋受版圖興文儒鄞士在汴始盛渡江以南雲滃川湧幾二百年而不幸數十年詩書廢墜望塵執𨽻欲為任氏十九世之傳不可得噫可勝嘆哉可勝道哉任君名天祺字君瑞曽祖汝諒祖用康父逢龍其居鄉善保衛徴調數起先事以備縣胥不能高下友其弟天麟弟病酒死曰吾不可使弟無後殯其喪俟我死必俱𦵏也大德七年六月某日卒年五十有八未幾婦顧氏亦卒以其遺言大德十一年十二月丁酉奉柩與弟及婦俱𦵏于吳公山之祖塋妻屠氏四子元善可善承弟後達善兼善孫男四立道𢎞道鳴道原道孫女三立道楊氏壻也銘曰世胄日顛任譜完堂堂文藝志録傳昔通今晦理則然鄉井急誼手可捐金峩東聳下泓泉蹇極遇順盈百川我銘考官以昭先歴十九世緒益延焯哉任恤德靡愆率而雲仍亘千年史景賢墓誌銘君諱韋卿字景賢鄞史氏故國世臣太師承相保寧軍節度使越忠定王諱浩為曽祖妣貝氏魏越國夫人太師中書令保寧昭信軍節度使衛忠獻王諱彌逺為祖妣潘氏齊魯國夫人觀文殿學士正奉大夫奉化郡公諱宇之為考妣趙氏高平郡主君幼成合矩度進退持奉侍立占對識者知真王孫筆墨書史楚楚自將皆有法郡公目送深念之稍長鉛采自陶冩蒼松㫁崖昂然有遺世意宫商敷宣綵鸞詠而鳯幽鳴也退静韜匿𡨕會於千載之上察其念良是矣郡公職二品君當以京官入仕生晚禄弗及至治三年秋八月得上氣疾却藥賦詩出别於宗親桷時官京師呼桷子瓘立牀下曰為吾語而翁求銘以昭吾志焉越翌日辛酉果卒嗚呼年甫四十有八章綬積襲隠顯有定數至於年亦不得永是可哀也已維忠定王桷外高祖幼習外家獻文世德相業焯在宋史不敢論獨叙三世夀考以増君之悲維忠定以三公居東湖三十年陪祠慶夀秀骨山立多士秉笏交語曰史太師真夀相年八十有九即世忠獻獨相二宗二十有七年總核庶政燭照藪納罔有缺年七十以終郡公恂退若癯儒龎眉素毫冰玉照焜鄉黨年七十有九迺終夀種彰灼若是君才不得一見施設年又不能以紹傳是大可哀也已子一性孫女二將以某年某月𦵏鄞縣陽堂鄉金嶴之原銘曰寥寥東陵瓜圓熟沈𡨕里閭企高躅達人知命化不恧手持參差入雲谷周公魯公儼初服奉蓍以占剥斯復學詩習禮在嗣續我銘孔悲辭匪瀆佳城鬰蒼覘宰木袁州知事孔君墓誌銘大德初元孔君昭孫明逺甫為慶元儒學正于時禮部尚書王先生應麟師表後進門無雜賓明逺以通家子執疑證訛桷每連席請益時則有教授某恣睢自負語侵先生迺憤然曰吾不能與之共處疏其謬誕十數事鳴憲府人益奇其抗直有先中丞遺風是後為蘄陽教授蘄陽舊為邊障地君能化其俗使稍就學久之丕變為儒士皇慶元年授慈溪縣主簿郡人咸曰是斥故教授者飭躬以廉民莫敢病未幾江浙省取為掾會歲歉計富人籍田出粟以賑吏不能舞文粟悉入市其直輙减宰輔竒之延祐某年授從仕郎東州知事秩滿泰定元年以疾卒時年六十有二君實孔子五十二世孫中丞為大宗傳四十有七世中奉公傳與其從子玠南徙三衢賜廟譜諜章灼而君之考諱某咸淳間為名太守後僉書樞宻院事職進資政殿大學士而大父某亦贈太子少師謚文介曽大父諱某贈某官妣某氏某氏某氏俱贈郡夫人噫士常患為世家紹宗趾媺懼難以繼仕顯矣德不稱無取也言足以斥姦發揚剛毅是則於孔君見之仕雖不大振於孔君何憾焉予嘗與君繇義烏同邸宿至婺學旬日危坐論古今各欲以名節相勉而懷竒抱介予輒讓不敢今歸老田里期為全人思一見明逺不可得至是淇來請銘安得勿哭也已娶王氏前進士集之女男六淇淮繼兄後海蚤世㳙繼弟後建德儒學正瀛慶元昌國州儒學正滸早夭女二闕陰王墉富春張順可某年某月𦵏葉水浮河原銘曰金剛而冰清行之成也白兮不緇德之貞也憤世嫉阿全粹精也謝彼戚施實蜻蛉也銘以揭之歸藏永寧也僉事范君墓誌銘大德六年范君子誠為平江路經歴于時桷將之京師道吳其郡大夫疑忌事多不決范君抱牘堂上定可否大夫頷頷不復有異議人皆曰是真賛畫才嗣後為掾中書仁宗皇帝在東宫興崇禮文廣廟祭凡視執政者率増贊書桷時日具紙墨君排剔研討使各中繩式莫有訾議嗣爾厭繁劇告外補湖州推官又為黄巖州州與鄞相犬牙治跡賢否嘗耳接巷議州民來鄞必曰吾州黄氏子號豪民范侯能挫抑之帖首受罪後予直集賢黄巖之儒生暨商于城坰者咸告曰黄生易黄冠訴范侯以不直遂議于大學士郭公訖不受其説精神籠絡貫穿于儒術法律將大展其用而其子景文踵門泣以告曰先君之不禄在泰定二年閏月某日得年七十道逺不克歸𦵏以是嵗二月某日與大父奉議君俱𦵏于平江路長洲縣武丘鄉白蓮橋之址原知先君莫如子敢以銘請謹按君諱忠其先京兆藍田人後籍真定今三世矣其為仕首受史丞相之孫耀辟為浙東宣尉府掾改受蘭溪主簿再辟江浙行省掾迺授平江路經厯又授揚州路經厯不赴改辟都省掾授湖州路推官以選能為海道府千户分治四明知台州黄巖州英宗皇帝詔風憲舉守令再知徽州婺源改同知福建轉運鹽司事泰定元年擢僉江南浙西道肅政㢘訪司事其簿蘭溪嘗攝尉事捕造偽楮當受賞君謝不取在湖州有訟弟死非命且疑弟婦受賂焚其尸君録囚考弟實以鬬死婦始得脱湖多淫祠毁三百六十以治官舎分漕四明首拓廰事嚴竦治具新天妃宫以肅祠使其治黄巖黄氏事最著正彛倫絶攘奪尸祝口誦宣著于郡乗婺源俗尚競渡易其舟為浮梁民不病涉在閩中鹽足於民而私貿者悉絶考其所居官興建鋤擊為已任絶功利守名實為君素志迄不展大用夀與禄不失其願亦可無憾矣嘗註禮殿祭器書二十巻歸于鄉學集賢王公仲常為文以美篤于慈孝䘏宗録孤故贈禮部郎中白公某壯嵗深奇之妻以女君感知已凡所為樂府梓刻以傳曽祖昻霄金大安元年進士官正議大夫同知静難軍節度使兼邠州觀察使祖元泰元授從仕郎同知解州事父天祐汀州路經厯贈奉議大夫真定路趙州知州驍騎尉元氏縣子景文由臨安主簿辟江浙行省掾敏修善吏事其進將未艾孫二公琇公琰孫女五乃為銘曰吏詬于儒以儒為拘儒以病吏其刻莫渝據會綂宗孰承其傳温温范侯趾媺紹先化其奇觚不急以干削豪翦強欲援以手謂不大逢亦既禄夀世方尚名我獨掎之彼喜以功縮武避之武丘之原松栢峙植魂無不之子孫承式鄭照磨墓誌銘鄭威敏公驤以靖康虜難死同州紹興録孤褒忠賜廟愍節至于其孫建德登進士第延賞守祠世嗣不絶五世孫諱元貞實奉祠事生孫曰端是生汝賢為江西安撫司準遣生檜為都酒庫官君之父也君諱文瑞字子祥生而骨相殊特府君深竒之稍長從鄉先生課程文有能聲科舉既廢居里閭以孝謹稱至元間下令舉儒吏實預首選試郡功曹移典玉山郡侯復取自近省授監平江路倉轉海道萬户案牘官再為海鹽州案牘轉行省鈔庫副使平江庾氏嵗入浩夥不得脱君獨以治辨稱海鹽多豪民殺人率遣奴償死君能直之行省積弊楮三年不毁君上言申其數而嵗除之後取以為法泰定元年勅授將仕郎浙東道宣慰司照磨兼承發架閣予見君于京師言議縝宻剸割苛冗中綮節暨官帥司下帷沈思吏跡不入戸勾稽研覈充然益有餘地古之善居官者必自持家始自衣冠丘墟不復給足荷戈負耒何可勝道念昔信實要衝君獨善理其身掇拾化治任能竭力相其天時權其贏竒卒昌於官以發其素藴是殆於君見之抑又聞之流光演休首於死節宋社云亡忠義之録一二僅見則威敏之澤雖十世未艾君續其承猗與盛哉其卒在泰定三年九月某日年六十有三某月某日𦵏某縣某鄉子男四謙亨復亨鼎亨泰亨女三嫁黄中正孫良玘葉原道皆仕族孫男七孫女七娶姚氏曽祖妣蘧氏祖妣劉氏妣謝氏謙亨奉柩將歸里踵門泣以告曰先生故大門知官譜唯詳而吾里獲銘者數家矧先子世系若是敢以請銘曰志專豐崇足昌其躬家傳于忠蹇事于公羙玉襲之良馬縶之不泄不辱以紹以續作之怦怦承之競競而子而孫視我斯銘文清薛處士墓誌銘孔子叙逸民謂其求志達道超然於塵垢之外心若槁木形若蟬蛻動莫有跡行莫可名其混世也物莫與俱𡨕神内觀返真潜虚若是者其近之矣故昔之善晦匿者草衣非食不導引以夀養其天年恣縱泉石厯探逺挹興至而若遺擇幽絜以養其雅操求於世吾不得而見之矣今得一人焉曰處士薛君勉薛君信州貴溪故儒家自其曽大父子徹以儒科縣南丹大父琢父士亨繼業進士君益以儒自勵居鄉黨教授名不蘄彰沖然有容守約自裕游湖湘極交廣返築室于宜陽納幽據勝為堂曰寶善以示子孫泰定三年四月某日卒年六十有八族黨姻戚咸會哭曰先生儒以紹傳兹其為文也宜矣固窮而無求貽書以遺後其得不謂之清乎遂私謚之曰文清子二𤣥羲𤣥儀𤣥羲與余為方外交在崇真宫數評議吾徒所當為事詞章清峭翰墨簡絜每視之嘗以為不可及君既死求銘於余實不敢辭在易蠱之上九不事王侯高尚其志而初爻則曰有子考無咎嗟夫離世絶俗念不存於家非子承意曷克臻濟是肥遯者猶相須以成也妣王氏配孔氏孫男二女一以某月某日葬銘曰㝠飛維鴻莫窮去還飄搖長裾游於海寰沈匿不羈謝彼世艱貞簡峻清玉雪者顔支離佀困爰養其遯先賢高風承耳接論葆真藏名永裕嘉問振振有子益昌者名三光盪摩服其粹精有大之松清風泠泠非培曷成非繼孰承海鹽州儒學教授袁府君墓表維袁氏四明大族繇處州太守諱轂試開封府第一登嘉祐四年進士第佐蘇文忠守杭文忠為同年生後贈光禄大夫生倉部郎中諱灼得罪政和以歸生贈朝奉諱埛朝奉生通議大夫諱文通議生龍圖閣學士贈少師諱燮嘗以禮部侍郎専史事謚正獻天下稱為絜齋先生桷七世祖諱㲄試開封以中書守當官遷祥符縣丞生曽孫為少傳同知樞宻院事諱韶贈太師越國公受學正獻公於宗譜為族子相踵登淳熙進士第同入秘書省為史官先後為侍從搢紳榮之正獻生子四人俱至名卿尚書東宫官而第三子最清顯嘉定七年進士第一再任國子祭酒仕至兵部尚書給事中實録史院修撰諱甫贈少傅謚正肅天下稱為蒙齋先生正肅次子諱徯通判潭州是生君諱裒字德平以安定長授海鹽州儒學教授未拜延祐七年六月二十日卒年六十有一嗚呼甲族鼎貴莫盛吾里甍棟接耀郡守丞監官議婚對未肯齒擬華腴争高姿庾悦澤可愛念遇大變故困辱不自完業無依歸貿貿以死者多矣方至元十五六年間故家猶亡恙海鹽時年二十桷年十四五移相議曰宦族久當圮宜蘄為傳逺計未幾正獻宅火留城南遂各盡晝夜濬源鈎思探索幽隠以黜陳辭為已任考閩蜀東浙永嘉湖南江西之儒先合其異同不在於貴耳雜書襲訛輯言行者尊之吾與子所當辨更二十年各宦游四方君以憂窘困躓酒酣語豪卒不少貶折詩筆益温雅簡絜察其學猶以昔所言自任桷繇集賢罷歸徃拜焉病且瘠不能起忽手書曰夜夢游南嶽署已判官遂釋之曰南正火也火為離為文明宜司以瑞太平今天子興文禄弗及其在乎子孫未旬日下世夫子作春秋譏世卿史非世官不能兩家子孫凡五為史官獨君不及用誠可憾曽祖妣邊氏秦國夫人祖妣趙氏衛國夫人妣趙氏封孺人子四曰霆曰杲曰銳曰奫孫一人有文集若千卷𦵏在正肅塋十步適迺表于墓曰桷備史屬號最久見秉筆者罔再傳獨東平王公其子文且賢纂修有能名嗚呼吾宗免矣夫君不得預為可吁厥子若孫永紹圖至治二年嵗次壬戌族姪具官桷表真定安敬仲墓表嗚呼金蹂宋踰南兩帝並立廢道德性命之說以辯愽長雄為詞章發揚稱述率皆誕漫叢雜理偏而氣豪南北崇尚幾何所分别當是時伊洛之學傳南劒至乾道淳熙士知尊其說闡明之朱文公統宗據會纎鉅畢備正學始崇又未幾偽學造謗咸諱其説以售仕于時金將亡各流離自保烏覩所謂經說哉有明其説者獨江漢趙氏私相筆録尊聞傳信稍自異流俗皇元平江南其書捆載以來保定劉先生因篤志獨行取文公書㑹稡而甄别之其文精而深其識専以正盖隆平之興使夫道德同而風俗一承熄續絶不在於目接耳受而有嗣也劉既死得其傳者曰安君焉君諱熙字敬仲其學汪洋静邃謂文以載道辭不勝不足以言理故其言脩以立於詩章幽而不傷慕貞絜之實將以自任其道者也道散於異端九流證拾於墜簡傳者益逺而書幸具在不知而作者則索於句讀之末㫖意㫁絶踵謬而莫悟君設對問以辨後作者悔而焚其書左氏浮誕不合經者悉去之續皇極經世書繇元豐至至大三年考家禮為祠堂以奉四世邑人化之教人也持敬為本解經必毫縷以析果知之必騐其所行弟子相從者常百餘人出入閭巷佩矩帶規知其為君之弟子其於劉先生也未嘗一見之盖篤信其書黙求以通焉者也劉亦知君足以傳道卒不得見焉君深悲之而於學有佀君無憾矣君之先太原離石人五世祖玠仕於金曽祖昇不仕祖滔以經童登第金將亡徙真定因居焉戊戌嵗詞賦入等占儒籍考松江東宣慰司照磨妣劉氏君少敏悟諸父咸器之素多疾嘗避隠封龍山然卒不得年至大四年五月某日卒年四十有二娶張氏焦氏子二塈垣女一嫁保定等路鷹坊總管王沖是嵗𦵏藁城縣安仁鄉先塋之側其卒也翰林學士王公思㢘以書唁其父曰自敬仲死詎安氏不幸士林不幸矣有遺文若干卷既𦵏之十三年門人蘇天爵述其事狀踵門曰黙齋先生天爵從學實有年先生之德之行願表于墓原使有考桷作而言曰真文忠公德秀與朱文公同里生不及事焉文公之學真實紹之侑食于廟于祠無異辭集賢劉公生愈後闡揚合一劉公功與真公並安君不得見劉公而道實有傳盛矣哉舂陵之學四方為有準矣某年某月某日具官袁桷表史猷父葬記代其子作大德丙午九月朔我先君子夀春推官卒于寢年七十有三越十月丙午葬其地邇高祖越忠定王墓次百步許先夫人郭氏卒𦵏十五年迺合窆焉嗚呼先君子諱徽孫字猷父少孤祖母嚴氏躬教督具諷先訓感悟于時史氏極貴盛夀春癯然整修奮棄子弟玩習搜紹淵懿族祖文靖公見之曰兒當以文名吾門稍長試吏為諸暨主簿從政精覈邑長缺使者㑭治幾一嵗入辟淮東治田事調揚州司理叅軍帥大器重悉以事付甫授夀春帥益取自佐循承直郎而先君子不復仕三十有三年矣有詩文若干卷晚讀陶靖節詩語近意逺視世德脗合深自慕儗平居無愠忤色筆墨清藝觴至輒就倣邵子觀物為詩數十篇久更困約益以理自得清日危坐道舊事緩語不絶口鄉黨賴焉嗚呼公旦等五男子為從伯父從叔父後者曰公玉公謩次公晝公旦女三已嫁仕族浙西提㸃刑獄贈少師諱彌正為曽祖紹興監酒贈朝奉大夫諱實之為祖朝請大夫通判處州諱顯卿為父將𦵏謹書納諸壙張府君墓田記平章留守亞安公介其掾韓叔亨致命於袁桷曰吾外大父張府君世燕大姓貞祐來兵革相尋獨府君逃難脫死每言避兵本末輒吁歎涕泗且曰吾譜諜亡缺使果得仕吾安能為祖父榮顯耶繇是益治生自裕強之仕弗願也至元十五年三月某日卒年六十有七外大母劉氏次黄氏俱無子一女劉出也嫁我先公中奉大夫湖南宣慰使後以䘏典贈金紫光禄大夫大司徒梁國公而吾母亦得封為梁國太夫人府君之塋在大興路大興縣宜泉里嵗時率外孫奠薦于塋下封植崇謹顧瞻咨嗟推其所自出其接于見聞者誠莫有怠也更數十年則曰禮有隆殺焉推服盡之義至於異姓則必曰先王制禮不可過也夫禮繇情生使張氏有後焉誠不敢越吾懼其塋域之蕪没詔于曽𤣥將有以謹諸為我記之桷聞諸春秋㑹盟稱辭甥舅之國雖數十世猶徼福於先君敦叙之義盖可考也掩骼埋胔先王之令典留守公之用心合於禮者之為也凱風寒泉藹然見於悽愴情之至也然則凡為子孫者寧不守其家訓也哉府君諱祥字瑞之壻梁公諱某外孫長即榮禄大夫平章政事大都留守領少府監行工部事佩金虎符武衛親軍都指揮使兼大都屯田事次某承務郎太府監左藏庫使次某奉議大夫太僕寺丞外曽孫凡若干人延祐四年九月某日具官桷記田氏先塋誌太僕田茂實君秀與桷交京師相好也大德乙已三月某日其先君子諱某年六十有五卒于河南君秀墨色蓬首哀不絶道兼晝夜行歸治其喪將窆于大塋卜以不吉告越二年始得吉于邙山之白李莊迺徙武畧君與夫人齊氏合𦵏以諱某君祔至大戊申君秀奉家譜言曰嗚呼先君子德豐而養薄孤之罪也田氏世居豐州有試金武舉科為環州司候者諱青金徙汴拜武略將軍總戎千夫屯鄧州鄧歸有元改為襄樊屯田官豐州墓夷徙始占籍于洛陽武畧吾大父也先君子嘗言金將亡城郭蟻潰四出馬塵南驅躪藉争死枯骼野燐千里一色豐州為路衝荒墟敗礫白日無人行聲自吾少年聞祖父言每震掉不自已今汝生盛明時重和累休振纓清朝吾老於斯上藝于田漁于河涵煦濡嚌食安閟華没齒誠樂也仕何慕焉茂實泣受其言而書之敢以為邙山之塋誌請桷曰噫夫邙山古之幽宅也穹隆袤廣可以數度自秦漢而降錮其封崇極于夸貴俠侈之士不知其幾後今變更高者為雲烟下者為水泉而慎終送死日相尋於此山愈完而愈新者何也夫貴以日計德以世計德足而貴不至者命也恃貴而忘德貴將恥之今君秀官于朝將貴矣念先君子之言警其宴安彌以自勵吾知田氏之墓滃然而豐茸必戒必護衍其子孫益守孝謹雖千百年無變而始田氏之譜者由武畧愈逺而愈可考者由太僕其尚勉之哉母夫人高氏慈儉有家則君秀今為奉直大夫太僕院判弟二德畯世英𦵏以某月某日袁桷誌高夫人葬記代作嗚呼我先考至元甲申嵗七月十有三日不禄昉時年二十有一平居嘗言吾宗世居遼陽始祖當金時以征遼功封太師有子十人皆拜節度使金亡太師子悉散軼獨曾祖岢嵐州節度紹其宗是生大父諱植為洛州防禦使妣大氏夫人洛州生近侍局副使諱世榮副使卒吾時年八嵗妣王氏夫人寓殯于陜因家焉夫人鞠撫之迄見其成人初娶郭氏前元帥左監軍巨濟之女後來大名經厯高用之無子察吾氣宇非凡近遂以汝母歸于我因定居大名而自洛州而下藁殯于陜者皆𦵏于元城縣之令公鄉焉先考諱昂字沖霄繇轉運幕職拜朝城武陟縣尉能以慈惠撫其民盜不敢犯後謝病退居樹德自秘重享年五十有九以終昉初掾集賢由院上中書自中書累遷為左司郎中出為潭州路總管太夫人視聴明徹總覈靡宻昉盡服王事一不使亂其志意未幾入為中政院同知拜中書省參知政事尚書省立後除江浙省參知政事至大四年詔官二品得贈二代繇是副使得追贈嘉議大夫大名路總管兼府尹上輕車都尉王夫人追封渤海郡夫人先考贈中奉大夫參知政事護軍渤海郡公夫人封渤海郡太夫人皇慶癸丑昉陞資善大夫為江浙行中書省左丞太夫人年益高屢疏終養延祐元年春復召為中書省參知政事奉夫人將北歸使者屢趣就道又未幾改拜集賢學士商議中書省事迺不敢辭遂侍夫人來京師是嵗十月十日以疾終于正寢享年七十有九嗚呼昉不孝先公亡恙時不能以禄為一日之養幸得奉先夫人以自慰垂三十年不自殞滅禍罹慈親攀號訴慕實無所容罪將以是年十有一月某日𦵏于先塋日薄未得謁銘于當代謹志其梗槩納諸壙男一昉女五人長適梁從晦大名等處管民提舉次適李允中萬盈屯丞二人蚤卒次適李好義承務郎齊河縣尹孫男三人筠孫夀孫和尚孫女一人孤子昉泣血謹誌趙令人𦵏記代作嗚呼宰孫大父為郎時先子樂清尹始試吏部静秀専恪鄞史氏號相家刑部再世國子生執禮秉度不以官簿矜許先夫人係永陽王族屬崇近莫敢議昏對永陽尊刑部愛樂清遂以歸乃受封令人而始嬪焉夫人姓趙氏諱孟柔曽祖師意追爵於吳謚宣獻祖希邐掌宗正食于㑹稽夫人沖黙謹視聴儀範不出屏閤相先子以和撫子若女無二意距先子𦵏始一紀夫人以殁殁時年五十有四嗚呼養不能盡哀未知稱乃大德丙午合封于樂清之兆而先夫人之亡適終喪矣痛徹于天彚事徴德將不懈有俟永陽諱與䒩夫人為長女刑部諱能之夫人為冢婦先子諱普卿宰孫為孤子女一嫁趙孟貫是嵗十月甲辰𦵏謹濡血為之記清容居士集卷三十
