body:
  text: 清容居士集卷六元袁桷撰古詩七言題髙彦敬桑落洲望廬山圖為秋泉作長江亭亭桑落洲一塔獨傲蘋花秋邉聲已逐鼙鼓盡水氣欲挾漁榔浮謫仙騎鯨五栁老真景變滅隨沙鷗空餘秦筝與羌管㫁續不洗琵琶愁玉堂小忩觧蒼佩宴坐得意豪端收空青㸃雲碧痕濕方諸取月寒光流匡廬老人在何許佀覺頷首相遲留佳峯稜稜鐡鈎鎖寸樹㸃㸃銅浮漚要知翰墨灑清氣俗子政爾勞雕鎪秋泉山人息機事青眼不與王公酬髙張素壁凜太古擬跨獨鶴還磯頭人坐江湖在適意底用絶俗埋林丘擬圖覽古重嘆息天際杳靄疑歸舟秋泉徳生仲章梅叔章周儀之皆次余韻題廬山圖再次韻以謝海郡列戍連沙洲榆栁插㦸摇清秋擬從京國洗氛瘴黄塵復作煙花浮西山紫翠不可望但訝積雪如明鷗愛君寒齋之畫幅瀟瀟不寫人間愁胷中丘壑我豈少奈此磊嵬難為收宣城詩法擬二妙炯若玉瓚盛黄流永興天機愛神俊碧眼一顧羣無留千年周子古風月衮衮亦散空中漚乾坤無言混沌鑿頗怪我輩勞鐫搜沉㝠天台老僊伯清坐自與廬山酬天清無人月色古縹緲五老疑駢頭功名營身旋蟻磨芻豢得意崇糟丘何當相從老其下釀酒一醉黄金舟張彦清以復古硯贈友人因賦長句髙皇南遊倦鋒鏑宴坐清都賔出日胷中筆陣掃𤣥雲時與端溪評甲乙平生紫玉無纎塵小忩寄傲茶甌春馬肝生寒出古色鵒眼獻秀憎妖顰烏號已去寧復得繭紙昭陵空悵憶猶餘舊賜落人間漆字糢糊記朱色集賢學士胷次髙愛此静閲濡霜毫迺知貪夫罪懷璧底用長物為神勞清齋持盃好顔色楚人之弓楚人得平生弟兄今始知一笑相看竟何惜蕭齋老人筆如錐松花蕩漾摇輕漪江南採菱曲已逺願寫紫府虚皇詞金華曹道士白雲樓蘇仙念母母苦飢化作白鶴時來飛我聞紫虛亦官府朝夕往返勞天機何如金華有真隠築室空翠摇煙霏松花麨蜜五鼎養丹砂汲井千年肥我生不識萱草歡孤身永日懷春暉白雲在天詎可望遲子嵗晏山中歸賦黄帥平寇還蒼梧之山利如㦸五溪南行水如墨文身鏤面號為人蹙口磨牙時剽賊將軍手提丈二殳匹馬直入深林居摩娑銅柱寫殊績南人自此長為奴㯽榔快嚼端禦瘴薏苡不將真避謗繡袍初賜簇金雕聚米為圖指豪壯萬里功名非偶然輕身許國誰為憐莫嫌儒冠守青簡能淬筆鋒書定逺謝王參議送練春紅二枝玉堂老仙玩幽獨閉戸無人佀初溽倚䦨岸幘領孤芳蓛蓛輕紅冠羣緑化工有意卑凡卉積李崇桃空眩目争先鬬巧等堪憐已向東風盡驅逐此花清妍浄如洗收拾餘春傲榮辱何郎湯餅徒試粧太真温泉空賜浴天然生色鑄真態亭午低頭睡初足誰言花后最竒絶我怪酪奴能汙觸嫣然一笑奉清懽莫把金樽歌别鵠并刀妙翦駢頭來珠露淋漓袖新蹙佀嫌凡子多京塵却恨髙人付流俗㣲風澹蕩新雨生强拭愁容吐殘馥擬將色筆寫清意綺語非工那忍瀆徘徊中庭月過半翠袖姢姢泣寒玉題董簡卿瀟湘圖瀟湘之水太古色煙樹空濛成寸碧奔騰日月轉銀丸噴薄峰巒凝鐡石楚棹相將客獨聞楚歌欵乃人誰識望盡蒼梧不見雲千古靈均空悵憶絡馬圖秋原苜蓿肥雲屯帖帖此馬和且馴屬車效駕豈在力愧汗絶足追奔塵良哀不生造父往公子毫端意悽愴虞淵逐日終飲河出門加鞭奈爾何康樂圖長安韓徳卿夜夢至一宫室扁曰康樂因名其堂以奉其母至人無夢夢乃真瞪目一視空中塵悲懽蟻旋水東注遺珠罔象迷其津持虀噉臼逞詼詭取禾坐極夸榮貴不如長安韓生道上眠念母還家枕中記紫霞之宫那俗書煙霏霧結開雲圖虛靈變化在頃刻齧指疾應維心符城上烏啼畢逋尾倚門獨占乾鵲喜萬里辭親真可憐書來端有平安字贈杜秀才歸省荆南臨江種橘橘易朽滿籯積金金作奴何如遣兒束書帙婀娜初服游鴻都從師之樂端解語暫作庭前綵衣舞㑹待明年春水生雙槳如龍天上去贈拙訥子萬言不啻一杯水刻楮徒費三年功何如宴坐寂真静木末時數南飛鴻長安之衢塵羃羃願言飲垢如飲蜜鸚鵡作賦真有才至今江浪猶銜哀寄南劒李士𢎞使君水雲離離千疊峰海日如鏡行天紅使君新沐坐清樾筆底丘壑生隂風玉蘭之花不受觸日給飛泉三百斛髙舂打衙人不來鶴立蒼苔動新緑送任道士歸武夷武夷之峰髙插旻浴日離海朝為賔石牀芙蓉迸膏露乳竇醽渌凝長春隂崖怪壁鳥跡絶葛藟當户苔鱗鱗神君枯魚古籩豆曽孫毛竹今霜筠千年金骨幻凡目玉匣九鏁光如新想當精思握宇宙魄質已化能成身我聞帝居亦官府風馬泱漭空中輪愛君釣鰲避東海笑踏北雪鬚眉銀寥寥空山太古水清夢入髓時相親誰言五色亂吾目得意忘象那非真歸來𤣥鶴忽不見勸汝速浣征衣塵送郭天錫還京口朔風吹塵著駞裘蓛蓛凝絮𤣥霜浮城南泥深擁車轍矮屋夜臥鄉心稠暮春雪消花始放積栁婀娜沙中洲布衣在手不易舉目數過翼隨雲流人言擔簦古竒遇邂逅一見能封侯紛綸寸舌有榮辱智士縮吻成身謀愛君亭亭日中鵠玉色已變扶桑游紫芝為糧露為醑北適瀚海觀羣漚素書滿嚢不干世磊落胸膽看吳鈎新編翦雲彩鸞舞妙筆入木寒藤抽氣酣登臺望陳迹慷慨直欲微言酬舊家鐡甕古城下舂浪汹湧今悠悠但當清談且飲酒往事寂歴遺磯頭黄鸝空桑子規怨橡實已盡榆根留長河淊天怒蛟走底用華表歸來愁江湖清歡眇去袂風雨疾意催行舟人生㑹合定有樂念此别意空綢繆燕吳閒閒氷雪相看豪門炙熱熱如暑下馬還家汗流雨徒將嚬笑作清涼萬事回頭總塵土那知道人玩丘壑一榻髙寒閒栩栩碧雲散作明忩塵妙墨還為小山霧平生冷語出胷臆頗怪梅花猶媚嫵峥嶸嵗晏凜今夕商𣙜斯文共樽俎要知冰雪本竒絶正色森寒傳太古我聞崑崙有至理隂火玉泉誰解煮㑹須鐡石起風雷手抉𤣥闗破凝沍人間寒暑潮去來物外隂陽月吞吐閉門客散真兩忘竹影離離滿前戸㶟陽張節婦瓶中杏枝著花因賦陶人妙合隂陽機凍壺頃刻回芳菲盈盈緑房綴冰蘂玉蝶婀娜穿帷飛佳人蓬鬢不下堂手繡孤鳳横匡牀寶刀翦繒試春色翠袖慘澹顔無光烏頭可白珠九曲造物深知憐不足故應試此一枝春㸃綴扶疎驚衆目君不聞天上瓢髯龍平陸成波濤又不聞壁間壺兩曜瞬息如跳珠齊諧茫昧不可詰炯目看朱動成碧張氏之壺如截肪真火煉質千年剛枯根借潤表貞志慎勿語怪歸荒唐仲章與余連舟而行仲章指畫皆不在人後夜泊甲馬營余舟適先至仲章有詩因以奉寄我船如縮鼈瘦僕凌兢空挽曳掩篷熟睡初不知晚向沙頭踏新月君船如生駒追風破浪争驩呼青春櫂郎紅蔽膝摇唇蹙口歌吳歈昨宵甲馬營前宿大佀天公憐不足回帆望君君不譍出没髙桅轉河曲人生作計那可既誰能盡已不盡智積薪居上東方愁相位還須跛男子憶昨都門經嵗除風吹乾雪塵糢糊閉門擁被謝不出時人背笑何其疎只今船行一千里萬事乗除總如此愛君玊雪雲中英我歌作勞君且聴蒲城孫世英編修父年九十四號嘉遯翁院長而次各賦詩蒲城之下嘉遯翁銀髮髧耳雙碧瞳少年流離老康樂布領踏醉歌春風春風畏人屢歸去阿翁扶春春始住穿花入市争捧盃採藥還家共攜路諸孫青襦誦魯論寒燈夜授鄰壁聞泥深翻疑犢車險雪釋自訝駝裘温憶昔種松如指長俯仰鐡幹參雲蒼桑田變滅理固有底用化鶴來還鄉只今翁年九十四萬事如雲日嬉戲迴首塵中輕薄兒奔走流年竟何事嶽麓圖積石落落雲中礮冠以蒼松藉瑶草天柱脩纎立晴昊絳霄雲璈誰擊考揚許之君顔色好冰綃為裳車羽葆永愍垢濁増札夭湘波層瀾勢灝溔跳珠浮玉簸洲島一洸氛瘴蘇衆槁爰築廜􅂒俾終老出門倚天心愺恅𤣥穎浮花落縑縞無跡空飛詫神媪肘後藏之五色繅念君别去塵浩浩歸來歸來守其寶送何太虚歸山中飄飄兩屐山中雲青眼不受京塵昏意行扁舟本愛雪獨立五栁猶當門人言江湖在遲暮立談雙璧非謬誤相逢挽君君不迴落日蒼茫蹇驢去同子唯賦水車挈瓶之智誠有餘抱甕之勞亦良苦何人嘗巧抉天機河伯逡巡魚鼈舞昂昂長身臥塍岸捲地翻濤敵驕暑誰云龍骨化梅梁未信魚身作橋柱縈紆香輪過流水突兀雲梯卷清雨横陳歌板促紛綸倒流谷簾聲齟齬東家榼婦顔色惡步步生蓮空媚嫵陽烏流爍汗成漿平陸須臾涌銀乳推移燥濕意本同竊奪隂陽天所怒人言無踵能自至跬步周旋路脩阻不辭滿眼看黄雲嵗晚論功付梁梠君不見田舍翁年年辛苦與我同天寒破褐厭糠覈仰視屋壁知誰窮次韻夏明道紅梅江南徐生圖没骨筆底妖妍等塵物此花絶俗避春風東望扶桑入瑰室閬風羣仙笑清寂故遣瓊英侍巾拂龍肝麟脯厭新臊以斗為盃飲真一嫣然乘醉下塵寰欲向晴空舞紅雪崇桃積李行飛翻固此貞容莫旌别效顰不語空捧心美好何由在粧抹懸知正色衆所忌况此纎穠逐時節憶昨嵗暮天號寒炯炯霓裳傲冰月誰言凍吻不敢吐妙思端須續神筆飢腸雷吼空九迴勁氣雲摩難百折人間好語詎有盡三嗅清香應倒絶雪汚齋邢醫取靈樞雪者汙之之語為號有客飲垢如飲墨三尺之泥及馬腹平明對鏡鮮衣裳意氣摩雲飛食肉清氣不來空慨慷願君勿走治其狂明忩紫塵在吾鼎浄洗紛紛冰炭腸次韻閒閒甲子雪絳霄僊人雲作席宴坐𤣥闗已知白萬妃婀娜布青陽浄掃嚴凝驅伍陌飛霙散作平地舞翦綵寧為舊時色西峰秀筆眇何許佀換當年銅緑格洛陽之人凍吻縮詩句那能隨燭刻大鈞有意迴昭蘇至寶無華匪脂澤乾坤偉觀雙眼明髙臥元龍須百尺贈錢唐吳月湖棄右班學黄冠君不見後湖僊一官掉首餐神丹月明江上杳然去唯見玉珮雲珊珊又不見姚將軍夜騎黒騾趍劒門飢來青城采芝食童顔逸足追奔雲人生富貴那可必偷竊隂陽亦竒崛隂符自與素書通赤松來歸乃真逸西湖明月不可釣呼吸湖光月隨照要知心與月同明暫假孤光敵清皎憶昔黄霧衝八蠻髀肉消盡口吻乾萬里生還真幸爾十年老去猶悽然即今落魄隨塵縁丹霞玊樹壺中天何年輕舉花飛鶴歸視城郭同蒼煙送趙君佐茶使淮南食茗如食粥清曉烹煙出茅屋生來不識太官羊翁媪相看夸不足連綱貢餘知幾春排檣接纜來儀真莫言此物常苦飢船中估客肉常肥黄臨汝以長句索筆次韻寸錐飲墨工傳書千載妙蹟遺官奴寶跗緑沈不易致葫蘆荆管那能無古來志士心獨苦採荻夜畫灰成圖書忩嵗月要有限作計何必輸人鬚中山夘君被羇束論功且復歸韓盧栁家鈎鎖本新様内史筆勢難為徒遂令陳生擅料事坐出妙語如擒俘邇來八法益疎漏雞毛兔毳争庭除姓名僅記政自可文采日泯終何如湖隂丈人古仙伯舊嗜寶刻窺鴻都飄如晴雲彩鸞舞勁若暖浪寒蓴舒丹碑翠碣已冠世所恨咋舌懷嘉謨朅來掘筆㺯天巧下視羅趙真有餘詩成醉墨作三絶寒室眩晃生瓊琚題翠山嗣禪師雜花世界寶田琪柯天上種一一五采相紛披深根清寧出樂國幻境變滅卑仇池蘂珠駢頭滴膏露萼緑擁翠攅新枝隂陽轉旋發天秘霜雪饕虐培靈基紫泥分封慶雲護緹室應律温風移初疑層臺閬仙下佀笑移谷愚公癡側金布地素習結翦綵眩晝神光竒桂宫斫斧古莫徴桃源展畫人猶疑髙禪息機月窟坐微笑彈指靈山來嵌空積鐡不受暑垂溜挂練能成漪巧翻新好喻空假妙合頃刻窮施為溝塍衍平碁局布巖谷巉削丹泉滋流鶯弄晴逞繚繞幽鳥觸影摇參差扶笻一觀定已駭飛觥百罰知何辭眉毛猶存眼非眩意不落相寧無詞贈劉醫行禁架術君不見東漢趙生試竒術禁架相傳人莫測桑皮為脯水為膠耿耿千年猶廟食事見後漢趙炳傳今台州土神是也又不見葛稚川逺窮句漏思得仙辛勤纂書集竒怪金創一吷完如前古來長生氣為寶踵息深深神不老肯將呼吸逐凡庸辛苦徒令顔色槁羨君妙契合二士萬病相酬一杯水參苓逺棄藥無功變幻須臾人共喜靈龜枯桑終殞生雁以不鳴曽見烹誰言静黙觧自致奔走岐路方喧争我生守口今已瘖氣涌如山空苦心漫將寸穎寫竒崛紛紛過眼誰知音崚層瘦骨非食肉空洞無塵那有俗金華玉瀝端可餐要俟它年梨棗熟次韻段惟徳右司空齋病起槐幄深碧雲道士遥相臨問之不肯說姓字笑指庭鶴知余心昔年種松在山北咫尺十載脩篁侵公當青春立霄漢我竟日夕還山隂子昂風林牧馬圖駟馬不受人間齕春入川原草如髮老髯背面心已知眼底𤣥黄總凡骨相親栁下那作疎泯黙此意今為圖竹林之賢固竒士晚嵗絶交真可吁張氏女七嵗能大書皎皎嬌女眉髮鮮筆墨為耒書為田家貧畫地當縑楮能使平陸生雲煙老蛟翻波注甘澍渴驥齧櫪追寒泉躍如斫陣勢揮突快若舞劒光回旋青燈阿翁夜授詩誦聲出屋清且圓天然異質世外寶寸穎入手直如椽流紅題詩愧飄蕩織錦作字空纒綿遶牀不憂翠袖薄玉雪晃耀辭花鈿君不聞祝融之峰魏氏女空中落筆垂瓊篇閉門養姑吳彩鸞一謫人世知何年道合變化難具言宿習妙解寧非仙送儀上人歸天台三百六旬塵浩浩萬八千丈雲飄飄手提飛錫絶江去獨飲古澗長生瓢乳彪呼風小兒語老鶴翫月仙人舞空林桂落招不來冰歇巖頭㫁前路題李廷弼歸安去思碑人言歸安之水堪耘耔乂言歸安之水宜繭絲移文夜下鄉社集折竹作度魚鱗推阿翁裹飯立田所大兒應官入城府篝燈夜算尖角贏百畝塗朱費千楮慈仁李長官眼明不識催租瘢溝塍如枰舊疆理故王之籍那可毁刮毛龜背羞作腴棹頭據案難奉符聖朝阜民極天際山積川量一稊米挂冠徒步歸即休虚籍誇浮非我計弁山何巑岏苕溪何潺湲山君水神各有職樂意禽魚兩相得君不聞古來吏𢎞羊烹劉晏死飛蛾赴膏無有已歸安之碑立如玉父老摩娑路人讀題董髙閒道士春龍行雨圖清泠之淵玉為竇呼吸銀丸起晴晝昂頭躍空朝紫京海若蒼黄河伯走積靈為氣翻帝車坐令日觀生糢糊黄雲離離覆下地神跡仿象今為圖送錢唐萬戸還鎮秋風八月錢唐潮三千組練平明驍吳王故宫草凝碧一塔突兀凌昂霄將軍宣威立油幕手撚羽箭調青鵰穿空盤旋彩雲墮藉草燔炙羞肝膋酒酣意氣擊玉斗垂手逞舞花容嬌百年繁華等流水金谷翠樹隨塵消平湖堤栁千萬縷時繫落日傳笙簫宴安侈習卒未盡癡兒騃女猶喧佻名王之孫古英武韜鈴夜誦聴寒刁徒兵晝閲逐奔馬舟師夜渡追輕舠坐令長城鎮南服鱷鯢落膽夷姦妖煌煌輿圖久櫜戢紫燕九陌嘶風驕胷中府庫貴商略談笑横槊真雄超丹書之功在金匱願趾世媺輝皇朝嗣天師墨竹𤣥雲空飛著無跡濃淡晴溪護寒碧碌碌玉石圓且竒古澗因依養顔色僊人紫宫朝未移平安日報春熙熙生綃陳情寫初意為問白鶴來何遲送趙簿正卿歸養胙城淵明投幘酒初熟𢎞景挂冠丹始成何如奉輿歸故里夜聴慈竹平安聲食蓮分甘舍雲泠得魚入饌泉水清門前槐栁緑隂直㑹有雙鶴飛來迎送保寧萬戸出鎮古閬州鵑樹飄紅蜀帝飛錦屏横空十二眉天狼夜沈北斗正筆花列陣書成圍拾遺舊題山鬼嘯文石縱横碧苔燒將軍好文歌太平桂酒讙迎梓潼廟子昂寒篠枯槎圖靈柯連蜷排石角海風吹秋折繁萼亭亭明玕左右從呼吸𤣥雲起隂壑猛思誓欲歸河源從者亦返清泠淵河源露重星嵳峩清泠之淵多蛟鼉上天下天意沈惻化作蒼龍張素壁玉堂之仙墨成沼穎脫淋漓翻浩溔鐡幹飛光明月流翠節參差飄窈窕昂身突兀太古春峥嶸赤立驚絶人支頤觀象洞𤣥化芳朽成嵗非吾真澧州通濟橋洞庭水發波湯湯老蛟挾舟恣低昂何人空中化樓閣斷鼇為石虹為梁澧陽太守黙無語朱墨塵深失修舉萬里南來春未歸離家想爾曽題柱近有善書僧日温妙明温華亭人明眉山人也余嘗識明于玉几山其年未四十温老矣余識于靈隠視其書之髙下亦類夫年也閏十月有僧攜明書示余遂各為一章美之且記二子之出處焉老温作書誰授訣少學潘郎繞城帖興來握筆㺯春妍靄靄芳叢閙飛蝶平生大字顔魯公晚復顛放少露鋒論功古法雖未至瀟灑要是僧中雄醉裏蒲萄墨為骨秋葉東西雲樹勃裹繒急㸃數𤣥珠不識公卿是何物只今書畫名已傳華亭鶴唳悲流年西方金仙在何天寄聲為了塵中縁其二蜀明貌癯肩聳山我與之語清且閒聞其作書誠險艱自製美筆出袖間流落金題入清笈魚鑰無聲帳中閲暎水寒蓴凝素波側石枯藤挂斜月西風玉几雲翩翩黄衣渡江聴清猿逢人醉寫數十紙山僧示我相誇傳歐陽父子病骨立誠懸繼之天為泣楚優抵掌真偶然妙解無言君合識善之攜酒招遊西湖值雷雨分韻得杯字南山樹影糊輕煤北山雲花玉崔嵬絶憐我輩少姿媚幻此異景窮竒瑰湖光山色兩愁絶更挾新雨除飛埃千年龍公睡忽醒頃刻駕浪鞭春雷我生倦游端有意陳迹黯淡漫蒼苔擬將鐡笛寫清怨復恐翠袖含餘哀主人佀怪不解樂故結勝侣攜樽罍翩翩六鶴舞晴翮華表清唳雲光開絶憐山雞强聨翼照水寒影空徘徊謝公屐齒殊濟勝偪仄蓬宇徒低摧娟娟新青故堤栁片片輕白孤山梅春風佳游詎易得相與一笑同銜杯賦金華方君雙魚硯海上鰜魚雙鬛紅振鬛直上嫦娥宫佀嫌嫦娥太孤絶耿耿冰雪難為容須臾梅枯不可下駢頭躍入空巖罅翠藤交絡石谼深太古風雷摧變化得意相忘睡酣熟開眼重光弄蛾緑跳銀破練何足竒共飽雲闕作寒玉良工感此同死生㝠搜巧琢存其形世人翕霍漫刎頸對此三挹顔為赬𤣥英聞孫古俠士脱粟論交傾意氣朅來風兩泊江千拂拭雙魚落清淚平生謝子金石交詩魂寂歴飄黄茆此中濡毫作新誌免與俗子同譏嘲寄張伯雨道士兼簡鄧慶長二首寢扉曉入香爐雲尸坐朝日雙臉醺南山鐘磬佀有約北山禽鳥如相聞楊枝低昂碧霞袖藕葉清淺青霓裙更欲深居入林壑築壇夜禮三茅君越羅作衫花纂纂今年身長覺衣短垂虹大堤迎棹船綵袖翩躚酒巵暖還家閉門百不知桐葉題詩緑隂滿鄰坊為約張隠居細雨湖橋乗欵段清容居士集卷六
