body:
  text: 清容居士集卷三十一元袁桷撰墓誌銘㙮銘附周夫人墓誌銘夫人諱天福朝議大夫知瑞州周公諱應合之女朝議大夫直寳章閣廣東經畧安撫知廣州冷公諱應澂之婦今湘陰尹名頤孫之配世為龍興武寧人瑞州以學行表後進論議惜許可湘陰拔童子科整敏善自晦亟愛重之故俾夫人以歸兩家為儒宗婦壻各得所擇衆咸曰在是夫人幼静慧受女史工正書二弟始就學日諷誦感發相勵事尊順謹媲徳儷義能使外有不知絜豆籩洽昭穆靡宻斟度恩意各盡夫宗宜焉二子曰有泰有益保抱具訓輙置筆札毋誑戲稍長約繩墨躬詰難嘗言吾誘弟以婉督汝以嚴皆一轍也善宜亟稱過不可得聞書種寜有斷乎年四十有九以卒是嵗大徳癸卯葬仁義鄉下畬里女六長許嫁周志行孫男三女二仲弟分宜丞天鳳來京師桷與之㳺議門户興植婦道允頼數稱夫人之賢過時而彌哀扵是有泰實來致湘陰之命銘曰有崇羲閭維周之敷展世秉文耳受口濡執彼閫儀來彛來祗宗承其和家安其慈誦聲在户嘉醑在廡叶于夫君婉徳以輔雙桐高岡附蕚煌煌擢榮舒英穀旦用光冽彼寒泉聿環墓田昭銘新宫實曼厥延方夫人墓誌銘湖廣儒學副提舉上饒劉君安徳恭甫之夫人方氏大徳庚子五月己未卒卜祔先墓不吉廼假𦵏于舎東越八年相中堂山兆以吉告於是其子光以事狀來京師謁陳郡袁桷銘夫人世居饒之徳興幼特静好其父隠君常抱膝上祝曰吾家世儒林當為汝慎擇婚對方是時上饒劉君某以太學名輩待次寧國教授歸授徒山中饒信地接武習進士業者率相戒師劉君始出鄉隠君慨曰捨劉氏子奚適即徳恭甫也未幾寧國死徳恭甫刻意振擢不以貧窶自慊隠君念夫人憫徳恭不自置察夫人意色無吝悕卒俾以歸徳恭甫壯嵗力問學預計偕生理靡密一不問夫人銖黍化治手劘而身理之者寒暑曲備方丙子兵變時徳恭甫傾家貲以完䕶為急夫人力贊之事定勉夫以仕且言曰盍亦少慰吾父意始伯姊嫁同里蔡氏蔡姊家侈盛脱簪琲以服亟摇手弗受自是終老無異飾生男子曰升老幼卒徳恭甫晚得光時夫人躬訓育抱咡慈嚴酌宜迄見光克紹其父業焉始光㳺京師與余交相久話言母儀悲泫不已余特以為母子至情不足異夫賢其媲子孝其母閭里知事者率能是及觀夫人之行與光終身之哀見焉若將弗及則帷閤衽席色笑敦厚制事以理夫豈勉而然哉噫是宜銘夫人諱柔則曽祖瑋祖應奎隠君諱逢吉卒時年六十有三子光瓊州教授今為中書屬從事孫男二至大二年將治葬徳恭甫亦即世扵是以某月某日祔銘曰詩始房中維教之基芣苢薄言和平以孳考視劉媛温恭具儀膏沐以韜絲枲是師外防内完拮据孔艱孩無矯慈諸御間間匪異其誠由衷允安興言遺思載汍載瀾女史日微徳音莫跂瞻彼墓田有顙斯泚松岡豐融不震不圮廣揚嘉芬式裕爾嗣盧母王夫人墓誌銘盧氏河北望族有諱仙者家深州武强縣金將亡武强為秦趙要衝嵗蹂兵不息由是徙家睢州兵浸南家益蕩析有子曰全掠為奴于時全生子曰榮甫十嵗審其父北行斷髮仰誓呼曰兒不獲見父寧即死行泣道中呼其父姓名道繇真定日號訴宛轉事益著里人憫之問所掠主無異辭卒義以歸父子復居武强稍長學書筭入鄉校試吏為縣從事時録事王君崇攝武强審盧氏子孝感且吏䏻廼曰吾女舎盧氏易取配遂以歸生子四曰文曰仁叔曰廷信季曰徳廷信生始三年不幸盧君卒夫人撫其四子力治桑枲甘苦淡垣屋庳狭内外整截有限程督訓𨗳過者無敢譁事其舅姑以夀終至元十三年詔考郡縣孝節扵是河北道提刑按察司審盧婦事不誣州達于禮部復除其家而廷信始仕江南調泉州晉江尉辟福建行省掾又掾江西叙遷為鄞縣丞復掾江浙未幾以才佐海道漕府陳不便事就領金符為温台千户嵗運粟視往嵗數三倍而夫人皆見之廷信為鄞丞余時里居見其處事精覈剔植蠧利官長不能出私語上府陳白伉直無隠嘗曰吾盧氏世為吏刻峭文致非以起宗吾父有孝行迄不得上夀稍自飭勵繄吾母之訓戒子孫為儒兾吾母慰意焉至大二年夫人卒年八十有六祔𦵏于先塋延祐二年天子孝治天下推賚存殁而廷信秩五品得贈其考奉議大夫真定路趙州知州驍騎衛尉栢鄉縣子夫人亦追封栢鄉縣君四年遣其子某來京師請銘桷待罪史館若盧氏事誠宜書今誌也無溢辭系以銘曰林林生民男室女家禮失俗淪企而禄奢維貞丈人尚古不遐卓彼孝童木升斯華承筐來嬪絶其榮夸四雛在户蓬首苦心甕牖屹城過者肅襟宅里表植栁槐森森頍弁奮揚滑甘具新大耋莫嗟淑徳岑嶔戒而孫子服儒以嗣教經展世厥武踵起有隆墓田大賚告祉式時芬苾永保千祀侯母王夫人墓誌銘世祖皇帝以仁立國敦節申義丕變醇厚至元八年時則有若太保劉文貞公議事省中増益令式繇是郡縣旌表綽楔槐柳光于往史猗歟休哉桷繇集賢歸里居録事判官侯玉踵門來言曰聞子嘗執筆太史節婦孝子嵗終必登于史籍玉也敢有言玉故居濮州郵城縣其先女真人曽祖敬嘗為金殿前將軍祖林金人匠總管父珪仕皇元為濮州儒學教授濮州不幸年四十有一以卒母王氏生子女六人惸然未勝喪吾母之教四子也皆身訓之其鞠二女也必教以纂組化治嫁娶耕稼能謹之以時家貧無生産而充然若有餘者繄吾母之力也玉兄弟既長而吾母益能綜核靡宻不知有缺怠故仕者得盡心於官政而不仕者孝謹稱里閭玉之為婺州永康縣巡檢時至大三年也母年七十有七以卒至是嫠居凡四十有餘年矣後復為婺之平凖庫副使婺之人知吾母行若是縣儒士具實言扵縣縣下於鄉加察考焉繇是以達于郡郡復移扵所居州州明扵禮部然後悉如詔旨旌于其鄉敢以是有請傳永逺嗚呼劉向作列女傳當熙明之時則肅雍平和藹然有闗雎士女之行至於末季則不幸不得全其生讀其書未嘗不興歎也孝慈耕桑帝堯表閭夫人生承平貧能以禮防少老一節實聖天子休養生息漸仁秉徳有自來矣盛矣哉能勿書乎夫人名妙善父某妣某氏長子伯巖勑授定海慈溪兩縣船官次某不仕幼即玉也女嫁某氏銘曰勵其躬訖于逢慈儉勤夀考終表華楹帝堯功過者式報媺豐劉夫人墓誌銘婦人之事舅姑有從其令者矣若近矣莫知其心焉有屈體承色先事以備逆志以求其得謂之孝與或曰是知及之考其中有疑焉今之為舅姑嚴重則生畏畏不能以洽玩弛則生怠怠近於凟閨門之訓厲以失之而容忍者於教乎何有在易之象曰家人嗃嗃婦子嘻嘻吾扵郝君鹽使從之之夫人有取焉夫人姓劉氏河間人父諱鼎母牛氏夫人之姑李嘗祝香以告曰願吾子孫生悉如劉婦噫此非出扵令與知也孝根於心怨咎莫知旻天中野且悲且懼若婦人貞静其誠慤顯著一語以盡兹其為孝也大矣夫人事夫之寡叔母夫之孤姪有恩愛鹽使病末疾嵗久不愈斥竭簮珥佐醫藥教子志善能植立兩見為監察御史至治二年某月某日卒年七十有二明年二月某日祔葬于西山之祖墓桷往銘鹽使君矣今御史復請銘夫人諛溢辭事史官所大戒婦人事不出閫户以孝養為飭躬本考其姑嫜之言是宜書銘曰有言閒閒有儀珊珊視其温寒靡覿愠顔從姑𤣥宅弗愧以懌繄爾後人以永作則韓夫人墓誌銘中原韓有二族居㑹稽者為安陽居廣信者為潁川龍圗閣學士無咎公師表一世其子仲正克紹家學搢紳號二韓父子而廣信别出一族曰侍郎公祥字履善常卿公補字復善嘉熙中士類稱為二韓兄弟桷族祖正肅公持節江東辟入幕府在後省復薦為國子官人皆曰正肅善選士二韓公聞望駸駸與潁川相並盛矣哉天運合一衣冠家澌滅幾盡江浙閩蜀大略相近余歸老里閭有儒生踵門而告曰容徐氏子祖母韓夫人無為大夫諱禋之女大夫二韓公之親弟也自夫人歸徐門克持其家事姑以孝著待夫之弟妹助裝以有室家其相夫也郤金以成美夫官建寜僚属有不孝其母者夫人引喻廣譬能使其妻訖事姑以禮訓子舉前史言行時刻畫故事人物以佐警戒故其子孫俱能守家教容又言曰徐故廣信大家刑部侍郎諱元杰實容從曽祖桷聞侍郎公侍講筵于時史丞相圖起復百僚皆進疏理宗猶豫不決侍郎獨微言曰邊事漸寜從戎以墨縗失國體丞相誠經濟老其才以用未晚也丞相聞是語憮然曰嵩之不得起復矣夫人之舅諱卿子朝奉郎權知嘉興府事其夫諱忠甫終廣徳建平尉夫人之曽祖大寜奉議郎知徽州婺源縣妣諸葛氏贈宜人祖貴玉贈朝請大夫妣端明汪公逵之孫女男一拱辰將仕郎信州路永豐縣主簿先八年卒女一順正適祝士貴孫男五宜容宅安竇孫女四卒以至治二年享年八十以泰定二年某月某日葬于某山容不逺千里來謁銘秀整足以興植使世家皆若是其曷有憂廼為銘曰亭亭兩家允為舊門服習懿徳克紹厥聞幼工女史粲其纂紉亦㳺扵藝靡不究勤母目既盲䑛膜還明來嬪于徐事姑益精奉脆擇甘順其性情不侈其長不夸其盈訓子督孫雅言諄諄龎眉秀姿儼兮淳真宦族日圮内教莫陳吁嗟夫人表兹堅珉定水源禪師塔銘大雄氏以已説剖三宗禪學汪洋廣博言意承接絶去文字稍契入輙證為知道小智大黠相煽以自髙律教廢棄食不知耕居不知工恣情於無畔岸而道益以昧唯妙源師獨憂之自嘉定十七年受具戒即㳺方明本心久而曰不耐塵勞心曷以制願習賤事以調御寓本州天寜寺嵗大饑赤足踵門以化後始歴清職曰吾得無媿名教矣其師愚公持正議不肯下宰相吴潛潛怒繫獄辱之退居精舎獨侍側辨難卒有疑義愚公啟機以示曰汝今太平矣愚公住徑山即俾首率僧衆愚已老學子林立寮下析微統宗愚喜力贊之主平江薦嚴内外事不一廢舉鼓山國清辭不就主泉州水陸院治若薦嚴而俗士益信慕愀然曰吾寜久是攜錫以歸桷先曽大父太師樞宻越公功徳院曰定水伯父賔州先府君處州議曰寺缺主者善趨謁迎奉吾兄弟不受能以寂照解脫為義則庶幾㝠福源公行堅望高使力請必不讓以素所往來者通意廼欣然以來桷時年十三或問曰吾儒性善與佛所言同否曰同感物而動漢儒失之由是有不同焉後廼曰儒釋二教分别有異在治人治心治人在五常治心在四大修五常治人之本修四大亂心之本道微世衰誠得一人焉不可得涕淚交下謂桷曰禄損則福益盍慎諸布衣鐡裓終日尸坐語徹機迅奔電絶壑不可制伏稍歛戢則瞬息在几席禪人仰之四方士尤宗之精於詩故宋名士喜之然不肯表襮舊築居扵越之雲頂將終願解定水以歸且命無建塔無火化以任其壊其徒不忍卒埋是山以至元十八年卒夀七十有五俗居象山縣姓陳氏為僧五十有九年銘曰道弊扵文巵言以宣繇簡逺超悟者曰繁空浮變騰若火燎天服竒食珍謂合自然師實已憂榮戚靡覩或逃于谷或伏于莽唯大雄是遵唯古徳是祖機以峻傳言以戒輔通黜興廢道曷敢替幽扃潛珍户屨屬係彼昧其承卒黯以逝昭銘授徒勿圮勿翳延慶入法師塔銘四明法智大師以天台教旨經緯導達學者謂為中興南湖寳講貫舊址踵主其席稍不厭衆議訾病交集歴代承接皆有足稱道至師居南湖千口無異辭師名善入傅姓世居定海大蓬因法師見異之淳祐十一年與半山彬師俾受具戒㳺諸方辨解究詣客東掖山著教家四書據㑹執約不以文字溺泥指畫勤懇從者樂其易簡初佛光法師居上竺提其徒悉使出門下于時有善良師與師相講習各植立不肯和附師與良議曰吾師大蓬兄能嗣之願再拜以嗣良後嗣圎覺頑空師而師卒能昌大蓬始典謁南湖後首教坐主赭山東臯世宗其説以角立為大病支離為末流泛不溢詞約不厓絶禪人士子咸傾仰之興仆復侵安衆靡懈泉南僧素宗禪學慕師徳重趼以請法智之學行扵東南六十餘州至是入海嶠人益竒之至大年中詔宣政行院慎採選勿阿意貪倖集議者曰南湖缺席捨師孰能遂以昔日所傳授者深省宻啟空假破建一性明静而互議交毁訖忘于言大蓬果有聞扵世崇本誓志師扵是有成焉其凡見扵修植施於人事今不復著錫號惠觀𢎞教法師而自號曰秋虚延祐闕年五月二十有六日示寂為僧六十三朞年七十有八化于城南頂骨得舎利𦵏法智祖廷而以爪髮歸東臯冡間之精舎至元間桷納交于東臯呐若不能言聆其坐講則汪洋罔詰秉行潔清癯容儼修粹然古徳有足興起弟子大倫正道等來乞銘廼為之銘曰四明之興匪事扵言橐籥萬殊貫于心源如水必東如矢必鵠末世濫觴語益以瀆佔畢究鋪千緒億條炎炎詹詹泛焉以寥師慨有憂約陳其辭探微發機㑹歸一岐承宗紹傳不希其逢謝彼翕訿矢心圖終後歸南湖振揭初説曰吾師有傳兹道不滅弗蔓其根弗瑕其璞癯然蕭閒廓以恬泊世教日淪躡雲徂高著爾懿徳我銘用昭天童日禪師塔銘紹定辛卯蜀破士大夫蔽江東下成都大慈寺主華嚴教僧之秀朗率棄舊業以教外傳㳺東南若癡絶冲無凖範導達後進表表名世者皆其門人而範之成就益衆天童師其一也師諱浄日號東巖俗居南康之都昌姓廖氏幼嵗喜誦佛書解大義常食蔬果以自持年十五告父母願為浮屠氏明年祝髪于廬山香林訪道仰山石霜遂入浙見冲師扵靈隠越二夏不契乃登徑山見無凖師範大許之語在傳道録後見西巖惠于天童恵無凖師大弟子其提示與無凖無異危機敏鋒迎拒莫覩風止水息渙然帖順遂宻契其旨卒服從之俾守蔵室後開先無文璨屈為第一璨亦僧之俊傑繇是譽聞益彰宋景定某年江東帥汪公立信慎許可推以主圓通咸淳某年江東漕使錢真孫俾兼領東林至元壬辰主育王三年歸隠雪竇大徳四年集公議主天童師之行峻絜以完語温氣和衆益得以親納其徒俾明徹復性不侈于言解其蔓惑處於世若無所施為遐邇嚮慕傑閣銅象無踵以至而於天童功最著久居東林化俗警衆民争繪以祝故其興天童廬山之民奉貲以助尤夥生宋嘉定十四年辛巳終至大元年戊申年八十有八僧臘七十有一將示寂戒其徒書韻語以示曰天為蓋兮地為函吾奚為乎塔與庵灰吾骨兮山阿言已矢兮勿鑱越二日沐浴端坐而逝其徒奉遺言以化齒根不壊遂歛藏于西巖之清風塢噫耆舊日淪争憝恣蕩甚扵世人理不勝欲靡然頺瀾莫有障窒觀師景行實泚其顙今弟子在浙東西江東西若干人蠻溪嶺嶠承師之教亦不可勝紀如砥等來請銘銘曰七情盪摩約性返源喻以攝持匪夸浮繁末俗濫觴競立險艱昡一駭百莫執其凡性本湛虗分别則二不以解通不以思擬寂非有存感迺隨義達摩之功空其所空奚後人騁馳庸失𤣥宗空不假為兹惟用中蜀學簡易師承其風開盲振瘖發機以示云彼摩尼非浄非穢往安自然是謂止止鮐背長身從者如水丹霞嵌空匪耀凡目曰兹山之頽否極斯復敬者效輸罔不率服山君來朝雲釃霧矗幻身既空勿鍤勿甓一氣孔周窮彼變易清風之塢石列五色恍焉如存嗣者是式廣恩仁法師塔銘師名可仁貫天台縣寧海姓胡氏號木庵㓜嵗㳺四明山居資福寺習天台鈔疏于時我曽大父樞宻越公治齊國楊夫人喪見師秀整儼恪俾以從服闋吾必以汝祝髮資楊夫人福越公以右司郎中歸召為軍器少監尹臨安樞宻之夫人周國陳氏曰師宜祝髪矣嘉定十三年設齋上竺迺得度于時月大師以講論訓諸徒願侍席側大師與越公厚善謂師曰今僧徒聰敏林立稍使一人預人間事得無害統體乎繇是在郡治間歸胡嶴展治林嶂一以任師在館中㕘政應公㒡猶未仕深器之曰使師不為僧其問學當與士子並中書舎人陳公耆卿時為臨安教授與師同里亦曰應公言然越公入政府例得經院迺相攸紫巖繩約四履峻危有階引泉有梯淬醯除險帖石助髙審面曲直周折獻秀紹定肇工淳祐告成屈以主席錫名曰廣恩崇福伯祖吉州大父尚書咸諉以事罔有弛缺往侍諸父時見師承接曲盡而恃氣凌鑠者不敢出慢語至扵桷四世矣噫逮今五傳有不善扶植者矣而師亦四傳守規蹈矩僅一二數兩家相視岌乎可懼桷繇翰苑歸登塔亭謂塔主子鎮曰往事將湮沒師之行業不可不紀其徒曰是在太史師以至元十七年某月某日入寂僧臘六十一度弟子二十有闕人有詩集若干卷大澤大雅相繼主是寺凡四十年規約散弛今有子堂子鎰子鎮子金子真猶能知師遺事下是不復解其寜有不哀也夫銘曰維大雄氏内寂外修不偏一能用彰以周在師敏通卒異其儔峩峩新宮百礎承宇以其彌縫莫或敢侮智周行圎耆年以輔成之匪艱承之孔難大訓厥徒黜慆砭頑昭銘以儆勿踰其閑延慶良法師塔銘天台之學其説汪洋浩博旁訓廣詁多至萬言學者讀其書前迷後遺究厥本旨更席不䏸以終良法師始疑之謂繇律以入則心以懾持繇禪以入則心以解脱𤣥文妙旨約以據要事理昭晰如瘖獲吐如盲獲覩其為書曰十門􅃌要約説三卷􅃌要餘論一卷教觀宏立門分户列貫穿出入莫窮其塗師以諸部證其義例條焉不紊示焉􅃌掌其為書曰教觀撮要四卷三千别説則其師覺法師之言具在舉世尚同因省立異良非苟扵言也師名善良字子直號月溪族姓朱氏定海縣人始祝髮浄居習律湖心㳺杭之大雄師頑空覺大師空問不二門所屬三諦三千其旨意與空合覺大師言辯簡峻師入其室嘗俾守講席後㳺浄慈訪禮禪師以古徳語叩辯禪語瞬息眩晃意師泥名相為可惑師徐曰三觀之旨不外乎是禮謝曰其歸振汝宗集慶寺成朝命選主席班從者亦皆精良晦法師主上竺任可否師預是選講大涅槃經聽者雲集師懸辯提機整暢理得然卒師頑空上竺不䏸强也主禪恵擇陽報國藥師治平户屨日接别為堂以處篝燈星列咸曰是宜繼四明矣嵗既久卒以輿論主延慶至元二十六年寺延燬茇舎草緝講論彌不輟大徳元年九月某日入寂僧臘六十年七十有九奉遺骨歸于祖闗桷居邇南湖幼嵗㳺起信堂羣僧誦聲接几席取其書讀之茫不能解泰㝢曺先生説曰取子直約説讀之斯解矣後來南湖覩其容和以莊其説坦以明始悟曰先生語不虚矣殁三十有一年弟子允恭來請曰公深知吾師吾教有行業碑敢以請迺不得辭銘曰天台之宗明性合理銖縷其别弊極口耳以言顯道言曷有止若舟在川茫不有涘若蓬繫風去莫以趾支離演文積沓縑楮迷途具茨珠探濁水至簡以求允究厥旨聚不滿握邇納步跬解其桎梏一貫真􅍗南湖之庭屨履纚纚振麈一言聞者竦起遺書具存毋敢訾毁昭哉是銘千祀勿圮空山雷道士墓誌銘孔子白文勝質則史班固亦曰道家者流出扵史官豈其然乎老子為周蔵室史酌古今治亂成五千言致用以凖易較其治良不誣也噫為老氏者其知此與河圗洛書聖人則之易書誠經緯也微言既湮傳注門户各立自勝易與書迄不能並士方齗齗然不可參錯進老子之説焉得力而勝諸士患無恒心遇不遇命耳曠百世而相感者吾得一人焉曰雷齊賢始予讀其書益知其所以言病乎世莫知其涯也齊賢所為書援據切至感厲舊發不蹈世俗繩墨合神以窮變盡變以翼道申言廣􅃌其扵力誠至矣今知齊賢者不若是則齊賢之意將終無以自表齊賢扵書無所不讀悉資以為是書者其道然也道散於九流百家同歸而殊塗唯老子最近然則易老誠相表裏耶嗚呼齊賢之志予深知之矣齊賢著書曰易圗筮通變義老子本義莊子旨義所為詩文二十卷和陶詩三卷齊賢名思齊家世臨川人幼棄家居烏石觀晚講授廣信山中暨終也復歸烏石治其窆而先表焉表曰空山雷道士之墓卒時年七十有二番陽吴成季廣信弟子也嘗曰空山先生承絶學扵蕩裂繕刻志意却甘茹苦光景變幻皆隠匿不道飛伏控握愈昡愈逺道無有矣今遺書具在匪吾徒私彰確者如是則行若藝猶其粗也陳郡袁桷以是銘銘曰入而不出神不可以物通而不寒用不能以怵膏軸御輪其行彌踆無適不宜曷問其津生以道為樞死以天為徒有隆空山泉流舒舒矯爾後人抑華食實弗繢弗雕我銘是質戴道士墓誌銘予讀桃源記私竊以為慕肥遯有遺扵世者之説云耳後讀地志則沅南地今號為桃源者不與王化邇安食水土無君臣守令之程節扵徴需乎何有嗣後地益闢桃源遂為壯縣溪峒増為十州今烏䏸辨桃源也哉或曰州有桃源宫累聖蠲復山水清湛其人惇厚直且信使䏸居之寧非桃源乎戴君道安和甫其人歟和甫成童辭家為道士性疏曠無畦町其師王君文卿器之俾逺㳺見開府大宗師于崇真宮隨其委令風雪承給不少替請扵人也事弗就弗止而人不以煩避之處扵衆也率退以自持衆先矣而君亦跋焉以及之故亦受制為龍瑞宮提㸃奉香于武當桃源性不喜臧否遇酒嗒然以忘然不復失事故職教者彌任器世人以記短長逐日影為䏸事君不䏸且鄙耻較其得失是真無懐尊盧之民矣豈唯桃源民哉往歸其宫攜酒邀父老㳺白馬洞天泂近長磧山酒酣援筆述韻語曰吾死必藏是延祐七年還京師明年改元至治正月某日微疾以逝年若干斥其囊資不䏸以歛遺言以弟子李禮謙領宮事和甫在崇真度弟子天台徐信初厚禮翰林待制虞君伯生俾教之伯生與予皆故家見後進傲誕不復與語獨信初給事無惰聞論文獻道徳嘗惕悚不自置信初果䏸為請銘君斯無憾矣某月某日𦵏是山銘曰棄方刓觚㫿盱以趨何誕之日多樸莫能扶瞻彼沅溪中季載圗其徳弗雕其人允符持觴養和奚憾之祛命也不尤卒為天徒通真觀徐君墓誌銘開府𤣥教大宗師張公留孫以𤣥道贊理陟降帝庭踰四十年其承次授受同流一源罔有支别故其弟子相傳多至六七十人以文辭議論達國體者為之嗣教其餘彬彬行䏸清整英發林立輩出或激昻自修則俾之挈綱振維往来京師山林間重其名教若是者寜不備矣夫開府弟子之最長者曰徐君余官翰林十有六年未始識之延祐四年開府年七十始來上夀閉户不復出户限邂逅于庭中若相避然者集賢大學士李公某傳詔醮崇真宮益避跡隠奥中集賢語開府曰聞高弟在是願接顔色可乎强之見揖以退復辭其師曰弟子歸山中不來矣願師自重至治元年専价走京師作訣别語衆咸疑焉未幾訃至灤陽以夏五月癸巳化于仙源宫得年八十有二扵是嗣師真人吴全節率其弟子為位以哭皆不勝其哀且以狀求余銘維徐故士族祖某父某君名懋昭字徳明饒餘干州人饒為衣冠望郡宋端明湯文清公丞相江文忠公善衡鑒幼獲接識之繇是棄仕譜為老氏學以其道㳺江淮間于時烽燧連警百里土舎不相接獨澗飲草茹以善勸勵俾崇信其法後皆化之開府公入皇朝隨侍二嵗即歸且誓曰釋老以募衆集施為䏸事叩門嚅囁抑獻笑且取誚吾不能若是當益貶損焉積數十年作仙源觀久之復作神翁觀佳木竒卉編緝墾治山林壠畆陂塘之利益充然衍裕卒䏸遂其初言嵗饑以餘食餓者不足則損直以售葛衣布幬十數年始一易見者服之老氏之學力本自治退足無欲其言黯以彰不知者以虛無釋之邈不相涉矣夫不丐扵外則必慎扵内宮室蔬穀絲麻丹漆之物燕興俯仰之節酬酢進退之儀人之生不䏸以缺也今而曰吾無求焉將何以取具世以役鬼神竊服食為道吾不䏸知之不惑扵衆則害扵民者寡考其自治則扵吾道合清浄富强昔之時君嘗師之則凡刻繕者誠得矣夫何疑焉余嘗侍開府公言語絶臧否耆而謙黙而簡退與嗣師㳺彌綸損益將以行其道是非家庭之教績業纂素能若是乎盛矣哉大徳六年制授主常州路通真觀皇慶元年制加保和通妙崇正真人二觀亦以璽書尉鎮焉以是年某月日𦵏某山開府再傳曰李立本陳義高義高明朗通豁器行瓌特贈粹文冲正明教真人皆蚤世今以次傳者曰余以誠何思榮吴全節孫益謙李奕芳毛頴達夏文泳薛廷鳳陳日新餘若干人將𦵏開府惻然曰吾弟子蚤從吾㳺其亡也不宜以薄迺命奕芳歸蒞𦵏銘曰林林生民厥初一原帝覇肇分兵刑日嚴維𤣥元君治道不繁節約寡求罔有僭貪榮觀超居𨗳迎泰和絶色屏味日用不頗後侈怪竒風揮電訶造舟搆臺百靈迄訛赫赫大帝尊企清浄𤣥風恬寂守貞自正温温開府不夸不佞于帝左右淵黙無競在師承之儉以繩之泯泯自營卒克興之道合古初訖莫我病銘昭真宅是式是證陸道士墓誌銘道家者流以清静無名為本時王以其宜扵治國靡然宗之傳世益薄長生之説侈卒茫昧不復講今世所傳惟法藥與術藥術又鄙棄不用而法僅傳謂其宜扵水旱疾病通得而用之也余行天下與方外士㳺率不得一二蓋其傳受訛缺浮靡恣蕩攝思握神罔不知所以而其祛役禁制按圖以求叱咤瞬息欲通靈扵􅆄蠁不可得也噫其教若是而為其學者又皆不自植立可哀也矣余居近東嶽行祠有陸氏者掌其祠有年矣其四世孫曰頤真㓜嵗識之儀觀秀整淵乎抱道之器與之語慎重不伐悒悒然欲求其師未䏸也日尊所聞抄綴盈箧樓楚公諸孫坦好黄老能以㕘考損益編簡往受其説遂為弟子後聞天台桐栢山有靈寳法福聖觀道士曺君為正傳往師之又聞維揚潘師得白真人上章法逺逰以受然不自表襮處羣衆益簡嘿丹經筮書星厯孤虚之術悉究􅍗旨要晚得末疾疾漸革呼其弟子陸宗𤣥張蒙生語授受本末且曰我死必得袁内翰誌文以信後是死為不朽當𦵏我扵先母之墓側墓在翔鳳鄉白石紫虚觀右紫虚樓君所建實繼其事曽大父軾大父景文考斗瑞生宋開慶元年殁時年六十有七實泰定二年七月某日也𦵏以某月某日其弟貴和實來請銘哀其志嘉其勤而卒不逢非命也與銘曰握竒制氣超鴻濛約束萬神驅霆風物無疵癘𤣥感功秘圗靈籥昭羣蒙後生棄暴甘盲聾嗟哉紫虚憂忡忡踰江越嶺兾一逢死生晝夜在反終不怛其化輪旋空恍兮步虚出雲中有縞之鶴來城東清容居士集卷三十一
