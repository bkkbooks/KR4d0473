body:
  text: 清容居士集卷十七元袁桷撰贊劉敏叔畫八君子圖贊五季横漬萬姓阻傷剗舊布新赫日蕩光變通維時君臣爾詳丕顯韓王應運斯翔佐帝立極肇服衆國銷兵弛財邦本茂植獨相十年黎獻安謐弼違雍容不撓厥色百壬肆妖喬嶽漂摇智深如谷終止且消金縢天開軒冕以朝簡在帝心王勲日昭燕尾之眉貫玉之姿炳靈丹青庶或類之右韓王堂堂魏王龍章鳳質天實生之以佐王室射䇿玉墀慶雲耀日中外踐更執徳惟一西陲繹騷將弛卒驕徃綏爾戎薄陳武韜濯以清泉釋其煎熬入秉國釣衆味畢調不懾不渝迄康皇圖取日虞淵登子天衢朝野罔知繄王眀謨危疑之際以身調娱両宫熈熈萬姓于于桓圭赤舄清廟配食於鑠厥勲千古罔極右魏王赫赫潞公不震不動威以服戎寛以濟衆宏淵雅譽磅礴肆著蚤年登庸具正百度貝盗斯興命公於征振旅霆發不日以平國財未殫抗議省兵激懦抑貪朝廷清明以徳報怨以爵為勸强敵効貢却立改觀名倡九牧進善無倦四朝師臣邦家之珍委蛇兩河如松如椿燕頷淳庬鮐背輪囷何以比之永古蔑聞右潞公儒以稽古酌時斯正用非所宜秪益其病在漢懿侯治守清浄惟爾荆公行修於躬耽精古籍慨想遐風懷寳陸沈患莫已逢激而翹之以達天聦髙配五帝羞視七制廷議藉藉㫁以辯毅復古之志與帝俱銳發政累名公是喪朋晚歸鍾陵惘兮慎兢蹇驢空山悟彼愛憎矯矯貞姿涅而不緇吾將疇依為學是師右荆公帝宇永清文治斯舉取青媲白眩巧鬬嫵末派横流獨手莫禦弊極斯反誰受天祜䔍生歐公鴻碩之宗鼓以雷霆驅以雨風如日之明如川之東肇正古始四方攸同奬善矻矻英俊滿席彼有未至憂見於色補衮之功其繩則直以退為完以佚為安髙風邈如審象以觀右歐公任當其誼三褫無畏用不展志好爵斯避允顯温公為世張弛執中秉徳享帝活國熈豐紛紜朝有奸慝歸卧洛師纂緝載籍元祐之初大矢厥謨稂莠既深百糓未敷畀成於天力疾以除佐佑王室公心如日獨樂之園以迂自佚生無榮飬殁有餘泣深衣幅巾天骨嶙峋中有至道不以示人唯誠與敬千載如新右温公岷峨之山扶輿絪緼誕育至英絶類離羣溢為江河乗為風雲髙絶俊頴探􅄨炳文承明邇英紬思運精騁轡以行華夷是驚蹇蹇匪躬上通帝靈才以貶官謗以長名播遷徼荒百虐冦攘繕性養神彌介彌剛盤桓南歸百神從行誰謂巨浸一葦以航瞻彼徳容春陽秋霜烱然方瞳如犢初生霄雲峩峩野服蒼蒼徃代莫從鑒兹耿光右蘇公沄沄修水誕𢎞文明維太史氏頴敏之功由彼岐嶷揚譽上京服襲瑰瑋綜覈文藝剖析幽翳謝鮑前驅屈宋擁篲𤣥言逍遥夙昔超詣正宗江西歛祍嗣裔厠身著庭正氣果毅筆者未成削者已繼秉畀濁流孰怨孰尤不怛其化心君天游精神滿腹瞻望不足烝烝孝友猶在眉目清塵髙風曷其有終右黄太史祝道士龍贊靈砰砰三五一視若存水神立𤣥為光髙原粒天門開靈受秩墨竹贊二首墨以韜智𤣥以御柔渰焉雲興脱兮凛秋寥寥天標下為岧嶤執兹混淪函三爾超乗剛庸升實志勿驚比焉彚亨烝徒繩繩纚者如傴若佩而組墨卿司𤣥謄汝於堵子昂集賢真贊審中聲以比㲈箾之音證墜簡以啓載籍之藴承明三入而不居江海一麾而無愠遺世而深憂盡言而寡尤瓌瑋萬物金石横流敷文太微慶雲瑞芝超然巖壑寄扵筆翰者吾猶以為杜徳機也張廣微金書隂符經贊遐哉古帝握契眇綿沌沌混混超天地先執静御動兹為坤乾虚九藏一書圖弢鈐範圍包絡佐理宻堅氣母受要納息以傳泥金著文其曄𤣥𤣥鋒淬穎脱乗雲大圜雲中龍贊握𤣥機騰八荒憺雲中闇以彰九九合下土光返珠淵終智藏龍贊御乾入坤萬靈嫖姚止水飛立迴旋上朝神后布令藴隆黙逃功成返淵重𤣥以韜又𤣥雲嘘氣為母騰靈湫匿星斗握以機數九九百糓蕃歳大有太上授經圖贊混元希夷空洞眇綿方圓緯經言孰可宣憫彼世醨述𤣥五千紫雲升空重席九筵跪坐受聽萬神參前研幾察微如珠善淵徳為之初道迺自然辛稼軒畫像賛妖雛殂江八方沸騰手提糢糊仗義南興閩越荆湘是鎮是繩智名勇功蔑如浮雲䜛屢尼之耳若不聞聲裂金石湛厥心君運有南北孰言一之時有未完矢詞窒之卒全其歸莫能躓之帶湖維居喬木欎新目光背甲佩兮振振審象式瞻宛其不泯仁廟御書除官贊扵赫仁考御龍中天追琢王度左右惟賢思索俊髦嘉量達權稽古九官匪曰叙遷嚴嚴秩宗維直且清佐理大政宰士是程皇畿膴穰具瞻靡輕率彼緇流出納糾繩八柄馭臣首爵以貴或超或常執管淵思昭哉雲章銖黍奠置勿私以恩不恱其媚番番老臣卒秉國鈞山立陽明如嵗之春帝賔於天執簡涕淪虹光徹楹萬億日新至治丞相真贊以元勲開國之孫佐大明麗天之主肩一徳以正人心集衆思以清庶務玉絜而彌温山立而有度審象以觀斯為太平之宰輔又階符耀騰河嶽炳靈寔生上相秉鈞以成儼兮徳容衮衣葱衡山立其威玉絜其清陟降帝所翼翼是承帝曰相賢佐我治平雲龍從類鼎鉉利貞懋昭顯功象於丹青扵赫寶璽虹光爛明用永厥藏詔爾雲仍英廟御書開經偈贊時為皇太子日升咸池五采耀騰昭徹水源濁垢斯澄維彼寸穎執一貫萬鉅纎受形莫測其變驪珠陸離光被寰海允符龍圖昭示億載自贊㓜承父師之準繩壯緝文獻之淵懿守先天之中為初心䆒三聖之易為一致氣弱而詞愈卑學䟽而用益疑寥寥兩京耳受目接者不能紹傳吁何可言王承㫖畫像贊扵赫乾運天造耆武肇敏王公粲飭皇度越於江濤率圖籍以朝秉直在庭不激不雕矢辤瓊琚風舒霰消益之以甘雨濯其嘉苗佐理毣思敷繹静規民甫息痍勿煩以疵懿徳沄沄如山出雲有聞無聲爰澤後昆珮玉峩冠審象是傳之問之美百世弗諼王叔能真贊心清而行全守廉而益堅不汲汲扵利達專丘壑以自完若是者五采不能以傳至若炯炯方瞳藹然孝悌之實發於睟容人知其為臺閣之秀彦藴經綸而猶未盡其用者也自贊訥文詞而三直承明之廬拙騎射而五游朔漠之域居安以窮犧爻之變比事以糾麟經之釋至扵見㡬歸田服恬淡而守貞白識者謂為知止而獨慊然猶以為有形迹也馬元帥真贊養恬而智無遺息機而事能應贊黄閤弗居其功坐烏臺獨守其正制變扵劇郡若郢人之斤鎮戎扵大藩若秦王之鏡服芝术以養年將見安車造朝守規隨而樂清浄也瑞檜贊老子之道以恬泊真静為根本而其嚴靚清宻非窮極壯偉不足以為榮觀故所至丹艧土木與浮屠氏相埒殊庭廣寛候靈斿扵致祠之際尤加嚴焉四明𤣥妙觀構寶殿倣南城之長春法式具備主者吕法師顧瞻中唐作而曰兹不可不加竦肅手植蒼檜列若幢節厥土墳剛風潤雨濡膏脉日起旁達蓊鬱連累相承泰定三年春正月中澣上聳結為鳳冠觀者林立考諸釋檜者曰乍檜乍栢一枝而能屢變唯檜為然觀是則知釋者之非妄矣或曰厥今聖天子嗣位歴更上元洋洋乎盛徳覆被動植疊瑞重休四方承畏不敢以獻以告而祝釐儲祉道家者流有所不得辭讓迺繪為圖以光天之休為之贊曰繄檜在廷三光炳靈膏涵於膚湛其晶熒化為鳳雛珥冠儀刑乗風鞭雷上於帝青曰有徳者祥兹為利貞爰祝萬夀九垓永寧雷氏龍吟琴贊為閔思齊作四田八日用凝扵神攫之也深養之也淳風生扵木莫窮其聲比物引類錫兹嘉名杳杳變化雲升雨㴻戞如銅盤兹其為作者之助吴閒閒真贊徳不形禮為翼熈熈冲静之神侃侃孝友之色籠古絡今其詞如雲佐理以無為智淵而若存朝承衮龍暮撫松鶴心徹九九坐石盤礴是所謂養其尺宅守𤣥以生白者耶仰山熈禪師真贊蜀僧曇簡以文詞振林下繇是東南學者翕然師之育王觀禪師才辯繼其學弟子熈公復繼之有詩名鳴咸淳間試嘉慶圖詩禁中定為第一余獲見於浄慈植節刻行言語若冰雪欲以蜀學廣其徒後歸隠仰山以逝其嗣隆教師祖瑛以遺象從海上請余贊迺為贊曰心之精神繇言以宣匪事琢雕合扵自然維師集思泉湧雲溢億萬森列􅂧貫以一蜀學日淪志士是惜瞻彼肅容以楷以式南湖入法師真贊目穿書林心超義海體用不違功斯十倍審多岐之亡羊悟忘筌以得魚追琢其詞不浮不蕪外嚴内熈蕭然野鶴之姿斯其成祖庭之羽翼絶塵世之樞機定水源禪師真贊持律以攝心習教以騁辯語黙兩忘微㫖益闡薄飯一盂福不稱其徳至於據席握機颷回電激誠禪林之凖式也雪厓吴法師真贊雪厓吴法師飭身制行道流所尊企弟子吕虚夷請贊長齋以養年持敬以籲天若雞抱鷇如珠守淵望之山林即之珪璋知止葆静合太古之淳厖夫如是逍遥乎白雲之鄉箴存悔箴天君亭亭巖石永貞執樞維機莫我敢膺釣聲割名如蟊如螟微焉髪毛戰兢是承謂善實繇小而過不在大雷以鼓之艮以配之合動而復繇静斯㑹昔顔氏子悔實莫可名筮人司蓍敢告司扃遵誨堂箴肅肅祖父誦戒孔昭亶惟矩衡匪矜匪慆式瞻里門養真簞瓢何榱題岌嶪肆其夸驕金糜玉毁迄用不紹巷有居人燕咡曽髫右觴左饘以逰以遨何白首髙位顧影號咷伊堂既深亦具室奥傴躬徐行慨焉焄蒿户冊崇崇陟降以悚於乎後生勿夢夢是從爰繹具訓敢告嗣宗貞一齋箴昭哉森著鉅纎受形順天之樞執動以承尸居者誰不震不隨謂珠藏扵淵主静是師太虚無體曷思曷為聚為物均散為返真由感以遷若火之燎原在昔夸父逐日走傴鑒觀河圖繇是成數成復捨之厥數愈具庶物澷澷若冰斯泮固而斯應迺事之幹絶仁棄智望道彌渙必寂爾心必完爾神筮人司易敢告靈君誠求堂箴肫肫者仁婉婉者孺彼孺不言容動斯具以食為喜以啼為恕感匪物遷孰司昭先黜思絶為迄全其天揣知者誕矢激滋逺順隂保陽若執玉以祼太素烟煴至静無垠見之猶龍望之如雲猗儒守醫曰曽氏子言邁于京户冊是視銘復菴銘弁陽老人周公謹父卜終老之丘扵先中丞公墓左築室其上揭名曰復庵謂其故人子袁桷曰復反也反諸其本也聖人作易之義深矣余取斯名也厥有㫖昔太公表東諸侯歸𦵏於營丘禮以謂不忘其本余家故齊人雖南徙吴興而其遺禮三世猶守之自余失仕居錢塘非有酣豢之樂而忘其歸不幸而不得歸者勢也今老矣苟終無所歸則扵􅂧之道奚取抑甞推死生晝夜之理其變無窮反身而觀虚一而明者物莫能禦則兹丘之樂殆與造物者去來而莫窮其所止也子為我暢繹而銘之銘曰大明麗天隠扵崑崙晦冥有時以全其根海氣騰溢為雲為澤吐竒滋生復反故壑嗟彼昏氓雎雎凉凉齒髪日化莫知其鄉馳車羊腸倒戈蟻垤少夸老衰運往一跌維子周子心君天游顧瞻松栢肇謀莵裘峯迴泉渟虎伏馬立鬱為斯丘不龜以吉煌煌先徳如珠在淵既揚其輝終閟其妍盤桓斯丘豈不念歸三返晝夜以為徳機伊復之道其微如芒磅礴一氣變化以彰原本稽中是則是象謹獨内觀動静交養他年逍遥駕風御雲匯為江河炳為星辰其來無趾其去孰止為善是嗣貽於孫子君子齋銘大裘無華完玉不琢飾美自將其實愈落善不可為名不可近恕以養仁敬以崇謹謂我獨賢於徳彌損八表同雲一決終僨謂世實賢雎盱孔憐肥遯斯耻却行乃前人我之道弭節兩忘汝不我瑕我不汝望煌煌嘉名揭兹户冊希賢是求探藴觀􅄨盤旋九州俯仰千古發硎淬鋒門轍户屨君子之泰君子之和永言銘之以宴以歌澄心齋銘大梁劉君彦清佐鄞幕清浄畫一希蓋公之道逾月而治愈簡及朞而人莫能議噫使佐天下由是道也果何病今世汨汨然外治者多矣神明粹精交蔽而愈失其於内也盖不暇夫虚明之體絶慮而求者非正或者謂老氏之說近此因屏不復取今劉君以澄心名齋動静交用有合扵聖人之説四明袁桷因銘以廣之存神内觀形不能以久完刻意外治氣由是而彌衰水煩土敝維物之灾人為物靈其道安在内不可穢外不可悖湛然長存扵物何類故操尺寸之智者成㝷丈之失勤錙銖之功者獲倍蓰之益御天地之一氣持隂陽之兩端吾見其清而不介絜而自全也雪房銘錢塘孫道士構雪為房居江南度不能久得北如京師將遂焉久之復越居庸以㳺始固有之迺屬袁桷銘銘曰養絜沮洳其變莫渝納明屋漏其神莫䆒執天之冝允成徳機機可轉不可緩緩則懼懼無以據窮髪之北以儀以則爰謹視之毋怠毋慝崇真觀鐘銘冶吉金構坎離為氣用震以時深則安安迺旋鎮無極億萬年朝陽堂銘焯彼曜雲光融曲阿翼翼𤣥黄粲其鬱華䆒觀厥功構精沈淵若鷇斯伏若珠斯潜内隂以藏外遲以進含施無垠執斗憲運衆瞻嘉明企而則諸言升于岱昏旦允殊丹流金騰下土若昧竦心愓思怠曷可悔嗟哉夸父競不救暍大聖維姬慎兹明發爰興爰處寸測短長少耄勿荒永儀朝陽蔵書室銘六學鴻烈代天昭明精思纂微辭以立誠匪事扵言不文奚宣析理日繁直致衍傳謂黙足以通絶其知聞敬焉孰持誠焉孰存趙郡氏蘇崇其書楹剖抉雲章緯經有程靈根湛虚服習粹精廣以觀萬約以守一迎之莫㝷倚兮不躓仰止元聖學海彌溢極髙明齋銘謂天穹隆環扵九泉謂日陽靈始於虞淵邈焉具瞻荒忽漫漶銖黍立鈞億萬以正行逺陟遐跬步攸定維先聖彛訓大賢是證理一分殊等級辨分不博以求孰為彌綸不約以觀孰歸其根積小斯髙用晦斯明罔有僣差是凖是繩户冊孔昭爰矢厥銘九思堂銘虚中實中圖書之紐實以分殊虚以一受理原扵初思曷為九扵赫𤣥聖分言為中上由體生下應景從維李氏子受訓倥侗户冊孔昭執玉靡墜數窮扵𤣥隂陽以類則皇極之言罔有偏陂淵静齋銘為蒙道士作猗鉤盤審鯢桓蜀叟蒙拱以觀惔無極視晏然黙雷聲守綿綿珠在宫百神環時既至乗風摶清容居士集卷十七
