body:
  text: 清容居士集别集類四元提要臣等謹案清容居士集五十卷元袁桷撰桷有延祐四明志已著録其集據蘇天爵行狀及元史本傳俱稱五十卷此本卷數相符盖猶舊本也桷少從戴表元王應麟舒岳祥諸遺老逰學問淵源具有所自其在朝踐厯清華再入集賢八登翰苑凡朝廷制冊勛臣碑版多出其手故其文章博碩閎麗有盛世之音尤練習掌故長於考據集中如南郊十議明堂郊天異制議祭天無間嵗議郊不當立從祀議郊非辛日議諸篇皆成宗初所上其援引經訓原原本本非空談聚訟者所能當時以其精博並採用之其詩格俊邁髙華造語亦多工鍊卓然能自成一家盖桷本舊家文獻之遺又當大徳延祐間為元治極盛之際故其著作宏富氣象光昌蔚為承平雅頌之聲文采風流遂為虞楊范掲等先路之𨗳其承前啓後稱一代文章之鉅公良無愧色矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書
  hash: sha256:c3cfa369c4910929072a381f39ba5423ca5e4e6b809fdd64c5d2eb3f14d8bca0
