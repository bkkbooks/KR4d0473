body:
  text: 啓疏附回宣城郭教授雷煥江左諸賢夙慕敬亭之山水洛中九詠肯言亰邑之風塵擔簦而賜璧一雙馮軾而下城七十竒節矯亢髙名激昻伏惟教授學士藻思春雲丰神秋月子綦隠几立言深愧扵炎詹林宗墊巾置論匪鄰扵危覈脱頴悟折衝之敏發硎窮肯綮之情流涕力疏扵治安多病耻陳其封禪懐章宿邸知富貴之有時棄繻入關審功名之可卜方盛世興賢扵郡國詎長才抱道扵草茅雲龍類從㝠鵬運徙遴選金臺之彦孰敢居前深蔵寳劒之篇豈宜緩後方争求而識面謂鼎来以解頥顧懐刺而却行将舉扇以疾避長箋鯨掣蔀室珠輝桷學殖塵荒經畬徳墜儒林丈人之源委老矣亡傳子墨客卿之詞華終焉自失每念空餐而増戾誠思㧞茹以避賢位卑語輕望淺任重吾徒掌帝之制弗稱絲綸君子贈人以言有慙斧藻永繹其㫖不知所酬伏希亮察答郭山長家近神山那有望瀛之想禄尸玉署每慙玩嵗之羞将賦式微之歸忽膺連茹之寵捫心悸惕揆分僥踰桷智不逮人噐非越衆老而能學永希先世之勤樂以忘憂欲述聖門之志考兹盛代尊彼儒流選部推毛之精崇文㧞犀之舉謂南士後至難效盧前而靈胄逺尋所宜隗始白駒空谷振鷺西雝有来琳琅之書彌重錦繡之段客師之遇跛男子佀若倒之汾陽之許謫仙人于今驗矣襲蔵是謹傳誦惟驚回府學觀禮瀛州清切甫賦歸休泮水肅雝適嚴秩祀方謹陪庭之儀注遽承巽牘之詞華進執豆籩升聞金石惟素王道徳之懿合蒼姬文質之宜謂巍坐光榮不㡬淺陋而成令炳著斯為故常深嘉絜已以作新共企傳恭而復舊奉璋相事敢居髦士之先執禮遵前難免鄹人之誚答朱生一還故里分安野鶴之閑三入承眀衆哂黔驢之技櫛髪淒其已化捫心省以獨慙粲然霞裾申以氷繭蔀室獲兼金之耀衡門駭織翠之竒伏惟賢良學士汗簡功深韋編思切議詞章之弊􅒊扵揚劉發騷雅之幽擬於屈宋單出雜比為律吕五采一就分等夷靡然變藻繢之工綽矣成灝噩之古然而眀理者鄰扵直致修辭者萎扵曲裁謂箋記止媚上之文能之實少而制誥得儆衆之體作者猶難桷金匱世官青箱家學嘗自處扵木鴈深有哂扵土龍史乏三長敢述馬班之制作經迷五始莫推啖趙之淵微事與願違志随年徃幸覩清修之標度得攄磊落之襟期針芥有投漆膠彌固贈以繡段拜雖亟以莫辭酌彼金罍禮未成而先醉輪囷有感厓略是酬回楊編修綴班玉署悵諸老之川流晉秩金華撫微躬而涯返選繇鼎鼐事駭搢紳方虞按劒之疑忽荷遺珠之贈伏惟編脩學士文裁錦叚思湧繭絲目無全牛論固輕扵餘子智専老馬語或齒于陳人每憐炳燭之勤能破炙轂之辯嗜同昌歜玩比懸􅀺既接壤扵片雲復盍簮扵中禁事云有􅄑時不偶然桷乆困亰塵冝􅀵朝蹟望蓬莱隔弱水􅁏羽難勝歸郷里授諸生丹心尚烱敢因褒拂庸寫摧蔵賀臧户曺七十光分華旦瑞􅢳希齡兕觥以躋公堂允資禆賛鳩杖而游鄉校實頼主維人瞻夀骨之有傳天挺蜚聲而彌壮桷陪游再世縻繫一官望廣顙之彭籛雲烟縹緲想脩容之姑射冰雪湛凝侑慶薄儀别陳副楮回韓知州伏承劄翰俾篆碑顔詳讀再三莫殫萬一靖惟先正按察相公智謀超俗勇略立勲東西戰壘之出竒左右屯田之擇便矢穿楊葉彤弓昭大帝之恩斧破豫章金符儼百神之助烏府藹澄清之譽紫樞彰鎮静之謨薦士惟公共擬巨源之識量聴訟以理未夸廣漢之精眀至若更異代而振家聲以孤兒而傳宦牒績為罕匹人所難能編摩已著扵穹碑揚厲宜歸扵汗簡伏惟節使相公窮神述事立身揚名繼世象賢牧守之任相接為政以徳撫字之念彌加安陽之圖譜可尋頴川之風猷如在昔聞惟二今見其三某演誥罔功紬書無補龜跌屭贔幸附􅂹以託名蠆尾參差願濡毫而作傳尚賖參覿統祈鑒融夀史允叟數周甲子夀開絳縣之年瑞後中和慶萃金閨之彦槐堂馥郁榆社歡榮伏惟某官服食頥神希微養智撫松筠而閲嵗霜雪不移調茵鼎以樂天烟霞自得方将友安期扵瀛海揖子晉扵緱山坐觀盛衰笑視今古招邀親黨願成二老之風流約集耆英共繼九賢之真率薄儀侑祝副楮别陳埜甥定鄧氏西州勝士久欽翰墨之芳南國故家自笑冠裳之冷幸託根于外氏獲聫䕃扵清門不假揄揚遂諧婚對伏承某封徳參女史訓服姆師從子公埜習有童心才猶凡品每慙鐡鑪歩之誚敢意玉鏡臺之緣敦義有加申盟無斁陳不腆之幣爰以敬初叶和鳴之占永言綏後臨風瞻倚執筆感愉趙氏請婚代作眀珠當道愧無因而至前幽蘭深林敢不採而自佩庸假蹇脩之力允諧懿氏之占伏惟某人朗鑒冰清義襟河潤品題吾黨合閭里之衣冠繅藉斯文振家庭之詩禮有懐聫事歸擇賢宗不煩千金之致詞端藉七寳之合月翠屏宜晚行叅羣從之㳺白水同心益覬片言之助輙干将命恭俟報音長女許適趙氏西府垂芳遺編僅守北門視草一疏獨髙興懐二老之盍簮屈指故家之傳笏前言儼在嘉命是恭伏承令姪同知壮慕直清仕版方堅扵冰蘖而桷長女某幼遵婉娩閫儀粗習扵絲麻眼空餘子之随羣人議迺翁之擇壻察其素履終以淡成萬里逺歸自訝子平之拙百年偕老願諧敬仲之占腴禮莫酬副書以載次女許適趙氏伏以漢庭甲乙曩已託扵同年商邑後先適相符扵十載仰止青雲之素巋然喬木之存施于孫曽成爾姻婭伏承長令嗣學士思深象管譽已藹扵階庭而桷第二女某工謹鞶絲職粗遵扵閫奥末習競夸其侈靡吾徒宜守以儉純此道清風斯盟白水仕非為貧也願早觀金題玉􅉜之竒言得無訒乎已預述竹笥綀裳之簡有嚴報禮庸謹副椷回余氏議姻成季之勲象賢是嗣有媯之後教順惟慙念脩程方歴扵冰霜而賤跡幸安扵田里事適相偶時何敢違聿来金薤之華申告瓊茅之吉悉蠲繁縟以奉周旋直道而行固官箴之攸謹外言不入在梱範之必嚴匪惟弱息之有歸益見清門之足法奉板輿而調鼎膳所願事姑入玉堂以復家氈敢云傳壻莫攄喜臆庸致規言季女許適余甥百年事契仰止髙曽再世婚姻施于姑姪念造端扵幼嵗獲締好扵今辰允自氣同抑光肺附伏承令姪洒掃應對久遵夀母之䂓桷女保抱携持夙賴大家之訓展也衣冠之緒凛然弓冶之傳人亦有言吾為此懼魯衛兄弟禮已判扵立談秦晉舅甥事益難扵坐視勉焉亢植稱爾奨提叔女許適史氏秦晉甥舅之國論世可知朱陳嫁娶之村披圖儼在惟華閥孰比肩而擬廼衡門争接踵以前盛徳有容寒宗奚讓伏承令姪孫承奉衣被儒素綺􅃭之侈靡聞而桷女服習女工鞶絲之精未觧念游宦久塵扵當路而婚姻馴致扵失時立談璧􅀟訂諾金百綀裳未備敢云九十其儀鐡硯可傳行奏三千之牘回史氏聘宦路因循莫酬宿諾相門清䆳猶守舊䂓荷崇篤之愈加審姻婭之攸自書来尺素禮重兼金歌摽梅之詩懐惟有慊效投􅀲之報愧莫可言瑾請婚史氏元老傳宗専清名扵碧沚彌甥承緒徼餘福扵滄洲百年婚媾之孔昭再世姻親而允著伏惟某官某封内閫服習手絺繡以益精而桷男辟水従游躬簡編而粗謹唯閥閲吾徒之當保何閭閻餘子之争前謝彼濁流成是古道納采用鴈欲男女之及時端䇿拂龜審公侯之復始敢陳薄禮庸載副椷牟氏招贅書代作中年婚對每深禮本之思晚嵗家聲猶守儒林之舊盟既諧於築舘事宜免扵御輪老矣無能視之猶子伏承令嗣學精緗帙才詎止扵目前而某女某功謹鞶絲情難離扵膝下受餐願同其甘苦奉匜深謹扵寒温既重久要敢辤先施青氈硯在敢言翰墨之有傳銀燭屏開豫卜門闌之多喜疏易州文廟疏聖人之道極覆載莫得而名神眀之通若淵泉無徃不在維上谷之古郡實陪京之奥區脱戰國任俠之風服五經仁義之訓化行衿佩家有衣冠然而揭䖍妥靈廟堂之制未舉設儀辨位籩豆之禮莫施雖像設之教唘扵後人而神棲之宫見乎累代事關我軰天祐斯文泮宫作詩願同功扵史克鄉校有頌豈専美扵鄭僑敢不盡心聿来胥宇翬飛鳥革佇㸔不日之成玉振金聲共享無言之化鄉閭樂助庠序増榮贈陳無我凌波圖疏右軍換鵞經不了生前之債東坡賣馬劵要求身後之名然而畫餅豈足充飢須信望梅亦堪止渴菊南道人璠璵古學瑚璉雅材江漢秋風付經綸扵獨笑冰霜晚嵗寄漫浪扵一官食苦茗而論事不休坐胡牀而倚聲自若寜為雞口任刮龜毛丈夫豈願憐出門何礙平生不道乞對鏡奚慙信天公之記已成孔方兄之交頓絶雪車豪士㑹須奪吏部之金秋水逹人寜復貸監河之粟知心惟一具眼無雙張玉田歸杭疏采藥神山悟朱顔之今昨呼猿靈鷲勞清夢之去来要當青鞵布襪徒步徑歸誰信黄絹色絲空言何補弄笛恨邉雲􅃤澹坐䆫惜江月淒涼落葉孤尊無復金貂之慷慨古梅千檻空懐玉照之風流食肉之相已非解牛之技焉用焦桐未遇斷木自慙風雪江湖肯後當時之置驛交㳺金石定先桑子之裹粮鄙騎驢㶚上之寒遂跨鶴揚州之願膝行而謝稛載以歸燈火話平生慰老弟兄之白髪詩書娛晚嵗還名祖父之青氈恩極無言情陳有靦周可竹移居疏借車載家具已知生理之疎騎馬傍人門可怪言辞之拙相期青眼少尉白頭可竹教授清比叢蘭臞如野鶴無殘盃冷炙之色有簞食瓢飲之安鼓琴授生徒近馬季長之標致隠居任漁釣入方􅀇英之品題㡬經茅屋之秋風厭聴小樓之春雨烏鵲三匝鷦鷯一枝欲尋莬裘之謀難課兎園之效昔和靖處士享西湖之樂不以告人然康節先生買天津之居嘗聞醵衆既自慙扵唘口要當㑹扵知心不惜一言母煩婁請門多長者共成来往之歡尊有賢人不廢倡酬之適鄉閭佳話湖海髙風許路教入舘疏代人作道䘮扵千載之餘談經者逐章句之末士奮扵百代之後言理者析天人之微不有淵源孰為矩範某人學優聖域譽藹儒林光風霽月之心胸莫窮其藴清泉白石之志趣所養者深名羞少室之山人衆羨關西之夫子得英賢而教育終愧顓蒙美盛徳之形容莫殫善頌却前而請虚左以迎趙太社刻春秋法度編疏列國寳書慨混茫而亡紀三陳鐡㰅洞消息以深憂永瞻黍離之遷迄成葵丘之㑹蒼姬凛在素王是専攷牛耳之盟悉淪扵誣矯推麟趾之應莫捄扵衰顔匪惟凡例之嚴是曰筆削之正然而隕星退鷁非有貶褒歸賵求車實渝典禮直書其事足以誅亂臣之心曲􅀃以箋殆有若法吏之口三傳角立羣儒狐疑維昔師臣侍經白􅍑今有賢子紹業青氈討論無歆向之嫌文獻續間平之美年運徃矣風猷儼然㓜讀父書若擣珍以和扵舉鼎老嚴家訓雖嗜芰猶守扵加籩泯然郷校之闕遺懼爾世卿之淪靡願廣傳扵琬琰庸不墜扵箕裘白首書成􅁢遂殺青之志清門人在益章夀梓之㓛戴先生刻遺文䟽羊公峴山之碑深懐身後白傅雞林之集豈較目前是以壁中之蔵咸嗟其斷缺航頭之獻或議其改更念兹汗簡之勞多孰若夀梓之功博生乎今者甞忽夫近志于古者或知其非爰舉耆先以告茂異剡源子少負竒志晚成大名漱六藝之菁華窮百氏之源委如得温璞以成連城之璧若裒吉金以合四懸之鏞世方尊崇老益平實夫人既慕其學是宜家有其書失今不圖斯咎誰執十年之計在木庶得廣傳同心其利斷金允宜共賛不在是舉曷成斯文穆叅軍市上之酬敢求美價蔡中郎帳中之陋徒蔽脩名尚仲良刋醫書疏景書為十圖類長沙張仲欲觀日月星辰疇咨繪畫多識鳥獸草木具訓傳模矧左圖右書之教備存内榮外衛之微莫辨張長沙類四證以眀治病之本朱南陽衍百問以推用藥之原其書雖完厥理難究爰有多聞之士聿成一覽之圖考百藥之君臣推五行之母子分􅁌濇扵坤艮别表裏之隂陽若㳺建章咸旁通其門户猶入武庫悉能名其甲兵允得扵心如指諸掌欲推已而傳世必假衆以全功張廣樂扵鈞天詎資聴瑩挂髙堂之素璧端便覽觀共勉揮毫所期刻楮陳晦父致仕還家疏挂冠神武注晚嵗之蟲魚歸老鑑湖了餘生之麴糵駭士林之一見合選部之二宜喜在眉端春生足下湖西致政陳教授長材韞匵敏手斵輪破㡌塵侵不辨支離之粟矮簷風急徒賡骯髒之歌鳥信天以無愁楊厄閏而彌老李太保亦為之恵米固以眼青蘇司業時賴其與錢終憐頭白漫浪江湖之迹淒涼山澤之癯囊無一錢室如懸磬扁舟下吳㑹願共謀屝屨之貲騎鶴上揚州庶益遂衡門之樂金陵鄭生應炎道士疏北闕上書著詠受嗔扵唐主南山種豆貽言増禍扵漢朝生也有涯安之若命金陵鄭生精神玉絜辭辯春霏負笈登途謂功名之来可立致下帷講道審義理之得為無窮淒涼灤水之情懐隠約金陵之夢寐将置身扵方外行抵掌扵人間柱史猶龍匪宣尼之私論塞翁失馬詎荘叟之寓言斷于乃心告兹多士青精顔色深培槖籥之㓛白日羽翰必假刀圭之助渝盟天厭效義風從真定劉謙父葬母䟽貧迺士之常命有拘而淹屈孝為行之本力不逮以因循歴觀聖賢夷考傳記脱􅆖之贈成扵斯須挂劒之酬定扵徃昔蓋惻隐為人之固有而忼慨則世所共難謙父提舉臺閣蜚英江湖漫仕郎潛衰矣虀百甕以自怡吏隠蕭然粟五秉而誰助假墻壁以葬其先母閲嵗年莫返其故居雲聳松楸難合延平之劒煙迷鄉國佀隔蓬莱之山傾麥舟則蓋有其人指米廩亦當繼其事古推任恤義濟厄窮觀百金為夀之辝誠為過舉輟一朝享客之費是在勝流凡我同盟知此非僣史朝甫鳩金疏衮繡舊坊痛家氈之羽化簮纓故物存遺址扵霜餘非假熏修曷能永逺昔梁公有廟以香火而綿長魏氏故荘因耕稼以蕪翳肯堂之志敢替居室之資孰謀矧此地號寳奎湖通碧沚四世五公之故躅十洲三島之仙蹤道氣分紅塵之囂勝槩接紫清之邃王珣捨宅虎丘之跡彌芳賀老棄家鴻禧之傳益著願慿衆力允成勝因鞏子固鳩金疏顔淵希聖簞瓢之樂有餘揚雄好􅀇甔石之儲不足道之充者身愈泰心之廣者貧益安子固經歴游藝精深養神恬静因五行而知貴賤響若蓍龜閲千官而審盛衰眀如水鑑腰難折米口厭言錢監河之粟誰償吏部之金莫奪廣厦寒士之願古蓋有之綈袍故人之情今斯可矣一時傾蓋相與揮毫竒禪師住天童疏身隔片雲更上玲瓏髙處心如止水久眀清浄本源行蔵不假扵脩為去住靡容扵擬議僉言推挽一笑承當伏惟天童怪石禪師潛雷在淵美玉藴石法筵擊拂大辯若訥以難窮丈室閉門掩息如灰而莫測澹兮守僧伽之鐡鉢寂然䕶摩尼之寳珠不滯一方難違衆論雲無心而出岫允稱拈提水有時而回川佇㸔興復祝聖主夀作天人師冲禪師住補陀疏平湖春藹久居水月之上方絶岸雲深要識海潮之瑞相雖神化無形而應感在世縁即境以示真選衆維公當仁無忝伏惟補陀太虚禪師澄源心鏡懸河辨鋒蔵室眼空一滴果投扵巨壑石盤手透正宗允紹扵東巖對逹官不下繩牀示諸徒靡煩禪板睠惟寳刹上徹紫宸香幣絡繹扵道塗車馬駢闐扵島嶼發乎邇見乎逺變現莫窮左畫圓右畫方應酬非易敢煩主宰庸闡拈提小白花香證西天之梵語空青水影印南海之圓光顯大士功祝聖人夀夀國堂師住廣恩疏法王寳刹殫億刧以莫窮盛徳佳城考五傳而必復維樞庭奉先而結構實木庵受畫以拮据子為孫孫為􅀇初無間隔公慙卿卿慙長卒致荒蕪羣議交譏諸方竊笑伏惟某人溥洞下之㫖益宻為山中之行最尊化鶴還家飛錫歸里翠浮松栢儼竒觀之舊模金透簷楹増清暉之秀色祝彤庭夀廣緑野恩南湖十六觀重脩疏想逐心生由思為而攝以觀行随誠立積空假以歸于中推西方清浄之樂邦解羣生昏垢之苦海法智尊者開講席扵是山介然比丘肇化境扵此地十六觀室烱銀樹之光眀八千由旬儼紫臺之芬郁坐無虚位儀具清規巍峩髣三聖之現前拱衛恍諸天之如在若兹妙所允勝他方壊空乃算數之循環變幻成刧灰扵瞬息睠維名郡素號相鄉信士孔彰法身不昧陳諫議以筆墨為之翊賛史中令傾金帛盡其荘嚴古與今同事由衆舉掄楩楠扵澗谷采丹雘扵陶鈞蓮花湧七寳之池貝葉集諸香之案雲興膚寸徧龍澤而有年毛積毫釐成狐裘之無價以斯功徳作是因縁庸報皇恩咸増佛果永禪師還定水疏百年得意大槐宫真成一瞬千載還家華表鶴今喜重来山林以之鎮浮松栢為之改色去留何礙出䖏無心東州老禪骨格老蒼宗􅀇真浄沙盆之破已補佛法無多寒厓之􅀝如春機心盡掃厭聽蕉䆫之㸃雨竟歸茅屋以看雲塜間之約􅃍忘庵外之事漸識微我弗顧盍歸乎来一宿閣中寜許當年之掉臂三生石上㑹須今日之㸃頭水已歸東車容虚左儀師住天台飛瀑寺疏如来四十二章已成經論天台萬八千丈難與度量爰開祖庭以揚教觀天台飛瀑寺儀公講師心懸水鏡辯雨天花跨逺道以獨游觸緇塵而無染方且􅀉吟咏扵畦町之外追談笑于江湖之間恵勤来亰師歐公嘗進而與之語文暢游河朔栁子亦序以壮其行二美適同羣言允惬挽之不可去矣奚求飛雪懸厓捨枯薪而煮茗清風夾徑對眀月以倚松逈絶見知益増定慧真禪師住定水疏古人冡間樹下是大道塲彼處山色湖光乃真長物雖三宿恐成知見然一擊終有本原飛錫肯来虚車以俟真公長老松源嫡嗣竹閣儒流大庾嶺擲衣了無諍語雙峯山舉拂允謂報恩卧白雲以送千帆之飛􅆽清泉以展一鉢之供為仁由已斯道覺民今年貧勝舊年幸尚有卓錐之地東澗水流西澗儼相望埋玉之阡夀祝三宫道叅七佛寳林塔重建疏如来以不二心作浮屠相至人以無縫手成窣堵縁睠兹寳林名冠東越平地湧起實許􅀇度之勝因兹山飛来有徐㑹稽之妙句今有墨本留寺中徐浩詩兹山昔飛来雖佛燈之相續柰劫灰之屢更萬里有行七層儼在中殿記靈山之㑹已為天下之先康衢歌擊壤之謡共效封人之祝雖云具足要在合尖願力精専等童子聚沙之戯神通溥博謝育王使鬼之能舉筆生風成功不日東嶽興造疏三宫空洞之中上通寥廓四海幅員之廣實有主維古稱岱宗仁並木帝伸為神屈為鬼端假去来生者飬死者蔵必資旋轉三十餘里之太嶽七十二司之真官爰謹鳩工用嚴象設居士垂鶴髪而成勝果詎止一年懐州號龍興而闡珍符永祈萬嵗丹青之費雖廣黒白之業可消煩孔方兄之㸃頭須楮先生之落筆五榖熟而人民育造化功深三階平而隂陽和生成道廣西隠道院重脩疏賀祕監千秋之觀門有水雲王大夫安化之廬居多竹樹爰宅清浄以成勝殊然而絳闕蘂宫乃梵靈之所幻桂棟蘭橑兹地産之所為若風落山木葉盡脱如舟在水波濤相凌故卦氣示還返之方而丹經著補服之妙兹維人事必假衆修告于棟梁視我墻屋華表驚其如故鬱羅儼以常新伻来以圖還十二樓之森著神降之福祝三千嵗以遨嬉脩桐栢觀疏福地七十二所之最允屬金庭台山萬八千丈之髙實通丹闕維王子乗雲而税駕至僊翁禮斗以建壇谷神闡靈山君集異瀑水千尋而横練松花五葉以垂珠興公之賦曲盡其瑰竒擇木之碑悉書其逺始睠兹寳殿迺開元皇帝之經營攷彼漆書肇司馬山人之展布嵗月屢經扵代謝風霜曷任其枝梧羽人停鶴以興嗟客子控􅆖而問故巍峩道祖必資蠖濩以導迎縹緲虚皇宜假靚淵而崇奉計匠詎渉旬之可集商財非積萬以莫能瓊臺何昔日之易成玉局蓋一時之神化匪資柱石曷濟津梁鼴鼠飲河願早貸清溪之水精衛填海當有憐白首之心烟霞改觀以翺翔草木懐新而鼓舞祝崇萬夀道賛重玄清容居士集卷第四十
