  text: 清容居士集卷第十二
  hash: sha256:6ad36ff1bfd0ca0f58423f04716d65e0183967e3e3ff9311da1bf23bd5d80e04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_012-1a}
body:
  text: 律詩七言送喻道士歸蜀公為布衣交舊與内相鶴骨䡖輕碧眼鮮五千言裏契重玄定知徳􅁉曽傳道久與長源共學仙金籙夜調丹井汞紫衣春染御爐煙掉頭不說人間事􅃌㸃白雲尋醉眠趙郡眭孝子真逸堂青松手植已成雲盡日庵廬不出門屋角慈烏議晴雨階前馴鹿候晨昏清秋釀黍􅁱鄉約深夜篝燈課魯論明世詎堪成隠癖舉頭束帛起丘園五老堂鬢眉雪色古儀容五老雍雍氣象同菊水定知延上夀桃源今觧識髙風弟兄黄巻傳儒素娣姒青燈教女紅慣說前朝征戰事醉拖笻竹數歸鴻送河中段惟徳應奉除西臺御史千年青簡正紛如還著鐵􅃣歸故居妙筆醉欺紅芍藥丰姿鮮暎玉芙蕖過家上塜争驚喜拄笏看山任卷舒試上樂遊原上望緑隂芳草正扶疎韓參議家慶圖各九十叔祖暨父丹泉為醴菊為葅的的厖眉佀畫圖萬石齒髙勤澣洗二疏年並得歡娱兵前父老難尋伴眼底孫曽緫業儒欲向碧桃花下醉斑衣紫綬兩相扶吳成季父母夀八十延陵季子古髙賢雲耳于今夀種傳有道定知真有子齊眉更喜復齊年蒼龍􅀟擁宫醪湛白鶴重歸丹井鮮自是君家多孝感玉杯甘露㑹羣仙有玉杯甘露之感吳猛事父母至孝後白雲平章致仕曉看明鏡欲休休萬里㓛名陋虎頭絳闕直辭黄鼐貴白雲終伴赤松游侍臣傳醴真殊遇退傅揮金得自由盛代東封催告禮更湏元老侍垂旒寄題成都李御史萬竹亭亭亭萬竹封侯貴聞說西州植此人風送笙竽聨雅奏月留鸞鵠寫清真山頭宻護千年雪地脉潜行八月春八月西行舊譜言竹鞭欲上岷峨探游事煩君􅃌㸃浣花津送鄧君用教授歸廣信山光隂那俟日懸車抛却荷衣即故吾置對直如朱伯􅌋退休還佀邵堯夫白鷗逺水清秋鏡紅葉前峯落照圖耆舊即今同逝水早將鴻筆為傳模黨下獄以謝疊山夀李承㫖二首兩曜迎陽合璧時卯君乗瑞佐昌期閣中像有㓛臣賛圯上書為帝者師碧眼閲人如水鑑丹心許􅀦有天知嵗周甲子今重轉消息梅花第一枝清時得意恣逍遥雪色䰅眉兩鬢饒棊局春風深閉戸酒樽涼月獨吹簫豹韜䄂手終傳采鳩杖無心强造朝門外種松今百尺它年為我掛山瓢安西老人方瞳如漆耳輪髙喜見曽孫守碧桃鳩杖月明尋枸􅂎鳳簫春暖醉蒲萄故人天上方蟬冕老子山中但豹韜欲問汝南耆舊事且乗􅀛殻把􅀟螯早朝興聖宫次韻萬馬東西甬路斜銀河􅀄曙起宫鴉天香随輦凝三素風絮沾􅂁㸃六花銅史漏浮催卓午玉奴聲轉進流霞詞臣㸃綴瑶池事底用秋風海上查次韻周南翁退朝三首蹕道聲廻覲后皇霞旌􅀟引拂朱光􅀛臺新按霓裳曲獸鼎重然甲煎香歌板遏雲穿泱􅐯酒車流水度汪洋重輪瑞世思齊聖傳信應湏屬子長雉尾髙張擁玉皇彤庭金榜粲明光舞階飛絮傳滕六執衛傳臚轉阿香珠帽簫聲􅀟窈窕翠旌雲影互方洋侍臣誰近前螭立願紀堯年化日長蛾眉斑立肅皇皇帢匝松隂陋午光舞翿當軒初進酒表函登陛促傳香六龍捧御雲中日三象輸琛嶺外洋欲識兩宫清浄理薫風殿閣漏初長和游岡子原韻棠花淡淡栁花濃岡子原頭立晚風三月雨聲人共喜一樽春色我難同麒麟臥草青山外騕􅒁穿雲緑樹中晚嵗滄江情不盡想看清淺數鳬翁用早朝韻酬伯生試院見懷玉署松深月半斜研朱和露勘塗鴉射熊心苦穿楊葉吐鳳聲清飽竹花過眼佀迷三里霧騰身誰上九層霞故人掉首南山去應釣秋風漢水槎酬周南翁子二首小榻燈殘鴈影斜詩成重㸃墨如鴉臯禽警露呈三疊天馬追風剪五花郢客有才歌白雪湘纍無計佩飛霞璿源自是天邊路不用贏粮學泛槎碧箋長短闘車斜玉雪青春䯻佀鴉􅀶物已知窮海棗苦心端欲鏤氷花山中伐木鳴􅅮黍馬上看塵起落霞健羨雲䆫無限好慈烏雅雅鵲槎槎送儒醫何大方歸信州􅀟櫓鵞鳴野水髙天風落葉響林臯空堂桂露流金乳舊鼎􅉢霜長玉膏丹府久虚存夜氣上池新飲察秋毫山中猿鶴驚相問肯為緇塵染素􅂁次韻周南翁拜孔林二首陵廟隂森佳氣蟠湯湯洙泗接淵源硯傳昔日王官得履憶當年漢庫存手板文裁楷舊植髮冠香守檜殘根楷木裁手板賜唐文皇以孔林亡檜焚士大夫斸檜根為韜髮􅃣十八學士鄉中張叅政家猶存金羣經日月行天地萬古韋紳沐聖恩山蔟平林野水清整冠下馬得徐行壇空尚憶風雩樂宅近惟聞金石聲環珮齊趨文有度豆籩初秩禮為程百年雨露同車軌郡􅀦千官奠帛生贈豫章蔡黻歸里中来亰師以鄉舉不抵掌彈冠謝未能立談白璧且擔簦厭聴長衢三尺雨愁飲深冬半片氷冠盖情傾年運徃簡編心苦嵗華増去来聞見冥鴻迹岸幘雲峯撫大鵬次韻院長題趙崇徳􅁱撰玉簮集誦君家世倚樓句不佀玉簮留詠深鳳髄獨傳天外寶􅒁蹄端出水中金停盃蘸甲難陪和對鏡搔頭敢擬尋可是因花攪情思相君題品的知音送朱本􅀄住玉隆萬夀宫聲華文采動公卿忽綰烏絛出帝城眯目簿書空汗漫飛空樓閣正峥嶸浮雲變態西山盡徃事􅁅心北斗驚肯作蕉池談笑住瑶壇笙鶴夜深清寄城南友人三入承明願已酬蓬瀛又復接清流碧牋時寫飛花恨寶瑟曽傳細雨愁夢繞故園追過鴈眼穿鄉樹認歸舟荼䕷落盡啼鵑急慙愧羣公得縱游寄史允叟故􅀦王孫佩碧蘭春雲凉月倚朱欄玉簫曲趂鶯聲轉金鼎香随蝶夢殘碧沚波清堪把釣黄塵風急倦彈冠外家文采唯君在笑我氷髭跨曉鞍寄陳文卿䆫對平湖柳對門隔鄰鍾磬送昏昕水煎菊本傳家舊醅壓桃花勸客醺擬向蠻溪誇矍鑠争如月窟飬絪緼通家欲說先賢事兩岸書燈㸃㸃分寄蔣逺静金紫家氈五百年城南喬木儼蒼然久知華屋慙卿長肯向深盃品聖賢虚白夜䆫刋墨譜硬黄氷硯􅀘瓊篇年開六衺未云老桂斧重􅁱月定圓寄鄭景尹太傅東山臥白雲經籯勤拾付諸孫玉堂舊制毫芒見黄闥深㓛百一存玉堂槀唯舊見中興一篇傳位詔金盌宅深春雨暗烏衣巷静夜潮喧佳花竒竹勤題品莫學儒酸老瓦盆寄􅄏元恩禪師恩公遯跡閶門寺欲下繩牀謝不能露滴花光珠五采月􅆂江影塔千層石榴紅帽明如火海艾青氈冷佀氷俛首西山人物論獨聴孤鴈對殘燈寄本中峯天目峯前萬石蹲坐看晴晝白雲昏山河有象百神泣鍾磬無聲兩足尊古澗老猿啼子母荒林野葛斷兒孫空王法蔵誰傳得不展袈娑不出門題郝伯常鴈足詩深羈孤館鬢毛斑猛虎摇䰅障海寰玉樹已歌歸逝水羽書難射隔平山不須羝乳終回漢肯學雞鳴詐度􅀜一寸蠟丸憑鴈寄明年春盡竟生還月放還乙亥四林天子援弓繳窮海纍臣有帛書中統霜落風髙恣所如歸期回首是春􅀄上大使郝經書于真州忠勇軍營新館十五年九月一日放鴈獲者勿殺國信十一年明年奉使還中統十五年乃至元送王景先赴燕南僉事一疏朝天罷柄臣河南井邑萬花新繡衣暫着明銀漢青鎖初辭戀紫宸朝膳平反娱夀母露囷直􅃌活飢民清時經濟湏公等佇見鋒車入覲頻小院四月十二日牡丹始開乃單臺花也余將上開平作詩示瑾暖風吹雨佐花􅄏送我灤陽第四廻内苑賜曽傳側帶側帶小側帶舊賞花宴有大江南畫不數重臺之重臺婢之下者見常談云耳徐熙牡丹無重辨者至崇嗣始有廻黄抱紫傳真訣嫓白抽青陋小才自是妖紅居第一它年折桂莫驚猜詩自慙折桂韓魏公牡丹魏公第三王堯臣第一輸先手羞殺妖紅作扙元􅀄夏即事斜暉庭院樹隂移翠蔓交加静對冝幸有花王能引酒慙無草聖助題詩鴈随雲影還鄉近燕惜春光築壘遲蓴滿東湖甞不得笑看羊酪寫相思夀椿堂臣作為王正嘉樹婆娑十畆勻笑扶靈夀日千廵風廻空􅄜笙竽轉雪壓長柯鐵石新欲從六龍遮赫日佇看五鳯舞長春銖衣拂石方成刧佀笑莊生􅀃未真送湖廣萬戸壮􅀊􅔴騰碧海鯤英姿玉立暎朝暾昔司魚鑰曽通籍今佩麟符蹔偃藩渚對紅蓮便羽扇岸臨朱橘傲清尊郢宫疑在平蕪際為瀹蘭湯些楚魂次韻宋誠夫二首風雨寒簷雞報晨書聲盡嵗徹比鄰食貧不作三千客射䇿端為第一人吴郡壯游追子美楚宫陳迹酹春申少年覧歴真竒絶佀勝宣尼厄在陳蹇驢入局走寅晨落月相随擬結鄰鴻蹟鉅編侔古帝虬髯英貌想天人亥書深恐經三寫乙令何妨著五申明世經綸湏􅀦士它年宣室願前陳髙内宰母漁陽郡夫人李氏表門髙門槐栁緑隂勻鶴髮浮光飣坐新繡出人間金孔雀孕成天上玉麒麟萱花北戸丹心烱竹葉初筵素臉真曽向瑶池侍清讌碧桃傳種六千春夀劉彦良宣慰母夫人九十五英英夀母步蹁蹮疑是瑶臺堕地仙眼見九朝全盛事身經三世有餘年百壷傳賜黄封濕束帛加恩繡段鮮􅃌㸃斑衣聴訓語清忠報國紹家氈送湛師校經回杭寒峯雲聳翠霏凝蹔着青鞋侍帝庭貝葉頻刋塵几浄天花新墜寶臺馨雨翻荷露閑鷗立風攪松濤睡鶴醒絶世樞機真止水從今掩息晝堂扃送雪竇長老校經回里翠鎖松闗疊疊髙坐看明月負金鼇已將禪板傳心印暫下繩床披毳􅂁聖諦無聲機獨露經筌有誤目難逃塵中白髮誰消得歸掩山寮聴雪濤送董教授之淮南主簿授多善績為上都教五月寒深氷滿鬚碧天雲冷竟何如聴駝度磧心彌折随鴈還家計未踈禮殿競傳周簠簋論堂新整魯詩書明年又作淮南客蘆荻叢深看捕魚寄上都子貞伯庸繼學三學士侍臣親切見銀河不用虚無八月槎蟬報早秋歸木未龍拖殘雪度山阿琵琶雲冷相思切蹀躞􅅺深獨立多今嵗同行詩壘壮飛觥擊鉢正横戈逺客三年親友簡絶獨開元鄰僧以書茗相寄廿載神亰汗漫游玉堂深䖏得無愁随龍北上迷三伏送鴈南歸憶九秋親友共嫌疎問信律師屢約勸歸休南湖岀日西湖月應許明年共泛舟進史眀仁殿書事大帝仁㓛徧八寰敢將􅉢筆强􅁱删寶輿花覆簫聲趂黄道松分佩影環仗蔟金吾開雉尾香浮黼坐仰龍顔還家􅈝覺詞臣貴獨恨年深鬢已斑寄開元奎律師􅀟塔亭亭透夕陽芭蕉深䖏碧䆫􅋽江神夜聴光明偈天女朝分觧脫香齋鉢午空烏守樹經臺雲冷鶴歸房平生欲結西方社佀怪淵眀作吏忙伯庸開平書事次韻七首沉沉椶殿内門西曲宴名王舞馬低桂蠧除煩来五嶺氷蠶却暑貢三齊金􅑥醅重凝花露翠釡膏浮透杏泥㝡愛禁城千樹栁歸鴉揀盡不曽棲尚方新製玉東西一曲生香舞䄂低閬苑春濃巾角濕巫山雲冷帽簷齊前行按曲停檀板内直催宣印紫􅅺可是年深慵應詔道人自愛碧山栖身如病鶴倦梳翎徃事猶存舊汗青伏日賜氷来上苑晚風傳竹度疎櫺承恩裁詔心抽繭落筆誅姦眼㧞釘惆悵當今人物論披衣危坐望晨星客子光隂疾箭翎徘徊玉署愧紆青當堦翠影翻紅藥連瑣回紋認緑櫺賦擬卿雲羞軋茁文追班馬黜􅁅釘北門英彦珪璋重朝論詮量比秤星的的新愁漲碧波可堪跋馬上危坡明知風伯秋當路更候天孫夜度河沙磧共傳歌敕勒隂山那復見延陀周􅋝王㑹湏椽筆慙愧陳人柰老何馬足曽窮五色河更將舌本品浮槎新聲促軫傳三疊寶構懸鈴鎮四阿短榻鴈来愁不柰小䆫人去酌毋多白頭慵作東封頌願效諸生賦止戈侍臣底用賦明河西海曽看貫月槎向矣伏蒲移塞外終然加璧耀山阿羨君一鶚孤難並愧我􅀟鳧數佀多舊讀韜鈐工七縱裹瘡從此願投戈送梅叔章官東流簿江水東流八百里縣市南遷五十家寒蘆捲風散晴雪野燐照川成暮霞眼看平楚堪舉酒睡足髙舂方打衙都官之孫詩有種玉板日給飛龍蛇次韻景尹觀菊輪郭團團漢五銖身䡖疑食碧雲􅃾翠㽔建纛煙凝紫金粟搔頭露迸珠初日正宜催玉立清霜那使作銀鋪城南兄弟空相憶插盡黄花更插茰託根不復辨殊方朶朶參差列鴈行暎日巧心端􅀘衮迎霜生靣佀含香飛英獨佩疑湘浦笑靨􅀄鈿陋夀陽惆悵千林正寥落故将清冷闘秋光送杜輝卿還蜀浣花溪上水􅉿􅉿化治􅀎為五色春竒錦鶯穿金婀娜粉箋花印玉精神百年文物毛錐舊萬里車書馬足新仁夀堂前乾鵲喜綵衣歌舞動比鄰送石上人還江西圓帽方􅂁入帝都秋風惘惘意何如雪飛北口蘆花絮鴈落南空貝葉書聞見逈忘􅀟艋行蔵無住一籧篨南泉安衆千五百從此跏趺滅太虚送李巖夫四川譯史玉雪精神暎彩霞清秋馳坂忽還家心聲珠貫通三象目力機深洞五豝青簡世傳端合繼黒頭早貴實堪誇子雲猶有江邉宅好續方言振國華紀生書經罷歸還里烏帽椶鞋四十程壮懷鵬翼决南溟定須金匱題銀管不羨鴻都寫石經落葉行堦疑急霰流螢穿樹佀疎星白頭病客思歸切欲别無言酒易醒示皇甫生矻矻窮年皇甫生眼瞳如漆暎書明神清古鑑金莖露佩雜寒英玉井璜晹谷久知螢爝陋丹山深愛鳯雛清玉堂老叟端歸去龍榜蜚聲遲子成再送紀生荆國書臺有紀生眼穿􅁓背倍分眀聲音雜比昭華琯跬步周旋夏后璜賦律意深慙篆刻詞華情近忌䡖清老来贈語多􅍝誤嵗晚相期玉汝成鄉友南歸客舍凄然再次韻􅀟槳廻波没復生人随㠶影去邉明愁雲亂疊敷重席寒月初弦掛半璜漁泊汶橋煙樹瞑賈團淮浦海潮清方牀獨坐愁無着萬􅄜笙竽奏九成睡覺東西書燈猶明喜勉元達兼示瑾子兩家聞見參臺閣諸老論思聳廟堂莫畏大名辭繼紹願超凢子脫輕􅀭文章正始師先漢格律黄初謝晚唐師友淵源端有緒老夫推枕起論量省中議事回元達有詩次韻烏帽黄塵久帝城紫薇深䖏得陪行擬將直筆酬延閣欲抱遺經進邇英老去病多傳桂酒秋来情重憶蓴羮蕭蕭易水聲悲壯不盡􅁭期白髪生馬伯庸以詩餽兔次韻閉門滕六散銀星對坐罘罳白玉屏琴匣冷光棲緑綺壁騰寒􅆋起青萍凍雲縹緲迷圓嶠小酌無何入大庭知我年来雙眼眊特分眀視了殘經十一月十四日駕至亰城楊仲禮有詩次韻金輿清蹕發龍城乾雪坡陀甬道晴師起晉陽戈盡倒令傳代邸轡徐行鸞皇合奏雲光遏龍虎交章􅍼色眀欲認雞翹新法從駝車深䖏聽鈴聲題馬氏先塋記後崇寧傳至今曺子貞求作自衣冠異代劫􅁅平眼見佳城歴變更曲水護田成委佩纎峯當戸佀疑兵玉蠶零落威王塚石馬縱横晁氏塋盛徳獨傳三百載好將遺事述新銘甲子立春泰定元年新甲子天門上聖啓瑶圖日融凍樹青煙蔟土坼􅵊􅂼碧雪鋪五鳳彩樓催羯皷􅀟龍綘闕勘魚符侍臣廿載題春帖從此歸休拾澗蒲瑾次韻復成為隠居計亰塵二紀榻􅕋篨近喜家兒報宅圖移石近堂雲亂擁栽梅當徑蘚重鋪留春定合箋花譜品水應湏置竹符皛皛南山看積雪青青古澗玩新蒲病中玩易復次韻丙寅老人五十九猶是先天第二圖桃竹杖䡖藤杖換蘆花絮冷栁花鋪當陽山立随羲御後夜尸居奪晉符巳識羲皇真太極不須黄獨與蒼蒲三次韻濟勝閑身倩給扶家林應許畫為圖空巖有象飛泉舞古徑無蹤落葉鋪壮嵗思僊尋火記暮年制氣習隂符松花一匕能消得猶憶南州笋及蒲武氏母八十玄髮離離聳黒鵶桑田滄海事如麻魚穿氷腹冝供饌泉躍江心可煑茶烏繞楔門爭玉樹鸞􅄏錦誥印金花閑居欲效潘郎賦凖擬家園製小車安山曉泊兩䄂飛仙舞玉龍曉来朝嶽日華東門當楊栁灣灣碧水貼芙蕖岸岸紅隔艇茶香知楚客連􅊻魚熟緫吴儂白頭已忘干戈事不用乗軒問土風發御河一棹黄流去復回飛沙積岸雪皚皚梨花亂逐沙鷗起燕子深随野馬来晚嵗宦情初岸幘暮雲鄉思獨停盃荼䕷滿架留春住知我将歸為緩開次韻砥平石金門吏隱愧相如􅀊月逡廵翰墨踈拄笏有時看白鴈濯纓無復戀金魚倦游築室成真隱作意還山了舊書更與老禪深結社平生黒業緫消除次韻謝定水禪板蒲團振祖風故將妙語起衰翁青氈舊學慙多缺玉佩清朝愧罔㓛直以簡編窺徃聖敢將翰墨擬宗工壮年永感辭庭訓晚嵗何由繼五公次韻昌國宗聖上人海上秋潮候月生島中瑶草不知名毎思大士超禪觀獨恨秦王苦望瀛龍吐戒珠殘照影鴈横􅆊字故鄉情妙年碧眼才翻錦為念衰翁强入城贈徐秀才還里西風擁騎出前郊紅葉玲瓏透逺􅉾家近不湏傳鴈帛縣閑曽是用牛刀蜚聲展綵春眠栁文思裁珠夜泣鮫師友淵源吾豈敢㑹看翡翠聳林梢送劉明叟治鹽事還省海上銀沙百鍊成年年飛騎走縱横人傳一馬二童至春在十洲三島生烏帽多情簮菊蘂瑶琴有意送潮聲經綸滿腹湏時用早上嚢封致太平次韻荅西山道逢原招提逺在岧嶤上曽有耆龐説法来㶁㶁玉泉澄戒鉢團團翠柏護經臺平疇隔水横棊局逺嶂飛空擲酒盃聞道幽人經論罷支頤掩息獨徘徊送章仲和教授之官池陽亭亭秋浦玉芙蓉無限樓臺落照中定見揮毫題妙句更湏拄笏繼髙風當年故壘遺金鏃此日清溪􅃞碧筩人世機心何日了持觴為酹九華公梅隱齋萬蘂踈明鐵石堅肯同餘卉闘芳妍青雲覆幕氷承柱白玉為堂雪作氈橘叟不知身外事壷公唯識洞中天何人欲問調羮法一榻蒙頭謝醉眠次韻鄭景尹重九四首年年京􅀦度重陽禁路風髙徹骨凉坐覺衣寛蔵宿土行疑靴冷怯新霜紫茰曽憶童時佩黄菊湏看嵗晚香惆悵東山在何許挑燈無寐坐方牀無復金狨與覆韀屢看秋月缺還圓風塵自覺真衰矣勲業深思盍舍􅏧烏帽塵荒憐逺客白衣酒熟慰癯仙深慙涉世脂韋久强項何能效董宣還家兩嵗見重陽過鴈横空拂曉􅋽尚憶傾心朝午日欲將勁節拒朝霜禽魚有樂随天性蜂蝶無知戀晚香從此林間端見一不妨枕易睡匡牀久矣懸車徹坐韀天機渾沌黜方圓披沙經窟知非矣秉燭書林尚勉􅏧愧我詞華端近俗愛君詩律已通僊門前種菊髙如許亦欲紛披五采宣齋前海棠秋日着數花瓘首賦詩次韻四山紅葉報秋殘駐目家林認未端螢㸃流星驚乍曉鳳銜初日怯輕寒鮮鮮敏手攅新錦烱烱芳心吐故丹西帝已能回藻景為言莫作杏花看金祇當御衆芳殘忽見竒葩表樹端霞臉已􅂸千日醉絳唇自怯五更寒燈籠錦就霞衣帔箭鏃砂成寶鼎丹致此凄清端慰藉停盃擬作百回看次韻吴門聲上人翠樾經院多髙人翠樾方丈景徳寺有碧䆫㸃翰五采新天機不受梁燕語逸興直與江鷗親羨君觧衣浣流水愧我束帶陪禁宸屈􅃌當今人物論從此有約同垂綸至人天隠樂有餘良玉不願為雕璵昻昻盤石大坐相杳杳歸鴈旁行書白蓮觧結碧雲座緑蕉不羨青葱􅅂道人繙經悟空假始信塵世非真如憶􅀟溪清溪明䖏水交流萬井鱗鱗冠盖稠杯凝玉光明月入幕遮翠影落花留雲生古洞千山雨風送層樓萬壑秋麗澤祠前家佳絶藕花零亂勝滄洲寄張希孟内翰君方習隠食翠柏我亦採真歌白蘋千嶂遶樓堪岸幘百泉當戸􅁕垂綸蓴鱸水濶滄洲晚稻􅈉田肥澤􅀦春日夕相思看過鴈客来無惜寄書頻清容居士集卷第十二
