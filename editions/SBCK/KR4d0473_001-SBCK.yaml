  text: 清容居士集卷第一
  hash: sha256:64b8c60b34de906b7925912473606947337d70ab781c7f7e5988b7f54a572fbb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_001-1a}
body:
  text: 賦導游賦陳郡袁桷家于甬之隅􅁕不踰閾而四方交游徃復之義亦􅀎舉其槩聞吳興子昂趙子清名雅言為作導游賦道予所蘊亦以見夫思其人而不可見之意詞曰嘗悲乎好游之士閱終歲而莫聞非秉志而媚私亦飾行以矯群方其命車於王良假􅆖於造父過屠繒之沛弔弦歌之魯許身結志慷慨傴僂抗銅盤以矢辭握幽蘭而結賦炫華堂之冰雪眇修途之霜露盖將脩斷金之利雖䦧墻而莫我敢侮息肩于門晞髪于廬不一歳月迨見夫蠅聲而歌倚楹而吁雖千里之異殊何老壯之卒逾也世有索居肥遯􅜘門塞竇尊委俚之聞友汗青之朽是猶談智於尺寸測日於戸牖猛虎嚵嚼幽猱悲啾獨行無儔謹操其輈粲彼一士與時偕蔵具大塊之清淑服忠厚以自昌余將徃而未得倚呉山以相望振衣中庭萬籟􅄫􅀇頎形廣顙㫬兮翩翩墜余以言曰懐辛之􅎛人􅂉議其妖充梁之木人􅂉惡其獨夫既自以為直而亦豈不以為曲阮生自持幾於目語削木已漫假手于祖匪達人之曠羇終察察乎㢘隅余囅然而笑喟然而思拂􅀛以占莫測其疑抑搔首而欷􅒣故髣髴以致期遂伸之以辭回城之璧佩以容兮環龍之劒喜其鋒兮伊若人兮物不可同兮我欲從兮樂有終兮江山兮複長方舟兮可航辭未竟童子擁篲而前曰豈所謂千載之人耶吾當從子而西矣雲林賦若知雲乎昭昭然服光以廣微隆然廓然又佀夫五色萬物而沉幾来弗以趾去弗以馳其始也􅋥辟夾輔輪輪囷囷孰合其處所其終也寸芒以興導轟轟啟鈴鈴汩沮洳襄丘陵若慕而佇若泣而赴愀兮哀不知所訴蜿蟬眇綿含英吐鮮逌傾盖而忘返粲接席以爭先誠果樂乎莫與之宣形成乎無形名生於有名囿于家林允為儀刑奉蓍占之曰居髙而卑佩矩帶䂓升于木無徃不復不泄不辱言歸其谷伊南維湖將以為居齊三日祝而蒞諸薈兮中峰式瞻其端為章為祥為輪為􅃣風以潤之雨以需之挟隂而􅌵乘陽而舒朝飛夕躋莫窮其栖有翼者鵠遵于其涯曰將有行自東徂西綏而迎之維墉之崇施而流之維泉之通以沐以容是謂雲林之宫􅀇雲石賦泗流迴淵禹朝歩兮秉隂發竒靈鼇負兮玉質墨章浮帝都兮㢘辨以清恊磬濩兮堅剛洞虗積元感兮磅礴太素屹空嵌兮靜居泊如日儀以湛兮虗一闡圖握九讚兮八方宣明二儀竅兮抱形介貞合窈眇兮絪絪縕縕道之奥兮肇稱􅀇雲吾將以觀衆妙兮淳賦粤若䆳古仁風熙熙擊壤灌陰以佚以嬉巷無夭瘥物無癘疵祥麟應囿靈􅀛負池樂以導和禮以黜衺奫奫其春渾渾其天守冲若虗不夸不鐫佩矩帶規養於深淵擬諸樸兮文理具宣擬諸象兮充然混完見不以迹視不以形斟酌大和肧胎粹精居之莫疑神維壹清若有若亡訖莫可名二儀絪縕肇分化醇人行乎中孰全其真注兹玄酒淡兮在尊御史氏尹敏學潛􅎇服習典謨葆􅍏靈根齋居靜儀人莫可聞攷諸庖犠其名曰淳玉􅀛杖賦有璞於此純綸氤氳瑶光之精為靈為文謹櫝以蔵不泄孔溫穹隆中乾夷靜合坤淵淵其容深深其神爰有善木含章揚芬飾端以儀徃来無垠鬱峩壽宫有粲者雲維季翼翼聿懐彼濆跪而祝諸以奉番君曰履道坦而元吉者歟任重而不希其力者歟視下而無危嬉戲如児審時而行得艮以防抑心自强厎夫康莊其形不孤其智若圓化而神之曷知其遷以相以持是謂期頤桐柏觀賦孫興公天台賦運意髙簡忘象以求斯得之凝和盧君居是山以桐柏觀圖授余曰子為我縯繹其景不揆瓦石援筆為之賦曰厚坤載徳台山效靈蜿蜒扶輿天孫之精僊書易之以桐柏敞神界為金庭轇轕三光磅礴太空睇暘谷之倒景卒莫􅀎擬諸形容也睠彼華頂群山唘蹤倡九牧以執玉巍􅃣仰其顒顒香林玉霄夾􅆖以從華林不彫卧龍嵸巃玉泉御右法蓮殿戎東峙翠微西蹲紫霄巧面勢以䂓輔玄扃沉沉乎泬􅋁維妙有之􅎇館匪攀援之可求除三彭之内蕩守中戒以默􅁱影息於鄧林機忘於海鷗上池飲之以洞視金膏服之而冥搜不然者良不􅀎以乆留也粤昔子晉韜精帝京弄參差於緱山摶扶揺以遐臨瓊䑓儼其􅀛負􅀟闕屹乎龍蹲正右弼以贊化千齡髣乎氤氳故兹山也四面削成中心如掌真風合於冥廓梵炁通乎肹蠁三井之泉千尺之潭臯羽警其瀼露髯羊匿於陰嵐飛梁凝冰側足涉褰翠藤流霜觸纓捫縁梭溪交流以織文忽螮蝀之鉤連望飛瀑之懸絶日五色而成妍夫樂與餌過客所止夸誕逐魂踐形者耻長生之藥眇茫於神山執期之􅃸詼譎於五利却衰䟽頑簡易理得其亦有所益乎菌蠢春秀篔簹冬萌五葉之松三脊之香丹光騰於金鼎冰泉徹於銅罌服食之而不墜身輕忽焉以復丁企列僊之遺踪葛翁䇿名於太極斗晶熒於樞紐金光雜流於瑶席納雷谷之砰磕窮幽淵之罔象丹鳯昔焉以来儀凡羽厥今以避讓諒守貞以制氣匪狡獪以增誑法不孤立道不虗行繼之者白雲先生受素書於軒轅襲帝胄於典午憺寡言而無營思坐忘以遐舉承唐皇之明問敷清淨之舊章署漆書于寶幢迎黄雲於玉堂􅍏後憲章希夷範圍靈寳誦蘂珠之玄文過期頤以終考若是者誠何異於蓬島或有言曰樓臺榮觀方士侈崇夷考是山不綺而豐不幽而通廓兮其有容閟兮其訖逢味興公之抉竒訊擇木之寫真若増其嶔崟盡其窈深身不羽而凌遡俄曾城以瑤林廼若丹霞伏光鐵柯舒英集衆妙以凝睇髣三真之傳經擬金剛於鐵磨警黑業於鴻鐘何錢李之二王莫􅀎悟其祿終猿抱子以望月虎伏威而諷風靈璈清以集鸞哀弦急而驚鴻爰自有而即無眇壹氣之鴻濛悼南國之蒸歊髣天都之肅冽彼夏蟲與火鼠徒自煎以内熱申之以辭曰帝子下兮雲中質通明兮粹冲覽炎洲兮垢紛節容與兮兹峰蓬瀛杳兮無極浪滔天兮不可以屐境荒滅兮妄益曰此㽞兮吾將以内息神為凥兮氣為輿朝紫霞兮暮清都黜視聽兮道靡渝歴千劫兮復故初雲凝素兮中壇鈴流露兮日暾三灾屏兮嘉祉繁語夫世人兮歸休乎靜觀椿堂賦年道士作為宜春彭有昔嘗疑夫漆園之叟學幻而逃虗詢蟲魚之疏考風土之書莫之敢圖余游上亰有客北窮夫金山西􅊗夫賀蘭南踰雕題東超三韓囅然而言芒芒禹跡子所履者誠然乎冬裘夏葛寒暑之運環也今也日臨中街霜飛冰霾毳集於踵貂挟於懐戴斗接淅承露凝桮子安視而靡猜駭聞忽見知奚窮乎齊諧吾先枚夫九州者而言之屢熟之稻南州是專十丈之蓮華峰所傳栝化石以錫貢樟生庭而為州梅梁分以鎮妖牂牁肇乎維舟杞犬吠而質變葠人形以劑投華平雒常瑞於皇圖蓂莢屈軼盛於堯世木沉産子以成國樹古眩精而為魅松分秦王之封柏擅蜀相之祠若是則復何疑焉在昔大帝窮源崑崙見北溟之鵬視之若雪即之如雲得其遺羽丈尋不􅀎以論是齊物者非寓言也耶維老彭之遺裔握六氣以自馴肇兹齋居其名為椿二儀絪縕周流無垠則以自儀道合至淳吸兮若鞴旋兮若輪肅兮似秋熙兮如春行乎六合而不躓則所謂八千者吾猶以為歳年之稊米也客揖而去遂為之賦仁壽堂賦合江老人杜年八十有二其鄉人尊之以仁壽囙名其堂子輝卿今為蜀省掾来亰師求賦賦曰合江老人生於三卯歳之中秀眉疎明鮐背隠隆家事􅃙斷遺聞㫪容口欲宣而彌哽情屢發而莫逢㑹稽生揖而進曰生居東南襲䡖飫甘耳不属於鉦鼓目不接於戈錟合江之事相傳於游談願削牘書槧俾鴻筆以有參老人改容正襟徃佀可尋夢若初覺病猶在身方其誓師斗城滅親割情盟重於白馬命輕於浮塵黄風颺沙千戍屏營擁若波湧排若筭經危堞隳而礮􅈭闟㦸護而矢承躄者瞽者各有攸職熏窒旁穴旦不遑夕壞館門毁甃石樹列對峙填負旁阸卓飛泉於雲根起清流之千尺目不能承睫氣不得納息黑祲障空燐煙蔽江横厲排蕩抶擊㫪撞擬效順思􅄬降提奬之主怒莫敢當忽風歛而川止活噞喁於鼎湯噫嘻吁此其􅃈譾者耳華陽之徃躅肇於文翁悉於太冲纖侈日滋繇是鑠景福盪醇風鬼嘯髙居神泣巨峰棧閣如砥萬騎突馳火連摩圍氛翳峨眉築京觀以專􅓍甚槀街之陳尸順舟而下者十不得一緣澗􅊗塹視京垓之豪釐﨑嶇古渝前彭後余保衣􅃣之弱緒猶興文以舒徐逮夫六合㑹同彈丸震驚彂渙號以澡雪緝政俗以治平則夫兩州之土民無遺鏃之害歌帝徳以底寜㑹稽生仰而愀俯而笑在易之象復存於碩果物極者斯通盛過者斯禍維今老人熙熙其天休休其心事至不忮智蔵惟深式是表儀化而熖􅁋國有耄叟鄉有善人仁壽錫名爰則其淳感古樂今兹其為擊壤之堯民樂水圖賦東坡先生脫逺游之履衣紫絲之衣與黄􅃣師跪坐息機臨清泠之淵憇巨樾之陰意消言忘其得在心飛泉琮琤寒源杳深悲塵寰之隘險抱竒璞而莫陳將以善夫濟世之極樂至理以自新維兹水之無倪非智者莫能以鑒彼河伯之好夸終望洋而浩嘆翳西海之沈羽竟其說以恠誕小大不同其病則通駭於所聞者忽所見誠哀乎舉世之盲聾余嘗披神禹之地圖考先生之轍迹而誦之方其發軔于瞿塘千里一瀉鑒燕安之酖媒悟孤孽之非禍雖盛氣之飄忽已􅁕窮物理之化迨其中年倦趨分符東上慨河流之奔駛城不没者三板先生胼胝以先激而返之有以遏其性之狂悍伊文登之貝宫空百幻以自獻實精誠之冥通異燃犀之獲譴至於群妖肆憎百懾相乗先生怡然而行試正命於巨浸儼安流之無驚耿耿明夜乘桴南歸海若息波馮夷效竒混六鑿於一噫信天地之不私匪深於水者其能若斯耶玩王孫之游藝弄五采於素絲聴之而無聲即之而若遺若然者欲以求先生之所樂無異畫餅之充飢餘間齋賦曷不觀夫農父之治田春耕夏耘晝作夜緝望嵗常有思憫苗若不及候其陰晴謹其涼熱食不滿嗛目不承睫穡事告成以祀以享入此室處曰余將有養休其四肢里閭熙熙甕牖迎陽兹其為一歳之隙得以自怡者與古之志士範圍天地之初㝠搜密籌心如淵珠㩀㑹以集要積神以合虗冬爐夏葛謝而弗居逮其蓄極以通若燭計􅀛卜物莫􅀎沮燕居申申欲不踰矩倚門而歌聲裂金石恢乎其有容順化而有得盖其勤者若此則其終也迺以豫佚惟昔賢之肥遯屹乎其頽波青林扶疎擢兹瓊柯味道以觀澹乎不頗閱世推移飲兹無何養其粹精不􅈭不阿有客仰止摭其嘉名以處以息慨然而言曰悲濁垢之駢臻御吾輪兮焉窮愍逐日以道死異惜陰之度功􅍏今金馬公車履舄接踵承色以求為疲為冗退食以休濯其靈根蔵真養恬疏清滌袢庸式庸佀著于門顔維四民之有制實士農之居先惰于初者躓于後弊于智者罹于艱歸休乎君援琴而歌曰群動兮夜息貿貿兮吾徒曷猖恣不能以自􅃴書兮在􅍥斝兮在席復吾初兮以無忒息齋賦慨太素之日凋服仁義者亦幾乎外馳百幻眩晃衆愛糾縻側身於積薪之上試命於累邜之危髪盡化而齒將終竟不得要領以自持端木之智工扵言結駟之徳色索其中誠餒然也史遷之足老扵行悲憤之書不能以全其生也東門之悔華亭之悲是猶碎轂而大輻掘泉而止渇何其遲也古之至人止扵其􅀁不止休扵其􅀁不休兢兢惕惕不得而名之强名曰息夫息形者神清息事者愚絶息心者心愈馳息名者名愈徹荘周之息影為荒唐陶潜之息交為慨慷是皆未得其當若然者其必有自息之方夫知古而不知今謂之陸沉世故之岐多人事之機深生乎下都兮又安能超舉以絶塵維李侯之靜好藹鄒魯之淳風不求異乎人黙息以厎于鴻濛振纓而趨簿領如棼上下雜糅否臧混淪一息而求之何異觧牛之芒刃眇目於毫分也退居申申圖書領賓不喜不慍􅄫然含􅎇吾有以知其息之外陳者矣夫天地之理動靜濟焉偏一而用則為五行之沴人身之氣如車軸窒而不流則為疾癘為末廢若侯者其何以為息之體而余以為外陳者豈侯之意歟他年成功而歸晞髪於彭咸洗耳於箕頴味乾健之􅈲以極君子之理吾不知侯之所謂息者其信然耶其寓言耶凝雲石賦孟作為張希文登之宫積濤成雪天風蕩摩海氣幻滅嶔崟蜿蜒堅若金鐵大者成巒小者成穴蜂房群綴蟻曲百結爰有張子抉竒發􅎇藉以文錦炷以古熏陋博山之侈靡髣爐峰之氤氳湛然塵消號為凝雲有客哆而笑曰南山朝隮奮搏無垠太素為母五嶽為賓合虗成形積潤以神今子友一拳於几席雲何自而凝哉張子倚梧而言曰窘尋丈者不能以喻大語荒忽者􅃴􅁕以資惟人惟至靈品物是賴明而通之呼吸萬籟决為奔騰興為霮䨴其来無趾其去莫閡唯古至人韞玉以匱蔵明于幽養神于獨内澄外觀㗳若槁木靜以自儀無䘮無辱念此石友其徳不凟燕居相忘庸以熏沐則夫所謂凝雲者不待於外而自足也客喜而悟遂為之賦紅梅賦閑閑羽仙朝歸絳都冰淳雪峙湛焉澄居􅃸寒圭之㣲影察衆芳之榮枯草蔵荄而永閟木脫葉以無徒彼隂陽之眇密曷能返乎玄虗於是天迴景温機抉候促吉雲豐融美虹纚属睠炎洲之嘉植淟乎其忍此垢觸也儼蘂珠之揚靈貯初服於太素沐九芒之粹精蟠翠氣以内護頳容耿以自持兮抱冲密而莫吐衣赤霜之羽袍曵文錦之靈佩棄明月之寒璫綴飛瓊以為琲匪徇色以自􅑞表昭質之莫昧凜世坌之如焚赩微慍以郤背惟深根固蔕之不可恃兮􅀅求化以養晦繄煒燁之滑稽懼夫惡朱者之見毁鵠日浴以鷇離鶴舞丹而希壽念形色之莫踐徒變幻以􅅭售萬籟凝寂穆然長思絢此的皪申之以辭辭曰貎充心明道之􅃾兮葆光罙貞慎徳樞兮渥丹自持惟受初兮不爍不騰莫可渝兮時至神完吾其敷兮吾其敷兮物莫與俱兮九華䑓賦混元之峰鬱為仙閭霏青駭紅嶔崟相扶下垂清溪百流是趨昔有羽士恍兮承跗縞衣玄裳其化莫追爰有堯年之叟植杖戒鉏顧瞻童土式崇墳壚黜幽導竒以薙以除層臺演觀積成為郛拾級以升家林滿圖迺擢孤芳絜泉廣疏錫名九華葆兹清􅃾有客蒞止披情徐吁曰登髙能賦大夫之職也為我賦諸客曰皦皦廪秋天風奏竽哀鴻赴空寒蟬抱梧脫者如掃縮者如枯落妍歛英還形太虗存莫可禦去莫可居相彼九華孰為有渝含章金衡承元坤輿弗媚弗私苦心秉愉迴黄抱素包寒紛敷飛霜溢露言沾其濡獨立養完孰云彼汙世服恔靚飾脂效姝嗜脭豢醇溲甘芼茰維爾茹口哆焉如荼耿持空榛曷知我蕪叟曰好不可一鴟鴉蝍蛆鈎以為直石以為琚變奪五采睢睢盱盱已􅂉自售􅃴増詆誣寄懷於言觴至不餘九九默操嗒然􅕋廬我生之辰天清景舒庸采以脩庶其遂初山空無塵白雲在裾歸與歸與吾以子為徒與墨竹賦屹書林之􅃉清襲空翠以膏沐察群芳之交妍糗紫芝而不肉化蒼煙於寸頴皦森束其寒玉有客叩門指而言曰夭夭申申吾不知其親悃悃欵欵吾不知其怨懼獨立之絜矜徒三刖以自獻爰有童子擁篲以前曰東南之美以植則繁大盡斵採小為烹煎曷扶其清孰庥其生零西摧東山崩谷鳴􅂑億及秭莫知我名維我先生念兹磅礴探玄窟之太和布靈根於眇邈取方諸於承露和不死之至藥寄遺跡於須􅁷避玄㝠之饕虐故其凌風出塵廓兮如神承春飲鮮􅀙兮如雲疾掃却顧猶歐冶之鑄郢人之斤也且客獨不觀夫鑑之與形媸妍􅁱纎各窮其精惟靜者能以燭至動而所謂詼譎變幻廼􅁕以覈萬物之情望南山之崔嵬目九日而不瞬匪好夸以昡竒良以觧夫謏聞者之愠語未具先生振衣坐忘與客相顧卷縑以酬一笑而去素軒賦太原白無咎徴名字于易復以素名軒實維其祥乞賦陳郡􅀽桷賦曰維太初之混􅃼兮眇昭質其孰分二儀迭其交媾􅀆肇清濁而成文翕九垓其同風兮佩鉤矩以播芬􅊬焉黄唐之仁聲兮極黼黻以成憲忠與質其相環兮迄蒼􅁎而莫變亘終古之同軌􅀆成後来者之過眩徴載籍於竹簡兮淳風鬱然以未墜憫太和之淪胥兮希絜已以自致三熏沐而揚靈兮儼前聖之遺㫖悟宣尼之自筮兮繇告之以不樂曰丹漆不文兮白玉不琢質不可以受飾兮道不可以雜敦厚靜止兮弗居其華惟無色而自色兮物莫能與之加爰錫名以表厲兮雖顛越其靡它凜世垢之淟涊兮蘄旁證以兾直聃演言以清淨兮戒目盲於五色墨諄諄以兼愛兮悲棼如其何益冕朱裏而外玄兮衮襲裘而不裼淡玄酒之無和兮輅盡誠而越席顔執仁以不違兮炯虗室之内煥商舉隅而起予兮懼絜矜夫倩昐噫童子之微言兮警曾氏之華睆捨沐浴以孤泣兮兆有知夫孝子乗結駟以夸容兮終内熱而殞愧車美澤而可鑑兮曷栖栖夫靡止彼馬師之食藝兮亦能遺􅀇黄而洞理羌若人之好脩兮妬芳澤之日恣將乗飛㢘以上征兮揚古帝之正則悃愊欵欵而彌貞兮固丹府之介特書盤盂以參倚兮慮夫􅀛之不食揭嘉名于户冊兮振白首以莫忒申以辭曰茫茫重玄物之先兮剛柔相摩文以宣兮反初復真徳廼全兮履素莫渝吾將以無愆兮冬􅌪賦濟南潘仲徳家商河治其田廬塊土纍石以處左經右子刻意厲行斟度古昔將力避世不復近歳終順陰陽之理慎居于中而名曰冬􅌪未幾聞于朝為太史属太史職清簡仲徳獨憂之復以昔日命名者揭以自警余聞異之為之賦曰噫嘻夫丗之善養名者豈惟冬與朝而興夕而趨執轡在手承塵滿裾僕夫告痡寒冰厲􅂡剽飛英於窶數巧膏沐而睢盱懼分忽之不前戒良哀以先驅矜清揚之婉娩猶春温而于于何自而冬乎大盜之智不以胠篋巧賈之利不以操割蓋將足不超閾而踵接其席目不承色而議推其徳美容峩峩雅言迤迤爰處爰居載笑載歌閟無傳之靚􅃉又何為乎冬􅌪也哉潘子曰不然冬為天終萬物盖蔵陽微如芒外枯内傷甲者若縮伏者若亡裂者為阱凝者為防歘吸以吹浩溔莫當口含飛霜睫承流漿三光青熒五嶽仆僵故其蟄處也隆然以􅀛深息而卑卑其徐行也蹩然㩀危俛僂而施施疏房上宫連氛累靄嶔崟阻深束緼以載鑿坏者遁煬竈者遜當此之時食不飽菽藿衣不襲裘鞹悻悻然角進而憑陵將弗折而自缺且夫蔵明養陽必謹其獨大智若辱大容若谷紛載籍之藴祕糅衆說之桎梏折精華以彌縫豐蔀屋之光燭吾非以嵁岩為居鹿豕為娛友幽􅞔而棄斯徒也念居蠖之未伸凜自縮而不惴謹清寜以冲嗇御六氣之冦沴將以游乎萬物之初順四時而成歲也榕軒賦南粤之區温風戞摩積炎吹雲流金為波少負老息盼兹庭柯爰有弱木攀縁嘉生連理纚結附枝膏凝䕃旋萬牛廣容専城千柱承宇百尋傲空群焉莫爭希賢同風長與少殊如昂如顒溜微生於一髪寄豐壤而敷茸詎擁腫以丐全眇頽波之容容􅍏類滋夥其名曰榕東魯先生見而笑之曰目無常形嫫母以為能耳無常聲折楊以為清美醜相乗孰完其生眷兹連蜷棄諸同辭薪者鄙之斵者訾之輪者絶之器者揮之夫好惡不齊莫與之争吾何行焉舉觴以噫噫極而歌歌曰木之詵詵匪委佗兮木之萋萋匪婆娑兮巧為彼矢名為彼戈徂徕維松新甫維柏柰何柰何客有踵門而言曰議物産者必以良舎􅀁用而求無用􅀅安􅀁嚮先生曰多謀者神泣多才者形傷維彼阻窮百虐􅇱嘗蔚然以修充然以光四海立賢勿云其方窮髮之北殆􅀅駭􅀆榕􅀆榕􅀆吾以為楷􅀆復庵賦謙父作為恒山李􅀭子之衝千流交趨蔽帆雲凝炙轂雷􅌵塵奔瓦聮擁關蹋衢土衍隰勻深耒廣畬百技眩衺千賈獻姝爰有倦游之叟卜􅀛食吉構兹廜㢝不斵不甓茹玉芝而三􅍋膏玄髪以若漆與客瞰空觴而言曰今夫所謂歸老者其名鮮鮮其行暖暖脱機於韓盧之吻息影于菟裘之巔造者絶屐奉者謝饋嘗仰屋以嘆感極以悸悸極而悔黯崦嵫之􅉴離揚滄浪而莫􅬭若是者吾奚以為歸世有習静之士逃聲於無形避害於有名山鬼獨嘯悲猿凌兢掩耳疾匿脫焉如驚是焉知天地之性哉磅礴之理不能以獨運􅃤者舒者疾者徐者􅁕以窮萬物之真維昔此􅀖犬牙東南前江右山朝煙夕嵐憑髙而望則去者如箭淨者如練杳者如線效者如獻日出而作連岡燒空交蘆舞風土臺崔嵬野田豐茸昔之荒煙􅕃草恍不知其處所寄遺蹤於白鳥問秋風於賓鴻夫觀萬不同恒維其機今吾乞身於未老寄此土而食於斯也素書滿牀􅈲酒在巵鄰熙社恬子順孫祗不脂不韋不􅈭不靡視昔歸全而索隠者相去幾希靜者動之根息于外者其内若焚川流徂東龍返為雲日沈于淵朝升為暾其本元元其生芸芸簡兮廬乎靚無渝乎又何懐乎土乎擬剡亭賦季作為吴成英英維祥織流成章􅀟峯嶔崟紫芝熒煌峙立澄冰玄言飛霜爰有化鶴之叟迅翮珎館舒風盤霄歸而歌曰兹山兮沃膏陽霏兮夕濤吾還兮不崇朝將何為乎逍遥昔之命駕者興極而意已盡卧游膏肓者不千里而接軫去若隙駛留若柯寄情不及親豈我軰之謂耶彼櫟輪囷爰衍爰溉彼桂扶踈以嗣以賚養苖者濯其嘉牧羊者去其害植楹􅀆鼇負布甍􅀆鱗雅我季􅀆圉圉孫並曾􅀆陳廡蹇獨余􅀆不留目凝睇􅀆屢顧芳菲菲􅀆在林誓將築􅀆奉所欽卜􅀛􅀆于庭􅓪言􅀆揚靈彼簮􅀆奚投返真兮思冥學道者天完逸老者齡延順以養榮息以固形刻意枯槁者吾猶謂之善盜而我之髣象豈果有所羡而自表者耶道本於無名擬之而變成鉤深者泉如珠在淵遇風為漪激流為川彼剡伊何源逺不遷則而企之於亘斯年餘軒賦安作為程士世有好名之士佩玉長裾鳴騶導衢候者接踵對者奉䛕日三接而色喜坂九折而懐吁欠伸委蛇顧而子孫且言曰夷考昔人吾何􅀎擬㦲榱楹闘空旌旄樹霄部曲中街膏壤近郊悵􅀆屏營慨􅀆鬱陶若是者何􅅝􅅝也爰有靜士卑然素儒載凥為輿游物之初粟不滿缶屢空泊如爰笑爰處擬諸華􅃾昔東方生見􅃧于侏儒翫世味道忘身之􅕋廬維程子客于江之南幾四十年幻者如飄風逝者如回淵禍生於公餗罪成於細旃撫心以思孰省其愆徃游于其軒太古為春無懐為年探圖宓戲受厯軒轅在易大畜剛止以育徳日新而自足者也昔之至人道充以為冨聲出金石柳生其肘席不蔽坐飯不充糗今子之居酒時滿斚蔬時滿把視昔之窶者溢且夥矣程子憮然曰吾誠夸矣隠居圖賦陳子築居唐奥之山復繪隐居圖摭其某水某丘之雅名署於其旁以寓朝夕不忘之意每遇佳客輒指以示若挽而使之游從於其間也間謂袁桷曰夫畫以髣境畫之所不能及者吾雖知之而不能數與人言之且境必有趣趣之精華非言不傳也子其為我摭名以發其趣桷對不敢辤廼為之賦曰陳子倦游江湖整轅言旋顧瞻先廬徜徉里門四壁寒􅄫頽然維藩詢闉闍之遺跡儼中堂之猶存弔零落之舊叟撫徬徨之驚魂扵是悲極而喜喜極復悟悟而言曰人生一世惟静者智盛不可持翫不可恃三家之市其行跂跂四逹之衢其言姝姝一以巧為媒一以酖為居吾懼其獨立而誰與趨拂􅀛以占兆扵唐山之隅若質而華若翳而明缺者如玦環者如城相其隂陽築室繩繩被以杉松瀦以芡菱棄塵世之喧啾牖乾坤之清明爰命雅客展以輕冰之楮化以五采之穎纎濃如春曲直若領吐秀獻竒彂牘炯炯鄰輞川之清妍敵草堂之幽靚故雖踰江越嶠適市造朝挹此粲者神凝各消有不待北山之移八公之招也客有言者曰擁裘而歌者意率類於慨慷登髙而賦者事常失於荒唐吾敢按夫子之圖而代言其詳東越之區山水􅃣世發抉地靈前王後謝維君之居敞若神界若廼石塘界其前雷峰守其要馬領􅃣其㒹羊巖負其奥周以青鮮横以磊砢近若迎笑逺若却坐嶔􅍶何山挟輈以殿浮游閬峰振弁以見上有石屋梁欐參属紛披寒苔聮絡恠木恍飛仙之遺跡鑿幽竇以守獨前林杳靄丹光騰天伯陽一去而不返玄鶴盤空而將還飲石室之寒露問山人之何年然此特隠居之外美析而舉之有不可勝言者矣晴原漲春千桃爛雲飛英滿溪織流成文支寒藤之瘦骨度略彴之微險觧瓢􅆽泉一舉三􅍋藹桑麻之故交爭聚首而繾綣前有恵林濃綠婀娜投􅃣觧襟翛然清夏欣衆葉之敷陰訝楞梅之吐火秋畦離離黄菊斕斑爰泛黍酒駐兹頽顔懐千古之處士酹悠然之南山歳窮境空長木號風寒岑晃曜巋然中峰渟膏溢銀噴如飛龍匯為澄潭窮髪鑒容烹以碧玉之鼎瀹以雲􅃾之茗神清意寒語爽心冷盖將忘塵世之事而深以内省也相彼􅀟門囿兹群山清風常来客去不關圖書自娱鄰社莫干有堂寛閑扁兹嘉名悼白雲之何徃悲先友之日零瓊樓舞空清曉萬變黙坐以觀翕忽詭幻賓天衢之出日駭青紅之紛眩鳥衝煙而辤枝兎驚林而絶坂嶺濛濛而人度露􅄎􅄎而葉顫念哀鴻之相求時遺我以好音緣小墅之横岡花竹儼其成隂悵舉世之莫􅀙歌風雨之苦吟廼歌曰歲將晏兮莫留過故居兮懐憂山坡陀兮四属吾拮据兮以屋懼世徳之㒹隕兮習肥遯以藎􅂖駕余􅆖兮屏營耕石田兮腹果􅩘出處之何心兮幸余髪之未化為我語山中之人兮吾将歸老于其下清容居士集卷第一
