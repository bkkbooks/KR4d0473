body:
  text: 古詩七言煮茶圖并序煮茶圖一卷髣石䆫史處州燕居故事所作也石䆫諱文卿字景賢外髙祖忠定王曽孫儀觀清朗超然綺紈之習聚四方竒石築堂曰山澤居而自號曰石䆫山樵此圖左列圖卷比束如玉筍錦繡間錯旁有一童出囊琴拂塵以俟命右横重屏石䆫手執烏絲欄書展翫疑有所構思屏後一几設茶器數十一童傴背運碾緑塵滿巾一童篝火候湯蹙脣望鼎口若懼主人將索者如意麈尾巾壺硯紙皆纎悉整具羽衣烏巾玉色絢起望之真飛僊人予意永和諸賢放浪泉石當不過是而其泊然宦意翰墨清灑誠足以方駕而無愧甲午冬十月其孫公疇出以相示因記而賦之以發千古之逺想云石䆫山樵晉公子獨鶴蕭蕭煙竹裏月湖一頃碧琉璃髙築虛堂水中沚堂深六月生凉秋萬柄風摇紅旖旎遵南更有山澤居四面晴峰插天倚憶昔王門豪盛時甲族丁黄緫朱紫曉趨黄閤袖香塵俯首脂韋希雋美一官逺去長安門徳色欣欣對妻子豈如髙懷脱榮辱妙出清言洗紈綺郡符一試不挂意岸幘看雲臥林墅平生嗜茗茗有癖古井汲泉和石髓風囬翠碾落晴花湯響雲鐺衮珠蘂齒寒意冷復三咽萬事無言歸坎止何人丹青悟天巧落筆毫芒研妙理黄粱初炊夢未古舊事淒零誰復紀展圖縹眇憶遺蹤玊珮珊珊響秋水贈張玊田來鄞設卜肆循王五世孫將軍金甲明如日勒馬橋邉清警蹕淮壖徹衛羽書沈置酒行宫功第一蟬冠熊軾填髙門英英玉照稱聞孫堂名玉照張鎡號約齋百年文物意未盡玊田公子尤超羣紫簫吹殘江水立野雉驚塵暗原隰夜攀雪栁踏河冰竟上燕臺論得失丈夫未遇空逺遊秋風淅瀝銷征裘翩然騎鶴歸海上一笑相問誇綢繆兩曜奔飛互朝夕璇府森芒蠡莫測要須畫紙為君聴落筆雌黄期破的壺中白日常髙懸道逢落魄呼醉眠清歌停雲意慘淡倚聲更度飛龍篇題子昂浴馬圖苜蓿原空雪新積羣馬飢鳴渡江食大梁公子心未平一匹宛駒萬夫敵圉人初浴意氣増跨轡已晚知無成雲䆫徘徊悄無語掩卷索索猶風生送倪徳進歸番昜書眸的的垂玄珠辯口落落傾冰壺寳刀挂壁指閶闔扁舟挾浪辤東吴低昂􅁰禾故流道􅀮没桑􅀥遺宫墟仰看浮雲勿復語俯視逝水誰為圖天衢晴塵接冠盖石室古簡搜盤盂大宜置身並班馬小却論事追唐虞懸知擔簦要有得永愧折簡終難呼深春無人碧桃静落月在屋􅁳鴻俱歌聲清琅振金石筆意横逸摇璜琚苦心寧為㸑下木怗首不作轅中駒牛毛􅂑士固當走魚目􅅭世徒争姝平原飛埃宿麥盡長河奔潦柔桑枯還家勿陳賈生策閉戸趣著神農書相思我亦返屠肆静念子豈淹田廬送僧徳芬過松江海門山人捐竹杖笑指飛濤挾雙漿雲間鶴唳耳不聞洞下龍歸夢猶想我聞諸天亦官府一息塵寰緫調御黄花滿院人跡稀霜月離離在前戸憶陳道士空巖羽人氣為祖玉立秋空振􅀇古酒酣髙嘯裂行雲直上鈞天聴濩武白雲一去誰遺情掉首不問人間名當時雙瞳傲餘子猶有翰墨傳孤清紫綸交馳丹闕下人道山中多僕射黄金蜕骨碧藤深夜半寒光明月價飛鳬縹眇山鬼靈蕙殽一薦端貴誠欲從桂父乞僊露虛牝回激笙竽聲病馬圖青絲屈曲長安道卓午歸來廏中老側身仰天思逺遊口不能言顔色悄奚官却立深有疑佀言非病那用醫願乗長風迅絶足一息八極歸瑶池次韻張伯雨梅花島雲屏油幕低覆垂晴日倒映黄琉璃孤根自有巖壑趣屈曲緹室情依依巍峩青女來蘂珠赤脚獨立層冰渠燧人當陽朝寶鑑金胥簇陋催銅壺何人胷中藏九島内火迴環不知曉咄嗟已辨天機深頃刻能成化工少隂陽在手司帝春坐䆫更試明䆫塵江湖逺渉汝良苦門外萬竅笙竽吟次韻渭川春玉圖二首至人虛心實其腹手種琅玕如種玉晴雲散墨春思浮咫尺經營千畆足清標亭亭儼矜絜笑脱斑斕賜膏沐揚旌植纛神君遊萬籟無聲江水渌此君之志那可量榮辱相忘在空谷大宜蓬萊之三山小宜武夷之九曲前如綺園歌紫芝後若夷齊侍孤竹隃麋之墨清且竒脫落􅀇黄乃真目幽齋尸居耿相對有客叩門深絶俗天空日沈碧雲湛細酌寒泉芼秋菊夢逥倚杖森在廷􅂱􅂱雙瞳鬢深緑瑶林羣僊歌捧腹觧帶蘭臯捐佩玉深知五采􅅭空花守墨空巖思濯足層冰急雪成九轉重露輕煙方一沐湘君寶瑟調初絶唯見遥峰蘸寒渌長空旋宫起萬籟翠袖無言守山谷紛紛落葉漫渭水耿耿殘花守韋曲論功嵗晚端有意深愧羣英不如竹森然壁立聨堵墻變化淋漓傾衆目髙人宴坐不出門一榻常懸謝囂俗每令此君當上坐末席餘清友松菊囬首故園新雨晴無盡春風吹草緑忍恕堂大都袁氏汝南堂堂臥雪翁飲寒閉戸稱髙風吳相亡何不知止二石醇醪能脱死吾宗髙標兩都史餘子紛紛那足比人生遇事何强嗔百年嵗月籠中身水清之魚鈎滿餌白鶴出林紅鶴忌君家兄弟如聨珠熟視不語疑糢糊連理之木多慈烏大兒拱立羣雛趨家僮大勝千木奴冬園芋栗夏芙蕖壺有美酒架有書不識喜愠真何如門前駟馬填華裾飛鴻軒新安胡則大㝠㝠天機衝紫霄炎洲雪嶺窮遊遨鷦鷯一枝掩目避始信懷土非吾曹勞生貴賤各有適攘臂何人限南北三足之烏今不停寒暑周迴短長刻李士􅀪枯木風竹圖又新作為玉隆陳狂蛟舞空蒼髯拏雙鐵蒙頂雲交加亭亭霜標不受侮慘澹天籟扶槎牙西山古淵人莫測一柱承天萬牛力㑹須截玉化陂龍拂拭苔光遺劒跡題茅山道士雪梅障積金峰頭雲五采天女行空散珠琲為憐絶壑一枝春玄墨敷調増蓓蕾因風飄零顔愈真竟日霾蔵氣逾倍油纛紛紛成素旄積鐡離離増練鎧㘭如側杯頫承露亂若銛刀􅌭剪綵􅀟龍挾輈擬欲上萬馬飛塵卒難凂髙齋鍾磬日未暾徙􅀝横斜眩銀海憶昔西湖極逰歴真與逋仙澆嵬磊後知色相端有空百念灰心付真宰峩峩茅君儼不死秦帝嘉平年首亥精思萬林元炁存衆卉羣芳羞皚皚閉門緹襲坐蒲團長恐夜深風雨改廣信奚君静能家鵝湖以太府掾岀補南康簿予慕其仕止皆武夷先生講道之地叙言其異同幾於贅因成長句亦欲知夫先賢箴警非二途近世學者駸駸虚􅀇則知武夷晚年持守之論非矯可不慎諸鵝湖盡日鐘磬清不聞昔時絃誦聲愛君卜居在其側編簡插架猶談經當年羣公水蒼珮粲粲寒芒徳星㑹投壺雅争非世情餘子承風増毁背康廬招提無極篇希夷入道從兹傳百年脣吻互嘲鄙經緯妙宻同先天兩地斯文實元氣宦遊家居總竒事稽古紛綸三萬言顔生屢空心晏然次韻王道士雅馴姑答其意丘真人弟子其韻不潭潭古僊浮玉顔憫世壯志金城堅丹霞紫壁接霄漢過客吊古猶思賢王君碧瞳水蒼珮深恨望諸書絶燕丘公蟬蜕七真化青史誰能繼二班送馬季權之官平江州相兄子碧梧丞咸淳十載兵塵髙漢江之水纔容舠眈眈太傅亂天縡櫂船兩翼鳴春濤中書蛛絲守空印片紙除書魚貫進相府門前青草深破席疎簾雙白鬢扁舟疾走歸番江百城破竹争迎降紛紛成敗付野史玩芳攣臥唯軒䆫徃事凄迷踰四紀華屋空梁歸逝水洞庭木葉三閭愁淮南桂叢八公死京城即今相邂逅傾盖忘年緫論舊潁州推官家譜傳岳陽樓頭水浮天宋誠甫押送交趾使之武昌飄飄蒼珮乗風來下視漢水如浮杯坡陁環堤舊亭障鐵笛穿石聲崔嵬武昌之魚不可食昔人作歌何寂歴隔江小城大如斗枉使邉軍暖鋒鏑古來相傳用武地今作薇垣鎮官吏腥血繁纓金齒來犀皮屬甲雕題至碧瓦門深鼓角髙羅庭椎髻聲嗷嘈銀甕蒲萄雲葉重錦氊叱撥風花驕深知王臣有竒算蠻使低頭輸宻欵勸君莫登黄鶴樓勸君莫停鸚鵡洲黄鶴之人白雲杳鸚鵡之客蒼煙愁愛君手中青鏤筆能寫牙籖三萬帙迄今舊史難整齊屢屈先皇詔頻出玉堂日正槐影長汗青之簡光熒煌請君直書亡國事還作觀風寰宇記送濮陽陳景臯之官忻州陳侯直氣摩青雲天馬脱駕羞駑羣毳袍昌言髙坐聳餘子俛首卑塵氛探囊竒策得要領炙轂妙語通氤氲京城久居閲冠盖酒觴棊局忘昬昕平生植竹嗜好古膏沐服食童顔醺徃年濟隂試敏手桑柘戢戢春田耘政成烏府考上上擊鮮驤秫歸榆枌窮冬邂逅色骯髒近錫符竹州名忻自宜骨鯁任獻納或佐輦轂輸忠勤羣公歎息各賦詠跋馬操袂愁離分緬思河東舊雄鎮甲騎出塞宵踰汾即今樓臺歌響集棗下纂纂紛紅裙愛君胷中人物論發硎破的無虚文盖公之堂本清浄解帶臥治收竒勲此君相從匪朝夕晝簾煮茗看鑪熏送湯道士降香武當山紫衣山人眼如月朝捧天香辤鳳闕栁絲輕拂桃花騘屈曲層巒過俊鶻澗中黄銀如僕姑清淺閃爍随菖蒲水流東南天轉北槖籥妙化誰為圖沉沉􅀇帝道淵黙手握神機合無極宻調六氣佐璇璣魑魅潜蔵百神職暮春之初傳降靈閲世已久難稽評龍虎之章端莫測􅀛蛇之光杳無跡過髙郵湖七十二湖春浪濃風刀剪霰跳玲瓏參差凍栁皂纛重傴首俟命朝珠宫淮南田父身龍鍾灼􅀛瀝酒占年豐舊秋積水挾豐隆長魚揚鬐蒲蕩中桑顛髙下棲㝠鴻黒禾生耳随飛蓬瓢囊扶携出城東至治天子逹四聰詔書寛大蠲民農秀麥菶菶翠織茸赫日出海扶桑紅嵗熟於酉年相逢擊壤鼓腹歌時雍展牲美報湖神功趙昌荷花我家東湖三百頃瑞錦縱横緑雲凝森森曉氣天香飛星斗光沈水花净逺如嬰兒脱文緥近若胎僊臨玉鏡瓊杯欲側雨絲垂金掌初調露珠定盡將機心付鷗鷺小雨輕煙穿短艇京塵烏帽二十年夢入滄洲寄清興趙生畫意不畫格淺粉輕砂養真性韜精歛容羞自陳三沐無言月華靚邇來馮於號能事老嫩風晴毫髪證􅀇黄已辨神俊枯逐影之人道中病髙堂視此青琉璃香色俱忘保清静京尹旌門泰山之溜石可穿磨磚為鏡不問年人生作事貴苦堅砥節厲行通蒼天武清之祠世􅀁傳出門重趼神已憐五里一堠拜漸前寳鑪當胷起霏煙念我母疾醫難痊帝叱二竪沉諸淵秀眉鶴髮人中僊伯仲叔季舞蹁蹮􅁱齡已盡衘苦寃烏傷栢慘羅墓田劉愷丁鴻孰為賢煌煌神州風化先槐栁表道綽楔懸搢紳交喜聮序篇太史屬筆慙非椽乗鸞吹簫圖繆公荒􅁋亂天紀纍纍宫中四十子懷嬴復作重耳妻匜盥相揮國深耻娉婷弄玉誰復看參差窈窕能合歡築臺虛聲出天外詐言後夜同乗鸞人言神僊能不死槖泉之墳露遺址哀哀黄鳥飛復來良藥刀圭竟誰致髙辛之女随盤瓠漢愁匈奴遣公主一身能解百城圍鄙計咿嚘笑千古天台之事尤荒唐劉郎阮郎歸洞房石橋雲深樛木􅇢披圖相看儼同傳雲岡圖為王叔能作白雲晃晃虚飄飄羣峰磊磈通危橋蒼髯側挂截地脉素練直下來山腰是中樓閣誰所居翠篁髙拂寒光遥憑虚望逺意莫盡振衣獨立摶扶摇王侯出守山水郡逞懷盤礴窮清寥一日不見輒憒憒臥遊想像歸生綃信知俗子謝不去濟勝有具難為招贈吳江宋尉太湖三萬六千頃䆉稏秋風政相並吳船跳擲如飛梭鳬鴈參差白雲影連年田舍無炊煙吳船出没平湖前縣官打衙入湖去弓刀夾棹魚升天元憲之孫為少府岸幘看山揮玉麈飛蝗避境虎渡河吳船雖多奈我何與相士王月屋世途紛紛黒如漆暗中摸索端有術何人竊藥廣寒宫碧眼淋漓論得失麞頭之子藍且醜牙籌夜深鬼神守麟臺功次不論渠當道相逢須疾走廬陵梁醫濟生堂上池之水人莫識三揖東華借餘瀝瞳光透碧千里懸二竪蒼黄離衽席南康昔有劉神醫鶴骨變化芝术肥入門逆意望且走吾今見子同其機次韻史允叟檜屏蒼雲之根百嵗植巧匠屈曲空揉蟠浄如翡翠立亭下矯若么鳳倚闌干峥嶸要使頭角出鞭霆駕電超雲端扶春萬條豈不好猥瑣籬落迎霜殘君不見姚江參天兩雙檜至今風雨之夜猶清寒植雙檜於尉治越王尉餘姚嘗次韻蔣逺静魄乞食市中六七兒常負囊從蔣氏祖五代末與僧為友僧落目蔣驚異是日僧化去迺彌勒之一日與蔣浴江中視其背有氏子孫當代有進士也留布囊與别且云蔣唾壺麈尾手所持白眼對客客不知出門俗子多敗意三語之掾真吾師曉䆫新沐緑隂浄碧雲竒峰生九疑隔隣書聲入幽耳茶甌散花酒浮蟻百年行樂在適意燕頷頭顱空萬里君不見燕山俠客多苦寒出門悲歌來日難同龕彌勒誰緫持沙上偶坐忘所知布嚢相傳陋七葉宻記端是人天師愛君清言潄金石酒酣硬語輕丞疑亦知造物端戲耳一室尸居旋磨蟻東鄰花發西鄰歌咫尺相思隔千里陳郎之約不可寒我眠卿去人所難廬江羊孝子兵難時兄弟三人與其母被掠為奴後廿年復得完聚郡表其閭君不見觀津竇廣國傳舍沐頭深記憶時來徒步入長安握手相看淚如滴又不見杜羔孝感為尚書兵前失母長欷歔一朝老嫗忽邂逅郎君玉貌猶吾夫淮源鐵騎排雲來戰骨積雪飛寒灰小兒纍纍繫馬尾鬼妾赤脚驅車迴黄塵漲空日將暮母子弟兄不知䖏只今緫是太平民那識當年亂離苦人言缺月定有圓馬能生角石可穿亭亭髙門拱槐栁更灑鴻筆傳青編送潘元卿績溪邑諭君不聞黄山種松法纍纍如珠茁如髮十年拱把百年梁華表相看化瑿魄又不聞婺源之山髙入雲黄流夜作河漢奔釃渠漩渦濟川具怗首萬折歸天門魯中之壁神所惜龍馬成圖帝為錫韋編索隠年益耆此道誰言深黙得紫陽老人心胷髙番髪執簡窮秋毫即今羣經束髙閣上擬混沌中唐堯拱手臯比立環堵哆口紛紛角門户君看黄山之松􅄔源水師友根源政相佀次韻黄松瀑自廣信見􅀉開元天子書石經雉頭焚却邊宇寧合宫宗祀廣􅆀敬底用物馬登云亭林林碑臺刻新出嘉禧殿前稱第一小臣捧詔渡江南蠆尾渠眉耀晴日裝成分賜諸王宫餘墨淋漓遍􅀌􅁄古文偽出今文訛斷簡誰能䆒佔畢黄僊盡日鉛槧忙語言冰雪容堂堂明時孝治邁千古願借鴻筆歌陶唐旨刻八分孝經時奉題黄居寀蒼鷹擊雉圖坡陁肅秋塵四起逆風雉飛疾如矢蒼鷹矯矯凌空來注目穿胷紅披靡山雌藏頭入荒篠回視其雄端一死􅀇雲摩盪寒光浮側身翻雲轉輪翅急如冠軍赴猛敵緩若計士蔵深智蜀山巍髙翠周匝狹徑交衢不容駟黄生養之愛神俊勇氣縱横怒盈眥想當落筆望平坂回首當闗真劇戲君不聞箕裘可學端有傳諸孫射生養殘年黄筌養鷹學畫鷹諸孫皆成獵師送廬陵陳存道赴廣州教授君不見端平崔相國竹杖角巾老辤蜀清名髙節耀千古寒菊孤香出林谷又不見咸淳張狀元落落大對三千言流離抱忠􅁙魚腹要使名字傳遺編即今聲教震南朔此州文獻端磊落荔枝一色紅雲蒸菖蒲九節清溪明當年中州人物論風度曲江之公唐帝顧吳儂傖父互譏評坐使官曹異銓注吾聞八桂山峰如玉簮衣冠之氣連青雲穹􅀛負碑百神拱色羊跨乗羣僊尊翩翩陳子天都客萬舞充庭考金石笑觀滄海陋浮漚鵬飛暫作天池息送毛道士降香嵩衡淮海我所思兮在嵩嶽神清之洞何駭愕參差弄月秋氣髙王子飄飄醉騎鶴少室山人蕙帳空君今駿馬凌春風山中齊聲呼萬嵗我欲同君學蟬蜕我所思兮在衡山重華玉珮聲珊珊芙蓉石床秋水冷木葉飛燈光耿耿軒轅道士人不識澗底拾薪鎔白石我欲與君上九疑萬民樂康明聖時我所思兮在桐栢寥寥帝鄉今莫識潜流倒注平淮成天塹曽為萬人敵金龍護簡帝令森蜥蜴俛首穹􅀛沈我欲與君探其底五兵長櫜樂平世我所思兮在南海鐵網珊瑚援手採沈沈雲氣方壺深絳節神君佀相待海中􅄓母方頑癡朱書短札能捕之此中竒觀通扶摇吾欲與君觀沃焦贈番昜劉生振我欲贈君珊瑚枝君言不如貽我雜組辤我欲贈君懸黎珠君言不如貽我盤盂書長衢飛塵日卓午觸暑東遊甬江滸目光陸離衝紙背徑上河源窮織女龍圖􅀛書杳無跡㺯丸㝠搜矢穿的空林看天無底青虛室生雲十分白幽蘭叢深不當户盤露凝膏敵瓊醑泰山積溜石可消鐵硯􅀇花散晴乳林林白袍校詞藝鸊鵜淬鋒儼初礪身同蝶化入寥天欲伴飛僊更斫桂彤庭㑹弁開祥雲河目海口真天人昂昂胷中治安策慎勿謾與深彌綸萬里之行生足下黄河層湍及奔馬參差栁色暗皇州龍牓髙懸動朝野句曲山迎真送真詞二章近張伯雨道士寄示陸魯望句徃歳在翰苑嘗草三茅君制書君十二月二日相傳繇天台歸曲山朝真辭二章盖毎嵗大茅所製迺十二月而三月獨缺予茅山春三月十八日復歸魯望即繂字古率字作卛吕道士過不揆用韻以補後章字書之資伯雨詞氣清簡必以予言三茅因畫以寄且為異日朝真也為陋參差􅆼窕行雲急翠旌飄飄露華濕神君夷猶疑未來矯首精思各山立瑶臺章徹星斗冷碧扉丹透紅流影春雷迸壑人不知獨鶴眠松已先醒右迎真妙顔朝逥寶衣解乗龍髙駝賦遄邁山中老人年送迎一酌寒泉過玉瀣翠氣紛霏森孔盖挾以流鈴光帝子髙歌歸去來白月追雲送飛珮右送真翠微濕司命旍旌未下来焚香抱簡凝􅀛蒙詩云九華磬答寒泉急十絶幡搖影空洞靈章發一聲春来萬壑煙花醒神立殘星下照霓裳冷缺月纔分鶴輪真弟子悄無言再拜碧杯添沆瀣火鈴縈雲鳯髻飄然觧玉鉞􅀇竿儼光邁朝象消沉一瞬間空餘月外聞殘珮跳躍龍毛盖腦髪青青赮萬贈吕與之碧䆫獨對中秋月佀怪腦華雪霜白瘦笻直上大茅峰長吟㝠思啓􅀇籥緑蘿丹騰紅欲走我欲拾之難在手嗇精超形朝紫宫下視塵寰等蒼狗送瞿伯器還吳輕鷗不受機心縛良馬端随敏手馳鄞江井邑十萬竈簿領積几窮繙披瞿君坐曹談笑决長官驚誇里閭説豈惟煮茗挹清風復解停杯問明月澄江雪浪催歸舟洞簫聲咽行雲留明時掄材在濟用佇看公府交章酬竹素園緗帙不作飛白體漆簡端徴殺青書哀哉瀛王兔園册自比稷卨今何如陳生歌聲夜漫漫手織雲錦餐琅玕丈夫書功夙有願簜節束帛光丘樊松聲樓層樓突兀觀芸芸萬籟泬寥天地分初如盤車出層巘宛若幽磬穿孤雲上方禪寂念不起但見白鶴來繽紛金鐘風篁儼相答有客掩耳元無聞阮受益携郭功父杏山詩來求題迺知爲名門所作因次韻葛翁迎㬢侍東皇笑指梅根之陽岡手揮桃李植文杏春至古澗流紅香杏華飛時爛林谷錦繡為天漫翠木即今不識空陂龍猶指當年舊乗鹿紛紛機事危黄間彼艾之植誰猗蘭青松逥風太古籟移居之老時回環兩曜跳丸今幾載阮氏隠居端儼在金章紫綬先譜承鴈塔龍門耳孫待翩翩俊翮海門山我欲挾之周九寰精思羲皇粹六籍迄願閉戸窮鉛丹支辭濫説􅅭嫫母正色危坐當前顔神僊之説不可學月窟謹視環中環送林以道歸括蒼書生作官端作勞摭拾嵗月如聚毛行年六十甫墨綬又見納禄還林臯磻溪之翁誠有道采芝妙顔夸不老明時貪賢在夀俊未信吾徒竟衰槁君家周官擅彌綸經緯表裏通天人那能望塵拜太守振衣黒髪前旒陳松花霏霏散黄霧春盡還家美無度篝燈讀書目光曙承明之廬我當佇題明皇擊梧圖胡兒手持玉環侍君側睥睨阿環非一夕宫中秋葉奏清商笑擊孫枝工按抑嶧陽之材雲門曲能使薰風生衆緑如何促召羯鼓催閙紫妖紅看不足馬嵬坡下催進程琅璫檀板悲霖鈴緬思康衢擊壤叟帶索行歌不知老清容居士集卷第七
