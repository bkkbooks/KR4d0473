body:
  text: 神道碑銘朝列大夫同僉太常禮儀院事白公神道碑銘白於太原為令族至金源氏興太原衣冠為㝡盛而白氏兄弟相繼踵儒科故中大夫樞密院判官兼右司郎中輕車都尉南陽郡伯諱華字文舉其季也唐宋樞密無判官金天興帝賞器之特置職以寵由是相仍自郡伯始郡伯後居真㝎生子四人俱有時名君諱恪字敬甫少警敏三歲善作字書八卦八字有以見于鄉先生元公好問公作詩湥器之郡守上其能將薦于朝郡伯謝弗許稍長里之先進張先生耀卿愛其才奬拔力成就至元中世祖遣使詣州郡試明經生復門役君首預選弱冠試吏揬姦拔寃獄具御史不能撓後為河南按察司書吏有尉卒利孀婦財未終喪强贅於姑家既而虐其婦復不禮其姑姑告於官絶之尉卒隱其罪屢訴終喪無明文事久不決君悉疏所犯聚邑人以告婦得終養其姑焉至元十四年江南建行臺御史大夫相威公慎簡所屬署君為掾史即條不便事凢二十大夫見世祖力陳之允十有八㝡著令者大辟成讞上刑部聽報可賈某公田租歲減什二十八年授從仕郎江東建康道提刑按察司經歴改荆湖占城等處行省都事時荆湖省臣某括財恣威福君度不可與共事辭不拜後果受誅二十四年改浙西提刑按察司􅀴􅊗遷平江丁母羅夫人憂以夫人喪􅁙于呉将終老焉㑹詔舉不附權臣自晦者有以君辭荆湖事薦于上除福建宣慰司經􅊗閩郡廣逺豊歉不同是􅀊汀州穀善收戍兵􅀁給糧不登􅁆福泉興化穀驟踊有司議移三郡穀于汀君建言道途轉輸大無益發貴粟以賑三郡歸直于汀可多得穀誠兩便有司難之君署記曰使有罪願已獨受卒如其議而官之贏糧果増倍宣慰司復為省君治六曺文牘以俟平章某公知君簿領有能名受其籍以付吏三十一年丞相太傅公為湖廣平章君時為都事俾陳樞密院及本省利便侍丞相入覲有㫖允其奏復陞員外郎湖廣聮絡左右江官吏秩禄歲一再受俸於省地逺得不償旅食有棄俸不願受者君建議隨所部以給迄今行之衡永戍兵耕閒田官出牛輸其租牛死不得落籍戍兵歲率鏹數十萬以酬君惻然計之曰牛死當納皮角于官除故籍而以官租捐納之則得矣戍兵由是免害有省臣獻廣西地肥沃可為田徙湖南居民往耕之當調户五千君力言不可平章公是其議奏止之獻田者復調兵征思明發運粟入賊境道逺雨淖荷擔者各持去志君憂有他變出直募民民樂受以往峽州歲饑請粟于官有欲核驗始發君言饑民朝不及夕使核驗死當過半矣大徳二年進本省理問官推誠燭幽莫有滯濫而言論風采彬彬文雅盖以吏治濟其儒行者與四年改江西省理問官究偽楮獄得直于時翰林承㫖閻公復持士論賢否有言曰白文舉父子兄弟俱有文名敬甫幼負俊聲老不入翰林咎將誰執奏為翰林待制復同僉太常禮儀院事儀度閒整贊導禋祀動不踰矩蒼顔玉立真善為頌者也桷向為翰林應奉幸得侍同朝聆議論接顔色寛厚平實言金諸老行事歴歴指掌晚自號竹梧其為文不事雕飾扶掖後進侃侃自持知其於孝友有加也生丙午歲十有二月至大二年己酉四月卒于官年六十有三積階至朝列大夫有詩文若干卷蔵于家某年某月某日葬于真㝎路真㝎縣之朱洛村曽祖仲温隱徳里居妣李氏祖宗完金故贈朝列大夫輕車都尉南陽郡伯祖妣李氏妣張氏羅氏君羅出也娶盧氏中書架閣管勾順之女翰林承㫖摯之女弟男五淵安福州儒學教授沆蘄州路䝉古教授皆蚤世湛今承事郎浙東道宣慰司都元帥府都事洙國子學正灝江西湖東道憲司書吏先卒女三長適李棠靜江路税課提領次適甄遂良季適李權河間路某州樂夀縣尹孫男八貞采暹辟楙樞桂孫女四曽孫男一女三湛為元帥府都事桷適請告歸里以事狀拜且言先君子嘗得與子同院銘莫如子桷謝不敢辭乃為之銘曰有完者圭藉之以韋不泄其温禋祀用祗受中以生剛柔是宜木神則仁其用不陂顯用太常幼敏且岐挹其粹精飭躬以教黜明養潛爰燭姦暴匪伊求之我曷望報道在一源挈以簡要詹詹炎炎益飾其巧佩玉舒徐六轡濡如執簡以陳矢言不迂彼計功者承色善趨較以虧成卒喪其軀有高維閎兹為守儒恒山之陽松柏茂直詔于雲礽是謹是則膴仕之初壎篪踵奕詢彼故老曰惟祖徳我銘孔昭庸告爾無斁贈翰林學士嘉議大夫馬公神道碑銘浙東道宣慰使都元帥馬公踵門以告曰惟吾先公隧道碑未立子職在太史勲舊死事貞逸之士嘗焯焯紀著登載金匱先公仕雖不顯其見之于世祖受學于碩師河内後進猶能誦習遺事敢以行實告它日上其事史官則子實前史官庶幾傳信可永久敢再拜以請謹按公諱充實字士輝覃懷河内人父庭大父某皇朝入中原略地㝎圖貢詔大帥專除授嘗得署郡縣副貳兵亂大父以上名諱弗可攷公八歲遭大喪從母完顔氏携載以從其夫李侯侯長萬夫隨征六盤善謀畫禆贊李益取自助六盤為高昌要衝高昌之俗收經史立校官地與西域接故其聲音文字詳於諸國公得其説而習焉世祖皇帝大一寰宇命以其國語别立文字用於印章宣勑其字母與西域相近公㫄曲通暢單出雜比㑹其指歸學者爭詣門請業許文正公薦于上以儒服入見于桺林委曲問時事悉以國語對上大喜錫以錦帽語翰林學士承㫖某公左丞相耶律公宜以為稠人師遂僅授將仕郎懷孟路䝉古教授再授承事郎㐮陽路均州判官然不樂仕進嘗曰我能知樹藝遂力治其閒田因原隰以種所宜木春華秋實茂鬱滿道過者咸曰此馬公手植也縣西有田二十餘頃皆先世業歲久勢家悉占其肥沃後服公純徳始願歸其田卒酬直以受方許文正公講授鄉里時靳許可逰其門者察以􅀊月始命執弟子禮獨見公䔍厚温謹即㑭就列授性理大義以躬行為先公能守之故其退讓無干進之念而恂恂里閈克􅁱克儉皆師訓也文正公侍帝􅀁無虚日懐孟素産地黄可釀酒其􅁱治貴精謹上問文正卿弟子孰為誠實即以公對公素知製法得山中石泉如法釀以進許公之薦將由是㑭嚮用而事若不偶公復不以為介豈安於命分者與後有奏為河渠使者又將奏為䝉古院學士皆力謝不受里中有徳大師金内族年過百齡能知人夀夭前後俱尊異之公甫生一日徳夢其故友宋讓曰吾今為馬家子矣後抱示之摩頂即為笑容噫死生事不可詰若前史所載又有若佀焉者寧勿書卒于至元二十九年四月六日年六十葬于河内縣青平村先塋之次娶劉氏征西萬户某之女後公四年卒生二子長鑄即元帥公次鎔朝列大夫廣西海北道肅政㢘訪副史次娶李氏生二子鋭奉議大夫廣州路治中次鋼皆蚤世女五人適陳吉甫張漢卿王某朱仲徳楊某鑄男四長徳潛内監尚衣次徳源徳淳皆國子生徳淳今為鎔後徳淵府學生女四適太祝王世昌戴彦實李起宗郭成可鋭男二徳潤徳温曽孫一孟孫至大三年鑄為禮部郎中推恩得贈翰林學士嘉議大夫上輕車都尉扶風郡侯諡莊惠劉氏贈扶風郡太夫人李氏封扶風郡夫人鑄官中奉大夫浙東道宣慰使都元帥又贈公某官劉氏贈某夫人大父贈某官大母完顔氏贈某夫人桷於是有言曰仕嘗患弗及其身殁而子榮推其榮以及其先而為善之效著矣世固有極其顯光殁無徳以傳卒至于子孫流播可勝道哉元帥公中外揚􅊗清白益者今帥浙東事不苛求而明燭幽隱不為已甚遺其後者猶先公之志是宜銘詩以昭来世銘曰相彼土田或隰或陵湥根平培蓊焉以升實者缶之茹者釡之梓漆是供絲枲是輔種不亟求曰惟歲年視彼種徳亦云其然温温馬公植善無倦仕匪蹇時從我之願經緯聲音服習訓則奉盈彌謙以退以黙詔爾孫曽戰競是承蔽芾長松勿替厥聲翰林學士承㫖榮禄大夫遙授平章政事贈光禄大夫大司徒上柱國永國公諡文康閻公神道碑銘世祖皇帝應期握圖肇函諸夏文經武緯各當厥職粤惟東平地接鄒魯時則有嚴忠武公披荆翦蕪扶植儒學作成逢掖卒能敷文帝庭風動八表鄆之得人號稱至盛而閻徐李孟世名以四傑焉自至元至于大徳更進迭用誥令典冊則皆閻公所獨擅公諱復字子靜幼入東平府學蜚聲炳著操筆綴詞賦音節和暢融液事理率占為舉首幼從贈翰林學士康公康大器之太常徐公道隆年長有聞譽不敢以後進待公在翰林㝡久贊書積几高下輕重擬議精切傳誦以為揩則其待寮寀擇敏秀者自近不滿意者不復强以文墨任滿不調雖請託亦不得以叙遷故事表牋自待制而下分譔公命各為一通輯其精良融為一家而别擬以示其屬始仕東平行臺書記御史臺掾至元八年入翰林為應奉文字進􅁱譔十六年陞翰林直學士十九年侍講明年兼集賢侍講學士于時兩院皆領㑹同館由是自應奉至侍講皆兼㑹同二十三年陞翰林學士改集賢學士大徳元年復除翰林學士四年拜翰林學士承㫖而知制誥􅁱國史皆視其職以進其補外職則僉河北河南道提刑按察司事浙西道肅政㢘訪使世祖陟方召公草詔于上都成宗繼崩復召公上都武宗即位首上疏曰惜名器明賞罰擇人材朝論韙之賜金錦白金以彰其直頋公老矣願致事以歸乃進階榮禄大夫遙授平章政事給半俸以佚其老且命壻李嗣宗特授承直郎同知高唐州以侍養仁宗在東宮時知公歸特遣使賜幣命公卿設祖帳于都門外桷嘗以院屬侍公入議事堂鵠峙山立中外各改容以奉語簡意足不屑屑持辨爭丞相而下皆傾動一日草詔書其語意難以入國語大臣疑之有集賢學士亦出微語公召掾史具紙筆請學士改譔學士大愧卻立㑹食畢公改為之而前詔一字不復用一坐大驚公以文墨自任不肎為􅂃要官罷尚書省時世祖召入便殿諭以卿為執政官何如公謝不能世祖曰知讓誠美事宜勿强成宗擇相召公密問曰左丞相缺孰可任以江浙行省左丞相某對益稱上意其陳于上者大較若是㝎孔子主祀賜孔林洒埽及祀田皆所建明興國學論廟樂所助為多而其在憲府以敦本崇化為先務當大徳星變疏十九事皆切中弊壞成宗賜楮錢萬以優寵公受知成宗為湥甞問其􅀁師承金玉幣器錫賚有加仁宗初政首命召公以疾辭皇慶元年三月某日年七十有七薨其年五月葬于先塋之側公􅀅薨時夢㳺祠宫有道士迎問公年口占一詩以荅覺而言曰吾殆云逝矣世方􅀝公為重而公不復少畱可慨也矣其􅀁為文號靜軒集内外制集若干巻將傳于世桷由泰㝎元年得告歸里越明年公之壻奉直大夫南臺監察御史李嗣宗以書来海濱告曰子職在太史出處大致子侍承知為詳隧碑未立願登其事于石以貽永逺桷踧踖莫辭謹按閻氏平陽人今居高唐州曽大父衍贈嘉議大夫大司農卿永安郡公謚懿徳妣趙氏永安郡夫人祖和叔贈昭文館大學士資善大夫永安郡公諡昭獻妣武氏封永安郡夫人考忠故高唐主簿贈銀青榮禄大夫大司徒永國公諡惠穆妣牛氏劉氏追封永國夫人娶尹氏趙氏李氏男一嗣慶以䕃授奉訓大夫廣平路威州知州未任以疾卒女一孫男二翁安翁夀女適即御史君也公既下世婦弟淮東宣慰使李處恭時為吏部侍郎慨然曰吾寧使閻公終無以易名遂請于朝得贈光禄大夫大司徒上柱國永國公諡文康其姊亦封永國夫人而公三世亦以令典得追贈竝榮猗歟休哉銘曰泰伯之曽食采於閻因邑為氏慶源涓涓太原之閻顯武後唐戰多著名分茅為王有孫曰象決科就文撫綏降邦拯其溺焚迢迢裔孫實家平陽試邑死事和川歸蔵是生惠穆占籍名郡推誠急施樂善不靳教子有行俾離其鄉業精行成何求不償顯允文康以文偉著執其牛耳莫或敢侮斟酌泰和密勿元氣英露矞雲萬物屭贔鎮于詞垣幾四十年矜彼不能擢才進賢維我世祖養兹國珍薦更三宗猶昔舊臣公歸白雲多士盡悼凢今曰能亦公所造何以逺貽有豐其碑實茂聲􅀪播于銘詩周瑞州神道碑銘景㝎元二間賈相某隱城下盟罔宋帝理宗邀竒功外受强冦内括民業廷紳鉗舌奉風㫖稍異議輙諷䑓臣斥去小者歸田里大者入蠻瘴時則有豫章周公以史館檢閱入對曰李璮由山東来歸實急而求我區區一旅瞭然可見借援無功彼敗我辱招釁之道梁武在位四十餘年卒墮其計陛下臨御日久不宜復蹈前轍父全逆叛著在信史已登告于祖廟璮乞改正是作史者誣枉逆全行事淮東人猶能道此亦陛下在宥之所覩困獸投林誠不可使縱意干紊又曰臣近覩輔郡和市富室田業以􅇱軍餉良以和糴廣造楮多楮多則楮益賤是誠不可不變通也今所在置司擇其上腴低直以酬又欲令賣田之主抱佃輸租歲或荒歉田主必當割他租以補他租既竭歸于耕夫耕夫逃亡歸于鄉役可謂獲近效而忘逺慮自漢以来納粟補官歴代循用翰粟既微補爵亦輕不足以動豪民臣宜以為由尚書省樞密院吏員為出身㝎品格立止法則大家相胥以勸可以立辦粟可無糴楮可減造矣疏入相大怒言者急擊去而公風節言論著江表公諱應合字淳叟七歲授詩書通習大義年七父如翼贈朝奉郎母胡氏贈安人相繼即世逮事王父友賢以卓行稱宋寧宗朝嘗旌其閭書棣華扁以賜號為棣華周氏嘗從棣華君至近郊望邑有火光亟返奉安人柩入祠堂袖神主以出王父竒之紹㝎四年詞賦應鄉書不中始悔曰吾安能事雕刻乃學春秋經結廬湥密揬微索幽從者益衆淳祐九年應試兩浙轉運司果冠諸生十年有㫖試轉運司者入别院復在首選授江陵府府學教授待次歸里授生徒曲為講説㑹歲饑首率鄉黨立三事一曰貸貧民二曰濟疾苦三曰賑游末包公恢記曰是三者足補義社倉之未􅇱十三年官江陵首講孟子曰壯者以暇日􅁱其孝弟忠信此凢民也士無一日而不􅁱士不當以壯幼論師友言行去其偏黨據㑹立要學者湥徳之創鄉射齋申勵武􅇱别立凢例以􅁱郡乘趙丞相葵雅知名㑹宣撫荆湖辟為元寮以志書未成辭馬公光祖帥荆湖師援䕫路俾為屬主贊畫蜀事益急詔趣馬公援蜀馬公聽羣議不決公獨贊進師乃解開慶二年馬公帥􅆓江復佐江東兼長明道書院淳公嗣乆絶詢諸池陽得五世孫偃孫以主奉稡二程遺語若干卷復以馬公命為新金陵志自史館歸外補通判饒州後攝郡事決疑剖姦絶煩擾催督部使者争薦之咸淳三年主管華州雲䑓觀四年通判寧國府其治如畨而補其前逋復攝郡事大􅁱學宮除輸苗之不便於民復梅都官諸孫斥豪禁吏人不敢以犯湘帥汪公立信舊同寮奏辟通判潭州兼叅議官丞相審治行自諸賢交章無虚歲亦欲俾出門下諭意長沙母行公不可相聞益怒㑹江文忠公在相位以國子監簿進擬亟命御史李珏褫劾徳祐元年登極恩復官是歲賈相兵敗走維揚起守寧國江西以瑞缺守辟知瑞州將治兵為固圉計與帥議不合劾去素善訓子長子天􅂹年六歲敏記誦宋有童子科㑭習之年十一以能文詞舉後登上第人取以為法寰宇合一天􅂹守吉州迎以養卻甘茹蔬感慨遁迹人不知太守為有父至元十七年卒年六十有八眉山程尚書公許嘗語曰君理義則濓溪章表佀平園以溪園自號為宜維周氏籍㑹稽唐以憲銜官鎮遏江州曰勍為御史中丞銀青光禄大夫因家江州六世孫曰師教訓生徒里人稱曰一經居士又三世曰昌元妣胡氏是生棣華君子男四長即天􅂹次天􅍑天鳳天龍女適朝奉郎經略叅議官呉疇吉州教授劉明仲從仕郎潭州路湘隂令冷頥孫孫男十二志道某官志仁志徳志學志義志立志逺志禮志行志敏志伊志崇曽孫男十六女二四世孫十有八五世孫三娶王氏繼萬氏俱封安人某葬在吉水縣同水鄉臻善里鷓鴣山之原天鳳幼歲入官熟昔時言行罔缺軼桷􅇱翰苑屬與之言論傾倒身履目接人則曰官簿不足恃久而曰彼兩家不可輕桷投紱歸里强使校文天鳳以泉州推官同在院未幾桷以喪子歸天鳳請銘銘曰蹇蹇史君内剛以文察其要機叩于帝閽䝉耻冒功厥腥四聞我后不知惟相之云佐郡未幾輙劾以去冥心委順不懼伊沮山鑱野刻勤彼纂組謂宜掌制命則不遇教子有謨見其提符我實故臣逃空以娯叔也秉文庭誥靡渝詵詵者孫冠佩是佀宦若不偶名則罔替昭銘松阡以告良史有元故贈中憲大夫中書吏部侍郎騎都尉陳留郡伯郭公神道碑銘大徳十一年桷再入翰苑郭侯郁文卿時為江浙行省都事獲締交焉見其受易學于侯先生得見尊公于庭下延祐五年文卿為中書檢校余時直集賢来往益密而其尊公正席危坐凢辱交于文卿者咸執弟子禮嘗聆其言曰吾兒幸竊禄位不敢以自喜其所行事未嘗不察其指要而足以垂後者亦將以示吾子若孫居吾語子焉始兒以吏能及格為掾都省㝎水縣門計功以便民民不敢謾而官費以省晉山荐饑且疾疫親㦄其家去偽冒為善藥以治得活者三千人為宣徽都事行省都事句稽奉公增餼羊若干而浚役于松江者去其工直十有六萬石吾懼其瘠于民也民不以病是則吾之所湥喜也于時衞府調卒萬五千至都城計其往復俾俱以九月集白子省大臣大臣許之至則器甲精鋭士馬肅給為諸省冠其餘稽工㑹程而不志苛刻於余諸孫良有望矣其在浮梁也迎余以養見其治學宮立鄉校廣弟子員知余後裔之必有以儒術顯者矣公之語於余者知其嗣必昌也公飲酒不亂道金朝遺老行事猶能反復感慨鄉人尊爲隱君是年八月卒于京師得年七十有六公諱天祐字祐之世居汴梁封丘縣吕村祖進考誠嘗職民千夫長娶林氏汴􅆝爲金遷都兵逼野處僑居大名大帥器之因以長千夫郭氏大墓數十兵亂蹂藉不可攷而新塚猶存三房審其爲大家眀矣延祐六年八月某日葬于先塋郁爲浮梁州以大賚恩進封奉政大夫知宜興州驍騎尉延祐七年郁授中順大夫知高郵府至治三年授中憲大夫同知兩浙都轉運鹽使司事泰㝎元年授亞中大夫僉江西河東道肅政亷訪司事二年七月贈公中憲大夫中書吏部侍郎騎都尉陳留郡伯未幾郁改授慶元路緫管桷嘗以謂貴顯之及於親必原於逺祖親榮矣而考其若子之行事是猶望於後也自侍郎之無禄亞中公四㦄要官桷略其治狀以侍郎之言為可證豐功茂徳見於去思誠不在是也配李氏累贈陳留郡君公男四長亞中次迪嘗為錢榖官厚海道運糧萬户府百户仁以黄陂主簿今為江浙行省掾郁娶孫氏封陳留郡君子三澍渥國子生夀蚤卒迪娶崔氏子三厚娶崔氏子四仁娶孫氏亞中来乞銘銘曰大梁之區厄為兵墟層城鬱峩以薙以鋤維郭氏先㦄有譜圖迢迢郭公在唐紫朱吏部有謙弗克以居以其先聞維訓菑畬味道養齡擊鮮以娯治官莅民考于庭趨大樸弗雕盛徳莫踰維公有子克遵令謨述銘孔昭勿替勿渝王氏先塋碑銘延祐四年中書左丞王公出為江浙省右丞將行天子遣使由上京傳㫖曰毅其勿行七月拜中書省平章政事由是推恩如令式得贈其曽祖為正奉大夫山東東西道宣慰使上護軍魯郡公妣周氏魯郡夫人於是平章拜命惕然有言曰維我祖蓄徳閟華慶貽孫曽稚昧實蔑克稱天子寵綏于臣子厥亦赫􅌋願叙先徳以收合宗譜子職在太史為我表而銘之桷謝不得辭謹按郡公名汜世家徳州平原金将亾士族奔播南徙郡公有子全甫七􅀊随從母走亳州稍長壻田氏由須城鄆城三徙後占籍汶上晚􅀊甞謂子曰吾㓜罹兵凶僅能記我考妣名字遺諜舊事不復省今祖墓在平原郭東北五十里曰水務鎮我死力不能歸葬若等母忘平原也今以平章累贈資徳大夫江浙等䖏行中書省右丞魯國公公二子長田玉次曰傑二女嫁張氏葛氏玉嘗一試吏輙謝去謙約無表襮策杖鄉社通慶弔煦煦無憊意今年八十有四以榮禄大夫河南江北等處行中書省平章政事柱國魯國公致政于家始平章以詹事歸養魯公曰聖天子軫齒召至渥我雖耄尚善飯汝不效犬馬報居家何為也又附詔使奏曰不佞老臣骸骨堅且强謹遣臣毅一心事陛下上大喜特授集賢學士資徳大夫其配郭氏朱氏封魯郡夫人後以推恩進郡公訖封魯公魯公子三人長平章平章子思恭思齊思聖思誠思明次子謙謙子思禮思義幼子鼎鼎子思道思問曰傑魯公弟也子四人愿讓諒懋傑孫思正思進思忠思温思益噫平原之墓由郡公得封今始有表焉郡公之若祖若父名字弗可考隆然兆域則皆在其上而諸孫之與平章同高祖者凢四房猶在平原居平章振興于百年之後因郡公之追榮合譜繫族俾五世之本支横列㫄附將使之孝謹自將益昌其祖可謂厚也已銘曰畇畇平原土墳宅舒民用泰寧聿勤佃漁自河雲奔邑屋播逋有孌者雛宵衣走途九折其行益南以趨由毫投汶靡㝎厥止税于須城客鄆以俟復還于汶以鏄以耜望彼北河有隆坡陀企焉音容戰兢弗磨衡門之棲韜精養和曰我此有籍我墓伊何戒而孫子勿忘勿圯番番魯公樂道趾媺允也魯公不衒以試蓺而黍稷亦有魴鯉遨嬉大耋訖用燾祉䔍生辨章爲國之梁夸毗弗師佩瑀秉璋諤諤藎言百壬避剛始事東宮岌高傴讓告疾遄歸厥聲四揚魯公在堂曰汝来庭國恩靡效慎其寐興汝車疾驅我餬斯寧鴻化惟幾靖希隆平勿忿以媢勿喜以矜帝曰汝嘉庸遏南征乃晉平章衮衣具榮視品追秩三世是錫平原之塋松柏茂植維高維曽爰朂懿徳寸雲敷功下土霈澤嬋嫣祖芬肅爾承翼合宗别支秩秩母紊瞻彼中林王氏之本匪祖曷思匪譜孰辨春秋墓門蟄蟄在巘紹聞象賢繩武以昌平章之心孝思不忘刻銘先塋久載用光邢氏先塋碑邢氏世居彰徳安陽之交口村金亡大姓散走譜諜塚墓軼塞率高曽莫能考名字維邢由酒使君始著君諱植字子實幼隨父母竄䖏林谷親疫死從兄林歸里力樹蓺自給厚徳卑讓以先業奉其兄後居城中蓄善貨取贏頗以財自振尚義急賑兄無子訖盡力治生死每日嗇用近禮愛物近仁執信守常吾何慊焉坐肆中有客數人貿縑於肆者罷肆縑有白金遺焉追客莫及明日客至君先授之客曰果有遺不意在君所誠大長者相謝以去庚戌歲大災郡蕭侯率民擕綆缶力用命不可滅至君舎乃反風侯敬禮之始以推擇為酒使歲終第籍上府窶户無所納乃悉以已財補輸之書劵於君者毁不問後不肎仕鄉閭化之至元二十四年三月二十有二日以夀卒于家年九十有六初娶李氏繼楊氏李生子曰徳裕字裕卿風度皎峻展君所行整暢為儒吏擢本路録事路􅀠某王分土俾復為酒使至元四年銓選格行授將仕郎博州路録事遷潞州判官再遷從仕郎陽翟縣尹又遷承事郎藁城縣尹其涖博州調征南軍不使富民委役於貧潞州有疑獄立剖之而讞陽翟獄尤著民王氏有婢竊其簪珥酒壺以逃盜不可得詿誤相連坐乃密詢其素所徃来或曰王氏姪誘婢他之度不可俱行因殺之以利財後卒獲其姪一訊輙引服縣人大驚爭持酒殽以賀在藁城㑹真㝎無極縣軍隊長匿戍卒鏹二萬五千緡詒言室中夜遇盜告于官三年不能獲捕盜官多受罪挾疑佀坐獄者三十餘人府以白樞密院咸曰是能決陽翟疑獄者檄君以問入其室左右視驗實無有盜跡呼其孥二人别居之所對皆異辭遂直入其室發床下軍鏹咸在即日獄具而君以二十九年六月一日卒于官年六十有七初配王氏再配郭氏皆葬于交口之祖塋有子五人長曰秉仁字仁甫曰秉義某官曰秉禮曰秉智某官曰秉信女四人皆適士族孫七人女孫七人仁甫始由憲司筮仕入掾臺省兩為太醫院行省都事鐡冶正副提舉一再為二千石治撫州興學禮士盜不敢入境治廣平亦以善理寃獄有能名郡民立去思碑以祝之今以嘉議大夫禮部尚書􅆀仕于家而藁城君卒以尚書為提舉時推恩得贈朝列大夫􅀐都尉河間郡伯王氏郭氏皆封河間郡太君尚書之長子温字孟直更迭省部由御史徧㦄中書左司官諳習故事而克謙慎􅁱以禮度自䖏今授亞中大夫大名路緫管􅀅之官致尚書公之命曰父子俱受朝廷殊遇列三品夙夜兢惕實為先徳渟蓄再世以昌愳後人徒知邢氏之盛而莫知二祖之勗善培本者若是願刻諸墓上因子銘以昭示于後乃銘曰雲雷之交經綸靡寧上降下騰甲坼是承劬儉于躬不企其成蓄極斯泰奕奕振亨折獄揬情罔用口才嗇以裕衆兹維艱哉維子維孫享其胚胎仰俯橋梓播美益培霜􅀨濡降永思彌䖍詔而後昆絜其簋籩仕以飭身止以樂全過者必式兹為邢氏厚徳之阡任氏先塋碑銘青齊由尚父啟封土沃民阜擅魚鹽之利山水險阨雄偉冠鄰壤昔時宰輔願優逸自便者爭乞守是土勝概見於職方氏數千年盛矣劉豫猊父子背宋以千里赤子驅為兵徒犯順滅徳金主悟其元惡傳㫖就戮而青齊户口物故過半完聚未幾李璮復懷逆抗拒齊部所領益莽為墟落痛矣哉任姓世著滕州傳緒益逺有元帥府君諱杞以宏諱府君為逺祖葬于薛河源宏有七子擢文武科墓碑燬落今由元帥府君始可譜府君娶王氏二子長曰鋭金武舉進士終千夫長次曰釗字某某幼長戈革䔍考古今成敗以進取自任鬱不得志持素所講習訓導鄉黨陳義抑惡片言緫榮耻薰受以化咸曰繄任公所成就郡縣以其行舉于朝辟行軍緫管再舉沂州臨沂令皆謝疾不就始由沂州歸于滕築室祖墓一日蔓火燎于野逼墓次公號泣伏墓所有頃火由它行郡嘗上其事府君曰吾得歸故里守丘隴奚外慕焉美鬢善容倜儻以隱逸自傲至元二十四年九月六日年八十有一卒以孫貴贈樂安郡伯娶周氏贈樂安郡君三子長曰榮曰滋曰英榮由元帥府知事陞閩海道提刑按察司經㦄以不樂入嶺嶠改授廬州嘉興緫管府知事善心計仕泊如也以子貴贈某官樂安郡侯娶單氏贈樂安郡君生子四長曰居敬善吏事所至有能名為建康般陽路緫管今以通議大夫禮部尚書致仕娶王氏樂安郡夫人尚書子擇善承務郎樞密院都事執善江南諸道行御史臺譯從事女三孫三曽孫三曽孫女一曰居禮房娶李氏七子師善中政院管庫兼善泰寧路司獄思善蚤世明善進善悦善從善始學仕曰居仁房居仁為鷹房緫管府經㦄娶王氏馬氏志善適善達善宗善曰居義房娶丁氏伯善性善友善合子孫與曽孫四十一人郡伯次子曰滋房娶李氏生子四居安居信居寛居合孫與女二十一人郡伯季子曰英房四子居實居慶居厚居徳合子女十人嗚呼由府君至于今凢五世通其譜幾百人世莫可儷豈非其孝感于鬼神蓄極以通故仕者振于朝而其未仕者各相勉思䋲祖武以自顯匪表于墓則曷以彰盛徳擇善湥湛雅思見事不苟與桷同􅇱屬翰苑厚善而尚書亦屢瞻其儀度俾有述焉奚敢辭銘曰滕薛之間任國首封傳於東都齒秩有崇禮食是問邈其遺風泱泱三齊絲枲沃豐執智秉機厥俗攸同允也府君厄於兵囏閱詳興衰訓言閒閒左閭右塾化其慆姦隱身墓廬以號以攀仕不强希榮耻莫干雲蔵靈淵磅礴蓊欝朝躋于陵百谷瀰溢徳盛莫居子孫秩秩聿来墓門展祀芬苾叙昭辨穆孝謹罔失清容居士集卷第二十七
