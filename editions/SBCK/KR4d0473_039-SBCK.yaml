  text: 清容居士集卷第三十九
  hash: sha256:9d17807ce186d433faccda0467a6d8b9bc7748a99a3b11eb33c917c309daa520
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_039-1a}
body:
  text: 啓上王尚書伏以瞻望聲容幸有登龍之舊披陳悃愊慙無吐鳯之長圗鼓勇之新功冀鑄頑扵大造掃門受業椷櫝致詞切念桷生不逢時長始知學伶俜素緒綺襦紈袴之習無聞零落青編簡漆汗書之蔵曷見久知我軰固當投之濁流靖念斯文豈宜束之髙閣操觚而歎詎秉異心倚柱而歌終持正色胸臆結約肝膽輪囷惟其用拙扵今将欲修名扵後載惟宏博世號殊科夷考哲賢咸稱異數當紹聖之首創盖以窮經為先至大觀之重删乃因代言而設唐朝疎略故退之自笑其俳優宋制精詳至文公欲加以深厚維較藝扵詞苑杳若探丸雖置身扵書林悉同畫餅茍非討論扵暇日孰能敷奏扵一時爰取舊規各成要覽涑水之尚徳筆纂金桴義山之好竒文編玉府初學記資騷人之属對稽古編假進士之試文博要之粹扵丁年統類之塵扵乙夜斯皆品節之效可為區别之模然獨此書實難其例千門萬户恍焉莫知所之六律五音聞之不喻其意至若寝門路鼓遂成君子之欺御庫神弓終藉老兵之對望洋之歎浩浩測海之智一物不知過亦多矣兩端而竭耻莫甚焉信知梓慶之巧専益訝庖丁之技異伏惟内翰尚書先生南州元老故國重臣望壓縉紳聊復浮湛扵閭里文驚華夏未妨談笑扵江湖耻申公之蒲輪便管寜之紗㡌樹人為急奨士尤先子誠齊人侈以都邑之富波及􅀳􅀦化其潢汙之卑是用忘揣顓蒙惠徼恩育鉤玄提要在眀公為壯􅀊之筌蹄糾繆繩愆扵後生為百世之模範儻獲書傳扵琬琰尤當􅊞蔵扵巾箱與汝共之㴱議中郎之隘非吾徒也尚祈夫子之憐欲報無􅀙未言先愧謝王尚書拔叔度扵㓜童㴱慙非偶執李膺之下御竊喜同時敢縁擁篲之恭庸致摳衣之請衮褒語重茅塞心開伏念桷才實滯頑心尤退縮經箱塵寂莫逃家丞庶子之譏藝苑雲蒸誠駭翰林客卿之對深恐凋零扵冷譜固嘗論索扵陳編志不能以過人識不足以廣問戴盆望日勤無補扵三餘坐井窺天智有鄰扵五技衡門感歎斗室屏營然而切觀盤盂之書致戒必謹韋􅁌之義繕性尤深茍非取則扵古經曷足振名扵来世虚心實腹學始類扵安弦閑邪存誠念實同扵執玉反觀典學之成訓爰採遜志之嘉名輙布請祈方虞僣躐豈駑駘已下尚希一顧之功然爰居何知遽享九奏之禮寒窗展玩絢兮虹蜺之章素壁髙張森然神鬼之䕶論深藥石字重璠璵已三復而吝消終九思而感併此盖伏遇某官言為楷範道藴經綸化閭里之澆風愍簮纓之弱息至誠樂易許傳新著之書雅量恢􅀪不棄一偏之士遂令少賤屢獲親承桷敢不躬勵前聞仰稱春秋之筆恪遵眀訓益加嵗月之功永依師門以堅壮志與陳無我論樂府伏承下教垂示雅詞退揆踈蕪敢居品藻復縁眀命之重庸誦謏聞之迂執筆靦慙通函傴伏切以陽春白雪之唱和者固希清廟朱弦之音知之尤寡㦄觀樂府之傑出悉為詞林之緒餘良由萬物變化之愈多抑使五采章施之匪易龍文被寶鼎雕刻益精天馬駕鼓車低徊滋窘貫珠之音空在累黍之器莫傳吐角含商孰分其清濁析宫合徴莫辨其短長俚歌日煩古調㡬廢留連桃葉習晉世之風流淒切竹枝傳巴人之羇旅江南腸斷之句誰足近之涼州意外之聲今無是也風聲鳥葉當由動植之可通霓裳羽衣徒詫神竒而自􅅭捨陽關三疊之清怨變南鄉九闋之狹邪樂意生香寫天機之妙理山光水色換俗子之凡容彼誇刻鵠之工詎悟承蜩之解精義無二至道不煩靖言思之孰可繼者伏惟無我學士詞華泉湧言吐氷清飛星急羽之秋文傾上幕投綸沈鉤之暇興滿南山每希白石道人之雅聲以成黄絹幼婦之佳制雪兒低唱未多學士之風髙墨客廣傳益見咸陽之紙貴桷尊聞唯謹快覩尤先用鹽洗金殊未眀扵物理以蠡測海徒竊笑其心思狂斐莫裁涵容斯幸回宗人袁慶逺教授同源分流夙感陶公之詠劬躬燾後每懐韓子之碑均此靈根褎然望姓切以經術基扵博士衣冠盛扵司空名節為天下髙言非其過歌詩著先人跡時與之俱念鼻祖嘗客扵上虞而耳孫分胙扵越土定居鄞水占籍開封西湖之佐蘇公風流儼在眀招而從太史文獻有傳光于淳熈錮在嘉泰父子同館繼廣受之美談師生竝朝陋禹宣之異禮京兆踵河南尹之祖武成均慕光禄公之家聲藐焉遺孤承此􅀇胄正倫之妬諸杜鑿地何心子雲之亡它楊泝江有考車書一致江海相逢豈無它人因以合譜伏維教授學士摛詞展世敬業守儒謂鄧林之廣敷本扵一木探崑崙之無底散作群川田歸扵齊良非得已爰絶扵漢或曰未然驗賦形之不齊審受氏之有自處祧唯謹繫世是嚴然而内舉避親昔者之邉幅合族戒令先王之凖繩愧鷽鳩之圗南憫騏􅂹之伏􅌴羲之之别王述趣乃不同康樂之愛謝荘心誠有得桷偶縁鉛槧久汙絲綸傳呼欣大小戴之稱臭味鄙南北阮之騃蔀室而得眀月當道而逢夜光百世不遷揆宗支之非逺異姓為後幸譜牒之可通敦叙攸同參承伊始永懐繾綣曷罄敷陳謝閻學士東觀英游乆欽諸老南州俚士獨守陳編念相望之逈然知無因而至爾何期銓鑒俾預薦揚惟清切之司存實作成扵俊乂王言之制曰七史官之長有三風動四方必訓詞之温雅詔垂萬世在書法之簡嚴維班馬之良不能繼獲麟之筆而燕許之體難以推􅀝馬之才藝不兩能物無全美筆則筆削則削非曲學之可為見􅀁見聞􅀁聞恐直情而難致古有斗米而作傳近多千金以致詞好惡成一已之私褎貶失當時之實掩長卷以竊歎抱遺經而自娛故魏収以輕薄寡才咸稱穢史王通雖隠淪不仕獨著元經方今偉績無前太平有象大禮略封禪之記純誠汰郊丘之儀聲教萬邦文質二代追皇猷創業之永傳丕基嗣服之初必属鴻文以揚駿徳彰施作繪極妙巧扵羣工雜比成音合天和扵衆耳拔犀之選非易聚毛之長亦難如桷者學不逮人志徒師古獻漢家三雍之頌庶或可能續周書王㑹之篇良非所任揆小材之雕鏤幸大冶之作成忘其顓蒙倍以踊躍兹盖伏遇某官儒林冠冕文藪凖繩桃李不言以成衆芳之春松柏後彫而貫四時之氣官僚慎簡載籍肇新争名扵朝難後来之居上脩身以道匪平進以依流深虞同升之譏上辱大賢之舉幸相知扵氣味迄無假扵聲容桷敢不益勵討論上酬奨拔求識李邕之面當已有期效彈貢禹之冠不㡬扵贅因風輸感執筆寫情嵗律云更神休所屆庸致茵憑之禱密調鼎鼐之和賀鄧善之應奉兹審講徹皋比班登龍尾早居三字極鉛槧之光榮爰作一經萃縑緗之芳潤朝端色動江左文眀切以詞章之體與政相通禮樂之宜随時斯舉誠少近古于以酌今釋訓聱牙固難返殷周之盛委心綺靡殆有鄰齊梁之風山東之詔令温然河西之璽書炳在往者諸賢不競故先云亡掇拾成言編聫賸語形模近巧難逃脱􅜘之譏刻畫傷和殊近鏤氷之累徒畫虎以類狗強令鶩而随雞事非偶然時使之爾念欲復還其正氣抑嘗深探扵陳編然而木人石腸難以語經綸之事河目海口要當歸黼黻之才請誦所聞無出其右伏惟某官清言古瑟雅製方壺冶百鍊之金而成雲雷之竒合八珍之味以調薑桂之美當下帷之多暇每傾盖而劇談意得忘筌神閒䑛筆船容萬斛果自致扵水中芝産九莖宜載歌扵殿内夙嘗相勉今匪共諛桷倚馬才疎屠龍技謬歸来之詞莫擬遂初之賦或尋話茅舍扵玉堂當廑逺想謹蔗漿扵金盌冀保天和傾向之忱敷陳莫既夀鄭潜庵兹審玉宇金眀蓬壺瑞藹數環六甲堯年已合扵上元福擁三壬申旦適同扵洊九江湖相慶樽俎交歡伏惟内翰學士鬱鬱澗松昻昻野鶴辨排堅白共誇麈尾之清言書喜硬黄猶習蠅頭之細字方窮太始之理以與造物者游陋絳縣老人之年讀清溪道士之易踏龜殻而一笑持蟹螯以髙歌夢繞故園夀客相期扵晚嵗情親近局麯生肎負扵良辰桷傾接維新扳援實舊黄絹㓜婦之詞莫擬子墨客卿之賦未能八千嵗為秋願致長生之祝六十飬扵國佇看優禮之加薄物助誠副椷凟聽回交代潘檢閲誦子墨客卿之賦竊有􅈭昂聆諸老先生之言深相推挽審珠玉之將至愧糠粃之在前慶牘未遑巽函先枉伏惟内翰學士冰壺貯月水鑑懸秋下帷授徒有矻矻窮年之趣閉門樂道無憫憫望嵗之憂追北渚之歗歌覽東齊之形勝斧藻樸素丹青炳靈相如封禪之書直譏其陋賈誼治安之䇿允謂可侔濯纓益振其髙風結綬良非其雅志金馬門之待詔有類俳諧白虎觀之談經亦㡬糅雜維兹册府亶號詞林寶書如山汗簡若束方偃武修文之盛乃立經陳紀之初候日影扵松階詞容潤色瞻天威扵芝閣議許討論匪慎簡扵英髦曷専美扵治世除書一下輿論僉諧桷學匪適今才不逮古重以簮纓之舊猶工鉛槧之勤泉石寫心比元郎之漫仕山川感興追杜老之壮㳺過厪㓜婦之辭重託聞孫之好有懌其㫖不知所裁回冷教授仰南州之喬木美䕃獨存望西山之慶雲英光猶在居然傾盖之幸辱以投函之謙斧藻溢情丹青炳目切以取士之岐不一用儒之道實髙賈誼少年憂國之䇿允著馬周逆旅入對之疏密諧法如牛毛賤若魚目将望然而引去寜挽之以必来方今人文交修禮樂備舉金馬碧雞之頌可被弦歌赤麟白雁之祥宜書竹帛孰爲稱選僉謂當仁伏惟賢良學士溟海扶摇清秋沆瀣圓冠方屨儼魯國之舒徐漆簡汗書補羽陵之疎略寶氣横鬱天葩芬竒方按軌以徐行羞登途而捷進青氊舊物行廣髙門白水同心益窺雅志幸雲龍之有應成針芥之相投遺以十朋之龜貴若連城之璧有味其㫖固難和扵大羮無徳以将敢亟酬扵雜佩銘膺感幸占對簡蕪賀吳編修兹審疏青汗簡錫寵身章史官之具三長英髦慎簡聖經之法五始盛事特書荷針芥之偶投慶雲龍之胥㑹編修内翰篤志精白結交老蒼審黄鐘扵希聲灼知律吕嗜昌歜之古味允適酸鹹維懐寶而深蔵終待價而一試筆耕云舊學殖焉窮桷師友川流獻文日墜喜而不寐類文子之同升樂以忘憂慨宣尼扵往昔斐然賛美蔑以效規夀貢仲章月暈虹蜺藹南漪之五色春浮花桺揆東作之平分孕彼玉人瑞兹寶運伏惟某官池塘逸興金石流波懸弧表四方之心逺游結駟落筆擬千古之作長歗彈冠愛東方之偷桃専北門而視草盖将旬五日而後返抑亦一千􅀊以来歸桷善頌莫陳雅㳺屢接沈香亭北行催芍藥之詞白玉堂前愧伴梅花之直薄儀侑祝副穎瀆清賀鄧善之􅁱譔伏審儒林著望詞苑貪賢超近署之清班贊中朝之元化光膺異數􅁢際重熙敢縁肺腑之私庸寫胷臆之藴切以王言之制始分於唐人文之精特盛扵宋故便扵宣讀者必資諧叶而直以訓告者當務簡嚴作者數公流為末􅂀學疎而才勝每師浩汗而失扵麤疏記贍而思遲必慕敷腴而拙扵裁翦鳬鶴不續蕭蘭莫分盖洗金以鹽當研物理而攻玉必石有假朋從厯年滋多此道不競蔵名淵黙莫窮龍虎之變騰處友善柔徒欣牛馬之奔走望風随其臧否疾才摭其短長有符東晉之清談自謂西都之舊作昔君實不為四六語未嘗失朝廷之尊而温伯􅂺草廿二麻豈害為錢穀之吏必此為士其何敢言然作新斯文是在吾黨復古之道誠惟今兹起八代之衰昌黎固専其事振五季之弊師魯亦預有功樂在羣居道無孤立伏惟修譔學士丰姿凝湛雅量韜深大音希聲儼一獻九奏之意􅀇酒不和成百拜三行之儀中和養其本根英華發扵情性譬若夜光眀月衆咸以為寳珍方之威鳯祥麟人莫窺其形状陳太丘之容衆王茂􅀪之盡懽以為黼黻帝猷曷􅂑竟寜之事丹青神化獨追正始之音桷㓜講門功早親庭誥探諸老之源委不知者謂得異書道前賢之心期無聞者猶譏曲説懼廢三槐之緒聊希五栁之恬為可汰之技官守不求之樸論要蘄傳後寜望叙遷欣覩除書缺修賀記幸燈火平生之舊道江湖相忘之言人皆曰賢亦既遂彈冠之願老而能學當益思炳燭之勤敢效頌規斯為處與囘趙太社㐲以豎燎扶朝陽之光敢居斧藻贈貂得眀月之報庸謹襲緹三復先猷重陳素欵切以屬辭比事匪遵魯史之舊文微顯闡幽允正周王之大統無傳而著惟道是眀然而獲麟之箋有鄰神怪矢魚之訓詎止觀陳紛然賣餅之譏蕞爾垂旒之喻泥天正扵長曆循夏五之闕文郊用辛而非長日之時禘尊祖而雜圜丘之謬清言何補墨守徒矜投膠澄百尺之渾引髪舉千鈞之重首勲啖趙心學邵程義理精眀賴先儒之啓迪權衡輕重資前哲之賛揚嘗窺西周之簡編深陋後王之典禮致太平者猶有羣議言五伯者殆無全人廢學熈寜卒致爲我之歎尊王慶曆遂多刻吏之嘲人物眇然年運而往伏惟大尹學士山林圭組燈火詩書返袂髙歌法天時扵五始下帷坐授悟人事扵三微載惟先正細氊奏對之書是爲後學青箱纂輯之式集狐扵腋端有假扵翼成洗金以鹽良永慙扵瘢索桷困學有志强仕無功百年雁塔之聫登季世龍門之末至欒胥皁􅀠捫心有感扵同時管鮑交朋掉首未逢扵知已翕然針芥終以絲蘿萬二千五百家為鄉豈無好學二百四十餘年行事聿覩成書擁篲以陳袖函非禮尚祈矜采俯賜鑒融囘趙太社鄉飲習鄉上齒咸推大里之典刑隆禮尊賢幸屬貞元之耆舊矧蟬冕三公之地在皋比一變之功人物眇然年運已往扵粲雙魚之牘孔昭二馬之期入學祭典修願廣太平之盛觀升歌主人獻敢随後進以同登回趙太社切以百人逐免祗益苦心一朝解牛敢煩敏手念洛社久存扵鄉約而杜陵􅂉廢其家聲宰肉莫均㧞毛不與仰止金刀之禮樂陳兹典午之春秋無以易堯不如歸趙粲飛函而禮讓堅縮裏以勞謙君子是憂貪人斯幸潛魚畏餌雖自潔扵水中羣蟻慕氊卒相縁扵堂上其為計則得矣獨竊議其可乎難以立談終祈臥治匏五石而無用其果不能粟萬鍾以何加頋兹可陋僉謀懇切童瀆矜融夀徐徳剛八日七月涼生兎子瑞應麟兒􅀇祖流芳嵗逺猶傳其玉硯黄姑停宴夜分端俟扵銀津家聲之克振可覘宅相之深期有在桷陳人愈拙妙語莫工望閭里之葱葱阻舟航而耿耿九五一曰夀願益窮皇極之書四十不動心矧已開中年之衮薄儀侑祝善頌増情謝程承㫖爵人扵朝已甘遜避譽髦斯士忽被選掄小已惟驚大鈞有自切以王言之制炳若日星帝令之行潤如風雨三代訓誥誓命之作理雖同而體實殊累聖􅀊月日時之編事若近而書貴􅇱簡嚴足以成信史清切然後為人才非甚長藝莫能擅皇眀啓御文治興圖漆書汗簡之竒来者不絶金泥玉檢之陋却而未遑寬大之詔數頒遺逸之聘屢舉宜得鴻碩以贊雍熈大鵬乗風乃鷽鳩之斯集長鯨失水頋螻螘之所凌憫涇渭之孰分慨薰蕕而同置拾芥而取青紫彼謂不難相馬而視􅀇黄曷云有遇炙手可熱涌氣如山生能齊言豈荘嶽之所變耻與噲伍何淮隂之過髙惟末俗之寔繁斯南士之不競離眀有照渙汗聿新鍊金扵陶冶之餘煮海扵剛鹵之後聚毛雖氄擢象是精懸水鏡扵廟堂今兹選衆審銓衡扵臺閣夙已簡僚閭巷駭聞江湖翹首桷之不佞人能具言性褊介而弗通學固陋而無補少承諸老欲窺龍馬之祕圗晚效一官深愧蟲魚之曲學守西樞之遺緒望北門之後塵待坐松階占對或言其可教散襟茅宇倚歌人數其太迂雖慙殺青之工僅免尸素之誚既云美解寜敢强留蒼狗浮雲幸逃物論白駒過隙謂失事機蠖久屈以奚伸鴻已飛而何慕私以恤緯之諛見敢言出綍之舊章知之非艱試可乃已泛觀唐世厯攷宋朝元白才髙必授題而方拜歐蘇望重免給札以即真誰謂秦無請從隗始惟智行其無事扵人何所不容然而争進駢肩一兎詎堪其百逐旁觀裏手前禽終失扵三驅彼非招而不来羌奚為而遽集議由鴟閣功在鑾坡此盖伏遇某官間世宗工先朝元老文諧律吕八音振而四懸成智合蓍龜六虚周而三極建既任棟梁之重彌深參术之儲謂立賢無方當視朔南之員幅凡成人有徳豈拘州里之逺遐夾袋初謄青氊已復桷蒙恩若是圖報謂何欲酬國士之知願假客卿之對承眀三入莫能書赤麟白雁之祥滄海重㳺要飽識紫鳯天吴之異寸心有在千穎莫殫謝李承㫖五載辤榮已安初服一朝出命遽復舊氊三已何慙重来有靦切以太史編摩之所翰林清切之司貴慎密而熟扵憲章尚精敏而逹扵事勢欲取倜儻絶羣之士将貽落魄無檢之譏茍従依違寡言之人必致脂韋不稱之弊原昔養才扵館閣之地盖當責效扵廊廟之時文治日興皇猷淵黙委諸元宰于以彰衡石之無偏詢扵輿言足以知芻蕘之可擇克謹天戒慎簡乃僚肩摩足累之徒揚鞭而避巖棲穴處之隠接淅以来矧聲教久敷扵朔南而忠信可行扵蠻貊㧞茅以彚采葑不遺有如苦窳之蹤亦預陶甄之選兹盖伏遇某官精忠貫日盛徳格天髙宗之得傅巖營求諸野成湯之扵伊尹學焉後臣彌窮成性之存存益著匪躬之蹇蹇以匡王室其代予言惟宫府一體之意深念君臣同心之㑹罕願因知己庸敢竭愚難得者非常之機易失者不次之遇方今輿地紀載悉歸于梯航觀闕㑹朝相望其冠盖東漸西被上際下蟠法過密則煩擾而不安赦愈多則姦媮之滋幸理錢穀雖號為俗吏當究其出納之源議禮樂實本扵儒生孰眀其沿革之理同風俗以合志尚敦朴素以去竒衺言舉斯心可運諸掌然文盛必有武弊而陽長尤懼隂来積薪憂燃非賈誼之過計前籌借箸乃張良之逺謀和羮難壹其酸鹹成錦易工其萋斐有懸髙鑒奚假諛言桷累世詩書百年簮笏與銅臭而同傳敢謂未然為瓦注以自怡不㡬扵佀當朱門炙手之日乃清林散髪之秋著書期身後之名擊缶遂山中之樂恩蒙乗傳非所據以屏營技止操觚将何為而報謝念承眀三入而奚補望天門九重而莫通大書特書執筆難施扵青簡一命再命循牆深愧扵素餐曷稱奨提惟肩樸直玉堂獨掩恍江南送客之情懐衡宇載瞻形稚子候門之夢寐願安静退以盡感藏賀曽提舉兹審望領儒先道光王化宣尼乗桴之意豈果居夷㓜安度遼而還殆将易俗登􅌡可俟艤舟以須伏惟某官妙思春雲壮懐秋水掣鯨魚而游員嶠竒觀畢陳踞龜殻以挹浮丘妙言合奏身寄神京之陸海胸蔵東壁之木天允議居中詎宜補外桷屠龍技拙倚馬才疎詭御以告王良則云豈敢執鞭而慕晏子尚或可能不腆儀羞無文敬在招俞光逺入塾七嵗入小學㓜儀㴱著扵曲臺三年通一經俚諺敢誇扵東魯先猷滋逺頴識無聞空多老翁不量力之譏莫慰大賢願汝為之意伏惟教授學士砭頑妙手注巧良模樂矣誨人陋孫寳之避舍幡然就道知李耳之入闗談經排狗曲之嘲挟䇿耻兔園之固以身徇道初何愧扵古先辤富居貧益有覘扵雅量尚煩負劍辟咡之訓以成灑埽應對之儀虚左以迎側躬而俟清容居士集卷第三十九
