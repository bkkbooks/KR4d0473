  text: 清容居士集卷第九
  hash: sha256:e01163bf922518eca748de6225bd4524040dfbb339cfc75ab89cc46d7b9ec06c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_009-1a}
body:
  text: 律詩五言次韻善之雜興七首習隠漸成癖苔光緑映扉避名常好好絶俗任非非日落長鑱柄天寒白苧衣南鵬五月息戢翼笑羣飛萬事不滿笑書林盡嵗娱未須夸得意底用哭窮途細雨看移竹秋風學膾鱸百年真急景醉入壁間壺昔日登臨地狂歌秪自求漢宫空有恨吳女不知愁雲葉寒沙霽江花古岸秋何人持鐵板敲徹舊邊樓學道常無寐披衣聽曉笳精勤慕栢大詭幻笑欒巴丹熟抽金汞䆫明鍊玉沙微陽端有候一㸃應吹葭契故戲及之善之近學參同卧遊元不惡佳䖏絶榮枯雲憶東西寺山看大小孤行年須白社失意付黄壚何事遼東鶴空悲景物殊鄧子清如竹蕭蕭澹世情下帷憐草色倚杖愛松聲嗜癖成書賈身窮付筆耕乗槎空有約何日海邊城書聲連古巷疑是白雲廬吟苦眠料理塵深靜破除詞華輕大曆風雅近黄初顧我相知舊艱難愧不如月黒月黑斗杓轉昬昬古栁壕干掫寒戍響窣堵亂烏􅃅風定歸潮急門深落葉髙向來江上意無語獨蕭騷次韻題林隠移家鄰縣去住久不知年花擁檐前樹泉歸澗下田丹芽承露浴石乳拾松煎擬欲題新竹才疎愧惠連次韻上官伯圭夜坐觀梅二首愛酒嫌劇飲天寒但欲眠烏啼千樹外鴈過一燈前霜角悲涼調風幡自在禪平生江海意袖手送殘年江梅元楚楚冰雪總相宜肯佐金樽舞寕辭玉笛吹天心元自正地脉本無私不盡闗山意廵檐與賦詩題柯自牧救荒記曽聞於越地千里草青青比屋呼庚癸連年厄丙丁巳傳青社記不用峴山銘近􅀃天台宅新成太祝􅈦夀髙舜元父二首喜見黄鐘月重推絳縣年雪䆫温鼎火春甕飬壷天朝市成真隠階庭擁夀僊時吟五字律獨立晚風前玩易喜心清年髙見太平杖扶靈夀穏松削飬和􅁿夜月前朝事春風九老盟初筵慙後至立雪捧深觥打灘老石太古色遊魚新水姿輕冰養流汞急瀑散飛碁角力誰為挽臨流亦自移南來多此意北望莫相疑春陰􅄫寂春陰半南來未識花故郷憶寒食細雨摘新茶物色供詩句風沙入鬢華山林元未改客路獨鳥紗懐城南諸友二首春至長為客愁多始憶君風程江北路水驛海東雲杜宇深深怨酴醿淡淡醺行蔵曽共數不是故離羣養性深辤酒全交淺作書寧知故人厚自愧後生疎春入黄河道雲分碧鳥居江湖從浩蕩不敢愛吾廬舟中雜書五首野色連雲白春聲引樹清遊魚新浪急歸鳥片帆輕曉夢三千里風餐第㡬程萍蓬元未穏徙倚問天明挂席踈星外停舟獨栁邊團團風始陣怗怗月初􅁌隴曲沙成雪吳歌水拍天行蔵有如此把卷獨悠然春睡元無著郷心比酒醲飛花空有意小雨不成容獨樹疑新堠羣鴉似亂峯艱難憐浩蕩散髪遂初慵河落渾無底飄零總客塵春洲蘆鴈少曉户柘蠶勻京洛饒豐稔江湖樂賤貧低徊吾不恨應有故山筠桑柘斜陽道天然錦繡機雲容催溽暑花片憶春霏水落新魚瘦風清宿麥肥歸程時屈指重午試生衣淮浦淮水奔如箭舟維岸屢移㫁岡封馬鬛落鴈陣魚麗白葦前朝界青帘古戍基亂離今已矣風物漸熈熈立春日宿大清口舟中見新月二鼓雪作春月如佳士翩翩欲上船相逄疑昨日一别又新年水鏡心胷朗空輪體質全更深飛雪急直與闘清妍次韻陳剛中待制初秋二首碧樹晚雲餘秋聲入客廬知公吟蟋蟀勸我憶鱸魚宦味元無著郷心得未疎清塵滿雙鬢蕭瑟不禁梳岸幘倚書楹寒砧徹四城馬歸人獨語鴈過月初生寂寂候蟲急凄凄落葉清客懐誰與共搔首見參横送牟元通歸瀘州西州人物論翁季擅清門已暗金牛路猶傳鐵騎孫巴江雲不盡蜀嶺雪空存邂逅衣冠聚艱難得共論夜夢作詩覺因足後韻薄酒薄於水濃山濃佀春梁間雙語燕天外獨歸人細栁千重緒飛花一寸塵碧窻初睡醒新月寫清真淮隂大風極目虚無裏飄飄萬里馳飛蓬旋槖籥虚谷應塤篪春樹元無著晴雲復自持倚舟沙際穏歸鴈得相隨題溫州太守徳政詩後海郡炎歊重凉風起素秋飛蝗分界去鳴鵠下陂遊白布官租減黄甘雅詠酬兒童多好語竹馬擁君留次韻馬伯庸春思兼簡繼學二首洛花千萬朶一一為君開粟暈排金縷酥凝爛玉杯美人乗馬至僊子抱琴來莫學飛紅侣隨風喚不迴行窩春匝匝下榻望君來雙玉矜嬌思聨鏕騁逸才題詩紅袖擁傳詔錦袍迴羞殺髙眠者楊花滿緑苔送秦巖卿從事出宰北平縣髙秋右北平出宰樂時清白水前朝界黄雲舊塞城彈琴看鴈過束帶候雞鳴不盡平蕪際題詩倚馬成黄河口樓相衝今從此南流徐州城西北隅與黄河落流沙駛茫茫禹甸周昔聞傳北載今已絶東流俊鶻辭髙下輕鷗擅去留百年攵采盡日落認黄樓徐中丞母八十謝庭森玉樹漢闕賜金花懿徳傳家盛耆年舉世誇晴萱當檻直冬筍隔籬斜拭目諸孫秀翩翩佩紫緺送張滎澤歛板滎陽縣㘽花接早春水新魚子散雪釋馬蹄勻政可箋河伯何須詠洛神桑田今幾許除籍􅀘疲民贈瑛上人住洞林托鉢千巖裏松花凍未開哀猿依講席飢鳥下生臺潭影留雲定鐘聲送月回山中太古雪為寄一瓢來送周南翁集賢南歸省墓摇曳十洲僊來尋楚尾船金花榮故里石筍表新阡江橘團霜重冰魚鱠雪鮮堦前􅀟玉好行賦鹿鳴篇潞公判永興逰嵩之詩見扵翰墨然卒與右軍之逰汶大率相類名爲造物􅀁忌豈虚語㢤今見其孫璋甫佐西省甘棠遺思至是殆􅀅見之渭水落葉盡徃來餘碧鷗龍門七十里鴈塔一千秋吊古麒麟塜衝風驌驦裘寒蕪明滅䖏遮馬見君留劉氏集慶堂華構出層林春浮院宇深小桃分雜佩新燕掠鳴琴石乳千年潤松花百尺陰紫皇方問道那許遂歸心送蘇子寧和林郎中二首貂帽䕶寒沙冰天閱嵗華㫁溪駝聽水密雪犬行車雲盡難尋鴈春深未識花昔人竒絶䖏八月觧乗槎徃嵗經遊地寒蕪碧燐深雲開山後陣水咽隴頭吟雪白氊房重天青羽檄沈重華新雨露悲喜候車音蘇子寧北行詩二首出塞黄雲盡經春白雪多髙樓閒鼓角絶域靜干戈風急盤鵰嶺冰深飲馬河征鞍遲明發揮手渭城歌去去居庸道闗山冬氣深雪天孤帳宿寒月一笳吟石堞棲鴉穏沙場過雁沈粉闈多暇日歸騎有佳音吳閒閒病起二首好客頻來徃閒雲管送迎花香清病骨松籟答書聲身世三生夢乾坤萬古情故園多蕨筍歸興繞江城客散庭如水春深日似年閒心觀宇宙浮世閱風煙詩句吟難穏蒲團坐欲穿一聲松外鶴此意共悠然題蔚州郭氏永寧亭華亭絶市囂山崦映岧嶤落葉燃茶鼎長松挂酒瓢天低雲欲下春盡雪初消嵗晚無王事前村看射鵰次韻馬伯庸題凌波僊圖玉衣朝岱日寶瑟寫湘雲宛轉鸞歸憶參差鴈過聞石痕生左角松影印迴紋倚竹憐雙泣摛蘭憫自焚停驂沙磧近指㸃認昭君伯庸以詩見属次韻二首學古陳言少官清雅詠多珠玕明玉海寶鑑挹金波易賴韋編定書疑汗簡訛斯文今有託為我􅀘嘉禾聽君人物論閱世佀難多學禮師倉海傳家繼伏波看山窮北戒惜日愛南訛彩鳯非無食瓊山自有禾髙掾祖父八十心跡混漁樵門深絶市囂花前歌舊曲燈下話先朝白髮書千卷朱顔酒一瓢有孫逰玉署從此樂逍遥長春道士禱雨有應清夜轉崐崘天雷卓午聞平林千樹響古澗百泉分門靜堆黄葉山空聳白雲神功滿禾黍尸坐答鑪熏次韻馬御史題漢州喻氏多勝亭花壓金橋重春風第一州江喧朝灌口雲擁䕶遨頭鴈落沙中渚鵑啼竹外州使君燈火地為我倚髙樓元夕張燈金鴈橋㫁鶴山年少時守漢州次韻伯庸過天寶宫松暝碧雲深鶴歸人倦尋朝逥香滿室詞罷月盈襟白鳥分山影黄鸝轉樹陰小溪流不歇咽咽佀鳴琴送白誠之赴台州别駕岧嶤巾子峯市近海潮通桂樹團雲濕松花帶露濃猿隨僧屐雨鷗送賈帆風盡道無王事持杯百過空贈瞽者尸坐包􅀇象虚窻萬籟沈聴泉知地脉候琯合天心風定馬蹄急霜清葉落深弄丸端可學從此罷鳴琴送成公履守光州淮樹連空碧淮山徹底清濯纓羞戀闕佩印樂専城曬網雲催泊提壺雨勸耕地偏王事簡數鴈寫琴聲寄開元奎律師五首開元古壇主盡日着袈裟社主勤供菜天神罷送花蒲團黄葉䕶香鼎白雲遮終嵗無王事繙經到日斜開元古壇主老至律精嚴洗鉢魚遊水開門鶴入簾拾薪供茗具滴露寫經籖已悟如來意看花不用拈開元古壇主身世兩相忘客至常扃户僧來不下床神光千里鶻􅀇辨九秋霜白業渾消盡蓮池任意香開元古壇主瓦石化丹青佀住元非住無營類有營念珠金的皪戒鉢鐵晶熒我亦慙塵垢清齋養性靈開元古壇主㓜嵗已相聞我竟飄京國師方玩水雲一官千日計萬事五更分共約􅁱蓮社空林洗垢坌髫齓侍諸父拜雙峯祠堂未嘗敢有題詠二十年來接武于玉堂瀛州霜露之思缺然有靦近聞平石長老興廢􅀘仆光紹前聞遂述舊懐為六詩且申歎仰沈沈大士閣千嶂萬夫降近樹青禽獨前松白鶴􅀟雲霞生几席星斗列軒䆫俛首京塵客生涯愧老龐慚愧􅀟峯老光明兩足尊迦佛像新妝釋午䆫鈎竹影凍筆㸃梅魂齋近烏啼樹禪廽虎伏門春來有新鴈勸我趣歸轅經院辛勤日千金記始興千兩經始今八創寺時以賜金四年十有雨荒蟲蝕拱壁壊䑕縁藤舊觀丹青復諸天錦繡承短簷增突兀會見出盧能咸其柱然淸班亦不聞有顯者故末及之書來修選僧堂舊有術士言太髙稗沙門隂隂虞監宅興宅虞永鬱鬱越公祠掬水不入獻布金猶受疑流年翁仲守徃事苾蒭知澗水交流䖏曽傳玉帶垂寒徹清泉底山童上水華定金非在井侯羅女子墜􅁫其水遂定羅尊者語傳昔有一煮米却成沙洗目能生電捜腸可當茶人持一月去此月落誰家跏趺千樹暝彈指百花春道以東巖的詩於北澗新歸雲呈住相行籜掃空塵靈鷲誰公論啼猿正惱人次韻張希孟凝雲石十詠我愛凝雲好神交萬化前碧窻圍蜃氣黑浪衮蛟涎化石知何代出山今幾年相從清思長寸頴起蒼煙我愛凝雲好飛塵萬馬驅雄深麾將士峭直傲公孤斷足鼇分極摩牙虎負嵎何年化霖雨慎勿竟虚無我愛凝雲好雍容諌諍姿虚中超混沌正色走窮竒潤物非無意成功自有時棲遲元未晚清坐愧神癡我愛凝雲好氤氲萬象深鎮浮廊廟體閱静雪霜心屈曲蜂房綴玲瓏蟻穴滛玉京誇獨秀此日汙腰金我愛凝雲好朝昬境不同金芽養靈谷鐵網起晴空月色古今正潮痕子午中㸃頭那有異吾欲問生公我愛凝雲好神清湛欲留岷峨千古雪泰華一天秋獨鶴離羣皎層冰出澗幽無言有深抱山立正陽休我愛凝雲好糢糊老墨僊癡蟇端食月渴驥欲奔泉守黑壺中日談􅀇洞裏天煙霞元自足塵世未為賢我愛凝雲好翛然一榻棲支機何物誕醒酒此君低香逺能為霧泉深觧作溪未須鄰綺角端可比夷齊我愛凝雲好能歸萬古春遺簮三島客椎髻八蠻臣栢子添清供梅花寫舊真天心元不動東海任揚塵我愛凝雲好蒼龍擘硤飛振纓悲濁垢整珮謁清微嵗月江翻浪冰霜玉韞暉黄塵今幾許且勿展書闈山水圖樹重雲光濕峯寒曉氣清抱琴人欲徃門暗客相迎凍雨生寒溜深雲倚怪藤蹇驢吟不得指㸃墨千層淇緑堂卜築荆溪下碧陰生晝凉軒昂丈人行瀟灑此君郷月候緱山鶴雲催嶰谷凰衛風朝夕誦底用别詞章寄砥長老雙峰不受暑傑閣稱幽禪蕉葉緑雲扇藤花白雪氊見龍增澗水喜鴈㸃江天笑我開平客于今第幾年送李希白降香武當山絶壁通靈籟天香蔟寶華重明應龍馬習坎伏龜蛇度嶺金盤日穿雲玉珮霞道逢採苓叟應與論南華送永新王東野還里天際風花黑燈前鬢影蒼方刋肘後秘金散槖中裝某樹童年種兹丘晚嵗蔵已忘朝野事飛鷺起鳴榔輞川圖詩中傳畫意畫裏見詩餘山色無還有雲光卷復舒前溪漁父宿舊宅梵王居千古風流在披圖儼起予贈雪窻上人少日觀滄海陰山恨未登飢餐太古雪渴飲萬年冰栁色迷官道鐘聲動客燈聞聞與見見問我一枝藤直沽口二水赴滄海客行殊未休漁舟維病鶴歸棹􅁸輕鷗雨重雲光溼天低樹色浮京塵今已洗從此問莬裘三月二十九日阻風馮家口飄泊春風恕維舟古渡濱防堤堆馬鬛蹙浪捲龍鱗撇掠吞吳陣紛披障庾塵栁陰亭午轉人靜白鷗馴次韻劉明叟欲知行路苦孤雁促歸期矮屋燈昏際􅆰林葉落時滄浪誰欵乃褦襶笑詅癡㸃檢韋囊裏珠璣總屬詩夀閻承㫖三十韻寶曆書堯甲蒼杓指夏辰脩齡天保魯嘉瑞嶽生申人物中州正陶鈞淑氣淳舒睛翹孔翠墮地擢麒麟藻思傳髫綺蜚聲􅁸搢紳文鋪崑玉鏤賦約楚蘭紉樂道車中聘談經席上珍飛牋油幕佐執簡柏臺賓黼黻開丹地絲綸演紫宸慶雲圖逺牒甘澤洗荒塵評論空餘子儀刑倚重臣昂昂霄漢表皎皎雪霜身滄海鷗忘慮長風驥絶倫名髙諸彦避徳盛後生親朗鑒中秋月天和太古春精忠言欵欵奬引語諄諄書葉題文債詩筒破酒廵筆翻金井凍詞吐露桃新格律常楊陋篇章鮑謝鄰􅉝勤憐我輩銓賞属斯人南極呈黄道東皇挾絳輪霓旌紛旖旎香鼎秀氤氲果熟分金母丹成養谷神心澄眸轉碧光瑩頰浮銀物色歸青簡年華閱大椿小車花外影馴鶴竹間真賀履聨行整傳觴捧勸頻踈閑看逺岫虚靜傲蒼筠徃事雲舒卷流年肘屈伸長生端可學靈夀不須陳次韻仲章過陳氏城南書隠十韻矮屋參差倚平蕪黯淡看夢迴榆塞逺愁絶翠峯寒白髪㳺絲罣丹心古鏡蟠槐明金瑣碎菊鑄玉㠝岏憶月時看劒臨風復整冠郷音憐過鴈古調拂離鸞去矣歌招隠終焉樂考槃晚知交態薄老識宦途難口腹非真累母煩饋一簞入南城遇老醫言山陽舊事因成十六韻邂逅山陽老相傳事已訛姦雄歸草莾天地入悲歌太守籌謀誤將軍禮數苛鞬櫜同下吏騶御失前珂淟涊顔如此憑陵事若何比肩身肯辱却立齒爭摩水掩寒雲甲風揮白日戈耳聞人作膾眼見血成河翕霍同么子倉皇類小皤官軍奔及馬婦女走乗騾自古儒冠忤難將杯酒和功成真草草國後維揚論功咸謂偶幸先公在宥府論山陽事去時至復峩峩漂母恩徒快中郎詠未磨郎將有比荀羡為中詩征遺屯迷鼈石所築鄧艾舊浴暗龍渦土沃村村麥湖深䖏䖏荷人生貴行樂何必問銅駞夀致政王侍郎八十二十韻夀俊標周士儀刑望魯儒輞川饒詠賦璜水秘謀謨壯嵗丰神整明時膴仕殊東曹誇鶻擊公府羡鳬趨審象三韓使含章四皓圖長身昂野鶴正色叱妖狐誓墓文何早傳家計豈迂郷稱三老舊人說二難俱舍並分桃塢田開别芋區水邊時避飲月下屢嗔扶眼碧看山媚鬚銀映雪癯油車懸蹀躞野服綴䄡榆社􅁏時相餽春醪不用沽綵衣新稚子椎髻古奚奴鼓擊深深舞茶烹緩緩呼花飛迷去路鳥下避行厨南極珠分瑞東泉斗借􅆽造朝看賜杖入里記垂弧翠栢根如石靈龜息自􅃾從今躋夀域底用詫康衢夀牟獻之大理卿七十三十韻氣槩岷山秀風神閬苑僊西山餘故老南國挺真賢瑞靄垂弧日人思衣繡年清門開耋慶緑籍紀齡延止息功參易虚心體合􅀇厖眉垂素手漆髮換華顛眉間忽生今嵗七十重黒兩毫髪鳩杖何期賜牛車不待懸三鱣傳素緒一鶴記青氈枌社爭為夀蘭堦數擊鮮風驂追廣莫雲珮憶鈞天徃事清霜木希音太古絃五更尊禮絶六老舊堂専居所堂遺址正六老􅂎菊調饔鼎丹砂養井泉慵書乞米帖羞辦買山錢醉劇簪花舞遊疲枕石眠黄公終慕隠白傅且逃禪文物傳青史耆英入繪編弁山寒戢戢苕水響娟娟望海傾朝夕瞻星候次躔登龍身未武執雉意空傳偪仄徒多恨低違秪自纒窮郷真坐井陋室强懐鉛夜月思延桂秋風學詠荃終然羞弱植復爾滯孤騫問字瓻空在傳經席未前牛衣期振㧞馬磨費評詮冰柱垂青嶂蠙珠湛碧淵至言機已息妙技目無全凡質丹須換精誠溜合穿遡風輸善頌立雪兾敷宣夀李承㫖四十韻寶曆開三禩瓊章集萬神蒼龍迴揷子玉兔候交辰潞水丹騰渚壺闗氣接旻道傳莘野正學比傅巖醇帝運昌文統師臣秉國鈞清宫髙贊畫潜邸舊經綸意得超今古才雄異等倫春浮霞錯落秋映玉嶙峋三執中書柄重開大國畇黄鐘陽脉脉瑶圃霧氤氤僊鼎神膏秘宫壺掌露真恩醲錫麟脯味薄謝猩脣瞳碧光流漆顔紅色耀銀垂紳凝泰嶽設席陋平津手挈重華古心追貞觀新至人專上夀八表樂同仁非虎耆年並猶龍祖譜親息深忘蝶化機靜狎鷗馴蕩蕩心無競肫肫俗易淳極知調鼎餗不惜汙車茵竹帛千年事桑麻萬里春管商謀可鄙房杜跡常遵斟酌扶元氣彌縫䕶國珎倚風憐竹弱聽雪喜松皴玉署親裁詔青蒲獨奉宸蜀江移戍罷浙土減租勻榻净唯烏几堂虚且角巾手揮廷下史目送幕中賓習隠時思許題詩尚憶秦黍田溪溜溜花塢澗􅉿􅉿問俗停車緩貪賢倒屣頻藥囊儲赤箭水鑑徹青蘋滄海収毫末空林絶隠淪籍功文舘定約法論堂詢出䖏關吾道安危佩一身政須陳蹇蹇直與紀麟麟績蓺慙班馬抽才頌甫申占天徒有管望冶眇無垠閱歳桃成實知年海拂塵扶踈慙小草葱蒨託靈椿送文子方著作受交趾使于武昌長律二十韻萬里蠻陬貢清秋督使馳乗車専述命受幣聴陳辭紫舌音聲狡雕題聚族滋玉門心愈遜銅柱約難移江漢尊南服星辰拱太儀趨庭輸齒革授館列膏脂私覿情鈎隠公言理折疵彈丸空有險束矢定無疑桂蠧消煩溽蓍􅀛審事宜要荒工跌宕保障慎羈縻鸚鵡寒汀逺蒹葭晚岸欹壯遊詩句豁古戍角聲悲月矗朱簾正山低翠浪欺班超空耿耿陸賈政怡怡楚水愁腸結衡峯望眼眵過門王事急去魯驛程遲緬想垂衣治深求􅀘衮資大夫謀可利小客禮須持諭蜀徒煩􅊾平南漫擬碑佇看王㑹傳端假史臣為魯子翬御史分按遼陽作長律五十韻愛其精密予今嵗亦扈蹕開平因次其韻象御天街正烏輪海觀昇省方秋戒慎扈蹕嵗因仍石迸根駢拇山迴勢左肱塵深疑帽重霧宻覺衣蒸午頓炊難熟宵征酒易勝觧鞍心惘惘執轡念兢兢酪水分罌􅇲通薪筭斗升皮毛均製服脂膟􅂉燃燈統幕迷髙下烽臺閱廢興度闗泉水咽出口月華澄狼戾官芻峙魚麗餫粟徵千房雲疊疊萬竈墨層層列帳排衣甲行營䕶棘矜斾旋環佀翼鼓發去如繩斗北瞻紅棧雲西指白登草肥青䆉稏松聳翠崚嶒積雪疑忘象搏風訝徙鵬属車攢幄帳行殿儼茵憑白㲲時逢賈朱衣定指僧翠旄逼華盖金甕耀觚稜觀闕天經界儀臺象緯凭佽飛拳佀虎鐵杖足如能竹帛司常煥丹青職貢增㑹朝珠帽簇錫宴寶巵凝陛立齊垂槖師行陋釋掤廣寒通月窟髙爽寄涼橧上聖英資異丁年武徳􅀪天戈中夜渡星􅊾百川承同􅁤嚴行夏明禋耻用鄫别州端首兾分器定先滕徳啓無彊服光傳有道曾皇威宣絶漠陽澤散堅冰表正辰居所漸仁水集堋庭開下鳴鳳苑廢罷飛鷹舉逸尊加璧掄才鄙販繒鄧林搜八柱瀛海􅂑三凌曲學慙繩祖孤聞賴得朋沈思雲外弋􅄀索澤中罾客議雞同鶴人疑驥聚蠅濡毫終有思執簡豈無懲謂可兼遐邇胡云立愛憎清芬蘭佩結芳薦蕙殽蒸鴻筆吾誠忝輶軒子累乗共知心耿耿相對髪鬙鬙馬磨誰憐許龍門共企膺枚生詞過實揚子徳徒稱盛化乾坤闢王綱日月恒麟符昭炳蔚豹霧駭超騰虚白難為繪空青不受矰欲追千古筆為付一枝藤王趙公八十應制十韻耆徳膺熈洽皇風協泰和公明旁作穆帝念叙惟歌枌社新封土蓬壺舊隠窩黄公資輔翼白傅退婆娑望日靈􅀛息擎雲古栢柯精神霞烱烱儀觀玉峩峩設醴樽浮蟻兼珎釡錫駞擁床争置笏立馬㑹鳴珂服食丹蔵井絲綸錦蔟窠永須依日月何必問煙蘿夀開府承㫖十韻泰嶽舒紅日天門爛紫霞氤氲生宰輔磅礴賛亨嘉文武揚中外寛嚴接邇遐遊嵩雲擁馭度磧雪飛沙畫㦸車流水青編筆有花精神春不老器宇海無涯玉殿彌綸重金鑾密勿華傳宣花佀斗錫宴棗如瓜上夀三千嵗元勲第一家山河開賜履早晚聽宣麻劉邢公九十應制十二韻賜履光華閥延齡冠帝畿氤氲秋霽嶽菌蠢露凝芝六聖存遺老千官介夀祺傳宣鳩飾杖錫宴蟻浮巵餐玉銀鎔頰簪花翠壓眉灌陰機怗怗擊壤樂熈熈坐石雲生窟澆槐水溜池霜深風脫木冬暖凍消梨徃事先朝夢多情舊日詞魯公方拜後鬻子定為師用拙長年櫟虚心太古蓍成功全靖退樂道過期頥次韻伯庸畫松十韻妙思通靈素􅀇陰接帝青抗顔躬蹇蹇蒙頂髪星星颯爽龍羞豢蕭疎鶴鍊形壁虚生地籟斗近界天經蝶夢春濤湧蟲疑曉日冥雲生停斚候風入倚窻聽屈曲車連軫騰拏簴列庭戀郷思海岱封爵鄙云亭月落孫生嘯天寒屈子醒雄姿輕虎豹浮跡陋鷗鶄夀張希孟父郡侯八十二十韻古渭垂綸老康衢擊壤翁星輝勝處士天爵賁家公顥氣西郊肅祥雲北渚濃坐班鳩杖叟舞轉柘枝童夀骨英光聳厖眉厚徳充九重恩誕錫三命傴彌匑麟紱開華旦􅀛齡擬少嵩簪花便廣顙植菊瑩方瞳鼎釡兼珎飫刀圭上藥融傳宣壺燦爛合宴佩青葱積慶先猷逺詒謀晚福豐靈椿培世範玉樹挺家風正色通天闕髙懐納楚宫倚風看鴈北就日見雲東君父恩彌重交遊論盡同竭誠心毣毣移孝思忡忡意壯追奔馬機㤀數過鴻􅀇參揚子衍書比伏生工浩蕩漸摩澤昇平坱圠功定須超混沌何必問崆峒王叔能侍丞相入見王繼學尚書序其事謹賦十二韻行殿圍氈邸鑾輿擁翠簾重華方聖治上宰益勞謙臺閣推公幹蒿萊擢孝亷官儀精考核選格絶停淹議禮心如轂探賢手自籖都曹清望重瑣闥雅才兼對榻褒嘉寵垂紳俯伏瞻傳宣挏酒錫拜命襲衣霑令節薫風細皇恩湛露厭事殊靈夀杖賜比水精鹽際遇喧朝野矜誇徹里閻遺臣思載筆徃恨泣攀髯清容居士集卷第九
