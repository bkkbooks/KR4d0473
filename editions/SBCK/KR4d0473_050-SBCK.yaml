front:
  text: 清容居士集卷第五十
  hash: sha256:c8559741b6551f48de22f1fc65d349281117fc45773fea70d1010ba161888981
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_050-1a}
body:
  text: 題跋書正肅公懲忿窒慾題扁忿慾皆發之不中節者桷嘗讀易之咸以無心為感何思何慮是則安有不正者㢤漢儒言感物而動失㫖多矣先正肅公謂忿近於剛以欲為剛徳不􅁕探本澄源有合夫繫辭傳之􅀃故其平居奉身如玉雪危言讜論百壬交避其剛之謂也清齋端居不邇聲色此絶欲之效也居朝不一二年􅂺以直道去湯文清哭公之詩有曰獨畱事業在江東真實錄也􅀙子瑛居龍虎居室以四大字昭示户冊且築象山之麓為精􅃕審其傳授保形以静老氏之􅀃飬厥靈根吾儒之􅀃是則安有忿慾易曰無有師保如臨父母正肅之訓豈虚言㢤泰㝎二年上已日族孫具官桷再拜謹書跋正肅公手澤吾宗由宋仁皇時光禄公轂與祥符縣丞同舉開封祥符後居東亰建炎兵變祥符孫太保絜家􅀙青州軍以歸是生太師衛公厚徳退譲而光祿公家自朝奉公亦漸替至正獻公入太學師陸文安公登淳􅄉辛丑第衛公之子越公􅀙正獻游考兩家南北之分始得合譜訖受學于正獻癸丣􅀊越公與計偕不赴淳熙丁未登第自是先後為秘書省官為侍􅀙人咸曰叔姪之盛師生之榮於是見之正肅公見越公鄉薦時年始九齡自是敦叙不絶兩家厄於祝融之災舊蔵㡬盡脫焉以僅存者猶數十紙􅀙姪則瑛自龍虎還里曰䝉齋先生遺愛在江東社而祝之㒺敢墜因以手澤二通俾為象山證契曰大資同知桷之曽大父曰思贊府判實則瑛之曽大父噫世運既殊喬木彫落書其本末願刻諸山中以為永乆泰㝎二年三月甲寅族孫具官桷拜手謹識題􅀙子瑛城門八詠始余讀陶靖節諸賢詩志意憤悱抑其意而為之言盖􅀅以􅀙其􅀋也五君八哀杜子羙䂓䂓然相近羇窮不偶故竊其佀而為之者焉龍虎山為道士據㑹竒怪嶄削率可以見於詠歌者書扵志見扵碑誌跬歩不敢以軼而吾􅀙子則瑛作城門八詠以相示首之以仙隱言夫宗師創始之難也曰茅山易髙士靈寳之創首龍虎而終于茅山者也曰天谷慕真隱而不騁于外詠蓬蓽之􅀁居則與天谷竝或曰蓬蓽勝之曰玄洲三隱東城慕其孝友而􅀎以肥遯自處者也曰碧玉則曰我越公之徳未墜粤昔旌陽公以厚徳植樹而奉祀有缺懼不􅀎以承噫今為方外流者絶其本枝而獨呉特進不若是則瑛􅀎亢宗叔老矣不復有望異時見吾中散公朝請公之子孫成立非子也邪跋外髙祖史越王尺牘齋戒之時共惟撫幹國録盛徳某伏以即日毒暑在􅀱正君子繁福某歸老山林一念不作殊在躬黙有神相台􅀱動止倍介狀可發一笑識者觀之必有公覺强健不􅁕云者䝉示張公行甲符離一掃無孑遺東南膏血論建炎以来錙積寸累車馬器當時不䘏國計以償㓛名之心竭扵叛亡目今州郡窮匱皆由之主上實知之不䘏後世之無某􅀁不忍為也某此心天實知什物無恙幸置慮他覬韜飬以聞也吾人以謂如何竹洲􅀁寓期待幸甚幸甚五月日太傅保前光大異時横蜚尉區區之􅀁魏國公史浩箚子寧軍節度使致仕朱文公作張忠獻行狀一出南軒之筆不過題官位姓名而己後攷三敗事跡始悔昔年不加審覈歸咎南軒然亦無及矣符離之敗陵陽李伯微甫載其事甚詳今不敢為忠㝎辨明直書其􅀁紀曰符離之役軍資器械失亾殆盡張魏公初聞之疑虜人踵至甚懼即軍中觧􅀁佩魚遺歸朝官太平州通判劉藴古朝議大夫使虜求和僚吏有止之者乃奏乞􅆀仕又乞朝廷遣使孝宗不􅀙既而虜人不復南魏公乃謀再舉上亦不􅀙及和議􅀅成魏公持之甚確左相湯慶公因白藴古之事由是魏公遂絀李與張俱蜀士史筆不敢有􅀁隱避桷以外諸孫尢宜尊􅀁聞以傳信忠㝎尺牘無一字失實者此豈私喜怒而為言者歟泰㝎二年五月甲子具官􅀽桷再拜謹記書瓶城齋記後抑甞觀易而得兊艮焉澤以漸摩言之於家者也澤而不止㡬於險矣節者􅀁以懼其過也當位以節節斯通矣艮者總其身而身有止也思不出位艮道之􅆀因地以光而復降焉斯謂之謙謙非􅁯於事也故鳴謙之象著而用節之斯益困矣凌侯商榷事物黙以全其機清介自律人莫有敢犯户冊之訓㴱契易理敢誦􅀁聞而質諸良月既朢越􅀽桷書䟦汪龍溪外制草崇觀詞臣以扇對全語為髙獨龍溪先生痛掃時􅁦盡復元祐之舊方羽書飛馳顛沛道路非如昔人夙搆古語而徳音四逹甚於奉天之感泣不􅄑為秦氏子擯斥逺道而先生迄不得再入矣抑甞考宋世内外制之作至公而始􅇱故其翦裁也有丁夏之風其典雅也􅇱曽王之體肆而不野麗而不侈則駸駸乎歐蘇矣今觀手藁遂書􅀁聞以寓仰止之意云乙丣七月望日􅀽桷書書劉貢父􅃕人種竹倡和詩後元祐元年九月蘇文忠公以中書􅃕人為翰林學士十一月劉仲馮孔經甫為左右史蘇文㝎曽子開為中書􅃕人盖同月除書也劉公由秘書少監入掌詞命盖與大蘇公相後先孔常甫則猶在著作廷兄弟父子嗚呼盛矣㢤鄧右丞􅄉寧間以九制之譽積十年為承㫖自負灝噩詎淺淺耶甞攷元祐初元實維丙寅姤遯之基已萌是􅀊温公薨黨論興詩禍作馴􅆀宣政紹興丙寅秦相擅持南北分裂遂㝎至於開禧則罪歸于韓咸淳㒺上之罪昭于賈氏不十年而宋亡治少亂多明于天人者未甞不㴱知之噫前乎乾徳天聖之際又何其盛也今􅀊距丙寅僅僅十禩文明之運誠在于此仰止先􅈒感慨係之丙寅人􅀽桷識時延祐乙丣十有二月庚寅也跋蘇子美帖滄浪翁中年書猶未精詣後沈錮黜落浩然之氣悉心用資以為翰墨祁公號婦翁兖公宻友終不􅀎為之道地前代法律之嚴若是書蒲傳正左丞帖左丞蒲公文學政事􅄉寧元豐之時號為名流後出為亳州未㡬以揚易杭皆東南要郡此手帖盖由亳入覲時􅀁作也蜀由孟氏以来無兵革鬭争文士迭出至元豊時為翰林學士者十餘人公其一也宋世仁英正史皆公纂􅁱今蔵史院可考皇慶癸丑桷得與其裔孫道源同為史屬蒲為西蜀大族三丣之變徙興元者獨􅀎保其宗家譜整􅇱遂以先越公􅀁蔵左丞公手澤歸之以永其傳噫綸言汗簡皆家世舊物桷無以進議厥今理學宏闡實始於舂陵周元公元公之道之學實蒲公紀其事立賢無方願於諸孫有以廣之㑹稽􅀽桷書䟦懐素揮翰帖懐素書多才翁兄弟􅀁書至明昌諸賢尢競習此體余在都下􅀁見凢􅁆十卷皆偽贗可考獨此唯宣和舊物審為非臨摹者跋桺公權書清静經韓氏閱古堂清静經乃越石氏家蔵舊物石居新昌慶曆時刻此帖後入復古方韓貴盛時遂得此帖悉有紹興圖璽此籖摽光皇手題石氏墨本失之拘紹興本失之瘠韓本失之弱今覩真蹟硬黄古紙松煤老色無纎粟繆妄視昔三本真碔砆也龍集戊申至大改元甲子日桷謹審證于後跋顔真卿誥前人多疑祖父誥非其子孫􅀁可書魯公舉進士開元年已長成昔人誥勅必擇􅀎書者填補􅀙唐考之徐季海之於其父嶠之是也􅀙宋考之蔡君謨米芾是也此卷舊入思陵復古殿後入秘書省先越公為秘丞時掌圖籍凢唐相誥皆入録盖徳夀晚􅀊悉以前賢誥入祕省故也今李紳誥及徐顔諸誥皆舊物審㝎無疑書舊作九華臺賦後潛庵鄭先生兩入翰林纂􅁱凢例多出其手于時桷亦補史屬適相後先未㡬除江西儒學使者􅀁居近玉堂矮屋脫粟不堪旅瑣先生清言介行每言􅁆百年承平事不絶口桷不揆參錯承接時則有新安汪尚書孫漢卿為供奉廬山􅈠端明子愚為編􅁱此􅁆公者皆先世情好而桷以外舅秘閣公叙宗盟於相府事契彌相厚也先生生於淳祐甲辰之重九日先侍郎因之以命名家居築九華臺湥致意焉于時桷實賦之由江西歸里第不􅁆年而􅂢館其子公許以門㓛入官来亰師􅂝混元山居題詠手澤一卷而九華臺賦實附于後俯仰疇昔邈不可得而桷不自知止因循翰􅁐者今十五年矣學不加進而道日益損異日當假道清溪拜先生之墓驗昔時手植之花木因以有推其子孫之興盛願嗣以記之延祐三年三月已已􅀽桷書書李巽伯小楷夢歸賦有跋趙子固洛陽李巽伯建炎初同朱希真避難南来名望文學與希真相上下而作字體製亦復相佀希真書相鶴經朱文公評之矣余甞聞先生長者言黄長睿崇寧間㳺洛陽作九詠楷書㴱刻故一時洛人皆師慕之希真巽伯又其佀之者字學廢已乆宣和立書學主上􅀁好乃薛稷禁經􅀁謂字則長而逾制者也則朱李二公寧得為􅀶士耶希真甞和巽伯詩伊水嵩雲未歸得􅀃平生處淚浪浪盖與夢歸同意又曰琴書揔驚眼文字更過人巽伯翰墨之妙可知今觀趙子固評書力宗元常而宋朝習鍾書惟黄朱李三人暨姜堯章子固耳余甞見丙舍帖徐浩模本出尢端明家又見褚河南摹力命表唐本皆纎濃遒潤至比閣絳宣示表如出二手則學鍾書者猶可置論乙酉􅀊余見今翰林承旨趙公子昂扵杭于時愛堯章書譜手之不釋逾三十年趙公小楷妙天下是盖脫其形佀而師其神俊此卷舊蔵南康黄可玉可玉嗜古剛絜人也後授其徒董君有􅀎􅀎寳之願質諸承㫖公作書評焉俾勿壊延祐五年八月乙丣書題東坡嶺表書歸去来辭贈卓契順道者東坡先生居嶺海惟卓契順巢元􅁱不逺數千里􅉭鞋問訊元􅁱有傳而契順止書歸去来辭與之如有欠恨桷扵徳常家始獲見真蹟落墨淋漓光透楮背見者皆竦然以起敬而元􅁱傳非精熟蘇文者未甞接識昔人以鼎􅂜傳逺謂於監觀有補徳常宜廣刻使家有其書任恤之道見於盛世矣跋呉丞相繳京湖帥賻陳清敏帖嘉㝎十一年先越公與清敏公同在殿廬實得呉毅甫丞相爲第一清敏之薨丞相㴱徳之爲作書閫帥于時賈相年未四十方折節慕名丞相書至詎敢靳嗇清敏子孫又安得以不家於喪為辭故事大臣薨有㫖州郡治喪􅁙㴱􅂲後人不知以清敏公家為有請故表其本末若是書世綸堂雅集詩卷吾鄉盛時比屋皆故家大官咸淳賈相擅國絶惡四明由是衣冠皆為月集悉不敢議時事卒至國亾無賣降于外者當至元末年諸老先生猶亾恙時則有㴱寧王先生師表模範世綸雅集猶有洛社耆英之遺意甫三十有四年風塵變更乗虬上征無有一人在者覽先郡公之遺墨不勝悲慕世綸主人於是下世亦二十年矣桷以契家子猶得􅀙封胡羯末之後願相與勉焉以圖無斁題樂生詩卷詩於唐三變焉至宋復三變焉派於江西變之極有不可勝言者矣劉南嶽少年以詩自名晚􅀊獨尊楊廷秀考於風雅無是體參於唐宋無是體以斷絶直􅆀為工叱咜轉旋駸駸乎江湖之靡者也吾鄊前􅈒􅀁為詩倣韓而不􅀎愽師蘇而不􅀎宏然卒無江西之弊誦建安黄初之作推而至扵風雅則亦有徑廷矣㝎海樂君之才以一編介􅃽君玉度示余且求叙引噫詩不能以易言也觀其平淡者合自然孤絶者得㴱悟繪物不鄰扵巧琢至境合心㑹釃然百谷之泉必逹扵衆流是亦扵詩非積學有源者不􅀎是也余終老林泉異日相尋於寂寞空絶之地相與酬倡又􅀅盡其􅀃焉書孫僉事訓子八字􅀃一貫之㫖忠恕而己其語簡而易明大賢之教人曰不􅄭語聖人之教子則曰立與言二字而己過於文則漫不加省切於近則易以自持孫公濟川之家訓凢八字曰吾􅀅以訓于家吾子之果􅀎為儒也必􅀅由是以得名使不至焉則守斯言也其不為小人之歸也明矣求余言以増警遂書以歸之俾勿墜濟川子名某日不廢學􅀅以儒術起家桷老矣猶􅀅見之書党承㫖􅂐杏壇二字後翰林承㫖党公􅂐法妙一時􅀁書杏壇二字刻于曲阜藹然風雩之意千載一日也衍聖大宗南徙三衢設祀有廟傳嫡有緒今郡守趙侯敬之髣其舊址築壇於㫄昭掲二字於其上有新豐肖佀之意見堯於牆著存不􅁯之義也若曰思其居處孔氏子孫萬世不怠是則趙侯之用心良厚矣泰㝎三年二月具官􅀽桷拜手謹記書呉子行􅂐書隂符經唐世隂符始大行原扵李筌成扵李靖貞觀皇帝始酷好之命褚河南凢書一百九十本貞觀之意盖廣用兵之􅀃耳李筌託神姥之言乃曰上有神仙抱一中有富國安民下有彊兵戰勝又􅄭増六注以惑後人然終不可悉解而呉子行復書之何耶唐人作􅂐惟書千文盖懼學者之未易察也徐鉉作項王亭賦仿李陽冰裴公徳政碣之遺意子行沈困市隱豐碑巨碣不􅀎以自見寫其幽曠託焉以自逃者也余甞聞善書者大􅂐不得入小􅂐隸書㝡懼入八分使子行在吾願相與評焉題劉明叟詩卷大裘無文良玉不琢質至羙而無可楝擇也言為心聲而詩章之衍溢則又若必事扵模範論至扵理盡􅀁謂模範者特餘事耳黄太史甞言寧律不諧不使句俗以建安黄初之法較之佀若有病然太史􅀁為詩鍛鍊之工過於前人其􅀁謂不諧者盖其變體耳吉安劉明叟示余詩一編不事雕飾意氣凌厲理勝而語完嶰谷之竹合扵自然不假按抑而宫商敷宣各當其職手之不􅀎以釋因以夙昔之􅀁聞者書于後而歸之題閔思齊詩卷唐詩有三變焉至宋則變有不可勝言矣詩以賦比興爲主理固未嘗不具今一以理言遺其音節失其體製其得謂之詩與隴西閔思齊示􅀁爲詩沖澹流麗亹亹倣唐人風度􅀉興整雅􅀅駸駸乎陶韋之畦町矣近世言詩莫不以三百篇為主經緯之分􅃼不知􅀁以由逺自邇漸入魏􅀳詩寧有不工者乎思齊敏而且勤輟食忘寝和平多而凄怨少氣完體充不以沮折為可撓事物之来處益有暇故其見於心聲者無羇窮不偶之意讀其詩以余言為證斯得之矣書呉明之文編後始余見閩清呉明之于成均神度秀朗㳺于公卿􅀅以竒言直氣感動鉤􅀃􅂺同坐席復與一時之􅀎文詞者聲摩度測守繩合則駸駸乎班馬之軌轍而建安黄初之餘事􅀅力進而不肎止也余既得請歸隱山中江浙挽余以校文㑹有亡子之戚旬日即出後知明之試進士不中幸不余誚而㴱病有司之不察也暨来四明􅀅返閩中示其􅀁為詩文若干卷讀之不􅀎置是誠得於逺逰者多矣見聞窘于州閭舂糧之適不􅁕以自廣而冒萬里者多大言以賈禍若明之之㳺歴漸摩薰陶悉輯於翰墨藉爾求配扵古人誠不為過使果有遭吾見其揚于王庭清逺自儀潤色敷繹詎止于是編之􅀁述㢤因書以為異日之俟泰㝎三年十有二月辛未朔見一居士􅀽桷書題雲岡圗詩卷王侯叔􅀎守㑹稽􅀅悉意山水以攄其夙慕下車未㡬􅆓省檄治舶事往来市衢意若有不樂值􅇞侯善繪事命作雲岡圗朝夕觀覽蘧蘧栩栩見佀人而喜者也余甞聞巖居谷隐之士有言夫細旃廣厦未甞不心掉目駭而乆居朝廷者志念専寂凢其可喜可愕之事皆不􅁕以動故其於山林之趣介乎其不拔一使肥遯􅀅終焉以無悔若是則賦此圗者其為招隐乎其為反招隱乎書馬元帥救荒事實後司獄永嘉林君萬里彚次元帥馬公救荒事實一鉅編俾有言嗟夫斂散之法不行扵今為牧守者亦難矣因時之凶復抑其直是則於商旅奚有望焉董煟輯救荒書至盡至美迄莫􅀎有遵其􅀃而行之者病在於執一虚心以求則今馬公之政其近之矣林君之編曰台民四十九萬有竒其粟率糶者一十四萬七千有竒糾於冨家㡬三萬石有竒當是時以一郡之民􅀎動于上聽其出粟至于一十有四萬非身任其責􅀁為文書不大懇切不􅀎至是冨民遭荒抑損以售亦必有道􅁆盈于三萬則其便不便有不得已而然者也視瘠而坐􅁦仁人之􅀁不忍邀名以􅄑成夫豈仁人之用心馬公之政集衆思以為其佐林君之為首奉行而不失者皆公􅀁辟佐吏凢五人見於􅀁行事實不復著記禮之言曰三十年之通制國用量入以為出馬公耆徳碩望􅀅參預于天朝願以今之􅀁行為權而以經制告于廟堂焉則得矣書孫孝子事實余待罪翰􅁐見友人張希孟郭幹卿􅀁為孫孝子碑及序引卓卓表著二友非􅂑佞以恱夫人者今歸老田里又見程琚孟夢恂二文士作孝子傳事益詳宻文雖不同而紀載各有條理信矣㢤事至實者易扵言孝非以干名而名随之是見信於州里有不得揜焉者矣五典之常心之固有聖人設為司徒以職其教唐虞之世見於旌表是則上古猶有失其良心者今觀孝子之行事悉合於五典刻意肥遯乃今起家入御史府䇿名振徳政事施設皆其素􅀁蓄藴觀風宣化家至而户喻矧今為澄清使者薄敦懦立反其澆漓惇行孝悌悉以其躬行施于七郡不亦美乎孝子今為浙東肅政僉事名楫字濟川泰㝎二年二月甲辰前史官􅀽桷書書戒壇儀後余居鄰開元寺其戒壇精嚴肅静過者莫不悚息間遇度僧必一往閱之見其結跏藉草持怖畏想口誦加護不絶天神炳靈至有登壇仆絶不䏻終事者由是雖獰夫惡子率㒺敢廢􅈈噫使常持是心安有􅀁謂地獄也耶悟心源律師㝎上壇結夏等儀式願廣施諸方使人人如初受具􅁕戒時清浄法海與大䧺氏告衆無異不然酒池肉林罪刼可勝道㢤書大般若經闗後大䧺氏以汪洋廣愽之􅀃喻於羣迷萬緒千􅀃故其為書讀之􅃼然不知畔岸師其􅀃者始作闗籥以抽其秘由是㫄行側注機要立具夫相􅀙心起食息之際其来無端即其書以求佀若未盡捨相以求則􅀁謂一者猶以為形跡也皇祐庚寅有僧省悟以三蔵法師大般若經通闗重加校㝎至皇元泰㝎甲子實相距二百七十五年時有演忠律師其名亦曰省悟復為聲聞入道行位記三卷􅀘昔時之未􅇱殆與前􅈒夙相脗合體一分殊吾儒之􅀃近世釋氏率竊􅂑以為秘探索於毫釐之際殊失其㫖矣自愽而約吾於是書㴱有􅂑焉悟師􅀋其書簡宻􅀅與後来者共異時執一以持捨一以悟則觀是書者為入道之軌轍明矣書文宗周秘蔵圖詩卷宗周法師作秘蔵圖㴱􅂑吾儒一貫之理昔濂溪周先生衍太極圖體一而用異歸其異于同則用猶一也斐然黙契不􅀎已于言而法師舂容鏗鏘振孤桐之遺響發天籟之靈窽又率其講下珠聫璧耀􅀅極其㴱造不出乎秘蔵之㫖而其融液變化雖億萬猶以為未盡歸一之效于是乎見桷老矣倦㳺相望南湖跬歩還往之便願自此始題噩上人疊秀軒賦後楚之詞不作乆矣晁無咎氏始分其言為二淵乎得其微㫖離騷九歌判不相合漢魏而降一而為之縝宻者為揚馬反復悲悼漢帝􅀁謂鄰於楚之聲也左太沖融液藻繪􅀎為一繼者不復若是晁氏豈虚語㢤吾鄉髙端叔先生作變離騷直與古昔相抗而或者謂羇窮不偶怨悱不得以自振今噩上人作驃􅀐山賦及曡秀冽清二賦手而讀之誠駸駸乎古作矣渡江以来諸賢蹈襲蘇學以䧺快直􅆀為夸詩與文率相成風科舉學盛屈宋不入於口耳積􅁦㡬二百年山林枯槁之士尚何􅀎冀其髣象是則皆吾徒之罪也上人語精意新無模塹之弊言道也師逺㳺託興也鄰九辯嗟乎余老矣上人當勉之􅄬閒謝事願相與過􅀙􅀅復見於雪竇玉几諸山斯􅄑矣泰定二年閏月乙亥清容居士書書禪林􅇱用周官擯相行祀升降玉帛之事禮為禮儀為儀何謂禮執以告王者是也儀者陳設綴兆之位一㝎而莫易者也經籍既焚淹中之出不全後人以意損益僅見扵朝著若少儀内則弟子職􅀁當行扵家庭一切廢棄儒先屢􅆀意焉釋氏之教為三宗見扵動作日用不敢一有犯越者為律宗逹磨之學則不然調伏扵準繩之外放形骸黜邊幅守禮者莫􅀎與之辨而其􅀙心不踰矩卒有合扵自然是則繕性之效略外以理内扵斯見之矣􅁋慾嗔恚皆謂之道大䧺氏託言為喻􅀅以語夫上知愚者不察悉得以自恣職教者憂之於是為清䂓而曲為之防􅁆百年来遵守㒺替世愈薄而俗愈侈竒衺曼美充滿區宇澤山咸大師始輯廣其未􅇱詢于耆舊證于編簡作􅇱用十卷以拯其極壞其勤苦之志扵是書􅁕以見之余甞聞咸師縛律以為禪守其師􅀃不肎以􅀙于人清嚴峻整講道不輟頑薄敬避其死也尢竒偉余愍夫吾儒之教淪􅁦若是使有若斯人者一正之斯得矣序其書􅀁以識吾徒之未􅀎也書噩上人慈照師行述後佛氏之言以理譬廣釋心性其言汪洋浩愽譯潤有工拙而體製則一可得而同也宋世諸儒言理者率不以文字為工論考古昔措于五經則或有疑者焉太史公叙事幽顯變化猶龍焉不􅀎以名狀後世宗之編年之法㡬絶而今世􅀁為誌碣行述悉祖襲莫􅀎有違者夫發揚㑹稡因其事之實而為之也反復􅆀意傷其不偶而表之也豊㓛鉅績被于絃歌鼎􅂜者則又皆太史之事荒林絶壑曠逹沖澹非有道之士不􅀎為其言也言佛者三宗而習禪學者必以悟入為證􅀅􅀙其言邪則質野不􅁕以傳逺引而刪之又懼不與其道合噩上人示􅀁為慈照師行状泊􅀆若玄酒之􅆀其誠韜􅀆若絅衣之䝉其飾逞竒闡幽大小委折各當其職合儒者之辭以盡縁飾包括纎粟絶其疵俚是其言也傳信永逺為無疑也余甞聞慈照師剛毅貞固内外有則故􅀁至成立上人文􅁕以發之因書以吿其同志㑭入石勿墜泰㝎二年十月丙申清容居士書題轟上人詩卷華嚴極天下之富麗樹下塜間又何其岑寂邪乃知豐儉愽約􅀙心以生芥子須彌之喻豈虚語㢤觀轟上人西隐亭榭諸詩有遍法界之道􅀅随境以觀懼其多岐而亾羊也揜闗息機真㳺扵混沌之鄊萬幻俱滅胷中樓閣豈土木丹漆之􅀁䏻成吾􅀅與上人一叩其户牖焉題雪竇平禪師詩卷大梁張武子来吾鄊始正唐律由是禪林悉守其法雖頌古詠物清切婉潤􅁕以􅇷配牧之商隐怡雲師盖一時與之􅀙㳺近朱近墨豈虚語㢤由今而論獨僧詩猶􅀎守格律而吾徒一切直􅆀恬然不事􅁱飾觀此􅁕以泚顙龜石寺號小院然多出名輩怡雲師之漸摩灌溉於是乎見題雪竇潛師語録後用潛師住清涼先郡公􅀅挽主㝎水未㡬上雪竇不果㓜􅀊祝髮扵觀禪師不乆而觀謝世乃痛自卓立㳺諸方􅀎采其􅀁長不專於一師而其貫通融㑹慊然猶以為未􅁕由是瓣香之酬靳未肎出禪林有疑而桷獨􅀎探用潛之意佛之學道非止一悟用潛􅀎㴱知之今世禪人之病在於望風承嗣以希進用而居顯路者㫄收曲誘了不相渉其􅁦日甚推用潛之用心玩其語言有至死不休之意廣其傳􅀅以愧夫今世之􅁦庸叙於前􅁕以知余言之非􅄭也書􅀏堂偈頌後拈花微􅀏大䧺傳道之㫖也不􅀏不􅁕以為道老子憤世之論也近世禪人掃跡削機謂微􅀏為疵病卒致漫誕不可救藥影響既絶而道益無􅀁見聞禪師在淳祐間羣公傾下以平實為法門因西律師之請號為􅀏堂是㴱得迦葉之要領感而遂通夫豈虚語也㢤西律師已下世矣其徒寧上人􅀎寳此卷倘以聲色觀虚空􅀅大􅀏矣泰㝎三年某月某日清容居士書題俊老語録顯仁蔵用非言不􅁕以宣而絺辭繪句悉堕於浮繁唯大䧺氏絶其萌芽刋落無文土苴瓦礫不􅁕以喻其拙也由是禪宗􅆓襲千士一律使人冥行不知其􅀁謂畔岸明極長老以其示世語㑭有叙盖其不得已扵言者歸於大樸而其􅁕以陶冶性情見之於歌詩發之於言辨聲􅀙字順使人得以知其指示非過為椎魯以誑盲聾者余壯􅀊讀四家語於育王珙禅師曰語有實地有證地若華嚴􅀁演豈空幻㢤明極語􅀅大行於世敢叙以證之跋觀禅師石菖蒲賦後廖寺丞賈相之門客于時方歌舞湖山沈酣恣縦不知有泉石清事觀禅師持此以奉鋪叙宏麗末章以主賓輔仁㓛為急用意㴱矣厥今湖曲凄迷藤蔓一色不知此本流落何􅀁言此可為於邑跋觀禪師摩利支天贊觀禪師此贊為賈相作維釋迦慈悲廣度勅諸天以護衛濁世非黨私滅公徇其􅀁請江上祈和乃拘畱信使㒺上以為竒㓛使終日􅆊唄香雲滿室神其吐之矣觀師言語不迫隐然恤緯之憂厥後師潰身竄三尺童孺猶指駡不絶桷㓜􅀊親覩其事今老矣尚忍言之書薛嚴二道士􅀟清編余㓜好讀黄庭真誥二書私謂學古調詩當準其音節程度後讀陳子昂李太白諸賢詩飄飄然清逸沖逺纎言腐語刋落俱盡則知二書要其標準矣渡江諸賢明切理性間為禅人偈語謂與風雩川上相表裏詩道浸廢而􅀁謂道家者流方自治其學不復􅀉適扵吟詠之末噫實吾黨有以使之然也臨川道士危㓛逺以􅀟清詩一編示余攷其􅀊年儒者之言詩者正絶而薛嚴二師方往来龍虎山中搜遐挈緒求遺音扵魯壁之既壞宫商相宣更迭振響豈乆扵其道而􅀎化者與夫學詩而為魏􅀳有道之語亦少近古其不至成就力不逮焉耳習簡易近體遽謂理趣譬之酒焉因其薄醨而強以三齊玄酒第之不㡬扵過矣二師詩􅁕以昌其道余獨惓惓焉􅆀意而不置者愧吾徒之學為可愍而不在扵今日之弊也薛君志行絜清不自表眩觀妙公甞尊異之嚴亦簡整自治㓛逺云清容居士集卷第五十
