  text: 清容居士集卷第二
  hash: sha256:fed9027db1e18d93efee6e9a9931a806ea055549ac1a5de7335ccdbe3ad5680d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_002-1a}
body:
  text: 騷辭附愍誓哀謝先生受穆清之元陽兮一精白以抗修閶闔睒睒其初麗兮執正辭以告猷黯朱光而不燭兮妖群立以縱恣飾詩禮以逞誣兮曰余將焉所詣胷臆結約而莫達兮史告之以寡言心屏營以靡置兮導􅎶斾而為之先揭徳華之魁壘兮勵来者之不前一成旅以興􅀖兮仡然莫余敢擬州纍纍以十百􅀆夫何寛衣而廣袂燃積薪以逞安􅀆群豢食而自􅃧竭精液復疾呼􅀆卒莫能進其詞振飄風扵林籟􅀆葉脫故而懐新衆喁喁以雜居􅀆謇獨立而號呻矢危忱扵帝閽􅀆星委地以如琲何執愚之慎矜􅀆守隘􅀃於㒹沛持空薄之一髪􅀆振千鈞扵層冰力弗勝而殆􅀆猶夸夫守道之經企女紀之傾輪􅀆極迅翼以恣徃九疑靈妃􅃤玉容􅀆鏗鼔瑟其音蕩重華倐焉以㝠􅊬􅀆凛舊徳之日䘮乗桴游扵中流兮海若息波以竚望棹夷猶而靡行兮羌何爲乎此路砉然􅀭靈窮晦冥兮朱鬛乗旗挟以震怒澎湃蕩簸􅈭回渦兮爰深逝以欷􅒣懐縮恧而失㩀兮寜忍歸夫故居死無能終報兮生莫知其曷圖貴化人之冲漠兮絜肥遯以自遜蒙垢紛爲汙濁兮薄日月之吐吞墼門竇於荒滅兮屏精明以黜聞超飛霞而上征兮遇武夷之神君逝者翳于山丘兮夸誕逐其營魂覽三聖之古簡兮宣尼實爲之彌縫謂道無古今兮孰與之傳虗九九而内明兮剛柔錯焉以敷宣翫朝歩之竒文兮握竒五以黜煩建中極而滅端兮成品物之自然湛然一以貫兮曷知其後先數京垓以成變兮迎拒之而莫偏歛莫知其跡兮為道之全夫形既不可以乆擅兮神與之為槖籥迫朝逐而日騁兮引正命以自絶棘戔戔于車道兮精離􅆬以蕭屑秋陰􅉃其凄骨兮熠螢光之明滅手三秀而不忍茹兮腹殷殷其雷裂奄兮愀兮忽以放逸兮何昭昭其章徹亂曰玄神凌兢兮命壽不得長闒茸曼衍兮既樂且康衆皆馴怙兮靈胡然而秉方擷雲英兮微光佩雜芳兮彌章駕赤鯨兮騰驤絶六虗兮放八荒注北斗為漿兮内熱不敢嘗林有桂蘭兮水有鰋魴所思弗見兮奚故鄉挈眇風兮樂未央吁嗟逆化兮寜怛傷廣招深寜先生乗虬上征江海殄瘁湘纍遺痛千載猶一日也栁車爰行瞻望永隔門人袁桷竊取宋玉招魂述廣招以反其義其詞曰竊獨悲此翳濁兮身鞠恧而莫明服三后之貞則兮秉忠純以内兢䋲古義以自抗兮懔微躬之莫勝懼天命之不吾與兮晚更號以深寜委靈魄於玄宅兮挟清神以上征重華􅃤其無容兮瞩下矩之險隘侈九夷之曠邈兮申前聖之遺戒一去而莫返兮八靈孰能以震駴乃命小臣戴縰秉旄注精髙㝠而下招曰茫茫封丘􅍪豕萃只炳靈奔飛杳交㑹只嬋嫣清芬孰返斾只縱横幽房雜厖恠只魂兮歸来其益以駭只東門熒煌平蕪層隂只靈宫紫芝萎以泯只流鈴揺空訴夸滛只玄蛇蒼鼠若擾馴只魂兮歸来􅈭越吟只題躞蹂躪白蟫飛只滅方鑿迂傳致以肥只闘青綴白眩纎竒只折楊黄華司體儀只魂兮歸来彼相疑只沃隰修畛鞠薺茂只狂夫冶游胡􅉃後只南山白石曷以永年只式擷其嶶悵周原只歸来歸来其孰能庥魂只愁雲旋宇隂籟振幕只素空霏塵清晝􅈭雹只虎蜼黄目屏陳設只精鑿後置􅪈蠡施張只伊嗚仰天雜猖狂只甘脭恣睢禮不可防只魂兮歸来悉無以當只魂兮乗桴登瀛壖只海觀日浴爛紅殷只晳容長裾襲古先只漆書竹簡遂研鑚只崑崙穹隆疑有至人只妙顔紫蕤休徳日新只吐􅎇納和與道為鄰只雕題祝髪禮讓興仁只桂蠧咀吞味芳􅉝只幽蘅嘉芷佩孔文只相羊湘纍肹若存只承挹清塵徘徊翩翻只天光淳耀㑹弁森扈只肅容展威受多祜只斬几破觚斯皇輔只龍圖昭回布髙矩只􅄏陰蔽陽庶類蕃嘉只捫􅊗箕尾䢖崇牙只翦理姦巫靜無譁只炤示下土循羲媧只河公海神瑰以迅只貝宫鮫室袐恠雜孕只瓊英琪柯錯繽紛只鞭龍誅蛟霈澤湛潤只魂兮逺游戢凌紊只􅀭歌舒嘯化幽憤只重曰嗟所思之不得見兮儼冰雪之遺容繄遲遲而容與兮松柏日其葱蘢悵幢帷之咫近兮長虬脫焉以追風蛻塵居之險艱􅀆捨崇蘭之新封塤箎迭其和奏􅀆聮雲車以陪乗粲琳琅之遺編􅀆俾泯絶之足證匪離群以自絜􅀆誠不忍夫騖騁超整駕以言􅀙􅀆懼見譏乎後聖揖虗漠而言旋􅀆耕書田以振厲諒神明不吾欺􅀆庶終承乎嘉恵千秋􅀆靡長白雲􅀆相望魂􅀆歸来其母我忘也七觀翰林先生納榮息機謝白玉之堂􅀅歸于􅏘源之山房越公孫懐牘濡頴託物喻志考圖審曲若鑑之納視言忘而意消類别而理􅇱有郢大夫癯然褐衣目不接乎黼黻耳無聞於律吕囅而言曰登髙能賦􅁋㬅荒忽智專者魂强形滯者物逐昔吴州来觀詩東魯言有度徴有㩀厲階於枚生濫觴於曺王先生楚産也雲夢汗澷巫峡㠝岏胷蔵腹蟠公孫不足以教我先生殺青南山積簡羽陵若網有綱若墨有繩舉凡暢微我其聆諸越公孫曰太素􅃄熅清濁奠儀雨風露雷動植攸孳辨方審良民用不疵六氣以沴日夭其世彼諄諄者皇曰汝命實長􅍏土燥剛相其温凉我生命在天順以受年巖居谷飲中道以隕執書以觀有涕汍瀾陋彭鏗之􅊇理兮何恣縱而益顔言技可以進道兮吾當繇是以返觀納膓補蔵􅉃忍莫竟石立土踊孛彗迕􅊇吾猶以為天地之病也􅁱身俟命道之大經先生之正也大夫曰神之所行何體何方拘者為儒請更端以告㒒夫越公孫曰靈曜宣精五紀順明察幽考微法天以行形氣芸芸吉凶卑髙觀象以分韜兮靈根感不以言繇動彰靜百神受祜虗者為音質者為數昔后稷氏之職黍稷薿薿智者過謀胡盡其地力民日作慝相攸食墨風雨斯蔽連雲岌嶪飛不得垂喙履不敢仰視旁營萬家地記萌芽赭衣僨蹶而淮水復絶鑄鼎伏姦能沈于淵吁嗟而求桑林之羞要荒擾馴王㑹盈庭獻琛效珍物不可枚陳雞豚以時父恬孫嬉何助邊蔑思屈曲洲㠀家累千金資先生昔居列僊之館㩀要集思謂象以理明妖由人興守諄芒法清寜却走馬于郊謝重譯之雉陋三脊之茅熙熙陶陶舒舒夭夭不言而歳成無營而事貞夫子不云乎一致而百慮其是之謂乎郢大夫曰汎觀博聞於道彌損願滌耳以抉其蘊越公孫曰粤昔尼父唯俎豆是斆撃刾坐作囙民以教蒐苗獮狩車徒卒究􅍏今輿圖八表同暦四貉交軌月竁風丘冰天桂海馳心望雲請命欵塞千廬呈環八屯山列羽林繙經飛騎皷笈然而樂成者難與圖事守文者不足語智嘗聞之兵農同封耕戰同功魚鱗鴈行敵莫我敢當府散籍移萬姓流離强帥拉脅外寇憯肌卒不可拄支後王鑒觀法日以繁厖者罷者恇者羸者駢頭引吮食粟而嬉開門納兵百郡是師何草廬髙吟﨑嶇雜耕何杜氏之子傳癖孔深而緩帶以征射以容觀劒以氣言批亢擣虗孰知其隅折衝厭難莫窮其畔至若握玄圖視􅀛文縱横起止與易象相表裏者驟語之吾懼大夫之竦眙也大夫曰兵者不祥之器未效此知也越公孫曰炳靈心君闢乾闔坤情聲相宣立度出均昭昭鴻藻緗縹是存敢先論楚材而言之漻漻乎形畏垢而將翥也霏霏乎睫承露而欲訴也荒蹊斷葦燐滅沒而疑聚也織文楊徽􅄃芳菲而雜組也少焉商飇號鳴金石琮琤逐虎摶兕韝鵰鏇鷹寄莽蒼於一瞬乗扶揺以孤征終緩轡以就日愴倐淪乎西傾噫悲何為哉古有巖居之士抱竒抉幽漱芳深林憩􅄫凍流憺乎其若遺窈兮其若留鉤盤助之為回旋虗牝答之為獻酬猿三疉而墮淚鶴九轉而凝愁鉤玄採微迄無終窮瑶席敷張髙歌慨慷語初麗而終放託餘韻於宫商然此其戔戔者耳攟拾蒼雅刮磨誥盤微粲貝編飛英露􅄎何譏乎肉食之鄙猶鄭穆而魯桓也大夫不聞之乎鍾石絲竹各随其聴隆汙有時其所遭者命摩盪堪輿吸呼羲娥矢為帝詞叶為賡歌五嶽賛襄百靈護呵不􅁄不茨如砥如磨彂潜漏泉掖民陽春瑰逸為新簡絜為真列若戸居别若渭分雍容者珩璜冲逺者英莖縷絶而緒續醴甘而齊清昔之擅名偉著耿􅀆其不能以十百程也浮聲切響直意肆志澎湃訇溘淊滔莫止据理者夸飾言者哇嫫母􅀆姑射􅉢刀􅀆鏌鋣謇莫任􅀆奈何大夫曰文章與政通玉署之職也文勝質則史更言其大者越公孫曰矻矻中壘校讎靡寜世本年紀繫于麟經捨相府圖書泯其緯經炳麟金匱汔罔敢配廼司馬氏决榛鋤翳麗者為譏􅈭者為刾升渉丗家表籍作紀言諸侯無史史立周圯鄙儒畫墁削章刪凡爝火並日卒澌盡莫傳昂昂荀袁辭約義完何班范家至耿光綿緜相繼擬述百丗一律素王簡編如日在天熒煌髙張孰敢附肩鴻化以漓研探益疲穢者闒者襲者濫者淟涊畏禍希企市價謟不表直俚不師雅若聾皷鍾若盲策馬元經附訛唐暦受呵後有紀略迄莫同科尹石猛志證古比事百不一試歐陽氏出方名山所蔵復大同而小異勢不兩立其魯史之謂􅍏今繫諜川盈記註􅌨比故志存廢興之源典章酌損益之致登瑶山而神駭游鄧林而目眯般倕効吁随和彂涕操觚之士吾將見其心赧而神悸也先生登祕丘覧群玉積石倉標朱目墨兵筆削融液乎粹精囿赫胥鄰大庭大夫冝􅀙下風而乞靈也大夫曰皇王惟熙帝覇孔􅇖我心增悲韓愈不為史名以四馳何庸知焉越公孫曰煌煌古帝别生聚方煥乎陶唐五服正􅀖五典率常導之無違民用熙熙授之以時聿来孜孜降于三王􅍏緒曰孳集成于蒼姬黼黻憲章金石命令緝熙太和宣昭群姓纎鉅之備粲乎其有秩也豐殺之制屹乎其有截也三光重輝百辟拱列歲時易移而浸􅁋蘖芽弱者綴旒强者鋋戈智者探嚢勇者㧞河搏犀象屠蛟鼉飛矢請命旁午係車焱乎浮雲迅乎奔塵炙轂滑稽之士紛然而並陳棄仁㤙假鬼神混君臣各馳騁而懐新數千百年人亡而說具勞乎離婁不足以一視也薾乎王良不足以一御也其􅇰大可病者恬泊守真可以養身不可以治民絶性棄命黔首螙病孟軻氏有作吾見其髠鉗而舌咋也言未既郢大夫曰天蔵山中瑾瑜匿瑕問以辨之􅍏徳日華儒者詬病卒不能以勝何道􅇰髙子盍陳之毋􅈭毋勦越公孫曰古昔顓童受業閭塾書數首通訓故是屬聲歌象舞目接身服相親有恒日用不瀆後帝不相襲縁祀興文八音􅋁寥五禮紜紜鏗鏘莫明而聚訟若焚鄭說乖誤後圖踵循象制益湮周官别出議者欲一繁紊綜錯操網而入林􅃴越而轅北也類禮孔勤五厄莫存後有倣補去取未就􅌰乗虬􅆖雲字以文合聲以音比旁行敷落侏離狄鞮文􅁤同風不能以一致孔壁莫推二經蕃廡聱牙為今簡儷為古謂道統是傳曷敢有語詩基文王而周召先興首章異同衆說沸騰風雅變言美者為訾直者為詆魯頌紀異秦誓告終何後學瞢瞢迄莫之通麟麟魯經議口法吏謂齊晉無褒而日月具刾紛若蠭蝟眇若糠粃不虗其心不明􅍏視遺珠抱疑探箧積毁然此特人文之經緯政治之用體也三聖述作包河緫洛二儀生扵心萬化制乎神迎之而莫親拒之而彌存疑者遯者愕者困者湛兮消兮委兮昭兮沉思遺物形離超兮􅈭廻飈兮闃而寥兮縱雲翺兮憺兮儒先從我招兮郢大夫曰始吾見公孫疲􅒵若不足突梯若避辱靡精槁神何齗齗然也今知子矣永譽處矣吾與翰林先生徜徉此土小年大年猶以為朝暮也歳先子命繕治書錄觀史志畧錄部桷不佞遺諜守儒號東南故家志學之目矻矻三十年合傳短長廼成一家承第時見舛雜稍長得博考先賢蔵書緫賦之遂作七觀極道源委延祐三年歳旨程公作蔵書山房于麻源三谷命桷丑㑹稽􅀽桷誌在丙辰七月癸嶽麓圖辭二章嶽司南􅀆齊紫㝠懋陽徳􅀆炳靈二老􅀆素綦握鴻濛􅀆矢詞百泉􅀆一谷釃為川􅀆為瀆玉霏霏􅀆日光湛淵默􅀆含章至言􅀆在圖同八方􅀆遂初重華逝􅀆不返晝猿啼􅀆􅍑當坂望䑓􅀆蘼蕪蹇一士􅀆拮据百楹􅀆承宇􅆽山瓢􅀆以為醑松風泠􅀆琅琅儼振佩􅀆髙岡朱羲出􅀆􅀭靈積隂伏􅀆大明百泉飲􅀆在齒懔交流􅀆不可以止嗣徳􅀆孔艱清徴􅈭􅀆回瀾悠然閣辭鄱之西兮峰圍圍虎豹屹兮雄姿綬蜿蜒兮紫属旌駊騀兮虹垂之人兮槃阿畏羲娥兮髙駝築榮觀兮通明手參差兮以娱棟隆兮示背榮翼兮聳喙鑑匯雪兮鄱之區捄有七兮日􅆽採鞠兮黄裳緝茰兮紫囊芳㝠㝠兮夕暉憺獨睇兮擬所思雲飛英兮山之阜為予留兮不遐以處秉貞兮神專觴彌􅇵兮益完山中之樂不可以乆遲予返兮悠然楊堅州治孟津金堤成作金堤辭波湯湯齧我堤民昏墊晝負擕地不寜緣木棲楊侯之来承帝則順事隂氣神以懌赤蛇蜿蜒吸桂漿百谷受令故瀆常彼隰柔桑猗澤維秔侯言神綏曷敢功民言侯績天心通百妖伏精金石宣明三旬有役金堤是復石田山房辭大梁馬伯庸寓居光州作石田山房為作辭曰淮歛波兮練繒峰植秀兮翠旌翦黄榛兮布耕石戔戔兮稜稜思夫人兮造攻雲電合兮追鋒遺鏃兮齧足壤逸休兮果腹神符一兮告祺藹惠則兮貽思靈之来兮歳祠不鄙夷兮以嬉疏房兮笋席溫風至兮靚密儼竹素兮横陳曰靜脩兮手澤丗芬兮日起百稔兮無斁石田兮有秋累胼胝兮吾奚以愁謹樹藝以自朂兮植先徳兮無媮雝本兮頴豐導泉兮澮通夫豈不知有善歲兮吾曷敢燕遨以幸逢望八公兮巖巖王孫悄兮莫還積荒幻以自迷兮捨息土而弗芟衆芳婉其披離兮秋霜慘不能以實謝紫芝之療飢兮治精鑿以煉質亂曰苗詵詵兮善吾耘兮日出作兮永􅁉樂兮學猶殖兮吾將以為則兮雪江圖辭雲玄積兮素摩挽羲車兮馮河蘆戢戢兮倒戈岡伏匿兮鸛鵝昭朗兮夕徹群動􅄫兮影滅超逍遥兮一舸食榖精兮腹羸地險兮曷憑馬飲波兮夜騰委素練兮宇清舉皓首兮吾奚以屏營垂綸亭辭為宋誠父作漢滔滔兮日傾東滄浪兮泠泠蹇一士兮沈㝠垂芒鍼兮不屑以􅊻明玕兮貝宫朱蔚兮青葱魚戢鱗以為衛兮龍騰章以屏氣謝姢嬛之嘗巧兮口垂沫以縱恣吾寜養之以歳年兮寳祕鬱而不宣豈直鉤以違衆兮守釣道之自然時至而迅舉兮匪荒幻之詭誘保貞志以遂初兮考銘言于耆叟世俗眇其莫同兮永訖依夫前聖之所究巨峰辭為吴成季作千嶂兮嶔崟特峰挺兮絶垠泉交流兮織文粲霄臺兮鱗鱗檜節兮松纛接路兮以遨儼至人兮清寥休徳新兮日昭神曾舉兮重玄大帝儼兮授簡以宣曰渾沌其無迹兮孰為之傳氣積兮九乾五緯從兮右旋逆知来兮順以徃握靈機兮測天狀葆正命兮滅企妄受帝語兮還神亰山之下兮雲亭亭澹獨樂兮復丁則㤗始兮道甫成雲中辭氣芒忽兮孰窮其升淵迴旋兮挟以騰圓為輪兮直者繩握歛散兮莫名山之􅎛兮日暾彼獨黯兮上屯從豐隆兮駿奔需不進兮惛惛下土兮垢氛靈夷猶兮曷存炯余視兮屏息桂酒􅆽兮瑶席法玄化兮以康食神功脗兮奚以跡衆甫集兮粹精憺將逝兮廓清春雨辭玄隂固􅀆内凝渰薈蔚􅀆􅈚沐興注􅀆建瓴疾􅀆灑兵下土􅀆沃焦謇徜徉􅀆紫霄来弗以趾􅀆去莫可招澹幽士􅀆空山息視聴兮玉顔帝青廓兮籟沉虗牝汩􅀆潺湲謂彼有聲􅀆耳益以聵疑不釋􅀆詢于大塊義婦辭東平孫珪妻盧氏彼棖煌煌􅀆過者式之黯予心之初􅀆孰㦯測之紡􅀆于房伊雛孔傷饋􅀆于堂我姑永望余不聊生􅀆矢神告之􅀊月遷流兮卒迺復之鸞鏘兮飛鵠松柏茂兮朝露沐石可泐兮志莫虧儼舜英兮介壽祺哀蘭操盱江吴允文咸淳末與家君同佐江東幕府允文慷慨喜論功業倚青溪檻張髯頓足籌邊事歴歴在口傲視府公每一至賓次席甫坐即去督府舟抵龍灣金陵郡文武郊迎謁入皆謝不納獨允文立江亭掩袂大慟必求見始退未幾以王宫教授名方是時江淮幕府僚佐言性命道徳者悉詭號為知兵得入朝言事而允文疇昔素論兵尤竒偉可聴故得驟遷為起居郎復直舎人院流􅄐南方寓䖍州時文丞相緫兵兵浸弱允文復以平時論兵丞相獨傾下之兵日迫丞相酒酣與允文論生死允文未及答丞相呼軍校斬之噫允文要為竒男子其未答也抑將有所為也桷九歲時嘗拜允文於家君坐上想其風采凜凜猶有生氣今覩所作墨蘭不自知其悲之無從也作哀蘭操以矢之暇日當弄絃繹聲以配易水之悲壯幽蘭兮秋風炯命兮不逢剡剡兮素蕤零露裛兮莫持望崇岡兮不得返悵江南兮愈逺叢􅁄兮戔戔欲駕兮無轅孑中野兮屏營芳隕失兮玉零謂我為非兮吾何辭已兮已兮其將何之幽蘭兮勿悲生失㩀兮死有期思夫君兮意極從逆化兮何隳蘭竹操為子昂作柔者不卑剛者不凌貿貿雪霜心兮以寜且清噫招過學恭吾曷敢以從彼髙者砠彼俯者磧各全以生不媚奚慝尋不可以枉寸能有所長亦獨何心兹奚以傷戔戔兮叢􅁄髙者下兮曲者直􅀭靈兮靡幍介石兮誰瀆功成者去兮孰尸其榮辱為佩兮弗忍以刈為杖兮弗忍以􅆷杖弗以扶危佩弗以服香其咎􅂚當履維徳基其無缺以自隳噫黄可玉哀辭孔子叙逸民所尚不同愛其近道吁是有感於世也耶又曰不得中行必也狂狷乎狷者有所不取矣剛絜養正矯矯然離垢立竒語益不合行日以􅄶若是者誠不取矣苟為之不能知知之而自警者得一人焉曰南康黄先生可玉可玉名石翁世儒家居廬山下少多疾父母强使為道士讀聖人書能知其心謂道與言不可以有行也必蔵智頽放以自養約結制行非介以為異也其著書極於憂患者困之通也嘗曰曼容姱節支離不能也平丗易足吾何為乎是空巖隠穴廓然契領至則曰游聲養名非士之實跂而望之去聖逾逺故其所為詩文靜而不馳溢于哀忿則可玉自號之曰狷叟者其果知矣可玉所居室多唐宋雜蹟間疾作閉户反復在手疾止危坐若思客至馳辨榮辱可玉閉目不復答而人始咎之嘗與余言吾鄉善醫曰劉開能已竒疾里人病噎嘔藥不愈劉徃視之云廬山某日雲氣開君憑軒眺引之當愈後卒如其言余少固多疾今疾益􅇵不知用劉治法可已否相視大笑余來京師報書言茅山陶公黄庭出可急購購成當同議中黄畢法未幾竟以疾死嗚呼可玉言幾六十死矣􅂚哀也已學老子道志於壽余不志爾謂其世無佀而哀者亦介之的也伯玉砥礪志節歳乆益湮讀其自為銘知可哀也已故為作哀辭辭曰朱光絜精受昭質兮熅熅靈根曷幽鬱兮鉤深索竒儼古聖兮徳充以尊履制行兮䘏彼拱璧奠皇圖兮劌以為隅衆引誣兮呴俞突梯道之非兮挟輈以行慎樞機兮層冰在蹊踐其絜兮幽蘭允芳誠不敢裂兮清􅀇返真氣始升兮謝彼菀濁超變騰兮空山闃虗􅈍蒸殽兮渰焉白雲從我招兮林彦栗哀辭道家言黜聰明去徤羡形神始完是果為得道耶古者上夀百二十歳竊不死之說者則曰脩之益真其道彌親壽而無徳與名君子耻之故脩短有命遺壽焉猶可言也名徳不至其澌盡腐滅又安所取㢤古之人若是者衆矣永嘉林寛字彦栗形癯而器溫其於學也汲汲然逐日以補有不足焉則力探簡􅁽以自證其為文必達於理而始精於詞謂詞者載理之具也理不足焉詞雖精無益也深思以求之旁取傳記之說勦絶傅㑹㩀宗統原以㑹于一復懼其未盡是也則祕重自念將周游四方􅇅疑廣聞目擊而心領焉噫若可謂勤也矣道散扵九流百家彌綸者至矣其弊有不勝言者汎濫俚雜尸坐瞠目漸入扵無聞之傳余嘗察彦栗知其心有深憂者焉余始見扵姑􅂫氣和以謙再見于亰師愀然以思取士之道非一嚴畛域析毫髮有司者之過遺逸不舉則凡吾徒在官者誠有罪矣彦栗志不在是推彦栗之志在問學為之而不克就若是者是真有命矣悲夫延祐六年三月卒于亰師年十有其弟宇友謹哭曰吾必奉䘮歸姑蘇姑蘇吾先人所蔵遂為之辭以申其哀焉辭曰氣清明兮受元陽徳弸中兮闇以章挈太古兮儼九皇播絜精兮瓊圃芳力未具兮志則專一葦渺兮濟巨川慨不進兮道逺邅白晝速兮隂風旋數實紀兮吾何愆路孔􅁱兮神獨還靈旐翻兮木葉丹儼夫人兮在空山玉蓉􅃣兮紫佩蘭玄教大宗師返真朝元歌九章以前導雲飄飄丹臺何岧嶤中有授經之老顔不彫三光盪摩四時代謝神来歸靈承帝罔敢替謁珠庭􅋁陽空洞六聖儼思九垓熙春羣黎受禧昔騰章閶闔通金書儼在水旱功朝重華五嶽奠形飛車􅀭鈴翔鸞騰晃金精下視垢濁何沈冥昔者之来運有遭今者之徃清且邀神虞娭匪衢以乗匪車以征盖葺兮摩旌洞簫􅈭兮泠泠磅礴一氣兮冥冥精思道樞兮跪頫聆玄雲駝玉几差差文織成龍章鳳翥相緯經大言鴻濛小言毫銖道在瓦礫匪别區念昔人世我非娱唘圖籥煌煌文成􅍏㣧嗣昌靈之紹合永貞陟降四紀心兢兢視彼成虧凛春冰髙朗脫屣辤世榮靈胄光簡兮無言默兮若存生以不生為根死以不死為門絶學丕傳黜其知聞五千之言世永傳握重玄熙洽休明紫蕤朱英侍帝左右夀考寜唘祐玄緒何繩繩嗣昭代歲無害佩鏘鳴兮衣綷縩昌期運髙維松層岧岧歛玉顔養金膏鍊形以昇朝帝青周流萬變鎮神亰佳城髙清容居士集卷第二
