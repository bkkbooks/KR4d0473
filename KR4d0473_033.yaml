body:
  text: 表志西山阡表嗚呼我大父嚴州宋寶祐五年丁巳六月七日庚寅即世年六十有七後六十有七年是為皇元至治三年嵗在癸亥聖天子推恩文武錫命有秩不肖孫桷以從臣遂得贈中順大夫上騎都尉會稽郡伯大母令人王氏會稽郡君是嵗五月丞相忠獻王薦于英宗超拜侍講學士泰定元年又贈嘉議大夫禮部尚書上輕車都尉會稽郡侯郡君加會稽郡夫人嗚呼桷生七日而母史夫人卒先考處州嘗語曰汝外祖敷文轉運公諱賔之淳祐十一年辛亥嵗秋八月病且革嚴州詗疾候所命于時汝母年六嵗余年七嵗即指曰吾女以中外表願奉公幼子大父謝且立曰幼子獲為越忠定王孫壻它日生孫寧負吾兩門哉桷泣受其語以識桷髫齓時喜聞遺事于時越公賔客子孫宦途著仕而大父遊從咸在嘗語曰越公為京尹十有一年擲括隱伏抑強振惠繄汝大父密以贊外若韋布使世不知有子弟名字其居越公喪盡喪禮喪除廬于墓不入城府者三年匪惟鄉人言之外州士大夫能言之退考于家乘曰初補承務郎監無為縣襄安鎮知建寧府浦城縣丞越公久侍從升政府而執政子求外仕令不許故再任佑神觀紹定四年越公解機政始得授江南東路安撫司幹辦公事端平二年以侍養請于朝優許之充沿海制置司機宜文字淳祐七年通判嘉興兼尚書省提領田事所檢閲乃曰吾得以仕矣治府事無留難囹圄以空悉以越公尹京法治之郡守謝不能提領户部財用史宅之悉括諸司田阿媚奉上具籍百餘萬用户部印入御府而以副帙置三省始愀然曰吾不可復治乞歸三年授江陰軍力辭以疾後户部果督責浙西諸州虗籍守臣爭納告丐罷言諸司田皆朝廷舊籍欲入虗籍則宜蠲舊籍未幾宅之死始悔罷而副帙在三省者國亡散落民間言利大臣深信之卒為東南害十一年知嚴州寶祐二年提舉台州崇道觀積官至中散大夫鄞縣開國子先處州登朝贈中奉大夫再以登極恩贈中大夫維我大父訓範嚴密居家治具畢舉區别工技悉精其能堂奧危坐無笑色聚書至數萬卷圖畫鼎彛鑒裁得源委而先處州遵奉誡令教子晝夜不廢桷得以譾薄文藝敘升翰苑幾二十年再為集賢直學士今復超進為翰林侍講學士夙昔期望于遺言見之今墓在桃源之西山王氏夫人合葬焉大父諱似道字子淵曽祖諱臯纍贈太保妣楊氏越國夫人楊氏魯國夫人祖諱升纍贈太師衛國公妣楊氏齊國夫人考諱韶少傅同知樞密院事資政殿大學士纍贈太師越國公妣陳氏周國夫人配王氏平江府吳江縣癯庵先生份之四世孫蘇養直向伯恭張安國朱元晦諸賢賦詩于其家圃有詩集十卷行于世長子諱浚奉議郎淮西制置司機宜文字入皇元改授承務郎賔州同知娶史氏孫四曰棟梅柄栐孫女十曽孫五彥毅亨端辛孫女一先處州諱洪朝列大夫同知處州路總管府事贈中奉大夫浙東道宣慰使都元帥護軍會稽郡公娶史氏楊氏並追封會稽郡夫人子桷為嫡長孫女三曽孫二瓘瑾女四人四世孫男曮曄女德秀袁為鄞聞姓晉政府繇越公始至于大父承緒展世不赫赫以求髙命所居堂曰拙逸曰得間殆見其雅志將以俟于後矣夫德厚者報深恃報自佚必不能以顯郡公事兄若父讓爵避財鄉黨至今能言惴栗四十年而教子督切則曰我大父之訓我不敢私今雖未砥于成詩書之澤殆能以自白嵗月逾邁交友故吏澌落幾盡隧碑有缺幾于無傳是則有罪矧以不腆之文行于南北庸述祖德刻于墓道俾子孫有考泰定元年嵗次甲子月日孫具官桷表先大夫行述先大夫諱洪字季源姓袁氏袁為眀州著姓州升為慶元宋仁宗朝詔外郡得籍開封舉進士嘉祐初為開封舉首者諱轂後通判杭州蘇文忠公時為郡太守日論文史典處州以終贈光祿大夫其宗諱玨亦占籍開封試進士歷官至祥符縣丞因家焉為公六世祖五世祖諱謂贈少保髙祖諱臯贈太保靖康難作隨青州兵復歸里積善好施年八十餘預言死期别親黨沐浴端坐以逝曽祖諱升為眀州助教贈太師衛國公樹德力卑讓鄉里尊信郡有不軌大獄命公攝治即其家搜驗得偽署籍姓名一千餘人皆六縣大家不以送官立焚之異行遺事世多所傳録妣楊氏封太恭人贈齊國夫人祖諱韶幼學于族父正獻公燮登淳熙丁未第嘉泰禁道學自趙忠定以下皆入黨正獻公坐廢越公為吳江丞得罪蘇師旦俱家居避禍嘉定改元褒敘趙忠定公朱文公于是相次被召先後為侍從搢紳榮之尹臨安十年神眀愷悌自辛棄疾揚王休馬大同丘崈以後推公次之為同知樞密院事以資政殿大學士銀青光祿大夫奉化郡開國公致仕贈太師越國公妣陳氏吉國太夫人贈周國夫人考諱似道中散大夫知嚴州總核事物能通達損益然不樂仕進守次江陰將行乞祠祿以歸理宗異之贈中大夫妣王氏恭人贈令人公嚴州次子七嵗能諷誦詩書左氏通大義以越公遺表恩奏補承務郎年十七試吏部銓監鎮江府大軍倉眀年道臨安馬光祖以樞密為京尹上書往見之馬公喜謂曰是故袁越公孫耶光祖治京師皆先公條教今官位適相同然貴家諸郎多不達文墨是書果子所作當留以自近公謝不敏遂改辟監桃源酒庫檄入帥幕時馬公號嚴敏客多畏避不敢進率秉燭決諸曺事命四客坐四隅禁私語夜分間以成案俾閲先後是否一日擇卷牘繁冗者以試公公疏其要領言是事曲直微有隱某官所擬微兩端馬公大喜日以不決事委處分將俾徴旁邑逋負公謝曰初入官而以括責稱懼失先公遺訓馬公謝之禮部尚書李公伯玉薦可治劇邑中書舍人劉公震孫薦可理瘠縣馬公去國改兩浙轉運司幹辦公事轉運使胡太初刻峭善伺時相意旨公不樂之請告歸里胡亟怒以緑匣􅊾還司署曰不即來當議劾公起視事或咎之乃慰曰太初先子先樞密門下士知子能官固若是後潛説友為轉運􅊾督寧國絹十六萬匹公婉謝曰嘉熙以來江東稅絹皆虛負實籍寧國尤甚莫若悉蠲虛名止取景定至今年逋且昔時嘗以不能謝馬公矣説友懼蠲數廣亟命他吏然卒不能辦為禮部貢院封彌官甫出院度宗忽降手札諭賈某曰舒津太學名士袁洪嘉定名臣孫宜與升擢差遣舒同里人賈疑有內援遂除舒太常博士公為太社令就職兩月諷門下省論而舒亦以他事去賈相嘗曰浙東唯溫處士可任事四眀士不宜用于時髙公衡孫趙公汝梅以户部侍郎汪之林以汀州陸合以軍器少監章士元以太常少卿趙孟傳以贑州合執政官至守倅凡六十餘人皆家居月為一集約討論先哲言行不得議時事繇是公益得紬繹文獻深愛重自晦絶不通京師書問賈相悉偵知之乃命主管華州雲臺觀咸淳壬申遷通判建康府公閲事敏決老吏不敢詒慮獄句容有偽楮連坐二百餘人悉出之㝎議止誅其首帥趙溍貴騃不親庶務僚屬上府謁不得入率用紫袋取畫諾公坐賔次命吏白帥今邊事益急惡少年掠奪市上將驕不習兵非紫袋可奉行帥聞即延入閣出遜語且曰將循視沿江諸屯壘苟可安便者毋忌也甲戌冬十有二月帥行郡中大驚爭移徙出郭而村落民與故侯聮絡者復入城有約白晝罷市公詢扇亂者斬之戒門者毋納村民城中始安夜多火災有徼卒瞻對詳練公私以白金立署賊曺一夕卒馳報有賊約以二鼓縱火東門劫門鑰以出今賊俱在廟中治火具公遣卒往伺賊將出廟門捕二人有緼火在手即斬以徇諸將留城者皆故侯部落至是益蹇傲願習射求官賞且曰在昔唯陳招捕習騎射今不能復見此等相公矣翼日將巡城請公乘騎吏擇馴馬以進公命取將馬來將異之坐城上召諸將曰郡庫非制置使不敢用若等求較射吾當以私財定髙下語畢入射將挾矢前喏曰願奉約束然不敢先公手弓遂弦三發皆中革一入的將謝不敢公強之終不能並卒定其賞如初諸將前曰惜侍郎官晚然事不可為公默然侍郎蓋江淮間幕府通稱也二月帥調精鋭居屯江城中羸卒數百相偶語有卒夜從江滸還言趙制置已南遁數日將解兵還淮西總領費伯恭棄軍資夜乘舟如通州入海賈相師潰歸揚州諸將率故侯部落將劫公出城公不得己微服間道歸臨安見太常丞吳浚浚舊為沿江參議與公厚善相對各泣下公曰國勢日蹙諸將率聞風內叛浚薦丞相陳宜中將留用之公願自劾待罪急辭去趙公孟傅尹臨安奏為浙西安撫使機宜文字不拜趙公制置慶元復奏為沿海制置司參議官公時已升階朝奉郎亦不拜乙亥冬臨安奉表降謝太后詔諭東浙諸郡如命戒毋徒以百姓汙鋒鏑時入南軍道上虞餘姚焚掠以行聲言留軍慶元備禦居無何王師將壓境公見趙制置言南軍以具海舟實無意留旦夕必入城縱焚當先攻甬東門宜戒火政分卒保東城以全居民未幾果縱火焚浮橋劫江滸城有備不得入舟出定海以行制置司改宣撫司復署為參議人心危疑旁郡邑相屯堡未散舊不快意于衣冠者爭上變入爵參議官陳允平素與王姓讐讐言新從福州航海來見陳參議為書蘇都統約以九月乘帆下慶元當出兵以迎又言禮部尚書髙衡孫而下三十餘人皆聮署勸進時張元帥督師將征南命招討使王世強圍捕鞫實公儒服立庭戺見王辨陳參議與聮署書實亡有招討故為宋官寧知讐不為虗言王未應有戎服長髯者將登階見公亟下拜持抱曰此吾袁侍郎詣王前曰傅海舊為建康壕寨官承宣使阮思聰與侍郎巡城議列木柵阮言城廣不可守且木柵無所從得傅海答曰蔣山左右巨木可取撤近郊居民屋髙下附益可立具使果欲守良無難阮故呂太尉姻盛怒將以軍律抗對殺海袁侍郎悟旨急叱海入獄眀日杖海而遣之今不知侍郎何故立庭下海願以身贖罪王大驚具賔禮以迎且告元帥帥引問之故公言安反側定新國當絶告訐羅織翼日元帥盛軍容坐府有告者復言奉化昌國某大家以故王為名一從台州黃巖來一從海上來帥立叱去之陳參議亦繇是得脫郡大疫具善藥以施死者給棺以殯後戒以為常行之踰二十年至元十五年從趙公朝京師覲世祖皇帝天語命班秩宜髙從行者一等將授總管以子幼辭乃授朝列大夫同知邵武路總管府事以疾不赴至元二十年授溫州路同知疾作復辭公幼從王先生鑐學問戒以躬行為持身本每授以言行編諸書公守而行之至是書陶靖節詩顔氏家訓為一編以寄意至元丙戌嵗侍御史程公奉詔徴士首寄聲起公公遜謝不敢當大德二年改授處州路同知命下而公已捐館實是嵗二月十有八日享年五十有四先大夫性孝友事兄賔州如父器物田宅賔州所豫者猶辭不敢受嚴州遺澤二悉讓兄子淡嗜好自建康歸即獨處清坐嘗曰綺縠聲色非潤身延年佳物諸君何慕焉喜賔客終嵗無虗日客去復具饌以俟不喜言人過或甚不能自重者猶覆護言無是事急施與家無長物嫁娶喪葬有不能舉者悉賑與之愛博而內眀碩儒故官旁邑外郡俱館致教子弟嘗言吾交遊宜廣泛愛親仁勿為臧否可也有客素依公調官京師願奉公文書以效勞久之客得官羣議咎客公以書慰之君果有得猶我之得客出書示議者乃止善尺牘琴奕諸藝皆過人不自詫襮每言沽名激行為之良易然不可欺于心晚嵗過郡土神祠桷侍行指謂曰吾言出諸口今得視神無愧自丙子來冠屨雜糅抑負不自振嘗開釋防漸而扶植之或利害不便必正色廣論絶其萌蘖乃止殁之日鄉里無貴賤老稚皆驚惋不絶葬在鄞縣桃源鄉慈溪奧之原元配史氏太師丞相忠定史越王浩之曽孫祖彌堅資政殿學士贈太傅諡忠宣考賔之朝議大夫直敷文閣荆湖轉運副使再娶楊氏世儒家五世入太學景定壬戌太學進士太平州判官之女以宋眀堂恩俱贈安人男一桷史出女三長適丞相史莊肅公嵩之孫似伯前將仕郎次適工部尚書余天任孫昌期前通仕郎次適資政殿大學士史巖之孫益伯前承務郎孫男二瓘瑾孫女四長適同知餘姚州事趙孟貫餘許嫁未行痛惟先大夫言履歷歷在人口耳蚤登膴仕將大有為迄不得展究尚義勇斷施止于州里而中年泊然退靜莫有知其意者不肖孤藐然嗣承懼嵗月之久失于傳貽將益負不孝願託于立言大賢以求信于後世謹述歷官行事辱賜之銘而傳焉先君子蚤承師友晚固艱貞習益之訓傳于過庭述師友淵源録王鑐濟南人侍御史伯庠曽孫繇次翁始居鄞敦厚寡言幼師之精理學多録言行教人不喜矯飾壬戌進士張即之參政孝伯子孝祥從子善為頌語乾道淳熙事月日先後亡異史官李心傳嘗質之喜校書經史皆手定善本嚴州奉祠日相過從有潔疾語言清整待僮僕亦然書蔽其名書法之壞自張始特加太中大夫以夀終趙汝梅善湘子為宰相壻卑退自修精易象有易敘叢書可傳官至户部侍郎晚嵗以理財進用失士譽李伯玉鄱陽人為右司論事得罪後為禮部尚書薦以政事可作劇邑將入政府卒馬光祖婺州人號吏師改署佐其府性過急斷決無停滯一時新進效之鄉有馬元演時為仁和縣晨坐廨決事五百縣大治改官奏舉皆出馬公後為衢州坐殺飢民罷劉震孫東平人忠肅公元孫文清公之子魏文靖公之壻為喬丞相行簡樞屬喬相與劉嘗言越公尹京政治晚嵗為宗正少卿兼中書舍人知為諸孫署剡曰嘉定名臣某有孫敏材宜理瘠縣胡太初天台人以清苦自檢治與處州季鏞同其父越公門下士胡晚始自言事見劉克莊所為銘劉黻永嘉人左史出治慶元于時奉祠山中以居鄉清修薦世號六士汪之林里人龍圖閣學士大猷族孫為諸王宮教授守汀州晚嵗十年不通時相書逮識樓宣獻公言出處大致不可易居同里巷貧益甚卒應文煒奉化縣人精史學年六十始入太學蚤遊江淮吳毅甫作相兄淵守建康不去應作書諷之即謝事毅甫竒之招入相府不顧去史嵩之罷相猶子璟卿上書或言應為輔史相諷所屬掠治應益忿然卒得脫癸酉嵗襄陽降應言世事已去先子官金陵戒母携妻孥凡所言得失悉中曹説侍講粹中曽孫父為山陽佐死難幼絶葷娶精易象數論語詩春秋皆有解多折衷舊説嵗一再至易説為里人所竊今不傳聞在松江儒家王先生應麟兄弟中博學宏詞科為翰林學士禮部尚書咸淳詔册辭命皆先生所作著書有春秋考逸詩考古易考通鑑義例考困學紀聞玉海一百卷文集一百卷先子命桷受業門下十年胡三省天台人寶祐進士賈相館之釋通鑑三十年兵難藁三失乙酉嵗留袁氏孰日手抄定注己丑冦作以書藏窖中得免定注今在家吳浚建昌人喜論兵為建康參議數凌侮郡將賈相督師舟泊龍灣客謁不得入吳大慟賈竒之後入為王宮教授纍遷起居舍人嘗薦先子于陳丞相入南起義兵事不濟議降文丞相殺之戴表元辛未進士善論䇿失仕歸里力從諸先生能古文為金陵教授時與之同官家貧衣食喪葬咸賙之後留孰中有榆林集五十卷黃震慈溪縣人以清介聞賈相知之守撫州兼本路提點刑獄迄不能合坐論去性不喜鄉里獨作書以所為日抄一編寄贈陳蒙鄞縣人國子司業塤之子善筆札治獄多探竒嘗疑之後為淮西總領以浪用公帑罷貶建昌晚守溫州夜别先子行益詭誕子孫散亡不可考安劉汴人居鄞之小溪以詩義冠多士善清言三歷祕丞郎官素為賈相客安以科目自持卒不得顯用程巨夫舊名文海郢州人今居建昌善鑒裁為侍御史時奉詔徴江南遺逸首薦先子以疾辭所薦士皆知名多至大官今為翰林學士承旨謝昌元資州人淳祐甲辰别院第一守封州提舉廣東常平幼嵗見劉文節公光祖能道蜀士大夫言行可傳録言蜀中亡事甚慘僑居于鄞入朝為禮部尚書青陽夢炎西蜀人使李璮善機辨賈相愛之為荆湖提點刑獄仕元朝為吏部尚書多智留夢炎三衢人事見國史晚為翰林承旨焚香擇吉日薦先子于御史中丞翰林修撰汪漢卿與桷官翰林時言之趙與􅝾黃巖人篤實無城府睦姻族與先子俱為史壻官亰師歲一遣問官至翰林學士卒盛夬金華人邃經學多本項安世氏丞相王爚薦為太學博士後通判慶元梅應發廣德人與叔祖履道同補太學為慶元教授習詞科卒不成官至太府卿喜抄書先世書皆傳寫舒缶祥台州寧海人七嵗能作古文弱冠謁吳子良吏部大竒之吳學于陳耆卿舍人舍人學于葉適正則以師道自任好譏侮晚嵗詩益工官慶元時與之遊後作書俾桷往事之劉莊孫學于舒能文詞深沉善精思家貧無書傳五經能默與先儒合病廢卒樓槮宣獻公族孫精曆法言宋司天氣朔盈虗當改章法不可用未之信後授時曆頒言始驗館于賔州伯父家四十年日布算疑多財者貧老卒應發孫參知政事㒡之子父為翰林學士時能代父書命後祕其父書不出好博以蠱死史蒙卿乙丑進士拙程文默誦五經其學喜竒説禮部尚書王公多傳授之卒以竒不合于王公陳㝎孫參知政事卓之孫為軍器監丞家居四十年嵗奉祭祀必哭泣年八十餘乃終余尚賔官至太府寺丞賈相入朝不得調孝友誠實鄉里交賢之謝翺南劒人僧圓志瑞州人俱能古文尚嚴簡氣欎不自舒困死周密湖州人與陳厚韓翼甫李義山咸淳初為運司同僚俱有吏才約貴日以字稱禁近俗名號陳能文端眀存之弟韓安陽裔孫善持守李豪邁名吏夀朋之孫皆蚤卒周中丞祕曽孫晚嵗以鑒賞遊諸公微失雅道葛慶龍南康人寓居四眀僧舍精唐律詩酒酣能飛筆為數百言然棄不復録有什一集極精警遊越卒先夫人行述嗚呼桷始生之七日己不孝罹禍于先夫人音容永隔無所容罪每侍先大夫嘗語曰汝生之年嵗大熱丙寅為火協于支干臨安居民繁湫坐地沃水猶喘息不得止茵席器案如執焦汝母體素弱一夕暴泄輒不可藥目光已離猶視汝在褓中復愀然曰桷來前念至是曷時可忘耶桷泣而記之又曰大父嚴州與汝外大父敷文公最相好伏臘治具悉相似商榷品目議論好惡無一不吻合汝祖母王令人史太師甥孫故于敷文通姻好益密淳祐辛亥八月敷文病帶下嚴州日問疾敷文力疾言吾有二兒二女皆未姻願以稚女屬公幼子吾時年七嵗汝母年六嵗是月嚴州治幣問名閲七日敷文捐館嚴州嵗時往敷文家撫汝母候笄期以主我中饋又無祿嚴州即世景定辛酉歸于我史氏號大門伯父賔州嚴峻汝母屈意朝夕承候無替惰分至大祭盛服俟廟門陳器薦牲饌低首傴立終日不少動性潔靜無華飾從母廣國夫人為昭化軍節度使謝公野配貴家競侈異獨無纎粟模效每一詣親黨歸悉脫去鈿靨嘗言教兒嬰孩必蚤加訓整庶無為父母羞余年少時習騎射必正色切劘或從廳屏偵問所與交有凡近者即掩被就睡眀日徐曰先丞相家無此客先夫人少母張夫人所出張夫人生二女長適謝公先夫人既卒謝公日迎張夫人張夫人不肯去泣曰吾一外孫曷忍去卒撫字見桷有室張夫人言外祖敷文方死時汝母坐床下泣不置勸之食不食終日坐殯次不離服除一詣庶母房至嫁日始再詣别之家人莫有識其顔面者桷既長舅氏軍器監丞栁州某言忠定越王淳熙中召赴德夀慶夀班孝宗曲宴問曰太傅幼子今何姻忠㝎謝不敢孝宗曰吾為太傅成之是時崇憲靖王伯圭女方笄即封新安郡主以嫁忠宣是生敷文敷文長外家出宰武康縣縣滿始歸里敷文言吾祖暨外祖皆真太師汝曺當謹擇婚對今甥已克堪問學慎毋忘外家敷文嘗言而母幼靜簡當有成竟迄不享年幸子在猶能慰吾意夫人諱棣卿字景華以宋眀堂恩追封安人謹按史氏譜有舉八行者諱詔贈太師冀國公為五世祖曽大父諱浩舊學相孝宗純誠厚德歷三公以太師保寧軍節度使魏國公致仕追封越王諡忠定妣貝氏封齊魏國夫人伯祖諱彌逺相寧宗理宗太師中書令祖考諱彌堅資政殿學士光祿大夫奉化郡開國公致仕贈太傅壯嵗尹臨安帥湖南多異政中令為相歷年滋多太傅不復肯仕家居十餘年端平改元諡忠宣妣趙氏新安郡主封衛國夫人考諱賔之朝議大夫直敷文閣荆湖北路轉運副使少事丘文定公崈以政事稱六為郡太守贈通奉大夫妣王氏恭人丞相忠定魯公淮之孫妣葉氏恭人俱贈碩人丙寅嵗冬十一月葬于鄞縣通逺鄉建奧之原卒時年二十有一後三十有三年先處州不祿懼體魄之不寧遂别葬于桃源鄉慈溪奧之原先處州諱洪朝列大夫同知處州路總管府事曽祖諱升贈太師衛國公祖諱韶同知樞密院事資政殿大學士銀青光祿大夫奉化郡公致仕贈太師越國公父諱似道朝議大夫知嚴州贈中大夫男一人桷女二人長適丞相莊肅史公嵩之孫似伯前將仕郎次適工部尚書余天任孫昌期前通仕郎先大夫晚得女一人適資政殿大學士史巖之孫益伯前承務郎孫男二瓘瑾孫女四長適同知餘姚州事趙孟貫餘許嫁未行私念桷孤苦不自振擢揆厥有生與先夫人違棄之日俱積今宰木已抱過庭之訓懼無以貽子孫敢求偉于文詞敘而銘之庶得以永考而有傳焉亡妻鄭氏事狀亡妻諱某姓鄭氏鄭為眀州令族世家于鄞始自元祐舉進士至宣和時其孫入辟雍有諱某者當孝宗時為郎曺守平江寖著至太師尚書令忠定魏郡王諱清之以舊學相理宗官簿益盛故君之七世祖至髙祖皆贈太師魯國公魯公長子某國學進士贈中太夫妣邊氏封太碩人魯公配臧夫人素嚴忠定之生夫人將不舉邊氏亟詣姑取保乳之長歸于其姑後碩人生子諱某與忠定同登嘉定丁丑進士第邊碩人卒忠定為之服衰以報其子亦官至中大夫祕書監寶謨閣待制以終于君為祖贈正奉大夫妣汪氏封太碩人待制生子諱某朝請大夫直祕閣主管建昌軍仙都觀于君為考妣汪氏封宜人淳祐中忠定以師臣再相年益髙祕閣入閣承侍禆贊可否務總約體要纎秒不以纇于時賈相帥京湖數張皇軍旅邀國用朝廷抑不下賈相恨議繇公出辛亥嵗丞相薨庚申賈入相由是積二十有三年不復出仕先處州繇太社令奉祠里居祕閣公多能言臺閣舊事數往還是時祕閣新喪子無他嗣庚午嵗乃得君客至嘗抱立左右錦𥜗珠髢注目不聽去處州戲曰他日願以為子婦祕閣愀然若有屬癸酉嵗處州通判建康府將之官宜人與祕閣餞飲于中堂共指桷曰誠宜為吾壻是嵗祕閣與宜人俱捐館居第在城東門外乙亥兵難作先處州以其遺言謀于其宗長始歸于我于時袁宗猶完盛先廟祭祀娣姒林立能卑順盡禮朔望承問無缺怠事桷外祖母張夫人甘柔涼燠調適以宜張夫人嚴整語相家內儀和珍組絲皆精巧有度君能耳受目悟而敬成之張夫人病革視藥膳連月不入寢處嘗曰新婦不獲事先姑得事夫人斯可矣性靜厚寡言笑遇事不輒發而是否瞭然不能易故處親黨無間言處州幼撫如已女君偵顔色承事幾二十年絶纎粟忤意己丑城中災遺物散燬先處州以它事往吳杭間意忽忽不樂間治觴具能使如平盛時祕閣所後子不自振君深憂之竊從招提命所子嵗時以祀其先大德戊戌嵗正月君産女病榮弱桷主史甥姻于杭二月十日丁卯亟歸視之則已不及矣大禍仍構又八日而我先處州亦捐館舍噫念昔少時私欲奮勵學問以自振植先處州愛之乃悉總攬酬酢俾不以亂其心不幸志昏能薄一無所成立四女二男皆君所出紉針訓飭復能相其夫使有所不知及今一十有七年從宦京師藐然孤身若忘其家缺內佐之助靡密綜錯日益加多而學益以落文誠不能以表君之志敢求于故家之友人精于言詞者志而銘之君葬在鄞縣桃源鄉潘奧之原男瓘次瑾女一嫁餘姚州同知趙孟貫餘許嫁未行桷今為翰林待制是為先樞密太師越公諱韶之第四曽孫先嚴州中大夫諱似道之嫡孫先處州朝列諱洪之孤子也外祖母張氏墓記外祖母張氏諱致和湖州德清人嘉定六年七月生父某事趙崇憲靖王父子再世部樂伎年七嵗通音律桷曽外祖母新安郡主歸崇王家見而愛之載以歸俾事外祖敷文轉運史公稍長為侍姬户室靡密總核合繩墨外祖性嚴急挈長覆短使不有忤意囊篋甲乙隨旨諭立陳于前如是踰三十年生二女長和政郡夫人嫁太尉昭化軍節度使謝野次即先妣會稽郡夫人歸于我先考諱洪朝列大夫處州路同知總管府事二女皆嫁宰輔家于時謝以后族貴顯先處州官臨安常卑讓疏之外祖母雖久居相門見謝壻侈靡踰限制心不樂而多留處州以靜恬自怡咸淳二年丙寅夏六月會稽夫人實生桷甫七日洞下遽卒又未幾先處州病大熱垂死咸言不利於母將及父謝公願取已育之處州在病搖手不許外祖母排斥詬詈户之遂日訓飭調適且祝曰兒宜為史氏外翁自重八年謝公死泣曰吾固審若是吾盡力撫袁氏外孫他何之訖見桷娶婦生女至元二十四年二月日卒年七十有五葬于先夫人墓左五十武幼通書算善心計處州事有未及始諷之終以舊事敷文者言之晚嵗病瞽纚纚言外家事曰汝外曽祖太傅忠宣公居東湖滄洲十有四年不復仕作書諫兄忠獻辭相位不輟嵗賜生日器幣辭一再始受後數年不復受鄭忠定丞相忠宣公孰師也敷文受學焉其舊第前為舊學夀皇書後為授經鄭相書皆有深旨又曰音樂慎勿蓄今世公卿女樂皆俚野不足聽惟太傅壻趙崇王悉祖樂髓景祐譜調八十四穿心相通嘗曰譜與易合吾不知易何圖可合汝識之又曰丁抗掣曳大住小住為喉舌綱領法曲散序忠宣刪正之曲有均猶韻也纍纍貫珠韻不絶也聲有盡拍以度非句斷也于時周待制邦彥孫璹于太傅為中外表太師越忠定王嘗命譜清真詞手筆具在今付汝雖不解慎勿墜也舊以恩賜紅霞帔再封孺人記曰庶母不祀於孫而復曰祔于庶祖姑古不墓祭昔之大賢嘗慊然矣今夫禮緣于情而義以制者懼後之昵于私者之過也先王營丘壟之大小無貴賤慎其始不幸有沮洳崩齧之患焉其修之也必有道是則于吾外祖母非有過者矣以孤兒傳處州考其所自曰外祖母保鞠之恩重桷二子瓘瑾將竦然以加厚外祖母有田若干足以治墳壟奉春秋刻于碑隂懼瓘瑾之子若孫滅其情義必曰禮有所不載遂具昔之訓撫行事立石于墓俾勿墜某年某月某日外孫具官袁桷謹志清容居士集卷第三十三
