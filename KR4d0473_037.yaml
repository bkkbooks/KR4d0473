body:
  text: 外制太傅右丞相伯顔贈太師開府儀同三司㓛臣淮陽郡王諡忠武乾坤呈符搆風雲之嘉㑹山川育秀挺柱石之英賢夙奉宸猷丕揚帝訓惟不嗜殺人者能得天下而可與事君者實非鄙夫眷我元勳膺時碩望合太平之寰宇成一統之輿圖生為名臣殁有公論太傅右丞相伯顔機沉而識逺量重而器宏十乘􅢳行共服征南之妙算七騶咸駕默傳濟北之遺編誓衆於鼓角之初過師於枕席之上具宣德意誕廣仁聲簞食壺漿之迎咸知已後觴酒豆肉之賜士向無前是謂制勝而屈人兵抑亦好生以全天道丞相之㓛第一智士之譽無雙方謙牧以學卑愈䝉飬而用晦角巾私第恂恂似不能言雞翹屬車斷斷猗無他技肆豫纘服躬任受遺㓛成莫居年運而往格于皇天者有儀可象游於造物者不見而章師尚父之崇名貞惠文之美諡益疏王爵庸示國恩噫彛器景鍾足銘邦家之偉績蜜章襚典斯昭泉壤之幽光尚其眀靈歆此殊命可平章政事廉希憲母某氏贈國夫人溫璞出於玄圃貞松産於徂徠良由地氣之完以合天和之藴故平章政事廉希憲母某氏柔嘉維則淑慎其思采蘋采藻之恪恭為絺為綌之素儉奉尊章於壯嵗樂其天全率娣姒之諸郎視為已出齊家以禮教嗣以忠用能為先朝社稷之臣􅢳奕葉簪纓之慶雖爵從夫貴莫得而加然義以子賢當崇其本益開湯沐之侈庸增窀穸之光是為異恩以旌舊德可忽答的迷失公主追贈國大長公主維王展親之道實先於惇敘粵昔慎終之典尢謹於追崇矧豫同氣之賢是惟長主之貴廣疏異數庸寓至懷忽答的迷失公主玉海澄輝金枝育秀充然婦德成肅雍以為穠李之華相其夫家閔勤勞而勸殷靁之義婉順諧於日就儉慈出於天然美王姬下諸侯固異公宫之制問我姑及伯姊益深先朝之思胡不百年以永終譽肺腑之託云在手足之念彌鍾圭籥荐更湯沐儼舊爰開名國下慰營魂噫立愛惟親曷愧死生之初志以義度德莫窮修短之大原沒而有知服之無斁可宗正府寶哥贈祖父母祖某特贈推誠保運翊亮㓛臣開府儀同三司太尉上柱國追封恆山郡王諡忠靖風雲初際允資佐命之賢歲月既徂庸厚報㓛之典亶惟平治爰錫褎嘉具官某祖某貫日精忠淩雲節槩載櫜弓矢翊龍德于初潛以為股肱展鷹揚而無敵噫孝文拊髀豈惟思古之名臣顯宗圖形實欲方今于前世九原可作千載如新可祖母追封恆山郡王夫人慎終追逺本先王之至仁崇德報㓛傳有國之令典具官某祖母某氏從夫早貴訓子克賢如山如河之儀容宜室宜家之愷悌肇封大國儼焉象服之新益慰九原歆此蜜章之寵可參知政事賈某贈官朕丕承大業逺究前圖肇邦九有之初紀綱備舉同德一心之彥贊畫允資慨年運之云徂儼風猷而如昔具官某經術展緒孝廉起家侍幾微於帷幄之中保身彌謹識變通於衡石之外得士尢多故一時出令之坦明皆先帝欲言之㫖意器能容物清不近名暨更南國之旬宣咸謂中朝之倚任方堅退佚益避權姦活千人有封考於爾嗣德百世而祀論乃至公爰褒賢以勸㓛復易名而疏爵噫方叔壯猶之雅雖已美於盛時韋丹遺愛之碑實有俟於今日皎如精爽綏我寵光可淮西道宣慰使劉復亨妻趙氏贈某國夫人圖任舊人式表世臣之重蒸畀祖妣用昭孝孫之賢維德厚者慶益長而爵貴者報必逺具官劉無隱祖母趙氏鍾鼎望族山河令儀使節春行從子從夫之樂備女針夜誦為母為婦之道全頌臺之彥有嘉漏泉之恩冞廣髙堂素象音容猶想於含飴故里佳城湯沐儼疏於刻蜜湛然精爽歆此褒崇可荆湖北道宣慰使劉澤妻孫氏贈某國夫人孝治聿嚴誕布蓼蕭之澤聖謨丕顯遐思屈軼之賢念服瘁於外庸允資成於內助恩昭竝命光慰九泉具官劉無隱母孫氏里族髙華閫儀淑慎閉户而行盥饋曲盡婦儀映雪以課詩書咸稱母訓杯棬之飲猶在茵鼎之飬莫加位正小君已備沼蘩之德爵崇大國益攄風木之思可參知政事趙世延贈曽祖母氏雲中郡夫人積德在於百年實資內訓褒封及其三世亶謂異恩勤勞藎臣服襲先矩具官趙世延曽祖母某氏幽蘭雅度喬木舊傳殷靁雖閔其勤克彰忠節采蘩不失其職允佐肅雍膏之沃者根必深種之豐者穡益厚顯于西土咸曰大家維爾曽孫益彰有慶於戲秩秩先廟崇松楹柏板之儀翼翼小君承錦誥金花之寵奉先追孝錫類興仁可平章政事董某封贈三代九道曽祖昕贈光祿大夫司徒趙國公諡宣懿大裘無文可饗于帝良玉韞璞孰窺其珍灼知遺逸之民邁種渾圓之德克昌厥後不在其身具官董某曽祖具官某畎畝怡愈里閭退讓開田種术深期蔽日之輪囷如山出雲莫測為霖之變化子能擇主孫亦象賢一門萬石之家聲四世五公之譜牒噫慎終追逺分茅宣曽矩之光崇德報㓛推本協孫枝之願亶惟異渥寵爾營魂可曽祖母李氏追封趙國夫人岷山之源若甕而達于海至日之影如線而麗乎天信知明道不可以計功要在積微因之而成著具官董某曽祖母李氏盤阿共隱饁畝如賔惟耽積善之勤厥享降祥之驗百年未逺五世其昌噫象服表儀亦既慰賢勞之願蜜章刻篆斯有昭孝治之隆可祖俊贈翊運效節㓛臣太傅開府儀同三司上柱國追封夀國公諡忠烈加贈推恩翊運效節㓛臣依前太傅開府儀同三司上柱國改封趙國公諡忠烈駿命握乾誕􅢳中天之運豹韜宣武協成上國之光念風雲之㑹匪常而日月之流如駛爰新景命以慰故臣具官董某祖具官某被褐潛珍棄書學敵戎馬驅攘之未㝎志已出塵雲龍㑹合之有開獨能就日察敵保臨淵之智挽彊夸貫札之精釋兵為農所活者衆延師教子其訓益深馬革裹尸深可憫生前之語虎頭食肉終有期身後之榮惟德之厚者嗣必昌而功之著者禮必報肆朕嗣服念爾疇庸爰廣重封以彰異數噫修祖廟陳宗器在于君臣之交修光王室逆天體惟爾子孫之無斁精爽不昧寵渥其承可祖母李氏特贈夀國夫人改贈趙國夫人殷靁勸義於昭媲德之賢柏舟作詩爰表自防之志雖內教止傳於閨闥而懿範備著于鄉閭具官某祖母李氏淑慎持家嚴勤訓子斥簪珥以奉賢師之饌化絲枲以助先祭之供衡宇周旋人不識其面目闔門款洽族猶想其儀刑雖雙鯉之飬弗居而八龍之譽罔替允惟賢母有光前聞兹豫溥澤於世臣庸汝􅢳封於大國噫先正昭事已克光竹帛之傳夫人起家式歆承絲綸之訓用昭後嗣永肩一心可父文炳特賜贈諡金紫光祿大夫平章政事忠獻公加贈宣忠佐運開濟㓛臣太尉開府儀同三司上柱國追封趙國公仍諡忠獻君臣相資莫喻同心之美忠孝兩立斯為佐命之殊念汗簡曷能既其勳而朝著猶足以優其禮維祖有訓非朕敢私具官董某父具官某沉毅而善謀明恕而敦本黑頭試邑棄官羞墨綬之卑赤腳從軍絶食望翠華之幸刑輕典以安反側釋降人以靖流離白日揮戈睥睨益張其羽翼長風破浪䝉衝竟搗其腹心命在飬民市不易肆取麥禾以陋鄭人之過收圖書以成蕭相之㓛嶺嶠宣威南人不復反矣朔方請使周公方且膺之恂恂持儒者之風諤諤挺大臣之節靖念丕圖之建彌深喬木之思格于皇天雖儼若帝庭之陟降涣其大號必有加玄宅之褒崇錫以嘉名胙之大國掌武􅊞建牙之舊開司增立㦸之榮九原如生終古永譽噫英才間出足為邦家之立基盛德無瑕成爾子孫之逢吉載加殊命以賁營魂可母趙氏追封趙國夫人鵲巢推夫人之德於配實難碩人歌衛侯之妻其賢可想具官某母趙氏秉心淑靜主饋柔嘉逮事皇姑克奉甘㫖於左右一視諸子莫窺憎愛之後先每傳家訓之忠勞遂致孤兒之死事噫開脂田而獲上國敻謂無儔被象服以從先塋幸哉有子可繼母某氏追封趙國夫人國族世貴鮮執禮以下人王臣㓛髙適合符而媲德具官某繼母某氏敦厚天性靜專內儀瞻彼南山深得勸夫之義遵于行潦不失奉祀之恭有子忠賢為我宰輔噫推恩三世庸疏湯沐之封錫類九原益廣蓼蕭之澤可繼母王氏追封趙國夫人嶰谷之竹應律而氣自鳴十洲之膠續絃而竒乃見不有佐餕曷能相夫具官某繼母王氏組織婦工齊莊母道嵗時盥饋立蘭玉以無譁春秋蒸嘗潔牲醪而有度嗣子極中書之貴一門疏大國之封噫生也有涯莫稱魚軒之樂死如可作尚歆鸞誥之榮可所生母樊氏追封趙國夫人綵衣之飬莫罄其私心板輿之歡遂以為美事念風木之永感惜春草之寸暉具官董某所生母樊氏禮以母稱義由子貴勞謙終吉竟莫觀垂魚擁笏之榮一視同仁乃預享刻蜜演綸之寵允惟盛事服我異恩可集賢大學士張宴贈二代四道曽祖宇贈保節㓛臣銀青榮祿大夫大司徒追封魏國公諡文愍韋孟明經諸孫之傳始貴袁安卜葬三士之言若符膏之沃者日以光德之厚者世益逺具官某曽祖某進修家孰退靜鄉閭乾坤轉機徯后服先知之算干戈效勇舉宗成全殁之悲命也在天幸哉有子噫忠孝一門之盛事百世可知節義千古之大間九原不作聿申景命庸建上公可曽祖母常氏追封魏國夫人盛德之報若券取償內訓之施如玉韞璞聿行尊祖之禮益知起家之難具官某曽祖母常氏淡靜無華儉勤有素清晨佐餕奉羔韭之肥甘晚嵗謀生治蠶麻之靡密積善有慶沒世不忘噫魯孝孫之詩宜告成於先廟魏大名之國爰錫命於九原服我鴻恩亶惟異數可祖英贈純德秉義㓛臣太保儀同三司柱國追封魏國公諡簡懿幽蘭空林抱孤芬而永閟長松古澗垂巨䕃以自完明其道者不計㓛非其身者必在子具官張晏祖英德若不足樂且有儀遇真主之龍興出關而俟喜佳兒之豹變潛邸以從居官耻商榷之謀接物多任俠之義念干戈首難彌深丘壟之思歸鄉里自娛益廣子孫之澤考其䔍素允謂安行噫于公之門少髙兹言已驗畢萬之後必大今食其封爰詔後人益光前業可祖母劉氏追封魏國夫人德盛起家允著夫人之懿時危秉志有髙列女之風蓋在昔以為榮至于今而彌顯具官某祖母劉氏澡身蘭服耽耳椿齡重闈期冡婦之興宗一札勸孤兒之入侍忍乃有濟鑄金符緘口之銘安不忘危考室遜飛翬之制勗德若是生賢可知噫徂賚孝孫已極登瀛之貴逮事王母益疏分國之恩幽泉有知純嘏無斁可資德大夫江南諸道行御史臺中丞于璋贈推誠肅政㓛臣光祿大夫平章政事上柱國追封薊國公諡文簡善人天地之紀德莫有加君子邦家之基沒猶不朽眷懷遺直追錫殊封具官于璋志藴忠貞運逢熙洽慶雲甘露氣和而動植自冝威鳳祥麟瑞應而猛摯咸伏華要屢更于中外靖共彌保其始終緇衣不渝素絲彌替念在昔菁莪之彥皆先朝棫朴之㓛年運既徂風猷彌逺噫劉寬長厚允宜居鼎鼐之官胡廣中庸謂當久臺閣之任事乖往古恩浹九原咨示營魂服我休命可妻某氏追封薊國夫人慎終追逺先王惇俗之盛心崇德報㓛治朝馭臣之大勸恩褒臺彥澤及閫儀具官某妻某氏靜淑自修柔嘉彌謹珩璜有節動常法於女針圖史自娛身不逾於內則傷哉無子貴也從夫脂田廣大國之封蜜印慰九京之望噫瑶琴别鵠早已棄於人間寶劒化龍竟相從於泉下尚其冥漠歆此寵光可茅山第一峰大茅君特加封東嶽上卿司命太元妙道沖虛聖祐真應真君靜慕玄風灼觀往事無為曰道必刻意繕性而始成修身乃真非積行纍躬而莫就大茅君竒操矯俗精思集虛一德齊心受龜臺西華之祕㫖萬靈受職開金陵句曲之宗壇丹光千載以如新寶氣三峰而彌固發祥肇祉民到于今稱之逆雨寧風天之所助順也亶惟作聖允合祐神孔蓋翠旌祀莫嚴於司命瓊文蕊簡禮爰謹於秩宗假兹聰明佐豫平治可茅山第二峰二茅君特加封㝎籙右禁至道沖靜德祐妙應真君合人心理萬物禮宜順於鬼神建皇極錫庶民徵有稽於暘雨大江以東之地句曲維望而尊土樂升平嵗稱稔足二茅君中峯司命西華鍊形作牧審煩擾之非修真得恬淡之要驂鸞導從塤箎儼奏於雲中化鶴來歸城郭時看於華表朕方推仁以濟衆靈宜妙物以祐民學道受之以神端有宗於李耳望祀不祈其福誠慕深於漢文嘉與函生誕敷景命可茅山第三峰三茅君特加封三官保命微妙沖慧仁祐神應真君氣化為神握隂陽而執要物來能應遇水旱以成㓛兹山之靈以氏為號三茅君不導引而夀體素純為真密從蒼龍承左右而無間時乘白鵠侍伯仲以逺遊荷天降休為民請命逍遙容與服光景以如新周流常羊䝉祉福而無極肆加褒錫丕應隆平埋鼎髙峰爰慕軒轅之有道獻金空谷方薄光武而不為以恭厥靈同歸于治可吳全節特進上卿玄教大宗師運開至治法簡易以合泰元教審宗傳隆繼承以明正嗣用揚涣號誕聳具瞻具官某孝友中乎凖繩詞華鏗乎金石居無思行無慮粹然令名禮為翼知為時協于王度陟降紫宸而匪懈贊襄琳館而益謙藏珠在淵雲五色而川媚納息于踵風八景以星從維列聖嚴圭幣之薦以格天而乃祖受劔印之錫而展世四十餘年之帝顧卑已行權三千之徒首汝賢小心盡瘁俾超華貫爰仿舊階侍清祠以表羣公度玉墀而膺六命祇若具訓允為異恩噫奏隂陽之和以祝釐則諸福可以畢至通神明之德以事上則庶績底於咸熙守慈儉以佐無為遵希夷而贊有道式觀素履庸佩綸言可三十七代仙姑馮淑真特封靖明貞素夫人紹玄風而展世丕闡帝猷溥內則以疏恩勉從人爵仙姑馮氏簪纓素緒鞶􅍤芳儀媲穀城之傳益師清淨守柏舟之操冞固堅貞受祉惟深錫名斯侈雲龍風虎之慶㑹亶謂有光舞鳳回鸞之制書懋承無斁可昭應宫提㸃王氏金蓮特贈淵靜玄素真人寂然不動知來去之有因湛焉長存冝死生之無間辭風雲之際㑹竟穅秕於世塵爰加異恩以彰殊遇昭應宫提㸃住持王氏金蓮早塵椒掖晚謝蕊宫修崇密契於九重錫賚屢承於三接淨如止水斯為至道之宗脫若太虛實本重玄之體尚歆嘉號庸表將來可長春宫提㸃常某授玄門演道大宗師掌教真人管領諸路道教所商議集賢院道教事治國以無為惟宗式符要道順物乃自然之理允謂至言長春宫提㸃常某槖籥重玄蓍龜萬變氣超渾沌灼知天地之根運際升平默贊隂陽之化方獨立以不改彌大盈而若沖爰紹真風以彰人望噫內觀形影斯泉石之素心外飭身名實朝廷之異渥保兹清淨俾以闡揚可昭瑞宫提㸃張惟一特授全德靖明弘道真人太一宫提㸃神以知來至教匪存於象設人惟求舊褒封首錫於龍飛念扈蹕之宣勤默儲祥而介福坤元具訓涣號揚綸昭瑞宫提㸃張惟一泉石古心氷霜雅操侍晨長樂淡焉若朴而妙感彰澄觀穆清廓乎不驚而衆虛集惟才全者德不競而正靖者明愈昭闡道王庭葆真沖館噫有國之母以長久爾尚謹于祝釐立天之道曰隂陽當益思于觀復恭承嘉命助贊無為可廣誠靈妙演法真人江南諸路女冠諸宫觀都提㸃邵靈瑞特追封宗師二儀之生根於太極萬物之母始於有名推剛柔迭用之原悟坤乾交泰之理兹焉觀妙足以表微具官邵靈瑞野鶴孤標金芝內行亶麻姑之清淑允謂地靈慕南嶽之沖虛聿工草聖通章帝闕備問宫闈燁矣龍光守大盈而自牧端然蟬蛻享上夀而弗居道氣常新仙風不墜噫女偊朝徹已傳宗師之篇帝堯時雍爰有化人之國錫兹美號昭我鴻恩可沖靖靈妙凝真法師玄元萬夀宫提㸃盧行益􅊞封真人道要易為㓛必假相傳之祕名盛難與繼益求自治之方矧兹女冠之慎修爰出朕綍以示勸具官盧行益沖淡若璞謹飭自繩侍蕊珠之宫宣琳琅而不瀆守萼緑之訓視金玉以如遺惟清淨者玄學之宗惟簡素者師資之本斯焉無忝足以有承噫誦赤松中誡之經卑退為德考南嶽內傳之㫖齊戒是先可五雷宗師沖靖先生留用光特加封五雷宗師沖靖至德昭應真人天地交泰而雷出奮風霆流形而物露生神行兩間因體而始有用數合五位由柔而後成剛乃知變動之機不出隂陽之妙五雷宗師留用光參合太始摩蕩無垠學道從師罹厄窮而不悔救災禦患卒韜斂以如遺詢諸長老之言考以輿圖之載損之又損承禎之語若符生而不生介象之歸非異運隆纍洽道慕重玄思其人如欲見之宜加綸誥告諸往而知來者益勵羽流可通妙葆真先生髙士易如剛特加封通妙葆真文教真人式觀修真之徒多出好古之士伯陽柱下習典禮而道成弘景山中博載籍而書備髙士易如剛學通群藝妙集衆虛師清淨以避堂可謂簡矣問鬼神而前席殆將近之韋編之繼絶孰傳洞章之補亡猶在無文不立松風恍其步虛與時偕行草露晞而羽化方企崇玄之館爰思列仙之居本無名而有名庸彰往古效先覺者後覺庶勸將來可臨江路閣皂山萬夀崇真宫住持四十六代傳籙嗣教宗師楊伯晉升加太玄崇德翊教真人性出於無始存存為成性之門道合於有為生生乃得道之奧式觀載籍爰有至人吐故納新以調其神齊心服形以制其氣于以濟衆因兹延齡具官楊伯晉守朴丹丘潛珍琳館止息以踵陋熊經鳥申之迂藏珠于淵握龍變虎騰之要開九籥之祕記傳八景之玄文問年今見其復丁㑹月密推其納甲天台之召司馬損數術以理身羅浮之迎軒轅徹聲色而合德朕悉兹理卿無復言聿加綍命之殊以重羽流之選噫居安易之序所當明天地之根修身德乃真宜益究坎離之用贊敷皇極懋協鴻禧可毛穎達封真人甲神主祭丁道萬物之奧非虛不能以通微誠百行之源惟靜斯足以制動聿求佐理爰慕希夷兹得有恆之人以贊無為之化崇真宫提㸃毛穎達澄心止水植節貞松禮為翼知為時淡然無競巧若拙辨若訥體乎有容藏名琳館之珍飬粹玄門之望維昔世祖動遵軒轅占瑶光以揬五行之精通紫煙以嚴六子之用山林肅潔星斗爛眀苟非其人靈弗顧矣不懈于位爾其勉之庸加綸誥之隆以示真卿之貴噫乾元天下治也浚明用變之㓛神物聖人則之敬謹祝釐之效有嘉恬靖永保恪恭可清容居士集卷第三十七
