body:
  text: 序易三圖序上饒謝先生遁於建安番昜吳生蟾往受易焉後出其圖曰建安之學為彭翁彭翁之傳為武夷君而莫知所授或曰託以隱祕故謂之武夷君焉復曰吾易神也易何為而神也神者易之始也易不可以强名也不名則亡易願叙其旨袁桷曰夫亡易者非聖人之本旨也神以合聖人之易斯得矣然則曷為神無端而莫可見也惟無端焉故無體焉存而明之而數以生焉數生矣而始有變變立矣而㑹以理理者其一也理不能以盡易因數以立者理也用變以逆者非理也故曰隂陽不測之謂神始朝以道紀傳易統緒截立疆理㑭後無以僞至荆州袁溉道潔始受於薛翁而易復傳袁乃以授永嘉薛季宣士龍始薛授袁時嘗言洛遺學多在蜀漢間故士大夫聞是說者爭陰購之後有二張曰行成精象數曰縯通於玄最後朱文公屬其友蔡季通如荆州復入峽始得其三圖焉或言洛書之傳文公不得而見今蔡氏所傳書訖不著圖藏其孫抗祕不復出臨卭魏了翁氏嘗疑之欲經緯而􅌰不可得季通家武夷今彭翁所圖疑出蔡氏惜彭不具本始謝先生名字今不著其終也世能道之易集傳序觀象畫卦庖犧之本旨也因言意而廣象焉三聖人之本旨也王弼後出附小象以言理儒先莫能病若繫辭傳說卦等篇弼莫能措辭審是則弼幾一偏矣十翼之作有彖焉有象焉専於理而作彖象傳焉者夫子之志也然則文王周公之彖象其悉皆理與曰非也卦本於象八卦首之定名以為象則井鼎小過是也言意以為象伏羲言而人不能知之文王周公始申言之文王之言見於彖周公之言見於爻是則不俟豫言也易有聖人之道四彖象傳果唯言意焉則變占乎何取曰有變焉有占焉伏羲畫不變於九六則變見之占則文王於彖附言之象未始分文王始離之變之疾者莫先於蠱憂世之深也若分象則師晉小畜之類是也爻變於占因筮以見者也其即見者漸小畜訟之類是也彖爻合四者而言之夫子不一言之何與曰傷哉夫子之志也事莫尚乎辭辭非理不能以定人事吉凶繇妄而咎以興先之以變占是易殆卜筮之書矣器繇動成動斯靜矣取靜觀動將於是乎則斯其為象也大矣夫子於說卦焉始彚之彚以窮其變占則變占者筮之始也故其首章先於蓍二章次於卦先天之說七言之懼溺於占也後天之說一言之人事之本也而終之以象焉維昔康節邵先生作方圓環中圖合於天人皆本說卦充類以至知夫聰明特達之士不在於諄告也若繫辭傳設卦之方窮神之妙其詳於爻者毫釐不能以易積數以成變易以動肇於方寸散於六合幽眇廣大取而莫窮應而莫遺因卦以測善算喻者不能窮也舉世舍是矛盾互持雖百世莫能以解吾故曰非繫辭傳不能以知易是說也邵子之說非僕之說也桷不佞讀易二十年歲月逾邁所見益懼紇石烈君希元䔍志嗜古於易精思以求搜托疑義私嘗歉然莫能以對卒能先豫以成書不鑿以求通不拘以强附㑹其粹精足以垂世故以豫昔之所告冠於篇首㑭知夫同焉以異者將以革夫株守偏弊之失則豫之所著其果有同乎其無同乎新安程子見四書圖訓序象數可以圖言名意不得以圖言以圖言之其亦有所本乎昔者聖人觀象著圖因圖為書範圍發揮由書而始通則夫圖之祕非書不能以盡是書之明於圖者也後聖繼述遵文演圖器度物象之微剛柔善惡之應若天旋之默運于樞紐其不可以繪畫得之者猶因名以立義此圖之輔於書而不可廢焉者也二者之用各有先後合而言之者吾不知其說也自正心誠意之說興茫無畔岸朱子憂之遂以其可據依者為之主而體用知行之說實切於學者之功用後百餘年五經廢棄遂復勦取其近似端坐塗飾而根柢源委悉不復考禮主於敬理主於善一言以蔽講學之法糜爛而不可救矣新安程子見取論孟中庸大學之書切於吾身者析而為圖以輔翼朱子之教抑亦使夫人知為學之叙非字義之可盡條分目舉必有能䔍行而親識之者斯足以盡夫斯道之要其勤且備可謂能矣昔真文忠公作讀書記仁義性命之說各以類從先正肅公作書止之曰使若書成學者將得以自肆今是書具在視今之言理者與古賢無異論其所學則又甚於朱子之憂矣子見之圖其必有以拯諸輔漢卿先生語孟注序解經莫嚴於聖賢見於語孟其語簡其旨明子思之釋經尤得聖人之微旨今其書具在也自漢傳注之學興蔓辭衍說浸淫乎萬言魏晉一切掃削明理之說歸乎空玄二者之弊遂淪於偏滯學者昧昧無所依慿焉踰千有餘載矣至宋㫪陵碩儒開伊洛之緒正說至道粲於簡冊良謂大備後朱文公出懼其剽竊之近似也源同而派别之統宗據要蓋將使夫學者不躐等而進若律之有均衡之有權不得以錙銖差也既又懼其疑之未釋復為問答以曲喻之其詳且盡不復可以有加矣書大行於天下而後之師慕者類天台釋氏之教文旁行側注挈綱立目茫乎皓首不足以窺其藩籬􅌰至於聖人之經㫖莫之有解日從事于口耳孩提之童齊襟拱手相與言道德性命者皆是也桷幼承父師獨取黃輔二先生之書而讀之黃公之書嘗輔翼其未備若可疑者則以昔之所聞於先師而申明之至於輔公則直彰其義衍者隱之幽者暢之文理炳著不别為標的以盡夫事師之道微文小義簡焉以釋經為急而其知行體用之說不蘄合而有合矣二公所為是誠有益於後世而今世補文公之遺書夸多務博雜然前陳莫知揀擇余獨病之合黃輔以傳則文公授受之㫖益得以逺輔公書其子季章舊刻於武岡兵禍散軼今其從孫政與其子華亭丞友仁相與謀曰遺書不傳吾輔氏子孫責曷敢緩遂刻先生之書于家孰㑭序其事豫獨連言於黃公者將使夫後人知二公為文公親授黃公之澤已斬輔氏為未墜是可哀也已是可嘉也已願勉哉正學之興其必在是也郭好德論語義序唐儒作五經正義疏必先之以衍義而始明其傳注其先之者何懼汩于經也釋之以義疏焉者有訓詁焉有制度焉至于名物象器疆理飛走潜動之辨不博不足以盡約之以衍義非背于傳經之說也理唯約足以見漢稽古三萬言後世嗤之至朱文公承濂洛之正傳始為語孟精義久之慊然曰宜尊所聞今所傳集注具訓中外下逮荒陬絶島家有而人誦文奧義古至於不揣者斷章譏駮識者哂之京兆郭君好德秉彛父授徒于其鄉孰懼世之不達於辭者習譏駮之病撮其精微合於簡易將使夫初學者若循塗以進遇險以休使少窒焉必由是而達在易之蹇曰險而能止知矣哉蹇斯通矣抑嘗聞文公之教於其家也謂集義之作義理詳而訓詁略别為一書曰訓䝉口義今此書不存秉彛是書殆深得文公之意近世東南諸儒旁行側注鄰於釋教之學濫觴而不可禁豫得讀是書深有合夫訓蒙之說孔賈遺旨能以逺紹其不在兹書也歟龔氏四書朱陸㑹同序五經専門之說不一既定於石渠鴻都嗣後學者靡知有異同矣易學以辭象變占為主得失可稽也王輔嗣出一切理喻漢學幾於絶熄宋邵子朱子震始申言之後八百餘年而始興者也春秋家劉歆尊左氏杜預說行公榖廢不講啖趙出聖人之旨微見劉敞氏葉夢得氏吕大圭氏其最有功者也尊王褒貶則幾於贅是千餘年而始著者也書别於今文古文晉世相傳馴致後宋時則有若吳棫氏趙汝談氏陳振孫氏疑焉有考過千百年而能獨明者也詩本於大小叙諸家詩已廢毛公說尊獨蘇轍氏始刪鄭樵氏悉去之朱子祖之此又幾二千年而置議焉者三禮守鄭玄氏正義皆旁正曲附唐趙匡氏始知其非宋諸儒駁鄭幾不能以立甚者疑周官非聖人書卓識獨見雖逾千百世亘萬古而不泯是則寧能以一時定論為是哉曩朱文公承絶學之傳其書叙疑非西亰於孝經則刋誤焉詩去其叙易異程氏中庸疑於龜山楊氏程楊朱子本以傳授者也審為門弟子世固未以病文公也陸文安公生同時仕同朝其辨爭者朋友麗澤之益朱陸書牘具在不百餘年異黨之說興深文巧闢而為陸學者不勝其謗屹然墨守是猶以丸泥而障流杯水以止燎何益也淳祐中畨昜湯中氏合朱陸之說至其猶子端明文清公漢益闡同之足以補兩家之未備抑又聞之當寶慶紹定間黃公幹在朱子門人不敢以先人所傳為别録黃既死夸多務廣有語録焉有語類焉望塵承風相與刻梓而二家矛盾大行於南北矣廣信龔君霆松始發憤為朱陸㑹同舉要於四書集陸子及其學者所講授㑭來者有考刪繁薈精余於龔君復有望焉夫事㝎於千百年則罔有異論故歷舉興廢之說若是噫龔君之書有俟夫後若余言亦殆將得以同傳也至治二年八月辛未袁桷序五經約說序古之學者三十而五經立方其時以力田致養為先本春出于野冬始入邑其勤懇懇然日不能給暇日入學嵗卒不滿十旬焉噫何其敏且成如是之易也蓋先王盛時卿遂溝洫之制明冠昏賔蠟之禮具絃歌爼豆鐘鼓弓矢之事周旋品節皆身親而日化則所謂通其義者道德性命之理也簡牘日繁専門經師夸宏務竒漢世儒者白首莫一微言既絶掇拾枝蔓而偷意惰業率自涯而返良有以也夫子之翼易二戴之傳古禮解經之準的也訓詁别立為小學析文以言字因字以生義究其大較邈不相入然則士何自知經㫖哉唐孔賈氏尊漢儒宗知其忤陋猶旁諱曲覆如臨師保不敢有犯獨啖趙出口指摘無所避至劉原父氏歐陽氏始慷慨直論未幾言經者銖分毫别疆畫同異亦駸駸乎漢儒矣夫一道德而同風俗作者之事也復古而不至焉者儒者之責也六藝之道莫急於禮樂樂書廢已久而儀禮迄不得立學官遺音舊器莫可尋辨登降進退揖讓之損益臨事取具跂就企及卒泥夫近古吾獨謂學古之士猶足以語夫此也廬陵宋元翁為童子時能明經明經舉廢已久獨元翁興起其事弱冠復約為大義先王墜典炳然其専美矣夫天人之奧昔人之所罕言而昔之耳聞目見接熟素履今皆棄置不講元翁氣清德茂養泉糞木必以源本約而同之與道俱㑹後之學者將由是則焉敢誦所聞而美之鄧淳翁春秋集傳序因褒貶而傳春秋焉聖人之餘意也悉貶而遺其褒焉非聖人之本旨也粵自周室既遷史列於諸侯典策之藏世莫得見而其紀載之法號稱近古故凡是非善惡之實天灾時變之著直書而不隱逮于戰國執簡侍史者猶守而未墜然而攻劫凌據之侈相尋而莫之顧實由夫外史之􅕄不行于邦國其史之存于國者又將日幸淪棄而無所傳證故益得以逞其驕而恣其所行若是者二百餘年矣聖人始出然後因其史之本文而修明之别為之書以信于後善乎孟子之言曰孔子成春秋而亂臣賊子懼若是則春秋其果為褒貶哉三家之傳事與義例轇轕殽紊刻者若法吏博者若辨士上下二千餘載各執所嗜介不相並而玩獵搜擇髣其音聲益遺其形傳愈疏而經益湮矣夫因義例以明聖人之意懼義與例不得而盡廣其記聞不燭於理則事益無以自附春秋之道幽而明無傳而著論至於是良有以也自唐以來合三傳者始各以其長自見然而求於外者必謹於內純明粹精非自外至焉者耳先王之典禮舊章具於傳記悉心以推之暗而日彰墜而復完則禮者又春秋之標準也邵武鄧淳翁慨不行於今特立已任纂而為編復因胡氏七家而增廣之余嘗謂審乎人情酌乎事變非春秋其誰凖感而通天下之故則易之用其與是相並始於春秋而終於易者邵子之學也淳翁學首於是必有其本敢因以訂諸王先生困學紀聞序世之為學非止於辭章而已也不明乎理曷能以窮夫道德性命之藴理至而辭不達兹其為害也大矣是故先儒有憂之且夫子之言有曰興於詩立於禮成於樂其品節備具見於禮之經解夫事不燭不足以盡天下之智物不窮不足以推天下之用考於史冊求其精粗得失之要非卓然有識者不能也若是其殆得之矣在易之居業則曰修辭立誠而畜德懿德必在夫聞見之廣旁曲通譬是則經史之外立凡舉例屈指不能以遽盡也揚雄氏作法言其意亦有取夫是後千餘年禮部尚書王先生出知濂洛之學淑于吾徒之功至漙然簡便日趨偷薄固陋瞪目拱手面墻背芒滔滔相承恬不以為耻於是為困學紀聞二十卷具訓以警原其㫖要揚雄氏之志也先生年未五十諸經皆有說晚歲悉焚棄而獨成是書其語淵奧精實非紬繹玩味不能解下世三十年肅政司副使馬速忽公僉事孫公楫濟川分治慶元振起儒學始命入梓桷遊公門最久官翰苑時欲悉以其所著書進于朝廷因循不果今也二公謂桷知先生事為詳㑭首為序庸書作書之本㫖亦以勵夫後之學者先生諱應麟字伯厚自號深寧居士泰定二年冬十月門人具官袁桷序大易通義序郡侯郭文卿示易通義一帙曰此真定侯先生所述也先生幼喪明聆羣兒誦書不終日能悉記其所授稍長習詞章自謂不學可造詣既而悔曰吾明於心刋華食實莫首於理理以載道原易以求則為得之於是精意讀易旁通曲㑹參以已說而名之曰通義讀其書浩乎其詳也簡乎其著也因理以測象若遺焉而不敢廢也桷學易蓋亦有年矣原夫八卦既列象斯立焉故卦有理者焉有象者焉理有以言為象象有以理為用理與象不得而偏也聖人懼其言之雜也諸卦之彖専言夫理而取身取物悉見於爻辭矣又懼夫設卦之理彖不足以盡也復繫之以上下傳而其象位之明著悉見於說卦至矣盡矣後之儒先言理者過於浮略象廣喻而泥象者微言隻字咸取以為象角立交病三聖之旨泯然莫知所歸自朱文公發變象之說學者始知所宗君思深而識幽據㑹提要蓋將為程子之忠臣倣文公以入夫邵子之室非潛心尊聞者不能也今年逾九十康色未艾先生名克中字正卿郭侯㑭叙其書將入于梓不讓而為之序焉老子講義序昔之善言老子者謂其同者合於易其不同於孔子者皆矯世之弊此論千萬年不能以易也新安程泰之作易老通言余意深得其旨讀之茫然不能以吻合語簡則理得大羮玄酒夫豈㫖於味乎老子之五千言不得已而為言也道為乾坤之體德為咸恆之用繹其辭㫖觀妙觀徼見天下之賾而疑諸形容者也衆妙之門易之門也功成弗居治蠱之道也使民無知無欲百姓日用而不知也挫鋭解紛洗心藏密之㫖也多言數窮吉人之辭寡也谷神不死生生之謂易也後其身外其身以前氏用之道也水善利萬物坎之行有尚也持盈揣鋭君子有終也生而不有為而不恃無思無為也埏埴為器户牖為室十三卦制器之義也有之以為利無之以為用民咸用之謂之神也為腹不為目觀我朵頥之凶也寄於天下託於天下知進退存亡而不失其正者也迎之不見其首隨之不見其後神無方而易無體也善為士之章出入以度無有師保如臨父母之謂也觀復復其見天地之心也皆謂我自然不事王侯髙尚其事也若夫十八十九二十章矯世之言也其中有物其中有精坎離之體未濟既濟之用也不自伐故有功謙之義也有不信焉亦矯言也跂者不立鼎折足不勝其任也有物混成易有太極也輕則失臣躁則失君君不密則失臣臣不密則失身之義也善人者不善人之師益道也知白守黑窮神知化之義也去甚去奢去泰致恭以存其位者也將軍居左師左次無咎也道之在天下變動不居周流六虗之義也自知者明顔子之不逺復也自勝者强君子之自强不息也終不為大虗以受人也視之不見聽之不聞極深而研幾也不疾而速不行而至也柔弱勝剛强坤至柔而動剛也利器不可以示人君子藏器於身也守萬物將自化神而化之使民宜之也上德不德章矯言也謂得一者貞夫一者也萬物生於有有生於無蔡氏曰兩儀之先其易無體兩儀之後其易有體有無之義於斯見之明道進道探賾索隱鈎深致逺之謂也道生一一生二二生三三生萬物石林葉氏曰易之數見於大傳者乾坤之䇿也物亦非萬之所能盡該微見其緒曰引而伸之觸類而長之天下之能事畢矣老氏言數曰道生一一生二二生三三生萬物莊周言數曰一與言為二二與一為三自此以往巧歷不能算老氏所謂三生萬物者猶易之言當萬物之數而不盡其說也莊周所謂巧歷所不能算者猶易之言引而伸之觸類而長之而不窮其變也至漢言律歷者於是始於易數之外起黃鍾之一而三積之至於十七萬七千一百四十有以為五行之數備已而又為三統之說以五行相錯由三微三著積之始於太極而終於二千三百六十三萬九千四十而復於太極上元以為天下之能事畢無為老子之㫖義與生而不有同㫖既同則無思無為之義同矣知足不辱知止不殆諸卦之上九類之清靜為天下正憧憧往來之反說也知足常足繫于苞桑也其出彌逺其知彌少稱名也小取類也大之義也為學日益為道日損兼損益而言也懲忿窒欲損也見善則遷有過則改益也聖人皆孩之退藏於密吉凶與民同患也善攝生老子之本旨致一之義近之矣道生德畜乾坤之用也生而不有變化云為也塞其兊言行君子之樞機也慎言語塞兊之本也閉其門行其庭不見其人之謂也介然有知知微知彰知柔知剛介于石之義也善建者不拔確乎其不可拔也修身至天下中庸之論也精之至和之至男女搆精化生之道也玄同不見是而無悶也以竒用兵以此毒天下而民從也禍兮福之所倚碩果不食也福兮禍之所伏鞶帶之三禠也治人事天莫若嗇卑而不可踰二簋可用享也有國之母可以長久安土敦乎仁愛之道也非其鬼不神睽之羣疑亡也大國取小國小國取大國湯文王是也謙之上六得之矣道者萬物之奧廣大悉備也何棄之有容民畜衆也坐進此道藉用白茅無咎也圖難於其易為大於其細易簡而天下之理得矣為之於未有治之於未亂履霜堅冰也合抱之木生於毫末喻積小以髙大也下二章亦同也民之難治以其智多禁民為非曰義則智去矣江海為百谷王天水違行而由一以生也下者水之道需而蹇蹇則通矣下濟而光明之義得矣曰慈天地之大德曰生也曰儉損之道也曰不敢為天下先巽以行權也善為士夫子於益或擊之立心勿恆凶之爻詳言之矣用兵有言仁者無敵也吾言甚易知易知則有親也知不知滕口說也民不畏威不威不懲滅趾滅耳之爻得之矣勇於敢則殺天道虧盈而益謙也民之饑節以制度則不傷財不害民矣人之生章原始反終故知死生之說也天之道其猶張弓日往月來之義也天下柔弱莫過於水坎之內爻堅强者也故險之時用大矣哉受國之垢國君含垢也明夷之義於斯見之常興善人積善之家有餘慶也小國寡民章通其變使民不倦也利而不害乾不言所利保合大和乃利于貞矣為而不爭爭地爭城老子之親見也王侯設險以守其國夫豈有爭哉豫固嘗以易釋其㫖而未有成也同里吕君與之故儒家閲世益深遊於方外以其著老子一編見示甚似夫豫之所見其文詳順而實援據以精築室於海島孤絶之地黜聰窒明以養其泰和且又將窮極山川之幽勝以求正於有道誠可謂老而能學者也故輯舊說列于前凡我同志知豫之不妄許可者有在也泰定二年七月清容居士袁桷序髙一清醫書十事序班固氏輯劉氏七略為藝文志其序醫經方藥終以神仙十家殿之尋宗探本厥㫖深祕近世習老氏者則以為薄清淨務名實若班氏去取未足為吾學輕重其不習老氏者因其先後遂以為尊吾聖人莫若班氏緣聲附響深切明著之道二者皆所未喻也醫經方藥具訓于先古其不得已而為之意世莫之曉惟空林隱竇刻意繕性之士必極其本致而後能知之故其察五行乘剋之理七情摩蕩之原兢兢揣揣使夫身不至于已病而餘功後效積精以適神者斯近夫神仙之說矣班氏深存其義而隱其說故世之方士皆荒忽詭幻復别為一家以自侈靡而所謂非聖不言者則有戾五福之彛訓仁者靜夀之義于道何取焉豫嘗謂有經天下之志必有經天下之事胼胝之勞在陳之厄其饑寒困苦雖九死不得以自悔視夫彈冠結綬爭奪得喪談性命之空而忘事理之實者則有間矣故每信而不敢自異居里時獨髙君􅒷一清慕方外學嘗以為醫經為性命之本若冶金鍊石諸祕詭事皆不取彈極年歲悉取上古漢晉諸經方以及唐宋所續出經分緯别定其精良刪其繁雜别為十事謂必由此足以通夫仙道而其意與班氏適相吻合髙氏衣冠為四明望自獻簡公閌掌成均㝎學制當秦氏廢錮正士即致事以春秋禮學教授鄉里內翰公文虎禮部公似孫父子皆以文學致清顯至大宗伯衡孫為端平正士修儀偉貌年八十餘手抄見聞及方技諸書亹亹道舊不輟一清為諸孫得於宗伯為多淵懿之深簡聞小誦非所可擬疑駸駸乎與學仙之道通故今自號為通仙子云然豫幼聞諸老言葛天民曾景建以神仙說遊公卿清言玉雪苦意氷蘖見者憐而欲成之後卒不就最後里人王丹池復以是說遊亦不就十事之成于吾徒誠有賴未知通仙之本㫖其果能有成也朱文公於老氏嘗曰恐逆天理信而不泥然未始與浮屠者同其議悼日月之如流知玄髮之易化髙君其奚以辭因叙而致意焉四明志序成周疆理之制審於王畿首合同姓以夾輔至於四履則必假異姓焉以控遏之先後疏附曲盡其制何周且詳也四方之志猶懼其不能以悉知也則必以外史掌之社亡入秦而書具在區區刀筆吏獨能收其書據要漢中夫豈偶然也哉世祖皇帝聖德神武混平寰宇首命祕書監儒臣輯大一統志沉幾逺略與昔聖人意㫖吻合然而郡志缺落其遺䡍未備焉者不復以徹于上馬侯澤潤之固嘗為中祕官知之矣暨守四明乃曰明舊有志今為帥大府浙東七州推明為首厄塞户版物産地利是宜究察以待問清風舊德與昔之髙閎巨閥屬於宅里者猶可考也謂桷久為史官冝有述桷嘗聞之洙泗遺俗稽之以久逺者道德之澤也詫錙銖之利以害于吾民昔人之所不道空虗說增農日益困甚者紀其山林屋室之盛奉書詣庭若執符契爭莫能已是殆昔之無知者根其禍也管夷吾作書訓子弟良厚而內政以漁鹽為急儒者詬之維明負山橫江歲厄於水旱河渠是先牧民之本推其沿革覽其山川知昔時得人之盛宫室户口之無恆釋道遺文之盛衰是皆足以增其永歎焉者矣乃為十二考以志其事遂不敢以荒落而有辭也馬侯為政愷悌惻隱以宜于民民以不病郡博士吳君某勤恪承令詢索州縣之所宜聞者良備因是得以成書焉李景山鳩巢編後序桷過永嘉張宗魯書孰庋河間李景山氏手校朱子詩傳謹視之旁行側注朱墨定竄精善心慕焉雖未熟詳知其名能詩吾意非近世詩士也近世言詩家頗輩出凌厲極致止於清麗視建安黃初諸子作已憒憒不復省鈎英掇妍刻畫眉目而形幹離脫不可支輔其凡偶拙近者率悻悻直致棄萬物之比興謂道由是顯六義之㫖闕如也是歲冬見于京師始讀其詩於雍虞德生質而不倨綺而不踰襲衆芳之英融寄于窮崖絶域之地而審其昔日之心滿意肆蓋將冲寂寥廓脫然以逃焉者也夫子之言曰詩可以怨然不怨可也怨已則責難於天誠不怨邪幽蘭之辭湘纍之賦得而廢之矣若公之詩非悲其不遇也凛焉以持者正也反而言之斯怨矣又何病焉豫嘗從問雲南土風歲弄兵不止計安出公曰理則人擾則獸豈獨雲南哉退已書諸牘復識于序後若德生所論次者不復著劉內翰文集序至元二十四年間南康劉公為內相宋社未亡桷髫年侍先處州府君于錢塘獲已則責難於天誠不怨邪幽蘭之辭湘纍之賦得而廢之矣若公之詩非悲其不遇也凛焉以持者正也反而言之斯怨矣又何病焉豫嘗從問雲南土風歲弄兵不止計安出公曰理則人擾則獸豈獨雲南哉退已書諸牘復識于序後若德生所論次者不復著劉內翰文集序至元二十四年間南康劉公為內相宋社未亡桷髫年侍先處州府君于錢塘獲識之議論雄偉誠竒士也後有客自京師來者必詢其詞命制作多戃恍不能道踰十餘年獲入禁林得玉堂制草而讀之編次荒略詞臣之名十不存四五是則劉公之文無因而推考焉者矣至治元年冬十月其嗣判官君某橐其遺文相過焉㑭有叙桷讀之手不以釋夫集腋於裘搗􅎇於鼎非精别者不能也尊其所聞足以信後諛言美說非後進之所宜為也東平李公謙評公之文曰學問該洽性理精詣承㫖王公搆則曰深妥雄健博碩光明廣平宋公渤亦曰氣盛辭卓溫縟宏雅嘉禾張公伯淳則又曰浩蕩橫逸是數公者司衡挈繩將㑭夫後之學者翕焉以從其傳信何疑矣夫以理為主文常患於不工雕鏤委心茫然而無以畔岸是則為是者良難矣命焉而得所遭事久則論益定觀其詩文於當世羣賢之言有考焉斯得矣樂侍郎詩集序故吏部侍郎河南尹樂公詩一編其季子克誠以家集散軼守其記憶者得若干篇將刻于梓㑭有叙桷讀而作曰嗚呼㫖哉方南北分裂兩帝所尚唯眉山蘇氏學至理學興而詩始廢大率皆以模寫宛曲為非道夫明于理者猶足以發先王之砥藴其不眀理則錯冗猥俚散焉不能以成章而諉曰吾唯理是言詩實病焉今夫途歌巷語風見之矣至于二雅公卿大夫之言縝而有度曲而不倨將盡夫萬物之藻麗以極其形容贊美之盛若是者非夸且誣也五經言理莫詳於易其辭深且密闡幽顯微不敢以直易言之考於經皆然也宋之亡也詩不勝其弊金之亡一時儒先猶秉舊聞於感慨窮困之際不改其度出語若一故中統至元間皆昔時之緒餘一一能有以自見若吏部公則親受承安貞祐之傳故其詩清切俊邁足以振數百年之逺響㑭置諸中州之所編次其何能以辨公諱舉字用之號藏齊與父運副皆金進士家世源委所從來有据傳以永久孰曰不宜曹邦衡教授詩文序大江以南地為荆揚郡不過百十其言語風俗起居飲食之異邈不相近世方理文治而士大夫言詞章髙下復人人殊數十年來文益偷體益弊乘髙駕浮滑稽恣睢恍乎其不可結潔而至於道者不懼則僨遡源而論之蓋方承平時師表日增士以其類至尊其所傳過於自守而樂凡近者尤矜矜然祕重不妄與一道德而同風俗先王之教誠不若是也余嘗㑹文於同志反復力議而卒以自病廬山曺邦衡客京師三年矣閉門弦歌絶造請之跡顧屢察之而卒未之與議將行始示其詩文一編搜竒粹精炳然而橫陳列懸于簴搗珍于鼎聲味相屬而凌厲感悱蓋將合律吕之變適酸鹹之宜者也夫不自是其是必有則於古守其私說不能以自廣將固且隘博以求之精以思之日遷而歲異當於是乎益今四海一國士之不可强為者猶跂而及文教之洽由是而一曹君勉乎哉往慎乃塗正轅而行其寧有不至者耶清容居士集卷第二十一
