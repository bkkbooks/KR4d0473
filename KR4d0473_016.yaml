front:
  text: 清容居士集卷第十六
  hash: sha256:fc09aff703d14a0e8c6315c2e588aa03553900498bbf660f5e90fd95e200602d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_016-1a}
body:
  text: 開平第四集壬戌至治二年三月甲戌改除翰林直學士四月乙丑出健德門買小車卧行八日至開平舍于崇真宫有旨道士免扈從宫中􅞔無人聲車駕五月中旬始至書詔簡絶僅為祝父十三道內制已入悲愈感發一寓于詩而同院亦寡倡和率意為題得一百篇閏五月上幸五臺山以實録未畢趣史院官屬咸還亰是月丁巳發癸亥還寓舍五月灤陽大寒閏月道中大暑觀是詩者亦足知夫馳驅之為勞隱逸之為可慕也六月丁卯朔桷敘端午日繇車中抵開平客中三度端陽愴然有懷居庸昔日逢端午子規聲聲勸歸去舊嵗灤陽萬夀宫九節菖蒲泛瓊醑今年車中飽掀簸盲風北來雨如注沙坡馬鬛髙下迎土屋魚鱗先後附舊家松篁百尋碧簷蔔花前石榴樹停車俯首不得語鄰墻簫聲雜駝鼓勞生得意同蝸牛奮臂却行等蠅􅍑崇真宫􅞔無一人經宗師丹房惟蒲苗楊栁感舊有作雙斛青蒲苗中庭緑楊枝門鎖碧窗寂徘徊心不怡􅉝勤四十載逢辰搆崇基寒日淡無華朔風助之悲想此鸞鶴侣長嘯悟成虧往昔玉局翁言罷白雲隨懷賢感夙昔悼念成涕洟夜夢忽邂逅掀髯歌紫芝間間真人未至崇真觀裏獨徘徊門鎖蛛絲燕子猜玄度來遲愁欲絶為慿白鶴寄書催舊嵗端陽與王吏部同客灤陽因成七言奉寄舊年同飲端陽酒擊鉢聨詩日未斜我戴夫須重出塞君飄蹀躞獨留家雪花帶雨催前馬草色連空趂後車萬里功名頭竟白張騫何事苦乘槎寓舍玄卿舊住今歸龍虎山書壁言懷明玕出海見竒姿價壓連城賈客知往嵗曽為大鵬賦今秋且作小山詞黑頭好景傳杯樂白眼長年按劒疑君去我來同此榻鴈回何處寫相思五月八日雨霰黑雲轉飛蓋晴空落珠丸急響遞踈密跳踉杳無端仰視烏輪光粲粲不可干隂晴界南北咫尺分寒暄鮫人有暗淚乘陽湧冰瀾又疑天女下百琲隨輕紈采之不滿把瞬息何彌漫東墻古楊枝含思碧雲寒留取宛轉花伏日為君看開平昔賢有詩片雲三尺雪一日四時天曲盡其景遂用其語為十詩茫茫廣莫區屈曲層城建昔云水雲陂伐木嚴築鍵寒沙雜軟草其下有冰片雙龍赴魏闕雲氣時隱見巍峩中天居百里見行殿唐皇極睿算憂邊罷從軍種松八百里擘畫疆理分立象有㝎數後王䇿竒勳千車昂頭來萬竈生墨雲天險尚莫恃人謀安足云曉日出東門寒光靜相涵黑雲何方來玉妃為之驂頃刻變昏晝隂晴常日三宸居逼象緯熒煌斗司南世儒窘六合鄒子成虛談羲和當中街重裘慘顔色詢彼住冬人封户雪踰尺松煙暗踈箔羅坐圍丈席南鄰時相通北門恍未識冰天與火井受地各有職近山如雕鞍逺山如削鐵涓涓落黃流嗚咽恨未雪坡陀下前坂颯爽萬境滅馬嘶不肯行沙寒草如茁氈廬峙前岡一一望初月鴐鵝帖雲飛下懼鷹眼疾空墟無鴉棲壞穴見鼠出楊枝尚斂色吐絮朝伏日羌巴雜蠻獠異服狀非一風土諒不同刪述在史筆煌煌千賈區竒貨耀出日方言互欺詆粉澤變初質開張通茗酪談笑合膠漆憶昔關市寬崇墉積如銍梯航際窮髮均輸乃踈術城南水沮洳飲之不盈匕逺汲沙水甘客云汝縱恣客竟遭河魚投以百金劑簞瓢乃真空飾情果為纍狙公解朝暮不復計三四亭亭芍藥枝朱明勝春時金蓮與墨菊兄弟相等推陽艷深摧藏後秀真竒姿盛時匪自棄願與松柏期有客同爾心臨風結長思􅊨焰焰三伏日沉沉九秋天雷鳴過床下月出在樹顛手持五采筆直侍虛皇前大以書龜圖小以傳瑶編綸言廣聖澤載歌千萬年南望急霰輕雷五月觥船手把趣裝綿燕山南望十三驛紅杏枝頭别有天天鵝曲天鵝頸瘦身重肥夜宿官蕩羣成圍蘆根喋喋水蒲滑翅足蹩曳難輕飛參差旋地數百尺宛轉培風借雙翮翻身入雲髙帖天下陋蓬蒿去無迹五坊手擎海東青側眼光透瑶臺層解絛脫帽窮碧落以掌疾摑東西傾離披交旋百尋衮蒼鷹助擊隨勢逺初如風輪舞長竿末若銀毬下平坂蓬頭喘息來獻官天顔一笑催傳餐不如家雞柵中生死守免使羽林春秋水邊走李老峪山水深類先公墓田左右悠然白雲之思積翠彂層巒恍然家山圖隂竇水屈曲古樹雲扶踈是時月新出歸鴈飛躊躇疑我久離鄉問我今何如云昔所種松靈籟吹笙竽捴角守庭訓六籍師鴻儒幸以鉛槧勤三入承明廬風景果有似舉目諒不殊信美非我土誓言敢終渝偶成午雷嬰兒聲晚月大士面頃刻備四時隂晴足千變空齋襲重裘塵壁委團扇昔為居養移今愧筋骸倦鼇峰石劫風吹沫孕玲瓏度海鞭霆駕六龍聲合八音驚俗耳重均九鼎動天容空庭露冷珠璣綻阿閣雲開錦繡封匝匝金蓮隨地擁似催夜直佩瑽瑢金蓮花石下皆子規詞三首不如歸去君家南山松萬樹我欲送君歸憐汝嵗上灤陽路去不如歸江南春深筍蕨肥筍蕨肥子苦飢見子手持一片冰下馬坐看白雲飛歸去不如我是蜀王魄化聲􅈱􅈱君不歸請看錢塘雪浪千尺帆踏歌起舞去復還盧彥威與余同為待制下世已八年覩行院題名舊迹感愴寫情長髯黑髮佩鳴珂嗜飲常持金叵羅詩艷欲追長吉製詞新深愛小蠻歌鳯池聨轡情偏重鸞鏡重粧病已魔日即病以終彥威再醮一題壁凄涼悲二妙元公近亦葬山阿元復初學士舊歲同官集賢會于上都改除翰林學士見其飲酒數十觥倍常時今年以疾卒不起覩行院題壁為四韻以挽慷慨論交二十年深慙經術荷推先龜趺林立毛錐秃麟筆星垂汗簡傳直以曠懷招側目肯于凡品説齊肩舊聞蘇李曽生别行院重來倍泫然潘景梁學士同在集賢朝夕與余論宏詞源委後俱罷去新政肇更皆得復入舊嵗同會上都景梁還都不一月下世僕忝入翰林過視草堂有感鑾坡清切平生志粉省烏臺謝不能尚書嘗除樂意在承旨行臺侍御皆不夜剔蘭燈書葉亂凍呵鐵硯墨花凝蟻穿九曲誰傳授蜩化枯枝果變騰欲説玄機吾豈敢碧天雲黯喚難應客舍書事八首客景真愁絶凄涼倍舊年草穿沙觜縮雲住屋頭偏竈冷厨煙濕窗低簷霤懸畏寒難出户盡日得髙眠日永空庭淨清齋罷煮茶無羊誰閲市有客共思家巷近逢歸馬門間數過車衰年行六十那得老風沙愁極吟肩聳塵深望眼迷屋隨冰上下山趂雪髙低乾酪瓶爭挈生鹽斗可提日斜看不足踏舞共扶擕蟾影穿窗矗龍光拂席流淒清三伏暑淅瀝九天秋水惡停泥井冰堅宿瓦溝年年遊上國那識望鄉愁問俗過閭里凄涼説住冬凍瓶粘在手暖扇縳當胸雪急籧篨響風髙榾柮鬆寒更傳警夜飛騎急憧憧禁堞防危石官衢漾淺沙犬能搜兔窟馬解避駝車童剪青蔬甲僧分墨菊芽飄零堪慰藉小雨墊烏紗宿霧成踈雨寒蓬捲細塵雲飛疑到地草長不知春香几蜂喧密寒房燕語真白頭關塞外猶作未歸人燈影微微焰鍾聲隱隱清歸鴻天際度去騎月邊行久客心無著微醺夢易成攬衣中夜起北斗正南橫視草堂四詠視草堂前月淒清十倍秋銀河斜處響玉斧暗中修隱約娑羅見微茫顧菟流霓裳端可補願入廣寒遊視草堂前雪飛花具四時老疑潘鬢重舞覺沈腰羸妙合絲綸巧功調鼎鼐竒虛皇瞻咫尺願賦玉亰詩視草堂前雨飛空萬象新隨龍下膏澤滌頴布陽春脈霂能生物霑濡不受塵巫山空有賦難作楚王臣視草堂前日傳宣趣制詞藁裁初刻上朝罷八磚移烏御行黃道龍光映玉墀薰風生殿閣小立獨多時華嚴寺寶構熒煌接帝青行營列峙火晶熒運斤巧鬪攢千柱相杵歌長築萬釘湧沸以木殿基水泉其費巨萬釘萬枚築之雲擁殿心團寶蓋風翻簷角響金鈴隃知帝力超前古側布端能動地靈贈華嚴長老二首四年上國扈金輿燕處髙齋得起豫篋寶寸珠光不老爐存片雪色相如抱琴有意傳流水擊拂無言指太虛二十里松親見得塔中古佛白毫舒明太白禮宏智塔宏華嚴洞下宗常遊四佛再世智相傳古丈室蕭蕭晝掩扉蒲團不下得忘機階前菊本先春種門外楊花伏日飛句落珠璣禪客誦象嚴金碧𣑽王威知余猶是青山伴話盡斜陽指翠微書邢遵道二父家傳蜚聲秀采動時賢書帙如山酒似泉已恨人間雙璧化共誇身後一夔傳藥囊有砥隂功滿詩卷相輝盛事全會見門楣成晚秀瀛洲委佩接羣仙贈寫真佟生丹青妍醜世間形碧眼看天畫未成夢覺已傳商相似神間能寫趙郎情沙場燕頷愁中樂客舍鳶肩暗裏驚彩筆閲人頭漸白長因眸子識公卿贈李道士髙安李道士貨藥繞灤城竹杖常隨手茶甌與解醒住冬饒活計聽雨話平生欲説前朝事年深記不成行路難五首桑乾嶺上十八盤赫日東出紅團團回頭平田樹如髮北去沙石何彌漫青簾髙低知客倦勸汝一杯下前坂馬蹄護鐵聲琮琤帖石朱欄列危棧度嶺林昏泊官驛冰湧虛泥踰五尺馬行猶知泥淺深重車沒踝路莫尋松林巨木官採搜千斧斫根膏液流翠旄離披仆巨壑百谷震動狐狼愁大車以載牛馬喘歷塹凌深不能挽車頭挂紙齊聲呼一步一移日將晚經春踰夏來亰都雕梁繡柱天人居錦茵花磚淺深護嵗久不知行路苦昔聞萬回僧空中轉足如飛鷹又聞麥八百側徑回旋去無迹牙牌校尉夸快行急􅏻一日來亰城人言脛中有肉燕籋雲躡電那能名古云行路難今作等間看君不見明王坐朝疲心思日行天下人不知金谷園頭土如酥瓊花琪樹凝流蘇文鴦甃磚藻影動飛鳳團礎雲光腴紫絲步障三十里百和生香交旖旎美人羅襪不動塵匝匝金蓮隨步起須臾急騎圍四隅瞬息突兀生寒蕪緑珠危樓百尺墜行路之難却成易弊裘蒙茸蘇季子兩足重趼行不已一朝佩印何纍纍列鼎腥羶夸國士班生逺出玉門關被甲夜度隨黃間飛沙擊面燕頷失晚望落日思生還書生守株燈火勤終嵗不通南北鄰一朝安車入關內老不能言願求退賣薪行老兵縳薪穿市賣雙手如龜布衣壞低頭望日南階行背負槎牙北風殺大車輪囷小車聚我薪不如一抔土黃公壚前煙霧髙揮手相譏不相顧暮歸置薪眠土屋望月清歌聲斷續丈夫窮達會有時買臣懷章人始竒視草堂嵗久傾圯述懷二首視草堂前草木青微臣三入鬢星星壞墻雨透蝸生角舊竈泥深菌露釘深恐雨鐘催曉箭獨聽寒殿響風鈴堂堂諸老冰澌盡病叟應歸種茯苓昔時夀俊佩蹁躚人物於今似眇然倚馬誰憐才獨步屠龍端信技無全頒冰伏日金奩重賜果薰風綺席鮮可是虛皇疏顧問玉堂舊事少人傳翰林故事莫盛于唐宋聊述舊聞擬宫詞十首禁鐘初動趣傳宣衣袖薰香到御前漸近宫門扶下馬內官分引導金蓮御筆圓封草相麻龍箋香透擁金花儀鸞敕設庭前候賜酒方終更賜茶制草塗鴉未敢刪內璫宣引侍龍顔已分筆格金蟾滴更賜端溪紫硯山春帖分裁閣分多宫娥爭餽纈綃羅青絲菜併銀盤送幡勝新題墨旋磨文思如泉涌墨林屏風院吏不須尋舊時內相諸孫在猶有當年掃閣金入院聽宣席未溫賜金已向案頭存入院故事十兩始草制傳旨畢賜葉金清晨上馬還家去內出黃麻付閣門清馥香溫酒玉脂祝攴已撰報都知夜來奉旨傳丞相五朵雲濃押省咨天孫夜度玉潢清內托銀盤湧化生秋思未多團扇在擬題宫怨月分明盤雕暈錦是冬衣鴿炭初生酒力微聞道邊臣風雪苦口宣臘藥布皇威贊書謄副節樓前筐篚盈庭邸吏傳深恨葫蘆陶學士受渠犀玉索金錢書懷曉來重纊避風簷午著輕羅更上簾可是炎涼隨世態病多時節要抽添五月二十日甘雨如注江南呼為分龍雨平疇龜拆禱龍君百頃青黃兩界分匝岸已霑三尺雨隔溪唯見一川雲誰家襏襫涼如水此地祗裯火欲焚共道神功有南北老農元不廢耕耘五月草六日大寒二十二韻地界幽都正風傳委羽來隂機堅積沍空寲起荒埃炎帝辭施設玄神擅展裁氣疑翻溟涬勢欲壓恢台北户嚴雲結中街宿霧霾睫流驚炙轂吻咽訝銜枚野曠狐歸穴林荒雀下臺趂虗人瑟縮走驛吏徘徊舊篋裘頻索殘爐火易灰當陽紈扇棄薄暮酒尊催牛喘猶瞻月龍藏敢挾雷曉吟肩峭直午睡髮毰毸絺綌聊增􅊞簾帷莫浪開鼎溫延上客竈煬集羣孩鳥認南枝宿駝鳴北路回泬寥河漢接慘淡雪霜堆重甲身僵仆銖衣説詭詼已知鄒子的更覺杜生哀澤國朝曦赫畬田溽雨催鴻鈞陶石爍金鑑煮冰摧舊俗慙卑窘新聞騁慱該廣寒今已到姑射不須陪御天門聽詔大樂出端門金龍日正暾千官齊跪聽萬姓列行屯親衛周廬列王徭尺籍存侍臣頭已白宣室願陳論露立空庭露立意茫然簇簇飛雲萬馬旋擬變清涼成佛國不教人喚四時天喜吳宗師至飛鶴馭空來春濃洞府開燈光爭夜月磬韻起春雷玉斗朝雲禮金門就日回的知仙桂種玉斧更深培食杏有感筠籠賜杏得嘗新一一如拳醉臉勻準擬重尋舊門館空庭繫馬燕飛巡寄王繼學吏部青春王吏部東閣久相陪聽雪聮詩送看花並轡回如何千里别不寄一書來拂拭題名記深知吐鳳才皇城曲堂堂瞿曇生王宫幼年夙悟它心通𣑽書未覩口已誦砥用城闕窮西東淨居老人幻境異故作恐怖生愁容世間習妄了莫喻要以神化開盲聾嵗時相仍作遊事皇城集隊喧憧憧吹螺擊鼓雜部伎千優百戲羣追從寶車瑰竒耀晴日舞馬裝轡搖玲瓏紅衣飄裾火山聳白傘撑空雲葉叢王官跪酒頭叩地朱輪獨坐顔酡烘蚩氓聚觀汗揮雨士女簇坐唇搖風人生有身要有患百嵗會盡顔誰童西方之國道里通至今生老病死與世同天童山圓上人逺來開􅊭訪華嚴以舊詩求題三尺枯藤一卷詩五千里外訪相知鄉音未改眉毛在曉過嶺西聞子規手探驪珠顆顆圓清如秋月獨當天舊棲太白寒禁得更上開平擬過年題信上人手書南湖涼觀碧芙蕖屢見臨池曉日初一去天台隔生死重來應寫梵天書客舍四詠膚寸出巖遲亭亭大雅姿肯因風共去獨與月相隨似絮飛無著如山立不移崑岡有片玉嵗晚話深期孤雲寒焰出房微前山尚落暉酒醒光耿耿鐘㝎影依依蝶夢疑方化螢流竟不飛草年長作客獨照合玄機孤燈舊日江湖伴多因塞北分身單追暮雨翼冷帖秋雲肯向蘆邉宿還應枕上聞沙洲矰繳滿不是故離羣孤鴈絶頂看秋月星沉萬象竒難隨黃鵠侣獨與白雲期野性便金洞清聲徹玉墀山中王子過時一聽參差孤鶴次韻圓上人大荒沙漠境全真平楚天低絶見聞此處無愁誰會得琵琶一曲問昭君我家鄞水望江神君住鄞山半嶺雲同向天涯作行客㝎知猿鶴有移文萬解千言任所之一花五葉捴牟尼九龍峰鎖難分别會見芙蕖長玉池次韻華嚴賀李彥方除監察御史秀采寒光敵楚金詞鋒能繼九州針鳳池舊直驚人海烏府新除表士林氈紹家聲真素業簡謄民瘼是丹心華嚴蓮社相期逺應許遺民得共尋彭法師禱雨有感神京嵗嵗春夏交乾風捲塵喧四郊銀潢清寒不可挽火礫燥露焚烏巢廟堂憂惶走羣望桂酒跪瀝陳牲殽飛雲虛無恣強魃古澗偃蹇專幽蛟拾蜴旋舞破甕缶髣龍作形糜藁茭或夸巫言擊長劒或騁梵語鳴銅鐃老彭之孫赤松派尸坐直欲鴻濛包深知天水本一􅉋山澤妙感窮羲爻三玄上章給鳳札九淵投簡驚鮫綃大青小青各受令旋轉急注搜巖拗初疑飛繒蔽雲頂恍若銀竹穿林梢鳥衝沉冥舊栖失虎度泥淖前林咆乃知至道在瓦礫芒刃不缺須良庖皇皇真宰燭萬類神運溥博民同胞前驅招搖後玄武朱冠鐵騎森旄旓精誠相通顔咫尺聾瞽未識徒譏嘲白頭太史詎妄記願以彩筆窮模描近為盧真人作桐柏山賦以舊賢四詠復令賦詩次韻雙闕髙蹲仙境分深留絶頂獨耕耘雞啼流水村非逺犬吠隔溪人始聞翠蔓滿林俱上藥黃雲封户總回文層霄笙鶴須臾見不用談空李少君王子乘鸞八極周參差吹徹此淹留緱山未信雙輈逺滄海端如一羽浮碑聳蛟螭擎雨露賦鏗金石閲春秋莫言劉阮歸無迹政與寒巖二子遊逺瞰神山接海潮羣峰匝匝翠周遭添書舊字開蒼蘚金鼎寒光映碧桃瀑濺花香疑過雨風回松吹似驚濤昔年曽説王靈寶冷笑人間有二毛雷起平田過雨腥居民猶説老龍靈泉流洞口凝鍾乳月落松間照茯苓琴罷忽驚人換世丹成深勸客延齡仙翁久作朝元客贏得瑶壇滿鶴翎再次韻門首穹碑字八分寸田尺宅勸鋤耘雲歸右洞疑無著雷過前山似不聞磨石旋風空世劫梭溪織水起寒紋年年秋月層臺上髣佛虗無下帝君堂堂王子憫宗周不住緱山此地留玉髓㝎將金篋貯滄波能使羽觴浮絳桃帶雨飄紅雪翠樹停雲起素秋絶頂銀盤宫闕爛不須更向紫霄遊夾山松瀑似秋潮老鶴調雛日一遭欲與雙成同勸酒却嫌方朔強偷桃草沿碧澗千年藥雪釋瓊城百尺濤聞道玉蟾三度到通明金骨舊皮毛羅浮未化玉蟾或云在久食青精厭世腥無心折草總通靈望雲岸幘招歸鶴滴露濡毫傳負苓峰頂丹成真九轉洞中棊罷已千齡嗟余猶是征塗客四上開平數鴈翎上上人遊開平回四明圓帽方袍上上京看山碧眼雪分明南來白鴈先秋去我輩無情合有情成君輔廣濟堂車馬填門日不停刀圭上藥已通靈應須重作鐵門限坐見堯民夀百齡內宴二首寶勒猩纓鴈翅屯錫鑾欵欵奏南薰珠冠聳翠千行列雉扇交鸞五采分宫漏解留黃道日御爐能接紫霄雲漢家天子空英武置酒爭功始考文棕殿沉沉曉日清靜鞭初徹四無聲桐官玉乳千車送酒正瓊漿萬甕行肯以駝峰專北饌不須瑶柱詫南烹先皇雄略函諸夏擬勝周家宴鎬京伏日伏曰車中閉炎蒸不自由轉旋疑病酒掀簸似驚舟山色隨眸轉溪聲著耳流艱難吾敢讓猿鶴故山秋龍門君恩八度過龍門眼見蜿蜒守黑雲漠漠沙田荒礫滿空將霖雨一溪分巨靈何日擘雙門千古英雄底死論落日碎金寒澗裏銷磨猶是僕姑痕戲題開平四集開平四集詩百首不是故歌行路難竹簟暑風茅屋下它年擬作畫圖看奉題開平百首詩後王士熙玉海雲生貝闕髙騎鯨人去採芝遨灤江一夕秋風到瑟瑟珊瑚湧翠濤清容居士集卷第十六
