body:
  text: 第一卷賦導逰賦雲林賦玄雲石賦淳賦玉龜杖賦桐柏觀賦椿堂賦仁夀堂賦樂水圖賦餘間齊賦息齊賦凝雲石賦紅梅賦九華臺賦墨竹賦素軒賦冬窩賦榕軒賦復庵賦擬剡亭賦餘軒賦隱居圖賦第二卷騷辭愍誓廣招七觀嶽麓圖辭悠然閣辭金堤辭石田山房辭雪江圖辭垂綸亭辭巨峯辭雲中辭春雨辭義婦辭哀蘭操蘭竹操黃可玉哀辭林彥栗哀辭朝元歌九章第三卷古詩四言述祖德示從子瑛張孝子徐母表閭致樂堂臺氏舞衣堂古詩五言舟中雜詠十首車行二十八韻餞王參議十首次韻虞伯生夜坐二首次韻伯生二首再次韻伯生兼簡仲章二首三次韻二首鞭馬圖張希孟嘉慶圖逰長春宫分韻得萊字次韻徐志友雜詠十首再次韻答仲章仲寶十首三次韻酬儀之伯生十首題周子明三獄詩卷題弋陽巖山精舍圖次韻仲章蔡村阻風次韻陳畬齊七首次韻答蔣商卿三十二韻集廉園次韻仲章杜門暮歸贈黃教授歸閩中送許丗茂歸武昌二首題金華洞圖二首送張上卿夀何平章二首次韻雜詩五首夀程內翰二首别仲章别吳飬浩十首度淮寄飬浩懷伯生酬蕭靜安提舉二首題劉充之載月圖夀賈參議二首次韻揭教授官閩中寄題撫州先天觀送牟景陽教授天台四首雲隱齊劉希孟訪子昂以詩寄之送胡安常貟外次韻張秋泉墨蘭第四卷古詩五言夕佳亭贈飬源編修回嚴陵省墓贈昌上人二首宿竹院次韻珙橫川二首送宋夀卿侍御迎飬建康廣信陳氏擇勝樓贈潘孟陽歸里五詠題盧溝煙雨圖滑州從事表閭贈孟和卿雲中郝孝子送沙君寶宰邑次韻馬伯庸供奉書館書事二首送伯庸御史奉使河西月巖夜集西太一宫分韻得草字史氏報春堂送于思容助教官濟南天師留公返真空洞歌步虛詞十章以導逰大名劉節婦吟育王珙禪師示寂寄塔主送胡止水回三衢三首贈岑易直登苐歸里二首善之僉事兄南歸述懷百韻題張中丞東亭圖曲陽李孝子送趙虛一道士降香南海諸名山屏山堂題輞川捕魚圖子昂墨竹可竹軒子昂雙木竹石圖以劉士先子墨贈薛玄卿飲酒雜詩十二首劉氏義門述郭楚望步月秋雨琴調二首送吳博文歸天台送人之官遼東得一齊次韻蔣逺靜二首次韻鄭景尹二首再次韻二首觀圖書次韻景尹次韻黃伯玊東漢名士十詠觀真文忠公畫像陶道士心逺齊寄題郭靖州絅齊第五卷古詩五言為贑川連教授賦梅城泊貫州次韻仲章次韻吕學正古意二首次韻元復初春思三首雨後聞鶯送李德隆乞郡江陵省飬節婦吟二首次韻范德機海鵠篇送任懷可同復初功逺飲仲章家觀芍藥分韻得一字洛詠五首示洛人張孟功任大正贈汪生感興題王眉叟溪月圖書孝子卷夜泊城北有懷孫秦二學士淮口阻雨二首詠史四首次韻仲章初夏即事城南亭讀范德機東坊藁送武當張道士觀梅分韻得影字送陳仲剛歸鄱陽送薛玄卿歸吳有感董道士雷泉齊三月十二日自殿廬歸舍梨花盛開薄暮與陳汝海花下小飲送祝丹陽使武當山贈陳文翁求篆扁送李平叔之信陽贈徐中丞二首拙訥齊送鄯陽劉縣令之官宣寧二首題文與可風雨墨竹答李生𥙿題巨然楓林雅集圖避塵軒次韻伯生榆林中秋送鄭景尹還里李野齊别墅圖子昂人馬圖墨蘭圖次瑾子過梁山濼三十韻憶昔三首重巖圖次韻王叔載十首董生噩上人用叔載韻見貽再次韻十首芳思亭次韻袁季厚惠苦筍楊梅二首第六卷古詩七言題髙彥敬桑落洲望廬山圖秋泉伯生仲章梅叔章周儀之皆次豫韻題廬山圖再次韻以謝賦張彥清復古硯金華曹道士白雲樓賦廣帥平寇還謝王參議送練春紅二枝題董簡卿瀟湘圖絡馬圖康樂圖贈杜秀才歸省荆南贈拙訥子寄南劔李士弘使君送任道士歸武夷送郭天錫還京口燕吳間間冰雪相看㶟陽張節婦瓶中杏枝著花為賦長句仲章與豫連舟夜泊夾馬營仲章有詩因以奉戲蒲城孫編修父年九十四院長而次各賦詩嶽麓圖送何太虛歸山中賦水車次韻夏明道紅梅雪汙齊次韻間間甲子雪贈錢塘吳月湖送趙君佐茶使黃臨汝以長句索筆次韻題翠山嗣禪師雜花丗界贈劉醫次韻假惟德右司子昂風林牧馬圖張氏女送儀上人歸天台題李廷弼歸安去思碑題董髙間春龍行雨圖送錢塘萬戶還鎮嗣天師墨竹送趙正卿歸飬胙城送保寧萬戶出鎮子昂寒篠枯槎圖澧州通濟橋懷日溫妙明上人二首善之携酒招逰西湖值雷雨分韻得杯字賦金華方君雙魚硯寄張伯雨道士兼簡鄧慶長二首第七卷古詩七言煮茶圖并序贈張玉田題子昂浴馬圖送倪德進歸鄱陽送僧德芬過松江憶陳道士病馬圖次韻張伯雨梅花島次韻渭川春玉圖二首忍恕堂飛鴻軒李士弘枯木風竹圖題茅山道士雪梅障餞廣信奚靜能之官南康次韻王道士送馬季權之官平江州送宋誠夫押送交趾使之武昌送濮陽陳景皋之官欣州送湯道士降香武當山過髙郵湖趙昌荷花京尹旌門乘鸞吹簫圖雲岡圖贈吳江宋尉與相士王月屋廬陵梁醫濟生堂次韻史允叟檜屏次韻蔣逺靜二首廬江羊孝子表閭送潘元卿次韻黃松瀑自廣信見寄黃居宷蒼鷹擊雉圖送廬陵陳存道赴廣州教授送毛道士降香嵩衡淮海四首贈鄱陽劉生句曲山迎真送真詞二章贈吕與之送瞿伯器還吳竹素園松聲樓次韻郭功父杏山詩送林以道歸括蒼題明皇擊梧圖題何仲博棣華堂第八卷歌行吳船行淮船行越船行清明行河船行鞦韆詞二首天祿硯滴歌新安芍藥歌天瓢歌晉寧丁節婦歌哀牢夷安南行次韻黃可玉古墨行李宫人琵琶行渝州老人歌大雨醉歌龍尾歌月海歌敬亭歌秋江釣月圖歌二老歌二馬歌廬陵劉老人百一歌月鑑歌玉署鰲峯歌秋風歌東門行廬陵海月道人歌聮句東湖逺逰望洞庭山秋雪又槍竿嶺送