body:
  text: 碑獻州交河縣先聖廟碑尊聖人而親之有為廟之道焉廟也者享之以寧其神者也氣行于太虛莫窮其神天地日月星辰久而不息者也聖人之道與天地並而其炳然立言品節備具則猶夫日月星辰也人生則有死渙而復之亦必有道著其思以立其誠焄蒿悽愴沒世而不忘故立廟之制親盡而祧祧而壇墠其愈逺者情不得而推也自唐以來祖立先聖廟天下郡縣皆以上丁致祭升降迎享有似夫宗廟而復琢範土木象其神明故其廟也有堂無廂重屋四阿具體而制簡禮緣人情敬生於其心其從來也久則今之為廟者不得而廢矣夫子嘗曰祭神如神在神無在無不在有其誠斯知神矣獻州交河縣舊有廟學廟狹庳不足展事皇慶元年王君某為縣主簿治事之隙日率胥徒入學以受講乃與其令長僚屬勸士民出其贏財廣新孔子廟越明年十月告成維昔獻王纂輯古文補正六藝今州以是得名儒術之士宜為歌詩以侈厥美於是鄉大夫刑部員外郎葉蘇君俾志經始且請之以詩詩曰兩河舒舒民迄奠居理政孰先學廬是圖禮殿弗虔墉棟庳穿我究我環築營燥堅嗟爾士子康色以喜出粟載車以相胥宇松柏甓石維鐡丹碧翼然崇崇聿完有侐王君之始民不知至暨來釁成其徒蒸蒸仰止獻德胙土啓國絶續闡微維聖是則聖有載籍德修靡忒毋辨以夸毋質而阿洋洋在庭若聞厥聲視而新宮以淑以繩獻州交河縣三皇廟碑司馬氏作史記斷自五帝世之言三皇者著天地人之説而強名之孔安國序書以伏羲神農黃帝為三皇或者疑焉晉皇甫謐述帝王世紀謂八卦之畫切於人身水火升降得以有象百病之理得以有類神農黃帝設五穀藥石為生民本謐之論是殆謂醫家者流而專言之也唐天寶禮官㝎議尊古帝祀三皇適與謐合皇元啓運詔天下郡縣立醫學因奉三皇以廟春秋謹祠之昔人有言曰庖犧神農順民之性育之者也黃帝除民之害救之者也乾坤之道合變以成民用之而不知象而示之凡所以各得其正者也誠在中矣宮居粒食順形色之正將以養而安之忘其和平綦其所之疾疢生焉博施濟衆堯舜猶不能以全其功則夫三聖人者法施於人而祀之誠宜也皇慶元年保㝎王君來主交河縣簿三月朔日有事于三皇敝垣蕪壇虗位望祀拜伏瞬息而禮以成告顧瞻惕若謀於令長語于若屬曰象設弗嚴其何以肅衆神道設教其會通之道也乃即其攸廣而崇之削荒黜幽楹甓嚴密資鳩於民役成於工相胥以勸而莫知其勞為鏹三萬有贏其用之不給者悉輔而足之明年殿成三聖峩峩有嚴有飭遂落而祀之維我世祖皇帝神武不殺混合寰宇憂民之不全其天崇祀廣法㑭尊其道術幸已厚矣不幸或罹于非辜此誠牧民者之責餘何咎焉民有輿言交河之政有匿其婦而誣其姑者維我王君迹而推之婦姑以完盜狃攻劫吏隱之使緩王君之至越境斯得嗟夫六氣之流行夀夭不齊上之人尤惓惓然拯閔之而不至陷而攘之則其為疾沴災旱者吾不知其何心也王君為政若是桷職在太史紀成宇而附書之奉化州三皇廟碑馬侯為州急先崇儒建尊經閣成作而曰學無田曷足養士表圭田租勵之於是鄉之儒合言兹實吾黨耻鄉校日毁青襟賦焉館粲有加士子知教盍助田以成侯志侯復曰先賢遺則惠養存殁規曷敢湮廢正籍端本耻格貪戢於是始言曰噫世祖皇帝行仁肇邦萬世永憲今獲守兹土疾沴不治黎民何辜乃建三皇殿初殿在廢觀址後徙寺旁庳隘弗稱詢圖考初厥地爽亢遂廣土而興之百柱翼成萬瓦鱗比􅌋者效泉力者輸伇官不出賦而巋然光尊耆老贊企願紀其建立以彰侯績抑嘗聞庖犧闡極人居其中靈根湛純萬化是生坎離致用窮夫隂陽之機夀夭不齊彼實戕竊維大聖憂之樹藝五穀輔之以醫藥剛柔燥濕各施諸用神農之功也因其􅌋生迄於傷生以憫以原為之經問教之以知懼使各盡性命之道則夫黃帝之功詎少矣哉三聖炳著尊祀肇唐皇甫謐之論合于醫説道不虗矣為作樂章俾歌以祀表侯于無窮侯名驥德字致逺官奉議大夫明爽幹飭吏民畏而愛焉是伇也州之官咸佐之鄉老皇甫簡董役訖成前門九楹廊廡齋序二十八楹講堂五楹禮器備充圍繚丹堊咸曰美哉歌曰判鴻濛精一中八方圓握以通稽聖作逆不逢神之遊雲霓從嗟彭殤曷恣縱簡差差指􅍏蹤玄籥啓人喬松煌煌大聖萬丗功天昭昭日月星變化周純粹精木石土金蕩至靈飛走食物各受令一日屢蘇民乃修齡覽九州雲泠泠是州秀淑守著能牲具肥酒齊馨日出作晦宴息守􅍏故常民用不極何顛僨自傷縱恣作慝帝有憂筆載籍目視毫釐脈寸尺智者驚保厥德雲龍之髯杳無迹祀靡斁千萬億衢州重修三皇廟碑混沌既判民生之用日滋制器創物首於三聖詳見於宣尼之繫易儒者皓首棼莫能以究周外史掌三皇書秦厄既盡而其遺言間見於諸子可得而考者唯醫家者流見之天經時訓書禮之準也察其循環考其氣運不悉是不足以言醫之本也至於推萬化之原别九州之宜調神嗇精按摩導引湯液炮炙無一不究地利土膏率有合於農書之説若是者其繁且難有甚於吾儒則凡為醫者良不易言也小司馬作三皇本紀其精約不出於大傳而荒誕不稽悉得以訾病史遷之不作良有以也伏羲神農之書見於易黃帝書具在有依髣而為之者亦不失本旨自唐肇建三皇祠世祖皇帝遵舊令遍祠州郡推仁濟衆比合前聖泰㝎元年夏三衢郡侯赫斯趙侯仲禮僉曰天子神聖不殺稱上意俾洽于羣生莫若立醫學於是與府判官㝎住君勸糾于其徒爭輸幣以助不三月殿以成告繪象有嚴禮器畢具惠民有廬校官有居閲明年亷訪副使真㝎白侯鐸邦謁廟學首肯口贊且割官沙田為畝若干以奉時祭咸願刻石以著永逺繫以詩曰太素絪緼品物類分經緯五行濟用立勳茫茫開元通幽合神炳諸典墳是究是勤蕩摩三光區别九土沮洳晦冥或折或沮潤澤滲漉順而居處正陽昭晰以保純嘏有簡斯彰玩核纂組民用不知其仁如天大帝述明播于垓埏春臺以登鴻澤日宣嘉穗合畝采鱗遊川㑭絶癘疵享其大年三衢之宮伊侯所築濟濟者徒愓若奉玉研精韋編以介藎穀侯云去矣祝彼千祿我庸作詩相祀是肅饒州安仁縣柳侯廟碑古昔祈報之禮得行於州黨閭里民神相通禦捍於無形厥有常祀一有水旱疾癘為其所憑依者尤卓然偉著五行之精成於太素摩蕩轇轕主宰以名國有典禮莫得而僣維神依人以行實有姓字烈山氏之柱共工之勾龍周之先后稷死為其主後又擇其功德之高者代而承之噫積虗以為氣氣散以為變居隂假陽人鬼之化行則凡今之列于祀典者皆本于是皇朝列聖下制詔以通幽潛遺德著功表見郡國雖數千百年皆尊顯崇祀至大二年崇文弘道玄德真人吳全節蒙被殊遇推榮其親退伏自念昔為孩提黨禜族酺從我父兄觴而祝之繄神是賴神之闡微肇唐咸通至宋宣和以來由侯以王肸蠁休嘉鄉大夫湯巾炳志于祠下矣今歲時阜康神靈熙熙祥風甘雨莫窮其微犬牙接壤咸稱神效願上其事于禮部全節敢稽首集賢敷奏天子以昭神惠秋七月武宗皇帝御朝封顯靈溥惠沖祐真君命詞臣宣制而褒錫之是嵗真人歸至安仁縣以制書授神及饒國公饒國夫人吏士再拜吳氏長幼亦再拜禮成還風交雷挾雨來應安仁之人或言曰明有禮樂幽有鬼神孝以揚之誠以昭之兹邑之美一舉而兼備孝生于心神之相之孰使之然哉縣長吏將刻神制書于祠真人屬為記按舊記真君姓柳名敬德乃為作迎享送神詞三章以廣民思詞曰結玄雲兮文虬的容與兮山椒光晶熒兮橫流帝鼓導兮前驅山之阿兮神居迎群睇兮與留儼素容兮潔貞佩泠音兮始停筍席兮翠邅棘匕兮紫搖露零零兮隕珠嘉薦湛兮以陶揮上牲兮吸秀芝巫揚廷兮靈之娭靈娭兮心降日簡兮益康日懸車兮松冥千童慘兮控軿鼓坎坎兮輪砰恍欲去兮心不寧神居兮山承宇汝居兮山下神詎去兮愁汝執玄德兮歷九疑超無為兮終焉以歸徐州吕梁神廟碑神禹水功龍門吕梁惟最艱聖人述書隱而不言懼荒怪以汨真也步于上帝受圖于河其事偉著豈誣也哉余宦京師過今吕梁者焉春水盛壯湍石瀰漫不復辨左回右激舟檣林立擊鼓集壯稚循崖側足負綆相進挽又募習水者專刺棹水涸則巖崿畢露流沫懸水轉為回淵束為飛泉頃刻不謹敗露立見故凡舟至是必禱于神神固靈矣夫集誠以致神靈繇衆成往之自信不惑者猶感悼自恐則今之所謂祿利奔走而不息寧得無慊于其中也邪昔世祖皇帝征南絶淮夢神扈蹕以行詔所至立護國祠吕梁故祠相傳歲已久此邦之人因其湍險復增重之繇是南北之舟至于祠下必禱焉彭城隸歸德太守因君以事謁祠下肅瞻有加乃命立石以侈神績於是鄉之耆老鄭安仁復廣其廟基象設密嚴棟宇軒靚薦酹登降嚴飭有秩遂介總管錢塘姚君具圖狀願刻其事于石余待罪太史觀前代職方神祠徐州有廟曰孚濟曰顯濟皆曰龍神吕梁信天下竒險處也非神孰尸非龍孰居嶽瀆有祠不以姓氏著吕梁為河下流奔赴南海一息千里昔之神受令神禹顯微無常代謝上下隨運以化則今之神猶古之神也皇朝一四海貢輸金珠綺繒犀象水土精玩之物悉出東南舳艫相銜晝夜不絶道必繇徐州神司其職訖罔敢替怠依神以行相戒無虞神任匪輕矣乃作詩曰首河崑崙厥行靡恆或伏而舒或迅以凌在昔堯帝孟門震騰授禹以圖百神罔不承九野既疏沇水渾渾挾河以行北東斯奔積鐡懸壁怒雷赴川如霤斯注如蛟斯騫自涯刋山訖達其源河既南矣帝迹眇漫赫赫世祖威神耀天爰率貢琛萬桅盤旋引梯從繩以登以升耄歌稚和鼛鼓受聽棹夫佐前水師試命曰吾神是依捨神則病駢駢士子亦有商女爰集宇下釃酒致祀金龍蜿蜒以肖起止導其棘流如席如砥此邦之人仰神之來昻昻石松雲斿離離匪惟護之將永綏之山川出雲古言祠之崇堂豐堵耆老相宇戒而呌囂毋作神侮拾級有敘勿黷貨以沮神告萬年天子受祜奉化州開河碑奉化諸溪至龍潭畢會汪洋衍滙陂塘澗溝合流赴資國紆行凡六十里始達于江嵗霖雨不時溪江相迎上下交射漫流田堤或漂民廬舍昔之為政者懼焉於是築埭善坊潦至則泄旱則瀦以灌輸繇資國埭注市橋循三山為廣平湖凡言湖通畎澮也湖之下有斗門必嚴其水則至是通鄭家淫古有隂溝或為淫溝皆取以達水今言淫名之省聲之訛也溪至是循明山稍折為揚橋水以折始善行將達江復限之為縣門曰進林曰常浦又益限之以埭曰車耆提閼有程則水旱不病今之善吏治者挈挈奉公上不自保政不能及此廣平馬侯驥德至州曰皇元升江南縣為州實租户口户繁租瘠何以稱綏惠田疇蕪闢兹惟殿最首吾視兹土抑溝洫漫滅以害吾民邪遂窮上源首資國耆老咸言市橋逹車耆有故河往宋舟楫聮絡今趨江以行驚駭濤浪商賈不赴而市用益匱濬廣復舊則民其有􅪜遂遵市橋至陳橋具畚鍤表深廣未及終日而遺石斷絶皆舊迹儼著至何家埭或曰是郡乘不登積為豪民利水至是當行何障固焉于是決隄仆石埭復置卒守水門亦如之易資國埭為水門别立小柵以謹通塞廣􅊭增斗門志舊有贍卒租亦復之于是昔之言紆行六十里皆得舟行以達于江矣史遷作河渠書能吏所紀厪一二數謝太傅守淮南水利博濟則自方之以召伯謝公偉功迄不廢馬侯之政良近矣乃係以詩㑭勿墜詩曰閔閔汙萊舉趾厥艱婦饁子任火墾水芟相彼高下粵昔廡蕃有隄相之有泉養之崩奔交來設險以防彼防弗亟時其雨暘謀于在野集作會節低昻疏儲究爾墜遏叨強恣專訖孰㑭是罰馬侯自南宣承皇風相攸以圖鞠草茂豐耆父交謁兹焉商功千鍤剖壤頽堤赴壑宛其遺基白石鑿鑿復常彌堅匪夸以丕作泉流湯湯隂泄陽瀦江流馬奔懼而舒徐千帆縈紆入于市區河既復址侯斯戾止嘉穀羡穰甘棠薿薿維河之新告來者勿替碑隂凡犬工役必資僚屬長官某同知某判官某吏目某實僉贊之州民之耆長大家某等歷考舊迹且佐厥役吏奉令曰某等董工庀程州之南復有梁家灘碶戚家溪悉濬治之足溉田萬畝開河績最著庸附碑右以見侯政小者亦若是許州衡君去思碑至元初詔議立五事為牧民根本後數歲憂其有不奉行者輒總核敦厲又時遣重臣循行以振植之大德七年分命宣撫使糾嚴黜陟多罷所居官獨未聞有治行第一入徴為謀議邇臣者使者以功狀上丞相府府下東曹掾掾守法謂事任固當是束狀入書􅍥不復省繇是詿墨抵眚歲率常書于憲部夫法不足以成政先王馭臣必先之以序爵其不幸而奪廢之者誠不忍於人也民為天下本郡縣守令常長於民民病其長嵗有所黜率天下之民常不善其長民獨何心哉余每過通邑大府碑首高下表植衢道讀其行事無一不皆古循吏而焯焯在人耳目又若相反甚者謂懼其威使而以媚夫人之為也俗偷而日艱濟之以淺薄之論上益以不信則是守令考課蹈規􅊞常安所從超越哉皇慶癸丑秋七月天子遣御史分察天下牧民賢否咸屏息俟命國子助教許昌趙君師顔言衡大夫氏守許賢解官三年矣其承大夫者亦已去過時而政存可以登紀子職在太史不溢美不希諂宜表石以昭永毋固辭桷謝不敢則又曰余叔父廉訪公師表河南置論少許可言大夫賢無異語誠不憚書衡大夫事第以州里嫌故遂雅屬子桷始謝不辭於是退以其郡士劉君廷瑞耆長郝守寧之狀托而敘曰大夫為州質靜無亢異視民便害默計而成除之州賦户二百歲久亡絶無所徴别輸他民以逭責民莫敢訴許為要衝遞馬户率多逃去竟三歲以民籍户四十二代之户代而民籍徭調如故大夫請于官而悉除之厚風俗敦尚孝讓考漢魏冢墓若陳太丘而下立鄉賢堂以祀于學復構廊宇以庥諸生而使之竟業臨穎縣有鄧艾口故地河南檄大夫按視將屯之大夫署筆曰鄧艾故屯繇魏下千餘歲未嘗復今有民若干耕其地墳壟居室環地左右一旦官墾闢大不便願㑭民以已耕田歲入官賦猶屯田也河南是其議民往謝之大夫曰吾職也何謝為今世揭揭然以商榷為仕進路使大夫廣屯穀名得十萬石顯要可立致不忍數百民命為俑許人之思大夫宜社而祝之相與望其儀于天朝以德我許人者日永久乃繫之以詩以篤不忘大夫名佐字君用廣平人詩曰瞻彼具茨英英其雲不稷不稌粵維邦君邦君之來我民不聞曰秋而嘗曰春而耘木之巃嵸維侯之宅侯轡在掌言戻于學有挈有任亦丱其角亦飲其醑言考耆耄穎川之流其下黍稌嗟余逺祖及我鰥寡是播是藝曷余敢震侮穎水之湄戢戢其牛利言鼓簧將復其陂陂云當復云誰之來邦君痡痡維衡大夫大夫言邁匪愠斯怒有翬者居有墳者墓咎匪我執言遵其所陂既完矣大夫旋矣熟而豚肩進其粲矣曰我不敢嘗爾歸爾鄉墓門之柏烏飛彭彭中田之廬椅桐稜稜云昔不如今永歌以康侯歸其組三載云逺許民之思復日以旦侯車在東彼從如龍侯車偃里誰為之朋有辨斯緌大庭團團瘁躬在公匪食其飱式昭去思攻珉以鐫嗣初維終慎永我傳華嚴寺碑太祖皇帝肇㝎區夏視居庸以北為內地户族散處皆安其簡易在憲宗皇帝時將有事西南砥慎舊章建置靡遑時則世祖皇帝治軍和林相厥地利曰維灤陽展親會朝兹為道里得中稽衆契龜僉告允吉因城而名之曰開平焉歲在庚申世祖承大厯服建國改元削僣靖亂宗王殊邦奉貢效牽咸會同于開平繇是定為上都大興為大都兩京之制協於古昔矣省方有常庶職攸敘商旅子來置而勿征首建廟學乾艮二隅立二佛寺曰乾元曰龍光華嚴復立老子宫於東西化俗警蒙相須以成具訓淵逺將垂憲永以為民則仁宗皇帝在東宮如華嚴惕然永思粵維皇祖置慮弘廓建都功業弗克崇闡紹開是我子孫不大彰顯爰命守臣臣某撤而廣之踰十年將成仁宗陟方繼天體道敬文仁武大昭孝皇帝北巡狩回上都首幸華嚴若曰列聖在天神化合一朕罔敢有替述修聖明將於是有在廣植冥福神御周流宜得以屆止其以先帝所構殿鎮于後維五方佛像在世祖時素有感異復廣大殿以居之梵相東西挾翼以從凡尊事棲息悉如其教以備又别賜吳田百頃安食其衆至治三年夏六月丁卯丞相入宿衛上都留守司同知臣某傳旨命翰林宜為碑紀其成績㑭萬姓蒙祉庶得以昭朕奉思臣桷竊以為天地生物無心以成維聖人有憂則曰物有不齊皇極是訓大雄氏則亦曰性本至善遷以隨欲欲由妄生性日益昏故為物為變至於摩蕩轇轕生死靡分於是有懴解之説焉有追崇之説焉使生得以斷死得以離則本性湛空無有垢纍道奚病矣華嚴設辭以富貴為喻終之以返真復初㑭世之所景慕由境以入因境而悟入於無相其於喻也深有旨矣世祖命名亦將以警夫迷俗愍濟羣動與前聖相合者實在是聖聖繼承靡有銖異臣桷屢從屬車聞首主是山者曰至溫師以妙密縝緻為本行傳宗洞山與太保劉文貞公秉忠為方外交磊落有大計因得見世祖於潛邸陳對明朗遂大器之六傳曰惟夀今授司徒際遇隆赫於法祖有光夀能文辭守其道專固則永以傳謹再拜稽首為之銘曰於赫世祖武緯文經廣莫相攸堅墉斯城鑒觀羣生厥性有恆驕鷙忿鬪失常是行沉昵昏惑執妄是成維政與德具訓以警善本性初為明為靜猗與覺皇功始戒㝎或喻以空或設以境空解境悟真慧永證巍煌華嚴窮珍極瑰龍伏藻井雲凝瑤臺積香浮浮側瓴枚枚耄稚畢觀心掉膽摧相既永離虛空如埃世祖稽古是則是效暨于仁皇益闡乘教維皇御極承志廣孝曰列聖在天鴻績靡報顧瞻咨嗟展飾殊妙錫福兆民列聖之心拯彼大迷覺皇具陳謨烈顯承如歲之春物無癘疵膏熙沐淳億萬卜年刻銘堅珉興福頭陀院碑興福院在都城保大坊北院既成其主僧尼捨塵以其狀來謁曰捨塵王姓膠州即墨人也家世素奉佛今之言佛教有三禪以喻空教以顯實律則攝其威儀禁妄絶非鼎立以陳融會莫究惟頭陀教吾佛宣演形色自然汨其紛華而悲惱集焉外守或懈內持益離參而範之將釋諸塵以成安樂若是者誠有端緒矣教始於西竺盛於齊梁皇元建國今其教凡十傳捨塵始與其徒劉普照誓志遊京師刻意問道日唯一食精嚴自牧以勞役為調伏菲薄為精進草茇安寄束身堅忍至元中今平章政事王公毅樞密副使吳公圭福建宣慰使李公果見而異之始買今院地至大德年􅊭章政事賈公某邇院居審捨塵積行無退意遂與其夫人林氏引見于皇后下教出財帛建其殿曰慈尊㑭開府知院月魯公暨賈公奏其事于皇帝皇太后咸曰可其悉以皇后私府輸助之延祐五年院告成復奉宸旨禁護而掌其教者錫名清修妙行以褒美之是役也齋庖廡室皆捨塵所鳩建嘗謂釋氏之説福田利益姑警誘盲騃若曰離愛辭榮非感物而動者也真性虗湛奚假於外則其説近矣詞曰粵昔能仁蟬蛻侈華絪緼泰始雪霜勵磨厥性眇微五采眩訶毁形壞衣其儀不頗空假廣陳蕩恣斯病佩規帶衡迄莫內省兹惟艱哉爰參以竟惱繇樂積煩以欲騁除彼垢紛曰執中無競女德效坤靜於鴻濛維大雄是師頭陀是宗人憫厥勞熙然以充善士日來格于羣公三宮清穆昭事孔肅鑒觀宇縣作極錫福夸榮逐魂是究是度秉持法權㑭民不黷伊教之興泊然纘承千甓固室百礎栱楹式尊其初匪維誕矜戒爾後人戰兢永寧清容居士集卷第二十五
