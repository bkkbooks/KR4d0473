body:
  text: 墓志銘浦經𩔶墓志銘大德丙午桷與吳郡浦源如淵同佐史局史局總翰林職清簡屬筆將既輒羣坐臧否今古如淵呐不出口一日正襟瞪目援酌是否纚纚數百語經史綜錯湥切治道且曰吾家君重然諾慷慨子歸且往見是歲還吳始納謁焉見其設席尋丈車屨沓戶限茗絶觴舉輒口數州郡靡敝事傾耳點首皆僑寓達官竒其言將引以為他日助未幾授漕運府知事朝貴人俾乘驛來京師昌言漕計十數事不便朝從其言即升為經厯壬子嵗桷留吳最久遂益得奉議論痛言田稅民役上下交困乏將繕治其説於素所傾密者于時以婉語止之曰害不什一除旁出苛擾殆將重病之君立悟乃止後授黃州録事判官延祐乙丣君年六十一矣嘗謂知已多行事少平時措念挺挺可表著迄莫能自見一有委使排根抉蠧將欣然盡瘁方受檄推考而卒以疾至大故實四月庚午也嗚呼成周以三物教萬民降于司馬遷憤世嫉邪獨致意任俠君周於事物激不近刻任重致逺出戶而日昃噫幸歟其不幸歟浦為吳郡著姓君諱椿字世家崑山州曽大父某大父某植德潛閟父某貧而好施君少試吏以曲直視事不肯有高下簡易紇城府解排糾徽磊落輒自許壯嵗耻同凡輩始辟漕運府史熟其利害府薦于朝為照磨三遷為府經𩔶晚授黃州而志意莫遂詎命也夫娶陳氏男五長源以編修官授承事郎常熟州判官次厚與陳夫人先七嵗卒次湜浩津女嫁同里嚴震孫男五孫女二六月乙酉葬長洲縣陳墩之原銘曰璞隱于荆彼士泣之驥伏于車曷豫縶之成者匪天為者匪人不成不為其風肫肫聿昌其始有子文偉高丘永安是謂受祉司天管句焦君墓志銘長安焦氏世逺軼莫究宗譜有諱紹先者金汰武時始著進士籍生子繼祖為河南招討使招討生餘慶第詞賦科仕至中順大夫雲陽縣令金將亡國勢蹙僨日挈都南徙達官重族棄播不自保雲陽號儒家乃讀建除候占等書察便利生死法為隱避計死未幾有子曰永字某益究術自祕天兵下陜率里閈孥屬二百九人道金洋入蜀門蜀附㝎悉完聚歸後家岐陽遂以術顯靈臺因官焉至元庚辰靈臺卒年六十有八男二榮陜西四川陰陽提舉顯廣元路歸興倉使女一適輔某孫男四澤臨洮府稅務大使溉將仕郎同知益良州事渥嶽州路陰陽教授沇延安路陰陽教授其葬在咸寧縣龍首鄉南岡合配胡氏祔大德丁未孫沇奉集賢宋公所為先塋碑與靈臺君之事狀謁某京師且曰吾祖不顯于儒躬遘險艱食藝保緒晚嵗聚經史探玩意若有俟性溫重無忤色紛難急乏力盡不瘁諸父兄嶄然自持承芬振華挈挈自厲匪我祖先德疇克有賴敢以是乞銘銘曰起儒維曽逃艱以承魄藏止止昭爾孫子俾復其始滕縣尉徐君墓志銘君諱之綱字漢臣金以詞賦舉進士君為詞賦大有能名會金將亡不得試作賦説以示學者窮幽闡微合金宋體指摘昔人巨作嶻然不少讓上論隋唐曲盡幽眇久而曰是果為學邪益探道理以河南二程江南朱張胡蔡為根柢窮春秋易二經其言春秋失始三傳左氏誣為甚常事不書聖人之旨也易更三聖麻衣誠偽書夫子十翼功並日月其言與朱文公合當是時南北蓋未混也意識卓絶尚友於千載其言論金士疑之宋號以儒立國論亦如君言其所為書東齋默志三卷皆經説也通融賦説三卷舉子學也麟臺雜著七卷其所為詩文也皇元略中原㝎地戊戌嵗始招輯儒士君以明經選益都于時李璮以諸矦兵分省君以府學教授佐省事璮喜儒間問攻戰成敗陰蓄甲士習勞苦君講經曰使民以時相君不知也璮默然又曰平王威烈周之衰也戰國之士知諸侯而不尊周唐世河北將士尊藩鎮而不知有唐其言簡直遂黜為滕州滕縣尉讒者復以默志羅君禍後璮果就誅而君亦已下世中統四年八月某日也年七十有五配李氏郭氏嗚呼崎嶇兵塵士悉以童習自守磅礴河漢橫流塞而天源湥非君其誰邪淄川楊公序其文矣君世家單州後徙濟州祖鐸父革俱金進士配翟氏子敬至元十三年中明經無祿即世孫天麟十七年亦中明經次鳯以積勞為益都路臨朐縣尹今承務郎慶元路總管府經𩔶次士龍代州儒學正曽孫若干人鳯靖共宜官愀然言曰祖父節行經學先哲推重子嘗為文字官願志墓道遂讀其所為書以敘乃為銘銘曰魯聖絶學蕪榛菅曲説恣臆紛翩翻浮聲急響曼以繁青紫決拾靡靦顔夫子勇志開冥頑手持寸膠清渾瀾雲陰駮霽白日還佐鎮陳誼數斥姦拂衣避席彼構讒寥寥道統孰異分正轍前趨南北貫厥功茂著儒碩先遺文傳信銘永刋龍興路司獄潘君墓志銘元貞元年桷掌吕成公麗澤祠于時夀俊有數公能言乾道淳熙遺事嘗曰麗澤選不輕二潘君真名士子繼二潘亦僅僅焉大潘君吾里人以介直忿世死小潘君弼良輔處之麗水人介亦相近氣邁年盛用世必得善譽子善識之未幾良輔來金華望之魁偉璧立瞪目拱手廣席參錯未始出半語稍論古事輒躍然纚屬穿貫握手曰大潘君死吾與子真交承矣後遊亰師授贑州教授見中丞崔公議論剴發相感動關絡解剔不為翕翕附中丞喜聞四方利病即奏授廣東廉訪司管句架閣兼照磨是後余亦入為太史屬臺使者旁午入奏事咸言良輔有御史才廣東副元帥囊橐洞冦稍廉察即縱冦搖動斂手弗敢問遂悉發其姦蠲德慶路官逋糧三萬石劾具幕長不法數事聞于臺立罷之監司欽察公悉付以事副帥益鬱怒誘引亡賴誣衊會省臺停其職而以君劾罷者復所居官未幾御史言論劾者罪著不宜復然君卒以是去江南行臺御史列署薦君宜久任憲職于時崔公已即世不復任君矣大德十年復為贑州教授以昔之治廣者為準闢田築宫訓士嚴整力請于官而復其役皇慶二年授龍興路司獄不卑其職悉疏宜行者以盡心焉部使者佟公憲府舊屬命治佐劊専利者凡得八百人悉除去之會佟公去官不逞復以他事相詿誤強訴者引君然君自是抑氣不能食以死嗟夫士患不得名名與謗常角立昧昧後福善不近名誠有為而言也若是者君幾近之矣君族祖父曰叔豹曰杞世儒科皆至二千石曽祖恕樂道不仕大父垕太學進士修職郎平江府吳江縣丞父應發薦于鄉文行瑰偉士尊稱之君幼孤母項氏招師教授俾植立其為文辭浩溔勢盛衝激巖嶽風止瀾靜卒不露飄泊其善養氣者與所為文號冝山集若干卷讀易管見四卷詩一卷藏于家元配何氏子二人曰龍吉鳯翔女三人長適常鍮次林㝎老徐天祐再娶陸氏子二人鼎臣衡孫女一人適林街三娶陳氏女二人尚幼曰升曰鑑皆庶生孫男女各四人君卒於延祐年七月某日卒年五十有八桷在翰苑時嘗以君薦于承旨程公程公曰吾固知之得無以南士纍乎相笑而止至治元年二月承徴至京師預考禮部進士策名得林㝎老後登上第授奉化州同知㝎老踵門拜且言曰潘君實婦翁先生嘗知之矣將以今年八月庚申葬朱溪祖墓敢以銘請又言婦翁嘗從先人先人卒㝎老生未周矻矻撫字終以女妻之由是悲且歎曰師友道喪久矣是尢冝書銘曰長紳峩冠日出脂韋莫窒其逢委蛇以嬉白駒在谷不屑不辱決臆過都孰縶其足生人匪艱成之實難丸泥障流彼駛者繁氣直以堅維德之完謂隘不由其名奚傳江陵儒學教授岑君墓志銘慈溪黃宗卿震之季子叔英彥實甫壻餘姚岑氏咸言岑氏善擇壻彥實館其家以詩書授子弟彬彬于于鉤深纂玄融液品節各就條貫掉鞅於詞場者尢宜焉延祐五年岑君良卿以詩義上禮部第二桷時為殿試讀卷官㝎甲乙七年其弟士貴貢于鄉桷以至治元年再入集賢預校文選詞賦工者擢前列暨拆名則士貴也國朝治㝎踰百年始立科舉江南行省有三而襄郢東西淮之士亦隸南選三嵗止七十五人登名上于庭者三黜其二岑氏連取之盛矣哉論德考實必推其前人士貴懷牒南歸以其先府君之狀來請銘君諱翔龍字雲起踰弱冠即起家為髙節書院長調和州教授又調江陵教授幼警敏能文辭性慕髙潔以禮自持植廢舉缺罔有怠事鄉里稱孝謹事大府能使貴盛者咸愛重之大德九年卒年四十有五吏部教官格年踰五十始得入州教授州不滿三十而接踵嘗數百人十五年始得授且守缺近三四年逺至七八年故多不能食祿而升于路者非耆年則下世矣君以盛年遍𩔶宜涖于民不得年以沒前佚後窒若有憾者未一紀兄子登進士又三年子亦進士較其得失是則亦奚有憾焉也矣娶王氏先九年卒子男五文仲朝瑞為伯父後士貴今授某官季德盛楚材女一適鄞范某至大元年葬於上林鄉召奧之原古者銘藏于幽後揭於墓道懼人之弗先見也禮生於人情弗忍焉耳矣乃表以銘曰蒼姬展親岑亭啓封棘陽專居傳漢益隆矯矯舞陽佐運闡功後興儒碩錮禁以終㝎籍會稽支居鹽官三相佐唐偉績彌刋或鳴以詩載車和鑾降宋中微其譜實完蹇兮在山不駛不僨卒達于川百折混混孰導其先孰開其藴肇者不居來者益振執券獲酬雙璧是陳載考令德其馨絪緼我銘以昭益勵後人河間清鹽使郝君墓志銘君諱從字從之霸州信安縣人壯嵗秀整植聲節與人交不為儉薄意拯其急難里人推德之至元十三年為河間清鹽使副後升正使治弗煩擾而政日以理始君從弟彬弱冠事裕宗後為工部尚書官寖顯從之曰吾郝氏由大父宛平君多惠政後宜有顯者徴在尚書吾仕宜已矣會得末疾息心斷家事調佐寒暑力補治䇿杖閭里如平時踰二十年嘗謂其子志善曰才能不如古人擇今世賢公卿如古人者事之斯近之翕恭取貴艷非進身本也志善從太傅丞相之子大夫遊始為北郊署丞為監察御史而君與世嗒然益若相遺者焉延祐五年十月某日卒年七十有一噫士患不知命逐日希影挈挈然不返若君能知止矣而其弟參大政罷歸閉門幾十年亦不出今拜大司農郝氏之昌殆未易量也考諱德仁妣李氏宛平縣君諱政以參政贈資德大夫尚書右丞追封薊國公諡康靖賈氏薊國夫人配劉氏女二長適楊居義次適集賢照磨李忠將以十有二月某日葬宛平君墓左御史來乞銘銘曰始竒終閟覿德日溫訓言衡門不華以尊曄曄大椿灌膏培根弗利其身利其後昆翰林學士承旨贈大司徒魯國王文肅公墓志銘翰林承旨贈大司徒魯國王文肅公至大三年六十有六薨京師假葬于城東隅至治元年其孤翰林待制士熙始克奉柩以某月某日葬東平祖塋瓠山之原士熙拜且泣曰墓上碑則父友翰林學士陳公儼屬比銘之矣今葬日薄知吾先公莫若子幸志其𩔶官行事納諸幽堂桷不敢辭為之辭曰公諱構字肯堂年弱冠以詞賦入鄉校賈文正公一見器偉之禮載以歸俾教授某子遂來京師至元十一年授翰林國史院編修官由院中敘遷應奉修撰升侍講進翰林學士訖承旨佐丞相府為司直𩔶吏部禮部二郎中太常為少卿於臺外江北淮東道提刑按察使副內治書侍御史入省參議中書省事復出守濟南公之在翰林也辭命詔令多所撰述其最傳于朝者曰世祖皇帝諡册追諡太祖册武宗皇后册於實録預修世祖成宗兩皇帝㝎武宗上尊號親享太廟儀在太常考輯因革有敘其佐丞相府剗刮蠧弊更始選士丞相齊魯公信從之為治書時值桑葛擅中書政柄嫉方直士檄公偕翰林承旨魯國文貞卜忽木公核究燕南錢榖約一月治辦公先事計畫不以纍魯公會桑葛誅乃得免其按淮西不切切近名而吏亦不敢慢事治吏禮二部無缺緩同列見公署事不復視成牘以行參議府六年一時執政聽南士陳利便搜括田賦時平章政事何公榮祖與公正色不少讓摧萌折貪卒俾其謀以寢始天兵平宋詔徴賢能李學士槃同受旨公至杭首言宋三館圖籍太常天章禮器輿仗儀注當悉輦歸于朝董趙公文炳從其言今宋實録正史藏史院由公以完守濟南寬貧民官逋修閔子祠復學田觴詠自娛而訟益以簡承旨李公謙幼師之遷應奉卒推以先始受命勤敏通博一時巨公皆屈已期奬後卒與相並史館辟署亡慮數十人今相躡清要皆門下士其為文閉閣詠諷落筆纚屬不止於王言為尢長臺閣故事資公始能奉行事兄戶部侍郎桓如嚴父惇姻睦宗在中書迄不肯私其親人益伏之同里陳公儼為孔顔孟教授年幾五十矣入徴拜監察御史未幾為翰林直學士蓋公昔嘗薦之王愷年七十為編修官公請于朝以待制致其事資𩔶循敘銓衡所宜守文字官升擢詔旨具在後為繼者緘口不薦一士視公誠可愧也公之系由琅琊居東平自八世祖為宋司農卿守鄆因家焉魯祖瑀登金進士第官奉訓大夫滄州無棣令妣范氏祖鐸以公官承旨贈正奉大夫太常大卿妣杜氏臨沂郡夫人父公淵贈昭文館大學士資德大夫妣薛氏琅琊郡夫人昭文當金亡時有兄三人攜妻孥南徙昭文私自念王氏大墓盡族以行孰與守下車伏草莽兄呼其名第不復得後騎迫大慟以去昭文傭保自活迄全其墓厚德勃興於公見之矣娶薛氏魯國夫人是生士熙再娶許氏皆先卒晚嵗得二子士點士然女一嫁薛晉士熙能文辭有聲將大用於世推薦賢之功王氏殆未艾也銘曰德充智周世莫與儔士林之標奬士無方譽髦圭璋孰厄其遭文鳴盛世金石雜比厥聲四昭子也允文戰兢紹聞嗚呼乎公之名益以高磁州知州程君墓志銘程君諱翔字鵬舉以孝友聞于州里後其子若弟官江南恂恂愈愈敻然異衣冠常流於是江南之士族咸取以為則嗟夫世降俗偷能竭力以養者有矣友于之乖君師之嚴不能以户化若程君者發於良心成於身教是宜揭豐碑以昭示薄俗按其狀曰世家廣平大墓在城西南兵難譜軼獨記其父名約是生三子長即鵬舉仲曰翺仕至僉浙東廉訪司事叔曰翼吉州治中二季以宦業表著皆君之教君綜家治生服其勤勞俾弟悉意問學聚書延師靡密叢雜一不使亂意弟則曰匪我之能維吾兄之成其事父承接意指日侍食俟可否或卻食即不敢食懷甘割鮮斥幼者避席以立佐治湯液時其寒燠卒能以上夀終既除喪謹上冡禮修誠厲行分寸不使越繩墨鄉閭尊之昭文學士張公孔孫集賢學士劉公遜曰吾徒不能以卓行薦諸朝是誠有愧年七十有一卒於元貞二年正月七日葬某鄉娶張氏子四良弼良輔良佑良佐君疾革呼諸子曰父死異財違古禮慎遵我訓若君者懿德斯備而復以囑其子程氏之澤良未艾也良佑始仕在中書右司歷參議府户部宣徽院改授太常太祝出為鎮江常州推官浙東道宣慰司都元帥府都事甫解職以選守令授奉政大夫上都路興州知州孫十人孫女九人良佑來請銘君弟之子良能松江府橫浦場司丞良士溫州路永嘉場監運亦曰伯父事實將湮佚宜速銘以詔後君以推恩贈奉政大夫磁州知州驍騎尉追封廣平縣子張氏追封廣平縣君銘曰惟民初生其仁肫肫摩蕩恣情有戾彛倫展也磁州執德養淳奉盈臨淵踧踖以遵陳饌在堂手函脆新候顔以趨厥容孔溫爰用則之施于家人濟濟雁行厥聲四聞永裕是嗣振于朝紳城南之塋有大維椿爰勵薄俗表兹堅珉榮祿大夫大司徒特進饒國吳公饒國夫人舒氏墓志銘至大三年武宗皇帝廣孝錫類以翰林學士中順大夫致仕吳公克己特授榮祿大夫大司徒封饒國公妻舒氏饒國夫人夫婦同日受封其子玄德真人玄教嗣師全節歸饒州安仁縣下馬入里門奉制書跪堂上二老人卻立望闕拜命誠敻軼前古延祐元年夀八十仁宗皇帝遵先帝故事錫上尊文錦以尊顯之表署宅里榮耀極致人子之崇侈其親者兹亦備矣玄教嗣師實開府大宗師張公留孫之大弟子延祐六年公與夫人夀八十有五五月丙辰公薨全節號泣不食得請于上倍道星馳以歸十有一月某日饒國夫人相繼即世嗚呼生榮死戚訖同以歸盛矣哉人子之事其親情至矣而養弗能以盡養足以盡而祿弗及者千萬焉貴極於王侯褒追之禮見於墓下則凡通顯之事親者十無二三焉合唐宋譜胄幾七百年具慶僅一二見吳氏之德胚胎磅礴是誠有攸來矣喪禮莫嚴於儒者飾情表行哀不足而溢於禮者多矣玄德力行而兼有之兹難能也至治二年春全節泣且告曰將以九月某日合葬于崇德鄉山田原願述我先公先夫人之世系而銘之隧道有碑翰林學士元公則為之矣古者墓而不墳藏銘于幽懼世之久而弗知也視其姓名有不忍人之心焉後之慮其親者則曰立於墓人之見之者不忍矣何藏焉碑於隧斯敬矣銘於墓斯仁矣謹按番陽吳氏皆祖番君芮饒公曽祖嶽祖夢旗父鑑追封某官諡文靖妣陳氏追封饒國夫人公字祥甫卑讓自持不善者避之善者從之身貴矣禮鄉黨以和視後進煦然以奬誘觴至益持重戒其子侍帝左右毋以我耄為往返夫人舒氏諱妙真世儒族祖某父某公蚤事舅姑盡孝敬晚嵗主祭享親滌濯遇諱日淚涕滿頤睫內閫姻黨咸儀則之高堂齊眉人以為福德具備何憾焉子四詢承事郎誠蚤卒叔即玄德君季全義女二嫁某官孫男五人善集賢修撰能文詞孫女若干曽孫男女九人銘曰抑抑吳伯植節秉仁毁形以逃克昌胤孫傳國中圯是生番君得其民心徙王策勳代有顯賢支庶日繁廟食演裔饒惟邇親執經武夷源同派分是生饒公守謙以文大盈彌虛黜驕鏡昏厥配氏舒廬江之蕃相唐始興矢辭派騫椘吳犬牙譜牒是遵德儀嫓賢象服衯衯訓子以忠不私其門顯晦偕老死生同根道以易傳德以簡尊悼哉令宗允顯皇元海陰陳處士墓志銘咸淳元二間吾里陳公肖孫以善政事驟用由大理寺丞知嘉興輔郡未幾兼浙西提點刑獄踰年兼度支郎官人謂且大用矣會旁郡山冦起罷歸不數月疾卒喪除其子皓伯候平章賈某于馬前平章入政事堂謂宰屬曰陳肖孫一廉可取冝與致仕恩官其子當上奏餘人勿得為例既授將仕郎宋社亡不復可仕矣鄉人尊之為海陰先生先生少嵗力古學不屑事科舉聚羣經師説商略讐證下逮旁聞曲記遺言懿行譜牒星曆之説皆手抄與梓本書相並篤於信行傾急解難道里寒暑不廢其學湥湛詳博尊聞傳信懼悟解者汨其真嘗禁止之非其友不友既友矣必反覆護衛不使有議之者友或叛去先生泊然不為言人益服之桷先處州府君於朋友義尢敦敘而先生行事亦相近故交好尢善厚先府君即世時來城中愛撫彌厚嘗曰汝父宜有後昔百受欺今詎使一無報邪大德五年桷備翰苑屬後屢遷先生喜溢眉睫曰吾所期誠不妄延祐六年二月得微疾作書與常往來戒勿用浮屠事且命桷志其墓幸以故人子何敢辭先生字貴白甫世居奉化之鵁鶄山卒時年七十有七葬某鄉某原妣方氏封安人曽祖聰謀妣孫氏祖師稷以度支明堂恩贈朝散郎妣陸氏塢氏追封安人娶樓氏子二人紹廉紹庭孫二人先生仕不逢時學不展用熙熙然以夀終於後人有徴可無銘以俟銘曰駕車康衢佐夔龍日昃之離命不逢寤言弗告隱志充畬田瘁耕黍稷豐考核琬琰手澤功大椿養齡蔭巃嵸靈璞久閟合鴻濛是式是似後當隆處士黃仲正甫墓志銘嗚呼自聘舉之法疏人得以易售抱德藝者羞之後法始密益不肯自進有薦之人不盡識或曰彼士奚足取又或曰士若是者衆使一取之將曳踵以至桷官翰林最久故有若吾黃仲正甫之賢明經博聞卒不能啓口以告于當路嗚呼今亡矣果使無傳則誠有罪矣仲正事母孝居家無語笑聲待弟姪不使有忤意持敬讓以禮宗姻鄉黨長者洽之幼者慕之其學汪洋暢整經以載道必考其精微幽顯之委折於史辨疆理氏族制度官名之興廢旁搜博徴曲而通確而明故為文辭纚屬不能以窮將臻乎極而始底于用欲以名世者不在仕進也有司三奉科舉令卒不應試而嘗以其説授于其徒昔者聖賢憂道不行於時由列國言之識遇焉斯得矣今天下一轍達而上者其説具在布衣焉以遺逸舉進以秩祿恧縮在下不能有為仲正之不屑者在是儒病通乎古而不知今昔之在上位顓重名其行事執愎誤後世甚者竊高爵講説他方以鉤徴召仲正嘗勃然不喜然竟不假以年則誠可哀也已仲正諱叔雅父震宗正少卿提舉浙東常平茶鹽咸淳間號名二千石晚嵗高遁以卒仲正不仕繼志焉耳矣世居慶元慈溪縣鳴鶴鄉曽祖世垚祖一鶚贈朝奉郎妣趙氏配鄭氏司農寺主簿大澤之女子二人正倫正倩今葬韋家奧之原延祐七年五月二十二日卒年五十有四銘曰窺觀稱貞舉世顯榮肥遁靡求孰為之升君允矣恬搴竒潄英求知者天卒韜智名有年不修莫究其成我銘孔哀以永厥聲將作監主簿蔣公墓志銘朝奉大夫將作監主簿蔣公諱曉字堯臣淳祐七年進士以至元二十四年卒年七十有一葬奉化州長夀鄉邵奧之麓曽祖楩朝奉郎通判台州贈中奉大夫祖如愚朝請郎通判隆興府贈太中大夫曽祖妣張氏楊氏伍氏贈令人祖妣諸葛氏贈安人贈淑人考嶠文林郎池州貴溪縣丞贈朝奉大夫妣湯氏贈宜人既葬三十有六年長子景先卒無子次子昭先次其先德家譜來請曰蔣實望族七世昭穆皆巨公著銘罔缺軼我先人在時子以子孫禮見且承學今子在太史非子銘其誰宜桷不敢讓銘曰蔣姓宗姬􅖘亭漢侯居鄞發祥唐季是稠厥孫評事清淨急施有嗣金紫益振以義忠肅陳公謫明絶朋俾子允師連桂以登曰高祖考宰邑孤高相京傳私卒忤以逃是生台州繼以隆興倅二有聲再世是繩詵詵貴池丞邑退卑厥兄諫議職穹聞馳愍弟有孤將授門功公謝弗受迄升南宫試簿仙居復攝寧海卻妖節浮民靡匱貸入理京獄直囚不刑揬其隱姦大尹以驚出邑武進遄易分水嚴盜獗張召公顓治摩磔羸頑請粟食賑楮帛賦繁直疏罷進神存正祀學飾新象彼厖者叟祠祝泣想爰倅于越撫民彌加計臣增輸牘諫戢譁佐餉既終監舶蒞溫香珠翠毳罔遊于門輯為成書以警墨惛彼相嫉廉改司軌函白璧􅊞緹卒罹其讒晚佐繕營國步日窘墼竇食貧絶見喜愠少窺刑書復入詞學記言博精灑墨清犖譜書庚申文紀甲子視階郎中澤奏冡嗣嵗行丁亥九月庚戌飾巾辭終夀七十一厥嬪氏曹箋詩之曽子曰景先無祿絶承有季昭先守儒俟徴墓在州南先域接挹集藏于家厥帙為十維公儀觀偉古動人前聞後訛指掌剖陳巍坐若尸不傾不陂彼諂有徒正色以止
