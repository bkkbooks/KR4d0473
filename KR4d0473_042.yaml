body:
  text: 䇿問問答附大都鄉試䇿問延祐四年先王之政莫先於養民洪範以食為先故昔之水旱歷年多而民不病者有以也周漢上計簿以周知民數三年則大比以登于王府制國用之法日計嵗㑹使之裕如者將以預其備也大無麥禾春秋非之則周知民數將悉民以備不虞歟其止為國用乎耿夀昌立常平皆以為便或以不便罷之其去取可得聞歟亰師天下之本實粟重內理所當急唐貞觀轉運之法嵗不過三十萬石後雖增多然止給軍用至于貞元所入不過四十餘萬石而亰邑未嘗有闕抑內地無間土民不仰於官歟抑有司㝎制無泛冗歟聖天子惠飬元元實粟內畿間遇不登漕運或不能足今天時雨澤上協聖心中外豐熟九年之蓄九穀之數可講而行也將取諸民而備諸意其有煩擾也社倉之法唐首用之後復有科折之患焉斂散之法壞于後人國服為息之辨非本㫖也藏富於民貧者得以濟乎穀賤傷農因時而官收之積嵗朽腐何以處之上下給足因其豐穰而講行實在今日習進士業者通識時務宜陳說便利以俟講明焉㑹試䇿問至治元年夫書者即古之史孔子刪述自唐虞二典以訖于周之文侯之命附以費誓秦誓而三墳八索九丘諸書皆芟而不録至其約史記修春秋託始于魯隱公元年實周平王之四十九年也褒善貶惡特書屢書至獲麟而絶筆前乎唐虞之所著豈不過於文侯之命等篇而去彼取此泝平王而上沿獲麟而下豈無可紀之事而絶不為書是皆有深意存焉司馬子長創為史記首軒轅以逮漢武或有孔子所芟者子長乃從而録之後人翕然以為有良史之才愛其雄深雅健凡操史筆者如班孟堅范蔚宗諸儒爭相蹈􅊞是祖是式而未有取法於春秋者焉豈聖言宏逺匪常人所可擬其倣佛邪自荀悅倣左氏傳為漢紀體製稍為近古于是袁宏孫盛之徒並為編年之書而學者或忽而不習終不若子長史記盛行于世司馬公編資治通鑑造端於周威烈王二十三年繫年叙事歷漢唐以終五代勒成一家之言淵乎博哉此近代所未有也其亦得聖人之意否乎我國家隆平百年功成治㝎禮樂方興纂述萬世之鴻規敷闡無窮之丕績吾儒之事也故樂與諸君子討論之諸君子游心載籍聞見滋廣其於書春秋之所始終史記通鑑之所以製作必詳䆒而明辨之矣願聞其說江浙鄉試䇿問泰定三年用賢之道治天下國家先務也人才之賢否本乎心術之邪正邪正者義利公私之辨君子小人之所由以分古之時宜無有黷貨而鬻獄者然伊訓曰其刑墨先儒謂貪以敗官之刑也吕刑論五過之疵亦曰惟貨又曰無或私家于獄之兩辭當時諄切告戒已如此漢去古未逺嘗舉孝亷矣乃或萬家之縣無應令者或闔郡不薦一人豈自昔廉吏已難其選歟賈長沙之言曰有坐不亷而廢者曰簠簋不飾或謂此粗可厲亷隅之士而頑頓亡耻者不格也賢良若董仲舒公孫弘兒寬皆稱經術而公孫弘卒以布被脫粟之詐見譏當世則亷者又未可深信歟楊震辭暮夜之金劉寵郤父老之餽世以為美談然震之刺荆州寵之守㑹稽皆治行焯著民咸德之豈亷特守已之一節而惠澤之及民者不專在是歟方今聖眀在上薦紳之士分布中外封贈足以遂顯揚祿廩足以供事育而十二章之典又嚴且密也刑賞勸懲之道亦至矣然亷者守法奉公未必見知貪者嗜利營私不為少戢豈刑賞之外猶有當加意者歟官吏之貪亷其於政事之臧否民生之休戚所係至重也諸君有眀當世之務者其悉意以對答髙舜元春秋七問問先儒謂春秋常事不書凡書者皆非常也非常者見其不正也又謂事之非常者志于冊又謂有貶無褒邵子謂録實事而善惡形乎其中愚竊謂如桓公以管仲九合諸侯以奬王室孔子是之如許叔入于許又如葵丘之盟同盟于幽又如書有年書大有年公弟叔肹卒豈皆非不善歟若謂無褒舉録而罪之者愚所未曉邵子之說是歟非歟答春秋書法惟吾邵子知之録實事而善惡形乎其中者是也又曰五霸功過不相掩先褒其功後貶其罪夫是之謂褒貶其言得之獨所謂褒貶者是啓後世紛紛之疑也常事不書其說得之而謂非常者不正則非矣謂事之非常有貶而無褒亦非矣㑹稽袁桷曰無褒之義諸人皆知之無貶之義子何知之姑以隱桓之事言之桓之弒兄猶以公稱何取乎其貶也夫人姜氏人皆醜之㑹于禚夫子不削其夫人何言乎其貶此直書而見其非常也許叔入許褒貶皆無之也許絶十有五年而直書之何褒何貶焉是直書而見其非常也葵丘幽首止召陵之盟齊桓之尊王眀矣謂之貶邪吾實不敢以子糾葵丘之說考之皆孔孟之言也貶何從而生與季子來歸愚不敢謂之貶也褒其可乎此皆書非常之例也有年大有年因桓宣之時而書之亦非褒貶此亦非常事也宣公之螽蝝饑見于十五年螽見于六年大旱見於七年自文公時不雨之書不一則其十六年之大有年誠宜書何褒貶焉是非常而書無疑矣叔肹兄弟之義眀矣書之亦非常也問左傳載晉申生以僖四年十二月縊于新城而經書于五年之春晉里克以僖九年弒卓子而經書於十年正月晉以僖十年冬殺㔻鄭而經書於十一年春經傳不同劉原父謂傳與經不同者左氏作書雜取當時諸侯史䇿䇿有用夏正者有用周正者錯雜文舛往往而迷故經所云冬左謂之秋也此說然否答以日南至考之例差兩月劉氏之說得之矣溫麥周禾又似夏正然杜氏悉取正月為十一月啓後人之議者皆杜氏也問晉殺其大夫里克衛殺其大夫寧喜愚竊謂晉衛殺其大夫似大夫無罪而晉衛殺之里克寧喜果無罪邪有罪邪答稱國以殺大夫罪纍上也纂例之說得之矣劉氏言里克不聽優施之謀寧喜不從孫林父之亂陳乞不隨景公之二晉無殺世子之禍衛無遂君之惡齊無立嬖孽之變以此言之里克寧喜之罪著矣或言晉衛二公皆惡其専逼而殺之理容有之然總殺大夫之例此特一節耳不如罪纍上為正問文十二年子叔姬卒先儒謂春秋內夫人則書薨葬吾女為外夫人則書卒按禮云女子許嫁笄而字伯仲叔季皆字也已嫁之女各以國氏如紀伯姬宋伯姬之類是也今子叔姬笄而字之卒不繫于國何也答叔姬之卒以左氏考之似若可證然僖公之九年復書伯姬卒則是許嫁而有字當以成人之喪待之也以曽子問考之壻為之服書其卒亦非常事也詳見經解問澶淵之㑹諸國大夫皆貶書人而虎牢無貶文何哉答公之盟大夫自隱公始也然猶曰宋人莒人考其時疑非大夫也莊公蔇防之盟夫子不得而諱也僖盟于齊楚與中夏盟之始也再盟于翟泉與大夫盟王子之始也然猶不書公以隱之至成公之盟蜀夫子乃直書之則諸侯之㑹荆人自成公始也魯大夫㑹諸侯之大夫乃衰周之常也城虎牢紀大夫之實也故兩㑹于戚皆直書之獨澶淵之㑹魯無大夫而後人遂以為貶例左氏之說遂以諱魯大夫其謬戾莫甚於此公㑹荆蠻猶不得而諱澶淵之㑹何其諱與善乎陳君舉之說曰晉之城𣏌合十二國之大夫為悼夫人於澶淵合十三國之諸侯大夫為共姬也晉為盟主區區宋𣏌晉已細矣愚謂魯大夫若叔孫豹仲孫羯使果預㑹夫子皆直書之獨澶淵之㑹魯不復預書之者記晉之細也大夫稱人已見凡例或疑魯大夫不㑹何以書余答之曰齊狄􅉀邢齊衛胥命蔡侯鄭伯㑹于鄧如此例不一皆非魯事何疑于澶淵之無魯也左氏之說不可據者類此它國自盟㑹不書卿名見陸氏纂例問莊九年夏公伐齊納子糾齊小白入于齊糾與小白皆庶子任氏謂小白是子糾之庶弟爭國自立孫氏亦謂子糾是桓兄胡氏却謂子糾是小白之弟何也答按史記以小白為糾弟眀矣而先儒謂小白為兄者由齊小白入齊之說啓之也愚直謂紀年既逺姑當從司馬氏之記若謂齊小白而謂之兄則子糾之說雖出左氏不應獨從公穀之說子者子般之例見之是也按論語公子糾其義甚眀糾為魯甥魯故納之夫子之與桓之義管仲之說詳矣或者不逹降糾為弟者此因齊小白之書以論夫子謂之過焉可也夫子之書齊小白正是不當立之書法糾為長當立眀矣問經閔元年春王正月經無所云公羊何從而傳之答慶父之禍三傳通能言之前後不同蓋有追而紀之有張其本之法者有言禍首之法者通貫于一年之中無害也答髙舜元春秋四問問襄二十有五年衛侯㑹于夷儀此衛侯剽也是年衛侯入于夷儀者衛侯衎也衎入夷儀不名復歸于衛而名之舜元謂衛侯衎失地之君也失地之君恆名之衎入夷儀不名者其脫文歟答衛侯入夷儀與鄭伯突入櫟之事相似而實非故夫子一名之一不名之夷儀故邢地滅為衛所邑衛侯之入不得主其國政也寧喜弒剽而衛侯始入衛故夫子始書衛侯衎言其復國也鄭伯突之入櫟雖非國都而諸侯之相與者在突而不在忽遇于垂居櫟之鄭伯也政在於突夫子安得不名之則衛侯之入夷儀在所不當名至入于衛則當名矣先儒之說皆有所未安執事謂入夷儀當名疑為脫文則衎之入衛將名乎將不名乎吾故曰此夫子之深意也問崔杼逆光而立之經書齊殺其大夫髙厚殺之不以其罪也公子嘉叛晉而起曺師者經書曰鄭殺其大夫公子嘉公子嘉與髙厚之辭同何歟答自穀梁言稱國以殺為有罪杜預則又為稱名為有罪之論紛紛不決陳殺其大夫泄冶冶豈有罪哉謂之無罪則殺陽處父得無罪乎或又以纍上之文書之則凡殺大夫皆非國君矣左氏之言殺髙厚公子嘉一以為崔杼一以為國人其說自相矛盾獨公羊云稱國以殺君殺大夫之辭為得之桷謂専殺大夫諸侯之罪而大夫之有罪無罪實不係焉有罪不可殺况無罪乎以此論之凡言殺大夫者蓋可見矣問襄公之世有穆姜齊姜說者謂穆姜成公之母謂齊姜成公之妻舜元謂何由知乎成母成妻答穆姜宣公初即位之所逆也通於僑如見成公之十六年其卒也見襄之九年齊姜者即襄元年姜氏薨者是也其逆也見於成公之十四年問吳子使扎來聘書札與曹椒秦術無異稱焉左氏公羊皆謂以札賢而進吳子說者又謂札辭國而亂者札之為也舜元謂吳夷狄之國札之賢類不得通于此也札不書族不書字不書公子何賢乎札也屈完書族札不書族與曺椒秦術之使夫何異哉答吳札楚椒同例何褒貶之有二人皆公子故不書姓若屈完非公族屈氏出於莫敖者也薳罷來聘則蒍氏也謬始于公穀不考而自破矣答髙舜元經史疑義十二問問易有辭象變占太玄以方州部家擬辭象變占其太玄方州部家九首之說傳諸世者請喻其所長答太玄以蓋天之法為之方州部家在上此地承天之說也起於牛宿隨天而左行也方州部家者以元而生三方方為三州州為三部部為三家其所謂八十一者則棄其方州部而言之也先儒多以辭象變占擬玄之方州部家僕獨以為非易成六十四卦之後一卦之內必有辭焉有象焉有變焉有占焉是四者缺一不可也揚氏之玄既棄其方州部而獨取家而為八十一復取八十一而為七百二十九以贊是方州部者緣三以起於家若無預者焉先儒嘗言太玄與卦氣圖偶合邵子亦言易之卦始於乾而終於未濟玄之首始於中而終於飬中者法於中孚飬者法於頥此始終之異自邵子溫公荆公尊玄之後如三蘇譏玄之說遂棄不道然其中十有七卦分而為二義殊不可曉所謂卦氣圖公辟侯大夫卿之定卦亦不能通執事其詳思之問易有起於中孚者未究其理答易起中孚先儒之說甚詳今録其說曰先儒言卦起中孚非也中孚復起於甲子耳蓋由揚雄作太玄以初卦凖中孚故先儒誤以為卦起中孚耳夫六十四卦首之以乾坤何以言起於中孚耶夫子分上下經而上經三十卦始於乾坤終於坎離下經三十四卦始於咸恆終于既濟未濟且乾配甲而起于子坤配乙而起于丑故六十四卦歷乾之甲子泰之甲戌噬嗑之甲申至坎離凡三甲而上經三十卦盡矣又歷咸之甲午損之甲辰震之甲寅至節而周凡六十卦為六六三百六十爻一年之日周矣而中孚小過既濟未濟之四卦繼節之後謂中孚復起甲子可也謂卦起中孚不可也且乾為十一月之卦而起甲子節為十月之卦而得癸亥由是知上經三十卦是陽生於子而終於已下經三十卦是隂生於午而終于亥至中孚而陽氣復生於子故亦為十一月之卦自乾之起甲子至節六十卦而終是四其河圖十五之數為三百六十爻爻當一日而為六十卦一年之候也自中孚之起甲子至未濟四卦而終是四其六子之數凡二十四爻而爻當一氣為二十四氣應一年之候也或又曰何取於四其六子之數應之曰中孚巽上兑下小過震上艮下併既濟未濟坎離互體為六子少陽少隂六子之氣分布於四時故四之以應二十四氣耳亦應四其河圖十五數而日當一卦凡六十日為六十卦一年之候也其淵妙如此問易占法其取驗於人者當何所祖本爻之變處當何為主答占法唯程沙隨得之嘗以左氏考之古必有占書今既散軼但當以變者為主然一爻之變猶可䆒索至二爻三爻之變則茫不可通舊聞唐正卿深於筮若二爻變者便不敢臆斷古人心虛靜因動生變隨變而推有千萬變而不可盡者今人心念駁雜無感而遂通之理縱有所感其感不一當從何處下手康節推象變之說亦不外此說卦乃占之本能通其類尚庶幾僕甚有意於此然一行作吏終未有至靜工夫茍能靜斯得矣問古儀禮今所存者可見端緒未審於盛周之時曽盡行之乎為後世立教乎愚所未曉答禮為禮儀為儀成周盛時自天子至于士皆躬行而親習之者聘射燕饗昏冠之禮考於經無有不合謂存于書而不行者非也後人因周官一書謂周公營洛之後所成未及舉行遂併儀禮有疑其說陋甚亡取按藝文志以儀禮謂之禮古經未嘗有儀禮之名先儒疑後漢學者見十七篇中有儀有禮遂合而名之者是也問大小戴記其盡取諸於經乎托漢儒之說乎望喻其取諸於經者如何取諸於漢儒者如何答二戴之學原於后倉而小戴盛行者繇馬融盧植等考合衆家古文之文附之遂刋而行名為禮記今冠昏鄉飲酒射燕聘義為古經之羽翼而中庸大學又為傳道之書若學記樂記皆集古書而為之者其有駁雜則哀公問儒行王制眀堂位禮運諸篇先儒已嘗置疑至若大戴禮之哀公問投壺與小戴禮無異若曽子之大學與祭義相似其餘又與荀子賈誼書相出入者則大戴之不及小戴多矣鄭康成後漢之精禮學者獨大戴未嘗為之注朱文公有取踐阼釁廟等篇然學者觀其㑹通不當貴耳而廢目也問黃鐘為宫則三分損一以下生林鐘之徴林鐘之徴復三分益一以上生太蔟之商太蔟之商損一以下生南吕之羽南吕之羽益一以上生姑洗之角姑洗之角損一以下生應鐘之變宫云云益損數理未逹答太極元氣函三為一三者天地人也故必以三而損益之三統相通始成律吕陽之生隂曰下律也隂之生陽曰上吕也正變之說自古有之陳暘樂書去其清聲不考之過不然安得成八十四調哉問井田制治願聞其詳答井田舊有圖譜然不通開方之法悉如棊局又兼以周官授地之法相參悉非舊制蓋鄉遂井田皆司馬法之說惟可與周官合而不可與孟子合先儒必欲合而一之愈不可通蓋井牧小司徒之法井衍沃左傳之法丘井黃帝之法漢書井田亦與孟子微異秦廢井田開阡陌僕嘗謂井田古制至秦始廢兵農相通非井田之制此未易遽言也問周官及月令真僞之理請喻其詳答周官或謂周公營成周後成此書而不及行其說無所據甚者方之為戰國隂謀之書吾不知其何者為隂謀也或又言劉歆僞為歆何所為而僞為之耶三說皆非僕嘗謂周八百年其間更革損益不一穆王之吕刑夫子不存于書或者又將以為周公之所作矣兩漢唐宋歷年不及周王之半而官制更改皆有成書則周官之書當審為周時所作特不能定為何王時書也然周官井田禘祫郊社絶無其名先儒必欲以郊為圜丘井田為授地之類難以勉從實以其書列官分職整然有條欲强合於諸經遂不得不支離其說其餘可疑者五峯言之詳矣月令具見吕覽為吕不韋書無疑陸德眀云此是吕氏春秋十二紀之首後人刪合為此蔡伯喈王肅言周公所作皆非也月令云命太尉贊桀俊此蓋秦官鄭氏釋之眀矣問春秋於王正月上左傳加一周字其義有所謂無所謂答春秋云王正月左氏云周王正月皆周之正月然左氏增周之一字其跡若與夫子同而其釋經實有不同今世之以周正為夏十一月皆啓於左氏如書雲物取溫麥之類直以春夏秋冬更易而改書之後人紛紛之謬誤左氏其尤也正朔之說家有成書非立談可盡聞吳幼清亦與鄙見合不審得其說否問周子太極圖上一空圈下二空圈當存當舍乞喻之答太極圖的確自陳希夷傳二圈乃成人成仙之說非面陳不可問三國之時司馬公邵康節朱文公三子之言不同誰之言為是答司馬編年之法當時較量極費力然既謂之編年不得不爾終建安而始魏亦自有深意但不合謂諸葛公入寇耳朱文公帝蜀自正但後連書晉事又不可曉若書莾大夫揚雄卒大與春秋書法不同莾為亂臣賊子春秋未有書家臣之理僕嘗謂正統二字于經無所見尚書止有大統二字漢歷法有三統二字後人泥正統之說故皆不通前後遮護不得律以大義則漢以後皆當缺書若用編年備事溫公之法盡矣邵氏經世以不書事故可糢糊無罅漏然此老少年先從春秋下工夫終占得道理端正問窮理盡性以至於命又不知命無以為君子也與公伯寮其如命何又知命者不立乎巖墻之下其義同否答命也者禀於有生之初也夫人之生天所與者有一定而不能移先儒雖有理氣之分以命言之其實一也天以命人者氣人受於天者理若仁義禮智則理也貧賤夀夭則氣也是豈命有二也哉析之雖殊命則一也尚論古聖賢之言命者其辭㫖蓋有不同亦各從其所由而發之啓道德之門者有之逹微妙者有之有不得已而言之者有之又有有為言之者有之故易曰窮理盡性以至於命孔子言知命孟子亦曰知命知其命者夫是之謂君子君子之所以知之者修身成德順其正而已至若見危亡身不茍去就死宗廟社稷城郭封疆者皆得其正者也自罹刑戮此以罪致而不知命者矣孔子曰公伯寮其如命何言公伯寮何預焉在我者豈委而廢在天者豈强以必今之言命者悖於此至若不保其身死於巖墻之下當在不弔之義然所謂命者乃天命之命孟子之言詳矣答髙舜元十問問吾自衛反魯然後樂正雅頌各得其所答樂正非謂四代之樂有誤而正也魯用四代之樂是魯僣用之失非四代之樂非也夫四代之樂各有律吕夫子安得而正諸古者房中之樂為二南朝聘㑹同燕飲鄉射為二雅告神之歌為周頌頌為周王所得行也歌與樂相並而作三終之義可得而考也季子觀樂歌詩亦與樂相通無以議為也至于樂正雅頌各得其所則有不可不辨者范寧言孔子列黍離於國風殊不知季子之歌王固為王矣歌小雅而曰周德之衰是歌六月至于何草不黃矣鹿鳴至于菁菁者莪皆美詩也曷言乎周德之衰乎今之小雅皆夫子所定則凡歌鹿鳴至于菁菁者莪非周德之衰是雅頌之得所復與樂正眀矣太史公謂仁義陵遲鹿鳴刺焉夫子以前雅之無别眀矣故司馬氏作孔子世家曰關雎為風始鹿鳴為小雅始文王為大雅始清廟為頌始是真謂夫子所定夫子皆絃歌之以求合㲈武雅頌之音若是則豈得不謂之詩樂相合然則謂夫子正四代之樂實非也季子之歌大雅誠文王之德矣然民勞至于召旻此周之亂也何文王之德乎故凡可以合于樂者小雅至于菁菁者莪而止大雅至于卷阿而止衰亂之詩不得入於樂矣頌之得其所者夫子直書周頌以别則魯之配天蒸禘閟宫之廟皆非禮矣歌周頌之詩於魯侯之廟則奚取三家之堂夫子之意眀矣魯頌非告神之歌謂之頌者頌之變然敬之小毖振鷺閔豫小子諸篇亦非告神之詩善乎太史公之言曰成王作頌推已懲艾悲彼蒙難觀至于此則後人之效魯而溢美者誠可羞矣商頌是夫子之祖正考父所作夫子殷人遺聞墜簡附以傳後觀其辭想其世之宋而不足證可知矣肆直而慈愛商之遺聲也歌商之說次于雅頌夫子之意深矣雅頌得所樂亦正矣非他有樂也即雅頌之歌樂也問邵子謂天覆地地載天天地相函故天上有地地上有天答邵子言天依乎地先儒言地在其中蓋如磨然上下皆天虛者為氣只天之形濁者為體只地之形所謂天上有地者日月五星周行晝夜日沒于地下但認得地在其中則天上天下皆可通矣問邵子謂數起于午答數起於午微妙不可言已生之數皆順天而行復至於乾也未生之數皆逆天而行姤至於坤也非午不能起陽盡於午由靜而動此知來之妙邵子之祕先儒未嘗言之問邵子謂天行不息未嘗有晝夜人居地上以為晝夜故以地上之數為人之用答邵子曰先天學心法也圖從中起萬化萬事生乎心又曰先天圖者環中也方圓之圖尤密所謂地上之數為人之用方圖是也用九環中則依天而行圓圖是也合天而行附地而生故人為萬物之靈而乾之九三九四其功用尤可見問邵子聲音之學及字母淵源答縱為四聲橫為七音鄭漁仲之說備邵子聲音之學出於其父名古號伊川丈人有圖譜行于世溫公切韻皆源於此然此學由西域來今所謂三十六字母亦從彼出中國四聲甚拙至沈約始眀七音先儒嘗言中聲合於天籟若如近世祝泌觀物解中韻譜却又入樂工清濁之拘莊子謂樂出虛乃邵子心法但得伊川丈人圖子一觀亦得髣佛後漢風角鳥占亦不出此然非至靜工夫未易能通也問芣苡說者謂車前其子治婦人難産愚謂采之於詩殊無義味其中必有其義乞教之答芣苡謂治婦人難産政如釋螽斯芍藥之謬也先儒謂叙物以言情謂之賦情體物也索物以託情謂之比情附物也觸物以起情謂之興物動情也此詩兼興賦之體古樂府中魚戲蓮葉東魚戲蓮葉西之詩深得此意難以語言盡也問詩關雎謂之國風自王季為西伯至紂又命文王典治國南文王作邑於豐乃命岐邦周召之地為周公召公采地至武王定天下巡狩述職陳誦周國之詩以觀民風俗得二公之德教尤純者屬太史分而國之謂之周南召南作樂用之被之管絃以為房中之樂又謂太姒稱后此追稱云耳其義何如答地志扶風雍縣東北有周城東南有召城文王之為西伯周召未得封也武王伐紂以後周召未得封也周召之封始於相成王以後詩序不足證今直以行露甘棠考之眀言召伯此不可通之一也夫既以二南為文王在周南則為王在召南則為公此不可通之二也太姒在周南為后妃在召南為夫人此不可通之三也關雎之作太史公所言不一或為刺或為康王以後詩但先儒之說林立雖有鄙見未易陳道若復異論此又似吳幼清宗象山之謗興矣世無真學貴耳賤目難以立談問作史及編年實録凡例答日曆起居注時政記條目歐陽公言之詳矣實録乃加諡以後書必有臣傳亦有字數限式宋元豐以後日厯壞於王安石建炎以後日厯壞於秦檜至咸淳之謬尤不足據然遺書舊聞皆足考證若欲討論非經月議論不可問四六格式及速成之方檢閲之書答箋表之說當别詳具此雖小技更僕未易言大要寡學而才氣差敏捷者直師東坡南渡以後皆宗之金源諸賢只此一法惟荆公一派以經為主獨趙南塘單傳莫有繼者汪彥章則游乎蘇王之間若欲精究當取夏英公掦文公翟忠惠綦北海王疏寮元章簡王禹玉張安道劉莘老諸人文字置几案賤子當面言源委矣問古賦當祖何賦其體製理趣何由髙古答屈原為騷漢儒為賦賦者實叙其事體物多而情思少登髙能賦皆指物喻意漢賦如掦馬枚鄒皆實賦體至後漢雜騷詞而為賦若左太冲班孟堅兩都賦皆直賦體如幽通諸賦又近楚辭矣朝無咎言變離騷續楚辭其說甚詳私謂賦有三變自後漢之變為初栁子厚之賦為第二蘇黃為第三今欲稍近古觀屈原橘賦賈生鵩賦為正體又如馴象鸚鵡諸賦猶不失古曹植諸小賦尤雅潤但差萎弱耳清容居士集卷第四十二
