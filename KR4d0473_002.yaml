  text: 清容居士集卷第二
  hash: sha256:fed9027db1e18d93efee6e9a9931a806ea055549ac1a5de7335ccdbe3ad5680d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_002-1a}
body:
  text: 騷辭附愍誓哀謝先生受穆清之元陽兮一精白以抗修閶闔睒睒其初麗兮執正辭以告猷黯朱光而不燭兮妖群立以縱恣飾詩禮以逞誣兮曰余將焉所詣胸臆結約而莫達兮史告之以寡言心屏營以靡置兮導􅎶斾而為之先揭德華之魁壘兮勵來者之不前一成旅以興邦兮仡然莫余敢擬州纍纍以十百兮夫何寬衣而廣袂燃積薪以逞安兮群豢食而自戲竭精液復疾呼兮卒莫能進其詞振飄風于林籟兮葉脫故而懷新衆喁喁以雜居兮謇獨立而號呻矢危忱于帝閽兮星委地以如琲何執愚之慎矜兮守隘說於㒹沛持空薄之一髮兮振千鈞于層冰力弗勝而殆兮猶夸夫守道之經企女紀之傾輪兮極迅翼以恣往九疑靈妃慘玉容兮鏗鼓瑟其音蕩重華倐焉以冥邈兮凛舊德之日喪乘桴游于中流兮海若息波以竚望棹夷猶而靡行兮羌何為乎此路砉然揚靈窮晦冥兮朱鬛乘旗挾以震怒澎湃蕩簸激回渦兮爰深逝以欷􅒣懷縮恧而失據兮寧忍歸夫故居死無能終報兮生莫知其曷圖貴化人之冲漠兮潔肥遁以自遜蒙垢紛為汙濁兮薄日月之吐吞墼門竇於荒滅兮屏精明以黜聞超飛霞而上征兮遇武夷之神君逝者翳于山丘兮夸誕逐其營魂覽三聖之古簡兮宣尼實為之彌縫謂道無古今兮孰與之傳虗九九而內明兮剛柔錯焉以敷宣玩朝步之竒文兮握竒五以黜煩建中極而滅端兮成品物之自然湛然一以貫兮曷知其後先數京垓以成變兮迎拒之而莫偏斂莫知其跡兮為道之全夫形既不可以久擅兮神與之為槖籥迫朝逐而日騁兮引正命以自絶棘戔戔于車道兮精離幹以蕭屑秋陰􅉃其凄骨兮熠螢光之明滅手三秀而不忍茹兮腹殷殷其雷裂奄兮愀兮忽以放逸兮何昭昭其章徹亂曰玄神凌兢兮命壽不得長闒茸曼衍兮既樂且康衆皆馴怙兮靈胡然而秉方擷雲英兮微光佩雜芳兮彌章駕赤鯨兮騰驤絶六虗兮放八荒注北斗為漿兮內熱不敢嘗林有桂蘭兮水有鰋魴所思弗見兮奚故鄉挈眇風兮樂未央吁嗟逆化兮寧怛傷廣招深寧先生乘虬上征江海殄瘁湘纍遺痛千載猶一日也栁車爰行瞻望永隔門人袁桷竊取宋玉招魂述廣招以反其義其詞曰竊獨悲此翳濁兮身鞠恧而莫明服三后之貞則兮秉忠純以內兢繩古義以自抗兮凛微躬之莫勝懼天命之不吾與兮晚更號以深寧委靈魄於玄宅兮挾清神以上征重華慘其無容兮矚下矩之險隘侈九夷之曠邈兮申前聖之遺戒一去而莫返兮八靈孰能以震駴乃命小臣戴縰秉旄注精髙冥而下招曰茫茫封丘􅍪豕萃只炳靈奔飛杳交㑹只嬋嫣清芬孰返斾只縱橫幽房雜厖怪只魂兮歸來其益以駭只東門熒煌平蕪層隂只靈宫紫芝萎以泯只流鈴搖空訴夸淫只玄蛇蒼鼠若擾馴只魂兮歸來激越吟只題躞蹂躪白蟫飛只滅方鑿迂傳致以肥只鬪青綴白眩纎竒只折楊黃華司體儀只魂兮歸來彼相疑只沃隰修畛鞠薺茂只狂夫冶游胡􅉃後只南山白石曷以永年只式擷其嶶悵周原只歸來歸來其孰能庥魂只愁雲旋宇隂籟振幕只素空霏塵清晝激雹只虎蜼黃目屏陳設只精鑿後置􅪈蠡施張只伊嗚仰天雜猖狂只甘脭恣睢禮不可防只魂兮歸來悉無以當只魂兮乘桴登瀛壖只海觀日浴爛紅殷只晳容長裾襲古先只漆書竹簡遂研鑽只崑崙穹隆疑有至人只妙顔紫蕤休德日新只吐􅎇納和與道為鄰只雕題祝髮禮讓興仁只桂蠧咀吞味芳􅉝只幽蘅嘉芷佩孔文只相羊湘纍肹若存只承挹清塵徘徊翩翻只天光淳耀㑹辨森扈只肅容展威受多祜只斬几破觚斯皇輔只龍圖昭回布髙矩只開陰蔽陽庶類蕃嘉只捫歷箕尾䢖崇牙只翦理姦巫靜無譁只照示下土循羲媧只河公海神瑰以迅只貝宫鮫室袐怪雜孕只瓊英琪柯錯繽紛只鞭龍誅蛟霈澤湛潤只魂兮逺游戢凌紊只揚歌舒嘯化幽憤只重曰嗟所思之不得見兮儼冰雪之遺容繄遲遲而容與兮松柏日其葱蘢悵幢帷之咫近兮長虬脫焉以追風蛻塵居之險艱兮捨崇蘭之新封塤箎迭其和奏兮聮雲車以陪乘粲琳琅之遺編兮俾泯絶之足證匪離群以自潔兮誠不忍夫騖騁超整駕以言從兮懼見譏乎後聖揖虗漠而言旋兮耕書田以振厲諒神明不吾欺兮庶終承乎嘉惠千秋兮靡長白雲兮相望魂兮歸來其母我忘也七觀翰林先生納榮息機謝白玉之堂將歸于􅏘源之山房越公孫懷牘濡頴託物喻志考圖審曲若鑑之納視言忘而意消類别而理備有郢大夫癯然褐衣目不接乎黼黻耳無聞於律吕囅而言曰登髙能賦淫曼荒忽智專者魂强形滯者物逐昔吳州來觀詩東魯言有度徴有據厲階於枚生濫觴於曺王先生楚産也雲夢汗漫巫峽㠝岏胸藏腹蟠公孫不足以教我先生殺青南山積簡羽陵若網有綱若墨有繩舉凡暢微我其聆諸越公孫曰太素烟熅清濁奠儀雨風露雷動植攸孳辨方審良民用不疵六氣以沴日夭其世彼諄諄者皇曰汝命實長􅍏土燥剛相其溫凉我生命在天順以受年巖居谷飲中道以隕執書以觀有涕汍瀾陋彭鏗之􅊇理兮何恣縱而益顔言技可以進道兮吾當繇是以返觀納腸補藏􅉃忍莫竟石立土踊孛彗忤􅊇吾猶以為天地之病也修身俟命道之大經先生之正也大夫曰神之所行何體何方拘者為儒請更端以告㒒夫越公孫曰靈曜宣精五紀順明察幽考微法天以行形氣藝藝吉凶卑髙觀象以分韜兮靈根感不以言繇動彰靜百神受祜虗者為音質者為數昔后稷氏之職黍稷薿薿智者過謀胡盡其地力民日作慝相攸食墨風雨斯蔽連雲岌嶪飛不得垂喙履不敢仰視旁營萬家地記萌芽赭衣僨蹶而淮水復絶鑄鼎伏姦能沈于淵吁嗟而求桑林之羞要荒擾馴王㑹盈庭獻琛效珍物不可枚陳雞豚以時父恬孫嬉何助邊蔑思屈曲洲島家纍千金資先生昔居列仙之館據要集思謂象以理明妖由人興守諄芒法清寧却走馬于郊謝重譯之雉陋三脊之茅熙熙陶陶舒舒夭夭不言而歲成無營而事貞夫子不云乎一致而百慮其是之謂乎郢大夫曰泛觀博聞於道彌損願滌耳以抉其蘊越公孫曰粵昔尼父唯俎豆是斆擊刾坐作因民以教搜苗獮狩車徒卒究􅍏今輿圖八表同曆四貉交軌月竁風丘冰天桂海馳心望雲請命欵塞千廬呈環八屯山列羽林翻經飛騎鼓笈然而樂成者難與圖事守文者不足語智嘗聞之兵農同封耕戰同功魚鱗鴈行敵莫我敢當府散籍移萬姓流離强帥拉脅外寇憯肌卒不可拄支後王鑒觀法日以繁厖者罷者恇者羸者駢頭引吮食粟而嬉開門納兵百郡是師何草廬髙吟﨑嶇雜耕何杜氏之子傳癖孔深而緩帶以征射以容觀劒以氣言批亢搗虗孰知其隅折衝厭難莫窮其畔至若握玄圖視龜文縱橫起止與易象相表裏者驟語之吾懼大夫之竦眙也大夫曰兵者不祥之器未效此知也越公孫曰炳靈心君闢乾闔坤情聲相宣立度出均昭昭鴻藻緗縹是存敢先論楚材而言之漻漻乎形畏垢而將翥也霏霏乎睫承露而欲訴也荒蹊斷葦燐滅沒而疑聚也織文楊徽攬芳菲而雜組也少焉商飇號鳴金石琮琤逐虎摶兕韝鵰鏇鷹寄莽蒼於一瞬乘扶搖以孤征終緩轡以就日愴倐淪乎西傾噫悲何為哉古有巖居之士抱竒抉幽漱芳深林憩寂凍流憺乎其若遺窈兮其若留鉤盤助之為回旋虗牝答之為獻酬猿三疉而墮淚鶴九轉而凝愁鉤玄採微迄無終窮瑶席敷張髙歌慨慷語初麗而終放託餘韻於宫商然此其戔戔者耳攟拾蒼雅刮磨誥盤微粲貝編飛英露溥何譏乎肉食之鄙猶鄭穆而魯桓也大夫不聞之乎鍾石絲竹各隨其聽隆汙有時其所遭者命摩蕩堪輿吸呼羲娥矢為帝詞叶為賡歌五嶽贊襄百靈護呵不棘不茨如砥如磨彂潜漏泉掖民陽春瑰逸為新簡潔為真列若戶居别若渭分雍容者珩璜冲逺者英莖縷絶而緒續醴甘而齊清昔之擅名偉著耿兮其不能以十百程也浮聲切響直意肆志澎湃訇溘淹滔莫止据理者夸飾言者哇嫫母兮姑射鉛刀兮鏌鋣謇莫任兮奈何大夫曰文章與政通玉署之職也文勝質則史更言其大者越公孫曰矻矻中壘校讎靡寧世本年紀繫于麟經捨相府圖書泯其緯經炳麟金匱汔罔敢配乃司馬氏决榛鋤翳麗者為譏激者為刾升涉丗家表籍作紀言諸侯無史史立周圯鄙儒畫墁削章刪凡爝火並日卒澌盡莫傳昂昂荀袁辭約義完何班范家至耿光綿綿相繼擬述百丗一律素王簡編如日在天熒煌髙張孰敢附肩鴻化以漓研探益疲穢者闒者襲者濫者淟涊畏禍希企市價諂不表直俚不師雅若聾鼓鍾若盲策馬元經附訛唐曆受呵後有紀略迄莫同科尹石猛志證古比事百不一試歐陽氏出方名山所藏復大同而小異勢不兩立其魯史之謂􅍏今繫諜川盈記注􅌨比故志存廢興之源典章酌損益之致登瑶山而神駭游鄧林而目眯般倕效吁隨和彂涕操觚之士吾將見其心赧而神悸也先生登祕丘覽群玉積石倉標朱目墨兵筆削融液乎粹精囿赫胥鄰大庭大夫冝從下風而乞靈也大夫曰皇王惟熙帝霸孔巇我心增悲韓愈不為史名以四馳何庸知焉越公孫曰煌煌古帝别生聚方煥乎陶唐五服正邦五典率常導之無違民用熙熙授之以時聿來孜孜降于三王􅍏緒曰孳集成于蒼姬黼黻憲章金石命令緝熙太和宣昭群姓纎巨之備粲乎其有秩也豐殺之制屹乎其有截也三光重輝百辟拱列歲時易移而浸淫蘖芽弱者綴旒强者鋋戈智者探囊勇者拔河搏犀象屠蛟鼉飛矢請命旁午係車焱乎浮雲迅乎奔塵炙轂滑稽之士紛然而並陳棄仁恩假鬼神混君臣各馳騁而懷新數千百年人亡而說具勞乎離婁不足以一視也薾乎王良不足以一御也其最大可病者恬泊守真可以養身不可以治民絶性棄命黔首螙病孟軻氏有作吾見其髠鉗而舌咋也言未既郢大夫曰天藏山中瑾瑜匿瑕問以辨之􅍏德日華儒者詬病卒不能以勝何道最髙子盍陳之毋激毋勦越公孫曰古昔顓童受業閭孰書數首通訓故是屬聲歌象舞目接身服相親有恆日用不瀆後帝不相襲緣祀興文八音寥寥五禮紜紜鏗鏘莫明而聚訟若焚鄭說乖誤後圖踵循象制益湮周官别出議者欲一繁紊綜錯操網而入林適越而轅北也類禮孔勤五厄莫存後有倣補去取未就􅌰乘虬驂雲字以文合聲以音比旁行敷落侏離狄鞮文軌同風不能以一致孔壁莫推二經蕃廡聱牙為今簡儷為古謂道統是傳曷敢有語詩基文王而周召先興首章異同衆說沸騰風雅變言美者為訾直者為詆魯頌紀異秦誓告終何後學瞢瞢迄莫之通麟麟魯經議口法吏謂齊晉無褒而日月具刾紛若蜂蝟眇若糠粃不虗其心不明􅍏視遺珠抱疑探篋積毁然此特人文之經緯政治之用體也三聖述作包河總洛二儀生于心萬化制乎神迎之而莫親拒之而彌存疑者遁者愕者困者湛兮消兮委兮昭兮沉思遺物形離超兮激回飈兮闃而寥兮縱雲翺兮憺兮儒先從我招兮郢大夫曰始吾見公孫疲􅒵若不足突梯若避辱靡精槁神何齗齗然也今知子矣永譽處矣吾與翰林先生徜徉此土小年大年猶以為朝暮也歲先子命繕治書録觀史志略録部桷不佞遺諜守儒號東南故家志學之目矻矻三十年合傳短長乃成一家承第時見舛雜稍長得博考先賢藏書總賦之遂作七觀極道源委延祐三年歲旨程公作藏書山房于麻源三谷命桷丑㑹稽袁桷志在丙辰七月癸嶽麓圖辭二章嶽司南兮齊紫冥懋陽德兮炳靈二老兮素綦握鴻濛兮矢詞百泉兮一谷釃為川兮為瀆玉霏霏兮日光湛淵默兮含章至言兮在圖同八方兮遂初重華逝兮不返晝猿啼兮􅍑當坂望臺兮蘼蕪蹇一士兮拮据百楹兮承宇㪺山瓢兮以為醑松風泠兮琅琅儼振佩兮髙岡朱羲出兮揚靈積隂伏兮大明百泉飲兮在齒凛交流兮不可以止嗣德兮孔艱清徴激兮回瀾悠然閣辭鄱之西兮峰圍圍虎豹屹兮雄姿綬蜿蜒兮紫屬旌駊騀兮虹垂之人兮槃阿畏羲娥兮髙駝築榮觀兮通明手參差兮以娛棟隆兮示背榮翼兮聳喙鑑匯雪兮鄱之區救有七兮日㪺採鞠兮黃裳緝茰兮紫囊芳冥冥兮夕暉憺獨睇兮擬所思雲飛英兮山之阜為豫留兮不遐以處秉貞兮神專觴彌劇兮益完山中之樂不可以久遲豫返兮悠然楊堅州治孟津金堤成作金堤辭波湯湯齧我堤民昏墊晝負擕地不寧緣木棲楊侯之來承帝則順事隂氣神以懌赤蛇蜿蜒吸桂漿百谷受令故瀆常彼隰柔桑猗澤維粳侯言神綏曷敢功民言侯績天心通百妖伏精金石宣明三旬有役金堤是復石田山房辭大梁馬伯庸寓居光州作石田山房為作辭曰淮斂波兮練繒峰植秀兮翠旌翦黃榛兮布耕石戔戔兮稜稜思夫人兮造攻雲電合兮追鋒遺鏃兮齧足壤逸休兮果腹神符一兮告祺藹惠則兮貽思靈之來兮歲祠不鄙夷兮以嬉疏房兮笋席溫風至兮靚密儼竹素兮橫陳曰靜修兮手澤丗芬兮日起百稔兮無斁石田兮有秋纍胼胝兮吾奚以愁謹樹藝以自朂兮植先德兮無偷雍本兮頴豐導泉兮澮通夫豈不知有善歲兮吾曷敢燕遨以幸逢望八公兮巖巖王孫悄兮莫還積荒幻以自迷兮捨息土而弗芟衆芳婉其披離兮秋霜慘不能以實謝紫芝之療飢兮治精鑿以煉質亂曰苗詵詵兮善吾耘兮日出作兮永𥙿樂兮學猶殖兮吾將以為則兮雪江圖辭雲玄積兮素摩挽羲車兮馮河蘆戢戢兮倒戈岡伏匿兮鸛鵝昭朗兮夕徹群動寂兮影滅超逍遙兮一舸食榖精兮腹羸地險兮曷憑馬飲波兮夜騰委素練兮宇清舉皓首兮吾奚以屏營垂綸亭辭為宋誠父作漢滔滔兮日傾東滄浪兮泠泠蹇一士兮沈冥垂芒針兮不屑以􅊻明玕兮貝宫朱蔚兮青葱魚戢鱗以為衛兮龍騰章以屏氣謝姢嬛之嘗巧兮口垂沫以縱恣吾寧養之以歲年兮寶祕鬱而不宣豈直鉤以違衆兮守釣道之自然時至而迅舉兮匪荒幻之詭誘保貞志以遂初兮考銘言于耆叟世俗眇其莫同兮永訖依夫前聖之所究巨峰辭為吳成季作千嶂兮嶔崟特峰挺兮絶垠泉交流兮織文粲霄臺兮鱗鱗檜節兮松纛接路兮以遨儼至人兮清寥休德新兮日昭神曾舉兮重玄大帝儼兮授簡以宣曰渾沌其無迹兮孰為之傳氣積兮九乾五緯從兮右旋逆知來兮順以往握靈機兮測天狀葆正命兮滅企妄受帝語兮還神亰山之下兮雲亭亭淡獨樂兮復丁則泰始兮道甫成雲中辭氣芒忽兮孰窮其升淵回旋兮挾以騰圓為輪兮直者繩握斂散兮莫名山之椒兮日暾彼獨黯兮上屯從豐隆兮駿奔需不進兮惛惛下土兮垢氛靈夷猶兮曷存炯余視兮屏息桂酒㪺兮瑶席法玄化兮以康食神功吻兮奚以跡衆甫集兮粹精憺將逝兮廓清春雨辭玄隂固兮內凝淹薈蔚兮𬈑沐興注兮建瓴疾兮灑兵下土兮沃焦謇徜徉兮紫霄來弗以趾兮去莫可招淡幽士兮空山息視聽兮玉顔帝青廓兮籟沉虗牝汩兮潺湲謂彼有聲兮耳益以聵疑不釋兮詢于大塊義婦辭東平孫圭妻盧氏彼棖煌煌兮過者式之黯豫心之初兮孰㦯測之紡兮于房伊雛孔傷饋兮于堂我姑永望余不聊生兮矢神告之歲月遷流兮卒乃復之鸞鏘兮飛鵠松柏茂兮朝露沐石可泐兮志莫虧儼舜英兮介壽祺哀蘭操盱江吳允文咸淳末與家君同佐江東幕府允文慷慨喜論功業倚青溪檻張髯頓足籌邊事歷歷在口傲視府公每一至賓次席甫坐即去督府舟抵龍灣金陵郡文武郊迎謁入皆謝不納獨允文立江亭掩袂大慟必求見始退未幾以王宫教授名方是時江淮幕府僚佐言性命道德者悉詭號為知兵得入朝言事而允文疇昔素論兵尤竒偉可聽故得驟遷為起居郎復直舍人院流離南方寓䖍州時文丞相總兵兵浸弱允文復以平時論兵丞相獨傾下之兵日迫丞相酒酣與允文論生死允文未及答丞相呼軍校斬之噫允文要為竒男子其未答也抑將有所為也桷九歲時嘗拜允文於家君坐上想其風采凜凜猶有生氣今覩所作墨蘭不自知其悲之無從也作哀蘭操以矢之暇日當弄絃繹聲以配易水之悲壯幽蘭兮秋風炯命兮不逢剡剡兮素蕤零露裛兮莫持望崇岡兮不得返悵江南兮愈逺叢棘兮戔戔欲駕兮無轅孑中野兮屏營芳隕失兮玉零謂我為非兮吾何辭已兮已兮其將何之幽蘭兮勿悲生失據兮死有期思夫君兮意極從逆化兮何隳蘭竹操為子昂作柔者不卑剛者不凌貿貿雪霜心兮以寧且清噫招過學恭吾曷敢以從彼髙者砠彼俯者磧各全以生不媚奚慝尋不可以枉寸能有所長亦獨何心兹奚以傷戔戔兮叢棘髙者下兮曲者直揚靈兮靡幍介石兮誰瀆功成者去兮孰尸其榮辱為佩兮弗忍以刈為杖兮弗忍以戕杖弗以扶危佩弗以服香其咎曷當履維德基其無缺以自隳噫黃可玉哀辭孔子叙逸民所尚不同愛其近道吁是有感於世也耶又曰不得中行必也狂狷乎狷者有所不取矣剛潔養正矯矯然離垢立竒語益不合行日以𥚹若是者誠不取矣苟為之不能知知之而自警者得一人焉曰南康黃先生可玉可玉名石翁世儒家居廬山下少多疾父母强使為道士讀聖人書能知其心謂道與言不可以有行也必藏智頽放以自養約結制行非介以為異也其著書極於憂患者困之通也嘗曰曼容姱節支離不能也平丗易足吾何為乎是空巖隱穴廓然契領至則曰游聲養名非士之實跂而望之去聖逾逺故其所為詩文靜而不馳溢于哀忿則可玉自號之曰狷叟者其果知矣可玉所居室多唐宋雜蹟間疾作閉户反復在手疾止危坐若思客至馳辨榮辱可玉閉目不復答而人始咎之嘗與余言吾鄉善醫曰劉開能已竒疾里人病噎嘔藥不愈劉往視之云廬山某日雲氣開君憑軒眺引之當愈後卒如其言余少固多疾今疾益劇不知用劉治法可已否相視大笑余來京師報書言茅山陶公黃庭出可急購購成當同議中黃畢法未幾竟以疾死嗚呼可玉言幾六十死矣曷哀也已學老子道志於壽余不志爾謂其世無似而哀者亦介之的也伯玉砥礪志節歲久益湮讀其自為銘知可哀也已故為作哀辭辭曰朱光潔精受昭質兮熅熅靈根曷幽鬱兮鉤深索竒儼古聖兮德充以尊履制行兮恤彼拱璧奠皇圖兮劌以為隅衆引誣兮詬俞突梯道之非兮挾輈以行慎樞機兮層冰在蹊踐其潔兮幽蘭允芳誠不敢裂兮清玄返真氣始升兮謝彼菀濁超變騰兮空山闃虗蕙蒸殽兮淹焉白雲從我招兮林彥栗哀辭道家言黜聰明去健羡形神始完是果為得道耶古者上夀百二十歲竊不死之說者則曰修之益真其道彌親壽而無德與名君子耻之故修短有命遺壽焉猶可言也名德不至其澌盡腐滅又安所取哉古之人若是者衆矣永嘉林寬字彥栗形癯而器溫其於學也汲汲然逐日以補有不足焉則力探簡冊以自證其為文必達於理而始精於詞謂詞者載理之具也理不足焉詞雖精無益也深思以求之旁取傳記之說勦絶傅㑹據宗統原以㑹于一復懼其未盡是也則祕重自念將周游四方闕疑廣聞目擊而心領焉噫若可謂勤也矣道散于九流百家彌綸者至矣其弊有不勝言者泛濫俚雜尸坐瞪目漸入于無聞之傳余嘗察彥栗知其心有深憂者焉余始見于姑蘇氣和以謙再見于亰師愀然以思取士之道非一嚴畛域析毫髮有司者之過遺逸不舉則凡吾徒在官者誠有罪矣彥栗志不在是推彥栗之志在問學為之而不克就若是者是真有命矣悲夫延祐六年三月卒于亰師年十有其弟宇友謹哭曰吾必奉喪歸姑蘇姑蘇吾先人所藏遂為之辭以申其哀焉辭曰氣清明兮受元陽德弸中兮暗以章挈太古兮儼九皇播潔精兮瓊圃芳力未具兮志則專一葦渺兮濟巨川慨不進兮道逺邅白晝速兮隂風旋數實紀兮吾何愆路孔修兮神獨還靈旐翻兮木葉丹儼夫人兮在空山玉蓉冠兮紫佩蘭玄教大宗師返真朝元歌九章以前導雲飄飄丹臺何岧嶤中有授經之老顔不雕三光蕩摩四時代謝神來歸靈承帝罔敢替謁珠庭寥陽空洞六聖儼思九垓熙春羣黎受禧昔騰章閶闔通金書儼在水旱功朝重華五嶽奠形飛車揚鈴翔鸞騰晃金精下視垢濁何沈冥昔者之來運有遭今者之往清且邀神虞娭匪衢以乘匪車以征蓋葺兮摩旌洞簫激兮泠泠磅礴一氣兮冥冥精思道樞兮跪俯聆玄雲駝玉几差差文織成龍章鳳翥相緯經大言鴻濛小言毫銖道在瓦礫匪别區念昔人世我非娛唘圖籥煌煌文成􅍏㣧嗣昌靈之紹合永貞陟降四紀心兢兢視彼成虧凛春冰髙朗脫屣辭世榮靈胄光簡兮無言默兮若存生以不生為根死以不死為門絶學丕傳黜其知聞五千之言世永傳握重玄熙洽休明紫蕤朱英侍帝左右夀考寧唘祐玄緒何繩繩嗣昭代歲無害佩鏘鳴兮衣綷縩昌期運髙維松層岧岧斂玉顔養金膏鍊形以升朝帝青周流萬變鎮神亰佳城髙清容居士集卷第二
