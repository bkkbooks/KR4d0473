  text: 清容居士集卷第四十七
  hash: sha256:a0d537d1f547a9103a5f410e61e9db9c33a662046bdecba80e88fdab36ed396d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0473_SBCK_047-1a}
body:
  text: 題跋題唐玉真公主六甲經靈飛六甲經一卷唐開元間書當時名能書者莫若李泰和徐季海然皆變習行體獨鍾紹亰守鍾王舊法余嘗見愛州刺史碑黄庭經無毫髮違越至開元間從貶所入朝一時字畫皆出其手此卷沉著遒正知非經生輩可到審定為紹亰無疑昌隆公主睿宗第九女景雲元年入道改封玉真因以名觀方盛夏時工役迫急羣臣諫疏咸入魏知古之疏有曰陛下為公主造觀將祈福祐季夏之辰興工犯禁百姓居宅卒然逼迫令其轉移㓛徳何有觀地盖太平公主之舊第也唐世諸主多强入道以為報本㝠福否則和戎以弭國難為女子者不亦難弁併識其事于後跋竺氏蔵舒沈二先生書二先生授學鄉里時踵門而登巍科瞴仕者固不一二數殊異以後衣冠淪落有不忍言者獨剡源竺君嗣孫稷猶能守儒保世庋蔵二先生遺墨惟謹桷伏讀沈公書誨有曰兢兢自持若果能爾何用師友審竺君誠能用力於是舒公誌其嵗月則曰樂道其教子荐更百年敦厚愷悌之澤今復未艾竺君諸孫宜力脩而善繼焉俾勿墜袁桷書題唐臨講堂司州帖臨書如九方臯相馬遺其玄黄筆意洞達妙在轉摺若拘然位置不復有神韻矣唐臨十七帖較閣帖多異此卷紙品墨色真數百年前舊物宋世唯蘇才翁米襄陽得此妙解能書者必能湥辨跋鄭太宰奏撰樂章故事圜丘明堂孟享宿齋之夕六宫起居奉表必委學士翼日復命它學士作宣荅詞車駕還宫始賀慶成及錫賚亦皆學士所為詞臣書詔填委盖不止是也自元祐以後罷合祭儀文悉倍舊規國用不足二蔡之徒悉遵王安石熈豐理財之法史官書之未嘗不慨嘆也鄭皇后三為妃嬪始正后位實大觀四年之十月今觀太宰鄭公奏撰樂章之文在十二月實此年也鄭相世居開封三開茅社雖由椒掖之貴而其子孫殆有能以詩書自顯都承公興裔詳習刑政今世所行大理格目實自公始蟬聨官簿見於周文忠公所為墓碑四世孫出示手勅足以見一時文物之美噫翩翩不富之戒又何其速也延祐三年五月甲子史官袁桷書書唐臨蘭亭府故蔵紹興内定武蘭亭文皇摹本所刻故毫髮無踰矩至徧賜諸王羣臣則皆一時能書所臨精神横逸雖抵掌相佀然猶以為優孟也余所見元嘉賜本第一神龍第二蘇才翁家本第三才翁本則祖神龍褚河南悞字本第四馮承素本二第五禇庭誨本第六陸柬之本第七㝡後復見米老所傚禇河南本第八傚馮承素本第九今見此為十矣十本皆臨書與定武㣲異同又皆繭紙非雙鉤響榻所可作米友仁定此為模本失之矣況此卷濃淡結構皆出已意每攬二字落筆尤竒媚米老臨摹誑一世豈此法不以授其子耶柯敬仲好法書而近世輙效米老眩易者十有八九故余特叙所見且以為貴耳賤目之戒跋齊竟陵王蕭子良書譔自書契以訪唯文字象形鳥叙云齊永明三年正月十九日一卷跡總成韋續纂書體中有張芝一筆書鍾繇行狎書曹喜懸針篆書杜伯度章草書此卷盖五十六體之十一耳蕭子良書不傳於世獨述書賦其書有力而無體此卷是唐響榻粉蠟本茟力遒勁有智永舊法宗少文作一環草蕭齊咸慕之子雲書政與此類文皇乃湥非之何耶圭璧殘斷然猶審為朝覲遺寳吾於此書亦云跋桺城懸隴西李夫人誌顔魯公錐沙印泥法僅傳於蔵真誠懸真得其遒勁魏晉隸書以扁古為工至唐虞永興禇河南猶守舊法唐世碑刻作字逾廣遂以長勁為能而晉法悉變矣近世能書家不屑顔桺競為李北海書而隸體遂絶余拙於書而善鑒未有能易余言者往嵗嘗見桺公書清靜經西昇經靈寳經易賦心經凢五卷當以此誌為第一題定武損本損本定武多匱金蟬翼越紙所印字彌精神不知者乃以纎瘦疑之當宣和流觴亭成有旨従薛嗣昌宣索急驛以進内侍梁師成暮夜亟以蟬翼三紙連覆得百餘本故上本差瘦中本肥瘦得宜㝡下本與不損肥本亡異雖非北紙實皆薛氏所竊本也此本盖是薛氏舊本紙墨昏渝殆猶東郭子綦垢弊愈甚而神益清望而就之真有道之士也跋懐素草書四帖蔵真論右軍書未若湥服後乃爲黄長睿所貶殆釋氏所謂報縁員嶠寳晉之餘復㳺戲唐蹟吾意後人無敢出議口當以是為徴跋歐陽詢隅隩帖評書家嘗言率更書難雙鉤盖其落筆全在骨法若填補肥媚則失其體舊見唐彦猷摹鄱陽帖筆意絶近此卷殆髣髴之矣跋聖教序三蔵記舊經生多習之李西臺人品髙猶不免蹈襲今觀此卷遺其玄黄非有拘窘蓬萊神仙海鏡雲滅濡毫而踞龜殻非此翁也耶跋懐素自叙自叙墨蹟俱有蘇子美補字凢見數本董逌進徳夀殿者為第一然子美所補皆同殆不可曉善鑒定者終莫能次其後先今觀員嶠所書貴耳賤目之士願加詳焉跋急就篇索靖急就王廙所蔵僅存於衣摺是渡江時已不完章法㣲茫轉摺之分少失之則訛謬矣自唐以後遂不敢以是擅名觀此足以驗筆塚之㓛噫誠難矣夫跋懐素聖母帖劉綱得道四明余嘗欲㳺山中攀懸崖坐石牎問超世之㫖而未得今觀此帖極偉怪素為文世未之見而此帖亦世少摹刻觀法書㡬三十年謏聞若是是果孤陋耶跋玉笥觀李後主牒漢武南巡以天柱為南嶽而江西諸山言神仙者皆宗之玉笥山記所言漢武良本此至蕭子雲譔立館碑有曰清虚之館盖其地也李重光以蕞爾小邦當開寳末年兵勢寖迫奉宋正朔不暇給而猶曰御批此殆終身不去帝號之誚所行文又曰準教則王制也南唐之亡城䧟猶誦佛不輟渡江雖㓛在曹彬而江面濶狭表裏實一僧圗獻于太祖宋史特諱不言耳九華先生道家者流李主得國之效觀其成敗爲之憮然前史官袁桷書跋蔡君謨汶嶺帖君謨行書蘇文忠定爲第一其所摹右軍諸帖形模骨肉纖悉備具莫敢踰軼至米元章始變其法超規越矩雖有生氣而筆法悉絶矣昔人嘗言程李御兵各善其用學程之道猶魯男子也君謨盖深知此唐人雙鉤多横搨執筆尊謹懼其妄出胸臆也今觀汶嶺帖較唐文皇棗木本益足取徴延祐五年六月㑹稽袁桷書祕閣續帖劉無言雙鉤開皇蘭亭元祐間詔以秘閣舊蹟淳化所未臨摹者命劉燾無言董其事為續帖十卷至建中靖國畢工後大觀間蔡亰復增臨十卷去無言所題命京改題通為二十卷後復有孫過庭書譜今世號為太清樓帖是也開皇真本後由榷場復入徳夀御府號神龍蘭亭紙前後角有神龍半璽盖唐中宗時所用印也理皇下嫁周漢長公主于駙馬都尉楊鎮故事奠雁奏進禮物一百有二十奩理皇從復古殿取神龍蘭亭為第一奩以報宋社亡楊氏子不能守歸于濟南張叅政斯立大徳末年復歸集賢學士李某余得見之以百花蟠龍官作錦為褾首前有希世蔵小璽真竒物也此卷正為無言在秘閣親摹事見無言手跋向冰文簡公裔孫當韓侂胄聚閲古圗畫皆出冰鑒定自淳熈後圗籍考訂之富惟霅溪向氏錫山尢延之諸暨王厚伯三人然字畫㝡惡拙及今與僕遂成四人延祐七年二月六日越袁桷記時官集賢獲覩此卷賈相舊物也跋蘇文忠與黄師是尺牘黄師是寔先浦城人其父頴州府君好謙與二蘇公為同年進士師是遂與蘇公家通姻譜嘗為提㸃刑獄文忠有曰白首沈下吏緑衣有公言之句所謂緑衣盖指侍婢朝雲言師是官職之不遷云爾師是官至待制其弟宰星變上䟽論蔡京遂長流海島有子子㳺脫驂以葬歐陽徹張魏公義之後居四明之奉化此帖縫印曰仁儉者為子㳺之子而視師是為伯祖仁儉之曾孫應春以詩學教授鄉里後其子皆為達官桷嘗聞長老言其家所蔵二蘇公帖凢數十紙五世澤哀皆散落殆盡此帖盖遭母章碩人之喪文忠所慰唁者舊亦嘗見石本今獲真蹟為之湥有感焉跋米元章書元章壯年學蕭誠書後學段季展最後悉意師褚河南其體三變晚復規模大令往往行書為長御府米帖有楷書周官性不耐拘檢時有塗注中原諸賢所見周官盖行書也草書之變始張旭行書之變由米老盖其㒹逸政相佀耳孫過庭嘗自言作書無一筆大令善書者必能評其優劣也跋汪氏推恩誥右信州汪氏孺人誥一道實夀聖齊明廣慈備徳呉太后夀七十時孝宗上夀康夀殿推髙年恩所賜也紹熈五年復以八十行慶夀禮未㡬孝宗崩危疑之際定立曾孫母儀四朝猗歟盛哉嘗考乾淳之際國境寧謐天子以孝治天下一時郡縣以年髙聞于朝者視汴史惟㝡多舊制男女凢年登百嵗得官封仕而父母年九十官封如民百嵗而慶夀恩八十以上始得預如前制差䓁焉張氏自待制時為宦族則汪氏之年耆盖可知矣叅政師㸃盖施公施為廣信人首相文定王公淮實桷外祖母碩人之大父于時文定作相其母夫人猶迎飬相府君臣廣孝扵是可見元傑沉静好脩學老子道猶能寳家牒於易代之後故國喬木藹然遺思桷也世為史官得無書乎袁桷記題李龍眠雅集圗龍眠舊作雅集圗在元豐間于時米元章劉臣濟諸賢皆預盖宴于王晉卿都尉家所作也嗣後詩禍興京師侯邸皆閉門謝客都尉竟以憂死不復有雅集矣元祐更政蘇文忠公爲中書舍人黄太史入史館張右史晁河中爲正字秦少㳺以品秩㝡下亦校黄本書籍未㡬晁以憂去又未㡬趙挺之論蘇公少㳺魯直同一疏否則晁亦在疏中矣噫元二之際號爲翕和黨論之萌盖已兆朕良可悲也此圗盖作于元祐之初龍眠在亰後預貢舉考斯時之集則孰為之主歟曰此安定郡王趙徳麟之集也徳麟力慕王晉卿侯鯖之盛見於題詠文潛嗜飲樽罍滿几者其實也少㳺凝然有思其小秦王之意乎魯直每遇家妓輒書裙帶今乃題卷猶故態也東坡公精神淩厲見於筆墨而待門下三客盖未嘗以此易彼嘗考文章盛時各展素藴故六君子别集體製各備後宋之弊以華貫為重墓中之文前歸於周文忠公樓宣獻踵之至於末造劉龍學専之矣仰止英躅庸書扵後題八馬圗後龍眠嘗作明皇八馬圗此盖其雲仍也奚官調牧湥得沙苑間意態畫評云人稱髙名馬虧先匠余於斯圗亦云題雙竹圗彭城遺派如俞且軒梁率庵皆有蕭灑意態世人貴耳賤目正不免如米老牛即戴嵩象即章得之誚此卷雙折枝煙雲慘淡展閲晴齋頗有莊生去國㡬年之意書藝祖皇帝十節度風雲圖後杯酒釋兵柄此啟運立極之基也然文盛武衰亦自此始攬風雲圗痛當作慟遺民袁桷書以辟穀圗夀張治中併識其後叅預篤素張公孝伯于湖先生之從弟為貳卿時有以辟穀圗為初度夀翫其詩語典宻超逺非叅預公不能受未㡬入西府又陪㡬政偽學之禍公實彌縫雖一手獨拍國史時政至今猶可考也晚歸桃源領祝釐十餘年康强夀考是生樗寮太中公亦以字畫醖藉重一時年過八十作字猶嫵媚本茂枝亘有自来矣桷大父嚴州於太中情好湥厚每相顧語時事艱塞思欲如叅預公嘉泰時不可得風雲變更此圗遂為袁氏家寳思得留侯裔孫以永兩家傳襲之美治中張公精神炳燿篤志文物於吾家族祖正肅公有三世之舊振轡甬水言語冰雪誠信金石優㳺孫讓而發不可犯事不徒作超然有黄石公審勢之道桷往㳺金華聽言論之緒覩兹佳辰敢以叅預張公所至者為祝俛仰疇昔今百二十年矣庸書所聞為公夀四明後學袁桷書題趙希逺山水前賢議大年山水平逺多朝陵往回所見今觀此圗殊有泉石意態吾鄉樓宣獻公嘉泰坐錮十年不作子公書問趙尚書時方尹行都其猶子輩行後先不同要知此畫不當以此為重近世附㑹率類此題家山圗巖壑朱鴻臚翰墨繪事乾淳諸老咸尊許之余屢見其書洛神賦飛湍圗當未易入書畫家評品信知前賢㳺戲不得以藝名目竹墅先生舊為江行圗登瀛圗復因思陵書法充為學書韻譜使之較藝書畫二愽士意其猶朱鴻臚也藝成而下韋仲將閻立本懊恨莫雪則知㳺戲湥意未為害道桷客錢塘獲觀家山圗於其從孫一清典刑日淪雅思清集萃于牆屋之被文繡宜湥寳蔵以示同志題赤壁圗空濛寒江望斷壁如日色羈臣謫子作淒然懐土語佀傷正氣余嘗讀囚山諸賦湥惜其才其不遇果命歟覽此長卷益知東坡翁百折不撓非景物可動為之一噱題模本重屏圗重屏圗至汝隂王明清氏始定正坐者為南唐李中主像余嘗見樓宣獻公家周文矩所畫初本前有祐陵御書樂天偶眠一章噫承平盛時君臣圗治而區區慕企耆年之安佚禍及於身國亡於嗣苞桑之戒有自来矣此卷模搨不遺毫髪乃喬仲常所製湥得龍眠筆意而精巧過之以此辨定書牟端明脱鞾圗黄魯直返棹圗贊後當塗所贊子昻畫時守嘉定改元首召樓宣獻公為翰林學士承㫖更十七年不復有繼而學士亦乆虚不用寳慶初首用鄭忠定公時則有若洺水程公相繼為學士端平則真文忠嘉熈則魏文靖文忠不肎拜命文靖不兩月即入政府矣淳祐特用三人曰端明李公參政應公其以不能辤者呉丞相一人耳至景定始踵用徐公端明牟公獨牟公至咸淳初猶學士噫四十一年理宗所命内相不過四五人則凢號為學士者誠難矣方陵陽李先生特以史局入蜀為㕘謀首辟先生以自近蒼黄出蜀李公造朝願給筆札補其書先生之助為多龍翔之役丁董氣燄無敢犯一麾出守惓惓憂國絶僥踰鼠穴之蠧初圗見之感指摘文致之弊太史之圗見之裕于子孫經術淵懿為東南師表故國喬木殆於是見之矣念昔至元乙酉嘗從子昻承旨公于錢塘于時年少氣鋭各欲以文墨自見此圗之作實在是嵗鼇頭之兆殆表於是桷也學不加進而志日益懦肅容斯圗其亦有所感也夫延祐四年九月袁桷書題楊補之梅逃禪居士平生文章字畫清勁簡絜獨作梅花習宫體豈宋廣平遺意邪徳夀殿湥愛之嘗命作横披親御翰墨懼以是干進即脱身還里士大夫自重若此可以見昔時之盛題湯叔雅梅舊見叔雅作三香圗踰二丈遺其女準奩田四十畝清實清矣如太清何叔雅性慕曠逹其繪事有山林枯槁之意徳夀殿乃不喜之何耶遇不遇有命昔人評詩謂桺塘春水真富貴語叔雅豈故為是以自况然予嘗聞評畫家言竹外一枝水邉摇落非叔雅不能盖棺論始定於此圗見之李成寒林李光丞畫多入御府在民間者其子天章以金帛悉購蔵故米元章作無李論此卷王都尉畫帙中物余留京師見寳繪堂畫帙仙佛折枝禽畜凢三帙後入宣和太上皆御題姓名復加寳璽宣和㝡重光丞山水今􅏻潢犀軸皆舊物盖從畫冊表而出之者摺文猶在而後紙略剪去至治元年十一月丙子導尊號玉冊置省中歸坐南牕書題小坡竹石牧牛圗小坡竹石綽有父風後倅定武駡賊不屈以死其風節不墜光于前人矣坡翁流落困苦有悔不長作多牛翁之語將買田終老于陽羡而志迄不遂此圗之作無乃聆庭訓以寓初意與江南䆉稏千里一色乆客于亰塵莊舄故鄉之思無言而色已動覽之悵然題李伯時馬性圗為龍眠李元中作仁廟賜郝叅政此圗龍眠三李元中厠伯時豈淺淺哉嘗聞伯時欲工馬形狀或有告者曰非入天廐不可今世所傳好頭赤等圗悉天廐摹寫鳴立起俛神氣洞馬腹矣後復有告者曰子性非馬性入於自然寧有悔悟使真入之曷有出理由是懺悔作大士像袁桷曰性以理成物具理具區别有殊性之益彰惟我仁宗皇帝溥愽濟物一視同仁其所以際待大臣者實有差䓁其膺是賜非臣彬不足以稱龍御上賓先臣不接踵以逝誠有是也夫嗣子升至治二年命小臣袁桷叙本末謹稽首拜手為之書題王黄華墨竹黄華老人祖襄陽筆墨至於平世不遇卒至窮困流離時使之然使生元祐盛時實不在米老下文丹淵用墨意在筆前觀此卷豈在彭城下邪徳常評古精詣遂取其評以書題李龍眠十六羅漢象龍眠白描多用呉道子卧蠶筆若一用界畫法則非真矣此卷山林嶔崟骨相巉崿猶有離王舍城真態非復有江右卑弱儀度神閒意定視天台靈鷲直瞬息事龍眠神氣洞馬腹晚脩蓮社得無冥㑹耶題彦敬子昻蘭蕙梅菊畫卷余嘗見彦敬子昻親作繪事生香踈影光透紙墨觀者莫不斂衽二公既下世摹傳益多優孟之叔敖㡬不可辨觀此生意猶侍杖屨時也題子昻撃磬圗君子聽磬聲則思死封疆之臣蒯聵父子之亂於斯時也聖人得無所感柴也其来由也其死事果有至於此名畫記有擊磬圗不存子昻創意作此本其亦有所感也夫題鄭有之蘇黄海棠詩卷吾鄉樓楚公為令登封得嵩山之石以歸自渡江来南北隔絶其孫宣獻公遂築樓扁曰登封而貯石於其上京洛慨歎其記文實三致意焉華陽自甲午之破衣冠南来不一二數土地之宜登於王所者悉絶若竒花美木往往於前賢題詠中髣象而不復可覩金華鄭有之北山先生宣撫公之裔孫其家有蜀棠一本猶傳以為宣撫公自鎮蜀歸時手植有之復得摩圍閣所刻東坡海棠詩一篇又得黄太史所草合為一卷每花時舉酒展卷髙歌居然萬里之勢見於眉睫其扵宣獻公之意政相佀余嘗聞牛竒章聚花石之竒麗而身不及享近者内翰洪公築瓊圃於第而㡬致竒禍孰若宣撫公清名懿行淑於後人一花之㣲猶存於百數十年之後古人有言曰十年之計在木百年之計在徳今徳與木俱存而無墜豈不美與謹書其事于後他日訪喬木之居坐花隂之下舉觴相屬當為賦其事書趙監酒墓記後唐世宗室其初皆有封爵世逺親盡遂與異姓之臣雜而仕宦至或流落民間故作史者湥為之歎惜然而石堤谷之慘則又有甚可歎息焉者也宋太祖懲前代之失諸降王子孫皆得登仕版而柴氏錢氏復與為婚姻號為㝡盛至於靖康大變流離南來皆得奉國牒以見于宗廟絶猜疑之嫌於此可見余嘗自紹興以来考其世系彬彬秀出亡慮數十人至若魏王諸孫雖其族属號為疏逺卓然可傳者詞華則徳莊仲白清謹則徳老父子抑有以知祖宗垂裕之盛乙未秋趙君開叔出其皇祖監酒君之銘謂余曰此相國程公之所作也監酒君於魏王為九世孫而文昌公之從子也文昌師性命之説於慈湖先生為時儒宗曩先人官廣陵時詔以家世舊聞甚習暨歸餘姚故居毎拜髙曾墓下讀諸老所述先徳夙夜畏懼不能承嗣丙子奔播善和故書與墓碑俱燬為庶為奴不敢自恨獨欲求程公之銘不可得也惕然於心㡬二十年今復獲于四明之族黨誠不勝慰喜其為我記其事余曰世之畏禍者多矣變姓之張禄别族之輔氏盖思以自全也今君之喜非昔之喜也君方以易推䇿隱市以自活易之道非止於是其憂患之湥者也飬其支離以盡其天年斯足以不辱其先矣餘不足為道姑書其事而歸之書進脩堂往還尺牘始曾大父越公從正獻公時通判少卿方總角誦書正肅公方入小學于時諸生從正獻公凢數百人公教不及諸子母夫人戴氏手模顔魯公大字以教諸孫宗盟之好實夫人啟其議故越公少年作字亦習此體後伯祖通判大父嚴州尢相與模學進脩堂書體兩家敦叙情誼於書牘猶可見也嘉定癸酉嵗正獻公自九江召歸郎省越公亦自桐廬入為奉常属官後正獻公為待從而越公復入著庭同朝凢六年後三年正獻公奉祠歸里越公以列卿尹臨安公作詩十章相寄奬勵尤湥而其首章有曰少年妙譽已超然不肎随羣茍目前盖猶言昔時遲赴禮部相從事也暨正獻公薨越公挽章有曰燕堂聨族子講席後諸生盖言合譜時事也自正獻公而下書牘無慮數百皆蔵二父房往嵗從兄子禮舉此卷以授己丑之災凢先世舊物一夕而燼獨此以蔵于故山獲全追念二祖宗盟之始今己百二十年舊聞零落懼不復記憶因書識于後俾後之子孫得以有考云甲午歲良月曾孫桷謹識書馮將軍翠峰詩後金煬渡江世人咸稱采石㓛為䧺偉而不知煬之首謀以海道進兵為第一向非膠西用竒決勝則長驅海陵江左殆未可保始余閲李伯微甫繫年書湥疑紀采石之事為多膠西之事為略間閲傳記則知前輩已議雍公之張大而伯微甫雜記亦書雍公經理闗狭之不遂盖未嘗不置疑於其間也膠西之戰李寳㓛誠不得冺若馮將軍事獨不得見於史為可恨惟趙氏遺史所記號為詳悉而所謂當時卓然奇㓛皆歸於李寳之偏將曺洋乃於馮將軍湥有異論且謂獨請海艘借勇以避虜棄陣却走於凱旋之先余嘗反復其事有知其不然者夫軍法莫嚴於背兵李寳非能假馮將軍者也其㨗也實寳命曺洋詣闕以奏洋安得不揜美以自稱方是時猶概受其賞將軍之不卻走也明矣所傳聞異辭聖人猶疑之遺史重妄之罪湥矣微正獻公直筆以行遺事則將軍之㓛不止於冺焉而已也桷曾大父樞宻越公尹行都時築射圃曰旬閲下教出將軍射法以試士伍白首軍校猶能誦將軍射譜樞宻公訓閲之勤山陽弄兵公以不發兵坐視責時宰由是去國于時領兵殿巖者㡬欲承受風㫖襲夏震遺志以報私恩每思將軍之忠烈有不待子孫而後傳也今觀翠峰題詠諸老贊述滿卷獨正肅公書尾之語猶不滿於紹㝎之事噫其亦有望於後者與彭叟成紀之正裔今為范氏後馮范之譜猶臨卭髙魏之譜也昔陶商翁劉景文以邊將有能詩名將軍翰墨之美誠不愧古昔彭叟以詩書迪紹前人光其當不止此敢辨遺史之妄以補家乗復以勵彭叟云丁酉歲正月辛未越國袁桷書書史文靖為西山先生薦黄參軍家問嘗讀西山先生通文靖公啟有曰四紀奉常之第三州刺史之符華塗咸擬於直登雅操獨安於平進又曰青原彭蠡善政有百年之思太白東湖勝賞窮四時之樂味繹詞㫖盖不以恭奕為可貴也紹定元二先生去國文靖亦歸老里第今觀薦士之急遂因父以致其子而文靖諄諄訓諭尤以先生為重絶干撓之嫌於斯可見桷聞諸老言永國為相時欲迎公政府就養不一嵗而返方永國之入相也公獨言叅預應公宜為文字官應時以議端平兵事謫歸里未㡬果得召命將入國門劉濮二豎相繼論去公聞之歎恨數日噫父子至親宜無所嫌避在隆興時若張紫㣲之總得近世之江文忠誠有不可處若文靖父子誠無可議一時廷紳不免有趙括之譏慨貴盛之不常愍天運之日圮三復遺墨肅襟以嘻是嵗五月乙亥年家孫袁桷謹書于其曾孫益伯題識之後書張仲實家譜後古者别姓收族莫嚴於祖廟自宗法不行各尊其禰不待數世而視為絶族盖譜諜不脩廟制不立迄無所蔵附故耳唐世廟院之法猶有遺意至宋令甲非君賜不得立由是公卿大臣各懐安茍且視以為難事自渡江来承賜者亡㡬其所立廟率燬於火或撤去不復立而獨張忠烈王故廟易代猶無恙方承平時張氏族號㝡盛散處都邑其房院稱號各以數目為别嵗時烝嘗男女長㓜悉列廟下而復擇宗子以主祀傳于今其法盖未墜也昔摯虞以漢亡之後譜傳之失子孫不能言其先祖推其本始作族姓昭穆夫當流亂之餘理固若是而先儒以為厚風俗之道亦莫若明於譜系今仲實因故廟之舊合七世之譜傍行邪上如指諸掌慨今思古將襲徳踵媺使夫来者之有以自振而其可傳者非止於章綬赫奕而已夫尋丈之木其旁達拳曲者莫病于本也阿閣之鳯翺翔振迅者無害於徳也惟其有之者斯佀之也書曰紹聞衣徳言又曰迪惟前人光仲實其朂之矣袁桷識清容居士集卷第四十七
